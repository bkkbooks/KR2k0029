body:
  text: 姑蘇志卷三十四明王鏊撰冢墓周禮墓大夫掌凡邦之墓域而為之圖今制忠賢之藏則為之置守護禁樵牧亦先王遺意也獵往代采近時以著于篇商巫咸墳在巫門東北三里巫咸商太戊時賢臣是為巫門巫咸山按越絶書虞山巫咸所出史記正義謂巫咸冢在海虞山上子賢亦葬此離騷亦稱巫咸説者以為古人巫也太伯墓吳越春秋云太伯葬梅里平墟史記正義引括地志云在吳縣北五十里梅里村鴻山上去太伯所居城十里吳地記又云太伯冢在吳縣上去城十里吳君仲雍墓吳地記曰在常熟縣西虞山上與言偃冢並列寰宇記曰虞山有仲雍齊女墓東是仲雍西是齊女梁昭明太子招真治碑云逺望仲雍而髙墓蕭瑟旁臨齊女而哀壟蒼茫今碑尚在而墓久廢吳地記又曰仲雍墓在海虞山東嶺周霞賔詩虞墓東山頂岐州萬國西人皆憐伯仲心實似夷齊海水龍無害蠻花鳥自啼寂寥懷古意文倮見遺黎傅良玉仲雍古冢已丘墟冢上間雲日卷舒奠薦不聞陳簠簋芟夷端合禁樵蘇杜鵑啼血春風老狡兔穿塋夜月孤過客無勞增悵惘至今讓德重勾吳吳訥虞仲隨伯氏泯迹逃荆蠻至今仲隱處猶自稱虞山遺迹邈難尋廢冢留山間鄉邑失開陳嵗逺埋荒菅豫賤忝末裔有淚空潸潸誰為禁樵牧陳辭扣天關鄭東野鼠穿黃穴遺封百草深死無歸國夢人識逸民心巒樹冬逾碧江猿夜亦吟海虞山上月梅里共沈沈周師敬賢哉虞仲氏讓國來荆蠻斷髮文其身之死不復還孤冢鬱嵯峨屹立山之間高風播宇宙邈矣誰能攀青山得以名萬古永不刋周章墓圖經周章墓在虞山上王僚墓在岝崿山西吳地記云王僚葬山傍有思益寺吳王闔廬墓在虎丘山劒池越絶書及吳越春秋云闔廬之葬穿土為山積壤為丘發五郡之士十萬人共治千里使象運土鑿池四問廣六十里水深一丈五尺銅棺三重傾水銀為池六尺黃金珍玉為鳬鴈扁諸盤郢魚腸之劒在焉葬之三日金精上為白虎踞墳故名虎丘劉向疏云葬十餘年越人發之吳地記曰秦皇求劒虎復蹲焉遂走而失或云墓即虎丘寺法堂基也王禹稱詩惜哉吳王墓秦帝常開破應笑埋金玉千年賈為禍不待虎迹消己聞鮑車過又是驪山頭炎炎三月火范仲淹昔見虎耽耽今為佛子巖雲寒不出寺劒淨未離潭幽步蘿垂徑髙禪雪閉庵吳都十萬户煙瓦亘東南王紳山頭古寺多陳迹故國空餘氣象雄霸業已隨流水去闔閭墳草又西風張伯玉東客從來過虎丘橘花渡口維扁舟闔閭宫殿不可見但對古塔寒颼飀憶昔吳王全盛日水犀十萬橫吳鈎楚山既掘荆平冢越嶺仍將勾踐囚豈謂西施能破國誰知麋鹿上臺遊惟有吳王在時月夜深幽照劒池秋髙啓水銀為海接黃泉一穴曽勞萬卒穿謾説深機防盜賊難令朽骨化神仙空山虎去秋風後廢榭烏啼夜月邉地下應知無敵國何須深葬劒三千専諸墓相傳在盤門裏伍大夫廟側申公巫臣墓郡國志云在匠門西南祥符圖經云在將門外吳地記云在巫門外按匠將聲之訛云匠門外者非是孫武墓越絶書云在巫門外大冢去縣十里東漢書引皇覽云在吳縣東門外吳地記云在平門西北二里地名永昌干將墓在匠門外吳地記云匠門本名干將門門外有干將墓後訛為匠髙啓干將善鑄劒劒成終殺身吳伯亦遂亡神物豈不神始知服諸侯威武不及仁徒勞冶金鐵精先動星辰莫邪應同埋荒草千古春青蛇冢間出猶欲恐耕人慶忌墓在吳縣東北二十五里今云慶墳吳地記云在齊門外今十四都有慶忌廟要離墓在吳縣西四里閶門南城內吳地記曰在泰伯廟南三百五十步相傳在今梵門橋西城下馬婆墩舊有炮座基嘉定十六年提刑司修城此地多得古冢皆莫詳其姓氏漢書注要離冢在西伯鸞墓在北范志又云在閶門外金昌亭傍傳記不同互見梁鴻墓楊維禎詩金昌亭下路春草沒荒丘云是要離冢令人生古愁侏兒三尺餘不佩雙吳鈎中包猛士膽白日照髙秋惡死屠骨肉視身若蜉蝣荆軻不了恨慶忌成身謀如何五噫客死與爾同仇王夫差墓在陽山左傳云吳王乃縊越人以歸注以其尸歸越絶書云夫差冢在猶亭西卑猷位近太湖越王令干戈人以一土葬之吳越春秋云夫差既伏劒越王以禮葬之秦餘杭山宰嚭亦葬其旁其義子墳十八所俱在陽山又號亞父冢瓊姬墓夫差女也與夫差墓相近髙啓詩夢别夫差殿頭墮叉零落誰收土昏青鏡忌曉月冷珠𥜗恨秋麋鹿昔來廢苑牛羊今上荒丘香魂若怨亡國莫與西施共遊徐賁館娃宫裏已堪愁沉值泉臺小丘月冷寶奩無復曉池空玉鴈不知秋蘿間舊屋僧來往竹下新亭客過遊不有佳名留郡志誰能識此為停舟吳女墓在閭門外吳越春秋云闔閭女曰勝玉王與夫人及女會食蒸魚王前嘗半而與女女怒曰王食魚辱我乃自殺闔閭痛之葬於閶門外鑿池積土文石為椁題湊為中以金鼎玉杯銀尊珍襦之寶送女乃舞白鶴於市令民隨觀使男女與鶴俱入羡門因發機掩之又取土時其地遂成湖號女墳湖又越絶書云闔廬女冢在閶門外道北下方池廣四十八步水深二丈五尺池廣六十步水深丈五寸隨出廟路以南通姑胥門并周六里寰宇記引郡國志云玉女墳在郭西山川記云夫差小女名玉墳在閶門外御覽引吳地記云閶門外女墳者闔閭女墓齊女墓吳越春秋云吳太子娶齊女女思齊而病將死曰必葬我於虞山之顛以望齊國闔閭傷之如其言葬之周霞賔詩翟茀三千里辭親逺結婚浪傳招楚些難返望齊魂蘭麝山頭土蒿萊郭北門生涯歸一瞬標榜至今存張洪南風初徑北風微爭長諸姬復娶齊越境定須千兩送中途應拭萬行啼望鄉不憚登臺逺埋恨惟嫌起冢低蔓草萋萋猶泣露倩誰滴向故鄉泥吳訥齊景不自強涕出女於吳迢迢三千里百兩來姑蘇死葬虞山顛北望父母都芳魂逐飄風艷骨歸黃壚空餘一荒丘月夜嘷飢狐程式宗國中微日勾吳始霸時來歸非我志時事有天知身死蘇臺下心馳淄水湄萋萋芳草墓千古不勝悲鄭東突兀孤墳在千年恨尚新荆蠻非偶國盤瓠愧吾人躑躅春啼血狐狸夜得鄰營丘無霸業吳沼更傷神林大同嘗聞齊景公涕出女於吳孟薑志貞烈憂憤身為殂吳亦憫其生卜葬于海虞中宵走飛磷昭明燭太虛有客從宦遊考功朝帝都煜煜有耿光應與忠義俱孫王墓在盤門外晉張悛代吳令謝詢求為諸孫置守冢人表臣聞成湯革夏而封杞武王入殷而建宋春秋征伐則晉修虞祀燕祭齊廟夫一國為一人興先賢為後愚廢誠仁聖所哀悼而不忍也故三代敦繼絶之德春秋貴柔服之義昔漢髙受命追存六國凡諸絶祚一時並祀親與項羽對爭存亡逮羽之死臨哭其喪將以位嘗侔尊力嘗均勢雖功奪其成而恩與其敗且暴興疾顛禮之若舊殘戮之尸乃以公葬若使羽位承前緒世有哲王一朝力屈全身從命則楚廟不隳有後可冀伏惟大晉應天順民武成止戈西戎有即序之人京邑開吳蜀之館興滅加乎萬國繼絶接于百世雖三五𢎞道商周稱仁洋洋之美未足以喻是以孫氏雖家失吳祚而族蒙晉榮子弟量才比肩取進懷金侯服佩青千里當時受恩多有過望臣聞春雨潤木自葉流根鴟梟恤功愛子及室故天稱罔極之恩聖有綢繆之惠追惟吳偽武烈皇帝遭漢室之弱值亂臣之強首倡義兵先衆犯難破董卓於陽人濟神器於甄井威震群狡名顯往朝桓王才武弱冠承業招百越之士奮鷹揚之勢西赴許州將迎幼主雖元勳未終然至忠已著夫家積義勇之基世傳扶危之葉進為徇漢之臣退為開吳之主而蒸嘗絶於三葉園陵殘於薪采臣竊痛之伏見平吳之初明詔追録先賢欲封其墓愚謂二君並冝應書故舉勞則力輸先代論德則惠存江南正刑則罪非晉冦從坐則異代已輕若列先賢之數蒙詔書之恩裁加表異以寵亡靈則人望克厭誰曰不宜二君私奴多在墓側今為平民乞差五人蠲徭役使四時修護頽毁掃除塋壟永以為常國朝盧熊孫王墓辨古漢豫州刺史孫堅堅妻吳夫人及其子會稽太守策三墓並在盤門外三里即今齊升院東南面勢據古蛇門正與府治相向祥符圖經云孫堅墩方俗稱為孫王墓按吳書堅死於初平二年年三十七策死於建安五年年二十六吳氏死於建安七年合葬堅墓黃龍元年權追尊堅為武烈皇帝廟曰始祖墓曰髙陵吳氏為武烈皇后策為長沙桓王太元元年八月朔風拔髙陵松柏石碑蹉動晉陽秋云惠帝元康中吳令河東謝詢表為孫氏二君置守冢五人修護掃除有詔從之其文張悛所作今載文選陸廣微亦云盤門東北二里有吳武烈皇帝并長沙桓王等三墓前志云宋政和六年村民發墓其甎側皆有萬嵗永藏四篆字得金玉竒器甚多有東西銀栝初若粲花良久化為腐土并金搔頭十數枚金握臂二悉皆如新一瓦熏爐與近世陸墓所制略似而箱底灰炭猶存碑石斷缺僅餘中平年三字州將遽命掩之所得古物盡歸朱勔家洪伯芻香譜亦略載此事即楊友夔所賦孫豫州墓者是也洪氏三庚志云盤門外大冢紹興二年秋雨隤圮牧童入其間得銅器數種持賣於市鄉人往視圮處蓋其隧道有石刻𨽻書云大吳長沙桓王之墓赤烏三年凡十二字知府沈揆亟命掩塞仍立石表其所滕宬為記袁席之謂䇿死距赤烏三年已四十載豈非權稱制之久復改葬乎所得之器滕藏一小鏡其背有銘十四字一銅小麟鎮紙無欵識以遺席之嘉熙中墓傍土中又得唐孫德琳墓志云開元十年窆于十四代祖吳武烈皇帝陵東南平地又按丹陽圖經載髙陵在縣西練塘鄉吳陵港熊以傳記證之當是堅葬曲阿後遷于吳史不及詳載爾滕宬所記謂紹熙中提舉常平張體仁嘗命其屬表之題曰先賢墓徐誼屬宬考訂止從俗稱孫王墓宬蓋據陳夀説破虜葬曲阿及言䇿之薨其將周瑜魯肅皆赴喪獨指此為伯符之墓亦未嘗及謝詢所表不審三墳同域故論説紛紜自相抵牾在政和知為豫州之墓在紹熙知為長沙之墓皆不能質諸傳記以求其説地亦嘗為官窯故舊志不復詳究矣因備載始末傳諸好事仍録古今文詞如左云梁何遜行經孫氏陵昔在零陵厭神器若無依逐兔爭先捷掎鹿競因機呼吸開伯道叱吒淹江畿豹變紛竒略虎視肅戎威長蛇衄巴漢驥馬絶淮淝交戟無內禦重門豈外扉成功舉以棄凶德愎而違水龍忽東騖青蓋乃西歸朅來以永久年代曖微微苔石疑文字荆墳失是非山鶯空曙響隴月自秋輝銀海終無浪金鳬會不飛闃寂今如此望望沾人衣宋劉充莊題長沙王墓霸略誰堪敵伯符每開史册想規模一千掃衆橫江去十七成功自古無警蹕未迎歸大內英雄可惜死東吳君看末命尤竒特指顧張昭為託孤餘詩文具載郡人朱凱所輯髙陵編吳王墓有三一在蛇門外大丘去縣十五里一在匠門外欐溪瀆中去縣二十里一曰胥女大冢去縣四十五里皆見越絶書越王史墓越絶書云巫門外寃山大冢故越王史冢也去縣二十里又云蒸山南夏駕大冢者越王不審名冢去縣二十五里言偃墓在虞山上史記吳世家注與仲雍墓並列淡臺滅明墓在淡臺湖傍或曰在吳縣西南八十里又傳張士誠築城於虎丘土中得石刻曰淡臺滅明之墓莫格墓越絶書云去縣二十里虎丘之北莫格古賢避世者衛公子墓越絶書胥女南小蜀山春申君客衛公子冢也去縣三十五里又云土山春申君時治以為貴人冢次去縣十六里馮暖墓在吳縣東北二里即暖所居死葬其側至唐墓碣猶存互見第宅中大夫嚴助墓在吳江縣東南百里至今呼其地為嚴墓漢丞相陸烈墓在秦餘杭山又云虎丘山西北十里有水名白坊又北十里胥屏亭東岓有漢豫章都尉陸烈墓山隂令陸寂墓在陸烈墳東二里穎川太守陸宏墓在平門西北三里或云在華亭縣西北四十里按宏績長子官會稽南部都尉其為穎川太守者曰閎乃宏八世祖耳今姑仍盧志三老顧綜墓在婁門外塘北與朱梁墳相直顧闕撰廟碑有云刋石婁門德輝不滅碑今亡黃香墓在常熟梅里鎮乾道初梅里蘇忠翊直卜葬得古冢乃黃香墓碑刻𨽻書首兩句八字中二字不可識延陵慈父葬子博羸孟光貞婦窆夫於吳碑隂乃會稽東部都尉張紘也又有薛綜修祠日月題刻可辨者八字子瓊孫琬位登三事蘇氏挈歸家有光怪舁棄昆承湖中朱梁墓在婁門東南二里梁本名肇避和帝諱改仕為正議大夫兾吳二郡太守郡中朱氏多其後肇一作穆按漢制無正議大夫兾州亦非兾郡奉車都尉衡州刺史吳輝墓在姑蘇山北十二里胥口東岸輝字光修丹陽太守景之父也蜀郡太守張康墓俗名鳯凰墩在吳縣界或云在閶門外康考之氏族無所見唐宰相表有漢蜀郡太守張睦王賔云子房七世孫名睦字選公東漢蜀郡太守始居吳鳯凰墩豈睦之葬地邪梁鴻墓在吳縣西四里要離墓北鴻疾困告皋伯通勿令子持喪歸及卒伯通求葬地以要離烈士而伯鸞清髙令相近陸龜蒙云在金昌亭傍幾一里續志云今閶門南城內法會菴西有古冢傳為要離梁鴻墓闕得天元純誕有漢髙士梁君諱鴻字伯鸞扶風人君其生知囊括道妙而遊於世遭漢微缺澆風偃物君以為道不可徇時故安節以髙蹈髙蹈不可以激俗故登邙以作歌歌不可以遺患故適越以遐遁遁不可以不粒故寄食於杵臼是以孟氏恱其道而妻之伯通尚其風而禮之安夫大而遺其細忽夫語而順乎默樂則行之憂則違之斯可謂髙世之逸民矣原夫天之運也曰眀與晦人之道也曰否與泰達人知否與晦之不可為也故耦而耕狂而歌鑿坯以逃荷蓧以遊而晦德避難不成乎名於戲伯鸞非斯人之徒則誰與哉唐大厯六年小子旅於吳得君之舊遊焉孟子稱聞栁下惠之風者鄙夫寬薄夫敦然則聞之風聲亦將舍爾朵頥以觀我靈龜乎乃刋貞石以識遺烈銘曰山隱器車河祕馬圖伯鸞不行獨與道俱太虛無際浮雲無繫伯鸞伊何𡨕迹人世直道辱身三黜魯邦扣馬逆諫餓于首陽邈矣伯鸞靜而含光作銘皋橋萬古是望吳郡餘杭邵氏夫人墓在吳江縣陳思村硯格書奩云至順四年耕夫得甎於古壙中上有文曰赤烏五年七月造又一方甓上刻曰吳郡餘杭邵氏夫人之墓吳鬱林太守陸績墓在陽抱山吳地記云在閶門外泰伯廟西至元間郡人朱澤民祖母病卜地陽抱山夢偉丈夫告云勿奪吾宅吾且為夫人後既而穿地得石刻曰鬱林太守陸績之墓别有刻云此石爛人來換石果斷矣遂掩之而卜兆其傍侍中朱桓墓在橫山偏將軍步隲墓在吳縣東北三里一百步有碑左丞相陸凱墓在長洲縣西鳯凰山或云在松江郡西北三十二里太子中庶子陸禕墓在崑山之顛舊有征北將軍墓碑已折沈遼詩月日欲出已復西人間廢興那可知崑山陵谷久已變水傍唯有將軍碑晉司空何充墓在岝崿山東一里見寰宇記按史何氏過江自充以下並葬吳西山兵部侍郎石崇墓在吳縣西六里髙啓詩虬須欲怒珊瑚折步障圍春錦雲熱真珠換妾勝驚鴻笑踏香塵如踏空酒闌金谷鶯花醉家逐樓前舞裙墜財多買得東市愁羅綺散盡餘荒丘猶令白首同歸者坐伴遊魂楓樹下黃門侍郎潘嶽墓在石崇墳西北東曹掾張翰墓在橫山東五里將軍袁山松墓吳地記云在橫山二里盧志在橫山東五里山松築滬瀆壘禦孫靈芳為賊所害麾下士李祥突白刃收骸歸葬給事中江纂墓在天平山下地名上沙宋孫起卿於其地獲墓磚刻文略云纂養父諶本父乃淮南內史朱誕墓在婁門外一里驃騎將軍顧榮墓寰宇記云在赤門外九里陸廣微記云在吳縣東南二十里側有左威將軍張敏墳今實在葑門東六里長洲縣黃天蕩南俗訛稱顧邑墓墓西有祠題曰顧將軍廟或誤云上將軍榮從子和亦葬吳謝應芳詩白髮吳儂説姓名將軍墓近闔閭城徴車入雒稱三俊割炙知人得再生江月似留揮扇影松風猶作鼓琴聲停舟一酹蘋花渚野鶴飛來躑躅鳴其餘詩俱見懷古録廬江太守闕臻墓在齊門東北二里今有闕墓村臻德行清髙封關內侯見吳地記廢帝陵相傳在白茅市按晉書廢帝奕太和六年廢為東海王咸安二年降封海西縣公徒吳太元十一年崩與庾后合葬吳陵又侯白旌異記云盜發白茅冢棺內大吼如雷野雉悉雊飛焰赫然盜多被燒死瞿硎先生墓慶元志云在直塘市市有廣安寺浚塘得古冢墓磚稱瞿硎先生字鵲子廣川人隱居不仕葬于東陵武安寺重岡之原武安蓋廣安舊額今其地尚多瞿姓晉書隱逸傳瞿硎先生者不得姓名亦不知何許人太和末居宣城文脊山中山有瞿硎因以為名桓溫造之見先生被鹿裘坐石室神無忤色溫及僚佐皆莫測之乃命伏滔為之銘贊竟卒於山中太尉陸玩墓在雞籠山子尚書令納亦葬此山按史玩卒給兵千人守冢七十家太元中以玩有佐命勳先陪陵而葬由是特置興平伯官屬以衛墓則玩葬地當在南京之雞籠山宋會稽內史張裕墓在吳縣西二十七里華山青州刺史郁泰玄墓見蘇州冢墓記不詳所在記言泰玄性仁恕葬日燕數千銜土今冢猶髙大異他墳村鄉嵗時祭祀或謂吳縣西南有玄墓山疑即其地雅兒墓宋湘東太守張濟女也元徽七年葬在至德鄉今俗訛雅宜山蕭天子墓慶元志云在常熟寶嚴寺東丁家灣之西故老傳云蕭天子墓上有古木樵牧不敢近不知何帝也按江隂志蕭天子墓在長信鄉有大土封號倉堆又按梁史梁敬華為江隂王殂蕭季卿嗣陳大建二年除侍中淳于氏就季卿買梁陵中樹皆坐免即此觀之墓亦有自又盧氏云唐蕭存人號為蕭夫子嘗為常熟主簿恐葬此訛稱云爾梁朝公主墓在乘鯉坊即傳法尼寺後大土丘也相傳梁武帝女出降郡人孫瑒寺其故宅也尚祀之稱為妙嚴公主寺西路百步許河濵有石馬號石馬匯即其神道門下侍郎陸雲公墓在橫山俗稱陸墓山舊經訛為陸雲墳又或謂陸機皆非太常卿陸倕墓在吳縣綬山鄉墓石從子襄為序湘東王繹為銘普通六年立陳黃門侍郎顧野王墓在楞伽山下吳地記云在橫山别隅平地不起墳紹興間碑石尚存髙啓詩南朝舊碑倒墓近樵蘇道應與讀書堆離離總秋草唐鸞臺侍郎顔崇墓在泰伯廟西贈尚書左丞陸象先墓在光福山西河南法曹參軍張從師墓在虎丘張説撰志稱從師辨博閎逹好古逸羣秀才髙第歷官五政弟從申善書有時名子惟儉惟靜皆精左氏榖梁春秋山南西道節度使歸融墓在城西二十餘里有大冢巋然土人號歸王墓宋嘉熙中墓傍民墾土得石如礎其中隆起八分書云唐故陳留言夫人墓志四維下殺刻瑞芝按融終於少傅無王封陸宣公贄墓在齊門外六里虛舟客話云在官河之西地名陸墓水名陸塘淳祐中嘗於墓傍得遺刻與所傳合郡人周虎張震發訂其事或謂宣公卒于忠州其喪不曽還吳而忠州圖經云墓在玉虛觀南三十步稿葬或云公已歸葬吳中忠州特虛冢爾吏部尚書姚紹之墓在吳縣南五里一百步陸龜蒙墓在甫里傍有白蓮寺托言龜蒙中和初卒給事顔薨志墓吳融為祭文千餘言有曰觸即碎潭下月拭即滅玉上塵又有宋胡宿所撰碑今亡卜將軍墓在崑山西鹿城鄉界卜山有墓記略曰將軍名珍字文超西河人生偉異有大志敬宗時紀綱顛委藩鎮騷然將軍奮孤忠雄勳盛烈為世所重閻將軍墓常熟勝法寺東寺即元和中間氏舍宅所置陸元感墓在崑山朝議郎行右拾遺靳翰志陸丞相墓在常熟縣開元鄉岡下村墓左有涇曰大墓濱村民浚涇得朱漆板古刀錢鐵牌未知丞相為誰也朱氏墓在穹窿山傍墓碑云先居下邳自平始三年避地至會昌壬戌凡八百四十二年籍于吳故有邳村之名敘過江之祖子孫官爵字多湮泐俚俗妄云漢朱買臣墓非也魯國夫人墓怪竒志云嘉泰中齊門外採蓮里窑户起土於古冢側得方石題云唐周軍魯國夫人墓又云長慶三年四月十四日葬於陸墓里通賢鄉之原真娘墓在虎丘路傍圖經云在雲巖寺西南山下吳妓人也詳見李紳詩序雲溪友議又館閣書目有真娘墓詩一卷李紳詩并序真娘吳之妓人歌舞有名者死葬虎丘寺前吳中少年從其志也墓多花草以蔽其上嘉興縣前亦有吳妓人蘇小小墓風雨之夕或聞其上有歌吹之音其詩云一株繁艷春城盡雙樹慈門忍草生愁態自隨風燭滅愛心難逐雨花輕黛消波月空蟾影歌息梁塵有梵聲還似錢塘蘇小小秪應回首是卿卿白居易真娘墓虎丘道不識真娘鏡中面唯見真娘墓頭草霜摧桃李風折蓮真娘死時猶少塞年脂膚荑手不牢固世間尤物難留連難留連易銷歇北花江南雪談銖虎丘山下冢纍纍松柏蕭條盡可悲何事世人唯色重真娘墓上獨留詩李商隱虎丘山下劒池邉長遣遊人嘆逝川罥樹斷絲悲舞席出雲清梵想歌筵栁眉空吐效顰葉榆莢還飛買笑錢一自香魂招不得秪應江上獨嬋姢王禹稱女命在于色士命在于才無才無色者未死如塵灰虎丘真娘墓止是空土堆香魂與膩骨銷散如黃埃何事千百年一名猶在哉吳越多婦人死即藏山隈無色故無名丘冢空崔嵬唯此真娘墓客到情徘徊我是好名士為爾傾一杯我非好色者後人無相咍楊備氷肌玉骨有遺妍粉作嬌雲黛作煙知有香魂埋不得月深巖底月中仙髙啓金叉葬小墳楊栁寺前村已斷花間信空歸月下魂山鶯留曲韻草露帶啼痕車馬逢寒食還來酹酒樽顧瑛何處真娘墓雲霾斷石根夜深風雨急誰喚海棠魂綽墩傳為黃翻綽墳互見山類幽獨君墓大厯十二年虎丘寺有鬼題詩二章隱於石壁上觀察使李道昌以聞敕令致祭後數日復隱出詩云欲知潛寐處山北兩孤墳莫詳姓氏故稱為幽獨君今山北有二墳猶存互見紀異條李道昌祭文嗚呼萬古丘陵化無再出君是何人能言詩筆何代而亡誰人子姪曽作何官是誰仙室寂寞夜臺悲呼白日不向紙上石中隱出桃源三月緑草垂楊黃鶯百囀猿聲斷腸不題姓字寧辨賢良嗚呼痛哉嘆惜先賢空傳經史終無再還青松嶺上嵳峩碧山大唐政集已記詩言痛復痛兮阿處賔悲復悲兮萬古墳能作詩兮動天聲哀怨兮淚沾巾感我皇兮列清酌願當生兮事明君髙啓詩君本何代人姓名復為誰何年棄人間長眠此山陲荆榛鬱朦朧孤墳上無碑遊魂久未化哽咽還能詩人歿乃歸滅憂樂豈復知君何獨煩寃猶有親愛思一死衆所同已矣焉足悲陳辭為相吊此理君當推莊府君墓在嘉定縣城南澄江門外志云名泰馮翊郡人咸通三年葬于崑山縣東一百里伍家堽疁城鄉橫瀝水西吳越廣陵王錢元璙及其子中吳軍節度使文奉墓並在橫山即踞湖山錢氏有國日造薦福寺於山下土人遂以寺名名山又墓傍有夀聖院晉天福五年文奉建以奉廣陵墓祀初名吳山院至宋治平中賜今名崇寧元年文奉孫公著立石少府監丞強浚明為記盧志云墓在橫山楞伽寺傍非也且以浚明所作訛為明因院記而謂公著所撰亦非明因院即薦福山感慈院也凌民瞻有方丈記不及錢氏父子則非所謂墳祠矣李墓在常熟縣東南四十五里慶元志云相傳吳越錢王遣將梅世忠李開山屯梅里開山卒葬於其傍十八里故曰李墓今土人或謂之李王墓梅里蓋因二將得名今誤名梅里宋駙馬都尉石端禮與陳國靖懿帝姫墓在黃山法雲寺堂上見周必大遊山記按哲宗女封瀛國出降改陳國長公主卒諡靖懿而常熟縣東七十二里有靖懿帝姬殯所傍有褒親崇惠寺政和七年賜額當時權厝後改葬耳晉國公丁謂墓在華山習嘉原范文正公仲淹祖墓在天平山三讓原曽祖夢齡