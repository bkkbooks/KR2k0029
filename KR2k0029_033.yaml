志陳明善墓在雅冝山大墩周伯琦題墓顧仲瑛墓在崑山縣界溪仲瑛卒於鳯陽返葬於此趙冝訥志張士誠母偽太妃墓在盤門外今人稱為娘娘墳又有朱平章李司徒二墳皆士誠偽官朱名英墳在薦福山修竹塢李名行素伯升父也墳在楞加山下七姫墓在郡城東北隅潘氏後圃張羽作權厝志七姫皆良家子事江浙行省左丞滎陽潘公皆為側室性皆柔慧姿容皆端麗修潔善女紅剪製衣繡經手皆精巧絶倫事其主及夫人皆能以禮其群居和而有序皆不為怙寵忮美之行公每聞閭閻間婦女能以節概自立者歸必為語其事皆應曰彼亦人為耳公笑曰若果能邪及外難興敵抵城公日臨戰一旦歸召七姫謂曰我受國重寄義不顧家脫有不宿誡若等當自引決毋為人恥也一姬跪而前曰主君遇妾厚妾終無二心請及君時死以報毋令君疑也遂趨入室以其帨自經死於户六人者亦皆相繼經死公聞之曰何若遽死邪實至正丁未七月五日也以世難弗克葬乃斂其尸焚之復以其遺骸瘞於後圃合為一冢公還啓其封且泣曰是非若所安也行營髙敞地而遷焉時以日薄故未暇為志及踰月始狀其事屬羽將勒石追瘞於冢側嘗觀古之史氏所載貞妃烈婦能識節義決死生而不顧者恆曠世而一見今乃於一家一日而得七人焉吁不竒矣哉乃列其姓氏於石而系之以銘程氏蜀郡人年卅生女一人生奴翟氏廣陵人年草三徐氏黃岡人年二十生女一人不惜羅氏濮州人年草三卞氏海陵人年與羅氏同彭氏與卞氏同郡其年與徐氏同段氏大寧人年十八其先死者也公名元紹字仲昭實宋魏王廷美之裔其先以避禍易今姓未復云銘曰生也同其天死也同其時而瘞又同其封壤樹蕭條匪子之宫尚卜髙原以永無窮國朝起居注陳桱墓在陽山東之瓜山韓復陽墓在支硎山碧琳泉下子隱士公望太醫院使公達院判公茂並祔復陽志金華胡翰撰新安詹希元書翰林院待詔李幹墓在黃山貞臣依郡人盛景革既卒景華葬于其家墓傍互見遊寓條幹傳兖州知州盧熊墓在武丘鄉都昌縣知縣俞貞木墓在楞伽山寺下村中王文靖公璲弟翰林侍講璡墓皆在陽山鳯凰峯下濟南府經歷陳汝言墓在橫山茶塢子翰林院檢討繼祔楊文貞公士竒撰繼墓碑户部左侍郎莫禮墓在綺川禮部尚書楊翥墓在吳山嶺西洋灣長旗嶺下禮部侍郎金問墓在橫山南京右副都御史諡文恪吳訥墓在常熟縣報慈里翰林院修撰張洪墓在常熟縣西十二里東湖村贈工部尚書王永和墓在鄧尉山太常少卿夏昶墓在崑山縣陳僖敏公鎰墓在吳山西麓朝廷遣官營葬從子四川僉事僎祔武功伯徐有貞撰僎墓碣翰林院修撰施槃墓在洞庭東山黃岡金塔下楊文定公溥志兵部侍郎李蕡墓在陳公鄉朝廷遣官營葬刑部員外郎程式墓在常熟縣報慈里正統己巳扈從北狩殁衣冠葬此朝廷遣官營治贈禮部侍郎諡文恭劉鉉墓在虎丘南袁公巷刑部尚書俞士恱墓在白蓮橋內陳菴西先葬其妻夫人黃氏朝廷遣官營葬福建按察司僉事陳祚墓在吳山桃花塢子教授寧孫知縣恱祔禮部儀制司主事楊循吉記𢎞治二年三月故福建僉事鄉先生陳公之墓成公之孫太學生恱來言於循吉曰先公墓在吳山下先君子仕歸而貧猶吾先公也以是力不得葺先公雖爵列大夫殆與庶人家等恱一士人又何能為賴天子即位下詔賜修名臣之墓考諸國志先公名在焉宜得預詔賜恱則以白諸巡撫王公郡守賀公通守應公皆惟上德意是宣為之欣然行之而後先公之墓始備於禮且按故復子孫一人守焉恱竊惟明天子惠賁之恩巡撫諸公經畫之力不可以忘敢琢石以俟記循吉既受請乃言曰嗚呼公固吳中之偉人也夫士所急者氣節而已茍其得之則雖匹夫之賤亦足以尊國家衛社稷而况於公卿大夫乎故士無氣節則必為貪位為畏死為顧家未有不至於壞事者也故夫人材者氣節先焉而才能次之然古之君子其於患難之際茍可以直其道者必勇趨之而未嘗有一日茍且自恕之心故天下恃焉而後世則否每每以持重為事而新進之士恆有所待於他日而不知官髙位大則益有所不敢為也是以忠厚博大之風有餘而嚴毅負荷之氣不足可以應安間而不可以待倉遽此求治者之所宜深思也然則如陳公者豈易得哉方公之立朝也官不過御史耳然其危言正色殆卓然有身任民社之心固循吉所謂一世時之偉人也是其生可以重當時而其歿可以師後者也使有一墓而不得葺則豈吾鄉人之心哉今巡撫諸公仰惟明天子重德尊賢之意奉行惟謹如此可謂深得明詔之旨而大有慰於吳人之望者也然循吉竊以為與公同時之人豈無有官髙位大於公者而公獨得登國志位賢祠預詔恩以是仰知朝廷待君子之厚雖其逺而未嘗忘也為之臣者可不勉乎敢書於石以公為勸焉武功伯徐有貞墓在貞山山西右參政祝皓祭墓表惟公天賦絶倫學精群籍才髙當世志方古人蚤發迹於賢科即致身於翰苑論思啓沃足潤皇猷保障綏寧克清時患爰總紀綱之重懋成疏導之功而乃明炳幾先密圖匡復遂乘風雲之會親依日月之光寅亮天工燮調元化毅然以堯舜君民自任謂太平指日可期夫何納牖乍通穿墉遽入以是魚水方諧而萋斐交市河山雖誓而阱陷肆張卒至敬輿安忠州之行純仁甘永州之去平平王道蹶驥足於疾驅浩浩長風摧鴻毛於奮舉巷伯之章徒詠緇衣之義誰陳而彼且操戈於入室之後投石於下井之餘攟托蔓延釀惡未已幸賴皇天顯佑聖主含𢎞履險如夷完璧往返是雖群慝之無良亦公矯枉之太峻也夫天地之道浸淫滋潤斯成化功暴雨疾風無資長育故決防之水必至潰隄髙張之絃多致絶響所以功赫者難成而易墮時驟者易失而難久嗚呼惜哉葉文莊公盛墓在崑山縣朝廷遣官營葬都察院右都御史韓雍墓在雅宜山竒禾嶺朝廷遣官營葬兵部左侍郎孔鏞墓在橫山丹霞塢朝廷遣官營葬工部尚書程宗墓在常熟邵家灣南京工部侍郎徐恪墓在常熟縣北門外朝廷遣官營葬太常寺少卿陸釴墓在太倉大西門外朝廷遣官營葬太常少卿馬紹榮墓在吳縣楞伽山朝廷遣官營葬封詹事府少詹事王朝用墓在洞庭東山朝廷因其子鏊貴遣官營葬神道碑維王氏世居吳之太湖東洞庭山曽祖諱廷寶祖諱伯莫考諱惟道皆有隱德公諱琬字朝用後以字行以其子鏊貴纍封中憲大夫詹事府少詹事兼翰林院侍讀學士𢎞治癸亥二月初九日卒訃聞上以濟之講筵侍從之勩推恤有加既命有司營葬域復遣官諭祭于家蓋異數也公少時質甚魯其學甚力初為邑庠弟子員屢應鄉試不偶進太學卒業復不偶成化癸巳以監資授官知襄陽之光化縣荆襄居湖南之奧土曠山深四方流聚所在以千萬計于時劇賊劉千斤者作亂朝廷命將出師剿平之而流民散居山澤尚多執事者慮復生變議盡驅出境至縶其孥火其居公在光化獨事招徠與上官忤既而朝廷遣都御史原公傑來撫安公乃肩輿入山諭以威德編為里社緩其賦役民遂帖然無異土著又選其俊秀為弟子員時躬臨考校以示勸懲募壯勇為民兵偶習射用銀錢為的中輒與之民益翕然思奮而上官主驅逐之議者滋不恱顧以為迂又兵革之後公私赤立疲憊未蘇中貴人銜使命往來大和山者徴求需索殆無虛日公曰剝窮民媚嬖幸以圖茍容吾不忍為也遂棄官歸時嵗在戊戌於是濟之已及第入翰林編修者三年矣時年己亥拜敕命進階文林郎𢎞治甲寅進封奉直大夫右春坊右諭德己未又進今封公自歸吳别築室於城西因號靜樂居士晚益髙簡寡出嵗時鄉飲郡大夫請為賔亦不赴優遊泉石怡然自得公素羸中年後漸充夀幾耄耋步履飲啖如少壯一日體中小不佳盥櫛更衣寢至夜半而逝享年八十有五娶葉氏纍贈恭人有賢行先公二十有六年卒子男四人長曰鋁次即鏊今為吏部右侍郎文行器業雅負時望次曰銓府學生亦有文名屢試未偶次曰鏐女三人皆適名族孫男八女四曽孫男二女一初恭人卒卜葬山之西馬塢既而公命遷葬蔣塢先塋之次至是諸子奉柩合葬焉葬之日甲子嵗十二月二十三日公存心仁厚篤於為民仕竟不達未究所藴濟之克成其志駸駸顯庸所至蓋未可量昔宋王晉公直道不偶而其子魏公以相業顯三槐世澤纍世不泯君子以為仁者有後之驗公豈其後也邪王氏之多賢也遷與濟之為同年以道誼相友善者三十年于兹聞公行事頗詳兹濟之以公神道碑見屬遂不辭而為之銘曰東南百川滙為具區洞庭中峙旁奠三吳屼峍􅔿淪虛涵靈孕孰鍾其美三槐之胤百三肇立發祥濬源千七萬八𣲖衍支分星羅環居其盛者季秉善不渝厚積纍世公生岐嶷少成若愚憤悱淬礪為君子儒牛刀小試光化劇邑瘡痍呻吟撫摩安輯惟民生厚惟土是安胡縶而驅而迫之還矧兹疲憊公私赤立使軺憧憧征需日急銛肌吸髓豫何寧忍亟脫吾責勿貽伊哂吳城西偏洵靜且樂有子成志皇三錫爵溪流澄徹可以濯纓丘壑逶迤杖履經行矍鑠是翁充養有道翛然長往亦既大耄敕營塢域蔣塢之涯宰木欣欣嫓美庭槐賜進士及第榮祿大夫太子太保禮部尚書兼武英殿大學士知制誥國史經筵官餘姚謝遷撰禮部尚書諡文定吳寬墓在薦福山西其父贈吏部右侍郎孟融母淑人張氏繼母王氏墓皆在其左文定公母王氏卒朝廷遣官營葬墓志銘公姓吳氏諱寬字原博學者稱為匏菴先生蘇之長洲人祖諱夀宗贈嘉議大夫吏部右侍郎考諱孟融纍贈亦如之公在成化𢎞治間為翰林院修撰遷右春坊右諭德左春坊左庶子兼侍讀進詹事府少詹事兼侍讀學士出為吏部右侍郎轉左侍郎兼學士入內閣典誥敕掌詹事府事終禮部尚書兼職如故生宣德乙卯十二月丙寅卒於𢎞治甲子七月戊戌夀七十配陳氏纍贈淑人貮室陳氏生二子奭奐以明年乙丑十一月丙申葬於吳縣花園山闕下之原公蚤學晚達雖有竒遇殊寵而弗究於用天有遺望焉嗚呼慟哉蓋公年十二而為府學生十八而應試三十四而舉于鄉三十八而登進士在官三十三年其得科第也始試久不售己絶意進取提學陳御史士賢見其文竒之敦勸就試為京闈書魁試禮部名第一殿試之日魁選未定憲廟已出御便殿趣讀卷衆亟擬以省元卷上既賜及第時論翕然其校士則辛丑甲辰為同考丁未壬戌為主考皆在禮部得人為多而壬戌所取為庶吉者即奉詔授之業讀卷例用尚書己未之試公獨以侍郎預其講讀侍從則今上在東宫時為講讀官御極即敕充經筵講官最後乃直日講而令皇太子講讀又以宫僚長日預侍焉其史事則修憲廟實録兼校正修大明會典充副總裁比修歷代通鑑纂要亦如之凡此皆翰林職任自部曹復入領者前所鮮見其居喪則在修撰時以父病乞歸省事不應例特豫告遂終制及以侍郎丁繼母憂六載闕吏部仍擬公名服未闋數月朝廷為虛位待之尤仕途所未有其寵遇之典則以三品賜鶴袍犀帶詔旨稱卿春秋丁遣祭先師孔子御殿傳制皆用內閣禮以疾告則命醫診視遣中官存問賜酒肉𬞞米諸物訃聞則命有司治葬如例而加祭二壇賜鏹楮萬緡為賻驛給舟車遣官護送超贈太子太保皆出常格若賜諡文定則本朝自南陽公之外一人而已其長子奭以三品恩已蔭為國子生比以舊學恩當官其少子奐特命奭為中書舍人而以奐補國學蓋上欲大用公而年已不逮故其既殁尤為之眷注周悉如此云公識趣髙雅行履端潔孝友天至遇族里有恩其居官廉慎律物以權勢所在未嘗寧處既復就清簡雖優詔纍留而引退不置惟於學充然自得所為文醇古有法詩得唐格書酷似蘇體詞命在朝廷紀載在史局碑板翰墨遍于天下執此亦可以不朽矣奭奉禮部左侍郎李公世賢狀請余銘乃哭而為之銘銘曰維世有望間不容偽上有廷論下則輿議逺且賤者輿臺奴𨽻彼懵無知孰強而係其所自致匪爵齒位矧其兼之功詎云易官居六卿孰謂非貴年登七旬夀亦云至惟三不朽公有其二有德有言功則未既其所未既尚有餘思我銘吳公以俟來世榮祿大夫太子太保禮部尚書兼謹身殿大學士知制詔經筵國史官會典總裁長沙李東陽撰贈都察院右副都御史徐諒墓在吳縣堯峰山以子源貴纍贈今職吳文定公撰表姑蘇志卷三十四
