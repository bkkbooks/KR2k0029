body:
  text: 姑蘇志卷二十三明王鏊撰官署下吳縣舊治秦漢時故處在子城東北打急路橋之東唐分州城東南地置長洲縣遂移置府治西北二里縣基本雍熈寺菜圃官與之互換云雍熈砧基作禇家巷宋仍之元徙譙樓内府治之右至正末張氏遷於永定寺後十六觀堂舊基淳熈十二年趙善重建縣門并書額寳慶三年趙善瀚剏門樓淳祐三年魏廷玉重修前有井二亦善瀚剏西曰惠泉施清臣銘東曰義井唐梁肅記在春秋時列國各有屬邑其主者魯謂之宰楚謂之尹晉謂之大夫秦時天下始置令長宅一同之内操賞罰之柄有人民焉有社稷焉風俗善敗本乎身黎元安否繫其政其體大矣自京口南被於淛間望縣十數而吳大國家當上元之際中夏多難衣冠南避寓於兹土參編户之一由是人俗舛襍號為難治加以州將有握兵按部之重邑居當水陸交馳之㑹承上撫下之勤征賦郵傳之繋倍百他縣夥乎其中不可勝紀大厯十一年天官擇可以長民者於是范陽盧公繇太原府祁縣令為之外寛内明敬事而信政本於仁飾身以文下車三年闔境之人安居樂義而不知安樂之所從來盖平以和也夫君子立身論道之通塞不論位之升降吳縣下畿服一等公俯而為之抑選部為官擇人而其履道從政所由然也予知者敢録其實書於東序以播其令聞時十四年二月甲子翰林學士梁肅記此記得之𩔖書中若其姓名則不復可考矣郭受記厥今天下經用之所資百貨之所植東南其外府也度淮而南濟江以東督府且十附城且百而田疇沃衍生齒繁夥則呉實巨擘焉予嘗登靈巖之巔俛而四望畎澮脈分原田碁布邱阜之間灌以機械沮洳之濵環以茭楗則舄鹵磽确變為膏澤之野蘋藻葭葦墾為秔稻之陸故歳一順成則粒米狼戾四方取給充然有餘出平胥口以臨震澤積水無涯兩山對峙桑田翳日木奴連雲織紝之功苞苴之利水浮陸轉無所不至故其民不耕耨而多富足中家壯子無不賈販以逰者繇是商賈以吳為都㑹五方畢至獄市襍擾縉紳以吳為樂土僑民閭里幾亞京雒為政者急之則怨而駭緩之則弛而肆泛然而多容則請謁紛紜幾至於骫法毅然而多拒則謗詈叢集必困於逰談宰字之任信難矣右通直郎許君來領是邑直方不撓有骯髒之風簡易無苛得調胹之術盖常急於豪猾緩於善柔整其大綱闊其細故為之期年而縣告治元祐六年霪雨敗稼吳民阻饑君日慰藉而拊循之賑給務均䘏隠求實不事虚名而為文具也予以是知君之篤於從政也舉兹以旃則其於整彫弊而應盤錯也何有焉水菑之明年君且代矣乃悉求前為此縣者之名氏爵里將書而刻諸石顧其僚郭受曰吾為是俾來者有攷焉爾子為我序諸辭不獲命因㮣叙吳風而毛舉君政之一二許君温陵人世為學家甚博而文異日顯用於時當不獨以循吏稱也元祐七年五月初一日縣尉兼河塘溝洫郭受撰乾道三年范成大續記吳令壁有記尚矣唐大厯己未梁肅為之詞者令盧某所立石亡而文傳本朝元祐壬申郭受為之詞者令許公輔所立石雖存而中更兵燼缺裂無幾後七十有六年晉陵袁君祖忠政成將歸始治二石更刻之又斷自建炎以下為之續記實乾道紀元之三祀歳在丁亥距大厯垂四百年而題名三立相望可攷吏民以為盛事然吳之為壯縣固自昔志之氣俗之􅍇生聚之繁覽觀之勝著於二碑者自若獨官事搶攘日不暇給必出於甚難而後能善治視昔𩔖不同者非特吳為然余行四方所過縣邑數十百見大夫皆厭苦其官齎咨太息悔曏之來而憂後之不得脱余私恠其説甚哉何至於此及切磋究之使一言其詳則曰古吏憂民而已今顧不然蕞爾邑負責猶數鉅萬晝夜薄遽唯錢榖之知且不能報期㑹有如一日姑舎是而用力於民不崇朝百適滿矣彼齎咨太息厭苦而欲脱者真有味其言哉今夫急催科則愧政專撫字則愧考兼善之誠難若袁君盖幾於無愧者其政先理而後情弛例而舉法故吏不能並縁士不敢奸以私民有訟自揣不當勝望寺門心醉郤去直者家居待報曰無庸謁吏明府自辯此坐堂上再期人信之如一日至於大官之間須求於不有責課於非時則又從容辦給弗以厲民率常最於他邑嗚呼可謂難也已旦莫去此至大官勢益易於為縣其所成就何可量按續記所登載無慮三十人而未有顯者必將自袁君始儻余言猶信來者尚勉之八月十五日左奉議郎主管台州崇道觀范成大記并書知縣㕔祥符圖經云在州西北一里前志云紹興三年蔣結建㕔西有平理堂天聖中徐的建後更名無倦端平中王良能為縣殿講蔣璨書氷壺二字掲于此乃以唐姚元崇氷壺戒刻石淳祐初改曰近民堂南北有小山南亭曰松桂北曰高䕃皆淳熈五年趙不忿建㕔東有勤清堂淳祐初魏廷玉建劉震孫命名王遂記開禧間吳機剏明恕堂饒虎臣改美錦堂山上有琅然亭東南有亭名河陽圖銷收沚取桃李雜植因名又有拙軒莞爾清心二亭亦機所作延射亭在平理堂西天聖七年馮允成作節度推官章珉記胥臺故封為一都㑹郡領五邑吳實首之百里之封五品之令曩歳限以常調治付中詮是將赤子奉其吐齧國家精求治本重字人之寄近制銅墨之任闕即以京僚洎朝列或幕賔補之先是繼署占勝逼于閭閭綿厯歳祀梁木將壞乃有前宰棘寺丞徐君繕完之圩墁訖功移符罷去則今南越郡計馮君實代之也君世襲衣纓練明吏術下車未幾政用佳茂廼因圓訟之隙周睨廨舎患無清曠之所得奉讌息之娛縣之西偏舊有幽圃俯於佛舎并吞仍歳君披圖按籍命工糞除疊繚垣以入之繇是砥平其基而巋然為亭雲集枝築而岌乎為堋䕃以佳木之清畦以雜花之英穿沼以𩔖滄溟築山以擬蓬瀛五畝之地百步之逕而佳致足矣君衆藝畢給愛客忘疲每缿筩絶稀簿領多暇春華爛而在目暑風冷然罷扇秋英墜砌冬霰集楹君賞心樂事撃鮮為具召貴介公子同僚諸英注弦筈以引滿擫絲管以度曲賽百嬌之楛矢爭半先之奕路中厨出乎豐饌而千里之蒓下豉雕盤薦乎佳賔而庭山之橘厥包終日督過醉賔未去燭已見跋主歌未晞雖雒中之季倫山隂之辟疆咸有名園雅好賔侣吾不知其彼為勝此為劣也亭之既成命賔以落之監郡集賢公嘉乃好事隨其景趣悉為雅名掲於華牓觀者知意此用畧諸若君愷悌之政殊尤之績采風謡者入境可知固不在因亭以敷暢之也下幙不佞嘗從事於文墨請書締結之始謹用春秋之法異時宰是邑者集簪纓於斯豢犬彘於斯惟其圖之天聖七年春三月二十有六日吳郡從事試芸臺讐書郎武寧章珉字伯鎮記西園多美石有太湖甲族不染塵移雲三亭丞㕔在縣門内東隅主簿㕔祥符圖經云在縣東今在丞㕔後尉㕔祥符圖經云在縣南七里盤門外盧氏云按尉司舊在教場西北隅紹興十四年趙伯建移今所慶元三年趙希實重修有范希文石曼卿所書韓文公伯夷頌開禧初羅相改剏㕔事作師清堂又有軒名排青後改平逺黄震又改柏臺皆景定三年重修教場在其西長洲縣舊治在府治後東北三里元徙譙樓内府治之左至正末張氏遷於本縣學西即宋舊治王元之所為記處王禹偁記天下稱宰邑之賢者率以宓不齊為稱首以彈琴化民民不忍欺謂得致理之要也殊不知行是道者不獨繫於人亦將繫於時矣當時王室雖㣲皇經未絶有周禮在魯則單父豈曰亂邦有聖人為師則子賤宜乎行道居百里之位得諸侯之權社稷民人自我而已井田車賦得均其輕重刑罰教令得齊其寛猛凶荒水旱得專其賑恤農時民力得聴其休息然則無私於心克儉於身辯田之腴瘠定賦之上下強暴者刑之以法孝弟者旌之以禮寛其教以誘人峻其令以約吏時豐則歛之歳饑則賑之農有力而不奪役非時而不行闢之以庠序誨之以禮樂使父子親兄弟友夫婦和然後祭祀以事鬼神行賚予以睦鄉黨自然懷土不散熈熈如春弗知其然而然也在上者不鳴琴而何俟哉洎王道云亡霸圖孔熾大小相併強弱相攻區區子男宗廟不保故傳曰漢南諸姬楚實盡之又曰楚縣陳盖縣之始也秦倂天下畫三十六郡則小國皆為縣而𨽻於郡矣國之於郡猶身之有臂也郡之於縣猶臂之有指也國取於郡郡取於縣縣取於民是以臂指撫民而自奉也由是田有暴賦丁有常庸春役而夏不休朝令而夕必具小則懲之以役最大則隔之以刑法豈惟道不能行亦將身就其辱遂使宰邑者茍禄食免笞罵而已昔人歎徒勞賦歸去者為是也向使子賤復生亦將捨琴折腰奔走不暇况行道乎雖欲不顧其時不程其力亦猶建一指而扶天柱不其難哉時使之然也長洲之名見吳都賦貞觀中分吳縣以建之垂二百年宰名氏縣誌闕焉錢氏享國幾一百稔專建屬吏莫得而知皇上嗣位之二載漢南王歸於我國家始設官以理焉袁仁鐬首之王禹偁次之其土汙瀦其俗輕浮地無柔桑野無宿麥餁魚飯稻衣葛服卉人無亷隅户無儲蓄好祀非鬼好滛内典學校之風久廢詩書之教未行兼并者僣而驕貧窶者欺而墮田賦自重民力甚虚租調失期流亡饑踵或歳一不稔則艱楚盈庭不能輯事矣至有市男女而塞責者甚可哀也盖隔中夏之政浸小國之風使今聖人求理於上庶官陳力於下斯民之泰其有漸乎禹偁非循良之才位凋瘵之邑仍以舊貫民安仰哉㑹到任之明年大有年也先是有漕運者轉民歳租更送他郡苦舟楫之役糜堰埭之費者久矣至是始聴民以本屬郡輸之從便宜也亦小康之有萌矣是歳獄訟縻繁賦調中考因鳩歛民瘼平議政體總而刋之存諸㕔事待賢者以舉之所謂言而不能行者也時大宋雍熈三年正月九日守大理評事知縣事王禹偁記此記兵火不存紹興十年知縣石珵重刻石吳騏𨽻書知縣㕔紹興初重建祥符圖經云在州東北一里餘茂苑堂在㕔事東紹興元年石珵重建中有百花亭尊美堂維摩丈室緑野軒緑筠菴淳熈九年曽栗繪王元之像以祀改曰企賢慶元中復舊米友仁茂苑堂記長洲令尹石珵瑩中才髙氣剛嗜古好雅下車既久政成事簡盖牛刀割鷄游刃裕如者邑廨之東有所謂茂苑堂前人取左太冲語帶潮汐之濬池佩長洲之茂苑意也考之圖經即江為池距縣南七十里多厯年所髙岸為谷無足深恠訂之於古莫可得實視棟楹之顛圮乃鳩工而函新之堂之南榮植以嘉木修竹竒芳蕙草鬱葱吐秀而森然敷隂如在邱壑邃深處與堂相直曰百花亭即堂之西為建屋曰尊美堂其北龜首曰維摩丈室北向聚羣石如巖谷曰緑野軒又南開竹逕曰緑筠菴皆増廣而掲以是名琴書雅玩陳列於中客至則閱古賞竒試茗烹飲必與之從容竟日怡然自適曽不少倦後之君子游息乎其上要當勿復翦伐如甘棠之愛顧不懿歟紹興己未季夏二十日襄陽米友仁元暉記方干題坐看孤峭却勞神還是㣲吟到日曛松鶴認名呼得下沙鷗飛處聴猶聞夜闌亦似深山月雨後唯關滿屋雲便此逍遥應不易朱衣紅斾未容君王禹偁移任長洲詩五首移任長洲縣舟中興有餘蓬髙猶見月棹穏不妨書雨碧蘆枝亞霜紅蓼穗疎此行紆墨綬不是為鱸魚移任長洲縣孤帆冒雨行全家隨逆旅一夜泊江城身世漂淪極功名早晩成惟當泥尊酒得喪任浮生移任長洲縣窮秋入水鄉江涵千頃月船載一篷霜竹宻藏魚市雲疎漏鴈行故園漸迢逓煙浪白茫茫移任長洲縣辭親淚落衣折腰雖未晩搔首欲何歸曉月霜華重晴山栗葉飛江頭鷗鳥在應恠不忘機移任長洲縣沿流漸入吳見碑時下岸逢店自徵酤野廟連荒塚江禽似畫圖髙堂從别後應夢宿菰蒲春日公舎偶題薄宦苦流離壯年心力衰鸎花愁不覺風雨病先知曉月晃竹屋寒苔疊槿籬無人慰幽寂庭桞自低垂長洲遣興七十浮生已半生徒勞何日見功名折腰米賤堪羞死負郭田荒好力耕庭鶴慣侵孤坐影隣鷄應信夜吟聲年來更待賢良詔咫尺松江未濯纓妻兒莫笑甑中塵只患功名不患貧自覺有文行古道可能無位泰生民烟村舊業勞歸夢雪屋孤燈照病身投老緑袍未休去九重天子用平人歳寒堂匊月亭蟠翠亭仲幷建淳熈五年吕存中重修龔頥正記申國吕君宰長洲之明年行受代矣一日公退吏散約客相羊縣治之圃時屬初夏紅紫事休宿雨收霽新緑鬱勃林采煥發菳葉左右屏列餘花錯落如綴珩珮有風徐至芬香襲人乃命酒坐蟠翠亭上君指柱間仲公彌性之詩有云樛枝宻葉翠虬蟠者曰名以是為花故也余居此之日久矣率夜漏未盡五刻起視事漏下五六刻猶不得息壯懷倥偬於簿書期㑹間領畧于此盖不一二數也適少間拾餘材為支其將傾葺其甚弊朽腐則新之敗蠧則墁之示不欲以將去而怠其事焉方此佳時一杯相屬客盖盡歡於是楚人龔養正使折花侑坐起以酒屬君曰夫草木之生其性也遂深山大埜清曠廣莫春敷秋隕付榮瘁于自然亦復何有不幸而名人從而玩之封植矯揉揠助其長而人方以為異而喜要非其性分也士而志於用小而小大而大其得而遂耶達者視之犧象孰先於楓栁蓬艾孰後於蘭茝耶抑余聞卭蜀山林中此花如積欒城蘇公詩半垂野水弱不墮直上長松勇無敵等詩㮣可想見君賢者後號有家法周旋州邑老益更事且有用於時顧欲遂其私且不可得若余者其將遂余生乎異時尚記前後二公之詩見此花為一笑君引飲釂遂書以記之時淳熈戊戌四月上澣也泰民堂在縣圃淳祐十年龔潗建陸徳輿記長洲龔令君作堂縣圃摘翰林王公壁記語扁以泰民既屬予書且諗以記予愳專斯堂之美遜者再請益勤予不可得而遜在易上坤下乾泰陽氣下降隂氣上騰隂陽訢合萬物生遂天地之泰也王澤下流物情上達上下相孚百姓恱豫君民之泰也天地之泰天地不能自泰也必有賴於贊化之主君民之泰君民不能自泰也必有賴於宣化之臣宣化之臣其最近於民者莫令若也令最近民使民之泰則易然盖即泰之卦觀泰之象思所以致泰之由乎泰之六爻惟九二言治道為詳其曰包荒用馮河不遐遺朋亡者包荒含容也馮河斷制也不遐遺無忽於小朋亡無牽於私交泰之兆庸實繋於此反是則不交不交否矣然則令之於民可忽必也居之以寛納之以仁學愛之化如彼武城率之以信斷之以明不擾之政如彼蒲庭毌頑之忿毌細之鄙當若上蔡視之如子毋邪爾思毋側爾蹈當若姑藏不改其操如是則氣之所通和之所致薫為嘉祥以蟠以際民其不泰乎其或弗操弗鉏弗究弗慮如彼曲阿徒事求譽為酷為豺為暴為驚如彼義縱治法行治愁嘆不聞疾疢不顰有若謂南罔念恤人利障不屏欲源不澄有若陳倉率歛自營如是則氣之所閼怨之所鍾形為咎證是萃是叢民其可泰乎一邑者天下之積也一邑之泰天下之泰所由推也一令之賢一邑之泰所由致也董子曰今之郡守縣令民之師帥也夫惟聖明在上師帥之賢參錯天下則天下之民胥泰矣長洲地大物繁臺府鼎立夙號難治君處之裕如知所先後户庭無滯訟田野無寃聲始至撤犴狴新之將去以空囹圄盖十數年未有王公所謂生民之泰其有漸乎幾之矣觀君名堂可以知君用心後之來者毋第以零陵三亭視是役也經始於淳祐庚戌八月落成於十月為楹若干為費若干役成而民不知又可書也已君名潗今淮東常平使者基先之子其賦政固有源流云中奉大夫新改差知温州軍州事陸徳輿記并書芳秀樓在㕔事後寳祐五年李念祖建丞㕔在縣治西淳祐初重建方杼記國家建官倣唐舊制自九寺三監萬家之邑率置丞員所以重其任貳其長也邑於民為最近丞於邑無所不當理漢後元之詔曰縣丞長吏也長洲為縣創於唐天后朝乾元中置為長洲軍至大厯間已而復舊國朝中興吳居三輔長洲土廣民衆素號難治為丞者非材術兼茂有理人之績莫得而著稱焉浚儀趙君帝室之胄沉酣經學挾其所有取甲科佐江隂幕淳熈改元轉而丞兹邑視民如愛子馭吏如束濕興利除害邑人宜之君涖官葉再黄矣政成而民有餘力年豐而物不疪癘視事之所棟宇欹橈榱桷朽蠧上漏下濕殆弗可居於是發私財以佐其用度故地以全其基役以麋至工以巧獻無損於公無擾於民㕔事廊廡輪奐一新為三十餘間塈涂整宻瓴甓堅滑髙其閈閎固其垣墉使後之居者得以賴其利焉工既告成邑士願紀其歳月以傳示將來杼居是邦見聞君之政稔矣凡今之人視官舎猶逆旅顧弗毁而加葺者已無幾積在官餘祿為居閑之助亦理然也君秩行滿又斥家財以給費求古循吏罕見儔比貪者聞風庶亦知勸噫昔之建一堂剏一亭猶侈其事以詒後人若君謨之清暑子瞻之喜雨是矣觀君此舉匪為翫游之所加於人數等其可無書乎君所以設施於一邑特其小小者耳推而上之庸可既哉姑書以為記云淳熈四年三月朔莆陽方杍記主簿㕔宻邇縣西紹興十七年尹機重建黄士特記長洲主簿㕔在縣治少西紹興十七年縣長尹侯機所建也經始茍簡計不及逺矮屋數椽陋甚歳久盖障穿缺支柱欹危潦雨至上漏下濕坐榻一日數易夜聞聲砉然則愳其覆之壓也慶元丁巳仲冬上澣予承乏庀職既弛瞻顧鬱悒則有意圖新焉然簿職卑力涼毫髪公費皆仰給於縣曩時長官或秦越相視居此者憚煩避謗蓄縮不敢謀因循歳月則棄去若傳舎亦勢然也予獨癡不自止試令梓人平章以圖來諗竹瓦木石計㑹纎悉業已素定越二年乃以請於令大夫黄公宜治縣有聲而友僚佐如兄弟喜曰此公家事耳子能躬其勞吾何靳焉於是考日鳩工昉於季秋之戊申迄於仲冬之己丑貿材於市募庸於肆民不與知而工以辦告靡縣帑之緍四百五十有八廪斛二十有四餘亦捐俸百千以佐用前門一間廊屋八楹㕔東西偏翼以兩軒可待賔至寢之後為丈室安明窓四向時暄涼啟門甓以禦濕於娛親為宜繚以垣墻髙丈餘闢小徑通縣圃其西有敗屋數間撤舊取新為圊湢庖爨之所是居也不侈不庳於今若未足視昔則已夸予且滿去後來者無忘營剏之難以時増葺其將多餘前功不則因弊塞墐亦可為數十年之利然非余所料也書生每事欲正與北山愚公可同一笑姑識余意於無窮之思時六年庚申三月初吉長樂黄士特記山隂孫應時書尉㕔祥符圖經云在齊門外去縣三里續志云在齊門外縁塘一里許淳熈十一年曽復重建㕔西有臺扁曰竒軒崑山縣舊治宋縣治即今治紹興二十六年知縣程沂重建舊傳孟尚書捨宅為之故今猶祠孟於縣門内之東葉子強記崑山秦疁邑也天下壯哉縣五季雲擾四方棊於兵吳越雖保有所履然詩書仁義之事缺焉國家文經海内始嚴令守淮海王以版圖歸時邊公倣治呉最首賜璽書褒徙以來尚旄頭紫㣲間能即學立夫子廟北門王公元記之故比地翕然趨於文至今好學而知禮尚孝而先信乃有昔之流風焉畺岸海江夷曠沃衍者數百里一山巍然恠石錯立井井闤闠間又有室屋林壑之勝士大夫自京都來官者樂之觀遊詠歌未覺身逺其歆艶者至合省寺賦祖帳之詩繇此以相以輔小郤言語侍從之班踵相躡也而其意依然于是二百年間風流緼藉續續可紀又建炎間敵獨不侵薦紳北來樂其土風而居之宦逰間多勝事益號佳邑屬歳縣計蹙束須入者聞其名相與駭汗若蹈甚畏豈先後難易若是不同邪亦才術限量之或異邪不然則今之所謂不足非古所病邪曷其趨違異見如此漢之郎官上應列星出宰百里晉之舎人洗馬妙天下選然不更長吏不得為臺郎今天子重字民之官褒庸旌善使觀瞻者以為榮顧力所底爾因仍規畏其可哉子強至之踰年勞於耳目思慮之外廼喟然而歎信學力之未至則諏諸前人以矩範焉然所傳止自崇觀間益稽史諜碣識得自雍熈以次五十有六人序而鑱之石尚俾來者知前輩優游庶幾勉之淳熈丙申六月縉雲葉子強記并書宋張方平崑山初秋觀稼回縣署與同寮及示姑蘇幕府邑民三萬家四邊湖海遶家家勤穡事市井嬉游少荐歳逢水冷饑勞何擾擾我來忝撫字見此心如搗去秋僅有年髙田尚停潦今幸風雨調皆話天時好春喜鵲巢低夏更蟬聲早吳民以此候旱澇飢穰拏船袂參差葑岸縈回繚蓺挿暮更急車聲達清曉紡筥猶掛壁何暇張魚鳥我時行近郊小艇穿萍藻渚長葭薍深野沃𥝧稏倒孺子逺餉歸閒暇顔色飽預喜省敲笞租賦可時了歸來軒館清曠蕩盈懷抱衙退人吏散庭廡間窈窈露篠映孤亭風荷動幽冶置身木鴈間兹焉願終老顛蹶走榮利况余拙非巧鱸鱠飯紫芒鵝脂酒清醥紫芒鵝脂稻名悵然懷友生虚齋為誰掃周承勛題縣圃藴輝亭瓦礫頻年積耡耰十莗功旋移低地碧頗雜亞枝紅對酒逢寒食慿欄接暖風墻慳天自闊堪送北飛鴻皷樓嘉熈丁酉七月圯淳祐己酉重建頒春宣詔二亭在縣樓左右紹熈三年知縣李禂建平政堂在縣治内舊名琴堂知縣李伯長改今名清心堂初名讀書堂知縣葉子強建松闕林知縣項公澤建已上在縣治南縣圃在縣治内東偏葉子強築錦香亭弦歌亭蕰煇亭樂全堂咸淳四年知縣林桂發建已上俱縣圃内丞㕔在縣治東簿㕔在縣治西有西堂淳祐九年主簿吳堅重建易名覽煇髙士軒在覽煇堂之西吳堅建縣尉司在縣治南内有隠齋笑月亭分翠軒皆王尉齊輿建殿丞廨舎在縣西南廵塘廨舎有月波臺並在縣治西南監務㕔在縣西南本府節制司酒庫節制司太倉巴城許務髙墟四酒庫贍兵酒庫在縣東故近民館也醋庫在縣西南户部漳浦石浦新永安三酒庫各以贍軍吏部掲闕注官課入版曹兩浙漕臣提領其事月解徑詣臺縣無預商稅茶鹽場在縣東南黄姚鹽場酒稅務在縣西南二里又有酒坊在縣東南百餘步安懷坊在舊治東北一里淳祐十一年項澤建以處老病貧乏之民始崇寧三年詔州縣置居養院以存老者安濟坊以養病者紹興十三年令户部措置支常年錢米人日一升錢一十文小兒半之惠民藥局養濟院常熟縣舊治舊縣廨多宋治平間屋㕔東北有琴堂紹興中孔瓚重修淳熈中劉頴改扁學愛四年曽棨新作寢室舊有君子堂共賦堂慶元四年孫應時重建又於㕔東創笑軒葺後圃為亭曰友山西為夾墻繚寢室後以通西偏為亭於西北曰是亭亭之南即共賦堂後累石山與君子堂通嘉泰二年何兖重建元陞為州治廨仍舊曽慎記常熟為縣其來久矣舊為毘陵郡南沙縣至梁改為常熟自梁厯唐由唐迄於偽吳幾數百年前尹是邑者姓名莫或紀録故不得而考焉本朝太平興國中錢氏以圖籍歸於京師始於縣令蔣文懌至元豐初知縣宣徳郎劉極求得其姓名凡四十有二人列之板牓置於㕔壁角自此來尹者至則書之觀其間相繼登金門上玉堂儀羽臺閤正位樞極盖翩翩焉未見其止余因承乏慮板牓不足以久傳於是命工鐫之於石立於㕔之左闕者補之庶為不朽之傳宜觀名列以勸方來俾尹斯邑者知夫儒之効愷悌及民福延百里庶幾乎刋石而無愧也紹興二十一年九月魯國曽慎記知縣㕔頗雄偉嘉定初葉凱於隔舎南闢軒曰簾晝寳慶二年惠疇於後圃創景言閣紹定四年史彌厚治東圃建堂後戴衍扁為讀書堂嘉熈初王爚因學愛堂之舊重創易曰道愛淳祐十年别搆治西圃移讀書堂於其中亭曰直節遂廢東圃丞㕔在縣治東淳熈初丞張孝伯重建㕔事其燕坐曰涉筆曰篤素軒簿㕔在縣治西與丞㕔對淳熈間簿蕭逵重修㕔事有燕坐曰愛蓮靜暉寄隠淳祐十一年簿唐世中復新其堂榜曰均政尉㕔在縣治北二里鄰順民倉紹熙中尉趙笈夫創㕔事後小閣曰樂山改曰挹翠復易曰斗堂北有小圃二亭曰藏春曰野趣淳祐八年尉周介夫通葺新之㕔西軒曰梅隠後臨流築亭曰濯纓宣風樓在縣治西紹熈辛未曾慎建紹興四年葉知機更曰慶豐自此至賞心亭皆𣙜酤之所燕喜樓在縣東㫖清樓在縣西北春風樓在縣東迎恩橋南賞心亭在縣西即舊弦歌舘縣樓永平時所建紹興二十一年太守徐琛篆額乾道間趙善括易以林東篆刻石㕔側慶元己未孫應時修之左右有亭左曰御筆手詔右曰寛恤事件國用庫在縣中門西廡省庫在縣㕔左苗倉庫在縣㕔左軍糧庫在縣治西南醋庫今但存醋庫橋户部贍軍塘頭河陽原塾支塘四酒坊酒稅務在縣東北坊橋市易務在尉廨西南猶有市易務巷本府梅李尚墅徐鳳塗松陸河五酒坊馬軍司莫城五林二酒坊凡諸酒坊課額盈虧縣皆無預然酒不越境内或有私釀則訴諸縣縣為懲治而已養濟院惠民藥局吳江縣舊治宋舊治祥符圖經云在縣城内運河北元與國朝皆仍之縣門舊有敕書樓三間紹定五年李椿新之李處全敕書樓記松陵令趙公伯虚為邑二年其農桑勸其獄訟簡其簿書錢穀治辨學有新田三髙有祠百廢具興不為茍歳月計先是建炎中國步方艱而邑當敵衝祝融回禄相其虐自後踰四十年閎宇庳陋夷於民編乾道強圉大淵獻公始撤之為新門培基取材百用先具梓人執斧斤以聴畫至瓦甓坯釘亦出於公之指授焉其始於秋而落成於冬遲速之程不㣲於素飛樓干霄與江山長雄環視具區笠澤之廣雲烟卷舒濤瀾吐吞舞鴻鵠而歗魚龍為三壯觀公乃以季冬之月盛服率佐屬奉詔敕其上用以鎮撫其社稷億寧其神人遺民故老告語子弟咸謂役不踰時而功倍於昔㣲令尹不復見此矣是時距公終更甫旬月公不以欲去怠其事朝夕於斯迄用輯成真古之用心也使今之人用心皆如公君家之事尚有不舉者乎故予樂為之記乾道元年左承議郎新權發遣沅州軍州事李處全記知縣㕔紹定李椿重建袁肅題曰琴堂移舊堂於東名曰清簡西築室曰誠齋㕔東曰圖思易祓書扁㕔後有仰髙觀政環翠三亭並在縣圃中丞㕔在縣西南紹興元年宋應重建紹定二年許景迂重修㕔西有景袁堂袁名韶樞宻越國公也湖濵有與永亭即舊湖山堂嘉定中趙晞賢修號為江湖竒觀簿㕔在縣西乾道三年髙文虎重修又建曽程堂以旌前政曽楙程俱之賢淳熈六年曽公之孫樞再修之嘉定五年謝杰重立㕔扁真文忠公書寳慶三年龔應之重建門屋紹定四年趙勲夫復新堂宇有囬車舘與㕔相對李處全曽程堂記余同年友髙君炳儒主吳江縣之簿二年既請於府縣以新治舎又即其西作堂三楹為退食之所規制穏宻不庳不隆榜之曰曽程以禮部尚書贑州曽公㮊中書舎人信安程公俱嘗為此官示尊賢也且屬余記之余㓜侍先君獲拜二公席蓋知其文章議論軒輊一時在京師已嶄嶄有人望曾公既登華近而程公亦賜第擢舘閣迄為中興第一流先後典内外制渡江文物追配中原二公有助焉其去此雖逺而流風遺迹猶或可攷尚友昔人炳儒得之矣炳儒行終更去一紙書入光範門諸公當爭挽致之由西垣入北扉丹青帝謨鼔舞羣聴則於二公何羡雖然孔子之賢賢孟子之論世其尊徳樂道之風可少廢邪後之君子將有取於斯文乾道三年四月朔日贊皇李處全記范成大新修主簿㕔記州縣之任古謂之宦遊豈直以斗升易農而已哉名山大川雄尊竒秀之境從事其間足以窮覽觀而昌神明古之君子固有樂乎此矣松江大湖水國之勝當天下第一四方好事者想像其處欲至而無繇今行臨東南士大夫假道以走名場與夫商賈百族櫂船而逐利者飈颿相摩此其人皆有所期㑹囂呼爭先亂次以濟終夜洶洶有聲其勢豈能少留而一寓目是雖日過乎前而與未始至者奚辨余家吳門莽蒼在望又無聲利火馳之役宜能數遊而躬耕作苦正爾少暇日私念誠得築室葦間卜隣三髙以朝夕於斯吾樂可勝計邪乾道丙戌八月既望間從容汎舟垂虹主縣簿髙君炳儒適新作治所落其成余與觀焉盖自始役至是財七十日而門閎髙昭牖户靚深髹續甓鏝皆中度程既聚廬之百須無一可恨而為之讀書之齋休坐之堂脩竹繞圍光景瀟然所謂垂虹者乃在其旁數十百步耳夫出有江湖之趣居有清燕之適此固古之君子宦遊之樂而余素願朝夕於斯而不可得者炳儒之職㑹計當而已無催科敲朴之煩奔命將迎之勞而有可樂者如此於是求文以為識余聞漢髙士不為主簿孫子嚴徙舎而有喜色士未遭隨所遇而安其可愧者不在我也炳儒有文學行誼而不卑其官又作意而新之視祭竈請比隣有加焉其志固未易量姑為叙其所可樂以告後之賢者使共之明年二月一日順陽范成大記并書左廸功郎平江府吳江縣主簿主管學事四明髙文虎建尉㕔在縣東嘉泰中彭法稍葺嘉定間黄翥重建紹定五年王龍從增剏於東偏後圃有梅亭惠民藥局養濟院在縣西北柵頭淳熈間剏後又増廣之稅課務在縣治東子務三所在震澤同里平望抽分場在本處嘉定縣舊治縣樓宋嘉熈四年七月圯於風閏月鄭霖重建知縣㕔後有公忠堂憇召堂熙春臺當山樓紹定四年趙與祐建讀書林淳祐九年林應炎建水竹亭在縣内淳祐十年林應炎建濟川亭在縣前寳祐元年沈輝建丞㕔在縣治西嘉定十三年陳采剏至端平三年謝奕恭成之主簿㕔在縣治北拱星橋左嘉定十三年趙汝備剏至十五年黄自誠改㕔事淳祐十一年趙孟奎皆一新之尉㕔在縣治南舊法華菴基也嘉定十三年趙希炤剏至今有教場射亭新江酒庫在縣南二十四里徐公坊酒庫在縣西二十四里馮橋侍衞馬軍司酒庫在市西課解淮東總領所江灣鹽場在縣東南八十里係江東清浦黄姚鹽場在縣東北五十里附下砂場挿煎酒務在縣衙西商稅務在縣東市嘉定間立和豐樓在縣市淳祐十年林應炎移剏嘉慶樓於市西惠民藥局在縣市西太平橋北養濟院在縣市西登平橋西北元幕官㕔在縣治東廡延祐七年提控案牘陳鼎建立㕔名佐正䝉古字學在譙樓東至正五年劉文質建架閣庫在州治後東偏至正五年知州劉文質新建太倉州舊治宋平江府節制司酒庫節制司太倉等四酒庫醫學在文廟西養濟院在州治西惠民藥局在鎮民橋南抽分竹木場元置在長洲縣而分辦於太倉國初設官於本府分辦如故今廢蘇州府船場在小北門外洪武五年靖海侯吳禎建今改為厲壇兩淮都轉運鹽使司分司在長春橋西永樂二年剏今廢滄江風月樓在北巷口元之酒館也安樂堂在海寧寺西憇養病卒崇明縣舊治元縣㕔舊扁曰敷政郡守任子明書後改曰無倦後堂在小山前扁曰奉公後改自公蔡景行重建崇明州記皇元慎選守令分治海隅職專而任重事有利害令舉以行重邦本也善為政者審其勢而度其宜則民不勞事不繁而易底於成此崇明州之所以遷而其理之所當重建也崇明為維揚屬州斥鹵衍沃中海而居非舟楫莫能至州之境日為風濤蕩擊浸及理所且歳久署宇時陋有司視若傳舎秩滿即引去忽焉不加慽慽於其心至正十一年達嚕噶齊巴哩雅侯始至歎曰吾奉天子命來守是邦民之休戚繫於上吾民兢惕既無以奠厥攸居又署宇若是是皆事之所當先者烏可委其責於後人而弗之察也於是周爰咨度得地於州之北十五里曰東沙出海稍逺遂遷焉侯首捐己俸為之倡而知州程侯同知州事王侯用是其議俾州吏錢實施思敬魏徳新董其役州之人士聞而樂相者奔走恐後掄材庀工其制尤宏於舊工興於十二年之三月落成於明年二月黄堂重嚴門廡輝映幕㕔吏舎譙樓庫庾靡不完好環州有垣環垣有壕周衞緻宻經畫殊至侯復念朝廷以六事責備守令而教為之首乃先創孔子廟大闡學宫仍増廩給之糧若干石以為士養師徒弦誦洋洋盈耳思有以振起次及祀典之神食於其土者咸新廟以祠至若軍校萬夫長府率皆崇敞雄偉式稱演武之所工畢其耄倪雜然而至舉唶唶相告曰吾儕小人不意今復見是州之鉅麗如此實有以聳吾民之視瞻也不可以不記遂疏其本末介州士董仁禮來諗記於予時予職教崑庠而婁江與崇明相望僅百里間每獲聞巴哩雅侯為政之善民之頌之若出一口嘗欲一艤舟東沙造觀新州以挹其土風之美繋官於兹願莫之遂廼今庶托文字載名其間抑何幸焉嗟乎民不可慮始而可與樂成事特易於因仍而難於首創是州之民始亦懼其役繁將無以致其力終則樂其功成而為無窮之利非侯之力足以任重才足以立功能若是乎雖然為政之道豈徒奉法制宣禁令而已若侯者誠為民之司牧能為之深謀逺慮審其勢權其宜而民賴以寧者也後之來者樂署居之廣而思創始之不易專心一力無曠厥職以侯之心為心則崇明之民殆相安於悠久矣前年海宼犯境侯親率義兵奮矢石扼其要衝而悉力攻之海宼由是遁去侯之可書不一而足兹姑述其設施之次第刻之樂石以慰邦人之思去而不忘耳侯唐古岱早備宿衞由雲南討賊崇勲權太府監管勾願終外艱服闋授平江路總管府判官今為州云平江路崑山州儒學教授蔡景行記吏目㕔在州廨左扁曰蓮幕捕盜司在州治西扁曰晏然任子明書延祐間判官邱揖建頒春亭在譙樓南萬户府官醫提領所大徳八年例革併入醫學富有庫在州㕔右架閣庫在富有庫南惠民藥局姑蘇志卷二十三
