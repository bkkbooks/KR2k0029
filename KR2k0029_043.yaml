body:
  text: 姑蘇志卷四十四明王鏊撰人物二陸閎字子春吳縣人暢之子也篤行好學聰明有令德選尚寧平公主辭疾不應為潁川太守致鳳凰甘露之瑞建武中為尚書令閎姿容如玉喜著越布單衣光武升臺見之歎曰南方固多佳人自是常敕會稽郡獻越布焉孫續别有傳續孫康康字季寧少篤孝悌勤修操行太守李肅舉孝廉肅後坐事誅康為斂尸送喪還鄉行服以義烈稱刺史臧旻舉茂才除高成令縣在邊陲舊令戶一人具弓弩以備不虞不得行來長吏新到輒發民繕城郭康至皆罷遣百姓大恱以恩信為治冦盜亦息州郡表上其狀光和元年遷武陵太守轉桂陽樂安二郡所在稱之時靈帝欲鑄銅人而國用不足乃詔民田畝斂十錢比水旱貧苦康上疏諌內幸譖康大不敬檻車徵詣廷尉侍御史劉岱陳解免歸復徵拜議郎會廬江賊黃穰等與江夏蠻連結十餘萬人攻沒四縣拜康廬江太守康申明賞罰擊破穰等餘黨悉降帝嘉之拜其孫尚為郎中獻帝即位天下大亂康蒙險遣孝廉計吏奉貢朝廷詔勞加忠義將軍秩中二千石時袁術屯兵壽春部曲飢餓遣使求委輸兵甲康以其叛逆閉門不通內修戰備將以禦之術怒遣孫䇿攻康圍城數重康固守受敵二年城陷月餘病卒宗族百餘人遭離飢厄死者將半朝廷愍其守節拜子俊為郎中少子績績字公紀年六歲於九江見袁術術出橘績懷三枚去拜辭墜地術曰陸郎作賔客而懷橘乎績跪答曰欲歸遺母術大竒之孫䇿在吳張昭張紘秦松為上賔共論四海未泰須當用武治而平之績年少末坐遙大聲言曰昔管夷吾相齊桓公九合諸侯一匡天下不用兵車孔子曰遠人不服則修文德以來之今論者不務道德懷取之術而惟尚武績雖童蒙竊所未安也昭等異焉績容貌雄壯博學多識星厯算數無不該覽虞翻舊齒名盛龎統荆州令士年亦差長皆與績友善孫權辟為奏曹掾以直道見憚出為鬱林太守加偏將軍績既有躄疾又意在儒雅非其志也雖有軍事著述不廢作渾天圖注易釋玄皆傳於世豫知亡日為辭以訣曰有漢志士吳郡陸績幼勤詩書長玩禮易受命南征罹疾遇厄遭命不幸嗚呼悲隔卒年三十二長子宏會稽南部都尉次子睿長水校尉陸遜字伯言少孤隨從祖康在官袁術將攻康康遣遜還吳為之綱紀門戶孫權為將軍遜始仕幕府歷東西曹令史出為海昌屯田都尉并領縣事開倉賑貧勸督農桑時吳會稽丹陽多有伏匿遜乞與募會稽賊帥潘臨歷年不禽遜召兵討治深險皆服部有二千餘人鄱陽賊帥尤突作亂復往討之拜定威校尉軍屯利浦權以兄䇿女配之以為帳下右部督會丹陽賊帥費棧受曹操印綬為作內應權遣遜討棧應時破散遂部伍東三郡強者為兵羸者補戶得精卒數萬人宿惡蕩除還屯蕪湖會稽太守淳于式表遜枉取民人所在愁擾遜後言次稱式佳吏權曰式白君而君薦之何也對曰式意欲養民是以白遜若遜復毁式以亂聖聽不可長也權曰此誠長者之事吕蒙詣建業遜謂曰關羽矜其驍氣陵轢於人但務北進未嫌於我今出其不意自可禽制蒙至權問誰可代者對曰陸遜意思深長才堪負重而未有遠名非羽所忌若用之當令外自韜隱內察形便然後可克權乃召遜拜偏將軍右部督代蒙遜至陸口與羽書推羽功德深自抑晦羽見書意大安無所復嫌遜具啓形狀陳其可禽權乃潛軍而上使遜與吕蒙為前部至即克公安南郡遜徑進領宜都太守拜撫邊將軍封華亭侯時宜都太守樊友委郡走諸城長吏蠻夷君長皆降遜請金銀銅印以假授初附又攻房陵南鄊皆大破之秭歸大姓文布鄧凱等合夷兵首尾西方復討破之權以遜為右護軍鎮西將軍進封婁侯權欲令歷本州舉命乃使揚州牧吕範就辟别駕從事舉茂才黃武元年劉備率大衆來向西界權命遜為大都督假節督朱然等五萬人拒之備從巫峽建平連圍至夷陵界立數十屯先遣吳班於平地立營欲以挑戰諸將皆欲擊之遜曰此必有譎且觀之備知其計不可乃引伏兵從谷中出遜曰所以不聽諸君擊班者揣之必有巧故也諸將並曰攻備當在初今乃令入五六百里相持七八月諸要害皆固守擊之必無利遜曰備更事多其軍始集思慮精專未可干也今住已久不得我便兵疲意沮計不復生乃先攻一營不利諸將皆曰空殺兵耳遜曰吾已曉破之之術乃敕各持一把茅以火攻拔之一處勢成通率諸軍同時俱攻斬張南馮習及胡王沙摩柯等其外四十餘營將杜路劉寧等窮逼請降備升馬鞍山陳兵自繞遜督諸軍蹙之死者萬數備夜遁舟械軍資一時略盡尸骸塞江而下初孫桓别討備前鋒於夷道為備所圍求救於遜遜曰安東得士衆心城牢糧足無可憂也待吾計展不救安東安東自解已而果然加遜輔國將軍領荆州牧改封江陵侯劉禪襲位諸葛亮秉政與權連和時事所宜權輒令遜語亮并刻權印以置遜所權每與禪亮書常過示遜輕重可否有所不安便令改定以印封行之七年權使鄱陽太守周魴譎魏大司馬曹休休果舉衆入皖乃召遜假黃鉞為大都督逆休遜自為中部令朱桓全琮為左右翼三道俱進衝休伏兵繼之追亡逐北徑至夾石斬獲萬餘牛馬車乘萬輛資械略盡休還死諸軍振旅過武昌權令左右以御蓋覆遜入出殿門賜御物上珍遣還西陵黃龍元年拜上大將軍右都護是歲權巡建業留太子等徵遜輔之并掌荆州豫章三郡事董督軍國時建昌侯慮於堂前作鬬鴨闌遜正色曰君侯宜勤覽經典以自新益用此何為慮即毁徹之射聲校尉松於公子中最親戲兵不整遜對之髠其職吏嘉禾五年權北征使遜與諸葛瑾攻襄陽遜遣韓扁齎表奉報於沔中為敵所得瑾聞之甚懼書與遜欲急去遜未答方催人種葑豆與諸將奕射如常瑾自來見遜遜曰賊知大駕以旋無所復戚得專力於吾又已守要害兵將意動且當自定以安之施設變術然後出耳今便示退賊謂吾怖仍來相蹙必敗之勢也乃密與瑾立計令瑾督舟船遜悉上兵馬以向襄陽城敵素憚遜遽還赴城瑾便引船出遜徐整部伍張拓聲勢步趨船敵不敢干軍到白圍託言住獵潛遣周峻張梁等擊江夏新市安陸石陽市盛峻等奄至人皆捐物入城城門噎不得關敵乃自斫殺已民然後得闔斬首獲生千餘其所生得皆加營謢不令兵士侵擾將家屬來者使料視若亡其妻子即厚給衣糧慰遣令還或有感慕而歸者六年中郎將周祗乞於鄱陽召募事下問遜遜以為此郡民易動難安恐致冦而祗固陳取之郡民吳遽等果作賊殺祗攻沒諸縣遜自討即破降之得精兵八千三郡平赤烏七年代顧雍為丞相州牧都謢領武昌事如故先是二宫並闕中外職司多遣子弟給侍全琮報遜遜以為子弟苟有才不憂不用不宜私出以要榮利若其不佳終為取禍且聞二宮勢敵必有彼此此古人之厚忌也琮子寄果阿附魯王必為足下門戶致禍矣琮不納更以致隙及太子有不安之議遜上疏陳太子正統宜有磐石之固魯王藩臣當使寵秩有差彼此得所上下獲安書三四上及求詣都口論適庶之分不許而遜外甥顧談顧承姚信並以親附太子枉見流徙太子太傅吾粲坐與遜交書下獄死權纍遣使讓遜遜憤恚卒年六十三孫休時追諡昭侯子抗襲爵抗字幼節孫䇿外孫也遜卒時年二十拜建武校尉領遜衆孫權以楊竺所白遜二十事問抗禁絶賔客中使臨詰抗無所顧事事條答權意漸解赤烏九年遷立節中郎將與諸葛恪換屯柴桑抗臨去繕完城圍葺其牆屋桑果不得妄敗恪入屯儼然若新而恪柴桑故屯頗有毁壞深以為慙建興元年拜奮威將軍太平二年魏諸葛誕舉壽春降拜抗為柴桑督赴壽春破魏牙門將孫皓即位加鎮軍大將軍領益州牧建衡二年拜都督信陵西陵夷道樂鄉公安諸軍事治樂鄉抗聞都下政令多闕憂深慮遠乃疏陳時宜十七條時何定弄權閹官預政又疏言宜隨才授職抑黜羣小然後俗化可清庶政無穢鳯凰元年西陵督步闡叛降晉抗聞之部分諸軍令左奕吾彥蔡貢等徑赴西陵敕築嚴圍自赤溪至故市內以圍闡外以禦冦晝夜催切衆甚苦之諸將咸諫抗不許宜都太守雷談言至懇切抗欲服衆聽令一攻果無利圍始合晉羊祜率師向江陵諸將咸以抗不宜上抗曰江陵城固兵足無所憂患假令敵得江陵必不能守如使西陵盤結則南山羣夷皆當擾動所慮難可言也吾寧棄江陵而赴西陵况江陵牢固乎初江陵平衍道路通利抗敗江陵督張咸作大堰遏水以絶冦叛祜欲因所遏水浮船運糧揚聲將破堰以通步軍抗聞使咸亟破之諸將皆惑祜至當陽聞堰敗乃改船以車運大費功力晉徐胤率水軍詣建平楊肇至西陵抗令張咸固守其城公安督孫遵巡南岸禦祜水軍督留慮鎮西將軍朱琬拒胤身率三軍憑圍對肇都督俞贊亡詣肇抗曰贊軍中舊吏知吾虛實吾常慮夷兵素不簡練若敵攻圍必先此處即夜易夷民皆以舊將充之明日肇果攻故夷兵處抗命旋軍擊之矢石雨下肇衆傷死者相屬肇至經月計屈夜遁抗欲追之而慮闡畜力伺隙兵不足分於是但鳴鼓戒衆若將追者肇衆悉解甲挺走抗使輕兵躡之肇大敗祜等皆引軍還抗遂陷西陵城誅夷闡族及其將吏餘請赦數萬口修治城圍東還樂鄉貌無矜色謙沖如常故得將士歡心加拜都護時師旅仍動百姓疲弊上疏宜富國強兵力農畜穀二年春就拜大司馬荆州牧三年夏病以為西陵建平國之蕃要表陳易失之勢及乞簡閲一切料出以補疆場受敵常處又云臣死之後乞以西方為屬秋遂卒子晏嗣晏及弟景玄機雲分領抗兵晏為禆將軍夷道監天紀四年晉軍伐吳所至輒克終如抗慮景字士仁澡身好學著書數十篇以尚公主拜騎都尉封毗陵侯既領抗兵拜偏將軍中夏督晏景皆為王濬别軍所殺景妻孫皓妹與景俱張承外孫也初景母坐外祖諸葛恪誅見黜景少育於祖母祖母亡景為心喪三年漢晉春秋曰江陵之役羊祜既歸增修德信以懷吳人陸抗每告其邊曰彼專為德我專為暴是不戰而自服也各保分界無求細益而已於是吳晉之間餘糧栖畝而不犯牛馬逸而入境可宣告而取也沔上獵吳獲晉人先傷者皆送還抗常疾求藥於祜祜以成合與之曰此上藥也近始自作未及服以君疾急故相致抗服之諸將或諌抗不答孫皓聞二境交和以詰抗抗曰夫一邑一鄉不可以無信義而况大國乎臣不如是正足以彰其德耳於祜無傷也機字士衡身長七尺其聲如鐘少有異才文章冠世抗卒領其兵為牙門將年二十而吳滅退居舊里靜學十年以祖父世為將相有大勳勞深慨孫皓舉而棄之論權皓得失併述其先功業作辨亡論二篇太康末與弟雲俱入洛造張華華素重其名如舊相識曰伐吳之役利獲二俊薦之諸公楊駿辟為祭酒駿誅纍遷太子洗馬著作郎范陽盧志於衆中問機曰陸遜陸抗於君近逺機曰如君於盧育盧志默然既起雲謂機曰殊邦遐逺容不相悉何至於此機曰我父祖名播四海寧不知邪議者以此定二陸之優劣吳王晏出鎮淮南以機為郎中令遷尚書中兵郎轉殿中郎趙王倫專政引為相國參軍豫誅賈謐功賜爵關中侯倫將篡位以為中書郎倫誅齊王冏以機職在中書疑其與為九錫文及禪詔收付廷尉成都王穎吳王晏並救理之減死徙邊遇赦而止時中國多難顧榮戴若思等咸勸機還吳機負其才望而志匡世難故不從冏既矜功受爵不讓機作豪士賦以刺焉冏不悟竟敗又采聖王經國封建之指著五等論時成都勞謙下士機既感恩又謂其必能康隆晉室遂委身焉穎以機參大將軍軍事表為平原內史太安初穎與河間王顒討長沙王乂假機後將軍河北大都督督中郎將王粹冠軍將軍牽秀等諸軍二十萬餘機以三世為將道家所忌又羈旅入宦頓居郡士之右固辭不許機鄉人孫惠亦勸機讓都督機曰將以吾為首鼠避賊適所以速禍也遂行穎謂機曰功成事定當爵為郡公位以台司機曰昔齊桓任夷吾以建九合之功燕惠疑樂毅以失垂成之業今日之事在公不在機也穎左長史盧志心害機寵言於穎曰陸機自比管樂擬君暗主穎默然機始臨戎而牙旗折意甚惡之列軍自朝歌至于河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也長沙王乂奉天子與機戰於鹿苑機軍大敗初宦人孟玖弟超並為穎所寵超將鐵騎直入機麾下奪之顧謂機曰貉奴能作督否孫拯勸機殺之機不能用超宣言曰陸機將反又還書與玖言機持兩端及戰超不受機節度獨進而沒玖疑機殺之遂譖機於穎言其有異志王闡郝昌公師藩等皆玖所用與牽秀等共證之穎大怒使秀密害機其夕機夢黑幰繞車手決不開天明而秀兵至機釋戎服著白帢與秀相見神色自若謂秀曰自吳朝傾覆吾兄弟宗族蒙國重恩成都命吾以重任辭不獲已今日受誅豈非命也因與穎箋詞甚悽惋既而歎曰華亭鶴唳可復聞乎遂遇害士卒莫不流涕是日昏霧晝合大風折木平地尺雪議者以為陸氏之寃機天才秀逸辭藻宏麗張華嘗謂之曰人之為文常恨才少而子更患其多弟雲嘗為書曰君苗見君文輒欲燒其筆硯後葛洪稱其文猶玄圃積玉無非夜光五河吐流泉原如一其宏麗妍贍英鋭標逸亦一代之絶乎然好遊權門與賈謐親善以進趣獲譏拯字顯世富春人仕為黃門郎孫皓時能以智自全機之被收其弟雲耽及拯皆下獄考掠拯兩踝骨見終不變辭吏民謂曰二陸之枉誰不知之君可不愛身乎拯仰天歎曰陸君兄弟世之竒才吾蒙知愛今既不能救其死忍復從而誣之乎遂同被害拯門人費慈宰意詣獄明拯寃拯遣之曰吾義不負二陸死自吾分卿何為爾邢二人曰君既不負陸僕又安可負君玖并殺之雲字士龍六歲能屬文少與機齊名雖文章不及而持論過之號曰二陸年十六舉賢良刺史周浚召為從事謂人曰士龍今之顔子也吳平入洛俄以公府掾為太子舍人出補浚儀令縣名難理雲到官肅然下不能欺市無二價人有見殺者主名不立雲録其妻而無所問十餘日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縛來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故遠相要候於是一縣稱為神明郡守害其能屢遣責之雲乃去官百姓追思之畫像配食縣社尋拜吳王晏郎中令雲愛才好士多所貢達成都王穎表清河內史穎將討齊王冏以雲為前鋒都督冏誅轉大將軍右司馬穎晚節政衰雲屢以正言忤旨孟玖欲用其父為邯鄲令雲固執不許玖深忿怨機之敗也并收雲穎官屬江統蔡克棗嵩等上疏救雲克至叩頭流血僚屬數十人皆流涕固請穎惻然有宥雲色孟玖扶穎入促令殺雲夷三族雲時年四十二有二女無男門生故吏迎葬清河所著文章三百四十九篇新書十篇並行於世雲弟耽為平東祭酒亦有清譽與雲同遇害孫惠與朱誕書曰不意三陸相攜暗朝一旦湮滅國喪雋望悲豈一人後東海王越討穎移檄天下亦以機雲兄弟枉害為罪狀云陸瑁字子璋遜弟也少好學篤義陳融濮陽逸蔣纂袁迪等皆就瑁遊瑁割少分甘與同豐約同郡徐原素不相識臨死遺書託以孤弱瑁為立墳收導其子從父績遺二男一女皆幼瑁迎攝養至長乃别州郡辟舉皆不就嘉禾元年徵拜議郎選曹尚書孫權欲親征公孫淵瑁疏諫之權未許瑁重上疏乃止赤烏二年卒子喜喜字文仲一字恭仲仕吳纍遷吏部尚書少好學有才思嘗作言道訪論古今歷審機娛賓九思其書近百篇吳平又作西州清論傳於世借稱諸葛孔明以行其書有較論格品篇曰或問豫薛瑩國士之第一者乎答曰以理推之在乎四五之間夫孫皓無道若龍蛇其身潛而勿用趣不可測此第一人也避尊居卑祿代耕養玄靜守約此第二人也侃然體國以方見憚執正不懼此第三人也斟酌時宜在亂猶顯時獻微益此第四人也溫恭修慎不為諂首從容保寵此第五人也過此已往不足復數故第二已上多淪沒而逺悔吝第三已下有聲位而近咎纍是以深識君子晦其明而履柔順也太康中詔曰陸喜等並以貞潔不容皓朝或忠而獲罪或退身修志敕所在以禮發遣須到隨才授用乃以喜為散騎常侍尋卒子育為尚書郎弋陽太守喜弟英字季子長沙太守高平相員外散騎常侍英子曄曄字士光少有雅望從兄機每稱之曰我家世不乏公矣居喪以孝聞顧榮與人書曰士光氣息裁屬慮其性命言之傷心後察孝廉除永世烏江令皆不就元帝初鎮江左辟為祭酒尋補振威將軍義興太守不拜預討華軼功封平望亭侯纍遷散騎常侍本郡大中正元年遷太子詹事時帝以侍中宜兼用南人曄以清貞著稱遂拜侍中徙尚書領州大中正明帝即位轉光祿勳遷太常代紀瞻為尚書左僕射領太子少傅尋加金紫光祿大夫代卞壼為領軍將軍以平錢鳯功進爵江陵伯帝不豫曄與王導卞壼庾亮溫嶠郤鑒並受顧命輔皇太子更入殿將兵直宿遺詔曰曄清操忠貞歷職顯允其兄弟事君如父憂國如家歲寒不凋體自門風既委以六軍可録尚書事加散騎常侍成帝踐祚拜左光祿大夫開府儀同三司給親兵百人常侍如故蘇峻之難隨帝在石頭舉動方正峻以曄吳士之望不敢加害使守留臺時共推曄督宫城軍事峻平加衛將軍給千兵百騎以勳進爵為公封次子嘏新康子咸和中卒于家追贈侍中車騎大將軍諡曰穆子諶散騎常侍曄弟玩玩字士瑶器量淹雅弱冠有美名賀循每稱其清允平當郡檄綱紀東海王越辟為掾皆不就元帝引為丞相參軍時王導初至江左思結人情請婚於玩玩對曰培塿無松柏薰蕕不同器玩雖不才義不能為亂倫之始玩嘗詣導食酪因而得疾與導箋曰僕雖吳人幾為傖鬼其輕易權貴如此纍加奮武將軍徵拜侍中以疾辭王敦請為長史不得已從命敦平郗鑒議敦佐吏宜皆免官禁錮溫嶠上表申理玩得不坐後拜侍中遷吏部尚書領會稽王師不拜轉尚書左僕射領本州大中正及蘇峻反遣玩與兄曄俱守宮城玩潛説匡術歸順以功封興平伯轉尚書令又授左光祿大夫開府儀同三司加散騎常侍王導郗鑒庾亮繼卒乃遷玩侍中司空給羽林四十人玩雖登公輔謙讓不辟掾屬成帝勸之玩所辟皆寒素有行之士翼亮纍世常以𢎞重為人主所貴誘納後進謙若布衣搢紳之徒莫不廕其德宇卒諡曰康給兵千人守冢七十家太元中功臣普被減削以玩有佐命勳先陪陵而葬特置興平伯官屬以衛墓子始嗣歷侍中尚書玩弟納納字祖言少有清操貞厲絶俗初辟鎮軍大將軍武陵王掾州舉秀才王述雅敬重之引為建威長史纍遷黃門侍郎本州别駕尚書吏部出為吳興太守至郡不受俸祿徵拜左民尚書領州大中正外白宜裝幾船納曰私奴裝糧食來無所復須也臨發止有被襆而已餘並還官遷太常徙吏部尚書加奉車都尉衛將軍謝安嘗欲詣納而納殊無措辦兄子俶密為之具安既至納所設唯茶果俶遂陳盛饌客罷納大怒曰汝不能光益父叔乃復穢我素業杖之四十其舉措多此類兄子禽犯法應刑乞免官謝罪詔特許輕降遷尚書僕射轉左僕射加散騎常侍拜尚書令常侍如故恪勤貞固終始不渝會稽王道子委任羣小納望闕歎曰好家居纎兒欲撞壞之邪除左光祿大夫開府儀同三司未拜卒即以為贈無子以弟子道隆嗣元熙中為廷尉陸凱字敬風遜族子也黃武初為諸暨長有治迹拜建武都尉手不釋書好太玄論演其意赤烏中除儋耳太守討朱崖有功遷建武校尉五鳯二年討陳苾於零陵克捷拜巴丘督偏將軍封都鄉侯轉武昌右部督纍遷蕩魏綏遠將軍景帝即位拜征北將軍假節領豫州牧孫皓立遷鎮西大將軍都督巴丘領荆州牧進封嘉興侯寶鼎元年遷左丞相皓不好人視已郡臣侍見睛莫敢迂凱對皓曰夫君臣無不相識之道若卒有不虞不知所赴皓聽凱自視皓徙都武昌揚土百姓泝流供給以為患苦又政謬民窮凱上疏言之及論刑政賞罰聽諫納賢積儲理財輔國匡時之方及斥內寵位非其人時何定便辟貴幸凱面責之曰卿見前後事主不忠傾亂國政寧有以壽終者邪何為佞邪穢塵天聽定大恨思中傷之凱不以為意乃心公家義形於色表疏皆指事不飾忠懇內發建衡元年疾病皓遣董朝問所欲言凱陳何定不可任國事宜授外任姚信樓玄賀邵張悌郭逴薛瑩滕修及族弟喜抗或清白忠勤或姿才卓茂皆社稷之楨幹卒年七十二子禕禕字元容赤烏六年徵宿衛郎中後遷立義都尉五官郎中騎都衛寶鼎元年凱為左丞相禕遷黃門侍郎封海鹽侯出領部曲加偏將軍行左丞相鎮西大將軍軍事歷征北將軍凱亡入為太子中庶子右國史華核表薦之曰禕體質方剛器幹強固董率之才魯肅不過在戎果毅臨財有節夫夏口賊之衝要宜選名將以鎮戍之臣謂莫善於禕初皓常銜凱數忤旨加何定譖搆然難繩以法又陸抗時為大將故容忍至抗卒竟徙凱家於建安天紀二年與從弟式召還建業復將軍侯禕入晉為太子中庶子禕弟喈字公聲晉宣城內史前將軍陸退字黎民凱孫也仕至光祿大夫始為謝安主簿嘗問張憑何以作母誄而不作父誄退答曰故當是丈夫之德表於事行婦人之美非誄不顯退憑之壻也陸胤字敬宗凱弟也始為御史尚書選曹郎太子和聞其名待以殊禮會和與魯王霸分爭胤坐下獄楚毒備至終無他辭後為衡陽督軍都尉赤烏十一年交址九真夷賊攻沒城邑以胤為交州刺史安南校尉胤喻招高涼渠黨等皆降交域清泰就加安南將軍復討蒼梧建陵賊破之永安元年徵為西陵督封都亭侯後轉左虎林華核表胤天姿聰朗才通行潔昔厯選曹遺迹可紀還撫交州流民歸附商旅平行民無疾疫田稼豐稔州治臨海海流秋醎胤又畜水民得甘食惠風橫被化感人神遂憑天威招合遺散在州十有餘年內無粉黛附珠之妾家無文甲犀象之珍宜在輦轂股肱王室卒子式嗣為柴桑督揚武將軍天策元年與從兄禕俱徙建安天紀二年召還建業復將軍侯劉欣期交州記曰趙嫗者乳長數尺不嫁入山聚羣盜遂攻郡常著金踏踶戰退輒張帷幕與少男偵數十侍側刺史陸胤平之陸邁字功高器識清敏風檢澄峻纍遷振威將軍尚書吏部郎蘇峻東征邁與俱將至吳密敕左右入閶門放火以示威邁知其意謂曰吳治平未久必將有亂若為亂階請從我家始峻遂止陸璣字元恪吳太子中庶子烏程令撰毛詩鳥獸草木蟲魚疏二卷陸通字仲明曾祖載從劉裕平關中隨義真鎮長安遂沒赫連氏父政性至孝母好食魚而北土苦少宅側忽出泉有魚時謂泉為孝魚泉初從爾朱天光討伐及天光敗歸文帝為行臺左丞原州長史賜爵中都縣伯通敦敏好學有志節幼從在河西逢冦難與政相失通乃自拔東歸從爾朱榮爾朱氏滅乃入關文帝引為帳內督賀拔嶽為侯莫陳恱所害或傳軍府已亡散帝憂之通以為不然居數日間至果如所䇿由是愈見親禮晝夜陪侍家人罕見其面通雖處機密益自恭謹後以迎孝武功封都昌縣伯大統元年進爵為侯從禽竇泰復𢎞農沙苑之役力戰有功又從解洛陽圍軍還屬趙青雀反於長安帝將討之以軍疲不可速行通曰青雀既以大軍不和謂朝廷傾危遂成反亂逆謀久定必無遷善之心且其詐言大軍敗績東冦將至若以輕騎往百姓謂為信然更沮兆庶之望大軍雖疲精鋭猶多以明公之威率思歸之衆以順討逆何慮不平帝深納之因從平青雀録前後功進爵為公徐州刺史以冦難未平留不之部與于謹討劉平復加大都督從帝援玉璧進儀同三司九年高仲密以地來附通從若于惠戰於芒山衆軍皆退唯惠與通力戰至夜中乃隂引還敵亦不敢逼進授驃騎大將軍開府儀同三司太僕卿賜姓步六孤氏進爵綏德郡公周孝閔踐祚拜小司空保定五年纍遷大司冦通性柔謹雖久處列位常清愼自守所得祿賜盡與親故共之常曰凡人患貧而不貴不患貴而貧也建德元年轉大司馬卒弟逞逞字季明初名彥字世雄魏文帝謂之曰爾既溫裕何乃字雄於爾兄弟又復不類遂改焉少謹密有名兄通先以軍功受茅土乃讓父爵中都縣伯令逞襲之起家羽林監文帝親信輩皆以驍勇自逹唯逞獨兼文雅帝加禮焉大統十四年參大丞相府軍事兼記室保定初纍遷吏部中大夫歷藩部御伯中大夫進驃騎大將軍開府儀同三司徙授司宗中大夫轉軍司馬逞幹識詳明歷任三府所在著績進爵為公天和三年齊遣斛斯文略劉逖來聘詔逞為使主尹公正為副以報之逞美容止善辭令敏而有禮齊人稱焉還居近畿詔令路車儀服郊迎而入四年除京兆尹都界有豕生數子而死其家又有豶遂乳養之諸豚賴以活時論以逞仁政所致俄遷司會中大夫出為河州刺史宇文護奏為中外府司馬尋復為司會兼納言遷小司馬護誅坐免頃之起為納言又以疾不堪劇任乃除宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之詔遂其請逞在州有惠政東宫初建授太子太保卒贈大將軍子操嗣陸慧曉字叔明玩玄孫也自玩至慧曉祖萬載世為侍中皆有名行慧曉伯父仲元亦為侍中時人方之金張二族父子真元嘉初為海陵太守王僧達貴公子孫以才傲物為吳郡太守入閶門曰彼有人焉顧琛一公兩掾英英門戶陸子真五世內侍我之流亞慧曉清介正立不雜交遊張緒稱為江東裴樂初應州郡辟舉秀才衛尉史歷諸府行參軍以母老還養十餘年不仕齊高帝輔政除尚書殿中郎鄰族來賀慧曉舉酒曰陸慧曉年踰三十婦父領選始作尚書郎卿輩乃復為慶邪尋引為太傅東閣祭酒齊建元初遷太子洗馬何點常稱慧曉心如照鏡遇形觸物無不朗然慧曉與張融並宅其間有池池上有柳點歎曰此池便是醴泉此木便是交讓及武陵王曄守會稽上為精選僚吏以慧曉為征虜功曹與府參軍劉璡同從述職武帝子廬陵王子卿為南豫州刺史帝稱其小名曰烏熊癡如熊不得天下第一人為行事無以壓一州乃使慧曉為長史行事别帝問曰卿何以輔持廬陵答曰靜以修身儉以養性靜則人不擾儉則人不煩後為司徒從事中郎遷右長史時謝朏為左長史府公竟陵王子良謂王融曰我府前世誰比融曰明公二佐天下英竒古來少見隆昌元年徙為晉熙王冠軍長史江夏內史行郢州事慧曉歷輔五政立身清肅僚佐以下造詣必起送之或曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人未嘗輕士大夫或問其故慧曉曰貴人不可輕而賤者乃可邪人生何容立輕重於懷抱終身嘗呼人位建武中遷吏部郎尚書令史厯政來咨執選事慧曉任已獨行帝遣主書謂曰都令史悉諳舊貫可共參懷慧曉曰六十之年不復能咨都令史為吏部郎也上若謂身不堪便當拂衣而退帝憚之後出為晉安王鎮北司馬征北長史東海太守行府州事入為五兵尚書行揚州事崔慧景事平領右軍將軍出監南徐州朝議欲以為侍中王亮曰濟河須之今且就朝廷借之以鎮南兖州乃以為輔國將軍南兖州刺史加督至鎮俄以疾歸卒贈太常三子僚任倕並有美名時人謂之三陸倕字佐公少勤學善屬文於宅內起兩間茅屋晝夜讀書如此數載所讀一遍必誦於口嘗借人漢書失五行志四卷乃暗寫還之幼為外祖張岱所異謂諸子曰此兒汝家之陽元也年十七舉秀才永明二年刺史竟陵王子良傾意賓客開西邸以延英俊倕與范雲蕭琛任昉王融蕭衍謝朓沈約並以文學親侍號曰八友辟倕議曹從事參軍廬陵王法曹行參軍與任昉友善時昭明太子愛文好士倕與殷藝等同見賓禮於樂賢堂遷驃騎臨川王東曹掾是時禮樂多所創革武帝雅愛倕才敕撰新漏刻銘其文甚美遷太子中書舍人管東宮記又詔為石闕銘記敕倕所制辭義典雅足為佳作可賜絹三十匹歷官國子博士中庶子守太常卿揚州大中正普通七年卒倕文集一十卷子繕繕字士繻幼有志尚以雅正知名起家梁宣惠武陵王法曹參軍承聖中授中書侍郎掌東宫管記江陵陷繕遁還京師紹泰元年除司徒右長史御史中丞以父任所終固辭不就高祖引為司徒司馬遷給事黃門侍郎領步兵校尉通直散騎常侍兼侍中永定元年遷侍中時留異擁割東陽新安人向文政與異連結因據本郡朝廷以繕為貞威將軍新安太守文帝嗣位徵為太子中庶子領步兵校尉掌東宫管記繕儀表端麗進退間雅文帝使太子諸王咸取則焉趨步躡履皆令習繕規矩除尚書吏部郎中步兵如故仍侍東宫陳寶應平後出為貞毅將軍建安太守秩滿為散騎常侍御史中丞猶以父之所終固辭不許乃權換廨宇徙居之太建初遷度支尚書侍中太子詹事行東宫事領揚州大中正及太子親肄庶政解行事加散騎常侍改加侍中遷尚書右僕射尋遷左僕射參掌選事侍中如故更為尚書僕射領前將軍重授左僕射領揚州大中正别敕令與徐陵等七人參議政事十二年卒贈侍中特進金紫光祿大夫諡曰安子太子以繕東宫舊臣特賜祖奠子年數歲詔引入內應對進止有父風宣帝因賜名辨惠字敬臣繕兄子見賢亦方雅宣帝為揚州牧以為治中從事史深被知遇歷給事黃門侍郎長沙鄱陽二王長史等尋陽太守少府卿大建十年卒贈廷尉卿諡曰平子陸間字遐業慧曉從子也有風概不苟合少為張緒所知仕至揚州别駕齊明帝崩謂所親曰宮車晏駕百司將聽冢宰主上地重才弱難將至矣乃感心疾不復豫州事永元末刺史始安王遙光據東府作亂或勸去之間曰吾為人吏何可逃死臺軍陷城間以綱佐被收尚書令徐孝嗣啓間不豫逆謀未及報徐世檦命殺之四子厥絳完襄厥字韓卿少有風概好屬文永明九年詔百官舉士司徒左西曹掾顧皓之表薦厥州舉秀才時盛為文章沈約謝朓王融以氣類相推轂周顒善識聲韻世呼為永明體厥與約書謂一人之思有遲速一家之文有工拙何獨宫商律吕必青其如一邪論者可言未窮其致不得言曾無先覺也間被誅厥坐繫尚方尋有赦厥恨父不及感慟而卒年二十八有文集若干卷絳字魏卿間臨刑時絳抱頸求代不獲以身蔽刀刃行刑者并害之完字楚卿梁寧遠長史琅邪彭城二郡丞完子雲公襄字師卿天監三年范岫表薦起家著作佐郎除永寧令秩滿纍遷司空臨川王法曹外兵輕車廬陵王記室參軍昭明太子聞襄業行啓武帝引與遊處除太子洗馬遷中舍人並掌管記出為揚州中從事以父終此官固辭不許聽與府司馬換廨居之母年將八十太子月遣存問加賜衣膳母嘗卒患心痛醫方須二升粟漿是時冬月日又逼暮求索無所忽有老人詣門貨漿量如方劑始欲酬直無何失之時以襄孝感所致纍遷國子博士太子家令復掌管記母憂去職毁頓過禮太子憂之日遣使誡喻服闋除太子中庶子復掌管記中大通三年太子薨官屬罷妃蔡氏别居金華宫以襄為中散大夫領步兵校尉金華宫家令知金華宫事七年出為鄱陽內史先是郡人鮮于琮梁書作琛大同元年殺廣晉令王筠號上願元年署置官屬將出攻郡襄先率人吏修城隍為備及賊至破之生獲琮時鄰郡案賊黨因求賄皆不得實或善人盡室罹禍唯襄郡枉直無濫人作歌曰鮮于鈔後善惡分人無橫死賴陸君又有彭李二家因忿爭相誣告襄引入室不加責誚和言解喻之二人感恩深自悔咎乃為設酒食令其盡歡酒罷同載而還人又歌曰陸君政無怨家鬬既罷讎共車在政六年郡中大治民李睍等詣闕陳襄德化求於郡立碑敕許之又表乞留襄襄固乞還徵為吏部郎遷祕書監揚州大中正太清元年為度支尚書侯景圍臺城以襄直侍中省城陷逃還吳景將宋子仙攻錢唐會陸黯舉義夜襲郡殺偽太守蘇單于推襄行郡事淮南太守蕭寧逃賊入吳襄遣迎寧為盟主遣黯及兄子映公躡子仙與戰於松江黯敗走吳下軍聞之亦散襄匿于墓下一夜憂憤卒年七十襄弱冠遭家禍釋服猶若居憂終身蔬食布衣不聽音樂口不言殺害五十許年侯景平元帝贈侍中雲麾將軍以建義功追封餘干縣侯雲公字子龍五歲誦論語毛詩九歲讀漢書略能記憶從祖倕與劉顯質問十事雲公對無所失顯歎異之及長好學有才思州舉秀才纍遷宣惠武陵王平西湘東王繹行參軍雲公先製太伯廟碑吳興太守張纘罷郡經途讀其文歎曰今之蔡伯喈也纘至都掌選言之武帝召為尚書儀曹郎入直壽光省以本官知著作郎事纍遷中書黃門兼掌著作雲公善奕碁嘗夜侍坐武冠觸燭火帝笑謂曰燭燒卿貂帝將用為侍中故以此戲之時天泉池新製鯿魚舟帝引劉之遴到溉朱異同泛雲公年位尚輕亦預焉太清元年卒年三十七帝悼惜詔尅日舉哀賻錢布雲公從父兄才子亦有才名歷官中書郎宣成王友太子中庶子廷尉卿與雲公並有文集雲公子瓊瓊字伯玉幼聰慧有思理六歲為詩頗有詞采大同末詔雲公校定棋品瓊時八歲於客前覆局由是都下號曰神童朱異言之武帝召見瓊風神警亮進退詳審帝甚異之十一丁父憂毁瘠有至性從祖襄歎曰此兒必荷門基所謂一不為少及侯景作逆攜母避地于縣之西鄉勤苦讀書晝夜無怠遂博學善屬文陳天嘉中以文學纍遷尚書殿中郎瓊素有令名深為文帝所賞及討周迪陳寶應等都官符及諸大手筆並敕付瓊遷新安王文學掌東宫管記宣帝為司徒妙簡僚佐徐陵薦瓊識具優敏文史足用進居郎署歲月過淹左西掾缺允膺兹選雖階次小踰其屈滯已積乃除司徒左西掾尋兼通直散騎常侍聘齊大建中為給事黃門侍郎轉中庶子領大著作撰國史後主即位直中書省掌詔誥至德元年除度支尚書參選事掌詔誥并判廷尉建康二獄事初雲公奉梁武敕撰嘉瑞記瓊述其旨而續焉自永定訖于至德勒成一家之言遷吏部尚書著作如故瓊詳練譜牒雅有識監先是吏部尚書宗元饒卒尚書左僕射袁憲舉瓊宣帝未之用至是居之號為稱職瓊性謙儉不自封植雖位望日隆而執志逾下園池室宇無所改作車馬衣服不尚鮮華四時俸祿散之宗族家無餘財暮年深懷止足思避權要恆謝疾不視事俄丁母憂初瓊侍東宫母隨在宫舍及喪還鄉詔加贈後主自制志銘瓊哀慕過毁至德四年沒有集二十卷行於世子從典字由儀幼聰敏八歲讀沈約集見回文研銘援筆擬之便有佳致十二作栁賦其詞甚美從父瑜特所賞愛及瑜將終命家中墳籍皆付之從典乃集瑜文為十卷仍自製序從典篤好學業博涉羣書位太子洗馬司徒左西掾陳亡入隋位著作佐郎尚書右僕射楊素奏從典續司馬遷史記迄于隋其書未就坐弟受漢王諒職免後謫南陽縣主簿大業末朱粲引從典及通事舍人顔愍楚為賓客粲以人為糧後盡食其兩家瓊從父弟琰琰字溫玉父令公梁中軍宣城王記室參軍琰幼孤好學有志操州舉秀才解褐宣惠始興王行參軍纍遷法曹外兵參軍直嘉德殿學士世祖聽覽餘暇頗留心史籍以琰博學善占誦引置左右嘗使製刀銘琰援筆即成無所點竄上嗟賞久之賜衣一襲俄兼通直散騎常侍副琅邪王厚聘齊及至鄴下而厚病卒琰自為使主時年二十餘風神韶亮占對間敏齊士大夫甚傾心焉還為雲麾新安王主簿遷安成王長子寧逺府記室參軍大建初為武陵王明威府功曹史兼東宮管記丁母憂去官五年卒年三十四太子甚傷之手令舉哀加贈賻自製志銘至德二年追贈司農卿琰寡嗜欲鮮矜競遊心經籍晏如也其所製文筆多不存本後主求其遺文撰成二卷弟瑜瑜字幹玉少篤學美詞藻州舉秀才解褐驃騎安成王行參軍轉軍師晉安王外兵參軍東宫學士兄琰時為管記並以才學娛侍左右時人比之二應太建二年太子釋奠于太學宫臣並賦詩命瑜為序文甚贍麗遷尚書祠部郎中丁母憂服闋為桂陽王明威將軍功曹史兼東宫管記纍遷永陽王文學太子洗馬中舍人瑜幼長讀書晝夜不廢聰敏強記一覽無復遺失嘗受莊老於周𢎞正學成實論於僧滔法師並通大旨時皇太子好學欲博覽群書以子集繁多命瑜鈔撰未就而卒年四十四太子流涕手令舉哀官給喪事親製祭文遣使弔祭至德二年追贈光祿卿有集十卷瑜從父兄珍從父弟琛珍字潤玉梁大匠卿晏之子𢎞雅有識度好學能屬文舉秀才對䇿高第袁樞薦於世祖超授衡陽王文學直天保殿學士太建初遷長沙王友領記室後主在東宫徵為管記仍除中舍人管記如故甚見親待尋以疾失明將還鄉里太子解衣贈之為之流涕八年卒年三十七有令舉哀并加賵贈至德二年追贈少府卿有集十卷琛字潔玉宣毅臨川王長史丘公之子少警俊事後母以孝聞世祖為會稽太子琛年十八上善政頌甚有詞采由此知名舉秀才起家為衡陽王主簿兼東宫管記歷豫章王文學領記室司徒主簿直宣明殿學士尋遷尚書三公侍郎兼通直散騎常侍聘齊還為司徒左西掾又掌東宫管記太子愛其才辨深禮遇之後主嗣位遷給事黃門侍郎中書舍人參掌機密琛性頗疏坐漏泄禁中語賜死年四十二陸澄字彥淵祖劭臨海太守父瑗州從事澄少好學博覽無所不知行坐眠食手不釋卷起家太學博士中軍衛軍府行佐太宰參軍補太常丞郡主簿北中郎行參軍宋泰始初為尚書殿中郎議皇后諱班下應依舊稱姓左丞徐爰案司馬孚議皇后不稱姓春秋逆王后于齊並不言姓澄以意立議坐免官白衣領職郎官舊坐杖有名無實澄在官積前後罰凡至十數轉通直郎兼中書郎尋兼左丞泰始六年詔皇太子朝服衮冕九章澄與儀曹郎丘仲起議服冕以朝實著經文秦除六冕漢明還備魏晉以來不欲令臣下服衮冕故位公者加侍官令皇太子禮絶羣后宜遵聖王盛典革近代之制尋轉著作正員郎兼官如故仍轉後軍長史東海太守遷御史中丞齊建元元年驃騎咨議沈憲等家奴客為劫子弟被劾憲等晏然左丞任遐奏澄不糾請免澄官澄上表言舊例無左丞糾中丞之義詔外詳議禇淵檢宋以來左丞糾正而中丞不糾免官者甚衆奏澄謏聞膚見貽撓後昆請免官詔以白衣領職明年轉給事中祕書監遷吏部四年復為祕書監領國子博士遷都官尚書出為輔國將軍鎮北將軍二府長史廷尉領驃騎將軍永明元年遷度支尚書尋領國子博士王儉謂之曰昔曹志繆悅為此官以君係之始無慙德澄與儉書陳王弼注易玄學之所宗今若𢎞儒鄭注不可廢并言左氏杜學之長榖梁舊有糜信近益以范寧不足兩立世有一孝經題為鄭玄注觀其用辭不與注書相類案玄自序所注衆書亦無孝經且為小學之類不宜列在帝典儉答曰易體微遠實貫群籍豈可專據小王便為該備宜依舊存鄭元凱注傳超邁前儒榖梁小書無俟兩注存麋略范率由舊式凡此諸議並同雅論疑孝經非鄭所注僕以此書明百行之首實人倫所先七略藝文並陳之六藝不與蒼頡凡將之流也鄭注虛實前代不嫌意謂可安仍舊立置儉自以博聞多識讀書過澄澄謂曰僕少來無事唯以讀書為業且年位已高今君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何憲等盛自商略澄待儉語畢然後談所遺漏數百千條皆儉所未覩儉在尚書省出巾箱几案雜服飾令學士隸事事多者與之人人各得一兩物澄後來更出諸人所不知事復各數條并舊物奪將去轉散騎常侍祕書監吳郡中正光祿大夫加給事中尋領國子祭酒竟陵王子良得古器小口方腹而底平可容七八升以問澄澄曰此名服匿單于以與蘇武子良詳視器底有字倣佛可識如澄所言隆昌元年以老疾轉光祿大夫加散騎常侍未拜卒諡靖子澄當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戲之曰陸公書厨也家多墳籍人所罕見撰地理書及雜傳死後乃出子少玄陸徽字休猷郡辟命主簿仍除衛軍車騎二府參軍揚州主簿王𢎞衛將軍主簿除尚書都官郎出補建康令清平無私為太祖所善選司徒左西掾元嘉十四年為始興太守明年仍除使持節交廣二州諸軍事綏遠將軍平越中郎將廣州刺史清操為士民所愛二十一年徵為南平王鑠冠軍司馬長沙內史行湘州府事母憂去職張尋趙廣為亂於益州兵冦之餘政荒民擾二十三年乃追徵為持節督益寧二州諸軍事寧朔將軍益州刺史隱恤有方威惠兼著盜賊靜息民物殷阜蜀土安説二十九年卒家無餘財太祖痛惜之詔曰徽厲志廉潔歷任恪勤奉公盡誠克已無倦褒榮未由不幸夙殞言念在懷以為傷恨可贈輔國將軍賜錢十萬米二百斛諡曰簡子子睿正員外郎揚州中從事孫杲煦吳地記徽少有清操歷清班兄弟七人號七龍遷益州刺史化行如神杲字明霞父睿揚州中從事杲少好學工書畫舅張融有高名杲風韻舉止頗類時稱曰無對日下唯舅與甥起家齊中軍法曹行參軍太子舍人衛軍王儉主簿遷尚書殿中曹郎拜日八坐丞郎並到上省交禮而杲至晚坐免官久之以為司徒竟陵王外兵參軍遷征虜宜都王功曹史驃騎晉安王咨議參軍司徒從事中郎梁臺建以為驃騎記室參軍相國西曹掾天監初除撫軍長史母憂去職服闋拜建威將軍中軍臨川王咨議參軍尋遷黃門侍郎右軍安成王長史五年遷御史中丞性婞直無所顧望時山隂令虞肩在任贓汙杲奏收劾之中書舍人黃睦之以肩事託杲杲不答梁武聞之以問杲杲答曰有之帝曰識睦之不答曰不識時睦之在側上指示曰此人是也杲謂曰君小人何敢以罪人屬南司睦之失色領軍將軍張稷是杲從舅杲嘗以公事彈稷稷因侍宴訴帝曰陸杲是臣通親小事彈臣不貸帝曰杲職司其事卿何得為嫌杲在臺號不畏強禦出為義興太守在郡寬惠為民所稱歷官金紫光祿大夫揚州大中正大通元年加特進四年卒年七十四諡曰質子杲素信佛法著沙門傳三十卷煦學涉有思理天監初歷中書侍郎尚書左丞太子家令卒撰晉書未就又著陸史十五卷陸氏驪泉志一卷並行於世子罩字洞元少篤學多所該覽善屬文仕梁太子中庶子以母老求去公卿以下祖道於征虜亭皇太子賜黃金五十斤時人方之疏廣終光祿卿陸法真宋孝武時歷官有清節嘗為劉秀之安北録事參軍羊希與孫詵書曰足下同僚陸録事東南名地又張玄外孫持身至清年高官下秉操不衰當日夕相與申意明帝初為南海太守卒陸夷祖順宗魏青州刺史父概齊霍州刺史夷少聰敏九嵗勤學日誦二千餘言楊遵彥見之曰陸氏代有人矣陸子隆字興世祖敞之梁嘉興令父悛封氏令子隆少慷慨志功名起家東宫直侯景之亂於鄉里聚徒是時張彪為吳郡太守引為將帥彪徙鎮會稽子隆隨之及文帝封彪彪將沈泰等皆降而子隆力戰敗績文帝義之復使領其部曲板為中兵參軍歷始豐永興二縣令文帝嗣位領甲仗宿衛尋隨侯安都拒王琳於沌口琳平授左中郎將天嘉元年封益陽縣子出為高唐太守二年除明威將軍盧陵太守二年周迪反東昌縣人修行師應之率兵攻子隆其鋒甚盛子隆設伏於外仍閉門偃甲示之以弱及行師至腹背擊之行師大敗乞降子隆送於京師四年周迪引陳寶應復出子隆隨都督章昭達討迪迪退走因隨昭達踰東興嶺討陳寶應軍至建安以子隆監郡寶應據建安之湖際以拒官軍子隆與昭達各據一營昭達先與賊戰不利亡其鼓角子隆率兵來救大破賊徒盡獲昭達所亡羽儀甲仗晉安平子隆功最遷假節都督武州諸軍事將軍如故尋改封朝陽縣伯廢帝即位進號智武將軍加員外散騎常侍餘如故華皎據湘州反以子隆居其心腹深患之頻遣使招誘子隆不從遣兵攻之又不能尅及皎敗於郢州子隆出兵以襲其後因與王師相會授持節通直散騎常侍都督武州諸軍事進爵為侯尋遷都督荆信祐三州諸軍事宣毅將軍荆州刺史持節常侍如故是時荆州新置治于公安城池未固子隆修建城郭綏集夷夏甚得民和當時號為稱職三年吏民詣郡上表請立碑頌美功績詔許之大建元年進號雲麾將軍二年卒年四十七贈散騎常侍諡曰威子之武嗣之武年十六領其舊軍隨吳明徹北伐有功官至王府主簿𢎞農太守仍隸明徹明徹敗績於吕梁之武逃歸為人所害年二十二子隆弟子才亦有幹略從子隆征討有功除南平太守封始興縣子從吳明徹北伐監安州鎮宿預除中衛始興王咨議參軍遷飊猛將軍信州刺史大建十三年卒年五十二贈員外散騎常侍陸山才字孔章祖翁寶梁尚書水部郎父泛散騎常侍山才少倜儻好尚文史起家王國常侍遷外兵參軍以父疾歸養承聖元年王僧辨授山才儀同府西曹掾陳高祖誅僧辨山才奔會稽依張彪彪敗乃歸紹泰中周文育出鎮南豫州不知書疏以山才為長史委以政事文育討尅蕭勃禽歐陽頠計畫多出山才及文育征王琳留山才監江州事乃鎮豫章文育與侯安都敗績於沌口余孝頃來寇豫章山才收合餘衆依于周迪禽孝頃等自樂安嶺東道送于京師除中書侍郎復由樂安領綏撫南川諸郡文育重鎮豫章金口山才復為貞威將軍鎮南長史豫章太守熊曇朗害文育囚山才等送于王琳未至而侯安都敗山才獲返除貞威將軍新安太守以王琳未平留鎮富陽入為員外散騎常侍遷宣惠始興王長史行東揚州事侯安都討留異山才率主府之衆從之異平除明威將軍東陽太守入為鎮東始興王長史帶會稽郡丞行東揚州未拜改授散騎常侍兼度支尚書滿歲為真宣帝南征周迪以山才為軍司迪平復職余孝頃自海道襲晉安山才又以本官之會稽指授方略還朝坐侍宴與蔡景立言語過差為有司所奏免官尋授散騎常侍遷雲旗將軍西陽武昌二郡太守天康元年卒贈右衛將軍諡簡子陸元方字希仲陳給事黃門侍郎琛之曾孫伯父東之善書名家在藝苑傳元方初明經後舉八科皆中纍轉監察御史武后時使嶺外涉海風濤驚壯舟人懼元方曰吾受命不私神豈害我趣使濟而風息還除殿中侍御史擢鳯閣舍人秋官侍郎為來俊臣所陷后置不罪遷鸞臺侍郎兼司衛卿或言其薦引皆親黨后怒免官令白衣領職元方薦人如初后召讓之對曰舉臣所知不暇問讎黨又薦崔元暐有宰相才后知無他復拜鸞臺侍郎同鳯閣鸞臺平章事后嘗問外事對曰臣備位宰相大事當白奏民間碎務不敢以聞忤旨下除太子右庶子進文昌左丞卒元方素清愼再執政每進退群臣后必先訪問外祕莫知臨終取奏稿焚之曰吾隂德在人後當有興者又曰吾當壽但領選久耗傷吾神有一柙生平所緘鑰者殁後家人發之乃前後詔赦贈越州都督諸子皆美才象先景倩景融象先器識沈邃舉制科高第為揚州參軍事時吉頊與元方同為吏部侍郎頊擢象先為洛陽尉元方不肯當頊曰為官擇人豈以吏部子廢至公邪卒以授俄遷監察御史纍授中書侍郎景雲中進同中書門下平章事監修國史初太平公主謀引崔湜為宰相湜曰象先人望宜幹樞近若不者湜敢辭主不得已為言之遂並知政事然其性恬靜寡欲議論高簡為時推尚湜嘗曰陸公加於人一等公主既擅權宰相爭附之象先未嘗往謁及謀逆召宰相議曰寧王長不當廢嫡立庶象先曰帝得立何也主曰帝有一時功今失德安可不廢對曰立以功者廢必以罪今不聞天子過失安得廢主怒更與竇懷貞等謀卒誅死時象先與蕭至忠岑羲等坐為主所進將同誅玄宗遽召免之曰歲寒然後知松柏之後雕也以保護功封兖國公初難作睿宗御承天樓群臣稍集帝麾曰助朕者留不者去於是有投名自驗者事平玄宗得所投名詔象先收按象先悉焚之帝大怒欲并加罪頓首謝曰赴君之難忠也陛下方以德化天下奈何殺仁義之人故臣違命安反側者其敢逃死帝寤善之時窮治忠羲等黨與象先密為申救保全甚衆當時無知者罷為益州大都督府長史劒南按察使為政尚仁恕司馬韋抱直諫曰公當峻朴罰以示威不然民慢且無畏答曰政在治之而已必刑法以樹威乎纍徙蒲州刺史兼河東按察使大吏目小吏有罪象先誡遣謂彼不曉吾言邪必責者當以汝為始大吏慙而退嘗曰天下本無事庸人擾之為煩耳第澄其源何憂不簡邪所至民吏懷之入為太子詹事歷户部尚書知吏部選事母喪免起為揚州大都督府長史遷太子少保兖國公卒贈尚書左丞相諡文貞始象先名景初睿宗曰子能紹先構是為象賢者乃賜名焉景倩為扶溝丞按察使畢構覆州縣最欲必得實有吏言狀曰某強清某詐清惟景倩曰真清終監察御史景融長七尺美姿質寬中厚外博學工筆札以蔭補千牛轉新鄭令政有風績纍遷工部尚書東京留守卒贈廣陵郡都督景融於象先後母弟也象先被笞景融諫不入則自楚毋為損威人多其友景融兄弟景獻厯殿中侍御史屯田員外郎景裔歷河南令庫部郎中皆有美譽景融四世孫希聲希聲蘇州司士參軍孟儒之孫博學善屬文通易春秋老子論著甚多商州刺史鄭愚表為屬韋保衡為相忌賢怙勢希聲去隱義興號居陽遁叟久之召為右拾遺時憸腐秉權歲數歉梁宋尤甚希聲見州縣刓敝上言當謹視盜賊明年王仙芝反株蔓數十州遂不制擢纍歙州刺史昭宗聞其名召為給事中拜户部侍郎同中書門下平章事在位無所輕重以太子少師罷李茂貞等兵犯京師輿疾避難卒贈尚書左僕射諡曰文元方從父餘慶餘慶陳右衛將軍珣之孫方雅有祖風已冠名未顯兄玄表唶曰爾名宦不立奈何餘慶感激閉户誦書三年以博學稱舉制䇿甲科補蕭尉纍遷陽城衛武后封嵩山以辦具勞擢監察御史聖厯初臨勝二州黨項誘北人冦邊詔餘慶招慰喻以恩信蕃酋率衆內附遷殿中侍御史鳯閣舍人后嘗命草詔殿上恐懼不能得一詞降左司郎中久之封廣平郡公太子右庶子餘慶於寒品晚進必悉力薦藉人有過輒面折退無一言開元初為河南河北宣撫使薦孫逖韋述蔣洌達奚珣後皆知名遷大理卿終太子詹事諡曰莊餘慶少與趙貞固盧藏用陳子昻杜審言宋之問畢構郭襲微道士司馬承楨釋懷一或云法成號方外十友餘慶雖才學不逮子昻而風流敏辨過之武后時酷吏用事中宗朝幸臣貴主斜封大行啖利嗇褊之人與相乾沒雖亟貴驟用而戮不反踵餘慶以道自將雖仕不赫赫訖無悔尤子璪璪字仲采舉明經補長安尉以清幹稱開元初朝臣子弟不任京畿改新鄉令人為立祠用按察使宇文融薦遷澠池令纍遷兵部郎中東彍騎使還除洛陽令摧勒姦豪人不敢犯為蕭嵩所器嵩罷他宰相俾隂廉嵩短璪曰與人交過且不言况無有邪以是忤之出為太原少尹纍遷西河太守封平恩縣男屬邑多虎前守設檻穽璪至徹之而虎不為暴餘慶孫長源長源字泳之天寶中為太子詹事有清譽贍於學始辟昭義薛嵩幕府嵩侈汰常從容規切歷建信二州刺史韓滉領江淮轉運辟署兼御史中丞以為副遷郎官郎中汝州刺史徙宣武司馬欲峻法繩驕兵為節度使董晉所持不克行而判官楊凝孟叔度等又苛細淫縱晉有所偷弛長源輒裁正之晉卒長源總留後事大言曰將士久慢吾且以法治之衆始懼長源性剛不適變又不為備才八日軍亂殺長源及叔度等死之日有詔拜節度使檢校禮部尚書逺近嗟悵贈尚書左僕射長源好諧易無威儀而清白自將去汝州送車二乘曰吾祖罷魏州有車一乘而圖書半之吾愧不及先人云陸賓虞元方六世孫以文名厯侍御史子龜蒙在卓行傳陸亘音宣字景山元和三年中第補萬年丞再遷太常博士禮史孟真練容典博士降色訪逮史倚以倨橫會將册皇太子草儀真參議偃蹇亘榜逐之胥曹失色遷纍户部郎中太常少卿歷兖蔡虢蘇四州刺史浙東觀察使徙宣歙太和八年卒贈禮部尚書亘文明嚴重所至以善政稱陸扆字祥文曾祖禮殿中侍御史祖德淮南觀察支使父鄯陜州法曹參軍徙家于陜扆本名允迪光啓二年僖宗在興元舉進士第一進翰林學士中書舍人工屬辭敏速若注射然一時書命同僚以為不及昭宗顧待特異帝嘗于金鑾作賦詔學士皆和獨扆最先就帝歎曰貞元時陸贄吳通玄兄弟善內廷文書後無繼者今朕得卿斯文不墜矣與宗人希載文才重德名冠一時朝中號二陸纍為尚書左丞封嘉興縣男徙户部侍郎進同平章事中書侍郎貶峽州刺史久之授工部尚書從帝自華州還以工部尚書當國封吳郡公天復初朱全忠謀去朝廷衣冠貶扆濮州司户殺之白馬驛年五十九姑蘇志卷四十四
