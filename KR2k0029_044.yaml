body:
  text: 姑蘇志卷四十五明王鏊撰人物三顧綜字文緯吳人後漢明帝時辟有道歷御史大夫尚書令殿上三老帝舉三代之禮以正月上日踐辟雍設杖几乞言受誨吳丞相雍其後也雍字元歎德宇淹深夙播人譽初蔡伯喈嘗避怨於吳雍從學琴書伯喈歎異之故與伯喈同名而字元歎州郡表薦為合肥長轉婁曲阿上虞皆有治迹孫權領會稽太守不之郡以雍為丞行太守事討除冦賊郡界寧靜入為左司馬權為吳王纍遷大理奉常領尚書令封陽遂鄉侯拜侯還寺而家人不知迎母至郡權臨賀之親拜其母太子亦往雍為人不飲酒寡言語舉動時當權嘗歎曰顧君不言言必有中至飲宴歡樂之際左右恐有酒失雍必見之不敢肆情權亦曰顧公在坐使人不樂其見憚如此是歲改為太常進封醴陵侯代孫邵為丞相其所選用隨能授任心無適莫時訪逮民間及政職所宜轉密以聞若見納用則歸之於上不用終不宣泄權以此重之為相十九年年七十六赤烏六年卒初疾微時權令醫趙泉視之拜其少子濟為騎都尉雍聞悲曰泉善别死生吾必不起故上欲及吾目見濟拜也權素服臨弔諡曰肅侯子濟嗣無後絶永安元年詔曰故丞相雍至德忠賢輔國以禮而侯統廢絶朕甚愍之其以雍次子裕襲爵為醴陵侯以明著舊勳吳録曰裕一名穆終宜都太守邵字孝則博覽書傳好樂人倫少與舅陸績齊名而陸遜張敦卜靜等皆亞焉自州郡及四方人士言議結交風聲流聞逺近稱之權妻以䇿女年二十七起家為豫章太守下車祀徐孺子墓優待其後禁非禮之祭小吏姿質佳者輒令就學擇其先進擢置右職舉善以教風化大行初錢唐丁諝出於役伍陽羡張秉生於庶民烏程吾粲雲陽殷禮起乎微賤邵皆拔而友之為立聲譽秉遭大喪親為制服邵當之豫章發在近路值秉疾病時送者百數邵辭曰張仲節有疾苦不能來别恨不見之暫還與訣諸君少待其留心下士惟善所在皆此類也諝至典軍中郎秉雲陽太守禮零陵太守粲太子少傅世以邵為知人在郡五年卒官終剡令邵子談談字子默弱冠與諸葛恪等為太子四友從中庶子轉輔政都尉帝方隆訓導妙簡俊彥四方畢集恪以雄竒蓋衆而談以清識絶倫獨見推重自范慎謝景羊徽之徒悉在談下赤烏中代恪為左節度談初踐官府上疏陳事帝輟食稱善雅性高亮不修意氣或以此望之然權鑒其能見待甚隆數賞賜召請每省簿書未嘗下籌徒屈指心計盡發疑謬加奉車都尉薛綜為選曹尚書固讓談曰談心精體密貫道達微才照人物德允衆望誠非愚臣所可越先後遂代綜大父雍卒數月拜太常代雍平尚書事時魯王霸與太子和齊衡談疏明嫡庶之禮霸遂與有隙而全琮子寄為霸賓素傾邪談所不納先是談弟承與張休俱征壽春琮時與王凌戰凌兵勝陷沒我軍休承奮擊之遂駐魏師時琮群子緒端亦並為將因敵既住乃進擊之凌軍用退時行賞以為駐敵之功大退敵之功小休承並為雜號將軍緒端偏禆而已寄父子益恨共構談坐徙交州談幽憤著新言二十篇其知難篇以自悼也卒年四十二承字子直嘉禾中與舅陸瑁俱以禮徴權賜雍書曰貴孫子直令問休休至與相見過於所聞拜騎都尉領羽林兵後為吳郡西部都尉與諸葛恪等共平山越别得精兵八千拜昭義中郎將入為侍中芍陂之役拜奮威將軍出領京下督數年與兄談張休等俱徙交州卒年三十七承從祖徽徽字子歎雍母弟也少遊學有才辨孫權召署主簿嘗出見一男子將刑問何罪云盜百錢徽使住馳詣陳啓方今畜士以圖北虜視此兵壯健且所盜少乞原之權嘉許焉轉東曹掾或傳曹操欲東權謂徽曰卿孤腹心今傳孟德懷異意莫足使揣之卿為吾行拜輔義都尉往見操操問境內消息徽應對婉順因説江東大豐山藪宿惡皆慕化為善義出作兵操笑曰孤與孫將軍一結婚姻共輔漢室義如家君何為道此徽曰正以明公與主將義同磐石休戚共之是以及耳操厚待遣還權問定云何徽曰敵國隱情卒難探察然徽潛采聽方與袁談交爭未有他意乃拜徽巴東太守欲大用之會卒子容字季則少知名位至鎮東將軍顧榮字彥先宜都太守穆之子也穆即裕雍之子機神朗悟仕吳黃門侍郎太子輔義都尉吳平與陸機兄弟同入洛時號三俊例拜郎中歷尚書郎太子中舍人廷尉正恆縱酒謂同郡張翰曰惟酒可以忘憂但無如作病耳趙王倫誅淮南王允收允僚屬付廷尉榮平心處當多所全宥及倫篡位以榮為子大將軍虔長史初榮宴飲見執炙者有欲炙之色割炙啖之坐者問其故榮曰豈有終日執之而不知其味者及倫敗榮被執將誅而執炙者為督率救之得免齊王冏召為大司馬主簿榮懼及禍昏酣不綜事以情告馮熊能謂葛旟曰以顧榮為主簿所以甄拔才望委以事機不復計南北親疏欲平海內之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更收實才旟然之白冏以為中書侍郎在職不復飲酒或問之曰何前醉而後醒邪榮懼乃復飲與楊彥明書曰吾為齊王主簿恆慮禍及見刀與繩每欲自殺及冏誅榮以討葛旟功封嘉興伯轉太子中庶子長沙王乂為驃騎復以榮為長史乂敗轉成都王穎丞相從事中郎惠帝幸臨漳以滎兼侍中遣行園陵會張方據洛不得進避之陳留及帝西遷長安徵為散騎常侍以世亂不應遂還吳東海王越聚兵以榮為軍咨祭酒屬陳敏反假榮右將軍丹陽內史榮數踐危亡之際恆以恭遜自免敏欲誅諸人士榮説解之敏從其言仍遣甘卓出橫江堅甲利器委以精兵榮私於卓曰若江東之事可濟當共成之然卿觀事勢當有濟理不敏敗之日使江西諸軍函首送洛題曰逆賊顧榮甘卓之首辱及萬世可不圖之卓從之明年周玘紀瞻與榮及卓起兵攻敏榮發橋斂舟於南岸敏率兵出不獲濟榮麾以羽扇其衆潰散事平還吳永嘉初徵拜侍中與紀瞻同赴洛在途論易太極至徐州聞亂甚將不行會刺史裴盾得東海王越書若榮等顧望以軍禮發遣乃與瞻及陸玩等各解船棄車牛一日一夜行三百里得還揚州元帝鎮江東以榮為軍司加散騎常侍謀畫皆咨焉時帝因鄭貴嬪有疾頗廢萬機榮箋諫之又表薦甘卓帝皆納之六年卒官帝臨喪盡哀欲贈榮依齊王功臣格殷祐箋列以為報輕乃贈侍中驃騎將軍開府儀同三司諡曰元及帝為晉王追封為公開國食邑子毗嗣官至散騎侍郎榮兄子顯顯字孟著少有重名嘗以酒勸周顗顗不受顯因移勸柱而語曰詎可便作棟梁自遇顗得之欣然遂為襟契泰興中為散騎侍郎早卒時惜悼之顧衆字長始榮族弟也祖悌在孝友傳父祕字公真有文武才幹為吳興太守石冰略有揚土周玘等推祕都督揚州九郡軍事斬冰所置吳興太守區山祕出後伯父早終事伯母以孝聞州辟主簿舉秀才除餘杭秣陵令並不行元帝為鎮東將軍命為參軍以討華軼功封東鄉侯辟丞相掾初祕以員外散騎常侍代吾彥為交州刺史祕卒州人逼子參領州事參卒弟壽固求領州殺長史胡肇等又將殺帳下督梁碩碩起兵討壽禽付壽母令鴆殺之衆往交州迎喪值杜韜之亂崎嶇六年乃還祕曾蒞吳興吳興義故遺錢助衆一無所受及帝踐阼徵拜駙馬都尉奉朝請轉尚書郎大將軍王敦請為從事中郎上輔南康太守會詔除鄱陽太守加廣武將軍衆徑之鄱陽不過敦敦甚怪焉及敦搆逆令衆出軍衆遲回不發敦大怒以軍期召衆還詰之聲色甚厲衆不為動敦意漸釋時敦又怒宣城內史陸喈衆又辨明之陸玩在坐為衆危懼出謂衆曰卿真所謂剛亦不吐柔亦不茹雖仲山甫何以加之敦事捷欲以衆為吳興內史衆固辭敦鎮姑孰復以為從事中郎敦平除太子中庶子為義興太守加揚威將軍蘇峻反王師敗績衆還吳潛圖義舉遣人喻張哲復告蔡謨言與哲尅期效節謨乃以衆為本國督護揚威將軍衆破峻將𢎞徽軍衆往海虞備賊而賊率張健據郡城衆由婁縣東倉與賊别率戰破之進屯烏苞會稽內史王舒吳興內史虞潭檄衆為五郡大督護統諸義軍討健潭遣姚休為衆前鋒與賊戰沒衆還守紫壁咸勸衆過浙江衆不聽又版范明為參軍合討健健走衆進住吳城遣朱祈等九軍守庱亭復破健軍事詳平亂條峻平論功衆推功於謨謨以衆謀非己之力俱表相讓論者美之封鄱陽縣伯除平南軍司不就更拜丹陽尹本國大中正入為侍中轉尚書咸康末遷鎮軍將軍揚州大中正固讓未拜以母憂去職穆帝即位復徵為領軍不起服闋乃就何充崇信佛教衆每以為言嘗同經佛寺充要衆入門衆不下車充優容之以老乞休不許遷尚書僕射永和二年卒贈特進光祿大夫諡曰靖真誥云諡靖伯長子昌嗣為建康令第三子會中軍咨議參軍時稱美士衆族子和和字君孝曾祖容吳荆州刺史祖相臨海太守和總角便有清操族叔榮曰此吾家麒麟興顧氏者必此子也時宗人球亦有令聞為州别駕榮謂之曰卿速步君孝超卿矣王導為揚州辟從事月旦當朝未入停車門外周顗遇之和方擇蝨夷然不動顗既過顧指和心曰此中何所有和徐應曰此中最是難測地顗入謂導曰卿州吏中有一令僕才導亦為然和嘗詣導導小極對之疲睡和欲叩會之因謂同坐曰昔每聞族叔元公道公叶贊中宗保全江表體小不安令人喘息導覺之謂和曰卿圭璋特達機警有鋒不徒東南之美實為海內之俊由是知名既而導遣八部從事之部還同入見各言官長得失和獨無言導問之答曰明公作輔寧使網漏吞舟何緣采聽風聞以察察為政導咨嗟稱善纍遷田徒掾時東海王沖為長水校尉妙選僚屬以和為主簿永昌初除司徒左曹掾太寧初王敦請為主簿遷太子舍人車騎參軍長史王導為揚州請為别駕所歷皆著稱遷散騎侍郎尚書吏部司空郗鑒請為長史領晉陵太守咸康初拜御史中丞劾奏戴抗贓汙付法并免傅玩劉傭官百僚憚之遷侍中初中興東遷舊章多闕冕旒飾以翡翠珊瑚雜珠和奏舊冕有十二旒皆用玉珠今用雜珠等非禮若不能用玉可用白琁成帝始下太常改之帝以保母周有勞欲假其名號和諫止之轉吏部尚書徙領軍將軍太常卿國子祭酒康帝將郊祀和議宜親行從之遷尚書僕射以母老固辭詔特聽暮出朝還朝議以端右之副不宜處外更拜銀青光祿大夫領國子祭酒頃之母憂去職居喪以孝聞既練褚裒薦起為尚書令遣散騎郎喻旨和每見催逼輒號咷慟絶帝又下詔強之和表疏十餘上竟不起服闋然後視職時汝南王統江夏公衛崇並為庶母制服三年和乃奏曰禮所以軌物成教故有國家者莫不崇正明本以一其統斯人倫之紀不二之道也為人後者降其所出奪天屬之性顯至公之義降殺節文著于周典按汝南王統為庶母居廬服重江夏公衛崇本由疏屬開國之緒近喪所生復行重制違冒禮度肆其私情皆可下太常奪服若不祗王命應加貶黜詔從之和居任多所獻納雖權臣不苟阿撓永和七年以疾篤辭位拜左光祿大夫儀同三司加散騎常侍尚書令如故其年卒追贈侍中司空諡穆子淳歷尚書吏部郎給事黃門侍郎左衛將軍球歷尚書郎建武初卒帝將為舉哀有司奏非例帝曰衰亂之弊特相痛悼於是哭之甚慟和孫敷字祖根少聰慧高才令德𢎞泰有雅量殷源謂之曰黑頭公東南無雙官至著作郎卒和曾孫琛琛字𢎞瑋祖履之父惔並為司徒左西掾琛謹確不尚浮華起家州從事駙馬都尉奉朝請景平中除大匠丞彭城王義康右軍驃騎參軍晉陵令司徒參軍尚書庫部郎本邑中正元嘉七年到彥之兵敗河南委棄兵甲武庫為之空虛後太祖宴會有荒外歸化人在坐上問琛庫中仗猶有幾許琛詭答有十萬人仗舊武庫仗祕不言多少上既發問追悔失言及琛詭對上甚喜明年坐以宗人入尚書省雜坐遣出免中正仍為彭城王義康所請補司徒録事參軍義康欲委以腹心而琛不能承事劉湛尋斥為山隂令復為司徒録事遷少府十五年出為義興太守十九年徙東陽欲使防守義康固辭忤旨廢黜還家二十七年魏人南至瓜步權假琛建威將軍尋除東海王禕冠軍司馬行會稽五郡置會州以琛為會稽太守加五品將軍置將佐事平遷吳興太守孝建元年徵為五兵尚書未拜復為寧朔將軍吳郡太守以起義功封永新縣五等侯大明元年吳縣令張闓坐居母喪無禮下廷尉錢塘令沈文秀判劾違謬應坐被彈琛宣言於衆闓被劾之始屢相申明又云當啓文秀留縣世祖聞之大怒謂琛賣惡歸上免官琛母老仍停家琛為司空竟陵王誕故佐誕待琛等素厚三年誕據廣陵反遣陸延稔版琛為征南將軍琛子前尚書郎寶素為咨議參軍寶素弟前司空參軍寶光為從事中郎世祖以琛素結事誕或有異志遣使就吳郡太守王曇生誅琛父子會延稔先至琛等即執斬之遣二子送延稔首啓世祖世祖所遣誅琛使其日亦至僅而獲免上嘉之召琛出以為西陽王子尚撫軍司馬琛母孔氏時年百餘隆安初王廞於吳中為亂以女為貞烈將軍悉以女人為官屬以孔氏為司馬及孫恩亂後東土飢荒人相食孔氏散家糧以賑邑里得活者甚衆生子皆以孔為名焉琛仍為吳興太守明年坐郡民多翦錢及盜鑄免官六年起為大司農都官尚書新安王子鸞北中郎司馬東海太守行南徐州事隨府轉撫軍司馬太守如故前廢帝即位復為吳郡太守泰始初與四方同反兵敗奉母奔會稽臺軍既至歸降寶素與琛相失自殺琛尋丁母憂服闋起為員外常侍中散大夫後廢帝元徽三年卒年八十六先是宋世江東貴達者會稽孔季恭季恭子靈符吳興丘淵之及琛吳音不變寶光見藝術傳顧顗之字偉仁初為郡主簿謝晦為荆州以為南蠻功曹晦愛其雅素深相知待王𢎞辟為揚州主簿仍為𢎞衛軍參軍鹽宫令衡陽王義季右軍主簿尚書都官郎護軍司馬時彭城王義康秉權殷劉之隙已著覬之不欲與殷景仁久接乃辭腳疾自免歸在家每夜常於牀上行腳家人竊異之而莫曉其故後義康徙廢朝廷多以異同受禍復為東遷山隂令山隂劇邑官長晝夜不得休覬之理繁以約縣用無事晝日垂簾門階閴寂自宋世為山隂務簡而迹修莫能尚也還為揚州治中從事史廣陵王誕廬陵王紹北中郎左司馬揚州别駕從事史尚書吏部郎嘗於太祖坐論江左人物言及顧榮袁淑謂覬之曰卿南人怯愞豈作賊覬之正色曰卿乃復以忠義笑人淑有愧色元凶弒立朝士無不移任唯覬之不徙官世祖即位遷御史中丞孝建元年出為義陽王昶東中郎長史寧朔將軍行會稽郡事尋徵為右衛將軍領本邑中正明年出為湘州刺史治甚有迹大明元年徵守度支尚書領本州中正二年轉吏部尚書有唐賜者往病吐蠱蟲十餘枚臨死語妻張死後刳腹出病後張手自破視五臟悉糜碎郡縣以張忍行刳剖子副又不禁駐事起赦前法不能決劉協議賜妻痛往遵言兒識謝及理考事原心非存忍害謂宜哀矜覬之議曰法移路尸猶為不道況在妻子而忍行凡人所不行不宜曲通小情當以大理為斷謂副為不孝張同不道詔如覬之議加左軍將軍出為吳郡太守八年復為吏部尚書加給事中未拜欲以為會稽不果還為吳郡太守戴法興權傾人主而覬之未嘗降意蔡興宗與覬之善嫌其風節過峻覬之曰辛毗有云孫劉不過使吾不為三公耳及世祖晏駕法興遂以覬之為光祿大夫加金章紫綬太宗泰始初四方同反覬之家潯陽潯陽王子房加以位號覬之不受曰禮年六十不服戎以其筋力衰謝非復軍旅之日況年將八十殘生無幾守盡家門不敢聞命時普天叛逆莫或自免唯覬之心迹清全獨無所與二年東土既平以為左將軍吳郡太守加散騎常侍復為湘州刺史常侍將軍如故三年卒年七十六追贈鎮軍將軍常侍刺史如故諡簡子覬之家門雍睦為州鄉所重五子約緝綽縝緄綽私財甚豐鄉里士庶多負其債覬之每禁之不能止及後為吳郡謂綽曰我常不許汝出債今思貧薄亦不可居民間與汝交關及我在郡為汝督之凡諸券書皆何在綽大喜盡出諸文劵覬之悉焚燒宣語逺近負三郎債皆不須還凡劵書悉燒之矣覬之常謂秉命有分定非智力所移唯應恭已守道信天任運而暗者不達妄求僥幸徒虧雅道無關得喪乃以其意命弟子願著定命論願字子恭父淵之散騎侍郎願好學有文詞名於世大明中舉秀才對䇿稱旨擢為著作佐郎太子舍人蚤卒又弟子惠胤永明三年以驃騎參軍徵為司徒主簿間居養志不應辟覬之孫憲之憲之字士思元徽中為建康令時有盜牛者與本主爭訟各稱已物前後令莫能決憲之至令解牛任其所去牛徑還本主宅盜始伏權要請托長吏貪殘據法直繩無所阿縱性又清儉強力為政甚得民和故都下飲酒者得醇旨輒號為顧建康謂其清美也遷車騎功曹晉熙王友齊高帝執政以為驃騎録事參軍遷太尉西曹掾齊臺建為中書侍郎高帝即位除衡陽內史先是郡境連歲疾疫死者大半棺木尤貴悉裹以葦席棄之路傍憲之下車分命屬縣求其親黨悉令殯葬其家人絶滅者為出公祿使綱紀營護之又土俗山民有病輒云先人為禍皆開冡剖棺水洗枯骨名為除祟憲之曉諭生死之别事不相由風俗遂改時刺史王奐初至唯衡陽獨無訟者乃歎曰顧衡陽之化至矣若九郡率然吾將何事還為太尉從事中郎永明六年為隨王東中郎長史行會稽郡事山隂人吕文度有寵於齊武帝於餘姚立邸頗縱橫憲之至郡即表除之文度後還葬母郡縣爭赴弔憲之不與相聞文度深銜之卒不能傷也遷南中郎巴陵王長史南兖南豫二州事典籖咨事未嘗接以顔色動遵法制加建威將軍行婺州事時竟陵王於宣武臨成定陵三縣界立屯封山澤數百里禁民樵采憲之固陳不可言甚切直王答之曰非君無以聞此德音即命毋禁遷給事黃門侍郎兼尚書吏部郎中初覬之為吏部於庭植嘉樹謂人曰吾為憲之植耳至是憲之果為此職出為征虜長史行南兖州事遭母憂服闋建武中復除給事黃門侍郎領步兵校尉未拜仍遷太子中庶子領吳邑中正出為寧朔將軍臨川內史未赴改授輔國將軍晉陵太守頃之遇疾陳解還鄊里永元初徵為廷尉不拜除豫章太守有貞婦萬晞少孀居無子事舅姑尤孝父母欲奪嫁之誓死不許憲之賜以束帛表其節義梁武帝為揚州牧徵憲之為别駕從事史比至已受禪憲之風疾漸篤固求還吳天監二年就家受大中大夫憲之雖纍經宰郡資無儋石及歸環堵不免飢寒臨終為制以勑其子薄葬素祭文繁不載所著詩賦銘贊并衡陽郡記數十篇顧邁郡人有才能而輕薄宋始興王濬征北以為行參軍待之甚厚深言密事皆與參之别駕劉瑀性好凌物而折節事邁邁以其欵盡濬所言悉以語之瑀與邁進射堂下忽顧左右索單衣幘邁問其故瑀曰公以家人待卿言無不盡卿外宣泄我是公家吏何得不啓白濬大怒啓文帝徙廣州值蕭簡為亂邁為之盡力與簡俱死顧少連字夷仲和裔孫也唐代宗朝擢第以拔萃補登封主簿邑有虎孽少連命塞陷穽移文嶽神虎不為害以薦為監察御史德宗幸奉天徒步詣謁授水部員外郎翰林學士再遷中書舍人閲十年以謹密稱歷吏部侍郎裴延齡方橫嘗與少連會田鎬第酒酣少連挺笏謂曰段秀實笏擊賊臣今吾笏將擊姦臣奮且前元友直勸解之改京兆尹政尚寬簡不為灼灼名先是京畿租賦薄厚不能一少連以法均之遷吏部尚書封本縣男徙兵部東都留守表禁苑及汝間田募耕以便民閲武力利鎧仗號良吏卒年六十三贈右僕射諡曰敬子師雍師閔始少連攜師閔奔行在有詔同止翰林院車駕還授同州參軍師雍字睦之性恬約喜書寡遊合第進士纍遷監察御史李訓薦為水部員外郎翰林學士訓遣宦官田全操等六人按邊既行命師雍為詔賜六道殺之會訓敗不果師雍流崖州至藍田賜死姑蘇志卷四十五
