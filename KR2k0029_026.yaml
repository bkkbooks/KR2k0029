body:
  text: 姑蘇志卷二十七明王鏊撰壇廟上吳中祠廟列祀典者祝文並從內降歲二祀或一祀惟其功德之宜而郡人所私祀亦或有義故悉列之若郡縣常祀已具洪武禮制此特著其建置歲月耳本府社稷壇宋置子城西南四里元移置盤門外洪武初改建於長洲縣閶門外石牌巷尋遷吳縣義慈巷初附郭二縣在宋亦有社稷壇今皆統祭于府宋孫應時長洲縣社壇記古之制祀以社次郊郊尊而社親尊故天子專之親故達於庶人非土不國非穀不食故有社斯有稷勾龍於土棄於榖厥有大造開濟萬世故以為配春秋祈報之外救災出火師田行役獻功戮罪君民上下日相與聽命于社禮樂刑政於是焉出故曰明乎其義治國其如指諸掌乎世衰王制壞古義隱妖妄百出而祠廟蝟興褻天蠧民幻為淫威日盛月滋上之人不以禁又縱臾之天下郡縣雖通祀社稷世守不廢以為三代之舊章然獨其制度之形似儀物之文具而已有司者一歲再祀民不與觀也民於社日或各從其俚俗鼓舞迎享醉飽相樂不知其何人且何禮也水旱禳祈奔走如織於社稷闕如也嗚呼知古者得無嘆息於斯乎今令甲守令下車必視社稷飭壇墠而遵用或寡且諉曰小祀祀亦不親其事至若倚郭之縣自為社於闤闠逼仄之間往往滅裂最甚長洲縣之社在吳郡城內當縣治西南四十九步荒毁有年慶元四年九月知縣事天台黃侯宜一治新之壇宇中度門垣靚深塗巷觸闢身率僚吏時祀必謹黃侯儒者為縣如古循吏多善政可誦此其細事若不待書雖然愛禮者存羊因今之制存古之意君子重之縣實小侯承天子之命司社與民固未有忽略社稷而能父母其民者也然則凡黃侯之善政乃自社稷壇始豫是以記之因詔來者知所繼焉六年八月記風雲雷雨境內山川神壇在吳縣一都盤門外宋在吳縣西南四里元徙葑門外洪武間再移于此郡厲壇在長洲縣九都虎丘山前鄉厲壇長洲縣在城附郭鄉都共七百一十所吳縣在城附郭鄉都共五百一十所城隍廟在武狀元坊內相傳為周瑜故宅即雍熙寺基也洪武三年建旗纛廟在蘇州衛治內每歲霜降日本衛官致祭已上係通祀至德廟祀吳太伯在吳縣閶門內漢永興二年太守麋豹建於閶門外或云韓整守吳所創宋元嘉中劉損為郡修葺後梁乾化間吳越錢氏始徙置於此宋元祐六年黃履奏改今額元符間制封至德侯崇寧初進封王乾道初知府沈度重修又作至德橋洪武中改封吳太伯之神春秋祀之祝文曰三讓至德民無可稱周基八百由斯而成宋曾幾乾道重修記在禮祭法聖王之制祭祀其法五其人之應法者十有四皆古大聖賢有大功烈於民者非此族也不在祀典夫以大聖賢有大功烈而祀之固宜然祀有祈焉其施於民又厚厚施不報神其不吐之乎報之之道不獨牲牢酒醴而已千里之邦必有祠所社稷則有壇先哲則有廟後世於廟尤極其尊嚴崇像設儼侍衛見之者凛如也水潦必祈旱暵必祈皆長吏之常事應而有報亦事之常儻入其門陟其堂神所馮依曾不足以障風雨區區樽罍簠簋何施之厚而報之薄歟吳門巨藩神祠之載祀典者十數而泰伯廟為雄甚東漢永興二年郡守麋豹肇建於閶門外吳越武肅王錢氏始內徙之國朝元祐間太守黃履歷考前政若梅詢若范仲淹若孫覺輩數公淫潦有祈靡不響答列其事於朝有詔號至德廟崇寧元祀守臣吳伯舉請疏上爵有詔封至德侯建炎擾攘鞠為灰燼厥後草創殆無以揭虔妥靈今天子拔沈公為尚書郎以直祕閣尹是府至則訪及民利病以次罷行之其為政寬嚴詳簡允蹈厥中治人事神罔不祗肅隆興二歲天作淫雨害於穡事民不奠居乾道改元春三月公飭躬齋祓走祠下而祈焉神顧饗之是歲麥以有秋府從事請具牢醴以謝公曰不敢廢也然曷足以報萬分之一於是邦人合辭而進曰侯之施甚厚而廟貌不治之日久人懼神或怨恫祥慶弗下願悉力而改造之公曰是吾心也涓曰協辰得夏五月庚戌吉乃致昭告乃鳩良工斥少府之餘合私槖之助瓌材堅甓櫛比墉崇宏舊址直高棟抗修梁藩垣階所盡革而一新之觀繪之容若欣欣然有喜色民無老稚相扶㩦以觀厥成皆以手加額曰美哉輪焉誠足以塞民望而報神施矣風霽雨休禾則大熟秋九月甲子落成幾就養府下目視祈應為不誣公屬幾紀其實既牢辭弗獲其若虛公之辱是終無以揚休事而告後人也於是乎書左通議大夫充敷文閣待制致仕曾幾記潘凱淳祐重修記淳祐壬子春凱奉聖天子命來司臬于吳詰暴審刑罔敢怠弛既又懼民之不見德也領事三閲月載以禮欵泰伯祠顧瞻徘徊屋老苔荒喟然嘆曰至德者百世祀吏奉弗虔何以存古已而趨兩廡下土妖木魅詭形罔象簉以淫厲汙以佞慝編氓茍福禍膜拜乞靈滋磨劒好勇之習仍斷髮文身之訛端委雍容之氣象孰識之俗不美利不溥良有以夫退惕然弗寧亟戒其屬曰崇明祀禮也黜非鬼義也某日度材某日鳩工某日撤祠之非類者乃攻乃葺乃像仲雍季札侑泰伯祀越月告成率僚吏三獻焉烏乎世澆俗衰馬蠶貓虎之靈往往嚴事之猥瑣姦回尸而祀者肩相摩也豈復知禮樂鬼神之奧哉泰伯之血此祠尚矣特以盛德至善民弗能忘堂皇之修不修龐雜之屏不屏於至德乎何損乃若辨禮息刑宣尚德化正人心而興民風者吏獨不任責乎昔唐狄公持節江南毁淫祠千七百所留夏禹泰伯季札伍員四祠凱視狄公無能為役而是廟適在典領抑邪扶正不得辭廟舊在閶門外錢氏徙今址故有祊田一十八畝今益五十九畝有竒歲入粟五十有五石飯浮屠以守儲其贏為修祠備俾勿壞并敘其系自古公至友為世三十三刻之石諗來者考焉其年日南至承議郎直寶章閣兩浙西路提點刑獄公事潘凱記皮日休詩一廟爭祠兩讓君幾千年後轉清芬當時盡解稱髙義誰敢教他草莽臣陸龜蒙故國城荒德未荒年年椒奠濕中堂邇來父子爭天下不信人間有讓王張詠至德本無名宣尼以此評能將天下讓知有聖人生南國奔方逺西山道始亨英靈豈不在千古大江橫吳相伍大夫廟在吳縣盤門內舊在縣西南三十二里胥山上即子胥死處俗云胥王廟宋元嘉三年吳令謝詢始徙廟入城宋建中靖國間太守吳伯舉重修元大德三年嘗著靈異特增為忠孝感惠顯聖王至正間亷訪僉事李仲善别立廟於胥門上鄭元祐記後仍立今廟成化十五年廟燬御史劉魁重建每春秋祀之祝文曰孝以雪讎忠以報國白馬素車威靈赫奕梁簡文帝立國資孝本循忠全令名舟裏多竒計蘆中復吐誠偃月交吳艦魚麗入楚兵九功推妙算千載籍餘聲洪濤猶鼓怒靈廟尚凄清行潦承椒莫宫懸雜鳳笙無勞晉后璧詎用楚臣纓密樹臨寒水踈扉望逺城忩寒野霧入衣帳積苔生惟有三春鳥斂翅時逢迎張詠胥也應無憾至哉忠孝門生能酬楚怨死足報吳恩直氣海濤在片心江月存悠悠當日者千載祗慙魂高啓弔子胥辭覽勾吳之故墟兮灌莽鬱其蘢蓯館娃廢而為沼兮巋伍胥之遺宫奚千祀而弗毁兮繄若人之死忠昔窮逋而渡江兮奮孤迹於羈旅既入郢而雪恥兮又棲越而攘侮使彼吳之強大兮非夫子而孰為何夫差之自喜兮遽忽戒而荒娭陳昌言之悃欵兮實不忍視國之阽危衆以子為叵信兮肆讒辭之詆欺夫豈不能全身逺適以自庇兮顧先王之舊德卒待隕而何言兮恨終不能寤君之嬖惑載鴟夷兮浮遊魂惸惸兮在中流江神為子兮哀憤鼓洪濤於髙秋嗟君子之出輔兮孰不願為伊皋使言從而志行兮致雍熙之陶陶何齟齬而多患兮惟重華之不可以屢遭鄂侯諍而就醢兮龍逢諌而見屠蓋自古而有之兮匪夫子獨罹乎此事身雖歿而義安兮又舍是將焉索彼循默而茍容兮寧獲免乎此厄想子猶念夫故都兮或乘雲而來歸顧荆棘之多露兮應攬涕而歔欷余亦何為而感慨兮懼直道之墜也聊陳詞而表烈兮亦邦人之志也沈周詩忠臣有廟千秋祀伯業無蹤一餉煙入幕靈風猶颯颯侵階細草自芊芊存亡好在鴟夷內慚愧當於幎冒前倚壁題詩重惆悵寒鴉飛散夕陽天城頭伍相祠堂好眼見香爐生紫煙吳沼已成花寂寂楚陵何在樹芊芊一時遺事千年後此日清談斗酒前落魄布袍冠蓋末悲歌亦得倚秋天靈濟廟祀白龍神在長洲縣陽山澄照寺初廟在山顛太平興國中移建於山南曹巷熙寧九年又遷于此建炎間主僧覺明重修紹興二十九年賜今額乾道四年奏封龍母為顯應夫人今載祀典春秋祀之祝文曰托育著靈變化不測興雲致雨普濟萬物漢會稽太守廟在吳縣木瀆北穹窿山南祀漢朱買臣也世傳買臣負薪往來木瀆嘗藏書於此故傳此為藏書廟今肖像衣冠猶存漢制王汝玉記漢韓將軍廟在城中官瀆橋南按漢書橫海將軍韓説與朱買臣同受詔在吳中治樓船破東越有功即其人也漢任使君祠祀唐刺史任昭慶也在天慶觀即今之玄妙觀唐名開元宫宫為任所置故道流祀之慶厯中觀燬其像猶存嘗考漢任延為會稽都尉聘高尚勉孝行周窮急多有善政而民祀之此或是延祠而誤云爾晉顧元公廟祀驃騎將軍顧榮也在長洲縣黃天蕩東以其墓在此故其地稱為顧墓元知縣周舜臣重建元周伯琦顧元公祠堂碑吳城之東六里有丘焉曰晉散騎常侍顧元公之墓至是千有五十四年矣吳人謂之顧榮墓又以地形如鳳名鳳凰嶺墓前故有祠歷嵗滋多蚩氓雜祀他鬼褻而弗虔過者病之毗陵謝應芳氏避地其側睹兹汙黷惕焉不寧請於長洲令真定周君舜臣修祀而釐正之復徴工改創祠宇新構設具器用秩然完飭祠前故有二墩植以梧桐名雙梧墩以張華嘗稱公為鳳鳴朝陽也他日應芳介江東薛毅夫熊進德謂余文于麗牲之碑史稱公機鑒絶人器識超朗有文武長材始與陸機兄弟入洛號三俊方歷朝署自效值宗室相殘宫輿播遷乃沉酣晦迹﨑嶇而南屬陳敏阻兵竊據溧陽姻族盤固雖俯首受署佯順風旨而潛誘同心昭諭大義卒延司馬氏不絶之緒其功不可少也王導表為江南之望有以哉或謂公與賀循齊名陳敏之亂循以老疾不起疑與公異轍嗚呼守道者以全身為潔徇義者以致身為忠未可重輕之也永嘉之際運祚屯厄其姦詭險鷙擅權流毒者後世唾斥不啻鬼蜮若公之忠義而功在天下世所追慕眷眷不已豈可以人力致哉記曰以勞定國則祀之顧公是己作迎送神詩俾吳民歌以享焉其辭曰羣嶽之望兮岱宗南土之望兮顧公岱之雲雨兮歲以豐公之忠義兮功無窮邑有賢宰兮新其宫率吳民兮潔齋以恭千載一日兮人心同樵蘇逺路兮馬鬛為封公不死兮精誠上通永望于吳兮配彼穹窿鳳凰翽翽兮棲彼雙桐吳人追慕兮嘉慶是蒙教我以忠兮繄疇之功至正二十五年仲冬朔旦髙啓詩軍司有國秀機神夙超朗弱冠遊京洛已蒙南金賞崎嶇諸王幕沉湎務遵養中罹廣陵艱計服匪誠枉風雲一揮扇義旅臻同響事成恥言勳飄然理歸鞅晉社始東遷羣賢悉收奬道謁真感會矯翼丹霄上德聞一代稱迹泯千齡往時屯乏良佐英謨益堪想墳祠託荒郊蕭條並榛莽蕘童侵雨隧淫巫闖塵幌大夫過停轅式瞻為含愴衣冠復故貌筵几陳新享寡劣沗鄉人因歌表遐仰東山廟在虎邱山門內東麓祀晉司徒王珣珣與弟司空珉捨别業為寺故寺中立祠祀之又立西山廟於西以祀珉珣廟又稱短簿祠今居民皆祀為土神髙啓詩下馬空林問廟扉衣冠寂寞掩塵幃不能復使桓公怒莫怪年來祭客稀晉陸內史祠在長洲縣相城益地鄉祀晉大將軍右司馬陸雲士龍也雲為郡人因督糧過吳婁地見歲侵以所督糧盡賑飢民後遇難民感其惠以衣冠葬此立祠祀之成化中里人沈貞吉重建宋羊太守廟在子城前烏鵲橋南劉宋時羊玄保守吳亷素寡欲去後民思之故為立祠唐甫里先王祠祀唐處士陸魯望也在長洲縣東五十里甫里白蓮寺即其故宅或云卒後就葬其旁廟食于此嘉定十七年錢塘龔時俌别建祠于左元至正間縣尹馬玉麟重建齊東野語云白蓮寺魯望祠堂其像設皆當時物咸淳中有盛氏子醉仆其像於水滿腹皆平生詩文藁也知府傀普置盛罪更為塑像其腹藁不復得矣宋胡宿甫里先生碑銘君子之無所失道與世而汙隆聖人之不滯於物因時而遷徙達則奮庸而兼濟否則懷默而獨善堯舜許由昔賢標一揆之論禹稷顔子先民有同道之説繼世而作易地則然自風流之聿頽固先靈之不屬中古以降作者實繁舊史所存孤風可見咸能自潔身纍脫去世紛耕巖石以相高蹈山林而不返語其玉立之節姑得而云體彼道勝之韻蓋亦無幾若乃揖紛亂而高謝標耿介而長往漁釣一壑寄傲無何之鄉鼓吹六經圖芳不朽之事非夫高雅淑靈粹溫簡正疇可以議夫是矣先生陸氏諱龜蒙字魯望笠澤之幽居者也吐崇嶽之符倬生民之俊溫其如玉而不加雕琢淵乎似道而無所澄撓神茂初學聲冠當世屬土行摽季天宇驛騷爼豆委而不收干戈尋而未已先生嘆深鳯鳥志劇鴻冥刻密函谷之關鼓枻滄浪之水棄去驕君之餌謝絶畏友之方於是上會稽探禹穴由臨安仙室歸長洲茂苑之下樂松江甫里之勝乃嘆曰時無明主安能宗豫施於有政是亦為政退而賦考槃之詩且有終焉之計剃草開徑為臨江之居剪地作堂倣在鄒之宅南直岍峯之色西帶重湖之光孤雲無心白鳥可狎道素自處物纍不嬰好事之流或載酒而相訪雅逰之子時欵關而請見户外之屨常滿席間之丈屢啓稻田一㕓歲供薪水之費魚陂數頃日充庖膾之事至若金樞之月靜夜赤城之霞啓旦花瀨不逺風甚快先生則必飾軥牛之乘戒白鶴之舫招來僧社之舊申命朋簮之盍泛覽節物從容談燕筆牀硯格靜置於左右琴歌酒賦相繼以晝夜擊銅鉢而賦詩指石鼎而聨句清溪之曲亦復何窮白雪之倡其和益寡飄然聲利之表自適仁智之樂真所謂風塵之外物天地之逸民者也加以癖好聚書本皆有副得以傳寫則烏欄不計其費躬加校正則雞距未嘗去手亡一簮而不戚以百城而自喜雖張華海內之祕班超禁中之副無以過也由是富擁多文優入聖域紬六經之妙論泛九家之清流摘發異聞多黃香之不見沉研精義皆郭璞之未詳此又稽古之宗師慱物之淵藪也若夫言不詭聖志在拂世英辭闢楊朱之塵髙論攻墨翟之守潤色夫子之際煥乎有章潛心大業之中卓然不類斯又三代之遺英萬世之先覺也自頃元和而下風什陵喪多哇之響甚喧大雅之作幾墜先生收五際之長波駕四始之高蹈綜制萬變入道奧而惟深刻雕衆形等天機之不滓微言之緒既墜正始之音復聞時皮公日休以髙文大筆為世元儒先生幅巾過從一面如舊相與文酒之間坐忘形骸之外凡所賡唱溢于几篋莫不研幾深以繹志叩虛寂以成韻天才艷發縟體交變裊蹄之性百錬而不耗大韻之音九變而彌雅居然嗣響蔚于中興其命世傑出之雄乎昔子山覯閔辭多主於悲哀韓非遭亂書頗露於孤憤屈平怨刺託方物以寄懷虞卿窮愁慨詩書而見志何自待之未厚將不遇之所興切況淵高曾未髣佛密而不雨嗟乎西郊之雲瑞非其時異哉東魯之獸至於青編紀素尚之節鏤板昭炳蔚之文雖與日月爭光金石共盡可也宿仰企風徽積有年籥經塗所出舊址有焉歸然靈光鞠為茂草憝交照之不接悼園秀之無聞亦猶歷高唐者想綿駒之謳過夷門者感侯生之事蹈揚盛德其庶幾乎銘曰仰以觀文少微之位含德葆光淪精育粹猗歟先生鍾厥靈氣郁哉懿文倬然上智五代尋戈三靈塞霧鶴在衛軒豺盈漢路衰鳯成歌𡨕鴻曷慕長洲苑下松陵水邊內樂名教中有聖賢擁書萬卷掞藻千篇江山豈助造化無權名理之言有補於世清尚之風未墜於地壤樹俄空壠書不至清暉眇邈幽靈潛翳鞠草實繁柅車增欷講樹已雕琴臺久墜茫茫太素英魄兮何歸杳杳終古香名兮獨飛廣陵王祠祀吳越中吳軍節度使錢元璙威顯公祠祀元璙子節度使文舉二祠俱在薦福山北塢夀聖院即其葬處也宋翰林王公祠祀宋王禹稱也公嘗為長洲宰天禧四年子嘉言復宰長洲作堂祀之後又建真堂於虎丘藏小畜集其中知州康孝基撰碑景祐間范仲淹守郡常為之贊後其子純禮易之而去淳煕九年知縣曾栗復繪公象而祀之黃由題記仍刻歐蘇黃三公詩贊于石慶元間令黃宜又作堂於縣治東偏名企賢堂由復記之互見官宇范仲淹讚昔王文正公曾居相位二十年未嘗見愛惡之迹天下謂之大雅冦萊公凖左右天子安中外保社稷天下謂之大忠樞密馬公知節有犯無隱天下謂之大直此三君子一代偉人也公與三君子深相交許情如金石則公之道可知矣宋黃由記孟子之言大文夫曰富貴不能淫貧賤不能移威武不能屈蓋古之所謂大丈夫者必有高天下之識容天下之量蓋天下之氣不得志則獨善其身得志則未嘗不欲行其道乘田委吏不敢辭卑而盡吾職之當然及乎立人之本朝則謀王斷國以身徇義死生禍福不足以動其心此豈尋常瑣瑣者所能為也後世徒見古人功名鼎盛以為是出於偶然不知胸中涵養蚤正素定非一朝夕而紀旗常汗簡青特其粗也內翰王公元之自為布衣已慨然有經綸天下之志洎遭明時事聖君正色立朝凜凛乎不可犯文忠蘇公至追配以漢曹六君子平生大節載在信史夫人能言之若夫服勤小官孜孜民事言誼卓然有大過人者國史逸其傳或不得而紀也公以雍熙改元宰吳之長洲首論𣙜酒之弊懼遺斯民之害以至激風俗而厚教化抑兼并而哀流亡形諸壁記而垂詔後來者大帥皆有深旨非涵養之厚不以職守大小二其心者能若是乎公沒二百年邦人雖知公之有德於民莫有發其微者今總卿贑川曾侯栗德寬來宰是邑始求公像繪之而併鑱歐陽蘇黃三公詩贊于石嘗屬余敘其大槩矣蓋曾侯之去十有七年天台黃君宜實來拜公遺像而且歎祠事之禮猶闕乃闢縣治東偏建堂而奠焉而求文以為記竊謂公之雄文直道暴白天下豈待余之文而後信况獲附名於三公詩讚之尾尚復何言昔王文公介甫宰鄞有聲利興害除民甚便之其後坐廟堂臨大政乃用其所以治鄞者而治天下惜其學術喜同惡異故為相聲名減於邑公則不然自令滿召試再陟諌坡三登掖垣而晚入翰苑危言讜論裁抑冗費禁戢遊惰緩刑薄賦修德厚本終始為上言之而愛民之意出於一轍咸平以來卒為名臣然則繇百里之政充而至於致君澤民果有異乎哉長洲為今壯縣令宰名德前後相望其間因是有聞而登宰輔者豈公風流在人于今未泯邪黃君舊同學校知其人不茍為政三年去之日如始至燕居之所未嘗葺而獨於此焉惓惓可謂知所本矣忠烈廟在天平山白雲寺宋文正范公先祠也公之先自徐國公而下三世葬此山宣和五年慶帥宇文虛中始奏賜今額本在邠慶緒州南渡後陜隴隔絶改奉於此每歲上已有司致祭今祭於城中書院此廟則子孫享焉正統間重修元牟巘記公自睦移守鄉郡再省三世松楸不但漢人過家上冡之榮而已嘗即白雲菴奉香火洎登政府得追封三世置墳寺始改菴為白雲寺祀徐國公唐國公周國公先是元昊據靈武納旌節僭位號威脅諸羌肆為邊患朝議舉兵攻討公守邠慶諸郡有功諸郡與屬羌皆立生祠繪像以事其終也屬羌酋數百舉哀僧舍哭之如父三日乃去宣和間慶帥宇文虛中以郡人思公不忘祠事甚謹奏賜額忠烈廟他有舊額皆易新榜紹興失秦隴慶陽廟貌邈在他方始改奉于天平山每歲上已三司率僚屬郡博士率前序偕來致祭廟久頽毁至元乙酉主祭邦瑞提管士貴共議重建取義學餘米歸之義莊為土木費司計邦翰宗遜等佐之其年四月既望新廟成丙戌二月既望率族奉安前設文正公像內設三國公神儀廟凡十楹黝堊丹漆備極壯麗供具皆完好大德甲辰行省聞于朝禁治煩擾崇奉尤嚴於是士賢以書抵巘俾記厥成謭焉末學固辭弗獲惟昔文正公在朝聞延州危急自請代張存直欲委身不測之地人以為難巘竊謂未若公上百官圖詆宰相為張禹雖觸盛怒坐以越職曾不少沮為尤難蓋不顧其一身之利害禍福故能內肅朝綱外亢方面諡曰文正廟號忠烈如是之偉也是宜作銘詩刻石列廡下其辭曰南陽諸葛蜀漢再造志決身殱民哭陌道乃廟沔陽成都夔子號曰忠武西人悲喜相傳尚記馘雙誅郃於惟文正異世同轍雖老益壯雖死不忘精忠盛烈夏日秋霜昔討靈武皇威逺加聲勢震焯摧其角牙忠烈有廟參錯西土公像在堂莫豫敢侮天平之山白雲之泉公歸自西廟貌宛然誰實新之偉矣柱石上公之服揚休山立內祀先公爰備廟制維坦啓宇光榮三世式濟世美忠宣弟昆粵至斯今代有賢孫乃厚義廪乃廣義學同志合慮新廟攸作潔我牲醪率我宗黨揭虔妥靈默通肸蠁公在帝旁玉虬既駕神遊逶迤馭風來下佑我後人俾熾而昌廟祀是保千載奉嘗鄭元祐詩西望層巒草木青魏公祠下拜儀形經綸有䇿回天地憂樂無時忘國廷異代蒸嘗遵典禮故山香火下神靈浮雲變滅知何在間聽楸風語塔鈴倪瓚魏公祠宇青山麓崖石巃嵸森古木山下居人幾世孫泉道瓜綿分譜族太湖之水去悠悠異代蒸嘗春復秋吁嗟濟世安邊計今日誰先天下憂髙啓開閣陳言對御筵共言天子得時賢才陪上國趨廷內遽撫豪羌出塞邊松柏自依先壠廟稻禾猶滿義莊田古來直道終難合何必深嗟慶厯年濓溪祠在萬夀寺西濓溪坊內祀宋周元公茂叔初茂叔孫興裔以和州觀察使駐劄平江奏立祠於吳縣胥臺鄉後其裔孫文英南老屢復而卒廢正統元年幾世孫淵等始遷于家泰和王直記孫學士祠在萬夀寺天聖中直史館臨江孫冕守郡有善政吏民敬畏立祠祀之章莊敏公祠在報恩寺東即章太師家廟公名楶涇原禦夏冦有功徽宗賜廟于懷德軍額曰忠烈嘉定末其孫請立于此後為天妃廟和靖先生祠祀尹肅公焞也在虎丘西庵焞紹興中嘗讀書于此扁所居曰三畏齋嘉定七年知府陳芾始繪象祠之九年郡人孟猷等又遷于上方通幽軒之南提舉吳格割公田四十畝為修葺之費今廢改祀于學宫宋黃幹新建尹先生祠記和靖尹先生寓居平江府虎丘西菴榜曰三畏齋去之七十有五年郡守直祕閣陳君芾通守太學博士丁君焴始度菴空地為屋繪先生像祠焉尊前賢厲後學也先生諱焞洛陽人年二十師程子舉闈䇿士議誅元祐黨人不答遂棄舉子業靖康初以布衣召不至詔褒為和靖處士洛陽陷家殱焉先生死復蘇竄長安山谷中逆豫以禮聘溺水逃去展轉蜀道纍年紹興初以崇政殿説書召凡二十辭八年冬始入見除祕書郎明年遷太常少卿權禮部侍郎每遷輒辭其冬除徽猷閣待制提舉萬夀觀辭不已遂奉外祠即虎丘以居年已七十矣後二年竟沒於會稽之寓舍先生所寓於世如此蓋嘗考先生之所學篤於踐行不為虛語未嘗求人之知人亦莫能窺其所藴今其可見者經帷進講門人記録耳惟即其所寓於世者觀其所處然後知先生之於道卓乎不可及矣至於歷險難之極而不變處貴顯之驟而不動抱仁戴義終其身而不悔非盛德能若是乎程子之門從遊之士皆宏博俊偉極天下之選而於先生亟稱之其察之審矣里巷小人顛冥於利害之塗不足道學士大夫則知義理矣臨利害毫髮即棄其所守聞先生之風得無少愧歟二君為是祠亦名教所係故述其躬行之大節以示學者庶幾驗之於身而有得云嘉定七年六月既望記黃士毅重遷祠堂記平江府虎丘西菴和靖尹公先生祠者嘉定甲戌今軍器少監丁公焴通守吾邦之所創也初在山之西北隅後二年二卿孟公猷聞有殯在西階之上甚懼非所以祓不祥而致蠲祀之誠者告于刑獄使者柴公中行乃屬長洲丞趙君崇侃即上方通幽之軒南闢地而遷焉蓋先生寓居之所也知府事沈公皞悉資其役為堂三間西向羣山前列環隴近護老木修竹交閟左右髙明靚深稱祀如昔甫成而柴公以召去王公涔繼之復摹先生晚歲片紙手書聖賢格言五千餘字刋置兩序常平使者吳公格割公田四十六畝俾住菴者為增葺費孟公以始創遽遷盍有以示來者命士毅書之士毅昔登朱子之門獲聞先生之學嚴於持守之本用力之真體驗之熟復發主一無適之旨至講説而不踐行則為虛語問答而少差失則至誤人與夫未至於磨不磷涅不淄則不可如聖人之見南子之類皆務簡實而戒謹恐懼之意隱然於其間未嘗不三復警省今兹祠事仰止遺像如親炙之必求先生之學而學焉是乃興起之方豈曰小補之哉既次其略輒附所聞如此然自先生來居積七十有五年未有表其事而出之者而二三年間其役再舉始克就緒則感夫事之難成而俾終弗壞焉以興起於無窮者又有待於後之君子也先生居之歲月出處之大致已詳於黃侯幹之前記是役也始於四月甲午而訖於六月庚戌實丙子歲云知州事少師閬州陳公省華大卿葉公參祕閣嵊縣姚公憲三祠並在虎丘雲巖寺乾道五年郡人立教授陳伯震記今廢參政張公巖祠在瑞光寺初光福民張氏聚其族人抄掠侵暴三十餘年莫能禁止巖與知吳縣華延年捕置于法郡人圖其像祀於寺中併祀延年表曰賢守令祠郡士許知新記尚書吳公淵侍郎吳公潛學士趙公與􅊸三祠在承天寺三公皆嘗為吳郡郡人祀之吳祠嘉熙二年立黃簡記趙祠寶祐四年立袁萬頃記今並廢楊和王廟祀宋將楊沂中在城習義鄉孝亷里沂中有别館居此後人因祀之知軍事轉運使趙公希懌祠在穹窿山南因其墓而祀之已上先賢包山廟在洞庭西山唐咸通間郡從事皮日休禱雨有應與陸龜蒙皆有詩今飛仙金鐸植里渡渚諸山皆其别祠也俗稱包王廟皮日休白雲最深處像設盈巖堂村祭足茗粣水奠多桃漿箘䉦突古砌薜荔繃頺牆爐灰寂不然風送杉桂香積雨晦州里流波漂稻梁公惟大司諫憫此如發狂命豫傳明禱祗事實不遑一奠若肸蠁再祝如激揚出廟未半日隔雲逢淡光􅑨􅑨雨點少漸收羽林槍忽然山家犬起吠白日傍公心與神志相向如玄黃我願作一疏奏之于穹蒼留神千萬祀永福吳封疆陸龜蒙靜境林麓好古祠煙靄濃自非通靈才敢陟羣仙峯百里波浪沓中堂簫鼓重真君具瓊輿髣佛來相從清露濯巢鳥隂雲生畫龍風飄橘柚香日動幡蓋容將命禮且潔所祈年不凶終當以疏聞特用諸侯封太湖水神廟在洞庭銷夏灣水心俗號水平王廟宋知軍州事胡宿嘗奏列祀典神像與几案皆石為之鄉人祀之甚至其地本水中一洲嘗與水平雖巨浸不沒故名衆安山湖中多有此廟舊傳神為漢雍州刺史郁君廟即其廨宅又郁史君廟在衝山毗陵古云水平王舊傳后稷庶子佐禹平水至會稽誨人浚導因祀之又水平王廟一在吳縣西北八十里一在吳縣西北二百里五龍堂在今長洲縣東南唐真元中建李紳記宋淳熙間賜額靈濟廟紹興四年敕封第一東靈侯第二西成侯第三中應侯第四南平侯第五北寧侯宋淳熙十年郡守耿秉以久旱齋祓祈雨越三日有小龍如蜥蜴見於五龍神位香案果飣上蜿蜒不去秉與約三日內雨當奏請廟額翌夕大雨事聞詔賜額靈濟自是郡中水旱守官投鐵牌於祠前潭中必獲響應又吳地記云石龍在龍壇里其壇并潭猶存今水南之地皆為𬞞圃又有石名定花板為龍宫所有者昔人嘗於居民金氏船坊水底見之其方不踰丈中作錢文四角有雲氣但以塗泥不得詳辨耳水仙廟在子城東南古蒼龍堂神即栁毅也今為上元鄉土社祠頗著靈異一在城西鴈蕩村靈官廟舊名靈順行祠在胥門內朱家園名上善菴宋嘉定二年建一在西米巷名如意菴嘉熙四年重建一在葑門外滅渡橋北紹興間建一在吳江五通廟在吳縣西南十五里楞伽山一在崑山縣東南三百步俗稱五郎堂一在嘉定縣大場寺東一在崇明縣鹽場內關王廟祀漢夀亭侯關雲長也在武狀元坊東大街元甲午歲道士李原祐建一在常熟縣西至正二年建一在崇明縣東沙寶慶觀之左玄壇廟在玄妙觀前神姓趙名朗字公明與關聖同時即趙雲子龍之從兄弟也一在義慈巷內一在嘉定縣西廣平橋一在崇明縣西北六里江東神祠在報恩寺西教場內神姓石名固秦人也漢祖六年灌嬰略定江南至贛城神現于某山告以克捷之期士卒駭異凱還牲酒欵謁立廟贛江之東至吳孫氏遷神於吳境祭之時有鐃歌五章見樂府今在吳城頗著靈異金天王廟在城東南隅楊和王賜第園中昔人於廟傍土中掘得斷碑有金天王三大字又有沈傳師兼御史大夫祕書鄉貢進士十餘字每字二寸許按唐初封華山神為金王而傳師蘇人也故附會祀之猛將廟在中街路仁風坊之北景定間因瓦塔而創神本姓劉名鋭或云即宋名將劉錡弟嘗為先鋒陷敵保土者也嘗封吉祥王故廟亦名吉祥菴互見寺觀一在閶門南濠一在文德橋東一在嘉定縣馬陸鎮祠山廟在雍熙寺東一在崑山縣永懷舊寺內一在崇明舊縣治前顯應行祠一名李王廟在葑門內宋咸淳中創神姓李名祿長興童莊人纍封福濟顯忠等號進侯爵吳城內外多有之或云即名將李顯忠一在常熟縣致道觀西廡下名李烈士廟初理宗時吳興潘壬作亂事聞發兵將屠其城神夜見夢於帝及丞相史彌逺遂宥脅從一城獲全泰定間道士鄧道樞塑像於此遇有災患禱之輒應總管廟在蘇臺鄉真豐里神汴人姓金初有二十相公名和隨駕南渡僑于吳歿而為神其子曰細第八為太尉者理宗朝嘗著靈異遂封靈祐侯靈祐之子名昌第十四初封總管總管之子曰元七總管元至正間能隂翊海運初皆封為總管再進封昌為洪濟侯元七為利濟侯一在閶門外白蓮橋橋西一祠祀元王積翁亦名總管廟一在盤門外仙塘橋下在常熟縣致道觀一在嘉定縣安亭鎮晏公廟多在閶胥二門軍營內元以其隂翊海運封平浪侯今漕運官兵猶祈賽之何山廟在何山南祀白龍并土社神紙錢廟在靈巖山西伏龍岡下白馬廟在香山西白馬寺前皆祀本境土穀之神皮場王廟在府治西成家濱上神本東京顯神坊土神纍封明靈昭惠祐王燕國夫人廟在府治東南燕家橋吳孫權乳母陳夫人捨宅為通玄寺同光中移今所今開元寺亦有其祠淳祐中提刑胡頴拓四酒務隙地為射圃鑿河貝古墓得石函上刻燕國夫人篆字舊傳酒務即夫人宅慧感夫人祠舊名靈祐廟在郡城承天寺護伽籃神也一在吳江聖夀寺林戊碑隂記元符元年歲在戊寅夏吳中大旱遍禱郡祀略無應者是歲髙田不穫人多暍死負販之民皆捨其業而以售水自資涉冬至二年春夏之交舟車益不通百貨湧貴城中溝澮堙塞發為疫氣通判軍州事朝請郎祝公適領郡事乃用故事早暮分禱于所宜祀者一日會承天寺客言此乃梁衛尉卿陸僧瓚捨其第為之昔號廣德重玄寺陸卿故有女子不嫁經營其事既死祠于寺之東廡開寶中吳越忠懿王朝京師道出吳江大風幾覆舟見女子拯之自言郡重玄寺之神也本國加封號感應聖姑今里中事之甚敬公聞即謁且言明日致禱既歸宿齋于廳事舉家沐浴蔬食相約得雨而後復膳黎明躬至祠下再拜而言曰郡承連年之旱流亡疾沴相乘而作農事失時歲且大飢雖某有罪獲戾不逃然將為國家之憂神其哀之能即致雨尚可救也屏息聽命寺僧獻兆曰神告即雨衆甚不然憮然而退憩于齋堂左右告曰天油然作雲矣未及命駕注雨應至老幼歡呼於道至有不忍以簦笠自庇者即日盈尺闔境告足自爾有請必應如取所寄邦人無復水旱之憂歲大有年乃具事白于外臺使者以聞詔書褒美特封慧感夫人秩視公侯列于典祠按陸氏得姓於齊宣王之少子至漢有字伯元者仕為吳令遷豫章都尉既卒吳人思之迎其喪葬于胥屏亭子孫遂家焉伯元生襄賁令盱眙生本州從事鴻鴻生南海太守建建生本州從事曄曄生御史中丞京兆尹璜璜生𢎞農都尉文文生親親生頴川太守尚書令閎閎生桓桓生揚州别駕續續生褒褒生吳城門校尉紆紆生九江都尉太學博士駿駿生選選生尚書瑁瑁生頴頴生海隅令濯濯生漢公漢公生冽冽生本郡從事元之元之生高平相員外散騎常侍英英生晉侍中太尉興平康伯玩玩生五丘尚書侍中始始生祕書監侍中萬載萬載生宋東陽太守子真子真生濟南兖州刺史惠曉惠曉生梁太常卿倕倕生衛尉君凡二十餘世冠冕不絶皆有才德名在史册自興平康伯至祕書監父子兄弟五世內侍嘉祥積慶挺生夫人惟夫人其生也精修正潔入清靜海其歿也通于神明有感斯應故能致朝廷報稱之禮甚厚既以詔書刻于石將求老於文學之士為之記以傳不朽搢紳耆老且請紀其事於碑隂乃為之敘云戊嘗聞朝請公元祐間以奉朝議郎知稿城雨暴滹沱河水盛漂泛林木室廬蔽而下水及城門雉堞凛然將決老弱皇恐奔潰調急夫督水工雨且不止人無所施其力公乃朝服涉濘立于隄上鞠躬申禱水溢隄壤相去數尺吏民救止公豎立不動以笏叩頭願以身任之於是雨小止水波稍回河流遂復其所潰陷之地明日復為平陸如故使者方欲言諸朝會公秩滿請罷遂已北方之人至今能道其詳惟公憂國愛民所至以誠心格物如此是可書也故附于左元符三年歲次庚辰秋八月乙未朔十日甲辰布衣林戊記范至能記按元符三年林戊記云梁衛尉卿陸僧瓚捨宅為寺有女不嫁既死祠於寺之東廡開寶中吳越王朝京道出吳江大風幾覆舟見女子拯之自言重玄寺之神本國加封感應夫人郡人於此祈子頗驗元符初夏旱人多暍死明年疫癘繼作通判祝安上攝州事禱神致雨歲大熟事聞詔封慧感夫人政和二年曹斐記賀鑄書中吳記聞云安上除知台州至錢塘將濟夢一婦人告以風濤之險明日果覆舟數十獨安上得免嘗有祝史竊廟中懸幡縶其身環走殿內自言某實盜也夜半踰城還家神靈潛制于此建炎中金人入侵居民有事之者夢神告以兵難不數日城陷乾道三年秋禱雨有應父老顧安時上其事加封慧感顯祐善利夫人參政范至能記聖姑廟在太湖包山上舊傳晉王彪二女長號聖姑次素姑常著屐涉水而衣不沾濕相繼卒人以為靈而祀之韋應物黿頭山神女歌黿頭之山直上洞庭連青天蒼蒼煙樹閉古廟中有蛾眉成水仙府沉沉行路絶蛟龍出沒無時節魂同魍魎潛太隂身與空山長不滅東晉永和今幾代雲髮素顔猶盻睞隂沉靈氣靜凝美的礫龍綃雜瓊珮山精水魅不敢親昏明響象如有人蕙蘭瓊茅積煙露碧忩松月無冬春舟楫經過奠椒醑巫女南音歌楚些碧水冥冥空鳥飛長天何處雲隨雨紅蕖緑蘋芳意多王靈蕩漾淩清波孤峯絶島儼相向鬼嘯猿鳴垂女蘿皎雪瓊枝殊異色北方絶代徒傾國雲沒煙消不可期明堂翡翠無人得精靈變態狀無方遊龍宛轉驚鴻翔湘妃獨立九疑暮漢女菱歌春日長始知仙事無不有可惜吳宫空白首皮日休洛神有靈逸古廟臨空渚暴雨駭丹青荒蘿繞梁耜野風旋芝蓋飢烏銜椒糈寂寂落楓花時時鬬鼯鼠常云三五夕盡會妍神侣月下留紫姑霜中召青女俄然響環珮倐爾鳴機杼樂至有聞時香來無定處目瞪如有待魂斷空無語雲雨竟不生留情在何處陸龜蒙渺渺洞庭水盈盈芳嶼神因知古佳麗不獨湘夫人流蘇蕩遙吹斜嶺生輕塵蜀綵駮霞碎吳綃盤露勻可憐飛燕姿合是乘鸞賔坐想煙雨夕兼之花草春空登油壁車窈窕誰相親好贈玉條脫堪㩦紫綸巾殷勤撥香池重薦汀洲蘋明朝動蘭楫不翅星河津已上土人私祀姑蘇志卷二十七
