body:
  text: 姑蘇志卷四十明王鏊撰宦蹟四韓彦古字子師延安人蘄王世忠之子也兩知平江時酒禁甚嚴士大夫家亦無敢醖造門卒捕一婦人肩輿中斗酒入門者彦古問汝何從而獲曰告我者舁轎之夫以簮花為識彦古曰人奴而訐其主乎杖㒒而遣之又士族之母訟其夫前妻之子者以衣冠扶掖而來乃其嫡子也彦古曰事體頗重當略懲戒之母曰業已論訴願明公據灋加罪彦古曰若然必送獄而後明汝年老必不能理對汝遣扶掖之子就獄與證徐議所决母良久云乞文狀歸家俟其不悛即再告理由是不敢復至郡有士人持吏短長州將下車必先投状以占能否彦古至其人亦來彦古曰此狀汝不能為必有吏人教汝者其人錯愕即以實告追吏杖之一郡以為神明淳熈二年六月自以期年財賦豐盈乞解郡務上以勞績陞敷文閣待制八月言者論其以絹折輸麥每匹計四五石又以家力科稬米多者至一二千石及敷上户酒二千瓶吏民少忤其意即下獄籍其家殘刻險詐無所不至自述理財之效言所借南庫錢物皆已還足而提領所具數尤缺七十萬貫以無為有遂落職放罷彦古性剛忍有風裁不可干以私官吏尤畏憚之莫漳湖州月河望族也淳熈初知仁和縣時有出入德夀宫者恃勢強梗陵蔑良善屢追不出漳衣緑袍候于宫之外門俟其出擒而撻之髙宗怒孝宗降漳一官未幾復治一人再降一秩仍舊任數月間平江缺守宰執進擬孝宗曰朕有其人遂除漳院轄以承議郎知府事王佐字宣子山隂人南省廷對第一授承事郎僉書平江軍節度判官㕔公事未赴改秘書省校書郎又自知建康府徙平江未赴坐事削官後復自知揚州徙平江政聲第一尤長於聴訟有小民告進士鄭安國酒逮捕其人佐問何自知之安國以㓜婢對竟得婢與告者姦狀俱杖省遣之而釋安國聞者稱快改知臨安府進工户二部尚書謝師稷字務本邵武人以右司郎中除集英殿修撰知平江前守恃其富饒率多妄用未幾反病不足師稷撙節浮費一以愛人為務初無横取未滿嵗積四十萬緡以郡城圮壊奏請修繕遂為壯觀王希吕字仲行宿州人渡江後寓居嘉興乾道中除右正言張説擢用僉書樞密希吕劾之責逺小監當既而上悔之改宫觀淳熈中歴中書舎人知平江府終吏部尚書趙彦操宗室子也淳熈中以秘閣修撰使江西知平江府郡當孔道事緒萬端窮日力不給彦操治尚靜簡不為捷疾以聳見聞建御書閣風化庠序未嘗汲汲浚民而財用羨溢寛弛虚錢緡十四萬米四萬六千斛嵗滿以右文殿修撰再任又躋集英徙鎮江未上改婺州張巖字肖翁泰興人為人機警柔囬附韓侂胄誣逐賢者嚴道學之禁拜叅知政事以言者罷為資政殿學士知平江旋升大學士知揚州遷知樞宻院事侂胄誅奪官李大性字伯和四㑹人歴太府寺丞浙東提舉提刑為户部尚書忤韓侂胄出知平江移知福州除刑兵二部尚書以端明殿學士又知平江引疾丐祠卒諡文惠方導字夷吾紹熈二年通判平江郡務素劇關决閒暇外臺多屬以事無不得其平兩攝府事尤為得體陳晞㸃字子與青田人淳熈中任從事郎平江府觀察推官樞宻丘崇為守屢以職事爭辨崇或陽怒折之晞㸃退立屏息俟其少霽執論如初至于再三竟不能奪自爾晞㸃書擬望而許之提舉羅黙兼府事舉兩司事無大小咸以屬之行荒政修水利决積訟晞㸃悉左右之陳景思字思誠弋陽人以祖恩補承奉郎監平江府糧料院光宗即位詔天下言事景思上十事多一時要切授淮東總所幹官以薦除籍田令累遷直秘閣兩浙轉運使趙不熄宗室子淳熈中以忠翊郎添差平江府排岸兼船塲公事十五年正月大宗正司奏其資性明粹舉族稱賢堪繼嗣濮王士輵之後從之莫子純字粹中慶元二年以進士僉書平江軍節度判官㕔公事官至右文殿脩撰知江州沈作賔字賔王歸安人歴兩浙轉運副使知潭州以龍圖閣待制知平江請得節制許浦水軍郡有使臣故海盜也作賔命招誘其黨既至慰勉之錫以衣物又得強勇者幾千人置將以統之號曰義士復募境内惡少亦幾千人號曰壮士衣糧器械皆視官軍而輕捷善鬬過之於是海道不警市井無譁李大異字伯珍隆興人開禧用兵為諫議大夫甫數月坐論兵事忤韓侂胄以待制出知婺州未上改平江踰年知建康府趙希懌字伯和一云叔和燕王八世孫性簡重不妄言笑以江西安撫轉運除知平江覈財用出入而削浮費無藝者郡多舞文吏未及期年苖薅髮櫛官寺肅清以治行進直學士尋以病告移知太平州拜昭信軍節度卒聞者莫不殞涕諡正惠子與􅊸與􅊸字德淵寓處州之青田史云居湖州嘉熈三年直敷文閣知平江兼淮浙發運使特置司領其事自與􅊸始四年郡中饑分塲設粥以寓公方萬里為人所推敬委請董役全活者數萬人寳祐三年以觀文殿學士再守郡行鄉飲射禮于學宫復修飾殿堂齋廬廣弦誦以嚴敎飬學官弟子為立生祠明年兼提刑六年除江東安撫使知建康府景定初復知平江匄祠封周國公諡忠惠學者稱為節齋先生沈嘉定七年以奉直大夫守平江磨勘轉朝議大夫旋除浙東提刑十六年再任尋以職事修舉除寳謨閣待制仍賜金帶寳慶元年試登極賦轉通議大夫除煥章閣待制趙彦橚字文長秦悼王七世孫由進士主崑山簿後遷湖廣總領知平江郡並大海盜出沒莫可蹤跡彦橚奏分崑山之半置嘉定縣屯兵以守又鑿錦帆涇通運河以便舟楫將增隍為城而以邊遽少緩且以病告轉寳謨閣待制卒于官趙汝述字明可太宗八世孫累官刑部尚書知平江下車宣布德意時許浦水軍顧涇民兵未霑正月受寳之賜汝述請以安邊庫八萬六千緡均給之郡雖稱富饒仍嵗告匱汝述務以節用恤民為急城圯不修條其工費當緡錢二十四萬米萬有四千斛奏請于朝以殿步司二軍佐其役方具畚臿㑹病卒寓公方萬里為經紀其喪事吳淵字道父寧國人㓜苦學歴秘書丞兼刑部郎官以直煥章閣知平江府兼節制水軍提㸃刑獄㑹衢嚴盜起警報至調遣將士招捕殱其渠魁散其支黨以功為樞宻院檢詳文字兼國史院編修官改知慶元府江潭二州皆不赴知隆興鎮江二府兼都大提舉浙西沿海諸州軍許浦瞰浦等處兵船嵗大祲因淵全活者六十五萬餘人除江西安撫使知江州遷兵部尚書再知平江兼浙西兩淮發運使嵗亦大祲又全活四十二萬餘人除浙西提刑知太平州建康府拜資政殿學士封金陵公知福州改知平江寧國二府累疏辭免寳祐五年拜參知政事卒諡莊敏淵有才略事功迄濟所至興學養士然政尚嚴酷好興羅織之獄籍滅豪横時有蜈蚣之稱弟潜潜字毅夫嘉定中進士第一自工部侍郎知慶元府改知平江條具財計彫敝本末以寛郡民與轉運使王埜爭論利害授寳謨閣待制知鎮江府位至左丞相王遂字去非一字穎叔其先德安人徙金壇髙祖韶熈寧中樞宻副使遂十四對䇿江東漕司抵韓侂胄尋以父任主富陽簿又三年及第仍舊任歴監察御史累疏劾余天錫趙善湘鄭損陳晐等人心震悚姦黨為空除殿中侍御史遷户部侍郎四川制置使鄭損本蜀人沮之差知平江遂與里人劉宰素同志宰嘗稱遂為文雅健足以名世贈之言曰士友當親而賢否不可不辨財利當逺而㑹計不可不明折獄以情毋為私意所牽薦士以才毋為權要所奪當言則言不視時而退縮可去則去不計利而遲回庻幾名節之全遂至郡即以崇學校寛民力抑豪強正風俗為務㑹兩倅六縣令賦詩勉厲時詣學為諸生講説吳中理學愈盛洞庭西山村民徐汝賢以詐惑衆自言能出神使人見神魂遊於空中及死者魂魄見朱簾之内掠人財賄妻妾為害數十年遂鞫之殊無異者乃毁其壇祀黥靣鞭背投之盤門水中為辨惑文云徐汝賢自號水僊太保今在水中且與魚鰕為侣如有妖怪願以身當之又民間七月十五日多設盂蘭盆㑹遂作文鏤板以禁謂孝子順孫若従其法則自以父祖為餓鬼心忍之乎以時思親當祭諸廟由是汚俗為之丕變復議除郡中淫祀以謂莫尊者天莫重者祖宗之所自出國朝立天慶觀前奉天帝後奉聖祖他祠不得與焉今岳神厠祠於此非所以敬天事祖也禮天子祭天下名山大川諸侯祭其境内者非此族也不在祀典五嶽為天下重鎮而東在兖州南在衡州皆非本土所應望祭將以此廟為瞻儀堂遷岳神像於修和觀事不果行復知寧國建寧皆著羙績家居久之除權工部尚書卒諡正肅所著諸經講義奏議實齋文藁藏于家王應麟字伯厚浚儀人九嵗通六經淳祐元年第進士従王埜受學調西安主簿差監平江百萬東倉調浙西提舉常平茶鹽主管帳司部使者鄭霖異待之調揚州教授寳祐四年以博學宏辭及第添差浙西安撫司幹辦公事上䇿士召應麟覆考既上上欲易第七卷置于首應麟讀之乃頓首曰是卷古誼若龜鏡忠肝若鐵石臣敢為得士賀遂寘首選及唱名乃文天祥也應麟遷國子録歴官禮部尚書陳塏字子爽其先侯官人占籍嘉興古靈先生襄之曾孫也歴右司郎官直龍圖閣浙西提刑後以右文殿修撰知平江府兼淮浙發運副使以户部侍郎趙必愿舉最詔特轉一官遷太府卿官至端明殿學士卒諡清毅塏屢歴麾節軍民愛戴幕客盛多又樂於薦士有可齋瓿藁二十卷謝堂字升道天台人丞相深甫曾孫淳祐三年由籍田令除直寳章閣添差通判平江年踰弱冠敏給過人憲使驟以獄事屬之有一案而直八十餘家之枉者累官樞宻使銀青榮禄大夫徐鹿卿字德夫豐城人以右文殿修撰知平江發運副使力丐祠上諭丞相挽留之召權兵部侍郎固辭上又令丞相以書招之乃至極言君子小人甚切世務吳樵淳祐中平江節度推官賢而有才敏於吏事憲司請入僉幕多所裨賛諸司交薦之嘗謂人曰樵居官既久深知吳風吳人尚奢而爭勝所事不切寧拚百萬錢嫁女不能拚十萬錢教子弟寧捨十萬錢遣婢妾不能以一萬錢延好師友故使子弟不知書識字但廣置田宅計校微利殊不思異時反貽子孫不肖之害故人以獃目之蓋以此也趙與訔字中父秀安僖王五世孫寓籍歸安曾祖伯圭憲靖王祖師垂新興恭襄王父希永朝奉大夫與訔初以父䕃調饒州司户參軍辟監海昌鹽塲易黄姚運鹽浙西茶鹽司主管文字浙西提刑司幹辦公事淳祐十年知嘉興府除直秘閣兩浙通判改提舉浙西常平義倉茶鹽公事寳祐初直寳章閣浙西提刑二月兼提舉十月知平江府景定四年九月復起知平江府兼提刑十一月兼提舉後卒於官禮部侍郎東平劉震孫誄曰與訔於時為循吏於朝為名臣於國為信厚公族世以為知言木待問字藴之温州人方逢辰字君錫淳安人姚勉字成一髙安人皆登進士第一授平江僉判待問乾道初逢辰淳祐十年勉寳祐初程元鳯字申甫徽州人歴任至丞相兼樞宻使開慶丘興疏言兵事時忠邸將議建儲上意未决問元鳯曰忠王比朕如何對曰忠王無陛下之福臣無彌逺之目由是忤㫖判平江府兼發運使度宗朝守少保致仕鄭霖初以朝奉大夫權發遣兩浙西路提㸃刑獄公事至淳祐八年正月暫權平江府發運司事七月除直寳章閣知平江府事兼主管浙西兩淮發運司公事兼措置浙西和糴以其月交割十二月又命暫權浙西提舉其月磨勘轉朝散大夫九年詔以職事修舉除直華文閣依舊職王爚字仲潜一字伯晦新昌人端平間由進士知常熟縣興學舎飾社稷正經界立役法剙義阡百廢具舉以政最聞遷禮吏二部尚書加龍圖閣學士知平江府淮浙發運使五年入朝爚為人清修剛勁賈似道過新昌爚獨不見洎入相於宋亡之際天下所係屬而卒與陳宜中不協而去包恢字宏父建昌人由進士歴除直顯文閣浙西提㸃刑獄是時海冦為亂恢單車就道調許浦瞰浦分屯建砦一旦集諸軍討平之嘉興吏因和糴受財百萬恢被㫖慮囚曰吾用此消沴氣乃减死㫁其手下官有包尉者持孝肅公畫像及家譜來謁紿恢為叔父恢荅書云某旴江微族妄庸無侣安有是邪力拒不受景定中以華文閣直學士知平江兼發運使至郡聞迎官供帳皆敷抑市肆民不能堪首以所得供堂緡錢盡償其直郡中酒課常時為守者公費外悉以自歸恢節縮冗濫以其嬴補九任度支逋欠及支給許浦兵糧去官之日府庫剰錢六百餘萬時𣲖買公田恢奉行稍過頗失時望召赴闕奏事移知紹興府官終僉書樞宻院事恢所至破豪猾去姦吏治蠱獄理逋負政聲赫然卒諡文肅鄭士鋐字鳴道鄞人久歴邊陲素諳兵政宰公安民尤安之生為立祠歴添差通判平江除將作監簿當官不畏強禦公平無私向士璧字君玉常州人負才氣累通判平江歴湖南制置副使解潭州圍進兵部侍郎為賈似道所擠死王伯大字㓜學福州人端平三年試將作監兼右司郎中兼提領平江百萬倉兼提領措置官田進直寳謨閣樞宻副都承㫖兼左司郎中淳祐中參知政事王烜字晦叔丹徒人以父䕃監平江府比較務建康府大軍倉不事進取好讀書論議古今一時論者以孔北海禰平原比之樞宻曾懐薦改宣教郎知天長縣趙崇禪字叔茂太宗九世孫尚孝廉有才行由進士乙科調樂清尉平江府録事參軍辟淮浙發運司幕官官至文林郎趙順孫字和仲縉雲人咸淳四年以顯文閣待制知平江兼發運使先是郡庾赤立率以夏初徵民租順孫謂古者十月納禾稼今先期半載民何以堪僉曰此例行之三十年不然將有乏興之憂順孫不聴首以俸入及例卷所供助糴本抑浮費以繼之糴幾二十萬斛迄免預徵郡大治創學道書院俾諸生肄業焉五年召為吏部侍郎常懋字長孺武康人顯謨閣學士同曾孫也淳祐七年舉進士調常熟尉公廉自持不畏彊禦部使者交薦之調婺州推官以臨安尹馬光祖薦辟差平江府百萬倉檢察不受和糴事例戢吏卒苛取發運使兼提刑趙與􅊸屬懋檢覆雪無錫翟氏寃獄監江淮茶鹽所蕪湖局改知嘉定縣嵗大水勸分和糴按籍均敷發運使王某提刑孫子秀俱薦于朝僉書臨安府判官拜監察御史言天變及賈似道家爭田論繼皇子竑嗣尋為兩浙轉運使修築海鹽海晏塘既而以集英殿修撰知平江府值旱故事郡守合得緡錢十五萬懋悉以為民食軍餉助蠲苖九萬稅十三萬版帳十六萬又蠲新苖二萬八千大寛公私之力飛蝗幾及境疾風飄入太湖節浮費修守庫既代有送還事例自給吏卒外餘金萬楮悉不受吏驚曰人言常侍郎不愛錢果然改浙東安撫使潜説友字君髙縉雲人咸淳中為臨安尹因捕賈似道私賕去官踰年起知平江元兵入境適時宰欲以金銀往舒城犒師路梗不進寄留郡帑説友遂以此偕表同詣元軍自以全城為功朝廷既知其事以文天祥代之説友後従二王入閩廣留守福州反覆向背復歸于元以為宣慰使而王積翁副之軍糧不時給為積翁所激軍將李雄遂殺説友剖其腹焉文天祥字宋瑞一字履善廬陵人寳祐丙辰進士第一德祐元年除浙西江東制置使兼江西安撫大使知平江府常州告急遣麻士龍尹玉洎淮將張全曾全等往援之戰于五牧曾全等先遁諸軍敗績張全不援麻士龍尹玉皆死之平江大震天祥斬曾全以狥未幾陷元屠其城守將劉師勇來奔㑹獨松關告急留夢炎陳宜中議棄平江趣天祥入衛移守餘杭天祥猶豫未决兩府劄至乃委印於通判王矩之時督府遣環衛王邦傑援常留平江因責邦傑以城守天祥去平江數日邦傑開門迎降都人大駭議天祥棄平江天祥出兩府劄牓之朝天門衆始定進資政殿學士浙西江東制置大使兼江西安撫大使二年以資政殿學士詣軍前講解巴延留不遣索多問曰何以去平江天祥曰有詔趣入衛問兵若干對曰五萬索多嘆曰天也使丞相在平江必不降但累城内百姓耳張世傑范陽人歸宋累立戰功德祐初為保康軍承宣使總都督府兵遣將四出浙西諸郡復平江安吉廣德溧陽諸城兵勢頗振七月與劉師勇諸將大出師焦山兵敗奔圌山上疏乞師不報十月進沿江招討使改制置副使兼知江隂軍元兵至獨松關召文天祥入衛以世傑為保康軍節度使知平江尋召入衛二年従二王入福州許應元字長卿臨安人授平江司戸參軍知府文天祥辟置幕下國亡不娶不仕教授以給養母及弟母喪盡禮時人髙其誼趙全趙寧人元初由軍功膺寵及下江南授懐逺大將軍湖州路總管至元二十年改平江在任開耕荒田六百三十餘頃增戸口至九百七十剙構豐樂嘉㑹太平安和熈春酒庫二十三年得代時方内附頑民故犯法者嚴治不少貸若因繇役受捶則瞑目嘆曰以徵科而罸尚忍加重乎繼除杭州民泣送不忍捨時擬為趙廣漢云戎益順德人初任值嵗饑親詣各縣勸率上户賑濟得米一萬七千有竒民賴以生董章字文卿真定人為人亷明其政毅而寛至郡未幾獄訟稀鮮公退不入内閾清坐弦歌每至夜分作善教二十四條以勸民大抵以厚風俗為急博學尤精春秋善大書重創姑蘇驛等題顔皆其筆紫陽方囬為記政蹟之略祝峋字秀巖一云碧山以字行松江人大德間為海道都漕運萬户府經歴就陞平江路總管峋為人英拔豪濶篇翰清羙同俞琰學易講治甚精所交多一時名俊與趙孟頫朱德潤氣誼相許卒于官子孫遂家吳中劉𦙍字嗣宗良鄉人積官至山北道亷訪使皇慶二年來為總管問俗察情發姦摘伏洞燭民隠吏弊若素官南土者臨事執義不苟懲惡則濟之以猛癯然若不勝衣未嘗疾言遽色素守清儉門無私謁延祐元年詔經理田糧條令嚴峻事鉅而限迫莫不駭懼𦙍威信素孚人不敢欺昔之詭寄者翕然自實時江浙會十八郡守臣欲概定田賦咸視𦙍言為従違𦙍毅然爭曰地有肥磽厥賦宜不齊一旦更改民病何時瘳乎由是得仍舊貫二年郡境螟𦙍白之行省仍屬𦙍閱實遂悉蠲之縣民執役定里正主首有産去稅存之患𦙍建隨産當差之議科舉初行士赴會試者闢公宇燕餞之三年正月卒喪不能舉僚佐賻歸葬師托里圖一名克恭字敬之寧夏人由兵部侍郎遷平江路總管馳驛到郡先是賈人貨黍草入城匿税事覺併及城外餘積行省疑不决托里圖謂物不入城不應當匿税法悉以還之府縣司未絶之案積至二千餘編攝吏曹期以日决無幾而畢州縣役民充里正主首責以催科陪償往往破産或本都堪役調之他都吏夤縁為姦托里圖如詔㫖先田多上户盡放下户従上推排不役於他都民乃便之其在城者曰坊正舊以待闕吏充滿嵗補吏其人熟於期會數十年不改或欲以例役民動揺抑配且失業敗事托里圖榜諭仍役吏廛肆乃安城中酒稅嵗額八千定以百八十戸認辦不均托里圖曰擇二十户可也民出己本營官息則價之髙低隨物貴賤官府用酒亦以見鈔沽買自是絶差認之擾漕府運糧每嵗船户務多斛面托里圖兩平之使客如賜田莊官嵗利其廩給逾年延緩不返托里圖禁其濫給飭館舎造學宫嚴聖賢像善政非一見宜春丞龔璛記道通髙昌人後至元二年自信州路總管轉通議大夫平江路總管三年積隂以風稻用虚秕屬邑上菑狀道通遣僚屬出履畝所履與狀合無一不讐郡多寓公喜持短長往時郡守至必伏謁其門聴其言少咈意輙構飛語道通至一切繩以法僑者不堪至京言道通妄以嵗凶誑朝廷事聞遣御史乗傳鞠虚時道通已除江淮財賦都總管府達嚕噶齊遂與僚屬逮至嘉興詰究得其妄朝廷乃治言者罪初屬邑民訟令不為直訴於道通道通置籍籍民所訴送之邑務得其情訟為之簡民輸嵗賦豪右屬官吏初限皆細民石加五六斗豪右至末限僅什四三而以細民多輸者足之道通令初限必大户齊足次及細民徴夏稅絲亦如之推官汪澤民作去思碑謂其大致有四持身嚴燭理明决事敏待人直又謂授宣命于朝者凡十有三歴官多練事精然家益貧其來平江一無所取可謂大丈夫矣蕭義字仁甫遼人前徽政院㫁事官至正八年到任郡嵗賦數百萬石長洲尤難辦大率土吏貪殘侵牟民不堪秋糧每至次年夏初猶未足義拘累嵗主稅土吏所謂十老人者籍其貲數令其辦認本年秋糧繩以法而嚴條約以督之過限不足即沒其家以償又禁格監局催糧祗候禁子火家之屬添造斗斛明收什一為耗贈倉塲不得髙下其手土吏畏令履畝而徵至十月終三限齊足而民亦無害其他州縣不令而従咸不失期自奉清薄疾惡甚切嚴刑峻法以律吏胥皆懾伏時以蕭打鬼稱之汪澤民字叔志宣城人以進士累官禮部尚書性廉孝慎許可嘗為平江推官任法允恕獄多平反淮冦闖境倡鄉人保里閈城䧟遇害詔贈江西行省左丞諡文節俞庸字子中嘉興人為平江推官才而尚德年饑穀貴流殍塞塗憲府檄庸董倉庾庸上䇿糶賑全活數萬無何淮兵壓境庸聚勇士鑰守盤門時郡守貢師泰治中髙安等舉室以竄亦率庸行庸厲聲叱之曰公等以世臣守大城一旦臨利害先民以逃不顧義與恩邪安持銕簡擊之仆地遂開門兵至城下庸未甦被擒置馬下頃之甦以計脱去微服間道歸淞上久之大府知其人將授以爵謝之曰吳門之役吾有死所顧縶於亂卒不獲耳尚負面受他命見天日邪因憤病卒年四十五何質國朝吳元年知府郡民久屬張氏割剥枯瘠殆絶生理質至勞來安集民拜更生之惠時詔徙蘇民為特甚質雍容裁處民若罔知尤申意庠序祀殿論堂已廢皆鼎新之朝㫖以為勞民怠事質奔命闕下將寘極典質請忍死一言曰殺一郡牧以活百萬生靈質含笑入地矣遂得宥免復增秩以旌之魏觀字杞山蒲圻人初以文學薦為國子助敎厯浙東提刑按察僉事遷兩淮鹽運使入為起居注陞太常卿轉翰林侍讀學士侍皇太子說書於文華堂多所開悟稱㫖兼授秦晉楚諸王經復為國子祭酒坐事貶龍南知縣召為禮部主事洪武五年出知蘇州府既至懲陳寧之苛鋤暴樹良寛而且肅敬老䘏民大建學舎更闢孔子廟門舉鄉飲酒禮邀郡士周南老王行徐用誠與教授貢穎之校定儀節命諸生習行之郡既多耆彦又有三老人曰崑山周夀誼年百有十嵗吳縣楊茂九十三嵗林文友九十二嵗皆延致特席禮成彬彬可觀夀誼還又躬餞諸郊再拜觀者如堵牆未及三載風化興洽封部皡然課績為天下最六年陞四川行省參政未行復召還與宗濓輩錫宴奉天門上曰前日送卿還今日與卿飲何其樂也命各賦詩紀之又以蘇非觀不可為命仍為守七年觀以郡舊治曩在竊據今治隘弗稱圖復之地多水患郡城中河頗加浚㵸御史張度劾觀非時病民且有危言遂得罪死上仍令以禮遣葬特賜諭祭皇太子諸王亦致祭焉王興宗應天府人洪武七年由懐慶知府調蘇州政尚寛簡愛民之心若保赤子十年召還除河南布政使李亨吉安人洪武十年由磨勘司令轉蘇州府經歴復陞知府性樂易事不苟為為之輒有惠利十一年内艱去民不得留涕泣送之十二月上賜勑并米五十石鈔二十錠勑略曰曩為郡長恪慎亷謹以奉憲章古稱循吏不是過也湯徳髙郵人洪武中常州府通判有能名十一年遷守蘇郡敷政嚴明而持法不苛吏民畏愛之王觀祥符人洪武十九年由舉人選授知府府有奸吏錢英累搆陷長官觀㢘得至便捶殺之百姓稱快事聞上嘆賞遣行人白思中賜勑勞以酒時荐遭菑凶民逋無所從償乃延諸富家集郡衙飲食之風使出儲積以補不足衆驩然逋乃給觀為政嚴整亦興建民仰之如神明金綗嘉興人為守時官民田則數不齊上疏請减重額田得罪賜死姚善字克一安陸人初姓李後復今姓由鄉舉歴祁門丞同知廬州重慶所至有能聲洪武三十年擢知蘇州府初上以吳民熏染奢僣靡習豪室田宅輿服往往踰檢明法以整齊之嚚者或更籍持短長賊譎蠭起復號難理善洞達政體周悉人情張弛寛宻各協事宜又數造請郡中賢哲考求治道商略民生休戚俗尚淳漓以施消息因革繇是吏民顧尚亷恥好善趨義風羙物安轉稱大治為列郡最隠士王賔獨居陋巷善往候見舎車獨詣門以指扣之王賓問為誰應曰姚善乃䦕門延語及賓報謁靣府門載拜而返善聞自追及邀還賓辭曰非公事不敢入也又將候韓奕奕避入太湖善歎曰韓先生所謂名可得聞靣不可得見也錢芹自守甚髙善願見不可得將往候乃使人先道意芹對使者曰芹誠幸見公然芹民也禮不可往見于庭苟眀公𢎞下士之風請伺月朔胥會於學宫善如期至迎芹置上坐請質經義芹曰公今有官守請姑舎是事有急於此者善問何事芹出一簡以授善竟不交一言而去視之則守禦制勝之䇿也善心嘉之後薦芹為行軍司馬徐垕字宗實黄巖人負才抱氣有經時之志元末厭世不仕洪武初應薦入朝數被顧問敷對明切皆中時宜上喜將授憲職垕辭乃除銅陵簿請迎母就養忤㫖謫役湘隂驛未幾選教駙馬能以師道自尊召見奬諭擢蘇州府通判奏發粟二十萬以活饑民春漲病隄垕相度原隰大興築捍之役部使者以為妨農勞民垕言他役誠妨農水不退則田不可耕妨農孰甚焉且令有田者量募貧力饑人得哺正所謂佚道使民曷為勞哉卒就其庸屬邑有樓貞婦奏乞旌表禮部謂前朝事不允垕言死生有間則比干之墓誰封禮官不能奪従之官終兵部侍郎蕭鵬舉泰和人以賢良應薦太祖命賦指佞草應口成篇上大喜授蘇州府同知以寛厚清慎見稱陞山東鹽運司副使孫蕡字仲衍南海人洪武初為翰林典籍歴使秦晉楚蜀之境改蘇州府經歴後左遷平原復戍遼陽卒蕡文業婉麗尤工詩有西菴集况鍾字伯律靖安人始以吏事吕尚書震震薦其才授禮部主事進郎中蘇郡由永樂以來長吏治狀鮮著朝廷屢遣吏督責無效宣德初以雄劇十郡缺守慎擇良牧尚書胡忠安公等遂舉鍾典蘇郡復請賜勑以便行事乗傳赴郡鍾固已洞灼郡弊蒞任吏胥抱案牘請署以嘗鍾鍾黙黙若無能為既三日吏復請署鍾曰若謂吾不事事邪歴舉三日牒無一遺互摘其間某為故出入若失出入隠竄顛倒立取一二輩即庭下撲殺之僚屬震栗鍾因并舉僚屬貪虐懦者立黜之搜逐胥屬主文積蠧置通關勘合簿以防詐偽衛卒久暴横痛加繩禁郡體始尊嚴勢家侈恣不法鄉里武㫁咸取杖殺之而扶惠單弱置善惡二簿察民善惡者籍其名既施行則著列以示勸懲婚喪不時者召諭反覆而峻其校督刑罰民畏而感無不従令鍾既達而果又素忠直簡在上心故凡所論列悉賜施行郡田有官民之别官田税額特重鍾擬奏求减焚香自祝或動以禍福不顧疏上卒得所請凡奏减省重額正賦田糧七十二萬一千有竒募民䦕墾荒田起科以免逓年包荒之糧至一十四萬九千五百有竒停徴渰没田糧二十九萬五千免舊欠糧草鈔數百萬錠罷平江伯董漕嵗取民船五百艘免買船米十五萬一千八百石疏免詔買减濶白三梭布七百疋銀數千兩奏革倭船徴需無度請濬㵸水道淤塞辨眀平民誣入軍者千八百餘家招復逃亡三萬六千七百户凡所罷行皆綱紀大務民到于今受其賜尤重於事神社稷山川龍母泰伯伍員范仲淹諸祠宇皆拓而新之享獻誠慤雨暘祈禱輒響應興崇學校敬養才哲薦拔孤寒有起家為近侍者剛敏敢為不懾權要度量廓如朝廷累有褒勞述職陛辭上為錫宴賜詩恩寵甚至而以蘇人仰藉倚以守御不遷其官鍾亦無倦丁内艱去任民上請乞還鍾治復除仍舊任正統五年九載滿去闔郡之民上章乞留往扣闕者八萬餘人遂再遣任若赤子得慈母七年無疾卒于位民益哀之李從智宜賓人由進士歴官大理寺正正統十年擢任知府從智性剛果郡人信巫覡多淫祀署小廟於門交遍衢巷從智出行見之一日毁去朱勝字仲髙金華人由舉人累官刑部郎中知封昌府正統間移知府事為人亷靜少欲勤政愛人政尚中和而吏法精練聴訟不待箠朴物無遁情兩造簡備廷無疑囚案無滯牘非重犯不遣入囹圄胥徒惟奉行文書𨽻皂拱列而已嘗曰吏貪吾詞不付房𨽻卒貪吾不行杖獄卒貪不繋囚人歎服之在官數年鎮定不撓民安而化之景泰初擢江西右布政使久而民思之陳信字履信仁和人正統間自大理評事轉通判蘇州未幾致仕為人礪名節甘儉泊政多惠愛比歸有懐其德者伺於吳江道中持金為贐信不受楊貢字秉魁樂安人景泰五年以監察御史按蘇時大饑死者相枕郡邑多缺官巡撫大吏號令煩碎民無所控訴貢獨任其責殫力拯飭奏免災糧若干萬開倉賑貸天順元年被薦受勑來守首立惠民倉實粟以備凶歉次發酷吏安純等數人奸贓政聲赫然持己素清嚴疾惡尤甚有豪右藉武臣求私覿貢捕置于獄擿其賊殺等十餘事將論如法武臣為救解於巡撫貢欲併舉之更搆于朝三年朝遣武臣逮貢與豪赴錦衣獄置對貢不勝困苦遂誣伏勒歸田里逺近寃之姚堂字仲升寜波人天順四年來守忠厚清簡不能逢迎敬賢愛民雍然長者時林鶚知鎮江有聲巡撫劉孜以更賢育民對易之人頗惜其去五年春檄至即行什器帷帳一無所取先釀酒一缸以為蘇物戒守舎者留候林為用民攀送塞路林鶚字一鶚黄巖人動由禮法衛身甚嚴雅好文學以儒飾吏未嘗為上官一屈膝對胥吏小民言必涉經史威儀之盛望之肅然八年復以劉孜薦擢持憲節江右臨行有書萬卷官至刑部侍郎邢宥字克寛瓊州人舉進士為御史治宦者王振黨獄有隂德擢知台州府天順間坐舊按河南失察裕州守罪謫為縣丞成化初起知蘇宥有通變之才所至有譽乙酉郡大饑斗米錢百三十文且無所于糴宥賙貸甚勤民賴以生流人之在境者亦不失所然而公帑不空富室無擾論者謂荒政之最善者至刑名錢穀上供送迎調發諸具繁夥素號難辦處之綽然聲稱籍甚二年知者交薦朝廷重其去止賜勑擢參浙藩仍知府事後數月遂進都御史就撫南畿聲名頗减治郡時五年以病乞歸賈奭字希召巴縣人以御史巡按南畿有聲成化四年擢知府事繼遵前政不事改作郡不勞而治為人方嚴端肅人望而畏之操守介㓗始終不渝八年以憂去官至副都御史王貴永平人成化初自太學生選同知府事清靜寡欲臨事自盡職清兵籍惟求民不寃濫未嘗以上官喜怒己之殿最為意滿去民多思之有善政録丘霽字時雍鄱陽人舉進士除刑部主事成化壬辰來守郡性穎利彊記意度恢廓舉事沛然重祀䘏民養士正俗初郡學門傍啟行者經文廟中霤乃買民地直學宫闢門遷驛於胥門規模顯敞又訪冠祭射禮儀目秩然命諸生習行之浚沮淤以利田歉嵗請减稅十二凡所務力行無所回郤治未一年諸廢畢舉然性頗侈汰家人少戢竟以流言罷歸華清字亷卿應城人以進士授郡推能書畫尤工於詩賀霖字時望鄱陽人𢎞治初以御史擢守郡郡民望而知其仁鼔舞相慶盛暑蒞事凡舊政之墮者過者不及者悉痛整齊之無時刻少休卒以勞悴致疾雖在告猶數強起處分疾愈甚未期年卒道路相弔姑蘇志卷四十
