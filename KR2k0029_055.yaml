body:
  text: 姑蘇志卷五十六明王鏊撰人物十八藝術曹弗興以畫名冠絶一時孫權命畫屏誤墨成蠅權疑其真以手彈之時美有八絶弗興預焉又嘗説溪中見赤龍寫以獻孫皓至宋文帝旱暵取弗興龍置水傍應時雨足南齊去吳未逺謝赫謂弗興之迹殆不可見祕閣之內獨有所畫龍頭嘗畫兵符圖極工祕而不出張宏字敬禮郡人善篆𨽻飛白書妙絶當世人稱其飄若遊雲激如飛電有飛仙舞鶴之態常戴烏巾時號張烏巾歐陽詢謂張烏巾飛白論入神品小篆亦入能品張彭祖郡人澄之子官至龍驤將軍善𨽻書右軍每見其縑素尺牘輒取而藏之梁朝論其書在中之中品子敞孫裕尤善行草皆自有傳張氏三世皆以善書名陸耀郡人善書陸探微吳人善畫得六法之妙平生愛寫古聖賢像明帝時常在侍從二子緩洪緩肅得家學張彥逺論其體運遒舉風力頓挫一點一拂動筆不凡顧寶光郡人琛之子也善畫全法陸探微大明中為尚書水部郎官至司徒右曹掾尤善行書卓越多竒王僧虔嘗作飛帛書以示之寶光曰下官今為飛帛屈矣沈嘉字長茂吳縣人官至吳興太守善草書張僧繇吳人丹青絶代嘗畫江陵天王寺柏堂作盧舍那像及仲尼十哲明帝怪問釋寺何為畫孔聖僧繇曰後當賴此及廢浮屠法獨此殿有聖人像得不毁又嘗于金陵安樂寺畫四龍不點睛云點之即飛去人以為誕固請點之須臾雷電破柱二龍乘雲去未點者存又畫天竺二胡僧侯景亂析而為二一為唐右常侍陸堅所寶堅疾夢胡僧來告云我有同侣在洛陽李氏若求合之當以法力助君陸遂往求果得之劉長卿記其事潤州興國寺苦鳩鴿棲梁上穢汙尊像僧繇於東壁畫一鷹西壁畫一鷂皆側首向簷外鳩鴿不敢復入其神妙如此顧光寶郡人善畫陸溉病風瘧久不療光寶嘗詣溉遂命筆圖一獅子像於户外云旦夕當有驗至夜聞窸窣之聲明日視獅子口有血淋漓溉病遂愈顔協吳人學書於同郡范懷約藝過其師荆楚碑碣皆其書懷約官至東宫侍書其書任已作制無大過人武帝謂其真書有力草行無功陸柬之郡人仁公子虞世南甥官著作郎少依舅氏臨書冠古無比𨽻行皆入妙品李嗣真云柬之學虞草體用筆則青於藍子彥逺傳父業授張旭旭即彥逺甥也張從申郡人善書世稱獨步擢第為祕書省正字後官長史弟從師從儀從約並工書皆得右軍風規人謂四絶孫虔禮字過庭郡人官胄曹工書至能品嘗著書論妙盡其趣即書譜也宋髙廟垂情藝文嘗謂此譜妙備草法手不少置石本惟禁中太清樓所刻最為精絶其子翔亦善書張旭草書入神品性嗜酒每大醉呌呼狂走乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼為張顛初為常熟尉有老人陳牒求判宿昔又來旭怒其煩責之老人曰觀公筆法竒妙欲以家藏耳旭因問所藏盡出其父書旭視之天下竒筆也盡其法旭自言始見公主擔夫爭道又聞鼓吹而得筆意觀公孫舞劔器得其神後人論書歐虞禇陸皆有異論至旭無非之者傳其法惟崔邈顔真卿云餘見宦迹條史維則字天問工八分飛白二篆在唐以八分名家者四人韓擇木蔡有鄰李潮與維則也厯翰林學士卒葬吳城下史懷則亦工書不減維則蓋維則昆弟也張璪一作藻字文通吳人唐開元間官至祠部員外郎善畫自撰繪境一篇言畫之要訣畢宏見而驚異之嘗手操雙管一為生枝一為枯枿而四時之行遂驅筆得之一時號為神品顧生大厯中以畫遊諸侯之門每畫先貼絹數十幅於地乃持墨汁及調諸彩色各貯一器使數十人吹角擊鼓齊聲喊呌生著錦襖錦纒頭飲酒半酣繞絹貼走十餘匝取墨汁攤寫絹上次寫諸色乃以長巾一頭覆於所寫之處使人坐壓已執巾角而曵之回環既遍然後以筆墨隨勢開決為峰巒島嶼之狀陸希聲得書法凡五字擫押鈎格抵又云用筆雙鈎則點畫尤徑謂之撥鐙法此法傳自二王陸以授沙門辨光辨光引薦遂至宰相餘見前傳紀朋郡人嘗授祕訣于隱士周廣觀人顔色便知疾深淺言之精詳不待候診周廣開元中召至京師有宫人每日昃則笑歌啼號若狂疾而足不能及地廣曰此必因食飽促力復仆於地而然飲以雲母湯令熟寐寐覺失所苦問之乃言太華公主誕三日宫中大陳歌吹此宫人主謳欲其聲清常食豚蹄羮遂飽當筵歌大曲曲罷覺胸中甚憒戲於砌臺乘髙而下未及半復為後來者所激因仆地比蘇即病狂自是足不能及地又有黃門自交廣使回拜舞殿下廣曰此人腹中有蛟龍明當産一子即不可活矣上驚問黃門有疾否對曰臣馳馬大庾嶺大熱而渴飲於路傍野水今腹中堅痞如石廣以消石雄黃煮飲之吐出物數寸其大如指鱗甲備具投之水俄頃數尺遽以苦酒沃之復如故形上驚異之欲授以官爵固請還吳中水部員外郎劉復作傳石荆山吳人善琴為獨孤及所重召與之遊荆山每操常以十合小豆為凖盡一升而移品姚兼濟吳人善琴得石荆山之傳在揚州逢異人授以琴操撫之果竒兼濟求學焉異人乃授以清風景雲等五調人以為廣陵散之遺音也羅塞翁隱之子為吳中從事善畫羊精妙卓絶滕昌祐字勝華工畫花鳥蟬蝶折枝生菜傅彩鮮澤宛有生意尤長於畫鵝先為吳人後遊蜀以文學從事初不婚宦志尚髙潔脫略時態李成吳人五代末以畫知名宋初衛融知陳州聞其名召之乃挈家而往丁德隅晉公謂之孫工篆書朱象先字景初吳江人善畫馳名元符間蘇軾跋其畫謂以其不求售故得之自然何充郡人能寫貌擅藝東南張涇郡人米芾稱其翎毛蘆鴈不俗毛松崑山人善畫花鳥四時之景子益乾道間畫院待詔益子允升景定中畫院待詔皆工花鳥能世家學吕彥直蘇州裱匠之子為三館胥駙馬王詵留門下使雙鈎書帖嘗摸黃庭一卷上用所刻勾德元圖書見米氏書史張炳炎咸淳中及第其父大理評事肖説嘗與徐南溪論琴得其所著琴書以遺俞琰故吳中有其傳陸友字友仁博雅好古工漢𨽻八分書尤能鑒辨鍾鼎銘刻法書名畫皆有精識嘗至都下虞集柯九思薦言于上未及用歸嘗著硯史墨史印史李世英字伯英長洲人精書學作韻類三十卷其義以字為本音為幹義訓為枝葉自一而二井井不紊凡十年而成書從子文仲又本説文作字鑑五篇辨點畫刋除舛謬以備一家之言干文傳黃溍為之序葛應雷字震父吳人攻於醫嘗著醫學會同二十卷推五運六氣之標本察隂陽升降之左右以定五臟六腑之虛實合經絡氣血之流注而知疾病之候死生之期處方制劑砭率與他醫異時按察判官李某中州名醫也因診父疾復咨於應雷聞其答父子相顧駭愕曰南方亦有此人邪乃盡出所藏劉守真張潔古書與之討論無不吻合而劉張之學行於江南者自此始由平江醫學教授升江浙官醫提舉子乾孫自有傳王履字安道崑山人學醫於丹溪朱彥修遂盡其術嘗謂張仲景傷寒為諸家祖後人雖多立論不出其籓籬且素問云人傷於寒為病熱言常而不言變仲景推寒熱之故履乃備常與變作傷寒立法考又謂諸病陽明篇無目疼少陽篇言胸脅滿而不言痛太隂篇無嗌乾厥隂篇無囊縮凡此必有脫簡以三百九十七法去其重復者僅二百三十八條乃合作傷寒三百九十七法極論內外傷經旨異同并中風中暑辨議名曰􅑴洄集共一卷標題原病式一卷百病鈎玄二十卷醫韻統一百卷履篤志於學博極羣書為文若詩皆精詣有法畫師夏圭行筆秀徑布置茂密評者謂作家士氣咸備元季遊華山作四十餘圖書紀遊詩其上至今藏好事家趙良仁字以德其先於宋有屬籍良仁少試吏憲司即棄去從丹溪朱彥修學醫治療多有竒效名動浙西東所著醫學宗旨金匱方衍義并丹溪藥要等書張氏據吳良仁挈家去浙後復來吳占籍長洲以髙夀終子友同自有傳黃公望字子久本常熟陸神童之弟出繼永嘉黃氏黃氏父年已九十始得之曰黃公望子久矣因而名字焉性聰敏博極羣書於技能無不通曉補浙西憲掾以忤權豪棄去黃冠野服往來三吳開三教堂於蘇之文德橋三教中人多執弟子禮晚愛杭之筲箕泉結菴其上將為終老計已而歸富春年八十六而終公望善畫山水初師董源巨然後稍變其法自成一家所著寫山水訣至今人多倣之宋克字仲溫長洲南宫里人少跌宕不羈好馳馬試劒究韜略將北走中原會道梗弗果家居以氣節自勵性抗直人有過輒面折之無少容與人論議據事析理期於必勝一旦厭事杜門謝客操觚染翰日費千紙遂以書名章草久不傳至克始得其法筆精墨妙可與古人並驅一時學者瀾倒然妙處終不似也洪武初同知鳳翔卒時有宋廣字昌裔者亦善草書與克頡頏人稱為二宋云趙原字善長吳人號丹林畫師董源甚得其骨格國初召天下畫士至京圖厯代功臣原以應對不稱旨坐死張觀字可觀嘉定人少遊江湖志尚古雅工畫山水師夏圭馬逺及見盛懋丁野夫而與吳仲圭遊故其筆力古徑無俗弱之氣尤善鑒古器物書畫嘗徙居華亭再徙嘉興洪武中還吳寓長洲之周莊卒史謹字公謹太倉人洪武中從戍雲南薦授應天府推官左遷湘隂丞罷謹性髙潔耽吟詠工繪事有獨醉亭集韓凝字復陽系出魏國忠獻王琦精于醫張氏入吳收引士類凝隱居不仕子二奕夷奕在隱逸傳夷字伯翼少失母凝命奕育之為後因名詒孫洪武中為郡醫學正科永樂二年從兄太醫院使奭言於上召授御醫改名夷字公逹賜第致和街繼升院判奕卒陳情得賜假歸葬仍給葬費永樂十一年扈駕北巡歸病不能朝上命中貴視疾遣人龜卜既沒歎悼賜葬祭視三品奭字公茂凝弟沖之子洪武末為燕府良醫正從文廟靖難升太醫院判進院使扈駕北巡永樂九年歸京卒亦用三品禮葬奭兄弟同時被遇仕皆通顯而奭子傳亦官御醫與奕子有有子充奕從子襄皆守世業劉觀字士賓長洲人世以醫顯父毅為燕府良醫後坐事謫戍沒永樂初追念邸臣召觀還擢御醫賜居第凡中外親藩貴戚及公卿近臣有疾多命往治尋升院判掌院事扈從北征歸卒子溥自有傳孫倫字宗序成化中為御醫盛寅字啓東吳江人少從王賔學醫永樂間治內侍蠱症有竒效名聞于上授御醫在上前持論梗梗上甚重之扈從北征洪熙初命掌太醫院賜勑褒嘉宣德中嘗應制賦瑞雪詩及嘗與同官奕於御藥房駕猝至不及屏因命終局且令賦觀奕詩明日有御製之賜弟宏字叔大與寅同馳名亦入為御醫景泰初治宫妃疾有效當進官不拜乞落其家籍詔許之尋乞致仕寅子僎孫愷俱以醫能世其家有劉育字德美其傳出自寅與李懋字思勉者成化間俱官至御醫沈以潛名玄以字行其先由汴徙吳髙宗親書良惠二字賜之祖伯新父日章皆有醫名以潛少孤能自刻勵宣德初徴入為醫士未甚知名會院判蔣用文病上遣中使問之曰卿即死誰可代者用文書以潛名進即擢為御醫進對稱旨上謂用文能知人以潛不負所舉以潛為人平易質重工詩好琴有集行世子寅孫熙守其業吳誠字誠伯常州人父可大徙家于吳以醫名誠世其業尤于傷寒著名自後有施宗文盛文繼者俱以傷寒著竒驗錢瑛字良玉世傳顱醫宣德中入太醫院寧陽侯孫生九月驚悸數啼而汗百方莫效瑛後至乃命坐兒于地使掬水為戲驚啼頓止人問之曰時當季春兒豐衣帷處不離懷抱其熱鬱安所泄邪使之近水則火邪殺得土氣則藏氣平故不藥而愈子恆愷悌愃世其業恆仕至太醫院判與愷尤有名又有陳公賢者其先為孟景暘館甥孟氏亦以顱鳴遂得其傳成化間公賢徴為醫士入御藥房用藥屢效授御醫進太醫院判致仕卒賜諭祭蓋吳下小兒醫稱錢氏陳氏云沈遇字公濟吳縣人號􅋯樵其先有肖鑑者宋咸淳中寫照有名遇善山水淺絳丹青種種能之晚工雪景永樂末嘗召見歸以髙年終謝晉字孔昭吳縣人號葵丘工畫山水重疊爛熳千幅不同尋丈之間不日而就亦能詩有蘭亭集蘇復字性初長洲人以貢為綿州知州作畫師盛懋後宦遊歸盡變舊習然不茍作終嵗不能脫一幀孔昭之速性初之遲各擅其所長同時有范暹陳復成化中有陳暹亦皆以畫得名馬軾字敬瞻嘉定人精於繪事與錢唐戴文進同馳名于京師時有李在謝庭循輩亦能畫然其筆法瀟灑則不逮軾正統己巳以天文生從征廣東謀畫占驗見用仕為刻漏博士子愈字抑之天順甲申進士能詩善書尤長於南詞樂府縱佚不羇官止刑部主事王敏字時勉仲光之從孫少孤貧從韓伯承盛啓東學醫名日起一婦人病血蠱衆治之不愈敏曰娠耳當得男投之安胎劑果得男海道總帥燕客飾伶人為女子佐酒無疾也敏視其頰頳面青羸而氣微促語帥曰火克金之兆也火令司天其殆矣明年六月嘔血死千户申志年近二十忽暝眩譫語體熱而咳衆以傷寒治敏曰痘也與升均湯而瘡出一人疽發背不起瘍醫言起則治矣敏曰是擊指脈即起亦不治衆劫以艾疽起如栗衆曰無傷矣竟三日死平日治士夫甚多不受其報王氏醫亦以保元氣為主敏與張頥同時敏年差少頥以瞽敏以瞶而皆有名于吳下附雜伎干將吳人與歐冶子同師莫邪干將之妻干將作劔米五之鐵精六合之金英候天伺地隂陽同光百神臨觀天氣下降而金鐵之精不銷干將不知其由莫邪曰子以善為劒聞於王王使作劔三月不成其有意乎干將曰吾不知其理也莫邪曰夫神物之化須人而成今夫子作劔得無得其人而後成乎干將曰昔吾師作冶金鐡之類不銷夫妻俱入冶爐中然後成物後世即山作冶麻經葌服然後敢鑄金於山今吾作劔不變化者其若斯邪莫邪曰師知爍身以成物吾何難哉於是干將妻乃斷髮剪爪投於爐中使童男童女三百人鼓橐裝炭金鐡乃濡遂以成劔陽曰干將隂曰莫邪陽作龜文隂作漫理干將匿其陽獻其隂闔閭甚重之會魯使季孫來闔閭使掌劔大夫以莫邪獻之季孫拔劔之鍔中缺者大如黍米歎曰美哉劔也雖上國之師何能加之夫劔之成也吳霸不缺則亡矣我雖好之其可受乎不受而去干將墓在匠門外東數里承平時人耕其旁忽有青蛇繞足其人驚遽以刀斷之其前半躍入草中不復見徐視其餘乃折劔一假至暮欲持歸亦忽失之歐冶子吳人善鑄劔一曰純鈎二曰湛盧三曰豪曹四曰魚腸五曰巨闕秦客薛燭善相劔越王取豪曹巨闕魚腸示之燭曰非寶劔也取純鈎示之燭曰光乎如芙蓉始生取湛盧示之曰善哉允常以湛盧獻吳公子光弒王僚湛盧乃去楚互見古迹吳市吏者公子光欲謀殺王僚未有可與議者乃命善相者為吳市吏伍子胥至吳被髮佯狂跣足垢面行乞於市市吏見之曰吾相人多矣未嘗見斯人也非異國之亡臣乎遂與俱見王僚公孫聖吳王夫差時人夫差興兵將與齊戰道出胥門假寐於姑胥之臺夢入章明宫見兩䥶蒸而不炊兩黑犬嗥以南嗥以北兩鋘殖宫墻流水湯湯越其宫堂後房鼓震篋篋有煆工前園橫生梧桐命大宰嚭占之嚭曰美哉王之伐齊也章者德鏘鏘也明者破敵聲聞昭明也兩䥶蒸而不炊者聖德氣有餘也兩黑犬嗥以南嗥以北者四海服朝諸侯也兩鋘殖宫牆者農夫就成田夫耕也流水湯湯越宫堂者鄰國貢獻財有餘也後房篋篋鼓震有煆工者宫女悅樂琴瑟和也前園橫生梧桐者樂府鼓聲也吳王大悅而心不已復召王孫駱問之駱曰臣鄙淺不能占東掖門亭長長城公弟公孫聖多見博觀知鬼神之情狀願王問之王乃召公孫聖聖伏地而泣其妻謂曰子何性鄙今王急召乃涕泣乎聖曰悲哉非子所知今日壬午時加南方命屬上天不得逃亡非但自哀誠傷吳王吾受道十年隱身避害欲紹夀命不意急召中世自棄故悲與子相離耳遂詣姑胥臺吳王告其夢聖曰臣不言身名全言之必死於王前臣聞章者戰不勝敗走慞偟也明者去昭昭就𡨕𡨕也入門見䥶蒸而不炊者不得火食也兩黑犬嗥以南嗥以北黑者隂也北者匿也兩鋘殖宫墻者越軍入吳伐宗廟掘社稷也流水湯湯越宫堂者宫室墟也後房鼓震篋篋者坐太息也前園橫生梧桐者梧桐心空不為用器但為肓僮與死人俱葬也願大王按兵修德遣下吏肉袒徒跣稽首謝於勾踐國可安存身可不死吳王怒曰吾天之所生神之所使顧力士石番以鐡鎚擊殺之姚光吳人有火術吳王臨試之積薪數千束裹之因猛風而燔薪盡光端坐灰中振衣而起把一卷書吳王視其書不能解也趙逹吳人或曰河南人少從漢侍中單甫學九宫之術能應機立成問對若神至計飛蝗射無不中或難曰飛者固不可校此殆妄耳逹使其人取小豆數斗播之席上立知其數嘗過故知為之具食且曰倉卒乏酒又無嘉殽逹取盤中隻箸再三縱橫之乃言卿東壁下有美酒一斛鹿肉三斤何以辭無酒殽主者笑曰以卿善射特相試耳又書簡上作千萬數著空倉中封之令逹算之逹云其數有名無實其精微如此吳主孫權吳太平二年長沙大飢殺人不可勝數孫權使逹占之曰天地川澤相通如人四體鼻衄灸腳而愈今餘干水口暴起一洲形如鱉食彼郡風氣可祠而掘之權乃遣人祭以太牢斷其背長沙飢遂止逹死權究其術祕不出發棺求之竟無所得吳泰能筮會稽盧氏失博山香爐使筮之泰曰此物質雖為金其象實山有樹非林有孔非泉闔閭晨興見發青煙此香爐也語其處求得之禇胤郡人年七嵗善棊及長冠絶當代父榮期與臧質同逆胤從誅何尚之謂胤之奕妙冠古今因父受戮特痛惜之禇思莊以善奕名世琅琊王抗第一品思莊與會稽夏赤松第二品夏思速善於大行思莊思遲巧於鬬宋文帝時羊玄保為會稽帝遣思莊與玄保戲因製局圖還於帝前覆之齊髙帝使思莊與王抗對奕自食時至暮一局始竟上倦遣還省至五更方決抗睡於局後思莊逹旦不寐思莊所以品第致髙緣其用思深久人不能當二人並官給事中楊惠之初與吳道子同師學畫見道子藝成惠之耻焉更為望工遂為天下第一手故中原多其手制山水之壁為崑山慧聚寺毗沙門天王像形模如生其傍二侍女尤佳徐林嘗記其像謂得望工三昧戒後人不可妄加修飾後果為俗工修治遂失初意席謙郡人梓州肅明觀道士善棊杜甫詩云席謙不見近彈棊朱景環算術精妙設肆盤門驛貞明中廣陵王錢元璙鎮吳環上書云到任當三十年安寧元璙未信命焚之至天福辛丑記其事召問之景環曰曩固言矣及期薨時有顔規本郡之五工也王嘗召景環問遁甲事規解五便廳熟聞之他日質於景環遂精其術王嘗欲享廟規上書言翌日利五鼓之前如寅時則杜門在南不可出入不聽果寅時王車出南門鎖鑰壞又不能啓遂破鑰而出由是知其神驗乃以為軍師張珙妙於刋鑱趙竦為兩浙漕日以重定王會圖方一尺有半字如蠅頭而體製精楷俾珙刋之三年而成僧妙應俗姓童氏淳熙中居龍興寺嘗模廬山王瀚須菩提像於寺中其隂作五百尊者筆法竒古又於虎丘作石觀音像亦佳祝庶幾郡人通象緯之學纍赴鄉舉不中第景德中求試所習以為司天靈臺郎李珣吳人善律厯紹聖二年曽肇為滁州守命珣為漏壺以順晝夜時咸則之丁真一吳郡道士善製墨面云玄中子王惟清製墨面云淨名齋幕云姑蘇山人王惟清又二品襄陽米元章家所造胡舜申紹興間自績溪徙于吳通風土隂陽之術世所傳江西地里新法出於舜申嘗行郡四郭而相之以為蛇門不當塞作吳門忠告一篇文載城池條范疇字復初本金華人嘗為洞霄宫道士得江西張九牛蓍易之占神妙莫測杭有無藉子胡婆夀負罪而逃官督捕嚴捕者即疇求筮爻成疇曰可於北方樹木中得之如言迹至臨平果獲於空楊樹中遂繫獄後會赦出欲報疇持刀晨叩疇門紿以卜欲賺出殺之疇決以占知其將不利於已隔門謂之曰欲問卜可擲下手中刀胡聞之駭服猶以刃畫其門而去疇由是來蘇避之寓乘魚橋設肆疑者來問莫不神驗朱圭字伯盛崑山人師吳睿大小篆尤善摹刻嘗取王厚之趙孟俯吾衍三家印章譜説并睿與已所製印文篆例為書曰文集考又有名迹録即圭素所刻名文也性孤潔不娶而終袁遇昌居吳縣木瀆善望化生摩睺羅每摶埴一對價三數十緡其衣襞腦按之蠕動遇昌不傳其子藝遂絶互見土産王某者郡中漆匠也至正間嘗以牛皮製一舟內外飾以漆解卸作數節載至上都遊漾灤河中可容二十人上都之人未嘗識舟觀者異之又嘗奉旨造渾天儀可以折疊便於收藏其巧思出人意表遂命為管匠提舉姑蘇志卷五十六
