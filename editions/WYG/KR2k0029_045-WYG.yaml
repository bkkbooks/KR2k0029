body:
  text: 姑蘇志卷四十六明王鏊撰人物四張温字惠恕吳縣人少脩節操容貌竒偉權聞之以問公卿曰温當今與誰爲比劉基曰可與全琮爲輩顧雝曰温今無輩徵到延見文辭占對觀者傾竦權改容加禮罷出張昭執其手曰老夫託意君宜明之拜議郎選曹尚書徙太子太傅甚見信重時年三十二以輔義中郎將使蜀權謂温曰卿不宜逺出恐諸葛孔明不知吾所以與曹氏通意以故屈卿行温對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子産陳事之効然諸葛亮達見計數必知神慮屈伸之宜推亮心必無疑貳温至蜀拜章曰昔高宗以諒闇昌殷祚於再興成王以㓜沖隆周德於太平今陛下以聰明之􅐾等契往古總百揆於良佐參列精之炳燿遐邇望風莫不欣賴吳國勤任依力清澄江滸願與有道平一宇内委心協規有如河水軍事興煩使役乏少是以忍鄙倍之羞使下臣温通致情好蜀人甚貴其才還使入豫章部伍出兵權銜温稱美蜀政又嫌其聲名太盛恐終不爲己用思中傷之初温引致同郡暨豔以爲選曹郎至尚書豔性狷厲好爲清議見時郎署淆雜多非其人欲臧否區别賢愚異貫彈射百僚覈選三署率皆貶高就下降損數等其守故者十未能一其居位貪鄙志節汙卑者皆以爲軍吏置營府以處之由是怨憤交積浸潤譖行競言豔及選曹郎徐彪字仲虞廣陵人專用私情愛憎不由公理豔彪皆坐自殺温既宿與豔彪同意數交書問權因此爲温罪幽之斥還本郡以給厮吏後病卒二弟祗白亦有才名與温俱廢温未廢時餘姚虞俊歎曰張惠恕才多智少華而少實怨之所聚有覆家之禍吾見其兆矣諸葛亮聞之未之信及温放黜乃歎其先見亮初聞温敗未知其故思之數日曰吾得之矣其人於清濁善惡太分明耳張儼字子節弱冠知名博聞多識緯文經武姿亮𢎞服年十一族人温曰卿吾家顔子也拜大鴻臚寶鼎中使于晉孫皓謂曰今南北通好以君有出境之才故相屈行對曰皇皇者華臣蒙其榮懼古人延譽之美磨厲鋒鐔思不辱命既至晉賈充裴秀荀朂等欲傲以所不知皆不能屈羊祜何禎並結縞帶之好道病卒子勃翰勃撰吳録三十卷勃子固有父風翰在文苑傳張敦一作惇又作訓字叔方德量淵懿清虚淡泊善文辭爲海昏令甚有惠化子純字元基有清才與同郡張儼朱異俱童少往見朱據據聞三人才名試之曰今三賢屈顧其爲吾各賦一物然後乃坐夫騕褭以迅驟爲功鷹隼以輕疾爲妙何必積思純賦席曰席以冬設簟爲夏施揖遜而坐君子攸宜儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛異賦弩曰南嶽之幹鐘山之銅應機命中射隼高墉純尤厲操行學博才秀容止可觀拜郎中爲廣德令治有異績擢太子輔義都尉赤烏十三年廢太子和純盡言極諫權幽殺之張慿字長宗祖鎮太安中除蒼梧太守討王含有功封興道縣侯慿年數歲鎮謂其父曰我不如汝有佳兒慿曰阿翁詎宜以子戯父及長有志氣敏而有文爲鄉閭所稱舉孝廉試策高等慿負才自謂必參時彦欲詣丹陽尹劉惔衆共笑之既至惔處之下坐神意不接慿欲自發而無端會王濛就惔清言有所不通慿於末坐判之言㫖深逺足暢彼我之懷一坐皆驚惔延之上坐清言彌日留宿至旦遣之慿既還船須㬰惔遣傳敎覔張孝廉船便召與同載言之於簡文帝帝召與語歎曰張慿勃窣爲理窟即用爲太常博士官至吏部郎御史中丞司徒長史有文集十卷張澄字國明晉光禄大夫本郡太守善正書當葬父郭璞爲占葬地曰葬某處年過百歲位至三司而子孫不蕃某處年減半位止於卿而子孫貴顯澄乃葬其劣處位果止光禄年六十四而其後遂昌澄子彭祖在藝苑傳彭祖子敞敞晉侍御史度支尚書吳國内史桓𤣥簒位敞以事忤𤣥表獻忠款官至龍驤將軍子裕裕字茂度爲何無忌鎮南參軍出補晉安太守盧循陷江州裕及建安太守孫蚪之並受其符書供其調役循走俱坐免官復以爲始興相郡經冦廨宇焚燒民物凋散裕剏立城寺弔死撫傷收集離散徵爲太尉參軍尋轉主簿揚州中從事累遷别駕武帝伐劉毅關洛皆居守留任州事出爲都督廣州刺史平越中郎將綏靜百越嶺外安之除廷尉轉尚書吏部郎騎都尉元嘉元年爲侍中都督益州刺史七年爲廷尉加奉車都尉領本州中正入爲五兵尚書又徙太常以脚疾出爲義興太守徵爲都官尚書加散騎常侍固辭就拜光祿大夫加金章紫綬裕内足於財自絶人事經始本縣之華山以爲居止優㳺野澤十八年除會稽太守職事甚理明年卒官諡恭子子演鏡永辯岱俱知名時謂之張氏五龍演仕至太子中舍人子緒緒字思曼少知名清簡寡欲從伯敷及叔父鏡並貴異之鏡比之樂廣敷云是我輩人孝武帝用爲尚書倉部郎都令史諮詳郡縣米事蕭然直視不以經懷爲州治中黄門郎明帝見之輒歎其清談袁粲言於帝曰緒有正始遺風宜爲宫職復轉中庶子領翊軍校尉轉散騎常侍領長水校尉尋兼侍中遷吏部郎參掌大選元徽初東宫官罷選曹擬舍人王儉爲格外記室緒以儉人地兼美宜轉祕書丞從之緒又遷侍中嘗私謂客曰一生不解作諾有以告袁粲禇淵者由是出爲吳郡太守緒不知也昇明二年遷太子太傅長史加征虜將軍齊臺建轉散騎常侍世子詹事建元元年轉中書令緒善談元深見敬異王儉嘗云緒過江所未有北士可求之耳不知陳仲弓黃叔度能過之否時帝欲用緒爲右僕射以問儉儉曰緒少有清望誠美選也但南士由來少居此職禇淵曰儉少年未憶耳江左用陸玩顧和皆南人也儉曰晉氏衰政不可爲則緒諸子皆輕俠中子充又不護細行儉又以爲言乃止及立國學以緒爲太常卿領國子祭酒以王延之代緒爲中書令何㸃歎曰晉以子敬季琰爲此職今以王延之張緒爲之可謂清官後接之者實爲未易緒長於周易言精理奥見宗一時常云何平叔不解易中七事武帝即位轉吏部尚書祭酒如故永明元年遷金紫光禄大夫明年領南郡王師加給事中三年轉太子詹事師緒每朝見武帝目送之謂王儉曰緒以位尊我我以德貴緒遷散騎常侍金紫光祿大夫師如故給親信二十人復領中正長沙王晃屬選吳郡聞人邕爲州議曹緒以資籍不當執不許晃固請之緒正色謂晃信曰此是身家州鄉殿下何得見逼乃止緒吐納風流聽之皆忘饑疲見者肅然如在宗廟雖終日與居莫能測焉劉悛之爲益州獻蜀栁數株枝條甚長狀若絲縷時舊宫芳林苑始成武帝以植於太昌靈和殿前常賞玩咨嗟曰此楊栁風流可愛似張緒當年時其見愛如此王儉爲尚書令丹陽尹諸令史善俯仰進止可觀儉問曰經誰共事答云十餘歲在張令門下七年竟陵王子良領國子祭酒武帝敕王晏曰吾欲令司徒辭祭酒以授張緒物議以爲如何以緒領國子祭酒緒口不言利有財輒散之清談端坐或竟日無食門生見緒饑爲之辦飱然未嘗求也死之日無宅以殯遺命凶事不設栁翣止以蘆葭轜車引柩靈上置盃水香火不設祭從弟融敬緒事之如親兄齎酒於靈前酌飲慟哭曰阿兄風流頓盡追贈散騎常侍特進金紫光禄大夫諡簡子子完宋後廢帝時爲正員郎險行見寵坐廢銅完弟允永明中安西功曹淫通殺人伏法允兄充知名充字延符少好逸㳺緒嘗告歸至吳始入西郭逢充獵右臂鷹左牽狗遇緒船便放紲脫鞲拜於水次緒曰一身兩役無乃勞乎充跪曰充聞三十而立今充二十九矣請至來歲緒曰過而能改顔氏子有焉及明年便脩改多所該通尤明老易能清言與從叔稷俱有令譽起家撫軍行參軍遷太子舍人尚書殿中郎武陵王友時王儉當朝用事齊武帝皆取決焉儉方聚親賓充縠巾葛帔至便求酒言論放逸一坐盡傾武帝欲以緒爲尚書僕射儉執不可充以爲愠與儉書盛自標高致儉以爲脫畧弗之重仍以書示緒杖之一百又爲到撝所奏免官禁錮沈約見其書歎曰充始爲之敗終爲之成久之爲司徒諮議參軍與王思逺陸慧曉等同爲司徒竟陵王賓客入爲中書侍郎尋轉給事黃門侍郎明帝作相以爲鎮軍長史出爲義興太守爲政清靜民吏便之尋以母憂去職服闋除太子中庶子遷侍中義師近次東昏召百官入宫省朝士慮􅍔或往來酣宴充獨居侍中省不出閤城内既害東昏百官集酉鐘下召充不至武帝霸府建以充爲大司馬諮議參軍遷梁王國郎中令祠部尚書領屯騎校尉轉冠軍將軍司徒左長史天監初除太常卿尋遷吏部尚書居選稱爲平允俄爲散騎常侍雲麾將軍除晉陵太守徵拜散騎常侍國子祭酒充長於義理登堂講說皇太子以下皆至時王侯多在學執經以拜充朝服而立不敢當也轉左衞將軍祭酒如故入爲尚書僕射頃之除雲麾將軍吳郡太守下車䘏貧老故舊莫不欣恱以疾自陳徵爲散騎常侍金紫光祿大夫未及還朝三年卒于吳詔贈侍中護軍將軍謚穆子子最嗣鏡少與顔延之鄰居延之常談議飲酒喧呼不絶而鏡靜黙無言聲後鏡與客談延之從籬邊聞之取胡牀坐聽辭義清𤣥延之心服謂客曰彼有人焉由是不復酣呌仕至新安太守演鏡於兄弟中名最高永字景雲爲尚書中兵郎尚書中條制繁雜元嘉十八年欲加修撰徙永爲刪定郎永渉獵書史能爲文章善𨽻書騎射雜藝觸𩔖兼善又有巧思益爲文帝所知紙墨皆自營造上每得永表啓輒執玩咨嗟自歎供御者不及也造華林園𤣥武湖並使永監統凡所制置皆受則於永徙爲江夏王義恭太尉中兵參軍越騎校尉振武將軍廣陵南沛二郡太守永既有才能每盡心力文帝謂堪爲將二十九年以永爲揚威將軍冀州刺史加都督王𤣥謨申坦等諸將經畧河南進攻碻磝城累旬不拔爲魏軍所殺甚衆永即夜撤圍退軍不報告諸將衆軍驚擾爲魏所乗死敗塗地永及申坦並爲統府撫軍將軍蕭思話所收繫於歴城獄文帝以屢征無功諸將不可任詔責永等與思話三十年元凶弑立起永爲輔國將軍青州刺史及司空南譙王義宣起義又版永爲冀州刺史加都督永遣司馬崔勲之中兵參軍劉宣則二軍馳赴國難事平召爲江夏王義恭大司馬從事中郎領中兵孝建元年臧質反遣永輔武昌王渾鎮京口明年召爲尚書左丞大明元年遷黄門侍郎尋領虎賁中郎將本郡中正累遷廷尉上謂曰卿既與釋之同姓欲使天下無復寃人永曉音律大極殿前鐘聲嘶孝武問永永答鐘有銅滓乃扣鐘求其處鑿而去之聲遂清越加寧朔將軍尚書吏部郎司徒右長史尋陽王子房冠軍長史四年立明堂以本官兼將作大匠遷太子右衞率八年上寵子新安王子鸞爲南徐州刺史割吳郡屬之以永爲别駕從事史召爲御史中丞永光元年出爲吳興太守遷度支尚書明帝即位四方反叛復爲吳興太守加冠軍將軍假節未拜以將軍假節徙爲吳郡太守率軍東討又爲青冀二州刺史監四州諸軍事統諸將討薛安都累戰尅捷破薛索兒又遷鎮軍將軍尋爲南兖州刺史加都督時安都據彭城請降而誠心不款明帝遣永與沈攸之重兵迎之加督前鋒諸軍事進軍彭城安都招引魏兵既至永狼狽引軍還爲魏軍追大敗復遇寒雪士卒離散永脚指斷落僅以身免失其第四子三年徙都督會稽東陽臨海永嘉新安五郡諸軍事會稽太守將軍如故以北討失律固求自貶降號左將軍永痛悼所失之子服除猶立靈坐飲食衣服待之如生每出行常别具名車好馬號曰侍從有事輒語左右報郎君知也以破薛索兒功封孝昌縣侯在會稽賓客有謝方童阮須何達之等竊其權賦貨盈積方童等坐下獄死永又降號冠軍將軍四年遷太子詹事加散騎常侍本州大中正六年又加護軍將軍領石頭戍事給皷吹一部七年遷金紫光禄大夫尋領䕶軍後廢帝即位進右光禄大夫加侍中領安成王師加親信二十人又領本州中正出爲吳郡太守侍中右光禄如故元徽二年爲征北將軍南兖州刺史加都督永少便驅馳志在宣力爲將帥能與士卒同甘苦朝廷給賜脯餼必棊坐齊割手自頒賜年雖老志氣未衰優㳺間任意甚不樂及有此授喜恱非常即日命駕還都未之鎮遇桂陽王休範作亂永率所領屯白下休範至新亭前鋒攻南掖門永遣人覘賊既及唱言臺城陷永衆潰棄軍還以舊臣不加罪止免官削爵愧發病卒子瓌稷瓌字祖逸仕宋累遷桂陽内史不欲前兄瑋處禄自免不拜後爲司徒右長史齊書云瓌解褐江夏王太尉行參軍署外兵隨有轉爲太傅五官遷太子舍人中書郎驃騎從事中郎司徒右長史永拒桂陽王休範於白下敗績阮佃夫等欲加罪蕭道成固申明之瓌由此感恩自結後遭親喪還吳持服昇明元年劉表與袁粲謀誅道成表弟遐爲吳郡潛相影響因沈攸之之難聚衆三千人治攻具道成密遣殿中將軍卞白龍令瓌取遐諸張世有豪氣瓌宅中有父舊部曲數百遐召瓌委以軍事瓌僞受命與叔恕領兵入郡取遐遐逾窓走瓌部曲顧憲子斬之郡内莫敢動者道成授瓌吳郡太守封義城縣侯從弟融與瓌書曰吳郡何晩何須王反間之嗟驚乃是阿兄瓌引顧暠陸聞爲綱紀後皆立名除冠軍將軍東海東莞二郡太守不拜建元元年改封平都侯遷侍中高帝嘗謂曰卿雖我臣我親卿不異頥嶷等時集書每兼門下東省實多清貧有不識者呼爲散騎二年遷都官尚書領校尉如故出爲征虜將軍吳興太守瓌以既有國秩不取郡奉高帝敕上庫别藏其奉以表其清三年坐不糾屬邑令免官明年爲度支尚書武帝即位爲冠軍將軍鄱陽王北中郎長史襄陽相行雍州府州事隨府轉征虜長史四年仍為持節督雍梁南北秦四州郢州之竟陵司州之隨郡軍事輔國將軍雍州刺史尋領寧蠻校尉加都督徵拜左民尚書加右軍將軍還後安陸王􅒺臨雍州行部有野老來乞􅒺問何不事産而行乞邪答曰張使君臨州理物百姓家相保後人政嚴故至行乞十年轉太常陳疾願閒明年轉散騎常侍光禄大夫頃之復爲後將軍轉東海太守行南徐州府州事又行河東王國事到官復稱疾還為散騎常侍光禄大夫鬱林即位加金章紫綬隆昌元年給親信二十人鬱林廢朝臣到宫門參承高宗瓌托脚疾不下海陵立加各將軍高宗起兵以瓌鎮石頭督衆軍事瓌見朝廷多難遂恒卧疾建武元年轉給事中光禄大夫親信如故月加給錢二年虜盛詔瓌以本官假節督廣陵諸軍事行南兖州事虜退乞還建武末屢求還吳居室豪富妓妾盈房或譏其年衰畜妓瓌曰我少好音律老而方解平生嗜欲無復一存唯未能遣此耳明帝疾甚授平東將軍吳郡太守以備王敬則及敬則反瓌棄郡逃人間事平還郡為有司奏免官削爵詳平亂條永元初為光禄大夫尋加前將軍金章紫綬三年義師下東昏假瓌節戍石頭義師至新亭瓌棄城走還宫梁天監元年拜給事中右光禄大夫以脚疾拜於家四年卒瓌有子十二人常云中應有好者率知名率字士簡十二能屬文常限日為詩一篇稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率一旦焚毁更為詩示焉託云沈約訥便句句嗟稱率曰此吾作也訥慙而退時陸少𤣥家有父澄書萬餘卷率與少𤣥善遂盡通書籍起家著作佐郎建武三年舉秀才除太子舍人與陸倕陸厥同載詣沈約遇任昉在焉約謂昉曰此二子皆南金也卿可識之由此與昉善久之除太子洗馬蕭衍引為相國主簿天監初遷司徒謝朏掾直文德待詔省勑使抄乙部書又使撰古婦人事寫給後宫率取假歸論者謂為傲世率懼乃為待詔賦奏之手勑答曰相如工而不敏枚臯速而不工卿可謂兼之矣又侍宴賦詩武帝别賜率詩有曰東南有才子得人今為盛率奏詩往反六首其年遷祕書丞引至玉衡殿謂曰卿東南物望且宰相不從天下不由地出卿若復以禮律為意便是其人祕書丞天下清官今以相處為卿定名譽四年禊飲華光殿河南國獻赤龍駒詔率與到溉周興嗣為賦帝以率及興嗣為工以父憂去職父妓數十人邑子顧玩之求聘謳者不願出家為尼嘗因齋會率宅玩之乃飛書言與率姦南司以聞帝惜其才寢其奏然猶致時論服闋久之除中權建安王中記室參軍俄直壽光省脩丙丁部書鈔八年晉安王戍石頭以為雲麾中記室王遷南兖州轉宣毅諮議參軍並兼記室王還都除中書侍郎十三年王為荆州復以為晉安王宣惠諮議領江陵府遷江州以諮議領記室出監豫章臨川郡率在府十年恩禮甚篤還除太子僕射累遷招逺將軍司徒右長史揚州别駕雖歴職務未嘗留心簿領俄遷太子家令與陸倕劉孝綽對掌東宫管記遷黃門侍郎出為新安太守大通元年卒年五十三昭明太子遣使贈賻與晉安王令曰近張新安故其人才筆宏雅亦足嗟惜率嗜酒不事於家務尤忘懷在新安遣家僮載米三千石耗大半率問其故答曰雀鼠耗率笑曰壯哉雀鼠竟不研問自少屬文七畧及藝文志所載詩賦亡者並補作之所著文衡十五卷文集四十卷行於世子長公梁簡文開文德省置學士與庾信徐陵等充之率弟盾盾字士宣以謹重稱為無錫令遇刼問刼何須刼以刀斫其頰盾曰咄咄不易餘無所言於是生資皆盡不以介懐為湘東王記室出監富陽令廓然獨處無所用心身死之日家無遺財唯有文書千餘卷酒米數甕而已稷字公喬㓜有孝性生母劉遘疾稷年十一侍養衣不解帶或終夜不寢及終毁瘠杖而後起見年輩㓜童輒哽咽泣淚州里謂之淳孝兄瑋善彈筝稷以劉氏先執此伎聞瑋為清調便悲感頓絶遂終身不聽之父永及嫡母丘相繼殂六年廬於墓側除驃騎法曹行參軍遷外兵參軍齊永明中為豫章王嶷主簿見禮未嘗呼名每喚為張五以貧求為剡令不視事多為小山逰會山賊唐㝢之作亂稷率部人保全縣境生母先𦵏琅邪建武中改申𦵏禮賻助委積時不拒絶事畢還之自㓜及長常設劉氏神坐出告反面如事生焉為本州治中明帝領牧仍為别駕時魏冦壽春以寧朔將軍軍主副沈文季鎮豫州魏衆稱百萬圍城經畧處分文季悉以委稷軍退遷西司馬寧朔將軍南平内史魏又冦雍州詔以本號都督荆雍諸軍事時雍州刺史曹武度樊城岸以稷知州事魏師退稷還荆州授給事中黃門侍郎復為司馬新興永寧二郡太守郡犯私諱改永寧為長寧永元末徵為侍中宿衞宫城梁武至兼衞尉江淹出奔稷兼衞尉卿副王瑩都督城内諸軍事時東昏淫虐王珍國就稷謀及使張齊行弑于含德殿稷召王亮等列殿前西鐘下議遣范雲裴長穆等使石頭城詣武帝以稷為侍中左衞將軍遷大司馬左司馬入梁為散騎常侍中書令封江安縣侯南史云縣子又為侍中國子祭酒領驍騎將軍遷䕶軍將軍揚州大中正以本職知領軍事尋遷領軍將軍中正侯如故時魏冦青州詔假節行州事魏軍退仍出為散騎常侍將軍吳興太守下車存問遺老引其子孫置之右職政稱寛恕進號雲麾將軍徵尚書左僕射帝將幸稷宅以盛暑留幸僕射省舊臨幸供具皆酬太官饌直帝以稷清貧手詔不受宋時武帝造永室至稷三世並降萬乗論者榮之稷雖居朝右每慙口實乃名其子伊字懷尹霍字希光畯字農人同字不見見字不同以旌其志出為青冀二州刺史進號鎮北將軍鬱州接邊陲多與魏人交市及朐山叛或與魏通恒不自安稷禁防寛弛僚友頗致侵擾州人徐道角等夜襲州城害稷時年六十三有司奏削爵土稷性明烈善與人交歴官無畜聚奉禄皆頒之親故家無嬴財初去吳興就僕射徵道由吳鄉候稷者滿水陸稷單裝徑還都下人莫之識長女楚媛適會稽孔氏無子歸宗至逢稷見害女以身蔽刃先父卒稷與族兄充等俱知名時稱充融卷稷爲四張卷字令逺少以和理著稱能清言位都官尚書天監初卒稷子嵊在忠義傳寶積建武中為廬陵太守時名流謝瀹何㸃陸慧曉孔珪至融弟鐵之舍㸃造坐便曰今日可謂盛集二五我兄弟之流阿六張氏保家之子二五謂孔珪及融并弟五也寶積永元中為湘州行事乗腰輿詣蕭穎胄舉動自若穎冑聞何至之晩答曰本朝危亂四海橫流既不能為比干之死實未􅃘為微子之去是以至晩穎胄深以為善即用為相府諮議後位御史中丞辯事文帝亦見任遇歴尚書吏部郎廣州刺史大司農孫種種字士苖祖辯宋司空右長史廣州刺史父略梁太子中庶子臨海太守種少恬靜居處雅正不妄交逰傍無造請時人為之語曰宋稱敷演梁則卷充清虚學尚種有其風仕梁王府法曹遷外兵參軍年四十餘家貧求為始豐令武陵王紀為益州刺史重選府僚以種為征西東曹掾種辭以母老坐免侯景之亂奉母東奔久之得達鄉里母卒種時五十毁瘠過甚又迫以兇荒未獲時𦵏服制雖畢而居處飲食恒若在喪及景平王僧辯奏起為貞威將軍治中從事史并為具𦵏𦵏訖種方即吉時天下喪亂皆不能終三年喪惟種及會稽孔奐在冦亂中守法度並以孝聞僧辯又以種年老傍無𦙍嗣賜之以妾及居處之具貞陽侯僣位除廷尉卿太子中庶子敬帝即位為散騎常侍遷御史中丞領前軍將軍陳武帝受禪為太府卿天嘉元年除左民尚書二年權監吳郡尋徵復本職遷侍中領歩兵校尉以公事免白衣兼太常卿俄而即真廢帝即位加領右軍將軍未拜領𢎞善宫衞尉又領揚東揚二州大中正高帝即位重為都官尚書領左驍騎將軍遷中書令驍騎中正並如故以疾授金紫光祿大夫種深沈虚靜識量宏博時皆以為宰相之器僕射徐陵嘗抗表讓位於種曰臣種器懷沈密文史優裕東南貴秀朝廷親賢克壯其猷宜居左執大建五年卒贈特進諡元子種仁恕寡欲雖歴顯位而家産屢空終日晏然不以為病大建初女為始興王妃以居處僻陋特賜宅一區又累賜無錫嘉興縣侯秩嘗於無錫見重囚在獄天寒呼出暴日遂失之世祖大笑而不深責有集十四卷種弟稜亦清淨有識度官至司徒左長史大建十一年卒贈光祿大夫種族子稚才齊䕶軍沖之孫少孤介特立仕為尚書金部郎中遷右丞建康令太府卿揚州别駕從事史兼散騎常侍使周還遷司農廷尉卿所歴並以清白稱岱字景山州辟從事累遷南平王右軍主簿尚書水部郎出補東遷令隨王誕於會稽起義以岱為建威將軍輔國長史行縣事事平為司徒左西曹掾母年八十籍注未滿岱便去官還養有司將糾舉宋孝武曰觀過知仁不須按也累遷撫軍諮議參軍領山隂令職事間理巴陵王休若為北徐州未親政事以岱為冠軍諮議參軍後臨海王豫章王晉安王岱歴為三府諮議三王行事與典籖主帥共事事舉而情得或謂岱曰主王既㓜執事多門而毎能緝和云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔吝之事無由而及明闇短長更是才用多少耳入為黃門郎遷驃騎長史領廣陵太守徐州别駕總刺史之任累遷吏部郎明帝初除使持節督西豫州諸軍事輔國將軍西豫州刺史尋徙為冠軍將軍北徐州刺史都督北討諸軍事並不之官泰始末為吳興太守元徽中遷使持節督益寧二州軍事冠軍將軍益州刺史數年益土安其政徵侍中領長水校尉度支尚書領右軍遷吏部尚書王儉為吏部郎時專斷曹事岱毎相違執及儉為宰相以此頗不相善兄子瓌弟恕誅吳郡太守劉遐齊高帝欲以恕為晉陵郡岱曰恕未聞從政美錦不宜濫裁高帝曰恕為人我所悉又與瓌同勲自應有賞岱曰若以家貧賜禄此所不論語功推事臣門之恥加散騎常侍建元元年詔序朝臣欲以右僕射擬岱禇淵謂過優詔更量出為吳郡太守高帝知岱歴任清直至郡未㡬手敕曰大郡任重乃未欲回換但總戎務殷宜須望實今用卿為䕶軍加給事中岱拜竟詔以家為府陳疾明年遷金紫光禄大夫領鄱陽王師武帝即位復以為散騎常侍吳興太守以寛恕著名遷使持節監南兖青冀五州諸軍事卒年七十一諡貞子張邵字茂宗裕之弟也初為晉琅琊内史王誕龍驤府功曹桓𤣥徙廣州親故皆離棄唯邵情禮彌謹流涕追送時冦亂年饑邵又資饋其妻子及劉裕討𤣥邵白父忠欸王謐為揚州召邵補主簿劉毅位居亞相好士愛才當世輻湊唯邵不往親故問之邵曰主公命世人傑何煩多問劉穆之言於帝帝益親之轉太尉參軍署長流賊曹盧循至蔡州武帝至石頭使邵守南城時百姓水際望賊帝不解其意以問邵邵曰節鉞未反奔散之不暇亦何暇觀望今當無復恐耳帝以邵勤練憂公重補州主簿邵悉心政事精力絶人及誅劉藩邵時在西州直廬即夜誡衆曹曰大軍當大討可各條倉庫及舟船人領至曉取辦旦日帝索諸簿應時即至怪其速諸曹答曰宿受張主簿取分帝曰張邵可謂同人憂慮矣九年始開征虜府以邵補録事參軍轉號中軍遷諮議將軍領記室十二年武帝北伐邵請見曰人生危脆宜有逺慮若劉穆之邂逅不幸誰可代之尊業如此若有不諱則處分云何帝曰此乃委穆之與卿耳檀祗鎮廣陵輒率衆至滁中掩討亾命劉穆之慮其為變議欲遣軍邵曰檀韶據中流道濟為軍首若有相疑之迹則大府立危不如逆遣尉勞必無患也祗果不動及穆之暴卒朝廷恇懼便發詔以徐羨之代邵獨曰今誠急病任終在徐然世子無專行之義宜須諮信反方使世子出命曰朝廷及大府事悉諮徐司馬其餘啟還武帝善其臨事不撓得大臣節十四年世子改授荆州邵諫文帝為中郎將以邵為司馬領南郡相衆事悉决於邵武帝受命以佐命功封臨沮伯湘州刺史將署新府邵以長沙内地非用武之國置府妨人乖為政要從之謝晦反遺書要邵邵不發函使呈文帝元嘉五年轉征虜將軍領寧蠻校尉雍州刺史加都督初王華與邵不和及華參要人為邵危邵曰子陵方𢎞至公豈以私隙害正義是任也華實舉之及至襄陽築長圍脩立隄堰創田數千頃公私充給丹浙二洲蠻屬為冦邵誘其帥並出因大會誅之遣軍掩其村落悉禽既失信群蠻所在並起水陸路斷七年子敷至襄陽定省當還都群蠻欲斷取之㑹蠕蠕國獻使下蠻以是為敷因掠之邵坐降號揚烈將軍江夏王義恭鎮江陵以邵為撫軍長史持節南蠻校尉九年坐在雍州營私畜貨下廷尉免官削爵土後為吳興太守卒追復爵邑謚曰簡伯邵遺命祭以菜果葦席為轜車諸子從焉長子敷在孝友傳兄禕在忠義傳禕子暢暢字少微少與從兄敷演鏡齊名起家為太守徐佩之主簿佩被誅暢馳赴制服盡哀為論者所美弟牧嘗為猘犬所傷醫云宜食蝦蟆牧難之暢含笑先嘗牧因此乃食創亦即愈孝武鎮彭城暢為安北長史沛郡太守元嘉二十七年魏太武拓跋燾南侵江夏王義恭統諸軍出鎮彭城燾親率大衆去彭城數十里彭城衆力雖多軍食不足義恭欲棄彭城南歸時歴城衆少食多沈慶之議欲以車營為函箱陳精兵為外翼奉二王及妃媛直趨歴城蕭思話留守何朂欲席卷奔鬱洲自海道還都二議未決暢曰若厯城鬱洲可至下官敢不高讚今城内乏食百姓咸有走情但以關扃嚴固欲去莫從若一旦動脚則各自散走欲至所在何由可得今軍食雖寡朝夕猶未窘罄豈有舍萬安之術就危亡之道若此計必用下官請以頸血汚君馬蹄孝武謂義恭曰張長史言不可異也義恭乃止燾至登城南亞父冢初隊主蒯應見執燾遣應至小市門求甘蔗及酒孝武與之求駱駝明日燾自上臺復遣使至小市門求與孝武相見遣送駱駝并致雜物使於南門受之暢於城上與魏尚書李孝伯語孝伯曰張長史暢曰君何得見識孝伯曰君聲名逺聞足使我知虜使問何為怱怱杜門絶橋暢曰二王以魏主營壘未立將士疲勞此精甲十萬人思致命恐輕相陵踐故且閉城待彼休息士馬然後共治戰場克日交戰虜使曰君當以法令裁物何以十萬誇人我亦有良馬逸足若雲騎四集可以相距暢曰侯王設險何但法令而已耶我若誇君當言百萬此城内有數州士庶工徒營伍猶所未論我本鬬智不鬬馬足且冀之北土馬之所生君復何以逸足見誇邪虜使曰城守君之所長野戰我之所長我之恃馬猶如君之恃城耳且燾又求酒及甘橘暢宣孝武㫖又致螺桮雜糭南土所珍燾復令孝伯傳語曰魏主有詔借愽具暢曰有詔之言政可施於彼國何得稱之於此詔孝伯曰魏主言太尉鎮軍久闕南信殊當憂邑若欲遺信當為䕶送暢曰此方間路甚多不復以此勞魏主孝伯曰知有水路似為白賊所斷暢曰君着白衣故稱白賊邪孝伯大笑曰今之白賊亦不異黄巾赤眉暢曰黄巾赤眉似不在江南孝伯曰亦不離青徐燾又遣送氊及九種鹽并胡䜴又求黄甘并云魏主致意太尉安北何不遣人來至我間要須見我小大觀我為人暢又宣㫖答曰魏主形狀才力久為來往所知李尚書親自銜命不患彼此不盡又云魏主恨向所送馬殊不稱意安北若須大馬當更送之暢曰安北不乏良駟送自彼意非此所求義恭又餉炬燭十挺孝武亦致錦一匹燾復求甘蔗安石榴暢曰石榴出自鄴下亦當非彼所乏孝伯曰君南土膏粱何為著屩暢曰膏粱之言誠為多愧但以不武受命統軍戎陣之間不容緩服孝伯辭辯暢隨宜應答音韻詳雅風儀華潤魏人相視歎息時魏聲云當出襄陽故以暢為南譙王義宣司空長史南郡太守三十年元凶弑逆義宣發哀之日即使舉兵暢為元佐居僚首哀容俯仰䕃映當時舉哀畢改服著黄韋袴褶出射堂簡人音姿容止莫不屬目見者皆願為盡命事平徵為吏部尚書封夷道縣侯義宣既有異圖解南蠻校尉以授暢加冠軍領丞相長史暢遣門生荀僧寶下都宋書荀作茍因顔峻陳義宣釁狀僧寶不時下會義宣起兵津路斷絶遂不得去義宣將為逆遣嬖人翟靈寶告暢暢陳必無此理請以死保之靈寶知暢不回勸義宣殺以徇衆賴竺超民得免進號撫軍别立軍部以收人望暢雖署文檄而飲酒常醉隨義宣東下梁山戰敗為軍人所掠衣服都盡遇王𤣥謨乗輿出營暢已得敗衣因排𤣥謨上輿𤣥謨意甚不恱送都下廷尉尋見原起為都官尚書轉侍中代其子淹領太子右衞率孝建二年出為㑹稽太守大明元年卒年五十諡曰宣子暢愛弟子輯臨終遺命與輯合墳論者非之暢弟恱亦有美稱歴侍中臨海王子頓前軍長史南郡太守晉安王子勛建偽號召拜吏部尚書與鄧琬共輔偽政事敗恱殺琬歸降復為太子中庶子後拜雍州刺史泰始六年明帝於巴郡置三巴校尉以恱補之加持節輔師將軍領巴郡太守未拜卒暢子浩官至義陽王㫤征北諮議參軍浩弟淹黄門郎封廣晉縣太子左衞率東陽太守逼郡吏燒臂照佛百姓有罪使禮佛贖愆動至數千拜坐免官禁錮起為光祿勲臨川内史泰始初與晉安王子勛同逆軍敗見殺淹弟融融字思光解褐為宋新安王子鸞行參軍出為封溪令路經障險獠賊執融將殺食之融神色不動方作洛生詠賊異之不害也浮海至交州於海中遇風無懼色方詠曰乾魚自可還其本鄉肉脯復何為者哉又作海賦以示顧覬之覬之曰卿此賦實超𤣥虚但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路此四句後所足也覬與融有恩好覬卒融身負墳土在南與交阯太守卞展善展於嶺南為人所殺融身奔赴舉秀才對䇿中第為尚書殿中郎不就改為儀曹郎尋請假奔叔父喪道中罸幹鞭杖五十寄繫延陵獄時制二品清官行僮幹杖不得出十為孫緬奏免官復位攝祠部倉部二曹時劉緬戰死融議上應哭尋兼掌正厨見宰殺回車徑去自表解職再遷南陽王友融父暢為丞相長史義宣事難暢將為王𤣥謨所殺時𤣥謨子瞻為南陽王長史融啟求去官不許融家貧欲祿乃與從叔征北將軍永書求為南康郡且曰時議以融非御人才不果辟齊太傅掾稍遷中書郎非其所好乞為中散大夫不許張氏自敷以來並以理音辭脩儀範為事至融風止詭越坐常危膝行則曳步翹身仰首見者驚異聚觀成市而融了無慙色隨例同行常稽遲不進高帝素愛融為太尉時與融款接見融常笑曰此人不可無一不可有二即位後手詔賜融衣曰見卿衣服麤故誠乃素懷藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也高帝出太極殿西室融入問訊彌時方登堦上曰何乃遲為對曰自地升天理不可速時魏主至淮而退帝問何意忽來忽去未有答者融時下坐抗聲曰以無道而來見有道而去公卿咸以為捷融善草書常自美其能帝曰卿書殊有骨力但恨無二王法答曰非恨臣無二王法亦恨二王無臣法以假還鄉詣王儉别儉立舉􅃑不前融亦舉手呼儉曰歜曰王前儉不得已趨就之融曰使融不為慕勢而令君為趨士豈不善乎常歎云不恨我不見古人所恨古人又不見我入為長沙王鎮軍竟陵王征北諮議並領記室司徒從事中郎永明二年總明觀講敕朝臣集聽融扶入就榻私索酒飲長歎曰嗚呼仲尼獨何人哉為到撝所劾融形貌短醜精神清徹王敬則見融革帶寛殆將至髀謂曰革帶太急融曰既作步吏急帶何為融假東出武帝問融住何處答曰臣陸處無屋舟居無水後上問其從兄緒緒曰融近東出未有居止權牽小船於㟁上住上大笑後使融接對北使李道固道固顧而言曰張融是宋彭城長史張暢子不融嚬蹙久之曰先君不幸名達大夷八年朝臣賀衆瑞公事融扶入拜起復為有司所奏見原遷司馬兼右長史張欣時為諸暨令坐罪當死欣時父興世討宋南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐之以此得免興世卒融著高履為負土成墳至是融啟竟陵王子良乞代欣時死子良答曰此乃是長史美事恐朝有常典不得如所懷遷黄門郎太子中庶子司徒左長史融有孝義忌月三旬不聽樂事嫂甚謹臨終謂諸子曰昔丞相事難吾以不同將見殺縁司馬竺超民得活爾等必報其子後超民孫微冬月遭母喪居貧融弔之悉脫衣以為賻披牛被而反常以兄事微豫章王嶷竟陵王子良薨自以身經佐吏哭輒盡慟建武四年卒遺令建白旐無旒不設祭三千買棺無製新衾妾媵舉哀畢各遣還家曰吾平生之風調何至使婦人行哭失聲不須暫停閨門更戒其子曰手澤存焉父書不讀吾意不然别遺爾㫖吾文體應變變而屢竒豈吾天挺益不隤家聲汝可號哭而㸔之融文集數十卷行於世自名為玉海禇淵問其故融云蓋玉以比德海崇上善耳融言辭辯捷周顒彌為清綺而劉繪音采不贍麗有風則永明末俱在竟陵王西邸時人為之語曰三人共宅夾清漳張南周北劉中央言其處二人間也融玩涉百家長於佛理著三宗論張氏前有敷演鏡暢後有充融卷稷張𤣥之字祖希澄之孫也少聰慧與顧敷俱顧和中外孫和常謂敷勝至𤣥之頗不懕時𤣥之九嵗敷七嵗和常至寺中佛般泥洹像弟子有泣者有不泣者以問二孫𤣥之謂彼親故泣彼不親故不泣敷曰當由忘情故不泣不能忘情故泣𤣥之以才學顯初為縣丞以職事對府不知官曹處吏白門下責之時扶風張業亦大儒聞𤣥之試引與語大驚曰今日相遭真解朦矣遂請上堂難問極日范寗亦稱𤣥之為吳士之秀孝武時封晉陵侯一云寧晉侯歴吏部尚書出為冠軍將軍吳興太守與㑹稽内史謝𤣥同時之郡論者以為南北之望𤣥之名亞於𤣥時亦稱南北二𤣥卒於郡姑蘇志卷四十六
