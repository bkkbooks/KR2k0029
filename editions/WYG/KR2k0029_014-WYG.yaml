料肥猪肥鵝肥雞鷀鴈獐核桃菉笋蒔蘿􅚬香薄苛木耳尖頭松子蓮肉紅棗牙茶栗子菱米榛子黄臘燈草茶葉蜂蜜土碱蘑菰嘉定縣加辦山藥已上納光禄寺藥味白匾豆海金砂白牽牛黒牽牛紫蘇青皮陳皮荆芥紫蘇子小􅚬香蟬蜕粟殻香附子山茨菰枇杷葉烏梅已上納太醫院今之貢雖責其土之所産亦有購之他處以充者固嵗有常品而交納之費乃數倍其價云徭役宋役制押錄貼書州市坊正祗候分手貼司引事㕔子書司手力鄉司鄉戞戞刺當直人橋番散番等請給於縣庫茶酒帳設邀喝請給於税務襍職弓手牢子禁子市巡所由㪷級㪷子欄頭務司酒匠柵子直司腳力凡保正追㑹之事僧直司承受寺院事件自熙寧行保甲罷耆户長壯丁而法始變至元祐復耆户長壯丁猶以保甲而法大變及紹聖而後以耆户長壯丁錢盡歸公上而法盡變民避役如避冦舉世盡然端平既正經界乃按籍選差於是因數都義役之舊一以乾道詔書從事排年任役率田供費條畫列之規約宸㫖丁寧一一具載之曽未二十年更革幾無復遺而受害者大抵如故今摭義役省劄著之㨿平江府狀據常熟縣知縣王丞議申竊惟賦役二事闗於民生利害最大本縣户版龎亂吏奸縱横官督虚籍之賦民苦破家之役追惟其弊不忍復言當職自初到官亟圖所以救之修復經界整比版籍民按實産受常賦貧富小大幸就明實儻不及時團結義役則作僞詭寄以自利尚氣者紛糾前功盡廢抑恐後患滋多迺分委鄉官勸率役産參合都分主客之勢酌斟地里寛窄之宜量役費之重輕凖助田之多寡經始於端平丙申四月竣事於嘉熙丁酉五月繕冩成帙申府僉印發下外其間更有數條事體稍重闗於義役修廢乞從本府備省朝札下本縣遵守併札提舉常平使司㑹施行一本縣九鄉五十都義役田地共五萬五百二十畝一角五十八步五尺五寸嵗收租米麥共二萬四千九百九十八石六斗四升一合一勺已隨都分大小分撥與保正長聴其任便收支以助役費有餘不足官司更不復干預其田並係常平物業不許公私典賣亦不許移易轉换違者按法坐罪其助田之家將來富者不加増貧者不許取入仕而免者不給還一諸都舊亦各有役田止縁役首掩取田租或獻納本縣板帳庫或獻納常平司旋即詭名侵佃官司茍目前之㣲利不暇爲赤子深謀庸錢不除役費日重在板帳庫者二百餘畝在常平司者見議申乞所有今來見管義田日後並不許奸民獻納官司亦不當收受一保正長向來充役之費最爲浩輸保長既爲産去税存逃亡户絶等户代納税租保正者亦抑之催科例行陪納其他色目尤多如保正則有科供竹本科取果科買槽酒節序燈油接官器具檢屍定驗之費保長則有著役召保請給虚限出豁簿書七夕冬至二節供送吏胥之費加以上落牌頭開拆司苗税案誅求無藝已一切禁戢蠲免具申本府及諸司永與蠲除後如吏胥更有纎毫科擾即仰役人與機察糾率衆户經縣及經上司理訴一今將各都新排經界田籍備錄一本印押交付機察謹密收藏每遇人户典賣田産並許具狀經縣陳乞送下機察仰置簿打號發下保正役主内係起催夏税以後入狀者即責付新苗保長内係新催秋苗以後即責付新稌保長令取責契照及兩家砧基㸃對保長類申機察機察類申本縣送鄉戞局參對官籍移割其詭名寄産者繳囘元狀嘉熙元年八月二日奉聖旨王爚修復經界義役職事修舉與轉一官並下浙西提舉司平江府常熟縣永遠遵行元無考國朝役制里長甲首黄冊造定巡欄齋夫膳夫館夫糧夫庫子斗級門子防夫皂𨽻祗候弓兵檢鈔夫馬夫水夫鋪司鋪兵俱均徭僉㸃巡撫都御史崔恭劄付據長洲縣老人呈先䝉巡撫侍郎周公念蘇松税糧繁重百姓艱難深惟民情均其徭役將鄉都通縣排年里長編成一應差役每名出銀一兩輪當一年歇息二年酌量輕重多寡朋合造冊在官猶如車輪而轉吏無那移之弊民得輕解易完至今民有去思之念後䝉本府知府汪滸編作上中下九則之法上户重役中户中役下户輕役然其中以病民者有四九萬人户付在吏胥之手年月無拘名數不定難以稽考易生奸弊一也數年之内消長難期二也直部𨽻兵正副出銀一十二兩尚有往迴使用不計中等之家卒難收集三也今本縣以從九則之冊㸃選户役其豐盈庫子并各倉斗級俱應於九則冊内㸃選今又著里長保選非惟重疊錯亂抑且奸弊復生假如本區人户王韋關里長保殷實人户納紅花價銀二兩九錢則冊内㸃出貼𨽻兵銀四兩上下難以相照重役多端者四也如䝉乞照侍郎周公所立良法及吊本縣原造文冊詳看仍舊施行參照所呈有理合行劄付本府轉屬從公查勘計議停當開立前件定奪施行馬頭北京㑹同館二名南京㑹同館一十二名北直𨽻樂城富莊瀛海阜城東光歸義汾水鄭城新中涿鹿固節一十一驛凡一百三十五名南直𨽻東葛城雲亭江東江淮滁陽大栁樹紅心濠梁雎陽池河大店固鎮一十二驛凡二百八十名東銅城茌山平原魚丘安德舊縣太平七驛凡一百六十四名俱田糧僉充成化十四年巡按御史劉魁問及馬頭利病有吳縣二十八都耆民陸伯良具呈竊思洪武年間原是北方土民買馬當夫後太宗文皇帝憫土民買馬艱難故此聖㫖暫借南方百姓買馬當差過三年仍著土民買馬替他每囘來欽此至今百有餘載因循不曽改正又南方百姓不習水土不諳馬性多是雇倩土民養馬既費傭值身又不得歸農况不才驛官串同南北馬頭故將馬匹空餓倒死以規買馬之利以致市鬻子女破蕩家産莫若照依欽旨事理仍著土民養馬當夫止令南方百姓買辦馬價鋪陳等件不拘馬匹髙下例以三年五年爲限如馬過期不死亦是本驛官吏人等畜馬有方即以其價歸之如不及期亦是本驛官吏人等不行用心或捏病死之故必先期給與事體既定則土民自然用心養馬無妄捏倒死之弊南方百姓亦情愿辦直以免著役當差之苦南北皆便又聞前巡撫侍郎周忱設法前項馬價鋪陳已於秋糧中科取謂之義役米後官府於秋糧中既徴義役米又取辦馬價實爲重複亦望查考舊案仍於義役米中或積出餘米内取辦尤爲便益等因未得施行吳縣人丁一十四萬五千一百丁有竒每丁編銀三分該銀四千三百五十五兩有竒官民田地五千一十一頃有竒每畝編銀一分二厘該銀六千一十三兩有竒山蕩租鈔等項二千三十一頃有竒每畝編銀四厘該銀八百一十二兩有竒在城附廓市民兩山家資編銀三千五百兩共徴銀一萬四千六百八十兩有竒長洲縣人丁一十六萬二千三百丁有竒每丁編銀三分該銀四千八百六十九兩有竒官民田地一萬二千二百三十二頃有竒每畝編銀一分一釐該銀一萬三千四百五十六兩有竒山蕩租鈔等項七百三頃有竒每畝編銀四釐該銀二百八十一兩有竒在城附廓市民家資編銀一千五百兩共徴銀二萬一百六兩有竒崑山縣人丁六萬九千九百四十丁有竒每丁編銀一分該銀六百九十九兩有竒官民田地一萬一千一百九十二頃有竒每畝編銀七釐七毫該銀八千六百一十八兩有竒山蕩租鈔等項三百九十六頃有竒每畝編銀四釐該銀一百五十八兩有竒共徴銀九千四百七十六兩有竒常熟縣人丁七萬一百丁有竒每丁編銀一分該銀七百一兩有竒官民田地一萬四千八百二十一頃有竒每畝編銀七釐七毫該銀一萬一千四百一十二兩有竒山蕩租灘等項二千六百四十五頃有竒每畝編銀四釐該銀一干五十八兩有竒共徴銀一萬三千一百七十一兩有竒吳江縣人丁九萬五千六百六十丁有竒每丁編銀三分該銀二千八百七十兩有竒官民田地一萬一千四百五十九頃有竒每畝編銀一分二釐該銀一萬三千七百五十一両有竒蕩租等項一千四十二頃有竒每畝編銀四釐該銀四百一十六兩有竒共徴銀一萬七千三十八兩有竒嘉定縣人丁一十五萬七千六百四十丁有竒每丁編銀一分該銀一千五百七十六兩有竒官民田地一萬二千九百三十一頃有竒每畝編銀七釐七毫該銀九千九百五十七兩有竒租蕩塗灘等項三百九十三頃有竒每畝編銀四釐該銀一百五十七兩有竒共徴銀一萬一千六百九十一兩有竒太倉州人丁四萬五千五百五十丁有竒每丁編銀一分該銀四百五十五兩有竒官民田地九千四百六頃有竒每畝編銀一分一釐該銀一萬三百四十七兩有竒山蕩塗租等項二十頃有竒每畝編銀四釐該銀八兩有竒共徴銀一萬八百一十一兩有竒崇明縣人丁五千二十丁有竒每丁編銀一分該銀五十兩有竒官民田地一千九百七十二頃有竒每畝編銀一分該銀一千九百七十二兩有竒塗蕩等項二千五百三十一頃有竒每畝編銀四釐該銀一千一十二兩有竒共徴銀三千三十五兩有竒姑蘇志卷十五
