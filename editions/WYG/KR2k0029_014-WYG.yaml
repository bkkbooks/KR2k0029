body:
  text: 姑蘇志卷十五明王鏊撰田賦稅課貢役附今天下財賦多仰於東南而蘇爲甲然禹貢揚州厥田下下唐天寶而後東南財賦始增至宋元彌盛然考之舊誌宋元嵗數在蘇者宋三十餘萬石元八十餘萬石國朝幾至三百萬自古東南財賦又未有若今日之盛者也夫聚於上者多則存於下者能無蹙乎此爲治者之所當念也田地宋之田有曰公田爲充進軍食每畝起租上自一石五斗下至七斗一升四合按宋史淳化中田制爲三品膏沃而無水旱爲上品沃壤而有水旱之患埆瘠而無水旱之虞爲中品墝瘠復患水旱者爲下品上百畝中百五十畝下二百畝只計百畝十收其三恐無若是之重也曰圍田傍江湖水淺處民圍爲田租四斗或三斗曰沙田民自經理江湖沙漲地爲田租三斗或二斗曰成田民墾耕草地爲田納糧二斗曰營田民用工本耕種係官空閒田租四斗或二斗二升曰職田給與文武官養廉地民佃起糧上自八斗七升下至六斗三合五勺附錄宋咸平二年復唐制吏得職田供祭祀六縣通管六萬六百八十八畝有竒租一萬八千二百石有竒知軍府事八百六十石有竒通判軍府事句僉判句教授句節推添差節推句察權句知錄句司理司法司户監糧料院監糴納倉監都税監在城税務監贍軍庫監都酒務監比較務句排岸司巡轄司句總管句路鈐添差路鈐句路分添差路分東南第三正將句南一廂官南二廂官北一廂官北二廂官常平司提幹茶鹽司提幹文臣支鹽官武臣支鹽官黄姚押袋官江灣押袋官監黄姚鹽場監江灣鹽場監南蹌鹽場各有差知吳縣事三百石知長洲縣事三百六十石知崑山縣事四百四十石知常熟縣事六百八十石知吳江縣事三百八十石知嘉定縣事一百五十石各有竒縣丞主簿尉及巡塘官句巡檢句監酒務監税務以下各有差元則平江路達嚕噶齊總管各一員每員田八頃同知治中府判推官經歴知事提控案牘照磨承發架閣䝉古教授兩醫學教授錄事司達嚕噶齊句錄事句錄判各有差吳縣長洲二縣達嚕噶齊縣尹每員職田二頃縣丞縣尉典史巡檢各有差崑山常熟吳江嘉定四州達嚕噶齊知州每員職田四頃同知州判提控案牘都目各有差海道都漕運萬户府達嚕噶齊正萬户副萬户經歴知事照磨檢校通事驛史鎮撫千户達嚕噶齊正千户副千户止有祿米無田國初蘇州衛太倉衛指揮僉事亦有撥賜田嵗收米一百六十石今無曰常平田係㫁没入官者曰義役田鄉民出助保正差役者曰社倉田官買民田嵗儲備荒者曰局官租田曰養濟局田曰居養院田恤養鰥寡孤獨老幼殘疾者曰囚粮田官發以充囚食曰没官田乃斷没各項田土科租髙下有差髙者不踰一石五斗下至二斗元之田則有圍二縣四州共計八千八百二十九圍吳縣九百一十七圍長洲縣一千七百八十八圍常熟州一千一百一十一圍吳江州三千三百六十八圍崑山州一千六百四十五圍嘉定州一千一百圍延祐四年行經理之法悉以上中下三等八則計畝起科國朝洪武初七縣官民田地共六萬七千四百九十頃有竒官田地二萬九千九百頃有竒起科凡一十一則一則七斗三升一則六斗三升一則五斗三升一則四斗三升一則三斗三升一則二斗三升一則一斗三升一則一斗一則五升一則三升一則一升又功臣還官田開耕田俱名官田重則有一石六斗三升者民田地二萬九千四十五頃有竒起科凡十則一則五斗三升一則四斗三升一則三斗三升一則二斗六升一則二斗三升一則一斗六升一則一斗三升一則五升一則三升一則一升抄没田地一萬六千六百三十八頃有竒内有原額今科之分原額田起科凡六則一則七斗三升一則六斗三升一則五斗六升一則五斗三升一則四斗三升一則四斗今科田自五斗五升至三升止凡二十八則崇明官田又有曰江淮田江浙田職田學院田俱科黄赤荳抄没田有曰故官田江浙故官田没官田俱稅米𢎞治十六年一州七縣實徴官民抄没田地山蕩等項共九萬四千七百八十五頃有竒官田抄没等項六萬五千三頃有竒民田等項三萬四千六百九十七頃有竒吳縣官田地等項三千六百三十三頃有竒民田地等項三千四百七十頃有竒長洲縣官田地等項九千七百六十頃民田地等項三千七百九十二頃有竒學田一十四頃有竒崑山縣官田地等項九千九百二十六頃有竒民田地二千二百二十二頃有竒常熟縣官田地等項八千四百四十二頃民田地八千一十三頃有竒吳江縣官田地等項八千七百一十九頃民田地等項四千二百三十八頃有竒嘉定縣官田地等項一萬四百六十六頃民田地等項四千一百六十四頃有竒太倉州官田地等項六千九百頃有竒民田地等項二千七百一十九頃有竒學田四十六畝有竒崇明縣官田地等項二千二百四十八頃有竒民田六千七百五頃有竒嘉靖十七年太倉等八州縣原額科糧官民田地等項八萬六千三百九十七頃有竒除崇明縣官民田地塗蕩八千三百二十四頃有竒今經清查弊隠田二千八百三十九頃有竒於内隂消過弊田四百五十三頃有竒吳縣田地等項原額四千九百五十三頃有竒今清出一十一頃有竒共實科四千九百六十四頃有竒長洲縣田地等項原額一萬二千四百八十六頃有竒今清出五百一十二頃有竒共實科一萬二千九百九十八頃有竒崑山縣田地等項原額一萬一千五百二十五頃有竒今清出二十四頃有竒共實科一萬一千五百四十九頃有竒常熟縣田地等項原額一萬四千八百二十一頃有竒今清出三百七十六頃有竒共實科一萬五千一百九十七頃有竒吳江縣田地等項原額一萬一千八百七十七頃有竒今清出二十一頃有竒共實科一萬一千八百九十八頃有竒嘉定縣田地等項原額一萬二千九百九十九頃有竒今清出一千二十六頃有竒共實科一萬四千二十五頃有竒太倉州田地等項原額九千四百九頃有竒今清出四百二十頃有竒共實科九千九百一十頃有竒崇明縣田地等項止科原額八千三百二十四頃有竒税糧宋初盡削錢氏白配之目遣右補闕王永髙象先各乗逓馬均定税數只作中下兩等中田一畝夏税錢四文四分秋米八升下田一畝錢三文三分米七升四合取於民者不過如此自熙豐更法崇觀多事靖炎軍興隨時增益始不一矣祥符間夏税丁身鹽錢一萬六千二百貫絹五萬四千四百疋紬二千七百疋綿四千四斤各有竒秋白粳米三十一萬三千七百石有竒元豐三年嵗輸帛凡八萬疋苗三十四萬九千斛纊二萬五千兩免役錢八萬五千緡皆有竒淳熙十一年苗三十四萬三千二百五十六石夏税折帛錢四十三萬九千三百五十六貫上供諸色錢一百二十三萬一千二百八貫各有竒寶祐初苗額二十八萬八千六百石有竒五年增爲三十萬三千三百八十石爲定額官民之害由此始景定元年郡守程元鳳以事故之數具奏免徴民賴以蘇自後嵗實徴税管三十五萬六千五百貫闗子苗米二十八萬三千九百石續管二萬三千三百石贍軍米九千四百石各有竒按宋史紹興十一年左司員外郎李椿年言平江嵗入昔十七萬有竒今按籍雖三十萬斛然實入纔二十萬耳元延祐四年夏税絲二萬二千四百斤秋租糧八十八萬二千一百石輕賷二千二百錠所入與宋倍蓰國朝洪武初夏税絲二十五萬四千三百兩大麥正耗一萬一百石小麥五萬一千八百石豆一十七石菜子二十七石糧糙粳米九十四石錢鈔一萬九百八十貫各有竒秋糧正耗二百一十四萬六千六百石黄豆二千七百八十石各有竒花椒八斤七兩五錢𢎞治十六年夏税􅁝三十二萬八千四百六十兩有竒吳縣三萬五千兩長洲縣九萬九十兩崑山縣三萬四千五百兩常熟縣六萬三千五十兩吳江縣四萬五千三百兩嘉定縣四萬三千九百兩太倉州三萬六千五百兩各有竒麥五萬三千六百六十四石有竒吳縣三千四百石長洲縣一千八百石崑山縣一千二百石常熟縣三千八百石吳江縣二千九百石嘉定縣五千一百石太倉州三萬二千二百石崇明縣一萬三千石各有竒鈔二萬一千九百六十三貫七百七十二文崇明縣鈔俱無秋糧正米二百三萬八千六百四十石連耗共米三百五萬六千一十四石各有竒吳縣一十三萬四百石長洲縣四十一萬七千七百石崑山縣二十八萬九千八百石常熟縣二十九萬八千一百石嘉定縣二十八萬四千六百石太倉州二十一萬三百石崇明縣二萬四千四百石各有竒按洪武初官田重額止於七斗三升而今民間乃有一石三斗一石六斗或二石者蓋莫知其所始豈所謂抄没官田者乎固非定則也且洪武中正耗不過二百一十四萬然猶屢下寛貸之詔洪武四年中書省宣使張彬賷詔開讀免過秋糧二百四十二萬六千八百石有竒六年八月奉㫖今年三四月間蘇州各縣小民缺食曾教府縣鄉里接濟我想那小百姓好生生受原借的糧米不須還官都免了七年中書省劄付奉㫖體蘇州松江嘉興三府百姓每好生缺食生受今嵗夏税合納的絲綿錢麥等物盡行蠲免恁省家便出榜去教百姓知道有司糧長每毋得科擾永樂以來漕運愈逺加耗滋多乃至三百萬石宣廟深憫斯民之困特下詔捐減官田重額知府况鍾又累疏奏減七十餘萬吳民賴以稍甦然民間重額今猶未盡除豈當時有司不能奉行詔㫖之過邪宣德七年三月節該欽奉勑諭但係官田塘地税糧不分古額近額悉依宣德五年二月二十日勑諭恩例每田一畝納粮自一斗至四斗者各減十分之二自四斗一升至一石以上者各減十分之三永爲定制欽此凡宋元官田謂之古額吳縣原額科米一十三萬四百一十二石有竒清出隠蔽科米一千七百一十八石有竒長洲縣原額科米四十一萬二千七百三十一石有竒清出隠蔽科米一萬五千五百一十二石有竒共正米四十二萬八千二百四十三石有竒崑山縣原額科米二十九萬三千六百五十四石有竒清出隠蔽科米二千九百一十五石有竒共正米二十九萬六千五百六十九石有竒常熟縣原額科米三十萬一百九十石有竒清出隠蔽科米九千一百四十八石有竒共正米三十萬九千三百三十八石有竒吳江縣原額科米三十八萬七千七百一十石有竒清出隠蔽科米二千五百七十石有竒共正米三十九萬二百八十石有竒嘉定縣原額科米二十八萬四千九百七十四石有竒清出隠蔽科米二萬一千七百一十七石有竒共正米三十萬六千六百九十一石有竒太倉州原額科米二十萬四千七百六十七石有竒清出隠蔽科米九千六百一十五石有竒共正米二十一萬四千三百八十二石有竒崇明縣止科原額正米二萬四千四百五十二石有竒吳縣每畝攤徵平米三斗四升四合長洲縣每畝攤徴平米三斗七升五合崑山縣每畝攤徴平米三斗三升五合常熟縣髙鄉每畝攤徴平米二斗一升八合低鄉每畝攤徴平米三斗一升八合吳江縣每畝攤徴平米三斗七升六合嘉定縣每畝攤徴平米三斗又鹻薄田每畝攤徴平米二斗太倉州每畝攤徴平米二斗八升崇明縣額不起運無耗照舊徴收起運秋糧運送南北兩京計白糙等米連耗三十七萬九千四百四十五石此乃上供及勲臣文官吏胥祿俸俱係民運兌軍運送北京計正米六十五萬五千石耗米五十七萬七百二十七石俱漕運總兵𣲖撥各衛官軍來倉兑運京通二倉以爲軍儲附錄宋置淮南二浙江湖六路發運使嵗運數百萬石由真泗以達汴梁元平宋之後以河運弗便至元十九年用丞相巴延之言初通海道乃立運糧萬户府三於蘇州