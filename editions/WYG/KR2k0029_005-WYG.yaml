body:
  text: 姑蘇志卷六明王鏊撰科第表中國朝取士三年一舉中式者謂之鄉貢明年會試中式御策者謂之進士餘則有嵗貢每嵗行之又間行賢良方正經明行脩等科法亦盡矣吾蘇號多士不可得而悉書也惟列鄉貢進士二者於篇鄉貢士有字有無字任或地或不地缺所不知也缺任者逺則先卒近或未授職也有全缺者進士并有傳或無所考者也魁元必著文所難也間有著其行者既卒且無傳有不可略者也下表倣此盧志有洪武三年徐士全榜金文徵等二十人不著縣按文徵嘉定朱􅛁吳江張著常熟夏時崑山餘十六人無考又府學題名記洪武十七年有張迅茅良驥亦不著縣併列於末以俟博覽者詳訂云張三同鄭叔雨朱炳黄琮唐溥王莊傅範鄒立誠徐煥顔繼先宋圭張立本黄著范益陳夢始范同大張迅茅良驥科第表下進士盧志洪武四年金璹榜二人傅􅆽陳永著崑山故縣志遂載以為進士及考其年登科錄狀元吳伯宗非璹也傅陳亦無名宋濂會試錄題詞甚詳則璹為鄉榜無疑故表以洪武十八年為始國朝吳長洲崑山常熟吳江嘉定崇明三衞以上俱正徳年間貢姑蘇志卷六
  hash: sha256:17d6b72802ef11e035efd6fff21762d513f8f7f9166bf6abbc4c4f461b38346c
