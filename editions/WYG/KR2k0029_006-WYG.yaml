body:
  text: 姑蘇志卷七明王鏊撰沿革吳自太伯開國迄今幾三千年中間離合升降損益治亂有可言者叙諸首使來者得觀焉蘇州府治吳禹貢揚州之域至周泰伯讓國來奔在今無錫梅里始號句呉武王克殷因以封其後至夀夢益大諸樊南徙吳闔閭始築城都之呉亡其地入越楚滅越以其地封春申君秦置會稽郡治呉項梁起兵吳中遂有其地漢髙祖六年立從兄賈為荆王更會稽為荆國都呉及賈被殺國除復為會稽郡十二年以封兄子濞濞誅國除復為郡盧志云濞誅屬江都王再屬廣陵王按漢書地里志會稽郡註云景帝時屬江都又廣陵國註云江都廣陵王皆都此并得鄣郡而不得吳未知孰是元封元年東越平以其地來屬而立東部都尉後徙章安陽朔初徙鄞又徙句章順帝時分浙江以西為呉郡領縣十三呉海鹽烏程餘杭毘陵丹徒曲阿由拳永安富春陽羨無錫婁以東為會稽郡還治山隂三國為呉郡領縣十五呉婁海鹽嘉興富春建徳桐廬新昌鹽官新城陽羨永安臨水烏程餘杭寳鼎元年割陽羨永安餘杭臨水烏程屬吳興郡晉太康元年屬揚州刺史四年割呉縣置海虞縣統縣十一吳嘉興海鹽鹽官錢塘富春桐廬建徳夀昌海虞婁與吳興丹陽號三吳二年分置毗陵郡東晉為吳國置内史行太守事宋永初中罷吳國仍為郡領縣十二仍有新城元嘉中以揚州浙江西屬司隸校尉大明七年割屬南徐州八年屬揚州齊因之梁初分婁縣地置信義郡侯景之亂改呉州尋復為郡陳永定二年割鹽官海鹽屬海寧郡禎明元年分置呉州以錢塘為屬郡隋開皇九年改蘇州以姑蘇山為名領縣五呉崑山常熟烏程長城十一年移治横山即今新郭大業初復改吳州三年仍改吳郡隋初郡𨽻揚州行臺大業末𨽻徐州總管隋末劉元進沈灋興李子通相繼據之唐武徳四年復為蘇州置總管六年輔公祏陷之七年平公祏置都督督蘇湖杭暨四州州復舊治九年罷都督屬潤州貞觀元年隸江南道神龍二年隸本道巡察使景龍二年隸按察使景雲二年隸揚州都督開元二十一年置採訪使為江南東道理所天寳元年改呉郡尋復為州從此通稱為蘇州吳郡乾元元年屬浙江西道節度使二年置長洲軍大厯五年廢永泰元年改節度為處置觀察使治蘇大厯十三年為雄州領縣七吳長洲嘉興海鹽常熟崑山華亭黄巢之亂錢鏐奄有浙西光啟三年六合鎮将徐約攻陷蘇州龍紀元年鏐遣其弟銶討約破走之大順元年七月楊行密将李友陷蘇州九月孫儒圍蘇州十一月陷之殺李友二年鏐復平蘇州乾寧三年楊行密将臺濛陷蘇州五年鏐討平之梁開平二年楊行密復圍蘇州三年鏐復討平之割吳縣地置吳江縣後唐同光二年升中吳軍晉天福三年析嘉興置崇徳縣四年置秀州宋開寳八年改平江軍節度仍為蘇州屬江南東道太平興國三年錢俶納土屬兩浙路置轉運使熈寧五年徙杭熙寧七年屬浙西路政和五年升平江府以徽宗嘗節鎮宣和五年置浙西提舉司建炎四年置浙西提㸃刑獄司並治扵此嘉定十年割崑山地置嘉定縣凡領縣六吳長洲崑山常熟吳江嘉定元至元十二年以府治為江淮行省以提刑司為兩浙大都督府置浙西路軍民宣撫司十四年改宣撫司為平江路總管府改浙西路為浙西道而屬江淮行省在城四廂設置録事司以治之十八年升平江路達嚕噶齊總管府二十六年改江淮行省為江浙行省移治杭州至正十六年張士誠據之改隆平府十七年復為平江路國朝吳元年改蘇州府直𨽻中書省今𨽻南京洪武八年以揚州崇明縣來屬𢎞治十年又割崑山常熟嘉定地置太倉州今領州一曰太倉縣七曰吳長洲崑山常熟吳江嘉定崇明吳地古今稱謂不一句吳泰伯始稱漢書註句者吴俗之發聲吳中項羽傳舉吳中兵吳下灌嬰傳破吳縣長吳下吳門見李徳裕文指潤州為吳之門户舊吳沈休文安陸王碑文鴻騫舊吳又劉琨勸進表奄冇舊呉大吳吳縣鄉名全吳梁簡文帝浮海石像銘云長處全吳今崑山有全吳鄉長洲有全吳里中吳後唐升州為中吳軍節度吳越時稱中吳府吳會古有其語自唐以來稱者多指平江意謂為東南一都會今郡有呉會亭呉會坊皆然實誤也觀史記漢書所載皆指呉越而言耳如呉王濞傳上患呉會輕悍時固未分會稽為吳郡故舉二地合稱之至吳郡既立稱者相因若曹子建詩云行行至呉會吳會非我鄉諸葛孔明云東連呉會蔡邕傳云逺蹤呉會謝承後漢書施延傳云呉會未分吳張紘謂収兵呉會王羲之時賦役繁重呉會尤甚石崇曰呉會僭逆荘子釋文浙江為呉會分界亦皆指二浙之地朱桓傳云部伍吳會二郡齊太祖手詔呉會二郡以禮迎遣禇伯王六朝亦有下吳會兩郡造船此𩔖甚多證據尤明切也三呉說者不同十道四蕃志通典元和郡國圖志並以吳郡丹陽吳興為三呉又以義興吳郡吳興為三呉酈道元水經云永建中陽羨周嘉上書以縣逺赴會至難求得分置遂以浙江西為呉東為會稽分為三號三吳即呉興呉郡會稽也按晉書咸和三年蘇峻反吳興太守虞譚與庾冰王舒等起義兵扵三吳時冰為吳郡舒為會稽則是吳郡吳興會稽為三呉矣又安帝隆安三年孫恩䧟會稽劉牢之遣桓寳率師救三吳又陶回為吳興太守時大饑三吳尤甚回開倉賑之及割府庫軍資以救乏絶詔會稽吳郡依回賑䘏據此則與水經正合又虞譚傳譚為吳興太守詔加譚督三吳晉陵宣城義興五郡事孝武帝寧康二年太后詔曰三吳奥壤水旱併臻宜時拯䘏三呉義興晉陵及會稽遭水之縣全除一年租以此兩事考之則義興固在三呉之外而太后之詔亦不在三吳之數豈一時稱謂初無定說邪史傳各有詳簡差互邪或疑虞譚所督三吳晉陵宣城義興計六郡而稱五郡盖譚自為吳興增督五郡丹陽其一也桓寳救三吳者以孫恩既陷會稽遂逼吳中故云今當以十道四蕃志及郡國志别説為正又陸廣微吳地記以金陵為中吳鄂州為南吳武昌為下吳即三吳也地理指掌圖三吳今蘇潤湖州亦據吳丹陽吳興三郡而言也東楚史記貨殖傳彭城以東東海吳廣陵為東楚孟康曰舊名吳為東楚吳縣附郡城西秦為會稽郡置吳縣王莽改名泰徳隋開皇九年楊素移治横山東唐武徳七年復舊開元四年升望縣今管里五百一十一長洲縣附郡城東唐萬嵗通天元年分吳縣之北境置以長洲苑名乾元二年改長洲軍大厯五年仍為縣十二年升望又割吳地置華亭縣今管里七百四十一崑山縣在府東七十里秦漢婁縣地以婁江名相傳其城吳子夀夢所築或云在漢為疁縣後避錢鏐諱改今名又吳志張昭封婁侯或云改扵王莽時梁天監六年分置信義縣屬信義郡今縣西二十里村曰信義疑古縣治俗又訛為真義大同初又分置崑山縣以東有崑山名隋開皇九年廢十八年復置唐天寳十載太守趙居貞奏分縣之南境及嘉興海鹽二縣地入華亭縣大厯十二年升𦂳會昌四年升望後析安亭等五鄉隸嘉定元元貞元年升州國朝洪武二年復改為縣管里三百三十八常熟縣以其地豐穰故名在府北一百五里晉太康四年分吳縣之虞鄉置海虞縣以虞山名一云海嵎以東臨海故也梁天監六年置信義郡大同六年始置常熟縣隋廢信義郡并所領海陽前京信義海虞興國南沙入常熟又廢晉陵郡扵常熟置常州後割入蘇州唐武徳七年移治海虞城今縣是也元元貞二年升州國朝洪武二年復為縣管里五百一十四吳江縣在府東南四十五里舊吳縣松陵鎮也五代梁開平三年析吳縣地置吳越扵此立南北兩城防遏使所元元貞二年升州國朝洪武二年復為縣管里五百六十二嘉定縣在府東一百四十里故為崑山之疁城鄉宋嘉定十年知府趙彦橚奏割崑山縣安亭等五鄉扵練祈市置縣元元貞二年升州國朝洪武二年復為縣管里六百六十八太倉州在蘇州府東一百六里古婁縣之恵安鄉相傳春秋時吳王扵此置倉故名或云吳王濞也或云孫權和好扵遼公孫淵置倉扵此宋時置節制司酒庫元創海運海外畨舶皆扵此市易俗謂六國馬頭元貞二年升崑山縣為州徙治太倉至正十三年立水軍萬户府十六年張士誠據呉始城之州復徙崑山國朝呉元年立太倉衛洪武十二年又立鎮海衛𢎞治十年始割崑山之新安恵安湖州三鄉常熟之雙鳳鄉嘉定之樂智循義二鄉置為州凡三百一十二里領縣一曰崇明崇明縣在府東三百一十四里海中唐武徳間海中湧二洲今東西二沙宋時續漲姚劉沙與東沙接壤即崇明舊治建中靖國初又漲一洲扵西北即今之三沙嘉定中置鹽場號曰天賜舊屬通州海門縣元至元十四年升州隸揚州路國朝改為縣洪武八年以其地來屬管里一百一十分野先儒謂古者受封之月嵗星所在之辰其國屬焉或謂以其州之星土為國之分星稽諸載籍多有異同姑從舊志所存是訂而次第之黄帝分星次斗十一度至婺女七度曰須女又曰星紀扵辰在丑謂之赤奮若扵律為黄鐘周禮保章氏鄭𤣥註云星紀呉越也春秋緯文耀鉤云蒙山以東至南江會稽震澤徐揚州屬權星爾雅星紀斗牽牛呉分野史記天官書二十八舍主十二州呉楚之疆候在熒惑占為鳥衡正義云熒惑鳥衡皆南方之星鳥衡栁星也或曰張也西漢天文志斗江湖牽牛婺女揚州地理志吳地斗分越地牛女分費直分星次斗十度至女五度為星紀扵辰在丑呉越分野蔡邕分星次斗六度至須女二度謂之星紀大雪冬至居之吳越分野皇甫謐帝王世紀云星紀自斗十一度至女七度吳越分陳卓范蠡鬼谷張良諸葛譙周京房張衡分星次分野斗牽牛須女吳越揚州九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度會稽入牛一度臨淮入牛四度廣陵入牛八度泗水入女一度六安入女六度晉天文志南斗十二度至須女七度為星紀唐一行所分星次分野南斗牽牛星紀之次也丑初起斗九度餘千四十二杪十二太中斗二十四度一千七百八半終女四度其分野自廬江九江負淮水之南盡臨淮廣陵至于東海又逾南河得漢丹陽會稽豫章郡西濱彭蠡南涉越州盡蒼梧南海古吳越及東南百越之國皆星紀分也南斗在雲漢之流殷淮海之間為吳分牽牛在南河浸逺故其分野自豫章東達會稽南逾嶺徼為越分陳氏曰春秋占相以嵗所在為福嵗所衝為災故嵗在越而吳不利按左傳昭公三十二年吳伐越史墨曰越得嵗而吳伐之必受其凶釋者以為嵗在星紀此星紀為越之分星而揚州之星土也之符堅将謀晉引羣臣會議符融曰嵗鎮斗牛吳越福石越曰今嵗鎮星守牛斗福徳在吳懸象無差未可犯也及堅入寇果敗宋兩朝天文志天市垣二十二星東西各列十一星其東垣南第六星曰吳越國朝清𩔖分野書吳分野斗牛在丑自斗三度至女一度屬吳越分揚州今兩浙蘇皆吳分也疆域蘇財賦甲天下然其土壤不甚廣也况江湖之間水居其半焉觀其疆域可以知唐蘇州吳郡領縣七東西四百三十九里南北三百三十里東至海三百六里南至吳興郡三百一十里西至晉陵郡義興縣界一百三十三里北至晉陵郡二百里東南到東海釗山四百五里西南到吳興郡二百二十二里西北到晉陵郡一百九十五里東北到常熟縣界三百二十九里出杜氏通典宋平江府領縣六東西三百二十五里南北三百里東至海二百二十里西至常州界一百三十二里南至秀州界一百一十里北至江一百八十里東南到秀州界一百五十里西南到湖州烏程縣界一百三十里東北到海二百三十里西北到常州界五十里以烏角溪為界元平江路領州四倚郭縣二錄事司一東西三百二十五里南北三百里東至海二百二十里西至無錫州一百三十二里南至嘉興縣一百一十里北至江一百八十里東南到嘉興縣一百五十里西南到烏程縣界一百三十里東北到海二百三十里西北到無錫州界五十里國朝為蘇州府領縣七東西五百四里南北四百二里東至崇明縣三百一十四里到海渺無邊岸西至常州府宜興縣界一百里到宜興縣一百九十里南至嘉興府嘉興縣界九十四里到嘉興府一百三十里北至揚州府通州界一百五十里到通州二百七十二里東南至松江府華亭縣界一百二十六里到松江府一百八十里東北至常熟縣界許浦港一百七十二里到大海渺無邊岸西南至呉江縣界一百五十一里到湖州烏程縣二百一十一里西北至常州府無錫縣界四十九里到常州府一百八十九里至應天府五百八十八里至順天府三千八百里按厯代疆域不同東至甬東西至雩婁在今廬江豫章接楚南至于越今餘干艾今分寧北至徐鍾吾槖臯在今夀春此春秋吳國之境也東至句章在今慶元西至豫章南至南海郡北至廣陵秦九江郡此秦漢會稽郡之境也東至海鹽西至丹陽郡南至會稽北至廣陵此東漢吳郡之境也東至海鹽西至丹陽南至會稽北至毘陵此三國六朝吳郡之境也東至海鹽西至宣州南至杭州北至常州此隋唐五代蘇州之境也東至華亭西至太湖南至吳江北至江隂此宋平江府之境也東至華亭西至無錫南至嘉興北至江隂此元平江路之境也東至崇明西至太湖南至嘉興烏程北至江隂此國朝蘇州府之境也姑蘇志卷七
