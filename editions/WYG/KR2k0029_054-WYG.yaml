body:
  text: 姑蘇志卷五十五明王鏊撰人物十五卓行被裘公呉人也延陵季子出遊見路有遺金當夏五月有被裘而薪者季子呼薪者曰取彼地金來薪者投鎌於地瞋目拂手而言曰何子居之髙視之下儀貌之壮語言之野也吾五月被裘而薪豈取金者哉季子謝之請問姓字薪者曰子皮相之士也何足語姓名遂去不顧龍丘萇郡人王莽時隱居太始末徴不應更始時任延署為議曹祭酒互見宦蹟條延傳何敞少好道藝隱居重以大旱民物顦顇太守慶𢎞遣户曹掾致謁奉印綬煩守無錫敞不受退歎而言曰郡界有災安能得懷道因跋渉之縣駐明星屋中蝗蝝消死敞即遁去後舉方正愽士皆不就卒于家陸著字文伯漢桓靈之間州府交辟不就唯娯栖遁臨卒誡諸子弟云吾少未嘗官於世四十餘年以汝等必矜義勿茍仕濁世子孫奉遵遺訓遂三代不仕皆有盛名陸續字智初呉縣人㓜孤仕郡户曹史時嵗荒民饑太守尹興使續於都亭賦民饘粥續悉簡閲其名訊以名氏事畢興問所食幾何續因口説六百餘人皆分别姓字無有差謬興異之刺史行部見續辟為别駕從事以病去還為郡門下掾楚王英謀反隂䟽天下善士及楚事覺顯宗得其録有尹興名乃徴興詣廷尉獄續與主簿梁宏功曹史駟勲及掾史五百餘人詣洛陽詔獄就考諸吏不堪痛楚死者大半唯續宏勲掠考肌肉消爛終無異辭續母遠至京師覘候消息獄事時急無縁與續相聞母但作饋食付門卒以進之續雖見考苦毒而詞色慷慨未嘗易容唯對食悲泣不能自勝使者怪而問其故續曰母來不得相見故泣耳使者大怒以為獄門吏卒通傳意氣召将案之續曰因食餉羮識母所自調和故知來耳非人告也使者問何以知母所作乎續曰母截肉未嘗不方斷葱以寸為度是以知之使者問諸謁舎續母果來隂嘉之上書説行状乃赦興等事還田里禁錮終身續以老病卒子稠字伯羸為廣陵太守姦吏歛手廣陵諺曰解理結煩我國陸君中子逢樂安太守少子褒有志操力行好學不慕榮名連徴不就桓曄一名嚴或作礹字文林龍亢人明帝時太常榮五世孫仕郡功曹後舉孝亷有道方正茂才三公并辟皆不應初平中天下亂避地會稽遂浮海客交趾越人化其節至閭里不爭訟為㓙人所誣死于合浦獄按東觀記桓礹到呉郡揚州刺史劉繇振給穀食衣服所乏者悉不受後適會稽住止山隂故魯相鍾離意舎太守王朗納給糧食布帛牛羊一無所留臨去之際屋中尺寸之物悉䟽付主人纎微不漏孫晷字文度呉人也為兒童未嘗被訶怒少田於野時年饑穀貴有盗刈其稻者晷見而避之既去又自刈一擔送與之鄉人感愧及長恭孝清約學識有理義辟命皆不就每獨處幽闇之中容止瞻望未嘗傾邪見人饑寒並周贍之父母起居嘗饌雖諸兄親饋而晷不離左右富春車道少動經江水父難於風波晷常從後親自入水扶持籃車所詣之處藩屏隱息不令主人知之時會稽虞喜隱居海隅有髙世之風晷欽其徳聘喜弟預女為妻喜嫁女棄華尚素時人號為梁鴻夫婦張翰字季鷹大鴻臚儼之子也有清才美望博學善屬文詞義新麗造次立成而縱任不拘時人號為江東歩兵賀循赴命經呉閶門於船中彈琴翰初不相識乃就循言譚便大相歡悦問循知其入洛翰曰吾亦有事北京便同載即去而不告家人齊王冏辟為大司馬東曹掾冏時執權翰謂顧榮曰天下紛紛禍難未巳夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後秋風起乃思呉中菰菜蓴羮鱸魚膾曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕而歸著首丘賦文多不載俄而冏敗人皆謂之見幾然以其輒去除吏名翰任心自適不求當世或謂之曰卿乃可縱適一時獨不為身後名耶答曰使我有身後名不如即時一杯酒時人貴其曠逹性至孝遭母憂哀毁過禮年五十七卒其文筆數十篇行於世顧協字正禮晉司空和六世孫也幼孤隨母養於外氏外從祖張永嘗携内外孫姪游虎丘山恊年數嵗永撫之曰兒欲何戱恊曰兒政欲枕石潄流永歎息曰顧氏興於此子及長好學外氏諸張多賢逹有識鑒内弟率尤推重焉初為揚州議曹從事史兼太學博士舉秀才沈約覽其策而歎曰江左以來未有斯作遷安成王國左常侍兼廷尉正太尉臨川王聞其名召掌書記除安都令未至縣遭母憂刺史始興王厚資遣之送喪還於峽江遇風同旅皆漂溺唯協一舫觸石得泊焉咸謂精誠所致服闋出補西陽郡丞還除北中郎行參軍復兼廷尉正久之出為廬陵郡丞未拜會西豐侯正徳為呉郡除中軍領郡五官遷輕車湘東王㕘軍事兼記室與琅邪顔協名職俱同才學相亞府中稱為二協天監十五年敕徐勉入華林撰徧畧勉舉協及何思澄劉杳王子雲鍾嶼等五人應選成書七百卷普通六年正徳受詔北討引為府録事參軍掌書記軍還會有詔譽士湘東表薦之曰臣府兼記室參軍呉郡顧協行稱鄉閭學兼文武服膺道素雅量䆳逺安貧守靜奉公抗直傍闕知已志不自營年方六十室無妻子臣欲言於官人申其屈滯協苦執真退立志難奪可謂東南之遺寶矣即召拜通直散騎侍郎兼中書通事舎人累遷歩兵校尉守鴻臚卿員外散騎常侍卿舎人並如故自為近臣便繁機密每有制述敕前示協時輩榮之大同八年卒年七十三無衾以歛武帝悼惜之手詔曰顧協亷潔自居白首不衰久在省闥内外稱善奄然殞喪惻怛之懷不能己巳傍無近親彌足哀者大殮既畢即送其喪柩還鄉并營冢椁並皆資給悉使周辦可贈散騎常侍令便舉哀謚曰温子協清介有志操初為廷尉正冬服單薄蔡法度欲解襦與之憚其清嚴不敢發口謂人曰我願解身上襦與顧郎恐顧郎難衣食者竟不敢在省十六載器服飲食不改於常自丁艱憂終身布衣蔬食少時将聘舅息未成婚而協母亡免喪後不復娶至六十餘此女猶未他適協義而迎之晚雖判合卒無子嗣協博極羣書於文字及禽獸草木尤稱精詳撰異姓苑五卷𤨏語十卷文集十卷並行於世南史云協為舎人同官者皆潤屋有門生始來事協知其亷潔不敢厚餉止送錢二千協發怒杖二十因此事著絶於饋遺何求字子有灊人宋宜都太守鑠之子也元嘉末為文挽郎厯太子洗馬丹陽郡丞清退無嗜欲後為太子中舎人泰始中妻亡還呉𦵏舊墓除中書郎不拜仍住呉隱居波若寺足不踰户人莫見其面明帝崩出奔國哀除永嘉太守一夜乗小船逃歸呉隱武丘山齊永明四年拜太中大夫不就卒初鑠素有風疾無故害求母坐法死求兄弟以此無宦情弟㸃㸃字子哲年十一居父母憂幾至滅性及長感家禍欲絶昏宦卒不肯娶明目秀眉容貌方雅貞素通美不以門户自矜博通羣書善談論家本素族親姻多貴仕㸃雖不入城府而敖遊人間不簪不帶以人地並髙無所與屈或乗柴車躡草屩恣心所適致醉而歸故世論以㸃為孝隱士弟𦙍為小隱士士大夫多慕從之時又通號曰游俠處士兄求卒㸃菜食不飲酒訖十三年太始末徴為太子洗馬齊初累徴中書侍郎太子中庶子竝不就與陳郡謝瀹呉國張融會稽孔徳璋為莫逆友㸃少時嘗患渇利積嵗不愈後在呉中石佛寺建講晝寝夢一道人形貌非常授丸一匊夢中服之自此而差時人以為淳徳所感梁武帝與㸃兄弟有舊天監初以侍中召㸃不就二年卒𦙍字子季出繼叔父曠故更字𦙍叔年八嵗居憂毁若成人晚乃折節好學仕齊建安太守政有恩信後以國子祭酒侍中及鬱林王嗣位𦙍為后族為中書令拜表解職東之會稽居若邪山雲門寺初𦙍二兄求㸃並棲遁求先卒𦙍又隱世謂㸃為大山𦙍為小山亦曰東山號何氏三髙永元中徴為太常太子詹事梁武帝詔為特進光禄大夫竝不就敕給白衣尚書禄固辭又遷秦望山起學舎初何氏過江自晉司空充竝𦵏呉西山𦙍家世年皆不永唯祖尚之至七十二𦙍年登祖夀乃移還呉作别山詩一首言甚悽愴至呉居武丘山西寺講經論學僧復從之東境守宰經途者莫不畢至𦙍常禁殺有虞人逐鹿徑來趨𦙍伏而不動又有異鳥如鶴紅色集講堂馴狎如家鳥大通三年卒年八十六陶峴者晉徴士淵明後也開元中居崑山富有田業擇不欺者悉付以家事峴徧游江湖徃徃數年不歸見其子孫成人初不辯其名字峴文學可以經濟自謂䟱脱不謀宦逹生知八音撰樂録八章以定其得失自制三舟備極堅巧一以自載一置賔客一貯飲饌客有孟彦深孟雲卿焦遂各置僕妾共載峴有女樂一部奏清商曲逢佳山水必窮其勝名聞朝廷經過郡邑靡不招延峴不肯來自謂麋鹿野人非王公上客亦有不召而自詣者呉越之士號為水僊素慕謝康樂之為人云終當樂死山水浪迹三十餘年及游襄陽西塞歸老於呉殷懌字易從曲阿人少負志氣博學善屬文弱冠游太學籍甚公卿間天寶末知天下将亂乃趣装東歸侍母居呉郡呉中士大夫與之遊者鄉黨以為榮採訪使李希言辟為從事奏保懌崑山尉不就子侑陸龜䝉字魯望元方七世孫父賔虞以文厯侍御史龜䝉少髙放通六經大義尤明春秋舉進士一不中徃從湖州刺史張摶遊厯湖蘇二州辟以自佐嘗至饒州三日無所詣刺史蔡京率官屬就見之龜䝉不樂拂衣去居松江甫里多所論撰雖幽憂疾痛貲無十日計不少輟也文成竄藁篋中或厯年不省為好事者盗去得書熟誦乃録讐比勤勤朱黄不去手所藏雖少其精皆可傳借人書篇帙壞舛必為輯禠刋正樂聞人學講論不倦有田數十畆屋二十楹田苦下雨潦則與江通故常苦饑身畚臿茠刺無休時或譏其勞答曰堯舜黴瘠禹胼胝彼聖人也吾一褐衣敢不勤乎嗜茶置園顧渚山下嵗取租茶自判品第張又新為水説七種其二惠山泉三虎丘井六松江人助其好者雖百里為致之初病酒再朞乃已其後客至置潔壺桮不復飲不喜與流俗交造門不肯見不乗馬并舟設蓬席齎束書茶竈筆牀釣具徃來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以髙士召不至李蔚盧携素與善及當國召拜左拾遺詔方下龜䝉卒光化中韋荘表龜䝉及孟郊等十人皆贈右補闕陸氏在姑蘇其門有巨石逺祖績為鬱林太守罷歸無装舟輕不可越海取石為重人稱其亷號鬱林石世保其居云蒋貽恭呉人流落入蜀性耿直有逸才每一吟詠率多諷刺時蜀主季年臣僚多尚權勢侈敖無節因為詩以諷之蜀主知其不避曰敢言之士也特授雅州名山令又善隷篆賜銀緋松江漁翁者不知何許人恒櫂舟遊長橋徃來波上意氣自得醉則扣舷而歌紹聖中閩人潘裕自京師調官回道呉江遇而異焉起揖之曰予視先生氣貌固非漁釣之流願匄緒言以發䝉陋翁曰吾厭喧囂處閒曠遯迹於茲三十年矣幼喜誦經史百家之言後觀釋氏書今皆棄去唯飽食以嬉尚何所事裕曰先生澡身浴徳如此今聖明在上盍出而仕乎翁笑曰君子之道或出或處吾雖不能棲隱巖穴追園綺之蹤竊慕老氏曲全之義且棄軒冕如糞土耳與子出處異趣子勉之裕曰幸聞志者忘形養心者忘道致道者忘心心形俱忘其視先生之髙義敢問舎所翁曰吾姓名且不欲人知况居室邪飲畢鼔枻而去鍾璇字振遠一字叔齊常熟人六嵗而孤育于繼祖龍圖學士林遹家遹家多書因得縱觀與其孫璟瓌琢同肄業課率先成後璟三兄弟竝登第璇遂棄舉子業取所藏盡閲之侍官台州嘗遊巖谷間遇異人衣僧服持列禦冦書揖而與坐磐石指一泓定水曰此水滔滔乃皇極大中之道語久别去自是有悟益不溺於名利放浪漁釣間築室梅里所居多蒔香草閉户二十年家貧殊不戚戚有求者解衣分粟無靳色唐瑑自留守歸寓梅里與為忘年交提舉徐誼知府沈揆皆造其廬以竒人目之范成大等薦于朝不報卒年五十二有藥園藁山中録續孔白帖秦漢以來鍾鼎竒字藏於家鄭思肖字憶翁號所南連江人祖咸卒於枝江主簿父震字叔起淳祐道學君子為安定和靖二書院山長有菊山詩集景定壬戌卒於呉𦵏長洲縣甑山思肖太學上舎應博學宏詞科侍父來呉寓條坊巷元兵南下扣閽上太皇太后幼主䟽辭切直忤當路不報初名某宋亡乃改今名思肖即思趙憶翁與所南皆寓意也素不娶孑然一身念念不忘君形言於詩文中如過徐子方書塾云不知今日月但夢宋山川題鄭子封寓舎云此世但除君父外不曽别受一人恩寒菊云寕可枝頭抱香死不曽吹落北風中贈人云天下皆變吾觀其不變惟其不變廼所以變其變者物也不變者道也又云古人重立身今人重養身立身者葢超乎千古之上與天地周流於不知不識之天也養身者惜一粟以活微命役於萬物死於萬變者也何足道哉遇嵗時伏臘輙野哭南向拜人莫測識焉聞北語必掩耳亟走人亦知其孤僻不以為異也坐臥不北向扁其室曰本穴世界以本字之十置下文則大宋也精墨蘭自更祚後為蘭不畫土根無所慿藉或問其故則云地為他人奪去汝不知邪不欲與雖廹以勢權不可得也天目本中峯禪林之白眉聞思肖名欲見未果偶會於孝子梅應發家一見各黙不語坐久之本忽云所南何不説法思肖曰兩眼對兩眼無法可説及别去本又云博學老子思肖即曰世法和尚趙孟頫才名重當世思肖惡其宗室而受元聘遂與之絶孟頫數徃俟之終不得見嘆息而去無何化其所居得錢則週人之急田亦捨諸刹惟餘數畆為衣食資仍謂佃客曰我死則汝主之葢不以家為矣自是無定跡呉之名山禪室道宫無不遍厯多寓城之萬夀覺報二刹疾亟時囑其友唐東嶼曰思肖死矣煩為書一位牌當云大宋不忠不孝鄭思肖語訖而絶年七十八葢其意謂不能死國與無後也自贊其像曰不忠可誅不孝可斬可懸此頭於洪洪荒荒之表以為不忠不孝之牓様宋社既墟適意緇黄自稱三外野人嘗著大無工十空經一卷空字去工而加十宋字也寓為大宋經造語竒澁如庾詞莫可曉自題其後云臣思肖嘔三斗血方能書此後當有巨眼識之又著釋氏施食心法一卷太極祭煉一卷謬餘集一卷文集一卷自叙一百二十圖詩一卷思肖母樓氏宋侍從鑰之族妹為比丘尼名普西受業於飲馬橋南寳林尼寺張介福字子祺覃懷人從姑氏來呉少慕鄉先生許衡遂軒軒以禮自持為學鞭辟近裏不事表襮雖歩周旋必蹈規矩以不及奉親未嘗食士禄張士誠入呉兵掠其家端坐不動兵脇之令其導諸富家不從乃以刀斫其面流血仆地復戴冠危坐而顔色自若兵捨之而去家素貧冬不具衣􅃭或遺以裌絮固辭之雖小物亦不受後因親墓在城西恐盗發之遂廬於墓側及臥病至死神爽弗昧語其友曰吾學古人一無所成死有餘憾矣人物十六隱逸顧初者郡人也嘗有牛暴其禾初見牽牛隂凉木下刈芻飼之牛主愧服不敢暴焉顧黯字長孺郡人有隱操齊永明元年徴為散騎侍郎同郡鹽官顧歡為太學博士俱不就徐修矩呉縣人唐恩王府記室㕘軍奕世才賢居家介潔守書萬卷優游自適有潮田五萬歩草屋十數間不復出仕皮日休嘗就借書讀之其時有任晦亦同縣人日休與陸龜䝉作二游詩史徳義崑山人唐咸寕初隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人髙宗聞其名召赴洛陽尋稱疾歸公卿皆賦詩餞别徳義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徴赴都詔曰蘇州隱士史徳義志尚虚𤣥素履真確謙冲彰於里閈孝友表於閨庭固辭徴辟長徃嚴陵之瀬多謝簮裾髙蹈愚公之谷風操可知啓沃攸佇特宜優奨委以諫曹授諫議大夫興死放歸丘壑素譽頓衰新唐書云以周興薦擢朝散大夫陸誇自右拾遺除司勲郎中棄官隱呉中詔召之既在道歐陽秬遺書誚其出處之遽誇遂還秬詹從子也名亦髙胡稷言字正思兵部侍郎則之從子少學古文於宋祁後獻時議於范仲淹復授經於胡瑗以特奏補官調晉陵尉厯鄞縣簿山隂丞自以不能究其所施遂乞致仕陞朝後仍賜緋衣銀魚既告老即所居臨頓里陸魯望遺阯築圃鑿池追陶靖節之風作五柳堂清修寡欲延納後進日晡後不復飲食客至蕭然具湯一桮而已卒年八十餘子嶧嶧字仲連姿禀淳慤恬於榮利父子兄弟相為師友嶧與方惟深林虙為忘年交後以年格建炎登極推恩調廸功郎安遠尉非其好也所居五柳園松忩蓬户植竹䟽沼人目為隱君子歩趨言動皆有尺度賔嘉喪祭率循古法用杜甫詩名所居曰如村累舉命官終不仕紹興中卒年七十九詩文簡古有如村冗藁二十卷子曰百能百能字少明紹興進士知衢州江山縣有惠愛乾道初授諸王官大小學教授嚮進用矣以年至力請老廷議嘉之授左奉議郎賜緋衣銀魚致仕而歸築堂曰宜休錙銖軒冕殆其天性久之卒年七十四子耕侍其沔字國紀上世自髙密徙呉沔為學貫穿經傳與人交如淡薄遇其急奮義以徃不避艱險五舉禮部退為鄉先生治平三年沒門人弟子相與議其治行謚曰夷晦滕元發志其墓云士生斯世有進取出力得時行道功烈被於民者有行義修潔退而講學為一鄉之善士者斯二者用捨不同要皆天下之强立君子也善士葢指沔其慕尚之如此顧禧字景繁祖沂字歸聖知龔州父彦成字子英兩浙運使皆有賢名禧雖受世賞不仕居光福山中閉户讀誦博極墳典所著書甚富注蘇文忠公詩尤詳紹興間郡以遺逸薦閒居三十年不出章康字季思都官郎中甫生惠惠生漢卿漢卿生頡皆隱居不仕康頡之子也安貧樂道居城西田屋粗給閉户不染世俗出入徒歩人尊稱之曰聘君平生足迹未嘗越州境而四方之人無不知有章季思士大夫過呉以不見為慊嘗問學於朱熹黙有所契日以詩陶冩遇紙即書人人取去以此終身不厭年七十歩履如飛或訝其有方外之遇問之康云吾師聖賢無外學也淳祐五年忽謂其子仲肯曰吾死有期預書墓葢以明年卒年七十九終時正寝梁壞有聲人皆異之郡人胡淳從康遊嵗時致醪醴薪米所著雪厓文集十卷詩集五十卷淳字以初陳深字子微世為呉人生於宋習舉子業宋亡棄故習篤志古學閉門著書有讀易編讀詩編春秋編弟子甚衆且有髙名深書筆亦精天厯間天章閣建以能書薦之潛匿不出以終别號寕極學者稱寕極先生子植字叔方少負才氣喜與倜儻之士游既而折節讀書克繼父業有孝行晨夕躬事庖饌親之中裙厠牏手自浣濯更世變以琴書自娯屢辟召皆不起植子紹先自有傳韓奕字公望宋忠獻魏王琦之後其先自安陽再徙居呉之樂橋父凝工醫在藝術傳奕㓜端重簡黙動作循矩度雖居㕓市而樂事遊覽放浪山水間褐衣芒屨一童自隨徃來山僧野客家累月不去或時藉草而坐微吟長嘯人莫測其意性頴敏博學尤工於詩洪武中與王賔俱隱於醫賔既為郡守姚善所禮乃復因賔致奕奕終不徃一日與賔詣之奕走楞伽山善隨至奕泛小舟入太湖善嘆曰韓先生所謂名可得聞身不可得而見也所著有韓山人集王賓初名國賓字仲光長洲人博綜文籍經史諸子厯數兵政百氏小説靡不該貫而制行竒狷不娶不宦貌甚寝又以藥㸃面及肘股為創髽髮短衣或箕踞道傍􅐡搔雖知者亦不敢薦逹姚善為守特徃求見賔執禮抗節風軌甚髙與韓奕事皆互見善傳性至孝奉母甚篤年七十病革抱母不舎死而復蘇呼母連聲始絶既𦵏神歸于家方午聞其杖履聲呼母曰孃孃兒舎孃孃不得良久乃滅自號光菴所著有光菴文集呉中名賢紀録呉下古跡詩杜瓊字用嘉吳縣人生一月而孤母顧育而教之長從陳繼先生學博綜古今為文和平醇實而必本於理詩尤沉著古雅有風致間冩山水尤潤秀可觀性至孝父蚤亡念不得見從人問知其容儀徃徃形諸夢寐以父名玉終身諱之嘗刲股已母疾有司将上其孝瓊曰此豈得已邪惟母節未白可念耳有司以聞遂得旌其母每求賢詔下有司輒以瓊應皆辭不就雖介特有守而不為過矯之行所居在城西有隱居之趣其東有原學者稱東原先生年七十有九卒三呉交從會𦵏者千餘人因私謚曰淵孝先生今列祀鄉賢祠所著有東原齋卷紀善録耕餘雜録龔詡字大章崑山人父詧洪武初為給事中謫戍死詡少依母族冒姓王氏既長隱迹田里肆力經書晝夜不輟尚書周忱屢至其家資訪時政兩薦為松江太倉教授皆不就有田三十畆力耕自給晚嵗獨與一老婢居破廬中種荳植麻詠歌自適沒年八十餘門人私謚曰安節先生邢量字用理長洲人隱居葑門以醫卜自給性狷介不娶與人無将迎足跡不出里門不畜奴婢敝屋三間青苔滿壁折鐺敗席蕭然如野僧長日或不舉火客至相與清坐而已其學自經史外凡釋老方伎之説無所不通室中臥榻之外皆藏書並手自校定或叩之信手舉似不事翻檢文章古簡亦不茍作同邑沈誠字希明生稍後隱操亦髙雖居通衢鄰里莫識其面朝士有欲過之者固謝不納誠博學問無不知然短於著述故無所傳云人物十七薦舉莫禮字士敬吳江人洪武中以税户人材徴授户部員外郎與同官沈玠王公讓張瑾楊徳彛徐衍龔逹可潘賢金伯中李鼎十人同日上疏辭禄詔許之秩滿超陞本部右侍郎轉左侍郎俄坐黨事卒臨刑賦詩有一心忠義堅如石惟有皇天后土知之句人多傷之顧禮字原禮崑山人洪武五年以材幹擢刑部員外郎八年超遷本部侍郎九年以家屬極刑循例除名放還十一年再徴為户部侍郎遷尚書十三年改刑部尚書卒於官范從文字復之文正公十三世孫六世祖之柔食邑於崑遂為崑山人父原良卒官潮州推官從文方弱冠匍匐至潮求欑不得日夜號泣俄大雨潰封得凾骨以歸人稱孝感洪武中以國子生奉使稱㫖擢監察御史改户部總部主事奏免株連盗倉罪百餘人俄為冏官所䧟得罪且死呼曰幸以先賢赦宥上問祖為誰曰范仲淹上曰得非先憂後樂者邪於是末減謫役荘浪頃復追戍金齒永樂初以薦起為金華訓導厯東安金鄉三學致仕歸年八十餘卒所著有小學章詁宗諜譜遺復齋集若干卷馬逵字伯行吳江人洪武中以人材徴授合水縣丞以憂去改昌邑為政亷平人不敢干以私粗衣惡食其妻不能堪乗間言之逵怒曰爾欲使我為善邪為惡邪後終河間衛經厯劉以禮字德讓其先汴人祖順之仕平江路㩁茶提領因家于蘇以禮學識該博儀状偉然洪武初以明經薦授沛縣儒學教諭時學徒久廢以禮力以興舉為已任乃舉鄉人張倫為訓導協心教之多所成就沛學至今祀之子敏敏字孟功學行純篤少隨父於任凡可以悦親者之惟恐不及親殁久言及輙淚下仲弟敬久嬰疾藥餌必手治弗假僕從士有寒而來歸者周之不厭有司聞其賢薦授徳清縣令鋤强植善民甚懷之後以善書徴入翰林擢中書舎人朝士多推重之修撰張洪嘗為文贈之曰南北宦遊來京者所稱許必曰孟功有不知孟功者葢非賢也其重之如此卒年七十有八盛逮字景華吳江人父似祖號寓翁者有行義始徙郡中洪武初逮以賢良應召賜冠帶㕘大臣議事與中書參政陳寕不合因以疾辭歸弟章以鹽法被捕甚急父憐其少子不忍遣逮請曰弟未有子願就捕因謫戍寕夏先是逮歸鄉里寕適守蘇将甘心焉亟欲見逮不得乃命逮督辦通區逋賦逮傾貲貸民償之友人唐自牧負官租計白金二百兩走告於逮逮如數與之翰林待詔李幹老無所歸逮延之家塾既卒𦵏於墓側嵗時祭之逮嘗遊闗中得異人導引法作原道詩卒年九十三子寅御醫有傳陳則字文度崑山人洪武六年秀才舉任應天府治中遷户部侍郎左遷大同府同知進知府則文詞清麗與髙啓楊載同稱沈芳字庭芳崑山人洪武二十六年舉茂才授觀察使遷北平左布政使沈應字德乾郡人洪武中應求賢詔選入文華堂説書除江西布政司㕘議母喪服闋改山東卒應善為詩所著有東澗集呉簡字仲亷呉江人元季數舉於鄉不利遂杜門績學尋以薦授郡學訓導陞紹興路學録洪武四年應詔至京以疾辭歸優游林泉號月潭居士年八十二卒所著有論語提要史學提綱并詩集若干卷二子復湖廣僉事頥縣學訓導俱有文名趙文字宗文長洲人洪武中舉人材以母老歸養永樂五年以翰林典籍梁時薦知鄱陽縣不阿權倖坐謫久之歸卒文淳厚强毅老而持度愈嚴鄉稱篤實君子所著有慎獨齋文集理學述言弟宗禮兵部郎中袁政字文理吳縣人嘗學於俞貞木永樂七年以薦授湘隂典史湘隂民素貧而堕於耕遇征調輙破産政為勸課振勵自是民有葢藏後以夏原吉薦陞遂安知縣未視篆宿於驛亭夢被血小兒數輩挽其衣覺而問於父老知邑中生女多不舉即嚴禁之後邑中生女多名袁留沈澄字孟淵長洲人洪武中以人材應薦至京尋引疾歸周文襄公廵撫呉中嘗就澄訪時政多所施行澄雅善詩尤好客海内知名之士無不造之所居曰西荘日與治具燕賔客詩酒為樂人以顧仲瑛擬之翰林金問坐事繫獄十年衣食之需皆澄周之問嘗謂人曰吾微孟淵為瘐鬼矣年八十有八而終子二貞吉恒吉隱跡尚義有父風俱能詩恒吉尤善畫李箎字仲怡常熟人永樂末以經明行修薦授崑山縣學訓導遷山東巢縣教諭箎有文學勤於纂述所著有友梅集崑山常熟崇明三志章珪字孟端常熟人宣徳中應求賢詔授廣東按察司知事入為監察御史嘗讞大辟囚多所平反畿輔旱蝗奏免民租六十餘萬斛後因廷論大臣不職為當道所惡因自解歸四子儀表格律先後登科位皆通顯累贈珪右副都御史格自有傳宣嗣宗嘉定人永樂中以善書薦入翰林授中書舎人陞吏部驗封員外郎進郎中卒嗣宗純謹不妄最為宣廟眷禮既卒遣宫祭于其家子謙福寕縣丞伊恒字宗友其先沭陽人宋建炎間始居蘇父肜以閭右徙實京師恒好學善書永樂中簡侍東宫特承眷注洪熈初擢冬官營繕所正與翰林修撰金問同被命待詔思善門進尚寶少卿復與問同命景泰中致仕卒年八十餘恒為人恭勤靜退不與時競時稱長者從子侃工科給事中衞靖字以嘉崑山人洪熈初以能書薦授中書舎人直文淵閣陞禮部主事預修宣廟實録進食五品俸靖謹厚能詩所著有公餘清興集陳述字宗理嘉定人好學能詩以賢良方正被舉任湖廣按察司照磨擢監察御史剗弊雪寃多所建明厯陞四川布政司左㕘政廵撫憲臣以述歴練老成識逹事機上章薦之述以老懇乞致仕進階二品姑蘇志卷五十五
