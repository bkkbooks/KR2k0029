body:
  text: 姑蘇志卷五十二明王鏊撰人物十名臣髙啟字季迪長洲人少孤力學工詩至正間張士誠開府平江承制以淮南行省㕘政饒介為咨議㕘軍事介有文學喜士啟時年十六或薦於介介見啟詩驚異以為上客啟不屑去隠吳松江之青丘洪武初以廷臣薦與修元史授翰林國史院編脩官命教功臣子弟一日召見啟與編脩官謝徽俱對時已薄暮上御闕樓擢啟户部侍郎徽吏部郎中啟以年少未習理財且孤逺不敢驟膺重任遂與徽俱辭於是賜罷仍各賜内帑白金給牒放還復居青丘先是啟嘗以史事為國子祭酒魏觀屬官雅相知契及是觀守蘇為徙居城中延問郡中政事得失接見甚密㑹觀得罪連坐死年甫三十有九啟身長七尺有文武才於書無所不讀尤粹於史其文喜辯擊馳驟上下精采奐發而詩尤號名家所著有缶鳴鳬藻二集楊基字孟載其先蜀人大父宦游江左而基生吳中遂家焉頴敏絶人九嵗能背誦六經著書十萬餘言名曰論鑒試儀曹不利㑹天下亂歸隠於吳之赤山張士誠時辟為丞相府記室未幾辭去又客饒介所王師下江南籍錄諸陪臣基以饒氏客安置臨濠旋徙河南洪武二年放歸尋起為滎陽知縣謫居鍾離久之被薦為江西行省幕官以省臣得罪落職六年又起奉使湖廣召還授兵部員外郎出為山西按察副使進按察使後被讒奪職供役卒于京基尤工于詩初㑹稽楊維禎客松江往來吳中以詩自豪基嘗於坐上賦鐵笛歌維禎驚喜與俱東語所從曰吾在吳又得一鐵來矣若曹就之學優于老鐵學也至正洪武之際與髙啟張羽徐賁齊名號吳中四傑所著有眉菴集盧熊字公武其先本武寧人宋季徙家於吳再徙崑山父觀字彦達讀書有至行門人私諡夷孝先生熊元季為吳縣學教諭洪武初以故官迫遣赴京母卒竟歸復起為工部照磨尋以善書擢中書舍人遷兗州知州為政務愷悌不求赫赫名州初罹兵革人情凋弊適大帥李善長營魯王府浚兖州河熊撫綏供億事集而人不擾俄以簿錄刑人家屬事坐累死先是熊嘗上疏言州印篆文譌謬忤㫖至是竟得罪熊少嘗從學楊維禎博學工文詞尤精篆籕所著有説文字原章句鹿城隠書蓬蝸憂幽石門清溪等集别有蘇州志兖州志孔顔氏世系譜總若干卷子彭祖字長嬰洪武末任湖州武康丞永樂初薦授禮部主事坐事謫阜城為民尋徴詣行在冠帶聽用以疾卒彭祖幼傳家學不事藻麗而求以適用為政亦有父風彭祖孫瑛字克脩宣德五年進士官刑部主事博學工書尤工畫竹盧熈字公暨熊之弟洪武四年以薦授睢州同知時中原兵革甫定嵗復薦饑熈一意休息惟恐傷之明年行守事適御史銜命搜訪舊軍籍見民充之睢近千人檄熈拘送熈召民自實得嘗𨽻尺籍者數人畀之御史怒械繫曹吏必欲盡得不然以格詔論同僚懼議發民應之熈曰吾守民吏也民散吾誰與處乃自詣御史曰州已無籍軍今民且散走獨有同知在請以充役御史怒斥去堅立不動竟不能奪後卒於官貧不能喪官為具殮喪歸吏民挽哭者千人道遇大雨無一人少却其得民心如此熈為人雅飭信厚博涉經史亦善筆札子充􅜶字次農文學得於家傳而制行尤髙以能書薦留誥司將官之㑹熊死歸葬誓不復仕充􅜶子儒字為已博學能文自負甚髙亦以薦官中書舍人滕徳懋字思勉吳縣人元季為江浙行省掾㕘政多爾濟巴勒討方國珍辟為㕘謀度海􅄓風大作舟且覆德懋神色自若國珍降留撫台州三年台人德之國初徴擢丞相府掾從征陳友諒除知信州以才力不逮辭改建昌同知時陳氏故臣王溥守禦建昌所為多不法德懋以大義律之多所悛改進知潭州再進湖廣行省左右司郎中召拜兵部尚書坐事卒德懋才辯豪爽器量宏偉其學長於奏疏一時招徠詔諭之文多出其手子枋字用載有文學與從弟權齊名權在文學傳錢芹字繼忠吳縣人少負氣節欲以竒功自奮元季以策干諸將無所遇洪武初辟大都督府掾從大將軍徐達出北平絶大漠凱旋俄以例解職家居二十年甘貧守道為郡守姚善所知語在善傳以洪武末詔求遺逸善以芹應詔召對稱㫖留中議事授戸部司務北陲有警署行軍斷事從征虜將軍咨謀㑹軍府遣芹入奏道病卒瀕卒猶條邊事緩急上執政年七十二賜棺殮歸葬黄山郁新初名某吳縣人隨父徙鳳陽之臨淮家素饒財慷慨豪爽喜賔客樂賑窮乏洪武二十一年以人材徴授戸部度支主事賜名新次年改官制戸部設十二屬司遂陞北平部郎中二十四年陞戸部右侍郎奏事庭中被顧問天下戸口數目漕運地里險易應機響答無遺謬遂陞尚書永樂三年卒上顧翰林學士解縉等歎息稱其才賜葬臨淮余熂字茂本崑山人美丰姿少有雋才從殷奎陳潛夫學得春秋之傳洪武初選授承勅郎進通政司㕘議拜吏部尚書熂為人長者其家故鑷工既貴造里中人家必戒其下云第稱余待詔兒勿云官人也王英字俊伯崑山人洪武初從鄉校貢太學選授山東道監察御史上察其可用特命署都御史事大書敦厚王英四字揭諸殿柱尋授刑部主事陞郎中出為寧海知縣永樂初召入復為郎中陞陜西按察使任滿得代行至泗州卒英立朝兢兢謹畏每顧妻子曰吾以身許國其勿以我死生為意時有建白輒毁其稿及長臬司以簡靜為治不事苛察其居鄉尤率易嘗微服入郡城時禁庶民服鞾門者縛英英笑曰吾官人也顧取舟中冠帶示之始得釋亦不色怒邑令盛設酒饌邀英辭之竟赴鄰翁飯或怪之英曰鄰翁貧治具不若令之易也鄉人至今傳為談柄云王遜字謙伯崑山人以進士為監察御史降上髙縣丞帶罪殺賊尋以功復官遜明敏健刻憲度肅然雖家居不少縱或謂曰君嚴自治邪遜曰吾讀書求道矧已不治而能治人竟以訐直得罪死子復字從道宣德五年進士亦終監察御史復子曰敏石門訓導施顯字孟微常熟人洪武中鄉試㑹試皆第一選庶吉士改前軍都督府斷事官又署北平按察司事坐累謫逺州踰年乞留中自效拜江西道監察御史卒於官顯讀書勤苦盛暑坐帳中帳頂皆黒子緒集其文名兩魁遺稿吕昭字克明崑山人嗜學敦行洪武中以薦授徐州訓導上疏言民事稱㫖改浦城縣丞縣故多荒地昭以俸資市榖給無産者俾藝其地而不責其償縣以富庶永樂中陞沁州知州父老持金為贈皆謝却之然僅至杭已不能僱舟狼狽而歸比赴沁道出徐州天寒尚未挾纊故所授經弟子共為買一毛裘僱一驢以往其子旦既舉進士昭遺書戒之曰進士美官然不能亷終非吾子死亦不歆汝祀其亷介如此旦字寅伯初任河南按察司僉事以事去職後以薦起為建昌府推官正綂間致仕性亦髙潔環堵蕭然未嘗以貧窶為意及卒不能喪蕭山魏文靖公驥遣人買棺斂之衛浩字季洪常熟人永樂初以太學生與脩髙廟實録擢監察御史出理幽薊諸郡文卷釐正宿弊時仁廟為太子留守北平浩入見言事稱㫖賜經書食物尋丁外艱起復巡遼陽浩立朝讜論無所忌諱風節雖勁而存心近厚寃獄多所平反嘗有邊將繫其偏裨失期者送京議死浩言宜聽立功自贖遂得免後遷江西按察副使以老乞歸卒年九十一黄鉞字叔揚常熟人洪武初以太學生授典史後登進士第遷戸科左給事中以憂家居壬午嵗自投琴川橋下死俞貞木初名禎字貞木後以字行更字有立石澗先生琰之孫自少篤志問學尤工古文詞元季不仕洪武初以薦授韶州府樂昌縣知縣丁父憂服闋改南康府都昌縣復以母憂去後以親族犯法例弗起郡守姚善雅重之延以訓子無何為鄉人所誣逮詣京師卒貞木為人清苦敦行古道作官務崇禮化有古循吏風晩嵗益勵清節或炊㸑不繼未嘗有所干請人尤難之所著有立菴集若干卷劉政字仲理以禮季子性聰睿肆力問學洪武己卯以春秋中京闈鄉試第一時主考方孝孺批其文有羣鳥中之孤鳳及吾當虚左以處之之語政平生忠義自許壬午嵗聞國事感慨不食死朱吉字季寧徳潤子洪武中以薦授戸科給事中時糧長稽違勘合皆坐死籍没吉疏言勘合雖違而税糧已足乞減死又乞寛胡藍黨禁以安反側皆從之後以善書改中書舍人尋改侍書出為湖廣按察司僉事坐事繫獄永樂中赦復為中書舍人年八十一卒吉有文學所著曰三畏齋稿子定安字士隆尤工古篆得周伯温之傳嘗積其書草瘞之名篆冢春坊中允吳均有篆冢記侍講王洪銘次泰安字士栗領鄉薦授内黄教諭歴安仁安吉歸仁三學次永安字士常亦善筆札皆清脩篤學不墜其家聲云姚廣孝長洲人初為僧名道衍字斯道居相城妙智菴時相城靈應觀道士席應真者讀書學道兼通兵家言尤深于機事廣孝從之執弟子禮於是盡得其學然深自退藏人無知者其友王行獨深知之曰他日必當有所遇固不得以人廢言也洪武中以髙僧薦選侍文皇於燕邸深見親信與密謀永樂中以靖難功進官太子少師復姓賜今名擬於元之劉秉忠卒贈榮國公諡恭靖配享廟庭初靖難之功廣孝第一事定未嘗自言文皇屢欲官之輒辭一日召見令人潛以冠服被體亟命宣謝不得已受命終不蓄髪娶妻所居多在僧寺然文皇眷禮彌篤每稱少師而不名及病駕幸其第問後事對曰出家人復何所戀强之終無言文皇念其功特官其養子姚繼為尚寶少卿廣孝博通内外典亦工文詞所著有逃虚子集别有道餘錄則專詆程朱其友張洪嘗云少師於我厚今死矣無以報之但見道餘錄輒為焚棄許思温字叔雝吳縣人洪武中以貢入太學選署刑部郎除監察御史改廣東揭陽知縣尋復職陞北平按察副使洪武末改署大興縣永樂元年以守城功陞刑部左侍郎奉表入賀轉吏部左侍郎兼左春坊左賛善署尚書事六年卒年四十三洪熈初追贈吏部尚書遣官祭其墓官其子俊為太僕寺丞曽爟字日章以字行吳江人父朴浙江醫學提舉自杭徙蘇日章博學有材智受春秋於魯道源洪武間以嵗貢授黄陂知縣秩滿以最聞陞翰林侍讀同脩永樂大典奉使交趾還陳黎氏篡立本末當征在軍中多賛畫之功交趾平復承命往諭卒于富良江子堅字孟堅亦以春秋起家拜禮部郎中擢四川左布政尋改雲南平思忠吳江人初為縣小吏永樂中被薦授禮部主客司主事進郎中時文皇方事招懐主客務方殷思忠有精力事皆立辦尚書吕震特器之俄以事下獄北人入貢他任主客者多不稱㫖震因以思忠為言即日赦復其官時以給事中楊𢎞為陜西布政欲使清强有力者伺察之遂拜思忠陜西㕘政未幾為人所誣謫戍北邊㑹有詔市馬西域以思忠嘗官主客多識賈胡詔釋其戍給冠帶隨太監劉馬兒使吐蕃諸國而還後卒於家初郡守况鍾官主客與思忠有交承之分至是數延見思忠執禮甚恭且令二子給侍曰非無僕𨽻欲使兒輩知公為吾故人耳其見敬如此然思忠居貧自守未嘗以事干鍾人尤多之何源一名徳源字幼澄吳江人洪武間領鄉薦授保德州學正陞德州知州嵗旱隣治多蝗不入源境陞梧州知府梧有水患民多流亡衆議具奏賑之德源曰若俟奏報民皆死矣乃首捐已俸次募義民出粟賑給民多賴之又悉毁境内淫祠以詿誤謫交趾英國公張輔舉署交州學事多所造就士之以貢選至方嶽者十餘人後召為吏部考功員外郎出為鄭府長史復改吏部文選郎中正綂間擢江西右布政致仕源為人温雅歴事五朝文章政事見稱一時卒年八十六王汝玉名璲以字行其先蜀之遂寧人六世祖極仕宋為吏部侍郎僑居吳中遂為長洲人父立中字彦强元末老儒仕開化慈溪二尉陞紹興路治中歴知無錫嘉定二州進知松江府入國朝致仕有文學善畫汝玉頴敏强記年十七中浙江鄉試洪武末以薦攝郡學授應天府學訓導擢翰林五經博士永樂初進檢討再進春坊賛善預脩永樂大典仁廟在東宫特深眷注嘗與學士解縉應制撰神龜賦汝玉第一名大振然忌者衆竟以他事下獄死洪熈初追贈太子賔客諡文靖遣官祭于其家汝玉為文兼古今體製而賦尤贍麗詩語雋永得唐人風格舉筆數千言頃刻立就所著有青城山人集王璡字汝嘉汝玉弟少坐累謫戍五開後舉明經為武昌府學訓導陞大庾教諭永樂初召脩永樂大典充副總裁又修五經四書性理大全書成留為翰林五經博士進侍講洪熈初開𢎞文閣命楊溥陳繼及璡日直其中禮遇甚厚宣德元年卒璡文章不及汝玉而理致為勝制行醇篤楊文貞公尤重之汝玉兄璉字汝器洪武壬子簡㑹試七十八人授編修使肄業文華堂命宋濓為師璉在選中後為吏部主事卒所著有錦江𩔖稿論者謂其文學不減二弟而早卒不甚著故人無知者金問字公素吳縣人父道𤣥見孝友傳問少受易俞貞木家貧無書從人借讀無不通解永樂初被薦為司經正字時宫僚多得罪問亦坐繫獄十年非義相餽皆不受時黄淮楊溥同坐繫三人相得甚省躬念咎之暇各持一經講論曰此處憂患之道也洪熈初命待詔思善門制授翰林修撰備顧問論時政得失悉見奬納宣德末擢太常少卿兼翰林侍讀學士正綂間調南京嵗餘遷禮部右侍郎卒于官問文行敦茂義聞流著平生閲履否泰相尋而不變所操製􅄒雅健精采奕然善書得魏晉筆法星厯之學尤精然未嘗以語人有集若干卷兄聲亦好古嗜學問事之如嚴師嘗病熱劇醫云必得螺可治方盛寒問解衣循河覔之得百枚以進病良已子汝進太僕丞楊翥字仲舉吳縣人宋和恭武王存中八世孫少孤貧與兄戍武昌為鄉校師有狂生侮詈之翥若不聞人以告翥曰豈無同姓名者邪人服其長者久多化之楊文貞公士竒漂寓武昌偶憩翥館以無資告翥遂讓其塾自教授他所日往返十餘里不厭比文貞當路乃相引拔仁宗素知翥遣使驛召之授翰林編脩陞脩撰與脩三朝實錄遷郕王府長史而歸景帝即位翥朝京師命為禮部左侍郎食祿致仕又二年復朝進尚書加祿仍歸翥篤行不欺仁厚絶俗隣人作室簷溜落翥家家人不能平翥曰晴多雨少何必校也又鄰人老得子翥恐所乗驢鳴驚之即鬻驢徒步入朝猶子懐金入市為人攘去以告翥不答或請理于吏翥不許文貞公落新第亟邀登堂曰舍初成得吉人首臨之其寛雅德度一時著聞至今鄉郡以為口實為文章平實有理如其人年八十五卒詔賜葬祭召其子珒入朝問所欲為官對曰願得本縣主簿從之張洪字宗海常熟人洪武間以事被逮謫戍雲南後以明經被薦授靖江王府教授永樂元年擢行人奉使日本卻其餽金二年復使遼東修茶馬舊政于邊界亦不受餽時緬甸宣慰那羅塔殺孟養宣慰刁木旦併其地命洪齎詔責還所侵地立孟養後塔不服凡六往始聽命塔欲毒之服其誠信乃已還入翰林修永樂大典充副總裁書成陞行人司副洪熈元年陞翰林院修撰致仕卒年八十四所著有四書解義周易㑹通尚書補傳詩經正義春秋説約禮記總𩔖歴代詩選史記要語琴川新志日本補遺等總若干卷吳訥字敏徳號思菴常熟人七嵗能背誦五經正文父遵道為沅陵縣主簿被繫至京訥乞自代事未白而父没治喪如禮不用浮屠訥力學尚義兼善醫術永樂間以醫士舉至京懇辭仁廟時監國聞其名命教功臣子弟俄遷監察御史出巡浙江削秦檜碑表陸贄里修岳飛墓動皆扶植綱常次年巡貴州恩威並施羣夷畏悦將代還夷人相率詣闕請留不許宣德五年陞右僉都御史尋陞左副都御史致仕年八十六卒訥為人端重純明履方居約不以窮達易所守其學務遵儒先為文根據義理有禆世教所注有小學集解文章辯體性理羣書補注行世追諡文恪彭韶賛云古貌古心學窺性理孝義幼聞實形踐履避迹儒醫監國所禮乃教世胄乃司風紀卒貳憲臺清德莫比篤老劬書以忘憂喜修正遺文垂訓無已尤安禮字文度長洲人父義字從道元末師陳基學辟樞密掾遭亂屏居二十年洪武中舉人才授湖廣布政司經歴以亷謹稱性沈厚明哲處患難不失守著元史緝要藏于家安禮尤純厚少從父寓武昌與楊尚書翥楊文貞士竒友善相厲以德業歸補生員嘗行從委巷邂逅一姝若將獻笑者安禮亟引去後不復由是路同學生陳文學當逺戍泣告安禮吾必不生還妻當弗能守奈幼女何安禮曰安禮在子勿恤此吾有子當娶之已而陳果死妻乃克守義安禮無子以弟之子為後即聘之弟以女有疾不可安禮曰吾豈食言於亡友卒娶之安禮教諭崇安秩滿諸生詣闕請留上命増秩還任尋擢武庫郎中有馬主事面肆謗詈安禮走避徐言曰馬君改常矣旬日馬死擢貴州㕘議病歸不出太守況鍾朝京師文貞問安禮起居鍾謝不知及歸往候之見所居隘陋欲割官地益之堅謝不受安禮平居若無可否至辨認理欲毫芥不苟孫淳字公厚為平陽教諭遷知鉛山縣改永年居官亷慎致仕歸卒顧巽字順中長洲人受易于鄉儒周傅為程文敷腴華鬯理趣兼得行輩敬服之永樂十二年以易魁鄉試又十年始上春官甲辰年登進士第未授官卒當時從巽授經者甚衆而賀亷孔友諒顧珣輩皆中魁選吳中易學實始於巽巽子亦以家學正綂丙辰第進士官監察御史有風裁遷福建按察副使改戅州知府致仕卒子餘慶成化壬辰進士由工部主事累官河南參議巽餘慶俱以辰年進士士林竒之陳繼字嗣初吳縣人父汝言見寓賢傳繼生十月汝言坐事死母吳攜歸蘇家具蕭然惟存書二萬卷其母守節教繼繼長從王行學再從俞貞木遂以古文名三吳逺近交聘為學官以親老辭先是楊文貞公士竒見繼文喜之㑹仁廟即位奬用儒術遂上言繼文學宜在近侍即日詔驛召之既至授國子博士明日入謝改翰林五經博士時初開𢎞文閣延文學之士以備顧問命學士楊溥侍講王璡及繼三人領之宣德初預修兩朝實錄進檢討踰年引疾致仕卒於家繼為人端恪其學自經史百氏皆博考深究文章根義理辯體製嚴矩矱不肯茍率一時稱為作者所著有怡菴集子寛字孟賢完字孟英皆能文而寛尤長於詩新麗和平頗得唐法寛同時又有徐庸用理賀甫美之顧亮寅仲王越孟南孫寧繼康自後又有常熟陳䝉吳江吳璩皆以詩名陳祚字永錫吳縣人永樂中以進士選為翰林庶吉士擢河南布政司右㕘議以言事謫為太和山佃户十年宣德初召為監察御史疏言帝王之學先于明理明理在于讀書讀書貴乎知要惟真德秀所著大學衍義載聖賢格言古今治亂而且要切乞常御經筵講説庶知孰謂道義可遵孰謂嗜慾可節孰謂忠賢可親孰謂邪佞可逺孰謂民利可興孰謂民害可革古今若何而治若何而亂政事何由而得何由而失等語疏入或摘其語以動上上怒逮繋至京并籍其家下詔獄五年正綂初釋之復其官祚以父母瘐死獄中乞追服不允章再上得給假歸葬還朝出按湖廣復以言藩府事逮至京論死尋得解改南道時戸部侍郎吳璽薦主事吳悅悦有過被劾法當連坐而有司私憾璽附致至死悅亦自經祚言刑部大理符同深刻乞各坐以變亂成法罪上可之且以其言定為例八年陞福建按察司僉事數月以病得請致仕歸年七十五卒祚為人風神峻整音吐剛厲中雖少容然襟懐坦夷褒善薦才持法平恕身屢危而氣彌厲忠誠激發葢得之天性云所著有小學正誤子寧新野王教授寧子悅永定知縣張朂字勉夫吳縣人父以常永樂甲辰進士為河南遂平知縣改永平灤州學正朂侍學于灤永樂丁酉中順天府鄉試授揚州江都縣學訓導秩滿用薦試上國觀光賦等題陞監察御史朂以身許國知無不言嘗出按山西體察民隠密封奏之其言激切有古諫臣之風而不便者媒以他事必欲陷朂以死賴宣廟明聖卒保宥之陞廣西布政司右㕘政丁母憂歸未幾卒年止四十有九朂氣宇剛方閨門之間亦以之為矜式虞祥字仲禎崑山人永樂中領鄉薦授金華府學訓導陞上虞縣學教諭宣德中選擢禮科給事中進通政司㕘議再進户部右侍郎改兵部卒祥為人謹飭達大體自校官入諫垣及以大臣巡視畿甸所在著聲云王永和字用節崑山人永樂甲午中應天鄉試以母老就乙榜授嚴州府學訓導改饒州適大成殿弊言於太守欲葺之太守難其事永和毅然曰公不見里巷孺子始就外傅猶知尊禮孔子公乃不知所本邪秩滿入為兵科給事中劾奏錦衣指揮馬順怙寵驕恣欺㒺不法等事後持節册封韓王世子妃糾正中官蹇傲之罪進都給事中尋陞工部侍郎巡撫淮右奉命治徐州吕梁二洪正綂己巳死于土木之難贈資善大夫工部尚書官其子汝賢大理評事次子汝敬天順己卯經魁又次子汝霖正綂戊辰進士初任吏科給事中累陞河南右布政使劉璉字廷璉崑山人永樂十年進士任陜西道監察御史陞山東布政司右㕘政洪熈元年㕘賛宣府軍務宣德十年兼督邊儲陞户部右侍郎尋轉左侍郎仍兼巡撫累降勅褒奬有秉公正之心勵亷潔之行勤謹詳明夙夜無懈之語璉公勤亷謹人不敢干以私在邊數年終始如一日其後都御史李秉督邊儲悉依璉法景泰二年致仕卒于通州不能歸遂即其地葬焉天順三年葉文莊公盛㕘政山西奏璉在邊年久保障有功乞恩褒恤於是朝廷遣官諭祭遷葬崑山李蕡字茂實長洲人永樂中進士釋褐除兵部武選司主事歴員外郎郎中在武選司二十年受知於尚書方賔陞太僕少卿靖逺伯王驥征麓川奏蕡為佐俄丁父憂詔起復視事事竣陞工部侍郎始乞持服服闋以兵部尚書鄺埜薦改兵部侍郎卒于官蕡勤敏有吏材習知兵事所在著聲性沈厚不茍居鄉里未嘗以貴加人每出必步過里門上馬終其身如一日同時有劉紹目繼初者由兵部郎中累官廣西兵備副使時稱劉司馬亦以厚德稱蕡妻之父也夏㫤字仲昭崑山人先冒外姓朱氏登第後始復今姓㫤以經術進而書法特妙由庶吉士改中書舍人文廟嘗試其書第一特命書諸宫殿牓遂賜第宅免朝㕘眷顧極隆初㫤字作昶因召見上曰日豈可從傍宜加永上遂為更定故今字皆從之其後遷考功主事正綂中出知瑞州府入為太常少卿進卿致仕㫤為政不事名譽而人安其平易居家孝友而風流文雅有髙人之致詩詞清麗尤工畫竹石擅名天下至於朝鮮日本諸國皆懸金購之兄昺字孟暘亦善書初為永寧縣丞謫戍隆慶㫤既被遇文皇間問其書所自以昺對即日命馳驛入見試書稱㫖授中書舍人張益字士謙吳縣人少長京師登進士第入翰林為庶吉士授中書舍人轉大理評事與修宣廟實錄書成遷翰林修撰進侍讀學士入内閣典機務正綂末死土木之難贈翰林學士諡文僖益為人清淳端謹文章圓熟對客數千言援筆立就楷書亦工初益與夏㫤同年及見陳嗣初王孟端俱喜作文寫竹後㫤見益作石渠閣賦出已上遂不復作文益見㫤竹妙絶亦不復寫竹竟各以其所能名世劉鉉字宗器號假菴長洲人少孤力學永樂中以善書徴入翰林明年中順天府鄉試授中書舍人預修三朝實錄成陞兵部車駕司主事進翰林侍講正綂戊辰選進士為庶吉士命鉉教之日有程限詩文經改竄者一字未穏閱旬猶為易之明年陞侍講學士景泰中兼經筵講官㑹大旱遣祀濟瀆有司餽遺皆峻却之用少傅髙榖薦為國子祭酒嚴教條以約諸生無敢倖進者天順改元擢為少詹事日侍皇太子講讀卒上聞嗟悼曰安得學行醇篤如斯人者邪命官諭祭賻贈有加鉉為人介特自持言行不苟與人交一以誠信權門要路未嘗一迹官位已崇猶僦居隘巷當時楊士竒楊溥相推許有古君子之行平生躭嗜羣書至老彌篤為文渾厚詩舂容豐贍皆有法則所著有假菴稿成化三年追贈禮部侍郎諡文恭子瀚由進士歴官大理寺丞出為陜西按察副使致仕有吏材亦謙謹有父風諸質字叔義吳邑人由舉人典教永年改慶元遷國子學録進監丞擢翰林編修仍理監職以憂歸遂請老以卒質為人誠信端直每事審義而行恂恂引退若懦夫至論事裁決侃然不撓陳敬宗為祭酒剛嚴少許可質以事請輒降顔譚講質居録常攝丞居丞常攝堂事同輩嫉之伺察終無疵可指同邑夏瑜字公瑾由進士累官考功郎中居官請託不行為用事者所誣謫戍雲中景泰初遇赦復職致仕天順初再徴以疾不起卒於家為人朴茂清慎時稱為長者又有長洲鄭鋼字德新既領鄉薦母亡十年不仕正綂乙丑授趙州學正遷吉安府教授再遷寧王府長史致仕操履端潔經學精醇而教人有古誼二學至今祀之瑜鋼與質雖先後不一時而人並以厚德同稱仰瞻字宗泰長洲人永樂中以鄉貢進士授虎賁衞經歴遷大理左寺丞正綂間宦官王振用事百司多奔走其門時大理卿薛瑄少卿顧惟敬及瞻獨不往㑹辨蔚州衞兵沈榮寃獄益忤振遂謫戍大同景泰初刑部尚書俞士悦左都御史陳鎰言其以鯁介受竄召為右寺丞持法愈堅在位者多不合遂引年辭歸加大理少卿致仕所著有小學講義歸休文集瞻尤篤長者之行有夏時建中者嘗任郡學訓導瞻嘗師之後瞻經其門必下驢趨而過人竊窺之雖暮夜亦然顧惟敬吳縣人永樂中以薦授中書舍人累陞大理少卿初仰瞻得罪用事者意在薛瑄及瞻詞不連惟敬惟敬曰吾與瑄瞻同寮事得分治豈可使二人獨䝉其罪因自請逮治願與俱謫然迄無所坐止降四川某州知州未幾乞歸家居以禮自持不妄交際年八十餘終陳鎰字有戒吳縣人舉永樂壬辰進士擢監察御史歴湖廣山東浙江按察副使宣德乙卯邊務方殷特陞都察院右副都御史鎮守陜西兼督寧夏延綏等處邊備尋陞右都御史入掌院事轉左都御史時陜旱甚陜人思鎰連章上請乃以太子太保出鎮至則禱於西嶽得雨人情大悦開倉賑濟全活甚衆鎰在陜十餘年領勅八十餘道悉聽以便宜鎰亦竭誠殫力知無不為陜人德之家繪其像云旱禱之則雨病禱之則瘳葢事之如神云年六十三致仕卒錄其子伸為刑部照磨追諡僖敏其弟子僎字汝翼舉進士由南京河南道御史陞四川按察司僉事時蜀有夷寇僎練兵且探得夷情寇悉破散舟濟汝南溺死人多惜之俞士悅字仕朝長洲人自幼讀書過目即成誦永樂乙未進士擢監察御史陞湖廣按察副使綱紀振肅貪濁悉自引去居民不戒於火延及臬署僚屬皆奔避士悦具衣冠向火再拜風徐返火滅嵗旱有司用道家法焚蛇磔燕而旱彌甚亟命屏去乃齋沐露禱得雨連三日秩滿陞浙江㕘政初至徉若不解事者羣吏易之越三日發奸擿伏如神豪猾破膽正綂壬戌倭寇犯境士悅城泎澉二浦以備至今賴之尋陞河南右布政使甫三日召還陞大理寺卿己巳之變陞右都御史留守京師協都督衞頴帥師六萬守德勝安定二門士悅晝夜籌畫甲胄未嘗去體事平陞刑部尚書進太子太保天順改元謫戍遼東成化初赦還復其官卒年八十士悅儀表魁岸面色如鐵聲如洪鐘不𩔖南産平生剛方侃侃見者畏服徐俌字輔徳長洲人由鄉舉授安吉訓導擢給事中封駁無所避陞湖廣按察僉事歴湖廣右㕘政俌平生厚德長者俌同郡潘純字粹中徐傑字以立周賢字用希郭璘字孟潤陸嗣昌字宗盛居官為政皆清介醇謹而望亞於俌徐有貞初名珵字元玉吳縣人洪武初家以閭右徙南京有貞天賦絶人嘗從吳訥游訥與俱見祭酒胡儼儼初易之使面賦詩立成儼蹶然驚起曰徐生鼎鉉器也宣德八年登進士入翰林為庶吉士時庶吉士二十有八人有貞試常居首授翰林院編修歴修撰侍講正綂己巳以近臣分守要害有貞得河南之彰德練戎卒糾機壯為京師聲援還遷春坊諭德㑹河決張秋七年不治漕運道絶有貞自言能治乃擢僉都御史往治之至則罷散役夫自乗小舟究河之源委具言宜用古人治河之法先於上流開渠置閘分殺水勢乃可築其缺口因作制水之閘疏水之渠渠起金隄張秋沙灣凡百餘里而至於大瀦之潭踰范暨濮又數百里經澶淵以接河沁用平水勢凡河流之旁出不順者則堰之堰有九長袤皆至萬丈其水不衝沙灣乃更北出以濟漕渠於是始築其缺先是有發京軍疏河之議有貞請蠲瀕河之民庸役專事河防三年而功成遷左副都御史天順改元迎復功即日進華葢殿大學士明日進兵部尚書掌内閣事尋陞奉天翊衞推誠宣力守正文臣特進光禄大夫柱國武功伯食祿一千二百石有貞寵遇既盛時時與上面議他臣不預聞也初石亨曹欽與有貞同功其後亨欽所為多不法有貞每抑之㑹御史楊瑄劾曹石不法事二人以為有貞嗾之也乃晝夜謀攻有貞嘗有密議亨等令人屬耳得之遂以告上誣徐有貞泄其語上不能無疑下之獄尋出為廣東㕘政曹石怒未巳㑹有投匿名書者指為有貞下錦衣獄雜治之無驗適承天門災乃宥之編置雲南金齒三年曹石敗乃賜還年六十有六卒于吳有貞為人短小精悍其學自天官地理兵法河渠隂陽方術無所不通詩文雄偉竒麗詞尤妙絶晩而喜作草書遒逸變化人莫能及所著有史斷若干卷奏疏雜文碑銘記序歌詩樂府通若干卷葉盛字與中崑山人由進士授兵科給事中正綂己巳車駕䝉塵盛帥同列劾將臣朱勇等扈從失律之罪請誅之以謝天下然後乃選將練兵問罪讎敵以還聖駕聞者壯之命掌科事時京師戒嚴四五日間疏凡七八上皆軍機要務敵既退封賞有功而未及死事者盛言通政使謝澤都指揮韓青都督武興御史趙麟皆當録其後䘏其家從之擢都給事中時内閣大臣奏留邊將防守京師盛言今日之事邊闗為重向使獨石馬營不棄則六軍何以陷土木紫荆白羊不破則敵騎何以薄都城若但僅守九門其如陵寢百姓何時北敵奉駕還京將入闗矣有投匿名帖言迎復事大臣不敢以聞盛曰此野人無情之言達于上感動必矣或沮以匿名書者盛不顧具疏言之詔令封進雖留中而正論有不泯焉三年遷山西右㕘政巡撫都御史李秉舉盛協賛獨石馬營等處軍務時獨石馬營八城失守殘毁殊甚盛列其利害為八條次第罷行之盛以邊人多不知學奏置社學於諸城中推有文學者為之師買經書字帖以給貧者一時軍中子弟絃歌相聞赤城鵰鶚雲州龍門長安等八城相去逺甚無邸舍風雪寒雨行者病之盛於官道傍每十里為垣屋一區中置㸑卧芻秣之具守以邏卒名曰煖鋪過者如歸諸城附郭膏腴地俱為權力所占盛理出之得五千餘畆自將帥參隨至軍餘皆分授之限以周垣題其門曰某隊菜圃人得均其利焉初軍中百需皆斂於軍盛因請官銀五千餘兩買牛具奪勢要所占屯田謫戍卒之不任戰者給與牛種耕之課其餘糧凡軍費皆於是取給自是邊人効力嵗亦屢登以外艱歸天順改元召擢都察院右僉都御史命巡撫兩廣初兩廣守將不相綂攝盛請於梧州建帥府命征蠻將軍總鎮于此兩廣各設副總兵及㕘將分守要害悉從征蠻節制又許鹽商計鹽多寡入米餉邊公私利之㑹有譖於當道者取還改左僉都御史巡撫宣府各邊屯堡多廢盛建議脩復邊人不悅謗聞京師盛任怨力主其役不數月築完計七百餘所自是兵民畜牧自如得免寇掠成化三年進禮部右侍郎尋改吏部左侍郎時方冀其大用俄無疾而卒年五十有五詔賜葬祭諡文莊盛平生力行好古清脩苦節動慕范文正之為人為諫官論事不激不隨取人先行檢而後才藝終不及人之過亦不輕薦一人考古辯疑殆忘寢食而於世俗聲色貨利澹然不以經心其文章紆徐委備有法則彭韶賛云希文不相古今所惜人以為知言韓雍字永熈長洲人父行役京師生雍于彼登正綂壬戌進士授監察御史時方年二十或少之束鹿王驥為都御史獨器重之有重務或巡大藩輒奏委之所至伸寃抑鋤强梗黜貪殘名聲大振碭山教諭丘純笞死膳夫當刑雍訪膳夫於河南獲之葢其父密使之逃以他屍汙衊之也純得復職及巡江西閩寇鄧茂七反巡按御史汪澄牒鄰境勦殺尋復止之雍曰律有反叛㑹捕之文使賊果降何憚發兵不然吾有備無患即趣進時浙江巡按黄英以汪牒調兵弗集汪卒坐死人多咎英而偉雍還陞廣東副使少保陳循疏雍才陞都察院右僉都御史巡撫江西至則首行均徭嵗辦法均徭者均平十排年之力役嵗驗册編役役畢九年無擾嵗辦者里甲醵銀貯於官有役則估直支給擇户領解人稱便焉天順初改山西副使未幾陞大理寺少卿復僉都御史錦衣衞指揮劉敬嘗請石亨飯坐朋黨雍言一飯而擬朋黨日與亨燕㑹者當何罪邪敬獲免復巡撫大同宣府築邊牆括隠役撥用給種嵗收以備買馬造兵之用陞兵部右侍郎成化初被累出為浙江左㕘政時兩廣寇弗靖將出師廷議唯總督之任難其人兵部尚書王竑曰非韓雍不可遂改雍左僉都御史㑹都督趙甫等於南京議兵所向僉謂賊寇廣東宜逐之寇廣西宜困之雍曰不然大藤峽為賊巢穴舍此而致於賊非計也行抵廣西遣偏師平陽峒諸賊擒其魁磔以示衆先是指揮某失機數其罪斬之軍威大振乃分兵為二十五哨各授以方畧雍與太監總兵綂中哨先攻修仁荔浦諸峒克之進次大藤峽衆云峽乃天險且賊已有備不如以大軍圍之俟其自斃雍曰兵貴神速峽周圍六百餘里縱有甲兵數萬豈能斷賊出入相持日久老師挫銳不如長驅擣其巢穴且遣守將歐信帥師由山北取道與大軍合擊復分兵截其要路時賊於山南立排柵甚固滚木礧石標鎗藥弩如雨而下雍選壯士用團牌扒山虎等器殊死而進奪其要寨焚其積聚煙熖障天賊遁歸九層樓懸崖絶壑不可復進雍不顧督兵破山開路棄馬步戰賊復用礧石大木推轉而下久之賊矢石稍盡雍率軍猿攀蟻附而進密遣壯士於絶頂舉砲為應賊方驚駭諸軍四面夾攻㑹歐信等亦至俘斬不可勝計餘黨皆降雍曰賊雖降不能保其不叛乃改大藤峽為斷藤峽徙上隆州於峽内更名武靖立土官以司之又置藤縣千户所以鎮壓之遂刻石紀功而還捷聞擢左副都御史旋以父喪歸再起為右都御史總鎮兩廣蠻夷震懾以父呼之而不名久之與中貴人黄沁不相能乃以病歸卒於家雍長身俊偉落落有大節具文武才畧天下咸傾仰之於詩文若不經意而豪邁疎爽人亦罕及沈訥字文敏崑山人正綂間以進士授大理評事尋陞寺副景泰間出為福建按察僉事督松溪銀冶正額外不求羨餘時慶元盜起遽入松溪訥以計擒之得不滋蔓尚書孫源貞上其功遷副使嵗餘卒訥為人髙潔弗可其意者視之漠如也為文章必貴已出同時作者鮮當其意故聲望屹然而謗議亦及之所著文曰兎園遺册下里餘音施槃字宗銘吳縣洞庭山人自幼警敏異常兒既長不屑就家人生業奮志於學從父遊淮陽就師授經久之歸補縣學生正綂三年領鄉薦明年試禮部皆前列廷試第一授翰林修撰年甫二十三既入翰林日讀中祕書大有進益其力學之勤致行之篤尤為楊文定公溥所重未踰年而卒天下傷之陳鑑字緝熈長洲人父潤謫戍葢州道京師過其故人范叔瓉即以鑑託之久之叔瓉家人不能容乃以貽王一居太卿為道士一居命索債浙東乃從師受學債一無所問徒市書數篋而歸一居竒之使卒儒業正綂十三年賜進士及第入翰林為編修景泰中祀北鎮醫巫閭旋充講官進脩撰天順初奉使朝鮮預脩一綂志遷侍讀修英廟實録成進侍讀學士未幾命為祭酒初國子月給錢為㑹饌費然斂散不常多不時給則貯為公費其來已久㑹有不快於前祭酒邢讓者言讓以公錢入已事并及鑑㑹官廷問讓辯不已鑑曰吾為祭酒安能對刀筆吏掉口舌竟不吐一詞適有從中醖釀之者與讓俱除名未幾卒鑑平生無聲色之奉多藏法書名畫其使朝鮮以妓女侍作詩却之夷人敬服所著有方菴集若干卷吳惠字孟仁吳縣東洞庭山人初洞庭山未有登進士者登進士自惠始選授行人嘗持節使占城涉海七日遇􅄓風同行者倉皇莫措惠神色不變特為文祭禱海神而已使還擢桂林知府時義寧峒蠻結湘苗煽亂三司議進兵討之惠請宜先招諭乃單車親抵其峒開誠慰撫蠻遂服武岡州盜起宣言推義寧峒主為帥義寧蠻畏惠其主自出訴武岡盜計遂衰在郡十年陞廣東㕘政致仕惠性慷慨疏財篤義居官三十年田廬不改其舊家居日飲酒賦詩尤善行草子鳴翰風流俊逸詩文清麗尤精小楷詩成必親書輒為人持去無稿累困場屋以吳庠生卒吳凱字相虞崑山人父公式早亡遺腹生凱能力學養母幼時里胥見役即詣縣自陳有母不能逺離竊有志於學時縣令芮子翔異其言立遣就學後充貢京師中順天府鄉試宣德中授刑部廣東司主事改行在雲南司再改禮部主客司以母老乞歸遂不復仕凱精敏有治劇才平生以禮自律一言行不茍風儀嚴峻人望而畏之家居四十年非公事不至公府葉文莊盛尤重之嘗曰鄉里作官前輩當法吳丈後輩當法藴章藴章謂孫瓊也孫瓊字藴章其先長洲陸氏以父後崑山孫道庠遂冒孫姓家崑山舉進士授刑部主事累陞郎中時錦衣指揮門達用苛刻羅織人罪法司承望風㫖往往死非命惟瓊多所平反太監牛玉假子犯法囑瓊瓊不少貸由是積怨權貴竟以同官得罪連坐謫戍遼左成化初復官月餘即乞致仕年僅四十家居篤於禮度終日端坐未嘗傾側所居朴陋人不能堪而處之裕如子裕乙未進士官終知州張和字節之崑山人讀書數行俱下為文章立就正綂己未登進士移疾歸久之景泰庚午主考江西鄉試授南京刑部主事膺召纂修祕閣天順初還南京歴員外郎郎中擢浙江按察副使提督學校以疾卒和為人亷介權貴之門不一濡足聞忠賢節義事喜躍如自己出朋友有過面折不少貸董學浙江多所造就至今稱為得體所著有篠菴集五卷弟穆與和同年進士有吏材仕終浙江㕘政劉珏字廷美長洲人宣德中郡守況鍾簡名家子為掾珏在選中珏言有志於學不願為吏鍾嘉其志遣補縣學生遂領應天鄉薦授刑部主事遷山西按察僉事提督屯田年甫五十懇乞致仕珏性孝友恭謹未嘗失色于人然操履清白人不得以私干之至于好學之心老而不倦尤工唐律對偶清麗當時稱為劉八句行草師李邕畫師王叔明皆能得古人筆意所著詩曰完菴集顧昌字徳輝長洲人正綂間領鄉薦授襄城教諭陞淮王府長史轉廣西思恩府同知為人清介絶俗平生未嘗受人一蔬之餽晩嵗致仕家居詣人家誓不飲食留之輒起去雖逺去數里寧饑渴而歸其文章簡潔似其為人徐瑄字子敬嘉定人正綂三年解元第進士授監察御史巡京畿及山海等闗出按四川廣東所至有聲擢右僉都御史巡撫延綏等處嚴斥堠繕甲兵督屯種以廣邊儲葺學校以作士氣敵嘗入寇瑄督兵戰于孛羅池溝又戰于半坡墩金雞峪雙海子皆捷朝廷賜璽書重幣奬勞之未幾得疾致仕歸卒于家祝顥字惟清長洲人正綂間以進士授刑科給事中建白多持大體被㫖檢察在京寺觀無額者有青龍寺在檢中僧稱密㫖所建卒奏毁之景泰間陞山西左㕘議未幾遷右㕘政時北敵擾邊公私困竭顥規畫久之倉廩皆滿汾州有妖人作亂稱王年號天福顥馳赴擒十六人而妄扳及千人顥欲為簡釋三司難之顥執不可三司乃請處以强盜聞顥曰盜何事改年僇平民不可罔上規免亦不可卒以實聞嘗按行陽曲臨汾視學其聖賢像乃金人時所塑嵗久傾仆顥悉為更新洪洞縣有臯陶祠墓不飭坊里傳舍皆以臯陶名名之顥為葺治更署曰虞士師祠墓成化初罷歸顥吏材精敏詩文典贍言論動引經傳聞者聳然卒年七十九所著有侗軒集練綱長洲人祖則成初名塤字聲伯洪武中以文學膺聘授左春坊司直郎充東宫經筵講官嘗劾大臣不法事上嘉之特賜錦衣一襲改河南道監察御史則成幼以氣節自負與衆少合及居言路務盡其職僚輩忌之出為雲南廣西推官為其下所中毒卒年止三十有七人皆惜之綱字從道宣德乙卯以春秋中鄉試第二名卒業太學正綂己巳綱上中興八策遂擢監察御史嘗按淮揚鹽法糾察不避權貴駙馬都尉石璟亦在糾中又劾吏部尚書何文淵侍郎項文曜典選不公文淵等罷去後按福建與按察使楊珏相持皆左遷綱落判鄭州再改甘州前衞經歴綱侃直有祖風然攻訐大甚故時有練綱口之號云趙忠字行恕長洲人宣德五年以進士授監察御史出按四川時松磻寨商巴剌麻判忠親詣之開示禍福且劾邊將激擾之罪罷之叛者遂服再按浙江適倭人入寇海上忠命慎修兵防黜其玩寇者倭不為患陞陜西㕘議忠風度凝逺文亦贍麗忠同年進士栁華同為御史終按察副使名亞於忠文洪字公大先出湖廣武胄父始占籍長洲洪乃棄武就學苦志刻力無間晝夜治易邃甚時從游者往往得髙第洪屢舉屢北後子林領鄉薦與洪偕㑹試林遂中進士洪在副榜授淶水教諭人皆羨林之捷而憫洪之遲也三載致仕歸卒洪嘗求葬地術者指一舊冢曰得此必世貴其家亦願遷以售之洪斥不用人尤多之林出知温之永嘉後改博平二縣稱治尤善發奸摘伏人服其明陞南京太僕寺丞前後建言時政十四事當道奏為例既而告病歸數年温人思之不忘用薦守温未幾卒于官林學該博雖堪輿卜筮皆能通其說尤精於易數平生以經濟自負惜不究所施盛㫤字允髙吳江人景泰間由進士授監察御史清山東馬政值其地災傷上疏乞蠲民所負孶息癸酉出按廣東時瀧水賊猖獗㫤單騎諭之遂降又劾巡撫侍郎揭稽不法事未幾以言事過訐左遷古田典史天順改元轉羅江知縣值旱禱而得雨㫤曰此非久計乃教民鑿池一千二百五十餘所旱不為害民為立生祠於羅真觀尋陞叙州知府適戎人珙筠髙土狫叛朝廷遣將征討㫤在行間多所斬獲上其功未及報以聵致仕後追理前勞特遣使齎金幣寶鈔賜于家又有戈立字允中者長洲人以太學生授南京監察御史亦負才操有聲院中終廣東僉事孔鏞字韶文長洲人其先裔出闕里父友諒永樂間以易魁春闈選庶吉士出知四川雙流縣雙流之民初未知學友諒拔其秀者親為講解士習稍變科第多得人時鄰縣有劇寇越過雙流友諒行境上掩捕之宣德間赴考吏部上命内閣集天下縣令當考者七十六人試以歌賛賦策諸題拔用七人而友諒居首分置六科未及選而卒鏞景泰甲戌進士知江西都昌縣尋改廣東連山縣縣久被寇四境榛棘公署亦無鏞招集慰勞始立縣治教民耕織守戰道路漸通陞髙州知府時髙亦新被寇鏞身犯鋒鏑斬賊首五百級奪還男婦四百五十口降其餘黨九千七百人後黠寇鄧公長合衆萬餘屯洞洞去府城才十里城中羸弱不滿千人鏞度不能支乃乗一馬往招之賊視鏞來陳千刃夾道相向鏞徐行抵其營神色不動下馬中坐與極論禍福一營皆聳獨公長尚未順鏞乃遍歴營中諭衆降意而歸時已四鼓城中謂鏞已死及歸大驚比旦賊降者萬餘人公長知衆散亦降其餘寇在雷州化州遊魚寨博白者皆破降之鎮臣上其功陞廣東按察副使領勅專守髙雷諸郡猺人不敢入境以母憂歸父老立生祠于化州後陞廣西按察使歴左布政使未幾陞副都御史巡撫貴州貴州苗尤悍猾有名阿溪者善謀阿剌者善戰二人煽苗為亂議欲大舉兵鏞得其情先制其為黨者率壯士掩二人擒之亂遂息後召為工部侍郎行至富陽卒鏞平生忠信自許不顧利害論者謂其無愧古人長厚之德鄉里稱之程宗字原伊常熟人景泰中由進士授刑部主事遷員外郎出知江西吉安府吉安最號劇郡宗能治之奸黨屏迹政聲赫然父喪歸改知湖廣武昌府復有治績擢四川左㕘政再擢陜西右布政尋轉左入為都察院右副都御史佐院事時兵部以陜西地重務得人以經理邊事乃推宗往鎮遭母喪再起巡視雲南召為刑部右侍郎尋陞工部尚書致仕徐恪字公肅常熟人景泰丙子鄉薦成化丙戌進士時葉文莊公盛為吏部侍郎薦恪授工科給事中恪所言皆切時事而尤務存大體陞湖廣布政司左㕘議兵荒之餘民物彫瘵恪加意撫䘏政尚寛簡人皆安之九年秩滿陞河南右㕘政三年陞左布政使徽王府承奉司自置吏恪以非制革之王怒奏恪侮慢罪上特直恪以書諭王謂恪奉遵祖訓耳何罪之有河徙逼汴城有廷臣建議遷諸王府三司於許者公疏有五不可得寢陞都察院右副都御史巡撫河南户部遣官督征積逋恪上言民困乏請免徴有御史言漢中鄖陽及四川夔府因各去本省逺甚故為盜淵藪當别立一省專蒞之事下三處巡撫議未決恪持不可乃止恪在河南久權倖多不便謀去之上不忍調巡撫湖廣臨行民擁留號哭聲聞數里汴城為之罷市布政司有羨餘銀三千兩贐恪恪正色却之且自咎曰吾乃不為人見信如此至湖廣百姓曰即故㕘議公也必生我矣恪亦力任之適親藩之國宦豎怙勢載鹽百餘艘抑市于民恪立捕其首置于法斥其鹽出境外凡小人不得行其私者復百計譖毁上欲保全之特命遷南京工部侍郎不由外廷論薦人皆驚愕恪即上言傳奉非美名顧臣何人敢干清議自惟立身稍異於衆不敢有所攀援以進辭氣峭直求退甚力上勉留之乃始就職恪於工役物料計處詳密吏胥無所售其奸班匠至部者舊多分給勢家公靳不與人尤怨之以年近七十乞致仕章再上不允乃以六載考績進階正議大夫資治尹入謝疾作于廷中命給驛以歸自恪之歸言者屢言恪可屬大事欲起用之不果臨終語其子曰吾受國厚恩無所禆益勿乞身後恩以重吾過前輩蕭山魏尚書可法也朝廷聞之賜葬祭如制恪儀觀偉然器宇凝重望而知為元夫鉅人所為詩文平實典雅殊有古法尤善章疏紆徐曲折能達其所欲言巡撫兩省凡遇烖異或事闗軍民即條陳時弊動輒數千言無不曲盡時宜性剛正詳慎茍利於國與民必行其志章格字韶鳯章珪之次子也由進士授南京工部主事陞南京刑部郎中用刑不苛獄囚懐之陞廣東按察副使巡視海道時琉球使臣蔡璇等率數十人以方物買鄰國風漂至廣之香山港守臣當以海寇欲戮之為功格為之辨奏還其資而遣之再陞雲南按察使㑹緬甸諸夷叛服不常格善於撫綏莫不畏服陞福建左布政使入為南京光禄寺卿未幾陞南京大理寺卿自陳致仕詔許馳驛歸格􅆒歴中外幾五十年所在以清謹聞為人尤號長者李應禎名甡以字行晩更字貞伯長洲人世醫家𨽻南京太醫院籍應禎生于京邸自少警敏景泰癸酉領鄉舉入太學時有中貴欲致為塾師者詣齋舍以請應禎固拒之選授中書舍人直文華殿同官多由他途以進恥與為伍乞改教官補外不許慶成宴中書舍人坐給事中御史下應禎奏非舊制嘗以例寫佛經應禎上言臣聞為天下國家有九經不聞所謂佛經也臣實不能寫言甚訐直人皆危之上不之罪秩滿陞南京兵部武選司員外郎歴職方司郎中南京尚寶司卿再陞南京太僕寺少卿應禎好古博學篆楷俱入品格文詞簡健喜面折人過人多畏之卒之日無以為斂友人文林史鑑輩為營地以葬焉鑑字明古吳江人博學尚氣有文才林自有傳吳寛字原博長洲人自少篤學勵行為諸生已隠然有重名數試不利卒業太學再舉始得解成化壬辰狀元及第授翰林院修撰累陞詹事府少詹事兼翰林院侍講學士出為吏部侍郎尋復學士入内閣進掌詹事府事陞禮部尚書卒贈太子太保諡文定寛為人靜重醇實自少至老人不見其過舉不為慷慨激烈之行而能以正自持遇有不可卒未嘗碌碌茍隨言詞雅淳文翰清妙無愧古人成化𢎞治之間以文章德行負天下之望者三十年然位雖通顯而迄不得柄用天下惜之所著有文集若干卷陸釴字鼎儀崑山人天順癸未㑹試第一廷試第二授翰林編修預修英廟實錄書成遷修撰孝宗皇帝在東宫釴侍講讀進退閒雅敷奏明鬯最為得體及即位進太常少卿兼翰林侍讀充經筵日講官將進講忽得末疾給驛歸卒于家訃聞詔賜葬祭官其子中書舍人釴沈靜好學解悟過人而矜嚴自持人少當其意者其為詩文必欲作不經人道語有春堂稿春秋鈔畧藏於家張泰字亨甫太倉人生而秀頴登進士第為翰林庶吉士授檢討陞修撰泰為人坦率絶去厓岸恬淡自守獨喜吟詩其詩豪邁雋爽善於常格中出竒雖不學書而書法亦翩翩可喜所著有滄洲集若干卷行於時陸容字文量太倉州人其先冒徐氏後復姓成化間由進士授南京吏部驗封主事後改兵部職方司尋陞郎中賈胡進獅子且至奏乞大臣往迎容議逺人貢異物當卻之顧迎之邪貽譏後世事遂已嘗籍官馬于北方諸府還陳馬政四事甚悉𢎞治初都指揮王欽梁宏夤縁中貴陞都督容奏良等招權市恩宜正法以禁後來疏兩上卒奪其命由是當道頗不悦出為浙江右㕘政容至官復條奏兩浙不便者八事多用之後以浮議罷歸容政事之暇手不釋卷所著有式齋稿乙戊稿封事錄兵署錄問官錄菽園雜記太倉志水利集共若干卷王庭字元直崑山人少學於葉文莊文莊甚器之領鄉薦授鄜州學正遷國子學録後以績再遷瀋王府右長史卒庭孝友亷慎在鄜時僦民田耕以自給諸生束脩無所取律身教人動以古道王府尤得輔導之正嘗考試江西御史欲試諸考官庭獨不就試御史卒用以主試曰是不苟人也庭平生自負剛直百撓不回其學貴踐履不事辭章嘗曰徐穉管寧不聞能詩而世仰其名時以為名言姜昴字恒頫太倉人自幼頴敏父嘗欲其服賈事昂自奮志于學成化中領鄉薦登進士第出知棗强縣有異政召為御史率同官悉力劾倖臣李孜省聲稱籍然出知河南府以母老懐土屢疏懇乞便郡就養改知寧波在任六年復以母老棄官歸家就拜福建左㕘政不起上疏乞終養母卒服除部使者交章奏薦俄以疾卒士論惜之昂為人仁孝亷靜恬退作縣作郡罔不得體平生一介不苟取予居官三十年家業蕭然其平居恂恂若無能者朱栻字良用崑山人成化辛丑進士授蕭山知縣亷慎有為擢南京監察御史遇事敢言所上疏多切直不諱時論偉之秩滿便道省母卒於家姑蘇志卷五十二
