body:
  text: 姑蘇志卷三十六明王鏊撰平亂蘇為東南樂土自秦以來亦或有乗時跳梁倡變階祻而皆敗不旋踵豈亦地勢使然乎今考諸史質諸舊聞書之册亂臣賊子可以戒矣秦二世元年㑹稽假守殷通素賢項梁召與計事梁曰方今江西皆反此天亾秦時也先發制人後發制於人守歎曰聞夫子楚將世家唯足下耳梁曰吳有竒士桓楚亾在澤中獨籍知之梁乃戒籍持劒居外待梁後入語守曰請召籍使受令召桓楚籍入梁眴籍曰可矣籍遂拔劒擊斬守梁持守頭佩其印綬門下驚擾籍所擊殺數十百人府中皆讋伏莫敢復起梁乃召故人所知豪吏諭以所為遂舉吳中兵収下縣得精兵八千人梁為㑹稽將籍為禆將徇下縣度江而西擊秦劉濞漢髙祖兄仲之子髙帝十三年以從破黥布功封吳王王三郡五十三城已拜受印髙祖相之曰若狀有反相獨悔業已拜因捬其背曰漢後五十年東南有亂豈若邪然天下同姓一家慎無反濞頓首曰不敢至文帝時濞子入侍皇太子博争道不恭太子引博局提殺之濞稱疾不朝始有反謀帝賜以几杖謀乃解然其居國以銅鹽故百姓無賦他地來捕亡者公弗予如此四十餘年以是能使其衆景帝三年晁錯議削郡濞遂反上以周亞夫為將軍討之濞戰敗走丹徒東越人殺之晉咸和二年以庾氷為吳國内史將兵備蘇峻峻反三吳欲起義兵庾亮不聴以虞潭督三吳諸郡軍事三年峻破臺城遣兵攻庾氷氷不能禦棄郡奔㑹稽峻購之急吳鈴下卒引氷入船載去氷僅免詳宦蹟條峻以蔡謨為吳國内史司徒導與張闓謀密令以太后詔諭三吳吏士使起義兵㑹稽内史王舒以庾氷行奮武將軍將兵一萬西渡浙江時郡人顧衆為義興太守還吳潛圖義舉將軍張悊為峻収兵於吳衆遣人諭悊悊從之衆遣人告謨曰衆已潛合家兵待時而奮乃檄衆為本國督䕶衆從弟颺為前鋒督䕶吳中人士同時響合遂與虞潭皆起應氷張闓遣吳郡度支運四部穀以給軍峻遣其將𢎞徽皷行而前衆與颺悊要擊于髙莋大破之謨以庾氷還任便去郡遣颺率諸軍屯無錫衆恐賊從海虞道入自徃備之賊帥張健馬流攻無錫颺等大敗氷亦失守健等遂據吳城管商焚吳縣虞潭遣將拒之亦敗衆自海虞由婁縣東倉與賊戰破之義軍又集進屯烏苞王舒虞潭并檄衆為五郡大督䕶潭前鋒戰沒衆還守紫壁或勸衆過浙江衆不從合諸軍復進健留錢𢎞為吳令退于曲阿衆至路丘斬𢎞進處吳城遣督䕶朱祚等九軍攻賊大破之峻敗後其將劉徴帥衆數千浮海入婁縣詔以郗鍳都督諸軍事討平之九月峻伏誅桓𤣥太元末補義興太守鬱鬱不得志嘗登髙望震澤歎曰父為九州伯兒為五湖長棄官歸國後遂謀反伏誅隆安三年㑹稽世子元顯發東土諸郡免奴為客者置京師以充兵役東土囂然孫恩因民心騷動遂反旬日間衆數十萬時三吳承平日乆民不習戰郡縣兵皆望風奔潰恩據㑹稽自稱征東將軍時内外乖異朝制所行三吳而已及恩作亂八郡皆為恩有詔徐州刺史謝琰及加劉牢之都督吳郡諸軍事牢之引劉裕為參軍共討之恩驅男女二十餘萬逃入海以琰為㑹稽太守都督五郡軍事戍海浦四年五月恩復入㑹稽琰敗死十一月吳國内史袁山松築滬瀆壘以備之五年五月恩陷滬瀆殺山松元興元年三月臨海太守辛景擊破之恩所虜三吳男女死亾殆盡乃赴海死隆安初王廞以母喪居吳王恭反版廞建武將軍吳國内史令起軍為聲援廞即墨縗合衆誅殺異己仍遣前吳國内史虞嘯父入吳興義興聚兵赴者萬計㑹恭敗廞更遣其子泰伐恭恭遣劉牢之擊泰斬之又與廞戰于曲阿衆潰廞單騎走不知所在廞導之孫也齊永泰元年帝疑㑹稽太守王敬則反側以張瓌為吳郡太守置兵佐密防之中外傳言當有異處分敬則遂反帥實甲萬人過浙江瓌遣兵三千拒之於松江聞敬則金皷聲一時散走瓌逃匿民間敬則以舊將舉事百姓擔篙荷鍤隨之者十餘萬衆至晉陵前軍司馬左興盛輔國將軍劉山陽築壘於丹陽禦之敬則戰敗斬首傳建康梁太清三年侯景亂遣于子恱等將羸兵數百東略吳郡新城戍主戴僧逷說太守袁君正閉關拒守君正素怯郊迎之子恱執君正掠奪財貨子女東人皆立堡拒之九月景使侯子鑒入吳郡以廂公蘇單于為太守遂冦吳興或勸吳興守張􅌘效君正迎降􅌘曰袁氏世濟忠貞不意君正一旦隳之吾豈不知此難乆全但以身許國有死無貳耳子鑒執送建康殺之時景所據惟吳郡以西南陵以北而已吳盜陸緝等起兵襲郡殺蘇單于推前淮南太守文成侯寜為主承聖元年三月王僧辯陳霸先敗景於石頭景東走欲就謝答仁於吳至晉陵得餘兵因驅掠居民東趨吳郡四月侯瑱追及於松江擊敗之景與數十人單舸走推墮二子於水將入海其都督羊鯤殺之送屍建康傳首江陵截其手送于齊陳吳州刺史蕭瓛能得物情三吳父老曰吾君之子也陳亾吳人推為主與蕭巖同據東吳之地隋使宇文述討之瓛立柵於晉陵城東留兵拒述遣其將王褒守吳州自義興入太湖欲掩述後述進破其栅迴兵擊瓛大破之又遣兵别道襲吳州褒衣道士服棄城走瓛以餘衆保包山隋將燕榮擊破之瓛匿民家為人所執送長安斬之隋大業九年劉元進舉兵應楊𤣥感將渡江而𤣥感敗吳郡朱燮晉陵管崇亦舉兵共迎元進據吳郡稱天子署置百官衆至十萬燮本還俗道人涉獵經史微知兵略時為崑山博士知天下將亂謀於學而起兵民苦役者赴之如歸自東陽至京口千餘里並受燮節度崇隱居常熟身長七尺三寸美姿容少無賴衆推奉之隋將吐萬緒進軍逼之相持百餘日元進潰遁與崇燮連營自保緒復破之斬崇然從亂者益衆帝令江都丞王世充發淮南兵擊之元進崇敗死餘衆降散世充召降者於通𤣥寺瑞像前范志作通聖寺焚香誓不誅殺散者聞之一旬之間歸首略盡世充貪而無信利在子女資貨悉坑之於黄山下死者三萬餘人由是餘黨復相聚為盜官軍不能討以迄隋亾大業九年杜伏威起兵掠江淮唐武徳二年伏威降唐唐以為和州緫管三年李子通渡江攻沈法興法興棄毗陵犇吳郡於是丹陽毗陵等郡皆降于子通伏威遣輔公祏攻子通子通大敗伏威徙居丹陽子通復東走太湖収合亾散得二萬人襲法興於吳郡大破之法興棄城走吳郡賊帥聞人遂安遣其將葉孝辯迎之法興中途而悔欲殺孝辯更向會稽孝辯覺之法興窘迫赴江死子通軍勢復振徙都餘杭盡収法興之地自太湖以南皆有之是嵗唐封伏威為吳王四年十一月伏威將王雄誕撃子通子通降聞人遂安據崑山無所屬伏威使雄誕撃之以崑山險隘難以力勝乃單騎造其城下陳國威靈示以禍福遂安感恱出降於是伏威盡有江東之地秋七月子通復叛欲至江東収舊兵被獲伏誅唐上元元年劉展反江淮都統李峘自潤州犇宣城副使李藏用曰以數十州之兵食三江五湖之險固不發一矢而棄之非勇也収散卒得七百人東至蘇州募壯士得三千人立栅以拒展與展將張景超孫待封戰於郁墅兵敗景超遂據蘇州展以其將楊持璧為蘇州刺史明年展敗死其驍將王暅引兵東走至常熟而降張景超逃入海餘黨悉平永貞二年李錡跋扈於浙西朝廷以杜兼為蘇州刺史兼辭行上書稱錡且反必奏族臣上然之留為吏部郎中元和二年錡果反先是以其腹心為所部五州鎭將各有兵數千伺察刺史動静至是使各殺其刺史於是蘇州刺史李素為姚志安所敗生致於錡具桎梏釘於船舷未及京口會錡敗乃免十一月錡伏誅乾符二年浙西狼山鎭遏使王郢有戰功節度賞以職名而不給衣糧郢論訴不獲遂劫庫兵作亂行収黨衆近萬人攻陷蘇常轉掠二浙後為劉巨容所殺光啓初劇賊剽崑山招討使周寶遣將張郁戍海上郁叛刺史五藴不設備郁遂大掠藴嬰城以守寶遣兵討郁郁保常熟遂走海陵光啓二年十月感化牙將張雄得罪於節度時溥聚衆三百度江襲蘇州據之自稱刺史聚兵至五萬戰艦千餘自號天成軍鎮海節度使周寶聞淮南六合鎭遏使徐約兵精誘之使擊蘇州三年四月約逐張雄雄入海徃據上元文徳元年九月錢鏐遣弟銶攻約龍紀元年三月拔之約亾入海追殺之銶以海昌都將沈粲權知蘇州十月詔以給事中杜儒休為刺史鏐不恱自署沈粲為制置指揮使大順元年八月儒休到官鏐使粲害之㑹淮南將李友拔蘇州粲歸杭州鏐欲委以罪而殺之粲乃奔孫儒閏月孫儒遣劉建鋒圍蘇州十二月拔之殺李友仍使粲守州二年十二月孫儒焚掠蘇常遣兵逼宣州錢鏐復據蘇州景福元年鏐以銶為蘇州招緝使乾寜二年九月鏐伐董昌昌求救於楊行密行密遣泗州防禦使臺濛攻蘇州以救昌未幾行密將柯厚破蘇州水寨三年四月淮南兵與鎭海兵鎭海即錢氏兵戰于黄天蕩鎭海兵不利行密遂圍蘇州五月常熟鎭使陸郢以州城應行密虜刺史成及歸鏐聞蘇州陷急召顧全武使趨西陵備行密全武請先取越州後復蘇州鏐從之光化元年九月顧全武攻蘇州城中及援兵食皆盡淮南所署刺史臺濛棄城走援兵亦遁全武克城追敗周本等于望亭獨秦裴守崑山不下全武率萬餘人攻之裴屢出戰使病者被甲執矛壯者彀弓弩全武每為之郤檄裴令降全武嘗為僧裴封函納欵全武喜召諸將發函乃佛經一卷全武大慚曰裴不憂死何暇􅃧人益兵攻城引水灌之城壊食盡裴乃降錢鏐設千人饌以待之乃出羸兵不滿百人鏐怒曰單弱如此何敢乆為旅拒對曰裴義不負楊公今力屈而降耳非心降也鏐善其言全武亦勸宥之鏐從焉閏月鏐以其將曹圭為蘇州制置使范志作乾寜五年誤梁開平二年八月淮南遣周本吕師造擊吳越九月圍蘇州三年四月鏐遣其弟牙内指揮使鏢及弟鋸與行軍副使范志作江海遊奕都虞候杜建徽等救之城中將臨海孫琰號孫百計專製守禦之具淮人以洞屋攻城琰設髙竿竿上着大輪盤載大䥫渇烏引半繩運出城外而及其洞屋鼓噪而掲去之賊兵盡露因加矢石淮人退舍尋復縱巨石擊城聲如雷城中大懼琰乃盡取公私繩結網用巨木張之蔽于城屋石之墜者悉着網中賊計遂沮有水通城中淮人張網綴鈴懸水中魚鼈過皆知之吳越都虞候司馬福潛水入城以竿觸網敵聞鈴聲舉網福因得過居水中三日乃得入城復出由是城中號令與援兵相應敵以為神鏐嘗遊府園見園卒陸仁章樹藝有智而志之及蘇州被圍使仁章通信入城果得報而返吳越兵内外合擊淮南兵大敗擒其將何朗閭丘直等三千餘人獲兵甲生口三十萬奪戰艦二百艘周本夜遁又追敗之於黄天蕩鍾泰章將精兵二百為殿多樹旗幟於菰蔣中追兵乃不敢進而還眞明四年吳遣陳璋為東南面應援招討使將兵侵蘇湖已而悉平宋建炎三年金人陷維揚髙宗南渡二月丙辰至平江富民或私遁而市井貿易如故上至府治去介胄易黄袍儀衛稍増遂下詔詔曰朕以單微之質䝉世大難賴臣庶共戴獲承祖宗之餘念必宅中經逺均布惠澤以慰萬邦歸徃之心故雖外迫於敵兵誓不遽離於近甸省刑薄歛撫士與民不以一亳擾郡邑行再朞矣輸誠盡禮遣使相望而敵未寢兵選將練師朝夕從事而力不逮志自聞長驅之謀者請適東南逺險之地以保朕躬朕寜不免於敵葢不忍先自茍生棄我西北之人而遽逺也故出两道之師外為蔽援而嗣遣將命之臣祈保赤子以待敵之易慮則共圖康居日可計矣人力雖殫天道難度大名東平相繼陷失始命官吏民庶絶江自便朕猶遷延不先俟天人之我相也逮敵輕騎潛行不日遽至朕與近臣始挺身東行由江浙為暫避之計凢乗輿服御帑藏之積一切棄捐二三大臣保其家室念雖顛沛至是而不負於中原西北之人朕心猶庶幾焉與其謀已志民及患而去則不得已而後動不猶愈乎但聞官吏軍民雖有自便之詔多不及避生計蕩然或不得與其家皆來痛切朕心負罪何極自昔帝王脫身於皇遽之時而立國於顛沛之後失勢於屢挫之辱而戡難於一勝之功者尚多有之夫良農不為水旱輟其耕志士不為貧窮怠其道朕能勞形克已圖保生民而不能使吾民之遽安能側身修行圖格天心而不能保天心之必相尚賴士夫暨爾萬方有衆戮力一心式孚於帝庶迄成績咸保康乂朕誠切至宜察朕心駐駕三日始起留右丞相朱勝非侍郎張浚彈壓平江晩次吳江縣遂幸臨安故老云髙宗初幸泊舟閶門外侍衛取民家白木坐岸滸以待馬至及行就攜以去蓋已經御不欲留民間也建炎四年二月金烏珠自明越還二十五日犯平江五漏未盡四刻兵自盤門入刼掠官府民居子女金帛廩庫縱火延燒煙焰見二百里凡五晝夜至三月朔始出閶門士民得脱者十二三而遷避不及遭殺者十六七先是髙宗駐蹕郡中人情倚以為安九月移㑹稽人皆失望詔以工部侍郎湯東野為守同知樞密院周望為淮浙宣撫使將官陳思恭巨師古張俊魯珏李貴等悉𨽻望節制望遣諸將各部所𨽻兵分䕶境内時河内降賊郭仲威領萬衆至自通州屯虎丘山未幾聞建康失守髙宗幸四明於是平江大震周望與郡守集耆艾士夫問計且曰今戰守皆無策矣葢其意在迎降而欲衆發其端士民不答望慮諸將抗敵取怒歛其兵歸城中而金人乃經廣徳取道南犯四明以窺行在望自謂敵不敢犯境始少安且倚郭仲威為腹心張俊魯珏居城中巨師古控扼吳江李閻羅屯常熟陳思恭屯楞伽山兵無紀律村落間皆被其害而仲威既居城中外為忠勇之論士民亦信仗之郊居者徃徃復入城人人以謂四圍渠塹深廣庫廩充牣兵器犀利無不自安傳者多云敵至越州返金陵或又謂自臨安道宣歙趍當塗而歸望等素不嚴斥堠四境無衛明年正月方遣張俊陳思恭等綂兵䂓入杭州以邀収復之功俊等行涉旬濳軍于烏墩以觀變二月十八日始馳報金人犯崇徳十九日徴鄉兵發太湖洞庭東西两山千艘命甪頭巡檢湯舉總之陣于簡村二十一日金人犯吳江巨師古兵不戰而潰更以太湖民舟為向導歸于西山二十二日郭仲威遣千兵拒守于尹山已而退師二十三日府中令民逐便出城留少壯登埤以守是日遊騎掠城東仲威不戰而返湯東野出奔周望以郡印付仲威二十四日仲威㑹諸將飲城上士民數萬叩頭出血請加守禦仲威奮髯語曰即發騎兵敵行破矣民愼無擾人猶信之日欲晡金人大集城下仲威及魯珏兵火廣化寺及醫官李世康宅望與仲威等皆宵遁其下自城南轉刼居民北出齊門而去民之得出郭者多為所害金人遂進據城中縱兵焚掠死者甚衆一城殆空諸將奔伏外邑覘金人去競以兵還三月二日張俊至自崑山三日師古至自洞庭李閻羅魯珏郭仲威等至自常熟五日陳思恭至自烏墩仲威掲榜于市曰本軍已逐退金人収復城府十五日有詔周望等失守平江可發遣諸將兵徃常州以北衝襲金人以功贖過初金人燒刼之餘又值仲威縱兵晝夜搜挾民有訪舊居者即執之窮問瘞藏之物民益寃憤是夏疾疫米斗錢五百有自敵中逃歸者多困饑或驟得食而死横屍枕藉道路涇港不可勝計哭聲振天地自昔喪亂未有如是之酷者也郭仲威者出於冦盜號郭大力自荼毒平江之後為眞揚鎭撫使在郡復不悛劉光世為淮浙宣撫置司京口遣其將王徳擒至麾下縛送行在詔斬於平江市以謝百姓紹興元年冬盜邵青聚其黨於崇明沙上劉光世令王徳討之拔柵以入青軍大潰餘黨復至諜言青將用火牛徳笑曰此古法也可一不可再命合軍持滿陳始交萬矢齊發牛皆返奔賊衆殱青自縛請命徳獻之行在餘黨悉平紹興三十一年駕幸建康撫師十二月壬子至平江泊姑蘇舘葉義問自建康楊存中自鎭江還皆入見守臣洪遵獻洞庭柑卻不受自是所過無入獻者遵言官拘舟船聚邉海縣募水手留民兵夾運河築烽臺徒費無益乃罷鎭江至臨安所置烽燧癸丑上乗馬入行宫進膳時御營宿衛使司右軍統制苖定以所部至詔以定兼權主管行在殿前司職事是日武經郎曹洋自李寶軍中部所獲叛人倪詢應簡至行在就御舟引見詔磔于市詢常熟人簡道州人並為金人造舟者也甲寅上次無錫吳芾言知崑山縣胡庭傑應辦巡幸科擾民户銀器至多詔勒停永不與親民差遣陳宜中之誅韓震也其部曲李世明挈妻孥士卒逃至平望殺巡檢縱兵火殺略由小長橋透出許市時濳說友守郡不能捕遂入太湖由宜興至建康降於元其軍初在江下殺人甚多殿司兵在吳江亦不能敵多為擁入江水死者甚衆徳祐乙亥三月元師破常州前鋒至閶門有投北人韓全持元詔招諭郡守濳説友開門納之俾之入見乃遣两倅胡玉林鏜出勞其頭目復入至郡與約定撒花獻納降表為銀三千两庫銀不足以提舉茶鹽司鹽倉法數銀足之送至楓橋寺適張世傑提兵抵郡元軍遂遁去説友祕其事而殺韓全等時人為沁園春詞以譏之事聞以戴覺民代之祥興二年元巴延先鋒兵至吳是日大寒雨雪承天寺僧令行童出覘兵勢行童逺望有以銀椅中坐于山門者手招行童童畏縮莫敢前其人令軍士趣召之既至戒以無恐乃問住持某僧與西廊首座某安否俾童入導意少時自入僧房復詣方丈作禮笑曰二上人乆不㑹是眞忘我耶某即昔時賣卜號知命子者今為左宣慰矣命煑粥啗其兵且使行童齎招安牓以吳語誦之曉諭百姓始知其為探諜在江南凡八年而歸以龍虎山張天師符籙取驗於世祖云張士誠泰州白駒塲人第九四與弟士義士徳第九六士信並駕鹽綱船兼業私販初無異志先是黄河變遷至正十一年役民十五萬軍二萬治河民不聊生四方兵起有王克柔亦泰州人家富多結㳺俠將為不軌髙郵知府李齊収捕于獄李華甫與麪張四素感克柔恩謀刼獄齊置克柔于揚州招華甫為泰州判四為千夫長十三年五月士誠又與華甫同謀起事未幾士誠與其徒十八人殺華甫併其衆焚掠村落驅民為盜陷通泰髙郵自號誠王改元天祐設官分截要衝南北梗塞元立淮南行省於揚州以扼其勢既而亦招安之立義兵元帥府以官其黨然士誠狙詐百出卒不就降竟殺李齊十五年五月攻破揚州殺行省參政趙璉士義被獲伏誅士誠退還髙郵九月又攻破揚州適湖廣行省右丞阿勒呼木引苖軍來乃復退丞相托克托總大軍臨之號百萬旌旗輜重首尾千里以為髙郵刻日可平然托克托專權乆師出遂有議其後者詔安置淮安路别選相臣統其兵詔未下時部將董摶霄每為言天兵南下勢如破竹今老師費財何面目歸報天子不若先攻其易托克托從之分兵破天長六合賊皆潰散所殺者悉良民及攻髙郵墮其外城城中震恐自分亡在旦夕忽聞詔解其權勇氣百倍出城拒敵諸衛鐵甲軍負不平者盡散去或相聚為盜江隂群冦互相吞啖江宗三朱英分黨戕殺宗三將殺英時英就招安為判官州僚無如之何申白江浙行省云英謀反省差元帥觀孫壓境觀孫利其賂逗遛不進英乗間逸去過江求救於士誠仍質妻子借兵復讎士誠初亦疑惑弗聴英盛陳江南土地之廣錢穀子女玉帛之富以動之於是先遣士徳率髙郵賊衆擊横􅔐渡鏑山十六年正月朔攻破常熟江南自兵興以來官軍死鋒鏑郡縣薦罹饑饉鄉村農夫離父母妻子投充壯丁生不習兵而驅之死地以故烏合瓦解卒無成功行省丞相達實特穆爾得便宜行事陞漕運萬户托音為參政統官軍民義捍禦境上平江達嚕噶齊禄實病死陞松江府達嚕噶齊哈斯實克補之領兵出戰除都水庸田使貢師泰為平江總管巡守城池吳江止有元帥王與敬官軍一戰而敗死者過半殘兵千餘欲走入城城中閉門不納退屯嘉興旋抵松江士誠賊衆纔三四千人長驅而前直造北門弓不發矢眀旦縁城而上遂據有平江路二月壬子朔也刼掠姦殺慘不忍言脱脱因匿俞家園自刎不死㳺兵殺之哈沙珊在境外聞城破自溺死崑山嘉定崇眀州人相繼來降維楊蘇昌齡先避亂居郡士徳用為參謀稱曰蘇學士毁承天寺佛像為王宫易平江路為隆平郡立省院六部百司凡寺觀菴院豪門巨室將士分奪而居無虚者幾月進攻嘉興全軍覆沒與敬據松江判以城降之常州黄貴甫間道歸士誠許為内應遂不戰而破易為毗陵郡分兵入湖州一皷而得易為吳興郡署周仁為隆平太守仁家本鍜工稍習吏事性資深刻與士徳同心僇力躬親細故三月癸巳士誠來自髙郵服御器用皆假乗輿改至正十六年為天祐三年國號大周厯曰明時設學士員開𢎞文館以隂陽術人李行素為丞相弟士徳為平章提調各郡兵馬蔣輝為右丞居内省理庶務潘元明為左丞鎮吳興史文炳為樞密院同知鎮松江郡州縣正官郡稱太守州稱通守縣仍曰尹郡同知稱府丞知事曰從事餘則損益而已欲南取嘉興參政諤勒哲統苗獠猺獞名曰達爾罕守禦甚堅屢攻不克秋八月文炳大舉兵臨其東門悉為所殱文炳僅以身免士徳又與與敬提兵入杭州軍氣甚鋭杭州大軍歛鋒不敵丞相退避蕭山士徳軍撿括虜掠隆普營萬户普賢努乃慶元路萬户全羅里之子年未弱冠智勇過人率兵先出諤勒哲領苗軍繼進州民亦挺身巷戰士徳大潰十喪八九収殘兵攻海鹽又為乍浦鍾氏所撓後得馬道驍勇禽獲苗軍無筭崑山數為方國珍海軍攻擊託丁氏往來説合結為婚姻崑山之民幸遂蘇息湖之長興武康花鎗軍出沒雖互有勝負亦不勝其苦所跨三州皆隣勍敵十一月天兵取常州十七年攻長興士誠命趙打虎拒戰敗之潘元明復冦長興又敗之轉徇太湖馬跡山士誠將鈕律降乃取江隂士誠冦常熟廖永安大破於福山港中山王達分兵絶太湖遂取宜興士誠遣將據毗陵達圍之士誠遣士徳來援戰敗就擒俘致軍前太祖皇帝俾作書勸士誠降士徳執不從士誠窮迫願就省相招安使者徃返迄莫成事周仁自徃陳請議始定十八年八月也元赦其罪省相達實特穆爾承制令參政周伯琦等至平江撫諭之授為太尉開府平江其衆授爵有差立江淮分省江浙分樞密院于平江以處之十九年元遣使以御酒龍衣賜士誠徴海運糧自是士誠每嵗運粟十餘萬至燕京二十年士誠復遣李伯升帥衆十萬冦長興開平王遇春援之伯升遁遇春追擊之斬首五千餘級二十三年九月士誠自稱吳王請命于元不報自是徴糧不與二十六年太祖皇帝命以榜諭浙西榜曰吳王令㫖總兵官准中書省咨敬奉令㫖手聞伐罪救民王者之師考之徃古軒轅氏誅蚩尤殷湯征葛伯文王伐崇侯三聖人之起兵也非富天下本為救民近覩有元之末主居深宫臣操威福官以賄成罪以情免臺憲舉親而劾讐有司差貧而優富廟堂不以為慮方添冗官又改鈔法役數十萬民湮塞黄河死者枕藉於道哀苦聲聞於天不幸小民悞中妖術不解其言之妄誕酷信彌勒之真有兾其治世以甦困苦聚為燒香之黨根據汝潁蔓延河洛妖言既行凶謀遂逞焚蕩城郭殺戮士夫茶毒生靈無端萬狀元以天下兵馬錢糧大勢而討之畧無功效愈見猖獗是以有志之士傍觀熟慮乗勢而起或假元氏為名或託香軍為號或以孤兵自立皆欲自為由是天下土崩瓦解予本濠梁之民初列行伍漸至提兵灼見妖言不能成事又度元運難與立功遂引兵渡江賴天地祖宗之靈及將相之功一皷而有江左再戰而定浙東陳氏稱號據我上㳺爰興問罪之師彭蠡交兵元惡授首父子兄弟面縛輿櫬既待以不死又封以列爵將相皆置於朝班民庶各安於田里荆襄湖廣盡入版圖雖徳化未及而政令頗修惟兹姑蘇張士誠為民則私販貨貸行刼於江湖兵興則首聚兇徒負固於海島其罪一也又恐海隅一區難抗天下全勢詐降於元坑其參政趙璉囚其待制孫撝二也厥後掩襲浙西兵不滿萬數地不足千里僭號改元三也初冦我邊一戰生擒其親弟再犯浙省楊苖直搗其近郊首尾畏縮又詐降於元四也陽受元朝之名隂行假王之令挾制達丞相謀害楊左丞五也占據江浙錢粮十年不貢六也知元綱已墜公然害其丞相達實特穆爾南臺大夫布哈特穆爾七也恃其地險食足誘我叛將掠我邊民八也凡此八罪又甚於蚩尤葛伯崇侯雖黄帝湯文與之同世亦所不容理宜征討以靖天下以濟斯民爰命中書左相國徐達㧾率馬步舟師分道並進攻取浙西諸處城池已行戒飭軍將征討所到殱厥渠魁脅從罔治備有條章凡有逋逃臣民被陷軍士悔悟來歸咸宥其罪其爾張氏臣僚果能明識天時或全城附頥或弃刃投降名爵賞賜予所不吝凡爾百姓果能安業不動即我良民舊有田産房舍仍前為生依額納糧以供軍儲餘無科盿使汝等永保鄉里以全室家此興師之故也敢有千百相聚旅拒王師者即當移兵勦􅌍遷徙宗族於五溪兩廣永離鄉土以禦邊戎凡予之言信如皦日咨爾臣庶毋或自疑敬此除敬遵外咨請施行准此合依令㫖出榜曉諭敬依令㫖事意施行所有文榜須議出給者龍鳯十二年五月二十一日本州判官許士傑齎到八月大將軍逹副將軍遇春帥師二十萬南伐上戒以毋肆擄掠妄殺戮毁廬舍丁寧全士誠母冢師至太湖擒士誠將尹義陳旺遂次洞庭山士信在湖中不敢戰進次湖州毘山敗士誠軍又進次三里橋張天騏黄寳陶子容唐傑分兵拒戰敗之李伯升來援又敗之朱暹王晟戴茂吕珍及五太子繼援又敗之五太子者士誡養子勇而善戰平地能躍數丈士誠乃自來救戰于皂林復敗之呂珍李伯升皆降朱文忠至杭州潘元眀納欵其狀曰嬰城固守實受任之當為歸欵救民乃濟時之急務竊伏自念起身草野叨位省樞非心慕乎榮華乃志存乎康定豈意邦國殄瘁王師見加事雖貴于見機民實同于歸義念是邦生靈百餘萬比年物故十三今既入于職方欲溥覃于天澤謹將杭州土地人民及諸司軍馬錢糧之數以獻凡得兵二十餘萬湖州既下兵轉至南潯王勝降至吳江困其城久之亦降逹兵至鮎魚口撃走守將康茂才既而降至尹山橋又敗士誠軍焚戰舸千餘艘及積聚甚衆於是兵集城下達軍於葑門遇春虎丘郭子興婁門華雲龍胥門康茂才齊門湯和閶門王弼盤門張温西門耿炳文城東北仇成西南何文輝西北四面築合長圍架木棚與城中浮圖等又築二臺以俯瞰城中號為敵臺上置火筒及襄陽礮礮風扇人百里皆死吳元年六月士誠覘城東軍整乃突出閶門將衝遇春營遇春覺之分兵北濠截其後乃合戰士誠遣黄哈喇巴圖率千人繼之自引兵於山塘為援王弼馳鐡騎鼓雙刀而前遇春乗之士誠兵大敗人馬溺死沙盆潭無數士誠墜馬幾不救時有倉腳夫十人號十條龍者絶勇善鬬被錦衣銀甲出入陳中倐忽不可測亦溺死士誠又幾溺匍匐輿入城少頃復出胥門兵鋭甚士信坐城樓呼軍少休遇春乗其懈急撃大破之士信據銀牀與偽參政謝節啗桃有飛礮碎其首死城中亦作飛礮拆神祠民屋為礮具逹令構木如屋覆以編竹伏兵其下矢石不能及九月逹兵破葑門或云有説達謂城乃龜形愈擊愈固猶藏六也宜擊其尾尾者葑門達從之果破遇春破閶門新寨兵皆薄城士誠陳於門内謝節樹柵以補外城唐用仁徐義潘元紹皆降晡時軍蟻附以登城破士誠與偽副相劉毅帥兵三萬自戰萬夀寺東復敗毅降士誠從數騎歸府語其妻劉氏曰吾自應死汝曹奈何劉曰妾自有處乃積薪齊雲樓下驅婦女上令養子辰寳舉火焚之劉自經死左右皆散士誠獨坐室中達令李伯升諭意士誠距户自經伯升敗户抱解之復甦潘元紹繼至勸士誠士誠閉目不語舁入舟俘于南京自縊死洪武二年常熟盜朱蝦蟆刼庫作亂縣民殺之事詳宦蹟條景泰中嘉興人許道師以妖術行江湖間至尹山託居民家夜稍出光怪愚民相率從之念彌勒佛肆為姦汚事覺官發卒捕之道師縱火燒民舎掠貲積驅子女出震澤官兵夾岸追逐道師載重舟覆被擒送京師斬之一時官民多以功遷賞姑蘇志卷三十六
