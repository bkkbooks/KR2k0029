body:
  text: 姑蘇志卷三十七明王鏊撰宦蹟一郡縣民之司命也有遺愛焉固不能㤀而挽鄧推謝亦輿情之不免者至於繩宄墨平榖禄典文教總武備茍有可徴悉存其㮣今制命臺憲近臣遞出撫按庶政咸屬焉特稽其事及吾郡者述之顔駟漢武帝至郎署見一郎須眉皓白問為郎幾時對曰臣自文帝時為郎上曰何久不遷對曰文帝好文而臣善武景帝好美貌而臣貌醜陛下好年少而臣已老是以終身不遇也上感其言即日擢為㑹稽都尉周君陽朔三年為守造母陵道見越絶書又㑹稽志云陽嘉二年刻石旌表義里按陽當作鴻任延字長孫宛人更始元年拜㑹稽都尉時年十九迎官驚其壮及到靜泊無為唯先遣饋禮祠延陵季子時道路未通避亂江南者未還中土會稽頗稱多士延聘請髙行如董子儀嚴子陵等待以師友掾吏貧者輒分俸賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯吳有龍丘萇隠居太末志不降辱王莽連辟不到遣功曹奉謁脩書記致醫藥吏使相望於道積一嵗萇乃詣府願先死備録延辭讓再三遂署議曹祭酒萇尋卒延自臨殯不朝三日是以郡中賢士大夫爭往宦焉建武初徴為九真太守李君更始五年為守治東倉為屬縣屋見越絶書彭脩字子陽毗陵人年十五父為郡吏得休與脩俱歸道為盗所劫脩困迫乃拔佩刀前持盜帥曰父辱子死卿不顧死耶盗相謂曰此童子義士也不宜逼之遂謝去後仕郡為功曹時西部都尉宰鼂行太守事以微過收吳縣獄吏将殺之主簿鍾離意爭諫甚切鼂怒使收縛意欲案之掾吏莫敢諫脩排閣直入拜曰明府發雷霆於主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過耶脩曰昔任座面折文侯朱雲攀毁闌檻自非賢君焉得忠臣今慶明府為賢君主簿為忠臣鼂遂原意罰貰獄吏罪後州辟從事時賊張子林等數百人作亂郡言州請脩守吳令脩與太守俱出討賊賊望見車馬競交射之飛矢雨集脩障扞太守為流矢所中死太守得全賊素聞其恩信即殺弩中脩者餘悉降散言曰自為彭君故降不為太守服也吳録作彭循云循字子陽建國二年海賊丁儀等萬人據吳太守秋君聞循勇謀以守命循與儀相見陳說利害應時俱散民歌之曰時嵗倉卒賊縦横大㦸長弩不可當賴得賢令彭子陽鍾離意字子阿山隂人少為郡督郵時部縣亭長有受人酒禮者府下記案考之意封還記入言於太守曰政化之本由近及逺今宜先清府内直濶略逺縣亭細微之愆太守甚賢之遂任以縣事建武十四年㑹稽大疫死者萬數意獨身自巡視經給醫藥所部多蒙全濟舉孝亷光武目為良吏除瑕丘堂邑二縣令後徴為尚書轉僕射出為魯國意别傳云建武十四年太守汝南黄讜召意署北部督郵吳中大疫黄君轉署意為中部督郵意乃露車不冠身不修整行病者門入其家至與醫藥詣神廟為民禱祭召醫數百人令和草藥恐醫或以毒藥過劑賊害民命先自吞嘗然後行之其所臨䕶四千餘人後日府君出省災百姓攀車言曰明府不須出但得鍾離督郵民皆活也又㑹稽典録郡署意比部督郵烏程男子孫常常弟烈分居各得田半頃烈死嵗饑常稍以米粟給烈妻子輒追計直作劵沒取其田烈兒長大訟常掾史議皆曰烈孫兒遭餓賴常升合長大成人而更爭訟非順孫也意獨曰常身為遺父當撫孤弱是人道正義稍以升合劵取其田懐挟姦路貪利忘義烈妻子雖以田與常困迫之至非私義也請常田俾烈妻子於是衆議無以奪之包咸字士良曲阿人少為諸生受業長安師事博士右師細君習魯詩論語王莽簒去歸鄉里於東海界為赤眉賊所得遂見拘執十餘日咸晨夜誦經賊異而遣之因住東海立精舍講授光武即位乃歸鄉里太守黄讜署户曹史欲召咸入教其子咸曰禮有来學而無往教讜遂遣子師之舉孝亷除郎中建武中入授皇太子論語拜諫議大夫後遷大鴻臚吳録咸署户曹史轉署主簿太守黄君行春咸留守郎君縁樓探雀卵咸責數云春即不宜破卵而又升危非子道杖三十陸璯字仲芳毗陵人操履清正明京氏易尚書風角星算皆極精奥辟主簿視事旬日謝病去隠㑹稽山王關字選公無錫人明易及天文郡舉為主簿更始平守山隂令補御史不交豪強人號王獨坐黄昌字聖真餘姚人本出孤微居近學宫數見諸生修庠序之禮因好之遂就經學又曉習文法仕郡為决曹刺史見而竒之辟從事復拜宛令政尚嚴猛好發姦伏歴遷至将作大匠大司農第五倫字伯魚長陵人少有義行建武二十九年拜㑹稽太守躬自斬芻養馬妻執炊㸑受俸裁留一月糧餘皆賤貿與貧羸之民俗多淫祀常以牛祭神財産困匱其自食牛而不以薦祠者發病且死為牛鳴前後郡将莫敢禁倫移書屬縣曉告百姓其巫祝託鬼神詐怖愚民皆案論之有妄屠牛者吏輙行罸百姓以安署督郵謝夷吾為主簿鄉嗇夫鄭𢎞為督郵舉許武孝亷永平五年坐法徴老小攀車馬嗁呼相隨日裁行數里倫乃偽止亭舍隂乗船去及詣廷尉吏民上書守闕者千餘人詔公車諸為㑹稽太守上書者勿復受㑹帝幸廷尉録囚得免歸田里後官至司空謝夷吾字堯卿山隂人少為郡吏學風角占候太守第五倫擢為督郵時烏程長有臧釁倫使收案其罪夷吾到縣無所驗但望閤伏哭而還白倫曰竊以占候知長當死非刑所加故不收之倫聴其言至月餘果有驛馬齎長印綬上言暴卒倫以此益信禮之舉孝亷為夀張令稍遷荆州刺史鉅鹿太守所在有善績倫作司徒令班固為文薦夷吾曰竊見鉅鹿太守㑹稽謝夷吾出身東州英姿挺特少膺儒雅綜校圖籙昔為陪隸與臣從事奮忠毅之操躬史魚之節及應選作宰惠敷百里爰牧荆州威行邦國遷守鉅鹿政合時雝宜當㧞擢使登鼎司臣以頑駑尸禄負乗願乞骸骨更授夷吾以厭率土之望後左轉下邳令豫尅死日如期果卒鄭𢎞字巨君山隂人少為鄉嗇夫太守第五倫竒之召署督郵舉孝亷拜騶令累遷尚書令平原相侍中大司農太尉尹興明帝時為守楚王英謀反隂疏天下善士有興名及英事覺與門下掾陸續主簿梁松功曹史駟勲俱詣廷尉獄赦還鄉里詳見陸續傳王充字仲任上虞人受業太學師事扶風班彪後歸鄉里屏居教授明帝時仕郡為功曹以數諫爭不合去刺史董勤辟為從事轉治中自免還家年漸七十乃閉門潜思著論衡八十五篇慶鴻何敞傳作慶𢎞洛陽人慷慨有義節與亷范為刎頸交仕至㑹稽太守所在有異績張霸字伯饒成都人永元中為㑹稽太守表用郡人處士顧奉公孫松等奉後為潁川太守松為司𨽻校尉並有名稱其餘有業行者皆見擢用郡中爭厲志節習經者以千數道路但聞誦聲野無遺冦民語曰城上烏鳴哺父母府中諸吏皆孝子霸視事三年遂上病後徴四遷為侍中卒翟酺與諸儒門人追録本行謚曰憲文續漢書曰霸為郡越賊歸附童謡曰棄我㦸捐我矛盜賊盡吏皆休馬稜字伯威茂陵人援族孫也永元中轉㑹稽太守稜素威嚴治郡有聲蔡君修武人元初中以平冦功符守吳郡復牧青州按其子髙邑令湛碑云云然安帝時郡未分當作㑹稽是趙牧字仲師長安人少以公正稱及治郡有聲績戴就字景成上虞人仕郡倉曹掾刺史歐陽參奏太守成公浮臧罪遣部從事薛安案倉庫簿領收就考掠就慷慨直辭安竒其壮節表其言解釋郡事徴浮還京師免歸太守劉寵舉就孝亷光禄主事劉府君永建四年為守始奏分㑹稽郡置吳郡王衡永和三年郡丞羊珍反衡破斬之武開明永和二年舉孝亷除郎中謁者漢建安二年遷大長秋丞長樂太僕丞永嘉元年喪母去官復拜郎中除吳郡府丞建安二年卒韓整守吳創吳泰伯廟見唐春申君碑又吳㑹稽太守濮陽興問書佐山隂朱育曰昔韓吳郡問士於劉聖博疑即整也麋豹東海人為吳郡太守永興二年建吳泰伯廟閶門外嘗按行屬城問功曹唐景風俗所尚景曰處家無不孝之子立朝無不忠之臣文為儒宗武為将帥時人以為善言東門奐歴吳濟隂二郡太守所在貪濁謡曰東門奐取吳半吳不足濟隂續李肅潁川人桓帝時太守舉陸康孝亷肅後坐事誅康為歛尸送喪還鄉行服徐參良成人中常侍璜之弟吳郡太守時刺史陳翔舉奏參在職貪穢徴詣廷尉翔由此威名大振陳瑀字公瑋淮浦人光漢元年以安東将軍行吳郡太守建安二年曹操遣議郎王誧奉詔以孫䇿為騎都尉領㑹稽太守又敕徐州牧吕布及瑀同討袁術䇿自謂統兵但以騎都尉領郡為輕乃諷誧承制假䇿明漢将軍時瑀屯海西䇿治嚴當與布瑀參同形勢行到錢唐瑀隂圖襲䇿遣都尉萬演等宻渡江使持印傳三十餘結賊與丹陽宣城涇陵陽始安黟歙諸險縣大帥祖郎焦巴及烏程嚴白虎等使為内應伺䇿軍發欲攻取諸郡策覺之自将討虎别遣吕範徐逸攻瑀於海西瑀單騎奔袁紹䇿梟其大将陳牧獲吏士妻子四千人瑀從兄子廣陵太守登治射陽隂遣間使以印綬與白虎餘黨以報瑀見破之辱䇿討登歸丹徒遂為許貢奴客射死瑀領郡凡六年許貢為吳郡太守興平二年奏分烏程為永縣時孫䇿方起貢表聞漢帝云䇿驍雄與項籍相似宜加賚寵召還京邑若寘於外必為世患䇿候吏得表以示䇿䇿遂殺貢貢小子與客亡匿江邊䇿單騎出貢客擊傷䇿病創死朱治字君理故鄣人興平初勸孫䇿平定江東時在夀春後遷吳郡都尉從錢唐欲進到吳吳郡太守許貢拒之於由拳治與戰大破之貢南就山賊嚴白虎治遂入郡領太守事黄武元年封毘陵侯領郡如故二年徙封故鄣嵗餘還吳三年卒初治領郡舉孫權為孝亷後權為吳王治每進見權常親迎執板交拜其見異如此盛憲字孝章㑹稽人器量雄偉遷吳郡太守以病去官憲居陽羡兄弟三人總為一時名士弟宏居吳少有慷慨士風宏弟仲居㑹稽有聲望憲子匡奔魏位至征東司馬芮祉字宣嗣丹陽人從孫堅征伐有功堅薦為九江太守轉吳郡所在有聲滕𦙍字承嗣劇人有操節美儀容年十七尚公主建安二十年起家丹陽太守徙吳郡所在見稱每聴辭訟察言觀色務盡情理人有窮寃對之流涕吳展字士季下邳人仕吳為吳郡太守吳平還鄉里閉門自守不交賔客郡人蔡洪答刺史周浚論吳士書曰士季忠足矯非清足厲俗信可結神才堪幹世誠聖世之老成明時之俊乂也謝承字偉平山隂人孫權夫人之弟也為吳郡督郵嵗穰有嘉禾六穗生於部屬拜五官郎中稍遷長沙東部都尉武陵太守博學洽聞嘗所知見終身不㤀撰後漢書百餘卷子崇勛並知名勛吳郡太守封蘭亭侯太史亨字元復東莱黄人建昌都尉慈之子歴官尚書吳郡太守越騎校尉范志亨作享又云一名髙胡沖固始人父綜少孤母将避難江東孫䇿領㑹稽太守綜年十四為門下循行留吳與孫權共讀書䇿薨權以綜為金曹從事官至侍中沖仕吳中書令晉尚書郎吳郡太守賀卲字興伯山隂人吳景帝休即位為吳郡太守初不出門諸強族輕之乃題府門云㑹稽雞不能嗁卲聞故出行至門反顧索筆足之云不可嗁殺吳兒於是至諸屯邸檢校顧陸役使官兵及藏逋亡悉以言上罪者甚衆陸抗時為江陵都督自請攻孫皓然後得釋卲奉公貞正後被譛殺子循孫道力循字彦先操尚髙厲童齔不羣言行進止必以禮讓陳敏之亂循與吳郡朱誕不豫其事敏破除吳國内史不就元帝為安東将軍復上循為吳國内史見世說亦載題門事與父卲傳語同必有一誤道力吳令傅咸字長虞北地人司隸校尉𤣥之子也累遷吳國内史顧榮與親故書曰傅長虞勁直忠果雖非周才亦足貴也卒諡曰貞殷祐字慶元雲陽人擢吳郡太守嘗上箋論顧榮功髙贈典不稱由是榮得加贈鄧攸字伯道襄陵人元帝以為太子中庶子時吳郡闕守人多欲之帝以授攸攸清和平簡貞正寡欲載米之郡俸禄無所受唯飲吳水而已時郡中大饑攸奏賑貸未報乃輒開倉救之臺遣散騎常侍桓彛虞􅔎慰勞飢人觀聴善否乃劾攸以擅出榖俄有詔原之并令桓彛省其衆役攸在郡政清明百姓歡悅為中興良守後稱疾去職郡嘗有送迎錢數百萬攸不受一錢百姓數千人牽攸船不得進攸乃小停夜中發去吳録攸罷郡人入水攀其船悲號哭泣送三百里不忍别吳人歌云紞如打五皷雞鳴天欲曙鄧侯挽不來謝令推不去百姓詣臺乞留一嵗不聴張茂字偉康㑹稽人少有志行與同郡孔愉敬康丁潭世康俱著名號㑹稽三康元帝辟茂為掾屬太子衛率大興中出補吳國内史茂初夢得大象以問占夢萬雅雅曰君當為大郡而不善也象大獸取其音狩故為大郡然象以齒焚身後當為人所殺及在郡聞齋内牀下犬聲求而不獲既而地坼有二犬子取養之皆死永昌元年茂與三子俱為沈充所害追贈太保應詹字思逺南頓人性質素以學藝文章稱元帝雅重其才以後軍将軍出補吳國内史坐公事免樂謨字𢎞範淯陽人尚書令廣之子也渡江為征虜将軍吳國内史趙穆字季子汲郡人正淑平粹才識清通為明帝師歴冠軍将軍吳郡太守庾冰字季堅鄢陵人驃騎大将軍琛之子司空亮之弟也以雅素為時論所重王導請為司徒左長史補吳國内史咸和二年蘓峻作逆矯詔大赦遣兵攻冰冰不能禦棄郡奔㑹稽㑹稽内史王舒以冰行奮武将軍距峻别率張徤於吳中時徤黨甚衆諸将莫敢先進冰率衆擊徤走之於是乗勝西進赴京師又遣司馬滕含攻賊石頭城拔之冰勲為多封侯不受卒諡忠成世說蘓峻之亂諸庾逃散冰時為吳郡單身奔亡民吏皆去唯郡卒獨以小船載氷出錢唐口籧篨覆之時峻賞募覔冰屬所在搜檢甚急卒舍船市渚因飲酒醉還舞櫂向船曰何處覔庾吳郡此中便是冰大惶怖然不敢動監司見船小装狭謂卒狂醉都不復疑自送過浙江寄山隂魏家得免後事平冰報卒適其所願卒曰出自厮下不願名器少苦執鞭恒患不得快飲酒使其酒足餘年畢矣無所復須冰為起大舍市奴婢使門内有百斛酒終其身時謂此卒非唯有智且亦達生子希從子羲曽孫登之希字始彦自侍中出為輔國将軍吳國内史後死於桓温之難羲字羲叔亮之子也少有時譽穆帝時為建威将軍吳國内史時帝雅愛文義羲至郡獻詩頗存諷諫未見用而卒登之字元龍以司徒左長史為南東海太守府公彭城王義康専攬政事而登之性剛每陳己意義康不悅出為吳郡太守州郡相臨執意無改後以事免官蔡謨字道明考城人歴遷侍中蘓峻構逆庾冰出奔乃以謨為吳國内史既至與張闓顧衆顧颺等共起義兵迎冰還郡峻平復為侍中卒諡文穆虞潭字思奥餘姚人清貞有檢操蘓峻反潭守吳興加督三吳晉陵宣城義興五郡軍事與郗鑒王舒協同義舉陶侃假潭節監揚州浙江西軍事遣督䕶沈伊距管商於吳縣為商所敗潭自貶尋而峻平轉鎮東将軍吳國内史以前後功進爵武昌縣侯徙會稽内史未發還復吳郡時軍荒之後百姓飢饉死亡塗地潭表出倉米振救又脩滬瀆壘以防海鈔百姓賴之咸康中卒諡孝烈孫嘯父嘯父太元中為吳國内史隆安初徴補尚書未發而王廞舉兵叛以嘯父行吳興太守入吳興義興為廞聚兵輕俠赴者萬計廞敗應斬詔以祖舊勲聴以侯贖為庶人嘯父從父谷谷字長風吳興太守􅔎之子也仕吳國内史王恬字敬豫臨沂人丞相導之子也少好武卓犖不羈晚節更好士起為吳國内史卒諡憲侯世說謝太傅嘗與謝萬共過吳郡萬欲共萃王恬許太傅云恐伊不必酬汝意萬乃獨往坐少時王便入門内謝以為厚待已良久乃沐頭散髮而出據胡牀在中庭曬頭神色傲邁了無相酬對意謝乃還末至船逆呼太傅曰阿螭不作爾恬小字螭虎弟洽劭會洽字敬和導第三子兄弟中最知名歴建武将軍吳國内史為士民所懐在郡上表有曰編户僵尸𦵏薶無主或闔門餓餒烟火不舉徴拜領軍有清裁之稱子珣珣字元琳孝武時歴輔國将軍吳國内史在郡為士庶所悅太元十五年徴為尚書左僕射卒諡獻穆子𢎞曇首𢎞字休元少好學以清恬知名大司馬右長史轉吳國内史義熙十一年徴為太尉長史録尚書事諡文昭曇首徴吳郡太守不赴𢎞孫僧達僧達㓜聰敏孝武以為征虜将軍吳郡太守時朞嵗五遷彌不得意吳郭西臺寺多富沙門僧達求須不滿乃遣主簿顧曠率門義劫寺中沙門竺灋瑶財數百萬荆江反叛加僧達置佐領兵臺符聴置千人而輒立三十隊隊八十人又立宅於吳多役公力坐免官至中書令賜死劭字敬倫導第五子清修簡貴善治容儀有風操桓温稱為鳳雛累遷為建威将軍吳國内史卒諡簡薈字敬文恬虚守靖不競榮利歴建威将軍吳國内史年饑粟貴人多死亡薈出私米作饘粥以飴餓者所活甚衆遷尚書領中䕶軍復為征虜将軍吳國内史轉會稽内史孫琨琨少謹篤泰始中出為冠軍将軍吳郡太守遷中領軍坐在郡用朝舍錢三十六萬營餉二宫諸王及作絳襖奉獻軍用左遷光禄大夫誕字茂世父混誕少有才藻隆安七年以太尉長史為吳國内史母憂去職按隆安止五年云七年誤王侃臨沂人太保祥從孫國子祭酒琛之子也少歴顯職位至吳國内史荀蕤字令逺潁隂人光禄大夫崧之子也有儀操風望為簡文帝所重後除建威将軍吳國内史卒官弟羡羡字令則資禀逸羣清和有識裁殷浩為揚州刺史以羡有令問引為建威将軍吳國内史時年二十七中興方伯之少未有若羡者明年卒刁彛字士海饒安人協之子也斬讎人黨以祭父墓由是知名歴尚書吏部郎吳國内史咸安二年降封東海王奕為海西公徙吳縣西柴里勑彛防衛寧康初轉北中郎将徐兖二州刺史譙敬王恬字元愉忠正有局幹領左衛将軍補吳國内史又領太子詹事以宗室勲望有才用武帝時深仗之以為都督子允之允之字季度歴輔國将軍吳國宣城譙梁内史王恭庾楷桓𤣥内伐允之兄弟拒楷斬其将叚方元興初徙廣州被害何澄字季𤣥􅈞人清正有器望孝武深愛之以為冠軍将軍吳國内史太元中徴拜尚書孫叔度叔度義熙中為金紫光禄大夫吳郡太守王𢎞每稱其清身潔已子尚之為吏部郎告休定省傾朝送别於冶渚至郡叔度謂曰聞汝來傾朝送别可有幾客荅曰殆數百人叔度笑曰此是送吏部爾非關何彦徳也曽孫戢戢字慧景金紫光禄大夫偃之子也尚山隂公主歴侍中濟隂太守出為吳郡太守以疾歸為侍中秘書監卒諡懿子王愷字茂仁晉陽人丞相坦之之子太元末為侍中出為吳國内史未發徴為丹陽尹桓𤣥等至江寜領兵守石頭俄而𤣥等走復為吳郡病卒桓謙字敬祖龍亢人父沖侍中謙詳整有器望歴輔國将軍吳國内史隆安三年孫恩陷會稽謙委官出奔無錫徴拜尚書驃騎大将軍後以亂蜀伏誅袁山松陽夏人少負才名博學有文章著後漢書百篇歴祕書監吳國内史孫恩作亂吳會承平日久人不習戰所在多破亡吳國内史桓謙出奔山松築滬瀆壘縁海備恩明年恩復入浃口轉冦滬瀆害山松山松部人海鹽李祥突白刄收山松歸𦵏後人表祥居為教義里魏詠之字長道任城人家貧好學不倦桓𤣥簒位協贊義謀義熙初進征虜将軍吳國内史尋轉荆州刺史卒追諡曰桓劉栁字叔惠􅄺陽人其先漢宗室也栁有名譽少登清官歴後将軍吳國内史以顔延之為行參軍主簿栁将謝氏姊俱行即瞻之叔母贍㓜孤亦偕至吳丘淵之字思𤣥烏程人博學有才識宋文帝即位以舊恩歴侍中都官尚書吳郡太守所著文章百卷歴吳會稽丹陽三郡王韶之字休泰臨沂人好史籍私撰晉安帝陽秋序王氏過惡少帝即位以侍中出為吳郡太守王𢎞入相領揚州刺史韶之在郡常慮為𢎞所繩夙夜勤厲政績甚美𢎞亦抑其私憾文帝兩嘉之時稱韶之良守徴為祠部尚書劉式之字延叔莒人尚書左僕射穆之仲子通易好士以左衛将軍為吳郡太守諡恭侯江夷字茂逺考城人父敱夷少自澡厲美風儀善舉止景平二年由吏部尚書出為吳郡太守富陽縣賊孫法亮作亂攻永興會稽太守袁澹之遣隊主陳願等破賊夷輕行之職停吳一宿進至富陽分别善惡執送願徙賊黨數百家於彭城諸處及營陽王在吳縣見害夷臨哭盡禮以兄疾去官後為右僕射歴任以和簡稱曽孫斆斆字叔文好文辭有風格永明七年領驍騎将軍歴吳郡太守卒諡敬子徐佩之字希季郯人武帝以其姻戚累加寵任遷侍中射聲校尉未拜出為吳郡太守還除吏部尚書丹陽尹元嘉三年羨之既誅文帝特宥佩之免官而已其冬佩之謀反事發被誅劉損字子騫蕭人衛将軍毅從父弟也元嘉中為吳郡至閶門便入太伯廟室宇隤毁垣墻不修損愴然曰清塵尚可彷彿衡宇一何摧隤即令修葺殷穆長平人以和謹致稱為五兵尚書吳郡太守官至特進諡元子劉斌由吳郡太守為司徒彭城王義康長史元嘉十七年義康専政欲以斌為丹陽尹言次啓上陳其家貧言未卒上曰以為吳郡後與王履等謀欲使大業歸義康既而被收初斌在吳數有妖異至是伏誅劉禎元嘉中為守十八年鹽官獲白雀禎獻於朝二十四年鹽官復産白雀又獻之羊𤣥保太山南城人以太常徙吳郡太守加秩中二千石三吳舊有鄉射禮𤣥保舉行之文帝以其亷素寡欲頻授名郡為政雖無殊績而去後常必見思不營財利産業儉薄大明中加散騎常侍特進卒諡曰定子王翼之字季弼臨沂人黄門侍郎徽之孫也仕御史中丞吳郡會稽太守大明二年在任有白燕産郡城翼之獻于朝卒諡肅子王曇生臨沂人父𢎞之曇生好文義以謙和見稱歴吏部尚書吳郡吳興太守謝荘字希逸陽夏人侍中𢎞徽之孫也七嵗能屬文文帝見之曰藍田生玉豈虚也哉袁淑覽其賦稱為江東獨歩大明中除吳郡太守廢帝即位改中書令加金紫光禄大夫卒諡憲子始平孝敬王子鸞字孝羽孝武帝第八子大明四年為東中郎将吳郡太守改封新安王以冠軍長史蕭惠開行郡事五年遷北中郎将南徐州刺史子鸞愛冠諸子凡上所盼睐者莫不入其府及為南徐又割吳郡以屬之前廢帝即位賜死年十嵗弟曰子仁字孝和孝武第九子也大明五年封永嘉王遷東中郎将吳郡太守明帝即位賜死亦甫十嵗王延之字希季臨沂人少靜黙不交人事明帝時為吳郡太守罷郡歸家産無所増益居身簡素清靜寡欲凡所經歴務存不擾謚簡子禇淵字彦回陽翟人尚書左僕射湛之子也尚南郡公主明帝時為吳郡太守帝寝疾危殆馳使召之欲托後事及至帝坐帳中流涕語之復為吏部尚書諡文簡弟澄澄字彦道雅有才量尚廬江公主歴官清顯建元中為吳郡太守澄博好經方凡療病無貴賤皆先審其苦樂榮悴鄉壤風俗水土所宜氣血強弱然後裁方用藥為郡日有百姓李道念以公事到郡澄謂曰汝有重疾荅曰病冷五年澄為診脈曰汝病非冷非熱當是食白瀹鷄子過多所致令取蘓一升煑服之吐出物如升涎裹之動間看是雞雛羽翅爪距具足能行澄曰此未盡更服所餘藥又吐得如向者五十三頭而病瘥袁洵陽夏人為吳郡太守卒諡曰貞弟子粲舊名愍孫㓜孤好學有清才隨洵在郡擁敝裘讀書足不踰户或有欲與洵子顗婚洵曰顗不堪政可與愍孫婚耳栁世隆字彦緒解人元景弟子也為左将軍吳郡太守加秩中二千石居母憂寒不衣絮卒諡忠武蕭順之字文緯梁武帝父也齊髙帝時歴黄門郎安西長史吳郡太守所在著名郡人張緒嘗曰文武兼資有徳有行吾敬蕭順之安陸昭王􅒺字景業建元元年出為輔國将軍吳郡太守政有能名竟陵王子良與之書曰竊承下風數十年來姑蘓未有此政武帝嘉之轉郢州刺史沈文季字仲達武康人司空慶之之子也永明元年以太子詹事出為左将軍吳郡太守三年進號平東将軍富陽人唐寓之作亂破錢唐等縣文季發兵救之四年轉都官尚書卒諡忠憲王慈字伯寳臨沂人僧䖍子也歴豫章内史父憂去官起為建武将軍吳郡太守遷寧朔将軍大司馬長史卒諡懿邵陵王子貞字雲松武帝第十四子也永平十年為東中郎将吳郡太守建武二年被誅年十五王思逺琅邪人立身簡潔邵陵王子貞為吳郡除思逺吳郡丞以本官行郡事論者以為得人南康侯子恪字景沖齊髙帝之孫永明中封建武中遷輔國将軍吳郡太守永泰元年大司馬王敬則反於會稽奉子恪為名子恪奔走不知所在始安王遥光勸上併誅髙武子孫於是並勑竟陵王昭胄等入永福省是夕三更子恪徒跣奔至建陽門上聞驚覺撫牀曰遥光幾悞人事及見子恪顧問流涕以為太子中庶子梁大通二年出為寧逺将軍吳郡太守三年卒于郡舍諡恭子子恪次弟子操封泉陵侯建武中解褐為給事中避王敬則難歸為吳郡太守永元中為黄門郎李元履蘭陵承人㓜有操業甚嫺政體入梁為吳郡太守王騫字思寂臨沂人太尉文憲公儉之長子梁度支尚書中書令天監五年出為東陽太守尋徙吳郡八年遷太府卿歴侍中中書令弟暕子規暕字思晦弱冠尚宋淮南長公主仕梁雲麾将軍吳郡太守普通三年徴為尚書左僕射歴國子祭酒卒諡曰靖規字威明神峯標暎時稱俊人中大通二年為太子中庶子尋為吳郡太守簡文帝為作謝章曰臣今駕吉祥之車入句吳之境驅緹扇之馬撫奉徳之鄉製錦何階棼絲方始主書芮珍宗家在吳前守宰皆傾意奉之至是珍宗假還規遇之甚薄珍宗還都宻奏規不理郡事召為左户尚書郡境千餘人詣闕請留表三奏不許求於郡樹碑許之卒諡曰文袁昂字千里陽夏人右将軍覬之子也齊吳興太守梁武起兵州郡皆降昂獨拒境天監中歴國子祭酒八年出為仁威将軍吳郡太守十一年入為五兵尚書卒諡穆正公子君正君正字世忠美風儀早得時譽當官蒞事有名遷吳郡太守将之官到溉祖道於征虜亭謂君正曰昨䇿生蕭敏孫徐孝充非不解義至於風神器局去賢子逺矣侯景亂弟泌欲求為将梁簡文帝版泌為紫宫領直令往吳中召募士卒君正率數百人隨邵陵王綸赴援及臺城陷還郡太清三年三月景遣儀同于子悅張大黒入吳君正蓄聚財産服玩靡麗新城戍主戴僧易勸令拒守已以戍兵自外擊之君正不能决吳人陸映公等懼不濟勸之迎賊君正性怯愞乃送米及牛酒郊迎賊賊掠奪其財物子女因感疾卒子悅等又破掠吳中多所調發逼掠子女毒虐百姓吳人莫不怨憤各立城柵拒守五月景遣中軍侯子鑒入吳軍收子悅太黒還京斬之蔡撙字景節考城人尚書興宗子也仕梁侍中吳興太守中書令普通三年出為宣毅将軍吳郡太守四年卒諡康子何敬容字國禮􅈞人侍中昌㝢子也尚齊長城公主普通四年出為招逺将軍吳郡太守為政勤恤民隠辯訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之大通二年徴為中書令未拜復為吏部尚書卒南浦侯推字智達梁文帝第七子少清敏好屬文深為簡文所親賞大通後出為戎昭将軍吳郡太守所臨赤地大旱吳人號旱母侯景之亂守東府城陷握節死之臨賀王正徳字公和梁文帝子臨川王宏第三子也中大通四年為信武将軍吳郡太守後徴為侍中江革字休映考城人齊司徒竟陵王西邸學士梁武帝時歴官會稽郡丞行府州事以清貧著稱除都官尚書尋監吳郡時境内荒儉刼盜公行革至郡唯有公給仗身二十人百姓皆懼不能靜冦革復省㳺軍尉百姓逾恐革乃廣施恩撫明行制令盜賊靜息吏民安之武陵王出鎮江州革同行除推替甚美南中郎長史潯陽太守徴入為度支尚書還家除光禄大夫卒諡曰彊子革歴官八府長史四王行事三為二千石傍無姬侍家徒壁立時以此髙之何達字義方郯人梁初為後軍鄱陽王恢録事參軍歴始興内史在官好開涂港修葺牆屋人屋市里城隍廐庫所過若營家焉田秩奉錢一無所取性尤果斷人畏而惜之所至皆生為立祠表言政状帝每優詔答焉後歴給事黄門侍郎信武将軍監吳郡在吳頗有酒失遷耒陽太守逺平生處職疾強富如仇讎視貧細如子弟特為豪右所憚性耿介無私曲絶請謁未嘗以顔色下人多為俗士所疾其清公實為天下第一居數郡見可欲終不變其心妻子饑寒如下貧者後為征西諮議參軍中撫軍将軍謝舉字言揚陽夏人大同三年出為雲麾将軍吳郡太守先是何敬容有美績世稱何吳郡及舉為政聲跡略相比嘗要何徴君講中論何難以巾褐入南門乃從東園進致詩往復為虎丘山賦題于寺五年十二月入為侍中中書監尚書令安陸王大春字仁經簡文帝第八子少博渉書記天性孝謹太清三年七月侯景以大春為吳州刺史大寳元年封安陸郡王出為東揚州二年遇害南海王大臨字仁宣簡文帝第四子大寳元年除安東将軍吳郡太守時張彪起義會稽吳人陸令公潁川庾孟卿等勸大臨投之大臨曰彪若成功不藉我力如有撓敗以為說焉不可往也二年侯景廢帝豫章王棟即位使害大臨於吳郡年二十五張彪不知何許人自云家本襄陽少亡命在若耶山為盜侯景将宋子僊攻東揚州彪以南郡王前中兵參軍義舉征子僊不捷大寳二年齊髙洋遣郭元建謀襲建業陳武帝馳報江陵元帝詔王僧辯赴援僧辯㳄姑孰先命侯瑱築壘於東關以拒北冦時彪為吳郡太守僧辯徴彪與吳興太守裴之子預平侯景封南栘縣侯拜信義太守累遷南丹陽蘭陵晉陵太守智武将軍後為周迪所害諡忠愍王僧智祁人父僧念僧智為吳郡太守會陳霸先殺其兄僧辯僧智舉兵據郡霸先遣黄佗率衆攻之僧智出兵拒於西閶門佗不能克别令裴忌倍道夜薄其城僧智奔吳興太守杜龕陳蒨獲龕僧智與弟僧愔奔齊就南豫州刺史任約約敗走僧智肥不能行竟遇害龕僧辯壻也裴忌字無畏聞喜人少聰敏有識量頗涉史傳侯景亂隨陳霸先征討有功霸先遣黄佗攻王僧智不能克謂忌曰三吳奥壤舊稱饒沃雖凶荒之餘猶為殷盛而今賊徒扇聚天下摇心非公無以定之宜善思其䇿忌乃勒部下精兵輕行倍道自錢唐直趣吳郡夜至城下皷譟薄之僧智疑大軍至輕舟奔杜龕忌入據郡霸先表授吳郡太守及受禪徴為左衛将軍沈君理字仲倫吳興人美風儀博涉經史有識鑒梁末陳髙祖命監吳郡髙祖受禪為吳郡太守時兵革未寧百姓荒敝軍國之用咸資東境君理招集士卒修治器械民下恱附以幹理見稱世祖嗣位徴為侍中卒諡貞憲徐度字孝節安陸人少倜儻不拘小節以驍勇聞陳文帝嗣位命為使持節散騎常侍鎮東将軍吳郡太守天嘉初以平王琳功改封湘東郡公位至司空諡忠肅子敬成㓜聰慧好讀書永定三年為洗馬時度為吳郡太守以敬成監郡卒諡曰思鄱陽王伯山字靜之文帝第三子天嘉元年封仍授東中郎将吳郡太守六年為南徐州刺史晉安王伯恭字肅之文帝第六子天嘉六年封仍授平東将軍吳郡太守置佐史時年十餘嵗便留心政事官曹緝理太建元年加中䕶軍進號安南将軍國亡入隋歴太常少卿長沙王叔堅字子成髙宗第四子也母本吳中酒家隸髙宗召拜淑儀叔堅少傑黠凶虐太建元年立為長沙王仍為東中郎将吳郡太守永陽王伯智字䇿之文帝第十二子少惇厚有器局博涉經史天嘉中為吳郡太守聞陸慶名欲見不可詣慶宗人榮宅穿壁觀之累遷尚書左僕射嗣衡陽王伯信字孚之文帝第七子為吳郡大守舉郡人張乾孝亷隋師渡江與臨汝侯方慶並為東衡州刺史王勇所害蕭瓛字欽文齊明帝第三子少聰敏解屬文梁封義興王荆州刺史隋軍至都州瓛與叔父巖歸陳瓛為侍中禎明初置吳州以瓛為安東将軍吳州刺史甚得物情陳亡吳人推瓛為主又見梁武簡文及􅊫巋等並第三而踐尊位深自矜負有謝異者頗知廢興梁陳之際言無不驗江南人甚敬信之及陳主被執異奔於瓛由是益為衆所歸隋将宇文述以兵討之瓛遣王褒守吳州自将拒述述遣兵别道襲吳州褒棄城走瓛衆聞之悉無鬬志與述戰敗瓛逃于太湖民家執送述所斬於長安皇甫績字功明安定人隋平陳自晉州刺史移蘓州開皇十年江南髙智惠作亂州民顧子元發兵應之因以攻績相持八旬子元於冬至日遣人奉牛酒於績績遺子元書曰曩者偽陳獨阻聲教江東士民困於荼毒朝廷薄伐應時瓦觧吳會臣民白骨還肉惟當懐音感徳豈宜自同吠主翻成反噬吾是隋将何容外交易子析骸未能相告况足食足兵髙城深塹坐待強援綽有餘力何勞踵輕弊之俗作虚偽之辭以此見期必不可得卿宜曉諭黎元能早改迷失道非逺子元得書於城中頓首陳謝楊素援兵至合擊破之十二年正月拜信州總管十二州諸軍事卒諡曰安劉權字世畧豐人少有俠氣重然諾藏亡匿死後折節好學動循法度歴仕齊周入隋從平陳開皇十二年拜蘓州刺史于時江南初平物情尚擾權撫以恩信甚得民和官至南海太守姑蘓志卷三十七
