body:
  text: 姑蘇志卷三十二明王鏊撰園池晉辟疆園自西晉以來傳之池館林泉之勝號吳中第一辟疆姓顧氏晉唐人題詠甚多陸羽詩云辟疆舊林園怪石分相向陸龜䝉云吳之辟疆園在昔勝概敵皮日休云更葺園中景應為顧辟疆宋張伯玉云丁公門館辟疆園放蕩襟懷水石間今莫知遺跡所在考龜䝉之詩則在唐為任晦園亭今任園亦不可考矣髙啓詩江左風流逺園中池館平賔客已寂寞狐兔自縱橫秋草猶故緑春花非昔榮市朝亦屢改髙臺能不傾陸山人樓亭見儲光羲詩廣異記云蘇州山人陸去奢亭子即戴顒宅也光羲詩暮聲雜初鴈夜色涵早秋獨見海中月照君池上樓山雲拂髙棟天漢入雲流不惜朝光滿其如千里遊孫園今不知所在元微之寄樂天詩孫園虎寺隨宜看不必遙遙羡鏡湖任晦園池晦嘗為涇尉歸吳作圃皮日休云有深林曲沼危亭幽砌之勝蓋晦得辟疆園以為宅也皮日休詩任君恣髙放斯道能寡合一宅間林泉終身逺囂雜嘗聞佐浩穰散性多儑歘爾解其綬遺之如棄靸歸來鄉黨內却與親朋洽開溪未讓丁列第亦稱甲入門約百步古木聲霎霎廣檻小山欹斜廊怪石夾白蓮倚欄楯翠鳥緣簾押地勢似五瀉巖形若三峽猿眠俱腽肭鳬食時喋唼撥荇下文竿結藤縈桂楫門留醫樹客壁倚栽花鍤度歲止褐衣經旬唯白帢多君方閉户顧我能倒屧請題在茅棟留坐於石榻魂從清景逼衣任煙霞裛階墀龜任上枕席鷗方狎沼似頗黎鏡當中見魚喋杯杓悉杉瘤盤筵盡荷葉間斟不置罰間奕無爭劫間日不整冠間風無用箑以斯為思慮吾道寧疲薾衮衣競繀鼓吹爭鞺鞈欲者解擠排詬者能詀講權豪暫翻覆刑禍相填壓此時一圭竇不肯饒閶闔有第可棲息有書可漁獵吾欲與任君終身以斯愜陸龜䝉吳之辟疆園在昔勝槩敵前聞富修竹後說紛怪石風煙慘無主載祀將六百草色與行人誰能問遺跡不知清景在盡付任君宅却是五湖光偷來傍簷隙出門向城路車馬聲轢入門望亭隈水木氣岑寂犨牆繞曲岸勢似行無極十步一危梁乍疑當絶壁波容淡而古樹意蒼然僻魚驚尾半紅鳥下衣全碧斜來島嶼隱恍若瀟湘隔雨靜挂殘絲煙消有餘脈朅來任公子擺落名利役雖得祿代耕頗愛巾隨䇿秋籠支遁鶴夜榻戴顒客說史足為師談禪差作伯君多鹿門思到此情便適偶蔭桂堪帷縱吟苔可席顧余真任誕雅遂中心獲但喜醉還醒豈知月尚白甘間在雞口不貴封龍額即此自怡神何勞謝公屐褚家林亭松陵倡和集云在震澤之西范志云當在松江之傍今吳中褚姓尚多亦有登進士科者白居易詩聞健朝朝出乘春處處尋天供間日月人借好園林漸以狂為態都無悶到心平生身得所未省似而今皮日休廣亭遙對舊娃宫竹島蘿溪委曲通茂苑樓臺低檻外太湖魚鳥徹池中蕭疏桂影移茶具狼藉蘋花上釣筒爭得共君來此住便披鶴氅對清風陸龜䝉一陳西風起浪花繞欄干下散瑶華髙窗曲檻仙侯府卧葦荒芹白鳥家孤島待寒疑片月逺山終日送餘霞若知方外還如此不要乘秋上海槎凌處士莊韋莊詩云一簇林亭返照間門當官道不曽關花深逺岸黃鶯閙雨急春塘白鷺間載酒客尋吳苑寺倚樓僧看洞庭山怪來說得仙中事新有人從物外還東墅又名東莊與南園皆廣陵王元璙帥吳時其子衙內指揮使文奉所創經營三十年極園池之勝竒卉異木及其身見皆成合抱又纍土為山亦成巖谷晚年經度不已每燕集其間任客所適文奉跨白騾披鶴􅌁緩步花徑或泛舟池中容與往來聞客笑語就之而飲其好事如此南園祥符圖經云在子城西南有安寧㕔思𤣥堂清風緑波迎仙等三閣清漣涌泉清暑碧雲流杯沿波惹雲白雲等八亭又有榭亭二就樹為榱柱及迎春百花等三亭西池在園㕔西有龜首旋螺二亭續記云廣陵王帥吳因治南園為島嶼峯巒出於巧思錢氏去國此園不毁祥符中知州秦義葺之以會寮吏館使朝貴皆為賦詩參知政事郡人丁謂為序時景靈宫購求珍石郡中亦於此取貢京師其間臺榭歲久摧圮吕濟叔嘗作熙熙堂厥後守將亦加修葺今所存之亭僅有流杯四照百花樂豐惹雲每春縱士女逰覽先是長洲令王禹稱常攜客醉飲賦詩謂云天子優賢似有唐鏡湖恩賜賀知章他年我若功成後乞與南園作醉鄉大觀末蔡京罷相欲東還詔以園賜之京詩云八年帷幄竟何為更賜南園寵退歸堪笑當年王學士功名未有便吟詩續志云南園昔甚廣袤異木竒石多為朱勔取進獨一松盤根大不可移而止今府學後一方之地亦故址也猶有清流崇阜可以倣佛當時之勝蜀人髙氏嘗得一隅經營之而流杯出焉因作醉鄉亭以倣古羅隱南園詩摶擊路終迷南山且灌畦敢言逃俗態自是托幽棲葉長春菘潤科圓早薤齊雨沾虛檻冷雲壓逺山低竹好還成徑桃夭亦有蹊小窗飛野鳥間瓮養酼雞水石心逾逺雲霄分已􅢦病憐王猛畚愚笑隗囂泥澤國潮平岸江村栁覆堤到頭乘興是誰手好持攜蘇舜卿西施臺下見名園百草千花特地繁欲問吳王當日事後來桃李若為言梅摯長洲茂苑足珍材剩買前山活翠栽客士不疏承帝力幾多臣節共安來長洲茂苑占幽奇巖榭珍臺入翠微園李露濃三色秀徑桃烟暖一香飛月臨夕樹烏頻繞風揭珠簾燕未歸弭蓋暫歡成結戀斜陽憑檻獨依依胡宿一遍芳菲欲滿林回塘過雨曉來深紅粧珠珮交花影白馬春衫度柳陰向老追攀多强意隨時風物但驚心眼前百事輸年少猶解因君放浪吟周元明熳爛花時錦繡張無端下馬繫垂楊山亭水閣笙歌地合與行人作醉鄉程俱王子池臺迹已荒年來華構壓髙岡長林不礙千山月老幹猶含九夏霜便覺平泉冠東洛還依緑水記南塘蝸廬却喜通幽徑岸幘時來一嘯長成廷圭和周伯溫參政九日南園燕集二首步履巉巖若跨鰲望中詩興與秋髙西山拄笏東山屐右手持杯左手螯返照入湖明塔影斷雲將雨過林皋松間飲散歸來晚金粉霏霏濕錦袍范相南園五百秋重來訪古轉多愁啼烏樹老臺空在飲馬池荒水不流芹泮好從多士樂桂叢誰賦小山幽諸公髙㑹詩如錦授簡安能接勝逰髙啓君不見平樂館古城何處寒雲滿君不見奉誠園荒臺無縱秋草繁白日沈山水歸海寒暑頻催陵谷改皇天大運有推移富貴於人豈長在請看當年廣陵王雙旌六纛何輝光幸逢中國久多故一家割據夸雄强園中歡游恐遲暮美人能歌客能賦車馬春風日日來楊花吹滿城南路疊石為山引泉為池辟疆舊園何足奇經營三十年欲令子孫永保之不知回首今幾時繁花掃地無復遺門掩愁鴟嘯風雨種菜老翁來作主空餘怪石卧池邊欲問興亡不能語春已去人不來一樹兩樹桃花開射堂踘圃俱青苔何須雍門琴但令對此便可哀人生不飲胡為哉人生不飲胡為哉張氏園池亦南園故地也紹興間侍郎張幾仲得之今山亭猶扁惹雲池塘猶扁清漣存故實也堂側有淩霞閣奉其父循王像四時飾以真服滄浪亭在郡學之南積水彌數十畝傍有小山髙下曲折與水相縈帶石林詩話以為錢氏時廣陵王元璙池館或云其近戚中吳軍節度使孫承佑所作既積土為山因以瀦水慶厯間蘇舜欽子美得之傍水作亭曰滄滄歐陽文忠公詩云清風明月本無價可惜只賣四萬錢滄浪之名始著子美死屢易主後為章申公家所有廣其故地為大閣又為堂山上亭北跨水有名洞山者章氏併得之既除地發其下皆嵌空大石人以為廣陵王時所藏益以增纍其隙兩山相對遂為一時雄觀建炎之難歸韓蘄王家蘇舜欽滄浪亭記豫以罪廢無所歸扁舟南遊旅於吳中始僦舍以處時盛夏蒸燠土居皆褊狹不能出氣思得髙爽虛闢之地以舒所懷不可得也一日過郡學東顧草樹鬱然崇阜廣水不類乎城中並水得微徑於雜花修竹之間東趨數百步有棄地縱廣亟五六十尋三向皆水也矼之南其地益濶旁無民居左右皆林木相虧蔽訪諸舊老云錢氏有國近戚孫承佑之池館也坳隆勝藝遺意尚存豫愛而徘徊遂以錢四萬得之構亭北崎號滄浪焉前竹後水水之陽又行無窮極澄川翠幹光影㑹合於户軒之間尤與風月為相冝豫時榜小舟幅巾以往至則灑然忘歸觴而浩歌踞而仰嘯野老不至魚鳥共樂形骸既適則神不煩觀聽無邪則道以明返思向之汩汩榮辱之場日與錙銖利於害相磨戛隔此真趣不亦鄙哉噫人固動物耳情橫內而性伏必外寓於物而後遣寓久則溺以為當然非勝是而易之則悲而不開唯仕官溺人為至深古之才哲君子有一失而至於死者多矣是未知所以自勝之道豫既廢而獲斯境安於沖曠不與衆驅因之復能見乎內外失得之源沃然有得笑傲萬古尚未能忘其所寓故用是以為勝焉舜欽滄浪詩一徑抱幽山居然城市間髙軒面曲水修竹慰秋顔迹與豺狼逺心隨魚鳥間吾甘老此境無暇事機關滄浪觀魚瑟瑟清波見戲鱗浮沈追逐巧相親我嗟不及羣魚樂虛作人間半世人滄浪靜吟獨逺虛亭步石矼靜中情味世無雙山蟬帶響穿疏户野蔓盤青入破窗二子逢時猶死餓三閭遭逐便沈江我今飽食髙眠外唯恨澄醪不滿缸滄浪懷友滄浪獨步亦無悰聊上危樓四望中秋色入林紅黯淡日光穿竹翠玲瓏酒徒漂落風前燕詩社凋零霜後桐君又暫來還徑往醉吟誰復伴衰翁獨步花枝低欹草色齊不可騎入步時宜時時攜酒只獨往醉倒唯有春風知又初晴逰夜雨連明春水生嬌雲濃淡弄微晴簾虛日薄花竹靜時有乳鳩相對鳴歐陽修子美寄我滄浪吟邀我共賦滄浪篇滄浪有景不可到使我東望心悠然荒灣野水氣象古髙林翠阜相回環新篁抽笋添夏景老枿亂發爭春妍水禽間暇事髙格山鳥日夕相啾喧不知此地幾興廢仰視喬木皆蒼煙堪嗟人迹到不逺雖有來路曽無緣窮奇極怪誰似子搜索幽隱探神仙初尋一徑入䝉密豁見異境無窮邊風髙月白最宜夜一片瑩淨鋪瓊田清光不辨水與月但見空碧涵漪漣清風明月本無價可惜秖賣四萬錢又疑此境天乞與壯士憔悴天應憐鴟夷古亦有獨往江湖波濤渺翻天崎嶇世路欲脫去反以身試蛟龍淵豈如扁舟任飄兀紅蕖緑浪搖醉眠丈夫身在豈長棄新詩美酒聊窮年雖然不許俗客到莫惜佳句人間傳胡宿竄逐本無罪羈窮向此忘野煙含悵望落日滿滄浪亂草荒來緑幽蘭死亦香楚魂招不得秋色似瀟湘胡珵昔聞滄浪亭未濯滄浪水先賢眇遺跡壯觀一何侈飛橋跨水未巨浸拆胡壘糟床行萬罋繚牆周數里廢興固在天庶用觀物理緬懷嘉祐世周道平如砥相君賢相君子美東南美如何一網盡禍豈在故紙青蠅變白黑作俑兹焉始所存醉翁文垂耀信百世無忘角弓詠嘉樹猶仰止同來二三子感歎咸坐起縹瓷釂新汲毁譽均一洗忽逢醒狂翁一别垂二紀雋哉老益壯論事方切齒我欲裂絳幔推著明光裏安得上天風吹落君王耳梅堯臣寄題滄浪亭聞買滄浪水遂作滄浪人置亭滄浪上日與滄浪親宜曰滄浪叟老向滄浪濵滄浪何處是洞庭相與鄰竹樹種已合魚蟹時可緡春羮芼白菘夏鼎烹紫蓴黃柑摘霜晚香稻炊玉新行吟招隱詩懶戴醉中巾憂患兩都忘還往誰與頻昨得滁陽書語彼事頗真曩子初去國我勉勿迷津四方不可之中土百物淳今子居所樂豈不逺埃塵裸飾嗟太伯結客非春申莫與吳俗尚吳俗多文身蛟龍刺兩股未變此遺民讀書本為道不計賤與貧當須化閭里庶使禮義臻劉敬觀滄浪亭石感而冇作蘇君在朝人不知蘇君既沒人悲之流風遺書見稱道髙文大句爭提撕壁間草隸亦不置剝苔堆立無棄遺乃知死不與人共利害而後不為時所疑滄浪亭空卉木老古石蒼蒼顔色好無脛猶能千里來致身忽在都門道帝都王侯好事多相看自悔取不早君不見吳興長史春襴衫閉門抱恨長枯槁梅都官園在府治西祝槱野録云聖俞晚年謝事卜築滄浪之傍與子美相鄰二公一時名勝日夕往還酌酒賦詩相得甚歡今猶稱其地為梅家園隱圃在靈芝坊蔣樞密堂所居堂兩守蘇謝事因家焉自號遂翁圃中有水月庵烟蘿亭風篁亭香巖峯古井貪山等景自賦隱圃十二詠宅南溪上結宇十餘楹名溪館及築南湖臺於水中亦皆有詩皇祐間芝草生於溪館知州李仲偃集賔僚賦詩為壽因立靈芝坊胡宿撰溪館記隱圃雅得莬裘地清宜隱者心緑葵才有甲青桂漸成陰獨曳山屐往無勞俗駕尋湛然常寂處水月一庵深溪館二首年來納組去林下得身還泚泚清流處童童碧樹間淵魚樂且靜庭鶴壽而閒粗有淮安趣誰同賦小山野意本自遂兹溪稱獨醒雲蘿環靜室水石照踈櫺殺竹編書古紉蘭作佩馨王通昔不偶時亦坐汾亭南湖臺三首危臺竹樹間湖水伴深間清淺採香徑方圓明月灣放魚隨物性載石作家山自喜歸休早全勝賀老還嶢榭水中央兹為隱遁鄉小園香寂寂一𣲖曉泱泱烟草碧彌岸霜桃紅壓牆鴟夷儻居此必未入滄浪水次揭危亭烟堤四面平栽蘆延宿鷺種柳待啼鶯雪霽清流漲風來夜艇橫輕肥莫臨顧我老懶逢迎徐都官山亭在胥門外都官名祐郡守蔣希魯公為作七石詩時杜祁公亦有詩其卒章云上刻希魯詩英詞何縹眇此出於蔣之奇跋語之奇希魯公姪也就隱在華山郡人張廷傑漢卿所葺紹興間漢卿自靖州推官歸營此搜竒選勝垂三十年瞰池創亭因阜立室遂為一時絶境有天池庵臨賦亭緑龜池流愒亭泓玉釣灘緑淨亭更好亭宿雲庵獨秀亭繡屏不夜關大石屋小石屋花島俯首巖浮槎橋龜巢石翠壁釣雲臺雲關張公巖觀音洞石鼓月觀雚石集仙壇龜甲井瑞澗柳洲曲水流觴等處而天池為第一且繪為圖士大夫多賦之周益公遊山記云漢卿既得華山營墓就隱日課童僕刓剔巖竇疏導泉源負山崖創亭榭環以佳花美木四時皆有竒觀費益不資為吳門絶景然山石粗礦殊乏秀潤耳復軒在吳縣之黃村處士章憲作謂葺先人之廬治東廡之軒以貯經史百氏之書名之曰復以警其學其後圃又有清曠堂詠歸清祕遐觀三亭以慕古賢各有詩復軒記其歌云洞視兮八荒了無物兮往無旁往古來今兮無際起復代謝兮不失吾常復乎復乎吾所寓兮廣莫之野而無何有之鄉清曠堂吾慕仲公理卜居樂清曠兹焉愜吾願名堂以自況我無適俗韻且乏食肉相何許寄吾生棲遲翳窮巷境幽有經行心逺無得喪從容大化中信是羲皇上詠歸亭吾慕曽夫子舍瑟言所志所志非為邦獨契聖者意莫春春服成從我才一二風乎林岫間所樂有餘味邈矣千載上神交得冥契當知結駟非不易窮閻是清祕亭吾慕韓昌黎文章妙百世體物語尤工賦竹跨清閟唯我獨好之則亦有深意虛中可受道貫時無險易復若魏文貞直節無嫵媚伊余清閟中賞玩有遺味遐觀亭吾慕陶靖節處約而平寬涉園自成趣矯首復遐觀我亦散遊目俯笑天地間雲煙自舒卷湖嶺相回環永與形役謝豈有俗慮干想象斜川遊千載乃相關臞菴在吳江縣松江之濱王份營此以居圜江湖以入圃柳塘花嶼景物秀野名聞四方圃中有與間平逺種德山堂四堂煙雨觀橫秋閣清風臺鬱峩城釣雪灘琉璃沼臞翁澗竹㕔龜巢雲關纈林楓林等處而浮天閣聚逺樓為最勝總為臞菴份字文儒以特恩補官為大冶令遂歸老焉一時名公題詠甚多徐作開菴藜莧幽人室丘園隱者居一原青障合萬木緑陰疏手把歸田賦腰懸種樹書桑麻連畛秀網罟入溪魚吕本中伊洛富山水家有五畝園花竹繞瀍澗不讓桃花源清時足真賞户門開層軒一朝風塵暗故家希復存莽蒼走萬里始及吳市門菴廬據形勝氷壺貯乾坤亭榭著仍穩不見斧鑿痕主人更超邁雲夢八九吞植杖邀我坐笑語清而溫坐令車馬客稍識山林尊十年老朝市漸覺兩目昏求田與問舍姑置不復論但願從我公不使世諦渾蘇庠王郎臞菴摩詰詩煙花繞舍江繞籬石渠東觀了無夢筆床茶竈行相期古人已往不可作甫里顧有今天隨東鄰蟹舍肯著我請辦簔笠懸牛衣浮天閣臞菴主人天與間回欄飛閣臨滄灣晴波渺渺鴈行落坐見萬頃穿雲還百年有底付鳥翼未暇著腳鴛鴦間徑須呼酒澆磈磊莫遣暝色霾煙鬟玉蟾飛入水晶宫萬頃琉璃碎晚風詩就雲歸不知處斷山零落有無中秋落空江動碧虛荻蘆洲渚雁飛初我來欲訪鴟夷子為掛西風十幅蒲平逺堂柳外西風六幅蒲野塘睡鴨對春鋤如何喚得王摩詰畫作江山煙雨圖寒蘆淅淅催秋晚浦雨溟溟憶去年他日未埋黃土陌為君重賦補亡篇草堂笛卧松江明月簔披笠澤歸雲若道清宵快活王侯何事如君王銍全家髙隱白雲關事不縈懷夢亦間欸乃交撑漁市散隔江城郭是人間向子諲仙翁五十鬢猶青髙卧柴門晝亦扄茅舍已忌鍾鼎夢蒲輪休過薜蘿亭陰森門巷先生柳寂寞江天處士星晚歲田家農事了間抄寧戚相牛經沈與永地控三州界池開十丈蓮桑麻無杜曲松菊有斜川别浦歸帆逺他山晚照妍江湖春水濶幽興白鷗前程子山待月凝雲館垂竿釣雪灘虛窗搖冷翠傑閣聳髙寒籠養千齡鶴爐燒九轉丹不須論許事心目自清閒壁上煙蘿子窗前鴻素書短籬開窈窕嫩竹轉扶疏世事霜前葉聲名澗底樗柴桑陶靖節日暮荷歸鋤何稱多羡王居士心間事事幽山從天末見江近枕邊流春圃千葩秀霜林百果收更能窮物理濠上看魚遊地古松江勝為園不種瓜幽深清磬響髙下石欄斜花密蜂隨蝶林深雀啅蛇勝如摩詰畫不是季鷹家柳外長虹卧江邊小帘圓水搖千嶂影窗納五湖天隔岸誰家圃開帆何處船非關臺榭好此地最堪憐霜落川原淡風髙木葉丹雲垂千頃白月墮一江寒禮佛因成塔焚香旋築壇竹聲過小院雜珮響珊珊沙暖鴛鴦困江寒翡翠愁紅蓮秋的歷短櫂晚夷猶處世長無纍端居百不憂時時明月下橫笛倒騎牛僧道舉竹裏蓬茅掩棘扉主人詩瘦帶寬圍種成苜蓿先生飯製就芙蓉隱者衣柳絮春江魚婢至荻花秋渚雁奴歸小溪短艇能容我先向溪隈築釣磯溪南溪北繞清漪舍後舍前圍短籬九九算來成底夢休休歸去復何疑添丁見客走賖酒阿買能書供賦詩丘壑政非公子事綺紈當預少年知李彌正勞車發危坂倦艘失飛湍滔滔褦襶子疾走殊未闌鶴仙擺名宦結廬松江干笑拍萍風浮瞬視草露溥圖川不愧輞序谷寧先盤門豈俗駕拒室無哀箏彈按行松菊間淡然有餘歡蓮巢衆香聚浮天百憂寬秋光斂洲渚暮翠籠峯巒我來挾良朋道故盟未寒緬顔仰孤標耐久同蒼官終當役薪水刀圭却衰殘陳棪季鷹雅志本江湖胡為入洛誠計疏一杯蓴羮入歸夢歲晚僅飽松江鱸何如王郎十畝宅一生江頭枕江碧西風落日弄煙波却笑陶朱計然策我來訪君春已深江花江柳翻緑陰相攜三徑拾瑤草為問客來何苦心固知此事君計得我被微官苦相逼勸君慎勿語彈冠便恐紛紛北山檄沈周清江繞檻白鷗飛坐看潮痕上釣磯松菊未荒元亮徑芰荷先製屈平衣窗前楓葉曉初落亭下鱸魚秋正肥安得從君理蓑笠櫂歌相趂入煙霏環谷距寶華寺二里王珏總領之園亭花竹竒石環繞其屋珏字德全介甫之後見周益公南歸録石湖别墅在縣西南十二里參政范成大創因越來溪故城隨地勢髙下而為亭榭别築農圃堂對楞伽寺孝宗御賜石湖二大字成大作上梁文云吳波萬頃偶維風雨之舟越戍千年因築湖山之觀又有北山堂千巖觀天鏡閣玉雪坡錦繡坡說虎軒夢魚軒綺川亭盟鷗亭越來城等處以天鏡閣為第一一時名人皆為文詞明道八年周益公過之留題壁間云吳臺越壘距盤門才十里而陸沈於荒煙野草者千七百年紫微舍人始創别墅登臨之勝甲於東南豈鴟夷子成功於此扁舟去之天閟絶景須苗裔之賢者然後享其樂耶成大愧謝益公曰吾行四方園池多矣如薌林盤圃尚乏此趣非甲而何范公題御書碑云淳熙八年三月庚戌制書擢臣居守金陵閏六月丁亥朝行在庚寅辭後殿翼日既望詔錫清燕苑中皇帝親御翰墨大書石湖二字以賜天縱聖能遊藝超絶典則髙古如伏羲畫體勢竒逸如神禹碑日光雲章垂耀縑素環列改觀禁籞動色臣驚定喜極不知抃蹈昧死奉觴上千萬歲壽奉寶書以出越五日至於石湖藏焉石湖者具區東匯自為一壑號稱佳山水臣少長釣遊其間結茆種木久已成趣春秋時吳臺其陰越城其陽登臨訪古往蹟具在汙萊露蔓千七百餘年莫有過而問者今猥以臣故徹聞髙清天光博臨燕及荒野繇開闢來未覩斯盛斐度李德裕皆唐宗臣緑野平泉亦聲震當代揆今所䝉無傳焉何物么䯢獨冒寵赫百身萬殞莫能負戴臣蒲柳早秋仕無補益縣官倘晼晚不休奸止足之戒則將上纍隆知俯愧初服臣用是懼冀幸少日遂賜骸骨歸老湖上宿衛奎璧與山川之神暨猿鶴松桂同在昭回中一介姓名亦因是不朽使後世之人屬厭榮祿得全於桑榆以無辱君賜則陛下丕顯休命不委於草莽庶幾報恩之萬一臣既摩刻扁榜又被之琬琰以傳且附著臣之自叙云爾七月朔端明殿學士中大夫知建康軍府事兼管內勸農事提割本府界分諸鋪遞角充江南東路安撫使馬步軍都總管兼營田使兼行宫留守吳縣開國伯食邑七百户賜紫金魚袋臣范成大拜手稽首謹書楊萬里題御書大字歌石湖仙人補天手整頓乾坤屈伸肘爾來化作懶卧龍簸弄珠璣漱瓊玖五雲萬里天九重玉皇深拱蓬萊宫豈無九虎守閶闔北門半扉當朔風夜令雲師敕風伯鞭起卧龍湖底月湖水捲上天中央却鎖北門護風雪仙人馭風乘緑雲玉宸殿上朝帝真帝將北斗酌天酒氷桃碧藕脯麒麟傳呼玉蜍吸銀浦黟霜調冰澆月窟灑成羲畫河洛書白璧一雙浮雨露石湖二字天上錦奎星璧宿落山扉昭回不飾吳花草姑蘇臺前近太微詩人不直一杯水自是渠儂命如紙教人妬殺石湖仙手攬星辰懷袖底成大懷石湖舊隱浩蕩沙鷗久倦飛摧頺櫪馬不勝鞿官中風月常虛度夢裡關山或暫歸橘社十年霜欲飽鱸江一雨水應肥冷雲著地墉蒲晚誰為披蓑暖釣磯說虎軒夜坐白雲深處卧癡頑挂起東窗水月寬但得好詩來眼底何須寶剎現毫端一身莫作官身想萬境都如夢境看蟹舍鄰翁能日醉呼來分與一蒲團北山堂開爐夜坐困眠醒坐一龕多竹洞無關斷客過貧向爐中煨榾柮懶從掌上看維摩閒無雜念唯詩在老不甘心奈鏡何八萬四千安樂法元無祕密可伽陀寄題石湖海棠盛開二首手開芳徑越城頭紅錦屠蘇結綺樓不把髙枝銀燭照淡雲微月替人愁老懶君家似出家園林春色雨霑沙海棠尚自無心看天女何須更散花三月十六日石湖書事二首春事日以闌暑陰正清美拖笻入林下秀緑照衣袂盧橘梅子黃櫻桃桑椹紫荷衣浪花顫筍破苔色起風日收宿陰物色有新意鄰曲知我歸爭來問何似病惱今有無加飯日能幾掀髯謝父老衰雪已如此種木二十年手開南野荒苒苒新嵗月依依舊林塘牙來擅下濕岑蔚驕衆芳菱母尚能瘦竹孫如許長憶初學圃時刀笠冒風霜今兹百不堪裹帽人扶將龍鍾數能來猶勝兩相忘中秋後兩日自上沙回聞千巖觀下巖桂盛開後檥舟石湖留賞遂賦二絶金粟枝頭一夜開故應全得小詩催藍輿緩緩隨兒女引入天香洞裏來千巖觀下碧瑤林歲晚青青共此心隱士歸兮花未老每年來把一杯深次韻徐提舉逰石湖三絶三徑荒蕪岫愰開錦車何事肯徘徊春風相為髙人住落絮殘花好在哉日腳烘晴已破烟山頭雲氣尚披綿郤須多謝朝來雨洗淨明湖鏡裏天天上麒麟朝墨林富家手筆擅文心欲知萬頃陂中意但向三篇句裏尋閏月四日石湖衆芳爛熳北坨南岡總是家兒童隨逐任歡譁開嘗臘尾蒸來酒㸃數春頭接過花盡把園林䝉錦繡多添門户鎖煙霞杖藜想被東風笑扶卻衰翁管物華檢校石湖新田今朝南野試開荒分手耘鋤草棘場下地若干全種秫髙原無幾謾栽桑蘆芽碧處重增岸梅子黃時早濬塘田里只知溫飽事從今拋卻半年忙聞石湖海棠盛開亟攜家過之三絶東風花信十分開細意留連待我來開過十分風不動更無一片㸃蒼苔家人扶上錦城頭蜂蝶團中爛熳遊報答春光須小醉紅雲烟裏按伊州低花妨帽小移笻深淺燕脂一萬重不用髙燒銀燭照暖雲烘日正春濃范公亭在崑山薦嚴寺後圃池上參政范成大少讀書寺中遊息其上吳仁傑嘗扁之曰可賦後人遂以范公名之范家園在雍熙寺後范周無外所居有石刻三大字郡守李大異書後移置文正公書院之右南村在越來溪西吳山下寺簿盧瑢所居扁曰吳中第一林泉有御書得妙堂扁時有盧園三十詠南村紫關帶煙堤吳中第一林泉佐書齊吳山堂正易堂紫芝軒瑞華軒靜宜軒玉華臺蒼谷來禽塢逸民園植竹處江南煙雨圖香巖湖山清隱㕔得妙堂雲村香巖玉界古彥玉川館山陰畫中杏仙堂藕花洲桃花源三水流觴其二缺郭氏園在飲馬橋西南本郭雲大夫所居有池號小滄浪後為魏克愚太卿所得筠谷在西館橋之西待制榮薿所居薿字茂世舊寓道州結廬竹間號筠谷及知臨安引年丐祠陛辭之日上以琉璃壺貯丹桂花且繪之便面題詩二十八字併金帶為賜復書筠谷二大字寵其歸於是卜築吳下終老焉雙清亭在洞庭東山社下里建炎間郡人錢康功避地於此康功舉進士通判楊黃滁三州官至朝奉大夫醉眠亭宋李無晦作無晦名行中居淞江髙尚不仕東坡兄弟嘗過訪留題蘇軾李行中醉眠亭詩已向間中作地仙更於酒裏得天全從教世路風波惡賀監偏工水上眠君且歸休我欲眠人言此語出天然醉中對客眠何害須信陶潜未苦賢孝先風味也堪憐肯為周公晝日眠枕麯先生猶笑汝枉將空腹貯遺編蘇轍是非一醉了無餘惟有胸中萬卷書已把人生比蘧傳更將江浦作階除欲眠賔客從教去倒卧氍毹豈暇舒京洛舊游真夢裏秋風無復憶鱸魚沈氏園亭在洞庭鎮下里人沈仲嘉所居孫覿有詩何仔園亭在尹山種植甚繁而牡丹尤多周益公嘗遊見南歸録醒心亭熙寧間曹傃履中所葺在葑門裡有土阜對峙水中雖巨浸弗沒號曰浮墩後避諱改名浮丘相傳此地昔有雙松竦然參天建炎之難有潰兵欲伐之隕石如雨乃止今放生池即其地也樂圃在清嘉坊北朱長丈所居中有髙岡清池喬松壽檜此地在錢氏為金谷園其父光祿卿始得之長文營以為圃併自作記鄉人尚其名德知州章岵表為樂圃坊有邃經堂華嚴菴招隱橋見山岡琴臺鶴室墨池筆溪及西圃草堂共二十景方子通元厚之程公闢盧仲辛俱有詩元末張適號甘白築室於上題曰樂圃林館與髙季迪倪元鎮陳麟謝恭姚廣孝賡和為十詠宣德間杜瓊得其東隅地名為東原結草為亭曰延緑又有木瓜林芍藥階梨花埭紅槿籓馬蘭波桃李溪八仙架三友軒古藤格芹澗橋凡十景一時名流俱有詩樂圃記大丈夫用於世則堯吾君虞吾民其膏澤流乎天下及乎後裔與䕫契並其名與周召偶其功茍不用於世則或漁或築或農或圃勞乃形逸乃心友沮溺肩綺季追嚴鄭躡陶白窮通雖殊其樂一也故不以軒冕肆其欲不以山林喪其節孔子曰樂天知命故不憂又稱顔子在陋巷不改其樂可謂至德也已豫嘗以樂名圃其謂是乎始錢氏時廣陵王元璙者實守姑蘇好治林圃其諸徇其所好各因隙地而營之為臺為沼今城中遺趾頗有存者吾圃亦其一也錢氏去國圃為民居更數姓矣慶厯中豫家祖母吳夫人始購得之先大父與叔父或游焉或學焉每良辰美景則奉板輿以觀於此厥後稍廣西壖以益其地凡廣輪逾三十畝豫嘗請營之以為先大父歸老之地熙寧之末新築外垣盡覆之瓦方將結宇而親年不待既孤而歸於是遂卜居焉月葺歲增今更數載雖敞屋無華荒庭不甃而景趣質野若在巖谷此可尚也圃中有堂三楹堂旁有廡所以宅親黨也堂之南又為堂三楹命之曰邃經所以講論六藝也邃經之東又有米廩所以容歲儲也有鶴室所以畜鶴也有䝉齊所以教童䝉也邃經之西北隅有岡命之曰見山岡上有琴臺西隅有詠齊此豫嘗拊琴賦詩於此所以名云見山岡下有池水入於坤維跨流為門水由門縈紆曲引至於岡側東為溪薄于巽隅池中有亭曰墨池豫嘗集百氏妙迹於此而展玩也池岸有亭曰筆溪其清可以濯筆溪旁有釣渚其靜可以垂綸也釣渚與邃經堂相直焉有三橋度溪而南出者謂之招隱絶池至於墨池亭者謂之幽興循岡北走度水至於西圃者謂之西澗西圃有草堂草堂之後有華嚴菴草堂西南有土而髙者謂之西丘其木則松檜梧柏黃楊冬青椅桐柳柳之類柯葉相蟠與風飄揚髙或參雲大或合抱或直如繩或曲如鈎或蔓如附或偃如傲或參如鼎足或并如叉股或圓如蓋或深如幄或如蛻虬卧或如驚蛇走名不可以盡記形不可以殫書也雖雪霜之所摧壓飈霆之所擊撼槎牙摧折而氣象未衰其花卉則春繁秋孤冬曄夏蒨珍藤幽花髙下相映蘭菊猗猗兼葭蒼蒼碧蘚覆岸慈筠列砌藥録所收雅記所名得之不為不多桑柘可蠶麻紵可緝時果分蹊嘉蔬滿畦摽梅沈李剝瓜斷瓠以娛賔友以約親屬此其所有也豫於此圃朝則誦犧文之易孔氏之春秋索書之精微明禮樂之度數夕則泛覽羣史厯觀百氏考古人是非正前史得失當其暇也曳杖逍遙陟髙臨深飛翰不驚皓鶴前引揭厲於淺流躊躇於平臯種木灌園寒耕暑耘雖三事之位萬鍾之祿不足以易吾樂也然豫觀羣動無一物非空者安用拘於此以自贅耶異日子春之疾瘳向平之纍遣將扁舟桴海浮遊山嶽莫知其所終極雖然此圃者吾先光祿之所遺吾致力於此者久矣豈能忘情哉凡吾衆弟若子若孫尚克守之母頺爾居毋伐爾林學於斯是亦足以為樂矣豫豈能獨樂哉昔戴顒寓居魯望歸隱遺迹迄今猶存千載之後吳人猶嘗指此相告曰此朱氏之故圃也元豐三年十二月朔吳郡朱伯原記元絳詩白頭重到故人家境是人非起歎嗟三徑未荒陶令菊四時長放庾郎花林風光動藏鶯葉溪浪痕生宿鷺沙肯構有材移病久會憑詩酒傲煙霞程師孟次韻少年為學已名家才折卅枝病可嗟節帶氷霜凌萬竹文含風露麗千花世憐美玉猶存璞人恨良金未出沙賴有隱居如谷口直將髙意抗青霞君家幽寂似山家聞者其誰不見嗟閉户幾多閒日月掃園無限舊煙花書窗燕坐琴橫石吟徑徐行杖卓沙壁有謝公題好句國人方此識餘霞碧瓦春城十萬家可憐夫子獨堪嗟林園猶有前朝木冠蓋難尋故主花亭瞰夕陽鄰古剎池通野外見晴沙天然操尚無塵滓合住蓬萊弄彩霞盧革姑蘇右浙會園榭森相望之子脫名瑣自放無何鄉虛堂布遺經周孔之文章靜齊播風雅絃音日洋洋吮毫濯曲溪泚墨散方塘抱琴獨登臺望山閒涉岡釣渚閲游泳竹路排青蒼亭幽小勺逈紅白相低昻豫此謝病歸旅吳歲月長常聞君園勝欲往兩足僵開緘味題詠恍若披圖詳吾聞玉川子破屋洛之陽東野廢官守止坐叢瀨傍豈如吾子樂游息藹有方朝廷日清明百度良施張子既難其進論撰亦有光退之謂子厚窮久道益强文辭燁垂後將相未可當窮愁乃著書心志能渾剛儻來奚足恤令名期自將張適何處是吾廬城西數畝餘坊存前哲號屋貯古人書已疾親栽藥供飱自灌蔬長年因謝俗戶外少來車林密簾櫳暝門清樹石連合香來雨霽壓酒及花前嗜古思先輩傷今話昔年何由清鬱抱春茗瀹林泉髙啓林塢通幽閴山明雲出溪門無俗客至池有水禽啼對酌山花下行吟野竹西石床春寂寂苔色映青藜開軒時野眺山色翠迢遙屏結霜中檜圖開雪裏蕉暖烟初扇圃野水欲平橋曳杖間來往時挑酒一瓢幽居無灑掃風景自翛然紅濕花間雨青分柳外烟山窗捫虱坐石榻枕書眠自得閒中趣栽花疊錦川陳林和桃花夾林館宛似武陵溪醉後拋書枕夢回聞鳥啼水光孤墅外山色小橋西盡日無來客徐吟信杖藜見說林居好終朝無雜賓捲簾通紫燕投餌釣金鱗竹影雲連榻楊花雪㸃巾開池養鵝鴨不使惱比鄰謝恭故人非傲吏舊隱勝愚溪塵世人難到空林鳥自啼青山懸榻下緑樹斷崖西終日無餘事全家盡目黎門徑稀人跡幽居只自然泉聲三月雨柳色半春烟水檻看鷗浴山窗見鹿眠題詩花墅夕明月滿晴川宿樂圃林館倪瓉莫投齊館靜城郭似幽林落月半床影涼風孤鶴音汀雲縈逺夢桐露濕清琴喧卑靜塵慮蕭爽集沖襟過張水部樂圃林館髙啓清和池館閉間苔輕幰尋幽觸雨來井桁水聲繩乍轉牀屏山色畫初開穿花百舌深緘口吹絮雙鱗半露腮好賦一詩題壁去主人未肯便塵埃北園在漳潭陳氏園也石湖范成大書扁東浦黃簡為記五柳園在塗松鎮隱士胡嶧逰憩之所今廢玩芳亭國子學録吳仁傑斗南所築有記陸遊楊萬里有詩又風月亭顔傃作聞在崑山峿山亭趙酬大猷所築在馬鞍山陽吳斗南取元次山溪以浯名旌吾獨有之語為名定軒在震澤鎮宋工部侍郎楊紹雲所居有桃源洞廣數畝異石林立劉文簡公真文忠公皆有著述遺址猶存定軒記震澤楊公以定名軒豫謂定一也而有老氏浮屠氏之定未知公之志果奚所屬也自儒者言之則大學自定而靜靜而安安而慮慮而得其寂然不動者正所謂感通之體也自二氏言之則其所謂泰定所謂禪定者兀然枯槁而已爾漠然清虛而已爾人之一心與造化作大者以其往來闔闢之不窮動靜出入之俱妙也今以兀然漠然者為定則是無用之體不感之寂也其可乎公以敏達果鋭之材而為明天子所任屬蓋嘗屏上遊護天塹開大幕府制置長淮而又法從近臣而總六師之賦其志存乎立功其誼顓乎報主固非棲心無用者比也則其所屬必儒者而非二氏奚疑雖然定之難能也久矣自窮居獨善之士捐百事息萬慮以求之有終其身而弗獲者況於履功名之塗踐富貴之境凡為吾耳目之塍心志之域紛至錯立於前菀枯榮醜可喜可駭者日百千變其亟疾若破山之霆其震蕩若發屋之風其眩亂反覆乂若一葉之艇而舞翻空之濤甚矣哉定之難能也若是者其疾焉在曰心無主而已矣竊嘗聞之敬則心有主而物聽命不敬則物為主而我從之古之君子對妻子猶君師之臨處幽室甚十目之睹所以養吾心而為萬物之主也心有主然後有定見有定見然後有定力酬酢萬變無不可者是則儒者之定而公之所志也夫理有定而事無方隨事以應之使各通其可即所謂定也若乃處義未精而猥曰吾守之不可易是直私意之錮爾烏足語定乎哉故主敬窮理交相為用東魯西洛之正傳有不可誣者公之大父紫微公受學於伊川之門人為先朝侍從公之所學自其家世且方攖繁劇而不亂遭變故而不懾其於定之一言用力深矣顧何足以發公之志姑誦所聞以復命云權工部尚書兼太子右庶子兼左諭德建陽劉爚記樂菴在崑山圓明村宋侍御史李衡彥平歸老之地四旁皆修竹經籍圖史滿堂樂菴初成彥平自為詩二絶老子平生百不足菴成那管食無肉終朝閉戶只讀書四面開窗都見竹投老庵居百事宜早眠晏起不論時更長睡足披衣坐傾耳林間聽畫眉盤野黃由之别墅寧宗賜名內有墨莊胡夫人真蹟三清閣共樂堂等扁由自作詩共樂堂才到松陵即是家滿堂佳客滿園花看花揖客須清賞休向人間俗子誇聨德堂才到松陵即是家便須洗盞泛流霞軟紅塵裡風波惡不似江頭與海槎茆堂觀奕才到松陵即是家茆堂萬竹緑交加午窗睡起無他想坐看圍棋到日斜登明月臺才到松陵即是家擎空皎月瑩無瑕直須臺上分明看擬欲呼仙泛海槎登雍書樓有感才到松陵即是家樓髙不管緑楊遮有書萬卷時翻弄千古興亡幾歎嗟道院獨步才到松陵即是家參天檜柏古槎牙杖藜終日頻來往不羡堤邊路築沙登三清閣才到松陵即是家三清閣下寂無譁小臣愧乏絲毫報深炷爐香淨㸃茶入園才到松陵即是家故園喜聽鵲喳喳主人只為貪風月蠻觸交爭笑爾蝸睦鄰才到松陵即是家民間何處不桑麻欣欣老稚迎門笑斗酒相歡亦孔嘉無題才到松陵即是家休論恬淡與榮華古來顔路俱塵土自有時賢定等差思親才到松陵即是家仙翁詩句發天葩鈍才不及賡餘韻留取時時罩碧紗松竹林在崑山縣治南宋知縣項公澤所居談氏園在嘉定月浦上花卉竒絶亭館華麗今廢鄭氏園在馬鞍山前鄭竦所築葉丞相扁為玉峯佳處西偏有道院植牡丹數百本又作止足堂亦葉丞相書南園崑山瞿惠夫所居楊廉夫為記翁氏園在崑山縣治西吳斗南有賞木芙蓉詩松石軒在吳城中參政宋廷珍之第軒前古松蛟騰怪石鵠峙鄱陽周伯琦扁曰松石有詩詠之鄭元祐松石軒記昔夏后氏畫九州而青州有鉛松怪石之貢當是時未必有耳目玩好也儒先不能無疑於此焉以愚觀之玩好於時未必然然韶樂以球為主故后䕫言樂獨於石則曰豫擊石拊石然後言百獸率舞鳳凰來儀蓋石音難和故磬必泗濱之浮今以靈壁所産石用以為磬然非秀絶者不能有聲音之純故商頌曰既和且平依我磬聲然則怪石之貢蓋必異於尋常也已降自唐宋始以石為玩好然後石之品益繁宋宣和間於物無不品定顧以太湖石品最髙唐李贊皇牛竒章二人相業雖不同其於愛石則一也中吳在宋為畿甸至今荒園廢宅一燬於劫灰者在在有之若夫松之為貢棟梁榱桷無不可者至乃蟠紐詰屈懸根獻秀始以松為園池亭沼之觀玩今大參澄江宋公出總戎機入贊朝政私第在吳城之正中沈深宏敞其客次有松有石左轄鄱陽周公扁之曰松石軒仍為之作大篆以表章之矣大參公擬之於松則清廟棟梁也擬之於石則韶樂天球也賓至而燕集於兹語笑於兹挹松之堅貞攬石之秀潤其所以為國幹播民和者夫豈尋常松石之謂哉伯琦詩華清貢秀萃雙清石友松君宿締盟鱗甲髙鶱風雨合洞巖虛激珮環聲平泉官暇延逰盼緑野功成寄賞情誰為澄江修郡乘好將勝迹播芳名蔣堂一桁湘簾細織紋華軒窗氣襲書裙老枝月冷蛟龍骨蹲璞苔封虎豹文隱迹雅同真處士彎弓懸憶舊將軍由來柱石居廊廟況爾雲霄素䇿勳董晉愛此軒窗隔市㕓疏松偃蹇石嶄然廋蛟匝地弄明月蒼翠拂闌生紫烟大厦棟梁真可擬中流砥柱若為遷何人下拜清風裏不是韋郎是米顛成廷圭長松落落風塵表蒼石堂堂太古心屹立乾坤無改色叩之金玉有餘音人間兒女天機淺海上神仙野趣深獨有竒章知此意子孫清賞到於今饒介蒼松鬱鬱石嵯峨上下因依有女蘿虎魄凝流千歲少羊羣分跪一拳多所須為地期相向遂以名軒示不磨賔客定如東閣盛或來醉卧或吟哦光渌亭在虞山南五里許邑人張柟所建亭前大杏一本花特茂異又名杏花亭柟嘗為三衢守花時騷人墨客逰賞題詠甚多今廢矣水花園在同里鎮元人葉振宗所居廣數里有聚書樓約鷗亭小垂虹池閣石梁映帶左右名水花園今廢為魚叢緑水園在孫老橋東故為朱勔别墅元至正中廬山陳惟寅惟允兄弟購得之取杜詩名園依緑水之句更此名園中有來鴻軒清泠閣蘿徑等名髙啓為之序髙啓緑水園雜詠序吳城南陬有曰朱家園者父老言宋朱勔故墅也廬山陳惟寅氏得之更名曰緑水以園中有池且用杜子美詩語也其林沼亭軒亦各有扁焉近雖破廢然寬閒幽勝猶可以釣遊而嘯歌惟寅以余往來其中最熟求遍詠之噫當勔以幸貴時窮尚豪侈園中之珍木異石崇臺嶢榭固當百倍於此文人詞客為之稱美而誇詠者亦多矣今皆跡滅響沈無復可覩惟寅雖窮居隱約而能以詩書其業篤於孝友其清德雅操固可以蔑視勔矣則余為之執筆亦可以無愧焉因不復辭且庶幾或傳使父老知園之更名緑水者自惟寅始也詩凡十六篇張羽緑水園燕集芳圃逼江城回波繞舍清主人擅文學過客總簮纓適向吳中㑹何殊洛下英唐虞共敷講風雅用和賡矍鑠攻辭健鏗鏘得句精建安方合體大厯却徒名還展花前席仍敲竹下枰吟餘歌杕杜醉裡聽鶬鶊徑竹斑初脫庭蕉緑已呈渾忘在離亂惟欲盻承平蝸窟休圖隱雞壇可負盟從容四美具感激二難并更願相加勉留傳汗簡聲萬玉清秋軒在吳江同里鎮元江南財賦司副使里人寧昌言之别墅中有菊坡梧桐修竹總謂之萬玉清秋華亭繪士張可觀為之圖郭登詩王謝堂前久不歸野田荒樹幾斜暉花開花落秋還在年去年來事已非楊柳風多凋翠縷芙蓉霜重濕紅衣故人空感山陽笛一段傷心畫所微楊溥社燕賔鴻共歲華松陵禾黍故侯家誰令千載柴桑裏一度秋風一度花劉鉉寧公在昔稱時賢頭顱半白來歸田老懷淡泊慕幽雅髙居别築臨同川數畝園林占清勝四時景物誇奇妍賔從日盈北海座琴樽晚載南湖船一朝陵谷那知變廢盡東吳舊庭院扶疏修竹為誰清零落芙蓉不成片白雲飛去不復來只有堂前舊時燕春深幾樹花亂開無復當窗映人面繁華事往今已休東床老去懷舊逰歌舞重尋館甥處蕭索碧梧風雨秋陶令宅邊松尚在習家池上水空流追思自足興感慨何獨對此方為愁六十年來駒過隙俯仰之間已陳迹畫圖寂寞久無聞流落人間匪朝夕客從何處逺持來佳致依然不殊昔夢回昨夜到松陵鐘斷長橋月初白團溪魚樂在沙頭鎮月蕉瞿逢祥隱居楊廉夫為記至正八年二月月蕉瞿先生逢祥肥遁海東之團溪雲葉展空煙花膩陌豫嘗循鳳溪而下步自團溪之陽顧瞻周遭若環帶然地固卑而隘中有隱君子之風焉先生居是溪厯宋咸淳僅百五十年豫觀東南若震澤諸水道經戚浦㑹歸於海風濤激蕩沙岸日崩走濵浦之人恆懼之而先生則弗懼且樂焉者溪之左枕市㕓障戚水以便商者右遡畎畝引戚水以利耕者乃若細雨侵沙波流若縠魚鳥浮沈天光上下先生則投竿而漁涼月浸軒秋聲在樹子鶴和鳴人影相逐先生則援琴而歌於乎溪之樂人或見之而不知之先生獨能知而樂之可謂得性情之正矣周氏園在雙鳳里人周棠所闢廣二十餘畝嘉樹美竹映帶亭館今其諸孫有登科者南村在綺川元末隱士張璹所居有素心堂陶菴苕翠館雪佾亭耕穫亭秦約作在太倉西渚之北小丹丘天台陳基敬初所居敬初仕僞周為內史得小圃於天心里以天台為丹邱因以名之金華戴良記夏家園在崑山太常卿夏昶致仕遊樂之地小洞庭劉僉憲廷美自山西致政歸即齊門外舊宅纍石為山號小洞庭有十景曰撚髭亭藕花洲等名天全徐武功伯為之序思菴郊居在常熟郭門外都憲吳公所創周文襄公巡撫時有詩東莊吳文定公父孟融所治也中有十景孟融之孫奕又增建看雲臨渚二亭侍講李東陽記蘇之地多水葑門之內吳翁之東莊在焉菱濠匯其東西溪帶其西兩港旁達皆可舟而至也由凳橋而入則為稻畦折而南為桑園又西為果園又南為菜圃又東為振衣臺又南西為折桂橋由艇子濱而入則為麥丘由荷花灣而入則為竹田區分絡貫其廣六十畝而作堂其中曰續古之堂菴曰拙修之菴軒曰耕息之軒又作亭於南池曰知樂之亭亭成而莊之事始備總名之曰東莊因自號曰東莊翁莊之為吳氏居數世矣由元季逮於國初鄰之死徙者十八九而吳廬巋然獨存翁少喪其先君子徙而西既而重念先業不敢廢歲拓時葺謹其封濬課其耕藝而時作息焉翁仲子原博以狀元及第入翰林為修撰獲以其官封翁朝士與修撰君遊者聞翁賢多為東莊之詩詩成而莊之名益著修撰君以謂豫曰幸吾子之識之也夫人之業未有不勤成而侈廢者翁之為東莊也承往弊而修之懇悃劬瘁厯數十年然後備亦既艱矣而翁又遵道畏法雖處富貴泊然與韋布者類則所謂保其業者豈茍然哉易曰幹父之蠱有子考旡咎厲終吉由是觀之翁之業雖百世可知也吾又聞翁積而能散衣寒食餓汲汲若不暇則是莊也寧直以自樂為燕游而已今修撰君科甲重朝廷文章望天下愛民憂國恆存乎心而見乎眉睫則推翁之心以達之天下又豈直足保其私業為兹莊山水之重而已邪然君子論家業之艱考世德之有歸信文獻之不可無者必自兹莊始作東莊記成化己未秋七月既望翰林院侍講李東陽書劉大夏詩吳下園林賽洛陽百年今獨見東莊回溪不隔柴門逈流水應通世澤長十里香風來桂塢滿簾凉月浸菱塘天公自與莊翁厚又把栽培付令郎李士實小莊隨意作經營園漫分蔬地漫耕流水聲中看杖倚人家叢裏有舟行市㕓咫尺疑無路林壑分明不出城昨日玉堂新賜詔乾坤誰信問逃名沈周東莊水木有清輝地靜人閒與世違瓜圃熟時供路竭稻畦收後問鄰饑城頭日出啼鴉散堂上春深乳燕飛更羡賢郎今玉署恩封早晚著朝衣吳寬聞奕姪搆二亭於東莊以為豫佚老喜而冇作爾父西菴扁拙修當年種樹帶平疇近聞肯搆為豫計專待歸休與客游山上看雲依鶴峒池邊臨渚對桑洲只憂筋力非輕健更欲沿洄具小舟沈周次韻特意作亭知好修石基髙築樹為疇欲承伯氏歸休樂未許他人造次游細路矮橋緣麥隴長濠新水漫蘋洲宰公果遂南還興我亦濱頭艤小舟姑蘇志卷三十二
