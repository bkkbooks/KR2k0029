body:
  text: 姑蘇志卷四十九明王鏊撰人物七名臣鄭戩字天休吳縣人祖延紹大理評事蘇州録事參軍父文遂字百昌溫州推官善筆札能音律愛客重義赴人急難卒贈屯田員外郎戩少孤既長客京都師事楊億以屬辭知名後復還吳億卒賔客弟子散去戩乃倍道會葬舉進士甲科尤工詩與葉清臣相埓時以比元白授太常寺奉禮郎簽書寧國軍節度判官事李迪薦其材召試學士院為光祿寺丞集賢校理通判越州還改太子中允同知太常禮院升直史館三司户部判官同修起居注以右正言知制誥訓詞深雅有常楊風判國子監徙知審刑院遷起居舍人龍圖閣直學士權知開封府吏馮士元為姦利有告其受賕藏禁書者戩窮治之辭連吕夷簡盛度程琳遂逮捕夷簡子公綽公弼參劾其狀流士元海島琳坐嘗交關士元罷去其餘黜罰者孔道輔龎籍又十餘人朝議畏其皎核戩敏強善聽決喜出不意獨假貸細民即豪宗大姓繩治益急政有能迹徙權三司使復轉運使考課格分别殿最又句較三司出入得羡錢四百萬緡以右諫議大夫同知樞密院改樞密副使為吕夷簡所忌罷以資政殿學士知杭州錢唐湖溉田數千頃錢氏嘗置撩清軍以疏淤填既納國後不復治葑土堙塞勢族僧房占冒湖益狹戩發丁夫數萬闢之民賴其利事聞詔本郡歲治如戩法遷給事中徙並州道改鄆州又徙永興軍建言凡軍行所須下有司相緩急析為三等非急罷去先是衙吏輸木京師浮渭泛河多漂沒既至則斥不中程往往破家不能償戩奏歲減二十餘萬又奏罷括糴以勸民積粟長安故都多豪惡戩治之尚嚴甚者至黥竄人皆惕息未幾代范仲淹為陜西四路都總管兼經略安撫招討使駐涇州聽便宜從事元昊謂其下曰我已遣使稱臣朝廷何為復用此公護諸將其畏憚如此遷尚書禮部侍郎時知慶州滕宗諒知渭州張亢過用公使錢戩致于法行邊至鎮戎軍趣蓮花堡天寒與將佐置酒元昊擁兵近塞會莫塵起有報寇至戩曰此必三川將按邊回非敵騎也已而果然及疆事少寧詔還知永興軍番酋部將遮道卧轍不得行時長安久旱戩下車而雨衆謂涇川雨隨鄭公來初靜邊寨主劉滬謀築永洛經公二城以通秦渭援兵招生羌大王族為邊衛戩使滬及董士亷督其役會罷戩四路安撫使韓琦知渭州尹洙皆以為不便召滬士亷罷役歸不聽乃使禆將狄青帥兵以往械從順德軍獄戩力爭於朝卒城之進户部侍郎資政殿大學士知並州契丹與元昊交兵邊奏互上獨戩不以聞詔遣使問其故戩對曰兩國相攻中國不足憂也鄜府間有棄地曰草城川戩募土人為弓箭手計口給田初兵興用不足河東行錢山多炭鐵鼓鑄利厚重刑不能止戩乃使三當一令既下兵民相扇動數千人邀走馬承受訴承受中貴人不能遏又羣譟州門戩悉召至推首謀者數十人黥𨽻他州事乃定遷吏部侍郎改宣徽北院使拜奉國軍節度使卒于官上震悼遣中貴人給舸護柩還吳敕所過治道本州給葬事贈太尉諡文肅戩遇事果敢必行然憑氣近俠用刑深峻士民多怨之弟戭戡戭刑部侍郎戡進士康定中太子中舍知無錫縣戩孫時時字是翁少苦學登進士改秩知當塗縣律身清謹政尚寬厚先教化而後敲攴民皆得其歡心告滿通判建康府留守鼂謙之待以長者所贊二言無不從以疾奉祠歸官至朝奉大夫時性嗜書老而益勤自左氏史漢三國南北至諸名家文集手事編録以及稗官詞説靡不遍覽邦人推重從遊甚衆所指授輒為名人李育字仲蒙吳縣人舉進士第四能為詩字畫亦清麗性髙簡故官不甚顯亦少知之者盧革字仲辛德清人少舉童子知杭州馬亮見其詩嗟異之秋貢士密戒主司勿遺革聞語人曰以私得薦吾恥之去弗就後二年遂首選至登第年才十六慶厯中知龔州蠻入寇桂管騷動革經畫軍須先事而集移書安撫使杜杞請治諸郡城及易長吏之不才者又言嶺外小郡合四五不當中州一大縣無城池甲兵之備將為賊困宜度逺近並省之後儂智髙來九郡相繼不守皆如革慮知婺泉二州提點廣東刑獄福建湖南轉運使復請外神宗謂宰相曰革亷退如是宜與嘉郡遂知宣州纍進太子賔客以光祿卿致仕用子秉恩轉通議大夫退居於吳子孫遂為吳人十五年秉為發運使得請歲一歸覲後帥渭州乞解官終養帝數詔慰勉時以為榮卒年八十二贈少師秉字仲甫未冠有俊譽嘗謁蔣堂坐池亭堂曰亭沼粗適恨林木未就爾秉曰亭沼如爵位時來或有之林木非培植根株弗大成似士大夫立名節也堂嘗味其言曰吾子必為佳器中進士甲科調吉州推官青州掌書記知開封府倉曹參軍浮湛州縣二十年人無知者王安石得其壁間詩識其靜退方置條例司預選中奉使淮浙治鹽法與薛向究索利病出本錢鬻鹽濵海之民戒不得私鬻還奏遂為定制檢正吏房公事提點兩浙淮東刑獄專提舉鹽事持法苛嚴追胥連保罪及妻孥一歲中犯者以千萬數進制置發運副使東南飢詔損上供米價以糶秉言價雖賤貧者終艱得錢請但償糴本而以其餘販贍是歲上計神宗問曰聞滁和民捕蝗充食有諸對曰有之民飢甚死者相枕籍帝惻然曰前此特趙抃為朕言之爾先是發運使多獻餘羡以希恩寵秉言職在董督六路財賦以時上之安得羡今稱羡者率正數也請罷獻獨以七十萬緡償三司逋加集賢殿修撰知渭州五路大出西討唯涇原有功進寶文閣待制夏境胡盧川距塞二百里恃險逺不設備秉遣將姚麟彭孫襲擊之俘斬萬計遷龍圖閣直學士夏酋仁多嵬丁舉國入寇犯熙河定西城秉治兵瓦亭分兩將駐靜邊寨指夏人來路曰吾遲明坐待捷報矣及明果至見宋師驚曰天降也縱擊之皆奔潰或言嵬丁巳死有識其衣服者將請以聞秉曰幕府上功患不實吾敢以疑似成欺乎他日物色之嵬丁果死裒賜服馬金幣秉守邊久表父革年老乞歸移知湖州行三驛復詔還渭慰藉優渥革聞亦以義止其請已而革疾亟乃得歸元祐中知荆南劉安世論其行鹽法虐民降待制提舉洞霄宫卒贈少師有文集十卷奏議三十卷子知原知原字行之以父任知歙縣因近臣薦赴都堂審察纍遷梓州路轉運副使時承平既久戎備皆弛知原招補兵籍築城亘二十餘里王黼當國費出無藝知原因疏言之黼怒罷去久之起提點京東刑獄改江西轉運副使過闕入奏徽宗勉之曰卿在蜀道功效甚休遂賜三品服先是綱運阻於重江吏卒並緣為姦知原悉意經理故先諸道上京師進一官尋除直祕閣為江淮荆浙等路發運使升祕閣修撰提舉河北以言者劾落職歸吏部髙宗即位復龍圖閣知溫州時葉濃陷建州楊勍陷處州知原繕甲兵增城浚湟聲勢隱然帝東幸知原繇海道轉粟及金繒十餘萬至台州召見稱奬擢右文殿修撰管內安撫使在郡四年民繪像祠之王師討范汝為召為添差兩浙轉運使罷提舉太平觀都督孟庾辟為參謀改徽猷閣待制知臨安府諫官唐輝言知原為政乖謬詔復為都督府參謀官章再上遂以舊職奉祠紹興十一年卒弟法原法原字立之自知雍丘縣積官太府少卿賜同上舍出身使遼還遷司農卿賜三品服為吏部尚書以官秩次第履歷總為一書功過殿最開卷瞭然吏不能欺坐王黼纍罷為顯謨閣待制紹興元年提舉臨安洞霄宫張浚承制起知夔州二年改龍圖閣學士川陜等路宣撫處置副使四年進端明殿學士川陜宣撫副使金人攻關輔叛將史斌陷興州諸郡多應者法原命將堅壁言戰者斬衆以為怯未幾河東經制使王燮以乏食班師法原開關納之與燮同破斌復興州方巨盜充斥秦隴叛兵欲窺蜀法原極意拊循嚴為備禦傳檄諸路人心稍安視山川險阻分地置將前後屢捷上所倚重會烏珠攻關為吳玠所敗法原與玠素不睦玠因奏功訟法原不濟師不餽糧不銓一立功將士帝手詔詰問法原宣撫川陜上從容謂知原曰朕方以川陜付法原蓋兄弟皆以材見稱故並用之五年春沒於王事詔歸葬平江葉清臣字道卿本烏程人父參字少列咸平中進士兵刑二部郎中知蘇越湖三州終光祿卿謝事居吳遂為長洲人清臣幼敏異好學善屬文舉進士知舉劉筠竒其策擢第二宋進士以策擢髙等自清臣始授太常寺奉禮郎僉書蘇州觀察判官事還為光祿寺丞集賢校理通判太平州知秀州入判三司户部句院改鹽鐵判官上言請遣使循行天下知民疾苦察吏能興太學選置博士許公卿大臣子弟補學生重縣令諸科舉人取明大義責以策問省流外官無得入仕聽武臣終三年喪罷度僧廢讀經一業訓兵練將慎出令簡條約文多不載出知宣州纍遷太常丞同修起居注判三司鹽鐵句院進直史館京師地震上疏極言時闕失范仲淹余靖以言事被黜天下之人齰舌不敢議朝政者將二年願深自咎責許忠直敢言之士庶幾明威降鑒數日仲淹等皆遷徙會詔求直言清臣復上疏言大臣專政仁宗嘉納之寶元初清臣請外為兩浙轉運副使並太湖有民田豪右據上遊水不得泄民莫敢訴遂請疏盤龍滙滬瀆入于海人賴其利康定初以右正言知制誥知審官院判國子監時陜西用兵趙元昊圍延州既解去鈐轄內侍盧守勤與通判計用章訟于朝朝議薄守勤罪流用章嶺南清臣悉疏其事而守勤降湖北兵馬都監時西師急於經費擢為起居舍人龍圖閣學士權三司使公事始編前後詔敕刪去簿帳冗長者而謹其出納焉清臣與宋庠鄭戩善為吕夷簡所惡慶厯初出知江寧府入為翰林學士知通進銀臺司句當三班院丁父憂服除以翰林侍讀學士知邠州道繇京師因請對改澶州進户部郎中知青州徙知永興軍浚三白渠溉田踰六千頃上御天章閣召公卿出手詔問當世急務清臣條對極論時政闕失言多劘切權貴會河決商湖北道艱食復以為翰林學士權三司使皇祐元年上御便殿訪近臣以備邊擇將之略清臣上對今輔翊之臣抱忠義之深者莫如富弼為社稷之固者莫如范仲淹諳古今政事者莫如夏竦議論之敏者莫如鄭戩方面之才嚴重有紀律者莫如韓琦臨大事能斷者莫如田况剛果無顧避者莫如劉渙宏達有方略者莫如孫沔至於帥領偏裨貴能坐運籌策不必親當矢石者王德用素有威名范仲淹素練軍政龎籍久經邊任皆其選也狄青頗能馭衆蔣偕沈毅有術略張亢倜儻有膽勇劉貽孫材武剛斷王德基純慤徑男此可補偏裨者也時清臣以河北乏兵食自汴漕米繇河隂輸北道者七十餘萬又請發大名庫錢以佐邊糴而安撫使賈昌朝格詔不從清臣固爭疏其跋扈乃徙昌朝鄭州清臣為侍讀學士知河陽卒贈左諫議大夫清臣天資爽邁遇事敢行數上書論天下事陳九議十要五利皆當世可行者有文集一百六十卷子均字公秉尚書司封員外郎知洪州又以集賢校理再任熙寧中知蘇州清臣從曾孫夢得夢得字少藴嗜學早成多識前言往行談論娓娓不窮登進士第調丹徒尉徽宗朝自婺州教授召為議禮武選編修官用蔡京薦召對言自古帝王為治廣狹大小規模各不同然必自先治其心者始今國勢有安危法度有利害人材有邪正民情有休戚四者治之大者也若不先治其心或誘之以貨利或陷之以聲色則所謂安危利害邪正休戚者未嘗不顛倒易位而况求其功乎上異其言特遷祠部郎官大觀初蔡京在相位向所立法度已罷者復行夢得言周官太宰以八柄詔王馭羣臣所謂廢置賞罰者王之事也大宰得以詔王而不得自專夫事不過可不可二者而已以為可而出於陛下則前日不應廢以為不可而不出於陛下則今日不可復若徒以大臣進退為可否無乃陛下有未了然於中者乎上喜曰邇來士多朋比媒進卿言獨無觀望遂除起居郎時用事者喜小有才夢得言自古用人必先辨賢能賢謂有德能謂有才故先王嘗使德勝才不使才勝德崇寧以來在內惟取議論與朝廷同者為純正在外惟取推行法令速成者為幹敏未聞器業堪重識度經逺者特有表異恐用才太勝願繼今用人以有德為先二年纍遷翰林學士極論士大夫朋黨之弊專於重內輕外具乞身先衆人補郡蔡京初欲以章貫宣撫陜西取青唐夢得見京問曰祖宗時宣撫使皆是見任執政文彥博韓絳因此即軍中拜相未有以中人為之元豐末神宗欲命李憲雖王圭亦能力爭此公所見也昨八寶恩遽除貫節度使天下皆知非祖宗法此已不可救今又付以執政之任使得青唐何以處之京有慚色然卒不改三年以龍圖閣直學士知汝州尋落職提舉洞霄宫政和五年起知蔡州移帥頴昌府發常平粟振民常平使劉寄惡之宦官楊戩用事寄括部內得常平錢五十萬緡請糴粳米輸後苑以媚戩委其屬持御筆來責以米樣如蘇州夢得上疏極論頴昌地方與東南異願隨品色不報時旁郡糾民輸錢就糴京師怨聲載道獨頴昌賴夢得得免李彥括公田以黠吏告訐籍郟城舞陽隱田數千頃民詣府訴夢得上其事捕吏按治之郡人大悅戩彥交怒尋提舉南京鴻慶宫改帥杭州建炎初勝捷軍校陳通作亂拘夢得殺運判吳昉及副將白均等高宗駐蹕揚州遷翰林學士兼侍讀除户部尚書陳待敵之計有三曰形曰勢曰氣形以地理山川為本勢以城池芻粟器械為重氣以將帥士卒為急形固則可恃以守勢強則可資以立氣振則可作以用如是則敵皆在吾度內矣因請上南巡阻江為險以備不虞又請命重臣為宣總使一居泗上總兩淮及東方之師以待敵一居金陵總江浙之路以備退保疏入不報既而上駐蹕杭州遷尚書右丞奏監司州縣擅立軍期司掊斂民財者宜罷上諭以兵食二事最大當擇大臣分掌顔岐康允之皆嫉夢得又與朱勝非議論不協會州民有上書訟夢得過失者上以夢得深曉財賦乃除資政殿學士提舉中太一宫專提領户部財用充車駕巡幸頓遞使辭不拜歸湖州紹興初起為江東安撫大使兼知建康府兼壽春等六州宣撫使時建康荒殘兵不滿三千夢得奏移統制官韓世清軍屯建康崔增屯采石閻臯分守要害會王才降劉豫引兵入寇夢得遣使至張偉諭才降之以其衆分𨽻諸軍濠壽叛將寇宏陳卞雖陽受朝命隂與豫通夢得諭以禍福皆聽命及豫入宏卞擊敗之八年除江東安撫制置大使兼知建康府行宫留守又奏防江措畫八事曰申飭邊備分布地面把截要害約東舟船團結鄉社明審斥堠措置積聚責官吏死守又言建康太平池州緊要隘口江北可濟渡者共十九所願聚民兵把截要害命諸將度敵形併力進討金宗弼犯含山進逼歷陽張俊諸軍遷延未發夢得見俊請速出軍曰敵已過含山萬一金人得和州長江不可保矣俊趣諸軍進發聲勢大振金兵退屯昭關明年金復入侵遂至壽州夢得團結沿江民兵數萬分據江津遣子模將千人守馬家渡金兵不得渡而去初建康屯兵歲費錢八百萬緡米八十萬斛𣙜貨務所入不足以支至是禁旅與諸道兵咸集夢得兼總四路漕計以給饋餉軍用不乏故諸將得悉力以戰詔加觀文殿學士移知福州兼福建安撫使海寇朱明猖獗詔夢得挾御前將士便道之鎮或招或捕或誘之相戕遂平寇五十餘郡然頗與監司異議上章請老特遷一官提舉臨安洞霄宫尋拜崇信軍節度使致仕十八年卒于湖州贈檢校少保程師孟字公闢髙祖思吳越營田使徙家蘇州師孟起進士知吉水錢唐二縣皆有政聲通判桂州慶厯中詔近侍各舉所知栁植施昌言以師孟薦知南康軍楚遂二州提點夔路刑獄瀘戎數犯渝州邊使者治所逺在萬州有警率浹日乃至師孟奏徙於渝適凶歲以常平粟振民不足即矯發他儲不俟報吏懼白不可師孟曰本道至都五千里必俟報餓者盡死矣竟發之全活四十餘萬徙河東路岢嵐等郡無常平粟邊民飢或竄出境師孟請出祠部牒募民納粟置倉廩以儲之晉地多土山旁接川谷春夏大雨水濁如黃河俗云天河可溉灌師孟勸民出錢釃渠築隁淤良田萬八千頃裒其事為水利圖經頒之州縣召為三司度支判官居一歲知洪州歲積薪為江隄師孟始疊石易薪以紓民力浚章溝揭北閘以節水升降後無水患興利除害一方甚賴之英宗即位召判三司都磨勘司委以商度河北四𣙜場利害師孟請減物直償閣欠以來北賈接伴契丹使蕭惟輔曰白溝之地當兩屬今南朝植栁數里而以北人漁界河為罪豈理也哉師孟曰兩朝當守誓約涿郡有案牘可覆視君舍文書滕口説詎欲生事耶惟輔愧謝使還除利路轉運使改江西路盜發袁州州吏為耳目久不獲師孟械吏數輩送獄盜即成擒初江西茶禁既通賦民納茶租號白紐錢師孟奏令鬻茶者計斤輸稱頭錢代其數以除民患至熙寧中以師孟之請頒下諸路俄傳交址為寇加直昭文館知福州築子城建學舍禮賢才興教化罷鐵錢餼疾救荒蘇息以萬計治行最東南閩父老謂國朝守郡者謝泌以惠愛著蔡襄以威名顯兼之者程公而已移知廣州大修學校日引諸生講解負笈而來者甚衆諸蕃子弟皆願入學以右諫議大夫再任在廣六年威愛並行初州城為儂寇所毁即有警民駭竄方伯踵至皆言土疏惡不可築師孟作西城廣十二里及交址陷雍管聞廣守備固不敢東上遣中使撫問召判三班院又念前功以為給事中集賢修撰判都水監賀契丹生辰至涿州契丹命席迎者正南向涿州官西向宋使價東向師孟曰是卑我也不就列自日昃爭至暮從者失色師孟辭氣益厲叱儐者易之於是更與迎者東西向明日涿人餞于郊疾馳過不顧涿人移雄州以為言坐罷歸班改判將作監起知越州寬猛適中而事自治民愈愛戴之師孟喜遊山民為開道稽山門外號廣平路官制行換太中大夫尋以通議大夫知青州京東安撫使期年告老遷正議大夫致仕哲宗即位授光祿大夫卒年七十八師孟纍領劇鎮為政簡而嚴所至囹圄空虛道不拾遺罪非死者不以屬吏發隱擲伏如神得豪惡不逞跌宕者必痛懲艾之至勦絶乃已所部肅然洪福廣越為立生祠為人樂易純質喜為詩效白樂天而尤簡直至老不改吳語與王安石有場屋之舊晚相遇猶如布衣時既歸吳過蔣山安石為留數日謂之曰君尚欲仕乎曰猶可更作一郡安石大喜知其無隱情也朱長文論師孟為政以為韋丹治豫章孔戣帥嶺南常衮化七閩無以加也天下以為才卿吏師米芾亦云師孟以文學登科以政事躋顯以言語出疆以恬退告老足之所及功利蔚起所著詩集二十卷奏議十五卷徐祐字受天靜海人擢進士第為吏以清白稱官至左司員外郎以都官郎中致仕慶厯中屏居蘇州作山亭胥門外為登臨之地與葉參為九老會卒年七十五子仲謀典郡持節以職方郎中致仕崇大年字靜之慶厯進士厯知青田縣民病無以納和買大年悉令候冬熟州符督責追杖縣吏大年曰年凶民苦催督必破産雖杖胥史三五輩尚可寬一邑之民至冬民輸無不足者徙知浦城縣舊設兩棧民以事追去無輕重悉置棧中大年曰此以牛馬吾民悉命撤去以疾丐分司歸吳日與程師孟諸老觴詠燕遊號吳門十老大年志尚夷曠恬於勢利不求聞達辭卻薦辟浩然易退吳士自陳君子之奇以後大年繼有賢稱分司後十三年致仕又十四年卒年八十二朱長文與鄉人議諡謂黔婁辭國有餘富其諡曰康淵明隱約就間其諡靖節大年當有道之世秉難進之節韜章藴能不自表襮仕而知止貧而亡憂凜然有古髙士之風因諡康靖先生閭丘孝終字公顯嘗知黃州作栖霞樓為野中勝絶未幾挂冠歸與崇大年輩以耆德著稱鄉里蘇軾云蘇州有二丘不到虎丘即到閭丘其為名流推重如此錢象先字資元郡人進士髙第吕夷簡薦為國子監直講歷權大理少卿度支判官河北江東轉運使召兼天章閣侍講詳定一路敕成當進勳爵仁宗以其母老欲慰之獨賜紫章服進待制知審刑院加龍圖閣直學士出知蔡州象先長於經術侍邇英十餘年有所顧問必依經反復諷諭及當世之務帝留神文藝禮遇甚渥故事講讀官分日迭進象先已得蔡帝猶諭之曰大夫行有日矣宜講徹一編於是同列罷進者浹日徙知陳州復兼侍講知審刑院象先旁通法家説故屢為理官條令多所裁定嘗以為犯敕者重犯令者輕請違敕入令者甚衆又議告捕法以為罪有可去有可捕茍皆許捕則姦人將倚法以害善良因削去許捕百餘事其持心平恕類此復知許潁陳三州以吏部侍郎致仕熙寧九年卒年八十二蔣堂字希魯宜興人擢進士為楚州團練推官滿歲引對真宗善其所試判特授大理丞知臨川富人李甲為不法前令莫能制堂戒諭不悛白州以兵索其家得僭乘輿物置于死歷通判眉許吉楚四州以太常博士知泗州召為監察御史論禁中火宜責躬修德不必歸咎宫人及論奏郭后不當廢坐贖再遷侍御史判三司度支勾院出為江南東路轉運使徙江淮發運事時廢發運使上封者屢以為非便堂言唐裴耀卿劉晏第五琦李巽裴休皆嘗為江淮河南轉運使不聞别置使名國朝王嗣宗劉師道亦止為轉運兼領發運司事而歲輸京師常足時雖用其議後卒復在江淮歲薦部吏二百人或謂曰一有謬舉且得罪何以多為堂曰十得二三亦足報國坐失按蘄州王蒙正故入部吏死罪降知越州州之鑑湖漢馬臻所為溉田八千頃食利者萬家前守建言聽民自占多為豪右所侵堂奏復之徙蘇州入判刑部徙户部勾院歷户部度支鹽鐵副使安撫梓夔路擢天章待制江淮制置發運使先是發運使上計造大舟數十載物入遺權貴堂曰吾豈為此歲入自可附驛奏也前後五年未嘗一至京師就除河東路都轉運使未行知洪州改應天府纍遷左司郎中知杭州以樞密直學士知益州慶厯初詔天下建學漢文翁石室在孔子廟中因廣其舍為學宫選屬官以教諸生楊曰嚴在蜀有能名堂素不樂之於是節遊宴減厨傳專尚寬縱頗變曰嚴之政又建銅壺閣伐木於漢昭烈惠陵江瀆祠又毁后土及劉禪祠蜀人浸不悅獄訟滋多久之或以為私官妓徙河中府又徙蘇杭二州以尚書禮部侍郎致仕初堂徙家吳中守杭時復治溪館將歸休焉既而告老賦隱圃詩自號遂翁所居嘗有芝知州李仲偃名其里曰靈芝坊至和初卒年七十五特贈吏部侍郎堂為人清修純飭遇事不屈而樂施好學工文辭延譽晚進尤嗜作詩有吳門集二十卷子之奇字頴叔孫續皇祐中僉判平江軍堂卒續自言少孤育於祖乞服衰粗以報朝議以堂有子不許遂辭疾謁醫去職行服嘉祐三年知吳縣事陳之奇字虞卿其先長安人唐末徙吳曾祖贊明吳越中吳軍節度推官祖郁贈太子贊善大夫父質殿中丞以德行著稱鄉里贈刑部侍郎之奇天聖中禮部進士廷試下第里居十年無仕進意其母丁謂妹也謂欲授以官之奇有兄郢亦以琴書自怡皆力辭之後勉使之奇就舉之奇不得已又以進士為鄱陽尉歷丹徒泰興二縣令李瑋上公主詔舉經術行義者為隴西郡王宅教授數月告歸即致仕郡留其奏不可遷太子中允俄除平江軍節度掌書記復以為教授詔賜金錢促遣之卒不起以太常博士賜緋魚袋間居十八年之奇孝親信友約身篤行好學知道心襟泊素聲利不能遷家居與鄉黨同憂樂赴人之急至於州縣無所避州縣以其至誠亦不為疑平居靜默與人言忠孝立身娓娓不倦持已謹嚴而外簡曠不為矯刻之行賙贍宗族貧而竭力吳人言家行者必推之莫不以為愷悌君子每出乘羸駒里巷小人見之斂然曰此吾陳君子也四方賢士大夫至吳必問所在爭欲一見蔣堂語人曰舉天下皆知有富貴而虞卿獨以知止易衆人之心吾喜林下有人也當是時胡瑗以經術教授諸生蘇舜欽以文章退居山林之竒以德行棄官而歸名動海內稱吳下三賢人熙寧初卒王圭為志題曰太常博士致仕陳君子之墓富嚴青田人其祖居吳而葬因占籍焉嚴慶厯初由三司户部判官除尚書刑部郎中知蘇州四年改兵部知泉州八年以太常少卿知越州嘉祐中以祕書監再守蘇秩滿告老未嘗一造官府以耆德著稱鄉人因名其居曰德壽坊卒贈司徒子臨亦有文名終知池州平江節度推官嚴曾孫元衡元衡字公權幼入太學有聲擢進士第調隨縣主簿建炎初為襄陽撫司機宜都督張浚以才薦改秩為諸王宫大小學教授大宗正丞紹興十一年以左宣教郎知江隂軍十二年詔諸路州學委守臣修葺具次第驛聞元衡出緡錢五十萬鳩工掄材庸間民以服役閲月而功成嘗辨盜之不應死者全活數十人皆感泣改興國軍二十六年知袁州逾年遷湖南常平改利州路提刑蜀舊例監司交餽不下數千緡元衡悉拒不納再移湖北專以平反為心隆興中召還中塗遇盜行李為之一空帥李師顔餽以匣金元衡不啓緘謝絶之除工部郎中嘗曰吾家以清白相傳今不翅足矣疏乞骸骨詔以內閣奉祠制詞有知止不殆之語元衡因揭知止名其堂以慶禮成賜金紫官至朝散大夫卒年八十六元衡守節清慎終始不渝時論仰之效蘇軾書能逼真尤善栁葉篆鄭夷甫郡人少登科有美才嘉祐中監髙郵軍稅遇一術士能推人死期無不驗謂夷甫命不過三十五歲夷甫叵堪或勸其讀老莊以自廣有金山僧與人談笑間化去夷甫聞之喟然曰既不得壽得若此僧復何憾哉乃從佛者授楞嚴經歲餘忽有所見曰生死之理我知之矣遂釋然放懷無復芥蒂後調封州判官預知死期先旬日作書與親舊訣及次敘家事至期沐浴更衣公舍外有小園面溪一亭夷甫至其間督人灑掃及焚香揮手指畫之間屹然立化家人奔呼已僵立如植木一手猶作指畫之狀郡守而下少時皆至士民觀者如堵墻明日乃斂髙郵崔伯易為墓志敘其事沈括字存中本錢唐人兄遘徙蘇州括以蔭任沭陽主簿縣依沭水即周禮所謂浸曰沂沭故迹久為汚澤括新其二坊疏水為百渠九堰以節宣原委得上田七千頃復以吳縣籍登嘉祐八年進士第編校昭文書籍為館閣校勘刪定三司條例遷太常丞同修起居注加龍圖閣學士坐事謫均州徙秀州以光祿少卿分司居潤卒年六十五括學術浩博文藝深長經史之外天文方志律厯音樂醫卜諸家無不通練皆有論著喜建事功所著夢溪筆談行于世陸綰字權叔常熟人本名絳字伯厚見前史同姓名者不道更今名舉進士昆弟分産綰推先疇付之捐俸振族篤教孤姪各登科名歷知揚子雍丘二縣終朝奉郎尚書職方郎中充淮南等路制置發運司運鹽公事字民加恤而臨吏加嚴務以摧治豪右用懾服強禦為職名震仕塗卒於真州官舍贈中散大夫所著春秋新解三十卷歌詩尤膾炙人口滕元發初名甫字元發避諱改字為名而字達道其先東陽人父髙用薦為祕書郎尤長於性理卒葬吳縣遂為蘇人元發母夢虎行月中墮其室而元發生豪俊慷慨不拘小節九歲能賦詩范仲淹之父墉元發諸舅也嘗教以為文及仲淹守鄉郡元發受學於胡瑗舉進士授大理評事通判湖州孫沔守杭見而異之曰奇才也後當為賢將授以治劇守邊之略召試為集賢校理開封府推官鹽鐵户部判官同修起居注英宗書其姓名藏禁中未及用神宗即位召問治亂之道對曰治亂之道如黑白所以變色易位者朋黨汩之也上曰卿知君子小人之黨乎曰君子無黨譬之草木綢繆相附者必蔓草非松柏也朝廷無朋黨雖中主可以濟不然雖上聖亦殆上以為名言進知制誥知諫院御史中丞王陶論宰相不押班為跋扈上以問元發元發曰宰相固有罪然以為跋扈則欺天陷人矣知開封府拜御史中丞种諤擅築綏州且與薛向發諸路兵環慶保安皆出摽掠夏人誘殺將官楊定元發上疏極言諒祚已納欵不當失信邊隙一開兵連民疲必為內憂又中書樞密制邊事多不合中書賞戰功而樞密降約束樞密詰修堡而中書降褒詔元發言戰守大事也而異同如是願敕二府必同而後下宰相以其子判鼓院諫官謂不可上曰鼓院傳達而已何與於事元發曰人有訴宰相使其子達之可乎上悟罷之京師郡國地震元發上疏指陳致災之由大臣不悅出知秦州上留不遣館伴契丹使楊興公開懷與之語興公感動將去泣而别河北地大震令元發為安撫使時城舍多圮吏民懼壓皆幄寢苃舍元發獨處屋下曰屋摧民死吾當以身同之瘞死飼飢除田租修隄障察貪殘督盜賊北道遂安除翰林學士復知開封府民王潁有金為鄰婦所隱閲數尹不獲直頴憤而致傴扶杖訴于庭元發一問得實反其金頴投杖仰謝失傴所苦夏國主秉常被篡元發言李繼遷死時李氏幾不立矣當時大臣不能分建諸豪乃以全地王之至今為患今秉常失位諸將爭權天以此遺陛下若再失此時悔將無及請擇立一賢將假以重權使經營分裂之可不勞而定百年之計也上奇其策然不果用元發在上前論事如家人父子言無文飾洞見肝膈上知其誠藎事無巨細人無親疏輒皆問之元發隨事解答不少嫌隱王安石方立新法天下洶洶恐元發有言為上所信因事以翰林侍讀學士出知瀛州元發以父諱改鄆州入辭言于上曰臣知事陛下而已不能事黨人願陛下少回當日之眷無使人為黨人所快則天下知事君為得而事黨人為無益矣上為改容徙定州初入覲言新法之害且曰臣始以意度其不可耳既為郡乃親見之歲旱求言又疏奏新法害民者陛下既知之矣但下一手詔應熙寧二年所行有不便者悉罷之則民心悅而天意解矣皆不聽在定以邊人畏服上喜令再任詔曰寬嚴有體邊人安焉遂作安邊堂歷青州應天府齊鄧二州會婦黨李逢為逆或因以擠之黜為池州未行改安州侍郎韓丕旅殯於安五十載學士州人鄭獬既沒十年貧不克葬元發皆葬之人髙其義元發流落且十載猶以前過貶居筠州或以為復有後命元發談笑自若曰天知吾直上知吾忠吾何憂哉遂上章自訟有曰樂羊無功謗書滿篋即墨何罪毁言日聞上覽之惻然即以為湖州哲宗登位徙蘇揚二州除龍圖閣直學士復知鄆州學生食不給民有爭公田二十年不決者元發曰學無食而以良田飽頑民乎乃請以為學田遂絶其訟時淮南京東飢元發慮流民且至將蒸為癘疫先度城外廢營地召諭富室使出力為席屋一夕成二千五百間井竈器用皆具民至如歸所全活五萬人徙真定又徙太原元發治邊凜然威行西北條畫有方號稱名帥河東十二將其八以備西邊分半番休元發至之八月邊劇來告請八將皆防秋元發曰夏若並兵犯我雖八將不敵若其不來四將足矣卒遣更休防秋將懼扣閣爭之元發指其頸曰吾已舍此矣頭可斬兵不可出是歲塞上無警詔以四寨賜夏人葭蘆在河東元發先畫境而後棄且曰取城易棄城難令步將訾虎領兵護邊夏不敢近夏既得寨又欲以綏德城為法畫境出二十里外元發曰是一舉而失百里必不可久上章爭之以老力求淮南乃為龍圖閣學士復知揚州未至卒贈左銀青光祿大夫諡章敏子祐以蔭補官歷戶部員外郎徽宗即位使察訪嶺南將大用之大臣不樂中以飛語坐廢久之起知通閬二州不赴改邠州人繪像事之又改撫池二州祐弟祁知鄜州贈武義大夫祁弟裕判吉州元發弟中中字元直以蔭補官將作監主簿官制行換承奉郎歷監瀛州倉草場知安吉縣明州市舶通判原莫二州保安軍知解州移虢州鹽法弊朝命復任解州官至承議郎亷勤自將治民守邊所至有聲尤長於詩崇寧五年卒年五十六元絳字厚之其先臨川人姓危氏曽祖仔倡唐末聚衆保鄉里進據信州為楊渥所敗奔杭州祖德昭吳越丞相錢鏐惡其姓易為元絳生而敏悟五歲能詩九歲謁荆南太守試以三題上諸朝貧不能行長舉進士以廷試誤賦韻得學究出身再舉登第調江寧推官攝上元令民有王豹子豪占人田略男女為僕妾有欲告者輒殺以滅口絳捕置于法甲與乙被酒相毆擊甲歸卧夜為盜斷足妻稱乙告里長執乙詣縣而甲巳死絳敕其妻曰歸治而夫喪乙巳服矣隂使謹信吏迹其後望一僧迎笑私語絳命縶僧詰妻姦狀即吐實人問故絳曰吾見妻哭不哀且與傷者共席而𥜗無血汚是以知之范仲淹為安撫使表其材知永新縣豪子龍聿誘少年周整飲博以技勝之計其資折取上腴田立劵久而整母始知之訟于縣索劵為證則母手印存弗受又訟于州于使者擊登聞鼓皆不得直絳至母又來欣絳視劵呼謂聿曰劵年月居印上是必得周母他牘尾印而撰偽劵續之耳聿駭謝即日歸整田為著作佐郎知海門縣一作靜海淮民多盜販鹽制置使建言滿二十斤皆坐徒絳曰海濵之民恃鹽為命非羣販比也笞而縱之擢江西轉運判官知台州大水冒城郭民廬蕩析絳出庫錢即其處作室數千區命人自占約三歲償費流移者皆復業又甓其城因門為閘以禦湍漲後人遵其法入為度支判官儂智髙叛嶺南宿軍雍州而歲漕不足絳以直集賢院為廣東轉運使建瀕江水寨數十以待逋寇繕治十五城樓堞械器皆備軍食有餘以功遷工部郎中厯兩浙河北轉運使召拜鹽鐵副使擢天章閣待制知福州進龍圖閣直學士徙廣越荆南為翰林侍讀學士初上欲擇人王安石對有真翰林學士第恐陛下不能用况已作龍圖閣學士難下遷知制誥遂召入中外大驚迄有稱職之譽預議僖祖神主祧遷請以僖祖為始祖廟詔從之知開封府拜三司使參知政事數請老上以其子耆寧孝謹好學命校書崇文院慰留之會太學虞蕃訟博士受賄事連耆寧當下獄絳請上還職祿而容耆寧即訊於外從之於是御史至第薄責絳絳一不自辨罷知亳州入辭帝謂曰朕知卿一歲即召矣卿意欲陳訴乎絳謝罪願得潁即以為潁州上賜坐使服學士金帶如舊明年加資政殿學士知青州過都留提舉中太乙宫力疾入謁曰臣疾憊子弱儻一旦不幸死則遺骸不得近先人丘墓帝惻然曰朕為卿辨護雖百子何以加詔毋多拜乘輿行幸勿扈從又明年以太子少保致仕絳所至有威名而無持操少儀矩仕已顯猶謂遲晚在翰林諂事王安石及其子弟時論鄙之然工於文辭為流輩推許景靈宫作神御十一殿成夜傳詔草上梁文遲明上之雖在中書而帝下書詔猶多出其手既得謝帝眷眷命之曰卿可營居京師朕當資金幣且便耆寧仕進絳曰臣有田廬在吳乞歸鬻之即築室都城得望屬車之塵幸矣敢覬賜邪既行追資白金千兩敕蚤還絳至吳中與程師孟為九老會有居第在帶城橋鄉人榮之因號為衮繡坊踰歲以老病奏恐不能奉詔三年而卒年七十六贈太子少師諡章簡詔其家集文章上之有文集四十卷讞獄集十三卷子耆寧耆弼徐師閔字聖徒其先建安人父奭歷官蘇浙子孫遂為蘇人奭事具宦迹條師閔治平初虞部員外郎知江隂軍作漏壺修鼓角門熙寧十年以司農少卿知袁州時江西劇賊詹遇屠劫列城為之騷動袁獨預修武事具戰艦號令嚴肅常若寇至遇引避不敢犯境袁民歌之且有瑞粟嘉禾之異繪圖以進為治鎮靜有惠愛吏民生為立祠轉運蔣之奇薦於朝部使者第課優等知洪州王韶皆列奏留再任尤為蔣堂蔡襄所知在官自輔臣以下薦之者幾百人官至正議大夫東海郡侯告老以中散大夫普寧郡侯致仕有以黃白術為獻師閔問能久乎曰五十年乃變耳師閔曰吾平生不妄語若欺人於五十年後豈吾心哉退居里中與元絳程師孟輩以詩酒為樂號十老鄉人榮之年八十卒子鑄鑄字元鈞年少入官有能名吏不敢欺及為縣所至屏姦惡辨疑獄勸本業修學校課常居最政和初提舉兩浙常平修松江隄易土以石闢常熟水田數百頃為之疆畎越四年以直祕閣就除轉運副使明年遷發運副使賜金帶數月以徽猷閣待制知杭州及代以杭人安其教令特除延慶殿學士又歷廣揚二州終正奉大夫子端仁承務郎監平江市易務鑄從子林林字稚山祖師回字望聖熙寧間駕部郎中嘗知南康軍蘇轍為作直節堂記父閎中為吏有能名歷鄂州司法吏部郎直祕閣林少有特操中進士第與王黼有連不肯附麗之寧坎壈卑官紹興初上書言事召改官纍遷太府少卿出為江西轉運副使劾秦檜親黨坐是以沮經界法貶興化軍十三年更化復入為刑户二部侍郎論國用太廣宜撙節之隆興初為吏部侍郎復論符離之役非計遂以敷文閣直學士奉祠知平江府力辭旋乞致仕再以給事中召不起遷龍圖閣學士當時稱賢闕從以林為首卒年八十餘紀聞云紹興中林坐闕鼎所引忤秦檜罷宗闕少卿又以前任江西按檜妻之第王昌復為檜所憾諷兩浙轉運誣林沮均田法安置興化軍周必大云稚山初言兵不可輕用忤王龜齡而去湯丞相疑可助已薦為給事中纍辭竟不起人始服其通介而不徇時子藏藏字子禮由進士知饒州以居吳去親逺乞易旁小州便養乾道初改知江隂軍新廟學刋書籍二年遣轉運副使薑詵按視水利藏延見父老審訂其説謂江隂北臨大江地勢汙下港瀆善淤夏秋淫雨浙西數郡百川並委瀕港七鄉並湖三山低卬之田混為一區尋丈而增膚寸而落十年之間沒溺者一百六十萬餘畝歲蠲秋苗以一二萬計公私交病遂請治蔡涇廢閘閘之故基距河差逺兩翼迫蹙波流悍急易於隤壞乃移基並東直抵漕渠斥而大之易木以石長各十有三丈四尺髙一丈八尺洪之濶二丈三尺岸之西北滙為渦矗分殺水怒土木鐵石之工萬有九百費錢三萬二千三百緡米一萬一千四百石各有奇於是增浚漕渠下通黃田以防泛溢絶壅滯五旬而畢又奏本軍地狹民貧有續添認納臨安府買紬絹四千餘匹兼纍遭大水百姓憔悴困此重斂上為蠲八之五命下之日歡聲動阡陌三年改浙東提舉常平五年知秀州藏有學尤善漢𨽻書弟兢兢字明叔生數月見字畫輒色喜踊躍至十餘歲頴異不羣人謂騎省後身年十八入太學後以父任補通州司刑曹事辟入坑冶司幕攝事雍丘民服其化獄訟衰止移攝原武縣時有挾其弟貴勢者威震郡邑檄邑冶市炭後至與慢令者兢歎曰令不賢不能芘民忍至此極耶疏聞諸朝願以身贖無辜當國者曰使縣令皆如徐兢天下有不治乎宣和中以禮物官隨路允迪使髙麗撰髙麗圖經四十卷上之徽宗覽書大悅召對便殿賜出身擢大宗丞兼掌書學以篆名家遷刑部員外郎時相册免坐親嫌謫監池州永豐監起除沿江制司參議奉祠吳中二十年而卒弟德止遜官於從子而學佛徽宗賜號圓通禪師錢藻字醇老吳越王元瓘子儼入朝為昭化節度守和州儼生昭慈昭慈生順之藻順之子也舉説書進士乂舉賢良方正皆中英宗時為祕書校理三上書請慈聖光獻太后歸政天子神宗時稍遷直舍人院同修起居注擢知制誥直學士院除樞密直學士知開封府以慈恕簡靜為體不求知名以投世取顯遷翰林侍讀學士封仁和縣伯元豐五年卒藻刻厲為學於書無所不治已通其大旨至於分章别句類數辨名叢細委曲無不究盡見於文辭閎放雋偉為人清謹寡過居守繩墨立朝無矯亢亦不雷同世利淡如人稱長者子僧孺初藻受學於胡瑗用和州貫登第母丁氏葬天平山遂為蘇人孫載字積中曾祖漢英錢氏時為崑山鎮防遏使遂為縣人父稱官至通議大夫發運大使載登進士為河中府户曹更三守皆立威嚴載獨與爭曲直不肯詭隨守終乃稱薦之中書檢正官察訪關中辟為官屬乾祐縣令不肯奉行青苗法察訪使檄載按之載言邑小民貧歲以黍麥博易為生令無罪不果按用薦者遷知德清縣以德化民不專任刑罰開誘是非出於誠信訟有纍年不決者得一言皆感悟舍去熙寧八年吳越飢獨縣中熟載勸大家倍糴得十五萬斛明年春米價翔踊載使平直以糶全活甚衆移考城縣一日巡尉來告盜集境上將以上元掠近郭至期載張鐙設宴不禁夜盜叵測遂遁去訖受代無復盜者神宗以載姓名付中書除廣東常平觸暑行部以宣德意元祐初通判陜州遷廣東轉運判官紹聖初除河北西路常平改知海沂二州延聘名儒興學養士遷朝奉大夫知婺州除河東轉運判官移淮西提點刑獄建中靖國初遷朝請大夫知亳州所至為治務大體時號循吏以嘗薦元祐黨人丐間授提舉洞霄宫大觀中以朝議大夫致仕一日遍謁先隴及嘗往來者未幾疾革問日早晏盥手焚香而逝年七十二載天資樂易長於吏治好汲引士類受薦者至四百餘人後多知名少喜讀易著釋解五十卷文集若干卷張僅字幾道舉進士與里人顧棠皆為王安石門下士安石作三經義二人與焉僅官至著作佐郎而卒棠字叔思撰周易義類三卷郭附字明仲郡人以進士知新建縣俗健訟好持吏短長附至問民疾苦皆以鷙獸暴橫為言乃檄旁縣尉併力仍以厚賞啖壯士不閲月得獸數十尸諸庭乃號於衆曰有悍不率教如此獸者皆殺之無一人敢犯令者熙寧中以大理寺丞權知崑山縣官至朝奉大夫致仕幅巾策杖窮山林詩酒之適者十八年東南髙士皆樂與之遊卒年八十四孫元邁在忠義傳郟亶字正夫太倉農家子自幼讀書識度不凡嘉祐中進士初授睦州團練推官知於潛縣未赴熙寧三年詔天下陳理財省費興利除害之策亶自廣東安撫司機宜文字為書陳蘇州水利王安石善之五年授司農寺丞提舉興修兩浙水利民不為便遂罷歸治所居之西水田曰大泗瀼者如所陳之説為墟岸溝澮場圃俱用井田之制歲入甚厚圖狀以獻且以明前法非苟然者復為司農寺簿遷丞預修本寺制式頗號完密除江東轉運判官元祐初入為太府丞出知溫州以比部郎中召未至卒年六十六有吳門水利書四卷行於世其説見水利條亶子僑字子髙一字喬年負才挺特亦為王安石所器許鄉里推重謂之郟長官有幼成警悟集亶孫升卿字師古由進士知常徽二州乾道六年自徽代還奏蠲本州額外創科雜錢一萬二千餘緡及元認江東兩浙運司諸處絹一萬六千六百餘匹其勤恤民隱類此朱長文字伯原其先剡人世仕吳越祖億宋太宗朝內殿崇班閣門祗候知雍州纍贈刑部尚書由開封來蘇州又為蘇人父公綽光祿卿知舒州長文方在娠所生周夫人夢覆錦衾或曰是生子能文矣比生十歲能屬辭讀書輒竟夕從泰山孫復授經於太學無所不知尤邃於春秋博聞強識篤學力行年十九擢乙科進士第吏部限年未即用時公綽守彭長文不俟燕歸州人榮之既冠授祕書省校書郎守許州司户參軍以墜馬傷足不肯從吏趨郊禋公綽欲以任子恩丐長文幕官長文推與其季從悌丁父憂家居凡二十年築室故吳越錢氏金谷園知州章岵表曰樂圃鄉人遂稱為樂圃先生郡將監司莫不造請謀政士大夫過者必往見之以後為恥名動京師元祐中起為本州教授州有兩教授以長文故也同舉者徐積陳烈時號三先生長文早歲作東都賦論者謂不減班張太沖其教人先經術而後詞章授學者春秋洪範中庸無慮數百先是范仲淹始建州學歲久墮廢其子純仁以侍郎制置江淮漕事復請修搆長文有力焉吳中水災長文陳五浦之利不果行又作救荒議四篇上知州黃履行之民賴以安歷五考召為太學博士著釋問以見意紹聖間改宣教郎除祕書省正字兼樞密院編修文字元符初卒年六十哲宗嘉其清賻絹百匹博士米芾為表其墓長文資稟忠朴雖在布衣慨然有用世之志暨出仕以田疇委諸弟惟藏書二萬卷所撰春秋通志二十卷又有書贊詩説易解禮記中庸解琴臺志琴史六卷蘇州續圖經五卷又撰次古今文詞為吳門總集二十卷樂圃文集一百卷書倣顔真卿所集周穆王以來金石遺文名人筆迹作墨池閲古二編藏于家其敘琴史有曰方朝廷成太平之功制禮作樂比隆商周則是書也豈虛文哉其志概可見矣從子良在忠義傳良五世孫夢炎夢炎字明叔幼頴悟以祖處大蔭授將仕郎寶祐二年銓中授迪功郎海鹽尉改泰州司户參軍咸淳三年調定城簿七年轉真州司法參軍制置使印應雷知州王起宗朱煥咸稱亷敏聽訟決獄深得其情多以郡政委之先是軍餉所收綱米每病濕惡夢炎斥去綱人饋送事例積弊屏除在郡有鑾江倡和集夢炎性倜儻善持論見義必為為詞章慕朱希真亦名曰樵唱集卒年六十二丁偃者長文同年進士也初試邇英進講藝詩云白虎前芳掩金華舊事輕天心非不寤垂意在蒼生有古詩諷諌之體是歲奏名甚髙而御前下第自是二十年方中選李璋居盤門負不羈之才王安石尤愛其人屢見於詩後改名玖以纍舉特恩補官孫益字彥中登進士第徙居常熟紹興間監察御史黃彥字修中其先浦城人父挺字公操章得象薦為吳縣尉歷秀州司理餘杭尉筠州判官守太子洗馬致仕賜五品服與章岵等為十老會纍贈金紫光祿大夫彥熙寧中以王安石經説與弟頡俱第進士安石舉為越州教授遷瀛州防禦推官知崇德縣長興丞以省罷知浦江縣清直明恕民畫像祠之紹聖中知虹縣有廟吏訛言井蛇為龍水能愈疾彥以蛇磔死妖乃不興又麥秀兩岐蝗不入境時稱有古循吏風除楚州教授宗正寺簿改富陽令為政如前時坐法免管勾嵩山崇福宫官至朝奉大夫致仕政和四年卒頡字升中官至朝議大夫彥子策策字子虛九歲能屬文嘗追和梁昭明所選詩持見蘇軾軾曰子異時必以文顯弱冠擢第歷雍丘主簿齊州教授元符末詔中外言事時昭慈聖獻皇后既復位號而典册有未盡正者策引古誼上書甚切蔡京深銜之崇寧初黨籍羈管登州會赦還鄉後為發運司屬官斥賣京家資得京草復元祐皇后制所録上皇聖語親劄副本上進見神宗悔悟之心欽聖詔復之旨隆祐誣抑之由由是京主並后以遂復廢之姦益明建炎中追録黨人除直祕閣通判嚴州初欽宗在青宫時聞策名大書隨緣堂三字以賜因自號隨緣居士子維纓字端冕宣和末屢上書言事李綱為行營使嘗居幕府遭亂還鄉陳長方稱為千人之英紹興初以文名策有隨緣居士集四十卷纓有感事詩纓子季魯字道夫有集十卷皆附焉策弟簡字能甫黃氏自挺以下居吳縣聚塢山為縣中大族至宋亡僅十餘世或云策之後有名簡字元易者盧氏云熊按譜系非此一族陳睦字子雍祖絳莆田人官至右司諌徙家蘇州兄侗進士知汝州富弼辟為從事召除館閣校勘歷衛尉少卿元豐中知陜湖宣三州睦第進士治平中詔舉館閣才學之士睦與劉攽李清臣輩首被選擢拜監察御史熙寧中提舉兩浙常平以曾公亮薦遷提點刑獄坐是免官元豐間髙麗數遣使修貢朝廷以其恭順選使諭旨初命林希希辭命睦睦即日就道上喜語輔臣曰林希無親堅辭不往睦親在乃不憚行假起居舍人直昭文館特贈仙華金帶使還言故事惟寶文閣直學士以上乃服金帶今請上所賜特旨令服之仍真拜所假官職又於令式外賜金盞其後錢協楊景略援例欲服金帶上弗許尋直龍圖閣知潭州改寶文閣待制知廣州子彥文字經仲建炎二年以龍圖閣待制知江州視事方十日會盜張遇犯城彥文極力固守遇乃引去明年為沿江措置使尋躋法從彥文弟彥武字緯叔為提舉官張詵字樞言父沔浦城人刑部郎中直史館致仕來寓蘇州因家焉詵第進士通判越州民患苦衙前役詵科别人户籍其當役者以差入錢為顧人充皆以為便知襄邑縣擢夔路轉運判官録辟土功加直集賢院改陜西轉運副使召對帝曰朕未識卿每閲章奏獨卿與蔡挺有所論請使人了然尋當以師事相屬及入辭賜服金紫明年直龍圖閣知秦州前此將吏貪功多從羌地獵射因起邊患詵至申令毋得犯獲一人斬諸境上羣羌感悅遷天章閣待制知熙州董氈遣鬼章逼岷州詵往討董氈逆戰破之于錯鑿城斬首萬級元豐四年以龍圖閣直學士知成都府徙杭州將行復命權知熙州經略熙河事趣使倍道行時倉卒治戎有司計産調夫民多流亡詵中途詳其狀乞刺劍外招攜之不報會靈武師罷乃赴杭道京師帝訪以西事對曰彼勢雖弱而我師未鋭邊備未飭願以歲月圖功纍官正議大夫清河郡侯卒詵性孝友亷於財平生不植田業然既以建拓瀘夷地被進用後雖有善言可紀終不逭清議云弟詢字仲謨元祐中知湖州歷户部員外郎直龍圖閣清河縣開國子朝議大夫詵孫公秀公秀字仲實從葉適遊甚密風流詞翰推重一時紹興初為崇德丞遂寓郊野作漁簔堂知臨海縣尤有善政孫沖字子和少負才名受知王安石嘗著鄉黨傳説二論安石大奇之知含山縣號為循吏律已甚嚴一毫不妄取秩滿率家人解其歸裝老獲有畜一砧者沖視之曰非吾來時物也命還之薦章交上改宣德郎未幾卒年三十五姑蘇志卷四十九
