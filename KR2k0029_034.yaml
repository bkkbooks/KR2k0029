body:
  text: 姑蘇志卷三十五明王鏊撰吳世家封爵氏族附自古君兹土者惟吳最乆自泰伯至夫差歴二十五君其流風遺俗至今人猶道之故歴著焉凡後之寄爵者亦牽連書之僭稱者不書至若孫氏楊氏錢氏李氏雖亦嘗據有而不為都故不及錄也泰伯姫姓周太王之子太王三子長泰伯次仲雍次季歴季歴生聖子昌太王意屬之泰伯知其意與仲雍俱逃荆蠻斷髪文身示不可用太王卒泰伯仲雍歸執喪還犇荆蠻荆蠻之人義而歸之者千餘家乃自號勾吳居數年民人殷富遭殷之末中國數用兵恐及於難泰伯始令人城荆蠻之地耕其中泰伯卒葬於梅里平墟無子仲雍立仲雍一名吳仲初泰伯既號勾吳吳人或問何象泰伯曰吾以伯長居國絶嗣後當有封者吳仲也勾吳非其方乎仲雍卒子季簡立季簡卒子叔達立叔達卒子周章立周章時武王克殷求泰伯仲雍之後因封周章為吳伯周章卒子熊遂立熊遂卒子柯相立柯相卒子疆鳩夷立疆鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗髙立頗髙卒子句卑立吳越春秋周章子熊熊子遂橋作喬盧作廬轉作專譙周古史考作柯轉卑作畢句卑卒子去齊立去齊卒子夀夢立夀夢立而吳始大稱王夀夢二年楚之亡大夫申公巫臣適吳教吳射御以其子狐庸為行人導之伐楚蠻夷屬於楚者吳盡取之乃朝周適楚觀諸侯禮樂㑹魯成公于鍾離十六年楚共王伐吳至衡山二十五年王夀夢卒初夀夢食不二味屋不重席室不崇壇器不彫鏤宫室不觀舟車不飾衣服財用擇不取費在國天有菑癘親巡其孤寡而共其乏困在軍熟食者分而後食其所嘗者卒乗與焉有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢壽夢欲立之季札讓曰禮有制奈何廢前王之禮而行父子之私乎壽夢乃命諸樊曰我欲傳國及札爾無忘我言諸樊曰昔太王知西伯之聖廢長立少王道果興今欲授國於札臣誠願耕於野王曰周之徳加於四海今汝以區區之國荆蠻之鄉奚能成天子業乎惟子不忘吾言必以次及札諸樊曰敢不如命於是乃立諸樊攝行事當國諸樊已除喪讓位季札季札不受棄其室而耕於野乃舍之王諸樊卒弟餘祭立王餘祭三年齊相慶封來犇封以朱方之縣四年使季札聘於魯觀周樂十年楚靈王㑹諸侯伐吳之朱方以誅慶封吳亦攻楚取三邑十二年楚復攻吳次于乾谿楚師敗走十七年王餘祭卒弟餘昧立王餘昧在位四年卒欲授位季札季札遂逃去國人立餘昧子僚王僚二年使公子光伐楚戰于長㟁吳師敗亡其餘皇舟亦作艅艎光請於衆曰喪先君之乗舟豈惟光之罪衆亦有焉請襲取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人起戰師亂吳人大敗之取餘皇以歸五年楚之亡臣伍子胥來犇公子光客之欲與為他謀八年僚使公子伐楚大敗之迎故太子建母以歸九年使光伐楚初楚邉邑卑梁之氏處女吳越春秋作脾梁與吳邉邑女争桑兩國邉邑長相攻吳不勝至是伐楚取二都十三年吳使掩餘燭庸吳越春秋掩作蓋庸作傭圍楚使季札於晉以觀諸侯之變楚發兵絶吳後吳兵不得還初光以僚之立不恱曰先君不與子而與弟者凡為季子也不從先君之命而與子我宜立者也僚焉得為君哉至是光心動謀之鱄設諸鱄設諸曰僚可殺也母老子弱弟絶於楚内無骨鯁之臣光從之伏甲於窟室窟左傳作堀吳越春秋作窋請王僚飲酒僚入專設諸置魚腸劒炙魚中進之遂刺王僚貫甲達背僚死光自立是為闔閭闔閭即位始任賢能施恩惠以仁義聞於諸侯舉伍子胥為行人與謀國政闔閭問計於子胥子胥言安君治民要在於立城郭設守備實倉廪治兵庫王乃委計於子胥元年伯嚭來奔王問子胥伯嚭曰吾欲出兵何如皆對曰臣願用命吳王内計二子皆怨楚深恐以兵徃破滅而已登臺向南風而嘯有頃而嘆群臣莫有曉者子胥深知王意之不定乃薦孫武而用之二年闔閭使徐人執掩餘鍾吾人執燭庸二公子奔楚吳子執鍾吾子遂伐徐滅之三年吳侵楚伐夷侵灊六圍弦始用伍員之謀五年吳伐越敗之六年楚攻吳吳迎擊之大敗于豫章取楚之居巢獲楚公子繁以歸九年王謂子胥孫武曰始子言郢未可入今何如二子對曰唐蔡怨楚必得唐蔡乃可冬蔡侯吳子唐侯伐楚自豫章與楚夾漢三戰十一月庚午二師陳于柏舉闔閭之弟夫㮣以計破之敗諸雍澨五戰及郢楚昭王出奔吳師入郢十年春越聞吳王之在郢以兵入吳夫㮣亡歸吳自立闔閭歸攻夫㮣夫㮣奔楚楚封於堂谿十九年吳伐越越子勾踐敗吳師于攜李闔閭傷指將死使人立太子夫差謂曰爾使人立於庭出入必謂己曰爾忘勾踐之殺汝父乎則對曰不敢三年乃報越夫差元年以伯嚭為太宰二年王悉精兵以伐越敗越於夫椒遂入越越王勾踐以甲五千棲於㑹稽使大夫種因太宰嚭以行成吳王將許之伍貟諌不聴退而告人曰越十年生聚十年教訓二十年之外吳其為沼乎越及吳平五年㑹魯哀公于鄫徴百牢欲霸中國也六年吳城䢴通江淮七年子貢説吳王伐齊又説越王勾踐佐兵以徼吳而連魯以制吳敝吳王從之伍貟諫不聴遂㑹魯哀公伐齊十一年復伐齊越王勾踐率其衆以朝厚獻遺之吳王喜唯子胥懼曰是豢吳也諫王不聴以伍貟使齊貟屬其子於齊鮑氏因還報吳王王大怒賜屬鏤之劍以死十三年召魯衛之君㑹于槖皋十四年北㑹諸侯于黄池越伐吳虜太子友遂入吳吳人告敗于王王惡其聞也斬七人於幕下於是與晉定公争長吳人曰於周室我為長晉人曰於姫姓我為伯趙鞅怒將伐吳乃長晉吳王歸與越平十八年越遂圍吳二十三年越王勾踐欲遷吳王于甬東王辭曰孤老矣焉能事君乃縊吳國遂亡封爵劉濞漢髙帝兄子事見平亂條曹彪魏太祖子黄初三年封司馬晏晉武帝子太康十年封敬王食吳丹陽吳興三郡諡曰敬晉康帝嶽咸和元年以皇子封九年改封瑯琊猶食吳郡齊明帝鸞永元元年廢封蕭岑梁宣帝子後魏可博真南安王余俱太武帝子杜伏威唐武徳二年封李元軌唐髙祖子武徳六年封李元璹武徳七年封李恪太宗子貞觀十年封李榮蔡王位下李宙見栁宗元文未詳所出趙元傑宋太宗第五子淳化五年封趙宗絳太宗曽孫熈寜中嗣封吳國公進爵為王趙顥英宗長子卒追封趙佖神宗第九子卒追封吳近髙宗憲聖慈烈皇后之父以后貴追封右吳王長孫陵後魏封東魏孝静帝善見梁朝以蘭陵公封陳藩陳後主第十子禎明三年封右吳郡王言偃唐開元中追封吳侯宋咸平三年封吳公右吳公尉遲綱後周武成元年追封諡武馮盎唐武徳中封尉遲恭武徳五年封李孝逸唐宗室光宅元年李禬吳王祗弟李保𤣥宗孫武行徳宋乾徳元年封侯童乾徳五年封苗繼宗女為仁宗貴妃趙樞徽宗第五子崇寜二年以皇子封趙植徽宗第十二子大觀中累封趙璩藝祖七世孫髙宗朝命不果行又封崇國林希右吳國公陸扆唐光化三年封食邑一千五百户陸佃宋封右吳郡國鄧泛漢光武封孫策建安三年封孫紹策子吳黄龍元年封孫英登次子孫基魯王霸子五鳯中封孫壹仕魏封右吳侯魏憲宋紹興中封范成大淳熈十六年封胡元質王埜寶祐二年封右吳郡侯陸遜漢建安二十四年封張昭吳黄龍元年封邑萬户子休嗣右婁王庾氷晉咸和中封右吳縣侯黄由宋封右長洲縣子范之柔嘉定八年封加食邑三百户右崑山縣子陸長源唐封右吳郡男陸元朗髙宗朝封顧少連陸兼物張鎰張聿鄭作肅宋食邑三百户糜􅠐右吳縣男顔度宋封鄭起潛食邑三百户王景齊食邑三百户右長洲縣男衛涇鄭準鄭竦右崑山縣男氏族朱氏千姓編云朱髙陽之後周封于邾後為楚所滅子孫乃去邑氏朱望出沛國又吳郡或曰朱氏盛大者有九族吳郡居其一今郡之穹窿山有朱氏墓碣字已漫滅其可讀者云一十六世四百二十九年居下邳自平始三年避地至㑹昌壬戌凡八百四十二年籍于吳此唐時子孫追叙其先過江嵗月也張氏白氏文云漢侍中張肱避地渡江始居於吳故其子孫稱吳郡人晉丞相嘉以孝弟聞于郡故其所居號孝張里元和姓纂云吳郡張氏本出嵩第四子睦宇選公後漢蜀郡太守始居吳郡裔孫顯齊廬江太守紹梁零陵太守顧氏本越王勾踐七代孫封於顧余顧城在濮州范陽漢初居㑹稽以邑為氏韋夏卿撰顧少連碑謂顧氏復徙吳㑹自晉司空和洎梁給事中耀至少連十三代矣世說敘錄有顧氏譜甚詳姓苑云吳郡顧氏漢有荆州刺史顧容又晉有固乗亦有故姓陸氏媯姓田敬仲之後也十一世齊宣王少子通封於平原般縣陸鄉即陸終氏之故地因以為氏通諡元侯生恭侯發為齊上大夫生二子曰萬曰皋孫賈為漢大中大夫萬生烈為吳令死葬胥屏亭子孫遂為吳縣人十世孫潁川太守閌生三子曰夘曰温曰威號潁川枝威生揚州别駕續文生三子曰稠曰逢曰褒稠為荆州刺史號荆州枝稠生二子曰肅曰謙肅為丹徒令號丹徒枝世說叙錄有陸氏譜陸景獻自有吳郡陸氏宗系譜一卷暨氏暨姓出吳郡元祐間唱名有暨濤時作洎濤呼不應刑部侍郎蘇頌以結呼之即應三國志有暨豔乃吳人既而問之果平江人歸氏左傳胡子國姓歸為楚所滅子孫或以國為氏或以姓為氏以姓為氏者世居吳郡夀氏吳王夀夢之後吳大夫夀越又有夀於姚今吳中尚有此氏賞氏姓苑云賞氏吳中八族也晉有賞慶為郄鑒主簿兒氏吳郡有語兒生而能語子孫氏焉姚氏舜生於姚墟故因生以為姓王莽亂舜後子恢過江居吳郡改姓媯氏虞氏武王封仲雍之後於虞城晉滅虞子孫以國為氏吳氏本勾吳國越滅吳子孫以國為氏孫氏姫姓衛武丁之後孫耳食邑於威生武仲亦曰孫仲以王父字為氏齊孫武奔吳為將武之子明食邑於富春自是世為吳人諸氏音遮後漢洛陽令諸施吳郡人今吳郡有此氏藇氏音胥又音湑望出吳郡見姓苑言氏孔子弟子言偃吳人今後裔多居常熟帛氏姓苑云吳郡人漢五威將軍帛敞後漢有帛宣神僊傳有帛和晉有髙僧帛道佺笮氏側迫切亦作迮風俗通楚有笮倫今吳郡有此姓吳志漢中有笮融居丹陽岑氏諱晊字公孝黨錮難起逃于江夏山中徙居郡生亮亮生伯伯生軻為吳郡㑹稽鄱陽太守唐書姓系表閻氏姫姓武王封泰伯曽孫仲奕於閻鄉因以為氏又云王少子生而有文在手曰閻康王封於閻城今蘇州有閻橋麴氏本鞠氏也周人漢尚書鞠譚子閟避難改為麴唐有麴信陵吳郡人居洞庭湯氏宋有道人湯惠休正元道人湯靈澈宋州刺史湯柔並吳人崇氏商時侯國也周文王滅之子孫以國為氏唐開元登科有崇穎宋朝登進士第有崇大年皆吳郡人沃氏商王沃丁之後神僊傳有沃焦吳人胥門氏左傳吳大夫胥門巢巢居吳門胥以所居為號其後遂為氏今作胥氏甪里氏漢初商山四皓有甪里先生者本與周同姓名術泰伯之後在洞庭西山居故以自號子孫遂以為氏或作甪氏後漢有甪若叔者乃其後也冷氏即伶氏風俗通云黄帝時典樂伶倫之後今多作上音唐貞元中監察御史冷朝陽吳人是氏是儀鬻書衣判是儀無首族變勾吳三國志是儀本姓氏孔融嘲儀氏字民無上故改為是文苑聨珠錢氏彭祖裔孫孚為周錢府上士因官命氏子孫多居下邳漢哀平間錢遜避王莽亂徙居吳之烏程五代時廣陵王元璙為中吳軍節度使卒葬吳下子孫因家焉范氏陶唐之苗裔周宣王殺杜伯其子隰叔奔吳為范氏越有范蠡滅吳辭越居洞庭之東山唐又有范隋為麗水縣丞屬時亂遂家吳地子孫遂為吳人即文正公之髙祖也富氏世家京洛嘉祐中富嚴守蘇州善吳中風物之美因居不去子孫遂為吳郡人章氏本出姜姓太公望之後封於鄣子孫以邑為氏後去邑作章嘉祐中浦城章楶為蘇州教官就居於此故有南北二族楶居城北號北章惇居城南號南章其二氏甚盛傅氏廣韻餘字下註云傅餘氏本自傅說既為相其後有留於傅巖者因號傅餘氏秦亂自清河入吳漢興還本郡餘不還者傅氏今吳郡有之吳之著姓凡三十餘自漢以來朱張顧陸望於郡故有朱文張武陸忠顧厚之目又云虞魏顧陸吳之舊姓或云虞魏之昆顧陸之裔岐嶷繼體老成奕世陸士衡云八族未足侈四姓實名家文徳熈淳懿武功侔山河正謂此也姑蘇志卷三十五
