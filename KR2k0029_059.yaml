body:
  text: 姑蘇志卷六十明王鏊撰襍事事有無所附見而不可遺者爰名之為襍事又有所謂襍言者因附書之吳王僚時吳邊邑處女與楚邊邑卑梁之女蠶爭界上之桑二家相攻吳不勝更相伐滅吳之邊吳王僚怒使公子光伐楚取居巢鍾離公子光伏甲士於窟室中具酒請王僚僚白其母曰公子光為我具酒其無變乎母曰光心氣怏怏常有愧恨之色不可不防王僚乃被棠鐡之甲三重使兵衛陣於道自宫門至於光之門階席左右皆王僚親戚使坐立侍皆操長㦸交軹酒酣光佯為足疾入窟室使専諸置魚腸劒炙魚中進之既至王僚前専諸擘炙魚推匕首立㦸交軹倚専諸胷斷臆開匕首如故以刺王僚貫甲達背王僚既死左右共殺専諸衆士擾動光伏甲士攻僚衆盡滅之遂自立是為吳王公子蓋餘燭庸二人將兵遇圍於楚者聞光殺王僚自立乃以兵降楚楚封之於舒吳越春秋越王勾踐既以西施鄭旦獻夫差又飾美女八人納太宰嚭曰子茍能放越之罪又有美於此者將進之案此夫差君臣皆為美色所蠱以致破國亡身焉吳王夫差既為越王勾踐所逼將死曰以三寸帛幎吾兩目使死者有知吾慚見伍子胥公孫聖越王則解綬以幎其目史記正議曰今之面衣是遺象顧野王曰大巾覆也延陵季子將西聘晉帶寳劍以過徐君徐君觀劍不言而色欲之延陵季子為有上國之使未獻也然其心許矣使於晉反則徐君死於楚於是脱劍致之嗣君從者止之曰此吳國之寳非所以贈也延陵季子曰吾非贈之也先日吾來徐君觀吾劍不言而其色欲之吾為有上國之使未獻也雖然吾心許之矣今死而不進是欺心也愛劍偽心廉者不為也遂脱劍致之嗣君曰先君無命孤不敢受於是季子以劍帶徐君墓樹而去徐人嘉而歌之曰延陵季子兮不忘故脱千金之劍兮帶丘墓劉向新序延陵季子適齊於其反也其長子死葬於嬴博之間孔子曰延陵季子吳之習禮者也徃而觀其𦵏焉其坎深不至於泉其歛以時服既葬而封廣輪掩坎其髙可隠也既封左袒右旋其封且號者三言曰骨肉歸復于土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子於禮也其合矣乎禮記檀弓闔閭十年有東夷人侵逼吳境吳王大驚令所司㸃軍王乃宴㑹親行平明出城十里頓軍憇歇今憇橋是也王曰進軍所司奏食時已至令臨頓吳軍宴設之處今臨頓是也夷人聞王親征不敢敵收軍入海據東洲沙上吳亦入海逐之據沙洲上相守一月屬時風濤粮不得渡王焚香禱天言訖東風大震水上見金色逼海而來遶吳王沙洲百匝所司撈漉得魚食之美三軍踊躍夷人一魚不獲遂獻寳物送降欵吳王亦以禮報之仍將魚腹腸肚以鹹水淹之送與夷人因號逐夷亭亭之名昉此吳王回軍㑹羣臣思海中所食魚問所餘何在所司奏云並曝乾吳王索之其味美因書美下著魚是為鯗字今從失非也魚出海中作金色不知其名吳王見腦中有骨如白石號為石首魚吳地記晉安北將軍范汪為桓温所免朝廷憚温不敢執談者為歎恨汪屏居吳郡從容講肄不言枉直蘇峻東征沈充吳興人為王敦將請吏部郎陸邁與俱字功髙亦吳郡人將至吳密敕左右令人閶門放火以示威陸知其意謂峻曰吳治平未久必將有亂若為亂階請從我家始峻遂止王子猷嘗行過吳中見一士大夫家有好竹主已知子猷當徃乃整設治具以待王肩輿徑造竹下諷嘯良久主已失望猶冀還當通好遂直欲出門主人大不堪便令左右閉門不聴王更以此賞主人乃留坐盡歡而去庾長仁與諸弟入吳欲徃亭中宿諸弟先上見羣小滿屋都無相避意長仁曰我試觀之乃䇿杖將一小兒始入門諸客望其神姿一時皆退宋江夏文獻王義恭善騎馬好遊行或二三百里孝武帝聴其所之東至吳郡登虎丘山又登無錫烏山以望太湖唐白居易自杭徙蘇首尾五年自云兩地江山逰得遍五年風月詠將殘可謂極宦逰之適矣其在蘇夜逰西武丘詩云領郡時將久逰山數幾何一年十二度非少亦非多詩中又識侍行容滿蟬態十妓姓名殊不以為嫌又夜汎太湖其詩云十隻畫船何處宿洞庭山脚太湖心又自太湖寄元􅍬詩云報君一事君應羨五宿澄波皓月中則是連五日夜在湖心汎舟雖白公風格髙邁好事不窘束亦當時法網太疎不以為怪古今時異事異有如此者其後劉禹錫守蘇白為河南尹又作憶舊逰詩寄禹錫又有夢蘇州寄馮侍御詩眷眷此邦甚厚則知吳在當時為名邦樂國能使賢者思之而不忘咸通中崔璞守吳郡時皮日休為部從事與處士陸龜䝉為文㑹之友風雨晦㝠蓬蒿蘙薈未嘗不作詩璞間為詩亦令兩人屬和吳中名士亦多與焉一年間所作盈積龜䝉裒為十通日休名之曰松陵集陸魯望有鬭鴨極馴養一日驛使過而挾彈斃其善鳴者魯望曰此鴨善人言見欲上進使者奈何斃之盡以囊金償之徐問人語之狀魯望曰能自呼其名爾使者憤且笑拂袖上馬復召之還其金中吳紀聞錢武肅王鏐廣陵王元璙威顯王文奉三世皆為中吳軍節度使開府於吳中時有丁陳范謝四君子同在賔幕丁諱守節丞相謂之祖陳諱替明屯田之竒曽祖范諱夢齡參政仲淹曽祖謝諱崇禮大子賔客濤之父皆職節度推官俱以長者稱其子孫又皆登髙科躋膴仕以見慶源深厚也中吳紀聞諺曰天上天堂地下蘇杭又曰蘇湖熟天下足湖固不逮蘇杭為㑹府諺猶先蘇後杭説者疑之白居易詩云霅川殊冷僻茂苑太繁雄惟有錢塘郡閒忙正適中則在唐時蘇之繁雄固為浙右第一矣楊備郎中天聖中為長溪令忽夢作詩云月俸蚨錢數甚微不知從宦幾時歸東吳一片輕波在欲問何人買釣磯意甚異之明道初為華亭令丁内艱遂家吳中樂其土風安之因悟夢中語嘗效白樂天作我愛姑蘇好十章又作姑蘇百題詩行於世吳郡解額自祥符間定制秋舉以四人為率慶厯中應舉者止二百人范貫之龍圖送錢正叙赴舉序已言四人之額視他藩為最寡熙豐間舉人漸多増至六人三舍法行罷科舉法嵗貢四人舍法罷合三年之數為十二人紹興丙子増流寓一名今終塲之士二千猶為額窄也大觀中章莊敏公質夫之子綖為時相誣以盜鑄詔開封尹李孝夀來置獄連逮千餘人屯甲士圍其家鉦鼓聲徹晝夜郡人震駭獄不成又遣御史沈畸蕭服姚某來重鞫之甚至州人多閉户或於門隙中窺觀不敢正視識者知其非太平氣象其後遂有建炎兵革之禍方章氏事前城中小兒所在羣聚而唱云沈逍遥沈逍遥莫知其由已而三御史至南北章本建安人郇公得象之裔後徙居吳申公子厚家州南莊敏公質夫家州北兩第屹然相望甲於郡城人號為南北章祥符中丁晉公自參知政事拜平江軍節度使知昇州時建節鉞者出入必盛其儀度既還本鎮鄉人為之改觀公在童齠時嘗從老郁先生學先生居光盪巷至是首入陋巷詣先生之居拜於牀下先生惶懼大聲呼之曰拜殺老夫矣既坐話舊極欵密且云小年狹劣荷先生教誨痛加榎楚使某得成立者皆先生之賜也不數月郁先生果卒公為辦棺歛葬埋之物甚厚吳人至今以為美談中吳紀聞姑蘇刺史有若范文正公富監皆牧鄉郡葉少則先典州既而請老其子道卿以本路漕節來侍其孫公東熙寧中又為郡守蔣希魯再牧是邦遂歸休於此盛文肅胡武平趙升平後至政府皆盛事也閶門外通衢有食肆人呼為張手美家其肆通連六七間水陸南北之物畢具隨需而供雖坐列十客人各異品亦唾手取辦每節則専賣一物遍京輻輳以不得為不足縛木成欄傾錢其中至髙丈餘先一日開説來者不拒號曰澆店元少保絳少時嘗夢人告之曰異日當為翰林學士須兄弟數人同在院絳寤思自素無兄弟疑夢為不然熙寧中絳除學士同時先後入院者有韓維持國陳繹和叔鄧綰文約楊繪元素并絳五人名皆從系始悟弟兄之兆夢溪筆談范文正公遣子堯夫到姑蘇搬麥五百斛堯夫時尚少既還舟次丹陽見石曼卿問寄此久何如曼卿曰三喪在淺土欲葬之而北婦無可謀者堯夫以所載舟麥付之單騎自長蘆捷徑而歸到家拜起倚立久之文正曰東吳見故舊乎曰曼卿為三䘮未舉留滯丹陽時無郭元振莫可告者文正曰何不以麥舟與之堯夫曰已與之矣言行拾遺蘇仲豫言蔣頴叔之為江淮發運也其才智有餘人莫能欺漕運絡繹蔣吳人諳知風水嘗於所居公署前立一旗曰占風旗使人日候之置籍焉令諸漕綱日程亦各記風之便逆蓋雷雨雪雹霧露等有或不均風則天下皆一每有運至取其日程厯以合之責其稽緩者綱吏畏服蔣去占風旗遂廢矣陳宜中之誅韓震也其部曲李世明挈其妻孥與士卒千餘人逃至平望殺巡檢縱兵放火殺掠人民由小長橋透出許市時潛説友守郡不能捕但令人備之而已遂走入太湖由宜興至建康降於元其軍初在江下殺人甚多殿司兵在吳江亦不能敵多為其擁入江水死者甚多及劉師勇復常州世明等出戰甚力韓震者蜀將韓宣之子為賈似道腹心魯港敗震主遷幸議陳宜中等不從乃於湖上放砲謀奉三宫入廣故宜中誘而誅之出雜記崑山周煥卿與張子韶侍郎為布衣交煥卿有母喪不能舉及妹未嫁子韶在貶所専价賫書并銀三鋌錢二十五千以助之其書見龔氏紀聞趙宛丘官至財賦副總管公委至吳吳固其辟掾宛丘因訪其鄰舊戒其僕曰汝至人家須鞠躬屏氣扣門問人有無汝但曰前路吏趙天錫慎毋曰趙總管視自眩顯者有間矣郭仲威出於冦盜號郭大力自荼毒平江之後為真揚鎮撫使在郡復不悛劉光世為淮浙宣撫置司京口遣其將王徳擒至麾下縛送行在詔斬於平江市以謝百姓出揮麈録宋鑑淳祐間陳公振字震亨居吳門無子有同姓曰昌世者為人端慤因延之家塾嘗從容與言命繼之事且託之訪厯久未有所啓問之以難其人公振曰得如子者乃佳昌世惶恐不敢當又久之問如初昌世謝未敢輕有所進公振又曰如此則無出於子矣昌世不得辭公振曩嘗夢謁家廟覺有拜於後者顧視之乃昌世也此意遂決昌世以其澤入仕嘗倅三衢攝郡有廉名穆陵聞之擢為郎癸辛襍志慶厯九老㑹都官員外郎徐祐與少卿葉參俱以耆徳告老而歸約為九老㑹晏元獻公杜正獻公皆寄詩贊之晏詩云買得梧宫數畆秋便追黄綺作朋儔杜詩云如何九老人猶少應許東歸伴醉吟時㑹者才五人故杜詩云然十老㑹後更名耆英又名真率元豐間章岵守郡與郡之長老㳺從各飲酒賦詩時米黻禮部以杭州從事罷經由為作叙叙諸老之徳甚詳十老謂太中大夫致仕上䕶軍濮陽縣開國子盧國仲新年八十二奉議郎致仕騎都尉賜緋魚袋黄挺公操年八十二正議大夫充集賢殿修撰致仕上柱國廣平郡開國侯程師孟公闢年七十七朝散大夫致仕上輕車都尉鄭方平道卿年七十三朝議大夫致仕䕶軍清豐縣開國子賜紫金魚袋閭丘孝終公顯年七十三中散大夫知蘇州軍州事河間縣開國伯䕶軍賜紫金魚袋章岵伯望年七十三朝請大夫主管建州武夷山沖佑觀賜紫金魚袋徐九思公謹年七十三朝議大夫致仕上柱國彭城縣開國子賜紫金魚袋徐師閔聖徒年七十二承議郎致仕騎都尉賜緋魚袋崇大年靜之年七十一龍圗閣直學士正議大夫提舉杭州洞霄宫清河郡開國侯張詵樞言年七十十人合七百四十六嵗十老各有詩米黻序之序曰中散大夫河間公清徳傑氣惟時老成髙誼勁節縉紳所仰靜鎮呉國四周星紀威孚恵洽訟庭晨虚迺闢郡齋會九俊老惟内閣清河公神宇軒拔徳章昭融名威四海勲書册府正議大夫廣平公秀實孤映清標邁逺鬰建功利煥於汗青太中大夫濮陽公沖襟爽澈淑質端靖積厚施衍父子顯榮朝議大夫清豐公朝議大夫彭城公朝議大夫徐公朝散大夫鄭公並道韻虚曠内徳淳耀或中臺耆彦或四方膚使出處冇裕終始一徳愷悌利愛布在世間承議郎崇君奉議郎黄君索行㓗修里閈標凖早觧簮紱仕路式瞻咸欣碩德天賜難老貌若遼鶴言為龜鑑於是羽穆觴屢酬雅章迭作叙懐感遇樂時休明顧眄之間如清微薫如太和夫學本美身仕欲行志名節既立榮利後之若諸公積儲淵深未極經緯而不茍於得進退從容千祀可垂後生仰止以襄陽米黻倦㳺四海多出賔僚刻繪既傳屬為序引嗚呼樂道人善君子有之顧黻何堪忝於承命謹序郡人王希黙庫部郎中貽之仲子也為人簡淡無他好惟以對鏡為娛整飭鬚眉終日無倦以杜子美勲業頻看鏡之句作䇿勲亭仍自號曰勲叟收古今善鏡典衣價無難色居長洲結親友之蓄異鏡者數人間日㑹聚樂飲各出鏡傳玩評品抵掌極觀而罷鄉人目曰鏡社希黙又集載籍凡言鏡者成二十卷號僊銅傳云元干文傳夀道延祐元年鄉榜明年廷試賜同進士及第一夕夢入選掛名為長吳正官覺而笑曰我吳人安得作長吳二縣正官必無此理初授官階承事郎昌國州同知益笑前夢之不足徴也次當改選乃授平江路長洲縣尹意為偶然又以為不偶然無何改知烏程轉婺源州知州自以為前任長洲偶與夢符今已升知州安得再為吳縣正官既而調吳江州知州非吳縣也人之官祿事皆前定自己之神先已知之形諸夢寐故相報耳而文傳吳人兩任為本路之官亦希遇也後為翰林待制修遼金宋史贈禮部尚書黄䇿靖康初為兩浙漕使時朝廷籍没諸姦家財被㫖籍朱勔家䇿故遲其徃且聲言於人曰朱節使非他人比其罪不過進花木耳所以遣我者亦以其鄉人故也朱氏遂稍得為徙匿計既抵勔家坐堂上召勔之内外以夤縁而得官者防團之秩凡數十人下而小小者又四五十輩喻之曰汝等得官皆由節使之力今當悉取告身來當為保奏使命出朝廷則皆免偽濫之嫌也衆以為信盡取之來䇿隨其所留估籍畢則盡取諸人告身積薪一焚空之於庭曰朝廷遣我來豈利汝財哉政欲除冒濫之官耳故朱勔之比五賊獨無復綴仕版者蓋䇿之力也䇿仕至工部侍郎子孫多能官者出葉氏筆衡朱沖微時且貧後稍温飽易為藥肆生理益進以行不檢兩受徒刑既多貲交結權要然亦能以濟人為心每春夏之交即出錢米藥物募醫者數人延門問貧者疾者從而賙之又多買敝衣擇市嫗之善縫紉者製衲衣數百當大寒以給凍者其子勔因賂中貴人以花石得近幸時時進奉不絶謂之花石綱凡林園亭館以至墳墓間有一花一木竒怪者輒用黄紙封識不問其家徑取之浙人畏之如虎花綱徑從之地巡尉䕶送遇橋梁之礙舟者則撤以毁之初江淮發運司於真揚楚泗有轉搬倉綱運兵各據地分不相交越勔既進花石遂撥新裝運船充御前綱以載之而以舊者載粮轉搬食遂廢粮運由此不繼禁衛至於乏食朝廷亦不之問也勔之寵日盛父子俱建節鉞即居第創雙節堂畫徽宗御容置於一殿使監司郡守就此以朝朔望勔嘗預宴徽宗親握臂與語勔遂以黄帛纒之與之揖不舉此臂弟姪數人皆結姻帝族夤緣得至顯官者甚衆勔有園極廣植牡丹數千本花時以繒綵為幙帟覆其上每花飾金為牌題其名如是者里所園夫畦丁藝精種植及能疊石為山者朝釋負擔暮紆金紫如是者不可數計園有水閣作九曲路以入春時縱人民婦女逰賞有迷其道者沖設酒食邀之或遺以簪珥之屬人皆惡其醜行一日勔敗檢其家資有黄發勾者素與勔不協既被㫖黎明造其室家人婦女盡驅之出雖閭巷小民之家無敢容納不數日已墟其園所謂牡丹者皆折而為薪勔伏誅竄其家於海島平日受誥身者盡褫之當時有謔詞譏之初勔之葬其父盛飾一女奴兼一僮以殉之僮奴不知其死也忻忻然從柩入壙至靖康末大饑郡人怨毒入骨遂刼其壙而碎其父骨既入壙見骸骨具存猶志之曰此僮奴之骨也出吳中舊事蘇師旦本平江書史韓氏為副戎籍之於㕔韓用事師旦實為腹心韓為知閤門事猶在韓側立侍迨冒節鉞韓則曰皆使相也始乃與之均席由是海内趨朝之士欲造晏門而不得見蘇林子由之孫也師旦以微賤附之為族林遂以兄事之師旦嘗以窘乏求金於韓韓初不知其受諸將之賄動以億萬每輟俸金予之謂其出於真誠及江上諸將致敗而邱公崇為督視廉知敗將之賂師旦尺牘徃來俱存因作書以遺韓韓大怒遂竄師旦於海上嘉定初下所編郡取師旦以韓念已必復召用已而赴市則曰太師亦如是忍耶蓋不知韓之誅已也遂籍其家得金箔金二萬九千二百五十片金錢六十辮馬蹄金一萬五千七百二十兩𤓰子金五斗生金羅漢五百尊各長二尺五寸金酒器六千七百三十兩釵釧金一百四十三片金束帶十二條他物稱是出四朝聞見録元初得江南至元十三年丞相巴延欲漕東南之粟以實京師而罷河漕之艱險乃用大艘沿淮以至山東邊海攢運經時方達而朱清張瑄出焉二人者皆瀕海之民嵗漕各三十萬斛末年殆至三百萬斛而值風濤沈没者嵗不下三五萬計至元二十九年瑄次子文虎以户部尚書領漕事始由海中大洋旬日能達直沽柂工篙師之徒從而紆朱紫者各以百數或交通海外諸畨博易以致巨富大徳七年為吳也先構言遂遭竄殛籍没二家之産當時嘉禾士人金方所作朱張行悲之嘗聞故老云朱清張瑄以盜官蘆販私鹽行刼於海瑄事敗被獲時洪起畏為浙西提刑夜夢録囚十八人内一人化為虎寤而異之明見所解賊徒數與夢合而瑄在其中洪竒其狀特貸其死未幾宋亡而瑄貴顯乃給洪終身以報全䕶之恩瑄目不識丁而書押文卷未嘗握筆但攢三指染硯墨印紙上狀如品字雖巧於作偽者傚之不能瑄之第四妻楊氏者美而悍人罕見其笑故有鐡面之稱瑄嬖而畏之為建第於乗魚橋號四夫人府時兩家第宅遍吳中今朱張巷其故基也抄籍後新提舉司專掌其錢粮其富從可知矣或曰瑄之豪横甚於清有拂其意者則縛而投諸海積惡滅身固無所逃其死出雜記并吳郡續藁元至正十五年行納粟補官之令遣兵部員外劉謙賫空名告身過江南募民補官即任民牧自五品至九品入粟有差而民間一無願者松江知府崔思誠曲承使命集屬縣豪右大姓列庭下不問有無輒施拷掠衆皆抆淚入粟且逼抑使就官惟平江監郡祿實公不為使者所怵乃力爭其不可闔郡得免於徴科崔聞之大慚祿實者字子約唐古人國監生能讀書在官稱廉明最得民心後卒於官出輟耕錄沈右字仲悦郡人年四十無子其妻鄒氏深以為憂一日仲悦買一妾頗有姿色因問其祖父對曰妾范復初之女也父喪家貧母老故至此仲悦惻然謂妻曰乃父吳中名術亦吾故人也吾安忍以為妾乎故人之子當如子視之可也即召其母使擇婿嫁之且備奩具送其行友人髙進道貧不能𦵏者十三喪仲恱乂買地為之安厝呉人至今稱之出輟耕録呉人鄭元字長卿元初其大父為到鈔庫使一日雨有人倉皇走其家來避雨遺一小篋大父收之翌早坐候門外聞人言昨夜汪家府前王某失一篋金葉不記何處其家兄弟遂相忿爭大父聞之則往物色得實以金還王氏大父又每月朔必炷香城隍廟於路拾得一絹囊視之亦黄白物也仍闕還之今其孫長卿從儒兼精醫闕非隂徳之報乎出遂昌耕録至正中呉江富室殷子玉延里儒夏尚忠為塾師有主文葉茂林者嘗干於殷殷不之禮葉以夏不為助言啣之遂與一戍汪齒密謀匿名誣奏以藍黨事朝廷覺其寃差御史史亷之史潛訪數月未得實間宵行至仙里橋聞一人作氣曰一件大事想不明白矣爰詢之曰葉茂林也識之隨訪葉葉已充陶京衛家奴一日縣官酌客於郵亭史紿以丐者故肆逋慢官吏驚而起史即命吏抄案一邑皆駭竟提夏等一干人鞠之無驗令就獄次日再鞠亦無驗乃喻之曰汝等恐為人陷之邪試思之衆不之悟復喻之曰幽有神明吾為汝黙禱乃露香不解衣而寐越三宿夢有五靈神告史曰汪姓者急捕之即寤揭旦取衆出謂之曰神報我矣曽識汪姓人否衆頓悟有汪齒者因誣奏事發彼他郡人將逸去願併力擒來遂追獲史鞠之不伏加以嚴刑乃曰奏詞出吾手而逮謀寔葉茂林也史曰是已令吏徃捕之至京覘葉出入騎從頗盛吏計曰難以法拘拘必匿當見諸途葉見吏色動亟問曰近聞史御史在彼行事曽問及我儂有諸吏詒曰訛言也勿聴相拉登酒樓叙鄉曲酒半一吏潛下樓以公文示肆主曰吾捕此人走則汝當罪肆主大懼即攣之從者走陶聞畏法即面奏捕以下獄吏歸報史連人讞詞復命上勅汪葉二犯擡首熟視之曰此正惡人處以凌遲重罪又勅夏等十餘人擡首曰都是好百姓也俱發寧家皆呼萬嵗踴躍而退於乎此可見髙皇清明之政而監司能體上之命者矣洪武末蘇州知府姚善聞郡有處士王賔招不可嘗詣賔家賔見其騎從在門因語之曰賔有老母在不宜張聲勢以恐之後善造賔門必預下輿徒步至門劇談今古商確政事而退善文章政事擅名一時卒著忠義之節殆亦得賢之助也崑山周夀誼生宋景定厯元至洪武五年年一百十嵗郡守魏觀始行鄉飲酒禮吳縣林文友楊茂亦皆九十餘特位三老人於衆賔之上夀誼後年一百十六嵗而終嘗䝉召見賜酒饌殿上蠲其家丁役周文襄公忱嘗閲一死獄欲活之無路憂形於色使吏抱案讀之背手立聴至一處忽㸃首喜曰幸有此可生遂出其人襍言諸葛靚字仲思在吳於朝堂大㑹孫皓問卿字仲思為何所思對曰在家思孝事君思忠朋友思信如斯而已張𤣥之顧敷俱顧中和外孫少皆和並知之而常謂顧勝於張時張年九嵗顧年七嵗和與俱至寺中見佛湼般像弟子有泣者有不泣者和以問二孫𤣥謂彼不親故不泣敷曰不然當由忘情故不泣不能忘情故泣姑蘇志卷六十
