body:
  text: 姑蘇志卷三十三明王鏊撰古迹古今之在天地間猶旦暮也而古人所遺每為今人所重雖故墟阤隴往往過之為躊躇而不忍去豈非以其廢興存亡有足感邪吳自泰伯迄今其間古迹多矣悉記於篇以備後之考者泰伯城周三里名故吳一名吳城在梅里平墟泰伯既築此城縱民田其中今屬常州無錫縣寰宇記云泰伯城西去無錫縣四十里平墟髙三丈輿地志云吳築城梅里平墟即此地也太公城章祈城並在長洲縣東北章祈疑即􅝄􅖥在今二十二都魚城在吳縣橫山下越來溪西吳王遊姑蘇築以養魚續圖經云吳王控越之地本名吳城方言謂魚為吳故誤稱耳今山之傍有岡隱隱如城又有射臺亦在橫山周益公南歸録云魚城在田間基厚而方其髙二丈博倍之為田百二十畝土極細故久不壞元髙文度谷變陵遷自古今耕人指點説魚城緑波已涸無鷗鷺禾黍離離髙下生苦酒城吳地記云在魚城西南故老云吳王築以釃酒今俗呼為苦酒城髙啓酒城應與酒池通長夜君王在醉中兵入館娃猶未醒越人宜賞釀夫功酒醋城吳地記云在胥門西南三里酒城在壇塘邉一名壇城夫差祭子胥處臨祭勸酒故名酒城城中有石子祥符圖經云在吳縣東南三十五里大江邉一名陌城鴨城在匠門外吳王築以養鴨處東有豨巷畜彘之處雞陂在婁門外吳王畜雞城也又名雞陂墟其東二里有豆園亦闔閭置髙啓吳姬不解報朝盈空養鳴雞滿别城畢竟餘杭西走日五更誰唱出關聲柯城赭城􅝄􅖥城衛王城並在吳縣界舸城在平門外疑即柯城後城堵城並在長洲縣東南數十里堵城疑即赭城今尹山鄉有堵城里伍子胥城糜湖城麗溪城巫欐城漢志越絶書皆云在吳縣後析置長洲縣居巢城在長洲縣按楚有居巢城吳亦有之於義無考然史記云闔閭六年楚使子常囊瓦伐吳吳迎擊之大敗楚軍於豫章取楚之居巢而還或疑此時有為而築城未知是否糜湖西城越宋王城也吳越春秋云平門外有糜王城糜王與越王遙戰越殺糜王因留葬武里城中故名以午日死至今武里午日不舉火今吳江有糜城王廟搖城在長洲縣東南三十八里吳王子居焉後越搖君居之今其地名大姚訛之也越城在胥門外越伐吳吳主在姑蘇越築此城以逼之城猶髣佛在髙文度古意猶堪弔南湖不憚遙闔閭開國地勾踐進兵橋城郭髙低黍英靈旦暮潮蒼茫遺獨立斜日下漁樵鴻城在婁門外故越王城也千城在馬安溪上越千王城也陽城在長洲縣東北其左有陽城湖相城在長洲縣東北五十里相傳子胥初築城時先於此相地嘗土而城之下濕乃止其地因名婁城即崑山故城也圖經云在縣東三百步舊志云吳子壽夢所築張泰詩髙城一望思茫茫湖轉婁江入海長逺市到今無蜀酒古倉何處積吳糧鷗棲淺渚寒蘆靜雁落平疇晚稻香野水間雲吟不盡玉峯西面看斜陽東城在崑山縣東三百步今橋巷猶以東城為名吳志云耕者於東寺後多得古城磚及銅箭鏃武城在崑山縣西北漢書婁縣注云有南武城金城在崑山縣東三里基址猶存也相傳吳王所築度城在崑山縣東南七十里相傳為黃巢所築其傍有度城湖西鹿城在崑山山下有卜將軍廟碑云葬於崑山西鹿城巴城在崑山縣西北十八里其地有巴王墓巴城湖雉城在崑山縣西北十八里今雉城湖即其地也顔縣城瓦浦城並在崑山縣皆古經所載石城在常熟縣北五里吳越春秋云夫差興樂石城吳地志云越獻西施於吳王王擇虞山北麓以石甃城為遊樂之所其地今有石城里越絶書云石城在靈巖山扈城在常熟縣北五里石城東世傳吳王逰樂石城又建離宫扈蹕故名扈城今有扈城村九里城在常熟縣北九里世傳吳王牧馬於此建城以欄馬俗呼欄馬城有洗馬池今存莫城在常熟縣南十二里相傳莫邪鑄劍之處一謂劍城一謂莫邪城今有莫邪大王廟又有莫門塘寰宇記云漢莫寵築以捍海賊者朗城在常熟縣東南鵧城在常熟縣東北十五里尚墅城在常熟縣北十八里金鳳城在常熟縣西北四十里陶城閭城郭城並在常熟縣境塢城在嘉定縣南五十里吳淞江南舊傳吳王所築其基尚存疁城在嘉定縣南門外唐有疁城鄉元時築教場於此得古冢碑石云唐咸通二年莊府君葬於疁城鄉今名疁塘又避吳越王諱改婁塘吳小城白門闔閭所作秦始皇時守宫吏燭燕窟失火燒宫而門樓尚存言公井一名聖井在常熟縣治北一百九十步言公宅傍吳地記云宅有井二傍有洗衣石髙啓寥寥武城宰遺井虞山隂千載汲未竭九仞功應深藝圃自可灌道源誰復尋絃歌聽已歇瓶綆看還沈無為泄弗食惻惻起歎音一瓢樂未改庶幾回也心姑蘇臺一名胥臺在姑蘇山舊圖經云在吳縣西北三十里續圖經云三十五里一名姑蘇一名姑餘史記正義云在吳縣西南三十里橫山西北麓姑蘇山上山水記云闔閭作春夏逰焉又云夫差作臺三年不成積材五年乃成造九曲路髙見三百里勾踐欲伐吳於是作柵楣嬰以白璧鏤以黃金狀如龍蛇獻吳王吳王大悅受以起此臺越絶書云闔廬造九曲路以逰姑胥之臺子胥諫不聽又於臺上别立春宵宫為長夜之飲作天池以泛青龍舟舟中盛致妓樂日與西施為嬉作海靈館館娃閣皆銅溝玉檻飾以珠玊按此則姑蘇臺始於闔閭成於夫差也後越伐吳吳太子友戰敗遂焚其臺唐任公叔登姑蘇臺賦司馬遷世掌天官才稱良史探禹穴之遺迹記吳國之舊軌乃憮然而嘻曰登此姑蘇之墟淹留兮躊躇感斯宇之基為沼而仲雍之祀忽諸我聞周道既衰諸侯狎主中無霸王蠻戎振旅始闔閭以信威繼夫差以極武斜與徑越同壤右以強楚為鄰內有髙臺之築外有逺略之勤積如莽而暴骨亦如讐而視人是以疆埸日駭板築未彌方五載而厥成造中天而特起因纍土以臺髙宛嶽立而山峙或比象於巫廬之峯或倒影於滄浪之水悉人之力以為美觀厚人之澤以為侈靡斯實纍卵於九層夫何見乎三百里野語有之曰川壅則潰月盈而昃善敗由己吉凶何常矧謀主之賜劒若涉川兮無梁以為棲越以求霸卒見豢吳而受殃客自南鄙觀於江濆徘徊舊德惆悵前聞試逰目於寥廓曽是巋然而參雲聽逆虐而翳諫竟麋鹿而為羣髙天放曠平湖泱漭奕奕孤嶼茫茫極浦悲早雁於海風嘯髙鴟於江雨况復關梁坐隔羈旅增愁山木將落汀葭亂秋思美人兮子胥何為懷直道而驟諫遭重昏之見危將漁父以抗迹且垂釣於江湄髙臺既傾夕露沾衣感蒞國之不及冀萊人之與歸者也崔鷃姑蘇臺賦崔子勸學少間與客遊於橫山之下有臺巋然出於羣山荒基峻級髙切雲間荆棘為之蒙翳麋鹿為之徊環余語諸客此何所也客曰子不聞吳都之壯麗乎造姑蘇之髙臺臨四逺而特建此其遺址也余乃倚杖而立喟然而嘆曰蓋聞吳王之築斯臺也受鄰越之貢竭全吳之力千夫山吟萬人道泣三年而聚材五年而有立佩茂苑於長洲帶濬池以朝夕自以為天下之竒觀也而今安在哉神材異木飾巧窮竒黃金之楹白璧之楣龍蛇刻畫燦燦生輝而今安在哉於是與客傴僂而上抵其上之絶嶺快四面之遐覩南望洞庭夫椒之山湖水澄徹其名銷夏灣者吳王避暑之所也北望靈巖館娃之宫廊曰響屧徑曰採香者吳之别館西子之遺蹤也其東吳城射臺巍巍其西胥山九曲之逵至於興樂有城玩華有池走犬有塘蓄雞有陂猶不足以充其欲也又侈斯臺以為娛嬉嗚呼雕楹鏤檻者邱墟之幾也九層百仞者汙池之漸也瑤臺作而夏衰瓊室考而商危章華成而楚衆叛阿房出而秦人離斯喪亂之必然曷吳王之不思也哉方其酌緑􅙩賦珍羞置酒若淮泗積肴如山邱其宴樂固極矣而不知會稽之上飲食嘗膽方焦思而深謀旁籠西山俯視太湖憑髙望逺三百餘里其登覽固廣矣而不知笠澤之畔銜枚仆鼓忽濳軍而夜濟是以橫塘之浦僅通而越來之溪已逼髙下之築未乾而勾踐之城已距於咫尺矣詞未竟客悵然曰已矣乎古往今來邈矣悠哉蒼煙兮滿目舊事兮飛灰幸江山之不改兮後之人當有鑑於遺臺李白蘇臺覽古舊苑荒臺楊桞新菱歌髙唱不勝春只今惟有西江月曽照吳王宫裏人曹鄴吳宫酒未消又宴姑蘇臺美人和淚去半夜閶門開相對正歌舞笑中聞鼓􅎏星散九重門血流十二街一去成萬古臺盡人不回時聞野田中拾得黃金叉李紳越王巧破夫差國來獻黃金重雕刻西施醉舞花艷傾妬月嬌娥恣妖惑姑蘇百尺曉鋪開樓楣盡化黃金臺歌清管咽歡未極越師戈甲浮江來伍胥抉目看吳滅范蠡全身霸西越寂寞千年皆古墟蕭條兩地皆明月靈巖香徑掩禪扉秋草荒涼遍落暉江浦回看鷗鳥沒碧峯斜見鷺鸞飛如今白髮星星滿郤作間官不間散野寺經過懼悔尤公程迫蹙悲秋館吳鄉越國舊淹留草樹煙霞昔遍逰雲外夢魂多感歎不惟惆悵到長洲劉禹錫故國荒臺在前臨震澤波綺羅隨世盡麋鹿占時多築用金鎚力摧因石鼠窠昔年雕輦路唯有採蓮歌許渾宫館遺基輟棹過黍離無限獨悲歌荒臺麋鹿爭新草空苑鳬鷖占淺莎吳岫雨來虛檻冷楚江風急逺帆多可憐國破忠臣死日日東流生白波胡曽吳王恃霸逞雄才貪向姑蘇醉緑醅不覺錢塘江上月一宵西送越兵來劉駕勾踐飲膽曰吳酒香滿杯笙歌入海雲聲自姑蘇來西施舞初罷侍兒整金叉衆女不敢妬自比天下泥越鼓聲騰騰吳天隔塵埃難將甬東地更學會稽棲霸迹一朝盡草中棠梨開僧皎然古臺不見秋草衰卻憶吳王全盛時千年月照秋草上吳王在時幾回望至今月出君不還世人空對姑蘇山山中精靈安可覩鬼迹人蹤麋鹿聚嬋娟西子傾國容化作寒陵一堆土陳羽憶昔吳王爭霸日歌謠滿路上蘇臺三千宫女看花處人靜臺空花自開羅隱讓髙泰伯開基日賢見延陵復命時未為子孫因底事解崇臺榭為西施楊萬里我亦年來散病身逰人不用避車塵插天孤塔雲中出隔水諸峯雪後新道是逺瞻三百里如何不見六千人吳亡越霸今安在臺下年年花草春盧鉞姑蘇臺下百花洲解語香魂此舊逰巧笑已傾吳子國淺顰又汚范公舟湖山四顧無竒骨王伯俱空等拙謀杯酒酹江應自誓男兒西北有神州潘牥洞仙歌雕簷綺户倚晴空如畫曽是吳王舊臺榭自浣紗人去後落日平蕪行雲斷雨幾見花開花謝凄涼闌干外一簇江山多少圖王共爭霸莫間愁金杯灎對酒當歌歡娛地夢中興亡休話漸倚遍西風晚潮生明月裏鷺鷥背人飛下薩都刺閶門楊桞自春風水殿幽花泣露紅飛絮年年滿城郭行人不見館娃宫野水滿城飛燕子誰家小艇載吳姬姑蘇臺上一尊酒落日昏鴉無限悲張羽荒臺獨上故城西輦路凄涼草木悲廢冢已無金虎卧壞墻時有夜烏啼采香徑斷來麋鹿響屧廊空變黍離欲弔伍員何處所淡煙斜日不堪題髙啓金椎夜築西山土催作髙臺貯歌舞文身澤國構王基郤笑先人獨何苦銅溝玉檻盛繁華幻出峯頭一片霞望處直窮三百里役時應廢幾千家蟠空曲路迷仙仗攀盡瑤梯才到上外繞雕龍宛轉闌中施繡鳳葳㽔帳薰爐長爇鬱金香共道千齡樂未央茂苑月來秋珮冷洞庭雨過夏綃涼當忩衆妓如仙女揚袂迎風欲輕舉人從天上見經過鳥向雲間驚笑語日暮橫塘花盡開捲簾臺上望王來宴舟初自觀漁返獵騎還從射鹿回從登不用持鈹隊自列紅粧侍髙會香傳羅帕進黃柑縷切鸞刀供玉鱠燭光逺落太湖波驚起魚龍出沒多城上烏啼河漢轉此時誰問夜如何管絃嘈嘈聒人耳不聞兵來渡溪水欲攜西子走登舟醉倚畫欄嬌不起瞑目無因到甬東可憐一炬綺羅空獻媚竟墮讐人計賜劒應辜諫士忠客來試問遺宫路物色荒涼總非故牽衣始信不虛言滿地荆榛見零露當年爭奪苦勞機卻把江山付落暉聞説越王臺殿上如今亦有鷓鴣飛沈周姑胥遺事有荒臺今日登臨尚可哀千載苞桑天子棄六宫芳草美人栽南飛鴻雁秋風早西向山川夕照開流水梧桐幾畨夢獨憐公聖不重來郊臺在橫山東麓石湖之上相傳吳僭王號時嘗郊祭於此今壇壝之形尚存虞堪吳王城外拜郊臺山色湖光共繞回終古翠華隨水去何年玉牒為天開斜陽一笛牛羊下細雨千帆雲鳥來忠死佞存隳霸業登臨不盡客興哀館娃宫吳越春秋吳地記皆云閶闔城西有山號硯石在吳縣西三十里上有館娃宫今靈巖寺即其地也王阮賦泛浮玉之北堂得館娃之遺基從先生而逰焉揖夫差而弔之或曰是可唾也奚以弔為哉夫沈湎以喪國固君人之失道然而有鐘鼓者胡可以弗考聞管籥者民喜而相告茍厥妃之當愛惟恐王之不好矣是則女樂亦可少乎必曰夏有末喜商有妲己周有褒娰而吳以西子茍求其故未必專於此也齊有六嬖桓公以興正而不譎聖人稱焉非夫九合一匡之業得仲父以當其任則其一己之內少有以自適者舉不足以害成邪關大夫進夏德豈昏微子得政商豈穢聞蘇公家父並用則烽火豈得妄舉子胥不見戮則吳之離宫别館至於今可存抑夫差之資異在列國亦翹楚一戰而越沮再會而諸侯懼使僅得一中佐置雙翼於猛虎惟自剖其骨鯁而放意於一女敵乘其間無以外禦杯酒之失何足問獨為此邦惜殺士之舉也此士不遭殺夫差不可愚苧羅之姝適足為我娛胡得而竊吾之符榮楯可居適足華吾廬胡足以隳吾之都惟忠良之既誅始猖狂而自如臺兮姑蘇舟兮太湖食兮鱠鱸曲兮棲烏宿兮嬪嬙修明兮夷光二八兮分明捧心兮専房徑兮採香屧兮響廊笑倚兮玉床奈樂兮東方稻蟹種兮不遺爭盟兮黃池無人兮針規有仇兮相窺至德之廟遂為禾黍悉陂池與臺榭倐一變而梵宇入笙歌於海雲令聲鐘而轉鼓儼麋鹿之容與瞰僧儀而觀覩駭越壘以在望奚五戎之閲武松引韻以嗚咽桞顰眉而凝佇山黯黯兮失色水洶洶兮暴怒追此謬於千里本差之於毫釐譬之養生捐其良醫逮疾作於中夜懵藥石之不知志士仁人所為太息於斯焉蓋嘗反覆于此竊謂種蠡亦可哂也勾踐方明舉國以聽十年生聚十年教訓以此衆戰何伐不定何至假負薪之女為是可恥之勝哉始其土城誨淫自君終焉五湖合歡其臣青溪之典不正金谷之義不立悠悠扁舟遂其全璧使之脫鼎中之魚而羣沙頭之鷺返邪溪之蓮而吐洞庭之橘竊謂越之君臣何其陋於此役也越則陋矣吳亦太庸士目既抉夫誰納忠可辜人之亡己其自反而責躬乎公既然雍相與斂容起視四山之中覺蕭蕭兮悲風范成大賦洶西山之南奔勢鬱律其巉空若大敵之在前忽踞虎而跧龍半紫崖而砥平訪館娃之故宫是為逸王之舊逰有墟谷之遺恫焉嗟乎悲哉愎賢胥之忠告巽隂嚭之詖説暗養虎之後患縱處女使脫逮嘗膽之謀成駭疽囊之潰裂蓋自有以賈禍非天為之孽方其銜哀茹痛收淚飲血儼拂士於前庭尅三年而報粵訖甘心之一快夫何初志之英發及其見棲於姑蘇遽雌伏而大壞援宿恩而乞憐或赦圖於臣罪當是之時又何其憊也悼禍福之無門曷今愚而昨賢後千載之嗤點莫不鍾咎於嬋娟固尤物之移人抑猶可得而言蓋嘗觀於若人矣好大而欲速厭常而棄舊狃會稽之得意謂周鼎其唾手闖齊楚以朵頥睨陳蔡而驤首道甚逺而疾驅氣已餒而猶鬬外未寧而內憂東略之而西否阻關河以屯兵撤牆屋而致冦亟歸視其四封蔑一夫之能守是猶螳螂之慕蟬而不知黃雀之議其後也然而蕞爾之旅而衡行四方攻靡堅郛戰無距行事便時利如經乎無人之鄉惜也未聞於大道宜其逸樂而志荒次有臺池宿有嬪嬙左攜修明右撫夷光桀二八以前列咸絶世而浩倡嗟浣紗之彼姝乃獨繫於興亡蕩龍舟之水嬉擷香徑之春芳載夕陽以俱還秉遊燭於夜長灔金鍾之千石倣酒池於舊商歌吳歈而楚舞薦萬夀於君王悵星河之易翻嘉來日之未央錚銅壺之鳴悲爛急烽之森芒慘梧宫之生愁踐桐夢之不祥歘髙陵與深谷委盛麗於蒼茫所謂玉檻銅溝朱簾椒房理鏡之軒響屧之廊杳煙蕪與露蔓紛日暮之牛羊而况於捧心之百媚濯粉之餘粧者哉今則雲雨之巔仙聖是宅硯沼蓴溪琴臺松崛封古蘚於井甃宿暗芳於洞穴木鯨吼以清厲金磬隱其蕭瑟彼方外之徒龜藏而蠖屈者又安知其往古與來今方枯禪而縛律翩鴻影之拂坐見前山之銜日李白風動荷花水殿香姑蘇臺上宴吳王西施醉舞嬌無力笑倚東忩白玉床白居易吳王心日侈服玩盡竒瓌身卧翠羽帳手持紅玉杯冠垂明月珠帶采通天犀行動自矜顧數步一徘徊小人知所好懷寶四方來姦邪得藉手從此幸門開古稱國之寶穀米與賢才今看君王服視之如塵灰伍員諌已死浮尸去不回姑蘇臺下草麋鹿暗生麑劉禹錫宫館貯嬌娃當時意太誇豔傾吳國燼笑入楚王家月殿移椒壁天花代舜華惟餘采香徑一帶繞山斜李嘉祐館娃宫中春已歸闔閭城頭鶯已飛復見花開人又老橫塘寂寂桞依依憶昔吳王在宫闕館娃賣眼看花發舞袖朝歡陌上春歌聲夜怨江邉月古來人事亦猶今莫厭清觴與緑琴獨向西山聊一笑白雲芳草自知心李紳江雲斷續草綿連雲隔秋波草覆煙飄雪荻花鋪漲渚變霜楓葉卷平田雀愁化水喧斜日鴻怨驚風呌暮天因問館娃何所恨破吳紅臉尚開蓮皮日休六首三千雖衣水犀珠半夜夫差國暗屠猶有八人皆二八獨教西子占亡吳一宫花渚漾漣漪婑嫷鴉鬟出繭眉可料坐中歌舞袖便將殘節拂降旗幾多雲榭倚青冥越焰燒來一片平此地最應沾眼血至今春草不勻生江色分明練繞臺戰帆遙隔綺疏開波神自厭荒淫主勾踐樓船穩貼來寶襪香綦碎曉塵亂兵誰惜似花人伯勞應是精靈使猶向殘陽泣暮春豔骨已成蘭麝土宫牆依舊壓層崖弩臺雨壞逄金鏃香徑泥銷露玉叉硯沼只留溪鳥浴屧廊空信野花埋姑蘇麋鹿真間事須為當時一愴懷陸龜蒙綺閣飄香下太湖亂兵侵曉上姑蘇越王大有堪羞處秖把西施賺得吳鄭旦無言下玉墀夜來飛箭滿罘罳越王定指髙樓笑卻見當時金鏤楣半夜娃宫作戰場血腥猶雜宴時香西施不及燒殘蠟猶為君王泣數行素襪雖遮未掩羞越兵猶怕伍員頭吳王恨魄今如此秪合西施灘上逰響屧廊中金玉步采蘭山上綺羅身不知身葬今何處溪月彎彎欲效顰鏤楣消落濯春雨蒼翠無言空斷崖草碧未能忘帝女燕輕猶自識宫叉江山秪有愁容在劒珮應和愧色埋賴有伍員騷思少吳王才免似荆懷殷堯藩吳王愛歌舞日日醉嬋娟見日吹紅燭和煙掃翠鈿徒令勾踐霸不信子胥賢莫問長洲草荒涼無限年于濆館娃宫畔顧國變生嬌妬勾踐膽未嘗夫差心已誤吳亡昔誰在越勝今何處當時二國君一種江邉墓張羽館娃宫中百花開西施曉上姑蘇臺霞裙翠袂當空舉身輕似展凌風羽遙望三江水一杯兩點微茫洞庭樹轉面凝眸未肯回要見君王射麋處城頭落日欲棲鴉下階戲折棠梨花隔岸行人莫偷盼干將莫邪光粲粲西施洞在靈巖山之麓宋之問越女顔如花越王聞浣紗國微不敢寵獻作吳宫娃一行霸勾踐再笑傾夫差一朝還舊都豔妝驚若邪羅隱家國興亡自有時越人何苦進西施西施若解亡吳國越國亡來又是誰秦約岧岧靈巖山鬱鬱松桂林石路轉隂洞覽勝窅且深如何苧羅人傾國恣荒淫山花落笑靨山鳥流好音我來重徘徊屐齒苔蘚侵至今山上月猶能照捧心髙啓廢宫春盡長蒼苔不見羅裙拂地來只恐西施是仙子洞中别自有樓臺玩花池在靈巖山髙啓桃枝兼杏枝春色繞宫池正愛紅繁處還憐緑淨時芳香泛幽沚媚影照清漪垂條看妓折墮蕚見魚吹杯涵明月㵼舟逐綵雲移水流花落盡君王醉不知玩月池在靈巖山硯池在靈巖山髙啓山骨誰鑿破一泓自深黝醉後欲濡毫蜿蜿見科斗陳子貞湛湛冷山骨幽幽抱日光曉吟看雨氣春供汲花香琴臺在靈巖山僧半顛幾彈石土五雲深挑出湖波片月心絃外有聲誰解聽一山春樹曉鶯吟張羽坐鼓朱絃日玉人方入吳於今山月下惟聽夜啼烏吳王井在靈巖山有二一圓一八角猶存羅鄴二首古宫荒井曽平後見説耕人又鑿開拾得玉叉鐫勑字當時恩澤賜誰來含青薜荔隨金甃碧砌磷磷生緑苔莫言數尺無波水曽與此花同照來楊備石甃遺蹤傍古臺一泓寒影鑑光開何人照面金叉落曽見越溪紅粉來髙啓曽開鑑影照宫娃玉手牽絲帶露華今日空山僧自汲一瓶寒供佛前花響屧廊在靈巖山相傳吳王建廊而虛其下令西施與宫人步屧繞之則響故名今靈巖寺圓照塔前小斜廊即其址亦名鳴屧廊王禹稱廊壞空留響屧名為因西子繞廊行可憐伍相終尸諫誰記當時曳履聲楊備步步香翻羅襪塵粉紅花豔滿宫春傾城一笑無遺迹不見長廊響屧人髙啓廊虛應屧鳴響細識腰輕誰道吳強國唯銷舉足傾苔間滅古迹月下歇餘聲此夕人空聽山僧曳履行梧桐園在吳宫吳王夫差園也樂府云梧宫秋吳王愁髙啓桐花香桐葉冷生宫園覆宫井雨滴夜風驚秋鳳不來吳王愁周南老碧團宫園樹曽宿朝陽鳳花開襲香霏葉密棲纎蓊雨雜璫珮聲風生金石弄初秋一葉零深宫愁已動前園忽橫生怪入夫差夢知匪梁棟材盲僮斯俑從採香徑在香山傍吳王種香於香山使美人泛舟於溪以採之今自靈巖山南望一水直如矢故俗又名箭涇楊備館娃南面即香山畫舸爭浮日往還翠蓋風翻紅袖影芙蓉一路照波間髙啓晨妝出采芳零露濕紅裳種徙山中品熏傳海外方抱筐歸蕙徑焚鼎薦蘭堂未足娛君寢西施體自香徐賁箭涇清溪無縈回西望渺何極岸直形如剡波迅勢如射飛鷗訝流羽亂雨疑鳴鏑天狼不敢渡澤兒應當匿我志弧矢間一覽如中的香水溪在吳故宫中俗云西施浴處一云吳王宫人洗粧於此故又呼為脂粉塘古詩云安得香水泉濯郎衣上塵即此髙啓粉䀶凝水春溶溶暖香流出銅溝宫月明曽照美人浴影與荷花相間紅玉肌羞露誰能見只有鴛鴦窺半面絳紗圍掩怯新涼歸卧芙蓉池上殿空洗鉛妝不洗妖坐傾人國幾良宵驪山更有湯泉在千古愁魂一種銷周南老吳宫香水溪俗傳脂粉塘暖波浮漲膩晴渚泛紅芳美人曽此浴魂銷水猶香可憐清冷泉照此妖冶粧不濯郎衣塵孰比華清湯只今開寶林曹溪源更長越來溪在楞伽山東南與石湖通北至橫塘相傳越侵吳自此入故名上有越城雉堞宛然溪上有越城橋范成大西風初入小溪帆旋織波紋皺淺藍行入閙荷無水面紅蓮沉醉白蓮酣一川新漲尉秋光挂起蓬窗受晚涼楊栁無窮蟬不斷好風將夢過橫塘飯後茶前困思生水寬風穩信篙撑不知浪打船頭響聽作淩波解作聲髙文度黃池盟會井蛙尊同列諸侯氣已吞忽報鄰兵搗空穴已隨溪水入吳門僧半顛九關風月醉傾城歌笑聲中有甲兵卻是吳王自亡國枉教溪受越來名髙啓溪上山不改溪邉臺已傾越兵來處路流水尚哀聲昨日荷花生今朝菱葉死亡國不知誰空令怨溪水採蓮涇在郡城東南運河之陽今尚可通舟兩岸皆民居而間有蔬圃曠地即種蓮舊迹也上有採蓮涇橋髙啓青房戢多子採得儂心喜今夜水風涼君王宿船裏行處緑雪迷歌聲一道齊回頭調越女何似若邪溪周南老採蓮蓮有涇涇帶城西南美人掉輕橈花深采芳潭香風飄翠舉明粧照紅酣摘鮮駢紫菂顧影墮瑤簮藕絲長不斷君情短何慙食甘心死苦君樂非所堪長洲苑圖經云在縣西南七十里孟康曰以江水洲為苑韋昭云長洲在吳縣東枚乘説吳王濞云漢修治上林雜以離宫佳麗玩好圈守禽獸不如長洲之苑則知劉濞時嗣葺吳苑其盛如此白居易茂苑綺羅佳麗地女湖桃李豔陽時心奴已死容顔老後輩風流是阿誰春入長洲草又生鷓鴣飛起少人行草深不辨娃宫處夜夜蘇臺空月明溫庭筠錦雉雙飛梅結子平春逺緑忩中起吳江淡水畫簾空三尺屏風隔千里小苑有門紅扇開天絲舞蝶共徘徊綺户雕檻長如此韶光嵗嵗如歸來徐凝吳王上國長洲苑翠黛寒江一道斜傷見摧殘舊宫樹美人曽插九枝花許渾香徑小船通菱歌繞故宫魚沈秋水靜鳥宿暮山空荷葉橋邉雨蘆花海上風歸心無處託髙枕畫屏中郎士元草深那可訪地久但相傳散漫三秋雨迹蕪萬里煙都迷采蘭處強記館娃年客有遊吳者臨風思渺然劉滄野燒空原盡荻灰吳王此地有樓臺千年事往人何在半夜月明潮自來白鳥影從江樹沒清猿聲入楚雲哀停車日晚薦蘋藻風靜寒塘花正開孫逖吳王初鼎峙羽獵騁雄才輦道閶門出軍容茂苑來山從列陳轉江自繞村回劒騎緣汀入旌門隔嶼開合離分若電馳逐隘成雷勝地虞人守歸舟漢女陪可憐夷漫處猶在洞庭隈山靜吟猿父城空應雉媒戎行委喬木馬迹盡黃埃攬涕問遺老繁華安在哉趙嘏扁舟殊不繫浩蕩路才分范蠡湖中樹吳王苑外雲悲心人望月獨夜雁離羣明發還驅馬關城見日曛髙啓中國久無伯闔閭思騁功講搜開别苑訓武出離宫宰嚭應參乘巫臣實御戎鼗鳴深谷應置掩廣場空逺曳捎雲斾髙彎射月弓三驅儀已畢七伐步還同甲騎從輿後蛾眉侍幄中煮胎須紫豹腝掌得玄熊樂事方難極英圖忽易窮城迷歌黍客地屬采蕘僮輦道崩秋雨旗門失晚風犬亡㕙肆狡人去雉爭雄草樹迎蕭索湖山罷鬱䓤猶疑見獵火寒燒夜深紅美女宫越絶書云美女宫夫差所作土城周五百九十步勾踐嘗進美女西施鄭旦居之吳宫在長洲苑東南五十里相傳吳王别宫南宫在吳縣界亦吳王離宫白居易淡紅花帔淺檀娥睡眼初開似剪波坐對珠籠間理曲琵琶鸚鵡語相和一入吳王殿無人覩翠娥臺髙時貯舞宫靜夜聞歌半露胸如雪斜回眼似波妍媸各有分誰敢妬恩多李商隱茂苑城如畫閶門瓦欲流還依水光殿更起月華樓侵夜鸞開鏡迎冬雉獻裘從臣皆半醉天子正無愁龍檻沈沈水殿清禁門深掩斷人聲吳王宴罷滿宫醉日暮水漂花出城儲嗣宗荒臺荆棘多忠諫事如何細草迷宫巷間花誤綺羅前溪徒自緑子夜不聞歌悵望清秋暮悠悠東去波亂烏啞啞飛復啼城頭晨夕宫中棲吳王别殿繞江水後宫不開美人死曹鄴吳宫城闕髙龍鳳遙相倚四面鏗鼓鐘中央列羅綺春風時一來蘭麝聞數里三度月明落青城醉不起江頭鐵劒鳴玉坐成荒壘適來歌舞處未知身是鬼張籍吳宫四面秋江水江清露白芙蓉死吳王醉後欲更衣座上美人嬌不起宫中千門復萬户君恩反覆誰能數君心與妾既不同徒向君前作歌舞茱萸滿宫紅實垂秋風嫋嫋生繁枝姑蘇臺上夕宴罷他人侍寢還獨歸白日在天光在地君今那得長相棄衛萬君不見吳王宫闕臨江起不捲珠簾見江水曉氣晴來雙闕間潮聲夜落千門裏勾踐城中非舊春姑蘇臺下起黃塵秪今唯有西江月曽照吳王宫裏人張祐日下苑西宫花飄香徑紅玉叉斜白燕羅帶弄青蟲皓齒初含雪柔枝欲斷風可憐傾國色誰信女為戎孟遲越女歌長君且聽芙蓉花香水邉城豈知一日終非主猶自如今有燕聲杜牧越兵驅綺羅越女唱吳歌宫盡鳥聲少臺荒麋迹多茱萸垂曉露菡萏落秋波無遣君王醉滿城嚬翠娥香徑繞吳宫千帆落照中鶴鳴山苦雨魚躍水多風城帶晚莎緑池連秋蓼紅當年國門外誰信伍員忠劉滄吳苑荒涼故國名吳山月上照江明殘春碧樹自留影半夜子規何處聲蘆葉長侵洲渚暗蘋花開盡水煙平經過此地千年恨荏苒東風露色清貫休夫差昏暗伯圖傾千古凄涼地不靈妖豔恩餘宫露濁忠臣心苦海山青蕭條陵隴侵寒水倣佛樓臺出杳冥此是前車况非逺六朝何處不星星錦帆涇即舊子城壕也世傳吳王嘗作錦帆以逰故名在大街西貫樂橋南北市直抵報恩寺髙啓水繞荒城栁半枯錦帆去後故宫蕪窮奢畢竟輸漁父長保秋風一幅蒲夏駕湖在吳縣西城下吳王避暑駕逰於此故名今城下猶存外濠有灣亦名夏駕連運河而水浸廣舊産菱芡今多堙為民居其半在城內者為民田惟二水匯處猶稱舊名楊備湖面波光鑑影開緑荷紅芰繞樓臺可憐風物還依舊曽見吳王六馬來鄭元祐吳王城西夏駕湖至今草木青扶疏想見吳王來避暑後宫濯濯千芙蕖酣紅矗翠總殊絶誰似西施天下無西施醉憑水忩睡曼衍魚龍張水戲月上湖頭王醉醒歸舟蓮炬繁春星不知左擁右扇者日夜窺吳不暫捨女墳湖在吳縣西北吳王葬女處事具冢墓皮日休萬貴千奢已寂寥可憐幽憤為誰嬌須知韓重相思骨直在芙蓉向下銷陸龜蒙水平波淡繞回塘鶴殉人沈萬古傷應是離魂雙不得至今沙上少鴛鴦髙啓月映孤墳近水頭芙蓉還似綺羅秋煙波千古愁難盡因帶韓生别淚流百花洲在西城下胥盤二門之間髙啓吳王在時百花開畫船載樂洲邉來吳王去後百花落歌吹無聞洲寂寞花開花落年年春前後看花應幾人但見枝枝映流水不知片片墮行塵年年風雨荒臺畔日暮黃鸝腸欲斷豈唯世少看花人縱來此地無花看姚廣孝詩水灎接橫塘華多礙舟路波紅晴漾日沙白寒棲鷺緣汀魚網集隔渚菱歌度不見昔逰人風煙自朝暮走狗塘在城西吳王逰獵處也越絶書云闔閭走犬長洲髙啓春堤長春草淺此地吳王曽走犬獵場四面圍畫旗紅炬照輦還宫遲割鮮夕宴誰共食臺上西子非樊姬春苑年來草仍緑韓盧已去多麋鹿君不見漢皇縱狗殊有功逐兔直到烏江東干隧在吳縣西北戰國䇿云越王以散卒三千擒夫差於干隧史記正義云干隧在萬安山西南一里夷亭一名唯亭互見雜志石射堋在石城山有石鼓鼓鳴即有兵又有石馬望如人騎互見山楊維禎周家十圍鼓散落陳倉野猶有夏駕石盤盤鼓之下秦鞭血山骨吳獵焦野火夏鼓達不拔石鳴知者寡父老懼讖言山空石長啞髙啓石射堋張石城石鼓響或發石騎勢欲行倣佛古戰場上有愁雲生餓鴟嘯寒風砉若箭鏑鳴何人作此留山中鳥獸欲過膽盡驚疑是神禹治水時來教鬼射降妖精至今風雨夕猶聽人馬聲嘗聞父老言鼓鳴則有兵方今瘡痍民脫命見太平我願碎其鼓隳其堋一人安四海清自此萬年無戰爭流杯亭在女墳湖西二百步吳地記云闔閭三月三日泛舟逰樂之地華池華林園南城宫石龍皆在長洲縣界闔閭故迹也吳越春秋云華池在平昌里南城宫在長樂里今干將鄉吳地記云華林園在華林里今降林石龍在龍壇里闔閭宫越絶書云在髙平里射臺越絶書云一在華池昌里一在安陽里又吳越春秋云立射臺於安平里任昉述異記吳王射堂柱礎皆是伏龜或云在橫山林屋洞在洞庭西山即道書十大洞天之第九一名左神幽虛之天洞有三門同會一穴一名雨洞一名㿩谷一名丙洞中有石室銀房石鐘石鼓金庭玉柱白芝金沙龍盆魚乳泉石燕有石門名隔凡郡國志云洞有五門東通林屋西達峨眉南接羅浮北連岱嶽東有石樓樓下兩石扣之清越所謂神鉦吳王闔閭使靈威丈人入洞秉燭晝夜行七十日不窮乃返曰初入洞口甚隘傴僂而入約數里忽遇一石室髙可二丈上垂津液內有石床枕硯石几上有素書三卷上於闔閭不識使人問於孔子孔子曰此禹石函文也闔閭復令入經兩旬卻返云不似前也唯上聞風浪聲又有異蟲撓人撲火石燕蝙蝠大如鳥前去不得穴中髙處照不見顛左右多人馬迹婁地記云太湖小山名洞庭純石巉巖木唯松柏山有三穴東北西南二穴一穴不容人有清泉流出面北一穴傴僂才得入穴外石盤礴穴裏如一間堂屋上髙丈餘恆津潤四壁石色青白有鵝管鍾乳南壁開處側肩得入潛行二道北通琅琊東武西通長沙巴陵沈炯林屋館銘夫玄之又玄處衆妙之極可乎不可成道行之致斯蓋寂寥窅冥希微恍惚故非淮南八仙之圖賴卿九井之記至若崑山平圃銀榜相輝蓬閬仙宫金臺崛起南瞰胥臺傍連飛閣桂柱瓊軒日華雲瑞銘曰大道既隱衆聖無門悠悠太極誰見玄根祈年立秦望仙表漢髣佛神靈依稀宫觀峨峨林屋輪奐徘徊庭羅花鳥室靜塵埃皮日休齋心已三日筋骨如煙輕腰下佩金獸手中持火鈴幽塘四百里中有日月精連亘三十六各各為玉京自非心至誠必被神物烹惟余慕大道不能惜微生遂招放曠侣同作幽憂行其門才函丈初若盤礴硎洞氣黑眣睍苔髮紅鬇鬡試足值坎窞低頭避崢嶸攀緣不知倦怪異焉敢驚匍匐一百步稍稍䇿可橫忽然白蝙蝠來撲松炬明人語散澒洞石響髙玲玎腳底龍蛇氣頭上波浪聲有時若服匿逼仄如見繃俄再造平淡豁然逄光晶金堂似鑄出玉座如琢成前有方丈沼凝碧融人清雲漿湛不動瓊露涵而馨潄之恐減算勺之必延齡愁為三官責不敢攜一罌昔云夏后氏於此藏真經刻之以紫琳祕之以丹瓊期之以萬祀守之以百靈焉得彼丈人竊之不加刑石簣一以出左神俄不扃禹書既云得吳國由是傾蘚蓬才半尺中有怪物腥欲去既嚄唶將回又伶俜卻遵舊時道半日出杳冥屨泥惹石髓衣濕沾雲英玄録乏仙骨青文無絳名雖然入隂宫不得朝上清對彼神仙窟自厭濁俗形卻憎造物者遣我騎文星陸龜蒙知名十洞天林屋當第九題之為左神禮之以天后魁惟辟邪輩左右專備守自非方瞳人不敢窺洞口惟君好竒士復嘯忘情友致傘在風林低冠入雲竇中深劇苔井傍坎才藥臼石角忽支頥藤根時束肘初為大幽怖漸見微明透屹若造靈封森如達仙藪嘗聞白芝秀狀與琅花偶又聞紫泉光甘如酌天酒何人能挹嚼餌以代漿糗卻笑探玉符徒勞步雙斗真君不可見焚盥空遲久眷戀玉碣文行行但回首范成大擊水摶風浪雪翻煙消日出見仙村舊知浮玉北堂路今到幽墟三洞門石燕翾飛遮炬火金龍深阻護嵌根寶鐘靈鼓何須扣庭柱宵晨已默存明月灣在西洞庭山消夏灣之東吳王玩月處皮日休曉景淡無際孤舟恣回環試問最幽處號為明月灣半巖翡翠巢望見不可攀栁弱下絲網藤深垂花鬘松癭忽似狖石文或如虦釣壇兩三處苔老星媥斑沙雨幾處霽水禽相向間野人波濤上白屋幽深間曉培橘栽出暮作魚梁還清泉出石砌好樹臨柴關對此老且死不知憂與患好境無往處好處無境刪赧然不自適脈脈當湖山陸龜蒙昔開明月觀秖傷荒墅基今逢明月灣不值三五時擇此二明月洞庭看最竒連山忽中斷逺樹分毫釐周回二十里一片澄風漪見説秋半夜淨無雲物欺兼之星斗藏獨有神仙期初聞鏘鐐銚積漸調參差空中卓羽衛波上停龍螭縱舞玉煙節髙歌碧霜詞清光悄不動萬象寒咿咿此會非俗致無由得旁窺但當乘扁舟酒甕仍相隨或徹三弄笛或成數聮詩自然瑩心骨何用神仙為髙啓木葉秋乍脫霜鴻夜猶飛扁舟弄明月逺度青山磯明月處處有此處月偏好天闊星漢低波寒芰荷老舟去月始出舟回月將沈莫照種種髮但照耿耿心把酒酹水仙容我宿湖裏醉後失清輝西巖曉猿起消夏灣在西洞庭縹眇峰之南灣可十餘里三面皆山繞之獨南面如門闕舊傳吳王避暑處皮日休太湖有曲處其間為兩涯當中數十頃别如一天池號為消夏灣此名無所私赤日莫斜照清風多遙吹沙嶼掃粉墨松竹調塤箎山果紅靺鞨水苔清髬髵木隂厚若瓦巖磴滑如飴我來此逰息夏景方赫曦一坐盤石上肅肅寒生肌小艖或可泛短䇿或可支行驚翠羽起坐見白蓮披斂袖弄輕浪解巾敵涼颸但有水雲見更餘沙禽知京洛往來客暍死緣奔馳此中便可老焉用名利為陸龜蒙霞島焰難泊雲峰竒未收蕭條千里灣獨自清如秋古岸過新雨髙蘿蔭橫流遙風吹蒹葭折處鳴颼颼昔豫守圭竇過於回祿囚日為籧篨從分作祇裯讐願狎寒水怪不封朱轂侯豈知煙浪涯坐可思重裘健若數尺鯉泛然雙白鷗不識號火井孰問名焦丘我本魚鳥家盡室營扁舟遺名復避世消夏還消憂范成大蓼磯楓渚故離宫一曲清漣九里風縱有暑光無著處青山環水水浮空髙啓涼生白苧水雲空湖上曽開避暑宫清簟迹簾人去後漁舟占盡栁隂風練瀆在太湖舊傳吳王所開以練兵皮日休吳王厭得國所玩終不足一上姑蘇臺猶自嫌局促艅艎六宫閙艨衝後軍肅一陳水麝風空中蕩平渌鳥困避錦帆龍跧防鐵軸流蘇惹煙浪羽葆飄巖谷靈境太蹂踐因兹塞林屋空闊嫌太湖崎嶇開練瀆三尋石齒數里穿山腹底淨似金膏礫碎如丹粟波殿鄭旦醉蟾閣西施宿幾轉含煙舟一唱采雲曲不知欄楯上夜有越人鏃君王掩面死嬪御不敢哭豔魄逐波濤荒臺養麋鹿國破瀆亦淺代變草空緑白鳥都不知朝眠還暮浴陸龜蒙越恃君子衆大將壓全吳吳將𣲖天澤以練舟師徒一鏡止千里支流忽然迂蒼奩束洪波坐似馮夷軀戰士百萬輩浮宫三千餘平川盛丁寧絶島分儲胥鳯押半鶴錦扛雜肥胡香煙與殺氣浩浩隨風驅彈射盡髙鳥杯觥醉潛魚山靈恐見鞭水府愁為墟兵利德日削反為讐國屠至今鈎鏃殘尚與泥沙俱照此月倍苦來兹煙亦孤丁魂尚有淚合灑青楓枯髙啓吳越水為國行師利舟戰夫差開此河艅艎試親練十萬凌潮兒材比佽飛健鼓棹激風濤揚舲逐雷電當時意氣盛謂已無勾踐鷗避去沙洲龍愁閉淵殿恃強非伯圖倐忽市朝變臺上失嬌姿泉間掩慙面至今西山月恨浸秋一片猶有網魚人時時得沈箭可盤灣在西洞庭山下洞庭記云吳王逰太湖從此度軍憂艱險難達益增瞻眺曰此亦可盤桓也故名投龍潭在龜山下林屋紀遺云嘉定初民於山下採藻獲吳越王所投金龍玉簡簡以銀製長九寸篆文隱然皆以朱漆填鈒題云太嵗壬戌時宋建隆二年也皮日休龜山下最深惡氣何洋溢涎木爆龍巢腥風卷蛟室曉來林岑靜獰色如怒日氣湧撲炱煤波澄掃純漆下有水君府貝闕光比櫛左右列介臣縱橫守鱗卒月中珠母見煙際楓人出生犀不敢燒水怪恐摧捽時有慕道者作彼投龍術端嚴持碧簡齋戒揮紫筆兼以金蜿蜒投之光焌律琴髙坐赤鯉何許縱仙逸我願與之逰兹焉託靈質陸龜蒙名山潭洞中自古多祕邃君將接神物聊用申祀事鎔金象牙角尺本無不備亦既奉真官因之徇前志持來展明誥敬以投嘉瑞鱗光煥水容日色曉山翠吾皇病秦漢豈獨探怪異所貴風雨時民皆受其賜良田為巨浸汚澤成赤地掌職一不行精靈又何寄惟貪血肉飽但據驪珠睡何必費黃金年年授星使射瀆在楓橋北十里世傳秦始皇嘗射於此故名至今兩岸無回曲又名石瀆蠡口在齊門北又有蠡塘在婁門東相傳范蠡乘舟出五湖於此遣人馳書招文種楊備霸越勳名間世才五湖煙浪一帆開猶防烏喙傷同輩此地復招文種來升月館在帶城橋東烏鵲館在烏鵲橋江楓館在渴烏巷吳國三古館也又二館曰通波曰全吳舊傳館凡八全吳通波龍門臨頓烏鵲升羽升月升月在宋尚存桃夏宫楚春申君所建滸墅在郡西二十五里圖經云秦始皇求吳王劒白虎蹲於丘上遂西走二十五里而失劒不能得地裂為池因名其地曰虎疁至吳越時諱鏐因改云滸墅甪頭即甪里在洞庭西山漢甪里先生所居史記正義太湖中洞庭山西南有祿里村髙啓髙皇本壯士提劒定四方晚為兒女情悲歌起倣徨愛子欲建儲寵姬方侍側顧驚四老人謂已成羽翼大臣豈不諫孰能斡天機彼翁何為者足見人心歸始潛避秦君終出安漢嗣世羅焉能羈舒卷聊自肆我來甪里村如入商顔山紫芝日已老黃鵠何時還斯人神仙徒千載形不滅猶想蒼巖中白頭卧松雪毛公壇在洞庭西山漢劉根得道處也根既成仙身生緑毛人或見之故名今有石壇丹井在神景觀傍皮日休卻上南山路松竹儼如廡松根礙幽徑孱顔不能斧擺屨跨亂雲側巾蹲怪樹三休且半日始到毛公塢兩水合一澗衆崖卻為浦相敵百千載共攂十萬鼓噴散日月精射破神仙府惟愁絶地脈又恐折天柱一窺耳目眩再聽毛髮豎次到鋉丹井井幹翳宿莽下有蘂剛丹勺之百疾愈凝於白獺髓湛似挏馬乳黃露醒齒牙碧粘甘肺腑檜異松復怪枯疏互拄乾蛟一百丈髐然半天舞下有毛公壇壇方不盈畝當時雲龍篆一片苔蘚古時時仙禽來忽忽祥煙聚我愛周息元忽起應明主三誎卻歸來回頭唾圭組伊余何不幸斯人不復覩如何大開口與世爭枯腐將山待夸娥以肉投猰㺄歘坐侵桂隂不知已與午兹地足靈境他年終結宇敢道萬石君輕於一絲縷陸龜蒙古有韓終道授之劉先生身如碧鳳凰羽翼披輕輕先生盛驅役臣伏甲與丁勢可倒五嶽不惟鞭羣靈飄颻駕翔螭白日朝太清空遺古壇在稠疊煙蘿屏逺懷步罡夕列宿森然明四角鎮露獸三層差羽嬰回眸眄七氣運足馳疏星象外真既感區中道俄成邇來向千祀雲嶠空崢嶸石上橘花落石根瑤草青時時白鹿下此外無人行我訪岑寂境自言齋戒精如今君安死魂魄猶羶腥有笈皆緑字有芝皆紫莖相將望瀛島浩蕩凌滄溟范成大松蘿滴翠白晝隂七十二峯中最深緑毛仙翁已仙去惟有石壇留竹塢竹隂掃壇石槎牙漢時風雨生蘚花山中笙鶴尚遺響湖外人煙驚歲華道人眸子照秋色邀我分山築丹室驅丁役甲莫見嬉渴欲飲泉飢餌木張羽方壇蔭竒竹儼彼毛骨秀想見黃眉公時來濯氷溜一往不可得尚問何日又髙啓欲觀漢壇符東上縹眇峰葛花墜寒露夕飲清心胸月出太湖水鶴鳴空澗松真境久寂寥蒼苔閟靈蹤嘗聞緑毛叟變化猶神龍世人豈得見偶許樵夫逢攀險力易疲探玄志難從歸出白雲外空聞仙觀鐘臨頓吳王時嘗逐東夷頓軍於此設宴餉之故名今呼臨頓里其地猶有臨頓橋望亭在吳縣西境吳先主所御亭隋開皇九年置為驛遞唐常州刺史李襲譽改今名庾肩吾亂後經吳御亭御亭一回望風塵千里昏青袍異春草白馬即吳門何人鯁伊洛兵馬亂轘轅輦道同關塞王城似太原休明鼎尚重秉禮國猶存殷牖爻雖賾堯城吏轉尊泣血悲東走橫戈念北奔方馮七廟略誓雪五陵寃人事今如此天道共誰論栁毅井在洞庭東山道傍按小説載毅傳書事或以謂是嶽之洞庭然橘社因在其地至今稱社下死亭灣在閶門外七里漢朱買臣妻既棄其夫而再嫁後見買臣貴恥而自縊故名其處髙啓貧賤衆所棄豈惟愚婦人圭組何重輕能令變交親翁子昔未達妻去恥負薪五十非晚貴不能待終晨一旦謁帝閽還家繡衣新邸吏驚赤綬邦人候朱輪無緣見故夫自殺此水濵誰知孟德耀元在爾東鄰金昌亭在閶門宋景平二年廢少帝為營陽王幽於吳郡徐羡之等遣使弒帝於金昌亭王有勇力不即受制突走出閶門追以門關踣之此云走出閶門則亭當在城內又陸龜蒙謂梁鴻墓在金昌亭下一里恐今城視昔或遷徙耳般若臺在吳縣西二里晉穆侯何準捨宅建之東北有般若橋今呼為朱明寺橋烏夜村在崑山縣晉穆帝何皇后父淮寓此産后之夕有羣烏夜驚於村落自後有烏徹夜鳴必有大赦髙啓荒村烏夜棲忽繞月明啼生得東家女身為萬乘妻至今種髙樹不遣烏飛去居人凡幾家愛聽啼啞啞啼啞啞忽驚怪婦開門向烏拜鬱林石在婁門孫吳時鬱林太守陸績罷政歸官廉無裝舟輕不能道海取石為重世愛其廉號鬱林石吳寬記石之産於吳者竒形怪狀不可盡述良工采之好事者賞之君子則藐之於此有石焉頑然數尺重而不竒蠢而不怪盡山中皆是物也良工棄之好事者藐之君子則賞之豈徒賞之又從而貴之敬之視其物殆與魯璜秦璧等非物也人也蓋當漢末吳郡陸公績仕於孫氏為鬱林太守相傳泛海歸吳舟輕恐覆取巨石為裝蓋其亷如此公家婁門之內臨頓里之北石留民家至今猶存而埋沒土中僅露其背過者猶能指而稱之曰此漢陸公鬱林石也然未有表識之者𢎞治丙辰有司以其古物也且特異舁置察院之側作亭覆之名曰廉石石始僻而通久湮而顯觀者閧然足迹不絶惟昔南中有貪泉焉飲之者見寶貨以兩手攫而懷之物之能移人心如此今之亷石正與此戻自兹以往凡過而視之者其亷士固欣然摩挲愛玩以益勵其操若夫貪者將俯首赧顔趨而過之有不動心而改行者尚得為人類也乎交讓瀆在子城北今堙為民居僅有汚池丈許又有交讓巷白公堤在虎丘山塘白樂天所築越公井在治平寺前小岡上唐廣明元年修井記云隋開皇十年越國公楊素築城穿此井其徑一丈有竒石欄如屏繞上有刻字髙文度甃缺磚欹角已刓瓶羸鮒射不生瀾曽聞大慧無生法甘露瓶中滴滴寒丹井在虞山南嶺下宋濓銘海虞有虞山梁天監初漢天師十二代孫張道裕來隱其下建招真之治鑿丹井焉宋淳熙中道士李正則浚井得藏丹石緘啓之化為雙紅鴿飛入尚湖至今湖中丹光煜煜然邇年井且廢莫知其所周尊師玄真窮日力尋獲之重加以甓搆亭覆上時皇明洪武元年也仙家鍊丹必以井故名山多有之其在今海虞者舊廢而新治豈玄學復興之徴歟銘曰太隂委精自天一融而為液養萬物神丹浴之赤如日有夫玄巾發我室雙禽衝霞飛翐翐靈泉重噴甘逾蜜飲焉夀與天地畢雪井在虞山乾元宫宋申元道搆庵以居山削無水一日大雪惟山坳不積浚之得美泉因名初元道未作庵時嘗受其師語云無雪則開後既悟而開井互見寺觀洗馬池在府學之南重玄寺藥圃唐末僧元達年踰八十好種名藥凡取種者多致自天台四明包山勾曲叢萃紛糅各可指名皮日休嘗訪之為賦詩皮日休雨滌煙鋤傴僂賫紺芽紅甲兩三畦藥名卻笑桐君少年紀翻嫌竹祖低白石靜敲蒸术火清泉間洗種花泥怪來昨日休持鉢一尺雕胡似掌齊香蔓蒙籠覆若邪檜煙杉露濕袈裟石盆換水撈松葉竹徑遷牀避笋芽藜杖移時挑細藥銅瓶盡日灌幽花支公謾道憐神駿不及今朝種一麻石幢在郡城北數里唐徐浩書郡守陳師錫徙置府第鄉人夜過河上者多見鬼物乃相與請於州復置舊處其怪遂絶睡龍灣在吳江縣東南五十里黃家溪相傳宋髙宗南渡時駐蹕於此有泉湧出因名仙人洞在吳江東門仙里橋下深黑莫測俗傳此洞通太湖約七十里可出林屋洞宋陳昉為仙從此去虎丘寺古杉在殿前相傳為晉王珉所植唐末猶在形狀甚怪不可圖畫皮日休種日應逢晉枯來必自隋鰐狂將立處螭鬭未開時卓犖擲搶幹義牙束戟枝初驚蟉篆活復訝獝狂癡徑質如堯瘦貞容學舜黴勢能擒土伯醜可駭山祇虎爪拏巖穩虯身脫浪欹槎頭秃似刷枿嘴利於錐突兀方相脛鱗皴夏氏胝根應藏鬼血柯欲漏龍漦吻似神屠怒呀如猰㺄飢杇癰難可吮枯腫不堪治一炷玄雲拔三尋黑矟竒狼頭勃窣豎蠆尾掘攣垂目燥那逢爟心開豈中鈹任苔為疥癬從蠧作瘡痍品格齊遼鶴年齡等寶龜將懷縮地力欲負拔山姿未倒防風骨初僵負二尸漆書明古本鐵室抗全師碨礧還無極伶俜又莫持堅應敵駿骨文定寫甝皮蟠屈愁凌剎騰驤恐攫池搶煙寒嶱􅙙披蔦靜褷褵威仰誠難識勾芒恐不知好燒胡律看堪共達多期寡色諸芳笑無聲衆籟疑終添八柱位未要一繩維盡日來惟我當春玩更誰他年如入用直搆太平基陸龜蒙衆木盡相遺孤芳獨任竒插天形硉兀當殿勢佹危恐是夸娥怒教臨嶻嶭衰節穿開耳目根癭坐熊羆世只論榮落人誰問等差有巔從日上無葉與秋欺虎搏應難動雕蹲不敢遲戰鋒新缺燒岸黑黝黧鬬死龍骸雜爭奔鹿角差肢銷洪水腦稜聳梵天眉磔索珊瑚湧森嚴獬豸窺向空分犖指衝浪出鯨鬐楊僕船橦存蚩尤陳纛隳下連金粟固髙用鐵菱披挺若苻堅捶浮於祖納椎崢嶸驚露鶴䟐趚閡雲螭傍宇將格筆芝壓撑霄欲抵隵背交蟲臂挶相向鶻拳追如猶立階干卓未麾鬼神應暗畫風雨恐潛移已覺寒松伏偏宜后土疲好邀清嘯傲堪映古茅茨林大應容蝎年深必孕夔後凋依佛氏初植必僧彌擁腫煩莊辨槎牙費庾詞詠多靈府困搜苦化權卑類既區中寡朋當物外推蟠桃標日域珠草侍仙墀真宰誠求夢春工幸可醫若能噓嶰竹猶足動華滋白公檜唐白樂天手植在州宅後池光亭前水中政和初已稿瘁髙不滿二丈後為朱勔取獻京師死道中乃以他檜易之禁中不知也七星檜在常熟致道觀梁天監中所植竒古特甚李坦之梁人植檜虛壇下宛若魁衡列太空方士靈旗布玄武神君寶劒化蒼龍傍枝旋斡東西指一氣周回上下通肯學秦朝老松樹屈身甘受大夫封古松在天平山獅子巖下自地崛起甚怪正中一幹聳拔如幢延袤二畝號眠松張即之書卧雲二字扁之云范文正讀書處也髙啓龍門西岡魏公祠祠前有松多古枝長身蜿蜒橫數畝巨石作枕相撑搘春泥半封朽死骨凍蘚畫裂皴生皮無心昻聳上霄漢偃仰獨向荒山陲蟄雷破嶽撼不動千載一夢醒何遲正如卧龍未起日深意有待風雲期太湖月出照夜魄天峯雪積埋寒姿濤聲時吼若鼾息野老驚起山僧疑左伸右屈多異態天自出巧非人為畫師安能把筆寫樵子豈敢操斤窺杜陵枯柟已憔悴蜀相老柏非瑰竒何如此樹怪且夀呵衛定想煩靈祇不知已閲幾人代遊客過盡今存誰明堂屢興不見取得全正愛同支離我嘗來觀忍遽反醉坐其上高吟詩葛陂笻竹亦騰化神物終去可久羈何當一叱使飛起載我萬里遊天池他年還訪舊城郭正是白鶴歸來時吳寬盤盤蒸山麓側徑頻折旋山人引我去云有長松眠石磴被蔓草攝衣步相連果然見竒樹如神龍蜿蜒鱗甲生滿身仍怪鬐鬛全恍若出巨壑疑將赴深淵未學擾龍術卻立不敢前天風谷口起繞視惟茫然枝幹既屈曲不中棟與椽兹山非社櫟亦復全天年傍有短石垣制作良且堅四垜屹不動密纍皆古甎斷裂蒼蘚間有碑昔人鐫銘文已磨滅篆書冠其顛荒山少居民始知徐公阡摩挲發長歎助我松聲圓草棘莫剪除應乏雲仍賢旭日照松下同之弔重泉姑蘇志卷三十三
