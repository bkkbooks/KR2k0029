body:
  text: 姑蘇志卷四十二明王鏊撰宦迹六申公巫臣楚大夫也亡在晉而使於吳教吳以乘車射御驅侵之法使之叛楚置其子狐庸以為行人吳用其術以伐巢取駕克棘入州來蠻夷屬楚者吳盡取之後狐庸聘於晉趙文子問曰延州來季子其果立乎巢隕諸樊閽殺戴吳天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立孫武齊人也以兵法見吳王闔閭闔閭曰可試以婦人勒兵乎曰可乃出宫中美人百八十人孫武分為二隊以王寵姫二人為隊長使持戟令曰前則視心左視左手右視右手後則視背婦人曰諾乃設鈇鉞三令五申之於是鼓之右婦人大笑孫武曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫武曰約束申令既明而不如法者吏士之罪乃令斬二隊長王觀見趣使令止之孫武曰臣已受命為將將在軍君命有所不受遂斬二隊長以徇用其次為隊長復鼓之左右前後跪起皆中規矩繩墨無譁孫武使報王曰兵已整齊維王所用之雖赴水火可也王曰將軍罷休寡人不願觀於是王卒以孫武為將破楚入郢威齊晉以顯於諸侯武之力也伍子胥楚人也名貟其父曰奢兄曰尚費無忌讒奢於平王王囚奢使謂之曰致汝二子則生不然則死奢曰尚為人仁必來員剛戾忍詬能成大事彼見求之其勢并禽必不來使者往員謂尚曰楚召我兄弟非欲生我父也恐脫後生患耳到則俱死何益尚不聽就執員乃奔宋及鄭更奔吳到昭關關欲執之貟脫走至江江上漁父急渡之既渡貟解劒謝父父不受曰楚法得子胥者賜粟五萬爵執圭豈徒百金劒耶貟去乞食至吳因公子光以見王僚説以破楚光沮之貟知光有內志退耕於野後光欲圗僚貟乃進専諸於光以弒僚光立召為行人貟請為三師以肄楚楚出則歸楚歸則出俟楚敝而後以三師乘之王從之三年貟將兵伐楚六年楚伐吳吳使貟迎擊破之於豫章取居巢九年又伐楚五戰至郢昭王出奔初貟亡謂申包胥曰我必覆楚包胥曰我必存之及貟入郢求昭王已出奔乃掘平王墓鞭其尸三百包胥使人諭解貟貟曰吾日暮塗逺故倒行而逆施之也時吳用貟謀破楚威齊晉服越人後越敗吳闔閭及夫差立敗越越王句踐乃厚遺吳請委國為臣貟諫不聽吳伐齊貟又諫亦不聽既而大敗齊師益疏貟後四年越王重寶賂太宰嚭嚭日夜為言於吳王貟諫曰越在腹心今得志於齊猶獲石田無所用之願釋齊而先越又不聽使之於齊貟臨行謂其子曰吾數諫王不用今吳亡矣汝與俱亡無益乃屬之齊鮑牧而還報吳嚭讒於王曰員恨計不用常怏怏怨望請早圗之王曰微子之言吾亦疑之乃使人賜貟屬鏤之劒以死貟告其舍人曰樹吾墓上以梓令可以為器抉吾目縣東門之上以觀越冦之入滅吳也乃自剄死王取其尸盛以鴟夷革浮之江中吳人憐之為立祠於江上命曰胥山黃歇楚人也遊學博聞事頃襄王王卒考烈王即位以為相封春申君賜淮北地十二縣後十五嵗歇請獻淮北地而封於江東王許之歇因城故吳墟以自為都邑其子為假君王卒李園使人刺殺歇滅其家劉牢之字道堅彭城人孫恩之亂都督吳郡諸軍事使參軍劉裕討平之詳見平亂條王允之字深猷舒之子也蘇峻之亂督護吳郡義興晉陵三郡征討軍事賊平以功封彭城縣侯詳平亂條周山圗字季寂義興人有氣幹仕宋為吳郡晉陵坊郡隊主元嘉中以功加鎮軍將軍武帝時轉黃門郎領羽林西廂直衛劉晏字士安南華人唐玄宗封泰山晏始八嵗獻頌行在帝竒其幼命張説試之曰邦瑞也即授太子正字公卿邀請旁午號神童名震一時天寶中纍調夏令舉賢良方正補溫令再遷侍御史祿山亂辟地襄陽永王璘署晏右職固辭詔拜度支郎中兼侍御史領江淮租庸事晏至吳郡而璘反乃與採訪使李希言謀拒之希言假晏守餘杭希言戰不利走依晏晏為陳可守計因發戰兵堅壁會王敗欲轉略州縣聞晏有備遂自晉陵西走晏終不言功召拜彭原太守纍官吏部尚書同中書門下平章事閻濟美貞元末繇婺州刺史為福建觀察使徙浙西為治簡易居鎮未嘗增常賦李德裕字文饒栖筠孫吉甫子也卓犖有大節以蔭補校書郎拜監察御史穆宗即位擢翰林學士李逢吉以舊怨擯之出為蘇州刺史浙西觀察使南方信機巫雖父母癘疾子棄不敢養德裕擇長老諭以孝慈大義使歸相曉勑違約者顯置以法惡俗大變又按屬州非經祠者毁千餘所撤私邑山房千四百舍冦無所廋蔽詔褒揚之敬宗立詔浙西上脂盝妝具德裕奏度銀二萬三千兩金百三十兩物非土産雖力營索尚恐不逮願宰相議何以俾臣不違詔旨軍興不疲人不斂怨則前敕後詔咸可遵承又詔索盤絛繚綾千匹復奏文彩怪麗唯乘輿當御今廣用千匹臣所未喻願裁賜節減則海隅蒼生畢受賜矣優詔為停元和後徐州王智興紿言天子誕月築壇泗州度人以資福德裕劾智興募願度人輸錢二千不復勘詰普加髠落自淮而右有三丁男則一祝髮規影徭賦所度無算臣聞度江日數百蘇常齊民十固八九若不禁遏則至誕月江淮失丁男六十萬不為細變詔禁止德裕三在浙西出入十年後為中書門下平章事封贊皇伯改封衛國公性孤峭明辨有文采善為文章雖至大位猶不去書生平所論著多行於世杜審權字殷衡如晦六世孫也第進士辟浙西幕府舉拔萃中為右拾遺宣宗時入翰林為學士纍遷兵部侍郎學士承旨懿宗立進同中書門下平章事再遷門下侍郎出為鎮海軍節度使孫承祐錢塘人吳越王錢俶納其姊為妃因授要職國事無不領轄時稱為孫總監開寶中詔光祿大夫檢校太保鎮東鎮海等軍行營司馬俶又私署中吳軍節度七年王師渡江詔俶攻常潤承祐從俶克常州功居多八年詔改中吳軍直授承祐節度任中正字慶之濟隂人通判大名府轉運使陳緯徙陜西舉以自代太宗曰朕自知之召為祕書丞江南轉運副使擢監察御史兩浙轉運使民飢中正不俟詔發廪賑之纍遷禮部尚書卒諡康懿中正軀幹頎特副使江南時帝特賜大笏仍取長緋衣賜之丁守節晉公謂之祖陳贊明太子中允之竒之祖范夢齡文正公仲淹之曾祖謝崇禮太子賓客濤之父錢元璙父子節度中吳時四人皆為節度推官其子孫皆至大官邢昺字叔明濟隂人太平興國初舉五經廷試擢九經及第歷官右諫議大夫國子祭酒咸平二年為翰林侍講學士轉淮南兩浙巡撫使終禮部尚書胡則字子正永康人果敢有材氣以進士起家歷官憲州録事參軍時靈夏用兵則以邉餉乏入奏太宗因問邉䇿奏對稱旨上顧左右曰州縣豈乏人命記姓名後以太常博士提舉兩浙𣙜茶侍其曙字景升舉進士不第咸平間以閣門秪候為蘇杭湖秀等州都巡檢遷左侍禁領東西排岸司祥符中纍遷西京作坊使惠州刺史知桂滑鄆三州曙沈敏有幹略善論利害事朝廷知其人數任使之姚鉉字寶之合肥人太平興國中進士甲科歷京西河東京東轉運使徙兩浙路鉉雋爽頗尚氣薛映知杭州與之不協事多矛盾托鉉罪數條以聞詔使劾之當奪一官特除名貶連州文學大中祥符五年會赦後以舒州團練副使卒鉉文辭敏麗善筆札藏書至富多有異本雖被竄斥猶傭夫荷擔以自隨有集二十卷及編唐文粹百卷陳堯佐字希元閬中人太子少師省華仲子歷知四縣纍遷開封推官言事忤旨降通判潮州召直史館知夀州提點開封府界事後為兩浙轉運副使徙京西轉運使趙賀字餘慶封丘人真宗時纍遷尚書工部郎中提舉諸司庫務為江淮制置發運使蘇州太湖塘岸壞及並海支渠多湮廢水侵民田詔賀與兩浙轉運使徐奭兼領其事賀等伐石築隄浚積潦自吳江東赴海民歸占田嵗出苗租甚多終知夀州假少連字希逸開封人舉服勤詞學歷官三司度支判官出為兩浙轉運副使舊使者所至郡縣索簿書不暇殫閲往往委之吏胥吏胥顧為竒貨少連命郡縣上簿書悉緘識指取一二自閲擲其非是者按之餘不及閲者全緘識以還由是吏不能為姦而州縣簿書莫敢不治部吏有過召詰曰聞子所為若此有諸有當告我我容汝自新茍以為無吾不使善人被謗即為汝辨明矣吏不能欺皆以實對少連每得其情諄諄戒飭使去後有能改者猶保任之徙使淮南纍遷龍圗閣直學士知涇州少連通敏有才遇事無大小決遣如流不為權勢所屈既卒仁宗歎惜之胡瑗字翼之海陵人湖州貢進士景祐初范仲淹知蘇州奏請立學延瑗為教授瑗以經術首居師席英才雜遝自逺而至其後登科名者甚衆明年仲淹入朝又薦其通知古樂白衣對崇政殿授校書郎仲淹經略陜西辟丹州推官密州觀察推官以保寧節度推官教授湖州從遊者數百人慶厯中興太學下湖州取其法著為令瑗以疾致仕皇祐中召典作樂事除大理評事兼太常主簿尋復辭罷嵗餘授光祿寺丞國子監直講樂成遷大理寺丞賜緋衣銀魚嘉祐初擢天章閣侍講仍治太學尋以疾授太常博士致仕卒瑗嘗患隋唐以來仕進尚文辭而遺經業茍趨祿利及教授蘇湖嚴條約以身先之雖大暑必公服以見諸生設師弟子之禮解經至有要義懇懇為諸生言其所以治已而後治乎人者學徒千數日月刮劘為文章皆傅經誼必以理勝信其師説敦尚行實後為太學其徒益衆庠序不能容其弟子散在四方隨其人賢愚皆循循雅飭其言談舉止遇之不問皆知為瑗弟子其學者相與稱先生不問知為胡公也從遊者郡人滕甫范純祐錢藻尤知名當世云孫瑜字叔禮博平人以父任歷官祕閣校理除兩浙轉運使入辭仁宗訪其家世謂曰卿孫奭子耶奭大儒也久以道輔朕因面賜金紫先是郡縣倉庾以斗斛大小為姦瑜奏均其制黜吏之無狀者民大喜有言其變新器非便下遷知曹州尋有言瑜所作量法均一誠便者乃還其原資纍官工部侍郎始奭之亡朝廷録其後瑜子為諸孫長當録瑜不忍因父喪而官其子以兄之孤上之孫甫字之翰陽翟人初舉進士得同學究出身為汝陽簿再舉進士及第為華州推官歷官江東兩浙轉運使范仲淹知杭州多以便宜從事甫曰范公大臣也吾屈於此則不得伸於彼矣一切繩之以法然退未嘗不稱其賢纍遷至天章閣待制侍讀甫性徑果善持論每言唐君臣行事以推見當時治亂若身履其間聽者曉然如目見之時人言終日讀史不如一日聽孫之翰論也鍾離瑾字公瑜合淝人以開封府推官出提點兩浙刑獄衢州飢者聚食之頗廢農作瑾請發米二萬斛賑給纍官至龍圗閣待制權知開封府田諭字資忠夀安人慶厯中以荆湖北路轉運使徙兩浙轉運按察使官終龍圗閣直學士知澶州王鼎字鼎臣館陶人纍遷太常博士歷江東兩浙河北提點刑獄召為開封府判官改鹽鐵判官遷司封貟外郎淮南兩浙荆湖制置發運副使尋擢為使前使者多漁市方物因奏計京師持遺權貴鼎一無所市獨悉意精吏事事無大小必出於已凡調發綱吏度漕路逺近定先後為成法於是勞逸均吏不能為重輕官舟禁私載舟兵無以自給則盡盜官米為姦有能居販自贍者市人推以法不肯償所逋鼎為移州縣督償之舟人有以自給不為姦而所運米未嘗不足也入為三司鹽鐵副使纍遷河東都轉運司鼎性亷不欺嘗攝知新繁縣多職田斗粟不以自入奉使契丹得千縑散之族人一日而盡當官明敏強直不可撓所薦士多知名有終身不識面者張逸字大隱滎陽人真宗朝歷官中外後以開封府推官使契丹遷兩浙轉運使王益柔字勝之河南人性伉直尚氣喜論天下事用父曙蔭至殿中丞除集賢校理開封府推官鹽鐵判官出為兩浙京東西轉運使上言今考課法區别長吏能否必明有顯狀顯狀必取其更置興作大利夫小政小善積而不已然後能成其大取其大而遺其細將競利圗功恐事之不舉者日多而虛名無實之風日起願參以唐四善兼取行實列為三等不報熙寧元年入判度支審院纍遷龍圗閣直學士祕書監知應天府益柔少力學通羣書為文日數千言尹洙司馬光亟稱之孫沔字元規會稽人以尚書工部貟外郎提舉兩浙刑獄為人跌蕩自放不拘小節然居官以才力聞強直少所憚後以觀文殿學士知慶州王逢字會之當塗人博學能屬文尤長於講説慶厯中蘇州士人從轉運使乞逢主其學學者常數百人奬養成就者極多洎登第補南雄州軍事判官歸為國子監直講兼隴西郡王宅教授久之以太常博士通判徐州以疾不行求監蘇州酒嘉祐八年卒官逢為人樂易篤於友朋與胡瑗最善所著易傳十卷乾德指説一卷復書七卷吳奎字長文北海人性強記於書無所不讀舉五經為大理丞慶厯間䇿賢良方正入等歷太常博士右司諫起居舍人同知諫院唐介論文彥博指奎為黨出知密州加直集賢院徙兩浙轉運使杜祀字偉長闕人用父鎬蔭歷官廣南西路轉運按察安撫使徙兩浙轉運使趙屼字景仁衢州人清獻公抃之子也由蔭登第通判溫州代還神宗命為太僕丞擢監察御史時抃已謝事屼以父老請外乃轉提舉兩浙常平以便養屼奉抃遍遊諸名山人以為榮陳公輔字國佐臨海人政和三年上舍第一授承事郎平江府學教授時朱勔方嬖幸當官者奴事之公輔絶不與交勔有兄喪諸生欲往弔公輔不豫告勔不恱諷權要以其壻同審言代移公輔越州除太學博士纍遷權應天府少尹除祕書郎奏蔡京父子懷姦誤國朱勔罪惡都城之人皆謂已族滅其家乞勿許其子姪隨上皇入京繼又以言事忤時宰斥監合州稅髙宗召除尚書左司貟外郎左司諫賜三品服遷禮部侍郎公輔論事剴切疾惡如仇唯不尚程頥之學士論少之吳祥字守約麗水人登第為蘇州教授獨不求謁朱勔終提舉福建路茶事居官以亷稱仕四十年無宅以芘風雨吕頥浩字元直齊州人歷户吏二部尚書建炎三年金人逼揚州車駕南渡鎮江召從臣問去留頥浩叩頭請留為江北聲援駕幸錢塘拜同簽書樞密院江淮兩浙制置使後又以少保為浙西安撫制置大使張俊字伯英成紀人好騎射負才氣年十六為三陽弓箭手政和間從討南蠻轉都指揮使歷官浙東制置使遷兩浙西路江南東路制置使時江浙羣盜蜂起俊以所部招收羣盜命後軍統制陳思恭𨽻之已而羣盜悉平改江南招討使後又為兩浙西路江南東路宣撫使賜安民靖難功臣太傅封益國公清河郡王南渡後俊握兵最早屢立戰功與韓世忠劉琦嶽飛並為名將世稱張韓劉嶽云辛永宗明州觀察使為浙西馬步軍副總管平江駐劄紹興十四年御史中丞李文會言建寧軍承宣使解濳本趙鼎客不從和議及和議既成居常不樂永宗撰造言語變亂是非二人守官寄居皆在平江衝要之地倡為異説恐使命傳聞致疑非便詔永宗移湖南副總管李寶河北人嘗陷金國拔身從海道來歸金人渝􅉀紹興三十一年將繇海道襲浙江諜聞髙宗謂宰臣曰李寶以一介脫身還朝陛對無一毫沮懾是必能事者乃授浙西路馬步軍副總管駐劄平江令與守臣督海舟捍禦髙宗問舟幾何寶曰堅全可涉風濤者百二十艘兵幾何曰僅三千皆閩浙弓弩手非正兵也旗幟甲仗亦粗備事急矣臣願亟發乃賜寶衣帶鞍馬尚方弓刀戈甲及銀絹萬數兼浙西通州海船兵士篙師合萬人詔武臣有勇略知海道者副之八月次江隂將啓行軍士爭言西北風尚徑寶下令敢沮大計者斬遂發蘇州大洋行三日風甚惡慷慨顧左右曰天以是試李寶邪寶心如鐵石不變矣酹酒自誓風即止明日舟散復集將官邉士寧自密州回云其子公佐已挾魏勝得海州寶喜士氣百倍抵東海敵已圍海州寶麾兵登岸以劒畫地令曰此非復吾境力戰與否在汝等將士賈勇無不一當十勝出城迎寶遂遣辨者四出招納降附聲振山東豪傑如王世修各集義勇爭應援多者數萬人大破北軍於膠西石舊塢斬其渠帥獲符節文書糧械以萬計焚數百艘俘漢軍三千時亮濟淮聞通泰已陷還軍駐東海寶遣使報捷上喜曰朕用李寶果立功為天下倡矣是冬賜詔奬諭御書忠勇李寶四字表其旗幟除靜海軍節度使沿海制置使賜金器玉帶旌節告身亮聞膠西之敗大怒召諸帥約以三日渡江於是內變殺亮寶戰具精利宰臣陳康伯取其長槍克敵弓弩俾所司為式製之卒贈檢校少保王易河南人以故將子從髙宗南渡紹興中為浙西總管平江駐劄性開爽善屬文為御前應制眷倚甚厚易嘗遇異人授先天數學成壞皆前知劉錡字信叔德順軍人紹興末以太尉荆南府帥為江淮浙西制置使節制逐路軍馬陳桷字季任平陽人紹興六年自直龍圗閣知泉州改浙西提刑乞置鄉縣三老以厚風俗凡宫室車馬衣服器械定為差等重侈靡之禁官至廣東經略安撫使曾幾字吉甫河南人髙宗朝浙西提刑會兄開為禮部侍郎與秦檜力爭和議檜怒出知婺州幾亦罷除廣西轉運副使檜死復為浙西提刑孝宗受禪遷通奉大夫致仕擢其子逮為浙西提刑以便養卒諡文清朱倬字漢章閩人宣和進士歷官知惠州陛辭因言嘗䇿劉豫必敗髙宗記其言問卿久淹何所倬曰厄於檜上愀然慰諭目送之旬日除國子監丞尋除浙西提舉且命自今在內除提舉官令朝辭上殿蓋為倬設也既對上曰卿以朕親擢出為部使者使人咸知內外任均又曰人不知卿朕獨知卿倬每上疏輒夙興露告若上帝鑒臨奏疏凡數十如發倉廪蠲米價減私鹽核軍食率焚稿不傳後以資政殿學士致仕趙令詪字君序以父任補右班殿直浙西提刑襲封安定郡王蒞事明敏有風采米友仁字元暉襄陽人太學博士黻之子也宣和中通判太平州大名少尹皆有聲紹興中召見擢尚書郎提舉浙西茶鹽逾年除將作少監仲并字彌性江都人幼好學強記讀書率至夜漏盡每一遍即終身不忘其母一夕屏所觀書几上餘臺厯一本明旦默記吉曜惡殺纎悉不誤登第授平江教授以朱勝非薦特改左承奉郎歷光祿寺丞知鄿州所著浮山集十六卷周必大為序言其自少卓犖不羣潛心學問力排王氏之説尤長於詩律上規風雅其四六敘事雖閎肆而關鍵實密非駢儷所拘官至左朝請大夫金安節字彥亨休寧人博洽經史尤精於易宣和進士紹興中為侍御史劾秦檜兄知台州梓檜方怒會以憂去檜死起知嚴州除浙西提刑入為大理卿言治道以教化為本孝宗朝拜兵部侍郎權吏部尚書以敷文閣致仕陛辭搢紳嘉歎以為中興以來全名髙節鮮有其比顔師魯字幾聖龍溪人紹興中歷國子丞江東提舉改使浙西役法敝甚細民至以雞豚罌榻折産力遇役輒破家師魯下教屬邑預正流水籍稽其役之序寬比限免代輸咸便安之鹽課嵗百萬本錢久不給亭竈私鬻禁不可止刑辟日繁師魯撙帑緡盡償宿負戒官吏毋侵移比旁路課獨最上謂執政曰儒生能辦事如此升直祕閣農民有墾曠土成田未及受租者姦豪多為已利師魯奏但當正其租賦不可繩以盜種法失劭農重本意奏可遂著為令卒諡定肅王珏字德全臨川人荆公安石孫也紹興二年起家鹽官丞秀州嵗以錢給亭民煮鹽至十五年積十九萬七千餘緡不給民訴於朝除珏提舉浙西茶鹽逾年盡償亭民且贏巨萬開華亭海河二百餘里鹽滋得流通且資以溉田經界法行甚害者三百六十餘事其七千二百餘户為尤病珏奏除之兼提點刑獄未閲月正大辟重而輕者三人死而生者五人移湖南提舉官至直敷文閣太府少卿隆興二年卒於吳縣橫山之私第洪適字景伯鄱陽人忠宣公皓長子也紹興中由嚴州録事參軍調浙西常平司幹辦公事與弟遵邁俱中詞科號鄱陽三洪文名滿天下歷知徽州除浙西提舉以遵知平江引嫌改江東乾道中參知政事尚書右僕射同中書門下平章事兼樞密使卒諡文惠劉穎字公實西安人紹興中歷知鉛山常熟常熟素繁劇穎降心條理更以治稱王佐薦穎為選人日已為劉珙器重改任蘇邑上應公家之求下撫百姓之隱政聲籍甚召監進奏院歷兵部郎官提舉浙西常平還澱山湖以泄吳松江二水禁民侵築毋使逼塞大流民田賴之又奏備糴本廢圍田二事不果行就遷提刑以洗寃澤物為任間詣獄察不應繫者縱遣之御史以介僻劾罷卒官寶謨閣直學士章服字德文永康人以詞賦登進士第紹興末知鄂州除浙西提舉漕司嘗貸緡錢二萬至是已數年服立移督之而户部復請貸三萬銜命小校恥不即得出不遜語服叱之曰此聖旨邪常平民命也猶當以法奏覆汝何敢爾尋召為吏部貟外郎兼皇子慶王府直講倪千里字起萬東陽人紹興癸丑任蘇學教授因其羡積以增養士貟復作義廪以資禮文之費其餘以助士貧而親不能葬與孤孩之遺棄者刻諸學宫條目井然戴溪黃由葉適為題於後咸紀其事王淮字季海金華人髙宗朝進士歷監察御史右正言乾道中為浙西提刑後至左丞相卒諡文定鄭興裔字光錫開封人顯肅皇后外家三世孫也初以恩授成忠郎纍差浙東提刑易浙西以郡縣積玩檢驗法度創為格目分界屬縣吏不得行其姦因著其令卒諡忠肅興裔歷仕四朝以才名結主知中興外族之賢未有其比周必大撰墓志云諡惠肅王師愈字與正一字齊賢婺州人師事楊時授易及論語紹興中第進士與朱熹同年復從張栻吕祖謙遊熹稱其有本有文德望隱然為東州之重歷浙西提刑官終直煥章閣孫峴字舉善以詞學擢第拜中書舍人淳熙初為浙西提舉以措置支還亭户本錢及增賣鹽袋興修水利有勞除直敷文閣兩浙轉運判官開趙淳熙中以武功大夫英州刺史添差浙西總管平江府駐劄嘗取肝救父詔曰開趙昔忠於國今孝於親特轉濮州團練副使初趙奏歸正人在東南有貧不能葬者已於閶門買地作義墳詔從其請及趙卒亦葬此徐誼字子宜一字宏文溫州人乾道進士纍官太常丞知徽州移提舉浙西常平論水利之切於時者曰昔下流不疏而水上溢故鑿直曲港還三江故道開宜興百瀆所以順導下流也惟髙原田徑乃瀦隁之爾昔之言水如單鍔郟亶皆是也今開吳松江下流與宜興百瀆屬之海者無慮數十百所異時浦港磬折以趨海今近浦之民多取徑直疏決蘇湖常秀舊為澤國比年雨或後至種且不入蓋圍田衆而疏道多也小人見利不畏其害圍於淺水既為髙田圍於茭蕩既為稻田二俱不已復有下腳始之重陂大半為平始之良田背水自曬十日不雨農廢作業然且承用舊説又將疏之失利害之實矣故舊田溝澮當濬治圍田下腳無輒開已開未填當捺合今之言水者能行是三説則髙原舊田還為衍沃而農不病矣入為吏部郎守右司郎中寧宗朝知臨安建康隆興三府卒諡忠文詹體仁字元善浦城人少有異材始冠第進士光宗即位提舉浙西常平務為民除害興利謂浙右之有漕渠非止通饋運資國信往來而已蘇秀常潤田之髙仰者實賴之於是開漕渠浚練湖置斗門為旱潦備又以餘力立舉子倉創安濟院所活不可勝紀散鹽本錢數萬紓亭户之力嵗終課利增羡體仁穎邁特立博極羣書其學以存誠慎獨為主真德秀早從之遊嘗問居官蒞民之法體仁曰盡心平心而已盡心則無愧平心則無偏世服其確論應孟明字仲實永康人光宗初遷浙西提刑孟明以儒學奮身受知人主韓托胄嘗密遣客誘以諫官俾誣趙汝愚孟明不肯士論重之劉爚字晦伯建陽人受學於朱熹吕祖謙乾道中遷浙西提刑按察不避寒暑多所平反有殺人而匿權家者吏弗敢捕爚竟獲之遷國子司業上言浙西根本之地宜詔長吏監司戢強暴撫良善廣儲積禁科斂官至權工部尚書卒諡文簡葉適字正則永嘉人淳熙進士擢平江節度判官史浩薦於朝召之不至改浙西提刑司幹辦公事士多從之遊後纍官至寶文閣學士卒諡忠定適志意慷慨雅以經濟自負為文章藻思英發有水心集若干卷行於世喬行簡字夀朋東陽人受學吕祖謙歷知嘉興府改淮西提舉常平移浙西提刑後拜左丞相卒諡文惠行簡歷練老宿識量𢎞逺居官事無不言好薦士多至顯逹程珌字懷古休寧人歷官江東轉運判官遷浙西提舉常平潘畤字德鄜上虞人淳熙中知興化軍召還賜對除浙西提舉至則罷中都饋餉之不如法者豪貴多不樂而平江庫錢失陷守誣富室以取償一郡大擾有致死者畤檄罷之守怨畤隂以禁兵給白直而訹他司上其事畤坐削一官移江西未行又易江東羅點字春伯崇仁人淳熙中由校書郎除浙西提舉規畫荒政凡數十奏躬行畎畝實惠甚博先是崑山華亭之間有澱山湖泄諸水道戚里地豪占以為田水由是壅點亷得其實奏請開濬且為圗以獻上從其言百姓勇於赴功不日而畢所濟田百萬畝乃刻石具著其事以防他日築塞之患民甚便之詳水利條平江酒官程師禮嘗為知府王希吕督過罷郡官吏餞别師禮攘臂詬之點上言曰朝廷進退羣臣自有典章師禮敢肆無狀非所以示衆庶也陵夷之風漸不可長乞黜之以正名分上允其請權府事凡四閲月時久旱請雨點獨致敬於祀典郡之天慶觀有何蓑衣道人異時為郡者以為神每禱祀畢或就見焉點不之往何以杖擊僚吏車以示斥辱點視之漠然俄大雨隨車郡人大喜又有故主訟去僕負債者究得其實而僕甚黠反欲汙衊其主自陳嘗通其主饋之妾物色之則無有也點遂令僕自供姦狀竟從姦罪決配其女使候主人有詞日根究聞者無不痛快點孝友端介不為矯激之行或謂天下事非才不辦點曰當論其心心茍不正才雖過人果何取也卒簽書樞密院事諡文恭胡堅常字秉彞晉陵人宿曾孫也歷太府少卿將作監直祕閣浙西提舉常平陳造字唐卿髙郵人淳熙初進士調繁昌尉改平江教授士子未之知也及被教養咸服其問學議論恨師承之不早范成大尤愛其文謂龔頥正曰唐卿亦髙郵人使遇歐蘇盛名當不在少遊下撰芹宫講古十卷歷浙西參議幕時人稱為淮南夫子胡樽字崇禮餘姚人以承務郎為浙西提舉茶鹽司幹官紹熙慶元間浙西先旱後水湖常二州死無虛室縣梁河道積尸千數樽泣訴於朝會所知為丞相急轉米多鬻遍走長興安吉山谷中緣門麋飲之民賴以少蘇既而以勞苦被疾遂不起陳振孫字伯玊安吉人博通今古為浙西提舉仰體祖宗恤民之意舉行萬户停廢醋庫邦人德之劉宰字平國丹陽人紹熙初為浙西常平幹官歷籍田令直祕閣纍召不起除知鄉郡亦不拜時人髙之諡文清余克濟字淑濟安溪人慶元五年進士歷侯官尉為浙西常平幹官謨畫明辨諸使交薦之知梅州尤以寬平著稱有春秋通解十五卷黃灝字商伯都昌人歷太府寺丞出知常州提舉本路常平海鹽民伐桑柘毁屋廬莩殣盈野或食其子持一臂行乞而州縣方督促逋欠時有旨倚閣夏稅灝遂乞併閣秋苖不俟報行之言者論其専移筠州尋削兩秩而從其蠲閣之請灝既歸田若素隱者平生性行端飭以孝友稱李大有字謙仲東陽人慶元二年進士潭州益陽主簿平江府教授著録公明不可干以私正旦率鄉之大夫士正齒位倣古鄉飲酒禮講行之復刻前賢鄉約鄉儀風示學者習俗用勸知府趙希懌將舉大有或請往叩之辭曰求而得之則不如勿得改為太常主簿尤習於禮輪對上疏言周頤張載程皓學本於正心修身仕至於致君行道近世張栻朱熹吕祖謙闡而大之而義理益明自慶元權臣創道學之名排斥善類為士者以道德性命之説為不足學願召宿儒崇近列推明儒先之訓扶植治本其在外師儒之官亦以此意風厲作成之遷博士官至朝請郎史彌逺字同叔慶元人越王浩之子也嘉泰四年提舉浙西常平官至太師左丞相追封衛王諡忠獻徐天麟字仲祥臨江人開禧元年進士撫州臨安二郡教授浙西常平司幹官終廣西轉運判官著兩漢會要漢兵本末西漢地理疏山經凡若干卷毛鼎新字新甫黃巖人歷興國軍教授浙西提舉茶鹽司準遣改常平司準遣其長有欲獻羡餘四十萬者鼎新力爭以置社倉又有賣獄者復力爭得直無錫民獻缺役田入和靖書堂者又力爭役得不廢居官精密所至有能名趙㦛夫字惟恭處州人嘉定十五年以浙西提刑兼權平江府有婦告其姑私酒㦛夫追姑從條勘罪復問婦曰汝事姑孝乎云極孝順㦛夫曰既能盡孝可代姑受杖又有僕為主人所訟欲加玷辱乃自供與主母通㦛夫判云在法奴姦主母罪合流配今某不待勘證已自供析當從條決配主家訴其悖慢則凶狡可知所犯主母強而非和免行追究令自省循又一民家稍殷實再從兄弟貪而無行嘗從其借屋居止不復還凡所需求必滿其欲怨詈不逞妄訴其同産未分㦛夫究證其妄未幾迫於寒餓投水死預書族人違法數事束之腰間又皆撰造虛詞逮委府官取尸驗視初無傷損遂繳申所書㦛夫判生前窮窘無賴妄訴族人死後陳述有司亦難斷理喻其民量與葬資郡人莫不痛快稱誦訖無敢妄陳者入朝拜刑部郎中留恭字伯禮永春人丞相正次子也歷右曹郎官提舉浙西常平境內大飢畢力賑恤全活三十六萬餘人知紹興府時稱循吏曹豳字西士瑞安人嘉泰中自祕書丞出為浙西提舉常平力陳和糴折納之弊建虎丘書院以祀尹焞移浙東提刑召為左司諫有直聲時號嘉熙四諫卒諡文恭劉漢弼字正甫上虞人嘉定中歷浙西提舉茶鹽司幹官召試館職遷户部侍郎在職多所建明切於時務卒諡曰忠王邁字實之仙遊人嘉定中由潭州觀察推官調浙西安撫司幹辦官陸持之字伯徴文安公九淵子也嘉定間以東湖書院長進迪功郎理宗即位轉差幹辦浙西安撫司丁勝為福州觀察使大將軍嘉熙間以老乞內任朝廷以功授為浙西總管平江駐劄勝起自群盜知府史宅之每侮之勝曰丁勝是作賊却來作官尚書作官了却來作賊宅之自此不復輕之淳祐初馬光祖為畿憲會部內有巨冦許大四聚衆作亂州縣大擾而憲司首議勝勦捕勝力辭行光祖誚其畏怯勝曰昔光武見大敵勇見小敵怯今賊勢叵測而先遣一總管萬一不利後使何人光祖始服馬光祖字華父金華人由浙東提舉常平移浙西提刑權浙西常平遷浙西安撫使會嵗飢滎王府積粟不發廪光祖謁王辭以故明日往亦如之又明日往卧客次王不得已見焉光祖厲聲曰天下孰不知大王子為儲君大王不於此時收人心乎王以無粟辭光祖探懷中文書曰某莊某倉若干王無以辭遂得粟活民甚多進同知樞密院事卒諡莊敏光祖之在外也練兵豐財朝廷倚之為重尹京時剸治浩穰風績凜然威惠並行百廢無不舉焉胡穎字叔獻湘潭人初中童子科紹定五年登進士授京秩歷知平江府兼浙西提刑榮王府十二人行劫穎悉斬之卒官荆湖總領財賦頴為人正直剛果博學強記吐辭成文書判下筆千言援據經史切當事情倉卒之際對偶皆精讀者驚歎一日輪對理宗曰聞君好殺意在浙獄穎曰臣不敢屈太祖之法以負陛下非嗜殺也上默然潘牥字庭堅閩人端平二年䇿進士牥語最切直歷衢州推官淳祐中浙西常平幹辦公事李芾字叔章衡州人少自樹立以蔭補歷祁陽尉差知德清縣屬浙西飢芾置保伍賑民活數萬計纍遷浙西提刑時所部多盜羣穴太湖中芾迹其出沒按捕之盜駭散虎丘有書院祠尹焞芾加修創置學官為規約以教之學者甚盛咸淳初入知臨安以忤賈似道去後知潭州城破舉家自殺諡忠節芾剛介不畏強禦精力過人望之凛然猶神明而好賢禮下即之溫然居官亷白家無嬴資孫子秀字元實餘姚人紹定中以進士調吳縣主簿有妖人稱水仙太保知府王遂將使治之莫敢行子秀奮然請往焚其廬碎其像沈其人於太湖曰實汝水仙之名矣妖遂絶日詣學宫與諸生討論義理辟淮東總領所中酒庫開慶初為浙西提舉常平先是丞相丁大全以私人為之盡奪亭民鹽本錢充獻羡之數不足則估籍虗攤一路騷動亭民流亡子秀還前政鹽本錢五十餘萬貫奏省華亭茶鹽分司官定衡量之非法多取者於是流散復業徙提點刑獄兼知常州淮兵數百人浮寓貢院給餉不時死者相繼子秀請於朝創名忠衛軍置寨以居截撥上供贍之盜劫吳大椿前使者諱其事誣大椿與兄子焴爭財自劫其家追毁大椿官編置千里外徙黥其臧獲子秀廉得實悉平反之尋以兼郡行部非便得請專臬事擊貪舉亷風采凛然進大理少卿纍遷湖南轉運副使以迎養非便辭復移浙西提刑冒暑周行八郡三十九縣獄為之清安吉州有婦人訴人殺其夫與二僕守捐賞萬緡逮繫考掠十餘人終莫得其實子秀密訪之乃婦人賂宗室子殺夫僕救之併害以滅口一問即伏誅又釋偽會之連逮者逺近稱為神明初獄訟之滯皆由期限之不應使者下車或親書戒州縣勿違而違如故則怒之怒之改匣又違則又重怒之至再三而專卒四出巡尉等司繳限抱匣費不資則其勢必違子秀與州縣約到限者徑詣庭下吏不得要索亦無違者其後創循環總匣屬各州主管官凡管內諸司報應皆併入匣一日一遣公移則又總實於匣以往於是事無大小纎悉畢具而風聞者反謂專卒凌州縣劾罷之子秀笑而已移江東提刑度宗朝知臨安府子秀磊落英發神采飛動與人交久而益親死生患難營救不遺聞一善即手録之陳塤字和仲鄞人歷福建轉運判官遷浙西提刑嵗旱盜起捕斬之安吉州俞垓與丞相李宗勉有連恃勢黷貨塤禁革之弓手戴福以獲潘丙功為副尉宗勉倚為腹心暴橫貪害民所不堪塤至福聞風而遁塤貽書宗勉曰塤治福所以報丞相也傳聞走丞相賢輔弼不宜有此宗勉答書曰福罪惡貫盈非君不能治宗勉雖不才不敢庇姦凶惟君留意及獲福於隆興衆欲殺之塤曰若是則刑濫矣乃加墨徇於市囚之圜土初官浙西令官屬各以本司利害為一書新任者具腳色申狀外不用啓劄其後馬光祖繼之亦有此例人皆韙之陳宜中字與權永嘉人少貧入太學有文譽景定四年為浙西提刑德祐拜相入海卒於暹唐震字景實會稽人少居鄉介然不茍交既登第居官以公亷稱咸淳六年自知信州擢浙西提刑過闕陛辭賈似道以公田屬震震謝不能行至部又以疏力爭之趙氏有守阡僧甚暴橫震遣吏捕治似道以書營救震卒按以法似道怒使侍御史陳堅劾去之後知饒州元兵入府治執牘張案上使震署降震不屈投筆於地遂死之贈華文閣待制諡忠介廟號褒忠官其二子陳肖孫奉化人咸淳元二年以善政事驟用繇大理丞户部郎中知嘉興府兼浙西提刑尋兼度支郎官王安節節度使監之子始為東南第七副將德祐初賈似道師潰蕪浙西節上疏乞募兵為捍禦授閣門祗候浙西添差兵馬副都監收兵入平江合張世傑兵戰鳯凰港有功轉三官後守常州與元兵巷戰死之徐道隆字伯謙武康人以兵部尚書為浙西提刑權治安吉時文天祥去平江潰卒四出剽掠安吉尤甚有旨令道隆措置乃捕斬亂者數人梟市中既而范文虎程鵬飛遺書誘降道隆焚書斬使元兵至臨平皋亭山令間道入援時水陸皆有屯軍道絶不通議由太湖徑武康臨安縣境勤王知州趙良淳縊死德祐二年正旦道隆為兵所執赴水死贈官賜諡立廟安吉越三日宋亡野史道隆為北兵逼逐至太湖三香山不屈被害知安吉州趙與立其公服同妻縊於廳事吕文煥至元十二年從巴延至平江為安撫使圗治未久隨軍去任遊顯字子明汴州人至元十二年隨巴延下平江入城撫治軍民興復學校恤問孤寡民受其賜後除浙西宣慰使雷膺字彥正渾源人元太宗時以郡國選入官為萬户府掌書記世祖即位授大名路宣撫司貟外郎纍遷江南浙西道提刑按察使時蘇湖多雨傷稼百姓艱食膺請發廪米二十萬賑之行省以太多議存三之一膺曰布宣皇澤惠養困窮行省臣職耳豈可效有司出納之吝耶行省不能奪悉給之卒諡文穆蒙古岱初以萬户從巴延平宋至元十二年行兩浙大都督事十三年與索多館伴文天祥會以臨安為兩浙大都督府遂與范文虎入治府事逾月以都督鎮浙西劉宣字伯宣太原人由中書省掾為河北河南道行勸農副使至元十二年入為郎中從巴延及平章阿珠平江南贊畫居多除知松江府未幾同知浙西宣慰司事在官五年威惠並著嘗奉詔理算各鹽運司及財賦府茶場都轉運司出納之數宣籍阿哈瑪特妻子親屬所營資産入官縱其奴婢去為民復以集賢學士除行臺御史中丞江浙行省丞相蒙古岱悍戾縱恣常慮臺臣糾之尤忌宣因嗾其黨誣以事朝遣官鞠問宣就逮自剄於舟中宣忠義節撡為世所重時皆悼之蒙古台蒙古塔塔爾氏事世祖為博州路鄂囉總管至元初又為監戰萬户佩金虎符改鄧州新軍蒙古萬户從巴延阿珠南征有功制授行兩浙大都督府事四遷為江淮行省平章政事未幾拜行省左丞相還鎮江浙時浙西大飢乃弛河泊禁發府庫官貨低其直貿粟以賑之居六年召還申屠致逺夀張人至元初以荆湖經略司知事授太常太祝兼奉禮郎宋平焦友直揚居寬宣慰兩浙舉為都事首言宋圗籍宜上之朝江南學田當仍以贍學行省從之纍遷江南行臺監察御史江淮行省宣使郗顯李兼訴平章蒙古岱不法詔以顯等付蒙古岱鞠之致逺慮囚浙西知其寃狀將縱之蒙古岱脅之以勢致逺不為動親脫顯等械使從軍自贖改湖廣行臺卒官僉淮西江北道肅政亷訪司事致逺清修苦節恥事權貴家無餘産聚書萬卷教諸子如嚴師然管如德黃陂人為江州都統制至元十二年入覲授湖北招討使總管本部軍馬佩金虎符從阿珠南攻宋平遷浙西宣慰使上時政五條以權臣抑不得逹後丞相安塔哈命馳驛奏出征事入見世祖問曰江南之民得無有二心乎如德曰往嵗旱潦相仍民不聊生今纍嵗豐稔民沐聖恩多矣敢有二志使果有之臣亦不敢飾辭以欺陛下帝善其言卒官江西行尚書省左丞諡武襄史弼字君佐一名塔爾琿博野人以材勇見世祖給事左右從巴延南征以功進定逺大將軍纍遷江淮行省參政改浙西宣慰使時霖雨粟貴弼發米十萬平價糶之而後聞於省省欲增價弼曰吾不可失信於民寧輟吾體以足之省不能奪又益出十萬民得不飢嵗星犯鉤鈐弼言頃以征日本船五百艘科諸民民病之宜取阿巴齊所有船修葺以付安塔哈庶寬民從之官至平章政事寧玊河陽人身長九尺膂力絶人從巴延下江南擢領軍千户鎮守吳江長橋纍官至浙西道都元帥時方劻勷吳人賴其保障之功復新孔廟學宫禮賢下士有古良將風卒諡武宣子孫後居吳江同里徹爾鴻吉哩氏幼孤讀書世祖召見留侍左右嘗使江南大德初拜江南諸道行臺御史大夫改江浙行省平章政事江浙稅甲天下平江嘉興湖州地極下水鍾為震澤入吳松江以趣海嵗久江淤豪民封為田浸淫泛溢敗諸郡稼朝廷命行省治之發卒數萬徹爾董其役四閲月畢工入為平章政事和和字子淵喀喇氏敦默寡言嗜學能文成宗朝宿衛擢太常院使至大間調大司農卿除山南亷訪使改江南行臺治書侍御史遷淮西亷訪使皆有政聲泰定間升翰林侍講學士遷江浙行省右丞弟庫庫庫庫字子山由集賢待制纍遷集賢直學士轉江南行臺治書侍御史升浙西亷訪使與和和皆為時名臣世號雙璧鄧文原字善之一字匪石錢塘人在宋時以流寓試浙西轉運司魁四州士至元末行省辟為杭州路儒學正歷官翰林待制延祐初出僉江南浙西道肅政亷訪司事平江僧憾其府判官理熙賄其徒訟以贓罪熙誣服文原按實罪僧而釋熙後以集賢直學士兼國子祭酒經筵官致仕卒諡文肅文原內嚴外恕家貧而行亷有文集若干卷內制集若干卷王克敬字叔能大寧人由江浙行省照磨泰定間歷官兩浙鹽運使首減紹興民食鹽五千引溫州逮犯私鹽者以一婦人至克敬怒曰豈有逮婦人千百里外與吏卒雜處者汚教甚矣自今毋得逮婦人議著為令卒官江浙行省參政諡文肅克敬在左司時會議中書堂言江南包銀民貧不能輸有司責之役户甚無謂當罷之兩浙煎鹽户牢盆之役其重者尤害民當免其他役議定以聞悉從之所至有政績時稱名卿王艮字止巗諸暨人歷官為兩浙都轉運鹽使司經歷紹興路總管王克敬以計口食鹽不便嘗言於行省未報而克敬為轉運使欲稍損其額或以為成籍不可改艮毅然曰民實寡而強賦多今死徙已衆矣顧重改民籍而輕棄民命乎且浙右六郡髙賈輻輳未嘗以口計也移其所賦散於商旅之所聚非良法乎於是議嵗減紹興食鹽五千六百引尋有復排前議者艮欲辭職去丞相聞之亟遣留艮議遂定遷海道漕運都萬户府經歷又遷江浙行省檢校官建白時政視轉運司尤多卒官淮東宣慰副使吕思誠字仲實平定州人由國子學陪堂生擢泰定元年進士歷官僉廣西亷訪司事移浙西時逹實特穆爾為南臺御史大夫與江浙省臣有隙嗾思誠劾之思誠曰吾為天子耳目不為臺臣鷹犬也不聽已而聞行省平章左右貪墨乃疏其罪流之海南纍遷國子祭酒論事左轉復為中書右丞大司農思誠氣宇凝定素以徑拔聞不為勢利所屈韓鏞字伯髙濟南人由進士歷翰林編修國子博士監察御史天厯初除僉浙西亷訪司事擊姦黜貪特舉烏程尹干文傅郡邑為之肅然轉江浙財賦副總管自奉淡泊僚屬化之官至中丞瞻思字得之真定人至元初自陜西行臺監察御史除僉浙西肅政亷訪司事即按問轉運宣政諸官贓罪郡縣無以墨聞者復以浙右諸僧寺私蔽猾民所謂道人道民行童之屬類皆瀆常倫隱徭役使民力日耗契勘嘉興一路已二千七百人乃請勒歸本族俾供王賦從之著為令思歷仕所至以理寃澤物為已任平反大辟之獄甚衆卒諡文孝蘇天爵字伯修真定人武宗時擢江南行臺監察御史纍官京畿奉使宣撫忤時相坐免至正七年朝廷察其誣起為江浙行省參政條分目别細巨不遺九年以疾歸復起為兩浙都轉運使十二年妖冦自淮右蔓延江東詔仍為江浙參政總兵於饒信克復之功雖宿將不能過之其博學而知要長於紀載著述甚多樊執敬字時中鄆城人至正十年授江浙行省參政十二年督海運於平江將發宴犒於海口俄有客船至驗其券信令入而不虞為海冦也既入港即縱火鼓譟時變起倉猝軍民擾亂賊焚舟劫糧以去執敬走入崑山自咎不解及還省賊犯餘杭執敬方被命討賊海上至是事急不得去與賊巷戰射死賊七人賊勢方盛執敬中鎗死事聞贈翰林學士承旨榮祿大夫柱國追封魯國公夏原吉字維哲湘隂人洪武中以鄉薦入太學授户部主事歷遷至本部尚書永樂初兩浙大水詔原吉往治令僉都御史俞士吉持水利集賜之凡二錫命原吉每至詢延耆老講究法制身先而勞之却蓋徒步焦苦胼胝恆廢寢食目為發赤役兵民數萬人人樂趨疏壅滯築堤塍瀹溝洫葺杠梁道淫水以入於海水患大平奏發粟三十萬賑飢人分牛給種播時百榖有謂水退淤肥請召民佃耕以益賦者事下原吉原吉歎曰民疲極矣救死不暇况重役乎即馳奏曰車戽則徒勞民種殖則已失時何益於國上悟事遂寢三年八月召總部政諭之曰鄉以部事付郁新以浙西農務付卿庶內外協濟今新死矣爾其兼之卒贈太師諡忠靜原吉勳德寵眷為時元臣詳在國史其德量宏厚人莫能及使蘇時庖人烹肉過鹹原吉不言惟咽素飯而已瀕出侍卒失燎損一襪原吉并以豫之他若此甚衆或問量可學乎原吉曰吾幼時遇犯者則怒始忍於色中忍於心久則自熟殊無相校意是知量可學而然也又曰處有事當如無事大事當如小事若先自張皇則中便無主矣世謂庶幾韓魏公云周忱字恂如吉水人永樂初以庶吉士歷刑部主事越府長史宣德五年擢工部右侍郎賜璽書巡撫南直𨽻總督糧賦忱與知府况鍾議奏減糧額七十餘萬石又奏謂四年所定蘇郡秋租運南京倉及光祿寺等白熟米五府六部官俸米計七十五萬五千有竒今已逾年才納得七萬一千有竒未及十一而朝之受祿者恆缺此坐府縣無専官耳請令每嵗暮遣治農官分部輸南京從之九年嵗歉有司報飢民三百餘萬口詔忱振恤忱以乏儲思廣義倉以為水旱常備初徴納之際糧長里胥掊剋多狀百姓動至逋負又與况鍾究極其法先除免宿負七百九十餘萬石創置水次倉場每嵗算定各户秋糧夏稅加耗則例填注由帖而分給之俾户自持帖赴倉輸注不涉里胥又别立糧頭與糧長同收互察糧長惟職催併官為管督收完而撥運之其積出羡餘籍而貯之以備賑濟又以往時軍民分運民失農時乃與平江伯陳瑄議於淮安瓜洲對船交兊加以支費奏而行之又嵗運南京倉糧専給北京武職月俸者每石加耗費六斗忱曰彼能於南京關支獨不可於三府就支乎既免勞民因得省耗六十萬請立濟農倉於六縣移此實之用以濟農農無患矣亦從之又奏三府之田雖廣而農力甚苦比嵗朝廷屢詔勸糴以備濟恤緣旱潦相仍榖價騰踊難以舉行今臣以八年分徴收之間措得前件耗米六十九萬石遇民乏食則以給之又不獨以濟荒凡起運有所失損於此借償秋成還官夫役築圍岸濬河防乏給亦然庶免貸責以利兼并悉從其言又言驛夫馬役之弊及奏遷吳縣學肇立太倉衛學治崇明塗蕩吳淞顧浦諸處水利置范氏義田主管簿籍禁私粥以保文正之澤重建寶帶尹山夾浦三里諸大橋起百廢墜不能指數以至琳宫梵剎動成駿功而公帑民財初不知費蓋其才略超絶善謀果行而居心寬平量抱雄濶接物開坦簡略勢分集衆自廣最善於理財用人調停轉移沛然無滯人謂其善計似劉晏庶幾有古良相之風蒞江南凡十九年遷位尚書而巡撫如故民尸而祝之於虎丘寺諸處景泰三年致仕歸卒諡文襄羅汝敬吉水人宣德初為工部侍郎奉使看詳蘇郡嵗賦二百二十餘萬天下無與比而郡民徴運不勝困弊卒之力不能繼官存其數實未始足列請於朝得赦常賦三分為數七十萬宿逋為清久之户部復舉舊負況太守鍾抗言之有失信於民之語詔復賜免自是民力稍紓然富室田多輕額其重者多屬貧下貧下猶疲弊望均一之惠繼乃得陳泰陳泰邵武人景泰五年以右僉都御史繼周文襄巡撫知前免租之詔恩未得均乃推廣調停之令以五升之田倍其賦而官田之重者止取正額於是澤始均而賦輿不損上下咸便富者亦不怨之李秉曹州人天順初以都御史巡撫一守陳泰之制民益安之至其後遂不復改秉有大臣節此不具贅翁紹宗鳯陽人正統十一年巡撫周忱奏修築沿海城堡守備倭夷遂以紹宗為都督僉事錫璽書俾總理軍務紹宗在鎮甚久能舉其職協成事功孫鼎字宜鉉廬陵人永樂間以鄉薦歷松江儒學教授楊文定公溥薦擢監察御史提督南畿學政先德行而後文藝學置本原録録諸生善行以身為帥不事防察巡行所部令勿先報從單輿猝至諸生既集便令閉門面試一文或止破題數首隨閲隨定畢便開門呼名而出案牘隨之先後允愜私屬者自不及入嘗見庭橘方熟命左右摘嘗因令分畀諸生同啖之一生取其二鼎問之以奉親對鼎大賞倍遺之庚午秋試時上北狩鼎小試罷謂諸生曰諸君從有司當簮花燕餞今日為臣子枕戈之秋老夫不敢陷諸君於不義乃與飲茶令從中道行自步送出諸門既而詣闕上疏請隨所用以效死不報乃自矢於文信公祠去復蒞所部道遇金尚書濓慷慨對泣有萬里丹𠂻扶日月兩人清淚對山河之句陳選字士賢臨海人成化中以監察御史提學南畿言稱古昔動著儀則至誠相臨物莫不動條頒冠祭射儀俾諸生時習之每按部就止學宫徐行審觀周旋磬折絃歌豆登古風郁然勸導講誦士心感切成就興起不可縷數前後三年變色之語不見於襟佩折箠之笞不下於皂輿仕終廣東左布政李謨天台人郡學訓導不受士贄有以時苗留犢圗請楊尚書翥題詩以贄謨録詩而還其圗韓陽山隂人伍禮臨川人皆訓導陽郡學禮長洲學皆善教有文持身不茍陽終廣東右布政禮知曹州聶大年黎擴皆臨川人擴教授大年吳縣學訓導皆工文詞有聲大年尤善書陽在永樂謨福正統大年景泰擴天順間也劉魁字士元髙唐人成化十七年以監察御史巡按蒞郡不為崖岸而風裁自振時淫雨為沴山崩湖溢連郡田稼滅沒莩死萬數而當道一不以聞征斂如故魁排衆議力陳於朝言極剴切大率謂財賦資人以成人者財之本也今欲取其末而先絶其本假令盡得其末以快目前後日之計已匱矣況無得乎又民窮為盜或至狡竊於時誅討則所費亦不止若逋稅而已也詔户部下郡縣核實會魁代去不果行民坐是痍瘵久不能復追思甚深姑蘇志卷四十二
