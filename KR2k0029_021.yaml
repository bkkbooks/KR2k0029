body:
  text: 姑蘇志卷二十二明王鏊撰官署中吳郡舊治按越絶書云今太守舍者春申君所造後殿屋以為桃夏宫今宫者春申君子假君殿也太守府大殿者秦始皇刻石所起至更始元年太守許時燒六年十二月鑿官池東西十五丈七尺南北三十丈吳宫至秦猶存守宫吏以火視燕窟遂火焉朱買臣載故妻到太守舍猶即此地自唐乾寧元年刺史成及建大㕔宋初為節度使治所嘉祐間郡守王琪復新舊㕔閎甲諸郡陳經繼之作子城門樓觀甚偉元豐六年郡守章岵易以修廊覆以重屋又修㦸門由是自臺門至于府廷棟宇稱度整莫加矣且吳之黃堂在昔著稱實為郡國事始自唐以來又多勝概建炎兵燹靡有孑遺紹興初髙宗將駐蹕平江先命漕臣於府治營造宫室三年行宫成四年移幸七年三月詔賜守臣復為府治承平時每歲首飾諸亭縱民遊玩以示同樂元初江南置浙西軍民宣撫司後改為平江路總管府府官皆居外私宅聽訟决遣則完會治所有舊宋㕔署堂宇亭榭樓館凡三十餘所後多頽圮惟黃堂木蘭堂齊雲樓宣詔頒春二亭存焉至元二十年立浙西道提刑按察司就府置司遂遷府治於舊茶鹽提舉司未幾罷按察司府治復舊大德五年暴風作齊雲樓譙樓㦸門㕔署堂廡皆摧毁僅存黃堂木蘭堂頒春宣詔亭時真定董章為守復葺譙樓儀門設㕔并兩廡吏舍至正末張氏據此為太尉府及敗縱火焚之惟存子城南門耳門今稱鼓樓上置十二辰牌按時易之嘉靖間巡按御史丘道隆令毁之黃堂在雞陂之側春申君子假君之殿也後太守居之以數失火塗以雌黃遂名黃堂即太守正㕔也今天下郡治皆名黃堂昉此或謂以黃歇之姓名堂或謂二說皆非古者太守所居黃堂猶三公之黃閣也緗素雜記天子曰黃闥三公曰黃閣給事舍人曰黃扉太守曰黃堂設㕔即黃堂也唐乾寧元年成及建宋皇祐五年李仲偃守郡盧志作仲雍誤嘗修大㕔蔣堂為記叙㕔所始甚詳今題名逸李姓但名晉卿是其字也嘉祐中王琪始大為修治琪為規模宏壯假省庫錢數千緡㕔既成漕司不肯除破時方貴杜集人間苦無全書琪家藏本讐校素精即俾公使庫鏤版印萬本每部為直千錢士人爭買之富室或買十許部既償省庫羡餘以給公厨繼經兵火之後紹興三年宋伯友更建制度差雄高宗巡幸嘗以為正衙紹熙元年袁說友紹定五年鄒應博皆重修之相傳設㕔舊為燕犒將吏之所謂之旬設故公厨亦曰設厨蔣堂重修大㕔記姑蘇受署㕔新成當兵部員外郎李公晉卿守屏之明年冬十月也政修事舉所至精明完葺之初見梁間有題識乃有唐乾寧元年刺史成及所建乾寧距聖宋一百六十有餘年矣刺是郡者接跡不絶凡受署訖即臨便閣煩鞅沈迷其於㕔事或旬日不一至以至年祀寖逺棟將撓焉豫昔兩綰蘇印班録餘門每浚池隍構臺榭以館過賔以備宴衎以追韋白二公風跡雖自以為適然於是㕔繕完有所未至今觀李公之為有過人者圖新補廢俾唐末之遺構巍乎顯明吏民瞻之靡不胥恱君子自謂李公急於先務知布政之本焉豫目是事憮然咎因書本末云時皇祐六年三月日記譙樓即鼓角樓唐節度使入境州縣立節樓迎以鼓角故稱或謂宋淳化二年六月詔州府監縣應所受詔勑並藏勑書樓今之鼓角樓是也政和二年樓燬三年重作復更兵燹紹興二年席益鳩工三年李擢成之十九年王㬇始作刻漏二十年徐兢篆平江府額但立正門之樓而兩梜猶未復咸淳九年倪普去任留羡餘錢十萬大修之其更鼓之節凡日之晡則吹角一疊鼓十數聲謂之小引申時換牌樓上立兩旗指外春曰青陽夏曰朱眀秋曰白藏冬曰𤣥冥各如方色黃昏吹角五人為三疊過鼓者六人每角止撾鼓數千為三遍遍三攪六擂凡三角三鼓而止四更則奏角而不鼓亦謂之小引三㸃乃再發至五更止謂之大角動云按宋軍防格節鎮鼓角各有十二建炎兵火後重建元大德五年又壞於風總管董章重建之樓設鼓角㸃鐘日天池夜天池平水壺益水壺减水壺滴水壺二十四氣前郡圃在州宅正北前臨池光亭大池後抵齊雲樓城下甚廣袤按唐有西園舊木蘭堂基正在郡圃之西其前隙地南宋為教場俗呼後教場疑即古西園之地郡治舊有齊雲初陽及東西四樓木蘭堂東西二亭北軒東齊等處建炎兵後惟齊雲西樓東齊為舊製餘皆補造端平初張嗣古改郡圃名同樂園嘉定十三年綦奎新濬府宅後方池環以土山輦西齊之石益而為之立四小亭於上曰稜玉蒼靄烟岫清漪皆取昔賢郡中賦詠而名其齊雲樓前有芍藥壇每歲花開太守必宴客號芍藥會西園在郡圃之西隙地直子城甚袤唐時有之白公有詩宋以為西教場白居易閒園多芳草春夏香蘼蘼深樹足佳禽旦暮鳴不已院門閉松竹庭徑穿蘭芷愛彼池上橋獨來聊徙倚魚依藻長樂鷗見人暫起有時舟隨風盡日蓮照水誰知郡府內景物閒如此始悟喧靜緣何嘗繫逺邇宋蘇子美詩山水共誰尋風月共誰賞詩篇共誰吟花開共誰看酒熟共誰斟惠死莊杜口鐘歿師廢琴道理使之然從古非獨今吾道自此孤我情安可任唯將病眼淚一灑秋風襟北池又名後池唐在木蘭堂後韋白有詩池中為塢塢上有白公手植檜皮陸亦有木蘭後池三詠范志云今池乃在正堂之後而木蘭堂基正在其西後無池跡豈所謂木蘭堂基非唐故址邪或舊池更大與堂相聨邪皇祐間蔣堂增葺池館有宴集詩後作北池賦有云危橋虛閣今池皆不能容益知昔為廣池不誣矣嘉定十四年綦奎又作白檜軒於池上蔣堂北池賦并序姑蘇北池其來古矣昔刺史韋應物詩云海上風雨至逍遙池閣凉即其地也韋與白樂天皆有池上之作盛詫其景自韋白沒僅三百年寂無歌詠者豫景祐丁丑歲被命守蘇池館必葺嘗賦北池宴集詩是時端明張安道為邑崑山亦留風什傳刻于石故事在焉去此涉一紀豫復佩蘇印感舊成賦聊以寄懷云澤國秀壤句吳故城其野意之勝者有曲池之著名環碧曉漲浮光晝渟斡琅津之餘派分銀潢之一泓危橋跨波迅若走鯨虛閣延月清如構瓊乃飛蓋之所集靄芳塵之不凝主人一去之日復春草羅生賦詠幾廢㳙榮未平今兹稅霽鞅慰臨流之情目與景會神將喜并是時色䟱淨群動紛盈魚在藻以性遂龜游蓮而體輕禽巢枝而自適蟬得䕃而獨清科斗成文書之象蛙龜有鼓吹之聲以至鷗鳥羣嬉不觸不驚菡菖成列若將若迎岸産并柯之木波孕紫莖之萍灘露沙而金紫垣疊蘚以衣青新蒲鏘鏘挺水心之劒緑竹整整矗羽林之兵别有島檜髙聳虬枝相撐水石結操水霜薦英若古君子與世寡偶而特立獨行吁可異也噫境之勝者可稱物之秀者可旌故萬狀在目吾得題評者已吾方岸野幘踞風亭觴賔友奏竽笙或獨繭靜釣或扁舟醉乘惟蔗有漿用以析朝酲惟菊有華可以制頽齡而况庭無留事身若遺榮泯得喪乎意表育平粹於心靈姑徜徉於池上亦何慮乎何營皮日休木蘭後池重臺蓮花欹紅婑媠力難任每葉頭邊半米金可得教他水妃見兩重元是一重心浮萍嫩似金脂揚似烟多情渾欲擁紅蓮明朝擬附南風便寄與湘妃作翠鈿白蓮但恐醍醐難並潔秪應薝蔔可齊香半垂金粉知何似靜婉臨溪照額黃陸龜䝉和重臺蓮水國烟鄉足芰荷就中芳瑞此難過風情為與吳王近紅蕚常教一倍多浮萍晚來風約半池明重疊侵沙緑罽成不用臨池重相笑最無根蒂是浮名白蓮素花多䝉别艷欺此花真合在瑶池還應有恨無人覺月曉風清欲墮時皮日休重題後池細雨䦨珊眠鷺覺鈿波悠漾並鴛嬌適來會得荆王意秪為蓮莖重折腰陸龜蒙曉烟清露暗相和浴鴈浮鷗意趣多却是陳王詞賦錯枉將心事託微波蔣堂和梅摰北池十詠池上有虛閣暈簷迅若翔百壺多盛集四坐仰惟良蘚印文綦緑蓮衣桂楫香何由陪嘯詠敷衽納微涼池上有竒檜青青歲紀深舊枝憐茂殖時亦缺清吟夕月漏孤影秋霜滋徑心今方遇真賞風什播瑶音池上有孤島影搖波底天蓬壺欣髣佛仙客得留連岸草襯丹轂灘蘆隈畫船羡君休浣日寄傲一樽前池上有修竹遑聞手自栽幾因風韻響時感隼旟來粉籜經梅脫虬根遇石回嬋姢緑隂下小宴為誰開池上有垂栁烟籠濯濯枝芳根逢茂育老翠勝平時體弱因風舞詞清入笛吹金城久不到遙想歎羇離池上有叢菊繁英滿舊蹊金刀惜頻剪粉蝶得幽棲醉辨誰同插香箋手自題遙思清賞處野步岸東西池上有時釣間忘侍從身波平方浸月吏退閴無人藻映魴魚尾風搖獨繭綸一亭容膝地雅飾免荒蓁池上有時宴笙篁沸欲凝歡多漏移刻坐久月和燈席客詠持蟹女娼歌采菱醉來忘萬事風靜水波澄池上有雛鶴來從淮水壖舊巢離海樹清唳入吳天骨峭翹有霜月翎䟱刷野泉使君冝得伴仙格本千年池上馴鹿亭臺深處行長隨熊軾慣且免兔置驚遙草眠多穩流泉飲亦清寸岑有靈囿可使遂微生齊雲樓在郡治後子城上相傳即古月華樓也吳地記云唐曹恭王所造白公有詩亦云改號齊雲樓蓋取西北有髙樓上與浮雲齊之義據此則自樂天始也故其詩云欲辭南國去冉上北城觀治平中裴煜建為飛雲閣政和五年重作齊雲樓成紹興十四年王㬇重建兩挾循城為屋數間有二小樓翼之輪奐雄特甲於兩浙後陳芾沈皡史宅之重修唐白居易齊雲樓晚望偶題十韻兼呈馮侍御周殷二協律詩潦倒官情盡蕭條芳歲闌欲辭南國去重上北城觀復疊江山壯平鋪井邑寬人稠過楊府坊閙半長安插露峯頭沒穿霞日腳殘水光紅漾漾樹色緑漫漫約略留遺愛殷勤念舊歡病拋官職易老别友朋難九月全無熟西風亦未寒齊雲樓北面半日憑闌干人和公權登齊雲樓外春晴百鳥鳴樓中春酒美人傾路傍花日添衣色雲裏天風散珮聲向此髙吟誰得意偶來閒客獨多情佳時莫起興亡恨逰樂今逢四海清九口宴集前年九日餘杭郡呼賔命宴虛白堂去年九日到東洛今年九日來吳鄉兩邉蓬鬢一時白三處菊花同色黃一日日知添老病一年年覺惜重陽江南九月未搖落栁青蒲緑稻穟香姑蘇臺榭倚蒼靄太湖山水含清光可憐假日好天色公門吏靜風景涼榜舟鞭馬取賔客掃樓拂席排壺觴胡琴清圓指撥刺吳娃美麗眉眼長笙歌一曲思凝絶金鈿再拜光低昻日腳欲落備燈燭風頭漸髙加酒漿觥盞灔翻菡蓞葉舞鬟擺落茱萸房半酣慿檻起四顧七堰八門六十坊逺近髙低寺間出東西南北橋相望水道脉分棹鱗次里閭碁布城册方人烟樹色無隙罅十里一片青茫茫自問有何才與政髙㕔大館居中央事銅魚今乃澤國節刺史是占吳郡王郊無戎馬郡無門有棨㦸腰有章盛時儻來合慙愧壯嵗忽去還感傷從事醒歸應不可使君醉倒亦何妨請君停杯聽我語此語真實非虛狂五旬已過不為夭七十為期蓋是常須知菊酒登髙會從此多無二十場章憲登齊雲飛樓縹眇瞰吳邦表裏江湖自一方曲檻髙窗雲細薄落霞孤鶩水蒼茫固知興廢因時有獨覺江山共古長回首中原正愁思不堪殘日半規黃木蘭堂又名木蘭院白刺史有寄題木蘭西院詩後人以州宅後堂名之蓋紹熙中修故事所揭范成大書額嵐齊録云唐張摶自湖州刺史移蘇州於堂前大植木蘭花當盛開時燕郡中詩客即席賦之陸龜䝉後至張聨酌酹之龜䝉徑醉彊執筆題兩句云洞庭波浪渺無津日日征帆送逺人頺然醉倒摶命他客續之皆莫詳其意既而龜䝉稍醒援毫卒其章曰幾度木蘭船上望不知元是此花身遂為一時絶唱范氏云案舊堂基在觀德堂後古木猶森列郡守數有欲興廢者而卒未就承平時堂僅有治平二年陳經所刻御書飛白碑揭于木蘭堂之新閣其後不復存矣又新志云堂在西園凌風臺後池南即其故基寶慶間猶存紹定二年闢教場始鉏治之范仲淹木蘭堂詩堂上列歌鐘多慙不如古却羡木蘭花曽見霓裳舞楊備木蘭枝密樹仍髙堂下花光照節旄列鼎重茵歌舞地金章同色使君袍西樓在子城西門上後更名觀風樓續圖經云元微之寄白樂天詩云弄潮船更曽觀否望市樓還有會無注云望市樓蘇之勝地今觀風樓為近市殆即此邪紹興十五年王㬇重建二十年徐琛篆額下臨市橋曰金母橋亦取西向之義淳祐中魏峻大修之取白公詩表其下曰柳橋槐市且自賦詩又撥錢樁添倅㕔以俟異日修葺之助及黃萬石改作如臨安豐樂之制白居易西樓雪宴詩宿雲黃慘淡曉雪白飄颻散麵遮槐市堆花壓栁橋四郊鋪縞素萬寶甃瓊瑤銀榼携桑落金爐上麗譙光迎舞妓動寒近醉人銷歌樂雖盈耳慙無五袴謡城上夜宴留春不住登城望惜夜相將秉燭逰風月萬家河兩岸笙歌一曲郡西樓詩聽越客吟何苦酒被吳娃勸不休徒道人生都是夢夢中歡笑亦勝愁劉禹錫登見西樓樂天題詩湖上收宿雨城中無晝塵樓依新栁貴池帶亂苔春雲水正一望簿書來繞身烟波洞庭路愧彼扁舟人玩月牛夜碧雲收中天素月流開城邀好客置酒賞新秋影透衣香潤光凝歌黛愁斜輝猶可玩移宴上西樓楊備觀風樓觀風危堞與雲齊樓下開門畫㦸西鼓角聲沈絲管沸捲簾晴黛逺山低范仲淹觀風樓髙壓郡西城觀風不浪名山川千里色語笑萬家聲碧寺烟中靜江橋栁際明登臨豈劉白滿目見詩情章造西樓懷感高花古栁傍城闉游目江城次第新百感中來倚惆悵滿城烟雨滿城春耿元鼎西樓一曲舊笙歌千古當樓面翠峨花發花殘香徑雨月生月落洞庭波地雄鼓角秋聲壯天逈闌干夕照多四百年來逢妙手要看風物似元和東樓唐有之宋開慶元年馬揚祖建小樓於熙熙堂之側以是為名扁曰清芬獨孤及重陽陪李蘇州東樓宴詩是菊花開日當君乘興秋風前孟嘉帽月下庾公樓酒鮮留征客歌能破别愁醉歸無以贈秪奉萬年訓東亭唐有之白公有詩宋更他名白居易詩溫溫上爐火耿耿紗籠燭獨抱一張琴夜入東齊宿窗聲度殘漏簾影浮初旭頭癢曉梳多眠昏春睡足負暄簷宇下散步池塘曲南鴈去未回東風來何速雪依瓦溝白草繞墻根緑何言萬户州太守常幽獨西亭唐有之白公有詩宋之西齊是其處白居易詩常愛西亭靣北林公私塵事不能侵共閒作伴無如鶴與老相宜只有琴莫遣是非分作界須教吏隱合為心可憐此道人皆見但要修行功用深又題西亭朝亦視簿書暮亦視簿書簿書視未竟蟋蟀鳴座隅始覺方歲晚復嗟塵務拘西園景多暇可以少躊躇池鳥淡容與橋栁髙扶䟱烟蔓嫋青薜水花披白蕖何人造兹亭華敞綽有餘四簷軒鳥翅復屋羅蜘蛛直廊柢曲房䆗窱深且虛修竹夾左右清風來徐徐此宜宴嘉賓鼓瑟吹笙竽荒淫即不可廢曠將何如幸有酒與樂及時歡且娛忽其解郡印他人來此居初陽樓在郡中池上皮陸有詩既曰初陽宜占東城皮日休登初陽樓危樓新製號初陽白粉青葌射沼光避酒幾浮輕舴艋下碁曽覺睡鴛鴦投鈎列坐圍華燭格簺分明占靚粧莫怪重登頻有恨二年曽侍舊吳王陸龜䝉逺窗浮檻亦成年幾伴楊公白晝筵日暖烟花曽撲地氣和星象却歸天閒將水石侵軍壘醉引笙歌上釣船無限烟波猶在目東風吹起細漪漣池光亭在郡宅後即唐之北亭相傳為白刺史命名紹興十七年鄭滋重建池傍有小山二東曰芳坻蔣璨建飛白書額西有檜三十一年洪遵訪白公故事所植自有記淳熙六年司馬伋以亭名犯家諱暫揭木蘭堂榜紹熙初濳說友復之嘉熙四年亭圮後以故址為春雨堂其額又廢淳祐三年陳塏以池光故亭乃外氏洪遵所葺遂以坐嘯齊改為之櫻桃園唐皮日休春夕陪崔諌議櫻桃園宴詩萬樹香飄水麝風蠟燻花雪盡成紅夜深歡態狀不得醉客圓開明月中陸龜䝉奉和佳人芳樹雜春蹊花外烟䝉月漸低幾度艷歌清欲轉流鶯驚起不成棲雲章亭在舊凝香堂西南紹興三十一年洪遵命名有仁宗賜陳經飛白書端敏寶文閣佛字石刻奬諭陳經勑賜丁謂詩及髙宗書千文真宗御製賜平江軍節度使丁謂詩序卿黃閣同寅實彰於盡瘁碧幢臨鎮方屬於報功言當入謝之辰特賜褒賢之作今成七言四韻詩一首賜新授蘇州節度使丁謂依韻和進詩云懿辭碩畫播朝中造膝詢謀禮遇豐文石延登彰順美髙牙前導表疇庸書生仗鉞今尤貴舊里分符古罕逢晝錦買臣安敢比黃樞早日接從容謂次韻和進云白麻初降紫宸中簮組相驚帝澤豐驟陟將壇知運偶久塵台席愧材庸桑榆便覺人間别旌㦸猶疑夢裏逢已是都城聳榮觀更頒天唱耀戎容又賜御詩序卿名藩出蒞雖極於倚毗文陛言辭良多於眷注特示寵行之什用增方面之榮今成五言十韻詩一首賜蘇州節度使丁謂依韻和進詩云踐厯功皆著咨詢務必成懿才符曩彥佳器貫時英俾展經綸業旋升輔弼榮嘉亨欣盛遇盡瘁罄純誠均逸明恩洽疇勞茂典行白麻三殿曉紅斾九衢平雖輟凝嚴任尤增倚注情擁旄辭帝闕頓轡望都城風景髙秋月烟波幾舍程想卿懷感意常是夢神京謂次韻和進云叨竊逢嘉會孤單荷曲成髙車陪上宰密座厠羣英步武清華地優游侍從榮勤劬期薄效忠謹誓明誠方畏官針失俄驚寵命行冒恩心易感戀聖意難平未副宵衣念寧安晝錦情搖搖千里棹眷眷九重城茜斾輝登路瓊章耀去程子牟牽望處金闕玉為京謂跋云臣謂材用無取聲猷不揚徒以遭遇盛明忝冒榮寵掌邦計參國政一紀于兹贊皇儀相盛則百禮斯舉位重逾量恩深積憂蓋早負官針久妨賢路或驟掇物論則大辜聖知優退是希陳露未暇去年秋九月甲辰忽奉制命遙登將壇進崇秩於上公建髙牙於故里君親竒遇臣子殊榮授命之初便殿賜對天語撫勞睿㫖溫密至感至戀且拜且泣十一日復對於宣和門賜御製入謝日七言四韻詩一首十九日朝辭於長春殿賜御製寵行五言十韻詩一首皆俾和進丹文緑字親奉於紫清雲笈芝函頒流於衡泌簪纓聳觀油素騰芳璧日九華但圓首以拭自薰絃六變罄方輿而恱心期大播於玉音敢盡刋於金字蘇臺粵壤鍾阜名區並謹歲時永昭盛美大宋天禧元年歲次丁巳正月二十六日推誠保德翊戴功臣金紫光祿大夫檢校太尉使持節蘇州諸軍事蘇州刺史充平江軍節度蘇州管內觀察處置堤堰橋道等使知升州事兼御史大夫上柱國濟陽郡開國公食邑三千五百户食實封一千二百戶臣丁謂戒石銘刻石在㕔事南銘即宋太宗書孟昶令針內四語也郡縣皆同山隂堂景祐中張億建瞰野亭見山閣皆蔣堂建按武堂至和中吕居簡建射臺嘉祐中蔡抗置飛雲閣治平中裴煜立介軒熙寧間韓朴植怪石於便㕔後榜以是名月臺在城西北隅元豐中晏知止葺故亭於上改稱云湧泉亭洗馬池祥符圖經云在州衙內北軒在郡宅後寶祐五年重建於木蘭堂後東廡扁曰聽雨西曰愛蓮梅摰北軒欹枕詩苦無勤瘁補臺綱西院西頭冷峭房今日鈴齊一欹枕清風不敢傲羲皇介菴在木蘭堂南凌雲臺下慶厯八年梅摰建併作銘後菴入通判東㕔久亦廢而銘石尚在介菴銘并序表署西北有堂曰木蘭堂之南有臺曰凌雲灌木駢生其上臺下有故園廢洞址在焉豫因訪陳迹通其塞而菴之惜乎孑孑立一隅中無長物入之者志意斂然思有所守宜介其名而銘之庵非廣居介不兼濟有守退公杕而獨詣心淵坐澄默與真契嗚呼公怒賊私不遷而霽私欲蠧公不萌而制世紛萬殊浩乎亡際何以靖之曰思無邪一言以蔽慶厯八年九月二十五日尚書户部貟外郎知蘇州軍州事梅摯立雙蓮堂在木蘭堂東舊芙蓉堂也至和初吕處約以雙蓮花開易名楊備雙蓮仙影面波光翠蓋搖風紅粉香中有畫船鳴鼓吹瞥然驚起兩鴛鴦㦸門紹興元年胡松年建榜以平江軍額徐琛書元稱為儀門待班亭二在譙樓城下東西相向紹興巡幸時草創更衣亭二在東西朵城之陽亦紹興所創扶春池光亭後酴醾洞也紹興二年沈揆命名并書雙瑞堂元稱西齊紹興十四年王㬇建紹熙元年長洲有瑞麥四岐及後池出雙蓮袁說友葺舊齊表以是名嘉定十三年乂改思政寶祐中作新堂舊稱併廢范成大雙瑞堂記維紹興初元夏四月吳郡袁使君為政之再閲月也長洲之彭華鄉以瑞麥獻乂三月木蘭後池以瑞蓮獻麥兩岐巳堅栗可刈岐間復出新苗五枝青葱且秀且實後十日又岐於新苖之半亦秀實如前按瑞麥圖自兩岐至九岐者有矣未聞枯莖之稊一再重出青黃殊色而三頴俱茂有生生不窮之意蓋創見云蓮則共蒂異花連理並秀豐腴適相當亦竒産也吏民歡喜謂造物者效珍發祥工深巧妙非賢使君孰能致此又謂使君辱臨吾州政爾暖席而嘉瑞輒應何其速邪余聞神人精祲之交其跡固相絶逺一念感通則和同無間直瞬息頃爾固未可速計也方使君持節按刑時以柱後惠文繩郡縣弗䖍官吏絫足立逐捕劇賊血其鯨鯢風采烈於秋霜朝廷第最課進直中祕書就牧此邦吳人憺其威名相與屏氣惕息使君一日過范村從容為郡余言嚮吾以衣繡持斧為職知飭法鉏姦而已今為守號稱民父母當有惻怛之愛拊摩惸鰥若乳保之於赤子使百姓知吾此心庶幾有不忍欺者雖蒲鞕且弗願用况於桁揚敲朴乎余矍然起賀曰公此心當與天通人固未能盡知神者其知之矣閲時亡幾而叶氣薰翔被于珍物豈非一念之感如鼓應桴有稀不疾而速不召而至歟是歲秋大熟政成人和庭訟簡郡廓無事曩之蘄望於民者皆如本指益知祥應之不虛於是部使者暨府縣之賓佐皆盡圖以傳賦詩以相唱酬猶謂未足傳久逺且春秋有年大有年皆以喜書今兹樂歲善收甌窶汙邪無不滿望二瑞實兆其祥尤不可以弗識乃以雙瑞名郡之東堂余又為原其所以致祥者為之記因以附見有年之喜亦春秋之遺意焉使君名說友字起巖建陽人嘉平日石湖范成大記四照亭在郡圃東北紹興十四年王㬇為屋四合各植花石隨時之宜春海棠夏石榴秋芙蓉冬梅紹定中廢負暄野録云慶元中趙不囏會客問名亭所自銅陵主簿姚行簡對曰山海經云招搖之上其花四照華嚴經云無量寶樹普莊嚴華醈成輪光四照又云光雲四照常圓滿今亭四面見花故以此名趙稱賞贈遺甚厚頒春宣詔二亭紹興十四年王㬇建知信州吳說書額傍有東西二井亭乾道四年姚憲建坐嘯齊在四照亭南紹興二十七年蔣璨建并書額思賢亭在舊木蘭堂之左池光亭西以祠韋應物白居易劉禹錫三刺史後改曰三賢堂紹興二十八年蔣璨重建三十二年洪遵益以王仲舒范文正公像復更曰思賢堂嘉定十四年綦奎再新之又於堂北創白檜軒仲并撰三賢堂記紹興二十八年春敷文閣待制陽羡蔣公之鎮吳門也既期年矣治最上聞帝用褒寵民安初政郡以無事公唯益勤不懈事有關於風教纎悉必舉前人遺蹤勝概以次復焉思以前政信安孟玉之意嘗捐金欲興三賢堂祀唐左司即中曰洛陽韋公太子少傅曰太原白公太子賓客曰中山劉公皆嘗牧此邦者邦人尊之曰三賢曩歲為堂以祀之毁於兵火垂三十年邦人念之歎息公訪其遺基得於郡治故木蘭堂之左攘剔榛翳掄材庀工百姓不知僚屬皆樂從也紹興辛酉堂成制度古雅不陋不奢稱三賢之居中塑其像以次位置于堂南向東上并嘗一再從公過焉公曰其為我記歲月固辭不獲并每獨怪唐史如文藝儒學循吏三傳幾二百人韋公法當處一焉乃獨不為立傳亦史册之遺恨也惜哉公正元初由左司郎得郡于此清德臨民民樂其政暇日賓禮名流與之酬唱于時白公客遊郡下盛稱公風流雅韻播於吳中至有詩仙之目自以不得與公逰宴為不滿已而罷郡寓永定僧廬羈旅蕭然欲求田課耕而未得每端居焚香掃地而坐清風峻節可想而知其後白公自杭移蘇實寶厯初元也首以公郡宴詩鑱之石酷愛慕之每自謂不及韋公大概可見於此史不傳不得不致詳焉若白與劉行事始終則有本傳在二公共生大厯壬子歲真輩行也晚益相厚世謂劉白白之去郡劉以詩遺之有十萬戶嬰兒啼之句雖三代遺愛何以加焉後六七年當大和中劉亦繼來乘郡荒疫之餘撫摩安輯免民於轉徙文宗錫服以寵之白公時在河南猶以詩為劉賀三賢平時道義相先分相好誠相與也而文聲政績兼優並著且俱踵為有意於民者名藩巨屏得一師帥吾民幸矣乃接來臨歲月末逺聲名風采炳乎其輝一時盛事他郡所未有也去之三四百歲邦人懷慕之不衰宜哉公復振起而一新之是將傳之愈久而愈無窮也蔣氏代以儒學顯至公而守兹土者三世矣公少受知於世父樞密太師魏公翰墨篇章悉有家法晚逢明天子擢登法從處劇以簡中扃湛然到郡今踰年矣鋤荒植廢皆如此堂未易一二書也并聞元祐中魏公帥南海郡人繪前刺史吳公隱之宋公景而下八人築室以祠之魏公閲圖籍所載又得滕公修王公林合前八人者號十賢各為之贊叙公今新斯堂也視十賢之舉蓋不謀而契益知公之心真魏公之心哉敢併書以告來者五月庚申朔左朝奉郎前差通判信州軍州主管學事江都仲并記廣平程紹祖書范成大撰思賢堂記吳郡治故有思賢亭以祠韋白劉三太守更兵燼久之遂作新堂名曰三賢其四年當紹興辛巳鄱陽洪公始益以唐王常侍本朝范文正之像復以舊之名亭者榜焉先是公以歲五月來臨吾州繇州南鄙望洞庭略具區觀三江五湖之吐吞濤波䀨天旁無邊垠而石隄截然浮於巨浸之上若有鬼神之扶傾鯨鼇背負而湧以出也暮夜人語馬嘶胸胸不絶公固已語其人思常侍之功矣周覽原田而相其溝防東南之播於江東北之委于海者脉絡釃通堙蕪滌涂夏旱易以陂潦水時至不能齧渚涯以决汙邪荒寒化為麥禾起景祐迄兹歲無大浸於是公又曰非文正范公之勤其民者乎退而參石記竹書之傳詳兩賢行事尚什百於此韓退之銘知言碑王之墓隧謂治蘇最天下蓋遺册廑存於一隄其變滅無考者不知幾也文正自郡召還遂參永昭陵大政德業光明為宋宗臣通國之誦曰文正公而不以姓氏行焉韋白劉之餘愛邦人既已爼豆之語在舊碑尚矣王范風烈如此且有德於吳宜俱三賢不沒以為無窮之思此堂之所為得名者嘗謂士才高必自賢位高或不屑其官世通患也㓋公忠宣之子擢博學宏詞第一名字滿四海餘二十年既入翰林為學士未幾自列去甫及里門制書以左魚來矣邦人度公且上朝謁莫能久私公也然始至之日咨民所疾苦退然不自居其智能亟從掌故吏訪諸賢之舊圖畫髣佛想見其平生公既以道學文章命一世顧有羡於五君子者意將迹其惠術講千里之長利以膏雨此民彼憧憧往來視桑䕃趣舍人裝者慮安肯出此夫才髙而不自賢位高而滋共其官盛德事也斯堂法應得書會公使來屬筆紀歲日成大世占名數西郭樂其州多賢守令之不歉於古也文正公又吾東家丘焉竊願詫斯堂以夸鄰邦以為邑子榮乃不辭而承公命八月既望州民左從事郎范成大記并書東齊又呼草堂高宗駐蹕燕射於此紹興三千年朱翌新之為天臨堂會去任隆興間沈度乃更名復齊紹熙三年沈揆又改思政堂自書扁瞻儀堂在㕔事東記云在郡治西北紹興三十一年洪遵建吳民俗重太守每來者必繪其像春秋陳於齊雲樓之兩挾吏民瞻禮至是遵恐侵壞作此堂藏之紹熙三年沈揆遷諸像於凝香堂併移舊扁慶元二年鄭若容圖于壁間而以舊像庋之閣上樓鑰為記嘉定六年陳芾併撤堂後逍遙廢閣廣而新之陳振記寶祐五年趙與􅊸重建端平三年張嗣古奉安韋應物王仲舒白居易劉禹錫范仲淹五賢像于內清波雜志云王顯道守吳遣騎之常州寫真於孫仲益併復齊雲舊觀范成大瞻儀堂記吳自置守以來仍古大國世為名郡又當東南水會外暨百粵中屬之江淮四方賔客行李之往來畢上謁戲下願見東道主城門之軌深焉稻田膏沃民生其間實繁井邑如雲烟物夥事穰有司程文書應官府者以千萬計奉使命大夫行部第郡課必致詳於吳以視列城其雄劇如此夜漏未盡太守坐堂上主吏儐客旅進退語言面目不暇相孰何平明乃得據按聽諸曹白事率常旰食有頃他客與報期會者又至如前雖精力過絶人其勢亦出甚勞而後能善治故吳郡虎符非名德士若已至大官者不以分去之數十百年長老猶以為記至藏其繪像畏愛之如一日鄱陽洪公之以內相典城也乃規東序之間屋為堂取凡公私所藏故侯之像頗補其闕遺列畫其上又采韓退之廟學碑語名之曰瞻儀而命州民范成大詞而識諸石竊嘗觀郡國方志與耆舊風土之書既備載山川土疆郭郛所在必論次前世賢守長爵里姓字之大略著于篇謂君子嘗居之其地故僻陋猶借此以為寵今吾州不獨能志其人而肖貌具在章綬相輝凜凜如對生面他郡未聞有此雖大府地重多顯者來自有以不沒抑吳人習於親上至久逺且弗弭忘氣俗之媺舊矣洪公蓋始表出之盛事固不宜無紀然公實以紹興辛巳夏五月至郡是歲值敵謀畔盟積甲並塞使行人來啓兵端又造舟東海上將數道入冦天子赫怒大發步騎待邊分命樓船將督水居之士營巨浸以直敵衝吳前當出師通道後控海浦所從入烽堠相望羽書疾星火公聲無氣弗為動舂容頥指不斂一錢不藉一夫機事立决留行姦人幸騷搖一逞心醉回則相率遁去里門晏閉田間無吠犬行歌刈熟不知有軍與民德公甚念無以報恩勤飲食必祝焉公於艱難時用劇郡呼吸變故曽無足以嬰道德之威齒文章之斧斤者治行冠一世而不自以為功若此足矣顧方帥其吏民以館御諸賢覽觀裴徊若慕用之云者夫有餘則毋我不足者多尚人君子之德心豈世俗所能測識者哉後之人厯階而登冇感於作者之意疇昔以行能蓋前聞人其必葺斯堂而嗣其事壁間之圖將魚鱗雜襲至於無窮可也敢併書之以風來者十月九日左從事即范成大記秀野亭在坐嘯齊西紹興三十一年洪遵建觀德堂在教場唐西園地也紹興間徐琛建西又有射亭新志云觀德亭在西教場紹定二年李壽朋拓教場隙地移建於南舊木蘭堂基之西後名閎武逍遙閣在舊凝香堂後即舊觀復堂也蔣璨書額取韋公逍遙池閣凉之句嘉定中廢凝香堂在思賢堂西面臨池紹熙三年遷郡守畫像於此更名瞻儀後以舊扁揭諸黃堂後廡平易堂在小㕔東挾紹興間蔣璨立自書扁淳熙五年單䕫易以𨽻書後改熙熙又改葵軒凉渚本名流杯舊在凝香堂隂後徙池光亭後碧玉壼在秀野亭西地有茂竹故名寶祐末廢知樂亭即舊生雲軒也在古池光亭東端平中張嗣古改立郡人周虎書額淳祐初廢御書堂在春雨堂西淳祐中史宅之以思賢故址奉理宗書家有膏雨戶有陽春八字唐張說撰宋璟遺愛碑語及春雨堂額奬諭勑書徐鹿卿亦以御筆奉安其內春雨堂在後池北初池光亭圯淳祐二年重建堂成史宅之乃以理宗書額揭之以侈君賜朝奉郎應㒡記淳祐二年春平江府治作新堂于池上秋工役告備顯謨閣直學士通奉大夫知軍府事兼浙西兩淮發運使史宅之拜疏聞于上曰臣䝉恩再領蘇卬賴天子仁聖格于上下物不疵厲而年穀熟獲與民相安郡治北池舊有亭曰池光郡太守澡心雪神思政慮善之地陋且圯也深惟一日必葺之義捐餐錢節冗費更建為堂堂成顧名弗稱竊伏惟念昔者幸備推擇守藩于兹粗知究心牧養叨被聖奬遣使賜御書家有膏雨户有陽春八大字昭回下飾吳人以為榮臣不佞敢聖敬奉春雨二字冠斯堂以揚寵光以撢德意以丕迪訓惟陛下財幸上覽疏可其奏錫以宸奎使得揭扁於戲㫖哉謹按吳郡志郡治後圃有北池韋白之所賦詠一名後池池光亭在其北紹興十七年守鄭滋重建然則尚矣三十一年洪公遵葺之距重建未久也而多厯年至於今撤而新之若有待池光舊名莫考所從始淳熙中洓水司馬家孫曽至則以嫌故借木蘭以名池之東木蘭堂固在其何可復出厥今度宏規成廣厦崇聖翰標嘉名春雨一堂遂為吳中巨麗之觀蓋非偶然者其庀役也因舊址厚培而勢若負山倚屏然堂髙三十二尺橫視從倍淵如曠如四面皆架軒三間展如昭如南俯大池浮水觀以受荷薰北與齊雲相直如闢穹如膴如上棟下宇五間起乎中央數贏五十尺焉人莫不曰偉哉堂也堂名我不敢私雲章天筆賁如濡如豈真以誇榮耀聳觀瞻而已自公退食言登斯堂因名而思義愛民澤物之念油然以生充而大之仁不可勝用矣仁之於四端猶四德之元四時之春偏言之主一事専言之包四者故春者春之生夏者春之長秋者春之成冬者春之藏何莫非春也乾坤之有六子動散潤熯止說互為之用雲行雨施乃獨見於乾而所謂元者非春乎君天也乾也四時之行六子之運則臣也天朝選用嶽牧臣子對揚休命均此臣也公既以自任又以規將來堂之名㫖哉公天資髙淵綜而廣博天子以為烈考是以治吳有美政選表而入且踐台斗矣屬時以實塞為急㑹吳中薦饑遂命公奉使典州公再至能為所人作豐年以其餘飽邊兵而活都民天子嘉之兹堂謂見吾善者機也公歸參化鈞穆天縡家有膏雨户有陽春又將為天下誦之冬十月朝奉郎應㒡記仁政堂在小㕔東北寶祐六年趙與􅊸撤造酒庫創為之其後季鏞扁今名通判東㕔在郡治西紹興九年白彥惇建十六年時衍之撰題名記咸淳五年葉隆禮重修正堂目曰敬簡㕔西有琵琶泉小丘嵌巖曰西施洞淳熙十一年魏仲恭葺洞門作捧心亭後更舞雪又有風月堂蔡塏復於㕔西作光風霽月堂郡人王野書額通判西㕔在子城西南隅范志作東南角淳熙十六年施邁立石題名嘉熙初翁逢龍重修知府王遂記逢龍又有足清堂種書堂詩未詳所在景定五年趙與鑑撰續題名記淳祐三年謝堂作屏星堂吳邃記城上有小樓見西山名湧翠王遂記平江通判西㕔在子城西南最髙處宜隆而汙宜豁而抱宜整齊嚴肅而雜處閻閭甚不稱夫通都輔郡之體治中别駕之居翁君過遂而言曰佘郡一年矣而假室廬於人其何以尊君命而寧親心且堂扁題以淳熙十六年東偏則次年施君邁之所營歲月非不深而事力微矣㑹將斥而大之舍舊而圖其新能無懼余力之不任乎遂矍然而起曰君之及此言吾郡之福也乃與提舉趙公崇揮總領吳公淵桂公如琥合六縣之長鳩財以助之而君以其力僝功其間一日往視之則堂崇成矣未幾人過之則㕔事立矣門屋閎矣闢其東軒翼以後序髙燥逺過其舊而營築斂退於初面贄朝揖莫不就正毫釐尋丈秩秩不差於是汙者隆拘者豁而整齊嚴肅隱然題輿泥軾之氣象偉哉其斯舉也謁記豫遂因為之言曰吳古之建國也自泰伯季札以禮遜先天下至於晉唐千有餘年之間騷人墨客之所登臨忠臣義士之所感慨不為不多矣而力未有以贍才又未足以給今君於此建官府而臨庶民坐堂皇而理百事於以出入王命經理兵賦不亦韙歟入侍潘輿怡怡衎衎有雋不疑范滂所不能及者豈非天下之至樂乎抑吏退賓閒舉酒屬客拍手而歌吳趨以訪闔閭之舊逰尋龜䝉之遺跡其樂有人不與知而已獨知之者又非言語之所能及也乃為之書君名逢龍字際可甬東人號龜翁登嘉定丁丑第詩思清越出大厯正元畦徑之表而長於吏才費之大小役之逺近不書余之為此者非但喜兹屋之成乂以幸斯文之得所託也嘉熙改元七月丙辰朝奉大夫煥章閣待制知平江軍府事兼管內勸農使節制許浦水軍賜紫金魚袋王遂記僉判㕔在儀門西舊名都㕔淳熙十三年重建㕔西有勤繼堂木待問命名范成大書額石如塤撰記及有前後題名三記平江府僉判㕔勤繼堂記皇帝龍飛改元春官收郡國賢能永嘉木公待問大魁天下授僉書平江軍節度判官㕔公事以乾道元年九月二十有四日庚午至皇帝在位四祀矣眷治道之方興想中原之未復以為未有不先內修而遽能外治者於是絀懦柔斥弇陾民瘼革政弊本農桑懷歸附繕戎械肅邉徼剗文務實貴厚益浮靡逺近小大莫不改慮易圖趣上意之攸向木公拊瑑而歎曰求治在朝應治在州一州不治也實虧天下之治太守總州治之略而已别駕二州治之略而已六曹有參邑有令丞簿尉復各自治其職而已匪守匪倅而守倅以之簡匪曹匪邑而曹邑以之諧此僉書之所以不可廢虧其間也歟是州今股肱郡吾其敢易㕔事之西有堂可以燕可以息可以思可以為則名之曰勤繼蓋取郤成子能勤繼之義也求法書於郡人括蒼太守范成大而題之且謂仲尼沒吾道中否無為之說滿天下而勤為鄙天下不見唐虞三代之治者知有無為而不知有勤也舜以無為為舜舜之無為吾聞其有臣五人而後天下治不聞其無臣而天下自治也吾聞其恭已正南面而已矣不聞其已之不恭而南面之不正也五臣各得其職而又已之必恭南面之必正舜有一日之不勤哉舜不如是不能無為而治也杜元凱曰勤則功繼之人臣之功莫大於禹稷豫乘四載隨山刋木禹無為乎黍稷重穋植稚菽麥稷無為乎禹稷不能以無為事舜後之人君臣俱欲無為非姦則諛夫何修名之能立也木公胸中之藴將至萬萬升平豈適為州設邪寓名斯堂則不小乎州而弗為也不小乎州者且何大於天下粵明年五月召去如塤以散才承乏偶屬後塵時太守顯學吳興沈公介精白惠紏不可以弗勤事也外臺在郡使者實今太守直閣㑹稽姚公憲風規振肅尤不敢弗勤今憲使者司諌丹丘陳公良翰器閎道直凡州縣屬惟恐勤之弗至二年之內出親吏帥之儀退味勤繼之㫖雞鳴而興功非所幾也在易蹇之井者敢不以之顧將及代矣而夫魁同郡蕭公國梁實來是固嘗茂明乎勤而舜俞之者也居斯堂也事斯上官也是殆相須以行乎禹稷之道者也是殆相須以禮樂斯民者也且何州之弗治天下之州皆有是吾無外輕之憂矣嚴班對杜區區中興之䇿奚為哉維四年龍遊困敦辰在析木之津二十有二日庚戌吉長樂石如塤記虎丘之農林東書節度推官㕔在通判東㕔西嘉定三年重建西軒扁曰氷壺觀察推官㕔祥符圖經云在州衙門內西後遷子城南紹熙間以平橋南舊酒庫改為之嘉定三年吕伯誾重修有記紹定二年吕祖忞撰題名記宋李卞重修觀察推官㕔記平江觀察推官廨故在子城之南隅去郡庭才數十步蚤暮入幕為良便淳熙間有去官者代未即至庾臺因假以處幕屬久而不歸遂以麗譙南廢缺酢庫為治所即今廨也有屋數間介于民居敗椽破甓支柱交午每大風雨勢岌岌然若將壓焉纍政相仍弗果葺吕君蒞事之三月慨然曰郡從事為今從八品官雖卑郡政無小大皆與聞焉異時繇此登顯途者項背相望而所居痹陋若此非所以稱幕府待賔僚之意縱未能撤而新之獨不可為之以漸乎乃相地之宜即㕔事之左闢屋數楹窗户疏達四坐顯敞繚以修竹為燕坐之所然後為壁為廡下至庖圊皆以次畢具經始於癸亥之末夏訖工於首冬凡為屋十有四間基堅材良不侈不陋視前日子城故廨規橅逺甚君將代去求文以記歲月卞切聞昔之叔孫婼羈於晋其所館雖一日必葺去如始至况在官乎今之仕者多安於茍且重於改為視官舍如傳舍玩愒因循既幸其滿始飭胥徒旋加丹堊以遺來者棟宇摧腐庭戶之湫隘謾不加省視殆有愧矣吕君來未暖席方僕僕奔走應簿書期㑹剔拔蠧弊以贊郡綱乃能謀其室於從容談笑間井井而辨客至則杯酒相屬吏退則書史自娛受用三載而遺後人以安嗚呼可以觀政矣故樂為之書吕公名伯誾字正之申公五世孫也開禧丙寅夏五月壬辰朝奉大夫新擢發遣安慶軍府兼管內勸農營田屯田事借紫李卞記名記官無崇卑居之者必有以紀其到罷之歲月其來尚矣平江為輔藩觀察推官為幕屬中興今逾百年獨無紀載不其闕歟府院在子城內東南㕔事西有簡孚堂紹興十一年録事參軍吳芾作乾道五年芾入對過吳題詩㕔壁録參王康彥以入石并刻前記為此㕔盛事紹熙元年趙景度刻石題名祥符圖經云州縣在州衙內東偏前志府㕔在譙樓東陳之茂記平江録事參軍吳明可作堂於㕔事之西友人陳之茂一日過之愛其闃然幽深與公齊不類明可徐謂曰僕猥以不肖典兹獄市常以人命至重大懼不明以抵纍于非辜究懷怵惕夙夜靡敢自安兹堂之作非晏樂是圖蓋將為訊鞠論囚之便焉客有取周書五辭簡孚之說以名者願得子一言之茂戄然起而前曰嘻明可不茍於其官如此哉夫君子之仕無小大舉得以忠恕仁厚施諸人而功甚連者莫如獄然巽懦不事諉可否於吏吏因緣邀賕執爰書捃托微細考一連十玩歲月不報不則觀勢利所鄉肆請託之私為豪傑囊橐而羸知弱寒窶卒以纎芥文致不减幸而强敏可喜往往舞苛察鍥薄慘刻務以威猛立名嗚呼獄君子所盡心也使持法者一有是則刑失其平而銜恨䝉寃無所赴訴寧忍之乎是以哀矜欽慎巨細坐折皆得其實等惟寬平之歸則食息俯仰庶幾無愧屋漏明可學通世務介而有守居官餘年明允篤實之譽隱然在人則斯堂之義固已從容躬蹈僕尚奚云明可行為中都刪修之官陪相國餘論筆則筆削則削一字輕重利害相萬願無忘今日用心明可冝此言請刋諸石併以告夫來者明可名芾丹丘人紹興十一年七月旦梁溪陳之茂記司理院在子城內西南紹熙元年李直方刻石題名寶慶三年提刑林介司理章巽亨建㕔後正堂曰清安軒曰盡欽㕔東軒曰甘竹改名務平盧氏云按李莊簡公奏疏云朱勔展南宅以奪司理院則非舊處明矣或謂今院乃政和所遷雖與李疏合但今獄庭有塔在及葛蘩記作熙寧己酉歲二年似與前說不同祥符圖經今移在子城外西南隅前志云在譙樓西司法㕔舊在子城內後以平橋南舊醋庫為之紹定三年趙汝渠重建并書額後有便坐東曰雲舍西曰賦梅劉平國撰記司戶㕔在府院西慶元二年重建㕔西小圃有玩花池采香徑秀芳亭飛雲閣㕔東有小山亭曰小蓬瀛池北有長嘯堂皆建人袁申儒所葺治并撰題名記又鄭霖撰壁記鄭霖記尸曹之官㕔壁記尚矣吳君天澤兩年成資節齊資尹辟置醴幕趣來不容緩辭余以續記為請余竊觀今之仕者其迹如寄於其職分所當為者往往漫不之察既去若素不曾到又何暇此為哉余與吳君昆弟交久矣素知其家學有守相繼登上科又能發明外氏龍川文藝公之學同志皆推之余來假守得君為僚助我多矣君雖初筮其諳究官業如素然而職掌版籍之外郡日受户婚之訟皆賴以决犂然當乎人心余恨挽之不可得情之依依尤甚也觀君之所存未易涯涘然猶拳拳於此記者蓋不以獨善為喜又將以詔來者壁故有記他不復贅言姑道吳君之志云淳祐十年七月朔郡守天台鄭霖記兵馬都監廨舍在州衙東偏兵馬監押廨舍在州衙西偏有二所見祥符圖經路鈐衙在府西樓下東偏州鈐㕔在狀元坊內路分㕔在鈐衙南糧料院舊在譙樓西紹熙中陳景思刻石題名龔頤正撰記後以織里橋南沒官屋改為之監糴納倉㕔在姑蘇館前淳祐中李煓重立題名朝奉大夫黃濤記轉運使㕔在郡治西偏熙寧七年徙治杭州今傳西館橋東醅酒庫即其故基又孫何自京東遷二浙於此作三亭曰自公溫故艤舟有三亭記見集中發運司催綱官廨舍盧氏云按會要崇寧三年八月江淮荆浙等路發運司奏移自潤州至衢州催轄綱運官於蘇州置𪠘宇提舉淮浙澳閘司盧氏云按㑹要崇寧元年十二月置提舉淮浙澳閘司于蘇州以知崑山縣事鮑朝懋提舉管翰依提舉弓箭手側序官置司人吏許於常潤蘇杭秀等州選差半年一替仍令兩浙轉運司進奏官兼管發落文字從左司員外郎曽孝蕰之請也牌籍庫在大㕔西油榨庫在大㕔東炭庫牛皮庫並在大㕔西北已上祥符圖經軍資庫在大㕔東南儀門左紹定五年鄒應博重建甲仗庫在大㕔西紹定中鄒應博别建於瞻儀堂後改名安成庫中有鎮庫鐵槍其上欵識云項王將廟鍾離昧者乃淳熙中天慶觀造嶽神浚井所得公使庫公使酒庫並在設㕔東按公使庫諸道監司州軍皆有之取民以佐厨傳之費然正賜錢不多而著令詐收遺利故州郡得以自取江浙諸郡酒歲遣中都官凡五六至至必數千瓶淳熙中尚書王仲行守郡與祠官范至能胡長文厚一飲之費卒至數千緡又有公使醋錢諸郡立額自取於屬縣縣斂於民以輸之小邑一歲不下數千緡人尤以為怨架閣庫在設㕔西廊激賞西庫在景德寺東激賞南庫在盤門內右二所並紹定二年李壽朋創武備庫在齊雲樓東城下寶祐中趙與􅊸立造酒庫在平糴倉西寶祐五年移公使酒庫改創醅酒庫在西館橋東竹青庫在閶門外今有竹青塘四酒務在夏侯橋南抽解場在明澤橋南香藥場在羅城內一云香藥司茭草場在子城西一云茭草局並見祥符圖經商稅務在子城西酒務在子城正南見祥符圗經盧氏云按續記又云稅務舊在驛前范文正公遷於西河上公私甚便太平惠民藥局在醋庫巷慶元元年建濟民藥局在魚行橋東紹定四年吳淵創於廣惠坊之左自為記開慶元年馬揚祖重建于子城內路分㕔之故址繼又遷於其北吳淵記淵猶及見先生長者談乾淳間事其言曰聖朝體列聖好生之德每以民命為重一念懇惻無所不用其至乃至濟藥療病亦加宸慮一日忽遣中使宣索太平局龍虎丹既進御命捐其價十之九蓋聖意謂親嘗則主者不敢茍直亷則貧者易以得嗚呼神農氏曰試百藥周官醫師掌醫之政令自十全以至十失必次第而躬行誅賞實此意也近世天下郡國臺府開設廣惠局以便民服餌皆所以廣此意也姑蘇城大人衆余領郡適有春疫亟幸羣醫之良分比閭而治某人某坊某人某里家至户到悉給以藥窶而無力者則豫錢粟疾不可為者復豫周身之具繇二月訖七月其得不夭者一千七百四十九人因念倉卒取藥於市既非其真非惟不真且弗可以繼乃創濟民一局為屋三十有五楹炮澤之所修和之地監臨之司庫廩庖湢爐磑鼎臼翼然井然罔不畢總其夫匠木石之費錢以緍計者七千八百四十五米以石計者三百二十三既落成復以二萬緍實之為市材費凡川廣水陸之産金石草木之品無珍不至無逺不取兾有益於人故真其劑弗求贏於官故輕其直料置豐盈薌味芳烈較市之衒王賈石者相去不啻萬萬列肆闤闠過者歡恱他日設遇流行之灾四時之沴則分醫以療捐藥以濟具為吳門之利蓋未有已也恭惟聖天子仁同阜陵視四海之癢疴疾痛如在一體淵幸叨選擇出守是邦求牧與芻不收不勉此局之設蓋亦所以推廣德意萬分一云紹定四年八月奉議郎直煥章閣知平江軍府事就除浙西提刑吳淵記慈濟局在府治東南夫子巷嘉定中創作棺以給貧民慈幼局在府治東同樂園門裏寶祐中趙與􅊸創先是淳祐七年理宗令臨安府置慈幼局收養遺棄小兒支給錢米賃貧婦乳養民間願抱養者官與月給錢米三歲住支與􅊸蓋推廣上意云作院在教場西乾道四年姚憲建居養安濟院在社壇東建炎以來廢淳熙三年陳峴重建有仁政倉籍官民田千六百六十畝得米七百石有竒以給歲用提幹盧瑢記紹熙元年提舉張體仁人創安濟院于城西南開禧三年陳耆夀益按以田一千一百二十畝郡人滕成作增田記盧氏云國史崇寧元年知開封府吳居厚請置居養院處民之鰥寡煢獨者以户絶財産給其費支河北轉運司亦以為請又推廣之先是蘇文忠公知杭州日置病坊一所於城中名安欒堂以僧主之至是為言仍改安濟安養院在州鈐㕔後舊曰醫院提舉林介建改稱陳耆卿記安養院在州鈐㕔後舊曰醫院寶慶中改今名安養院尚書郎林介之使浙右也决而和威而愛罪自死以下周慮熟讞不得其情不上焉既而曰死於刑吾不忍也而有死於病者若之何忍之於是安養院成郡府院四獄之以病告者而治其醫之政令大概屋百礎田三頃飲食臥籍薰燎之物靡不具護視典領督之人靡不力貯藏頒給激犒之法靡不將簡良才萃名刃以授大小醫而精煉治之囚氣略不紓識之厯厯至囚亦至既至醫拯療如法洎愈因與厯歸爭喜曰吾病憂死爾今遇公得不死果死可無憾况生乎且吾昔之病未若今之病之愈之速也果死信無憾也或曰囚冇罪者也果死死有罪者也醫有罪使不死豈過歟余曰不然均是民也均是耳目肢體也其罪至死者法也縱不可生當死於法而不當死於病也或罪不至死而亦死於病官實死之也夫不能生其所可死而至於死其可生是假獄以穽也如公之心惟見其可生不見其可死視其有罪也猶其有疾也則視其有疾而欲生之尤甚於有罪而欲生之之亟也洪惟聖朝天覆春育尤拳拳岸獄事乃四月制下飭監司都守以審克縷縷二百言公永讀訓詞蚤知德意院之成今已一歲成而不墜可百世蓋好生之君與宅生之刺史紹吻相合如此今而後囚固無憾公亦無憾也哉分名介熙名御史之子御史按行東浙有異績先後輝映克其清謹庶獄有自來云寶慶二年八月天台陳耆卿記廣惠坊在魚行橋東紹定四年吳淵創自為記吳淵廣惠坊記淵不肖劣聞先君子之訓曰先儒有云志伊尹之所志學顔子之所學又云一命以上茍有志於及物於人必有所濟此吾之所以終身拳拳服膺而勿失者也書曰一夫不獲時豫之辜孟子曰思天下之民有不被堯舜之澤者若已推而內之溝中此伊尹之所志也小子識之淵入耳注心三十年于此矣故自領一簿宰一邑以至二一州佐一臺未嘗不日思先君子言求所以及物濟斯民者乃庚寅之冬被命守姑蘇道過吳江橋下淵延見所部吏艤舟焉時夜雪凝㮚霜風凜冽襲裘不知其為溫附火不知其為炎於是惻然動心進左右而問之曰爾邦城大民夥鰥寡孤獨癃老廢疾顛連而無告者其多乎曰然郡有廬以聚之有廩以食之乎曰否淵獨念言窮州陋邑猶有所謂居養安濟之所吳門甲三輔多名守富課租不應有此缺典既領印即括夫田之沒入于王官者廢絶于緇黃者未足則以公財市民膏腴者寸積尺纍厥數既登乃卜地鳩材為屋七十程總上木夫役費錢緡九千六百八十米石三百一十七既成扁曰廣惠坊㕔堂耽如廊廡翼如男子婦人各有位置倉廩庖湢井臼床几鼎鼐備具無一乏缺適然而疾病者又别室以居之大者人日粟一升半月錢三十有三小半之米則三殺其一焉夏則湯沐冬有衾纊病有藥死有槥額以二百人為率亡者得續此其大略也竊嘗考祖宗時在京有四福田院外郡有居養安濟院當時奉行惟謹甚者至有設㡩帳具酒食其所全活不可勝記深仁厚澤與天同普此國家運祚之所以久長州縣長吏之所當遵守而廣惠坊之所由以作也後之人與我同志尚思先儒之言益而侈之是亦上不負天子下不負所學之一端云若夫租入多寡别石具載兹故不書紹定四年八月既望奉議郎直煥章閣知平江軍府事新除浙西提刑吳淵記元宣化堂宋郡宅堂基或云即黃堂也元貞初治中王都中以舊春雨堂移建參政徐琰為題此扁推官㕔在府治右即宋都吏㕔大德七年推官孫居仁吕良祐改廣之曰明恕延祐六年吕顯祖賈達又加開創判官理熙伯雍為記經厯司在府治東門樓扁薊丘李衎書大德七年經厯范子咸以兩淮發運司簽㕔改創軒㕔東西廡後堂即宋雙蓮堂基扁曰芙蓉幕方進辰書其西厦為照磨㕔又為承發司録事司在推官㕔西即宋通判東㕔司獄司在譙樓西北即宋司理院官醫提領所在譙樓南即宋察推㕔也大德八年革隂陽教授司在譙樓東都稅使司在織里橋西即宋中和樓基䝉古字學在府治西南至治中置平凖行用二庫一在樂橋南即宋和豐樓也至元十三年改造一在禪興寺橋南至元二十一年創豐盈庫即宋軍資庫也至元十二年𨽻宣撫司十四年改為永豐庫𨽻平江路總管府十九年復改為豐盈省富藏庫分司在閶門外抽分竹木場在郡城西惠民藥局在吳㑹坊側初以舊和豐樓為局延祐五年改建雜造局在蔣家橋南至元二十一年置織染局在平橋南即宋提刑司也至元十七年改創浙西提刑使司在烏鵲橋西北舊作提㸃刑獄司建炎四年置使紹興初建㕔事後曰明清堂堂後亭曰留客曽逮創其父文清公幾命名并為詩徐藏𨽻額乾道九年諸路添置武提刑一員遂於舊司之東撤去幹官𪠘宇以其地作東㕔後復省罷曽幾留客亭詩序逮子作亭於官舍明清堂之後種竹殆千竿余名其亭以留客取老杜竹深留客處之句因題二小詩云行到竹窮處有亭佳可逰境因吾子勝客為此君留娟淨經時雨蕭條六月秋豈無他草樹涇渭不同流種竹無他事林間與客逰自應携手入安用閉門留靜可過僧夏清宜對奕秋衰翁九節杖來往亦風流沈度汩汩多塵事長懷鳩杖逰每因門可欵豈為醉相留靜契竹林勝幽非草樹秋公今國耆艾砥柱屹中流持節推仍世林園記昔逰深藏事幽討長轡詎淹留己見山無盜欣同歲有秋時容一嘯詠竊比晉名流檢法官㕔在本司前紹定五年重建便坐曰毋不敬池北堂曰肖野寶祐中新作幹辦公事㕔在東㕔後有超然堂北齊開禧初陸子虞葺之及創題名記寶慶三年趙時侑再新之趙希邁超然堂記水心葉先生負天下重名淳熙十年賓浙右提㸃刑獄幕士爭宗師川赴答應暇時賦詩超然堂上庭下檜雙幹人手自種植從是堂名四播而草木聲價隨重矣先生前建堂才八年後二十二年山隂陸君子虞嘗經理葺治距今又二十二年風毁日剝摧破弗支後人撑持茍歲月庭檜蓊鬱怪稍穿簷亦莫事修剪超然堂名在而已秦溪林公介從持節易繡斧數月四明趙君時佐來幕下主和而賔敬政肅而事省一日諸曹從容以新堂請林公喜從曰吾志久矣亟命吏市良材鄰郡且屬君務偉舊觀給工度料不計也越月堂成堂後復創屋曰晝永東西偏各有新書房曰盡心曰一經移巨檜一株與先生手植檜欄楯對峙蔽以花栁翼以墻垣觀者目駭心動而超然堂名迹始相稱君屬希邁曰子游先生門最久又辱林公知識顛末非子事乎夫聽宫室之圮壞不事改作者常人所安也至於承廢處陋求作新而卒莫遂者志士所未滿也豈作新一念與茍安者同哉蓋力之勤惰在人而事之興廢在時時副人則可人勝時則不可超然欹傾非一日作新者又不知幾人時或拘之人力雖至何益也君於林公一相晤語而新堂之志頓遂得非時在林公而君之人力因著乎始吳人宗文正范公學後和靖尹公讀書武丘山士亦知慕向至先生以艮冶端範士軌學者於是人所鋪張皆正響真脉而吳之士乃盛林公方彌節首命僚屬拜文正祠未幾祀和靖且饋存其孫子昔先生淑教池又拓新之林公志於率屬蓋在此不在彼也君林公門人超然既新而無復前日之卑隘淺陋於寒焉持蹈於焉辨書而敢以遊觀答其長乎堂南浚井冽可食檜隂覆其上君命曰雙檜泉尊慕往哲之心益不自懈也書得隱歟寶慶三年八月朔儒林郎平江府嘉定縣尉東甌趙希邁記添差幹辦公事㕔在飲馬橋南社壇巷寶祐中以沒官屋改創凖備差遣㕔在烏鵲橋南寶祐初趙與訔請以沒官屋改創凖遣余東復增葺之自為記提舉常平茶鹽司在子城外東即舊鹽香衙也紹興初建咸淳四年宋遇再建後堂十年權使事潛說友重創㕔事㕔事之東有觀風堂米友仁書榜池傍有假山扁曰壺中林壑寶祐六年改觀風張即之書池上二亭南曰揚清北曰草堂㕔之西有宸翰閣亦友仁書扁東北有宣惠堂淳祐三年程以升重建後舊有皇華堂吳說書額紹興二十年王珏重修紹定四年袁肅移建于宣惠堂後池北刻皇華詩于壁自為之記皇華之東又有尊美堂亦紹定中建其上有達觀樓後有清意亭淳祐中趙與弼建㕔之東側有頤齊後有圃扁曰春熙圃中有望雲臺紹興末楊和王子倓持節時作池傍有繡春堂淳熙十五年史彌正建范成大書額即舊皇華堂嘉熙中趙崇暉重創草堂揭以此額池中有鑑止亭史彌逺作常平僉㕔在正㕔西南紹定中重建袁肅題㑹議之所曰公是堂又為記幹辦公事㕔二一在檢法㕔北嘉定十六年沈省曽刻石題名一在郡樓西後改添差幹辦㕔添差幹辦公事㕔即郡樓西㕔西舊治也端平二年楊權重修有記淳祐二年趙與訔名曰諧清堂取葉適詩語茶鹽司幹辦公事㕔有二一在醋庫巷惠民藥局東一在譙樓東後改發運司僉㕔提領官田所主管文字㕔在禪興寺橋西北舊百萬倉官𪠘㕔東便坐曰東菴咸淳七年家之巽創并記發運司嘉熙三年九月置浙西兩淮發運司于平江以守臣兼領時知府趙與􅊸遂兼副使仍以措置浙西和糴繫銜既而又創提領和糴所并節制司增置官吏先是和糴歲敷屬縣有田官民戶寶祐四年糴至一百五十萬五年至二百五十萬景定中派買官民田以為公田永免浙西之糴至四年八月有㫖省罷而節制司併歸于郡節制司後有談笑堂籌勝樓景定四年趙宗源撰題名記幹辦公事㕔在吳縣西南寶祐五年以民居改創㕔西有軒曰風雲壯懷傍曰鐙基月析皆陳鎮入幕時名前有臺亭曰橫舟有陳鎮題名節幹㕔在子城內咸淳四年以濟民新藥局為節制司凖遣廨舍十年有劉坦題記江南浙西道肅政亷訪司分司在譙樓東海道都漕運萬户府在聞德坊內有鎮撫所及各千戶所至正末張氏改為分樞密院有漕運邉公等政績碑二今移置靈慈宫內鎮撫所理本府庶務崑山崇明所江杭州嘉興所所常熟江隂所後松江嘉定所平香糯已上諸所在萬戶府喬司空巷內設置各治本處運糧船户事江淮財賦提舉司在織里橋東朱張財賦提舉司在閻橋北宫相府提舉司在城東稻田提舉司汴梁提舉司並在升平橋善農提舉司在乘魚橋北平松提舉司在朱張巷已上四處至正間改為提領所集慶提領所在盛家帶上都水庸田使司大德二年立於譙樓東七年革罷至正元年復立於乘魚橋北後遷織里橋東以江淮財賦提舉司改創姑蘇志卷二十二
