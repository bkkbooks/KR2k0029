body:
  text: 姑蘇志卷五十一明王鏊撰人物九名臣王棠字子思紹興五年以進士左朝奉郎知江隂軍請立學官教授員給田以養士遂詔范雩充教授棠又刻春秋三傳于學雩亦篤意訓率風俗為變又請於尚書截留秋苗以為軍儲其略謂江隂自昔為屯戍之地而庫無儲金廪無餘粟全藉內郡撥發錢穀以實邉壘今本軍稅賦僅充嵗額之上供而利源不足以給按月之發納一錢一粒皆赴漕司其後民力益困則羣譟而越訴前後官吏以兊借敷率得罪囚繫者相踵然棠設以罪逐何足算哉誠恐上誤國家邉備雖死無益愚意欲留本軍秋苗一二萬石每嵗樁留凖備警急支用候至次年新苗入倉却將陳米起發其於漕司嵗計並無虧損直有遲速之少異所貴常有儲積以備不虞耳其他善政率多類此陳字字伯愛侍讀襄諸孫也自宜興徙常熟以父澤為莆田尉得劇賊格當霑賞字愀然曰吾其可藉人命為自進之階卒辭之調紹興府司法隆興中改知富陽縣分差鎮江府糧料院知潮州提轄行在𣙜貨務知房州歸卒年六十一字孝友廉潔居母喪鬚髮盡白撫愛諸弟俸祿不入私室家無金銀之器常自謂先世以清白遺子孫豈惟富不可求亦所不願也趙思字再可其先洛人從父孝孫字仲修建炎避地來常熟思生甫三嵗及長通春秋登第調鍾離簿以邉賞循從政郎改通直郎乾道中虞允文薦之孝宗引見便殿首問恢復大計奏對稱旨除大府寺簿大常丞兼度支郎官台州闕守上問大臣誰可任者僉以思對亟出御筆以授不數月翕然稱治上親書姓名於御屏除直祕閣淮南路轉運判官兼提點刑獄過闕辭上曰天台之政朕巨細悉聞知卿忠實可仗就升副使除户部郎官總領淮東軍馬錢糧未幾奏計遷起居舍人充金國賀生辰使先是國信所録大旨遇御名處皆闕不書蓋嘗有稱之者思曰臣子安得名君父及致詞于廷敵使從旁呫囁亟令道名思弗之顧敵以為慢斥之朝廷以金國有詞遂罷歸奉祠八載有使北者言人間問趙運使安否不絶起為廣西提刑上曰朕每愛卿才不令逺出改知湖州除直龍圖閣再任尋除起居郎權吏部侍郎奉祠再知靜江府廣西經略以職事修舉除祕閣修撰後以集英殿修撰再奉興國祠纍轉中大夫卒年七十顔度字魯子兖公五十三世孫自唐魯公真卿兄子皓為常熟令其後遂為吳人度居崑山以文章政事名一時歷海門簿臨海令有去思乾道五年知長興縣遇事慈恕以善惡福應之説諭人人不忍欺其聽訟於淳朴中時出智計以得其實聞者稱為神明一日某王自寧國入朝舟次縣界皆以婦人挽韅王怪問之皆云知縣顔佛子愛惜民力縱男子耕種卒難召集恐纍顔公故婦女悉當其役洎入對孝宗問卿治郡得人乎即以度對未幾召拜監察御史遷軍器監司農宗正太常少卿權工部侍郎直寶文閣江東福建運副知湖州江東京西運副以中大夫祕閣修撰提舉沖佑觀封長洲縣男卒年七十五度與朱熹友善孝宗謂度每出一言不動如山因以如山自號焉范成大字致能吳縣人父雩字伯逹入太學聲譽翕然擢第入館除祕書郎成大在懷抱中已識屏間字年十二遍讀經史十四能文詞父亡讀書崑山薦嚴寺十年不出取唐人只在此山中語自號此山居士又慕元魯山為人字已幼元先友王葆勉之曰子之先君期爾祿仕志不可違也課以舉業登紹興進士第授户曹監和劑局隆興初纂類髙宗朝政除樞密院編修官遷正字乾道初升校書郎編修國史歷著作郎轉吏部郎官言者論其超躐罷奉祠起知處州陛對論力之所及者三曰日力曰國力曰天力今盡以虛文耗之上嘉納至州創義役隨户富貧輸金置田助當役者甲乙輪第其後入奏言之詔頒其法於諸路作通濟堰搜訪故迹疊石築防置隄閼立水則溉灌有序民食其利刻重修堰規于石除禮部員外郎兼崇政殿説書以文學材氣為上所知乾道令以絹計贓估價輕而論罪重成大奏承平時絹匹不及千錢而估價過倍紹興初年遞增五分為錢三千足今絹實貴當倍時直上驚曰是陷民深文遂增為四千而刑輕矣隆興再講和失定受書之禮右相虞允文建議遣使遷成大起居郎假資政大學士侍讀國公充金祈請國信使國書專求陵寢乃泛使也上臨遣之曰卿氣宇不羣朕親加選擇聞外議􅍅􅍅官屬皆憚行成大對曰無故遣泛使近於求釁不執則戮臣已立後仍區處家事為不還計心甚安之上愀然曰朕不敗盟發兵何至害卿齧雪餐氊或有之不欲明言恐負卿耳成大乞併載受書事不從金迓使者慕成大名至求巾幘效之成大知其法嚴附請決不可達一不泄語二使不復疑至燕山夜蔽帷秉燭密草奏具言他日北使至欲令親王受書其辭云云懷之以入初進國書辭氣慷慨金君臣方傾聽成大忽奏曰兩朝既為叔姪而受書禮未稱昨嘗附完顔仲李若川口陳久未得報臣有奏搢笏出之金主大駭顧誶宣徽副使韓鋼曰有請當語館伴此豈獻書處邪厲聲令綽起者再三成大不為動再啓曰奏不達歸必死寧死於此鋼復以笏導成大拜成大跪之如初曰若奏達當下殿百拜以謝時金廷紛然太子欲殺成大其兄越王止之既還館所金主遣伴使宣旨取奏鋼押宴謂成大曰公早來殿上甚心勤主上嘉歎可以激勸兩朝臣子廷議方殷會夏國有任德敬者乃夏酋外祖號任令再世用事謀篡事敗而族蜀宣撫司故嘗以蠟書通問為夏人所獲致之金主益怒成大朝辭遂令傳諭詰之成大答以姦細之偽不可測退朝而館伴持真書來印文皎然可識成大笑曰御寶可偽况印文乎金人直其詞遂不竟十月使還金國報書有抑聞附請之辭欲變受書之禮出於不意要以必從之語上由是知其忠徑有大用意除中書舍人初上書崔實政論賜輔臣成大奏曰御書政論意在飭綱紀振積敝而近日大理議刑遞加一等此非以嚴治平乃酷也上稱為知言成大立朝多竒節上用知閣門事樞密都承旨張説為簽書成大留詞頭七日不下忽請對良久乃出制草納榻前上色遽厲成大徐奏曰臣願引諭以聞今朝廷尊嚴雖不可下擬州郡然分之有别大小略同閣門官日日引班乃今郡典謁吏耳執政大臣倅二比也陛下作福之柄固無容議但聖意以謂有一州郡一旦驟拔客將吏為通判職曹官顧謂何邪官屬總俯首吏民觀聽又謂何邪上霽威久之説命竟寢後月餘成大丐去上曰卿言引班事甚當朕方聽言納諫卿乃爾邪尋以集賢殿修撰知靜江府奏鈔鹽科抑之敝格互市馬法除敷文閣待制四川制置使知成都教閲將兵修置堡寨上賜度牒四十萬緡蜀中名士孫松壽樊漢廣皆挂冠不仕成大表其節徴之不起由是逺近歸心進敷文閣學士入對除權吏部尚書淳熙五年遷中大夫參知政事兩月為言者所論以資政殿學士知婺州奉祠而歸起知明州兼沿海制置使奏罷海物之獻除端明殿學士尋擢江東安撫使兼行宫留守知建康府歲旱奏移軍儲米二十萬以賑飢民減租米五萬捕斬水賊徐伍以病請間十六年進資政殿學士起知福州封吳郡開國侯再領洞霄宫紹熙三年加大學士知太平州尋納祿以歸封吳國公明年卒官至通議大夫贈銀青少師追封崇國公諡文穆成大天資俊朗輔以博學為文贍麗清逸自成一家尤工於詩四方傳誦上嘗命陳俊卿擇文士掌內制俊卿以成大及張震對成大所歷名藩興利除害不顧難易去思遺愛所在歌舞之嘗自號石湖居士有石湖集一百三十六卷使北有攬轡録在廣有虞衡志出蜀有吳船録家居時與郡士龔頥周南滕宬采緝郡事為吳郡志五十卷弟成績建康府通判從兄成象字至先紹興進士嘗提舉湖南常平訪衡州石鼓山諸葛武侯廢祠修之張宣公栻為記其事歷福建轉運判官工部郎中浙東福建兩路提刑成大事之如嚴師成象子藻樂備字順之一字功成由淮海徙崑山有學行名能文章尤長於詩與范成大馬先覺結詩社由進士官至軍器監簿趙磻老字渭師東平人居吳江黎里孝宗朝以書狀官隨范成大奉使金國成大薦之擢正言乾道八年以右通直郎知楚州入為太府寺丞復由兩浙轉運副使知臨安府除祕閣修撰權工部侍郎湯璹字君寶本瀏陽人淳熙中第進士與王容易祓號長沙三俊調德安府教授除太學録光宗內禪議修泰安宫太上重於移御璹貽書趙汝愚引唐武德九年八月甲子太宗即位于東宫顯德殿至貞觀二年四月乙亥太上皇徙居泰安宫甲午太宗始御太極殿則是太宗聽政于東宫者三年不遽遷髙祖也今日或可仿比别營聽政之所上皇仍居大內事體甚順汝愚答書稱其援據精博深合事宜越九日有旨秋暑方隆太上皇帝皇后宜用唐武德貞觀故事未須遷宫因名宫以壽康而泰安之役遂寢尋升博士慶元初通判贛州常平以嵗飢發粟賑糶璹適慮囚至寧都民以不能均糶赴訴而所糶皆胥吏有産之家遂除去二等減口三千盡發餘廪移文巡尉勸分全活飢民以萬數又改吉州嘉泰初遷國子博士時召朱熹為侍講尋丐祠去璹疏熹以正學為講官啓沃之益曾未踰時輒聽其去必駭物論宜追召熹仍授講職不報由是忤權臣意而直聲大著歷樞密國子兩院編修除書丞兼權禮部郎官例掌三省奏記四年京城火應詔直言謂左氏説天火曰災人火曰火後世遂謂出於天者乃譴告之昭彰不可不畏出於人者由防微之不謹可以無懼不知春秋書法雖因天人以變文而天明畏自我民明威其為譴告則一也五行者之説曰信道不篤惑耀虛偽讒夫昌邪勝正則火失其性自上而降或濫炎妄起雖興師旅不能救也夫自上而降者天火濫炎妄起者人火二者雖異其失均本於人其變均之為火失其性也因推原今日天變之由生而歸之於郡守監司之貪黷執政臺諫之非其人時韓托胄陳自強皆銜其言及草宰執率百寮請皇帝御正殿三表引善則稱君過則歸已之義出知台州開禧初連書詆托胄用兵任人之失托胄益怒兩易知常州修器械積糧料葺城寨謹江防究水利恤流散三年降三官謫居贛州嘉定中丁父憂特旨自便四年敘復元官寓居平江主管台州崇道觀亳州明道宫起知信州乂除駕部郎官未赴除太府大理二少卿未兩月以疾請郡待次贛州封瀏陽縣開國男寶慶初以中大夫直徽猷閣致仕卒年六十九璹負直概與韓托胄陳自強不合屢嗾言者中傷故奉祠間居之日多於揚歷屬辭務持大體不為阿曲所著春秋要論詩文奏議凡百卷又有建炎德安守禦録子誼伯湖州户曹曾孫暉老咸淳進士暉老子彌昌彌昌字師言父子授受皆以周禮發卿解及元舉教官由長洲崑山儒學教諭鄱江清獻兩書院山長建康路學教授轉從政郎瑞安州判官致仕平生篤志義理之學以文名于時有周禮解義碧山類藁湘江棹歌若干卷林朴字伯振長洲人乾道中為長興簿知武昌縣嘗云交代有子孫之契不闕惡金穀儻有虧欠當即與交頭無令滯其批書時人稱其長厚弟琰字玉圭善篆書同舉進士趙公豫字仲謙自父少卿家常熟公豫幼聰警記左氏傳不謬一字登進士第調無為縣尉無為軍録參福建運司主管帳司改差行在激賞北酒庫知仁和縣兩易餘姚縣分差鎮江糧料院知髙郵軍真常二州提舉浙東常平茶鹽除倉部郎官兼刪修勑令官遷大理少卿差充接送伴金國賀正旦使遷太府卿除祕閣修撰知太平州江東轉運副使進集英殿修撰宫觀開禧初升寶謨閣待制致仕嘉定五年卒年七十八公豫沈厚清苦平居以清坐為適無豪髮干請州縣居官廉正常言吾求為循吏不求為健吏有奏藁一卷燕堂類藁五卷弟公升公頥仕皆至麾節類有政績可紀王伯廣字師德常熟梅里人少從中書舍人楊邦弼學由進士乙科調德清尉歸鄉里悉以家産豫諸弟一毫不自取也嘗往臨安謁通判同縣張柟柟曰試教官乎遂指授蹊徑未踰月以程文示之柟大驚曰天才也即魁教官選授溫州平江教授改常州未上卒伯廣文章出於天性尤工於詩四六亦為人膾炙與張孝祥友善所著聽雨集藏于家冷世光字賓王常熟人與弟世修世南同入太學時稱為三冷與世修同登紹興進士第調歸安簿知歷陽寧國二縣廣德軍教授改秩知龍遊縣朱熹為常平使者旁邑令見訴于民熹命世光體實世光辭熹強之世光乃往遂得其情兩省交薦幹辦行在諸軍審計司除監察御史遷殿中侍御史條奏忠切彈劾無所避周必大獨相初除吏世光即論之施聖與以元樞出知泉州亦遭劾罷人謂之冷靣御史既而去國奉祠尋知嚴州丐祠得請既又引年以歸里居泊如年八十卒世光事親孝居喪哀與諸弟和於子孫盡其教自父通奉力賑施邑里世光兄弟率行之不替鄉人至今髙仰之有奏議彈章若千卷東堂類稿二十卷世修字良器調崇德縣簿知州張瑜異之移攝理掾獄屢空隆興初知興化縣辟監行在北外門激賞庫改秩乞回一階封垂白之母上特命詞以寵之逺近歆豔知上元縣民有互訟者諭之曰骨肉爭鬭非美事也今以律繩汝終身不可復聚矣民感泣願息爭通判和州守尚峻嚴世修濟以寬秩滿吏民詣臺乞留得知南康軍未上即丐祠卒年七十三終朝奉大夫有雜文三十卷詞科類要十卷崔敦詩字大雅世家靜海晚寓常熟紹興末由進士主髙郵簿兩浙運幹除祕書省正字繼兼翰林權直早有文名制詞溫潤詳雅兼崇政殿説書權給事中遭內外艱時學士周必大乞補外夀皇中批問吏部尚書韓元吉曰崔某今安在元吉具言之召見除樞密院編修官復為權直既拜命即言翰林權直為名未正乃更為學士院權直遷著作郎兼權吏部郎官又兼崇正殿説書進國子司業改權直學士院拜中書舍人加侍講直學士院敦詩賦性端厚議論疏通知大體自直宿遞講遇引對所陳必剴切至造膝密啓有家人不得覘其藁者上深所器許九年以疾卒年四十四贈中大夫有文集三十卷內外制藁二十三卷奏議總要五卷通鑑要覽六十卷制海十編監韻五編胡元質字長文長洲人父珣治生大穰所親為之宰負金萬數珣焚其書待之如常元質少穎悟尚行義中進士初寓臨安聞鄰有貧士夜哭乃為人責償鬻其女與别元質慨然垂槖豫之光宗即政用薦入為太學正歷祕書省正字校書郎終給事中嘗極論人主言動不可不謹至纍百言帝書之座右恩眷特厚為書王褒聖主得賢臣頌及親製大才論以賜出守和州太平建康皆有政績淳熙中四川制置使知成都奏減蜀鹽虛額錢大略謂蜀鹽虛額者惟茶鹽酒三事為最鹽之為害尤甚于酒鹽井重額沈痼百姓垂五六十年蓋蜀鹽取之於井山谷之民相地穿鑿深至六七十丈幸而得泉以石甃砌大者方五六尺以木革為囊數十人引大繩汲取之自子至午泉派漸竭乃縋人入井以手掬取投之於井引繩而上此數十人晝夜號呼推車挽繩不息然後得水入竈燒煎成鹽此東南煮海人力所及與陜西解池工力百倍又有小井謂之卓筒大不過數寸深亦數十丈以竹筒設機抽泉窮日之力所得無幾鹽户窮困可以概見解池則不須煎煮止於池旁各分畦瀧導水而入一夕得風並皆凝結鹹水之在江海既無限量又省工役故其鹽沛然有利無害四川産鹽地分除太寧監依山崖間鹹泉流出若小路澗稍易分給燒煎其他州縣皆係鹽井汲泉煎煮大段費力簡州鹽額最重虛額尤多由是每嵗計豁除折估錢五萬四千九百餘貫又請蠲夔路九州民間嵗置金銀重弊蜀人德之關外西河階成鳳四州所聚民兵謂之忠勇皆以土兵為之先是虞允文團結二千九十四人其後不能增募元質奏令四州守臣添招仍立賞格詔每州各先募五百人及奏唐之季年吐蕃寇至必入黎文南詔寇至必入沈黎吐蕃南詔合入寇必出灌口其文黎兩州去成都尚千里關隘險阻足以阻隔唯灌口一路去成都止百里又皆平陸朝發夕至大率沿邊諸州城資堡寨以為蔽堡寨賴州城以為援惟威茂兩州其堡寨參錯於中州城孤立於外而屬部蕃落周分環據二三百里之間官路僅留一線逹于兩州若邊事不寧孤城坐見隔絶所奏利害似者尚多元質吳中舊居即程公闢南園故址既歸杜門自適奉祠逾六七年以正奉大夫敷文閣學士吳郡侯致仕卒年六十三贈金紫光祿大夫少師諡獻惠平居未嘗疾言厲色及評人短長或告以人之傾已輒俯首欲寐每自謂於人無怨惡其心休休然好善樂施家資多推豫諸弟不較子綰綱絳弟元功黃由字子由長洲人父雲字景祥嘗為淮西總所酒官由弱冠有聲太學淳熙八年廷對時甘升為入內押班見知用事二十年招權市賄與曾覿王抃相盤結由對策及之遂舉進士第一吳自有科目以來由始冠多士時人榮之授南安軍簽判秩滿通判紹興府往新􅌘督行荒政由改糶為賑擅發米五萬石豫民不取其直除正字遷著作佐郎使金還遷將作監嘉王府贊讀紹熙五年孝宗疾亟光宗不能視疾人情益懼由請嘉王過重華宫問安孝宗為之感動寧宗即位纍除權禮部尚書兼吏部將大用之會知綿州王沇朝辭乞詔廟堂銓選若嘗受偽學薦舉升改及衆論指為偽黨者籍記姓名且與勿用由入奏謂人主不可待天下以黨與不必置籍以示不廣繼擢沇利州路轉運判官由亦出知成都張巖奏由阿附權臣植立黨與遂以雜學士奉祠嘉定初以正議大夫知紹興府浙東安撫使聞嵊縣昔有虎患訛言謂虎嵗久有神變化叵測或為僧形或為猿狙倏忽莫可蹤迹由禱於神厚賞募人捕之殄滅無遺種民賴以安三年除刑部尚書兼直學士院官至正奉大夫自號盤野居士卒贈少師衛涇字清叔其先齊人唐末避亂南遷多居華亭祖闐始占籍崑山之石浦父季敏通判鎮江府涇少有異操入行在從永嘉李去智學李卒為制服執喪人咸義之淳熙十一年孝宗擢涇進士第一比唱名御筆殿試上三名欲觀其政事可特與添差差遣仍釐務授涇承事郎添差鎮東軍簽判涇以對䇿嘗陳添差之弊三上表乞待次上以涇力踐所言知重始進特從其請故事狀元初任垂滿必通謝于宰執始頒召命時王淮秉政涇不通謝雖被召三月不得引見十四年除祕書省正字輪對言陛下即位之初鋭意事功不次用將相痛憤以圖恢復二十六年之久無一事足以少稱陛下意者而陛下大有為之志亦少弛矣一祖八宗之業太上皇付託之重子孫億萬年之基緒陛下一身任之豈可僅取茍安無事而遂已耶庸常之才持祿保身而風俗日壞士氣日卑民生日困臣恐天下之患將有出於意慮之外者事幾易失時不再來願陛下堅自強之志振紀綱以張國勢作氣節以厲偷墮則靜可以強根本動可以復土疆而事功立矣光宗初立政尚修謹涇以著作佐郎賜對言今日風俗頺靡百度縱弛人材削弱國勢未張汲汲有為尚恐不濟若猶因循其敝將至於不可為矣又言中國之與北敵其勢決不能兩立名為和好實則仇敵名為息兵實則觀釁復讎之志直須時耳今以偏方之勢與敵持久自紹興來五十年無大戰自隆興來三十年無小鬭敵帥新立血氣方剛間隙之生逺不過五六年耳願陛下奮發英斷規恢逺圖卧薪嘗膽不忘北鄉聖志先定然後與二三重臣講求大計委任而責成之內治外備則大讎可復中興可期矣又言自陛下踐祚臺諫給舍多不得其職今日士氣向衰風采銷落陛下所當長養振作而反陰銷潛沮之將使羣臣上懼陛下之威命下虞羣小之中傷茍且成風諂諛充位脫有大姦巨惡誰為陛下言者紹熙元年遷著作郎兼司封郎官二年正月震雷雨電大雪繼作涇應詔上封事言雷陽也雪陰也陽氣方升而陰制之此雪所以降也以象類而求則君欺於臣夫陵於妻外藩謀王畿小人害君子皆隂勝陽之證也有一於此皆能致亂陛下不可不預防也時佞幸漸肆李后悍妬故涇以為言出為淮東浙東二路提舉慶元初召為尚右郎官上殿論壽皇孝養禮曠以為太上之於陛下親父子也天性之愛血氣之屬慈孝之心宜無毫髮疑間雖太上疾勢未平語言舉動若未容於進見者然陛下孝心純篤豈以吾親之不可見而遂已乎臣聞參天地贊化育曰誠而已金石之無情鬼神之至幽猶以誠而能動矧人子之事親誠極其至焉有不能感動者乎願陛下兢業於中以親之未順為憂以期於見親為念積此誠意庶幾太上之歡心可得而喜付託之得人矣三年以起居舍人假工部尚書使金國還言彼有危亡之兆而吾無自治之策使吾治具畢張備禦無闕敵雖強不足畏倘偷安嵗月僅了目前一弱國滅一強敵生猶未足以為喜也初涇之往寧宗諭使覘國而金為蒙古所攻我有乘釁之意涇深懼其輕動故還奏如此除直煥章閣知慶元府沿海制置使以言者論罷是時權姦用事涇不為勢怵斥去十年不調於里中闢西園取范文正公之言名其堂曰後樂開禧元年得旨入朝明年除中書舍人兼直學士院應詔論北伐非計不聽三年自吏部尚書拜御史中丞請誅韓托胄論罷陳自強拜參知政事封崑山縣開國伯嘉定初兼太子賓客始托胄之誅涇功居多既又患史彌逺有專恣之漸因欲去之彌逺為景獻舊學知涇謀諷御史劾罷之五年知潭州八年知隆興府上以涇三世同居有堂曰友順御書二大字太子亦為書後樂堂榜賜之九年知揚州十七年除資政殿學士金紫光祿大夫致仕進封吳郡開國公寶慶二年卒理宗輟視朝一日特贈太師追封秦國公賜諡文節涇仕三朝出入內外四十餘年憂國忘家始終一節謀深慮逺不徼近功其進退之際與時升降嘗語人曰官職自有定分名誼千古不磨故其在朝孤立自守不畏強禦以賢才為立國之基薦進搜舉汲汲如不及如李燔輔廣倪思陳韡皆其人也在潭時與朱熹有交承之好托胄斥熹托胄死涇奏召熹還朝而熹巳卒復移文新安取熹諸經四書傳注刋刻以傳又請為張栻賜諡表章正學之力為多别號後樂居士所著文章五十卷曰後樂集涇弟湜字正叔好古博學除太府寺丞將作少監皆不赴嘗集禮記諸家傳注為一百六十卷名曰禮記集説寶慶二年上之終朝散大夫直寶謨閣知袁州學者稱為櫟齋先生糜師旦字周卿其先朐山人建炎間始來平江遂為郡中大姓父鍇字公範登政和進士第為確山縣市易務由博士持使節與秦檜議不合棄官去以終贈金紫光祿大夫師旦年十七登進士第歷髙郵西安二縣尉通州南康軍衢州三郡教授授宣教郎知富陽縣歲旱潦民飢極力拯救易鹽官丞究心荒政兩邑多所全活淳熙十三年辟御史臺主簿轉朝奉大夫除祕書郎紹熙三年權刑曹郎官五年知秀州賑恤荒災民不告病慶元初以尚書左司郎中召適金國賀生辰使至以顯謨閣學士正議大夫提舉萬壽觀兼侍讀咸安郡開國侯充接伴使卒年六十七纍贈正奉大夫子溧溧字子長初以郊恩授如皋尉登慶元龍飛進士第改和州司户參軍有嘯聚盜伐山林者溧詰責其尤而貸其衆悍卒或出怨言從容撫諭列營帖然嘉定七年知廣濟縣崇庠序督課試先是邑苦役法溧喻民自得差次率無橫擾獄訟衰止為民請雨憂悴勤懇蝗不為災講行荒政勸率富民得樁積三萬緍告糴旁近米直頓平於鄉落多置子場濟糶逺近均惠嵗不知歉郡守監司列狀于朝有旨中書籍記後一年麥大稔兩岐叢生連接畦畛邑人圖繪稱頌將白于州溧謝止之又請於秋苗外别置義倉出公帑糴米儲之謂之官社有田于鄉者更勸出粟謂之民社各廪於鄉每一鄉為兩倉擇鄉所推信者三人掌之謂之社長又聚穀於倉每春量丁口多寡許鄉借貸秋成每石取息二斗耗五升以折庸賃之費五年息及本則歸本於主又五年息又及本復以息之半酬之民社既豐則賑糶以還官社仍再糴以實穀廪焉其區畫事目凡十條編次成帙上之於州州鏤版下屬邑且為申請旌賞邑據往來之衝將受代邉遽旁午戍役經從資給需用尤夥溧訓習民兵招刺萬弩手聲援響應凡所抑配民以溧至誠不忍紓緩洎去官民又白於上官借留泣送至百里外又即學宫佛舍為立生祠十五年通判吉州歲歉守將委溧推行蠲租平糶之法民被其惠如廣濟時十六年通判臨安府京尹舉自代十七年差監察御史首論汚玷臺列輕儇妄庸之人中外稱快且言士大夫均受爵祿負責任辭難就易逺怨市恩欲進則自誓赴蹈既得則臨事依違迹似謹飾中實茍容甚至鼓惑是非撰造飛語更相傳播動涉誣妄始焉傾心植黨幾同膠漆終則叛交背毁殆甚仇讐食肉偷安尚忍傾覆設有緩急其足仗乎時人稱其有仁者之勇又論年來受納秋苖之弊誅求日甚有增無損詔下諸路轉運鏤版禁約理宗即位除右正言奏畏天悅親講學仁民四事又疏謂淳熙之厲精不在於信賞必罰激勸羣工而在於深明究弊之原嘉定之更化不在於誅翦權姦肅清邉圉而在於不偏羣用之材若學術求相髙則必至於激議論求相勝則必至於矯職守求相陵則必至於爭願執中守正深體建極之道而二三大臣益求治泰之宜又論邉備冝蓄威望以開重寄示恩信以服義旅廣招刺以固邉障便收糴以省漕運又論賞罰之弊及官屬泛濫請從省罷科目具文請定限制三軍招刺請先擇子弟差役紛爭乞主義役時臺臣請上謁原廟議自溧始也又上定規模正紀綱振起人才肅清官列擇監司守令選將帥愛民強兵八事詔舉賢能首以丹陽劉宰為薦嘗奏謹微謹獨勸上持守勿失溧在臺諫所劾者十一人每疏成焚香禱云某人得罪清議非溧已私彈章傳播悉當其罰或有與溧意趣不同者恐修睚眥之怨溧曰此豈報復私隙地哉寶慶初除宗正少卿明年改太常少卿上疏論思睿作聖之功甚切又奏請修寧宗玉牒尋乞外任除直顯謨閣浙東提刑俾郡縣各置代厯以絶欺蔽劾治屬吏之故縱失入留獄任情者風裁凜然三年詔兼本路常平侍御李知孝奏對論及監司因言近所遣麋溧葉宰皆好監司上稱善以疾轉朝議大夫祕閣修撰致仕年五十六贈銀青光祿大夫溧學問充實性稟純厚退靜清介居家孝友雍睦臨政勤敏而能急吏緩民誅鉏豪右立朝正色剛直平易有循吏之風大臣之節其居諫職不肯順旨劾真德秀由是去國名重當世子􅠐􅠐字伯升初以祖郊恩補將仕郎中銓試授迪功郎端平初監無為軍襄安鎮實濡須要衝三年北兵益張􅠐習射訓兵修器械易旗幟軍容士氣一新境內以安知軍丁仁以三鄉民兵俾􅠐總統命旁邑取以為法提舉羅願特薦于朝嘉熙二年以兵射發䇿􅠐即所閲歷敷陳知貢舉遊似異之擢進士第差行在豐儲西倉斛面譏察官淳祐初北兵至通州時議以防江為急􅠐上五事曰置寨屋以廣江防給間田以復流散選土豪以任團結嚴間探以闖敵情復山水寨以限敵騎之衝六年知長興縣釐賦役平訟獄適嵗荒艱糴􅠐出告身抵義倉米千餘石以活餓人帥祁嚴勘與鄰境鬪爭嘯聚數千人􅠐奮身撫諭皆得其平尋改來安縣秩滿充淮西安撫機宜築浚揚州堡城屢受升賞轉朝散大夫差知亷州未行改安慶府又改無為軍開慶初以趙葵薦除將作監丞沿江宣撫司參議官差知處州改安慶府景定初疏法堯舜十二事上奬納且戒以惠養逺民下車首遏貪暴扶植善良重賞格以嚴教閲決滯訟正誣枉在官四年境有嘉穀之瑞父老生為立祠轉朝議大夫封吳縣開國男卒年七十七弟弇弇字仲昭以父致仕恩調崇仁丞知山隂縣邑舊苦催科往往抑稅長代輸至郡議排甲以易之弇言在於擇令稅長有弊排甲豈獨無之復釐正稅長所收不趣而辦移丹徒縣先是縣令接送凡納堂日用百需悉出於吏吏並緣為姦名白納錢里正破産不能支春夏之交輒預借苗以取曰子錢縣多山田率苦旱每一體放度其價直反倍於納苗民以重困弇首嚴納堂之禁催科則給引使經承設匭使自投繳民不復用一錢又每都置人直縣給里正紫袋俾往來有公事吏不得髙下其手舊有折羅折麥二錢弇併為一遇旱輒躬自檢實不以屬吏由是執役户或終嵗不入縣門小民號為太平官府又以餘力新作廳事諸司交薦以為八郡之最邑人立碑頌德由淮東安撫機宜通判揚州改江東安撫司參議知建昌軍縣給袋厯使申述民隱境內旱暵齋祓而雨除太府寺丞改度支郎官舊本部五司印通用無所考柅弇白長二支帖止用度支印輪對首奏畏天愛民講學修政求賢聽言六事上問近日貪風未革弇乞奬廉首以陳塏陳昉對稱旨尋兼權右司時丁大全隂奪政柄弇守正不阿有季全者其父及叔父皆為富民潘應芾威使殺之事下憲司應芾數年不就逮反以其弟爭産事訟季于漕司弇立督之俾直其寃出知台州州有鬨卒驕蹇日甚弇密訪倡亂者上制司誅之弛其餘不問一州懾伏卒為大全所中罷去除侍左郎中遷尚書右郎中弇在銓衡人皆憚於私請或規弇性過於執方弇曰性拙所致豈能復刓為圓尋又罷去除將作監淮東總領兼知鎮江府圍田租取斛靣尤甚弇至悉從寬減舊買軍需取嬴弇按舊籍率三數年後方能追及倍稱之息又零取於將校所攤之家囚繫多死者弇抑不行力請宣限支給恆使有儲至於飾江防寬苗稅抑供需理寃滯聲績可紀久之差知安吉州兩易知吉州挨實苗額繕完城郭甓衢路作簽廳又葺浮梁州人名曰糜公橋詔兼提舉江西常平景定五年卒年五十九弇性孝友睦族恤貧略倣范公義莊規約秉麾持節生業無所增所至吏不能欺豪右屏迹立朝議政尤號知大體平居奉養清約燕逰玩好絶不留意鄭起潛字子升父時發閩縣人遊學吳中寓居天心橋生起潛起潛篤志力學長通易寧宗朝登甲第纍遷崇政殿説書侍讀侍講為大禮執綏官除禮部侍郎遷中書起居舍人轉直學士權兵部尚書貶贛州起潛好浮圖説以端午日坐逝有旨歸葬陽山陳振字震亨襄之後也父遵出贅李衡女因家崑山遵死振幼貧無以葬得地圓明村卜者云不利長子振曰使親藏得寧或不宜於振二弟尚可主祭遂葬焉天性至孝以祿不逮養刻木為親像一飯必祭急義樂善好汲引後進有過失必規正之為文簡健髙雅無宋季陋習有止安集五十卷好楷書有歐虞氣骨官至太府寺丞知永瑞二州以朝議大夫致仕卒贈通議大夫養子昌世亦以文鳴兼優吏事初為府丞知信州以最聞擢吏部郎召對理宗有一亷可喜之褒後知瑞州秩朝散大夫中嵗絶欲自奉菲薄居官所至有遺愛皆以節用愛人為本昌世子師尹明復明復官朝奉郎通判慶元府王可大郡人也嘉泰中知武岡軍有惠政疲氓得蘇清靜鎮俗嘗以郡民不喜醫藥多殞非命刻方書以惠之楊應龍字汝濟系出關西曾祖敏求仕徽宗朝官至朝散大夫徙居崑山之外岡應龍才兼文武為戚里吳郡王壻寧宗朝授武功大夫浙西兵馬鈐轄暮年丐祠主管建寧府沖佑觀使所著五十萬言名曰進授册嘉言讜論發於忠忱手鈔六經百家之説為性齋知見録凡三十卷又有性齋詩稿王衮黃由皆以將帥薦之未幾卒子光輔終承節郎孫滋生有神異殁于邉功理宗贈護國惠忠侯廟食里中王介字元石郡人也由進士授昭慶軍簽書節度判官廳公事光宗久不覲重華宫介走書諷趙汝愚宜率百僚守和寧門俟六飛之動入為學官又上疏懇言之寧宗即位韓托胄用御筆罷諫官介力改之開禧二年為尚書度支郎首陳用兵之禍托胄怒諷御史斥去托胄誅召為吏部兼右司纍遷宗正少卿兼中書舍人會不雨詔百官言得失介乞册免宰相令史彌逺終喪制張允濟以閣門宣贊舍人兼臨安府鈐轄介謂此細事而用權君側破祖宗制不可封還詞頭丞相語介此中宫意介正色曰宰相逢宫禁意給舍承宰相風旨朝綱掃地矣數日徙起居舍人出知嘉興府又尹臨安改知慶元府卒年五十六諡忠簡介初學於吕祖謙徙居金華娶鄭僑女僑實壻汪應辰故介文學有原委子野野字子文以父蔭補官登第歷樞密院編修兼檢詳繼為副都承旨拜禮部尚書所奏陳皆明切可行為兩浙轉運判官以察訪使出視江防自嘉興至行在增修官民兵船守險備具嘉熙四年以江南西路轉運副使知隆興府除大理少卿歷沿江制置使江東安撫使行宫留守寶祐二年拜端明殿學士封吳郡侯三年僉書樞密院事時丁大全用事嘗不快於野誣以在建康日盜用官錢遂主管洞霄宫憂憤而卒贈特進野師事真德秀知朱熹之學創建安書院祠二先生工歌詩書效歐陽詢署書尤清徑官浙漕時嘗被論野以母年老托言改除母曰我已知之昔汝父以忤時相去國今汝又如此我方以為喜汝復何憂時人稱為賢母周虎字叔子世為臨淮人靖康中徙居常熟為人倜儻輕財尚氣慶元二年武舉進士第一授殿司步軍同正將除武學諭閣門舍人充金國賀生辰接伴副使知光楚二州開禧二年知和州時敵會諸道兵加渠帥以平南蕩江等號長驅直入圍和州甚急虎部分將士乘城拒守其母何氏擁孫息期與兒偕存亡虎謂父老曰吾國家守臣一朝去此則為奔亡之人失節敗名生不如死效死弗去雖歿猶生吾計決矣合戰凡三十四殺敵驍將以十數最後射死其右帥薩克達敵引去於是和議堅決而江淮安焉虎推功歸母進封永國太夫人故賞不及虎州人德之生為母子立祠特轉武功大夫正任文州刺史除主管侍衛馬軍行司公事特授成州團練使侍衛馬軍都虞候帶御械器兼幹辦皇城丐間提舉佑神觀言者指為權黨坐謫徽州得旨自便復元官未幾母死誓不出仕歸吳杜門托躄除知和州特轉行一官者再辭表至八九上得請乃已家居十二年雖舊所部候之亦堅不與接紹定二年轉和州防禦使卒年六十九諡忠惠廟號忠烈虎有大將器功在江淮忠節罕比而文詞贍敏尤善大字名重一時王柟字汝良節愍公倫之孫父述通判平江府初述負倫骨自河間返葬郡之陽山遂家吳中開禧中和議始成柟為城南廂官帥臣言其有異才被命出使擢帥淮西進尹臨安皆有聲績孟猷字良甫元祐后族也祖忠厚封信安郡王判平江府自有傳父嵩字嶠之直祕閣浙西安撫司參議官猷居郡之閭丘坊嚴已恕物不立崖岸立朝無黨與未嘗示人以同異之迹歷婺州通判又知婺州四持使節所至皆安其政令官至朝議大夫太府卿兼刑部侍郎卒年六十七子繼華奉直大夫繼顯進士弟導導字逹甫與猷俱學於葉適導通判臨安府盡心職務諸司交薦之三遷大理正知江隂軍官至大中大夫導孫文龍字震翁浙東常平幹官在儒林傳朱天錫郡人也嘉定十年知丹陽縣盡心撫字務在不擾修創公宇留意學校邑人生立祠十四年以通直郎知武進縣官至知台州趙琳字君善忠簡公鼎曾孫也父監字孺文范之柔以女兄妻之遂家崑山終知興國軍琳自進士嘉定十年為常州教授作亭表鄒浩墓歷宗正丞都官郎理宗欲用為諫官有沮之者出知吉州不赴丐祠而歸後以朝散大夫直寶章閣致仕清修寡欲室無媵妾惟藏書萬卷卒年七十八方萬里字子萬其先嚴州人元符以來世登儒科萬里幼失父伯兄永嘉簿賜復擕之侍母來吳因家焉登進士教授江陰軍儲義廪置小學謹禮儀紹定五年以朝奉郎知江陰軍纍至太常寺簿贈正奉大夫萬里問學履行逺近敬之趙汝述守平江遇之甚至汝述卒賓客皆散去萬里獨護喪數程時人義之子洪字養原進士王萬字處一其先定逺人萬少居濠梁學舍慨然有求道之志熟讀論語忽覺有得登甲科授和州教授吏部架閣國子録添差鎮江府通判除樞密院編修官兼屯田員外郎知台州嘉熙二年乞宫觀又辭召命來居常熟復入為屯田貟外郎兼編修改尚書右司仍兼編修崇政殿説書除監察御史首論史宅之故相之子曩昔弄權不當復玷侍從上命丞相諭旨迄不奉詔尋出宅之知平江府又論之疏凡五上時蒙古屢敗我師帝悔於用兵命學士吳泳草詔罪已泳以萬忠伉有大志精於邉防遂以上意訪之萬曰兵固失矣言之過甚恐亦不可今邊民生意如髮宜以振厲奮興感發人心因為條具沿邉事宜泳從其説具藁上進會時相有不協公論者萬上疏劾之且引歐陽修之論趙括謂天下皆知其不可獨其主不悟者最為莫大之患疏入即除大理少卿尋改太常少卿知寧國府召赴行在奏事除直寶章閣宫觀再令赴行在奏事仍直寶章閣福建提刑除直煥章閣四川宣諭使司參謀官太常少卿並纍辭不受家居纍年凝塵滿席淡如也淳祐三年卒年四十八五年詔王萬立朝謇諤古之遺直為郡廉平古之遺愛可特贈集英殿修撰仍撥官田五百畝會子五千貫贍給其家十二年賜諡忠惠萬聞道甚早其學由於自得談經不涉支離不為崖岸之行藴畜深厚人莫窺察每書事天二字以自警在朝與曹豳郭磊卿徐清叟俱負直聲號嘉熙四諫有文集時習編書志編若干卷王圭字君玉崑山人范成大外孫也父邁字德逺安吉人依妻家以居登進士終通判太平州圭起進士主松陽簿以才幹升為令講行經界為天下式淳祐八年以監行在諸司糧料院出知常州屢蒙升賞十年又以職事修舉轉朝奉大夫再任入為司封郎官終朝奉大夫其居官廉家無餘資有文集十卷子敏學強學劉必成字與謀其先福安人來居崑山之湓浦必成少遊國學嘉熙初七士同叩閽極言時事必成實為之倡是年七士俱與計偕而必成為武舉解元明年遂魁天下淳祐九年復中鎖廳蓋以文武全才自負也嘗兩入閣輪對慷慨言邉事上深褒美次日宣諭宰執曰必成所言極好後皆行之歷知潯州卒官湖南安撫副使有三分詩藁阮登炳字顯之其先由閩徙吳曾祖簡迪功郎浙東安撫司幹官祖大遇承信郎都督府幹官父諴贈朝奉郎登炳世習禮記淳祐六年與計偕咸淳初免上南宫以亮陰賜狀元恩例授承事郎紹興府簽判兼福王府教導官改承議郎祕書省正字以論公田抗言忤衆斥豫宫觀起為建寧府添差通判入為祕書省校書郎歷著作郎祕書監丞權少監升祕書監官至朝請郎元兵取臨安隨例入燕以病還鄉里年八十二卒王都中字元俞福寧州人父積翁仕宋寶章閣學士福建制置使宋主納土以全閩圖籍上元世祖授中奉大夫刑部尚書福建道宣慰使兼提刑按察使尋除參知政事行省江西俄為國信使宣諭日本遇害於海上都中三嵗即以恩授從事郎順昌縣尹七嵗從其母訴闕下世祖閔之給驛券俾南還賜平江田八千畝宅一區已而追念其父功不置特授少中大夫平江路總管府治中時年甫十七僚吏見其遇事剖析動中肯綮皆􅌓眙不敢欺崑山有詭易官田吳江有違拒有司築堤護田者皆舉按其罪學舍久壞首新禮殿秩滿除浙東道宣慰副使遷荆湖北道宣慰副使嵗侵躬履山谷以拯民飢除江淮泉貨監所鑄錢號最精改郴州路總管溪洞猺獠皆悅服大治學舍俗為之變鄰州茶陵富民覃乙死無子惟一小妻及其贅壻拜尸成婚藏隱玉杯夜明珠悉得其情而正其罪郡歲貢金而金户貧富不常考得其實乃更定包銀之法以憂去民為立祠服闋除兩浙都轉運鹽使未上擢海北海南道肅政廉訪使中書省奏國計莫重於鹽策乃仍如前除遍歷三十四場驗其物力髙下以損益之役既平而課亦足擢福建閩海道肅政廉訪使遷福建道宣慰使都元帥又改浙東道宣慰使都元帥天厯初被省檄整七路軍馬境內晏然徙廣東道宣慰使都元帥三易鎮皆佩元降虎符元統初以兩淮鹽法久壞命以正奉大夫行户部尚書兩淮都轉運鹽使尋拜河南行省參知政事道以疾歸上閔其老詔即其家拜江浙行省參知政事卒諡清獻都中歷仕五十餘年所至政譽輒暴著而治郡之績尤偉有詩集三卷劉嶽字公泰祖開宋神醫世居星子嶽讀書於白鹿書院宋季來居吳元世祖詔求南士嶽應聘入見世祖詢其先世以開事對命以奉議大夫官太醫院時稱為劉三點以其指點三下洞知六脈受病之源也未幾詔以其文合古作可掌誥命改翰林學士中順大夫知制誥同修國史廷事輒與議求外補授嘉議大夫建昌路總管所著有東崖小藳干文傳字壽道其先汴人五代祖武節大夫恭建炎南渡僑於吳子孫因占籍文傳少嗜學十嵗能屬文未冠用薦為吳及金壇兩縣學教諭饒州慈湖書院山長延祐中詔著取士令首以江浙鄉貢會試京師登乙科授承事郎同知昌國州事州居海塢民頑獷羣行剽掠海中文傳柔以恩信俗為之革遷承務郎長洲縣尹諜訴轇轕歲輸糧四十餘萬文傳聽決趣辦具有條理居公署未嘗輒出親舊莫敢通謁會行助役法行省檄専任本縣之事召縣民善諭之無敢為詭寄者再遷承德郎烏程縣尹胡瑗墓為僧壞據復而表樹之丹徒民周有一女二子而二子共殺女獄久不決憲司俾往鞫立得其情周母乞貸二子命文傳謂二子所承有重輕乃議為首者當殺姊罪從者免死使養母咸稱明允升奉議大夫婺源州知州朱熹先業并於豪民文傳呼豪折以理不俟窮治悉歸之富民江出遊娶娼張氏為婦江既客死張間關數千里返其喪􅓅前妻之子遇之不以禮重困苦之張不能堪子恐生它變乃與弟共殺之瘞尸山谷間官知其情利賄不問文傳曰為子而戕其庶母人道滅矣遂論死朱某妻王無子朱納妾於外生子未周嵗王誘之來逐妾而留其子湛之水不死以帛經之乃死夜以醬塗死兒焚之朱知而無如之何文傳發其事死兒餘骨已至官王厚賄妾父母買鄰家兒以為妾兒初不死文傳令妾抱乳之兒啼不就乳妾父母遂吐實乃呼鄰婦至庭兒見親母躍入其懷就乳王遂伏殺兒之辜人以為神明升朝列大夫吳江州知州以均徭賦為先催科追逮信立程限民亦不違村落之間不識吏胥至正三年召擢集賢待制朝請大夫俾居宋史前局供職勤恪雖憊不少休三史以次成燕賚優渥乞間以禮部尚書致仕升嘉議大夫歸卒文傳為文務雅正不事浮藻有仁里漫稿若干卷陳謙字子平吳人兒時即知孝後父病革思鱖父沒遂終身不食鱖師事處士林寬教授龔璛皆勉令試有司既入院兵士搜檢無狀謙歎曰待士如此尚可以徼幸失得為哉即罷歸盡棄其業屏除世好潛心六藝旁覽百家而守之以約為文章馳騁上下尤善詩賦虞集黃溍張翥皆論薦力辭乃止喜施豫孫子翼貧有女不能嫁謙許助之後孫病篤謙持資往為畢嫁事謙事兄訓甚謹丙申嵗訓為江浙省照磨假還張士誠兵適至訓謂謙曰汝無官守宜自為計謙曰兄在吾何所之俄而兵突入室脅訓使拜不屈遂刃其胸謙以身翼蔽之并遇害年六十三所著述甚富兵後散亡獨易解詁二卷及古今詩數十篇傳蔣堂字子中吳人父為州幕長堂聰敏過人幼讀書有大志及長以孝友稱與人誠敬中泰定鄉試後隱居教授至正間用大府薦為嘉定州儒學教授有詩文藏于家朱德潤字澤民崑山人幼誦讀一過能記壯攻詩文間得許道寧畫試加塗抹遂臻其妙延祐末遊燕京趙孟俯薦之召見命為編修明年授鎮東儒學提舉以歸喀喇庫庫袁桷皆與友善至正中浙省辟為參謀後攝守長興招徠流離尋以病免卒有存復齋藁十卷姑蘇志卷五十一
