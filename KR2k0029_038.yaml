body:
  text: 姑蘇志卷三十九明王鏊撰宦蹟三閻象巨野人吳越納土被命領禁兵千人至蘇安撫軍民遂知州事能知其風俗而揉以善政或摩以漸或革以宜推凡上之所欲施寬凡民之所不堪恩涵澤沛民以蘇息政成召還改濟晉黃棣青等州卒梁周翰字元褒管城人太平興國五年以知髙郵徙蘇州周翰善音律喜蒱博州有伶官錢氏家數百人日令百人供伎每出以博具自隨郡務不治以本官分司西京柴成務字寶臣濟隂人太平興國中以殿中侍御史知蘇州除兩浙轉運使成務有詞學博聞稽古善談論然為郡乏廉稱按王禹稱文成務雍熙元年自治書侍御史典郡四年三月任滿四月改戶部員外郎直史館兩浙轉運使許衮字公儀燕人雍熙中為均州防禦判官郡將表其能狀拜太子右贊善大夫通判蘇州時二浙之地始歸朝廷宿政如棼絲衮善理之就進殿中丞宋璫字寶臣渭南人淳化中三吳嵗饑民疫擇長吏治養之命璫知蘇州璫體豐碩素病足州地卑濕疾益甚或勸其謝疾北歸璫曰天子以民病俾我撫綏我又以疾辭非臣子之義也先是太白犯南斗璫曰斗為吳分民方饑天象如此長吏得無咎乎四年十月庚午卒上嗟悼録其子明逺為蒲城主簿璫性清簡歷官三十年未嘗問家事唯聚書以貽子孫且曰使不忘本也陳省華字善則閬中人智辨有吏幹至道初以祠部員外郎知蘇州賜金紫時遇水災省華復流民數千戶莩者悉瘞之詔書褒美官終左諫議大夫裴莊字端已閬中人在蜀以眀經及第真宗即位以河南轉運使移知蘇州咸平二年命巡撫江南景德中安撫兩浙莊有吏幹慷慨敢言太宗奬其忠讜多所聽納好為規畫頗疏於學術云喬維嶽字伯周南頓人咸平初自海州刺史知蘇州仍帶前任維嶽素病風上以吳中多食魚蟹乃徙夀州命太醫馳療之四年卒陳彭年字永年南城人歷懷州推官深為知州喬維嶽所委任真宗朝為祕書郎惟嶽刺海州及知蘇夀二州並表彭年通判州事咸平中直史館上大寶針拜參知政事進兵部侍郎卒諡文僖彭年性敏給博聞強記朝廷典禮無不參預張去華字信臣襄邑人幼勵學敏於屬辭咸平二年自知杭州徙蘇州頃之以疾求安得守本官分司西京去華美姿貌善談論有藴藉頗尚氣節仲華姓里缺咸平四年以太常少卿知永興軍移蘇州五年十一月改右諫議大夫知杭州盧志云按本傳轉運使任中正上其治狀拜右諫議知杭州既而謝泌為使奏劾仲華徙任冒請蘇州添給詔罰金移䖍州康懷圭宋初任平江軍節度推官見王禹儞作神道碑梅詢字昌言宣城人自通判杭州知蘇州按實録以右司諫除知蘇州壁記云朝散大夫太常卿直集賢院與本傳同而祥符九年十一月虎丘詩刻云尚書祠部員外郎就徙兩浙轉運副使入判三司開岸司遷太常博士出知濠州湖北轉運使降通判襄州知鄂州又徙蘇州歷樞密直學士出知許州卒詢性卞急好進侈於奏養至老不衰然數為朝廷言兵曾致堯字正臣南豐人以直史館為京東轉運鉤得匿貨五百萬計稱㫖除祕書丞兩浙轉運副使改正使淳化五年致堯言所部秋租惟湖州督納及期而蘇常潤三州悉有逋負請各按賞罰以勸懲之太宗以其刻薄又以江淮頻年水災蘇常潤特甚詔致堯倍加安撫勿得搔擾民或失所罪有所歸始諫議大夫知蘇州魏庠侍御史知越州王柄惰於政治喜怒縱入百姓病之庠介舊恩以進柄喜持上致堯獻書條劾之帝覽書驚曰曾致堯乃敢治魏庠可畏也庠柄由此被絀久之致堯移知夀州景德四年以尚書吏部員外郎自知泉州移蘇尋徙揚州卒黃震字伯起浦城人纍擢江淮發運使發李溥姦贓溥坐廢震亦奪官後至廣東轉運使本傳不言知蘇州壁記亦無今從范盧二志據吳江學記碑補入秦羲字致堯江寧人大中祥符中以東染院使知蘇州改崇儀使除提舉在京諸司庫羲知書好為詩喜賓客頗有士風歷財貨之任凡十餘年精勤練習號為稱職王罕字師言華陽人贄之子大中祥符三年以父任補官再調為平江軍節度推官終光祿卿孫冕字伯純新淦人咸平中為兩浙轉運使天禧中以大中大夫行尚書禮部侍郎一作郎中直史館上柱國賜紫金魚袋知蘇州治獄不濫斷訟如神弛張在已無所吐茹吏畏而民愛之嘗病癰州人爭為詣佛寺祈福復立生祠於萬夀寺甫及引年大書一詩於㕔壁拂衣歸九華山朝廷髙其風許再任召之不起徐奭字武卿建安人祥符中進士第一天聖初通判蘇州時東南大水詔奭與趙賀督治奭周視盡得水利舊跡乃築石塘九十里建橋十八所復良田數十萬畝疏隱田者二萬六十户得苖三十萬詳水利條塘成遷兩浙轉運使封晉寧侯致仕遂家吳中子孫别有傳盛度字公量先居應天徙餘杭世仕吳越真宗時為翰林學士自知滁州遷集賢院學士知蘇州還知審刑院官至參知政事知樞密院以尚書右丞罷卒諡文肅麈史云諡安肅度好學家居手不釋卷然性猜險平居僚友不敢易言語所至下貧無賴多所縱舍稍有資者一切繩之以法王鬷字總之臨城人歷官著作佐郎太常博士侍御史三司戶部副使樞密使曹利用得罪鬷以同里為利用所厚出知湖州徙蘇州卒諡忠穆章岷字伯鎮浦城人天聖中為平江軍節度推官時知州盛度黃宗旦多以事委之度嘗俾閲經史凡及吳事者録為一書書成藏盛氏人不復見岷時名籍甚廣新㕔廨記刻多岷文與弟峴岵皆侍親居郡中士大夫多稱之岵字伯望為兩浙轉運使有威名及知蘇州始下車會暴風湖海之濱民或漂溺岵遣吏巡視賑恤請蠲田租人不失所鉏治姦吏飭治衆職大小悉舉豪右莫不畏懾以政最聞詔曰吏不數易然後得以究其才今夫蘇劇郡而爾為之守克有能稱嘉省厥勞仍其舊服往惟率職不懈以稱吾久任之意哉時議欲大修郡城浚治運河岵務愛民力請罷其役民甚德之性剛介不屈人目為章硬頸王質字子野莘人用伯父旦䕃三遷至大理丞年尚未冠以楊億劉筠薦召試賜第聲動京師除太常博士集賢校理尋拜祠部員外郎通判蘇州知州黃宗旦得盜銷鑄者百餘人以詫質質曰事發無跡何從得之曰吾以術隂鉤之質曰仁者之政以術鉤人置之死地而又喜乎宗旦不覺身去坐榻謝曰微君之言吾幾失矣竟薄其罪入朝判吏部南曹吳育字春卿建安人仁宗朝蘇州僉判又舉賢良方正擢著作郎直集賢院通判蘇州知州黃宗旦負材自喜頗以新進少育議事則曰少年乃與丈人爭事育曰受命佐君有事當爭職也宗旦雖屢屈而政常得無失頗德育助已為之加禮育性眀果強學博辨所至作條教疏簡易行而不可犯辨論眀白使人聽之不疑體素羸少時力學因得心疾在蘇得古方和丹砂餌之大醉一夕而愈官至尚書右丞諡正肅趙概字叔平虞城人以祕閣除蘇州明年丁母憂服除召為翰林學士卒諡康靖概為人怨怒不形於色専務掩惡揚善以德報怨出於至誠非事矯強人以為劉寬婁師德之徒云張去惑景祐初為平江節度推官郡適水災轉運使委去惑分捍水道朝廷録功除將作監丞滕宗諒字子京河南人慶厯中知嶽州治為時最移知蘇州未逾月江浙間喧然稱有神眀之政俄卒于郡張伯玉字公達江西人慶厯初為郡從事剛介有守文藝甚髙范文正公愛重之舉詞有云天賦才敏學窮閫奧善言皇王之治博達古今之宜素藴甚充清節自處後應詔赴制科去杜曾字孝先雷澤人舉進士蘇州司法參軍明於法律改潁州團練判官慶厯中選吏部郎中胡宿字武平晉陵人慶厯中知蘇州移兩浙轉運使終樞密副使宿清謹忠實臨事重慎言不輒發亦不可回止其篤行自勵至於貴達常如布衣時卒諡文恭梅摯字公儀新繁人歷知昭州二浙饑官貸種食已而督償頗急摯奏借貸本以行惠乃重困民不便詔下其事併他州亦得緩期擢殿中侍御史以戶部副使出知海州徙蘇州摯以慶厯八年正月除有五日公燕詩云到官三月始開筵入為度支副使摯性淳靜不為矯厲之行政跡如其為人喜為詩有奏議四十餘篇王琪字君玉華陽人歷兩浙淮南轉運使以龍圖閣待制知蘇州移潤州江寧府復以知制誥知蘇州坐失舉保任徙知饒州後以禮部尚書致仕琪性孤介不與時合數臨東南名鎮政尚簡靜每疾俗吏飾厨傳以沽名譽故待賓客頗濶略云蔣續一作結堂之孫也皇祐中僉判平江軍堂卒續自言少孤育于祖乞服衰以報朝議以堂有子不許遂辭疾謁醫去職行服嘉祐中復知吳縣事蔡抗字子直宋城人歷平江節度掌書記嘉祐中通判秦州吳中荐饑朝廷擇守將經制其事遂以祕閣校理太常博士知蘇州到任行縣按水又置射堂於州宅明年改廣東路轉運使鞠真卿字顔叔慶厯中守將作監主簿知長洲縣所至有威名嘉祐中知蘇州政事無他施設而人自憚之訟庭寂然每平明視事無訟者真卿即歸休客至多不及見治平初除兩浙提刑後貶南安軍道過蘇郡人相戒不敢過其泊舟處五日左右不聞人聲其見憚如此司馬光字君實涑水人寶元中除奉禮郎時其父池仕於杭光求僉書蘇州判官事以便省親許之元祐中拜相蒲宗孟字行正新井人為蘇州推官英宗以水災求直言宗孟上疏言極剴切既又地震復上疏指斥大臣宫禁宦官遂除祕閣校勘神宗朝為尚書左丞沈兼字子達歷太子中舍通判蘇州能名籍甚性好剛遇事果急不顧計與守爭可否不為少屈重犯轉運使守使相與害兼入之法除名免官兼歸怡然無躁戚言李禹卿字君益唐宰相吉甫八世孫自郢州僉判除通判蘇州隄太湖八十里為渠益漕運其口蓄水溉田千餘頃嵗饑出羡粟三萬全活萬餘人移通判袁州㑹知州翁及死禹卿哀其貧適吳人歸職田錢二十萬立分其半遺及家僚屬乃亦合錢二十萬以賻遷知澤隨二州既去民懷其恩官至司農少卿黃鑑字唐卿浦城人少敏慧過人師同郡楊億嘉祐中以直集賢院奉詔同修唐書㑹司諫劉隨上疏乞章獻太后還政出知濟州鑑抗章乞留隨以重朝廷併排劉從義馬崇正之橫言極鯁切太后怒出通判蘇州宋祁歐陽修范仲淹率館中同僚祖餞舉酒相弔君以直言不得自安於朝廷吾儕有愧安能久尸位邪未幾仲淹等皆調外職鑑奉母之官繼丁家艱逮服除沐浴秉笏端坐而卒詔官其一子李清臣字邦直魏人治平二年以虞部員外郎祕書郎僉書平江軍判官名聲籍甚歐陽修以館職薦召試擢集賢校理歷官尚書左丞門下侍郎陳軒字元輿建陽人嘉祐八年四月授平江軍節度推官歷官兵部侍郎潘夙字伯恭鄭王美從孫知桂鄜蘇潭鄂等州以將家子而能留心政務用當其材舉能其官夙自蘇移潭續志作自潭移蘇誤邊珣字仲寶楚丘人歷鹽亭尉以孫沔辟書寫河東路經歷安撫都總管司機宜文字改平江軍節度推官㑹沔知杭州以事斥珣亦並緣被譴英宗起沔經略陜西有司亦言珣無罪狀乃復其官始赴平江任崑山旱蝗檄珣督捕瀕海萑葦盤互蝗集其下莫知為計珣命連挺碎根植于上而斃之諸郡取以為法又嘗直盜牛之寃後其家言輒流涕歷邠州觀察支使揚州觀察推官紹聖二年卒于蘇珣性孝悌與人交有終始在官有能名公卿皆所推重子裕自有傳孫覺字莘老髙郵人治平三年夏以民曹椽權吳江縣有江橋延袤二百許丈役大難集覺募民修治之勢愈雄壯及河塘兩岸甚繁前政科買竹篠率數年一修易敗而遄致潰決覺又市石增築遂得支久祠廟廢缺者新之上官信任而吏民樂從才既通敏優逸有餘復葺如歸垂虹兩亭詮次邑中留題百餘篇為松江詩集歷館閣校勘直集賢院右司諫知潤州以喪不赴服除知蘇州卒官御史中丞王覿字明叟如臯人以直龍圖閣知蘇州州有狡吏善刺守將意以撓權前守用是得譏議覿窮其姦狀置于法一郡肅然民歌詠其政有吏行氷上人在鏡心之語徙江淮發運使歷官御史中丞覿清修簡淡人莫見其喜愠持正論始終再罹譴逐不少變無疾而終黃履字安中邵武人哲宗朝徙翰林學士附麗章蔡歷舒洪蘇三州移江寧府終尚書右丞賈青字春卿韓城人丞相昌朝子也紹聖中知蘇州除兩浙轉運使元符初臺臣追論青在蘇州粉壁出賞斷人穢語罰錢入官造樂籍堂貧民力不能輸金自縊死者數人改知河中府子公望公望字表之資稟甚豪嘗謂仕宦當作御史排擊姦邪否則為將攻討羌戎餘不足為也通判蘇州疾朱勔父子與奔競其門者為詩自厲因以刺之有陽光一銷爍不復見妖魔之句時勔子為浙西路分賜金帶公望亦衣三品服嘗以朝謁同集天慶觀勔從者睨視公望佩魚公望厲聲叱之曰此是年及得來非緣花石左右皆錯愕勔竟擠之罷去晚知泗洲翁彥國勤王不進久留泗上公望靣訶責之且約不復餉其軍及張邦昌僞命至率官屬哭於天慶觀聖祖殿而焚其赦書遂不能越泗而南時人服其壯烈陳師錫字伯修建陽人熙寧中游太學有俊聲神宗知其材及廷試奏名在甲乙間帝閲其文屢讀屢嘆賞擢為第三調安慶軍掌書記郡守蘇軾倚以為政歷監察御史遷工部貟外郎知解宣蘇三州徽宗召拜殿中侍御史抗章言蔡京典刑未正願受竄貶出知潁州坐黨論監衡州酒削官置郴州卒師錫初論京卞者四章惇者三因與陳瓘同論二蔡時號二陳蹇序辰字授之雙流人歷官中書舍人奏司馬光變亂典刑由是縉紳之禍無可脫者徽宗立除名放歸田里蔡京為相復拜刑禮二部侍郎尋黜知汝州二年徙蘇州坐縱部民盜鑄錢謫單州團練副使江州安置移廬永二州大觀初言者以序辰守蘇時以天寧節同其父忌日輒於前一日設燕及節日不張樂有詔勒停㑹赦復官劉羲仲字壯輿髙安人祕書丞恕之子太史范祖禹以恕修書功奏補郊社齊郎清操有父祖風仕至國史檢討忤蔡京不復仕曰吾知有天子不知有權臣胡宗愈字完夫晉陵人屢遷祕書丞熙寧三年同知諫院㑹李定自秀州推官除監察御史裏行宗愈論奏坐奪職通判真州移蘇州七年㑹赦就改太常博士歷尚書右丞吏部侍郎卒諡修簡練定字公權元豐中為推官與朱長文方子通酬唱陳幾道東明人為蘇州録事參軍民有負公府錢自牖出刺弱吏者度不可免乃行賂以族弟代之幾道正其罪嵗大凶承郡命賑救多所全活唐充之字廣仁大名人博學善議論有幹局監蘇州酒稅務知州李孝夀治尚峻猛不任僚屬充之權幕官與之辨論曲直州人多賴之後守盛章於充之為姻家初相友善時朱勔恃勢守歆附之衆多詭隨而充之每著憎嫉之跡守不能堪勔亦羞怨竟傅致以酤法坐罷充之既廢貧困不能北歸寓寶應惟以讀書教子為事莊徽字彥猷江都人居宜興政和初兩浙運副二年召還歷徽猷閣待制知興仁府徙平江六年四月御筆仰徽究心治水八月徽奏趙霖治水事宜時郡豪朱勔挾寵蔑視州縣中貴人緣勔而使者冠蓋相望皆能禍福人於齒頰間官吏無不傾身事之至郡守亦有出其門者徽獨不少假借勔輩深所畏憚訖不敢讒當勔盛時朝廷命官造乘輿服御之珍於浙西諸郡有㫖令徽與勔管當繼下詔罷郡人歡呼而旁郡方遷延幸其復徽曰此天子盛德事人臣當奉承不暇敢顧望乎即日結罷在官六年丐閒不允久之提舉洞霄宫卒盛章字季文襄陽人政和元年以朝奉郎直龍圖閣京畿轉運副使充集賢殿修撰知蘇州二年四月以治狀有功就除顯謨閣待制轉朝請郎賜紫金魚袋三年二月春進木心大吉字及申請府額重建譙樓閏四月除知真定府五月仍知蘇州六月以招徠賈客鋪戶勾過新鈔轉一官九月詔赴闕升顯謨閣直學士依前知平江府十二月除樞密直學士宣和元年七月臣僚言章守平江日於豪民居世英家借貸動數千百緡請求囑託悉出其手物論喧騰章遂以女妻之以弭外議應安道無為軍人重和元年自祕閣修撰除中奉大夫充徽猷閣待制知平江軍府管勾神霄玉清萬夀宫提舉學事六月八日詔以兩浙霖雨淹民田平江尤甚仰安道依已得指揮權撥米二十萬石賑之宣和元年八月進直學士二年與祠四年六月臣僚言安道在州日政無大小曲直咸以賄成安道生日吏民依例以大銀香爐焚香致禱悉以入已尋起知宣州言者復論之詔寢新命樓异字試可奉化人鑰之祖也纍官直祕閣知秀隨明州賜金紫睦冦起以善理城戍有績進徽猷閣直學士知平江卒賈諲宣和二年自將作監除大中大夫充徽猷閣待制知蘇州三年轉通奉大夫三月以備禦方臘有勞升顯謨閣直學士七月提舉南京鴻慶宫四年三月坐在任出入人死罪失覺察降一官九月臣僚追論諲在郡惟務游燕衣紅銷金勒帛直繫出入持紅紗籠燭百數椽燭數十驕蹇侈靡恬不恤民頃緣縱釋重罪失入平人及擅用御前錢物詔落職罷祠胡直孺字少汲奉新人宣和三年為兩浙轉運五年由江淮發運使除知平江入為户部侍郎靖康中知南京統兵勤王力戰為金所執以老得歸建炎中拜刑部尚書李邴字漢老任城人建炎中以資政殿學士提舉洞霄宫未閲月起知平江視事三日坐纍罷任依舊宫祠明年引赦復元官邴嘗奉詔編類平江勤王及奏請本末付禮部鏤板一時定計具草手疏皆邴及朱勝非之筆也執政署名而已閒居十餘年卒諡文肅湯東野字德廣丹陽人建炎二年以祕閣修撰自江西轉運副使知平江兼兩浙路兵馬鈐轄時州兵驕玩為甚東野視事信宿兩卒入嫠婦家取酒不與直驅主人壞釀器掉臂去東野取斬以狥列營懾肅三年車駕幸杭苖劉作難明受赦至東野疑之時張浚參贊御營軍事留平江東野與謀欲匿赦不宣浚曰事如此胡可匿且卒徒觖於望賜吾徒先受禍矣因與密謀取故府所藏登極赦書置輿中迎登譙門讀而張之即捐其階禁毋輒登者而散金帛如常時郊賚之數人情略定又與浚議勤王㑹張俊提兵往行在道遇僞詔還秦鳯師薄城下東野大喜夜叩浚開城納俊師未幾間使持僞詔令東野斬二張東野慮俊武人易動即先攜見浚與偕謁俊斬使者而焚僞詔於是謀益堅貽書抵吕熙浩於江寧推為盟主招韓世忠劉光世皆以兵㑹軍中百須東野實主之師既東東野獨為後備髙宗復位以功超拜徽猷閣待制入為工部侍郎三年五月被命扈太后駕幸鄴九月以兵部侍郎自鄴銜命先至平江應辦南幸尋兼權建康府駕幸越州同知樞密院周望宣撫浙西將屯平江奏言非東野莫可守仍命東野知平江兼本路安撫使進徽猷閣直學士兼制置使東野度望不足與成功辭至七八不獲已而行既至調民夫置守城五壁部隊官及遣機宜邵彪王彥環用防城免夫錢募士及修治城壘樓櫓為戰守具甚悉望無所措畫東野所言悉棄不用即以蠟書具所與望議論本末馳奏乞别自將不然秪與俱死奏十餘上帝手勑報曰朕知卿甚深仗卿甚重宜與望協心同力以扞一方勿相同異於是不敢復言金兵薄城與望俱遁尋引咎自劾不報而臺評繼上請正失守之罪上特下詔曰湯東野昨纍有奏陳守禦頗有倫理只緣事權不専遂至失守與其他棄城不同可止落職尋再乞祠上猶以東野可任繁劇移江東都轉運使言者奏東野守平江敵騎迫近乃先期榜示禁約郡人毋得出城而自脫身逃遁前後科率民間錢米無慮百萬貫石以守城為名而卒不能保故於大中大夫上特降三官依舊差遣遂罷奉祠紹興初從張俊討李成以功復職為江淮發運使知揚州致仕卒趙彥倓字安卿彭城侯叔褧曾孫初調溧陽尉有能名改平江節度推官攝宜興縣以牧馬劵料為負嘗預用二年後稅民以此病彥倓請諸司各奏釋舊逋禁預借百年弊事一日遽絶歷典郡邑具有政績卒官江西轉運使姜浩字浩然明州人以承信郎監平江府都稅務甫冠入仕厲志宦業動有可稱建炎中金將陷平江郡人驚奔而閽者阻之浩叱吏開關去者不勝計浩殿後幾不免人皆德之及胡松年為守擇官僚十人日供所事右列中惟浩得與選所陳又切中時病云胡松年字茂老懷仁人一云朐山人建炎四年以右文殿修撰起復知平江府未入境貪吏解印斂跡以興利除害十七事揭於都市百姓便之明年進徽猷閣待制時朝廷以邵琪張青反覆為盜命諸將毋得招安松年上言大軍四合連旬不能破敵今敵據通州崇明鎮沙上寨栅之外水淺舟不可行泥深人不可涉本府錢糧已費十三萬貫石公私騷然而敵未可睥睨况劉光世兵將多西北人一旦從事江海有掉眩不能飲食者安能與賊較勝負於矢石間遂詔光世措置及奏防江利害召為中書舍人言武昌江州建康鎮江吳江錢唐明越宜各屯水戰士三千為備歷官吏部尚書諜報劉豫侵邊詔遣松年往江上與諸將進討因覘敵情帝决意親征遂次平江命松年權參知政事専治戰艦張浚専治軍器俄以疾提舉洞霄宫卒方秦檜秉政天下識與不識率以疑忌置之死故士大夫多曲意阿附為自安計松年至死不通一書世以此髙之趙子晝字叔問燕王五世孫少警敏強記工書翰建炎四年遷徽猷閣直學士知秀州平江府除兵部侍郎李光字泰發上虞人崇寧五年進士知常熟縣朱勔父冲倚勢暴橫光械治其家僮勔怒誡轉運使移令吳江光不為屈勔終不能害也歷知湖州時中書舍人任申先因奏事上言及輔郡守臣曰湖非控扼之地今平江方擇人無如李光者乃授顯謨閣直學士知平江㑹朝廷以乏軍儲措置和糴數以萬計户部郎官霍蠡奉命至郡光謂之曰主上自南渡以來屢有約束戒科斂今米或可得第未知本錢安所取辦乎殆有言利之臣惑上聽者光適論奏其事蠡聞亟引去疏入有㫖降本錢和糴不踰月而畢召拜禮部尚書卒諡莊簡蔣燦字宣卿宜興人樞密魏公之竒從子也以户部侍郎除集賢院修撰知平江府進敷文閣待制右大中大夫禁戢姦偷鉏刈強梗植善柔拊貧弱獄市為清諸軍牧馬有廄屋數百區茨以茅竹嵗一更之用財與力皆出於民燦請出內帑金佐其費掄材陶瓦覆之堅壯可支數世州人歡呼相率詣北禪寺作佛事以報諸將持人為兵補軍籍率用大舟往來漕河無人處遇彊壯少年束縛鉗梏之惡少因利其資囚閉栅中無脫者燦盡得其姓名窮治株穴捕置於法其事遂絶郡潦大饑詔發常平粟燦調十二萬石給之計道里逺近視男子婦人老幼強弱分日異處各有法度悉無餓者已而長洲鬻獄燦與諸司皆坐貶降右中大夫提舉洪州玉隆觀燦在郡時年已七十日閲訟牒百餘雖精練少年不能過之作韋白劉三賢祠以展邦人尊賢之意卒贈右正議大夫章誼字宜叟浦城人歷官殿中侍御史邵青自太平乘舟抵平江所至劫掠誼請置水軍於駐蹕之地以備戰守詔從之紹興六年以龍圖閣學士自溫州移守平江時將臨幸供億繁夥誼處之皆當理召對賜帶笏帝曰此不足以償卿之勞其勿謝又請均平本府稅役㑹召為戶部尚書卒諡忠恪梁汝嘉字仲謨麗水人建炎中直祕閣提舉浙西茶鹽紹興初奏亭戶未嘗墾田令輸本色非便又言本路嵗收鈔錢一百十九萬緡詔進秩一等除兩浙運判升副使知臨安府遷戶部侍中紹興七年以寶文閣直學士知平江又知台州十年再任既而殿中侍御史羅汝楫論浙西海道可虞以汝嘉兼浙西沿海制置使未幾升學士知明州汝嘉長於吏治在臨安風績尤著仇悆字泰然益都人自知明州改平江陛辭言我軍已習戰非復前日比故劉錡能以少擊衆敵大挫衄若乘已振之勢鼓行而前中原可傳檄而定上甚嘉之洎到官為政刻急軍士頗不安朝廷亟罷之悆端方挺特自入官至貴顯無所附麗治郡典軍皆有遺澤善政可紀史稱為愷悌君子向子諲字伯恭臨江人文簡公敏中𤣥孫歷兩浙都運使紹興八年擢徽猷閣直學士知平江御書薌林二大字賜之陛辭奏曰陛下踐祚以來除學士待制無慮數十百人此衆人所同拜賜薌林散人之號則臣之所獨得其榮至矣願納祿復歸舊隱上弗許又賜舟親題曰泛宅之官子諲到任未幾金使議和將入境子諲不肯拜其詔乃上章言自古人主屈已和戎未聞甚於此時宜郤勿受忤秦檜意纍奏乞休致詔曰卿從朕羈紲晚登禁途昔漢二疏以宦成名立乞骸未若方被寵遇神明未衰如卿今日也由是轉官致仕周葵字立義宜興人紹興十三年知平江時兩浙運使李椿年即本郡行經界法郡故田租不滿四十萬椿年披榛莽按倉碣欲以七十萬為率葵辨之曰記中所言嵗儲榖數耳今法以榖二斛得米一斛正今日數也可強增耶椿年遂以圖經三十萬為準初葵為侍御史欲奏論户部尚書梁汝嘉汝嘉致辭於秦檜出葵知湖州檜蓄怒未巳又易平江葵既以經界事忤椿年椿年還都希檜意奏葵在郡宴金使飲食臭敗致行人有詞遂落職罷任葵謝表有云雖宰夫是供各司其職耳然王事有缺是誰之過歟自是投間十五年後卒官參知政事諡簡惠王㬇字顯道華陽人太師岐國公圭之孫也為秦檜妻之兄或云妻弟紹興中知郡事時兵火之餘公署學校靡不興葺又録入城小舟出必載瓦礫以培塘人以為便石之碎者積而焚之以泥官舍不賦於民而用有餘其規為多可取者然峻以聚斂用刑尤酷嘗於黃堂前鎔錢鑄大士像而人不敢言每刺鹿血入熱酒飲之疽發背死鄭若虛為録事參軍以文學受知於知府王㬇既獲薦書四章意㬇必為造就㬇亦留一牘以待適四舉主皆由儒科進其幕僚欲以計攘者往謁丐先容於府君通判云使君舉牘定與鄭糾他無可得之理幕僚曰竊聞糾曹不欲受府君薦恐或可久通判復叩其說曰視其爵里狀所列舉將頭銜可見既覩則四字聫翩而㬇與通判皆門䕃也異日從容為之申懇㬇言所以留之之意通判具以告㬇怒若虛遂以坐廢蘇師德字仁仲丹陽人魏公頌之孫紹興中為樞密院計議官時同僚胡銓上書詆秦檜貶竄師德亦株連去國久之通判平江適王晌知府事揣檜意日窺伺師德師德廉直無所肆毒未幾周三畏繼晌後㑹康與之前監杭州太和酒庫盜官錢飾翠羽為妓金盼履坐免來吳三畏雖法家而北客例收恤舊族待之甚篤與之又挾秦氏子弟請落妓趙芷籍攜去三畏謀之師德師德謂此事乃與之終身之纍三畏因追還芷與之貽憾師德未幾常同卒於海鹽遂誣三畏以庫金二百賻之師德為祭文有姦人在位公棄而死之語檜大怒命中丞俞堯弼劾三畏落職併罷師德又委提舉王珏鞫之獄上雖無左驗師德送汀州編管子玭勒停同師德之壻玭之婦翁也或云師德同之壻任盡言字元受眉州人右正言伯雨之孫通判平江先是陳正同在郡弛縱不治盡言能助之朝廷録其勞除京西運判紹興三十年也既而盡言至都堂白母老不願居邊郡尋改淮東提舉趙雋之左文林郎平江軍節度推官紹興四年同知太宗正事士㒟言其在建炎間有勤王之請詔改京官湯鵬舉字致逺金壇人纍官兩浙轉運使時鄭滋兩任平江政令縱弛鵬舉欲俟應辦金使至郡按之滋求援於秦檜鵬舉詣檜辭行檜托致書於滋其緘題稱門下士具位秦檜謹封鵬舉尋薦滋治狀改知建康紹興更化力治秦黨鵬舉擢侍御史風采震動檜家裒鵬舉平昔干請之書繳進由是出知平江右正言張扶論其竊幸直之名濟貪汚之行長惡不悛治郡無狀遂罷後至參知政事卒諡敏肅孟忠厚字仁仲其先洺州人昭慈聖獻太后兄子也靖康元年知海州東京陷忠厚持后書遺康王王即位後以保寧軍節度使判平江改紹興浙東安撫使忠厚避逺權勢不敢以私干朝廷朱翌字新仲龍舒人忠靖公勝非之孫以祕閣修撰知平江府撙節浮費積緡錢四十萬於帑藏髙宗視師江上後守洪遵以獻賜詔奬諭洪遵字景嚴鄱陽人禮部尚書皓次子也紹興三十年平江府湖秀二州水無以輸秋苖有司抑令輸麥遵時為起居舍人試吏部侍郎上言麥價殊不在米下民困如是奈何指夏為秋衍一以為二使擠溝壑乎願量取其半而被水害者悉免之明年金主亮使蘇保衡由海道窺二浙朝廷以浙西副總管李寶禦之寶駐兵平江守臣朱翌素與寶異上以遵嘗薦寶乃命遵知平江時步帥李捧請斷吳江橋或議塹常熟福山以限敵騎者遵曰審爾是將棄吳以西邪凡堂帖與監司符移皆留不行及寶以舟師搗膠西凡資糧器械舟楫皆遵供億寶成功而歸遵之助為多車駕幸建康衛士丐索無藝他郡隨與不饜至吳乃相告曰內翰在此勿復然先是朝廷慮商船為敵有悉拘入官又並海縣團萃巨艦募水手民兵皆縶留未得去遵悉奏論以船還商而聽水手自便吳人德之髙宗倦勤諭吕頥浩曰朕將為揖遜之舉擇侍臣善辭令者使預為之庶體製溫純可以傳逺頥浩薦遵召除翰林學士承㫖一時詔令皆出其手官至同知樞密院江東安撫使卒諡文安沈介字德和德清人歷中書舍人以次對知平江召歸上疏甚剴切備言敵必為患明年敵犯兩淮乃以兵部尚書為荆湖制置風采震聳邊郡及再知郡上諭以平江輔郡極難其人知卿政事特加遴選當為朕撫恤百姓均財節用使恩威並施為佳如常平錢米以備凶荒訓兵令精不必增補至於兵器亦令堅緻其眷遇如此又知成都所蒞繁劇綽有餘暇豪猾斂避焉彭爚通直郎平江僉判江文忠公萬里薦之云士林前輩有學有文貧而能亷老而練事曾躋政府尚淹郡幕置之館學庶無棄才劉洵直字子浩莆田人性至孝有德望歷紹興府教授虞允文等薦通判平江同列多貴逰豪縱洵直以儒素禮法開警之久悉感厲時部使者得㫖興水利檄與共事洵直辭曰是役非鄭渠召埭之比已而同列督役受賞進秩隨復鐫去識者服其先見劉之華朐山人紹興三十一年魏勝領兵收復海州之華與文儼謀罄家財輸軍借補將仕郎兩上書陳六事皆恢復大計孝宗韙之特賜進士出身為平江通判髙溶字慶逺宣仁后族初調平江糧料院通判軍府事長官如父兄職守不便立法亟改郡有勢家圍田壅下流溶視水勢所向廢之人不敢怨移知荆門軍官至司農少卿沈虛中字太虛廣德人紹興間為平江儀曹掾攝郡事㑹軍中有謀變者虛中挺身造其營語以禍福白郡守開府庫贍給之皆歡呼投甲論功就擢僉判時丞相朱勝非充御營使置幕府多所禆贊纍遷吏部尚書一云紹興中有潰卒譟于市守倅倉卒遽亡虛中攝府事移文主將梟一人以令衆軍乃不譁丞相吕頥浩張浚聞之召赴都堂論議就擢僉判趙慶孫右從事郎平江軍節度推官紹興六年十月翰林學士朱震等言其內行孝友施於政事明敏可觀引對特改右承事郎吳芾字明可仙居人紹興十一年調平江府録事參軍除𠡠所删定官歷殿中侍御史給事中吏禮二部侍郎歷守六郡各因其俗為寬猛吏莫容姦民懷惠利嘗曰視官物當如己物視公事當如私事與其得罪於百姓寧得罪於上官立朝不偶時論惜之諡康肅蕭燧字照鄰新喻人紹興十八年授平江府觀察推官二十三年秦檜親黨密告燧秋試必主文漕臺燧詰其故曰丞相有子就舉欲以屬公燧怒曰初仕敢欺心邪檜懷之既而被檄秀州至則員溢就院易一員往漕闈秦熺果中前列秩滿當為學官避檜調靜江府察推而歸浮湛州縣十餘年淳熙中纍遷至國子司業刑部侍郎出知嚴州移婺州嵗旱浙西常平司請移粟于蘇燧謂東西異路不當與然安忍坐視舊治之災為請諸朝發太倉米賑之官至參知政事權知樞密院諡正肅嚴瑀字元瑜江山人紹興中進士卒官平江府録事參軍卜居泛仙山之溪以文字名家有溪上翁集張孝祥字安國烏江人紹興中廷試第一歷知撫州年未三十按事精確老於州縣者有所不及孝宗初以集英殿修撰知平江郡務煩劇剖决無滯屬邑大姓並海囊橐為姦利孝祥捕治籍其家得穀粟數萬明年吳中大饑迄賴以濟張浚薦召赴行在除中書舍人虞允文字彬甫仁夀人一云仙井人隆興初除兵部尚書湖北京西宣撫使時朝廷遣使詣金請和湯思退又欲棄唐鄧海泗允文五上疏力爭思退怒奏允文大言誤國以邀美名允文上印猶以四州不可棄為請乞致仕除知平江思退竟决和議尋改潼川府未上再除平江到任未一月召除端明殿學士同僉樞密院事初允文自荆襄召還其子公亮遣書扣所向於蜀術士楊抽馬楊答云得蘇不得蘇半月去作同僉書僉書不帶同字已久時錢端禮先為僉書遂加同字果符其說後封雍國公卒諡忠肅沈度以考功郎中除直祕閣知平江乾道二年七月召赴行在上曰甲申之嵗委卿守吳門未幾治行昭著果如朕所料可謂得人又詢吳中嵗事如何具以豐穰對上曰二年以來水潦軫憂惟恐懼修省以百姓為念耳度奏臣初到郡水歉囏食荷陛下捐四萬餘石馬料以賑濟全活甚衆上曰正賴良守措置漢宣帝所謂與我共理者其惟良二千石乎即以為中書門下省檢正諸房公事按周必大吕紫薇詩跋云乾道二年平江守沈公雅疑即度字也姚憲字令則嵊人父舜明字廷輝宣和初知崑山縣月餘以母憂去欽宗朝為御史僞楚之際守節不汚南渡後至户部侍郎卒贈太師憲以父任纍官知秀州浙西大水蘇常尤甚憲請輸粟萬斛以賑之上賜書奬諭除提舉浙西常平遷提刑又以直祕閣知平江時羣盜毛鼎等出殁海道為害召捕弗獲朝命専以屬憲不數月悉擒之轉階除兩浙轉運判官歷官至參知政事徐嚞字吉卿衢州人乾道中自道州移知平江髙宗語孝宗曰是嘗手奪國書者詔過闕覲兩宫在官踰年纍章丐祠汪應辰字聖錫玉山人紹興進士第一纍官吏部尚書與丞相虞允文議事不合遂以端明殿學士知平江韓玉被㫖簡馬建康過郡應辰略其禮玉歸譛於上曰臣所過州縣未有若平江之不治者上疑之及平江米綱至有折閲事遂貶秩應辰剛方正直少從吕居仁胡安國游張栻吕祖謙深器許之魏杞字南夫夀春人一云開封人居明州纍官參知政事右僕射兼樞密使以使金不辱命繇庶官一嵗登相位上鋭意恢復杞左右其說後以災異䇿免守左諫議大夫觀文殿學士知平江被論奪職卒諡文節丘崇字宗卿江隂人歷國子博士虞允文薦其才遷太常博士知華亭縣捍海堰廢且百年醎潮嵗大入壞並海田蘇湖皆被其害崇至海口訪遺址已淪沒乃奏創築三月堰成三州斥鹵復為良田除直祕閣知平江府改吉鄂二州江西轉運判官提㸃浙東刑獄進直徽猷閣再知平江以提刑日捕盜賞除直祕閣後改兩浙轉運副使卒諡忠定一作文定方滋字務德少寓吳江應天寺建炎間歷浙西提舉司幹官乾道中知紹興平江二府趙善擇字守道寓居金壇乾道中任平江司户廉公不私物莫能奪而疾惡良甚部使者郡守見之必竦然起敬平江府添司户柴某貪濁善擇疾之反以其罪去為湖州録事參軍姑蘇志卷三十九
