body:
  text: 姑蘇志卷十二眀王鏊撰水利下元祐六年閏八月知杭州林希言太湖積水為蘇州大患乞委監司相度開決庶使民田可耕流移復業遂詔左朝奉郎邵光與本路監司同導決之元豐三年賜米三萬石開蘇杭州運河淺澱六年樞密院裁定蘇州開江兵給八百人専治浦閘紹聖中浙部水溢詔賜緡錢二百萬以振之轉運副使毛漸奏數州被害即捐二百萬倘仍嵗如之將何以繼請官貸錢七十萬緡錢氏有國時故事起長安堰至鹽官徹清水浦入海無錫芙蓉湖武進廟堂港常熟踈涇梅李以入揚子江又開昆山七鴉下張諸浦東北道吳江開大盈顧匯二浦柘湖新涇下金山小官浦悉入于海自是水不為患元符三年二月詔蘇湖秀州凡開治運河浦港溝瀆修疊隄岸開置斗門水堰等役開江兵卒崇寧元年置提舉淮浙澳閘司于蘇州以知昆山縣鮑朝懋提舉管幹二年宗正丞徐確提舉常平考禹貢三江之説以為太湖東注於海松江正在下流向來潮泥湮塞水溢為患請自封家渡古江開淘至大通浦直徹海口七十四里以常平緡錢米十八萬三千餘充調夫之費因令飢民就食確躬操畚臿以先之水道遂通或言飢民就役多死降三秩確曰此役不興飢者當駢首就死以此獲愆吾所願也大觀元年九月中書舍人許光疑奏蘇州之患莫若開江浚浦蓋太湖入海然後水有所歸今境內積水視去嵗損二尺前嵗損四尺良由開松江濬八浦之力吳人謂開一江有一江之利濬一浦有一浦之利願委官詳究利害遂詔吳擇仁相度而開江之議復興矣十一月詔委本路監司檢按松江古迹疏導及命陳仲方為發運司屬官相度蘇州積水三年兩浙監司奏請開淘吳松江復置十二閘政和六年四月御筆訪問平江三十六浦自古置閘隨潮啓閉嵗久堙塞遂致積年為害仰莊徽平江守差戶曺趙霖且逐浦經久利害破驛劵遞馬赴尚書省指説霖既上其説九月奏御筆差趙霖充兩浙提舉常平前去本路措置興修積水其開浦置閘工料依元相度檢計逐旋開治更不候保眀先次施行去農隙月分不逺趙霖更不引見上殿疾速發赴新任水患日久占壓良田甚多一方受弊應有前後違礙並依今來指揮合用錢米并辟官置司等令趙霖速具畫一聞奏奏報並入急遞于入內內侍省投進仍差童師敏充承受奏報文字霖既受任復條具事目以聞悉依御筆違者以違御筆論諸路監司州縣如有稽慢闕悮以違制論其合用錢米越州監湖封樁米支撥十萬石借支岑路諸州常平本錢十萬貫如闕則以常平米及常平封樁錢貼支并降空名度牒二千道給賣承信承節將仕郎官告各五十道其命詞並以興修水利為名别立價直將合用工料召有力户􅍯錢米官為募夫監部開修候畢工計實用錢米紐直給告或給空名許令變賣並與免勘會有無違礙書填仍不作進納出身就平江置局所奏辟官不拘常例制直牒指差理為在任月日不許辭免內選人考第舉官合格水利職事未畢未得赴部磨勘依方田官法就任改官幹當公事文武官各四員準􅍯差遣檢踏官共四員所用材料木植専辟使臣三員分往淮南江南路及溫處等州收買并辟置監轄造堰閘官俵散錢糧巡視催促檢覆工料官點檢醫藥飯食等官員其差辟官屬其間有才吏理須旌别以示勸奬特以提舉常平司嵗舉官數外改官從事郎一員縣令二員武臣升陟二員積水之地正在昆山常熟兩縣各權暫添差縣丞一員今來開修平江諸浦緣常湖秀等州水勢會聚以成積水據所役人夫先於平江諸縣雇募如闕即分那下常湖秀州雇募趙霖體究治水利害狀平江逐縣地形水勢利害各不相侔蓋浙西六州之地平江最為低下六州之水注入太湖太湖之水流入松江接青龍江東入于海而平江地勢自南直北至常熟縣之半自東至昆山縣地西南之半水與太湖松江水面相平皆是諸州所聚之水泛溢其中平江之地雖下于諸州而瀕海之地特髙于他處謂之堽身堽身之西又與常州地形相等東西與北三面勢若盤盂積水南入注乎其中所以自古沿海環江鑿開港浦者藉此疏導積中之水由是以觀則開治港浦不可不先也港浦既已浚則必講經久不堙塞之法今瀕海之田懼鹹潮之害皆作堰壩以隔海潮裏水不得流外沙日以積此崑山諸浦堙塞之由也􅓾身之民每闕雨則恐裏水之減不給灌溉悉為堰壩以止流水臨江之民每遇潮至則于浦深開鑿小港以供己用亦為堰斷以留餘潮此常熟諸浦堙塞之由也法當置閘然後可以限水之內外可以隨潮而啓閉浦既已開閘既以置而太湖松江之水與積水為一𣲖沈沒民田者一遇風作則髙浪萬頃愈泄愈來縱使諸浦㵼之泄之涓涓來之浩浩當斯之時障之不可疏之不可為之計者莫若順其性而狹其流乃為上策所謂上策者大築墟岸髙圍民田而已如此則積水日削衆浦日耗矣大抵三説一曰開治港浦二曰置閘啓閉三曰築墟裹田三者闕一不可又各有先後緩急之序其開浦萹曰髙田引以灌溉低田導以決泄者浦也古人大小縱橫設為港浦若經緯然按圖於舊得九十處或名港浦或名涇濱或謂之塘或謂之漕以詢究古迹得其為利之大者三十六浦區為三等上等工大而利博在前所先也中等工費可減上等三之二下等間于上中之間或自大浦而分支别𣲖工料之數又少損焉其置閘篇曰瀕海臨江之地形勢髙仰古來港浦盡于地勢髙處淤澱若一旦頓議開通地里遙逺未易施力以拒鹹潮今於三十六浦中尋究得古曽置閘者才四浦惟慶安福山兩閘尚存餘皆廢棄故基尚存古人置閘本圖經久但以失之近裏未免易堙治水莫急于開浦開浦莫急于置閘置閘莫利于近外若置閘而又近外則有五利焉江海之潮日兩漲落潮上灌浦則浦水倒流潮落浦深則浦水湍㵼逺地積水早潮退定方得徐流幾至浦口則晚潮復上元未流入江海又與潮俱還積水與潮相度往來何緣減退今開浦置閘潮上則閉潮退即啓外水無自以入裏水日得以出一利也外水不入則泥沙不淤于閘內使港浦常得通利免于堙塞二利也瀕海之地仰浦水以溉髙田每苦鹹潮多作堰斷若決之使通則害苗稼若築之使塞則障積水今置閘啓閉水有泄而無入閘內之地盡獲稼穡之利三利也置閘必近外去江海止可三五里使閘外之浦日有澄沙淤積假令嵗事積治地里不逺易為工力四利也港浦既已深濶積水既已通流則泛海浮江貨船木筏或遇風作得以入口住泊或欲住賣得以歸市出卸官司遂可以閘為限拘收稅課以助嵗計五利也復有二説崑山諸浦通徹東海沙濃而潮鹹當先置閘而後開浦一也閘之側各開月河以堰為限遇閘閉小舟不阻往來二也築墟篇曰天下之地膏腴莫美于水田水田利倍莫盛于平江緣平江之田以低為勝昔之賦入多出于低鄉今低鄉之田為積水漫沒十已八九當時田墟未壞水有限隔風不成浪今田墟殆盡水通為一遇東南風則太湖松江與崑山積水盡奔常熟遇西北風則常熟之水東赴者亦然正如盛盂中水隨風往來未嘗停息嘗陟焜山與常熟山之巔四顧水與天接父老皆曰水底十五年前皆良田也今若不築墟岸圍裹民田車畎以取水底之地是棄良田以與水也况平江之地低於諸州唯髙大墟岸方能與諸州地形相應昔人築墟褁田非謂得以播殖也將恃此以狹水之所居耳昆山去城七十里通往來者至和塘也常熟去城一百五里通往來者常熟塘也二塘為風浪衝擊塘岸漫滅往來者動輒守風往往有覆舟之虞是皆積水之害今若開浦置閘之後先自南鄉大築墟岸圍裹低田使位位相接以禦風濤以狹水源治之上也修作至和常熟二塘之岸以限絶東西往來之水治之次也凡積水之田盡令修築墟岸使水無所容治之終也昨間熙寧四年大水衆田皆沒獨長洲尤甚崑山陳新顧晏陶湛數家之墟髙大了無水患稻麥兩熟此亦築岸之驗目今積水之中有力人户間能作小塍岸圍褁低田禾稼無虞蓋積水本不深而墟岸皆可築但民頻年重困無力為之必官司借貸錢榖集植利之衆併工戮力督以必成或十畝或二十畝地之中棄一畝取土為岸所取之田令衆户均價償之其貸借錢榖官為置籍責以三年六限隨稅輸還此治積水成始成終之䇿若其當開之浦則昆山常熟共三十六浦除常熟之許浦及白茒福山三浦見今深濶水勢通快不須開治雖三十三浦昆山十有二謂掘浦下張浦七了浦茜涇浦楊林浦六鶴浦顧徑浦川沙浦五嶽浦蔡浦琅港浦常熟二十有一謂黃泗浦奚浦西成浦東成浦水門塘崔浦耿涇浦魚磹浦塢溝浦瓦浦塘浦髙浦金涇浦石撞浦陸河浦北浦甘草浦千步涇司馬涇金涇錢涇黃鶯漕皆積久不浚當分為三等開修霖以宣和元年正月二十一日役夫興工前後修一江一港四浦五十八瀆二年八月初十日罷又宣和元年十月四日御筆訪聞平江府常熟縣常湖秀州華亭泖並可為田仰趙霖相度措置召租限一季了當具便民利害圖籍嵗入以聞霖又應詔為之修圍常湖通役二十四萬七千九百餘工二年八月十一日詔旨罷役勾收人吏送平江府右獄根磨錢物通支錢四十一萬五千八百五十三貫九百十一文係度牒官詔坊場市易抵當等名色十九種焉重和四年十二月知昆山吳昉浚至和塘紹興二十三年諫議大夫史才言浙西民田最廣而平時無甚害太湖之利也近年瀕湖之地多為兵卒侵據纍土增髙長堤彌望名曰􅄵田旱則據之以溉而民田不沾其利潦則逺近泛濫而民田盡沒欲乞盡復太湖舊迹使軍民各安田疇均利二十九年知平江府陳正同言相視到常熟諸浦舊來雖有潮沙之患每得上流迅湍可以推滌不致淤塞後來被人户圍裹湖瀼為田認為永業乞加禁止户部奏在法瀦水之地衆共溉田者輒許人請佃承買并請佃承買人各以違制論乞下平江府眀立界至約束人户毋得占射圍裹有旨從之紹興二十四年九月右奉議郎大理寺丞周環言臨安平江湖秀四郡低下之田多為太湖積水浸灌緑溪山諸水連接併歸太湖東南由松江入海東北由諸浦入江其沿江泄水惟白茅浦最大望令有司相視開決二十八年九月檢會周環面對水利詔令兩浙漕臣按視而轉運副使趙子瀟知府蔣璨計料開濬事聞詔監察御史任古同浙西提舉徐康覆視古等奏上比子瀟所議十減八九約以五千工月餘可畢詔以御前激賞酒庫錢平江府如數給之二十九年正月庚申興工從常熟東柵至雉浦入丁涇開福山塘自丁涇口至尚墅橋北注大江分殺水勢二月癸卯畢工趙子瀟相視水利方略紹興二十八年九月日兩浙轉運副使趙子瀟知平江府蔣璨言近被旨相度水利遍厯吳江吳長三縣民田淹沒去處相視以至常熟北至揚子江又自昆山東至海口推究源流講求利病今詢訪得浙西諸州平江最為低下而湖常等州水皆歸于太湖自太湖以導于松江自松江以注于海是太湖者數州之水所瀦而松江又太湖之所泄也然以數州瀦水巨浸而獨泄於一松江宜其勢有所不逮是以昔人于常熟之北開二十四浦疏而導之揚子江又于昆山之東開一十二浦分而納之海兩邑大浦凡三十有六而民間私下涇港又不可勝數皆可以決壅滯而防泛濫也後因潮汐往來泥沙積淤舊置開江之卒尋亦廢去此太湖所以堙塞而民田有漂沒之憂也天禧天聖間運使張綸于常熟昆山各開諸浦以導積水景祐間郡守范仲淹親至海浦開浚五河以疏導諸邑之水使東南入于松江東北入于揚子與海政和間提舉趙霖將命興修水利開浚三十六浦及役工僅常熟二浦昆山一浦而罷迄今四十年諸浦湮塞又非前日之比遂致民田告潦十嵗八九今相視合開緊切去處常熟縣梅里塘白茅浦催浦福山浦黃泗浦昆山縣新洋江小虞浦顧浦郭澤塘總計役夫三百三十七萬四千六百工錢三十三萬七千四百貫米一十萬一千五百石各有竒昆山縣四浦工力不多止用本縣食利户開浚常熟縣五浦工力浩瀚係與吳長等縣利害相及欲于三縣見賑濟人內募強壯人充當所有差官起工等事續次條具申請緣平江府積水今經兩月未退已妨種麥若不于農隙之際支給錢米雇夫開治深恐來嵗春雨積水愈甚虧失常賦不便望賜指揮施行隆興二年八月詔江浙勢家圍田湮塞流水諸州守臣按視以聞其平江府委陳彌作相度彌作乃上其宜先治者十浦并合開圍田一十三處詔令守臣沈度依限開掘既成復詔浙西提刑曽逮躬親審實隆興二年八月臣僚奏請疏浚三十六浦開浦圍田詔兩浙運判陳彌作相度措置議開常熟許浦白茅浦崔浦黃泗浦崑山茜涇浦下張浦七雅浦川沙浦楊林浦掘浦凡十浦合開圍田一十三所詔令知平江府沈度依狀開決許浦自梅里塘雉浦口東開至白蕩白茅浦自黃沙港開至支塘橋崔浦自丁涇塘至浦口黃泗浦自十字港開至奚浦口茜涇浦自界涇開至鴨頭塘下張浦自東海㳌開至千步涇七鴉浦自梅浦開至李漕涇川沙浦自海㳌開至六鶴浦楊林浦自楊林橋開至陶家港掘浦自梅口開至五聖港凡用工三百二十二萬錢三十三萬七千米九萬六千七百各有竒按范至能新開塘浦記隆興二年浙西郡國七大水崑山為甚眀年二月民飢且疫邑長李結得校工直募役濬浦五曰新洋江曰小虞曰茜涇曰下張曰顧浦濬塘三曰郭澤曰七鴉曰至和五旬而告休據此時奉詔開決十浦而記略不及之其新洋小虞顧浦郭澤至和蓋因此修浚耳隆興六年十二月監進奏院李結獻治田三議曰務本曰協力曰因時詔令胡堅常相度以聞其後户部以三議切當但工力浩瀚欲諭有田之家各依鄉例出錢米與租佃之人更相修築庶官無所費民不告勞從之李結治田三議乾道六年十二月十四日監都進奏院李結言蘇湖常秀所産為兩浙之最自紹興十三年以來屢被水害議者皆歸積水不決之故以為積水既去低田自熟第以工役浩大事皆中輟臣有管見治田便利三議一曰敦本二曰協力三曰因時司農丞郟亶議云古人治塘浦濶深者蓋欲取土以為堤岸非専為決積水若堤岸髙厚借令大水之年江湖之水髙于民田五七尺而堤岸尚出于塘浦三五尺故雖大水不能入于民田民田既不容水則塘浦之水自髙于江而江之水亦髙于海不須決泄而水自湍流矣此古人治低田之法也若知決水而不知治田則所開浚之地不過積土于兩岸之側霖雨蕩滌復入塘浦不五七年填淤如舊前功盡棄為今之務莫若専務治田乞詔監司守令相視蘇湖常秀諸州水田塘浦緊切去處發常平義倉錢米多寡量行借貸與田主之家今就此農隙作堰車水開浚塘浦取土修築兩邉田岸立定丈尺衆户與併力官司督以必成且民間築岸所患無土今既開浚塘浦積土自多而又塘濶深易以流淺田岸既成水害自去此臣所謂敦本之議也結又以為百姓非不知築堤固田之利然而不能者或因貧富同假而出力不齊或因公私相吝而因循不治非協力不可百姓所鳩工力有限必賴官中補助官中非因飢歉難以募民興役非因時不可乾道初沈度陳彌作又言疏濬崑山常熟縣白茅等十浦並通徹大海遇潮則海內細沙隨泛以入潮退則沙泥沈墜漸致淤塞令依舊招置闕額開江兵卒次第開濬不數月諸浦可漸通徹從之乾道八年六月前鎮江府兵卒鈐轄王徹言紹興二十八年開常熟五浦欲泄積水入江宜自常熟縣東開鑿至雉浦五十里引許浦縱水入江郤是雉浦西就民田創河二十五里號丁涇塘橫引水復入福山浦使二浦之水復歸一浦近縣之田稍獲灌溉且平江居南北地形最下之處使嵗有一尺之水則湖州平江之田髙下皆溢故海濵三十六浦各置巡檢寨捍衛江海開浚港浦最急者五浦其黃泗浦與福山通流不須開鑿崔浦許浦白茅浦三所潮沙壅積必當疏導詔措置開鑿條約以聞其後知府邱崈言開鑿許浦固為水利然遇旱頓失瀦畜且役大難成遂止淳熙元年詔平江守臣與許浦駐劄戚世眀措置開浚許浦三旬訖工二年六月兩浙運副薑詵奏開常熟縣黃泗浦崔浦許浦白茅浦而許浦最急時兩浙運判官陳峴言昨奉詔遍厯平江常州江隂諭民併力開濬川港畢始欲官給錢米嵗不下數萬今百姓相率效力而成詔常熟知縣劉頴特增一秩餘論賞有差尋命提舉薛元鼎相視太湖沿流利害元鼎議常熟昆山之間茜涇下張七鴉許浦白茅五大浦為數州之利比年並皆湮塞前任提舉陳舉善勸諭人户以漸開濬獨許浦猶未施工昨水統制馮湛乞用軍兵開掘因與守臣不協遂已乞詔馮湛開濬十月知府陳峴言奉詔措置增展開決許浦今日雉浦至梅里道通橋三十八里自道通橋至許浦口一十六里浚塘築堤植栁一萬株以固岸塍詔本路提刑曽逮核實以聞是嵗薛元鼎又奏開運河五十四里淳熙十三年羅點提舉浙西常平以澱山湖泄諸水道戚里豪強占以為田故水壅不泄民田病之奏乞開濬有旨命點躬親相視開掘農民聞命歡躍不待告諭各褁糧合夫先行掘鑿於是並湖巨浸復為良田羅點乞開澱湖圍田狀浙西圍田湮塞水勢所在皆有獨澱山湖一處為害最大因被姦民包裹圍田築斷堰岸致水勢無由發泄此湖上通蘇湖秀三州之水全籍古來斜路等港通泄湖水下徹大小石浦出吳松江入海遂委吳縣主簿劉允濟同昆山縣尉躬親看視采問利害據申到澱山湖東西三十六里南北一十八里旁通太湖匯蘇湖秀三州之水上承下泄不容少有壅遏華亭在湖之南崑山在湖之北湖水自西南趨東北所賴泄水去處其大者東有大盈趙屯大石三浦西有千墩陸虞道褐三浦中間南取澱山湖北取吳松江凡三十六里並湖以北中為一澳係古來吐吞湖水之地今名山門溜東西約五六里南北約七八里正當湖流之衝非衆浦北貫山門溜之中又有斜路港上達湖口當斜路之半又西過為小石浦上達山門溜下入大石浦凡斜路港大小石浦分為三道殺泄湖水並從上而下通徹吳松江江湖二水曉夕往來疏灌不息以此浦港通利無有沙泥壅塞可以宣導水源今來頑民輒于山門溜之南東取大石浦西取道褐浦並緣澱山湖北築成大岸延跨數里遏截湖水不使北流盡將山門溜中圍占成田所謂斜路及大小石浦泄放湖水去處並皆築塞父老嘗言圍岸勿築時湖水平白漲起丈餘盡壅入西南華亭縣界大小石浦并斜路港口既被圍斷其浦腳一日二潮則泥沙隨潮而上湖水又不下流無緣蕩滌通利即今淤塞反髙于田遇水則無處泄㵼遇旱則無從取水大抵水性趨下下流既壅其勢必須潰裂四出散入民田理無可疑者淳熙十六年提舉詹體仁開河置斗門為旱潦之僃嘉定十年知府趙彥橚疏錦帆涇以達運河紹定五年知府吳淵以吳江石塘橋梁摧圯給錢三十萬米一千二百石命邑令李桃巡塘官綦紐修葺又植蒲葦楊栁以為捍淳祐六年發運使魏峻疏至和塘東自夾潮塘西至戴墟浦亘四十餘里又立柵三十二以為禁防官出錢二萬三千二百緡米二百一十石有竒浙西提舉鄭霖為記元至元二十四年水潦為災宣慰朱清喻上户開浚自婁門導水曰婁江以入於海粗得水勢順下不致甚害大德二年立浙西都水監庸田使司於平江路設置専一修築田圍疏浚河道澱山等湖已有官定界畔諸人不得似前侵占復為民害違者聽庸田司追斷又潮沙淤塞河港亡宋時設撩淺軍人専一撩洗仰庸田司于二八月內依時督責如法疏浚毋致壅遏合用人工如何措置可以常久通行行省更為從長計議又浙西官田數多俱係貧難下户種納春首闕食無田主借貸圍岸缺壞又自行修理官司不為存恤以致逃竄荒廢官田今後管民官司並不得將此等佃户差充里正主首及當一切催甲等役妨廢農務失誤官租如違仰庸田司究治又澱山練湖諸人占湖為田嵗納租米另行收貯若有合用修浚工料從庸田司募工支用大德八年夏五月中書省準江浙行省咨任仁發言吳松江淤塞奏立行都水監仍于平江路設置直𨽻中書省及命行省平章徹爾提督疏浚繼降詔條云修浚河道閘􅄵一切合用物料行省即于官錢內收買應付又浙西苗糧户內起夫一萬五千名自僃什物每名工役一年免糧一十五石其軍站除贍役地外依上科著僧道伊嚕勒昆達實密不分常住并權豪官員不以是何投下不納官糧之家以地五頃著夫一名從行都水監選委廉幹官員部夫督役其有釐立事功廉能稱職者行都水監具迹舉眀其著眀夫户雜泛差役權行蠲免是嵗十一月仁發以吳松江故道湮塞為浙西居民害上疏條陳利病疏道之法西自上海縣界吳松舊江東抵嘉定石橋洪迤邐入海長三十八里深一丈五尺濶二十五丈役夫一萬五千為工一百六十五萬一千六百有竒至九年二月畢工任都水水利議答議者曰吳松江前時深通今日何為而塞豈非如海變桑田之説非人力所可為者歟答曰東坡有言若要吳松江不塞吳江一縣之民可盡徙于他處庶上源寬濶清水力盛沙泥自不能積何致有湮塞之患哉歸附後將太湖東岸出水去處或釘柵或作堰為築堤為橋及有湖泖港汊又慮私鹽船往來多行塞斷所以清水日弱混潮日盛沙泥日積而吳松江日就淤塞正與東坡所見合若曰如海變桑田一付之天則聖人手足胼胝盡力溝洫皆虛言也聖人豈欺我哉所當盡人力而可為也議者曰錢氏有國百餘年止長興間一次水災亡宋南渡百五十餘年止景定間一二次水災今或一二年三四年水災頻仍其故何也答曰錢氏有國亡宋南渡全藉蘇湖常秀數郡所産以為國計常時盡心經理髙田低田各有制水之法其間水利當興水害當除合役軍民不問繁難合用錢糧不吝浩大必然為之又使名卿重臣専董其事豪富上户簧言不能亂其耳珍貨不能動其心又復七里為一縱浦十里為一橫塘田連阡陌位位相接悉為膏腴之産以故二三百年之間水災罕見國朝四海一統又居位者未知風土所宜視浙西水利與諸處無異任地之髙下任時之水旱所以一二年間水旱頻仍也議者曰蘇州地勢低下與江水平故曰平江故稱澤國其地不可作田今欲圍築亦逆土之性耳答曰晉宋以降倉廪所積悉仰給于浙西之水田故曰蘇湖熟天下足若謂地勢低下不可作田此誠無稽之論何以言也浙西之地低于天下而蘇湖又低于浙西澱山湖又低于蘇湖彼中富户數千家每嵗種植茭蘆編釘樁篠圍築埂岸豈非逆土之性何謂今日盡成膏腴之田此眀效大驗不可掩也既是澱山最低之處尚可經理為田郤説已成之田不可作田何其愚也議者曰水旱天時非人力所可勝自來討究浙西治水之法終無寸成答曰浙西水利眀白易曉何謂無成大抵治之之法有三浚河港必深濶築圍岸必髙厚置閘竇必多廣設遇水旱就三者而乘除之自然不能為害儻人力不盡而一切歸數于天寧有豐年耶東坡亦言浙西水旱乃人事不修之積正此謂也昔范文正公親開海浦議者沮之公力排浮議疏浚積潦數年大稔民受其賜載之方册昭然可考謂之無成可乎議者曰河渠圍岸閘竇三者俱􅍯則水旱可無民食可足誠為久逺之計朝廷何為而廢之答曰范文正公宋之名臣盡心于水利嘗謂修圍浚河置閘三者如鼎足缺一不可三者􅍯矣水旱豈足憂哉國家收附江南三十餘年浙西河港圍岸閘竇無官整治遂致廢壞一遇水旱小則小害大則大害是以年年有荒蕪不可種之田深可痛惜今朝廷廢而不治者蓋募夫供役取辦于富户部夫督役責成于有司二者皆非其所樂所以猾吏豪民搆扇必欲沮壞而後已朝廷未見日後之利但厭目前之擾是以成事則難壞事則易東坡亦云官吏憚其經營百姓畏其出力所以纍行而終輟不能成久逺之利也議者曰行都水監既是有益衙門何衆口一詞皆謂無益而眀議罷之答曰民可使由之不可使知之事之利害久而始眀彼小民無知但見工役之繁豪民肆姦又吝供輸之費所以百般阻撓但謂無益以敗乃事殊不知浙西有數等之水拯治方略皆不相同非立専司豈能成功使水監衙門真為無益古之有國者亦廢而不置久矣何為周漢唐宋之世未嘗一日不用心盡力經營水利之事列之史傳代有其人諺曰水利通民力鬆斯言信矣若浙西低下之地不須水監即今中原髙阜之處水監既不可缺而低下之處乃謂不必置何不智之甚也數年之後河港淺塞水害茲甚有憂民忠國者出必復興修水利之事彼橫議者豈得終沮之哉議者曰水利固不可不修然今隴西漢唐二渠止是責於有司修浚民更不擾浙西水利何不亦責之有司答曰隴西二渠長流水也浚成深渠水自下流治之無難浙西水性不一整治方法亦殊豈可以漢唐二渠例視之哉宋賢如范文正公蘇文忠公王荆公朱文公皆今世大儒經綸天下之大材尚各建策設官置卒専力經營必有所見若有司兼管何往而不敗事泰定元年江浙行省以平江松江通海河道壅塞軍民官勢侵占水面為田遞年水旱相仍官民虧失大利委官同本處正官踏視講議到吳松舊江二道烏泥涇大盈浦二河合挑緣癸巳嵗禁止動土請工部論報云上項河道江浙省已嘗講議修則官無虧糧民可足食難與其餘土木之工一體停罷奏命行省左丞多爾濟巴勒知水利前都水少監任仁發董督常州湖州嘉興平江與本府不分是何人户實有納苗田一頃五十畝差夫一名計四萬有竒每名日支口糧三升中統鈔一丙賜仁發銀一錠襖子二領始于是年冬十二月次年正月訖功仍令講究久逺不致淤塞良法至正元年中書以江浙行中書左丞相欽察台開府言浙西水利近年有司失於舉行隄防廢弛溝港湮塞水失故道民受重困今後莫若都水監官嵗委一員分治仍令各處農事正官帶知圍田署銜責任有歸及監察御史言宜復立都水庸田使司慎選諳曉水利恪守官針之人披按圖志討論舊治于必合開挑之處將原額租稅除豁合用工本官為支給使専其任責以成效于是奏立使司復於平江路設置命工部尚書圖嚕行省平章正事珠爾噶岱南行臺與浙西廉訪司官各一員選知水利之人相其舊迹必合開挑各處農事正官結銜知渠堰事聽受使司節制各官既輳嘉興首會郡堂以商論堂書訏謀大興臿斸隆尚厥功平章見役巨民疲特略之論遂不合而罷吳人陸行直者承平章風指上書言于有司曰辛巳太嵗位在東南浙間丁其方位修營動土厯家忌之有司騰其言以次達于朝尚書知之怒繫行直而使諸中書規駁論罪之由是肇工于是年冬十月撩漉吳松江沙泥浚各閘舊河直道與漕渠張涇及風波南俞北俞鹽鐵官紹盤龍浦匯六磊石浦等塘役夫一十九萬八百人用糧四千七百石鈔三千一百錠各有竒次年春二月訖功潘應武言決放湖水浙西地勢極低米糧豐厚自福山而下有二百八十餘里沙岡深以限滄溟岡身之間有港浦一百五十餘處太湖三萬六千頃受納三州之水溢流而下一路徑下吳松江二百六十餘里抵海又一路自急水港五十里下澱山湖由港浦而入海古人開港浦漊涇瀝之類無非為去水計使民居無昏墊而土可耕種居民常常修築圍塍官府常常修浚水路潦則車水出田旱則車水入田公私之利豈不博哉若公私之力少有不及則民居蕩析而厚利以失錢王時置撩淺軍四部七八千人専為事導河築隄宋初廢弛故常有水患至仁宗朝范文正公親厯海濵開浚五浦費錢米一十八萬餘貫石自後置豐田水利使者専管湖塘河渠趙運使任內用錢米四十餘萬至理宗朝創立魏江江灣福山水軍數千人専修江河湖塘僅免水患歸附後軍散營廢河港湮塞其澱山湖中有山寺宋時在水中心東有出水港曰斜瀝口曰乂港口曰小曹港曰大瀝口曰小瀝口各濶十餘丈通潮水往來潮退則引湖水下大曹大盈等浦入青龍蟠龍江而出海古人為之尾閭門宋法禁人占湖為田為泄水路故也歸附後權勢占據為田今山寺在田中雖有港漊悉皆淺狹潮水湖水不相往來攔住去水東南風水回太湖則長興宜興歸安烏程德清等處泛濫西北風水下澱山湖泖則崑山常熟吳江松江等處泛濫皆因下流不決積水往來為害去夏一水澱山湖太湖四畔良田至今不可耕種今年可種者皆是以人力與天時爭勝負農家日夜踏車車水出田子女生趼田外河水髙于田內數尺近有稻禾將熟又為暴風驟雨激破圍塍全圍淹沒子女號天慟哭老農血淚交頥今秋雖熟即日菜麥無土可種或遇風雨來嵗又是荒歉建言屢矣未見施行一日過一日一年復一年積久不決圍塍坍壞再遇淫雨悉為魚池民居蕩析公私坐失厚利彼時修治用費既廣民力困乏悔亦無及愚昨隨營田司官親曾相視水勢與髙年老農知識地理人講究得澱山湖東大小漕港斜厯等處固是泄水尾閭今為權勢占據卒難復舊澱山湖北有道褐浦石浦千墩浦小瀝口四處取江波近水勢順便今若先于此四處開浚決放水路以救百姓以保公私實為居安慮危經理根本之計候水減退然後次第開浚諸處河港此即古人所謂下流既通上流可導也復言便冝伏詳東坡先生曰三吳之水瀦為太湖太湖之水溢為松江以入海海水日兩潮潮濁而江清潮水常欲淤塞江路而江水清駛輒隨滌去海口常通則湖中少水患此數句包盡浙西水路下一駃字斷盡浙西水性駃疾也言水要活要疾要流要駃如萬馬之奔驟也浙西水道自丙子年歸附時招民官慮恐哨船入境據掠鄉村將河港釘塞吳江長橋係太湖衆水之咽喉其橋南堍古來水到龍王廟後被築塞五十餘丈沿塘三十六座橋洞實鄉村衆流之脈絡多被釘斷亦有築實為壩者所以不流不活不疾不駃不能滌去淤塞以致澱山湖東小漕大瀝等處湖沙壅積數十里之廣被權勢占據為田湖水潮水不相往來如人便溺不通水滿胸腹間四年兩潦朝廷虧失米糧數百萬石浙西百姓離散大半今日蒙政相公敷奏決放湖水入海百姓父老聞風鼓舞已有更生之望續見諸人陳言俱非救弊良策切恐有誤國聽徒費錢糧為今之計以決放湖水為急務澱山湖北道褐浦石浦千墩浦小瀝口四處實係今日湖水入江下海要道今先浚此使湖水通流然後開浚沿塘橋道鄉村河港謹條具事宜于後一澱山湖北一帶自廟兒頭港至趙屯浦一百餘里共有港浦一十三條今皆淤淺應武昨與營田劉副使登澱山寺鐘樓上逺望惟有道褐浦石浦最低下取江頗近水勢甚便叩問當地耆老俱曰十年前潮水往來近方湮塞此處宜及早修浚一沿塘三十六座橋道及葑門外至吳江七里橋多有上下橋道壩塞不通數內第四橋下水路來自湖州大錢港衝出塘東湖泊間入笠澤湖汾湖白蜆江下急水港直至澱山湖自然此處水甚洶湧歸附後被人占據又造橋築隄水益淺狹宜委官相視仍復通放一舊時長橋南堍水至龍王廟側歸附後壩塞五十餘丈見蓋房與軍户居以致太湖出口狹小水不通徹易致泛濫宜委官往視指定龍王廟基諭會軍户移入營內仍舊造橋相接一吳江長橋實三州太湖之咽喉沿塘橋道實鄉村河港之脈絡前宋立水軍三四千人吳江知縣職銜帶提督湖廣河渠縣尉職帶巡視湖塘河渠設官田米三千餘石名修橋米歸附時又名修浚縣河米凡有橋道坍毁水路堙塞本縣自行支取隨即修治自此浙西三十年來並無水害范文正公治水議乞敕諸路行勸課之法取其簡約易從之術頒賜諸路轉運使及面一本付新授知州知縣等此養民之政富國之本也今日參政為浙西生靈陳請決放湖水入海此三百年一遇深恐去後仍舊廢弛沿塘橋道河渠於修浚如蒙以官田付吳江縣管𨽻選委經任好人充吳江縣尹職銜帶提領湖塘河岸勸農事縣尉職帶巡視湖塘河岸昆山縣尉職兼巡視江湖河岸常切點視前項沿塘橋道河渠并道褐浦等處但有圯壞湮塞隨即修浚如此則自然永無水患實為公私無窮之利也前都水書吏吳執中言順導水勢浙西古揚州之域厥土惟塗泥厥田惟下下得水之利雖博而被水之害亦大宋有郟橋者嘗論天下之水以十分為率自淮而北五分由九河入海大江而南五分由三江入海書所謂三江既入震澤底定是也大抵浙西水澤之藪外髙內低勢若盤盂但遇霖淫水輒泛濫欲使泄于江海其江海日有兩潮抑遏湖水渾流倒注來速去遲日積月增漸致淤澱導之有力則有無窮之利治之無術則有無窮之害古之智者蓋未嘗不深察于此而盡力乎溝洫也國家收附江南之初年穀屢登不聞水患所司因循失于經理積而至于至元二十四年二十七年二十九年六年之間三遭大水所在膏腴悉成巨浸百姓缺食賣子鬻妻不可勝計官糧虧失後中書省奏準大興工役開挑太湖練湖澱山湖等處并通江達海河港又加一修築岸圍自此嵗獲豐收所在官司宜將已開河道時常修治庶幾不廢前功奈何牧民者略不顧問太盈等浦漲塞如舊吳松江面淤澱愈增幸而數年之間雨水頗調不覩其患倘值往年水潦為害非輕近蒙朝廷設都水庸田司専督其事敦本防災可為良䇿每年勸率百姓修築田圍浚治河道粗有成效然而數年之間事功齟齬識者固已憂之去年春夏之交淫雨頻作平江松江大被水災溝洫滿盈田園損壞今都水庸田司又已革去修浚之責歸於有司且吳松江舊云可坍千浦今則東自河沙匯西至道褐浦兩岸漲沙將與岸平其中僅存江洪比之舊時百不及一雖汪洋之勢見于上海新涇太倉劉家港豈能盡泄諸郡之水又鎮江丹陽縣之練湖亦被豪權於湖靣髙處圍裹成田侵奪衆利浙西水鄉農事為重河道田圍必常修浚二事可以兼行而不可偏廢今修圍一事有司已有定式澱山練湖亦有原定界畔必須嚴切申眀常加浚治吳松古江已被潮沙湮漲役重工多自非人力可及其澱山舊湖多為豪户圍褁成田恐亦未易除毁即今太湖之水迂回宛轉多由新涇及劉家港流注于海合無順其必趨之勢于上海太倉等處相視可開河港盡行開鑿務使支脈貫通流泄順便乞照腹裏會通河并新開通惠河户差軍體例設立撩淺人夫専一修理以防向後復淤之患官民幸甚周文英三吳水利蘇湖常秀土田髙下不等以十分為率低田七分髙田三分所謂天下之利莫大于水田水田之美無過于浙右五代末吳越錢王獨居東南専享此利宋范文正公嘗論于朝曰江南圍田每一圍方數十里中有河渠外有門閘旱則開閘引江水之利潦則閉閘拒江水之害旱潦不及為農美利嘗詢訪髙年云曩時兩浙未納土時蘇州有營田軍四部共七八千餘人又有撩清夫専為田事導河築隄以減水患是時嵗熟錢五十文糴米一石自歸宋之後慢于農政不復修舉田圍河港大半墮壞今江浙之米石不下一貫比之當時其貴十倍民不得不困國不得不虛矣前都水監于江面置閘節水終非經久良法且如見置閘三處本意潮來則拒潮來之水潮退則放江水決潮殊不知江水源築塞水勢細緩內水外水髙低無幾又閘之相去不逺決放之水既淺且緩又烏能衝激潮沙而不積于江也於常年初無損益設遇潦嵗覬其傾泄江湖巨浸則見其不能此所謂徐行拯溺緩步救焚者也海者百川之所宗水有所歸則不泛濫善治水者必識其源流可也嘗經行太倉劉家港及吳松江之左右登髙眺逺隨流尋源為今之計莫若因水勢之所趨順其性而疏導之則易于成功劉家港南有一港名南石橋港近年天然深濶直通劉家港西南通橫塘以至夏駕浦入吳松江其中間有迂回窄狹處若使疏浚深濶則太湖泄水一大路也某今棄吳松江東南塗之地姑置勿論而専意于江之東北劉家港白茅浦等處追尋水脈開浚入海者蓋劉家港即古婁江三江之一也深港濶此三吳東北泄水之尾閭斯所謂順天之時隨地之宜也惟開浚之法付之有司例將有田之家差夫動擾猶為未便乞從省府差委諳通水利官詣沿海各處相視合浚港浦具數計工擬議申聞或都水監分官前來或選省府能官于浙間富户勸率百十家斟酌逺近及功績巨細照依捨糧賑飢例優以官祿擬定品級令其開浚考其成功如工役輕省者量行優敘如功績重大者優以一官激勸勉勵庶幾勞而無怨擾不及衆假如凶年勸令富户捐糧振濟不過救一嵗一處之災上有以官推此恩例成此美績則可弭浙西數郡久逺之災寧不偉歟經治之後更須都水監差官按行嚴督各州縣每嵗修葺使其經久不廢或委行省官専一提調庶幾就督事嚴免致有司樂嵗則茍且玩視以為常程設遇潦嵗則縮手無措敗事傷農詩所謂逮天之未隂雨徹彼桑土綢繆牖户者此也水利有成則樂嵗相仍國富民安誠非小補本朝洪武九年八月長洲縣民俞守仁等詣縣狀訴蘇州之東松江之西皆水鄉地形汙下上流之水迅發雖有劉家港難泄衆流之橫漬張氏開白茅港與劉家港分殺水勢自歸附以來十餘年間並無水害今夏淫雨又山水奔注江湖增漲况常熟昆山之民于白茒四近崑承湖南諸涇及至和塘北港汊盡為堰壩不使通流雖曽差官開浚彼民隨開隨堰本府遂差官會同相視淤塞港汊丈量計工開浚永樂二年朝廷以蘇淞水患為憂命户部尚書夏原吉疏治尋遣都察院僉都御史俞士吉賫水利集賜原吉使講究拯治之法以聞既得請遂集民丁開浚自昆山縣東南下界浦掣吳松江之水北達婁江二年冬復挑嘉定縣四顧浦南引吳淞江水北貫吳塘亦由婁江入海又浚常熟白茅塘導諸水入楊子江夏忠靖公治水奏臣奉職不稱重貽宵旰之憂夙夜警惕惟勤咨訪欽承聖諭愧感交集臣與共事官屬及諳曉水利者參考輿論得其梗概蓋浙西諸郡蘇松最居下流太湖綿亘數百里受納杭湖宣歙諸州溪澗之水散注澱山等湖以入三江頃為浦港湮塞匯流漲溢傷害苗稼拯治之法要在浚滌吳松江諸浦導其壅滯以入于海按吳松江舊邪二百五十餘里廣一百五十餘丈西接太湖東通大海前代屢浚屢塞不能經久自吳江長橋至夏駕浦約百二十餘里雖云通流多有淺狹之處自夏駕浦抵上海縣南蹌浦口可百三十餘里潮沙漲塞已成平陸欲即開浚工費浩大灧沙泥淤浮泛動蕩難以施工臣等相視得嘉定之劉家港即古婁江徑通大海常熟之白茅港徑入大江皆係大川水流迅急宜浚吳松南北兩岸安亭等浦引太湖諸水入劉家白茅二港使直注江海又松江大黃浦乃通吳松要道今下流壅遏難疏傍有范家濱至南蹌浦口可徑達海宜浚令深濶上接大黃浦以達湖泖之水此即禹貢三江入海之迹每嵗水涸之時修築圍岸以禦暴流如此則事功可成於民為便正統五年六月廷臣奏言江南賦稅多取給於蘇州其田卑下常有淹溺之患宜設法疏浚以利生民從之令巡撫侍郎周忱等兼總其事許以便宜處置忱檢視嘉定吳淞江直流百里餘東連大海西接太湖而北平坦滋生草蔓民因開墾成田江水壅塞不能通流乃親往江上立表于江心督民間挑修昆山縣顧浦自是水得疏泄矣正統七年吳中大水繼以七月十七日颶風時巡撫侍郎周忱預奏量留官糧府一二十萬石縣亦五六萬石賑濟其年各處低墟岸塍俱被衝坍時水利等官先已被巡按御史何永芳奏革公奏取曽經任過辦事官量一二十員準其厯俸年月管修田墟開塞河道畢日送回吏部未半事完景泰五年夏大水淹浸田禾經久不退侍郎李敏知府汪滸議當開浚白茒等塘以泄之滸躬往常熟縣相視久不疏濬壅成隄堰近民耄倪皆卧泣其上以求免言一開浚則堰下之田亦就浸矣滸不許強之挑濬青墩浦橫瀝塘共五六里以通白茒塘鑿開三堰約三四里引水通鮎魚口其海口淤塞漫生叢葦仍挑去約千餘畝于是水得歸海天順二年巡撫左副都御史崔恭訪得吳淞江利病即親詣其地以三年二月督工挑浚分江為三假昆山縣自夏界口至白鶴江挑四千六十七丈上海縣自白鶴江至卞家渡挑四千六十七丈嘉定縣自卞家渡至莊家涇挑五千五百六十七丈江深一丈一尺面濶十丈二尺底濶四丈出舊江一萬三千七百一丈成化五年吳縣知縣樊瑾因太湖近胥口處凡吕山周山東陽梅舍等處人出入必經此若遇風波屢有覆溺之患準本地民呈行以香山西南隴阪間舊有河名九曲港者淤塞已久即起本地人夫重加開濬共三千八百五十餘丈成化八年置僉事于浙江専治蘇松等府水利吳縣知縣雍泰承檄治採香徑廢堰堰傍糧田數千頃遇乾旱輒稿泰領民尋源得於穹窿山隴阪間蓋由山腰法雨泉流出者上為一堰下分二道一道東由白馬嶺南流踰趙墓折而西一道西下山漊環趙墓復繞而東二流相合近採香徑瀦聚成潭仍躬相地宜甃砌二百石堰堰各置牌隨水旱而啓閉之三閲月而成又南檢踏三洋嘴西北入太湖地如牛角然遊湖在其左貢湖在其右風濤剝蝕日就頽圮復發錢市山石由馬山西南而東築護堤千餘丈而湖田藉以無恙矣成化十年正月巡撫右副都御史畢亨與知府邱霽議開吳淞江面濶一十四丈五尺底濶八丈五尺水深一丈二尺自夏界田起至西莊家港嘉定縣分挑六千三百五十三丈六尺昆山縣分挑五千三百五十三丈七尺共長一萬一千七百七丈三尺用夫四萬六千八百三十𢎞治四年五年七年吳中大水廷臣言當疏濬水道八年正月工部侍郎徐貫奉敕諭與從行主事祝萃會同巡撫都御史何鑑知府史簡尋訪水道通塞之由以吳江萬六千人開濬長橋水竇疏太湖之水以及吳淞江蓋江口被民田之及叢生葦荻蔓延數千畝至是墾除之以長洲吳昆山常熟嘉定等縣十萬五千餘人挑濬白茒港并斜堰七浦塘共長二萬四千餘丈并東開鹽鐵塘十八里西濬尤涇七里民夫皆給以口糧計八萬八千二百六十餘石由是諸涇港首尾皆貫于白茒而水有所歸矣尚書徐貫治水奏臣等切惟東南地勢低下水患自古有之永樂初元水復漲溢太宗文皇帝命户部尚書夏原吉大加疏治方得止息逮今九十餘年各處港浦仍復湮塞為患滋甚仰惟皇上軫念地方命臣等會同修浚蓋將拯墊溺之民于袵席之上化魚鱉之區為稻梁之域臣等敢不罄竭駑鈍以圖仰副聖意用是夙夜不遑寧處相度施工竊見嘉湖常鎮水之上流蘇松水之下流上流不浚無以開其源下流不浚無以道其歸于是督同委官人等將蘇州府吳江長橋一帶茭蘆之地疏浚深濶導引太湖之水散入澱山陽城昆承等湖又開吳松江并大石趙屯等浦泄澱山湖水由吳松江以達于海開白茅港并白魚洪鮎魚口等處泄昆承湖水以注于江又開七浦鹽鐵等塘泄陽城湖水以達于海下流疏通不復壅塞開湖州之漊涇泄天目諸山之水自西南入于太湖開常州之百瀆泄荆溪之水自西北入于太湖又開各斗門以泄運河之水由江隂以入江上流疏通不復湮滯自𢎞治七年十一月十七日興工至八年二月十五日工畢幸而一向天氣晴和人無疫癘凡百衆庶爭先效勞即今水患消弭人無墊溺之憂田有豐稔之望列郡士民莫不慶抃是非臣等之能皆皇上盛德大福廣被東南之所致也今將修浚過港瀆畫圖貼説謹具奏聞𢎞治九年工部主事姚文灝築沙湖堤廣三丈袤三百六十丈吳寬沙湖堤記周禮職方氏東南曰揚州其澤藪曰具區浸曰五湖今蘇郡在古揚州境內而具區即太湖也又在今吳縣境內獨所謂五湖者莫考其迹然水所瀦輒數千頃以湖名者不知有幾豈即周禮之五湖邪或曰太湖中分為五故名夫既曰具區不應復言五湖是必不然凡田之並湖者既藉灌溉之利而風波衝激田塍輒崩則有浸淫之苦至于舟楫往來固擅乘載之利然而風波猝興港瀦無避亦有覆溺之憂蓋利害之相倚伏如此湖之在偏隅者不必論若距郡城東二十里曰沙湖凡太倉昆山嘉定崇眀之人之所必經者其廣袤各數十里橫絶道上其北多腴田其中多舟楫人以為患者尤甚不獨此爾旁有盜藪以行劫為業客舟為風波所阻集于岸下多不能免人益患之昔人欲築堤以捍之者久矣皆以土石所施無所附麗其功難成遂置之乃𢎞治丙辰工部主事姚君文灝奉敕來督水利始白于巡撫右副都御史朱公謂隄可築公往視之亦曰可築且曰是宜用卷掃法蓋吾治河決時所已試者也謀既協姚君乃専任其事先時君從工部侍郎徐公濬常熟江口獲葦利之占于民者以為公用及是遂賴其濟一時夫卒盡力材用畢具工垂成而君移疾去矣今郎中傳君潮來代周行田野水利大興他日行至沙湖歎曰是堤之功其可已乎至是巡撫為左副都御史彭公復勸相之而堤竟以完告其濶為丈三長為丈三百六十隱然如城堅壯可久而水勢汪洋安流成渠人皆稱便惟古土功之興春秋謹之大抵因民之所利而利之則易為功違之則難然又有難易焉者孟子曰為髙必因邱陵為下必因川澤蓋言因其勢者則易也故世之捍水者未有不因于土之勢然非知乎水之性亦終于壞而已今夫沙湖為隄既無所因可謂難矣顧其水湍悍特殺而抑之其漩洄演漾固無所滯此其所以竟成也彼梁作淮堰成而即壞惟障而塞之不知其性爾水利之不行已久行則有利焉然能去其患則利在其中如是隄然蓋耕者無浸淫之苦則安于田畝行者無覆溺之憂則樂於道路賈者無掠奪之恐則保其貨財利何博于此是役也前守為史侯簡今為曹侯鳯皆經畫其事者若通判陳緯知縣劉珂鄺璠縣丞陳謙竇胤主簿喻秉則勞績並著皆可書者于是傅君使來請文刻石豫郡人也喜水患之能去且知君才操與姚君之美無忝于上命也遂為之記後之人尚謹視之以無隳其功云姑蘇志卷十二
