body:
  text: 姑蘇志卷四十三明王鏊撰人物一南鏐東箭物有以地貴者人參兩間其亦有藉於山川之發歟唐景之稱吳曰家無不孝之子朝無不忠之臣文為儒宗武為將帥美哉言乎矧今為天府扶馮思皇多士可乏徴載而隱之於貞淑微之於一藝外之於異教咸繫之季札吳子夀夢第四子也夀夢以賢欲立之札讓乃立諸樊攝行事當國諸樊既除喪復讓札札辭曰昔曹人不義曹君將立子臧子臧去之君子曰能守節札雖不才願附於子臧之義吳人固之札棄室而耕乃舍之諸樊卒命授弟餘祭以次必致於札札封延陵號延陵季子左傳趙文子問於屈狐庸曰延州來季子其果立乎杜預曰延州來季札邑餘祭四年季札聘魯説叔孫穆子知其不得死請觀周樂至齊説晏平仲納邑與政平仲從之乃免於欒髙之難至鄭見子産如舊交謂之曰鄭政將及子子為政慎以禮不然將敗去適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也去如晉説趙文子韓宣子魏獻子曰晉國其萃於三家矣勉叔向以自免王餘祭卒餘昧立四年卒欲授札札逃去吳人乃立王僚十三年吳圍楚使札於魯以觀諸侯之變公子光弒僚自立札至復命哭僚墓復位而待初使過徐君徐君好其寶劒口弗敢言及還徐君已死札解劒繫之徐君冡樹而去曰始吾心已許之豈以死倍吾心哉其長子死於嬴博之間因葬焉孔子使子貢觀之其穿深不至泉其斂以時服既葬封其壙左袒右旋號者三言曰骨肉歸復於土命也若魂氣則無不之也遂行孔子曰延陵季子之於禮其合矣札卒孔子書其葬處曰嗚呼有吳延陵君子之墓皇覽曰季子冢在毗陵縣暨陽鄉夫子題刻今存太史公曰延陵季子之仁心慕義無窮見微而知清濁又何其閲覽博物君子也夀越王夀夢臣也魯襄公五年使於晉請聽諸侯之好晉人遂為之合諸侯魯衛皆來會於善道蹶由王餘祭之弟魯昭公五年楚伐吳蹶由犒師楚王執之將以釁鼓使問曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若歡焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備吉孰大焉乃弗殺以蹶由歸掩餘史記作蓋餘吳公子也魯昭公二十三年吳伐州來楚及諸侯之師救州來公子光帥右掩餘帥左大敗楚及諸侯之師於雞父光弒王僚掩餘乃奔徐燭庸吳公子魯昭公二十七年吳欲因楚喪而伐之使公子掩餘及燭庸帥師圍濳吳師不能退公子光遂弒王僚燭庸奔鍾吾後與掩餘奔楚二人不與闔廬者也公子慶忌王僚之子也以勇聞於世萬人莫當走追奔獸手接飛鳥追之駟馬馳而不及射之接矢而不可中僚死出奔闔廬得要離用之為離所刺要離吳人闔廬憚慶忌在鄰國有萬人之力恐合諸侯以害吳伍子胥乃進要離曰離雖細人有萬人之力嘗見其折辱壯士椒丘欣於友人之喪席欣怒須暝往攻離離至舍誡其妻曰我為勇士椒丘欣於大家之喪餘恨蔚恚暝必來第勿閉吾門至夜椒丘欣果往見其門不閉登其堂不關入其室不守放髮僵卧無所懼欣乃手劒捽離曰子有當死之過三子知之乎子辱我於大家之衆一死也歸不關閉二死也卧不守御三死也子有三死之過欲無得怨要離曰吾無三死之過子有三不肖之愧子知之乎吾辱子於千人之衆子無敢報一不肖也入門不咳登堂無聲二不肖也前拔子劒手挫捽吾頭乃敢大言三不肖也有三不肖而威我豈不鄙哉於是椒丘欣投劒而歎曰天下壯士也臣所聞要離若此吳王見之要離曰臣國東千里之人細小無力迎風則僵負風則伏大王有命臣敢不盡力吳王默然要離即進曰大王患慶忌乎臣能殺之王曰慶忌之勇聞於世今子之力不如也要離曰王有意焉臣能殺之臣詐以負罪出奔願王戮臣妻子斷臣右手慶忌必信臣王曰諾要離乃詐得罪出奔吳王乃取其妻焚棄於市要離乃奔諸侯以無罪聞於天下遂如衛見慶忌曰闔閭無道王子所知今戮吾妻子焚之於市無罪見誅吳國之事吾知其情願因王子之勇闔閭可得也慶忌信其謀練士卒遂至吳將渡江於中流要離力微坐慶忌上風因風勢以矛鈎其冠順風而刺慶忌慶忌顧而揮之三捽其頭於水中乃加於膝上曰嘻天下之勇士也乃敢加兵於我左右欲殺之慶忌止之曰豈可一日而殺天下勇士二人哉可令還吳以旌其忠於是慶忌死要離渡江愍然不行謂從者曰殺吾妻子以事吾君非仁也為新君而殺故君之子非義也何面目以視天下之士言訖遂投身於江未絶從者出之要離乃自斷手足伏劒而死夫概王闔廬之弟也魯定公四年吳伐楚楚囊瓦禦之二師陳於柏舉夫概王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫概王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊囊瓦之卒楚師亂吳師大敗之吳遂入郢夫概王後奔楚為堂溪氏被離王闔廬之臣楚白喜既入吳伍子胥言於王以為大夫被離問子胥曰何見而信喜子胥曰喜伯州犁之孫吾之怨與喜同子不聞河上歌乎同病相憐同憂相救不愛其所近悲其所思者乎被離曰吾觀喜之為人鷹視虎步專功擅殺性不可親也子胥曰不然竟與共事喜即伯嚭也屈狐庸吳臣吳子僚使聘於晉趙文子問焉曰延州來季子其果立乎巢隕諸樊閽殺戴吳天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立張胥鄙談夫吾吳士也前交而後絶張胥鄙有罪拘將死談夫吾命徒而取之至於道而後乃知其夫吾也輟行而辭曰義不同於子故前交而後絶吾聞之君子不為危易行今吾從子是安則肆志危則易行也與吾因子而生不若反拘而死闔閭聞之令使釋之張胥鄙曰吾義不同於談夫吾故不受其任矣今吏以是出我以談夫吾故免也吾庸遽受之乎遂觸墻而死談夫吾聞之曰我仕而不受佞也不知而出之愚也佞不可以接士愚不可以仕君吾行虛矣人惡吾生吾亦恥以此立於世乃絶頸而死吳赤市使於智氏假道於衛寧文子具紵絺三百製將以送之大夫豹曰吳雖大國也不可交假之道則亦敬矣又何禮焉寧文子不聽遂致之吳赤市至於智氏既得事將歸吳智伯造舟為梁吳赤市曰吾聞之天子濟於水造舟為梁諸侯維舟為梁大夫方舟方舟臣之職也其敬太甚必有故使人視之視則用兵在後矣將以襲衛吳赤市曰衛假吳道而厚贈我我見難而不告是與為謀也稱疾而留使人告衛衛人驚戒智伯聞之乃止太子友王夫差子也夫差將伐齊令國中曰敢諌者死太子友知子胥忠而不用太宰嚭佞而專政欲切言之恐罹尤乃諷諫王清旦懷丸持彈從後園來衣祫履濡王怪問之太子曰適遊後園聞秋蜩之聲往觀之秋蟬登髙樹飲清露隨風撝撓長吟悲鳴自以為安不知螳蜋超枝緣條曵腰聳距而禝其形螳蜋翕心而進志在有利不知黃雀徘徊枝隂微進欲啄螳蜋黃雀但知伺螳蜋之有味不知臣挾彈飛丸而集其背臣但志黃雀不知空塪其旁陷於深井臣故祫體濡履焉大王笑曰天下之愚也但貪前利不覩後患太子曰愚復有甚吳徒知踰境征伐不知越王將選死士出三江之口入五湖之中天下之危莫甚於斯王不聽王子地王孫彌庸皆夫差臣也魯哀公十三年越伐吳為二隊疇無餘謳陽自南方先及郊彌庸見姑蔑之旗曰吾父之旗也不可以見讐而弗殺也太子友曰戰而不克將亡國請待之彌庸獲疇無餘地獲謳陽越子至復戰友與彌庸於姚皆死之子泄夫差之臣魯哀公八年帥師伐魯取武城胥門巢王子姑曹展如皆夫差臣哀公十一年巢將上軍姑曹將下軍展如將右軍戰於艾陵大敗齊師言偃字子遊吳人孔子髙弟在文學之科少孔子四十五嵗為武城宰孔子過之聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也夫子曰二三子偃之言是也前言戲之耳今有宅在常熟縣西范成大云世稱常熟為琴川本弦歌之説也甪里先生吳人史記正義引周樹洞厯云姓周名術字元道太伯之後漢髙帝時與東園公綺里季夏黃公俱出定太子號四皓又云甪里先生一號霸上先生又云今太湖中洞庭山西南中有甪里村是嚴忌會稽吳人時謂之嚴夫子尊之如此忌本莊姓嚴助嚴夫子之子或言族家子也夫子之族子郡舉賢良對䇿百餘人武帝善助對擢為中大夫與朱買臣等並在左右時征夷開邉軍旅數發內改制度朝廷多事屢舉賢良文學之士上令助等與公孫𢎞辨論中外相應以義理之文大臣數詘其尤親幸者助及東方朔枚皋吾丘夀王司馬相如相如常避事朔皋不根持論上頗俳優畜之惟助與夀王見任用而助最先進建元三年閩越圍東甌東甌告急帝問田蚡蚡以為不足煩中國自秦時棄不屬助詰蚡曰特患力不能救德不能覆誠能何故棄之今不振尚何以子萬國乎上乃遣助以節發兵會稽會稽守欲拒法不為發助乃斬一司馬諭意指遂發兵浮海救東甌未至閩越罷兵漢兵遂出踰嶺會閩越王弟餘善殺王以降漢兵罷上嘉之乃令助諭意風指於南越南越即遣太子嬰齊隨助入侍助還又諭淮南曰今者大王以發屯臨越事上書陛下故遣臣助告王其事朝有闕政遺王之憂陛下甚恨之夫兵固凶器然自五帝三王禁暴止亂非兵未之聞也漢操生殺之柄以制海內之命危者望安亂者卬治今閩越王狼戾不仁陛下為萬民安危久逺之計故遣兩將屯於境上震威武揚聲鄉屯曽未會天誘其𠂻閩王隕命輒遣使者罷屯毋後農時南越王甚嘉被惠澤故遣太子入侍此則陛下深計逺慮之所出也事效見前故使臣助來諭王意於是王稱謝助還上大説助侍燕從容上問助所欲對願為會稽太守於是拜為會稽太守數年不聞問賜書制詔會稽太守君厭承明之廬勞侍從之事懷故土出為郡吏間者濶焉久不聞問具以春秋對毋以蘇秦從橫助恐上書謝稱春秋天王出居於鄭不能事母故絶之臣事君猶子事父母也臣助當伏誅陛下不忍加誅願奉三年計最詔許因留侍中有竒異輒使為文及賦頌數十篇後淮南王來朝厚賂遺助交私論議及淮南反事與助相連上薄其罪欲勿誅張湯爭不可助竟棄市朱買臣字翁子吳人也家貧好讀書不治産業常艾薪樵賣以給食擔束薪行且誦書其妻亦負載相隨數止買臣毋歌謳道中買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴今已四十餘矣女苦日久待我富貴報女功妻恚怒曰如公等終餓死溝中耳何能富貴買臣不能留即聽去其後買臣獨行歌道中故妻與夫家見買臣飢寒呼飯飲之後數嵗買臣隨上計吏為卒將重車至長安詣闕上書久不報待詔公車糧用乏上計吏卒更乞丐之會邑子嚴助貴幸薦買臣召見説春秋言楚辭帝甚説之拜為中大夫與助俱侍中是時方築朔方公孫𢎞諫上使買臣難詘𢎞後買臣坐事免久之召待詔時東越數反覆買臣因言故東越王居保泉山一人守險千人不得上今聞東越王更徙處南行去泉山五百里居大澤中令發兵浮海直指泉山陳舟列兵席卷南行可破滅也上拜買臣會稽太守上謂買臣曰富貴不歸故鄉如衣錦夜行今子何如買臣頓首謝詔買臣到郡治樓船備糧食水戰具須詔書到軍與俱進初買臣免待詔常從會稽守邸者寄食拜為太守買臣衣故衣釋其印綬步歸郡邸直上計時會稽吏方相與羣飲不視買臣買臣入室中守邸與共食少見其綬守邸怪之前引其綬視其印會稽太守章也守邸驚白守丞相推排陳列中庭拜謁買臣徐出户有頃長安廄吏乘駟馬車來迎買臣遂乘傳去會稽聞太守且至發民除道縣並送迎車百餘乘入吳界見其故妻妻夫治道買臣駐車呼令後車載其夫妻到太守舍置園中給食之居一月妻自經死買臣乞其夫錢令葬悉召見故人與飲食諸嘗有恩皆報復居嵗餘買臣受召將兵與韓説等俱擊破東越有功徴入為主爵都尉數年坐法免復為丞相長史張湯為御史大夫行丞相事知買臣素貴故陵折之買臣見湯坐牀上弗為禮買臣深怨嘗欲死之後遂告湯隂事湯自殺上亦誅買臣子山拊官至右扶風姑蘇志卷四十三
