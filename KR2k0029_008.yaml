里地名木瓜有墩九百九十有九與此合為千墩因名千墩浦一說自淞江抵本府東下至江南之北凡有千墩永樂中太常少卿袁汶被㫖浚千墩浦鄉民便之易名少卿墩綽墩在縣西十八里相傳唐黃幡綽所葬髙啓詩淳于曾解救齊城優孟還能念楚卿嗟爾只教天子笑不言憂在祿兒兵天女墩在縣東南十八里洪莊村墩上下皆茒葦惟中間一路若有人行者雖植草不生相傳有天子之女葬于此莫詳世代墩中有金龍舟每風雨夕即聞金鼓聲一村民夜過其處見所謂龍舟者攫取之僅得一人像長可尺許暨歸即大病嘗有人欲發此為毒蜂飛火逐之遂止青墩塘墩在縣東北海口一在東南三十六里吳淞江南尖墩石墩十八里墩廟墩湯墩相墩逃鹿墩長墩虞山在常熟縣西北一里髙一百六十丈周四十六里六十六步吳地記云孫權置虞農都尉于此故云按吳趣春秋吳太子娶齊女病而曰必葬我虞山之巔以望齊國越絶書云虞山巫咸所居則虞山吳越時已有之或云虞仲葬此得名一名海虞或云海嵎以東臨滄海又名烏目山雖無峯巒而蜿蜒起伏略如卧龍上有土垤磈礧或疑其古塜而不可考也山麓有老君殿舊名乾元宫宫側有池宋嘉定間所鑿又有雪井南有仲雍墓有維摩庵太公石屋旁有石洞天將雨則雲氣出其中又西北為拂水巖崖石陟峻水奔注如虹凌風飛濺最為竒勝自南循山而西有致道觀又西有招真宫昭明太子讀書臺在焉又西則嶽祠諸廟過吳王廟五六里有試劒石又有三沓石與石城石門諸峯錯峙下有石壇周八十步又西則寶嚴灣其北六里為破山孫應時詩長嘯虞山迥天開風氣清南窺五湖近北覽大江橫厯厯三吳地悠悠萬古情雄觀有如此聊復記平生王汝玉平生不識海虞山覽秀曾因圖畫間雲入空濛開倒影僧依蒼翠閉禪關湖田種熟秋千頃烟浦舟行路幾灣天上歸來暫停轡何當留我老年閒吳寬與沈周逰虞山夜宿相川口清朝喚舟人舟人請所之指彼虞山垠山如知我來笑迓野水濵藹藹春雨餘翠洗雲中身我亦重茲山竦然正冠巾虞仲骨已朽髙名宛如新悠悠松間路弔古在茲晨放舟轉山塘行行自知津春服亦既成庶以適此春我本不飲人愛山如愛酒春逰亦易事出户即掣肘決策為此行所幸得良友譬彼足力弱扶掖乃能走虞山遙在望豈意落吾手側足亂石間縱目平湖口賞心雖云樂弔古悵然久丹井事有無刻銘覆華構如何梁昭明書臺蔽林藪斜日下嶺西落霞滿川上晚色催人還輕舟復遙漾佳山難為别持酒忽惆悵悠然一回首舟尾疊青浪故人知我懷捉筆寫其狀懷土心未除移山力何壯便如王維詩終南亦堪望流觀入中夜鼓枻起髙唱又舟中望虞山蜿蜒平野卧青山相見今人獨厚顔徒有詩篇曾記詠已無筋力再躋攀船頭旋轉憑黃帽水而低回擬翠鬟舊日同逰誰在者欲從東老學清閒沈周只有看山是勝緣青鞋布襪且輕便天收雨腳賖今日我趂花時遣老年絶壁雲扶將墮石豁崖風勒下奔泉此來不憤空歸去旋構新篇揀竹鐫破山世傳龍鬬而山破故名上有興福寺又有鬬龍澗旁有硃砂洞放生池慶元志引山海經曰虞山之北岡壠相接即烏目山今頂山之南有烏目澗疑即此也自此東北九十步有空心潭取唐人常建詩潭影空人心之句又有舜井唐僧常逹山居八詠身間依祖寺志僻性多慵少室遺真㫖層樓起暮鍾啜茶思好水對月數諸峯有問山中趣庭前是古松晚望虛庭物心心見祖情烟開分嶽色雨霽減泉聲逺樹猿長嘯層巖日乍明更堪論的意林下筍新生一室塵埃外翛然秪麼常睡來開寢帳鐘動下禪牀溪浸山光冷秋凋木葉黃時提祖師意欹石看斜陽西來真祖意秪在見聞中寒鴈一聲過䟱林幾葉空心閒憐水石身老怯霜風為報參𤣥者山山月色同真性寂無機塵塵祖佛師日明庭砌暖霜苦藥苖衰汲水和烟酌栽松帶雪移好聽𤣥㫖處猿嘯嶺南枝古寺憑欄危時聞舉妙機庭空月色淨夜迥磬聲稀漏轉寒更急燈殘冷焰微太虛同萬象相謂話𤣥微聖僧論的㫖物物唱圓成疏栁春來翠幽窗日漸明禪心清石室蝶翅覆花英好聽談𤣥處喬松鶴數聲祖祖唯心㫖春融日正長霜輕莎草緑風細藥苖香月滿真如淨花開覺樹芳庭前鶯囀處時聽語圓常宋劉拯破山八詠并序元豐元年蘇州常熟縣沙門思雅謁余言曰海虞之勝鍾于破山然林泉之勢遊觀之繁無近與逺傳之盛矣自倪郴州捨宅為寺數百年間偉人竒士往往間出而人無知者願有以發明之余因而詠興福寺峩峩烏目山曾臨貴侯宅重房昔珠翠峻宇煥金碧泉激晨霞明松搖暮雲白宜爾山中人日輪自朝夕文舉塔圓昔探雙林巵言發南華萬里歸一空誰云正非邪門影搖青松曽回貴侯車猶遺數層塔岌岌淩飛霞救虎閣三昧逰深慈結宇依蒼崖猛虎伏巍閣拔箭非忘骸窮獸雖覆車危雀猶投懷况我見已忘而彼猶其儕龍鬬澗白龍鬬巍峯長澗落千尺靈泉應竒躋髙連莫雲碧寒影凌蒼崖清流動危石八月苖正枯猶能變甘澤體如塔妙理悟三伊巍巍抗竒節千尺巖下松蕭然獨凌雪珠影雖青黃月輪豈圓闕危石揚寒泉至今伴清絶宗教院妙義傳天台迷雲淨如掃初終雖五時修短自三草結隱非此峯獲藏亦真寶秋來月正圓獨照松已老空心潭碧潭發幽石瀟灑無纎塵寒光湛秋月有物無比倫離釣況無魚千尺徒垂綸到此心已空何用濯吾纓御賜鍾大聲叩洪鍾萬里來彤庭鳥閒棲影重星淡雲氣清餘響繞巖壑林葉如回驚有客發深省塵耳非謾傾頂山在破山北十二里上有髙女峯相傳齊景公女葬此白龍池在焉西北有水簾洞兩水合流從石崖下注漫流若簾云孫應時詩小山搖落故凄凉想像登臨野興長萬里晴空初鴈入一年好景又橙黃極須痛飲償秋節生怕疏鍾報夕陽搔首故園歸未得籬邊寒菊為誰香散目秋郊趂曉涼纎雲不㸃鏡天長松杉沐露連天碧粳稻眠雲萬頃黃可惜文書妨勝日又還時節近重陽小山叢桂相撩得故故隨人作陳香梅詩千株碧樹插雲立一線紅泉透石飛童子怕寒爭閉户夜深風雨有龍歸范仲淹平湖數百里隱然一山起中有白龍泉可洗人間耳吾仰仁智心愛茲山水音結茅三十年不道嵗月深笑我名未已來問無為理却指嶺邊雲斯焉贈君子周霞賔路轉清風徑泉通古石橋規模靈隱小景像上方遙書壁藤牽袂尋源草沒腰每懷登覽日東海暮生潮福山在縣治西北四十里髙九十五丈周五里本名覆釡唐天寶六載改為金鳳後梁乾化三年又改今名山麓有東嶽行祠徐有貞詩冒雨衝風泛綵舟共君載酒七峯逰海門東望天連水江市西來樹隱洲喜有錢劉新著作能無王謝舊風流登樓莫漫題詩句留與山僧作話頭夀山與福山相連北濵大江又名陶山河陽山一名鳳凰山在縣西北四十里髙一百二十丈周七里山頂有井嘗出醴水見永慶寺碑又有梁朝古檜及唐狀元陸器讀書臺陳繹曾平生邱壑愛躋攀此日披圖意任閒江浙去題龍虎榜海虞行看鳳凰山鶴來華表千年後雲在丹崖萬壑間聞有青囊書卷在訪仙求術待秋還楊維禎河陽山色畫圖開絶壑懸崖亦壯哉華表不聞仙鶴語醴泉曾引鳳凰來玉魚金碗埋黃土石獸豐碑長緑苔獨有桓桓邱隴在秀峯相對讀書臺志山與河陽山相峙按盧志居民鑿地得唐斷碑有鷙山之語則志當作鷙塔山在河陽山南晉處士夏統宣城太守邴臻嘗居此舊名崇德後改今名常熟山在縣北三十七里髙一百五丈周七里本名銅官或云洞觀唐天寶六載改今名范山在縣北三十六里二百步髙七十四丈周二百四步相傳梁范冀兄弟居此故名又永安山在縣北三十八里或云即范山石家山髙五十七丈周二里在銅官山北茯苓山在縣西北六十五里髙數丈周三百步下有龍潭石闌猶存相傳舊産茯苓故名宛山或作苑在縣西南五十里髙七十丈周五里産石堅潤可為硯顧山在縣西北五十里髙一百七十丈周二十一里東南屬本縣西南屬無錫縣西屬江隂俗呼為三界山一名靈龜山亦曰香山烏丘山在縣東南二十七里去昆承湖三里或作塢山黃土山在魏涇橋南三山皆土阜耳穿山髙一十七丈周二百五十步中有石洞前後通徹故名臨海記曰海虞縣穿山下有洞穴髙十餘丈昔有海行者舉帆經其中今考其洞上猶通人往來而其下為地去海已逺舊屬常熟今分𨽻太倉州太倉岡身在州治之東曰上岡身曰下岡身曰歸胡岡身今名歸吳在新安鄉曰青岡在惠安鄉曰王家岡别有岡門見水條寶山在嘉定縣東南八十里依仁鄉永樂十年三月平江伯陳瑄督海運築為表識上建烽火髙三十餘丈周回一十五里御制寶山之碑嘉定涉海之墟當流之會外即滄溟浩渺無際凡海舶往來最為衝要然無大山髙嶼以為之表識遇晝晴風靜舟徐而入則安坐無虞其或暮夜烟雲晦𡨕長風巨浪帆檣迅疾倐忽千里舟師弗戒瞬息差失觸堅膠淺遄取顛躓朕恆慮之今年春乃命將士相地之宜築上山焉以為往來之望其址東西各廣百丈南北如之髙三十餘丈上建烽晝則舉烟夜則明火海洋空濶遙見千里于是或樂其便不旬日而成周圍樹以嘉木間以花竹蔚然竒觀先是未築之前居民恆見其地有山影及是築成適在其處如民之所見者衆曰是蓋有神明以相之故其兆先見皆稱之曰寶山因民之言仍其名而不易遂刻石以志之詩嶫曰滄溟巨浪渺無分混含天地相吐吞洪濤駕山㠎奔巨靈屭相噓噴揮霍變化朝為昏駭神褫鬼目黯眢蒼黃拊髀孰為援乃起茲山當海門孤髙靚秀猶崑崙千里示表鬱㶿燉永令泛濟無憂煩寶山之名萬古存勒銘悠久同乾坤永樂五年五月初九日姑蘇志卷九
