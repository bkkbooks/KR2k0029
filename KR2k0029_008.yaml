body:
  text: 姑蘇志卷九明王鏊撰山下穹窿山比陽山尤髙五湖賦云穹窿紆曲蓋此山實峻而深形如叉股吳地記兩嶺相趨名曰銅嶺越絶書為古赤松子取赤石脂處又神仙傳赤鬚子豐人秦穆公魚吏也食柏實石脂絶穀後往吳山升仙去即穹窿山也山髙而平其頂方廣可百畝中壘石為龕名國師庵半山有泉名法雨四時流不絶下注石堰可以灌田山東嶺下有盤石髙廣丈許相傳朱買臣讀書其上後人號為讀書臺穹窿寺在焉其北有紫藤塢百丈泉海雲菴西址有白馬寺元陳徴詩緑水青山今再遊杜鵑花發雨初收猿聲好在千章木雲氣深藏萬丈樓麋鹿近人來古澗麒麟無主卧荒邱吏情益愧成羈紲西望太湖烟際頭黃漢卿何處春山好物華穹窿山下古烟霞出林澗水作清語上樹藤枝開紫花久住老僧如避世初來塵客懶還家一尊醉倒東風裏更覓砂鍋穀雨茶楊基昨日出逰今日還登臨未盡湖東山紫藤花落髙樹下翠羽鳥鳴深竹間泉亭峻石淨可掬磴倚絶壁危難攀人生跬步即天險不獨瞿塘與劍關吳寬我聞吳中諺楊山髙抵穹窿半壯哉拔地五千仞始羡吳中有寺觀銅坑鄧尉仙屏扆天平靈巖當几案其間法華與雅宜水透橫亘如長岸何人著山經宜作吳山冠但嫌地勢髙山家每憂旱舟行半日青已了郤被濃雲忽遮斷水田路轉二三里依舊諸峯青厯亂人云山頂百畝平合結茒廬倚霄漢龍門勝迹未遑逰坐向船頭先飽看又飲百丈泉白雲翻海濤行人渺無蹤蘭若因以名秀似青芙蓉兹山非百丈泉石與山重問泉所發源寺僧偶相逢涓涓出亂石㶁㶁循長松山中下鑿井飲足忘瀰冬始知白雲多護此蜿蜒龍品評藉道園遺墨無塵容所恨生已晚挾杖何由從步來當長夏坐挹清心胸紀事强追和豈徒碧紗籠謫仙詠瀑布莫訪香爐峯香山與穹窿連屬南址近太湖為胥口而氣脈接胥山吳地記云吳王種香于此遣美人採之故名其下有採香徑互見古跡西南數里有黃茅山臨太湖南址吳王愛姬祠在焉胥山在太湖口寰宇記云吳王殺子胥投之于江吳人立祠于此故名水經云胥山上有壇長老云胥人所治也下有九折路南出太湖闔閭闢以逰姑蘇之臺而望太湖也今太湖口為胥口其外為胥湖南有髙峯山自穹窿至此止姑蘇山一名姑胥一名姑餘在橫山西北古姑蘇臺在其上至今人稱為胥臺山互見古跡橫山在姑蘇山東隋書十道志云山四面皆橫故名又名踞湖山以山臨太湖若箕踞也錢氏葬忠獻王元璙于此建寺其趾曰薦福因又稱薦福山山有五塢故又名五塢山皇祐五年節度推官馬雲逰此山名之曰芳桂塢飛泉塢修竹塢丹霞塢白雲塢後人又以堪輿家言稱為九龍塢山中舊有朱桓陸雲公顧野王墳續圖經云此山鎮郡西南臨湖控越實吳時要地隋遷郡于橫山亦以是為屏蔽云馬雲詩山臨太湖上寺隱青蘿間五塢洞壑邃衆峯屏障環濃嵐面光彩驚波背潺湲雲歸定僧寂月伴樵夫還林墅掩䝉密級磴容躋攀錢氏建圭社此地為家山又題五塢森森芳桂樹團團削青玉春花飛澗户秋實墜巖曲霜條封翠紫風葉搖香緑下有幽棲人結芳避世俗學仙讀丹經好道探藥籙植根滿羣峯不使樵斧觸髙崖落飛泉深源味泠冽雲津留玉乳石髓澄金屑淙淙危磴響滴滴蒼蘚缺濺沫灑明珠滿澗融寒雪巖夫就潄飲姬子臨浣潔不獨愈痼疾自可清內熱檀欒遍巖川幽谷氣象鮮風生自宫徵秋籟成管弦夕靄起碧霧晨㬢生緑烟花繁紫鳳飽質徑蒼虬攣藤蘿交密䕃仰不見雲天欲訪桃源路塢塢疑相連東澗豀谷秀粲然金碧麗亘夜丹氣明向曙扉烟霽磴瀉紅玉泉林紆赤鳳髻日出諸峯上月皎半天際幽谷紓綘繒層崖縈錦􅖯羡此山居人蕭然逺麈世君尋白雲䲧最近林澗西永日抱幽石因風度清豀炎隨夏景變涼髙秋氣淒素靄生巘㠋練光帶虹霓潤澤施天下還返故山棲深惟賢士志出處可與齊又仇山人隱居雞犬眠雲白日空暮春花木滿川紅茶甌香沸松林火藥杵聲清石澗風玉帛未聞招隱士神仙今喜識臺翁夕陽半局殘棋在醉倚巖邊紫桂叢髙啓題五塢欲攀淮南樹人去山寂寞嫋嫋凉風生疏花月中落山空響更逺雨過流還急餘沫麗回風一林紅樹濕色映豀沈沈秋雲生夕隂無限楚山意鶴鳴風滿林遙聞丹霞塢中有飱霞者絡彩發朝朝還同赤城下雲開見家山雲合失山路聞語知有人欲尋已迷誤其西有岷山花園山堯峯山唐免水院在焉今稱堯峯寺有清輝軒碧玉沼多境巖寶雲井白龍洞觀音巖偃蓋松妙髙峯東齊西隱十景今並廢蔣堂半峯亭詩何名半峯亭堯峯路之半遊客趨層崖斗上多股戰寶雲搆兹軒接引心不倦所冀冠蓋來少休松石畔雄視金仙居巍采倚銀漢自此更攀緣須㬰躋彼岸李彌大雲峯何岧嶤去天餘幾丈其下蔚華林幽然屹相向我逰先朝暾海日射巾杖飛蓋不須持步步蒼松障山僧知我來羅立鳬鴈行提擕兩行人為我談實相一種勿絃琴三嘆無聲唱開軒面東南千里入俯仰西登妙髙臺更欲茲曠望土斷澤繞山烟濤渺雲浪恐是六鼇連蓬壺墮莽蒼又疑鯨入海偃脊起青嶂時方老火熾金石流玉煬須㬰變雲雨為作雄風壯翻手回涼秋掀舞千林響誰云免水宫自是神龍藏三髙如可作吾欲五湖訪洗足巨浸心振衣孤峯上寄詩夸奪流得飽但相忘長哦可當歌踏月下空曠僧懷深山居十詠清輝軒湛湛平湖浸月明漁歌吹斷曉風清壞衣䝉頂跏趺坐不稱詩情稱道情碧玉沼深靜含秋一鏡寬清井聊酌齒牙寒靈巖自笑窮山骨明月泉慳只欲乾多境巖聊向蒼藤掛玉環蒲莎嘉致伴幽閒雙眸淨洗看不厭欲結遮頭草一間寶雲井寶雲珠草廣禪林鑿石窮源意亦深長嘆甘泉不當路汪汪空有濟人心白龍洞古洞深沈莫敢窺森隂草木野雲飛白龍何處淹頭角天下蒼生待汝歸觀音巖笑日野花青嶂下歌春幽鳥白雲間寶陀大士全身露懊惱逰人空看山偃蓋松寒松門底如張蓋接引佳賓眼倍青方丈老人迎送少未應因汝下幽庭妙髙峯下視羣山盡子孫孤髙直與月輪分善財不用别峯覔只此休時見德雲東齊禪板蒲團消永日明忩淨几映疏筠一爐香盡六時過轉覺山家氣味真西隱匿影長嫌山未深閉門莫放俗塵生如今滿眼事奔走欲向何人話此心戴良已從泉游復向堯峯去堯峯渺何所塵俗不知處披拂强追尋疲􅠰窘凌遽息喘倚茂松濟勝犯零露積石擁近蹊飛嵐護遙樹仰觀天宇垂俯睨河流注石湖尚波瀾洞庭但烟霧遊子多悲懷觸景增逺慕微跡既漂泊流年復遲暮半生僅一來百齡能幾度回駕悵難淹又復首前路又西為鴨踏嶺反陂山其南有寶華山長旗嶺其東有感慈塢又東為吳山本亦橫山一支吳越廣陵王子文舉建吳山院于此故名其南有升猶山桃花塢漫衍六七里臨太湖白楊灣與吳江分界山之東有紫薇塢瑞雲塢褒忠嶺青霞塢北連梅灣西址為殊勝塢山西有陸墓山疑即陸雲公葬處楞伽山一名上方山在吳山東北其頂有浮圖五通廟在其下東南麓有丁家山唐人丁公著父喪負土作冡故名其北為寶積山寶積寺在焉其北為吳王郊臺東北為茶磨嶼以其三面臨水故云嶼俗云磨盤山東南麓有普陀巖巖前石池深峻崖絶石梁跨其上兩崖壁立蘿木交映特為竒勝白石山在滸墅北越絶書云故為胥女山春申君初封吳更今名又云其南有小蜀山春申君客衛公子冡也黃山在茶磨山北四里胥塘之北諸峯髙下相連俗稱筆格山隋志載王世充破劉元進坑其衆于黃亭澗疑即此山其西山之半有二石洞深可三四丈俗名虎洞岝㠋山在金山東俗稱獅子山以形名一名鶴阜山又名苲雄山吳地記云王僚葬此山傍有思益寺山上有石巷山南有大石相傳為墜星今其東有落星涇水經云吳西有苲嶺山俗傳此山本在太湖禹治水移至此又西南有兩小山皆有石如卷苲禹所用牽山也吳山有淺處在三山之南長老云是苲嶺山麓自此以東差深言是牽山之溝朱伯原謂牽山事閭巷之談因故書所載姑存之山右有土阜曰鈴山左曰索山皆以獅子名山南頂上有巨石二如樓云是獅子兩耳自元以來鑿石且盡徐有貞登獅山麥黃天氣爽如秋乘興聊為岝㠋逰香徑踏花來洞口小舟送酒過豀頭橫塘樹色連龍塢茂苑烟光接虎丘絶勝竹林觴詠處即今誰數晉風流何山在獅山北一里其地舊名鶴邑墟故山名鶴阜山因梁隱士何求何㸃葬此改今名其坡有資福寺范志以岝㠋山為鶴阜山以上四山與諸山不相連洞庭山在太湖中一名包山以四面水包之故名或又謂包公嘗居之陶隱居云包公為句容人鮑靚又名林屋山山周回一百三十五里遙望一島而重岡復嶺茂林平野鍾梵相聞閭巷井舍不異市邑即其地如人區别境其諸峯皆秀異而縹眇峯最髙登其顛則吳越諸山隱隱在目又有上方下方石公龍頭金鐸相傳吳王藏金鐸于此渡渚吳王嘗于此渡軍諸山雖皆山之支隴而逶迤起伏靈棲邃構隨髙下各擅勝處有名叢林凡十有八而林屋洞毛公壇桃花塢消夏灣􅛇裏諸迹尤為竒勝唐房琯云不遊興德洞庭未見山水他名人品題尤多其地相傳無虎蛇雉而所産柑橘特佳所謂洞庭柑也皮日休詩松門亘五里彩翠髙下絢幽人共躋攀勝事頗清便霎霎林上雨隱隱湖中電薜帶輕束腰荷笠低遮面濕屨黏烟霧穿衣落霜霰笑次度巖壑困中遇臺殿老僧三四人梵字十數卷地稀無夏屋境僻乏朝膳散髮抵泉流支頤數雲片坐石忽忘起捫蘿不知倦異蝶時似錦幽禽或如鈿篥篣還戞刃栟櫚自搖扇俗態既斗藪野情空眷戀道人摘芝菌為余備午饌渴興石榴羮飢厯胡麻飯如何事于役茲逰急于傳却將塵土衣一任瀑絲濺又縹眇峯頭頂華陽帽手持大夏笻清晨悟道侣來上縹眇峯帶露嗅藥蔓和雲尋鹿蹤時驚􅫪􅤜鼠飛上千丈松翠碧內有室叩之虛䃔䃧古穴下徹海視之寒鴻濛遇歇有佳思緣危無倦容須㬰到絶頂似鳥穿樊籠恐足蹈海日疑身凌天風衆岫㸃巨浸四方接圓穹似將青螺髻撒在明月中片白作越分孤嵐為吳宫一陳靉靆氣隱隱生湖東激雷與波起狂電將日紅雨㸃大金髇轟下空暴光隔雲閃髣佛亘天龍連拳百大尾下拔湖之洪捽為一雲山欲與昭回通移時却下細碎衡與嵩人物諒不測絶景尤難窮杖策下反照漸聞仙觀鍾烟波漬肌骨雲壑闐心胸竟死愛未足當生且歡逢不然把天爵自拜太湖公又桃花塢夤緣廣南嶺盡日穿林樾窮深到茲塢逸興轉超忽塢名雖然在不見桃花發恐是武陵豀自閉仙日月倚峯小精舍當嶺殘耕出將洞任廽環把雲姿披拂閒禽啼呌窱險狖眼硉矹微風吹重嵐碧埃輕勃勃清隂減鶴睡秀色治人渴敲竹鬭錚鏦弄泉爭咽嗢空齊蒸柏葉野飯調石髮空羡塢中人終身無履襪陸龜䝉和包山信神仙主者上真職及棲鍾梵侣又是清涼域乃知烟霞地絶俗無不得巖開一徑分柏擁深殿黑僧閒若圖畫像古非雕刻海客施明珠湘蕤料淨食有魚皆玉尾有鳥盡金臆手擕鞞鐸佉若在中印國千峯殘雨過萬籟清且極此時空寂心可以遺智識知君戰求勝尚倚功名力却下聽經圖孤帆有行色左右皆跳岺孤峯挺然起因思縹眇稱乃在虛無裏清晨躋澄道便是孱顔始據石即更歌遇泉還徙倚花竒忽如薦樹曲渾成几樂靜烟靄知忘機猿狖喜頻攀峻過斗未造平如砥舉手緣青𡨕回眸聊下視髙帆大于鳥廣墠才類蟻就此微茫中爭先未常巳葛洪話剛氣去地四十里茍能乘之逰止若道路耳吾將自峯頂便可朝帝扆盡欲活羣生不唯私一己超騎明月幹復弄華星蘂却下蓬萊巔重窺清淺水身為大塊客自號天隨子他日向華陽敲雲問名氏行行問絶境貴與名相親空經