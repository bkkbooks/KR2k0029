body:
  text: 姑蘇志卷二十五明王鏊撰兵防吳非用武地而濱江帶海亦東南要陲也宋元兵防頗詳自歸附後朝廷立制守城備倭分列營寨又置巡檢司以事察捕今具述之而舊迹稍存其槩云指揮使司有三蘇州衛指揮使司吳元年立天兵平張氏即以所俘士建衛命指揮使吳良掌之𨽻中軍都督府所轄五千户所共統軍士五千六百名其署在飲馬橋西即宋府倉基元淮南行中書省左中二千户所在正堂東右前二千户所在正堂西鎮撫廳在中門西經歷司在堂右旗纛廟在中門東鎮撫司獄在衛治西北穀市橋西軍器局在衛治內西左千户所營在葑門內右千户所營在閶門內中千户所營在盤胥二門內前千户所營在婁齊二門內後千户所分立為嘉興守禦千户所衛倉在西北隅即元百萬倉基國初指揮使吳良置今附永豐倉教場在北城下報恩寺後內有將臺上有演武廳太倉衛指揮使司吳元年立命指揮同知朱文掌之𨽻前軍都督府初設十千户所共統軍士萬一千二百名洪武四年併為左右中前後五所衛署在太倉城中鎮民橋西即元水軍都萬户府經歷司在正廳東知事廳在正廳西武成王祠在儀門東軍器庫在衛治西鎮撫廳在衛治西內有司房監房左右二千户所俱在衛東南中千户所在衛西南前千戶所在衛東後千户所在衛東南倉在衛西二百九十步洪武二十年指揮髙曉建教場在小北門內中有將臺上立演武亭鎮海衛指揮使司洪武十二年分太倉衛官軍之半命指揮僉事曹勝掌之𨽻前軍都督府統左右中前後五所衛署在太倉城內武陵橋北即元市舶提舉司也軍器庫在廳後武成王祠在廳東南經歷司在衛西鎮撫廳左右司房俱在衛西監房在衛東南左千户所在衛西北右千户所在衛西南中千户所在衛東前千户所在衛東北後千户所在衛西教場在小北門內與太倉衛教場相連內有將臺上有演武廳守禦千户所有二崇明守禦千户所洪武二年立𨽻中軍都督府統軍士一千一百二十名永樂十四年倭入冦發鎮江鎮海二衛軍士千餘以百户十員率之來禦遂𨽻本所守城其舊戍兵發屬水寨備倭治署在惠政坊有東西吏房鎮撫司廳在所堂西南百户所在所門內教場在城東北三里內有將臺上有演武廳吳淞江守禦千户所在嘉定縣東南四十里洪武十九年滎陽侯鄭遇春與鎮海衛指揮朱永建𨽻中軍都督府二十二年千户周傑復建譙樓廳門倉庫初元以分鎮萬户府為治所後撤造太倉軍儲倉委鎮海衛官并差軍更畨守禦至是乃有定居軍器局在所東南演武場在所西北內有將臺上有演武亭洪武二十四年千户楊𢎞建寨有五白茆寨在常熟縣東北九十里海口天順五年鎮守都指揮使翁紹宗奏置每春夏蘇州衛分委指揮一員千户二員百户四員領軍士四百餘人至此操練備倭置船四艘巡哨官軍俱至秋末還衛又立教場備官醫療疾成化十八年都指揮郭鋐復立營寨二十一年又造官廳鼓樓軍房劉家港寨今稱水寨在劉家港海口即婁江也去崑山縣東七十里與嘉定接境河北岸元置分鎮萬户府至正初又於江南北岸各立萬户府共三衙國朝罷萬户府置巡檢司三每司設弓兵百名又立烽堠六正統初金山有警侍郎周忱都指揮翁紹宗議此為吳地喉襟乃設寨蘇州衛分委指揮一員千户二員百户四員領軍士五百人海船八艘巡哨備倭又開教場操練悉如白茆制成化十八年都指揮郭鋐增立城堡廳房青浦寨二在嘉定縣東南四十五里八都青浦洪武十九年鎮海衛指揮朱永建堡城髙一丈六尺廣二丈五尺闊一丈周回一百八十步鎮海衛分委指揮一員千户二員百户四員領軍士四百人守備一與前堡對峙洪武三十年太倉衛指揮劉源奏建令太倉衛撥官軍守備如前正統初翁紹宗遣太倉官軍守崇明遂委鎮海衛官軍兼管紹宗又與巡撫周忱纍加修築增造官廳軍房水寨在崇明沿海本處千户所委千百户領軍士一千人管駕船出海巡哨營有二長沙營在崇明縣東北四十五里海中為土堡一內設煙墩一座上為二鋪戌卒二十名瞭望分委千户一員百户二員軍士二百人駐劄守備官廳營房皆具明威坊營在崇明縣治西明威坊內太倉衛分委指揮一員千户二員百户四員領軍士四百人駕備倭船十艘守備指揮官廳下百户分廳軍房咸備又小船十馬八十四正統八年翁紹宗奏置墩臺有二百三十四𨽻巡檢司者各繫其下崇明縣沿海共七十一處環東南北海岸每處相距二里築土壘髙五丈周圍二十丈上建屋一間軍士五人􅓗五束晝夜守望正統初翁紹宗置煙墩在崇明縣其制大略同前圍四十丈沿海八座上港南海曽姚港張家港下界㳌港大套清潭港西沙十座盧志作東沙下樁港東滑鍾家窊出水套蝦港水竇港南大港陳八港沈婆濱潭子港巡檢司有二十九吳塔巡檢司在齊門外蠡口舊在吳塔移此管閶門下塘山塘并婁齊二門外陳墓巡檢司在陳湖東管葑門外獨墅大姚至甪直浦已上屬長洲縣木瀆巡檢司在縣西二十七里木瀆鎮管閶胥盤三門外木瀆橫塘新郭三鎮橫金巡檢司在縣西南四十二里橫金村管二都三都并沿太湖地甪頭巡檢司在縣西南八十五里洞庭西山上管洞庭西山東山巡檢司在洞庭東山成化中巡撫王恕奏置管洞庭東山已上屬吳縣石浦巡檢司在縣東南四十里㳌川鄉七保石浦鎮宋祥符間設國朝洪武間於真如觀署事二十二年巡檢舒琇始建景泰二年移置千墩浦口煙墩十一座石浦口夏駕口陸巷涇唐梨涇新塘口張浦口刁婆舍太直港口諸天浦口潭港口千墩浦巴城巡檢司在縣西十五里朱塘鄉三保髙墟村洪武三年置今徙置真義村煙墩十二座狀元涇綽墩圓村真義夏尖景村黃巷李長墳新村嚴家橋俞港村徐公橋已上崑山縣白茆巡檢司在縣東北九十里抵海洪武初置煙墩十一座白茆港口新河北港金涇唐浦舊衙前雙濱義塘長亳芝塘河舍黃泗浦巡檢司在縣西北八十里抵揚子江煙墩九座顧沙港黃泗浦港西洋拗新莊港奚浦港西洋浦黃港小陳浦黃泗浦港東福山港巡檢司在縣北四十里北抵揚子江東抵海煙墩十座墅橋新婦陳浦福山港口頂山龍王廟曹橋廟曲塘興福興塘涇盧作新塘許浦港巡檢司在縣東北七十里北抵揚子江東抵海煙墩十五座青墩大𢎞衙後耿涇九里尚墅陶舍丁涇塘雙廟四義低壩徐巷盧作港十里程勝法海洋塘已上常熟縣長橋巡檢司在縣東二里松陵驛東管三都東西二十三都二十五都簡村巡檢司在縣東南十五里充浦管一都二都四都十九都因瀆巡檢司在縣東南一百里吳漊村管五都六都七都八都震澤巡檢司在縣東南八十五里震澤鎮管九都十都十一都十二都平望巡檢司在縣東南四十五里平望鎮管十八都二十都二十一都二十二都二十四都汾湖巡檢司在縣東北四十五里蘆墟村管二十八都二十九都同里巡檢司在縣東北十五里同里鎮管二十六都二十七都爛溪巡檢司在縣東南九十里嚴墓村管十四都十五都十六都十七都已上吳江縣顧徑巡檢司在縣東三十里煙墩四座月浦爛倉顧徑溝盧作經港五嶽塘吳塘巡檢司在縣西南三十六里煙墩九座青岡黃泥涇外岡城西石門岡馬陸馮家橋黃渡沙岡江灣巡檢司在縣東南六十里煙墩一十七座沙浦湯字墟呂字墟生字墟南翔周家濱裏周家濱外衣有字墟致字墟東潛字墟中潛字墟西潛字墟大場胡陸灣江灣五聖廟秦家已上嘉定縣茜涇巡檢司在州東北四十五里湖川鄉即宋楊林寨吳元年改煙墩五座七浦塘花浦口謝家塘楊林塘大赦口唐茜涇港口巡檢司在州東北五十四里新安鄉即崑山鎮巡檢司洪武七年設成化間遷置東花浦口煙墩十二座日字墟向字墟露字墟新字墟職字墟空字墟風塘上杜寒字墟同字墟吳字墟李字墟劉家港巡檢司在州東七十里煙墩六座楊家橋薛市門小錢門二十三都二十五都二十六都甘草巡檢司在州東七十里東抵海煙墩四座黃濱唐茜涇錢涇陸鳴涇已上太倉州西沙巡檢司在縣西八十里煙墩十三座南沙薛家港茆五港第八港第九港界溝港水洪港道堂港陳子中港秦墳港川洪港石家濱第三小桐板三沙巡檢司在縣北五十里煙墩七座長敢徐公濱清水濱北新河新港北白滑漺已上崇明縣海運總兵公館在太倉城東半涇東洪武七年靖海侯吳稹建今廢甲仗庫在太倉東門外亦吳稹建今廢宋軍制大略宋初選驍勇送補禁衛餘留本城康定初置宣毅軍慶歷中募健勇或選廂軍以為宣毅蘇州一指揮熙寧三年改威果嘉祐四年詔置禁軍三指揮其新招者以威果為額大觀二年詔望郡别屯一千人一為威果一為全捷並以步軍五百人為額四年撥杭州威果第二第三指揮蘇州駐劄宣和二年因討睦冦仍以全捷兩指揮為杭州東南第三將駐劄宣和四年方臘之亂詔增戍將五年下江浙諸州各置威果全捷兩指揮𨽻侍衛步軍禁軍威果第二十八指揮元額五百一十人在萬夀寺北威果第四十一指揮元額四百一十人在社壇東威果第六十五指揮元額四百一十人在報恩寺西雄節第九指揮元額五百一十人在府學南全捷第二十一指揮元額四百一十人在城西北鴻橋西李夀朋申補新軍省劄節文訪得禁軍原額二千三百三十人今在籍者一千七百五人而已夀朋多方招募刺到六百三十人填足元額分畨教閲立格激賞又國家置弓手土兵以警賊盜本府寨多闕額已招填到四十八人外如廂軍遞鋪又收刺到八十一人併令閲習一體支賞證得月給錢米春冬衣賜賞射支犒一歲約十萬餘緡並本府自行計置不敢上瀆朝廷省劄證得平江府先招禁軍伍百人今又招到六百三十人合證鎮江府例令為一軍分立隊伍别選將官專管訓練不許諸司州官等差借私役吳門事類云紹定間吳淵為浙西提刑一新吳之營壘又請于朝得放牧曠地并徹而治之號曰新營使兵卒各歸行伍安其室家不雜處于民間也復市田千餘畝司之廪人為軍中吉凶之費廂軍廂軍者諸州之鎮兵各𨽻本城專以給役內總于侍衛司而兵部掌其政令崇節第九指揮崇節第十指揮崇節第十一指揮崇節第十二指揮熙寧二年令兩浙廂軍崇節加教閲二字於軍額元豐四年詔兩浙步軍自捍江而下三並改號崇節凡為五十一指揮總一萬九千人橫江指揮紹興五年令臨安平江等處招置水軍教習戰船以備禦敵以五百人為額橫江為名寧節第三指揮係養老將校初與牢城為一乾道九年賜額城下開江指揮初五代錢氏置都水營田使主水事募卒為都號曰撩淺亦云撩清指揮宋因之有卒千人為兩指揮第一指揮在常熟第二指揮在崑山一在吳江南城范仲淹疏亦云曩時蘇州營田領四都共七八千人導河築堤以減水患嘉祐四年置開江兵立吳江常熟崑山城下四指揮各二百人八年兩浙轉運司請撥望亭廢隁兵𨽻蘇州開江指揮修至和塘元豐六年定以八百人分市諸浦逐閘執役崇寧四年蘇湖秀三州開江兵共一千四百人并使臣二員宣和二年提舉趙霖興修水利四指揮添置共二千人朱勔進花石綱盡奪以往建靖之後不復招填紹興二十九年因蔣璨言命監察御史任古於常熟崑山各招填一百人其後止有城下吳江兩指揮兵士百餘乾道初轉運判官陳彌祚知府沈度請仍招置兵士常熟崑山各百人壯城指揮熙寧八年置元豐三年敕壯城兵士大城五十人小城三十人專充修城元豐元年置壯城兵士列郡三百人政和三年增置崇寧五年置壯城指揮中軍鼓角指揮元二十五人作院指揮元額一百人熙寧元年置