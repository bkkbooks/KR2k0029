body:
  text: 姑蘇志卷二十明王鏊撰橋梁下崑山縣橋一百六太平橋州東橋同在縣治東跨東市河普通橋縣治西張家橋王鎮坊内平橋酒坊橋舊名致和人名夢感日新坊内陳老橋片玉坊秦廸橋已上同在縣治南武寜北倉橋安定坊西山溪橋馬鞍山後衆安橋柴巷内許墓塘橋縣治北會僊橋清真觀前黄家橋山溪橋東泗安橋同在縣治比跨山塘涇蓴萊橋餘慶坊西通濟橋朝宗坊内唐家橋厚俗坊内寳月橋通闠橋貴徳坊内興福橋安奉坊東甫庫橋積善坊内茅家橋儒學坊内東城橋興仁坊北羅漢橋安榮坊北採蓮橋舊名永福已上在縣治東南恵政橋景徳寺前進福橋儒學東舞雩橋儒學東髙平橋報國寺西迎仙橋延福菴東景徳寺橋已上在縣治西南無不利橋永懐寺西戊巳橋樓豐坊内富春橋一名髙板橋跨至和塘望山橋富春橋南萬壽橋跨東市河安定橋流慶橋旌孝坊内奚婆橋已上俱在縣治東北跨木人涇全相橋清風橋明月橋已上在縣治西北跨西市河半山橋跨至和塘見山橋鼇峯橋俗名樂輸半山橋南香花橋舊名慧聚寺前橋楊家橋俱馬鞍山前跨山塘涇板橋馬鞍山前北已上俱在縣治西屬城内金童橋在大西門外駟馬橋太原橋同在小西門外玉虹橋東門外跨至和塘迎恩橋迎恩坊西跨小虞浦榮陽橋太原橋西通文橋玉峯倉東南阜民橋玉峯倉南應山橋玉峯倉後東盈橋玉峯倉東北西盈橋玉峯倉西北門利民橋北門外蝦蟇橋正南門外廣恵橋東南門外普濟橋近廣恵橋新漕橋廣恵橋東草堂橋普濟橋南須浦橋舊超化院西香花橋舊超化院前秦浦橋吕巷村九里橋即尤涇橋在縣西十里真義橋縣西二十里跨真義浦狀元橋縣東南石浦鎮宋祥符元年衛文節公建元至元二年邑人胡道茂修接官亭橋縣東南石浦鎮宋祥符元年衛文節公建淞南第一橋干墩浦中正法華橋縣南洼浦行孝塘橋縣東南永安橋保安橋同在兵馬鎮南夏駕橋縣東南三十二里廣順橋趙靈興福寺前郎浦橋盛蕩村濟衆橋衆安橋同在陳墓村跨界浦天寧橋陳墓村南石橋泗橋鎮安里橋十八里塘井亭橋鍾家涇上道褐浦橋縣七十二里涇浦橋縣南二十五里諸家橋張潭浦三墩橋三橋相向在縣南二十三里刁家橋沈巷村東宿浦橋縣南三十六里西宿浦橋縣南三十六里望江橋縣東南三十七里跨金龜浦石浦橋縣東南三十里陸虞浦橋縣東南七十里永寧橋縣西南二十里武成橋縣西北三十六里張莊漊橋縣西北三十六里虹橋縣西北二十里跨温焦涇阜康橋巴城村壽安橋縣西二十二里新瀆浦橋縣西南一十五里唐涇橋縣北十八里新塘橋縣北十八里常熟縣橋一百三十四縣橋縣治前元名州橋沈家橋縣治西南又名染子橋市曹橋在沈家橋西舊有市司故名跨塘橋舊名信義在縣治直南宋淳熙十年縣令曽棨建吉州司理叅軍曹緯記𢎞冶間學士李傑建坊於此因名學士橋跨塘橋記琴川去京畿八驛而近境大壤平舟車走集東吳之望邑也東吳澤國千涇萬瀆悠然逝隤然止而皆瀦于三江浮于震澤縈帯而下至琴川分為五浦而後入于海其經絡于闤闠之間旁江而側出者乃其一也舊有橋曰跨塘凡迎肅朝廷之命令接勞四方之賔客摩肩總轡憧憧于逵路者莫不由斯歳籥綿稔雨隳澇毁來往患之邑人欲更為石梁久矣上之人獄訟是務踵武怗視莫肯一屑意淳熙癸夘邑大夫曽公為政之明年也歳物豐成閭里康阜縉紳父老合辭以請公曰衆之所欲茍憚其勞是委民寄于草莽也其可乎然役鉅費夥非號召能集要當以身先乃出公帑之餘為之倡於是逺近士民靡不咸勸協議畢力克伸僝功故材不賦而羡工不發而多曾不逾時汔湊成績公謂是橋之新也玉虹蜿蜒直縣數百步實西南取道之首一境阡陌之會名其可以不稱乃以邑之地名之曰琴川自公改斵蒼珉結址監固而高廣有加也登焉引見則千里在睫晨霏夕靄春穠秋瘠征帆􅗄見飛鳥明滅瓌竒萬態間見層出騷人髙士過之心景宜會則停驂嘯傲躧步㣲吟江山之樂自適於意之表雖簮纓之風臺月榭僊釋之紆巖繚壑兼得之也真所謂處喧囂而接遐曠者歟何向晦而今顯自非公之精識逸韻其能經營裁畫之如是邪且橋梁之興廢先賢以是觀人之政豈細事哉子産以乗輿濟人於溱洧而孟子譏其恵而不知為政公成梁於暇日民無褰裳濡軌之患過子産逺甚濟川之功兆於此矣公天資純粹以文學世其家於書無所不窺施於有政則應機立斷鈎隠察伏洞見精宻而歸于忠厚凡民五過麗刑缿筩投辭有至于庭者涉筆批觧而人無不得其情不以吏追民不以政為吏施設見於日用者先定其規模而後從事庭廡肅如也至若通漕渠而貫艦得以貿遷浚福山白茒二浦溉荒蕪為膏腴興學校而子弟知為善之可樂若是者未易一二而詳大凡天下勝處非人莫傳滁山之林泉以醉翁亭而傳西湖之景物以蘇公隄而傳此橋以公之善政遂為一方之超觀將振耀而傳無窮也邑人求文以識其事公之治績赫赫不可掩何待骩骳之辭蓋人之嚮慕傾戴而不足者非刻之金石無以垂不冺而慰邑人之拳拳也故為之書迎恩橋在縣治東宋建中靖國元年建𢎞治九年知縣楊子噐重修文學橋在縣治東北子㳺巷口舊名言偃橋又名醋庫橋宋慶厯五年録事夏秀建洪武初里人陳貞重建按舊圗經言偃橋在縣東一百五十步文學橋在縣東北一里前志併二橋為一未詳何謂郡人黄士毅撰銘魯鄒而降道為絶學千五百年起濓續洛寥寥閩派久幾復絶再起滄洲教修日掲無極二五在人一源故不同地時生聖賢吳通上國公即游魯胡然厯世莫踵公武覩跡亦昧吁方肇祠是用作記意嚴灑而嗟予小子世閩産吳敢誦所自滄洲之徒登橋而思刻銘述記期我同心如水洊至能令後學本末易明偽行不作踵公自今通濟橋縣治東北俗云坊橋因其接福山塘通大江故名瞿橋縣治東北知縣楊子噐重修舊志有隱仙和風二名尚存以方隅步數度之二橋疑是廣恵橋縣治東北舊名通泰紹興間錢氏新之少卿陳掞名曰廣恵俗名通江慶僊橋縣治西南舊傳為徐神翁昇仙之地故名昇僊橋與慶僊橋對俗名八字橋迎僊橋去前二橋稍南望僊橋迎僊橋南事跡同上顯星橋縣治東南二百五十步宋慶元三年縣令孫應時建舊傳星墜港中化為石故名善利橋縣治西其地多貨易故名孩兒橋縣治西北順民橋順民倉北𢎞治間重修今名倉橋何家橋縣治西舊名和嘉橋東何家橋縣治東北舊名和豐太平橋縣治東南因太平巷名鎮橋縣治南慶元二年縣令孫應時建焦家橋縣治東南舊名通利魚行橋縣治西南寳慶四年王文雍建草橋縣治西南元至正乙亥建中和橋寳慶橋龔家橋范公橋俱在縣治西南廻龍橋焦尾溪上廣義橋焦尾溪上舊名米粞王家橋俱在縣治西黄栢橋市心街北天心橋金家橋包家橋俞家橋俱在縣治西北小洋子橋在邵巷北小虹橋縣治東南俗呼洞橋紅板橋清和橋保安橋俱在縣治東北元至正間建承流橋縣治南門成化間知縣鄧珙建宣化橋縣治北門行春橋縣治東門元至正間建秋報橋縣治西門今廢介福橋縣治北水門外成化間知縣鄧珙建名拱辰富安橋小東門外路通東倉宣徳間縣丞李子亷建成化間知縣甘澤重建改名阜安學士范安記豐樂橋南門外路通南倉宣徳間李子亷建正統間廵撫侍郎周文襄重建殿橋秋報門外跨山塘迎春橋行春橋東元至正間知州盧鎮建成化間知縣鄧珙甃石重建改名熙春練墩浜橋縣治南三里徐涇橋縣治南六里莫門塘橋縣治南九里斜橋縣治南十里魏涇橋縣治南二十里廟塘橋縣治南二十一里潭塘橋縣治南二十四里顧涇塘橋縣治南三十里吳塔橋縣治南三十五里已上九橋𢎞治間重建黄土塘橋張港涇橋俱在縣治南三十里因塘得名小山湖橋縣治西十八里𢎞治十一年新建塘頭橋縣治西南二十里沈店橋縣治西四十里墅橋縣治西北二十五里報慈橋望海門外二里濟民橋北水門外二里正統間周文襄建𢎞治間僉事伍福重修順民橋通江門外四里𢎞治間都御史佀鐘建茅塘橋望海門外十二里尚墅濟民橋廣利橋福民橋俱通江門外二十里禄莊橋通江門外二十四里崔浦橋通江門外五十里永安橋莫城南元延祐間建五瞿橋阜安門外五里戈莊橋縣治東接昆承湖任陽橋縣治東南六十里上社橋縣治東六十五里杏花橋縣治東南七十里塘橋昆承湖南跨時涇轉河橋福山鎮南𢎞冶間建香花橋一在罟里村一在第四都一在四十都尖口橋迎春門外四里新橋迎春門外十二里壽慈橋迎春門外十五里習善橋俗名黄石皮月河橋永慶橋俱梅李鎮僊人橋縣治東北三十六里登津橋縣治東南五十里柴涇橋尚湖南羅㻻橋尚湖南四里九折橋縣治西北十五里東義橋跨清水港西義橋跨避湖涇尚塘橋河陽橋俱第九都坊橋十二都湯家橋二十一都宣徳間湯氏所建葛墅橋元至正間建聚寳橋俱二十二都塢丘山橋二十四都宣徳間巡撫侍郎周文襄建今廢虹橋跨梅李塘前港橋俱二十五都大陸涇橋珍門橋寺涇橋長毫橋陶公橋洪武間建楊塘橋嚴舍橋俱宋端平間建江門橋宋淳祐間建天打石橋俱二十七都貴涇橋在二十八都延祐間建賀勝橋在二十九都東接許浦通大海宋紹興間金人入侵直抵許浦軍左軍李寳駕樓船水戰大勝獻㨗於此因建橋云黄涇橋三十三都孩兒橋元至正間建萬石橋東虹橋西虹橋俱三十七都横瀝塘橋三十八都平昌橋在四十都元至順間謝總管建釋子石橋興信橋與上橋相對俗呼八字橋賨寳橋俱淳熙間建四丫口橋語亷涇東橋俱四十二都富安橋三塘橋俱成化間建在四十三都馬涇橋妳婆橋俱四十四都朱涇橋正統間建張公橋寶慶間建洞涇橋洪武間建廟橋永樂間建俱四十九都吳江縣一百三十一垂虹橋縣東門外一名利徃又名長橋慶厯八年縣尉王廷堅建以木為之東西千餘尺橋中有垂虹亭治平三年知縣孫覺重修紹興間敵人侵淮有建議焚橋者郡守洪遵持不可而縣民相與聚哭圯下不果焚奉定二年判官張顯祖甃以石下開七十二洞洪武元年知州孔克中正統五年廵撫侍郎周文襄相繼修治成化十七年重修學士錢溥記宋錢公輔利徃橋記出姑蘇城南走五十里民屋數百撮然沙渚之上者今吳江縣也東湖之流貫城之中隔限南北横可以渡者今吳松江也隱然長虹截湖跨江便來濟徃安若復道者初作利徃橋也橋本無有慶厯七年冬大理寺丞知縣事李問縣尉王庭堅嗟邑民之陋鮮慕學者將改立至聖文宣王廟侈大黌舘以進延諸生乃呼富民譬曉以奉釋氏不若助縣官興學民始聽且駭居一日心曉意觧驩然從命遂輸緡錢數百萬未幾詔禁郡縣不可新立學二人胥與謀曰民既從財既輸矣倘不能作一利事以便人吾何以謝百姓遂合傭僝工橋役興焉東西千餘尺市木萬計聞者異之沮議百端不兩月功忽大就即橋之心侈而廣之搆宇其上登以四望萬景在目曰垂虹亭並橋之兩涯各翼以一亭而表橋之名於其下使徃而來者可指以稱曰此某橋也初縣城為江流所判民半居其東半居其西晨莫徃歸事無纎巨必舟而後可故居者為不利縣當驛道川奔陸走者肩相摩櫓相接也卒然有風波之變則左江右湖漂泊無所故行者為不便及橋之成行者便而忘嚮所謂不便居者利而忘嚮所謂不利議者皆舌強不敢發噫賢人君子措一意興一役豈直為遊觀之美登賞之樂哉徃徃有悅其景物清絶脫落人世頃者若居之利行之便則茫乎其莫稱也雖然湖光萬與天接白洞庭薦