body:
  text: 姑蘇志卷十四眀王鏊撰户口夫户口之登耗世之治亂見焉爰節舊志所書厯代可考者本朝則載國初與近嵗所上之數他可推矣按史記泰伯奔于荆蠻義而從之者千餘家數亦略已西漢吳郡凡户二十二萬三千三十有八口一百三萬二千六百有四東漢户十六萬四千一百六十有四口七十萬七百八十有二晉户二萬五千宋户五萬四百八十有八隋户一萬八千三百七十有七唐貞觀八年户一萬一千八百九十有九口五萬四千四百八十有一天寶元年户七萬六千四百二十有一口六十三萬二千六百五十有五宋初户二萬七千八百八十有九祥符間户六萬六千一百三十有九元豐三年户一十九萬九千有竒口三十七萬九千有竒宣和間户四十三萬南渡後至淳熙十一年户一十七萬三千有竒口二十九萬八千有竒德祐元年主客户三十二萬九千六百有竒僧道不與元至元二十七年始括户口至四十六萬六千一百有竒僧道亦不與國朝洪武四年抄籍計户四十七萬三千八百有竒口一百九十四萬七千八百有竒九年實在户五十萬六千五百有竒口一百一十六萬四百有竒𢎞治十六年户五十八萬二千有竒口二百萬九千三百有竒七縣一州各有差國初每户各給户帖偹開籍貫丁口産業于上俾民執照軍匠籍例不分户缺役以丁男代補每十年一造冊丁口老死田産賣去開除成丁小口新置産業收入厯觀户口减耗唯唐宋初年為甚時更大亂非死而徙耳若國初户數與元末略等蓋張氏據吳務誘其民民多歸之及天兵入城不妄戮一人故雖更亂猶故也百餘年間宜乎倍蓰而所登不滿十萬則有由矣蓋洪武以來罪者謫戍藝者作役富者遷實京師殆去十之四五近年則又不能無脫漏及流徙他境耳土産吳中物産甚富往往有名天下者或以土地所宜或以人力工巧乃知東南之美不特竹箭而已也生植粳之屬十七箭子稻粒瘦長雪色味香甘晚熟稻品之最髙者紅蓮稻五月種九月收芒紅粒大有早晚二種陸龜䝉詩云近炊香稻識紅蓮䆉稏稻五月種九月熟色斑粒微長雪裏㨂稈軟有芒粒大色白師姑粳即矮稻五月種九月熟無芒粒白早白稻五月初種八月熟皮芒白米赤又一種九月熟曰晚白又名蘆花白麥爭場三月種六月熟與麥爭登場也六十日稻四月種六月熟米小色白遲至八十日熟又名早紅蓮又名救工饑百日赤四月種六月熟芒赤米小而白金成稻四月種七月熟米紅而尖性硬烏口稻再蒔晚熟下品稻也再熟稻一嵗兩熟吳都賦有鄉貢再熟之稻豐嵗稻已刈而根復彂苖再實謂之再撩稻蔣堂詩云經秋田熟再生孫早稻即占城稻二月中旬至三月上旬用竹籠周以稻稈置稻種其中約五斗許又覆以稈入池浸三日伺微熱如甲拆狀則出而布于地及苖與穀等别用寬竹器貯之于耕過田細土停水二寸許布之三日決去水至五日視苗長二寸許復引水浸一日乃插蒔至八月熟中秋稻四月種八月熟紫芒稻五月種九月熟紫穀白粒張方平詩云鱸鱠飯紫芒枇杷紅皮薄色如枇杷下馬看秀時最易一名三朝齊糯之屬十二金叉糯粒長宜釀酒劉夢得詩云酒法得傳吳米好閃西風一名早中秋羊脂糯五月種十月熟色白性軟故名青稈糯四月種九月熟宜良田稃黃芒赤已熟而稈微青故名秋風糯一名瞞官糯每嵗代晚稻以輸租故名趕陳糯四月種七月熟米粒最長矮糯晚熟一名矮兒糯粒白而大四月種九月熟鵝脂糯張方平詩鵝脂酒清醥川梗糯四月種九月熟粒大無芒虎皮糯五月種十月熟色斑羊鬚糯四月種九月熟穀多芒長胭脂糯五月種九月熟穀紅粒白麥之屬六大麥小麥􅢸麥有赤白二色蕎麥舜哥麥紫稈麥豆之屬六白藊豆俗呼為延籬豆謂其引蔓而生諺云延籬花開挾纊子來言此花作寒候可挾纊也紫羅豆五月種九月熟色紫粒大有青黑花紋出嘉定豌豆一名小寒豆九月種三月熟蜀中以此豆之不實者為巢菜雜螺肉作籠餅陸放翁過吳中得小巢作羹賦詩云春行霧雨暗衡茅兒女隨宜治酒肴便覺此身如在蜀一盤籠餅是豌巢蠶豆九月種蠶時熟故名楊萬里翠莢中排淺碧珠甘欺崖蜜軟欺酥沙瓶新熟西湖水漆罍分嘗曉露腴味與櫻梅三益友名因蠶繭一絲絇老夫稼圃方雙學譜入詩中當稼書江豆赤黑色四月種六月熟可為糕又名沿江十八粒刀豆以形名堪入醬為蔬相傳醬瓿中有髮入刀豆則化為水果之屬九楊梅為吳中名品味不减閩之荔支出光福山銅坑第一聚塢次之枇杷出洞庭山初接則核小再接無核櫻桃其出常熟者色微黃名蠟櫻味尤勝白居易吳櫻桃含桃最說出東吳香色鮮穠氣味殊洽恰舉頭千萬顆婆娑拂面兩三株鳥偷飛處銜將火人摘爭時踏破珠可惜風吹兼雨打眀朝後日即應無林檎一名來禽俗呼花紅郡城中多種之海杏大杏也地理志云范蠡宅在湖中有杏大如拳者今吳下杏猶有如小兒拳者栗出常熟頂山味香而美比常栗小名麝香囊張雨新栗寄倪元鎮近從常熟嘗新栗黃玉穰分紫殼開果園坊中無買處頂山寺裏為求來囊成稍比來禽帖酒熟深傾蘸甲杯為奉雲林三百顆也勝酸橘寄書回銀杏即鴨腳子亦多出洞庭俗名白果柿出常熟東鄉者名海門柿出虞山蒂正方色如鞓紅者為方蒂柿梨出洞庭西山者十種密梨林梨張公梨白梨黃梨消梨喬梨鵝梨大柄金花梨太師梨出常熟韓邱者名韓梨橘之屬十一緑橘出洞庭東西山比常橘特大深緑色未霜臍間一㸃先黃而其味已全可啖故名平橘即緑橘差小純黃方可啖其皮可入藥蜜橘品最上塘南橘色紅如血有豬肝鱔血二種脫花甜早紅橘其品稍下真柑亦出洞庭山雖橘之類而品特髙香味超勝浙東諸産悉出其下其木畏霜雪又不宜早故不能多植土人亦甚珍之匾橘吳江村落間多種之實最大以其形匾故名金柑實小如彈丸味帶微酸其本髙三尺許纍纍金色一本千顆惟常熟沙頭最盛别一種稍長者名牛乳柑橙若柚而香木有刺可以芼鮮可以漬蜜香櫞樹髙實大類橙色黃形圓而香芬襲人可搗為湯蘇軾洞庭春色賦安定郡王以黃柑釀酒名洞庭春色猶子麟得之以餉子戲作賦曰吾聞橘中之樂不减商山豈霜餘之不食而四老者遊戲於其間悟此世于泡幻藏千嵗于一斑舉棗葉之有餘納芥子其何艱宜賢王之達觀寄逸想於人寰嫋嫋兮春風泛天宇兮清閒駕洞庭之白浪漲北渚之蒼灣擕佳人而往遊勤霧鬢與風鬟命黃頭之千奴卷震澤而與俱還糅以二米之禾藉以三脊之菅忽雲蒸而霧解旋珠零而涕澘翠勺銀罌紫絡青綸隨屬車之鴟夷欵木門之銅鐶分帝觴之餘瀝幸公子之破慳我洗盞而起嘗散腰足之痺頑盡三江于一吸吞魚龍之神姦醉夢紛紜始知髦蠻鼓包山之桂楫如林屋之瓊關卧松風之瑟縮揭春溜之淙潺追范蠡於渺茫弔夫差之惸鰥屬此觴於西子洗亡國之愁顔驚羅襪之塵飛失舞袖之弓彎覺而賦之以授公子曰烏乎噫嘻吾言夸矣公子其為我刪之白居易㨂貢橘書情洞庭貢橘㨂宜精太守勤王請自行珠顆形容隨日長瓊漿氣味得霜成登山敢惜駑駘力望闕難伸螻蟻情踈賤無由親跪獻願憑朱實表丹誠唐韋應物笞鄭騎曹青橘憐君病後思新橘始摘猶酸亦未黃書後欲題三百顆洞庭猶帶滿林霜皮日休早春橘子寄魯望箇箇和枝葉捧鮮彩凝猶帶洞庭烟不為韓嫣金丸重直是周王玉果圓剖似日魂初破後美如星髓未彤前知君多病仍中聖盡送寒苞向枕邊龜蒙和到春猶作早秋鮮應是親封白帝煙良玉有漿須釀味眀珠無纇亦羞圓堪居漢苑霜梨上合在仙家火棗前珍重更過三十子不堪分付野人邊梅摯新橘千頭霜熟摘來親包貢虔修望紫宸他日功成許髙退社中還結素封人梅之屬十二江梅遺核野生不經栽接一名直腳梅或謂之野梅花踈瘦有韻實小早梅勝江梅二月初開故名官城梅圃人以直腳梅擇佳本接之花遂敷腴亦佳可入煎造消梅與江梅官城梅相似實圓小鬆脆多液無滓不宜熟惟堪青噉古梅樛曲萬狀苔鬚垂於枝間飄飄可愛重葉梅葉重數層花房獨出盛開如小蓮花梅中之竒品也結實多雙尤為瑰異蕚緑梅色純緑枝特青蓋其清髙比九華仙人蕚緑華也百葉緗梅又名黃香梅亦名千葉香梅花葉至二十餘瓣心色漸黃花差小而繁密别有一種芳香比常梅尤濃美不結實紅梅類杏與江梅同開紅白相映閣林初春絶景也西清詩話云承平時紅梅獨盛於姑蘇晏元獻公始移植西岡圃中貴逰賂園吏得一枝分接由是都下有二本王琪守郡以詩遺晏曰館娃宫北舊精神粉瘦瓊寒露蘂新園吏無端偷折去鳯城從此有雙身當時難得如此鴛鴦梅一蒂雙實多葉紅梅也杏梅比紅梅微淡結實匾有斕斑色蠟梅非梅類開與同時色似蜜脾香又相近故名凡三種以子種不經接花小香淡其品最下俗謂之狗蠅梅經接花踈雖盛開花常半含名磬口梅其佳者為檀香梅色深黃如紫檀出范村梅譜白居易郡圃新栽梅池邊新種七株梅欲到花時㸃檢來莫怕長洲桃李妬今年好為使君開宋方惟深紅梅清香皓質世稱竒添作輕紅也自宜紫府與丹來換骨春風吹酒上凝脂直教臘雪無藏處柢恐朝雲有去時溪上野桃何足種秦人應獨未相知張雨蕚緑梅山中古仙子無言春寂寥玉容淡朝雨翠氣濕微宵凌風情玩影㺯雪妬攀條殊覔何郎句還憑舞袖招牡丹之屬十有三觀音紅崇寧紅夀安紅王希紅疊羅紅風矯紅一名勝西施一捻紅朝霞紅鞓紅雲葉紅茜金毬紫中貴牛家黃舊傳朱勔家園內萬本皆以飾金牌記其花名出吳郡志今人家亦有傳其種者王禹稱長洲種牡丹詩偶學豪家種牡丹數枝驚露出朱欄晚來低面開檀口似笑窮愁病長官吳縣􅈦前冬日雙開牡丹歌君不見年年三月千叢媚紫爛紅繁誇勝異尋常人戴滿頭歸醉折狂分不為貴枝閒葉盡根空培人情皆待眀年開花工自有呼魂術霜前喚下瓊瑶臺王母親將金粉傅麻姑齊借霞裳來主人蓋是神仙在不然此物胡為而來哉一姬勸酒誰引滿長洲懶吏先舉杯多感同年與攀折吟詩欲謝難輕發青官校書方遁跡代我作歌如錦拆他年吾輩功業成與君共作騎鯨客乂賦紅牡丹渥丹容貌著霓裾何事僧軒秪一株應是吳宫歌舞罷西施因醉誤施朱朱長文竒姿須賴接花工未必妖華恨洛中應是春皇偏與色却教仙女愧乘風朱欄共約他年賞翠幄休嗟數日空誰就東吳為品第清晨子細閲芳叢菊之屬三十六勝金黃一名大金黃此品最為豐縟而加輕盈花葉微尖條梗纎弱疊金黃一名眀州黃又名小金黃花心極小疊葉穠密狀如笑靨棣棠黃一名金鎚子赤金色酷似棣棠他花不及蓋竒品也疊羅黃狀如小金黃花葉尖瘦如剪羅縠髙枝叢出意度瀟灑麝香黃花心豐腴傍短葉密承之亦有白者似白佛頂而勝之千葉小金錢略似眀州黃花葉中外疊整太真黃花如小金錢加鮮眀單葉小金錢花心尤大開最早垂絲菊花蘂深黃莖柔細風動處如垂絲海棠鴛鴦菊花常相偶葉色深碧金鈴菊一名荔枝菊千葉細瓣簇成小毬條長可以攬結毬子菊如金鈴而小又有小金鈴花極小夏開藤菊花密條柔如藤蔓可以為障亦名棚菊種之坡上則垂裊數尺如瓔珞尤宜水濵十樣菊一本開花形模各異又名十樣錦野菊叢生田間水際單葉瑣細甘菊一名家菊可供蔬茹差勝野菊陸龜䝉所賦即此五月菊花心極大每枝一花徑三寸許夏月開金杯玉盤中心正黃四傍淺白花頭徑三寸菊之大者不過此喜容千葉初開微黃欣然吐艷有喜色久則變白長可引至丈許亦可攬結萬鈴菊中心淡黃鎚子傍白花葉繞之花端極尖香尤清蓮花菊如小白蓮花多葉而無心花蕊蕭散清絶一枝祇一葩葉深緑芙蓉菊開如樓子芍藥茉莉菊花葉繁縟似茉莉木香菊多葉似御衣黃一名腦子菊酴醿菊細葉稠叠比茉莉差小而圓艾葉菊單葉長如蓬艾白麝香似麝香黃而差小韻頗勝白荔枝與金鈴同但花白耳銀杏菊淡白時有微紅杏葉全似銀波斯菊花枝倒垂捲如髮鬈佛頂菊初秋開白色漸變微紅桃花菊未霜即開最為妍麗色在桃杏梅之間胭脂菊類桃花深紅淺紫比胭脂尤重紫菊一名孩兒菊花如紫茸叢茁微香陸龜䝉詠白菊還是延年一種材即將瑶朵冒霜開不如紅艷臨歌扇欲伴黃英入酒杯陶令接籬堪岸著梁王髙屋好歌來月中若有間田地為勸嫦娥作意栽皮日休和已過重陽半月天琅華千㸃照寒煙蕊香亦似浮金靨花樣還如鏤玉錢玩影馮妃堪比艷鍊形蕭史好爭妍無由摘向牙箱裏飛上方諸贈列先龜䝉重憶白菊我憐真白重寒芳前後叢生夾小堂月朵暮開無絶艷風莖時動有竒香何漸謝雪清才詠不羡劉梅貴主粧更憶幽忩凝一夢夜來村落有微霜雜花十九木蘭花詳見木蘭堂白居易詩脂如玉指塗朱粉光似金刀錯紫霞從此時時春夢裏應添一樹女郎花徐凝枝枝轉勢雕弓動片片搖花玉劔斜見說木蘭征戍女不知那作酒邊花海棠皆單葉别有蓮花海棠重葉豐腴如小蓮花范成大自蜀移歸吳中遂有此種吳人沈立嘗撰海棠記一卷成大寄題石湖海棠手開芳徑越城頭紅錦屠蘇結綺樓不把萬枝銀燭照淡雲微月替人愁老懶居家似出家園林春色雨沾沙海棠尚自無心看天女何須更𣪚花芍藥范成大北使過維揚買栽于石湖有深紅紫白諸色千葉重臺數種成大詩萬里歸程許過家移將二十四橋花石湖從此添春色莫把葡萄苜蓿誇山茶開于雪中有單葉千葉之異别有深紅者名寶珠山茶朱長文柏葉元同翠桃顔未比紅留芳占春月㺯蕊耐秋風自稱階庭玩休煩帟幕籠佳萹補韋白流品重吳中珍木何年種繁英滿舊枝開從殘雪裏盛過牡丹時對日心全展淩風幹不欹藥階如賦咏缺此尚相思辛夷葉如柿正二月生花色白帶紫春夏再開初開如筆故又謂之木筆朱長文楚客曽留詠吳都獨擅竒風霆存老幹桃李避芳時名入文房夢功資妙手醫紫微顔色好先占鳯凰池錦帶花長枝密花如錦帶然雖在處有之而吳中者特香王禹稱云花譜謂海棠為花中仙此花品在海棠上宜名海仙禹稱詩云一堆絳雪壓春叢嫋嫋長條㺯晚風借問開時何所似好將繡被覆薰籠何年移植在僧家一簇柔條綴彩霞錦帶為名卑且俗為君呼作海仙花梅摯泥根捧入故吳宫暖力迎隨帶漸紅栽近木蘭殊有意留連文酒繫春風石竹花狀如金錢陸龜䝉詩曽看南朝畫國娃古羅衣上碎眀霞而今莫共金錢鬭買却春風是此花鶯粟花即米囊花有千葉單葉之異成畦種之五色爛然㮋李小花繁縟可愛陸龜䝉賦試問花翁得㮋李之春藂移來砌下出自山中長霑澗雨逈灑巖風曽不得次玉堂而展低艷承畫閣而逞微紅虛在芳菲之數徒干造化之功弱植欹危繁稍襞積一枝上能萬其膚蕚一蕚中自參其丹白且桃以天而蕣以華芍藥為贈兮芙蓉可嘉誰為剪緗綺碎眀霞鳯葆􅖽櫳于水殿霓襟掩苒于雲車靜倚庭楹徐飄蘂氣落幽閨怨别之夢寫空谷遺榮之思初侍東陵聖母冶態嫣妍近亂北燭仙人愁容委墮嗟其結莓苔之地抱林麓之姿蝶善舞而相略鶯能言而見欺香憐墜少蒂戀飄遲當杯者不顧守道者應知請看嵇康髙士傳莫信長安輕薄兒萱草一名紫萱又名忘憂草王子年拾遺記云吳中書生呼為療結花又麝香萱即萱之别種也述異記云香似紅藍甚芳今吳下所植者淡黃色比常萱差瘦香類茉莉為可貴也鼓子花皮日休詩云鼓子花眀白石岸水仙花有單葉千葉者黃庭堅吳郡送水仙花二大本折送南園栗玉花并移香本到寒家何時侍上玉宸殿乞與宫梅定等差宋昆山令葉自彊水晶宫闕雲母軿列仙夜宴曉未闌萬妃倚竹翠袖寒捧黃金杯白玉盤勸酬未足雲中歡天門叫班奏祥鸞驚此綽約落塵寰嫣然花面眀雕欄天香宫態冰雪顔江梅避舍不敢干肯與噲伍羞山礬說以詩伯平章看薔薇紅白雜色多生水邊别有金沙寶相刺紅紫玫瑰金櫻子佛見笑皆其類也又一種黃薔薇格韻尤髙陸龜䝉紅薔薇倚墻當户自橫陳致得貧家似不貧外布芳菲雖笑日中含芒刺欲傷人清香往往生遙吹狂蔓看看及四鄰遇有客來堪玩處一端晴綺照煙新皮日休和誰繡連延滿户陳暫應遮得陸郎貧紅芳掩斂將迷蝶翠蔓飄颻欲藉人低拂地時如墮馬髙臨墻處欲窺鄰秪應是董雙成戲翦得神霞寸寸新二至花葩甚細色微紺開于夏至斂于冬至故名又名如意花梔子色白而香即佛書簷蔔花木香細朵淡黃色垂條匝地一名酴醾宋項彥周天遣司花寶笈開鮫綃散剪碧雲堆芳根移自蠶叢逺薰釀曽隨鳯詔來秖恐飄風撼新竹却驚殘雪觸蒼苔水仙欲逞幽香壓山谷似無詮品才百合有紅黃二種紫薇夏開至秋暮可三月不盡故又名百日紅長春四時相繼開故名芙蓉紅白二種生多傍水陸者為木芙蓉范成大水上晴雲綵蝀橫許多蜂蝶趂船行漁樵引入新花塢兒女扶登小錦城艷粉發粧朝日麗濕紅浮影晚波清誰知搖落霜林畔一假韶光畫不成木之屬六桂吳郡志云桂本嶺南木吳地不常有之唐時尚有植者樂天守郡日謂蘇之東城有桂一株惜其不得地賦詩唁之近世以木犀為巖桂詩人或指以為桂非是按此則桂與木犀當是二種今吳中不復有桂姑因舊志存之白居易詩子墮本從天竺寺根盤今在闔閭城當時應逐南風落落向人間取次生霜雪壓多雖不死荆榛長疾欲相埋長憂落在樵人手賣作蘇州一束柴遙知天上桂華孤試問姮娥有更無月宫幸有閒田地何不中央種兩株皮日休一子落天上生此青璧枝歘從山之幽斸斷雲根移徑挺隱圭質盤珊緹油姿葉彩碧髓融花狀白毫蕤稜層立翠節偃蹇樛青螭影淡雪霽後香泛風和時吾祖在月竁孤真能見貽願老君子地不敢辭喧卑陸龜䝉諷賦輕入植擅名方一枝才髙不滿意更自寒山移宛宛别雲態蒼蒼出塵姿烟歸助華杪雪㸃迎芳蕤青條坐可結白日如奔螭諒無剪憂即是蕭森時洛浦雖有䕃騷人聊自怡終為濟川楫豈在論髙卑栁所在有之吳中嘗得鳯州種垂條拂地婆娑可愛樂天蘇州栁詩金谷園中黃嫋娜曲江亭畔碧婆娑老來處處逰行遍不似蘇州栁最多絮撲白頭條拂面使君無計奈春何栝子松雖産他郡而吳中為多故家有踰百年者或盤結盆盎尤竒亦可沈子而生又有檜樹亦可盤結二種僅可供庭除之玩耳皮日休小松婆娑秖三尺移來白雲徑亭亭向空意已解凌遼敻葉健似虬鬚枝脆如鶴脛清音猶未成紺彩空不定隂圓小芝蓋鱗澀修荷柄先愁被鷃搶預恐遭蝸病結根幸得地且免離離映磊砢不難遇在保晚成性一日造眀堂為君當畢命陸龜䝉擢秀逋客岩遺根飛鳥徑因求飾清閟遂得辭危敻真同柏有心至若珠無脛枝形短未怪鬛簌差難定况密三天風方遵四時柄那興培塿嘆免答鄰里病微霜靜可分片月踈堪映竒當虎頭筆韻叶通眀性㑹拂陽烏胸掄材膺帝命楓似白楊有脂而香謂之香楓厚葉弱枝善搖故字從風葉作三脊霜時色丹又謂丹楓崔信明詩楓落吳江冷槐幹似榆葉細而長花可染郡中有槐樹巷即此種也又有盤結者名盤槐多種官署中冬青樹所在有之陳墓村落間為盛土人種以取蠟竹之屬七金竹紫竹斑竹桃枝竹皮日休詩云桃李竹覆翠嵐溪鳯尾竹慈姥竹叢生俗名慈孝竹哺雞竹皮日休笠澤多異竹移之植後楹一架三百本緑沈森冥冥圓緊珊瑚節欹斜翡翠翎儼若青帝仗矗如紫姑屏摵摵微風度漠漠輕靄生如神語鈞天如樂奏洞庭一玩九藏冷再聞百骸醒有根可以執有􅘽可以馨願稟君子操不敢先凋零陸龜䝉别塢破苔蘚嚴城樹軒楹恭聞禀璇璣化質離青冥色可定雞頸實堪招鳯翎立窺五嶺秀坐對三都屏晴月窈窕入曙烟霏微生昔者尚借宅况來處賔庭金罍縱傾倒碧露還鮮醒若非抱苦節何以偶惟馨徐觀稚龍出更賦錦苞零蔣堂金竹百鎰光寒一徑深潛疑造化鑄成林貪夫或有憑欄者不見修篁但見金附笋諸縣皆有之范志所謂哺雞竹笋以其蔓延如雞之哺子也俗稱杜園笋皮日休開元寺笋園園鎖開聲駭鹿羣滿林鮮籜水犀文森森競泫林梢雨􅑨􅑨爭穿石上雲並出亦如鵝管合各生還自犬牙分折煙束露如相遺何𦙍眀朝不茹葷陸龜䝉春龍爭地養檀欒况是雙林雨後看迸出似豪當垤㙞孤生如恨倚欄干凌虛勢欲齊金剎折贈光宜照玉盤更待錦苞零落後粉環髙下挶烟寒菜之屬十三菘菜其性凌寒不凋有松之操故字從松唐人所謂濶葉吳菘是也藏菜出郡城肥白而長名箭幹菜冬月醃藏以僃嵗故名烏菘菜春末最盛根盤尺餘葉幹粗濶可曝為乾塌科菜冬月烹芼最佳羊角菜形如羊角油菜冬種春初生薹可食至四月取其子壓油芥菜似菘而有毛其子如粟粒三月間薹長尺餘幹大如指亦可鹽藏又一種名黃農芥矮小味極佳菠菜根赤葉如箭鏃味極甘美相傳其種來自波稜國因名北人所謂赤根菜也蒜處所有之出崇眀者為佳葱薤屬葷菜也出太湖上名湖葱葉濶而鬚長韭菜冬末春初細縷寸許郡城貴之市為薦新蘘荷俗稱甘露子狀如蠶蛹冬日收藏與菜並蓄可辟蠱病菌即囷多生西山松林下二月生者名雷驚菌其色赤者名猪血菌味皆鮮美瓜之屬六西瓜出跨塘薦福山者曰薦瓜出昆山者曰陽莊瓜福香瓜有金銀二色其形微長有稜又名甜瓜述異記云吳威王時㑹稽生五色瓜梁時吳中亦嵗充貢醬瓜如香瓜而色青可入醬為菹醢之用一種出嘉定清浦者特堅脆東瓜王瓜生瓜水實之屬五菱王氏武陵記云兩角曰菱四角三角曰芰其葉似荇白華赤實其華晝合宵炕隨月轉移猶葵之隨日也舊說鏡謂之菱花以其面平光影所成又有紅白二種白者名餛飩菱惟長洲一種出顧邑墓特大而美謂之顧窑蕩昆山一種如顧窑蕩而味略减謂之婁縣菱今訛為留逺唐東嶼交遊萍荇似菰蒲懷玉藏珍類隱儒葉底祇因頭角露此生不得老江湖芡實葉似荷而大俗名雞頭狀類雞首也出吳江者殼薄色緑味腴出長洲車坊者色黃有粳糯之分楊萬里江妃有訣煮真珠菰飯牛酥軟不如手劈雞腮金五色盤傾驪頷琲千餘夜光眀月供朝嚼水府靈宫恐夕虛好與藍田餐玉法編歸辟穀赤松書藕出吳縣黃山南蕩者佳唐蘇州進藕佳者名傷荷藕或曰葉甘為蟲所傷以長冥根又多生重臺蓮花蓋藕嫩則易傷食之無滓他産不滿九竅此獨過之趙嘏秋日吳中觀貢藕野艇幾西東清泠映碧空褰衣來水上捧玉出泥中葉亂田田緑蓮餘片片紅激波才入選就日已生風御潔玲瓏膳人懷拔擢功梯山謾多品不與世流同葧臍即鳬茨出華林者色紅味美不能耐久出陳灣村者色黑而大帶泥可以致逺性可軟銅茨菰本草名烏芋生稻田中溪芼之屬四蓴菜出吳江味甘滑四月生葉似鳬葵莖如叉股短長隨水淺深名為絲蓴即張翰所思者楊萬里鮫人直下白龍潭割得龍公滑碧髯曉起相傳蘂珠闕夜來却失水晶簾一杯淡煮宜醒酒千里何須更下鹽可是士衡殺風景郤將羶膩比清纎髙啓紫絲浮半滑波上裛秋風憶共香菰薦吳江葉艇中韓奕采蓴春浦作羮嘗玉滑絲柔帶露香莫笑張翰未知味秋風起後卻思鄉茭白即菰也八九月間生水中味美可啖中心生薹如小兒臂名茭手或名茭首以根為首也各縣有之惟吳縣梅灣村一種四月生名吕公茭茭中生米可作飯即菰米飯也然今未有作飯者許景迂翠葉森森劔有稜柔條鬆甚比輕冰江湖若借秋風便好與蓴鱸伴季鷹荇菜似蓴所結子爛煮之味甘如蜜祭荇酥士大夫不之知遂為野人漁父所食芹生春澤中潔白有節其氣芬芳髙啓飯煮憶青泥羮炊思碧澗無路獻君門對案成三歎藥之屬二十四白芷一名藥香草也春生多在下濕地葉紫花白微黃入伏結子立秋苗枯采其根曝乾本草云出吳地者良故名吳白芷陸龜䝉採藥賦藥白芷也香草美人得以比君子定情屬思聊為賦云日上融冷春歸飾荒覩一時之流恨托萬古之遺香問人則不唐不宋說地則非楚非湘搴其榮煙携而動色擢其體雪挺而騰光諷畔牢愁子雲于焉華皓吟哀時命曼倩由是摧藏惰思矜年慵情畏晚胡繩繫晷以難駐藒車載春而不返陋君折楊栁須為送行陋君采芙蓉仍勞贈逺豈知隂晴互出雅艷相迎恨回鳯喜怒忿鴻驚待笑者青琴時號顧謂者碧玉為名偷襞積競縈楹目斜柯而水怯鬚疊葉而雲爭蘭在口以時聞嬌如連瑣黃牽心而不定飄若懸旌契叩難申融怡暗許石能潛遁以求偶山亦浮來而命侣誓不為巖阿竹冉冉孤生誓不為澗底松亭亭獨處于是欺皓本掩湘蕤房紅者自破帶綜者誰披望懷沙之浦詠遺襟之詞煙分而麝墨猶濕綺斷而龍刀合知祗言長信長門年年可恨未必傾城傾國箇箇生悲臨階躑躅以虛徐當户薔薇而約弱蜂咋葉而先盡鶯踶枝而易落未若北堂公子樹芳草忘憂南國佳人佩生香辟惡露茁煙活風條翠謔不知海傍之期逺不信人間之命薄休為上計椽空尋寶叉聊作侍中郎且乘金絡别有廬江小吏蜀郡長卿或支離而築恨或調笑以囊情不同乎禀簮裾而霧悄秉禮義以霜眀鄭交甫則江邊珮解蕚緑華則席上詩成彼怡神而致問皆護節而含貞竦擢自持雖陳辭而往訴遷延却立終抱恨而難平淚滴堪穿腹回好繫蟲織怨以成假酒蠲愁而判劑江僕射之孤燈向壁不少凄迷張記室之少婦當爐還應細麗景方駘蕩思已低摧波疲于子建為使花困于靈均作媒何庶物之相負痛妍華而未回莫與心傷瑶圃從驚鵜鴂如防膽怯空屏宜畫魁堆剩欲追尋徒嗟緬邈杯形連理而終在扇樣合歡而可學若遇劉公伯雅夢亦沉沉如逢王母少黎書還數數薄荷出府學前南園者為佳謂之龍腦薄荷嵗貢京師紫蘇亦出府學前其葉靣背俱紫蛇牀子生太湖旁牽牛有黑白二種枸杞一名仙人杖岸側水隈彌望皆是至秋則結子香附子即莎草根出梅李鎮岡身路者為佳天南星出虞山常春藤生太湖一名千嵗藟青色者佳絡石草一名薜荔蔓生緣樹木生如蓮房麥門冬即沿階草香薷荆芥細莖者佳吳茱茰天花粉即瓜蔞根馬兜鈴其根為木香陳皮出洞庭䕪蘭開白花葉似火麻其根名地笋兔絲子苗名黃絲草王不留行鼠粘子生水傍大葉一名牛傍子鬼箭草出穹窿山中莖有箭翎狶蘞草俗呼火枚草春生苗葉似芥而狹長莖髙二三尺秋初有花如菊秋末結實頗似鶴虱夏採葉曝乾用單服甚益元氣治風疾牛順頭草西山黃堰嶺雜植十三扶芳初生纒繞他木葉圓而厚夏月取葉火炙香煮以為飲色碧緑而香隋大業五年吳郡貢二百本入洛京植之西苑時尚食直長謝諷造食經具四時飲春有扶芳飲芋即蹲鴟大者名芋魁旁生小者為芋妳其苗亦可作菹一種出嘉定名博羅香芋出嘉定南翔色微黃味香美可食别一種引蔓生花花落即生名落花生雖類香芋而味不及山藥即薯蕷子亦出南翔土人種以為産有粳糯二種杞栁出城西楓橋及橫塘者佳其條柔為栲栲細者為箱篋席草冬月種小暑後刈燈草種法與席草同最宜肥田瘦則草細五月刈曝乾以刀劃開其心作燈炷皮製雨蓑苧麻即織白苧布者正月栽五月斫為頭苧七月為二苧九月為三苧黃麻春初種秋收可為布黃草如葛性脆可為布藍出崇眀葉如菘菜土人無不栽惟東沙為盛四月下子至五月剪其葉浸水三兩日漉去柤攪之成青靛已而復生如是者嵗常三四收出郡城者為杜藍天藍苗若苜蓿三四月開碎黃花土人以其子播于大麥地刈麥後則翻入于土最能肥田菅草生沙塗上似藺用織席梱屨鱗之屬二十有一鱸魚即四腮鱸出吳江長橋南者味美肉緊縷而為鱠經日不變出橋北者三腮味鹹肉慢隋煬帝謂金虀玉鱠東南佳味也蘇軾金橙縱使里人知不見鱸魚價自低須是松江煙雨裏小船燒薤搗香虀楊萬里鱸出鱸鄉蘆葉前垂虹亭上不論錢買來玉尺如何短鑄出銀梭直是圓白質黑章三四點細鱗巨口一雙鮮秋風想見真風味秖是春風已逈然鱖魚巨口細鱗狀如松江之鱸是也鯿魚縮項細鱗味甚腴出太湖者尤勝銀魚形纎細眀瑩如銀出太湖土人多鱐以致逺張子野詩云春後銀魚霜下鱸鱠殘出太湖狀如銀魚而大相傳吳王江行食鱠棄餘所化冬月帶子者名挨冰嘯皮日休詩云穩憑船舷無一事分眀數得鱠殘魚白魚出太湖味腴吳中芒種日謂之入梅後十五日入時於時白魚最盛名時裏白鮆魚出太湖狹薄頭大其大者名刀鱭帶子者名鯌子鯉魚諸魚中惟鯉最夀且大吳人謂其小者曰鯉花張雨桃花鱖魚世常有蓴菜鱸魚浪得名試喫江南鯉魚尾候家無此一杯羮鯽魚冬月味美吳俗有寒鯽夏鯉之稱鯖魚有二種烏青草青石首魚出海中其色如金俗名黃魚味絶珍夏初則至以棟花為候諺云棟子花開石首來吳地記魚城下水中有石首魚至秋化鳬又吳録出自婁縣化鳬之說同鯧魚鰳魚鰣魚皆出海中惟鰣魚味極美針口魚形如針口有骨半寸許土人多取為鱐土附似黑鯉而短小附土而行不似他魚浮水故名或作鮒吕子云魚之美者洞庭之鮒是也推車魚一名折船釘冬月見於冰間箭頭魚出新洋江首濶尾狹形如箭鏃蝦虎魚類土附而腮紅若虎善食蝦俗名新婦女河豚魚有毒烹調失宜能殺人吳人甚珍之謂其脅為西施乳梅聖俞詩春洲生荻芽春岸飛楊花河豚當是時貴不數魚蝦其狀已可怪其毒亦莫加忿腹若封豕怒目如吳蛙庖煎茍失所入嘴為鏌鋣若此喪軀體何須資齒牙持問南方人黨護復矜誇皆言美無度誰謂死如麻我語不能屈自思空咄嗟退之來朝陽始憚餐龍蛇子厚居栁州而甘食蝦蟇二物雖可憎性命無舛差斯味曽不比中藏禍無涯甚美惡亦稱此言誠可嘉范成大河豚歎鯫生藜莧腸食事一飽足腥腐色所難况乃𠂻鴆毒膨亨强名魚殺氣孕慘黷既非養生具宜謝砧凡酷吳儂真差事網索不遺育捐生决下筯縮手汙僮僕朝來里中子饞吻不待熟濃睡喚不譍已落新鬼録百年三寸咽水陸富肴䔩一物不登爼未負將軍腹為口忘計身叨死何足哭作俑者誰歟至今走末俗或云先王意除惡如藝菽逆梟與毒獍嵗嵗參幣玉芟夷入薦羞蓋欲殱種族死生有定數斷命烏可續適丁是時者未易一理局黿鼎子公怒羊羮華元衄異味古所珍無事苦畏縮駢頭訌此語戒諭祇取瀆聾盲死不悟眀智諒已燭斑魚似河豚而小味亦腴介之屬六蟹凡數種出太湖大而色黃殼軟曰湖蟹冬月益肥美謂之十月雄出吳江汾湖者曰紫鬚蟹出昆山蔚洲者曰蔚遲蟹又江蟹黃蟹皆出諸品下吳中以稻秋蟹食既足腹芒朝江為樂蟹採捕于江浦間承峻流緯蕭而障之名曰蟹斷陸龜䝉蟹志蟹水族之微者其為蟲者有籍見于禮經載于國語揚雄太𤣥辭晉春秋勸學等萹考于易象為介類與龜與鱉剛其外者皆乾之屬也周公所謂旁行者歟參于藥録食疏蔓延于小說其智則未聞也唯左氏紀其為灾子雲􅏺其躁以為郭索後蚓而已蟹始窟冗于沮洳中秋冬交必大出江東人云稻之登也率執一穗以朝其魁然後從其所之早夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷斷其江之道焉爾然後扳援越軼遁而去者十六七既入于江則形質寖大于舊自江復越于海如江之狀魚者又斷而求之其越軼遁去者又加多焉既入于海形質益大海人亦異其稱謂矣嗚呼執穗而朝其魁不近于義耶捨沮洳而之江海自微而務著不近于智耶今之學者始得百家小就而不知孟軻荀楊氏之道或知之又不汲汲于聖人之言求大中之要何也百家小說沮洳也孟軻荀楊氏聖人之瀆也六籍者聖人之海也茍不能捨沮洳而求瀆由瀆以至于海是人之智反出于水蟲下能不悲夫吾是以志蟹皮日居休蟹寄魯望紺甲青筐染菭衣島夷初寄北人時籬定有石帆覺失伴唯應海月知族類分眀連瑣􅖜形容好箇似蟛蜞病中無用雙螯處寄與夫君左手持陸龜䝉藥杯應阻蟹螯香郤乞江邊採捕郎自是揚雄知郭索且非何𦙍敢餦餭骨青猶似含春靄沫白還疑帶海霜獨作南朝風雅客夜來偷醉早梅傍宋祁謝客惠吳蟹秋水江南紫蟹生寄來千里佐吳羮楚人故使𠂻留甲齊客何妨死願烹下筯未休資快嚼扶螯有味散朝醒定知不作蟛蜞誤曽厠西都博士名梅堯臣謝吳正仲遺蟹年年收稻買江蟹二月得從何處來滿腹紅膏肥似髓貯盤青殼大于杯定知有口能噓沫休信無腸便畏雷幸與陸機還往熟每分吳味不嫌猜沈偕寄賈耘老黃粳稻熟墜西風肥入江南十月雄橫跪蹣跚鉗齒白圓臍吸脅斗膏紅虀須園老香研柚羮藉庖娘細劈葱分寄橫塘溪上客持螯莫放酒杯空髙似孫天雨洞庭霜寒驅蟹力忙全然空俗味祇是作詩香酒已方才熟橙猶未肯黃讓渠茶竈火和月煮滄浪蟛螖蟹屬而小吳人呼為彭越蓋語訛也二三月出于海塗土人以鹽藏貨之蛤蜊産于海口有紫緣者佳梅堯臣紫緣常為海錯珍吳鄉傳入楚鄉新樽前已奪霜螯味當日蓴羮枉對人蟶出海邊似蜆而長沈周海户求鮮食填筐管族繁杴泥深詣窟緣殼暗鈎門橢玉容生摘凝酥怯過燔著薑求打合漬酒與溫存角聳蠻姬髻纑纒拙婦魂味叨人口腹菑纍爾兒孫比類憐吹喣含津憶吐吞庭霜委故蛻沙雨沒虛㾗薦爽山杯後休將蠣蛤論白蜆出白蜆江海螄出海中土人熟而市之羽之屬四鵁鶄水禽也黑襟青脛丹瓜噣色幾及項陸龜䝉詩詞賦曽誇鸀鳿流果為名悮别滄州雖䝉靜置踈籠晚不似間栖折葦秋自昔稻梁髙鳥畏至今圭組野人讐防微避繳無窮事好與裁書謝白鷗鶴媒吳中弋人嘗養一馴鶴以草木葉為盾挾弓矢以伺之鳥見鶴同類狎之無猜疑遂為矢所中陸龜䝉鶴媒歌偶繫漁舟汀樹枝因看射鳥令人悲盤空野鶴忽然下背翳見媒心不疑媒閒靜立如無事清唳時時入遙吹徘徊未忍過南塘且應同聲就同類梳刷宛若相逢喜秖怕才來又驚起窺鱗咏藻共低昻何意當胸流一矢媒歡舞躍勢離披似諂功能邀弩兒雲飛水宿名自物始得害羣由爾為而况人間有名利外頭笑語中猜忌君不見荒坡野鶴陷良媒同類同聲真可畏三黃雞出嘉定味特美喙足皮俱黃故名黃雀出海邊每嵗冬初西風急則千百成羣自江外飛至石之屬八太湖石出西洞庭生水中嵗久為波濤所衝皆成嵌空鱗鱗作靨名彈窩實水㾗也沒人縋下鑿取極不易得石性溫潤扣之鏗然如鐘磬聲自唐以來貴之其在山上者名旱石雖竒巧不甚貴樂天品牛僧孺家諸石以太湖為甲乙丙丁四等自為記宋朱勔進太湖石役夫皆官承節郎及金帶而封石為盤固侯白居易記古之達人皆有所嗜𤣥晏先生嗜書嵇中𣪚嗜琴靖節先生嗜酒今丞相竒章公嗜石石無文無聲無臭無味與三物不同而公嗜之何也衆皆怪之某獨知之昔故友李生名約有云茍適吾意其用則多誠哉是言適意而已公之所嗜可知之矣公為司徒保釐河洛治家無珍産奉身無長物唯東城置一第南郭營一墅精葺宫宇謹擇賔客道不茍合居常寡徒遊息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉今公之所嗜者甲也先是公之僚吏多鎮守江湖知公之心唯石是好乃鈎深致逺獻瓌納竒四五年間纍纍而至公于此物獨不廉讓東第南墅列而置之富哉石乎厥狀非一有盤拗秀出如雲邱仙雲者有端儼挺立如真官神人者有縝潤削成如圭瓉者有廉稜鋭劌如劍㦸者又有如虬如鳯若跧若動將翔將踴如鬼如獸若行若驟將攫將鬭風烈雨晦之夕洞穴開塏若欱雲噴雲嶷嶷然有可望而畏之者煙霽景麗之旦巖㠋霮䨴若拂嵐撲黛靄靄然有可狎而玩之者昏曉之交名狀不可撮要而言則三山五嶽百洞千壑覼縷簇縮盡在其中百仭一拳千里一瞬坐而得之此所以為公適意之用也常與公迫觀熟察相顧而言豈造物者有意於其間乎將胚渾凝結偶然成功乎然而自一成不變已來不知幾千萬年或委海隅或淪湖底髙者僅數仭重者殆千鈞一旦不鞭而來無脛而至爭竒騁怪為公眼中之物公又待之如賔友親之如賢哲重之如寶玉愛之如兒孫不知精意有所召耶將尤物有所歸耶孰為而來必有以也石大小其數四等以甲乙丙丁品之每品有上中下各刻于石之隂曰牛氏石甲之上丙之中丁之下噫是石也百千載後散在天壤之內轉徙隱見誰復知之欲使將來與我同好者覩斯石覽斯文知公之嗜石之自㑹昌三年五月丁丑記李蘇州遺太湖石竒狀絶倫因題二十韻奉呈夢得樂天陳洙賦客有嗜太湖石者圖其形示余命為賦其辭曰江之東直走數百里有太湖兮澄其清湖之浪相擊幾千年有頑石兮醜其形徒觀夫風撼根折波流勢橫神助爾怪天分爾英駭立驚犀低開畫屏素煙散而復聚蒼苔死兮又生譬夫枯槎浮天黑龍飲水鬼蹲無狀雲飛乍起稚戲擕手獸眠盤尾大若防風之骨竅如比干之心密房萬穿秋山半尋子都之㦸前其鐓韓稜之劍利于鐞若乃湖水無邉湖天一色露氣曉蒸蟾津夜滴伊爾堅姿峭兮寒碧千怪萬狀差難得而剖悉我將吊范蠡于澤畔問伍員於波際原君厥初何緣而異公侯求之如張華之求珠衆人獻之如卞和之獻玉植于庭囿視之不足噫爾形擁腫兮難琢眀堂之礎爾形中虛兮難刻鴻都之經用汝作礪兮汝頑厥姿攻汝為磬兮汝濁其聲亡所用之而時人是寶余獨掩口盧胡而笑子之醜程俱採石賦建中靖國元年以修奉景靈西室下吳興吳郡採太湖石四千六百枚而吳郡實採于包山某獲目此瑰竒之産謹為賦云吳吏採石於包山也洞庭鄉三老趨而進揖而言曰惟古渾渾物全其天金藏于穴珠安于淵機械既發剖蚌椎礦不翼而飛無脛而騁刳山探海階世之競乃若富媪贅瘤則為山嶽茂草木于毛膚包嶄巖于骨骼與瓦甓其無間何于焉而是索今使者窺復穴蕩沈沙搜竒礓於洞腳劂巧勢於邱阿呼靈匠以運斤指陽侯使息波竪江山之㠋㠋續劍閣之峩峩莫不剔山骨拔雲根真女屹立伏虎晝奔督郵攘袂以相睨令史臨江而抗尊雖不遭于醯沃豈有恨于苔㾗嗟主人之不見似羊牧之猶存何一拳之足取笑九仭之徙勤既而山户蛾集篙師雲屯輸萬金之重載走千里于通津使山以為骨則土將圯使玉以為璞則山將貧煮糧之客歎絶年之無飽談𤣥之老持一法其誰論嘗聞不為無益則用之所以足惟土物愛則民之所以淳怪斯取之安用非野夫之樂聞敢請使者吏呼而語曰醯雞不可與語天蟪蛄不可與論年矧齊侯之讀書豈輪人之得言三老曰極治之世樵夫笑不談王道至聖之門鄙夫問而竭兩端野人固願知之對曰上德光大孝通神眀闡原廟之制妥在天之靈以謂物不盛則禮不僃意不盡則享不精故金瑰琛琲天不祕其寶樟楠楩梓地不愛其生而青州之怪猶未足于充庭故于此乎取之且鑿太行之石英採穀城之文石以起景陽于芳林者魏眀之侈陋也菲衣惡食卑宫室以致美乎祭祀者夏禹之勤儉也上方戒後苑之作緩文思之程示敦朴以正始盡情文而事神此固上德之難名者矣抑嘗聞之闕方將不頓一戈不馳一羽殄醜類於烟埃瞰幽荒于掌股庶黃石之斯在倘素書之可遇抑又聞之三德雖修不遺指佞之草萬國雖和猶豢觸邪之獸蓋邪佞之蠱心猶膏肓之自腠惟屬鏤之無知顧尚方之奚救故將鑄采石以為劍􅏮竪毛於佞首若是則在邊無汗馬之勞在庭無履霜之咎也抑又聞之堯不能無九年之灾湯不能無七年之旱雖隂陽之或差豈閉縱之可緩故將放鞭石于宜都回雨暘於咳眄抑又聞之扶耒之子有土不毛抱甕之老有茅不薅富者侈而貧者惰遊者逸而居者勞雖齊導之有素奈狡兔而是逃故將取嘉石以列坐平罷民於外郊抑又聞之日不蔽則眀川不閼則清聽之廣者視必逺基之固者室不傾方披旒而出黈俾伐鼓而揚旌蓋蕭牆之戒坐逺于千里朽索之馭益危於薄冰矧四者之無告尤聖人之所務故將盡九山之赤石逺萬寓之窮民三老悚然而興曰聖化蓋至此乎吏曰此猶未也若其造化掌中宇宙胸次彌綸兩儀而執天衡燮理二氣而襲氣母此包犧之婦所以引日星之針縷方將鍊五色以補天育萬生于一府既無謝于襄城之師又何驚於藐姑之處吾亦與汝飲隂陽之和而遊萬物之祖矣又何帝力之知哉三老稽首再拜曰鄙朴之人聾瞽其知鹿豕其遊竊億妄議乃命知之唐牛僧孺胚渾何時結嵌空此日成掀蹲龍虎鬭恢怪鬼神驚帶雨新冰淨敲風碎玉鳴攙義鋒刃簇纓絡釣絲縈近水搖竒冷依松助淡清通身鱗甲隱透月洞天眀醜凸隆胡凖深凹刻兕觥雷風疑欲變隂黑訝將行噤瘮微寒早輪囷數片橫地祗愁墊壓鼇足困支撑珍重姑蘇守相憐懶慢情為探湖底物不怕浪中鯨利涉餘千里山河僅百程池堂初展見金玉自風輕側眩魂滋悚周觀意漸平似逢三益友如對十年兄王興添魔力消煩破宿酲嫓人當綺皓視秩即公卿念此園林寶還須别識精詩仙有劉白為汝數逢迎劉禹錫和震澤生竒石沈潛得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏雲勢上漢古槎形拂拭魚鱗見鏗鏘玉韻聆煙波含宿潤苔蘚助新青嵌穴胡雛貌纎鋩蟲篆銘孱顔傲林薄飛勢向雷霆煩熱近還散餘酲見便醒凡禽不敢息浮壒莫能停靜稱垂松蓋鮮宜映鶴翎忘憂常目擊素尚與心冥眇小欺湘燕團圓笑落星徒然想融結安可測年齡採取詢鄉耋搜求按舊經垂鈎入空隙隔浪動晶熒有獲人爭賀歡謡衆共聽一州驚閲寶千里逺揚舲覩物洛陽陌懷人吳御亭寄言垂天翼早晚起滄溟白居易錯落復崔嵬蒼然玉一堆峰駢仙掌出罅拆劍門開峭頂髙危矣蟠根下壯哉精神欺竹樹氣色壓亭臺隱起磷磷狀凝成瑟瑟胚廉能露鋒刃清越叩瓊瑰岌嶪形將動嵬峩勢欲摧竒應潛鬼怪靈合蓄風雷黛潤沾新雨斑眀帶古苔未曽棲鳥雀不肯染塵埃尖削琅玕筍深剜瑪瑙罍海神移碣石畫障簇天台在此為尤物于人負逸才渡江千筏載入洛五丁推出處雖無意升沉亦有媒拔提水府底置向相庭隈對稱吟詩句看宜把酒杯終隨金碾用不學玉山頽疏傅心偏愛園公眼屢回共嗟無此分虛管太湖來逺望老嵳峩近觀怪嶔崟才髙八九尺勢若千萬尋嵌空華陽洞重叠匡山岑邈矣仙掌逈呀然劍門深形質貫今古氣色通晴隂未秋已瑟瑟欲雨先沉沉天姿信為異時用非所任磨刀不如礪搗帛不如砧何乃主人意重之如萬金豈伊造物者能獨知我心煙翠三秋色波濤萬古㾗削成青玉片截斷碧雲根風氣通巖穴苔文護洞門三峰具體小應是華山孫皮日休茲山有石岸抵浪如受屠雪陳千萬戰巖髙下刳乃是天詭怪信非人功夫六丁云下取難甚網珊瑚厥狀復若何鬼工不可圖或拳若虺蜴或蹲如豹貙連絡若鈎鎖重叠如蕚跗或若巨人骼或如天帝符胮肛篔簹筍格磔琅玕株斷處露海眼移來和沙鬚求之煩耄倪載之勞舳艫通候一以眄貴郤驪龍珠厚賜以賝賮逺去窮京都五侯土山下要爾添嵒齬賞玩若稱意爵祿行斯須茍有王佐士崛起于太湖試問欲西笑得如茲石無陸龜䝉他山豈無石厥狀皆可薦端然遇良工坐使天質變或裁基棟宇礧砢成廣殿或剖出溫瑜精光具華瑱或將破仇敵百炮資苦戰或用鏡功名萬古如㑹面今之洞庭者一似非此選槎牙真不材反作天下彥所竒者嵌空所尚者葱蒨旁穿參洞穴內竅均環釧刻削九珠窗玲瓏五眀扇新雕碧霞段旋剖秋天片無力置池塘臨風祇流眄吳融洞庭山下湖水碧波中萬古生幽石鐵索千尋取得來竒形怪狀誰能識初疑朝家正人立又如戰士方狙擊又如防風死後骨又如於莵活時額又如成人楓又如害癭柏雨過上淳泓風來中有隙想得沈潛水府時興雲出雨盤蛟螭今來硉矹林庭上長恐忽然成白浪用時應不稱媧皇將去也堪隨博望噫嘻爾石好慿依幸有方池并釣磯小山叢桂且為伴鍾阜白雲長自歸何必豪家甲第裏玉闌干畔爭光輝一朝荆棘忽流落何異綺羅雲雨飛宋胡宿海岱鉛松妄得名洞庭山腳失寒瓊漱成一朵孤雲勢費盡千年白浪聲誰向機邊逢織女直疑巖下見初平年來賞物多成病日繞蒼苔幾遍行黿山石出洞庭之黿山充碑碣柱礎之用昆山石出昆山縣馬鞍山色白峯巒嵌空玲瓏竒巧土人探穴得之植以蒲苗蕉竹供几案之玩山下亂石可以取火名火石宋曽幾乞崑山石詩昆山定飛來美玉山所有山秪用功深剜劃嵗時久崢嶸出峰巒空洞閉户牖幾書煩置郵一片未入手即今製錦人在昔伐木友曽䝉投繡假尚闕報瓊玖奈何不厚顔尤物更乞取但懷相知心豈但一開口指揮為幽尋包褁付下走散帙列岫忩摩挲慰衰朽㠛村石出靈巖山下可硯佳者不減歙材苑山石出常熟縣亦可為硯揭黃石理粗發墨不滲類䕫石土人刻成硯以草束燒過仍用慢灰火煨之色遂變紫用之與不煨者同亦不燥米氏硯史所云蘇州揭黃石硯是也錦峰石出錦峰山色紫充雜器用永樂間造南京報恩寺塔取此石刻佛像以其天隂雨不潤可粧采色姚廣孝竒峰起蒼旻秀色鬱可采靈石麗文華晴空炫霞彩斕斑駁青暈絪緼雜芳靄朝陽映猶輝夕隂膏還藹或云神州仙鞭驅過滄海不經野火焚詎逐嵗年改肅屐曉飛陟昻然立如待延矚洞幽抱架文時有在砂石諸山俱出而天池者為佳附白石脂出秦餘杭山有五色者蘇州土貢有赤白二色白磰出陽山潔白如粉可用塗堊亦堪入藥山之東北有坑深數十丈轉為隧道危險不可逼視土人鑿而取之范成大銀鬚玉璞紫金精犯難窮探亦有名白堊區區土同價吳儂何事亦輕生造作帛之屬七錦惟蜀錦名天下今吳中所織海馬雲鶴寶相花方勝之類五色眩耀工巧殊過猶勝于古宣德間嘗織晝錦堂記如畫軸或織詞曲聨為帷障又有紫白落花流水充裝潢卷冊之用紵絲出郡城有素有花紋有金縷彩粧其製不一皆極精巧禹貢所謂織文是也上品者名清水次帽料又次倒挽四方公私集辦于此羅出郡城花紋者為貴素次之别有刀羅河西羅紗出郡城素者名銀條即漢所謂方空也花紋者名夾織亦有金縷彩粧諸製輕狹而縠文者曰皺紗綾諸縣皆有之而吳江為盛唐時充貢謂之吳綾舊唐書載天寶中吳郡貢方紡綾大厯六年禁織龍鳯麒麟天馬辟邪等紋其薄而鸞鵲紋者充裝飾書畫之用絹左傳杜預注吳地貴絹鄭地貴紵今郡中多織生絹其熟者名熟絹四方皆尚之花紋者名花絹又有白生絲織成縝密如蟬翼幅廣有至四尺餘者名畫絹又有羅底絹稍厚而密紬諸縣皆有之即繒絞線織者曰線紬撚綿成者曰綿紬比絲攢而成者曰絲紬布之屬八木綿布諸縣皆有之而嘉定常熟為盛藥斑布亦出嘉定縣境及安亭鎮宋嘉泰中有歸姓者創為之以布抹灰藥而染青候乾去灰藥則青白相間有樓臺人物花鳥詩詞各色充帳幔衾帨之用苧布績苧為之漂而熟者名洗白生者為生苧通行天下出太倉者為上昆山次之别有杜織縝密堅久名腰機蓋古有白苧詞其來久矣縑絲布出諸縣合苧與絲比而成之棊花布用青白縷相間織成斜紋布出嘉定麻布績麻為之精粗不等别有熟麻成者曰熟苧黃草布縷黃草為之布之下品也器用之屬十箋唐有魚子箋宋顔方叔嘗創製諸色箋有杏紅露桃紅天水碧俱砑花竹鱗羽山林人物精妙如畫亦有金縷五色描成者士夫甚珍之范成大云蜀中粉箋正用吳法元有春膏水玉二箋魫色尤竒又以絸紙作蠟色兩面光瑩多寫大藏經傳流于世故有宋箋元箋之稱近年所造者幅小于昔雖便于用而無古法陸龜䝉魚子箋搗成霜粒細鱗鱗知作愁吟幸見分向日乍驚新繭色臨風時辨白萍文好將花下承金粉堪送天邊詠碧雲見倚小忩親襞染盡圖春色寄夫君皮日休詩輕如隱起膩如飴除却鮫工解製稀欲寫恐成河伯詔試裁疑是水仙衣毫端白獺脂猶濕指下冰蠶子欲飛若用莫將閒處去好題春思贈江妃宋昆山李衡砑花箋三月江南花滿枝風輕簾燕初飛逰人休惜夜秉燭楊栁隂濃春正歸崔嵬霜幹欲凌雲俯映寒梢數尺春須信蒼然淨眀老坐中客有散花人兔毫筆大者為全肩次為半肩羊毫為大小落墨其法傳自吳興頗精亦行于四方燈往時吳中最多范成大詩有琉璃毬萬眼羅二燈為竒絶他如荷花梔子葡萄鹿犬走馬之狀及擲空有小毬燈滚地有大毬燈又有魚魫鐵絲及麥稈為之者一種名柵子燈在魚行橋盛氏造今不傳即雲南所謂繚絲燈也范成大詠二燈其一萬眼羅龍綜繅水繭魚文縷玉英雨絲風外皺雲紉日邊眀叠暈重重見分光面面呈不深閒裏趣爭識箇中情其二琉璃毬弱骨千絲結輕毬萬錦裝綵雲籠月魄寶氣繞星芒檀點紅嬌小梅粧粉細香等閒三夕看消費一年忙又一絶鏤冰影裏百千光剪綵毬中一萬忩不是齊人誇管仲吳中風物竟難雙華幼武老人燈燦爛衣冠勝後生青藜入市賀升平掃除白髮三千丈透徹丹心一㸃眀側耳笙歌如有聽凝眸珠翠獨無情時人莫道風中燭南極星辰自有名周庚走馬燈何人刻楮作遊龍尾似流星耳逐風皎皎練光馳隙過紛紛逸景顧羣空溝分楚漢驚圍突陳接燕齊訝火紅一躍便當三萬里不知局促在環中紗巾吳中漆者最佳南渡後多尚此又以黃練襯之取其耐褁無掀動之患也范成大嘗製石湖巾使方北以遺館伴田彥皋由是傳于四紗帽胎織藤為之頗精絶雖兩京不逮扇骨出陸墓席出虎邱者佳其次出滸墅或雜色相間織成花草人物為簾或坐席又一種濶經者出甫里藤枕治藤為之頗精出齊門栁箱出吳縣橫塘髹漆為粧奩之用蒲鞋吳人以蒲為鞋草為屨杜荀鶴詩云草屨隨船賣飲饌之屬二十有二酒唐有五酘酒宋有木蘭堂洞庭春今其法不傳惟煮酒以臘月釀貯小瓶旋賣名生泔蒸過泥封為煮酒可以經嵗或入木香豆蔲金橘諸品則各以其類名之香洌超勝轉販四方謂蘇州酒别有白酒名秋露白蓮花白杜茅柴白居易府酒五絶變法自慚到府來周嵗惠愛威稜一事無惟是改張官酒法漸從濁水作醍醐招客日午風微且暮寒春風冷峭雪乾殘碧氊帳下紅罏畔試為來嘗一盞看辨味甘露太甜非正味醴泉雖潔不芳馨杯中此物何人别柔㫖之中有典刑自勸憶昔饑貧應舉年脫衣典酒出江邊十千一斗猶賖飲何况官供不著錢諭妓燭淚夜粘桃葉䄂酒㾗香汚石榴裙莫辭辛苦供歡宴老後思量悔煞君陸龜䝉新醅寄襲美曉壓糟牀漸有聲旋如荒澗野泉清身前古態燻應出世上愁㾗滴合平飲啄斷年同鶴儉風波終日看人爭樽中若使常能渌兩綬通侯總强名皮日休和一簀松花細有聲旋將渠碗撇寒清秦吳祇恐篘來近劉項真應釀得平酒德有神多客頌醉鄉無貨沒人爭五湖煙水郎山月合向樽前問底名梅堯臣謝姑蘇學士寄木蘭堂官醖公田五十畝種秫秋未成杯中無濁酒案上惟丹經忽有洞庭客美傳烏與程言盛木蘭露釀作甕間清木蘭香未歇玉盎貯華英正值菊初拆便來花下傾一飲為君醉誰能解吾酲吾酲已不解百日毛骨輕茶出吳縣西山穀雨前採焙極細者販于市爭先騰價以雨前為貴也昔洞庭出茶嘗入貢水月院茶載圖經續紀皮日休茶塢閒尋堯氏山遂入深深塢種荈已成園栽葭寧記畝石窪泉似掬巖罅雲如縷好是夏初時白花滿煙雨陸龜䝉茶塢茗地曲隈回野行多繚繞向陽就中密背澗差還少遙盤雲髻慢亂簇香篝小何處好幽期滿巖春露曉日休煮茶香泉一合乳煎作連珠沸時看蟹目濺乍見魚鱗起聲疑帶松雨餑恐生煙翠倘把瀝中山必無千日醉龜䝉間來松間坐看煮松上雪時於浪花裏併下藍英末傾餘精爽健忽似氛埃滅不合别觀書但宜窺玉札鮸魚乾膾出海中鱗細紫色無細骨不腥隋大業六年吳郡獻鮸魚乾膾十四瓶浸一瓶可得徑尺盤十所又獻作乾膾法五六月海中取其魚縷切曬乾盛以瓷瓶密封泥欲食開取以新布褁大盆盛井底浸久出布灑郤水則敷然散著盤上又獻鱸魚乾膾法如鮸魚海蝦子大業六年吳郡獻四十挺挺一尺濶二寸厚寸許先取海中白蝦子以小布袋盛末監封之日曬夜則平板壓乾破袋出之包如赤琉璃美勝鰿子又云白蝦一石僅約五升暴殄之酷無烈于此今鰿子猶存而蝦子則人不忍作矣蜜蟹擁劍大業六年吳郡所獻蜜蟹糖蟹之類擁劍即吳郡賦所謂烏賊擁劍者鯉腴䱹出太湖大業二年吳郡獻純以鯉腴為之一瓶用魚四五百頭味過鱣鮪已上諸法皆不得因舊志所載存之炙魚吳越春秋云吳王僚嗜炙魚子胥薦専諸于公子光専諸去從太湖學炙魚法三月得其味因刺王僚蓋吳地産魚吳人善治食品其來久矣水晶繪以赤尾鯉淨洗鱗去涎水浸一宿用新水于釡中謾火熬濃仍去鱗滓待冷即凝縷切沃以五辛醋味最珍俗云牒子魚鮓出吳江以荷葉褁而熟之味勝罌缶名荷包鮓或有就池中荷葉包之白樂天詩就荷葉上包魚鮓庖鱉鱉所在有之而吳中庖烹為佳食市以為竒品蜜煎以楊梅枇杷青梅橙橘之屬蜜漬之成煎出郡城薰楊梅家造者尤精沈周摘落髙林帶雨枝碧煙蒸處紫纍纍肉都不走丸微瘦津略加乾味轉滋鳥口奪生鮮恐爛龍睛藏熟久還宜珍餐品作楊家臘報寄須當費我辭松花餅春夏之交山人取松花調蜜作餅頗為佳勝僧家尤貴之張雨怪來粔籹作鵝黃渾是蒼髯九粒香甜味中邊唯食蜜苦心早晚待休糧仙人騏驥㽜看取道士嵩陽逺寄將笑比紅綾春餤巧齒牙根底嚼糖霜糕搗黍為之楚詞有粔籹其注曰環餅吳人謂糕曰膏環亦謂之寒具方言謂之糕凡數品雪糕花糕生糖糕糖鬆糕焦熱糕甑兒糕之類又有峰糕謂之重陽糕角黍篛褁糯米為之或用菰葉油堆用粉下酵褁糖製如餅油煎食之圓子撚粉為丸范成大詩撚粉團圓意二品俱為元宵節物駱駝蹄蒸麵為之其形如駝蹄重陽節物冷丸用極細粉褁糖煮熟入冷水食之為寒食節物餳以麥芽熬米為之古謂之餦餭楚詞注謂之飴唐人有膠牙餳見陸魯望祀竈解今俗尤所尚總名曰糖出常熟直塘市名葱管糖出昆山如三角粽者名麻粽糖牛乳出光福諸山田家畜乳牛善餉以芻豆取其乳如菽乳法㸃之名乳餅可以致逺四方貴之别㸃其精者為酥或作泡螺酥膏酥花豆生用豆粉揉和如麵乾而鬻之工作之屬十一繡作精細雅潔稱蘇州繡裱禙自兩京外惟吳中為得法宋米南宫畫史有蘇州禙工之名其來久矣銀作出木瀆元朱碧山蟹杯甚竒其法不傳漆作有退光眀光又剔紅剔黑綵漆皆精針作出郡城鐵作自歐冶子鑄劍吳中鐵工不絶今出靈巖山下數家能錬鐵成鋼製刀者資之錫作亦出木瀆舊傳朱象鼻所製為佳銅作亦出木瀆王家其製香毬及鎖皆精巧又有嵌銀壺瓶香爐諸品出常熟木作出吳縣香山永樂時造北京宫殿有蔡某官至司丞蒯某官至侍郎皆香山人泥水作即韓子所謂圬者亦出香山窑作出齊門陸墓堅細異他處工部興作多于此燒造姑蘇志卷十四
