body:
  text: 姑蘇志卷十六明王鏊撰城池凡設險守國必有城池若夫支川曲渠吐納交貫舟楫旁通井邑羅絡則未有如吳城者故雖號澤國而未嘗有墊溺之患信智者之所經營乎其廢置損益列如左府城即闔閭故城自太伯城梅里平墟諸樊徙都於此逮闔閭時子胥謀國始相土嘗水象天法地以築大城周回四十七里吳地記云四十二里三十步寰宇記云三十里陸門八以象天之八風水門八以法地之八卦門之名皆子胥所制東曰婁曰匠西曰閶曰胥南曰盤曰蛇北曰齊曰平時周敬王六年也城門之號見吳越春秋者惟閶蛇望齊越絶書作閶婁平蛇巫胥齊匠具八門之數吳地記作閶胥盤蛇婁匠齊平而封赤不與續經作盤蛇閶胥婁葑將齊而赤平不與今從吳地記自後歷代皆仍其舊至隋楊素徙城橫山東今所謂新郭也唐武德末復還舊城乾符三年王郢之亂刺史張摶重築之梁龍德二年始以甎甃髙二丈四尺厚二丈五尺裏外有濠宋政和中復修治之其故門廢塞者皆刻石為識宣和五年詔加重甃經建炎兵燹淳熙中知府謝師稷又繕完之至開禧間隤圮殆半而池隍亦多為菱蕩稻畦侵齧時史彌遠為常平圖復之嘉定十六年彌遠在相位遂奏請得賜錢粟知府趙汝述沈皥相繼修治為一路城池之最寶祐二年趙汝歷增置女牆補建葑婁齊三門樓開慶元年詔復增築景定末風壞婁齊二樓咸淳初重建元既定江南凡城池悉命夷煙雖設五門蕩無防蔽至正十一年兵起復詔天下繕完城郭監郡六十太守髙履築壘開濠還闢胥門掘土姑蘇驛下得石鐫胥門二字乃重闢之至張士誠入據增置月城國朝平吳更加修築髙廣堅緻度越疇昔今城為亞字形周三十四里五十三步九分髙二丈三尺女牆髙六尺基廣三丈五尺自閶門南至胥門六百三十九丈五尺自胥門南至盤門三百八十八丈七尺自盤門東至葑門一千一百一十八丈自葑門北至婁門八百六十四丈二尺自婁門北至齊門五百八十丈自齊門西至閶門八百九十二丈二尺五寸總計四千四百八十三丈六尺五寸為一萬二千二百九十三步九分南北一十二里東西九里城內大河三橫四直各門上為畫樓周循雉堞每十步為鋪舍內外夾以長濠廣至數丈門皆有釣橋以通出入方故吳時東門不開欲以絶越也唐時八門悉啓劉禹錫詩云二八城門開道路許渾詩云共醉八門回畫舸宋初惟閶胥盤葑婁齊六門寰宇記云水陸十有二門後胥門又廢逮元而復各有水陸門惟胥無水門今因之門置官軍晝夜守衛啓閉而鎖鑰蘇州衛掌焉鄭元祐平江路新築郡城記吳自泰伯至壽夢而始大及王闔閭用子胥而城郭宫室遂為東南雄藩世言泰伯城僅三里二百步在今梅里平墟夫泰伯以天下讓宜其不肯自大其城也及闔閭徙都於是子胥築大城周回四十五里象天法地城邑既完府庫既充遂觀兵上國一傳至夫差而子胥以忠諫死未幾吳為越併更江左六朝以迄於唐末五季歷前後宋要皆以吳為大藩屏世祖皇帝一天下包四海為家六合為宫不設險於區區城郭也至正十一年紅巾賊起汝陽明年春浙東海冦劫崑山廉訪使者朝鮮李公深惟平江賦役供國家經費什之七郡無城郭何以禦冦乃謀於監郡六十公太守髙公時百需出於吳者日不暇給然築城之役則不得已於是㑹司屬僚佐驗民之家資厚薄計量城之長短髙下分築之罷弱户則汰去之豪强而常時役不及者則糾率之寧夏髙公為南臺御史大夫檄庸田僉事馬公董之馬公首捐官帑千錠憲漕水司總府皆捐資以助然太平日久一旦興大工役民十餘萬當盛暑揮鉏如雲下鍤如雨城之大綿延數百雉漫不知何從列楨幹於是公曉以程度矩範而勉以誠慤必若是而後無騫崩之憂民志既齊遂經始於是年夏四月畢工於秋八月城四向一仍子胥之舊水門則仍宋之舊獨啓胥門上建忠孝王廟餘五門上亦皆祠神蓋役興時慮暑雨疾癘為民害乃禱於神以祈佑故列祠以答神貺城之髙以尺計凡二十有三其趾三十有五疊石三層以為固城之面廣大六尺皆甃以甓大瓦作水溝每門建戍樓以謹斥堠嚴烽燧當人馬陟降處皆列置蛾眉甬道門內外構屋設官居之以察非常城於是備矣其先又給中統鈔二百五十貫米一千斛至是合官民用財凡若干萬錠米若干萬斛城既完民大喜有依衛則又相與嘆息言曰廉訪公非有一㕓之宅在吳也然苦心焦思以完斯城者蓋上以為國下以為民也况東吳北瀕大海西南抌震澤於澤國四通五達之衢也郛郭之內官糧貯於廩庾者嵗數百萬設城郭不完冦攘逼近將何以為國計乎今既完城以為衛繼今所以守禦之者則在乎明有司承流宣化蘇民之力以固結其心使吳民愛戴其上如子弟之親父兄夫然後其民以仁義為干櫓禮樂為甲胄人心既固則與此金城湯池並為天險於無窮也已李公名某字某云梁吳均吳城賦古樹荒煙幾百千年云是吳王所遷東有鑄劒殘水西有舞鶴故㕓縈具區之廣澤宕姑蘇之逺山僕本蓄怒千愁億恨况復荆棘蕭森叢羅網蔓亭梧百尺皆歷地而生枝階筠萬丈或至杪而無葉不見春花夏薰唯聞秋蟬冬蝶水魅晨定山鬼夜驚不知四海九州乃復有此吳城虞世南吳都詩畫野通淮泗星纒應斗牛玉牒宏圖表黃旗美氣浮三分開霸業萬里宅神州髙臺臨茂苑飛閣跨澄流江濤如素蓋海氣似珠樓吳趨自有樂還似鏡中遊駱賓王維舟皆楚服振䇿下吳畿盛德𢎞三讓雄圖枕九圍黃池通霸業赤壁暢戎威文物俄遷謝英靈有盛衰行歎鴟夷沒遽惜湛盧飛地古煙塵暗年深館宇稀山川四望是人事一朝非懸劒空留信亡珠尚識機鄞風遙可托關月眇難依西北雲逾滯東南氣轉微徒懷伯通隱多謝買臣歸唯有荒臺路薄暮濕征衣崔融吳門洛渚問吳潮吳門草色饒晚煙楊栁岸春水木蘭橈城邑南溟近星辰北斗遙無因生羽翼輕舉托還飈劉長卿登吳王古臺登古城兮思古人感賢達兮同埃塵望平原兮逺寄目歎姑蘇兮聚麋鹿黃池髙㑹事未終滄海橫流人蕩覆伍員殺身誰不寃竟看暮樹如所言越王嘗膽安可敵遠取石田何所益一朝空謝㑹稽人萬古猶傷甬東客黍離離兮城坡陀牛羊踐兮牧豎歌野無人兮秋草緑園無虛兮古木多白楊蕭蕭悲故柯黃雀啾啾爭晚禾荒阡斷辭兮誰重過孤舟逝兮愁若何天寒日暮江楓落葉去風水自波杜牧二月春風江上來水晶波動碎樓臺吳王宫殿栁含翠蘇小宅房花正開解舞細腰何處往能歌姹女逐誰回千秋萬古無消息國作荒原人作灰吳王舊國水煙空香徑無人蘭葉紅春色自憐歌舞地年年先發館娃宫姚合江城吹角水茫茫曲引邊塵怨思長驚起暮天沙上鴈海門斜去兩三行王安石朝遊盤門東暮出閶門西四顧茫無人但見白日低荒林帶昏煙上有歸鳥啼物皆得所託而我無安棲文天祥樓臺俯舟楫城郭滿干戈故吏歸心少遺民出涕多鳩居無鵲在魚網有鴻過使遂睢陽志安危今若何張羽片帆迢遞入吳烟竹溆蘆洲斷復連栁影濃遮官道上蟬聲多傍驛樓前近湖漁舍皆懸網向浦人家盡種蓮行到吳王夜遊處滿川芳草獨堪憐張泰萬井煙花繞故都闔閭宫苑自荒蕪江魂吼浪空讐越山黛顰秋已破吳臺下草深無過鹿城頭月落已啼烏英雄老去年華在海日曈曈水滿湖閶門取象天門通閶闔風也闔閭欲破楚楚在西北故立閶門以通天氣又名破楚門史傳中或書作昌門俗傳門魯班所造唐宋時樓櫓最盛有李陽冰篆書門額今亡或謂春申君諱破楚之名改昌門又謂為望齊門又謂孔子登東山望吳閶門者皆非又越絶書别有楚門以為春申所造楚人從之故云恐即破楚門耳唐李紳過吳門煙水吳都郭閶門架碧流緑楊深淺巷青翰往來舟朱户千門室丹楹百處樓水光搖極浦草色辨長洲憶作麻衣客曽為旅櫂遊放歌隨楚老清燕奉諸侯花寺聽鶯入春湖看鴈留里吟傳綺唱鄉語認歈謳橋轉攢虹飲波通鬬鷁浮竹扉梅圃靜水檻橘園幽絶渚荒麋苑穿巖破虎邱舊風猶越鼓餘俗尚吳鈎故館曽閒訪遺基亦遍搜吹臺山木盡香徑佛宫秋帳殿菰蒲掩雲房霧露收苧蘿妖廢滅荆棘鬼包羞風月俄黃綬經過半白頭重來冠蓋客非復别離愁候火分通陌前旌駐外郵水風搖采斾堤栁引鳴騶問吏兒孫隔呼名禮敬修顧瞻殊宿昔語默過悲憂義感心空在容衰日異偷還持滄海詔從此布皇猷張繼耕夫占募逐樓船春草青青萬頃田試上吳門看郡郭清明幾處有新煙韋應物獨鳥下髙樹遙知吳苑園凄涼千古意日暮倚閶門白居易閶門四望鬱蒼蒼始覺州雄土俗强千萬夫家供課稅五千子弟守封疆闔閭城碧鋪青草烏鵲橋紅帶夕陽處處樓前飄管吹家家門外泊舟航雲埋古寺山藏色月耀娃宫水放光㑹賞錢塘兼茂苑今來未敢若誇張杜牧遺蹤委衰草行客思悠悠昔日人何處終年水自流孤烟村戍遠亂雨海門秋吟罷獨歸晚烟雲盡慘愁蘇舜欽年華苒苒催人去雲物蕭蕭又變秋家在鳯凰山下住江山何事苦相留米芾二首吳王故苑古長洲潮汐池邊一佇留秀蕙芳蘭無處所亂莞叢葦滿清流蘋風忽起吹舟悍雨打圖書藏裹亂閶逆門咫尺不安流何况盟津與江漢非無輕楫與長橰風逆水適相遭須㬰風回水流順星宿浮槎問月髙朱長文九曲堙淪茂苑荒吳人誰復怨吳王莫嫌故國千秋遠知是仙家幾日長湖上只誇浮海相里中休笑效顰娘舊時芳徑今猶在但屬漁樵自採香范成大閶門調行客日夜飛帆與跨鞍閶門川陸路漫漫人生自苦身餘幾天色無情嵗又寒萬事惟堪六如觀一杯莫信四并難重陽雖過黃花少尚有遲開玉雪團又自閶門騎馬入越城二首日影穿雲亦未濃夜來疏雨洗清空村前村後東風滿略數桃花一萬重斷橋隤岸數家村雨少晴多减漲㾗雪白鵝兒緑楊栁日髙猶自掩柴門倪瓚望中煙草古長洲不見當時麋鹿遊滿目越來溪上水流將春夢過杭州髙啓登五城門登城望神州風塵暗淮楚江山帶睥睨烽火接樓櫓并吞何時休百骨易寸土向來禾黍地雨露長榛莽不見征戰場那知邊人苦馬驚西風笳鳥散落日鼓嗚呼城下水流恨自今古徐有貞二首閶闔門開近帝州麗譙新建倚髙秋人間看生盡三千界天上移來十二樓往事名傳吳伍相平心在漢留侯斗牛宫闕當頭是何必乘槎海外遊碧城樓子聳秋空聲振江山鼓角雄髙下亭臺花霧裏往來舟楫水雲中賦才世豈無王粲飲興時應有庾公雙手可將紅日捧扶桑只在畫闌東胥門一云姑胥門越絶書云外有九曲路闔閭從此遊姑胥臺以望太湖蓋取姑胥山為名也祥符圖經云子胥家于此後抉目懸于門因名宋紹興中作驛館其上亦號姑蘇臺今廢按子胥云懸目東門而此門在西又門名即子胥所命亦不應以己居稱要之前說近是又續記云夫差伐齊胥門巢將上軍以巢所居為號按巢在子胥後其說亦非及吳越春秋稱吳懸子胥頭以懼越軍尤不可信唐皮日休詩青翰虛徐夏思清愁煙漠漠荇花平醉來欲把田田葉盡褁當時醒酒鯖陸龜䝉細槳輕橈下白蘋故城花謝緑隂新豈無今日逃名士試問南塘著履人王安石姑胥郭誤禠雲巾别故山抵吳由越兩間關千家漁火秋風市一葉歸舟暮雨灣旅病悠悠如困酒鄉愁脉脉似連環情知帶眼從前緩更恐顛毛自此斑陳植長堤栁條弄春柔姑蘇臺下馬如流春波溶漾緑潑油官船撾鼓百花洲旌旗睒黲城上樓煙中雉堞髙山邱嗚嗚清角行人愁盤門吳地記云舊曰蟠門蓋嘗刻木為蟠龍以厭越也後記云以水陸縈回屈曲改字為盤後記又云常有龍潜伏於此以鼓仗擊逐之即今五樓門是也續志云舊有樓吳說題額今廢祥符圖經以此為蛇門者誤許渾詩無處登臨不繫情一慿春酒醉髙城暫移羅綺見山色才駐管絃聞水聲花落西亭添别夢栁隂南浦促歸程前期迢遞今宵短更倚朱闌待月明蘇舜欽夜出盤門紺紬暮見黃金鈎珠璣磊落澄不流紛紛媚景動波上的的遠勢生沙頭前山暫昏漁唱息唯有疏葦吟窮秋豫方弭楫對此景時欲乘興長城遊青娥蕩槳忽逺至雖有雅約猶嚬羞綵舟鮮明四窗闢蘭酎辛滑佳賓留歌餘清洌貫衆耳笑動姿采生香㡚玉盤鱠鱸光一色餖簇肴核隨所搜河斜參倒氣愈浩我起飲子子必酬共知此㑹不易得邂逅得此難再求區區才知自勞役擾擾塵俗多悲憂已醉更歌更起舞明日分散空離愁范成大晚入盤門人語嘲喧晚吹涼萬窗燈火轉河塘兩行碧栁籠官渡一簇紅樓壓女牆何處採菱聞度曲誰家拜月認飄香輕裘駿馬慵穿市因倚蒲團入睡鄉張紳朝出盤洲門觀兵具區外黃龍分兩翼𤣥甲列五衛軍威畫角振殺氣飛鳥退三門將已發三壘法更祕秋清太白髙天黑攙搶墜犀從蛟室騰蛇向馬脊蛻雲翻風伯旗雨雜川后珮無戰乃天功六合不足制赤門以南面屬火方故名今南城下有大溝外濠之水從此入祝橋以出燕家橋即赤門水道也祥符圖經云赤門外有淡臺湖今盤葑二門間有赤門灣府圖指蛇為赤者誤蛇門在已方故云又吳越春秋云闔閭立蛇門以象地户欲并越故立此以制之吳地在辰其位為龍故子城南門上反羽為兩鯢繞以象龍角越在已其位為蛇故南大門上置木蛇北首向內示越屬吳也吳地記云春申君作蛇門以禦越軍不足據吳越春秋云勾踐歸國夫差送於蛇門之外舊經云門上為龍形勾踐作雷門以勝之紹興中胡舜申請此門直開作吳門忠告一篇曰吳城以乾亥山為主陽山是也山在城西北屹然獨髙為衆山祖傑立三十里之外其餘岡阜纍纍如羣馬南馳皆其支隴城居隴前平夷如掌所謂勢來形止全氣之地也如秪自城中觀之則城中之地亦唯西北最髙是乾亥無疑乾為天亥則紫微帝座所次是謂貴龍此城既主是山法當用金局乾亥於大五行屬金故也山如此水則當與山相應此邦水勢自東南貪狼西南及正西武曲以至西北巨門等位來其來皆原於太湖由正北廉真及正東東北祿存而去以入于江而歸之海其來去無一不合金局之法故自古常為大郡國今為行都藩輔而吳中人物繁夥冠蓋崢嶸所以常甲於東南今觀水之流𣲖常自閶盤二門入即西南西北水也由葑婁齊三門出即正東正北東北水也其於來去之法固合然所以導迎善祥氣者尚有缺然蓋胥塘自正西帝旺來是謂武曲之水本由胥門入運河自吳江東南長生來是謂貪狼之水本由蛇門入頃嵗乃塞胥蛇二門而生旺之水遂不得朝鄉城中此其為害明隂陽風水者常嘆惜於斯胥塘之水尚由閶盤二門委曲而入城東南長生之水乃環城而東徑由葑門之外以出於城中了不相關此尤可嘆惜故自頃以來城市蕭條人物衰歇富室無幾且無三世能保其居安土宦達者比承平時寢少至建炎之禍一切掃地至舉城無區宅能存數百千年未之有也按地里法生旺二水利害最切猶人身氣血榮衛今塞絶之能安强乎明知者願圖回其事復開二門導水入城以幸此邦可也胥門適當姑蘇新館勢不可動又武曲但主財富而已蛇門之水為貪狼主文筆官職之事於理為重復開之便政和修城於諸故門雖已塞然皆刻石於右以識今石刻具存但襲府圖之誤以蛇門為赤門爾蛇門在城之已方故以蛇名赤門以在城正南至陽之地其義可考况蛇門直南正對吳江運河今舟船自南來非東入葑門即西入盤門皆迃遠十數里於水行非便昔吳王闔廬始作城吳子胥實規畫之立水陸門各八其後諸門開閉不常吳時欲以絶越遂不開東南門即蛇門也不知塞絶生氣故終為越所滅兹亦明效大驗至吳晉李唐時諸門未嘗不開故左太冲賦吳都有通門二八水道陸衢之語劉夢得詩亦曰二八城門開道路故晉唐時吳下最為雄盛今所啓門者五餘皆閉塞而甚不可塞者唯蛇門究所以閉塞圖經之說為其多途艱於守衛幾禁噫抑末矣今清蹕暫駐錢塘吳尤當開東南之門以伸朝拱之義焉吳城門不常啓閉舊矣昔年蓋嘗於八門之外又開赤平二門而葑門陸衢蓋嘗塞矣范文正公守郡始命闢之往來至今為便誠能遠跡晉唐近效文正復闢蛇門東南虛秀之氣疏導迅發儒道利亨文物之盛非復今日吳下矣乾道甲申冬沈度守郡與舜申舊同寮知其說心善之明年春邦人以為請度即命官吏行視其處將以十二月乙丑啓蛇門部置已定㑹屬邑輒呼帶郭民户悉具畚鍤剋期赴役號召隱然有異意者以為擾民度避謗乃止淳熙乙未春韓彥古為守其秋邦人申前請彥古欣然從之于以九月十二日庚寅差役八月彥古罷是時舜申年八十五矣慨然惋惜謂天時人事難合如此復為後序告來者詞贅不録葑門續記云吳有葑田謂茭土樛結可以種殖者也此門外瀕水故名或謂之封門取故永安縣封禺山名又名鱄䱐門史記正義云闔閭城無東門俗傳伍員見夢越軍令從東南入越乃開渠自城東入名示浦門曰鱄䱐又子胥傳注亦云越開示浦子胥以濤蕩羅城開此門有鱄䱐隨濤入故名門嘗湮塞范文正公守郡闢之今吳音呼葑如富反葉適詩遺墨固藏神希聖非立我斷後輒無前實右即虛左品定賦纎洪義明分勇懦端木語衛文洙泗皆仰左孔子叙夷齊後進尚嵬瑣從來一大事幾作鴻毛荷知非言所及結網魚受課誰持空空質故縱無不可兹門小精廬荒寂衆萬過欣豫二三子拙力守饑卧楊花安得攬飛去天隅唾唯有露垂垂滿畦紅藥墮匠門又名干將門闔閭使干將於此置冶鑄劒故名此門水陸二路皆出海道通大海沿松江下滬瀆今廢而婁葑之間尚有匠門塘直東又有歐冶廟干將墓或但云將門意聲之訛或省稱也婁門以直秦婁縣而名吳地記婁别作疁范志云今崑山縣東北三里許有聚落尚名婁縣齊門吳越春秋云闔閭十年既破齊齊以女為質吳為太子波聘之齊女少日夜號泣成疾闔閭乃造北門令女往遊其上因名曰望齊門此即齊景公涕泣女吳事吳地記作太子終纍及九層飛樓之說皆非平門一名巫門吳地記云平門水陸並通出毗陵等道吳伐齊從此出軍因號平門今有平門塘一云巫咸所葬故又號巫門或謂平巫字畫近耳王賓詩商家太戊有賢臣葬在平門野水濱寒食杏花風雨裏一杯椒糈奠何人子城附子城在大城內東偏相傳亦子胥所築周十二里髙二丈五尺五寸厚二丈三尺越絶書云小城門三皆有樓其二增水門其一增柴路今呼為柴巷虞氏家記云小城白門闔閭所作始皇時守宫吏燭燕窟失火燒宫而門樓尚存歷漢唐宋皆以為郡治今樵樓西小石橋是子城泄水溝石上所刻𨽻書有唐乾符二年七月十四日建併勾當料匠等姓名張士誠僭竊時為太尉府繼經敗燬城夷圮略盡今獨存南門頽垣上置官鼓司更覆以小舍及列十二辰牌按時易之郡人呼為鼓樓城四面舊有水道所謂錦帆涇也今亦多淤其東尚存故蹟稱為濠股崑山縣城相傳吳子壽夢所築後惟樹竹木為柵至宋猶然元至正十七年方國珍犯境始築土城禦之髙一丈八尺周一十二里二百七十八步濠深五尺廣六尺城有六門𢎞治四年知縣楊子器建樓其上名東曰賓曦西曰留暉南曰朝陽北曰拱極東南曰迎薰西南曰麗澤常熟縣城初亦列竹木為柵祥符經云周二百四十步髙一丈厚四尺建炎間知縣李闓之始建門五東行春西秋報南承流北宣化東北介福元築土城周一萬四千八百四十丈闢門十一至元十六年張士誠重甃以甎髙二丈二尺厚一丈二尺周九里三十步復增闢小東門今門六行春秋報阜民即舊承流拱辰即舊宣化俗呼北旱門通江即舊介福俗呼北水門阜安即小東門吳江縣城梁開平間錢鏐築後廢宋嘉祐二年知縣裴煜復建南北二門元至正十二年知縣札牙進重建北門十六年張士誠重築髙二丈八尺厚一丈五尺周五里二十七步四門各以方名陸門四水門三成化間知縣陳堯弼重建城樓嘉定縣城宋嘉定十二年知縣髙衍孫築元至正十六年張士誠遣其將呂珍再築周一千六百九十四丈一尺八寸濶三丈髙一丈五尺濠濶二丈深五丈門四東曰晏海西曰合浦南曰澄江北曰朝京吳淞江守禦千户所城在嘉定縣東南四十里洪武十九年縈陽侯鄭遇春等築土為之周五里一十四步二十二年千户施鎮永樂十六年都指揮谷祥張翥等相繼增築髙二丈七尺四方各闢門一太倉州城元至正十七年張士誠遣其將闕築髙二丈廣三丈周一十四里五十步濠深一丈五尺廣八尺陸門七曰大東小南大南小西大西小北大北水門三曰大東小西大西其後門與樓俱廢成化十八年都指揮同知郭鋐復建大南門樓崇明縣城元至正間所築已圯于海永樂十九年知縣髙居正王瑛繼創今城初壘土為之周九里三十步濠廣十一丈宣德初始甃以甎周一千六百十八丈正統八年都指揮使翁紹宗復增門樓四角樓四警鋪三十門四東曰寧洋西曰承恩南曰迎薰北曰安順附吳都賦左思東吳王孫囅然而咍曰夫上圖景宿辨於天文者也下料物土析於地理者也古先帝代曾覽八紘之洪緒一六合而光宅翔集遐宇鳥策篆素玉牒石記烏聞梁岷有陟方之館行宫之基歟而吾子言蜀都之富禺同之有偉其區域美其林藪矜巴漢之阻則以為襲險之右徇蹲鴟之沃則以為世濟陽九齷齪而算固亦曲士之所歎也旁魄而論都抑非大人之所壯觀也何則土壤不足以攝生山川不足以周衛公孫國之而破諸葛家之兹乃喪亂之邱墟顛覆之軌轍安可以儷王公風烈也玩其磧礫而不窺玉淵者未知驪龍之所蟠也習其敝邑而不覩上邦者未知英雄之所躔也子獨未聞大吳之巨麗乎且有吳之開國也造自泰伯宣於延陵蓋端委之所彰髙節之所興建至德以創洪業世無得而顯稱由克讓以立風俗輕脫屣於千乘若率土而論都則非列國之所觖望也故其經略上當星紀拓土畫疆卓犖兼并包括于越跨躡蠻荆婺女寄其曜翼軫寓其精指衡嶽以鎮野目龍川而帶坰爾其山澤則嵬嶷嶢屼巊溟鬱􅔍潰渱泮汗滇㴐渺漫或湧川而開瀆或吞江而納漢磈磈䃬䃬滮滮䃢碒乎數州之間灌注乎天下之半百川𣲖别歸海而㑹控清引濁混濤并瀨濆薄沸騰寂寥長邁濞焉洶洶隱焉礚礚出乎大荒之中行乎東極之外經扶桑之中林包暘谷之滂沛潮波汩起回復萬里歊霧漨浡雲蒸昏昧泓澄奫潫澒溶沆漾莫測其深莫究其廣澶湉漠而無涯總有流而為長瑰異之所叢育鱗甲之所集往於是乎長鯨吞航修鯢吐浪躍龍騰蛇蛟鯔琵琶王鮪鯸鮐鮣龜鱕䱜烏賊擁劒鼊鯖鰐涵泳乎其中葺鱗鏤甲詭類舛錯泝洄順流噞喁沈浮鳥則鵾雞鸀鳿鸘鵠鷺鴻鶢鶋避風候鴈造江鸂䳵鷛􅖥鶄鶴鶖鶬鸛鷗鷁鸕泛濫乎其上湛淡羽儀隨波參差理翮整翰容與自玩雕啄蔓藻刷蕩漪瀾魚鳥聱耴萬物蠢生芒芒黖黖慌罔奄歘神化翕忽函幽育明窮性極形盈虛自然蚌蛤珠胎與月虧全巨鼇贔負首冠靈山大鵬繽翻翼若垂天振蕩汪流雷抃重淵殷動宇宙胡可勝原島嶼綿邈洲渚慿隆曠瞻迢遞逈眺冥濛珍怪麗竒隙充徑路絶風雲通洪桃屈盤丹桂灌叢瓊枝抗莖而敷蘂珊瑚幽茂而玲瓏層岡重阻列真之宇玉堂對霤石室相距藹藹翠幄嫋嫋素女江婓於是往來海童於是宴語斯實神妙之饗象嗟難得而覼縷爾乃地勢坱圠卉木髮蔓遭藪為圃植林為苑異荂蓲蘛夏曄冬蒨方志所辨中州所羡草則藿蒳豆蔲薑彚非一江籬之屬海苔之類綸組紫絳食葛香茅石帆水松東風扶留布護臯澤蟬聯陵丘夤緣山嶽之岊冪歷江海之流扤白蒂銜朱㽔鬱兮䓲茂曄兮菲菲光色炫晃芬馥肸蠁職貢納其包匭離騷詠其宿莽木則楓柙櫲樟栟櫚枸榔綿杬杶櫨文欀槇橿平仲桾松梓古度楠榴之木相思之樹宗生髙岡族茂幽阜擢本千尋垂䕃萬畝攢柯拿莖重葩殗葉輪囷蚪蟠􅕜㙷鱗接榮色雜糅綢繆縟繡宵露霮䨴旭日暗㫲與風䬙揚䬀瀏颼飀鳴條律暢飛音響亮蓋象琴筑并奏笙竽俱唱其上則有猿父哀吟􅏈子長嘯狖鼯猓然騰趠飛超爭接縣垂競遊遠技驚透沸亂牢落翬散其下則有梟羊麡狼猰貐貙象於莵之族犀兕之黨鉤爪鋸牙自成鋒穎精若耀星聲若震霆名載於山經形鏤於夏鼎其竹則篔簹籃箊桂箭射筒柚梧有篁篻簩有叢苞筍抽節往往縈結緑葉紫莖冒霜停雪橚矗森萃蓊茸蕭瑟檀欒嬋娟玉潤碧鮮梢雲無以踰嶰谷弗能連鸑鷟食其實鵷雛擾其間其果則丹橘餘甘荔枝之林檳榔無柯椰葉無䕃龍眼橄欖棎榴禦霜結根比景之隂列挺衡山之陽素華斐丹秀芳臨青壁係紫房鷓鴣南翥而中留孔雀綷羽以翺翔山雞歸飛而來棲翡翠列巢以重行其琛賂則琨瑶之阜銅鍇之垠火齊之寶駭雞之珍頳丹明璣金華銀朴紫貝流黃縹碧素玉隱賑崴㠢雜插幽屏精曜潜穎硩陊山谷崎岸為之不枯林木為之潤黷隋侯於是鄙其夜光宋玉於是陋其結緑其荒陬譎詭則有龍穴內蒸雲雨所儲陵鯉若獸浮石若桴雙則比目片則王餘窮陸飲木極沉水居泉室潜織而卷綃淵客慷慨而泣珠開北户以向日齊南冥於幽都其四野則畛畷無數膏腴兼倍原隰殊品窊隆異等象耕鳥耘此之自與穱秀菰穗於是乎在煮海為鹽採山鑄錢國稅再熟之稻鄉貢八蠶之綿徒觀其郊隧之內奧都邑之綱紀霸王之所根柢開國之所基趾郛郭周匝重城結隅通門二八水道陸衢所以經始用纍千祀也憲紫宮以營室廓廣庭之漫漫寒暑隔閡於邃宇虹霓回帶於雲館所以跨跱煥炳萬里也造姑蘇之髙臺臨四逺而特建帶朝夕之濬池佩長洲之茂苑窺東山之府則瓌寶溢目䚕海陵之倉則紅粟流衍起寢廟於武昌作離宮於建業闡闔閭之所營采夫差之遺法抗神龍之華殿施榮楯而捷獵崇臨海之崔嵬飾赤烏之韡曄東西膠葛南北崢嶸房櫳對櫎連閣相經閽闥譎詭異出竒名左稱彎崎右號臨硎雕欒鏤楶青瑣丹楹圖以雲氣畫以仙靈雖兹宅之夸麗曽未足以少寧思比屋於傾宫畢結瑶而搆瓊髙闈有閌洞門方軌朱闕雙立馳道如砥樹以青槐亘以緑水𤣥䕃耽耽清流亹亹列寺七里俠楝陽路屯營櫛比解署棊布橫塘查下邑屋隆夸長干延屬飛薨舛互其居則髙門鼎貴魁岸豪傑虞魏之昆顧陸之裔岐嶷繼體老成奕世躍馬疊跡朱輪纍轍陳兵而歸蘭錡內設冠蓋雲䕃閭閻闐噎其鄰則有任俠之靡輕訬之客締交翩翩儐從奕奕出躡珠履動以千百里宴巷飲飛觴舉白翹關扛鼎拚射壺博鄱陽暴謔中酒而作於是樂只衎而歡飫無匱都輦殷而四奧來暨水浮陸行方舟結駟唱櫂轉轂昧旦永日開市朝而並納橫闤闠而流溢混品物而同㕓并都鄙而為一士女佇眙商賈駢坒紵衣絺服雜㳫傱萃輕輿按轡以經隧樓船舉帆而過肆棊布輻湊而常然致遠流離與珂珬䌖賄紛紜器用萬端金鎰磊砢珠琲闌干桃笙象簟韜於筒中蕉葛升越弱於羅紈譶澩㺒交貿相競喧譁喤呷芬葩䕃映揮䄂風飄而紅塵晝昏流汗霡霂而中逵泥濘富中之氓貨植之選乘時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌趫材捍壯此焉比廬捷若慶忌勇若專諸危冠而出竦劒而趨扈帶鮫函扶揄屬鏤藏鍦於人去􅚛自閭家有鶴膝户有犀渠軍容蓄用器械兼儲吳鉤越棘純鉤湛盧戎馬盈於石城戈船掩乎江湖露往霜來日月其除草木節解鳥獸腯膚觀鷹隼誡征夫坐組甲建祀姑命官帥而擁鐸將校獵乎具區烏滸狼㬻夫南西屠儋耳黑齒之酋金鄰象郡之渠驫􅮝飍矞靸霅警捷先驅前塗俞騎騁路指南司方出車檻檻被練鏘鏘吳王乃巾玉輅軺驌驦旗魚須常重光攝烏號佩干將羽旄揚㽔雄戟耀芒貝胄象弭織文鳥章六軍袀服四騏龍驤峭格周施罿罻普張罼罕瑣結罠蹄連綱阹以九疑禦以沅湘輶軒蓼擾彀騎煟煌袒裼徒搏拔距投石之部猿臂骿脅狂趭獷猤鷹瞵鶚視䟃𧽼翋􅢣若離若合者相與騰躍乎莽䍚之野干鹵殳鋋暘夷勃盧之旅長􅧿短兵直髮馳騁儇佻坌並銜枚無聲悠悠斾旌者相與聊浪乎昧莫之坰鉦鼓疊山火烈熛林飛爓浮煙載霞載隂菈擸雷硠崩巒弛岑鳥不擇木獸不擇音􅕝甝虪䋶麋麖驀六駮追飛生彈鸞鶁射猱㹶白雉落黑鴆零陵絶嶛嶕聿越巉險跇踰竹柏㺦猭杞柟封狶蕕神螭掩剛鏃潤霜刃染於是弭節頓轡齊鑣駐蹕徘徊徜徉寓目幽蔚覽將帥之拳勇與士卒之揚抑羽族以嘴距為刀鈹毛羣以齒角為矛鋏皆體著而應卒所以挂扢而為創痏衝踤而斷筋骨莫不衄鋭挫芒拉捭摧藏雖有石林之岝崿請攘臂而靡之雖有雄虺之九首將抗足以􅝌之顛覆巢居剖破窟宅仰攀鵕䴊俯蹴豺獏劫剞熊羆之室剽掠虎豹之落猩猩啼而就禽􅍛􅍛笑而被格屠巴蛇出象骼斬鵬翼掩廣澤輕禽狡獸周章夷猶狼跋乎紭中忘其所以睒暘失其所以去就魂禠氣懾而自踢䟮者應弦而飲羽形僨景僵者纍積而增益雜襲錯繆傾藪薄倒岬岫巖穴無豜豵翳薈無􅣩鷚思假道於豐隆披重霄而髙狩籠烏兔於日月窮飛走之棲宿嶰澗閴岡岵童罾罘滿效獲衆回靶乎行睨觀漁乎三江泛舟航於彭蠡渾萬艘而既同𢎞舸連舳巨檻接艫飛雲蓋海制非常模疊華樓而島峙時髣佛於方壺比鷁首而有裕邁餘皇於往初張組幃構流蘇開軒幌鏡水區篙工楫師選自閩禺習御長風狎玩靈胥責千里於寸隂聊先期而須㬰擢謳唱簫籟鳴洪流響渚禽驚弋磻放稽䳡䳟虞機發留鵁鶄鉤餌縱橫網罟接緒術兼詹公巧傾任父筌鯉䲛鱺鱨鯊罩兩魪罺鰝蝦乘鱟黿鼉同罛共羅沈虎潜鹿馽櫳僒束鰴鯨輩中於羣犗攙搶暴出而相屬雖復臨河而釣鯉無異射鮒於井谷結輕舟而競逐迎潮水而振緡想萍實之復形訪靈䕫於鮫人精衛銜石而遇繳文鰩夜飛而觸綸北山亡其翔翼西海失其遊鱗雕題之士鏤身之卒比飾虬龍蛟螭與對簡其華質則亄費錦繢料其虓勇則鵰悍狼戾相與昧潜險搜瓌竒摸蝳蝐捫觜􅏲剖巨蚌於回淵濯明月於漣漪畢天下之至異訖無索而不臻溪壑為之一罄川瀆為之中貧哂淡臺之見謀聊襲海而徇珍載漢女於後舟追晉賈而同塵汩乘流以砰宕翼颸風之䬟䬟直衝濤而上瀨常沛沛以悠悠汔可休而凱歸揖天吳與陽侯指包山而為期集洞庭而淹留數軍實乎桂林之苑饗戎旅乎落星之樓置酒若淮泗積殽若山丘飛輕軒而酌緑醽方雙轡而賦珍羞飲烽起釂鼓震士遺倦衆懷欣幸乎館娃之宫張女樂而娛羣臣羅金石與絲竹若鈞天之下陳登東歌操南音𦙍陽阿詠韎任荆艷楚舞吳愈越吟翕習容裔靡靡愔愔若此者與夫唱和之隆響動鐘鼓之鏗有殷坻頽於前曲度難勝皆與謡俗汁協律呂相應其奏樂也則木石潤色其吐哀也則凄風暴興或超延露而駕辨或踰緑水而采菱軍馬弭髦而仰秣淵魚竦鱗而上升酣湑半八音并歡情留良辰征魯陽揮戈而髙麾回曜靈於太清將轉西日而再中齊既往之精誠昔者夏后氏朝羣臣於兹土而執玉帛者以萬國蓋亦先王之所髙㑹而四方之所軌則春秋之際要盟之主闔閭信其威夫差窮其武內果伍員之謀外騁孫子之竒勝疆楚於柏舉棲徑越於㑹稽闕溝乎商魯爭長於黃池徒以江湖險陂物産殷充繞霤未足言其固鄭白未足語其豐士有陷堅之鋭俗有節概之風睚眦則挺劒喑嗚則彎弓擁之者龍騰據之者虎視麾城若振槁搴旗若顧指雖帶甲一朝而元功逺致雖纍葉百疊而富彊相繼樂湑衎其方域列仙集其土地桂父練形而易色赤珍須蟬蛻而附麗中夏比焉畢世而罕見丹青圖其象瑋貴其寶利也舜禹游焉沒齒而忘歸精靈留其山阿玩其竒麗也剖判庶士商榷萬俗國有鬱鞅而顯敞邦有湫厄而踡局伊兹都之函𢎞傾神州而韞櫝仰南斗以斟酌兼二儀之優渥繇此而揆之西蜀之於東吳小大之相絶也亦猶棘林螢耀而與夫樳木龍燭也否秦之相背也亦猶帝之懸解而與桎梏疏屬也庸可共世而論巨細同年而議豐確乎暨其幽遐獨邃寥廓閒奧耳目之所不該足趾之所不蹈倜儻之極異誳詭之殊事藏埋於終古而未寤於前覺也若吾子之所傳孟浪之遺言略舉其梗概而未得其要妙也姑蘇志卷十六
