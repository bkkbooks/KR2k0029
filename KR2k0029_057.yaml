body:
  text: 姑蘇志卷五十八明王鏊撰人物二十三釋老竺道生鉅鹿人姓魏氏初入廬山幽栖七年後遊長安從什公受業闗中僧衆咸謂神悟獨文字之師以生為邪擯之生後來止虎邱聚石為徒講湼槃經至闡提有佛性處曰如我所説契佛心否羣石皆首肯之今石猶存竺道一真正有學業晦處隠智人莫能知王珣兄弟深加敬事受知簡文帝後隠虎邱時號九州都繼那顔真卿詩登壇仰生一謂道生道一也道寶道一弟子支遁字道林姓闗氏家世奉法往餘杭山沈思道術行吟獨暢年二十五始釋形入道住剡東􅢐山後居吳支硎山報恩寺南峯院性好鶴鎩其翮不復飛視有懊䘮意後養令翮成致使飛去又好養名馬謂愛其神駿今有石室放鶴澗馬跡石皆其遺蹤也智積菩薩靈巖寺開山祖也當東晉末自西土來時泗州僧伽持鉢江南至無錫聞積在蘇即回曰彼已有人矣由此名顯有一貧嫗慕其行嘗持角黍為供積受之嫗因得度至今上巳日號智積誕辰聚數十百嫗為角黍會梁天監中靈巖山初造寺有異僧負鉢而入憇廡下長身黧面相貌竒古衆莫之省逾三日夜半索墨自圖其形于殿東北壁黎明不知所在衆始驚異居無何有僧人顧其畫愕曰此西土智積菩薩像也何為在此於是道俗趨來觀拜知師出世至唐宰相陸象先有弟遘危疾國醫不能療一日冇僧扣門問疾象先引至卧内僧索杯水一噀而病良愈象先驚謝出金幣不受顧謂其弟曰我靈巖僧也他日還吳幸來過我言已遂去其年象先弟入尚書為郎使觀察桂筦道經吳中趨靈巖如約問禮所舍無有徧從寺中求之亦無得方悵然欲還俄見壁間所畫像肖焉如言如笑驚喜拜施錢五十萬修供而去法惜西域人義熈中至中夏與恵逺結社廬山已而來蘇念佛三昧化導有情蘇人翕然歸建浄夀院居之院燬復建即今萬夀寺也支曇籥月支沙門也嘗來虎丘特賦妙聲善唄弄夢神人授聲法覺因裁製新梵清響妙絶宋孝武敕使至郡從受五戒􅤇􅤇尊者梁時僧也今虎邱之憨憨泉寶華之卓錫峯皆其遺跡恵響吳興人姓懷氏天監中居虎丘不得甘泉乃俯地側聽得泉今名曰虎跑泉後駐錫馬鞍山謀建塔廟坐於山脇石室間有二虎為侍方運籌思俄有神人謂曰願施千工以成是夜風雷震吼林木號怒但聞撲斵聲明日竒石矗然廣階駢墄事聞武帝為造寺名恵聚今山中尚存石像於室中扣之鏗然有聲呼為響大師僧林吳人有道行大同中入蜀居潼州豆圖山禪黙累日見巨蠎於前舉首如有叩者林為授三歸自爾蠎不為害涪水之陽素無猿林至有二猿度水來依林棲林去猿復泅還又嘗露坐赤水巖虎前伏聽林説法久乃去惟靖吳人入國寧寺禮慧政受天台教嘗侵星赴禪林寺粥虎隨及寺輒跪地以俟靖出虎復隨去疽發背困睡有鴆鳥糞其瘡未幾而愈又虞氷雪置秔地窖中日以銚合菜煑食過期米常滿不耗靖乃築之智琰字明璨郡人姓朱氏梁散騎侍郎獻之孫幼事通𤣥璩法師授典過目輒成誦長遊都下與道安禪師齊名陳亡歸虎丘面巖壑者三十載楊素蘇威皆嘗駐節山中接其緒論煬帝鎮維揚具幣招致琰恐重累使者為之一起及見辭以疾竟不為用卒埋武丘東寺印宗精涅槃經咸亨中至京師詔居大敬愛寺辭住蘄春謁忍師遂至廣州過六祖盡悟之㫖著心要集行于世智聚住虎丘東寺山𦙍法師弟子至德二年奉敕太極殿進講金光明經天子嘉禮歸卧舊山開皇間璽書勞問卒窆山南得虞世南為文齊翰開元中住武丘道性淵黙心不闗事與皎然甚契僧晝字皎然工律詩嘗謁韋應物恐文體不合乃苦思作古體十篇為贄韋殊不稱賞晝失望明日冩其舊製以獻韋諷味不釋手因語晝曰師幾失聲名不以所工見投而猥希老夫之意人各有所得非卒能致晝服其精鑒義師蘇州人狀如風狂貞元中民起屋師運斤壞其簷禁之不可主人素知其神拜曰弟子生活頼此師曰爾惜之耶擲斤於地而去其夜市中火惟所壊簷屋數間獨存嘗止於廢寺殿中冬夏積火壞幡木像悉燔之好燒鯉魚不具渫而食垢靣不頮頮輒雨吳中以為雨候將死飲灰汁數斛念佛坐不飲食郡人日往觀之七日而逝盛暑色不變支不摧續空者吳人本齊君房也苦貧勤學為凍餒所驅元和初遊錢塘至孤山寺西饑甚不能前俄有老僧顧君房笑曰法師諳旅況否君房曰何哉僧曰子不憶講法華經於洛中同德寺乎應為饑火所惱不暇憶前事探鉢囊出一棗大如拳曰此吾國所産食之知過去未來事君房食訖甚渇掬泉水飲之急欠伸枕石而寢有頃乃寤思講經於同德寺如昨日焉乃落髪鑒師元和初郡人馮生調選長安有老僧自稱鑒師詣生曰汝吾甥也相與往來嵗餘馮得東越尉鑒師負笈告去曰我廬於靈巖寺之西廡久矣遊長安忽十年幸與君相遇今將歸舊居故來告别然君尉越道出靈巖寺下當一訪我後馮生詣寺詢僧鑒師廬安在僧曰吾曹無名鑒者生始疑異至西廡下乃有羣僧畫像其一狀類鑒師生大驚視其題云馮氏子吳郡人年十嵗學浮屠氏法以道行聞文暢吳人韓愈有送行序及詩貫休婺人善詩有西嶽集嘗居萬夀寺禪月闗因稱禪月大師又善畫古佛嘗自夢得十五羅漢梵相尚缺其一有告者曰師之相乃是也遂為臨水圖以足之今其畫本尚傳僧瑗字辯空嘗披一衲不計寒饑勤行精進嘗撰武丘名僧苑一卷注郁子兩卷文樂三卷紹明律師崑山慧聚寺僧也後唐時居半山彌勒閣一夕夢有神人曰簷前古桐下有石天王像與銅鐘師冝知之詰旦掘其地果獲之今尚龕置壁間形製甚古紹宗郡人住亷山性朴野不羣流俗江南李國主造寺居之又躬入山請謁甚加禮重清化師全副崑山人隨父賈販至豫章聞禪會之盛求出家學成自仰山還故國錢忠獻王賜以紫方袍不受改號純一禪師開運中坐亡有大風震林木焉希辯吳越忠懿王子也為寶嚴院於常熟聽律於楞伽受心印于天台乾德初王以清泰院居之號慧智禪師太平興國中隨王入覲見于滋福殿賜號慧明尋還故刹御書急就章逍遙詠袐藏詮賜之清順尊者宋初魏庠守郡奏改虎丘律寺為禪迎尊者至寺乃啓禪派今虎丘開山第一人也遇賢俗姓林氏長洲人母初孕夢吞大珠生時祥光滿室少溺水泝流復還遂出家郡城東禪寺性嗜酒人呼為林酒僊醉則作詩時有警句尤能前知人禍福言無不驗有疾病者書符與之立愈郡守梅詢贈以詩曰出入常携一古籐三衣麤重貎稜稜紅塵酒滿何曽醉知是僧中第幾僧初郡中有虎為害遇賢見之騎以出城其害遂息一日渡江風濤大作舟將覆遇賢解袈裟為㠶風浪便止其神異多此類遇賢顔貎竒怪口可容雙拳手垂過膝日行路中嘗持一鐵椎見瓦甓輒碎之人問其故答曰世路不平闔郡酒家得其飲酒獲利十倍有一酒肆奉之甚謹賢將示寂至其家曰吾日飲汝酒未能酬直今當相報耳乃大吐石白中囑以紙封閉三日啓視則已結如鷄子未幾疫痢大行人服其一匕即瘥酒家因以致富祥符五年上元日沐浴而化七日身不欹側顔色如生其徒火之取其骨塑為像今存寺中静梵嘉禾人姓笪氏生甫十嵗依勝果寺祝髪從湛謙二法師學元祐初往郡之北禪寺講法華經修法華懴為三期之為日二十有八精恪上通感普賢受偈摩法呼淨梵比丘丈瑩吳僧多聞博識宗教亦髙所著湘山野錄行於世道元住永安禪院祥符中嘗進所纂傳燈錄三十卷詔楊億等刋定刻板宣布法逺宋廬陵人姓王氏年十九遊并州從嵩禪師受具足戒來住天平山擬班固九流作九帶叙佛祖教義博采先德機語參同印證學者傳之歐陽脩嘗造其室因與客棊逺坐傍脩請其説法有從前十九路迷悟幾多人之句脩嘉之所著有偈語妙宻恵詮吳僧佯垢汙而詩絶清婉嘗書西湖一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉應未掩片月隨行屨唯聞犬吠聲又入青蘿去蘇文忠公和於後曰唯聞煙外鐘不見煙中寺幽人夜未寢草露濕芒屨唯應山頭月夜夜照來去詮遂以詩知名道潛吳僧有標致效陶靖節為詩嘗自姑蘇歸西湖經臨平作詩云風蒲獵獵㺯清柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲蘇文忠公赴官錢塘得詩大稱賞一見如舊識嘗有詩曰隔林髣髴聞機杼知有人家住翠㣲蘇公曰此吾師十四字師號也蘇公移守東徐潛訪之館逍遙堂士大夫争欲識面饌客罷俱來紅粧擁之遣一妓前乞詩援筆立成曰寄語巫山窈窕娘好將魂夢惱襄王禪心已作沾泥絮不逐東風上下狂一坐大驚自是聞名仲殊字師利承天寺僧初為士人與鄉薦妻以藥毒之遂削髪時時食蜜以解藥毒蘇軾與之往還甚善號之曰蜜殊工於詩詞有寶月集當時有詆其所作多艶體道欽崑山圓明村朱氏子授業景德寺因遊歴叢林遇一道者語之曰汝乗流而行逢徑即止欽至臨安見東北一山秀出樵子曰此徑山也欽遂居之為開山始祖嘗召至内庭賜號國一禪師今薦嚴寺西有羅漢橋名盖指國一也毛僧日遊聚落飲啖無所擇輕薄子多狎玩之貴勢要之不詣忽謂人曰吾死矣乃危坐誦偈曰毛僧毛僧事事不能死了燒却恰似不曽言卒而化法雲大師字普潤長洲人參南屏清辯得言下㫖有注解金剛經心疏鈔息隂集宗本乃承天福昌院飯頭飯熟必禮拜然後供僧一日忽悟恣談皆經中語仁宗召見賜金襕衣加圓照禪師號歸初至京師有貴戚試以娼女薦寢既登榻鼻息如雷女為般若光所爍一夕不寐可觀法師字冝翁華亭戚氏子一日聞舉唱曰般若寂寥忽有悟云如服一杯降氣湯魏杞鎮郡請主北禪適當九日上座云胸中一寸灰已冷頭上千莖雪未消老步只宜平地去不知何事又登髙魏公擊節嘆賞有圓覺手鑑行菴錄鰕子和尚好食活鰕丐于市得錢即買貯之袖中且行且食或隨視之乃出哇于水羣鰕皆㳺躍而去諝三命承天寺僧好食活鷄精於隂陽之術吉凶多騐人欲其卜𦵏則以數十活鷄隨之聞其聲咿然食之愈喜後焚有五色舎利自舌本湧出宗杲號妙喜髙孝兩朝凡三賜號兩住徑山嘗止虎丘禪學為當時之宗道川本崑山縣弓手翟超以勇力名方被差捕賊宿廟中忽有所得徑出家徧遊江湖道遇虎不為動虎亦馴伏其旁一日書偈危坐化去有注金剛經法全號無菴崑山陳氏子從道川參請一日行静濟殿其首偶撞殿柱忽大悟旁人見其光彩飛動自此遍走山林道價日増衣和菴主崑山人隠居雪竇畜二虎恒跨之以遊後徙二靈終焉初雪竇妙髙峯在千丈巖顛有藤一枝蜿蜒其上下臨不測乃蟠結成龕因名棲雲大德丁未燬于盗更二十年不克復虎乳其墟為害咸謂菴復而和祠則虎禍其息至元丙子復其菴肖其像於是二虎前伏餐茲飲和猛從仁不為害和師在日有四偈詠藤龕載奉化志明本號中峯錢唐孫氏子㓜參妙髙峯説法示人縱横詠貫以雄辯名一時朝廷數聘之嘗避去今鴈蕩村有幻往菴乃其隠處有廣錄三十卷入大藏中餘澤字天泉姓陸氏郡人學天台教觀辭鋒辯博音吐如鐘大德中住永定遷北禪召住杭之下竺會朝命勘金書藏經澤居于京師與翰林集賢諸老倡和後聞有雨花别集虞集序廣慧禪師智及字以中吳縣顧氏子從訢公學文僧嶼呵曰子才俊若此不思負荷大法甘作詩騷奴僕乎無盡鐙偈所謂黄葉飄飄者不知作何見解及噤不能答即歸海雲院目不交睫者逾月忽見秋葉墜庭豁然有省入徑山謁端公端以法器期之悉取三乗十二分教温繹之遂大通宗貫洪武初應詔居天界以病還海雲卒宋學士濓為塔銘有四會語錄若干卷維則字天如姓譚氏永新人得法於本中峯本時住天目山之師子巖至正初門人築室以居則名曰師子林盖以識其授受之原也自中峯以來臨濟一宗化機局段為之一變故多論建有楞嚴會解若干卷語錄别錄剰語若干卷悦可字中庭嘉定人少修静業元統間嘗錫師號及坐逝茶毘餘齒舌不壞琳西玉至正末出遊會稽届歸父兄皆已沒嫂以不辱死於投井唯母在琳乞食以養母卒血書華嚴經以薦江隂王逢有贈孝僧琳詩良𤦺字元璞天平寺僧妙聲字九臯景德寺僧皆有詩名聲有東臯錄普明號雪窻嘉定人善畫蘭與栢子庭齊名時蔚號萬峯樂清金氏子得長千巖之傳至吳就𤣥墓山建大伽藍居參學甚廣洪武辛酉有詔起之蔚已預知趺坐説偈而逝使至死已七日越十三日肢體猶温隆菩薩姓施氏尹山寺僧也洪武壬申四方沙彌給牒京師者三千人悉籍為軍時方旱禱雨隆因乞焚身以代之至雨華臺望闕再拜取瓣香書風調雨順四字語中使曰為我奏之已爇或進香火中舒臂接之既焚雨即大㴻上喜曰此真永隆雨也製落魄僧詩以彰之溥洽字南洲山隂人姓陸氏洪武間住北禪寺後應召為僧錄司右講經陞左善世及衍斯道以輔翊舉義功召主教事洽以其位遜衍而自居右後洽在詔獄衍已位少師將行時乗輿臨視問所欲言衍以洽為言不及他事洽前著有金剛經註解并詩集行世萬金字西白寶積寺僧洪武中住天界寺與宗泐等奉詔註楞伽金剛心經所作有淡泊齋稿大祐字啓宗號蘧菴俗姓吳氏㓜開悟聞誦楞嚴呪隨口成誦年十二出家寄心菴既壯為澤天泉司懴又之武林從及公参禪洪武間召與蔣山廣薦會遷郡之北禪歴僧録司左右善世會内難棄歸穹窿永樂初起修釋書凡括大般若義六百卷及平生所著淨土指歸淨土真如禮文彌陀金剛二經直解天台授受圖法華撮要圖淨土解行二門圖行世趙頭陀者自言終南山人不知其所参修成化間遊吳中啖肉一頓盡十數斤或一鵞一猪頭秫飯至斗許食畢飲水亦一二斗肉食多手自烹煑極潔宿承天寺數年後坐苑橋上大呼一聲遂化諸僧具威儀茶毘之亦得數舎利已上釋氏赤鬚子秦穆公主魚吏也齒落更生髪白復黒服霞絶粒後往吳中十餘年莫知所之蔡經後漢人居胥門中散大夫王逺方平既得道東欲入括為山過吳住經家以其骨相當僊語以要言經遂尸解去十餘年忽還家容色少壯語家人曰七月七日王君當來可多作飲食以供從官至日王君果來舉室皆見從官皆隠引見經父母兄弟因遣人召麻姑頃之麻姑至乃好女子年可十八九坐定各進行厨皆玉食復擘麟脯相勸酬麻姑云接侍已來已見東海三為桑田向來蓬萊水又淺於今日豈將復為陵陸乎逺笑曰聖人皆言海中行復揚塵也時經弟婦新産數十日姑見知之曰噫且止勿前即以少許米擲之以祛其穢視其米皆成丹砂麻姑手爪似鳥經心中念曰背大癢時得此爪以爬背當佳也逺已知之使人牽經鞭之但見鞭著經背亦莫見有人持鞭者經比舍有姓陳者聞經家有神人乃詣門求見逺曰君心不正未可敎以僊道當以一符并一篆存君本夀自出百嵗後可以禳災治病陳後以符篆治效夀百有十嵗而死其後數十年經復還家今吳縣有蔡僊鄉云李崇郡人少好道林屋山人王瑋𤣥授之以流珠丹法曰行此亦可以出身仕官無妨僊舉崇仕令宛陵虎狼避去蝗不入境累遷汝南太守加秩中二千石年七十四瑋𤣥授以隠解法去入大霍山又授遁化泥丸紫户術以度世在華陽洞中為左理中監准太府長史云瑋𤣥楚莊王時人也郎宗為呉縣令後遯去居華山下服胡麻丸得道在鹿踪山洞互見宦蹟條魏伯陽呉人好道術與弟子三人入山作神丹既成謂弟子曰丹雖成宜以犬嘗試之犬飛則可服乃與白犬犬斃伯陽曰作丹唯恐不成今既成而殺犬恐未當神明之意餌之将復如犬奈何弟子曰先生當餌之否伯陽曰吾已違世路棄家而來今不得僊亦恥復還死生皆當餌之乃服丹入口即死弟子虞姓者曰吾師非常人服此而死得無意乎復取丹餌之亦死餘二人相謂曰所以為丹者欲長生耳今乃趣死将焉用之不服此自可更得數千嵗遂相與出山方為伯陽及虞生求木以歛二子去後伯陽即起以所服丹而死弟子虞及白犬須臾皆起僊去道逄伐木者乃作手書寄謝鄉里及二弟子伯陽作參同契五相類凡三卷伯陽後漢人恐當時吴㑹未分或恐是會稽人姑因舊著之負局先生者負磨鏡局循吳市中得一錢便輒問主人得無有疾苦否若有輒出紫丸藥以與服之服者皆愈董奉字君異吳人先主時大旱縣令丁士彦知有道術乃往見而請禱奉曰雨易得貧家破屋奈何士彦解其意因曰先生但令致雨當為築屋即躬命吏人百餘揀材為之搆屋屋成大雨傾㴻髙下皆足葛𤣥字孝先吳人初從左慈受九丹液僊經遍歴名山修煉大丹丹成得僊號葛僊翁每飲酒常入人家門前陂水中卧竟日乃出曽從吳王船行至三江口阻風舡多漂沒僊翁舡亦沈不知所在吳王歎曰僊翁有道何不能濟乃遣使求之久忽見僊翁從水上行來衣履不濕而有酒容既見言曰臣從伍子胥邀飲淹屈陛下于此又嘗舟行弟子見篋笥中有十許符因問曰此符之騐盡何事可得見乎僊翁曰神符亦無所不為弟子願見之乃取一符投水中水迅急符逐流而下復投一符迎水逆上再取一符投水亭亭不上不下湏臾上符下下符上會中央三符同聚而不流其詳互見傳記不可具載于吉吳孫䇿時道士制作符水以療疾病吳會人多事之䇿嘗會客郡樓吉趨度門下諸將賓客下樓拜之止之不能䇿即命収之䇿母曰于先生亦助軍作福醫䕶將士不可殺之策不從竟殺之𦵏之失尸所在杜蘭香自稱南陽人墉城集僊錄云初漁父於洞庭之岸聞兒啼聲四顧無人唯有三嵗女子在岸側漁父憐而舉之十餘嵗天姿竒偉靈顔姝瑩殆天人也忽有青童靈人自空而下來集其家携女而去將昇天謂漁父曰我僊女杜蘭香也謫於人間後吳建興二年春復降於包山張碩家有侍婢二名萱枝松枝為詩贈碩詩曰阿毋處靈嶽時遊雲霄際衆女侍羽儀不出墉宫外飊輪送我來豈復耻塵穢從我與福俱嫌我與禍會乃出署蕷子三枚大如雞子云食此令君不畏風波辟寒暑碩問禱祀何如蘭香曰藥可除疾淫祀何益碩既成婚授以輕舉之術遂絶迹不來年餘碩船行忽見蘭香乗車於山際不勝驚喜徑往造香欲登其車其奴扞之遂退孫寒華吳人孫奚之女師杜契受𤣥白之要容顔日少周旋吳越諸山十年乃得僊道而去一云吳大帝孫女於茅山得道冲虚而去因名其山曰華姥山楊羲者吳人好學沈厚與許先生遁許長史謐結神明之交嘗為公府舎人興寧三年羲年三十六衆真降焉自東岳上真司命君等二十三人又自太和靈嬪上真左夫人等女真十五人每旬輒數人同降髙談道㣲幽指藥妙楊及二許史受其詞捉筆為書是嵗六月十五日夜紫㣲王夫人與一神女俱來紫㣲謂羲曰此太虚上真元君金臺李夫人之少女紫清上宫九華真妃者也賜姓安成名鬱嬪字虚簫真妃又謂羲曰我昔學真於龜臺受玉章虎錄為上真妃遊行玉清非不能訪搜紫童友于帝郎也直推幾任會應度厯數欲求氏族於明君非有邪也君夷質虚閑幽真内煥必簡帝躬髙佐四輔理生斷死互察隂陽妾當助君綜御萬神尊制東蕃君將乗龍駕雲白日昇天此自元德上挺太極所旌不復用勤學劬勞也今人居風塵間乃多罪之下鬼趣死之朽質君奚必汲汲於人間之貴賤投身榮辱之肆哉且方交兵日會三灾向臻褰衣逺逸是其時也自後數日即衆真一降所授詩章道要羲及二許所筆授者甚多華陽陶𢎞景論次為書號曰真誥沈羲郡人學道消灾治病未嘗餌藥物也與妻賈共載路逢白鹿青龍白虎車各一乗從騎人曰羲有功于民心不忘道少小以來履行無過今年夀將盡黄老遣僊官下迎侍郎薄延垂乗鹿車度世君司馬生乗青龍車迎使者徐福乗白虎車即有三僊人羽衣持節以白玉簡青玉册丹玉字授羲羲昇天時道間皆見之忽大霧不解失所在惟見羲所乘車牛入田食苖或以告羲家子弟恐羲為邪鬼所魅布人於百里之内徧索不得後四百餘年忽還鄉里推求得數世孫懷喜懷喜曰聞先人説家有僊今其歸邪留數十日具言初昇天時不得見帝但見老君東向坐宫殿鬱鬱如雲氣侍者數百人多女子庭中有珠玉樹衆芝叢生龍虎成羣游戯其間聞琅琅如銅鐵聲不知何等四壁熠熠有符書著之老君身形略一丈被髪文衣體有光耀湏臾數玉女持金盤玉杯來賜羲曰此是神丹飲者不死夫婦各一杯夀萬嵗又賜棗二枚大如雞子脯五寸遺羲曰暫還人間治民疾苦若欲上來書此符着竿杪吾當迎汝乃以一符及僊方一首賜羲羲奄忽如寐已在地上世多得其符騐陸脩靜字元德郡人早通墳籍長慕神僊棲廬山白雲寺與陶潛慧逺法師結白蓮社慧逺持律精勤送客未嘗過虎谿而與脩静行過百步大笑而别宋文帝表其髙風作停霞寶贊使徐湛宣㫖留之不可太始三年作崇虚館通僊堂强招之使講道焉元徽五年偃月而化春秋七十二後三日廬山諸徒見霓旌紛然還山湏臾而失未幾計至初脩静赴常衣囊及逝遺命囊骸投所在巖壑門人不忍奉之山中未至忽布囊掛巖樹諡簡寂先生詔以所居為簡寂觀徐靈期吳人隠衡嶽上清宫遇神人授𤣥丹之要含日暉之法守泥丸之道周遊海嶽採訪山洞巖壑作衡嶽記叙其靈異言紫盖雲宻二峯皆五千餘丈雲宻有禹治水碑皆科斗字碑下有石壇流水縈之最為勝地而紫盖嘗有鶴集其頂神芝靈草生焉有石室室有香爐杵臼丹竈祝融峯上有碧玉壇方五尺東有紫梨髙三百尺乃夏禹所植實大如斗赤如日食之長生蒼梧王元徽元年九月九日冲真至宋徽宗朝賜號明真洞㣲真人張通裕字𢎞真漢天師十二代孫梁天監二年來居吳山感異夢即於山下建治號曰招真剏寥陽殿虚皇壇手植七檜簡文帝改為乾元宫通裕嘗煉大丹鑿井藏之至宋淳熈中道士李正則浚井得丹石䃭啓之化為雙紅鴿飛入尚湖張繹字士和郡人學道講經理致深宻詞端華辯當時所宗梁武帝雅相欽賞時陶𢎞景著法檢論釋老二教繹復討論甚有條理𢎞景嘉焉専心道法居貧守約善八體書别製雲篆作茅山南洞碑甚工陳景尚吳人善講道釋製靈書經大行于世梁邵陵王甚重之周隠遙字息元洞庭山道士自云甪里先生之孫學太隂煉形死於崖窟中嘱弟子曰檢視我尸勿令他物相干六年後更生當以衣裳迎我弟子守視甚臭穢蟲壞惟五臟不變如言閉䕶之至期往視身已起坐弟子備湯沐以新衣迎歸髪鬒而黒髭麄而直如獸鬛焉十六年又死如前更七年復生如是三度已四十餘年且八十嵗貎似三十許人煬帝召至東都尋還郡唐貞觀中召至長安問脩習之道對曰臣所脩者匹夫之事功不及物帝王一言之利萬國䝉福得道之效速於神人區區所學非萬乗所宜問也復求歸山從之令狐楚作記互見寺觀條周生太和中廬於洞庭山以道術濟人吳楚敬之後出遊廣陵佛寺有三四客偕來時八月望霽月澄瑩生自言曰某學於師能挈月致之懷袂或疑其誕或喜其竒生命虚一室翳四垣使無纎隙取筯數百呼僮以繩聮續架之曰我將此梯取月去乃閉户久之數客步庭中伺焉忽覺天地曛晦聞生呼曰某至開室視之曰月在此矣諸君試觀舉其袖出月寸許一室通明寒入肌骨客再拜謝之却閉户其外尚晦食頃如初栁條青者大中末乞食於蘇市嘗擊筑踏歌得錢輒飲好事者覔其蹤終不可得歌詞中往往述長生方外事閲五六年因大雪凍死於市市人具棺瘞於齊門之左每遇日出時冢上有紫氣髙五六尺近視之無所見也後一年有處士皇甫顔者來訪之有人示以冢處皇甫持酒酺祭之發棺得青竹杖無他物表其冢曰谷隠栁處士墓自是不復有紫氣矣單以清常熟元陽觀道士也嘗附舟之嘉興聞異香疑有異人徧目同載唯舡頭一人儀趣頗殊以清遷與並席香氣彌甚因從容問之答曰吾此地人少病大風逃于深山遇一老人哀之令從行有草堂數間老人曰汝可居此以藥一褁令餌之遂不飢渇身日以輕越兩月老人來笑曰有心哉尚在此疾已瘥矣爾若勤脩道術可長生人間遂令歸予因拜問其姓名老人曰子聞國初衛公李乎王可交趙屯村人樂耕釣一日棹舟江行歘見采舫盪漾中流中有道士七人皆雲衣霞綃顔貎如玉一人呼可交姓名舟即近舫引可交相見一人曰好骨相合僊已炙破矣一人曰與之酒侍者㵼酒樽中酒再三㵼之不出一人取二栗與之栗色青光如棗長二寸許嚙之肉脆而味如飴一人曰可交已見之矣令登岸復令閉目頃之乃在天台山瀑布寺前有僧來問可交所從來具以前事對又問何日離家曰今日早離家又問今日何日對以三月三日僧大驚曰今九月九日矣僧邀可交為具食可交不喜聞食氣唯飲水耳僧以状白縣達州州以聞越州亷使王渢召見竒之隂遣人之蘇州誥其家家人具言三月三日已溺水死渢益信異之具以表聞可交自後辟糓不復耕釣挈妻子入四明山人時有見之者章全素者郡人蔣生僕也初為日者蔣生好神僊弱嵗棄家遊四方學煉丹不成後得全素全素見生几上瓦硯忽曰先生好煑鍊之法夫僊丹食之則能長生化土為金今先生之丹能化石為黄金乎生心甚慚以他詞拒之曰汝傭者豈能知神僊事乎無妄言全素㣲笑後月餘衣中出小瓢云是中有丹能化土為金顧此硯以刀圭傅之亦可為黄金生以為誕妄罵之全素尋卒以簀盛尸將瘞之忽亡其尸徒有巾帶衣履存焉遺一藥鼎有美光粲然探之得石硯在内寸餘已化為紫金矣陳傚吳江縣吏也平生崇重三教廣行隂德但未能斷食魚之好嘗於池中養魚以待烹啜方欲斫膾待賓忽池中偶似人言悲哀乞命於是省悟盡放其魚於江是夜夢羣魚謝曰玉帝知君放我等萬千性命已令天曹掛名僊籍三年後果於橋上白日上昇孫鍇祥符末侍内表朱都官讀書于鎮州西山書院一日採藥迷入深山見苑茨下有道士據榻而坐鍇再拜而前道士熟視曰窮薄人也當使足衣食與丹砂一塊且授以符曰此可召役鬼神今嵗河朔大疫以砂書符售之一符可得百錢既下山依教鬻符遊市井戴鐵冠被絳服騎至大名時王嗣宗守魏慮其惑衆擒械于獄將治以罪鍇曰吾非造妖者向遇神人見教能令人見其祖先嗣宗命釋試之果然表送闕下補司天監保章正専主符禁之事後砂盡術衰遂逃去申元道泰陵人師事徐神翁得修鍊術將出遊請于師師示之曰逢虞則止無雪則開乃渡江至吳中過山問於人曰虞山也即築菴居之插竹成林因名竹林菴山中每患無汲一日大雪獨於菴前覆簀不積遂浚而得泉因名雪井紹興間喻抱元増築改名招真菴又嘗於福山建潛真舘梅里建頥真舘為鍊丹之地陳希㣲字彦真吳人先名伯雄元祐中得疾因往茅山劉靜一求符水下山覺眩冒不能前據石大嘔此疾遂愈棄家為道士築室栁汧泉上徽宗聞其名屢詔不起乃以所居為抱元觀而錫以洞㣲法師之號何中立淮陽朐山書生也世為鼎族遭亂南來寓于郡嘗業儒能文一日焚書裂衣遁去既歸荷蓑結廬于天慶觀之龍王堂佯狂妄談乆而皆騐卧草中不垢不穢晨起必一至吳江溲焉郡至吳江四十五里往返不數刻人固訝之㑹有一瘵者拜謁乞醫何命持一蓑草去疾遂愈始翕然傳蓑草可療病亦有求而不得隨輒不起者有姓左人以草煎湯療病訖復緘于盒一日開視忽生粉紅花兩朶於是逺近敬異先是觀中諸黄冠以殿宇摧燬欲試其騐羣造其廬拜且白之何從求疏軸主者謾以與何笑曰來日自有施者至午而使者果來答曰我不能入覲以此累使者上聞而益竒之㑹浙西趙憲伯歸亦為之請遂賜金闕寥陽殿額出内帑緡錢數萬繪事一新以答其意孝宗在位忽夢有蓑而跣哭而來弔問之曰臣蘇人也詰其故則不肯言寤乃語左璫時上意頗崇緇抑黄弗深信也居月餘成恭后上僊荘文繼即世璫因進免釋而及之意欲以騐前定寛上心上矍然憶昨夢輒泣而嘆璫進曰臣㣲時聞蘇有何姓者類其人因道其所為上大驚有諭遣不至嘗燕居深念以規恢大計累年未有所屬且坤儀虚位圖所以膺佐餕承顔之重者焚香殿中黙言曰何誠能僊顧必知朕意遂授璫以香茗曰汝見何惟致贄問所以求則曰陛下禱矣璫承命惟謹何忽掉首曰有中國人即有邊人有日即有月不湏問趣之去既去復呼還曰所問者姓我猶忘之但言朱家例子不可用也使者歸奏上曰誠知我心遂賜號通神先生築菴于觀之内賜御寶書扁以寵之既而成肅正中宫事無不驗上每嵗以璫將命即其居設千道齋合雲水之士施予優普一嵗偶踰期或訝而請亟起于卧搖手瞬目而招之曰亟來亟來璫是日舟至平望乃見何在岸滸招而呼踵廬言之衆曰何固未嘗出也都道錄劉能貞自京口舟還次無錫黙禱云先生果有靈感當出相見泊至許墅何從南來劉登岸揖何云小道不易出山果十枚贈别舟及平江則何未嘗出也何能耐寒暑勇於㗖肉食至十數斤獨不飲酒先有衣襲寄於郭氏云吾死則以此歛慶元三年五月二十二日忽命取之明日坐而逝太皇太后先兩夜夢其求衣亟命特賜以二十四日至遂易之以瘞焉獃道僧平江兵家子也年十四五為繼母所虐遣出貨糖一日與羣兒戱井邊覆糖於井懼而泣適賣藥道人見而憐之令負笈以隨因飢啖以一棗遂飽索歸再三道人怒批頰使去自此如痴如狂左頰突起肉塊自云中有金蝦蟇初許人揣後張口示人頰肉膜中一紫色小蟇宛然手足皆見能預談人禍福發其隠識者以為神髙宗召見賜名應夢達道先生狀髠而髽似道似僧與何蓑衣頡頑好遊蕩市井間見人必求錢得之隨與貧者何既不趨召他日璫或薦道僧上欲見之何挽呼不使去曰是将捉汝縛汝監汝不欲汝來矣道僧竟去見于内殿不拜所言不倫上狎之使出入勿禁且命寵人元居實館之元懼其逃使十人從之所至不舎踰年歸見何何以杖詬逐之至死訖不與接一談重華倦勤復使召之不肯就邀致萬端三年而赴之紹熈甲寅春道僧入北内坐榻前曰今日六月也好大雪侍璫咸笑顧曰爾身皆雪而笑我狂也衆莫以為意至季夏八日而至尊厭代矣唐廣真嚴州人既嫁得血疾夢道人與藥服而愈自是與夫仳離從而入道徑往平江謁蓑衣何先生何稱為僊姑號無思道人淳熈壬寅二月赴郭氏飯未竟驀還寓廬即昏兀如醉兩夕小蘇言方在郭家飯次若有喚我者出門逢吕純陽曹混成獃道僧三人引至海邊跨大蝦渡海因隨遊名山洞府及到𠖇司純陽令往元靜吳真人洞中學書書大字寫詩二百餘篇純陽問曰汝欲超凡入聖耶身外有身耶留形住世耶棄骨成僊耶對曰有母尚存願盡孝道曰如是則且留形住世遂持丹一粒分而為四投之盤中圓轉甚疾攖得其一吞之自是辟糓髙宗聞其名降香往請符水召入德夀宫宣問符水靈驗是甚法對曰不曽行法但以心為法神為符氣為水耳上悦書寂靜先生四字以賜之被受三朝眷遇累封寂靜凝神真人歐法師嘉定人紹興中有雲遊士憇黄渡崇真道院數日别去且期三日後當再來為我具酒肴及期果至共為歡飲就法師掌中教書符訣令醮祀伏壇用之自爾法師主醮事人輒見其彷彿升空焉後臨終挺立而化周紫華郡人也讀書好道有幸道者過之見其讀參同契道者曰子有夙契可與語至暮留宿夜甚寒将熾炭道者止之視其所衣一木綿裘其氣充然時方雪積道者所止有光赫然出屋上雪獨不聚隣人以為火操水具至則知非火周尤異之達旦留詩以别問其所居曰楓橋問其姓曰幸次日周冒雪至楓橋果有大船泊橋左幸方倚蓬而笑曰吾知子必來遂留欵具膳且出一小鼎貯水銀熝之頃之成銀命舟子入市即可易物再貯如前加以黒末半匕及成則黄金也盡日而别且曰戌亥嵗當成子志周自此若有所得每靜處覺有氣隠隠中起稍引之則煦然周身嵗果戌一日以幸所書展玩一過曰茲惟時矣遂歛衽端坐而逝若委蛻焉申徒有涯方外士也嘗攜一白甆瓶遊吳中大風雪中脫衣賃舟沽酒飲畢大吐榜舟者逐之有涯挈瓶登岸倚樹髙吟其詩曰仲尼非不賢為世所不容嗤嗤同舟子不識人中龍溪雪戴落梅寒聲激長松狂來但清嘯一壺隠塵蹤吟訖跳身入瓶榜舟人大駭舉瓶碎之無見也他日同舟者見有涯箕踞于虎丘劔池之側知其異人欲逼問之倐爾不見梁亮家于駟馬橋下業漁嘗見一白䑕入穴得書一卷讀之有悟車塘張氏世稱為神亮往候焉適張出因擲一索於其家家人見蛇入卧内奔告張張知其亮也追而飲之亮使視蛇乃索也提刑吳潛舟次江方飲亮攜籃步水上入潛舟潛怪問之亮曰欲假公笥中白金酒罌爾潛見其裸且籃小意不能藏遂出與亮即納罌於籃而去翌旦於駟馬橋上碎而分諸貧者濳以為妖急追逮至官謂亮曰能去此否亮因注水於盆剪紙為魚游躍水中復剪一魚飛達庭下攫其魚而上衆皆仰視遂失亮所王大猷者本朐山人乾道間仕為忠翊省幹來居吳中街路忽夢神欲授以養生之道自是䖍志事神月朔朝禮飯道設齋至淳熈中以四月十四日為吕純陽誕辰齋百道士齋散有道人至黧面跣足敝褐片巾徧體瘡痍而略無氣穢屢言來後時幸毋郤人咸怠容獨大猷加禮待道人謂曰吾能治内亦善治外大猷問髙隠何地道人曰得隠便隠初無定隠問其姓名俛而不答徐曰省幹當兼善天下豈宜獨善其身大猷答以天下人安吾道始安道人笑曰此子可教遽别去期年忽再至稽首趺坐大猷叩之不語頃之曰昔聞省幹有天下安之言然而其說有二有富貴而安者有藥石而安者君意何如大猷曰吾志不在富貴道人曰予有異方藏之肺腑久矣浪遊江湖未有可托今觀汝有道風不容自祕令屏左右治潔室宻受其方戒曰藥就即可施之所治者一切風疾若不宦遊量立價以售非特養生兼以濟物執此心不遷他日姓名可達上帝而子孫寶之亦有利焉若圖轉授非神明所許諾既有孤鶴自天而降道人撫之笑别大猷徑乘飛去異香滿室復有羣鶴環繞大猷與衆咸驚絶知其為僊遂制其藥博施於人迄今其家尚不遷藥亦不絶所謂王省幹宅遇僊丹也郭麟孫于文傳俞焯諸公咸有題志鄧道樞字應叔綿州人以齋科精嚴際遇理度兩朝一日謝后遣巨璫召至内後門泣降徳音且令其責軍令状使無泄乃言昨夜夢濟王大怒以為吾且將兵由獨松闗滅汝社稷以此令道樞於髙峰頂為謄心章哀告上帝已而獨松果黄頭先鋒斬闗而入初道樞端平中隨魏了翁出蜀居吳趙與􅊸俾住持文昌宫宋亡得上官氏廢圃於城東棲息所名㑹道觀道樞别號山房家鉉翁為記一時名輩皆與游工詩善琴有東遊集古無極不知何許人居葑門道堂蚊蠅不敢入暑中開户而眠不用帷帳猫犬至即俛首疾回無敢窺其内經年不見揮拂一塵不生未嘗出募於外而錢不乏疑其挾術逼問之笑而不言一夕撒去器物竟不知何往明日物色之葑婁盤閶四門人皆云是夕見其負籠荷杖出門去矣楞伽貧女在郡城西石湖楞伽山下名伴娘不知何許人乞食為活往來山中歴年雖久顔色不變插花謳歌夜則宿古墓中蛇虺寒暑皆不畏時有吳人何從者與郟道士遊山中適遇貧女於道問其姓則曰無姓問其年則曰天長地久有甚數目其時甚寒問其何不畏寒却指松木答曰草木與人天地之所生養木尚能過何不㑹此於是何從等敬進曰特來問道願慈悲開示女曰汝不能慈悲如何却教我慈悲汝若求道必歸求心從赧逡廵而退明旦復往已失所在莫起炎號月鼎苕溪人生宋寶慶間少業舉子不利慕𤣥學至青城山見無極徐直卿授以雷術又聞建昌鄒鐵壁得王侍宸斬勘法委身童𨽻事之鄒疾危遣去曰吾将逝矣雷書之全不能畀汝已而書張使者一符授之再見潯陽楊真卿精於持練動與神合時憤世嫉邪托狂直于酒信筆塗墨出詭秘語人莫能曉寶祐秋越守馬光祖致之禱雨雨應聲至理宗賜徳書詩贊至元中崔彧奉詔江南起覲京師祈禬有異驗命典道教事力辭歸止於光盪巷學者填門嘗書錢壁言于門口百事動雷霆龍神拱手聽不洩亦不祕淵黙有天聲癸巳冬謂其徒曰明年正月某日吾逝矣至期書偈問歛具衆謂具矣復搖手曰待吾五事備湏臾天忽昧風雲雷雨電交作候霽歛焉宋濓為碑文楊維楨為傳弟子得其傳者吳下張雷所王繼華金靜隠馬心吾江東許無心陳靜佳雷所再傳步宗浩宗浩傳周𤣥初張善淵字深父號癸復道人吳之華山人其伯父崇一始為道士得易真人如剛靈寶飛步法稱之為張雷師宋尚書色恢薦于朝命主郡之天慶觀善淵從之學輒能捕逐鬼物呼致雷雨郡守潜説友舉住建德永隆宫再知郡之先孝觀世所謂道法藥術凡四方有一術一法之異必䆒極其妙莫月鼎侯清谷時為道門所宗咸異重之而樂授所祕元世祖詔舉山林有道嗣天師以善淵薦乃與其弟子步進德入朝命召鶴及他有禱皆應遂命為平江道錄住持天慶觀又改紹興昭瑞宫鎮江道錄卒年九十二步宗浩字進徳號雲岡早習儒書中歳始慕道從張雷所于𤣥妙觀授囘風混同大洞真詮上清靈寶三五飛步之祕碧潭斬勘之書祈禱雨暘呼召鸞鶴咸在掌握驅邪救患甚多靈迹延祐間制授貞元微妙𢎞教法師周𤣥真字𤣥初嘉興人年十二入紫虚觀從李太無為道士太無杜道堅弟子也至正戊子來居葑門外報恩道院能以符篆召鶴名所居曰來鶴軒自號鶴林先生雖身寓方外事母至孝其學受靈寶經法於曹谷神又因顧養浩受五雷祕文於步宗浩洪武戊申京師大旱太師李韓公善長迎𤣥真致雨有應庚戌上欲問鬼神情状嗣天師𤣥真同被召錫宴光祿又明年上召問雷霆所以神之故對曰天地之間隂陽運轉故有神神與人合者也雷非人無以知雷之天人非雷無以知人之天天人相孚同一理爾上悦壬子三月不雨右丞相汪公廣洋命𤣥真致禱其應如初乙夘又旱𤣥真禱亦應冬無雪復命𤣥真祈之己未授領神樂觀事𤣥真平日亦好興建利物嘗造安里橋重構報恩道院修致道觀丹井卒𦵏于莫月鼎墓次楊中立字𤣥㣲號海漚亦步宗浩弟子也少入𤣥妙觀嗣宗浩為太極五雷壇正宗志尚簡素名所居曰一枝巢鄭元祐為之記洪武中掌道紀司黄道淵號孤山錢唐人嘗遇郢人衛淡丘授以修真要法及醫藥方伎南遊武夷師事金華潘雷鑑挾其術北上後歸憇吳下郡人嚴德昭抱疾醫不能療建壇以祀𤣥帝名曰清真朝夕懇禱道淵適至憐其精誠投以藥遂愈於是道淵留主壇宇嗣天師為奏賜觀額今其徒猶傳其藥郭守源字本中㓜從張簡學詩慕周𤣥初之道往事之得其所祕洪武初選居神樂觀授天壇奉祀朝廷有大醮祠輒勑守源副嗣天師蕆事眷賜甚隆永樂初擢道錄司左至靈佐領天下𤣥教住持朝天宫及卒皇太子製文諭祭李徳睿字士明嘉定人為寧真觀道士尤攻于醫遇淮人李清隠授竇太師飛騰鍼法洪武初召入見辭歸嘗携瓢賣藥市中瓢小而類鶴因號鶴瓢道士張羽為傳王行髙啓輩皆為賦詠金善信字實之少好老氏學父母嘗為納婦有子時張雷師能以符篆捕逐鬼物因事之及聞莫洞一者劇飲酒醉輒詬罵人呼雷役雲䙝狎如兒戯又往尊事之盡得其祕遂與其徒研覈妙㫖其言以為心神至虚無所汩沒諸隂銷盡諸陽自集盖有形者隂無形者陽陽益勝隂氣益調精我得清淨去道無難矣以薦為廣德路道録仍畀師號席應珍字心齋號子陽子常熟人少辭家學老氏法經籙丹法靡不洞究兼涉儒籍尤䆳于易釋典方術咸能旁通奉其母甚孝至𦵏祭痛哭如初䘮或謂親愛既割何得徇禮若是過與應珍曰吾法當割愛人道然世間豈有不孝之神僊也哉始提㸃常熟普福宫遷郡之白鶴觀及相城靈應宫洪武中卒胡道安字安谷吳江人為𤣥妙觀道士晚遇至人授青城太乙雷書及斬勘魔秘㫖洪武末吳中秋旱郡守延道安致禱道安登壇醉酒詬罵怒髪衝冠令下隂雲四合雷雨大作性佯狂人呼為胡風子張皮雀者名道脩長洲人也少有異相年十七父母欲為議婚不從往禮胡風子為師盡得其術宣德八年夏常州不雨大家懇道修往禱及至則其人頗怠道修登壇赫怒忽震霆碎大木雷火其廩不留粒粟已而黒雲蔽天四龍見雲中驟雨傾注觀者股慄十年崑山旱縣令請禱道修約三日雨三日果雨戴氏子疾昬譫語道修入門取棒就牀擊之其病遂瘥馬氏婦為祟馮狂呌亂走道脩至即昬仆去則復然常過猛将廟衆聚侮之道脩怒走對廟門向神裸而溺衆固畏神甚見之吐舌戰灼而散道脩風格竒朗頂雙髽披青布袍人謂其捕鬼隨行鬼作聲類俗所粥兒戯皮雀者因呼為張皮雀正統庚申年六十一無疾而死死後或見之于長橋疑尸解云姑蘇志卷五十八
