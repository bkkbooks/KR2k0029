body:
  text: 姑蘇志卷四十八明王鏊撰人物六名臣楊崇勳郡人也父全美太宗時為殿前都指揮使崇勳以父任給事東宫御軍有法真宗即位授左侍禁四方館使屬天下久罷兵有言鬻廏馬者崇勳言馬不可去議遂格纍遷桂州觀察使兼羣牧使又歷馬帥殿帥建振武節鉞纍徙定武山南東道二鎮拜樞密使加平章事以河陽三城節度使判陳州卒年七十贈太尉諡恭毅初諡恭密許洞字洞天吳縣人父仲容太子洗馬洞性疏雋幼習弓矢擊刺之伎及長折節勵學尤精左氏傳進士釋褐雄武軍推官嘗詣府白事有卒踞坐不起即杖之又移書知州馬知節知節怒其不遜會輒用公錢奏除名歸數年所居嘗植一竹以表特操吳人詠之曰許洞門前一竿竹日以酣飲為事常從民坊貰酒一日大署壁作酒歌數百言鄉人爭往觀其酤數倍乃盡捐所負景德二年獻所撰虎鈐經二十卷應洞識韜略運籌决勝科以負譴報罷就除均州參軍及祥符四年祀汾隂獻三盛禮賦召試中書改烏江主簿卒年四十二洞以才學自負狂放不羈與潘閬錢易為友所著詩辭甚多皆名當世歐陽修稱為俊逸之士有集一百卷春秋釋幽五卷演𤣥十卷訓俗書一卷龔識字默甫其先邵武人父慎儀仕南唐禮部郎中給事中使南漢被執漢亡得拜歙州刺史國滅為盧絳所害識始徙居吳登端拱進士大中祥符間李宗諤薦擢監察御史遷殿中侍御史兼左巡使宋襲唐制御史不專言職至是始擇學術醇正操履端方可綱紀朝廷者俾入臺言事識始被選後以疾求退除檢校司封郎中平江軍節度副使子宋元盧氏云宋朝郡士登科者始於識其家至今居崑山黃姑猶藏其登第時金花榜貼乃用塗金黃紙濶三寸長四寸許大書姓名下有兩知舉花押又用白紙作大帖如藥貼狀貯金花貼於中外亦書姓名二字蓋以此報其人也自唐以榜帖相傳而世少見其制故附於此宋元字會之幼頴悟絶人讀書虎丘寺為鄉貢首選天聖中擢進士主仁和簿以父疾乞便侍養調吳縣改建安尉藹有聲稱以薦章保任者二十有二召見擢大理評事知句容縣發擲姦伏政如神明楊紘持使節行部號為深酷吏望風投劾去紘過縣竟不入或問其故紘曰龔君治民所至有聲吾往徒為擾耳後徙居崑山黃姑歷通判衢越二州官至都官員外郎謝事家居作中隱堂時程適陳之竒皆以耆德致政于家日為文酒之樂吳人謂之三老宗元初官仁和知州范仲淹深加禮重稱其文溫厚和平而不乏正氣似其為人謂曰君德業清修他日必為令器慎勿因人以進洎登朝未嘗游公卿門卒以清直淳厚號慶厯人材有文集十卷題曰武邱居士遺藳子程程字信民剛正自守不怵禍福排異端家不設老佛像祭祀不焚紙錢讀書支硎山先墓下攻苦食淡博極羣書記問精確鄉人號有腳書厨由熙寧進士歷西安丞知桐廬縣卒贈左朝議大夫子況況字濬之擢進士第以學術文章與蘇過俱名于朝號龔蘇用宗元中隱故事自號起隱子終祠部員外郎朝議大夫有起隱集三十卷從子明之在孝行傳丁謂字謂之一字公言長洲人少與孫何善袖文謁王禹稱大驚重之以為自唐韓愈栁宗元後二百年始有此作世謂之孫丁淳化中進士甲科纍遷夔州路轉運使蠻酋為寇謂諭以禍福蠻感泣作誓刻石立境上五年不得代詔舉自代者乃入為三司鹽鐵副使祥符五年參知政事九年請外為平江軍節度使知升州天禧初復參政改樞密使代寇凖拜中書門下平章事加司空晉國公仁宗即位進司徒侍中為山陵使被論授太子少保分司西京又貶崖州司户參軍纍徙光州授祕書監致仕卒年七十二謂機敏有智謀文字纍數千百言經覽輒誦善談笑為詩至圖畫博奕音律無不洞曉嘗建鄉郡節鉞以至宰相國朝吳人至相位者始於謂又嘗為鄉里請於朝特免丁錢鄉人德之祠於萬壽寺謝濤字濟之其先自陽夏徙富陽父崇禮為中吳軍節度推官故為蘇人濤幼竒敏年十四講左氏春秋既冠會汾晉平郡國當表賀吳士為文者更數人皆不如意濤私草之為人持去郡將大稱愜時吳令羅處約與長洲王禹稱書云濟之揚榷天人吾曹敵也與之定交嘗講學陽山白蓮院洎登第為梓州𣙜監院判官李順反成都濤畫守禦以功遷觀察推官權知華陽縣時亂後田廬荒廢有詔能占田而倍入租者與之於是腴田悉為豪右所據流民至無所歸濤收詔書悉以田歸主改著作佐郎通判壽州知興國軍真宗考吏籍內出朝士有治迹者二十四人名付門下省濤在選中擢太常博士召對長春殿賜五品服送試學士院會契丹入寇議親征濤以屯田員外郎知曹州奏州人趙諫交權勢結豪俠務乘人之弊以告訐斬諫都市曹人相賀繼命安撫益利兩路既還舉所部官三十餘人宰相疑其多濤歷陳諸吏治狀願連坐奉使舉官連坐自濤始除三司度支判官出知泰徽二州召試直史館判三司出為兩浙轉運使賜三品服兼侍御史知雜事清靜端介真宗山陵靈駕所經道路有司請悉壞城門廬舍以過車輿象物濤言先帝車駕封祀儀物大備猶不聞有所毁徹且遺詔從儉薄今有司治明器侈大以勞州縣非先帝意願下少府裁損之進吏部郎中直昭文館知越州𣙜西京留司侍御臺就拜祕書監朝廷嘉其恬退擢太子賔客景祐初卒年七十五贈禮部尚書弟炎炎字化南慕韓栁為文與杭州盧慎齊名時稱盧謝端拱初舉進士調補昭應主簿徙伊闕知華容公安二縣卒年三十四有集二十卷濤子絳絳字希深七歲通孝經十歲能屬文十五以父任祕書省校書郎舉進士甲科授奉禮郎知汝隂縣遷光祿寺丞善議論喜談時事嘗論四民失業纍數千言初楊億得其啓事謂人曰此文中虎也遂力薦之召試擢祕閣校理同判太常禮院判登聞鼓院再遷太常丞通判常州丁母憂服除仁宗即位遷太常博士用鄭氏經唐故事議宣祖非受命不宜配享感生帝請以真宗配之不果從天聖中天下大旱蝗起河決滑州絳上疏請引咎避朝罷不急之役省無名之斂勿崇私恩更進直道仁宗嘉納之會修真宗國史以絳為編修官史成遷祠部員外郎直集賢院時濤官西京年老因請便養通判河南府移書丞相言歲凶嵩山宫宜勿治又奏妖人方士不宜出入禁中權開封府推官言蝗亘野入郛宜用京房息灾異之術考功課吏除煩苛損聚斂勿起大獄勿用躁人郭皇后廢絳陳詩白華引申后褒姒事以諷辭甚切至徙三司度支判官言用物滋侈賜豫過制禁中須索繁濫宜遞考裁節初詔罷織密花透背禁勿服用既而賜內人衣復取於有司又後苑作器索龜筒龜筒禁物民間不得有而索之不已皆論罷之又請罷內降詔令皆由中書樞密而後行再遷兵部員外郎進聖治針五篇以父憂去服除擢知制誥判吏部流內銓寶元中使契丹還請知鄧州為政寬厚務敦教化時人以比杜詩稱為循吏修復召信臣六門隁以溉民田功未就而卒年四十五贈禮部尚書鄧民追思之立祠於百花洲絳以文學知名措辭遒雅有元白風歐陽修尤所稱許為人修潔醖藉平居晏然臨事果敢節操凜凜嘗請於郡立學所至大興黌舍好施宗族喜賔客卒之日家無餘資初官河南時莊獻明肅太后莊懿太后起二陵於永安至於鐵石畚臿不取一物於民而足修國子學教諸生逺近大集舉第者十八九聞絳卒皆出涕畫像於學而祠之絳有文集五十卷子景初景初字師厚慶厯六年甲科及第以大理評事知餘姚縣始作海塘防水患民賴安業纍遷益州路提㸃刑獄以屯田郎致仕性倜儻徑峭博學能文尤長於詩為歐陽修王安石梅聖俞所推重女壻黃庭堅以詩名家自謂從謝公得句法弟景平景平字師同一云師宰以祖父䕃試祕書省校書郎守將作監主簿中進士第簽判崇信軍監楚州西河轉般倉好學著詩書傳說數十篇終祕書丞年三十三與弟景回皆知名士景回字師復幼好學年十九所為文辭已可傳以疾卒范仲淹字希文唐宰相履氷之後其先邠州人也因調官江南遂為吳縣人仲淹二歲而孤母更適長山朱氏從其姓名說少有志操既長知其世家乃感泣辭母去之應天府依戚同文學晝夜不息冬月憊甚以水沃面食不至以糜粥繼之人不能堪仲淹不苦也居五年大通六經舉進士禮部第一中乙科為廣德軍司理參軍迎母歸養改集慶軍節度推官始還姓更今名監泰州西溪鹽稅遷大理寺丞徙監楚州糧料院母喪去官晏殊知應天府聞仲淹名召置府學上書請擇郡守舉縣令斥游墮去冗僭慎選舉撫將帥凡萬餘言服除以殊薦為祕閣校理仲淹泛通六經長於易學者多從質問為執經講解亡所倦嘗推其俸以食四方遊士諸子至易衣而出仲淹晏如也每感激論天下事奮不顧身一時士大夫矯厲尚風節自仲淹倡之天聖七年章獻太后將以冬至受朝天子率百官上壽仲淹極言之且曰奉親于內自有家人禮顧與百官同列南面而朝之不可為後世法又上疏請太后還政不報尋通判河中府徙陳州時方建太一宫及洪福院市林木陜西仲淹言昭應壽寧天戒不逺今又侈土木破民産非所以順人心合天意也宜罷修寺觀減常歲市木之數以蠲除積負又言恩幸多以內降除官非太平之政事雖不行仁宗以為忠太后崩召為右司諫言事者多暴太后時事仲淹曰太后受遺先帝調護陛下者十餘年宜掩其小故以全后德帝為詔中外毋輒論太后時事初太后遺誥以太妃楊氏為皇太后參决軍國事仲淹曰太后母號也自古無因保育而代立者今一太后崩又立一太后天下且疑陛下不可一日無母后之助矣歲大蝗旱江淮京東滋甚仲淹請遣使循行未報乃請間曰宫掖中半日不食當如何帝惻然乃命仲淹安撫江淮所至開倉賑之且禁民淫祀奏蠲廬舒折役茶江東丁口鹽錢且條上救敝十事會郭皇后廢率諫官御史伏閣爭之不能得明日將留百官揖宰相廷爭方至待漏院有詔出知睦州歲餘徙蘇州首興學校延安定胡瑗為之師州大水民田不得耕仲淹疏五河導太湖注之海募人興作未就尋徙明州轉運使奏留仲淹以畢其役許之拜尚書禮部員外郎天章閣待制召判國子監遷吏部員外郎權知開封府時吕夷簡執政進用者多出其門仲淹上百官圖指其次第曰如此為序遷如此為不次如此則公如此則私況進退近臣凡超格者不宜全委之宰相夷簡不悅他日論建都事仲淹曰洛陽險固而汴為四戰之地太平宜居汴即有事必居洛陽當漸廣儲蓄繕宫室帝問夷簡夷簡曰此仲淹迂濶之論也仲淹乃為四論以獻大抵譏切時政且曰漢成帝信張禹不疑舅家故有新莽之禍臣恐今日亦有張禹壞陛下家法夷簡怒訴曰仲淹離間陛下君臣所引用皆朋黨也仲淹對益切由是罷知饒州韓瀆希宰相㫖請書仲淹朋黨揭之朝堂祕書丞余靖上言曰仲淹以一言忤宰相遽加貶竄况前所言者在陛下母子夫婦之間乎陛下既優容之矣臣請追改前命尹洙自訟與仲淹師友且嘗薦已願從降黜歐陽修以諫官髙若訥坐視不言移書責之由此三人皆坐貶明年夷簡亦罷朋黨之論自是興矣仲淹既去士大夫為論薦者不已仁宗謂張士遜曰向貶仲淹為其密請立皇太弟故也今朋黨稱薦如此奈何乃再下詔戒敕仲淹徙潤州又徙越州元昊反召為天章閣待制知永興軍改陜西都轉運使會夏竦為陜西經略安撫招討使進仲淹龍圖閣直學士以副之夷簡再入相帝諭仲淹使釋前憾仲淹頓首謝曰臣鄉論蓋國家事於夷簡何憾也延州諸寨多失守仲淹自請行遷户部郎中兼知延州先是詔分邊兵總管領吏人鈐轄五千都監三千寇至禦之則官卑者先出仲淹曰將不擇人以官為先後取敗之道也即大閲州兵得萬八千人分為六各將三千人分部教之量賊衆寡使更出禦賊時塞門承平諸寨既廢用种世衡策城青澗以據賊衝大興營田且聽民得互市以通有無又以民逺輸勞苦請建鄜城為軍以河中同華中下户稅租就輸之春夏徙兵就食可省糴什之三他所減不與詔以為康定軍明年詔諸路入討仲淹曰正月塞外大寒我師暴露不如俟春深入賊馬瘦人饑勢易制也况邊備漸修師出有紀賊雖猖獗固已懾其氣矣鄜延密邇靈夏西羌必由之地也第按兵不動以觀其釁許臣稍以恩信招來之不然情意阻絶臣恐偃兵無期矣若臣策不效當舉兵先取綏宥據要害屯兵營田為持久計則茶山橫山之民必挈族來歸矣此拓疆禦寇之上策也帝皆用其議仲淹又請修承平永平等寨稍招還流亡定堡鄣通斥候城十二寨既而羌漢之民相踵歸業久之元昊歸陷將髙延德因與仲淹約和仲淹為書戒喻之會任福敗於好水川元昊答書語不遜仲淹對來使焚之大臣以為不當輒通書又不當輒焚之宋庠請斬仲淹帝不聽降本曹員外郎知耀州徙慶州遷左司郎中為環慶路經略安撫緣邊招討使初元昊反隂誘屬羌為助而環慶酋長六百餘人約為鄉導事尋露仲淹以其反復不常至部即奏行邊以詔書犒賞諸羌閲其人馬為立條約諸羌皆受命自是始為漢用改邠州觀察使仲淹表言觀察使班待制下臣守邊數年羌人頗親愛臣呼臣為龍圖老子今退而與王興朱觀為伍第恐為賊輕辭不拜慶之西北馬鋪寨當後橋川口在賊腹中仲淹欲城之度賊必爭密遣子純佑與蕃將趙明先據其地引兵隨之諸將不知所向行至柔逺始號令之版築皆具旬日而畢即大順城是也賊覺以騎三萬來戰佯北仲淹戒勿追已而果有伏大順既城而白豹金湯皆不敢犯環慶自此寇益少明珠滅臧徑兵數萬仲淹聞涇原欲襲討之上言曰二族道險不可攻前日髙繼嵩已喪師平時且懷反側今討之必與賊表裏南入原州西擾鎮武東侵環州邊患未艾也若北取細腰胡蘆衆泉為堡障以斷賊路則二族安而環州鎮戎徑道通徹可無憂矣其後遂築細腰胡蘆諸寨葛懷敏敗於定川賊大掠至潘原關中震恐民多竄山谷間仲淹率衆六千由邠涇援之聞賊已出塞乃還始定川事聞帝按圖謂左右曰若仲淹出援吾無憂矣奏至帝大喜曰吾固知仲淹可用也進樞密直學士右諫議大夫仲淹以軍出無功辭不受命不聽時已命文彥博經略涇原帝以涇原傷夷欲對徙遣王懷德喻仲淹仲淹謝曰涇原地重第恐臣不足當此路與韓琦同經略涇原並駐涇州琦兼秦鳳臣兼環慶涇原有警臣與琦合秦鳳環慶之兵掎角而進若秦鳳環慶有警亦可率涇原之師為援臣當與琦練兵選將漸復橫山以斷賊臂不數年間可期平定矣願詔龐籍兼領環慶以成首尾之勢秦州委文彥博慶州用滕宗諒總之孫沔亦可辦集若渭川一武臣足矣帝采用其言復置陜西路安撫經略招討使以仲淹韓琦龎籍分領之仲淹與琦開府涇州而徙彥博帥秦宗諒帥慶張亢帥渭仲淹為將號令明白愛撫士卒諸羌來者推心接之不疑故賊亦不敢輒犯其境元昊請和召拜樞密副使時王舉正懦默不任事歐陽修等言仲淹有相材請罷舉正用仲淹遂改參知政事仲淹曰執政可由諫官而得乎固辭不拜願與韓琦出行邊命為陜西安撫使未行復除參知政事會王倫寇淮南州縣官有不能守者朝廷欲按誅之仲淹曰平時諱言武備寇至而專責守臣死事可乎守令皆得不誅帝方鋭意太平數問當世事仲淹語人曰上用我至矣事有先後久安之弊非朝夕可革也帝再賜手詔又為開天章閣召二府條對仲淹惶恐退而上十事曰明黜陟抑僥幸精貢舉擇長官均公田厚農桑修武備推恩信重命令減徭役天子方信嚮仲淹悉采用之宜著令者皆以詔書畫一頒下又建言周制三公分兼六官之職漢以三公分部六卿唐以宰相分判六曹今中書古天官冢宰也樞密院古夏官司馬也四官散於羣有司無三公兼領之重而二府惟進擢差除循資給議賞罰檢用條例而已上非三公論道之任下無六卿佐王之職非治法也臣請放前代以三司司農審官流內銓三班院國子監太常刑部審刑大理羣牧殿前馬步軍司各委輔臣兼判其事凡官吏黜陟刑法重輕事有利害者並從輔臣豫奪其體大者二府僉議奏裁臣請自領兵賦之職如其無補請先黜降章得象等皆曰不可久之乃命參知政事賈昌朝領農田仲淹領刑法然卒不果行初仲淹以忤吕夷簡放逐者數年士大夫持二人曲直交指為朋黨及陜西用兵天子以仲淹士望所屬拔用之及夷簡罷召還倚以為治中外想望其功業而仲淹以天下為已任裁削幸濫考核官吏日夜謀慮興致太平然更張無漸規摹濶大論者以為不可行及按察使出多所舉劾人心不悅自任子之恩薄磨勘之法密僥幸者不便於是謗毁稍行而朋黨之論浸聞上矣會邊陲有警與富弼請行邊遂以仲淹為河東陜西宣撫使賜黃金百兩仲淹悉分遺邊將麟州新罹大寇言者多請棄之仲淹為修故寨招還流亡三千餘户蠲其稅罷𣙜酤豫民又奏免府州商稅河外遂安比去攻者益急仲淹亦自請罷政事乃以為資政殿學士陜西四路宣撫使知邠州其在中書所施為亦稍稍沮罷以疾請鄧州進給事中徙荆南鄧人遮使者請留仲淹亦願留鄧許之尋徙杭州再遷户部侍郎徙青州會病甚請潁州肩輿至徐卒時皇祐四年得年六十四贈兵部尚書諡文正初仲淹病帝賜藥存問既卒嗟悼久之又遣使視其家既葬御書其碑曰褒賢之碑贈太師追封楚國公仲淹內剛外和其於富貴貧賤毁譽歡戚一不動其心而慨然有志於天下嘗曰士當先天下之憂而憂後天下之樂而樂其事上遇人一以自信不擇利害為趨舍性至孝以母在時方貧後雖貴非賔客不重肉妻子衣食僅能自充而好施豫置義莊里中以贍族人泛愛樂善士多出其門雖里巷之人皆能道其名字死之日四方聞者皆為歎息為政尚忠厚所至有恩諸蕃質子縱其出入無一人逃者蕃酋來見召之卧內徹衛與語邠慶二州之民與屬羌皆畫像生立祠事之及卒羌酋數百人哭之如父齊三日而去端康初詔追封魏國公子純佑純仁純禮純粹純佑字天成性英悟自得尚節行方十歲能讀諸書為文章藉藉有稱仲淹守蘇州首建學宫聘胡瑗為師瑗立學規良密生徒數百多不率教仲淹患之純佑尚未冠輒白入學齒諸生之末盡行其規諸生隨之遂不敢犯自是蘇學為諸郡倡寶元中西夏叛仲淹屢將兵關陜純佑與將卒錯處鈎深擲隱得其才否由是仲淹任人無失而屢有功仲淹帥環慶議城馬鋪寨寨逼夏境夏懼扼其衝侵撓其役純佑率兵馳據其地夏衆大至且戰且役數日而成一路恃之以安純佑事父母孝未嘗違左右不應科第及仲淹以讒罷純佑不得已䕃守將作院主簿又為司竹監以非所好即解去從仲淹之鄧得疾昏廢卧許昌富弼守淮西過省之猶能感慨道忠義問弼之來公邪私邪弼曰公純佑曰公則可凡病十九年卒于襄邑官舍年四十九子正臣守太常寺太祝純仁字堯夫始生之夕母李夢兒墮月中承以衣裾得之遂生純仁資警悟以父任太常寺太祝中皇祐元年進士調知武進縣以逺親不赴易長葛亦不往與父門下賢士胡瑗孫復石介李覯之徒從遊晝夜肄業置燈帳頂如墨色仲淹殁始出仕以著作佐郎知襄城縣襄城民不蠶織勸使植桑有罪而情輕者視所植多寡除其罰民益賴慕後呼為著作林兄純佑有心疾奉之如父賈昌朝守北都請參幕府以兄辭宋庠薦試館職謝不就簽書許州觀察判官知襄邑縣縣有牧地衛士牧踐民稼純仁捕杖之牧地初不𨽻縣主者怒曰天子宿衛令敢爾邪白于朝劾治甚急純仁言養兵出於稅畝若暴民田而不問稅安所出詔釋之且聽牧地𨽻縣凡牧地𨽻縣自是始時旱久純仁籍境內賈舟諭之曰民將無食爾所販五榖貯之佛寺俟食闕時吾為糶之賈從命所畜數十萬斛至春諸縣皆饑獨境內民不知也治平中擢江東轉運判官召為殿中侍御史遷侍御史時議濮王典禮韓琦歐陽修等與翰林學士王圭等異議純仁言陛下受命仁宗而為之子與前代定策入繼之主異宜如王圭等議繼與吕誨等更論奏不聽純仁還所授告敕家居待罪既而皇太后手書尊王為皇夫人為后純仁復言陛下以長君臨御奈何使命出房闈異日或為權臣矯託之地非人王自安計尋詔罷追尊起純仁就職純仁請外不已遂通判安州改知蘄州歷京西提㸃刑獄京西陜西轉運副使召還神宗問陜西城郭甲兵糧儲如何對曰城郭粗全甲兵粗修糧儲粗備上愕然曰卿之才朕所倚信何為皆言粗對曰粗者未精之辭如是足矣願陛下且無留意邊功若邊人觀望將為他日意外之患拜兵部員外郎兼起居舍人同知諫院言王安石變法掊克民心不寧願陛下圖不見之怨上曰何謂不見之怨對曰杜牧所謂天下之人不敢言而敢怒是也上嘉納之曰卿善論事宜為朕條古今治亂可為監戒者乃作尚書解以進加直集賢院同修起居注上多延訪疏逺小臣純仁言小人之言聽之若可采行之必有纍蓋知小忘大貪近昧逺願加深察富弼稱疾家居純仁言弼受三朝眷倚當自任天下之重而恤物深於恤民憂疾過於憂邦致主處身二者胥失願示此章使之自省又論吕誨不當罷御史中丞李師中不可守邊及薛向任發運使行均輸法於六路純仁言臣嘗親奉德音欲修先王補助之政今乃效桑羊均輸之法而使小人為之掊克生靈斂怨基禍安石以富彊之術啓迪上心欲求近功尚法令則稱商鞅言財利則背孟軻鄙老成為因循棄公論為流俗異已者為不肖合意者為賢人劉琦錢覬等一言便黜廷臣方大半陛下又從而驅之其將何所不至道逺者理當馴致事大者不可速成人材不可急求積弊不可頓革儻欲事功亟就必為憸佞所乘宜速還言者而退安石答中外之望不聽遂求罷諫職改判國子監去意愈確執政使諭之曰毋輕去已議除知制誥矣純仁曰此言何為至於我哉前後上言以休兵省事節用富民進君子退小人愛賢材伸公論為急崇聚斂事苛刻親讒佞任偏聽為戒大則廷論小則疏述反復激切無所諱避神宗悉不付外純仁盡録申中書安石大怒乞加重貶神宗曰彼無罪姑與一善地命知河中府徙成都路轉運使以新法不便戒州縣未得遽行安石怒為沮格因讒者遣使欲捃托私事不能得使者以他事鞭傷傳言者耳或謂純仁曰此一事足以塞其謗請聞于朝純仁既不奏使者之過亦不折言者之非後竟坐失察僚佐燕遊左遷知和州徙邢州未至加直龍圖閣知慶州過闕入對上曰卿父在慶著威名今可謂世職卿隨父既久兵法必精邊事必熟純仁慮上有功名心即對曰臣儒家子未嘗學兵先臣守邊時臣尚幼不復記憶且今日事勢宜有不同陛下使繕治城壘愛養百姓不敢辭若開拓侵攘願别謀帥臣上曰卿之才何所不能顧不肯為朕悉心耳遂行秦中方饑擅發常平粟賑貸僚屬請奏而須報純仁曰報至無及矣吾當獨任其責或謗其所全活不實詔遣使按視會秋大稔民歡曰公實活我忍纍公邪爭輸還之使者至已無所負邠寧間有叢冢使者曰全活不實之罪於此得矣發冢籍骸上之詔本路監司窮治乃前帥楚建中所封也朝廷更治建中罪純仁上疏言建中守法申請間不免有殍死者已坐罪罷去今緣按臣而及建中是一罪再刑也建中猶贖銅環州种古執熟羌為盜流南方過慶呼寃純仁以屬吏非盜也古避罪讕訟詔御史治于寧州純仁就逮民萬數遮馬涕泣不得行至有自投于河者獄成古以誣告謫加純仁以他過黜知信陽軍移齊州齊俗凶悍人輕為盜或謂宜以嚴治純仁不聽而司理院繫囚常滿皆屠販盜竊而督償者純仁盡呼出訓使自新即釋去斯歲盜減比年大半丐罷提舉西京留司御史臺時耆賢多在洛純仁及司馬光皆好客而家貧相約為真率會復知河中諸路閲保甲妨農論救甚力録事參軍宋儋年暴死純仁使子弟視殮口鼻血出純仁疑其非命按得其妾與小吏姦因會置毒鱉肉中純仁問食肉在幾巡曰豈有既中毒而尚能終席者乎再訊之則儋年素不食鱉實醉歸毒於酒也其所云者妾與吏欲為變獄張本爾遂正其罪哲宗立復直龍圖閣知慶州召為右諫議大夫以親嫌辭改天章閣待制兼侍講除給事中時宣仁后垂簾司馬光為政將盡改熙豐法度純仁謂光去其泰甚者可也差役一事尤當熟講而緩行不然滋為民病願虛心以延衆論不必謀自己出謀自已出則諂諛得乘間迎合矣役議或難回則可先行之一路以觀其究竟光持之益堅純仁曰是使人不得言爾若欲媚公以為容悅何如少年合安石以速富貴哉又云熙寧按問自首之法既已改之有司立文太深四方死者視數倍殆非先王寧失不經之意純仁素與光同志及臨事規正類如此元祐初進吏部尚書數日同知樞密院事初种古因誣純仁停任至是純仁薦為永興軍路鈐轄又薦知隰州又嘗與議西夏請罷兵棄地使歸所掠漢人執政持未决至是乃申前議又請歸一漢人豫十縑事皆施行邊俘鬼章以獻純仁請誅之塞上以謝邊人不聽議者欲致其子收河南故地故赦不殺後又欲官之純仁復固爭然鬼章子卒不至三年拜尚書右僕射兼中書侍郎純仁在位務以博大開上意忠篤革士風章惇得罪去朝廷以其父老欲畀便郡既而中止純仁請置往咎而念其私情鄧綰帥淮東言者不已純仁言臣嘗為綰誣奏坐黜今所陳為綰已左降不宜録人之過太深宣仁后嘉納因詔前日希合附會之人一無所問蘇軾以發策問為言者所攻韓維無名罷門下侍郎補外純仁奏軾無罪維盡心國家不可因譖黜官及王覿言事忤㫖純仁慮朋黨將熾與文彥博吕公著辨於簾前未解純仁曰朝臣本無黨但善惡邪正各以類分彥博公著皆纍朝舊人豈容雷同罔上昔先臣與韓琦富弼同慶厯柄任各舉所知當時飛語指為朋黨三人相繼補外造謗者公相慶曰一網打盡此事未逺願陛下戒之因極言前世朋黨之禍并録歐陽修朋黨論以進吳處厚傳致蔡確車蓋亭詩以為謗宣仁后諫官報政欲致之典憲唯純仁與王存以為不可爭之未定聞文彥博欲貶嶺嶠純仁諷止左丞吕大防大防遂不敢言及確新州命下純仁於宣仁后簾前言不可以語言文字之間曖昧不明之過誅竄大臣今舉動宜與將來為法此事不可開端且用重刑除惡如以猛藥治病其過也不能無損焉又上疏諫之卒不聽大防奏確黨其盛不可不問純仁面陳朋黨難辨恐誤及善人遂上疏辨之吳安詩劉安世交章擊純仁黨確純仁亦力求罷明年以觀文殿學士知頴昌府踰年加大學士知太原府其境土狹民惜地不葬純仁遣收無主燼骨别男女葬之又推之一路葬以萬計夏人犯境朝廷欲罪將吏純仁引咎求貶秩詔貶官一等徙河南府再徙頴昌召還復拜右僕射因入謝宣仁后簾中諭曰或謂卿必先引用王覿彭汝礪卿宜與吕大防一心對曰此二人實有士望臣終不敢保位蔽賢宣仁寢疾召純仁曰卿父仲淹可謂忠臣在明肅皇后垂簾時唯勸明肅盡母道明肅上賔唯勸仁宗盡子道卿當似之純仁泣曰敢不盡忠哲宗親政純仁乞避位哲宗語吕大防曰純仁有時望不宜去可為朕留之且趣入見問先朝行青苗法如何對曰先帝愛民之意本深但王安石立法過甚激以賞罰故官吏急切以致害民退疏論以為非所當行時用大臣皆從中出侍從諫官亦多不由進擬純仁言陛下初親政天下治亂實本於此選舉須極天下之選又羣小力排宣仁垂簾時事純仁奏曰太皇保佑聖躬功烈誠心幽明共監議者不恤國是一何薄哉遂以仁宗禁言明肅垂簾事詔書上之曰望陛下稽倣而行蘇轍論殿試策問引漢昭變武帝法度事上震怒曰安得以漢武比先帝轍下殿待罪衆不敢仰視純仁從容言武帝雄才大略史無貶辭轍以比先帝非謗也陛下親事之始進退大臣不當如訶叱奴僕鄧潤甫越次曰先帝法度為司馬光蘇軾壞盡純仁曰不然法本無弊弊則當改上曰人謂秦皇漢武純仁曰轍所論事謂時也非人也上為少霽轍平日與純仁多異至是乃謝純仁曰公佛地位中人也純仁凡薦引人材必以天下公議其人不知自純仁出上既相章惇純仁堅請去遂以觀文殿學士加右正議大夫知頴昌府入辭上曰卿不肯為朕留雖在外於時政有見宜悉以聞毋事形迹徙河南府又徙陳州初上嘗言貶責之人殆似永廢純仁賀曰陛下念及此堯舜用心也既而吕大防等竄嶺表會明堂肆赦章惇先期言此數十人當終身勿徙純仁聞而憂憤欲齊戒上疏申理之所親勸以勿為觸怒萬一逺斥非髙年所宜純仁曰事至於此無一人敢言若上心遂回所繫大矣不然死亦何憾乃疏奏之惇詆為同罪落職知隨州明年又貶武安軍節度副使永州安置時疾失明聞命怡然就道或謂近名純仁曰七十之年兩目俱喪萬里之行豈其欲哉但區區愛君有懷不盡若避好名之嫌則無為善之路矣聞諸子怨章惇怒止之赴貶所舟覆于江扶純仁出衣盡濕顧諸子曰此豈章惇所為哉子欲以純仁與司馬光議役法不同為請當得免純仁曰吾用君實薦以至宰相昔同朝論事不合則可汝輩以為今日之言則不可也有愧心而生者不若無愧心而死子乃止居三年徽宗即位欽聖顯肅后同聽政即日授純仁光祿分司南京鄧州居住遣中使至永錫茶藥諭曰皇帝在藩邸太皇太后在宫中知公先朝言事忠直今虛相位以待不知目疾如何用何醫治純仁頓首謝除右正議大夫提舉崇福宫不數月以觀文殿大學士中太一宫使召之有曰豈唯尊德尚齒昭示寵優庶幾鯁論嘉謀日聞忠告純仁以疾奉詔而泣曰上果用我矣死有餘責又遣中使賜茶藥促入覲仍宣渴見之意純仁乞歸許養疾上不得已許之每見輔臣問安否乃曰范純仁得一識面足矣遂遣上醫視疾疾革以宣仁后誣謗未明呼諸子口占遺表命門生李之儀次第之其略云蓋嘗先天下而憂期不負聖人之學此先臣所以教子而微臣資以事君又云惟宣仁之誣謗未明致保佑之憂勤不顯又云未解疆場之嚴幾空帑藏之積有城必守得地難耕所言凡八事建中靖國改元之旦受家人賀明日熟寐而卒年七十五詔賻白金敕官給葬贈開府儀同三司諡曰忠宣御書碑額曰世濟忠直之碑建炎四年詔配享哲宗廟廷贈太師追封許國公純仁性夷易寬簡不以聲色加人誼之所在則挺然不少屈自為布衣至宰相亷儉如一所得奉賜皆以廣義莊前後任子恩多先疏族沒之日幼子五孫猶未官嘗曰吾平生所學得之忠恕二字一生用不盡以至立朝事君接待僚友親睦宗族未嘗須臾離也每戒子弟曰人雖至愚責人則明雖有聰明恕已則昏茍能以責人之心責已恕已之心恕人不患不到聖賢地位也弟純粹在陜純仁慮其於西夏有立功意與之書曰大輅與柴車爭逐明珠與瓦礫相觸君子與小人鬬力中國與外邦校勝負非唯不可勝兼亦不足勝不唯不足勝雖勝亦非也有文集五十卷行于世子正平正平字子夷學行甚髙雖庸言必授孝經論語父卒詔特增遺澤官其子孫正平推與幼弟紹聖中為開封尉有向氏平其墳造寺蔡京以后戚規欲自結奏拓四鄰田地民有訴者正平按視以為所拓皆民業不可奪京坐罰銅用是蓄恨及當國乃言正平矯撰父遺表又謂李之儀所𫐠純仁行狀妄載中使蔡克明傳二聖虛佇之意遂逮正平之儀克明同詣御史府正平將行其弟正思曰議行狀時兄方營窀穸之事參預筆削者正思也兄何為哉正平曰時相意屬我且我居長我不往兄弟將俱不免不若身任之遂就獄捶楚甚苦皆欲誣服獨克明曰舊制凡傳聖語受本於御前請寶印出證籍於內東門使從其家得永州傳宣聖語本有御寶又驗內東門籍皆同其遺表八事諸子以朝廷大事防後患不敢上之繳申頴昌府印寄軍資庫自頴昌取至亦實獄遂解正平羈管象州家屬死者十餘人會赦得歸正平退閒久益工詩尤長五言著荀里退居編并理窟集三卷紹興中贈朝奉大夫徐處仁問正平之為人於王實實作卓行對一篇正思字子默學行亦為士林所推純禮字彛叟以父䕃為祕書省正字簽書河南府判官知陵臺令兼永安縣永昭陵建京西轉運使配木石磚甓及工徒於一路獨永安不受令使者以白陵使韓琦琦曰范純禮豈不知此將必有說他日衆質之純禮曰陵寢皆在邑境歲時繕治無虛日今乃與百縣均賦曷若置此使之奉常時用乎琦是其對還朝用為三司鹽鐵判官比部員外郎出知遂州瀘南有邊事調度苛棘純禮一以靜待之辦其可具者不取於民民圖像于廬而奉之如神名曰范公菴草場火民情疑怖守吏惕息俟誅純禮曰草濕則生火何足怪但使密償之庫吏盜絲多罪至死純禮曰以棼然之絲而殺之吾不忍也聽其趣買以贖命釋其株連者除戶部郎中京西轉運副使元祐初入為吏部郎中遷左司又遷太常少卿江淮荆浙發運使以光祿卿召遷刑部侍郎進給事中純禮凡所封駮正名分紀綱皆國體之大者張耒除起居舍人病未能朝而令先供職純禮批敕曰臣僚未有以疾謁告不赴朝參先視事者夫能供職豈不能見君壞禮亂法所不當為聞者悚動御史中丞擊執政將遂代其位先以諷純禮純禮曰論人而奪之位寧不避嫌邪命果下吾必還之宰相即徙純禮刑部侍郎而後出命轉吏部改天章閣待制樞密都承㫖出知亳州提舉明道宫徽宗立以龍圖閣直學士知開封府前尹以刻深為治純禮一切以寬濟之中㫖鞠享澤村民謀逆事蓋此民入戲場觀優歸途見匠者作桶取而戴於首曰與劉先主如何遂為匠禽上問純禮何以處之對曰愚人無知以不應為杖之足矣曰何以戒後人曰正欲外間知陛下刑憲不濫足以為訓耳從之拜禮部尚書元符三年擢尚書右丞陳次升乞除罷言官並自內批不由三省進擬曾布力爭不能得乞降黜次升純禮徐進曰次升何罪不過防柄臣各引所親且去不附已者爾徽宗曰然乃寢布議又乞罷京城猪羊圈減山陵盟器之煩費布又奏議者多憂財用不足此非所急也願勿以為慮純禮曰古者無三年之蓄曰國非其國今大農告匱帑庾枵空而曰不足慮非面謾邪因從容諫曰邇者朝廷命令莫不是元豐而非元祐以臣觀之神宗立法之意固善吏推行之或有失當以致病民宣仁聽斷一時小有潤色蓋大臣識見異同非必盡挾邪為私也今議論之臣有不得志故挾此藉口以元豐為是則欲賢元豐之人以元祐為非則欲斥元祐之士其心豈恤國事直以快私忿而售其姦不可不深察也又曰自古天下泪亂繫於用心祖宗於此最得其要太祖用吕餘慶太宗用王禹稱真宗用張知白皆從下列置諸要途人君欲得英傑之心故當不次訪拔必待薦而後用則守正特立之士將終身晦迹矣江公望論繼述事當執中道不可拘一偏上出示其疏純禮贊之曰願陛下以曉中外使知聖意所嚮亦從以革小人徇利之情乞褒遷公望以勸來者純禮沈毅剛正曾布憚之激駙馬都尉王詵曰上欲除君承㫖范右丞不可詵館遼使純禮主宴詵誣其輒斥御名罷為端明殿學士知頴昌府提舉崇福宮崇寧中啓黨禁貶試少府監分司南京又貶靜江軍節度副使徐州安置徙單州五年復左朝議大夫提舉鴻慶宫卒年六十七一云七十六紹興初贈資政殿學士諡恭獻純禮居二府布衾絁袍不為表襮沽名譽不擇飲食不役婢妾中年即清居端坐容物不爭而立朝端方乃不可犯人以劉寬卓茂方之純粹字德孺以䕃遷至贊善大夫檢正中書刑房與同列有爭出知滕縣遷提舉成都諸路茶場元豐中為陜西轉運判官時五路出師伐西夏髙遵裕怒劉昌祚後期欲按誅之昌祚憂恚病卧麾下皆憤純粹恐兩軍不協生他變勸遵裕往問疾其難遂解上責諸將無功謀欲再舉純粹奏關陜事力單竭公私大困若復加騷動根本可憂異時言者必職臣是咎臣寧受盡言之罪于今日不忍緘默以貽後悔上納之吳居厚為京東轉運使數獻羡賦上將以徐州大錢二十萬緡助陜西純粹語其僚曰吾部雖急忍復取此膏血之餘即奏本路得錢誠為利自徐至邊勞費甚矣懇辭弗受入為右司郎中哲宗立居厚敗命純粹以直龍圖閣往代之盡革其苛政時蘇軾自登州召還純粹與同建募役之議軾謂純粹講此事尤為精詳復代兄純仁知慶州時與夏議分疆界純粹請棄所取夏地略見施行又言徐禧罷策應之非今宜修明戰守救援之舊制朝廷是之歲大饑純粹請發常平封樁粟麥郡官不許云須奏乃可純粹曰人不食七日即死奏而後發豈能及事即日發之且曰諸君第勿與吾當自坐及夏侵涇原純粹遣曲珍救之曰本道首建應援牽制之策臣子之義忘軀徇國無謂鄰路被寇非我職也珍即日疾馳三百里破之於曲律搗橫山夏衆遁去除寶文閣待制再任召為户部侍郎又出知延州紹聖初哲宗親政用事者欲開邊釁郭知章遂論純粹元祐棄地事降直龍圖閣明年復以寶文閣待制知熙州章惇蔡卞經略西夏純粹不與共事改知鄧州歷滑州旋以元祐黨人奪職知均州徽宗立起知信州復故職知太原初斷殺牛未得令牛死者官以數百買瘞之殺牛遂絶每支官吏及軍士糧同出一厫雖有濕惡衆亦不以致怨加龍圖閣直學士再臨延州改知永興軍尋以言者落職知金州提舉鴻慶宫又責常州别駕鄂州安置錮子弟不得擅入都會赦復領祠久之以右文殿修撰提舉太清宫黨禁解復徽猷閣待制致仕卒純粹沈毅有幹略才應時須嘗論賣官之濫言甚明切不果行范仲溫字伯玉仲淹之仲兄也幼孤自京師還蘇與諸從居勤業孝弟景祐中以仲淹恩例補將作簿調新昌尉在邑三年盜不及境監餘杭縣稅遷寧海軍節度推官一云海寧慶厯七年知黃巖縣海潮壞州城逃散淪溺者甚衆仲溫教民為桴晝夜救之全活數千人既而董治城慮人築且勞甓不能久乃集民纍土以牛數百蹂之堅而後增復表以長石互相銜枕勢莫得動門皆設閘遇水暴至則障之衆伏其善以太子中舍致仕卒年六十六范琪字希世仲淹從兄祖從誼吳越蘇州糧料判官父昌言宋寧國軍節度推官贈國子博士琪以進士歷鄱陽保信軍廬州二從事葉清臣舉充茶官授開封府法曹議讞必精握節不撓以胥安道孫夢得薦改大理寺丞知鄞縣葺隁埭百餘决導瀦積轉運安撫司各條其治狀舉簽本州幕遷殿中丞太常博士知常熟縣濬金涇鶴瀆二浦溉田千頃為公家利除尚書屯田員外郎通判泰州未上卒纍贈金紫光祿大夫子師道師道字貫之天聖中甲科進士為撫州判官知廣德縣民祭張王廟歲殺牛數千師道禁絶之孫甫薦其有治狀通判許州纍遷都官員外郎至和初吳育舉為侍御史奏請罷內降推恩擇宰相久其任選賢宗室養宫中備儲二初皇祐中賈昌朝上議置五輔郡設京畿轉運使提㸃刑獄號為拱輔京師而論者謂宦官謀廣親從兵欲取京畿財賦贍之因以收事柄師道力奏非便遂復舊制又以四年貢舉士苦淹久請易為三年劉沆護葬溫成皇后禮官議稱陵師道數疏論為非典制忤沆出知常州臺諫極言其不平沆因罷去而師道聲迹益著徙廣南東路轉運使舊補攝官皆委吏胥無先後遠近之差師道始籍其次第召為鹽鐵判官道改兩浙轉運使遷起居舍人同知諫院管勾國子監嘉祐四年百官上尊號師道言其無益又言諸閣女御多遷擢恐內寵因緣以害政事將有斜封墨敕之弊時大星隕東南有聲如雷上疏曰按天狗所下為破軍殺將伏尸流血今備邊防盜未見其至雖有將帥不老則愚士卒雖多徑勇者少小人思亂伺釁乃作必有包藏禍心投隙而動者宜柬拔將帥訓練卒伍預為備禦仁宗優容之遷兵部員外郎兼侍御史知雜事判都水監數奏陳升之不當進用升之罷師道出知福州頃以工部郎中入為三司鹽鐵副使八年遷户部直龍圖閣知明州卒年五十九師道少有經國之志居官厲風操在言路有聞即言或獨爭或列諫如陳執中家人殺婢卒坐免奪王拱辰宣徽使李淑翰林學士及王德用程戡領樞密宦官石全彬閻士良升進皆奏數其罪及請士大夫終葬始得從仕立限田以均民産抑貪墨以清守令崇私廟以廣孝治擇知典故近臣以任禮樂之官減色役以恤困窮之力皆天下急務而衆所願行者有奏議二十卷文集五十卷嘗為唐詩史著君臣治忽之迹藏之祕閣有詔褒美子世京世亮皆進士世京字延祖補柘城主簿遷歷陽令適師道守明州世京棄官侍養父喪扶護歸鄉垢面跣足書夜哀號行路為之隕涕服除改著作郎知海鹽縣勸民孝友睦姻及耕桑之事治聲動浙右熙寧初召為管勾湖北廣惠倉時朝廷鋭意改作論不合乃辭歸舊治海旁之民聞世京至歡呼鼓抃尋以疾歸田里詔授祕書丞致仕卒年四十一所與游最厚者同郡朱長文也所著文集藏于家范純誠字子明夢齡四世孫祖光謨餘杭令父埴朝邑簿慶厯三年以叔父仲淹恩澤補太廟齊郎皇祐初仲淹置義田皆純誠辦習因奏為長洲尉俾創規法以貽永久歷衢州司理嘉祐初遷監衡州茭源銀場卒范之柔字叔剛仲淹五世孫純祐之曾孫贈中奉大夫公武之子也第進士嘉定初拜監察御史歷右正言左司諫起居中書二舍人刑禮二部尚書太子詹事封崑山縣開國子之柔奉親事君一以文正為法知止畏盈每有山林之志最後纍章乞骸骨上諭宰臣曰為朕勉留將大用之以通議大夫禮部尚書致仕卒贈特進開府端明殿學士諡清憲弟良遂良遂初名之傅字次卿卜築崑山之事塘放情山水不慕榮利長於歌詩兄雖寖貴視之泊如也有詩集十卷官承務郎子慶家通判建康府范周字無外仲淹從孫贊善大夫純古之子負才不羈工詩詞安貧自樂未嘗屈折於人所居號范家園方臘之亂州民團結巡護雖士流亦不免周率學舍諸生冠帶夜行以大鐙籠題詩其上云自古輕儒莫若秦山河社稷付他人而今重士如周室忍使書生作夜巡守將聞之亟為罷去嘗為知州盛章賦雙蓮元宵等詞皆見稱於時范文英字彥材仲淹八世孫承直郎淮安軍司法參軍邦哲之子也幼孤力學强識絶人至元間闕薦署廣信書院山長改獨峯書院比至而闕已領職遂歸不為意道婺謁故人白景宣景宣為本道亷訪副使謂文英曰吾聞王某需次居子後今攘而先之其訴諸有司當為直其事文英曰儒者敢不以亷恥自重乎且吾本不欲仕彼能成吾志何謂攘也再改安定書院及考授紹興路教授將上偶過友人杜元父有客在次語杜曰某逺千里求升斗祿以養幸得一官為學者師當代范文英滿缺期尚三載餘旅此不克歸無資以自給奈何歔唏泣下文英詢之知為曾小隱也曰我即范文英今耄矣無能為也子其行乎明日遂往候曾以所服袍笏遺之且助其道里費時咸義之尋以將仕佐郎平江路學教授致仕以祖規次當主奉大宗祠祀遂領其事董正譜籍申明先矩禮致良師教養具備待族接人喜怒不形又請于朝即祠建學改為文正書院范成字性存文正公族也世居縉雲父霖元初以名儒召授江浙儒學提舉轉禮部侍郎立朝有論議氣節凌人時咸讓之因往來于吳還家焉成幼劬于學卓然有立獲親灸前朝遺老資性明達質厚氣完接人溫而莊治家有法吉凶慶弔一遵禮制曰吾有所受也家貧處之晏然以經術教授章句名數無不究極隨才誘掖成人之美與人交無崖岸從朋舊握手賦詩飲酒藹如也郡嘗禮致為訓導詩文和易有藳藏于家晚年以次子司文知臨朐往就養會同文有故成亦卒于旅中長子煥篤孝聞訃哭踊幾絶即衰絰指河誓曰所不能完父柩而歸者有如此水遂行半月道陸踰二千里始達自度囊空不敢輒啓窆西走濟南何書獲所資東還賃牛車以舁柩過諸岡牛疲手自推挽過沭涉汴踝皆皸瘃八閲月始抵家葬焉吳感字應之以文詞知名天聖初省試第一九年中書判拔萃科官至殿中丞子純字晦叔文行亦髙鄉人目曰吳先生姑蘇志卷四十八
