body:
  text: 姑蘇志卷三十明王鏊撰寺觀下崑山縣叢林寺九觀一景德教寺在縣治西南通德坊內晉黃門侍郎兼中書令王珉捨宅建祠堂在焉始名寶馬寺宋景德二年僧慶辨奏賜今額元燬洪武中僧九齡重建歸併菴七草堂菴在縣南一里宋寶慶二年僧演義建圓明菴在縣東南五里宋寶慶元年朝散大夫陳振建積慶菴在縣西一十里宋淳熙二年僧志欽建集慶菴在縣西南十五里宋淳祐二年僧德韶建法喜菴在縣東二十里宋嘉禧二年僧普壽建大乘觀音菴在縣西南五十里元至正間僧普明建廣福菴在縣西一十五里宋端平二年僧益禪師建慧聚教寺在馬鞍山下梁天監十年吳興沙門惠嚮建相傳嚮登山寓一石室欲建寺忽神見請助千工用佐景福是夜風雨暴作喑嗚之聲人皆聞之遲明殿基成延袤一十七丈髙丈有二尺巨石矗然其直如矢事聞因命建寺賜今額封山神為大聖山王仍賜鐵爐繡佛敕張僧繇繪龍於四柱唐會昌中寺廢以柱藏郡中大中間復興賜金書字牌銅鐘復以柱還寺登臨勝處有古上方月華閣妙峰菴又有留雲翠屏翠茂夕秀諸軒及淩峰翠微垂雲諸閣不可盡紀淳熙中寺燬自唐以來名賢題詠碑刻及殿柱雷火篆書楊惠之天王像李後主所書扁榜悉燼止存山王殿端平至正間凡再燬洪武中僧曇倕重建然非復往時雄麗矣歸併菴二唐王洮天王堂記有釋氏于宅于馬鞍山下者一日忽扣太原王生洮促足角坐涵意欲泄不能者數四頃乃作曰欲以天王堂事勞筆端謹按釋氏書云天王生于闐國作童兒時猶能血鏃射妖遂去走天竺遇金仙子授記護閻浮提補多聞王騰雲跨漢靸鬼撚魔霞幟雪戟指句摧泮竟鎮妙髙北面水晶宫中為藥又官長吁竒怪事孔門弟子慚於語然儒以正直為神今天王能射妖摧魔用壯護世是亦正直也復何慚之哉按馬鞍山踴出平原中絶頂晴望他山百餘里緣接培塿咸溝穿塍織坦然鋪出復多竒石支疊危柱釋氏築室鑿倚山半今天王堂實翼西北隅盤伏嶽聳屹然拄空金精獰環力溢膺腕彘卒象伍作為部落堂宇宏麗四簷飛翬庥靈庇像若膄瞞被甲擔戈立於煙靄洮因勞其費進曰非某力能皆邑民為之塑實成於張𢎞度堂實成於俞師甫吁大凡力於耕者一人切於穫者三人豈偶然於天王哉釋氏子姓闕號清建姓趙號良顗時唐大中三年記唐張祐詩寶殿依山險淩虛勢欲吞畫簷齊木末香砌壓雲根逺景窗中岫孤煙竹裏村憑髙聊一望歸思隔吳門孟郊昨日到上方片霞封石牀錫杖莓苔色袈裟松柏香晴磬無短韻晝燈含永光有時乞鶴歸還訪逍遙場王安石次韻峯嶺互出沒江湖相吐吞園林浮海角臺殿擁山根百里見漁艇萬家藏水村地偏來客少幽興秪桑門僧蹊蟠青蒼莓苔上秋牀露翰飢更清風花逺亦香掃石出古色洗松納空光久遊不忍還迫迮冠蓋場趙彥端題西隱西風數客一闌干野色蕭然得細看潦水倍知秋事早夕陽更覺晚山寒小留待月鐘無遽半醉題詩燭未殘憶得向來幽獨處黃精未熟客衣單僧沖邈翠微山居八首間來石上卧長松百納袈裟破又縫今日不愁明日飯生涯只在鉢盂中臨溪草草結茅堂靜坐安然一炷香不是息心除妄想都緣無事可思量老老山僧不下階雙眉恰似雪分開世人若問枯松樹我作沙彌親見栽幼入空門絶是非老來學道轉精微鉢中貧富千家飯身上寒暄一衲衣一池荷葉衣無盡數樹松花食有餘卻被世人知住處更移茅舍作深居茅簷靜坐千山月竹户間棲一片雲莫送往來名利客階前踏破緑苔紋爐中無火已多時早起惟將一衲披莫怪山僧常冷淡夜深無處拾松枝豈是栽松待茯苓且圖山色鎮長青他年行腳不將去留與人間作畫屏郟僑訪翠微上人行客倦奔馳尋師到翠微相看無俗語一笑任天機曲沼淡寒玉橫山鎖落暉情根枯未得愛此幾忘歸髙啓和唐人韻鳴鐘警迷方枯僧兀趺牀石姿生寒稜松子落古香殿鎖山雨氣樓迎海暾光遙望蒼蒼城愁是車馬場煙斂城初出潮來野欲吞危樵緣磴角倦衲憩松根剎表藏林寺鐘聞隔海村畫龍飛去久空掩殿堂門餘慶菴在縣西北二十五里元至正八年僧輝煬建擁翠菴在馬鞍山之陽洪武四年僧本覺建華藏講寺原在馬鞍山頂舊名般若宋宣和間信法師者易今名本在山之北麓洪武十三年僧大雅移建於此歸併菴一張景修詩白雲原未髙香砌等林梢側腳隨山徑低頭認鶴巢客清茶破睡僧瘦筍供庖詩句非吾祖何人繼孟郊沖邈礎潤藏雲族簷虛壓樹梢經常逢夜講齋不過中庖有井龍應蟄無泥燕不巢登臨增野興四顧盡寒郊朱穀行行身漸髙長袖掠花梢一線道縈鳥千年居等巢地嚴金襯步天近玉分庖撫掌棲松鶴驚飛雪點郊易九成煙霞通一徑樓閣近諸天翠積祗園樹蒼擎華嶽蓮空花皆是幻水月不離禪暮景飛蓬逝餘光落照懸獨尋方外友已斷世間緣坐久談玄理松風落麈前超化菴在縣南三里宋淳熙間僧善果建薦嚴資福禪寺在縣治東南唐天祐三年鎮遏使劉璠捨宅建匡禪師開山五代梁開平三年改崑福院宋大中祥符元年勑改惠嚴禪院尋賜今額寺有普照堂髙宗書扁又有法堂曾􅌈記泰定二年燬後至元四年僧希顔重建永樂九年僧道艮重修歸併寺一菴二范成大夜步東寺之西人家簾幕夜香飄燈火蕭疏照市橋滿縣月明春意好小樓吹笛近元宵又東禪廊夜二絶淡雲如水霧如塵殘雪和霜凍瓦鱗織女無言千古恨素娥有意十分春一聲黃鵠夜深歸棲雀驚鳴觸殿扉北斗半垂樓閣外風幡直欲上雲飛無相禪寺在石浦鎮梁天監十年建後唐天福二年重建舊名寶乘寺宋大中祥符元年改賜今額洪武中僧以寧重修延福菴在縣治西南元至正四年僧淳厚建觀音菴在縣西南二十里元至正六年僧普傳建能仁教寺在縣東南三十五里唐天祐二年魏長者捨宅建用法師開山名羅漢禪院唐長興二年改德義院宋大中祥符元年改今額洪武二十三年僧永年重建歸併無報國講寺在景德寺西舊在縣西一里許名九品觀堂相傳其地本屠沽所聚寺僧師諒一夕夢有神人披髮執戈而告曰此地當作道場師何不究心興一觀堂名以九品鑿地為沼當有石塔現寤而言之協力建造果得石塔數層上刻元幹僧師諒九品觀堂元泰定間嘉興路僧判荃公改建於此後荃公興工鼎建殿宇奏請今額洪武二十三年僧九齡重建歸併無沈周詩東崑不到兩年強六月來遊是趂忙城裏誰家無暑地水邊人説有僧房入門認竹天光晚借榻眠松夜氣涼造次題詩才一過不知三過幾時償聖像教寺在縣南三十五里滬瀆晉建興二年有迦葉維衛二石像從海逆水而來止此衆迎像置郡城開元寺里人趙罕復捨所居建寺於此勑賜今額梁禎明四年重修宋寶慶中寺焚晉梁碑刻無存歸並寺一延福教寺在秦柱山陽梁天監二年僧從義建有浮屠七成元末寺燬惟浮屠存焉延祥教寺在縣東南四十里梁天監間里人莘氏捨宅建名紹法寺宋大中祥符元年改賜今額洪武十一年僧德潤重建歸併無趙靈興福教寺在縣西南六十里唐大中十年僧宗德建趙靈山在寺後故名洪武中僧智彰重建歸併菴一餘慶菴在趙靈寺傍宋咸淳二年僧文顯建福嚴禪寺在縣東南七十里磧礇村元至元間僧友山建洪武中僧澤雲永樂中僧信源正統中僧曉堂相繼重修有雷音閣剪松軒最勝歸併無清真觀在會仙橋東即宋放生池也乾道七年道士翟守真建真武道院淳熙元年移常熟縣清真觀廢額改置嘉定八年建昊天閣陳振記元大德間燬延祐間重建楊維禎記永樂初重修歸併觀二道院六宋項公澤跋御書放生池碑臣恭惟仁宗皇帝澤潤四海仁及羣生乃以景祐三年十一月己亥朔詔天下乾元節宴設量事烹炮毋得過殺物命皇乎休哉好生大德不遺微小所以壽我宋於萬年之脈者在是也于時中外之臣靖共豈弟推廣上意若民若物涵濡闓澤於囿生之內肆惟皇上遵守家法親灑宸翰俾誕節錫宴一遵景祐三年詔書大哉王言上以續仁祖生生之澤下以遂萬有生生之性臣嘗管窺蠡測竊謂聖德之妙溥博無私仁民而愛物皆此一念充之皇上曩以訓廉謹刑二銘董正吏治兹仁民之本原也今戒烹宰仍於所在放生池刻石其愛物之著見乎臣承恩試邑夤奉德音敬摹勒於清真觀放生之所昭回之光焜耀百里雲飛川泳同躋壽域臣敢不對揚休命奉行寬大詎容徒使恩及禽獸而功不至百姓有負於聖天子一視同仁之盛心乎庸敢推明聖心并載于下方淳祐十年正月望日跋陳振昊天閣記循縣西行一里所少折而東得道家者廬曰清真觀觀有閣傑出曰昊天閣嘉定四年正月知觀事馬拱辰劉道映所建也嵌空為臺三面扶闌振嘗夜醮其上月星低垂天地收籟步虛清越佩聲和鏘是心油油以敬以肅閣之達顧不足妥靈隤祉歟觀為放生池振兒時間一至小亭孤立度以浮梁乾道七年道士翟守真卒自天台睨縣家四維欠薰崇香火地始丐諸官劬躬經理十五六就緒淳熙初元外大父左史李公帥寓公士民狀翟君有操行遷常熟縣故道宫額榜曰清真而推翟君主之當是時先君尚無恙也閲三十一年而馬君嗣又九年劉君嗣至是棟宇之制十備八九矣而閣又其髙明壯麗者噫老氏學長生不死而神仙得道之士蟬蛻埃壒影響不接於人故間館真祠寥寥郡縣斧斤畚築或曠歲耳不一聞清真自翟距劉用力三世而外大父而下若先君亡慮草又八人指計微一存者獨往來逵道巋然壽宫不曰難乎振於是有感焉則又曰雖然績底於勤圮於盈志植於強肆於安劉君乎能念前人所以壽其後者乎朝修有所翻閲有經祝皇之壽酬施者之勳考擊鼓鐘弗渝少分若是則凡厥未成者將不日而成之况其已成者乎茍為不然食飽而衣鮮暑簟而寒氊忘厥由來以嬉以恬若是則雖其已成者懼弗能堅且久也况其未成者乎秦約詩碧水池頭秋水深芙渠萬柄翠生陰玄田種子俱成玉琪樹開花已滿林道士步虛蒼玉珮仙人吹笛水龍吟西臺風雨清無夢隔竹聲聞搗藥禽楊維禎放生池上晚披襟五月涼風草樹陰玉井水寒船作藕葛陂雨過杖成林雙雙並合煙中下瑟瑟蜿蜒夜半吟道人當晝洗硯石自臨青李與來禽郭翼放生池上應五月爛漫花開坐夜長月出金盤擎露影天髙玉井散秋香雲邊小溆瀛洲近鏡裏微波太液涼準擬王喬借飛舄仙遊從此恣翺翔偶桓殿閣峩峩轉夕暉放生池上客來稀應知羽士登真去獨見山童汲澗歸雲冷松巢空鶴􅌁雨荒丹竈長苔衣野人素有煙霞癖欲向玄關共息機靈應普照觀在縣東北一里宋嘉定中邑人翁謙鑿地得石函中有青圭因建道院宋寧宗御書觀額又書止堂扁賜主者易如剛真如觀在石浦鎮宋慶元間建永樂十四年重建月華道院在卜山下宋熙寧五年建一名玉虛道院廣福道院在縣西南宋乾道八年建真聖道院在縣治西元至元間建靈祐道院在縣南元至元三年建洞明道院在㳌川鄉元至元元年建修真道院在泗橋鎮元至元壬申道士錢日升建常熟縣叢林寺十觀一慧日禪寺在縣治西稍北梁天監間吳興僧慧嚮開山舊名壽聖又名晏安又名慧日禪院紹興十五年燬乾道九年僧宜意嘉定間僧子幸先後重建縣令張珽記按記云寺經鬱攸碑碣無存相傳三錫額曰壽聖曰晏安曰慧日亦口傳耳又按吳郡志云始於禎明元年皇朝治平四年勑額壽聖晏安禪院元統元年僧普明改院為寺建觀音殿胡助記永樂八年僧可觀重修今為祝聖道場歸併寺二菴三周霞賓詩盡説梁朝寺誰參嚮老禪莊嚴存像教汩沒悵塵緣七寶祗園樹雙金佛地蓮海鄉煙霧裏月落曙鐘傳寶嚴禪寺在虞山之麓梁天監間建初名延福禪院宋天禧間改今額錢氏時髙僧希辨居此後隨國詣闕賜號慧明大師歸隱故處寺有浮圖七成極莊嚴相傳泗州僧伽塔第一此為第二仁宗朝賜銅鑄東嶽聖帝像為伽藍景祐中僧清鑒重建縣令陸鋒記永樂初重建改為寺按中吳記聞吳越錢王之子祝髮於此太宗賜御書急就章逍遙詠聖惠方於寺中而陸鋒記所云賜書乃希辨初不云錢氏豈辨即錢氏子耶宋王伯廣平湖鏡淨中背貼青峯巒去郭二十里金碧輝波瀾是曰寶華境萬象鬱以盤壯哉窣堵坡一瞰天地寬誰懷墮塵鞅幾欲招飛鸞我生眇何能山水情所安扁舟幾來斯不為開愁端意到自行樂樽酒那追歡何如結青蓮起適心外觀塵迹身兩忘浩然天地間宋姚愈浮圖插雲表列障環古剎平湖眇澄波萬態天光發我來陟層巔秀氣助毫末扁舟返明月萬頃玻璃滑宋陸曦出屋蕭蕭竹數竿入門襟袖便生寒相期更待梅英發醉棹短蓬來細看練塘寺在練塘市初名仁王院宋開寶中鄒知邈施地建大中祥符元年賜額淨慧禪院洪武初重建改今額寺有看經寮宋夏之文記羅墩菴在羅墩宋元祐二年僧妙澤建尊勝菴在縣治西北宋開慶間僧恩律建平墅時親菴在平墅元至正二年僧心鑑建破山興福寺在虞山北嶺下齊始興五年邑人郴州牧倪德光捨宅建始名大慈梁大同三年改興福寺唐咸通九年賜額破山興福寺寺舊有髙僧文舉塔體如塔救虎閣宗教院通幽軒空心亭唐御賜鍾瓔珞樹重蕚千葉蓮修廊復殿奇花異木最號奇勝今並廢不存唐人再修功德記此寺始自齊始興五年因邑人郴州牧倪德光捨居第置之是為大慈寺至梁大同三年改為興福寺自為邑為寺歷陳隋四代迄於我唐甲辰歲歲逾三百年會昌末釋教中圮僧難聿興武宗斥去浮屠法寺毁大中踐祚再恢釋教俾飾伽藍先是大檀越主吳興錢公某吳郡顧罕汝南周坦與彼親友兼募信士助修塑像添建殿堂赫赫垂芳傳之不朽以雋僑居是邑廢之興之耳目相接俾書其事有愧斐然中和四年六月五日記吳郡志云按齊無始興年號但有延興中興二號皆止一年流傳之誤如此以其唐碑姑存之唐常建詩清晨入古寺初日照髙林曲徑通幽處禪房花木深山光悅烏性潭影空人心萬籟此俱寂惟聞鐘磬音僧皎然雙峯百戰後真界滿塵埃蔓草緣空壁悲風起古臺野花寒更發山月暝還來何事池中水東流獨不回秋風落葉滿空山古殿殘燈石壁間昔日經行人去盡寒雲夜夜自飛還宋李堪雲門十里長殿塔明朝陽半夜風雨至滿山松桂香清猿嘯逺壑好鳥鳴虛廊塵土斯可濯胡為語滄浪莫儔久聞勝地有蓮宫乘興來遊杖瘦笻庭老樛枝翠瓔珞池生並蒂玉芙蓉飛仙何意來題柱開澗當年想鬬龍歸騎回看樓閣處雲深隱隱度疏鐘李光招提清絶冠諸方溪繞山圍勝氣藏好在池塘存舊址依然花木隱禪房風生殿閣元無暑雨後松篁自有香日暮不教清興盡更登絶頂瞰微茫陳與義不到龍門十載強斷崖依舊挂斜陽金銀佛地浮佳氣花木禪林接上方羸馬暫來還竟去流鶯多處最難忘老僧不作留人意看水看山白髮長聖壽東靈寺在縣治西北梁大同中建唐嗣聖二年改為中興寺本在吳縣界神龍元年移置於此賜今額熙寧六年重修歸併無宋陸徽之東靈寺莊田記壽聖東靈寺天台教院者肇修於熙寧六年涉二紀而告備焉基自講師光瑞而成於今闍黎梵崇佛舍中嚴講室後邃齋宿之房庖湢之宇布列兩序代有名人四逺學徒聞風而至者無慮百數歲比不登邑民艱食崇師患無以贍學徒則每推施利之應已有者悉歸之衆猶不能給也然而人皆知崇師之能導矣於是僧道賢率諸檀信等買田二百一十畝永為常住供崇師感檀越之厚施也則欲鑱石刻其名銜而屬豫為之記豫謂吾儒言人情者聖王之田而以修禮陳義講學本仁為耕耰播植之諭至於佛説福田亦不過種諸善根而已合而言之其理一也夫方寸之地人皆有之果能竭精進之力以致穮芟欲惡之萌以絶雀葦則信善之生焉可已也充信善之心無施而不可則所以為利益者廣矣且衆生以愛故入生死由於愛境有逆有順而生喜怒造種種業則所謂情田福田者於此荒蕪矣展轉六趣至千萬劫本所從來惟有一愛更無餘病佛大醫王對病為藥唯有一捨更無餘藥常以此藥而治此病如水救火應手當滅故當世導師必破人愛欲之萌而起人喜捨之意使人皆知情田福田之説而內自得焉則彼區區在外者何足靳邪况夫檀則能施而越則能度生死是諸檀越充信善之心以捨施則將絶愛境而脫生死矣豫故言情田福田之利益而歸之於導師之救病也東塔崇教興福教寺在縣治東北半里宋建炎四年僧文用謂此邑客山髙主位低請於縣令李誾之建塔鎮之功未就而卒咸淳間僧法淵别建塔九成洪武中僧淨慧重修妙聲記歸併院三菴六頂山廣福院在虞山北嶺下梁大同十二年石史君建名頂山院宋治平間改頂山聖壽院續改今額僧梵行重修梅林東塔院在梅里鎮宋紹興間邑人錢道者建浮屠七成南市崇福院在縣治西南宋建炎二年僧安嶽建福順菴在縣治南稍西宋紹興間僧萬山建常慶菴在蘆瀝村宋咸淳三年僧永祥建崇福菴在縣東九里元至元間僧真福建金李菴在縣南一里元至元十三年建資福菴在顧墩宋嘉泰三年僧雲祥建白龍菴在頂山梁天監元年僧堅鎬建維摩禪寺在虞山上宋隆興五年僧法運建舊名石屋維摩菴有石井名湧泉淳熙三年丞相曽懷請為功德院賜顯親資福禪院洪武中僧壽松重建改今額歸併寺一院一菴二明因禪寺在支塘市北舊名永昌唐乾元中廢咸通間復建改名再昌祥符中改明因禪院永樂元年僧慧觀重建改為寺宋縣尉陳于記東常熟縣七十里有雙鳯鄉有村支塘而寺於其間曰明因嘗曰永昌又名再昌至國朝祥符改元始易今額至熙寧六年遂為禪寺土不變壞人不更聚而名目之不同者時異事異實亦尊佛而已佛以一無冒一切有以一真破一切妄一切法是有我何使之無我本無無今安得有一切法是妄我何使之真我自非真今安得妄一有一妄為有情故一無一真為無情故此禪律所由判也東西分祖南北異宗以攝戒名律以見理名禪此禪律所由盛也夫律為漸禪為頓而為之徒者以禪受什方以律傳父子因而反戈自伐與俗同汚其不見僇於世者無幾初僧文曉由是與流輩有不平者以事至有司遂攘臂鼓衆更律為禪自今日始縣為聞府府下僧籍搜可為領導者衆薦今禪師紹瞻而府可之師至其徒有不悅者豫空其室以遁其頽垣壞壁蕭然如無人之墟師收付遺衆繕革故廬鳴鐘擊鼓晨倡夕和欣欣如也規範僅舉徒衆僅安歲輒大凶而水且旱百里蕪其八人輒大疫而逋且逃十室虛其九嚴不轉之心奉一實之事根無利鈍應病用藥其徒以此親施無厚薄均福田相鄉人以此敬八年於今而門之外導長涇以利衆長涇之上營石橋以便行堂室龕殿雖未及美而小康矣因師請石之論次如此若夫門未革殿未紺而丈室未敞此必有待於他日余不得而書也元豐四年五月十五日前常熟縣尉陳于撰上方院在頂山小嶺之外夾兩山之間白龍泉在焉范仲淹平湖數百里隱然一山起中有白龍泉可洗人間耳吾師仁智心愛兹山水音結茅二十年不道歲月深笑我名未巳來問無為理卻指嶺邊雲斯焉贈君子宋冦準雨歇黃梅後秋生麥熟前偶同金馬客來訪玉龍泉竹葉一樽酒榴花五月天不妨扶拄杖行到白雲邊孫應時澗水有奇觀山蟬發清歌穹林翠光合深谷涼風多孤遊轉寂厯佇立久婆娑吾生政須此欲去意如何瑞石菴在上方院之右宋明道元年邑民陳氏建僧守常開山祠部員外郎錢藻記頂山之巔直上絶險怪篁奇木陰森鬱翠之中有瑞石峭拔不可窮極而龍母之冢神龍之池環窟其旁邑民禱禳水旱曽不告召而千里畢至明道紀元之初浮圖守常者能默誦妙法蓮華經邑民陳氏屋其下為菴召守常者持事之自是禳禱輒應而福在一方守常死菴其下者不得其人則禳禱不效水旱相仍嘉生不遂邑民以為甚患逮今治平丙午縣大夫向侯因民之欲命僧慧安拯廢舉墜益廣其旁以廊以軒以垣以甓以飯四方之來者以起民人歲時祈禱之誠信夫窮巖絶境龍怪之窟宅足以為一方之福遇人而興其信誠之應效蓋不可誣神之為靈嘗陰寂無形不可得詰而若依人以為報其能不逆民之心以嚴香火之地以致誠於陰寂不可詰之間而為取福善之應蓋亦賢於無所用心而欺暗以悖人者之為也拂水菴在虞山西嶺上洪武三年僧道源建永慶教寺在河陽山梁大同二年侍御史陸孝本捨宅建宋賜名大福寺尋改今額相傳有僧肉身泛海而來狀貌奇古僧徒迎置於寺固以膠漆靈應多驗又山頂有石井泉清而甘大旱不竭鄉人目為聖井庭有八檜一夕雷震西南一株斷附他幹猶生為寺中三絶元燬惟石井存焉歸併菴八四道明王菴在塘頭墅宋乾道二年僧中玉林建廊城菴在開元鄉宋紹定二年僧傳心建奚浦菴在南沙鄉宋紹定二年僧名堅建餘慶菴在陳墩宋乾道二年僧柏梁建慈敬菴在南沙鄉宋紹定三年僧法應建何王菴在南沙鄉宋乾道間僧性真建伍相菴在南沙鄉元大治八年僧修倫建晏林菴在虞山西宋紹興六年僧杰文翁建妙清教寺在莫城陳禎明二年僧宗梵開山初名妙清院相傳有鐘泛海而來緇徒迎置寺中寺東有迎鐘塘初名妙清院洪武中僧道𢎞重建改為寺永樂中姚廣孝記歸併院一菴十一報慈院在馬涇宋嘉泰二年僧思恩建崇慶菴在下莊宋大觀二年僧安嶽建廣福菴在吕舍宋開慶元年僧智皎建善濟菴在東顧莊宋淳熙間僧泰嵩建圓應菴在新莊宋開慶元年僧安山建崇福菴在舍澤宋嘉熙二年僧守義建崇福菴在廟橋宋淳熙間僧永壽建戈墅菴在戈墅宋咸淳二年僧文表建法華菴在朗城宋咸淳元年僧海寧建圓通菴在徐涇宋咸淳五年僧心傳建觀音菴在白蕩元天厯二年僧法英建雲慶菴在宛山元泰定間僧普明建大慈教寺在福山鎮按舊志梁太清元年僧普明大師建舊名法水禪院宋大中祥符元年改今額僧居簡有鐘樓記相傳海中有巨木蕩漾諸寺求不可得大慈禱而得之遂以為棟名曰泛海梁元燬洪武初僧善持重建歸併菴二邵莊菴在端委鄉宋建炎三年僧善妙建慈義菴在陸莊村宋致和二年僧澄淵建勝法寺在梅里鎮唐元和中閻將軍捨宅建乾元間置為離火宅寺晉開運中改為境寧宋大中祥符元年改今額至和初更禪院歸併無葉夢得轉輪藏記佛法自漢入中國即與其言皆來然未嘗若是侈也至晉宋周隋之間鳩摩羅什之徒出更相傳譯轉相付授於是其書之至者日以廣源流既逺往往失其本真梁武帝時始有言心法者一切以洞然無我為宗不立文字佛氏之學遂判為禪律兩岐其後更數百年學心法者雖益盛然其書未嘗卒廢自隋開皇至唐開元正元以來凡列於目者曰大乘小乘曰律曰論部分甲乙鱗次櫛比雖假託疑似謬妄之辭茍不叛其説亦莫不具在其傳至於今不絶昔吾儒者之言僅出於中國其道在天下昭然若揭日月而一遭秦火雖六經不得為全書殘編斷簡得於屋壁丘墟之餘與一時遺老所誦習雖幸而獲存然顛倒錯謬固已不勝其弊其他諸子百家各以其藝自名於時者近數十年逺或百年皆已湮滅無聞而佛氏去中國數萬里其言率一譯再譯而後見乃全而有之愈久而益著何也豈其言皆足以示後行逺使人欲廢而不可得歟蓋為之學者皆知信其所習而尊其所聞相與謹守嚴奉手傳口誦而不敢慢非有意於借資取便階梯所欲嘗探而勿忘之者然也常熟姑蘇别邑梅里鎮又在邑之東北海上有寺曰勝法故無藏經崇寧二年長老道綱始募衆緣為之綱強力明果學心法者也居勝法二十年與始至之日無異工既成見余霅上曰並海之民不耕而漁其習以多殺為事而不畏罪與之言吾理則惑教以其書則怠惟轉輪藏備極雕刻綵繪之觀以致其莊嚴之意可使凡徼福悔過者一皆效誠於此吹蠡伐鼓機發軸運象設駭於目而音聲接於耳不待發函展卷而其心固已有所嚮矣然邑民瘠而艱施歲且多潦有欲成吾事者而屈於力其力足以及之者而窘於歲蓋竭吾勤而後能成不有記其略無以慰此意也因請余文至再三不已夫物之盛衰存亡固不可皆以力致然未有不存乎人者服儒衣冠者遍天下不能盡有其傳而佛氏獨能持久若此是必有當其責者因推其所以然書以遺之非特嘉綱之勤而已也孫應時古剎精廬隱茂林斷雲疏雨正秋隂黃花又是一年事枯木依然千歲心病酒未能忺獨酌懷人無與共清吟僧窗夢覺鐘魚靜聽徹寒蛩語夜深智林教寺在李墓村唐乾元元年建初名永安寺宋大觀四年以犯宣祖陵名改賜今額寺舊在地名岡身後以寺鐘不聞於近而多應於李墓遂徙置於此名僧了通嘗居之歸併院一菴六宋李光詩扁舟來訪小叢林花木通幽院落深旋拂胡床成午夢間持貝葉動秋吟竹聲瑟瑟生虛籟山意峩峩入素琴更喜老綱能會事手攜爐銚自相尋如存院在白茆塘北宋咸淳間僧道腴建桑倫菴在思政鄉元泰定間僧靜意建髙浦菴在思政鄉元泰定二年僧如從建福田菴在許浦鎮宋治平間僧雪山建資福菴在姚巷宋端平二年僧安信建觀音菴在思政鄉宋端平元年僧皎月建杜相菴在思政鄉宋治平年僧永安建致道觀在常熟縣虞山南嶺下梁天監二年漢嗣天師十二代孫張道裕居此感異夢建招真治并建寥陽殿虛皇臺手植七星檜其後道裕仙去瘞劒於山之西麓簡文時改乾元宫宋治平中道士李則正浚井得藏丹化雙鴿飛入尚湖互見古迹政和七年改致道觀元泰定間鄧道樞建知止山房於西北山嶺上洪武中周玄初永樂中李本中相繼重建歸併觀一宫二道院二梁昭明太子虞山招真治記夫東瀛緑水三變得田西嶽靈桃千年未子尚以星起牽牛部首迢遞律生甲子氣數杳冥況復上遊玉清損之又損髙排金闕玄之又玄豈言象之能詮非時節之所辨海虞縣者則虞農都尉太康置其宰境有虞山越絶書云巫咸之所出也髙嵓鬱起帶青雲而作峯瀑水懸流雜天河而俱會吳門採藥之地楚望槐椒之歌湯反流沙之魂錦飾汾陰之鼎無以諭焉其峯則有石城石門虛峗自然不度勾吳之馬神功挺起豈似缸陵之畫魏后冰城夜陳權息長安慈石浴鐵暫流較迹比期優劣斯逺道士沛郡張君諱道裕字𢎞真即漢朝天師陵十二代孫天監二年來至此山遁十有餘載夜忽夢見聖祖云峯下之地面勢間寂宜立館宇可以卜居裕師潘洪隱始寧四明山無何有人耳長髮短云從虞山招真治來言訖忽然不見潘馳信報君君因辭山舊居而以夢中所指峯下之地即以為治故號招真髙臺回立有類玉臺之山長廊宛轉還如步廊之岫柱削芳桂豈俟開陽木飛材選海檀無勞豫章神拔黃庭司命之府有類玲瓏朱陵赤石之觀同符𢎞敞逺望仲雍而髙墳蕭瑟旁臨齊女則衰壠蒼茫蘚尋千仞之木氣叶星晷華飛五香之草形圖宫室帷葉綵花卷舒蹊徑陽桃侯棗榮落嵓崖樹息金烏簷依銀鳥鳯將九子應吹能歌鶴影生七歲逐節成舞旭日晨臨同迎若華之色夕陽斜俱成拂鏡之暉玉礎微潤應山雲於髙牖鳴籟徐響引和風於空谷方當專氣致柔入無為之境周行不殆窮混成之致茅子算歸輟轡無已魏姬宴罷留駕不歸何止持節變淮南之金傳符蒔北鐘之稻明月蛟龍之騎驅之使鬬四銖七子之境引以成刀散季齊之羽起雄鳴之霧而已哉乃為銘曰玉龜二始金書八會道浹地心功浮天外故常可小惟真能大德起同塵善生塞兊物寶自然人符交泰掩映緑蘿穹崇紫蓋先治之美此焉為最雄桂千步陽臺百丈水均下屬山逾髙掌野寂雲興瑟繁山響斗虹夕西豐雷朝上元陽作石竹龍成杖書藏玉匣藥藴銀銅燒鉛雜鯉折桂和蔥羽衣可服雲餅易通斧柯雖朽碑石無窮至和觀舊名至和道院在縣治西宋咸淳中道士天台應錫智建陳仁可記後其徒王大臣拓而大之改至和觀聊城周馳記乾元宫在虞山北宋元祐中海陵申元道建元道將南遊請於其師徐神翁翁曰逢虞則止無雪則開申始未悟及至是山遂插竹為菴名竹林山舊無井一日大雪惟山坳不積因浚井得美泉名雪井紹興丁卯道士喻抱元改築招真菴取致道舊額名乾元宫舊有極目亭米芾書扁元燬永樂初重修申道人鍊丹之地别有熙真館在梅里潛真館在福山與此為三真云宋康舉之招真菴記自姑蘇出齊門沿西北望山形如巨鰲橫亘原野蓋常熟縣之虞山也山之東瞰萬户治劇邑邑去江不及程陂湖畎澮之積自南至者傾馳會於江江河既應則迅瀾倒流逆於市橋之下二水相制移時而不能去山無奇谷惟荒墟白草醜石散亂坡陀迤邐而西有修林橫抹隱見於兩峯之間其中為招真菴元祐中道人申氏泰陵徐處士髙弟也基營於此菴成亟去不知所終松林森茂庭宇簡寂如隱君子之居通川道士喻抱元增治之舊名竹林至是更以招真請記於僕乃歌招真之辭以系之辭曰白鶴巢兮丹井空蓬山杳兮煙霧濛陵谷變兮今古木葉下兮秋風飛仙去兮朝太微黃冠野服兮以遨以嬉餐霞卧月兮世不我違與世滌映兮天門可馳蒼龍嘷兮雲漫扉石泉冽兮山芋肥俯仰宇宙兮日月蔽虧靈秀回薄兮野芳呈姿山中之樂兮萬化莫移仙人不來兮隱者曷歸宋孫應時乾元宫詩塵囂