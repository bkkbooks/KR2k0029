並無寶華教寺在大場鎮宋咸淳間淨光法師建永樂中僧文瑜重修歸併菴三崇福菴在下槎浦宋紹定二年僧行超建薦嚴菴在彭城浦北元戊午年僧法見建圓通菴在蘆涇浦元至正間僧善惠建真如教寺在桃樹浦宋嘉定中僧永安建名真如院本在官場元延祐間僧妙心移置於此改寺洪武中重修歸併無大德萬壽寺在南翔寺東一里元大德初僧良珦建珦本南翔僧别為寺於此以成於大德間故名大德萬壽寺貫雲石記有浮屠七成洪武中僧慶餘重建歸併菴一集慶菴在桃樹浦元天厯二年僧了心建萬安教寺在萬壽寺西新華浦初良珦既建萬壽珦之徒義榮改建寺於此與南翔大德為三大剎以其成於泰定故名泰定萬安寺虞集記歸併無西隱教寺在縣西北清境塘上元泰定元年僧恱可建僧圓照記有寂照觀堂直節堂壽樂亭空翠亭徑節軒永樂三年重建歸併寺一院一菴一元張南渠空翠亭詩人間風日不到處林石照衣顔色鮮半天六月雨蒼雪隔水一僧吟白蓮座中得趣成三笑竹上題詩今七賢他年此會或可再須借北窗供醉眠鄭元祐壽樂亭詩西隱西邊壽樂亭六時天樂語簷鈴傍人馴鶴行穿竹掠水飛魚出聽經月到中庭開碧落星從南極上滄溟千年一息那伽定長結慈雲擁帝青楊維禎直節軒詩西枝林中訪遺直况有文采錦班如誰參汝禪到玉板自愛此君如史魚彭澤風髙印綬解穹廬雪冷節毛疏道人詩似春秋筆大字琅玕節下書東林圓照寺在楊涇東宋紹定三年僧有謙建舊在晏海門外洪武間僧時習移於此永安院在黃姚宋咸淳九年僧良祺建真際菴在縣市西南隅泰定三年僧良玉建頓悟教寺在瀘涇元貞元年僧師範建名頓悟院洪武間改寺歸併菴一接待菴在廣福市南宋嘉禧間僧道印建永壽禪寺在何莊延祐中吕師説建芬蘭谷開山洪武中僧良富伽那相繼重建歸併院一菴一普照院在黃渡鎮至正間僧智通建明聖菴在桃樹浦元皇慶二年僧寶月建皇慶教寺在縣北三里元至大間圓通寺僧明了建歸併寺一菴二淨信講寺在月浦宋寶慶間承務郎談思通建僧道嵩開山鑿井得髹木佛耳號佛耳泉移錢塘勑額為名趙汝譢記元僧普現建潮音堂楊維禎記報德菴在楊巷宋咸淳間僧師壽建呂和菴在糜場橫瀝東元至元間僧良季建集仙宫在縣治東南隅宋嘉定十七年髙道葉子琬建以湖州安吉縣勑額為名紹定元年邑宰陳邁建東嶽行祠於東廡元延祐五年道士盧真祐移建上真殿於西廡與嶽祠對大德十年道士孫應元建三清殿玉皇閣瑞竹亭洪武中道士宗德輔重修歸併道院四宋常懋詩松菊新來入夢頻公餘乘興得尋真紅塵物外長清境白日壺中不老春柏子灰寒煙寂寂桃花風暖水粼粼逍遙羽士間如許愧我浮名役此身元盛如梓真宇出闤闠來遊慕虛寂流水環四圍入門松檜碧長廊煙霧生靈貺幡幢密主人聞客至樽酒延丈室編竹逾萬箇老桂髙百尺日色淨不暄松風涼可挹翛然人間世陡覺詩興逸崇真道院在縣治西元大德五年道士秦真祐建奉真道院在登龍橋北元至正間邑人顧道澄捨地建移本縣玄都廢額於此楊維禎記崇福道院在月浦宋淳祐元年里人談友諒建福德道院在縣東南一十八里元至元十三年道士王崇真建太倉州叢林寺十一宫一隆福教寺在城大西門內梁天監四年建初名報恩院後唐天祐間重建宋大中祥符元年改今額寺在武陵橋北元末燬廢洪武中以其基為鎮海衛邑人孫徹願捨所居改建於此其後僧永真重建歸併菴三真靜菴在城內元至元元年僧惠雲建通濟菴在城中元延祐元年僧嗣恱建般若菴在城中元至元二年僧善明建崇恩禪寺在州東二十里梁天監二年僧道悟建唐開成二年重建宋慶元二年重修歸併寺一菴二永懷禪寺在雙江白蓮浦宋建炎三年道川禪師建本在崑山縣治西南元至正間有鐵牛普明禪師建紹隆菴於此為永懷子院洪武中即菴為永懷寺僧文琇重建王達記觀音菴元至正三年僧道堅建般若菴元至順三年僧法辨建騺山法輪講寺在騺山南麓梁天監間僧宗印建紹興九年重建洪武中僧勝行永樂中僧智昶相繼重建歸併寺一院一菴一完敬修騺山訪僧招提逺在碧山坳杖䇿殷勤訪故交雨徑苔深留虎迹霜林葉落露禽巢汲泉謾引池邊綆煮茗還開竹裏庖此日相尋不相見松門擬待重來敲中峯講寺在頂山南峯梁大同二年僧月澄建名中峯菴後改為寺宋劉拯躡徑登髙亭天逺不敢局疏簾捲危簷百里在舉目江橫縞帶明山隱螺髻緑啼鳥破長煙飛泉漱寒玉雲回猛虎嘯清風繞巖谷颼颼入青松古淡琴一曲倚欄更凝望斜陽上修竹欲去還遲遲勝概那可足支逋中峯一徑分盤折上幽雲夕照全村見秋濤隔嶺聞長松含古翠衰葉尚微薰自愛蘇門笑懷賢事不羣僧仲殊聚逺最髙亭登臨喜倍增貪陪青眼客不見白頭僧閉户三十載壓雲千萬層龍珠彈落處一點白蓮燈廣福院在馬涇宋嘉泰間僧守信建趙莊菴在思政鄉宋端平元年僧永福建陸河聖像教寺在陸河市吳僕射徐真捨宅建亦因泛海石佛而名宋嘉祐八年朱肱重建僧仲殊記洪武初重修歸併院一菴七崇壽院在橫涇宋端平三年僧皎殊建福田菴在陸名涇口宋咸淳二年僧道隆建崇福菴在橫涇宋紹興元年僧至實建湴湖菴在智林寺東宋端平二年僧德詮建歸雲菴宋咸淳二年僧文雅建資福菴在邢家莊宋元祐三年僧尊妙建東禪菴在甘草鎮宋崇寧元年僧惟一建時思菴在陸河里宋咸淳五年僧泉涌建法輪教寺在雙鳯鄉晉支道林開山宋祥符元年改今額洪武中僧至琛重建歸併寺一菴四靈寶寺在塗菘市唐乾元初僧普定建法華菴在塗菘市唐龍翔九年僧泰和建迎春菴在雙鳳鄉宋淳祐二年僧月山建長壽菴在南沙元至元二年僧志通建崇祖利濟菴在李墓東宋端平二年僧智崇建廣安教寺在直塘市唐乾元初簡大師建相傳簡領二人來遊立菴於此插竹護籬落後遂成林初名寶林寺宋祥符元年改今額紹興六年僧了悟建塔鑿地得磚有長安二年瞿像寶塔字乃知唐武后時嘗建塔宇於此永樂四年僧拱辰重建歸併寺一院一菴一褒親崇惠寺在芝塘市宋靖懿帝姬殯於此僧化東建政和七年賜額塢邱增福院在塢丘山宋端平間僧瑩無瑕建忠義菴在洋澳宋嘉熙間僧象祖建廣孝講寺在州東北五十里唐咸通十四年建初名懷讓寺宋太平興國間有僧曰子瓊道清自龍慶來南遊江浙駐錫于此大中祥符間改賜今額元末兵燬洪武二十三年僧智積重建歸併菴一正受菴元大德六年僧餘慶建海寧禪寺在城武陵橋西宋建炎四年能禪師建名廣法教院元大德間朱清治海漕奏改今額洪武中僧常在重建歸併菴二正宗菴元泰定三年僧法輪建圓覺菴元天厯二年僧千巖建普濟教寺在州南一里宋末五臺僧普明遊歷止此遂卓錫建寺元末燬惟靈山一會佛像存焉永樂六年僧梵衍重修歸併院一菴二崇福院元天厯二年僧以讓建崇福菴在城中元至正元年僧允善建松林菴元至元二年僧惟大建報本禪寺在城大東門內元海道千户宋顴甫買地建僧妙莊開山後燬洪武十一年永懷寺僧常在移置城中海寧寺之東十五年妙嚴菴僧谷清捨菴改建即今寺也歸併院一興福院元至正五年僧崇明建淮雲教寺在城北二里陳涇橋北元大德六年浙江軍器提舉顧善夫營祖墓於此建為養壽蘭若以其家世淮人不忘其始奏賜今額趙孟俯書扁永樂中平江伯陳瑄重修歸併菴七能仁菴元延祐元年僧豈巖建慶福菴元至治四年僧智量建集福菴宋咸淳八年僧法海建五涇菴元至元元年僧智慧建顯福菴元至正元年僧可大建太平菴元至正六年僧如整建慶福菴元至正四年僧善心建靈慈宫在城周涇橋北元至元二十九年海道萬户朱旭建為天妃祝釐之所其緣起互見祠廟宫舊歸併崑山清真觀今徑𨽻本州州之道院皆屬焉佑聖道院在城旱涇橋北元至元十四年道士蔡貫一建奉真道院在大西門外元至元間里人馬道文建長生道院在城南隅元至元二年道士王可道建靈應道院在城南隅元大德三年里人黃都運建武勝道院在大西門外元至元四年里人陳桓建真一道院在城登瀛橋北元至正十年道士朱眉山建崇明縣叢林寺四觀一奉聖禪寺在東沙唐貞元間僧道成建宋紹興初里人陸思問謝之剛拓而大之元泰定甲子僧有源至正甲午僧德建相繼重修鄭元祐記內有千佛閣歸併無程用昭霜落平沙楓葉丹可人情思滿空山江梅瘦褪猶疏放山鳥驚猜亦往還孺子興同秋水逺支郎心與白雲間此時野寺題詩處昨夜稚寒湘竹班劉秩白馬馱經日本西偶來此地訪招提長廊松樹何年種别館梅花後夜題結社東林思靖節留衣南海愧昌黎江風山月清如此拚得今朝醉似泥海國瀛洲别有天上人駐錫住經年三花樹繞眠雲榻七寶池通洗鉢泉清磬響時晨聽講名香爇罷夜參禪何時來問無生話喚醒人間醉夢緣慈濟教寺在城內河泊所東宋淳祐三年建初名白雲菴後請龍江寺額易之元大德七年僧紹時建大雄殿延祐初僧良聚搆鐘樓廊宇先在舊州治之東永樂中隨縣遷置於此歸併無興教禪寺在道安鄉張成港北唐光化二年建相傳終南浮屠妙鞏夜夢神人披甲胄駕赤虬謂鞏曰東海起沙鄰逼吳楚宜建道場遂與其徒來創是剎宋寶慶三年僧皎如以寺址迫海遷於平等村永樂九年再徙於此歸併無壽安講寺在永興沙舊在三沙東鄉宋淳祐間有二僧曰模曰儔卓錫曠野拾枯枿簮土祝曰枿復榮當建道場無何其枿向榮遂結菴名富安院後其徒德雲等拓之元延祐戊午賜額永福壽安寺尋圯於潮泰定甲子僧大全遷於東仁鄉之中土翰林學士完澤台為記洪武甲子僧神芝建千佛閣永樂十四年僧普照建懴堂尋燬宣德五年復圮於海六年僧韞與勤遷於此重建觀海樓貯月軒歸併無寶慶觀在舊州治北宋寶慶元年建舊在縣治南十五里元至正二十三年道士徐中理以觀址瀕海恐為所浸遷置於此歸併觀一道院一通玄觀在壽安寺西南里人茅氏建今廢崇直道院在西沙道安鄉至元丙子朱文虎建今廢姑蘇志卷三十
