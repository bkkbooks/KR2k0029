body:
  text: 姑蘇志卷二十一明王鏊撰官署上厯代廨署有因有革而其地亦皆可考今先列國朝定制而附綴舊聞以備郡中故事若學校則别書亦以政教之角立也府治在織里橋東元初為江淮財賦提舉司後改都水庸田使司復為平江路總管府國朝吳元年就建府治洪武二年有㫖加闢知府何質陳寧相繼成之造門及堂又於㕔事兩廡後增剏舍宇初因元舊官吏居外宅治事至是始就内居處正統間知府况鍾重構庫房天順間知府林鶚改作後堂迄今䂓制整備㕔事東為推官㕔又東為照磨所西為經厯司又西為架閣庫後為豐盈庫堂下夾以東西廊舍東為吏戸禮承發架閣房西為兵刑工糧房堂外周列守貳判推之私第西稍下為四區以居幕屬又下一區居庫官廊後為周廬以畜胥史中門外東為土地神祠傍地為厩門之外東為旌善亭西為申明亭二亭俱洪武中建輔以榜廊拱以䨇表此郡衙之大畧也嘉靖間火燬廊廡郡守王鴻漸改建載逾年㕔堂庫藏門廡又遭火厄同知鍾鑑重悉如制鼎新煥然改觀焉司獄司在府治西南織里橋南東向吳元年移元舊司於靈芝坊洪武六年定建於此稅課司在大街周太保橋北西向洪武初建織染局在天心橋東洪武元年建雜造局在章家橋南東向洪武六年建隂陽學在喬司空巷即元海道萬户府千戸所也洪武初改元隂陽教授司為之永樂元年重建醫學在流化坊即宋吳縣治基元改醫學設教授官奉三皇廟祀洪武元年革廟尚存本學長洲縣治在府治東南隅一里烏鵲橋西洪武元年建二年増廣㕔事及兩廡後剏屋官吏就内居處正堂西為典史㕔東為庫東西二廊為六房糧房承發房中門外東為土地神祠西為監房門外有榜廊申明旌善二亭在縣門外東西向𢎞治元年知縣邢纓築舍數十間以居停鄉民之應辦者養濟院在皷樓西北稅課局在葑門外馬路西崑山縣治在馬鞍山東南三里即宋舊治元改為州延祐元年移治太倉至正中復還舊治國朝因之吳元年就設州治洪武二年改縣知縣王瑾遵朝㫖増廣之典史㕔在堂之西架閣庫在東東西吏廡門内監房咸備申明旌善二亭俱在縣門外西隂陽學在通闠橋東醫學在縣治南三皇廟西恵民藥局二一在平橋一在縣南僧會司在薦嚴寺道會司在清真觀養濟院在縣東南廵撫行臺在縣治東薦嚴寺左即宋范文穆公讀書處號石湖書院内有范公亭趙雍書扁正統間侍郎周忱重構堂宇改稱玉峯書院亭曰思范察院在縣治東南舊儒學坊洪武初建府官舘有二一在縣治南一在半山橋下即舊寧海驛𢎞治十年改置常熟縣治在虞山東南由唐置縣以來厯宋及元皆仍其處國朝吳元年仍元為州洪武二年改為縣増闢之典史㕔在西庫在東餘皆如制申明旌善二亭在縣門外東西向稅課局在縣治西南琴川橋下隂陽學在縣治西醫學在縣治西即舊恵民藥局僧會司在慧日寺道會司在致道觀養濟院二一在縣西北一在縣西南廵撫行臺在縣東北即文學書院宣徳間移吳公祠於儒學以此為廵撫公署侍郎周忱嘗改稱學道書院成化十九年都御史王恕扁其堂曰願治𢎞治十年縣令楊子器以其地狹隘乃請於彭都御史禮遷於西山巷之左市地王恕記余以願治名堂之明日有客來訪曰聖天子授公以保釐之任而有便宜從事之璽書凡撫内善良者公得而扶持之强禦者公得而禁遏之賢才有益於國家者公得而薦引之奸貪有害於政事者公得而斥逐之田野未闢公得而闢之學校未興公得而興之賦役有未均詞訟有未息公得而均之息之以至周窮恤困伸寃理枉皆公分内事也今皆舉而行之亦可以言治矣而猶以願治名其堂何歟余曰善良者固多矣余豈能盡扶持之強禦者亦衆矣余豈能盡禁遏之賢才當舉而或不能盡知奸貪當逐而或不能盡察田野當闢而或流亡之未復學役當興而或教養之無方里書作弊賦役如之何得盡均教化不行詞訟如之何得盡息縱使盡扶持之盡禁遏之盡知之盡察之盡闢之盡興之盡均之而盡息之茍有一民之失所一事之不理亦不得謂之治治豈易能哉非但才之罪其勢然也余以菲才受厥命食厥祿豈可怠厥事是以夙夜孜孜願治焉而未之能也願而未能其可忘乎故以願治二字掲諸堂欲其常目見記之而求所以治之也客唯唯而退遂書之以為尚書行府在支塘鎮徐時視河官即鎮之瑞真道院治事嘉靖元年工部李尚書克嗣以都御史來治白茆改建廨宇居之廵按胡御史體乾仍命縣令徐濙整葺院之道士守焉察院初宻邇縣治東偏𢎞治九年遷於縣西百歩即舊公舘地西向譙樓在縣治前税課局先在城隍廟東洪武元年設二年移縣東仙里橋南同里稅課局去縣治東一十八里洪武五年設置隂陽學在城隍廟側正統十四年建醫學在縣治西北舊府官舘恵民藥局在縣治西無礙寺右僧會司在聖壽寺道會司在昭靈觀養濟院在縣西北柵頭淳熙間剏後又増之今移置昭靈觀側廵撫行臺在縣東舊為書院察院在縣北城隍廟後舊在東門内𢎞治五年知縣金洪以褊隘移置府官舘舊在北門外𢎞治三年改建東門内即舊察院嘉定縣治在春申鄉練祁市宋嘉定十一年立縣知縣髙衍孫昉卜馬軍司酒坊之地築址作室三月而成入元中世陞為州至大間知州髙源劉文質繼有脩建太倉州治在州城北隅即舊教塲地𢎞治十年昉建門堂規制大率視縣差大吏廡庾獄私舍皆具吏目㕔在堂左又有會問㕔門有譙樓外有榜廊申明旌善二亭在州門外東西向税課局在海寧寺前即元舊吳元年重設巡撫行臺在城報本寺西𢎞治中知州翟敬建崇明縣治即宋天賜鹽塲提督官㕔後為風濤衝嚙元立為州達嚕噶齊巴哩雅知州程世昌與民僉謀於舊州北相髙爽地定基建治國朝初因為州洪武二年改縣增屋永樂間又淪没仍遷舊郭北十五里地名秦家符至正統間知縣吳告王鋭主簿陳梗先後建造税課局在縣西城東北隅察院在城東北隅本縣東姑蘇志卷二十一
