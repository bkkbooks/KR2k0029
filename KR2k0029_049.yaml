body:
  text: 姑蘇志卷五十明王鏊撰人物八名臣方惟深字子通其先泉州人父龜年字壽先才氣卓犖日能十賦為公卿所稱與同安蘇緘齊名官至屯田郎卒葬長洲因家焉惟深鄉貢第一試禮部不中即棄去有田㕓與其弟躬出入耕穫間則讀書凡黃帝老莊之言養生為壽者之説以至西方别傳皆得其大指平居視之猶木雞也及論議古今道理窮核至到確然莫能移常以雅道自娛每一篇出人爭傳誦王安石以為精淳警絶元白皮陸有不到處惟深雖遊安石之門極蒙愛略無一毫迎合意以韋布之士閉關陋巷而孝友清介之風隱然稱東南其文學行義與朱長文同為一世所宗號鄉先生元符初郡將薦于朝崇寧中復以遺逸應詔皆不起有司舉貢籍以年格應補軍州助教者就賜敕牒袍笏於其家得興化軍助教初年四十無子而弟有子以為先人有後足矣即屏居於外預知死期期至不亂喪葬皆有治命年八十三有詩集十卷楊懿孺字彛甫其先自浦城徙長洲以行義隱處與方惟深同時號吳中二老懿孺少孤力學言行相顧朝無夕儲神夷氣昌未嘗有憂雖閭里不盡知其貧崇寧二年特奏名後調南昌簿居一嵗忽載妻子歸吳下即告老以承奉郎致仕平居任真自信不知世間有傾巧事不入州縣不事鄉里請謁間一詣所親厚歲不過數四雖嘗出仕而人猶謂隱者章甫字端叔自建州徙居於蘇八世祖及唐康州刺史及孫仔鈞仔釗俱仕閩王審知至甫曽祖可法始登第官至祕書丞甫熙寧進士初調臨川尉有盜劫殺行商獄詞連逮者以十數甫辨三人抵罪餘悉縱之知壽春縣大臣以甫孟子解義進詔付祕書省除應天府國子監教授改知山陰縣訟牒繁劇豪民竄易户名以避徭役甫得其情流配數人老姦宿臧屏息聽命邑以大治又濬海塘經畫為久計得以溉田哲宗即位除通判宿州南京押綱侍禁史士宗侵耗官米反訟倉官獄久不次朝廷委甫治之士宗竟坐流竄以父憂去久之入為太府寺丞召對稱旨除府界提舉常平增浚河隄飢民之在境者因廪給之徽宗朝知虔州還奏淮甸嵗凶宜加賑恤大臣初雖諱言而卒如其請崇寧初除都官郎中陛對抗言元祐臣僚削秩投荒皆緣國事稍稍內徙道路交慶今復刻名黨籍禁錮子孫恐非陛下本意上雖優容卒與時論不合致仕歸吳起知泰州尋請祠以歸甫寡嗜欲唯藏書萬卷讐校精密子八人憲最知名四世孫康在隱逸傳憲字叔度居黃村樂道好德操履髙潔行有餘力而以學文鄉里謂隱君子與弟哲俱受學王蘋遊於楊時朱震吕本中諸公間憲尢邃於春秋宣和中責監漢陽軍酒稅沒於兵有復軒集十卷邉裕字道夫其先楚邱人父珣英宗時平江軍節度推官官至太子中舍始家于吳裕為泰州司録時年尚少知州張次山果於為政興舉廢事投竄姦吏有稱於時多裕毗助之又以江寧府司録監湖州酒嵗荒餓莩橫道知州張詢委以賑恤全活甚衆有寓士疾革裕初未識之即親饋藥死斂以棺衾後二十年其子知章過湖故老相指曰此吾邉司録子也厯睦州團練推官改潤州觀察推官潤之鎮官戴昭信卒當任子莫肯保奏裕率同僚以事聞朝廷遂官其後辟江都縣遷開封新城左廂公事鋭於決遣庭無留人廂素號難理專以婦女為訟爭至是相戒無犯郊恩賜五品服監大觀東庫除管勾南京留司御史臺公事卒年六十四裕通習時政歷仕四十年所至莫不畏愛子知章在忠義傳知章弟知白知白字公式孝友篤實循蹈規矩清虛寡欲號為吉人宣和中以進士為吳縣尉紹興中歷户部郎官將作監户吏二部侍郎直學士院嘗使金聞欲侵蜀歌蜀道難以諷金遂輟西南之役官至吏部尚書同安縣開國侯卒贈徽猷閣待制少師子維石通判杭州維成朝請大夫裕從子惇德惇德字公辨祖珉始家崑山父靜贈承事郎惇德幼孤至孝貧不廢禮才思敏給以能詩名為范成大所知嘗與唱和五中鄉舉就奏名年逾六十即致其事郡縣列上行義特改通直郎仍著為令撰脂韋子五十卷子瀛字道卿與弟濟並有學行濟子應升字子用頴悟力學篤守操履淳祐特科進士丹徒簿應升子雲遇字龍光寶祐進士咸淳二年江隂縣西尉雲遇弟實凌萬頃同修崑山志裕七世孫景元景元字長卿端謹力學纍世明春秋嘗指堂扁世麟字以示子孫曰此文丞相天祥手書以美吾祖者也吾子孫可忘之乎景元初由青陽教諭轉處州路學録以薦為國子伴讀辭歸教生徒會長洲邑學久廢乃勸富家大興建之子昌字伯盛承家學教授終日端坐不茍談笑張氏據郡以禮招致誓死不就鄭景平初名安平字晞尹熙寧三年與父伸同登進士第景平剛正不撓居官有廉介稱嘗為大理官每有疑獄中夜拜禱蘄得其情既而請老家居詔復起知饒州數月拂衣而歸或問故答曰天子命景平為郡當以撫字為職乃不得行其志今日須金若干明日須粟若干民已枯骨矣捶考之亦何以取景平安得不歸時多附朱勔獨景平終始不阿子裀字天和亦能文屢任郡守丁隲郡人元祐中為左正言五上章論何正臣治獄殘酷巧詆刻深甚於羅織黨錮事載國史章楶字質夫其先浦城人祖頻為御史忤章獻后旨黜官仁宗欲用之而卒贈司徒父訪禮賔副使乃徙蘇號曰北章贈大尉楶以叔得象蔭為孟州司户參軍將作監簿應舉入亰聞父對獄于魏棄不就試馳往直其寃還試禮部第一擢知陳留縣以最聞歷提舉陜西常平京東轉運判官提點湖北刑獄成都路轉運使入為考功吏部右司貟外郎元祐初直龍圖閣知慶州時朝廷戢兵戒邉吏勿妄動且捐葭蘆安疆等四寨豫夏使歸其永樂之人夏得寨益驕楶言夏嗜利畏威不有懲艾邉不得休息宜稍取其土疆如古削地之制以固吾圉然後諸路出兵擇據要害不一再舉勢將自蹙矣遂乘便出討以致其師夏果入圍環州楶先用間知之遣驍將折可適伏兵洪德城夏師過之伏兵識其母梁氏旗幟鼓譟而出斬獲甚衆又預毒於牛圈潴水夏人馬飲多死召權户部侍郎明年除知同州紹聖初知應天府加集賢殿修撰知廣州徙江淮發運使哲宗訪以邉事對合旨命知渭州至即上言城胡盧河據形勢以逼夏乃以三月及熙河秦鳳環慶四路之師陽繕理他堡壁數十所自示其怯或以楶怯請曰此夏必爭之地夏方營石門峽去我三十里能奪而有之乎楶又陽謝之隂具板築守戰之備帥四路迎擊敗之既而環慶鄜延河東熙河皆相繼築城進拓其境夏人􅌓視不敢動夏主遂奉其母合將數十萬圍平夏疾攻十餘日建髙車臨城填塹而進不能克一夕遁去夏統軍嵬名阿里西夀監軍妹勒都逋皆勇悍善戰楶諜其弛備命折可適郭成輕騎夜襲直入其帳執之盡俘其家虜馘三千餘牛羊十萬夏主震駭哲宗為御紫宸殿受賀纍擢樞密直學士龍圖閣端明殿學士進階大中大夫楶在涇原四年凡創州一城寨九薦拔偏禆不間厮役至於夏降人折可適李忠傑朱用咸受其馭夏自平夏之敗不能復軍屢請命乞和哲宗亦為寢兵楶立邉功為西方最時章惇用事楶與惇同宗其得興事頗為世所疑徽宗立請老徙知河南入見留拜同知樞密院事俾其子縡為開封推官以便養踰年力謝事罷授資政殿學士中太一宫使未幾卒上悼惜賜龍腦水銀以斂命其壻劉何使兩浙共葬事贈右銀青光祿大夫太師秦國公諡莊敏賻恤甚厚立廟懷德軍賜額曰忠烈七子縡綜綡綰綖縯縝綜歷通判常州綰知丹徒縣縯字彥升簽判蘇州通直郎易州通判楶孫茇承奉郎藎監蘇州稅史誤云諡莊簡縡字伯成繇推官為户部貟外郎提點淮南東路刑獄權知揚州兼提舉香鹽事時方鑄崇寧大錢令下市區盡閉人持錢買物至日旰皇皇無肯售縡飾市易務致百貨以小錢收之且檄倉吏糶米以大錢豫之盡十日止民心遂安未幾新鈔法行舊鈔盡廢一時商賈束手或自殺縡得訴者所持舊鈔為錢以千計者三十萬上疏言錢法誤民請如約以示大信蔡京怒罷縡降兩官以綖故竄台州復通判秀州初楶教子極嚴閉置一室中故縡與綡皆有文名縡晚年詩益髙清淳雅健得唐人風有文集三十卷終户部郎中綡字子京有大志中進士第一調洛陽簿時范純祐為尹一見待以國士賓禮異絶與韓玉汝李邦直等俱以文行薦於朝就除京兆府教授政和末起知解州移均州房州婦人越所部訴其子於均綡謝曰房非吾治也又訴於轉運使使以屬綡召詣庭下不以屬吏鐫論開曉母子感悔拜謝而去歷陜西轉運判官入為户部貟外郎中書侍郎劉逵妻綡之姊也逵漸復元祐之政綡多贊之蔡亰欲擠逵且忌綡不附已使其黨攻之出綡湖州論者不已差主管西京崇福宫坐綖獄竄溫州入為祕書省校書郎遷倉部員外郎宣和三年除提舉兩浙常平未上改提點刑獄時嘉興富人髙安與陳氏有故怨乘方臘起誣以為盜聚羣惡操兵入其室盡殪之以捕盜徼賞及長洲陸氏怙富橫閭里殺人應捕輒賕吏執平人代已綡一閲盡得其情取二人置諸法衆懼以為神明四年以直祕閣知越州兼浙東安撫越新去方臘之亂人情危懼日三四驚旁郡守將往往益兵自衛綡至延問吏民宴集僚佐如平時有勇敢卒謀為變綡飭將吏指取無一人脫者闔郡大震談稹宣撫燕山請綡為參謀轉朝請大夫右文殿修撰遂疏燕雲決不可守之狀反復數千言金人破蔚州背歸山後議稹以錯置乖方罷綡落職送吏部及童貫出師而燕山七郡與朔武皆不守如綡言會赦恩上書告老復龍圖閣直學士致仕卒史云綡以龍圖閣直學士知越州按會稽志朝奉大夫直祕閣權發遣越州續志云復直龍圖閣卒綖字君邃僉判西安州蔡亰復相興制獄傾章氏綖居蘇州或得私鑄錢數巨罌風言者誣綖與州人郁寶所鑄詔遣李孝壽張茂直沈畸蕭服更往鞫之連繫數百人纍月卒無實獄多死者京大怒别遣孫傑鞫之傅致如律綖刺靣配沙門島追毁出身以來文字除名勒停籍入其家竄縡台州綜秀州綡溫州綰睦州縯永州茇處州藎筠州官吏降罷除名者十餘人時論寃之孫傑擢龍圖閣直學士知蘇州張商英為相辨前獄移綖常州綡復朝奉郎通判秀州頃之綖改授內殿崇班綡祕書郎顔孚字端中父長民以進士知長興縣孚崇寧間有聲太學士行甚美時人目為顔夫子爭願識靣與兄采為繼擢高科孚早卒采字君用終提舉常平為字仲謙居官有威終知嚴州為孫儼進士李撰字子約唐曹王明子偲居陳留至餘慶以國子博士知常州卒葬橫山遂為吳縣人撰之祖也撰熙寧中以進士歷彭澤令時括民田轉運使務苛擾欲多得匿户羡田為功撰持不可抱牘抗論且請就劾并解印綬去使者度不可屈從之時王安禮為部刺史使者還金陵言撰所以期共構撰罪安禮曰縣令敢與部使者爭衡必介特有守士也亟呼吏就使者草奏薦之元祐三年議遣使修復小吳河撰上復河賦二篇言河不可復通判莫保二州官至朝奉大夫大觀三年卒年六十七撰廣孟子説著養氣論三篇毛詩訓解二十卷孟子講義十四卷文集五十卷史贊論五卷子彌遜彌遜字似之登第調單州司户再調陽穀簿政和四年除會要所檢閲文字引見特遷校書郎充編修六典檢閲纍官起居郎以封事剴切貶知廬山縣改奉嵩山祠宣和末知冀州金人犯河朔彌遜捐金帛致勇士修城堞決河護塹邀擊其遊騎斬首甚衆烏珠北還戒師毋犯其城靖康初召為衛尉少卿出知瑞州二年建康府牙校周德作亂執其帥宇文粹中殺官吏嬰城自守勢猖獗彌遜以江東運判領郡事喻以禍福勉使勤王德桀驁猶肆殺掠會李綱行次建康協謀誅德等尸諸市撫其餘黨一路遂安改淮南轉運副使奉興國宫知饒州紹興中召對奏當堅定規模排斥姦言輔臣不恱擬直寶文閣知吉州嵗飢撫恤疲困七年秋遷起居郎彌遜自被謫以來垂二十年及復居是職論事鯁切如初是冬試中書舍人奏六事曰固蕃維嚴禁衛練兵節用收民心擇守帥時駐蹕未定有旨料舟給卒以濟宫人彌遜繳奏曰六飛雷動百司豫嚴宜以宗社為心不宜於內幸細故更勤聖慮事雖至微懼傷大體帝嘉納試户部侍郎秦檜再相獨彌遜與晏端復有憂色八年乞外不允趙鼎罷相檜專政金遣烏凌阿思謀入界甚悖檜於御前求去欲決意從和胡銓乞斬檜范如圭曾開皆疏論檜相繼貶逐彌遜請對言金使請和欲行君臣之禮有大不可帝詔廷臣大議即日入奏彌遜手疏力言陛下受金人空言無一毫之得乃輕祖宗之付託屈身委命自同下國異時脫有意外之求不從則釁端復開其患未巳檜嘗邀彌遜至私第曰政府方虛員茍和好無異議當以兩地相浼答曰彌遜受國厚恩何敢見利忘義今日之事國人皆曰不然獨有一去可報相公檜默然次日彌遜再疏辭愈切直檜大怒彌遜引疾帝諭大臣留之九年春上疏乞歸鄉里以徽猷閣直學士知端州改知漳州十年歸隱連江西山是嵗烏珠分道入侵明年又侵淮西取夀春令竟如彌遜言十二年檜乘金兵既敗收諸路兵復通和好追仇向者盡言之臣嗾言者論彌遜與趙鼎王庶曽開四人同沮和議於是彌遜落職十餘年不通時相書不請磨勘不乞任子不序封爵以終其常憂國無怨懟意二十三年卒朝廷思其忠節詔復敷文閣待制有奏議三卷外制二卷議古三卷詩十卷弟彌大彌大字似矩登崇寧三年進士第以大臣薦召對除校書郎遷監察御史假太常少卿充契丹賀正旦使時傳聞燕民欲歸漢徽宗遣彌大覘之使還奏所聞有二或謂彼主淫刑滅親民心畔離女真侵迫國勢危殆為可取或謂下詔罪已擢用耆舊招赦盜賊國尚有人未可取莫若聽其自相攻併遷起居郎試中書舍人同修國史童貫宣撫永興走馬承受白鍔恃貫不報師期朝廷止從薄責彌大繳奏以為邉報不至非朝廷福鍔坐除名彌大亦出知光州移知鄂州召為給事中兼校正御前文籍詳定官拜禮部侍郎金人大舉入侵李綱定䇿城守命彌大為參議與綱不合罷未幾除刑部尚書初朝廷許割三鎮畀金人遣种師道等援河北姚古援河東彌大上疏乞起河東西境鄰府諸郡及陜西兵以濟古之師起河東路及京東近郡兵以濟師道之師為腹背攻劫之圖遂除彌大河東宣撫副使張師正領捷軍敗於河東潰歸彌大誅之復遣餘卒援真定餘卒叛宣撫罷命彌大知陜州河東破偏將李彥先來謁言軍事大壯之留為將戍殽澠間以遏敵詔遣使召援彌大未敢進會永興帥范致虛糾兵勤王檄彌大充諸道計議行至方城道阻乃率衆赴大元帥府建炎初除知淮寧府到郡未幾杜用等夜叛彌大縋城出賊散乃還坐貶秩尋召為吏部侍郎帝如杭州命權紹興府試户部尚書兼侍讀吕頥浩視師以彌大等為參謀官彌大奏王導謝安為都督未嘗離朝廷今邉圉幸無他頥浩不宜輕動又言已為天子從官非宰相可辟乞於諸軍悉置軍正如漢朝故事以察官郎官為之陛下必欲留臣當别為一司伺察頥浩過失忤旨出知平江府沈與求劾彌大謀間君臣妄自尊大奪職歸起知靜江府奏廣西邉防利害入為工部尚書未幾罷去廣西提刑韓璜劾其在靜江日斷強盜引絞入斬貶兩秩紹興十年卒年六十一從曾孫韶韶字元善彌遜之曾孫也父文饒台州司理參軍每謂人曰吾司臬多陰德後有興者韶五嵗能賦舉進士授南雄州教授調慶元史彌逺薦士充學職袁燮求射圃益其居韶皆不與燮更敬之薦遷主管三省架閣文字由太學正升博士諫濟王竑獄丐外添差通判泉州改知道州葺周惇頥故居録其子孫於學宫且周其家紹定四年行都災應詔言事提舉福建市舶會星變又應詔言事入為國子監丞改知泉州兼市舶端平元年召明年轉太府寺丞遷都官尚左二郎官未幾拜右正言奏乞以國事邉防專委丞相鄭清之喬行簡各任責論弭兵節財及襄蜀邉防又論史嵩之王遂和戰異議迄無成功請出遂於要藩易嵩之於邉靣使各盡其才史宅之將守袁州韶率同列一再劾之俱不報乞解言職拜殿中侍御史辭不允又奏辭大意謂同言事者三人已皆罷免獨臣居職豈以臣言不加切於彼耶抑先去彼以警臣使知擇而後言耶今國柄有陵夷之漸士氣有委靡之漸主勢有孤立之漸宗社有阽危之漸上下偷安以言為諱此意不改其禍豈直如彼所言而已時魏了翁豫祠韶訟之乞召還處以台輔又劾陳洵益刑餘弄權乞豫外祠又劾女冠吳知古在宫掖招權納賄宜出之帝怒韶還笏殿陛乞歸會免二相以韶權工部侍郎正言遷起居舍人復疏洵益知古不報辭新命不許應詔上封事帝諭左右曰李韶真有愛朕憂國之心凡三辭不獲以生死祈哀帝蹙額謂曰曲為朕留退復纍疏乞外以集英殿修撰知漳州朝廷時遣使諸路稱提官楮韶極言其敝嘉熙二年召疏言有不可進者四大意謂今之大患在敵兵嵗至和不可戰不能楮券日輕民生流離物價踊貴遂至事無可為必自上躬卧薪嘗膽改慮易聽然後可圖今二患益深雖欲效忠他莫可為説又史宅之豫郡外議皆謂扳援者將復用故論列至再今聖斷赫然用舍由已環視前日在廷之臣流落擯棄臣雖欲貪進未知所以處其身又始蜀受兵廟堂已遣使至敵起嵩之於家而言者不已臣時以為講和固非䇿而首兵亦不能無罪故乞付髙論者以兵事使稍知敵情者嘗試其説於閫外不知事勢推移遂成罷廢而疑敵無功者白麻揚廷矣或者將議臣前日之有所附會也又昨彈內侍女冠未幾首相去位臣亦出臺其人謂臣受廟堂風旨故決意丐外今臣言迄不行茍貪君命竊恐或者譏臣向何所聞而去今何所見而來也四年詔趣赴闕辭遷户部侍郎再辭不許五年改禮部侍郎辭不允令所在州軍護遣至闕嵩之遣人語曰毋言濟邸宫媪國本韶不答上疏謂今天下事在陛下自任而力為又引左氏載史墨言魯公世從其失季氏世修其勤蓋以世卿諷嵩之也疏出嵩之不恱曰治春秋人下語毒時杜範亦在列中外稱為李杜兼侍講纍辭兼國史編修實録檢討辭遷吏部侍郎兼中書舍人三辭不許淳祐二年疏言宰相用人守法之繆又言濟王國本宫媪三上疏乞歸以寶章閣直學士知泉州辭乞畀祠不許既歸三辭仍職提舉鴻慶宫五年召再辭詔本州勸勉赴闕遷禮部侍郎三辭遷權禮部尚書復三辭不許韶又疏論嬪妃貴戚世臣理財濟邸女冠儲嗣言甚危切又疏乞還不許兼侍讀三辭不許又三疏乞歸時遊似以人望用復有牽制之者韶又論之擢翰林學士兼知制誥兼侍讀不拜詔不許又三辭不許嵩之服除有鄉用意章琰李昴英黃師雍論列甚峻詔落職豫祠韶同從官抗疏引春秋蔡人衛人陳人從王伐鄭見諸侯不從王之罪以為今陛下不能正姦臣之罪其過不專在上蓋大臣百執事不能輔天子以討有罪皆春秋所不赦乞斷以此義亟賜裁處詔嵩之勒令致仕既而嵩之進觀文殿大學士韶疏爭之甚力未幾琰昴英他有所論列並罷言職韶復疏留之七年韶十上疏丐去以端明殿學士提舉玉隆宫應㒡趙汝騰疏乞留韶內祠未報韶陛辭疏極剴切大略謂彼此相視莫行其志而剸裁庶政品量人物於冥冥者不得不他有人是中書之手可束而臺諫之口可鈐事所當力為者不可枚舉而皆莫有任其責者矣改提舉萬壽觀兼侍讀即出國門力辭道次衢州詔趣受命再辭仍奉祠玉隆宫八年被召辭不許再辭仍舊職奉祠萬壽觀兼侍讀令守臣以禮趣行又辭不許九年仍奉祠玉隆宫十二年祠滿再任卒年七十五韶忠厚純實平粹簡淡不溺於聲色貨利平時默坐一室門無雜賓秦希甫字辨之元符中為陜西轉運判官初熙河將王贍下邈川胡宗回為帥復遣贍取青唐詔立鄯州而以邈川為湟州未幾屬羌叛宗回討之數敗希甫奏王贍厚取邈川青唐府庫物因此致變又言自河至湟道路險厄往者如赴死所湟州本溫溪心故地當求溫氏之後立為屏輔皆在可棄事下宗回宗回持不可希甫罷去徽宗尋棄鄯州任伯雨再疏宗回罪奪職知蘄州崇寧初黨論起言者又以希甫棄地為罪降官入黨籍云陸徽之字彥猷常熟人祖景字伯通景祐初及第官至太常博士徽之由太學上舍生免殿試賜同進士出身終濮陽主簿髙才博學衆推事之如陳起宗張柵錢觀復皆為顯人徽宗即位下詔求直言徽之廷對與雍孝聞輩皆力陳時政闕失唱名有旨駁放孝聞立殿下叩頭曰陛下求直言有云言之者無罪今詔墨未乾奈何以直言罪人衛士以拄斧撞其頰數齒俱落凡直言者盡揮出之大觀末彗星見始復收録徽之欲赴會卒孫端成字夫錫就特奏恩潘兌字説之吳縣人自進士纍官中書舍人左諫議大夫刑禮吏三部侍郎歷顯謨閣待制知洪州終徽猷閣待制不登朱勔之門勔護父喪歸亦不往迎其先塋適有山林形勢近勔新阡勔欲得之修敬于兊兊􅩹門不納勔至京訴於上降御筆奪之尋假御史誣兊以罪由是落職路允迪稱其言語文章一本六經之醇毅然有守終無玷缺與從子民瞻有唱和詩集周武仲字憲之浦城人太學生登紹聖進士第授將仕郎諸暨縣尉繼主益都縣簿改從事郎知金華縣轉授泗州録事參軍辟知浙江縣事前政以軟懦去官或經嵗不決武仲到迎刃而解舊事決遣無留片言斷獄得其情偽人人心服邑以大治及代而歸士民攀號遮道絶梁不得行乃圖其像嵗時祠焉尋改宣教郎亳州司儀曹事除武學博士擢監察御史時有上封事言淮南連嵗荒旱民相食常平使者顧彥成坐視不救上怒詔武仲察訪亟行賑濟武仲陳八事一乞依法放免租稅二乞諸司錢斛並許支用三乞州縣倚閣催民間積欠四乞常平司錢斛已樁發未行者並截留五豪户有願出粟濟飢民者許保奏推賞六所在官山林塘冶暫弛其禁聽飢民採食七鄰路般販米斛入本路者免收沿路力劵庶得商旅輻湊八小民無業可歸願充軍伍者委漕司多方招刺以消攘奪之患上一一開允仍命行訖奏及疏降中書時宿守吳壽寧聞武仲將至令諸門毋納飢民城外殭尸縱橫悉穴地藏之申以無飢民可抄録真守蘇之悌夜遣兵仗逼飢民載之江州上悉致死二守皆宦官腹心旁連漕使孫點莫敢誰何武仲並劾之兩路所養飢民僅三十萬賑給缺食人穀十七萬有竒賑糶借貸榖三十餘萬勸誘人户出糶及借貸七十萬有竒所全活者不計其幾萬也除尚書比部外郎遷右司外郎假太常少卿接伴遼使復充遼國賀正使及還覩河朔軍政不修將士驕慢上疏論之言兵可百世不用不可一日弛備上嘉納之再任言責未幾除顯謨閣待制充館伴使又差報聘充國信副使禮成而還進徽猷閣直學士復差館伴武仲與敵論議語言未嘗少假借非理之求一切不從聲聞館外上知之屢降宸翰言武仲氣直除刑部侍郎直學士院供職九日擢御史中丞差殿試詳定官兼侍讀屢上奏言時政童貫用事遂以本官提舉亳州明道宫遇赦復右文殿修撰貫復誣奏落職降授宣德郎黃州居住淵聖登極復朝請郎覃恩轉朝奉大夫髙宗即位武仲至南京賜對上疏勸上以固結人心為本上深然之除吏部侍郎扈從至楊州擢刑部尚書兼侍讀首在經筵獻納居多凡至安危治亂之機必旁搜逺攬極其規諫遷吏部尚書以病丐間除龍圖閣學士提舉江州太平觀以朝請大夫致仕卒于揚州官館贈大中大夫子孫多居于吳曾孫昺為常熟尉昺孫才才字仲美嘗領沿江制機檢察水部兵乙亥革命征南行省帥府檄才與武辨分撫郡之屬邑時軍伍貪恣日事摽掠才撫諭之又梏人輸物不愜則魚貫斬首才悉解纍械釋之不可勝數士卒掠他處生口賈粥才為館穀詢其鄉里父母歸之同里朱氏蘇氏世仇朱賂千户期一夕爇蘇而屠之亦欲賂才才潛招蘇語其故俾亦啖千户以利兩全之因招二氏曉以禍福令約為姻親遂釋怨丁丑嵗有姦俠諜邪謀以動吳民才嘆曰吾始預撫安今兹復不順義一旦官兵來吳民其無噍類乎因諭以氣運在天不在人之理禁其姦不得發乃亟給帥閫撫諭符文迎勞官兵遂不入境人得以寧比境來避者亦廪給之後置縣設官領户算同寅上其功才曰吾前朝賤士也所以與世委蛇誠不忍生民塗炭耳兹得為太平民幸矣忍復希名位哉遂老於耕桑嘗著宋史略十六卷吳塘集若干卷藏于家子文英以儒克世其業有澤物親民二藳及庭芳集其言見水利條翟汝文字公巽其先丹陽人後徙常熟祖濤通三傳以禮學名知長洲縣贈太子太傅父思祕書監知應天府汝文登進士第以親老不調者十年擢議禮局編修官召對徽宗嘉之除祕書郎三館士建議東封汝文曰治道貴清淨今不啓上述三代禮樂而師秦漢之侈心乎責監宿州稅久之召除著作郎遷起居郎勸講皇太子除中書舍人言者謂汝文嘗從蘇軾黃庭堅遊出知襄濟唐三州以謝章自辨罷未幾起知陳州召拜中書舍人外制典雅一時稱之同修哲宗國史遷給事中髙麗使入貢詔班侍從之上汝文言其不可乃如舊制梁師成強市百姓墓田廣其圃汝文言於上師成諷宰相黜汝文守宣州召為吏部侍郎出知廬州徙密州密負海産鹽蔡京屢變鹽法盜販者衆有司窮治黨與汝文曰祖宗法度獲私商不詰所由欲靖民也悉縱之密嵗貢牛黃汝文言牛失黃輒死非所以惠農宜輸財市之則其害不私於密從之欽宗即位召為翰林學士改顯謨閣學士知越州兼浙東安撫使人安其政建炎初奏減和買絹錢以擅放稅降官紹興元年為翰林學士兼侍講除參知政事同提舉修政局時秦檜相四方奏請填委汝文嘗受辭牒書字用印直送省部入對乞治堂吏受賄者檜怒靣劾汝文專擅諌官方孟卿因奏汝文與長官立異先是汝文在密檜為教授嘗一薦其才故檜引用之汝文性剛不為之屈或爭於殿廷至目為金人姦細必致誤國遂罷官以資政殿學士提舉洞霄宫歸吳卒門人私諡曰忠惠先生汝文與葉夢得汪藻孫覿俱以文名宣政間覿嘗自評云覿之視浮溪浮溪之視石林各少十年書石林視公巽亦然識者以為確論汝文辭章古奧制誥多法典謨好古博雅精於篆籀有文集若干卷祭儀十卷子耆年張柵字材仲繇三舍法貢京師入太學登進士第初調臨江軍司刑曹事知遂安縣方臘叛擁兵入邑丞簿尉皆遇害柵獨力戰不敵刃中脅擁入巢穴柵曉以逆順卒不敢加害臘既伏誅改秩知歸安縣臨安府通判知泰州鎮江衢州皆以惠愛稱柵性至孝在衢時母卒年九十九柵亦七十矣執喪甚至人咸敬之初得郊恩舍子豫姪族人有喪不能舉者裒而葬之官至左朝散大夫卒年七十八贈正議大夫陳起宗字興祖少入上庠踔厲有聲一日歸省屬同舍生為投試卷起宗業禮記同舍嫉之輒易以周禮迫試乃告起宗遂用周禮試復第一登政和進士以徽猷閣學士知并州卒起宗善談辨詩篇灑落有陶謝風錢觀復字知原於吳越為疏屬由太學登進士乙科常熟土著及第自觀復始教授瑞安時方臘猖獗觀復贊邑令王公濟備禦流民歸瑞安者相屬于道或議驅出境觀復曰孰為吾境迫之適資盜耳遂徙海洲居焉調湖州户曹朱勔以鄉人固欲妻以女辭不就授衢州判官敵騎犯浙觀復白郡守縱民老弱皆出户留一丁不然者罪如軍法既而諸兵欲乘時為變顧城中子女無所獲乃止出知廣德軍嵗上供民輸送回逺加斂水腳錢乃請寄廪湖之四安至國門才五日費減大半觀復深於易急於為義鄉里推之官至朝散郎贈金紫光祿大夫有文集十五卷論語解二十卷子俁俁字廷碩一字惟大登進士乙科授泰州教授除太學正從容學省斂以靜退人莫窺其際改宣教郎宗正寺簿大府寺丞宗正丞丐外知袁州除著作佐郎遷將作少監請祠除福建路提舉終朝請郎俁寡嗜好惟藏書數千卷朱墨精謹皆所親校尤邃於易有文集五卷諸經講解十卷易經三卷弟佃佃字仲耕以進士為分水尉池真二州教授改秩除諸王宫大小學教授遷大宗正丞通判太平州乾道七年詔皇太子領臨安尹慎擇僚寀佃自外任選為推官擢吏部郎中對便殿言三事上稱善纍遷左右司檢正兼權吏兵工三部侍郎出為江西路轉運副使時盜賴文正起武陵朝廷調兵討之佃餉不乏繼使福建再使江西奏蠲諸路之逋淳熙八年婺州飢且缺守上曰錢佃可守郡既至禱雨鬚髮為白勸分移粟所活口七十餘萬政甲一路提舉朱熹與陳亮書云婺人得錢守比之他郡事體殊不同及作江西漕司養濟院記謂其嘗奏免贑吉麻租二千四百餘斛兩州之人尤歌舞之婺州救飢之政亦為諸郡最所以稱舉者如此佃忠信篤厚根於天性臨政不求赫赫聲恆以字民為先務捐橐􅏻買田合族名曰義莊官至中奉大夫祕閣修撰卒年六十二有易解三十卷詞科類要二十卷文集二十卷魏憲字令則吳江人與弟志俱進士有聲太學號熙豐人才憲纍遷國子司業親喪三年弗御酒肉廬於冢上有芝草甘露之祥再為司業以學行見推遍歷中外師儒之選兼太子舍人遷中書舍人給事中其文溫厚雅正得代言體宣和二年以直龍圖閣知常州三年除太常少卿歷顯謨閣學士知明州建炎二年為吏部侍郎時案牘散佚吏緣為姦有偽名寄貫之弊憲請嚴保任以核實開告賞以止姦急期會以取闋以戢其弊又言古未有背天險以為都者敵騎由京西不四五日可至淮泗宜有以俟之久之以直學士提舉江州太平觀歸卒年七十三志字幾道志四世孫汝賢淳祐四年特奏名狀元曾懷字欽道公亮之曾孫世為晉江人由開封寓居常熟宣和初以父任調金壇簿常州吏張元貸民錢解發事敗或謂當死懷曰無文記以盜論今官有文記吏焉得死時車駕南巡懷以攝宰靣奏上嘉奬令籍記姓名歷烏江令浙西帥司幹官知淳安縣濠太平二州通判提舉兩浙市舶知江州孝宗即位改真州訓習民兵有紀張浚督師大竒之隆興二年為浙西提舉上以懷有應用才除度支員外郎别置拘催錢物所令専行以豐裕聞進權户部侍郎兼提領贍軍諸庫乾道初真除户部侍郎奏臣不敢進生財之説以傷陛下愛民之心亦不敢進苦節之説以傷陛下惠下之心但量入為出使天下之財足天下之用上悅再嵗除尚書在版曹凡五年未嘗以錢穀語人凡錢穀之數州郡所積與出納之多寡纖悉必記上以蕭何劉晏目之丐間除龍圖閣知婺州甫三月趣召靣賜御書松賦以示嵗寒之意復為户部尚書八年除參知政事九年拜右丞相封魯國公淳熙元年除觀文殿大學士宫觀甫及故里復拜右丞相兼樞密使以疾免朝參惟令入堂治事遇大政則宣引特令製輕小金帶以賜復力上印綬仍除觀文殿大學士宫觀歸覲遂卒年六十九贈少保懷由世家登宰輔以清約自持為相侃侃得大臣體常言事之大者視之以小事之小者視之以無則天下無復事矣時以為名言有文集三卷泉州志隆興八年拜右丞相封魯國公今從史邱礪字師説髙唐丞磻之弟也世為昫山人少讀書刻苦有志事功建炎初知吳江縣因家常熟入為國子監丞御史臺檢法大理寺丞權户部郎知筠泰建三州除福建提舉兼提刑改轉運判官在建凡十年惠政不可勝紀秦檜當國以礪同年生每示意嚮欲以孫與礪女為婚礪不肯力請祠歸屏迹杜門以詩酒自適奉祠凡十二年卒年七十六官至朝請大夫纍贈光祿大夫礪天性純實自律甚嚴更迭中外二十年薄田數百畝不給則舉質以繼處之裕如有易議及超然類藁杜詩集句四子璪應博學宏詞科璋通直郎通判寧國府琛提舉福建市舶璠知舒州太湖縣璋子耒耒字少潛以蔭授於潛簿慶元録事參軍淮東轉運幹官所至有聲知海鹽縣興起學宫築捍海隄二十里代民輸逋租郡有疑獄率委之平反守議賞輒辭之民爭先立石誦其德政薦者凡十八人監三省樞密院門遷將作監丞出知台惠撫三州皆不赴終朝奉大夫耒平生尚義加厚族黨捐田以豫姪王萬謂其天資素高才足以運慮足以謀明足以察云子烈烈字希文以父澤授蕪湖簿通州司理知丹徒縣真州通判端介有守咸淳十年為江東安撫司參議官明年北兵至使者委印而去城失守烈護印匿民間將赴行在至吳遇疾知平江府陳謙亨提舉常平戴覺民為上印於朝方擬進秩而卒官至奉直大夫烈從兄嶽嶽字山甫磻曾孫也祖琚字伯玉受學北方紹興三十一年與其子松歸朝授琚迪功郎招撫使凖備差遣松下州文學遂家髙郵琚卒葬吳縣嶽松之子也以進士授安慶太湖尉辟蘄州推官紹定三年李全弄兵于淮趙范趙葵奉命誅討辟嶽入幕內則贊決謀議外則受檄督戰卒殄凶酋又以行軍器監簿為范參謀入洛議興未嘗茍同歷通判黃州知真州禦韃靼以全城殱其渠帥宋史云端平三年蒙古攻真州知州邱嶽部分嚴明守具周悉蒙古兵薄城輒敗嶽乘勝出戰于胥浦橋以強弩射其致師者一人死敵少卻嶽曰敵衆十備于我不可以力勝乃為三覆設炮石待之於西城敵至伏起炮發殺其驍將敵衆大擾嶽選勇士襲敵營焚其廬帳越二日皆引去改兵部郎官淮東提刑兼提舉常平知太平州兼江東轉運閲三月知江州兼沿江制置副使移鎮淮東四年纍疏求去淳祐十年以工部尚書召尋謝事自鎮江徙居常熟十三年仍召為工部尚書辭之寶祐初授華文閣直學士沿江制置使兼知建康府江東安撫兼營田使行宫留守節制和州無為軍安慶府三郡屯田使丞相貽書奉上旨趣行舟發京口時北兵方闖廬和之境民被其害即調兵赴援趣新知和州印應雷出戍應雷奮然突入士氣益張卒保和州在官數月搜軍實飭邉備皆有端緒三年授龍圖閣致仕卒年六十九嶽自典郡持節躋從班開制閫為時名臣在真州及淮閫兵將樂為之用凡四禦大敵皆數十萬衆未嘗少有敗衄泗水之捷俘獲不可勝計功績尤偉為人簡淡威重言不妄發望之似不可犯及造室論議洞然開示腹心表裏平實理宗嘗御書忠實二字賜之官至正議大夫封東海郡侯卒贈銀青光祿大夫纍贈特進嶽四世孫迪迪字彥啓幼孤養于外家孟氏成童侍舅潼遊匡廬白鹿洞讀書得謁熊天慵天慵異之留講下勉之以義理之學及歸教授鄉里湯彌昌龔璛黃溍咸相與接每推譽焉少工尚書義應舉再不利遂不復求仕退讓自持人亦不敢狎侮所著尚書辨疑玉淵雜著雲麓文藁若干卷王綯字唐公審琦五世孫也建炎初為御史中丞金人入侵具陳攻守之䇿宰相不能用車駕南渡扈從至鎮江從容奏曰陳東以忠諫被誅此其鄉里也上即命賙其家官其子東宫初建綯以資政殿學士權太子少傅三年拜參知政事明年罷紹興三年出知越州及上幸越韓世忠邀擊金歸騎於楊子江綯議遣兵追襲與世忠夾擊之同政者議不合遂求去御書霖雨思賢佐丹青憶老臣十字以賜之綯為人剛正有守立朝無所阿附及居政府每以祿不及親自奉甚薄不置第宅晚寓崑山之薦嚴寺蕭然一室服食器用無異寒士天性仁孝賙恤姻族無所不至紹興七年卒年二十四諡文恭前期二日書戊戌字示左右及卒果然平居無他嗜好惟以讀書為樂其文溫潤典雅深於理致有內外制四十卷奏議三十卷進讀事實五卷論語解二十卷孝經解五卷羣史編八十卷內典略録一百卷子陔凌哲字明甫宣和中進士髙宗朝自明州通判召對擢為御史數日遷右正言初周望守平江金人入侵望遁去以罪責死連州至是其家自陳詔復故官澤及其子哲因追數望棄城罪惡竟寢其命及上疏論秦氏親黨因緣科第有妨寒畯進取之路又奏王會前知湖明二州及移平江恃權貪酷乞投竄遐裔以為慢令賊民之戒會竟編管循州遷左司諫吏部侍郎兼侍講以敷文閣待制知台州遂退歸鄉里十餘年以通議大夫致仕卒年八十六哲為人端重簡默淡約自守雖處侍從不啻寒素非時未嘗至郡府終嵗無所干請居鄰有茶肆日為市井俚俗所聚哲徙避之人服其德量目為凌佛子鄭作肅字恭老以進士歷通判杭州紹興五年知常州初唐獨孤及為刺史有甘露降於廳事作肅因創凝露堂而為之記二十四年知吉州還朝奏郡中歲輸黃河竹索錢河久陷敵境錢何從歸乞賜蠲免其他循襲似此者亦乞盡行除放髙宗嘉納且喻秦檜稱奬再三檜怒諷以在任不法興大獄繩治之逮吏及門以檜殂得免二十八年知鎮江府嚴殺牛之禁有牛奔至府治果將就屠者人皆異之三十二年冬改知湖州孝宗即阼手詔奬諭隆興二年歲歉民貧有生子不舉棄於道路者作肅令屬官尋訪收取又擇乳母為之保養月給贍米一石委請學官專蒞其事條具事目刻石州縣遂為其邦著令孫緯字彥文擢進士第歷宗正寺丞官至尚書郎為人誠朴好以俗語為詩文而近理尤精於一時典故所著有集諡總録本朝人物志唐輝字子明郡人居崑山以文章名登進士第紹興中為諌官時盧知原知臨安府為政乖謬輝論罷之官至禮部侍郎弟燁子子壽並進士王葆字彥光崑山人祖申以學行推于鄉父億樂道好善贈右中散大夫葆幼有志識弱冠通諸經縣人自孫載後六十年葆始上進士第紹興改元上疏陳十弊深中時病末言儲嗣尤切直至謂仁宗時中外晏然而范鎮等為國逺計汲汲在此况今日國步多艱人心易動強敵未靖羣盜陸梁天下之勢危如綴旒而甲觀之崇未聞流慶中外惴恐此為甚急願為宗社計廣求宗室中仁明孝友時論所歸者歷試諸事以係人心執政讀而竒之遂自麗水簿遷知宜興縣兩淮用兵浙亦盜起邑當孔道寮吏懼乏軍興相次駭竄葆白父母食君祿無愛死理弟可終養母以葆為念也明日取丞簿印兼佩之諸將妄求輒面折力拒乃稍稍自戢歷監登聞檢院宗正寺丞遷司封郎官兼國子司業秦檜嘗語葆曰檜欲告老如何葆曰此事不當問葆檜曰他人不敢言以公有直氣故問爾葆曰果欲告老不問親讐擇可任國家之事者使居相位誠天下生民之福檜默然當是時百司莫敢可否事葆為考功御史獨伸滯直枉當官不避天子議置相人懷向背葆獨介然持正論出知廣德軍移守漢州綏善鉏姦境內大治擢瀘南安撫使知瀘州引用名士劾去貪殘吏數輩然後鎮以無事踰年遷池州孝宗召為大理少卿以疾辭道改浙東提點刑獄屢行帥事疾惡彌厲權要皆不樂乃請祠歸宜興遂終老焉官至左朝請大夫葆學行俱至潛心古道教誘後生如親子弟沙隨程逈嘗受經於葆出其門者後多成立號稱卿先生其學深於春秋著集傳十五卷備論二卷東宫講義三卷葆於人物鑒裁尤精李衡布衣流落一見以女弟歸之周必大未仕時亦妻以其子范成大蚤孤廢業葆喻勉切至加以詰責留之席下程課甚嚴後皆為名臣弟萬進士子嘉言監南嶽廟嘉賓知餘干縣李衡字彥平其先江都人髙祖昭素侍御史曾祖詰祖處約父預至衡始居崑山少博學有局幹為文操筆立就紹興中第進士授吳江主簿部使者怙勢侵兵衡不忍以敲朴迎合即投劾去二十三年除仙居丞隆興初知溧陽縣為治強敏專以誠意化民稅賦以期日榜縣門鄉無吏迹而取辦先他邑金人侵淮堧官沿江者多送其孥於內地衡自浙右移家入縣民心大安在官四年民未嘗犯重罪安撫汪徹運使韓元吉列上治狀召對陳便民十事詔進一秩除知溫州未行拜監察御史遇事敢言無所顧避出知婺州以循良著稱召為司封郎中遷樞密院檢詳加直祕閣屢上書引年除祕閣修撰致仕孝宗思其朴忠詔落致仕拜侍御史固辭不獲張説以節度使簽書樞密時給事中莫濟不書敕直學士周必大不草制衡與王希吕上疏謂不當以母后肺腑掌兵柄廷爭移時遷衡起居郎衡曰進而負君孰若退而合義章五上除知台州復力辭上知不可奪使仍以祕閣修撰致仕四人同時去國衡歸崑山圓明野墅日與門人講解經義聚書踰萬卷名其室曰樂菴學者稱為樂菴先生卒年七十九衡宣和間入太學同舍生洛人趙孝孫勸衡熟讀論語且曰學非記誦詞章所以學聖賢耳不可有絲毫偽孝孫之父顔子實師程頥衡心佩其訓故雖博涉羣書而以論語為主本講學明道樂於教人中年絶欲清修唯蒼頭給事臨沒沐浴冠櫛作手書數十别親舊戒子孫問天色何時答以月明翛然而逝周必大聞之曰此老平生跌蕩到此乃得力可敬羡也又曰彥平非逃儒入釋者而臨終超然如此殆聞道乎所著有易説論語説易義海最要樂菴文集總若干卷行於世姑蘇志卷五十
