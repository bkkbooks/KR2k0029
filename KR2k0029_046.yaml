body:
  text: 姑蘇志卷四十七明王鏊撰人物五名臣沈友字子正郡人年十一華歆行風俗見而異之因呼曰沈郎可登車語乎友逡巡曰君子講好以禮今仁義陵遲聖道漸壞先生銜命將以禆補先王之教整齊風俗而輕脫威儀猶負薪救火更益其熾歆慚曰自桓靈以來雖多英彥未有幼童若此者及冠博學善屬文兼好武事注孫子兵法又辨於口時稱其筆舌刀三者皆妙絶於人孫權以禮聘之既至極論王霸之略正色立朝清議峻厲為庸臣所譖權亦疑其不為己用害之年二十九髙岱字孔文郡人業少厲髙操輕財貴義其友士拔竒取於未顯所交皆當時英偉年二十七太守盛憲以為上計吏舉孝亷謂之曰卿懷書千卷隱光藏耀擇君而不仕太守今日相使行誠不足使鳳鸞舒翼然不獲已君其勉之岱遂行到京輦稱病還家許貢來領郡岱將憲避難於許昭家求救於陶謙岱憔悴泣血水漿不入口謙感其忠壯有申包胥之義許為出軍岱得謙書還而貢已囚其母吳人皆為危悚岱言在君則為君且母在牢獄期於當往遂通書自白貢即相見才辭敏捷好自陳謝貢登時出其母岱將見貢語友人張允沈盿令豫具船以貢必悔當追逐之出便將母乘船易道而逃貢須臾遣人追殺之不能得時年三十餘隱於餘姚孫策命其出使會稽丞陸昭逆之策虛已俟焉聞其善左傳乃自玩讀欲與講論或謂之曰髙岱以將軍但英武而已無文學之才若與論傳而言不知者則其言符矣又謂岱曰孫將軍為人惡勝己者每問當言不知乃合意耳及與論傳或答不知策怒以為輕已將殺之知友及時人皆露坐為請策登樓望見數里中置滿惡其收衆心遂遇害朱桓字休穆吳縣人孫權為將軍桓給事幕府除餘姚長遇疫癘歲荒桓分部良吏躬親醫藥飱粥相繼士民感戴之遷蕩寇校尉使部伍吳會二部鳩合遺散丹陽鄱陽山賊起桓督領諸將周旋赴討皆平定稍遷禆將封新城侯後代周泰為濡須督黃武元年魏使曹仁將步騎數萬向濡須仁欲襲取州上先揚聲欲東攻羡溪桓分兵羡溪既發仁卒進軍拒濡須七十里間桓乃追還羡溪兵兵未到而仁奄至時桓所部兵在者五千人諸將咸懼桓因偃旗鼓外示虛弱以誘致仁仁果遣其子泰攻濡須城分遣常雕督諸葛虔王雙等乘油船别襲中州仁自將萬人劉橐臯復為泰等後拒桓部兵將攻取油船别擊雕等桓因身自拒泰燒營而退遂梟雕生虜雙送武昌臨陳斬溺死者千餘權嘉桓功封嘉興侯遷奮武將軍領彭城相黃武七年鄱陽太守周魴譎誘魏曹休休將步騎十萬至皖城以迎魴時陸遜為元帥全琮與桓為左右督各督三萬人擊休黃龍元年拜前將軍領青州牧假節嘉禾六年魏廬江主簿吕習請大兵自迎欲開門為應桓與全琮俱往迎既至事露軍當引還城外有溪水去城一里許諸軍勒兵渡桓自斷後時廬江太守李膺整兵欲須軍半渡擊之及見桓節蓋在後卒不敢出時全琮為督權又令胡綜宣詔參與軍事琮以軍出無獲議欲部分諸將有所掩襲桓素氣髙恥見部伍乃往見琮問行意感激發怒與琮校計琮欲自解因曰上自令胡綜為督綜意以為宜爾桓愈恚還乃使人呼綜綜至軍門桓出迎之顧謂左右曰我縱手汝等各自去有一人旁出語綜使還桓出不見綜知左右所為因斫殺之桓佐軍進諫刺殺佐軍遂託狂發詣建業治病權惜其功不罪使子異攝部曲令醫視護數月復遣還屯權自出祖謂曰今寇虜尚存王塗未一孤當與君共定天下欲令君督五萬人專當一面以圖進取想君疾未復發也桓性護前恥為人下每臨敵交戰節度不得自由輒嗔恚憤激然輕財貴義兼以強識與人一面數十年不忘部曲萬口妻子盡識之愛養吏士贍護六親俸祿産業皆與共分及疾困舉營憂戚赤烏元年卒吏士男女無不號慕家無餘財權賜鹽五千斛以周喪事子異嗣異字季文以父任除郎後拜騎都尉代桓領兵赤烏四年隨朱然攻魏樊城建計破其外圍還拜偏將軍魏文欽營住六安多設屯寨置諸道要以招誘亡叛為邊寇害異乃身率二千人掩破欽七屯斬首數百遷揚武將軍權與論攻戰辭對稱意權謂異從父據曰本知季文見之復過所聞建興元年遷鎮南將軍是歲魏遣胡遵諸葛誕等出東興異督水軍攻浮梁壞之魏軍大破太平二年假節為大都督救壽春圍不解還軍為孫綝所枉害異從父據據字子範有姿貌膂力又能論難才兼文武孫權以為可繼吕蒙張溫使領兵屯尚公主拜左將軍封雲陽侯謙虛接士輕財好施祿賜雖豐常不足用遭二宫交惡據擁護太子義形於色以死守之遂左遷終於新都郡丞孫亮時二子熊損各復領兵熊子宣襲爵尚公主至驃騎將軍沈珩字仲山郡人少綜經藝長春秋內外傳有智謀能專對孫權使使魏文帝引珩談語終日隨事響應無所屈還吳以奉使有稱封永安鄉侯官至少府弟峻峻字敬山有名譽而性儉吝張溫使蜀與峻别峻入內良久出語溫曰向擇一端布欲以送卿而無粗者溫嘉其無隱又常經太湖岸上使從者取鹽水已而恨多敕令還減之尋亦自愧曰此吾天性也暨豔字子休郡人張溫引為選曹尚書性狷厲好為清議是時郎曹混淆多非其人豔臧否區别賢愚異貫遂為浸潤所譖互見張溫傳吾彥字士則吳人也出自寒微有文武才身長八尺手格猛獸膂力絶羣仕吳為通江吏初為小將給事陸抗抗奇其勇略將拔用之患衆情不允乃會諸將密使人陽狂拔刀躍跳來座上諸將皆懼走唯彥不動舉几禦之衆服其男乃擢用焉稍遷建平太守時王濬將伐吳造船於蜀彥覺之請增兵馬為備皓不從彥乃輒為鐵鎖橫斷江路及師臨境緣江諸城皆望風降附或見攻拔唯彥堅守攻不能尅乃退舍禮之吳亡彥始歸降武帝以為金城太守帝嘗從容問孫皓所以亡國彥對曰吳主英俊宰輔賢明帝笑曰君明臣賢何為亡國彥曰天祿永終厯數有屬所以為陛下禽此蓋天時豈人事也轉燉煌威恩甚著遷雁門太守時順陽王暢驕縱前後內史皆誣之以罪及彥為順陽內史清身率下威刑嚴肅衆皆畏懼暢不能誣乃更薦之冀其去職遷員外散騎常侍帝問彥陸喜陸抗二人誰多對曰道德名望抗不及喜立功立事喜不及抗會交州刺史陶璜卒以彥為南中都督交州刺史初璜之死九真戍兵作亂逐其太守賊帥趙祉圍郡城彥討平之在鎮二十餘年威恩大著南州寧靖自表求代徴為大長秋卒于官單曜字𢎞嗣郡人少好學能屬文孫亮時為太史令皓時遷中書僕射皓欲為父和作紀曜執以和不登帝位宜名為傳由此漸怒皓酒後以嘲弄公卿為歡曜但言論經議為不承詔收付獄徙其家零陵徐原字德淵郡人慷慨有才志忠壯好直言吕岱薦為侍御史岱有得失原輒諫諍原死岱哭之甚哀曰德淵岱之益友今不幸岱復於何聞過談者美之蔡洪字叔開郡人有才名西晉時王政陵遲官才失實君子多退而窮處洪作孤奮論與王沉釋時論同意讀者莫不歎息仕為松滋令朱誕郡人陳敏之亂豪桀多見維縶惟誕與賀循不豫其事吳震郡人學行清修老而未調華談薦之為著作佐郎全景文字𢎞達郡人也少有氣力微時與同郡孫超之吳興沈攸之同載出都至奔牛埭有人止而相之曰君等皆至方伯行當富貴景文仍得將領為軍主宋孝建初為竟陵王驃騎行參軍以功封漢水侯除員外郎積射將軍泰始二年為假節寧朔將軍冗從僕射軍主隨劉亮討破東賊於晉陵除長水校尉假輔國將軍北討薛索兒於破釡領水軍斷賊糧運仍隨太祖於葛家梁再戰皆有功南賊相持未決刺景文𨽻劉亮拒劉胡攻圍力戰身被數十創除前軍將軍封孝寧縣侯除寧朔將軍遊擊將軍假輔師將軍髙平太守鎮軍安西二府司馬驍騎將軍元徽末為南豫州刺史厯陽太守輔國將軍如故遷征虜將軍南琅邪濟隂二郡太守軍主尋加散騎常侍齊建元元年以不預佐命國除授南琅邪太守常侍將軍如故遷光祿大夫征虜將軍臨川王征西司馬南郡太守纍遷給事中光祿大夫永明九年卒超之吳縣人寧朔長史廣州刺史元徽五年以遊擊將軍誅攸之荆郢二州刺史孫瑒字德璉吳縣人祖文惠齊越騎校尉清逺太守父修道梁中散大夫以雅素知名瑒少倜儻好謀略博涉經史尤便書翰起家梁輕車臨川嗣王行參軍纍遷為安西邵陵王水曹中兵參軍事王出鎮郢州瑒書室隨府甚被賞遇太清之難授假節宣猛將軍軍主王僧辨之討侯景也王琳為前軍琳與瑒同門乃表薦為戎昭將軍宜都太守仍從僧辨救徐文盛於武昌會郢州陷乃留軍鎮巴陵修戰守之備俄而侯景兵至日夜攻圍瑒督所部兵悉力拒戰賊衆奔退及克姑熟瑒力戰有功除員外散騎常侍封富陽侯尋授假節雄信將軍衡陽內史未之官仍遷衡州平南府司馬破黃洞蠻賊有功除東莞太守行廣州刺史尋除智武將軍監湘州事敬帝嗣位授持節仁威將軍巴州刺史髙祖受禪王琳立梁永嘉王莊於郢州徴瑒為太府卿加通直散騎常侍及琳入寇以瑒為使持節散騎常侍都督郢荆巴武湘五州諸軍事安西將軍郢州刺史總留府之任周遣大將史寧率衆四萬乘虛奄至瑒兵不滿千人乘城拒守親自撫巡行酒賦食士卒皆用命周人苦攻不能克乃矯授瑒柱國郢州刺史封萬户郡公瑒偽許以緩之而潛修戰具樓雉器械一朝嚴設周人甚憚焉及聞大軍敗王琳乘勝而進周兵乃解瑒於是盡有中流之地遣使奉表詣闕天嘉元年授持節散騎常侍安南將軍湘州刺史封定襄縣侯徴為散騎常侍中領軍未拜文帝謂曰昔朱買臣願為本郡卿豈有意乎仍改授持節安東將軍吳郡太守給鼓吹一部及將之鎮乘輿幸近畿餞送秩滿徴拜散騎常侍中護軍鼓吹如故留異反東陽詔瑒督舟師進討異平遷鎮右將軍常侍出為使持節安東將軍建安太守光大中以公事免尋起為通直散騎常侍大建四年授都督荆信二州諸軍事安西將軍荆州刺史出鎮公安瑒增修城池懷服邊逺為鄰境所憚居職六年又以事免更為通直散騎常侍及吳明徹軍敗吕梁授使持節督緣江水陸諸軍事鎮西將軍給鼓吹一部仍授散騎常侍都督荆郢巴武湘五州諸軍事郢州刺史持節將軍十二年坐疆場交通抵罪後主嗣位復除通直散騎常侍兼起部尚書尋除中護軍復爵邑入為度支尚書領步兵校尉俄加散騎常侍遷侍中祠部尚書後主頻幸其第及著詩賦述勳德之美又為五兵尚書領右軍卒年七十二後主臨哭盡哀贈護軍將軍侍中如故諡曰桓子瑒事親以孝聞篤睦諸弟性通泰財物散之親友自居處頗失奢豪庭院穿築極林泉之致歌童舞女當世罕儔賔客填門軒蓋不絶又巧思過人為起部尚書軍國器械多所創立有鑒識及卒後主題銘後四十字敕就宅鐫之瑒二十一子咸有父風子訓頗知名歷臨湘令直閣將軍髙唐太守陳亡入隋建康實録孫瑒宅在青溪東西即江總宅也許孝敬吳人徑勇過人為梁宣帝驍將以大將軍守河東無救援為吳明徹所禽戮於建康市贈車騎大將軍子世武襲父大將軍好勇不拘行檢重賔客施與不節資産既盡遂謀奔陳事覺伏誅卜靜字玄風與顧邵陸通張訓等齊名終剡令張承休崑山人隋散騎常侍胤之孫也張説撰其墓志云希言篤行去華崇實非法不由非禮不動精於理物敏於從政厯朝議大夫上柱國恆州刺史説之文曰閶門一分暉我諸侯蓋居閶門也張從師郡人祖損之隋侍御史水部郎父浤碩學麗藻名動京師從師仕終河南府法曹參軍張説撰墓志云沖和純粹辨博閎達卓犖好古儻蕩逸羣忘懷樂道上元二年終葬虎丘西原子惟儉惟靜弱歲皆精左氏榖梁春秋弟從申在藝苑傳歸崇敬字正禮吳縣人治禮家學多識容典擢明經遭父喪孝聞鄉里調國子直講天寶中舉博通墳典科對策第一遷四門博士建議以景皇始受命為唐太祖百代不易諸儒僉諧或執異者卒不能移授左拾遺肅宗次靈武再遷起居郎贊善大夫史館修撰兼集賢殿校理修國史儀注以貧求解歷同州長史潤州别駕未幾有事橋陵建陵召還參掌儀典改主客員外郎復兼修撰代宗幸陜召問得失崇敬極陳生人疲敝當以儉化天下則國富而兵可用大厯初授倉部郎中充弔祭册立新羅使海道風濤舟幾壞衆謀易單舸崇敬不肯獨濟風息使還囊槖惟衾衣東夷傳其清德授國子司業兼集賢學士八年遣祀衡山未至而哥舒晃亂廣州監察御史憚之請望祀而還崇敬正色曰君命豈有畏邪遂往在職多所建議坐事貶饒州司馬德宗立召還復拜國子司業稍遷翰林學士左散騎常侍充皇太子侍讀封餘姚郡公遷工部尚書以兵部尚書致仕卒年八十八贈左僕射諡曰宣論撰十數篇子登登字沖之事繼母篤孝大厯中舉孝亷髙第補四門助教又策賢良性溫恕雅實𢎞厚慕陸象先為人有文學工草𨽻貞元初自美元尉拜右拾遺裴延齡得幸熊執易疏論之以示登登動容曰願竄吾名雷霆之下君難獨處同列有所諫正輒聯署無所回諱轉右補闕起居舍人凡十五年退然逺權勢終不以淹晚概懷順宗為皇太子登父子侍讀及即位以東宫恩超拜給事中遷工部侍郎復為皇太子諸王侍讀獻龍樓針以諷徙左散騎常侍入謝憲宗問政所先登知帝睿而果干斷勸順納諫爭外傳為讜言纍遷兵部員外郎尋加史館修撰超拜給事中工部侍郎右散騎常侍兵部侍郎判國子祭酒事進工部尚書纍封長洲縣男元和末卒贈太子少師諡曰憲子融融字章子元和中進士纍遷左拾遺事文宗為翰林學士進户部侍郎開成初以工部侍郎兼御史中丞湖南觀察使盧周仁取羡錢億萬進京師融劾奏請還之代貧民租入遷京兆尹又徙祕書監興元尹兼御史大夫山南西道節度徙東道還歷兵部尚書纍封晉陵郡公會昌後儒臣少朝廷禮典多本融議辭疾以太子少傅分司東都大中七年卒贈尚書左僕射子仁晦仁翰仁憲仁紹仁澤皆登第咸通中至達官仁澤列曹尚書觀察使子藹藹字文彥擢進士遍歷三署同光初為尚書丞遷侍郎以太子賔客致仕卒年七十六藹初由進士任侍御史昭宗宴文思毬場朱全忠入百官坐廡下全忠怒貶藹為登州司户參軍張鎰字季權一字公度朔方節度使齊丘之子也郭子儀表為元帥判官纍遷殿中侍御史華原令盧樅得罪鎰按驗樅當免官有司承風以死論鎰白母曰默則負官否則為太夫人憂母曰兒無纍於道吾所安遂執正其罪樅得流鎰坐貶撫州司户參軍居母喪以孝聞大厯初出為濠州刺史政條清簡延經術士講教生徒比去州升明經者四十人李靈耀反于汳團閲鄉兵嚴守備有詔褒美時有司條天下牧守課績惟信州蕭定常州蕭復及鎰為理行第一十二年改壽州十四年去官民為立石頌德遷洪州觀察江西賑給孤獨均平賦稅存問羸老周其粟帛大興學校以激浮俗歷河中觀察使汳滑節度使建中二年拜中書侍郎平章事郭子儀壻趙縱為奴告下御史劾治而奴留內侍省鎰奏奴不可告主悖慢成風漸不可長明年以兩河用兵鎰奏減堂飱錢及百官廩俸三分一以助用度盧杞忌鎰剛直欲擠之時朱泚以盧龍卒戍鳳翔帝擇人以代杞曰鳳翔將校班秩素髙非宰相信臣不可鎮撫帝顧鎰曰文武兼資望重內外無易卿者乃以為鳳翔節度使帝幸奉天鎰罄家資將自獻行在營將李楚琳嘗事朱泚夜率其黨作亂遂遇害詔贈太子太傅大中初圖形凌煙閣鎰撰五經微旨十四卷孟子音義三卷沈既濟吳縣人經學該明楊炎雅善之薦有良史才召拜左拾遺史館修撰議則天皇后進非以德請省其紀德宗立鋭于治建中二年詔兩省分置待詔官權公錢收子贍用既濟諫止之炎得罪既濟坐貶處州司户參軍後為禮部員外郎又言古今選用之法撰建中實録時稱其能子傳師傳師字子言治春秋工書有楷法少為杜佑所器貞元末舉進士禮部侍郎權德輿於門生中推為顔子復登制科授太子校書郎以鄠尉直史館轉右拾遺左補闕纍遷知制誥入翰林為學士改中書舍人翰林缺承旨次當傳師因稱疾出穆宗遣中使敦召李德裕素與善開曉諄切終不出遂以本官兼史職出為湖南觀察使即官下修憲宗實録寶厯二年入拜尚書右丞復出為江西觀察使徙宣州傳師吏治嚴明人不敢罔所蒞以亷靜聞入為吏部侍郎太和初卒年五十九贈尚書傳師性夷粹無競更二鎮十年無書賄入權家初拜官宰相欲以姻私託幕府者傳師拒曰誠爾願罷所授故其僚佐如李景讓蕭置杜牧極當時選治家不尚威嚴閨門自化屬無親疏服食如一帑無儲錢鬻宅以葬云子樞詢詢字誠之亦能文辭清粹端美如神仙中人會昌初進士第補渭南尉纍遷中書舍人出為浙東觀察使除户部侍郎判度支咸通四年為昭義節度使治尚簡易人皆便安奴私侍兒詢將戮之奴懼結牙將為亂夜攻詢滅其家贈兵部尚書左散騎常侍劉潼代為節度馳至刳奴心祭其靈坐詢夜宴僚友更著宴辭令云莫打南來雁從他向北飛打時雙打取莫遣兩分離是夕為奴歸秦所殺夫妻俱死徐岱字處仁郡人本農家子於學無不通辨論明鋭座人常屈終給事中史館修撰麴信陵郡人貞元初進士及第六年為望江令有仁政撫孤獨為禱神請雨文云必也私欲之求行於邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移於人而害其歲既卒官百姓留葬縣境立祠崇寧四年敕賜靈施廟信陵故居在包山丁公著字平子吳人三歲喪母七歲見鄰媪抱子哀感不肯食請於父緒願絶粒學老子道稍長父勉敕就學舉明經髙第授集賢校書郎不滿秩輒去侍養于家父喪負土作冢貌力癯惙見者憂其死孝觀察使薛蘋表上至行詔刺史弔問賜粟帛旌其閭淮南節度使李吉甫表授太子文學兼集賢校理會入輔政擢右補闕遷直學士充皇太子諸王侍讀因著太子諸王訓十篇穆宗立未聽政召居禁中條詢治理且許以相公著陳讓牢切乃擢給事中時上事遊畋聲色賜與無節嘗謂公著曰聞外間人多宴樂此乃時和人安足用為慰公著對曰此非佳事恐漸勞聖慮上曰何故對曰自天寶以來公卿大夫競為遊宴沉酣晝夜優雜子女不愧左右如此不已則百職皆廢陛下能無獨憂勞乎願少加禁止乃天下之福也遷工部侍郎知吏部選事公著內知帝欲進用故辭疾求外遷授浙西觀察使徙河南尹治以清靜聞四遷禮部尚書翰林侍讀學士長慶中浙東畜癘拜觀察使詔賜米七萬斛使賑飢氓久之入為太常卿太和中以病丐身還鄉里卒贈尚書右僕射公著清約守道每進一官輒憂見顔間四十喪妻終身不畜妾及卒天下惜之任晦郡人仕為涇縣尉退居里中有深林曲沼危亭幽砌池中又為島嶼修篁嘉木掩映隈奧晦資髙放寡合好奇樂異喜文學名理之士得顧辟疆舊圃以居云許孟容吳人讀書為文口辨為給事中嘗論事由太常少卿為刑部侍郎見栁宗元先友記楊收字藏之隋越國公素之裔世居馮翊父遺直客死蘇州收七歲而孤處喪若成人母長孫親授經十三通大義善屬文所賦輒就吳人號神童及壯長六尺二寸廣顙深頥疏眉秀目博學強記至他藝無不通解以兄假未仕不肯舉進士假既釋褐乃擢進士杜悰表署淮南推官悰領度支又節度劍南東西川輒隨府三遷宰相馬植表為渭南尉集賢校理議補監察御史收又以假方外遷誼不可先固辭復為悰節度判官擢監察御史以詳禮學改太常博士未行以母喪免服除從淮南崔鉉府為支使還拜侍御史遷長安令懿宗時纍擢中書舍人翰林學士承旨以中書侍郎同中書門下平章事進尚書右僕射封晉陽縣男罷為宣歙觀察使明年貶端州司馬又流歡州俄詔賜死後三年詔追雪其辜復官爵子巨鏻巨廣明初進士乾寧初為翰林學士從入洛終散騎常侍鏻至户部尚書收兄發弟嚴發字至之登進士又中拔萃科纍官左司郎中宣宗時議改順憲二宗廟主署新諡發以為自古無改作主之文報不可知禮者韙之改太常少卿為蘇州刺史治以恭長慈幼為先徙福建觀察使又以能政聞拜嶺南節度使承前政寬弛操下剛嚴軍遂怨起為亂囚發傳舍貶婺州刺史假字仁之開成末登第纍遷太常少卿繇浙西判官擢監察御史出為常州刺史卒官嚴字凜之由進士纍遷給事中工部侍郎翰林學士以收知政請補外拜御史中丞越州刺史觀察浙東收貶嚴亦斥為邵州刺史徙吉王傅乾符四年以兵部侍郎判度支卒子涉注涉昭宗時纍遷刑禮吏三部侍郎轉左丞吏部尚書哀帝時進同中書門下平章事加中書侍郎涉性端厚命相之日與家人相向而泣曰吾不能脫此網羅禍將至矣又謂其子凝式曰今日之事吾家重不幸必纍爾等天祐四年帝禪梁以涉為押傳國寶使凝式白曰大人為唐宰相而國家至此不可謂之無過况手持天子璽綬與人雖保富貴奈千載何蓋涉大駭曰汝滅吾族神色不寧者數日涉已相辭內職為户部侍郎竟以令終注中和二年進士纍官翰林學士凝式自有傳皮光業字文通日休子也光業生於蘇十歲能屬文錢武肅王鏐辟以為屬吳越國建以為相教令儀注多其所定美容儀善談論若神仙中人司馬福郡人始𨽻吳越王水軍為遊奕都虞候開平三年淮人圍蘇內外阻絶王遣援兵至莫知城中音問福潛行水中三日入城中得報復出及救兵與城中弓矢相應淮人以為神事詳平亂條進官都指揮使吳越王城吳江置軍鎮命福主之遂老於職福鬚髯屢為諜者入城因去之淮人卒不能識蔣詔恭吳人流落入蜀性耿直有逸才每一吟詠率多諷刺時蜀主季年臣僚多尚權勢侈敖無節因為詩以諷蜀主曰敢言之士也特授名山令又善蒞事賜銀緋吳仁璧字廷寶長洲人大順中及第喜屬文善星學及黃白術初學於廬山道士數年其師曰能學仙乎仁璧固陳求名之志道士曰一第猶拾芥爾但他年勿干英雄仁璧既成名吳越王錢鏐待以客禮訪求天文固辭非所知欲辟入幕又辭天復初鏐母秦國夫人水丘氏殂具禮幣請為志文不從鏐怒沈之江中時人憐之有詩一卷臨安志云仁璧關右人中第後入浙錢武肅王纍辟不就請撰羅城記又不從王怒沈之江董思恭吳縣人所著篇詠甚為時人所重初為右史知貢舉坐豫泄問目流嶺表死溫訥郡人為楊行密將劉威幕客行密卒威為帥府所忌或譖於徐溫溫將害之訥説威曰公受謗雖深反本無狀若輕舟入覲則嫌疑皆亡矣威從之溫果待威甚恭威得還鎮訥之力也訪式字叔矜祖延祚為常熟令遂家于吳式舉進士有髙行名著雍咸間歷通判博州尚書祠部郎中知洪筠二州官至轉運使年八十餘卒贈禮部尚書姑蘇志卷四十七
