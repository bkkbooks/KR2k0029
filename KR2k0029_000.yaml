body:
  text: 姑蘇志地理𩔖三都會郡縣之屬提要臣等謹案姑蘇志六十卷明王鏊撰鏊所著震澤紀聞震澤集俱别著錄蘇州自宋范成大明初盧熊二志後纂輯久闕𢎞治中呉寛嘗與張習都穆有志修述未成而卒遺稿尚存後廣東林世逺為蘇州守以其事屬鏊鏊乃與郡人杜啟祝允明蔡羽文璧等共相討論發凡舉例咸本於寛而芟繁訂譌多所更益凡八月而書成首列沿革守令科第三表沿革分野以下分為三十一門而人物門中又分子目十三繁簡得中考核精審為地志之有體要者陳繼儒見聞錄稱鏊修志時以揚循吉喜謡諑不願與之同局志成遣使送之循吉循吉方櫛沐不暇抽看但顧簽票云不通不通使者還述其語鏊以問之循吉曰府志修於我朝原當以蘇州名志姑蘇呉王臺名也以此名志可乎鏊始大服然考鏊自序紀其初修志時有欲屬諸楊儀部而儀部辭之語是鏊未嘗擯去循吉不與共事繼儒所載恐不足信且范成大原書已題呉郡志亦不標宋時州名鏊實沿用其例固未可以此苛責之矣乾隆四十五年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c52876eb3d57a001ffcadb9d3950a81dc1ac754580c5925597becc687448136b
