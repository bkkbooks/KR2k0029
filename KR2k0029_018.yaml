body:
  text: 姑蘇志卷十九明王鏊撰橋梁上蘇為澤國環城内外皆水也故橋多樂天詩云紅闌三百九十橋唐則然矣自宋以來始甃以石而増建益繁今舉郡縣輿梁之大者書之而不甚著者畧焉郡城卧龍街南北橋十卧龍街横亘呉城中東為長洲界西為吳縣界樂橋吳赤烏二年建元至正六年李道寧重修會稽楊維禎記飲馬橋宋淳祐丙午建郡守魏庠記魚行橋宋紹興四年重建黄土塔橋有黄土曲故名周太保橋宋慶厯三年建禪興寺後橋張馬步橋祥符寺橋宋嘉祐四年建西章家橋宋祥符二年重建香花橋在報恩寺前一名永安橋東南隅橋七十二乗魚橋子城西北昔琴高乗鯉升僊之地或云宋子英乗鯉升天故吳中門戸皆作神魚非琴髙也至和元年僧達本重建橋序乗魚橋當姑法蘇之要津茂苑之靈跡按吳地志云古者賢士丁海琴髙於此地見大鯉魚長可丈餘有角有足鼓二翼而舞琴髙見其異遂乗魚騰飛宛轉駕空上昇因立橋云高啓詩橋上西游人橋下東流水游人如水流朝莫何時已誰知有飛僊赤脚踏神鯉波警風蕭蕭渡海秋萬里左招騎龍君右携采鸞子笑飱紫雲英同歌珠宫裏歸來舊城郭千載一日耳下看橋上人還隨雞鳴起去者已如灰來者猶如蟻不觧養谷神紛紛自生死竹槅橋乗魚橋側金母橋天王堂西夏侯橋相傳唐夏侯司空建或云橋旁有夏侯廟因名宋潘夢旂記六飛駐浙吳為輔藩地望崇重視昔有加井邑阜繁於今為最郡治稍西橋曰夏辛侯以地冇夏侯廟得名締創於皇祐壬辰重修於紹興未刻于壁記于志可攷僅此他無聞焉水環樓堞陸帶闤闠左奉臺府旁聨宫寺右亘蘇舘間列津候糟丘級其首鹺庾濵其腹人物輻輳使客旁午飛轂馳韉曵裾躡履交徃迭來必繇斯橋曉鼔未作聲迹嘈雜夜漏未半暫止復動歳久而弊非兩馬力将持厥危非一木支寳慶初元邦人相率出力改作使守加其志悉捐金以助逺近翕爾而應廼命工師課員程具木石以仲秋癸丑撤其故而新之下則疊石為址剡内直外如植半圭獲以連楹兩岸對起而合以梁上則鋪石甃面穹中偃端如浮修眉翼以扶欄兩廂互應而接于逵明年七月工以訖告大容九軌髙納巨舶不峻而隆不削而垂逺而望之巍巍乎其崇近而即之坦坦然其夷厥材孔良厥砌孔堅足以閱千禩而不朽矣夫自行都抵京口渡維揚直都梁臨中原咸有通溝貫城以行運艦長虹跨水以便徒趨然其源泉併為一川架波取道無幾惟吳呼吸具區灌注五門曲河旁達䟽派且有飛梁錯峙與岐俱多輿轡經隧樓帆過肆左賦美之夜市菱藕春船綺羅韋詩詫之其流所以聚故民愿而富其水清且泚故俗粹而美橋梁道路責在有司吳人尚義多出我私閭里興修厯厯可舉兹橋底績其有自哉㒒生於吳舉於吳隨牒四方三十年未嘗一日忘父母國甫入都故老貽書述斯役俾作記忻然諾之庶幾登名于碑他日歸老尚能從容乎其所若勸施位名金榖品目列之左不復書寳慶二年七月朝散郎郡人潘夢旂記平橋子城前元大徳間建帝師橋長洲縣西宋咸淳間建烏鵲橋長洲縣東古有烏鵲舘因名白樂天詩云烏鵲橋紅帯夕陽楊備詩月滿星移水照天南飛烏鵲影翩翩雖然上屬牽牛分不為秋河織女填高啓烏鵲南飛月自明恨通銀漢水盈盈夜來橋上吳娃過只道天邉織女行鳳皇橋子城内燕家橋淨河橋船塲橋張林浜小博橋一名永安倉司前南星橋覺報寺橋義役倉橋長洲縣治西傍有落星石長洲縣前橋五龍堂橋帯城橋嘉泰元年重建緑水倉橋船舫橋帶城橋西紅鴨橋採蓮涇橋南倉橋清道橋唐家橋同在七塔寺前百獅子橋望信橋迎葑橋望門橋菴橋觀音堂橋紅橋延壽橋放生池頭閻橋延祐乙夘重建草橋篠橋馬津橋甫橋洞橋祝橋星橋報恩橋十郎巷口胡書記橋楊家院子橋東蔣家橋竹堂寺西賢至橋濠股上熙慶四年建至橋營橋尤橋草橋邊䨇塔寺橋胭脂橋遊僊橋佐家橋遊仙橋南望營橋沙餻橋驅鬼橋白蜆橋吳王橋䨇塔寺東後周廣順三年建官太尉橋吳承議橋泰明橋東禪寺西折桂橋東城下紹興二十七年建盡市橋顧亭橋端平二年建萬壽寺前橋寺廢今改為昇龍橋歳有橋平糶倉前淳祐中知府魏峻建善教橋俗名新造橋積慶寺南磗橋燒香橋東長橋西長橋葑門營内程橋東北隅橋八十八顧家橋漢顧悌仕吳為虎頭将軍父亡以孝聞郡人感之建橋臨頓橋臨頓吳時舘名吳地記云吳王征夷甞頓憇宴軍士因此置橋唐陸龜䝉居此苑橋萬壽寺西相傳闔閭有苑囿在焉今長洲縣東南皆闔閭游憇之地百口橋東漢顧訓五世同居聚族百口故因其所居名橋吳郡志云訓歳朝會集子孫悉坐依次行酒雖三歳以下並自知位次故又名試飲橋王賓詩百口橋邊春日斜舊時開遍紫荆花山東人說張公藝此是中吳顧訓家大郎橋慶厯二年建徐貴子橋醋坊橋治平己巳建縣橋長洲舊縣治東故又名縣東橋花橋白居易詩云楊州驛裏夢蘇州夢到花橋水閣頭即此白塔子橋仁壽橋碎金巷東任蔣橋建定十四年建巳上跨南北河錢都衙橋兵馬使橋定跨橋吳地記云呉王闔閭造曹胡徐橋已上顧家橋東岸顧周橋醋坊橋側宫橋𤣥妙觀前舊為紫極宫故名永福寺橋瓶塲橋紅爐子橋李師堂橋換馬橋天心橋織染局前宋鄭起潜所居北倉橋察院東金師堂橋四通橋乗魚坊内廣化寺橋二一在寺西一在寺後可過橋長洲舊縣治前初橋低不通舟檝諺云長洲縣前難過淳祐中改作取韓文公詩語中路橋天妃宫前大徳元年建靈鷲寺橋鶴舞橋吳王夫差𦵏女舞鶴於市故名金獅子橋祥符寺東橋狄勝橋馬黄橋管家橋跨塘橋北僊橋院子橋新街橋吳郎橋周通橋大𢎞寺前徐思橋斜路橋棧橋東章家橋天宫寺橋二資壽寺橋二師婆橋資福橋廟堂橋雪糕橋衆喜橋張家橋積慶橋熙寧橋蘇軍橋羅家橋新橋衆安橋朱馬交橋通利橋胡廂使橋唐家橋魏家橋打急路橋慶厯橋富孫橋奚家橋華陽橋迎春橋石塘橋張鄉橋徐鯉魚橋東周太保橋東開明橋盛婆橋通濟橋東道橋北禪寺橋三程橋二一近婁門一近齊門西南隅橋五十一西舘橋舊吳宫西蓋夫差之離宫有舘娃坊織里橋本吳王織里故名圗經續記云俗訛失履今又譌為吉利福民橋府治前宣徳間知府况鍾建石巖橋在今府治西唐刺史白居易建名白頭橋有石刻三字宋天聖初郡守孫冕修之人呼為孫老橋元總管道通重建改名石巖其自號也梅摰詩白頭橋奈白頭何舊徳如存故老歌不特輿梁起遺愛大都才美服人多明澤橋西河上皇祐五年建景定五年重修劉震孫題名立石其上今名過軍橋以路通盤閭為士卒經由之地也昇平橋吳縣學西皇祐五年建趙公橋趙婆橋渡子橋成家橋剪金橋同在昇平橋東側青雲橋呉縣學前舊在文廟前名青龍𢎞治中知縣鄺璠移置於此改今名積善橋成家橋内一名小粉橋太平橋有太平坊皇祐五年建西竺寺橋大石巷即馬禪寺橋憇橋吳地記云吳軍憇歇於此因名之薦行橋市曹橋周康王廟前娥眉橋芮橋郭家橋草鞋橋獻花橋望婆橋彈子橋白磰橋院子橋倉後橋木柴橋樓西橋程姬橋大石巷果子行橋杉板橋金獅子巷内吕公橋銀錠橋二橋在杉板橋南查家橋鶴山書院西杉瀆橋侍其巷口採蓮涇橋跨採蓮涇上地名採蓮里葛家橋至正三年建俱在杉瀆橋東來逺橋胥門内舊姑蘇驛居此宋紹興間王㬇奏建専待國信使取魯論語名之又名驛橋胡家橋俗名線香橋新橋和豐倉南梅橋一稱梅家橋在新橋南梅聖俞寓此張師橋開元寺橋二一在寺東一在寺後延祐三年建南寺後橋廟橋伍大夫廟西近盤門又名盤門橋南張師橋北張師橋程橋近盤門西北隅橋八十皋橋閭門内漢議郎皋伯通居其側梁鴻所寓也唐李紳詩伯鸞憔悴甘飄寓非向囂塵隠姓名鴻鵠羽毛終有志素絲琴瑟自諧聲故橋秋月無家照舊井寒泉見底清猶有餘風未磨滅至今鄉里重和鳴皮日休皋橋依舊緑楊中閭里猶生隠士風惟我到來居上舘不知何道勝梁鴻陸龜䝉横絶春流架斷虹慿䦨猶想五噫風今來未必非梁孟却是無人繼伯通楊備隠士貧居日賃舂物情歌在五噫中釵荆舉案何人識猶頼橋邊有伯通高啓閭門啼早鴉拂面見飛花緑水通螭舫紅橋過犢車誰尋伯通宅只問奉娘家至徳廟橋有至徳坊張廣橋皋橋下栁毅橋張廣橋西毅或嘗居此鄭使橋宋鄭戩天聖中拜奉國軍節度使卒官歸柩于吳所居有橋名以識之西蔣家橋徐胡橋已上三橋俱在吳趨坊内通安橋鄭使橋巷内恵政橋西城裏夏駕湖北燬于徳祐之亂黄牛坊橋莫詳其始皇祐五年重建景徳寺前橋梵門橋黄牛坊橋西壽聖橋小蓮湖橋華家橋黄牛坊橋東虎蹲橋湯家浜一名通濟楊家橋徐家橋錢駙馬橋五代楊行宻女歸錢元璙故名鳳皇橋以鳳皇鄉為名華嚴寺橋仰家橋朱明寺橋舊名般若橋同在中街路沈坯粉橋清嘉坊南三太尉橋五代時廣陵王第三子治園第於此故名陸侍郎橋郡人陸慶陳天嘉中召為散騎侍郎不就嘗居此慈悲橋吳縣東巷口女冠子院橋四天燈巷口治平橋吳縣前龍興寺西橋圓覺寺橋西成橋吳縣西𢎞治八年知縣鄺璠建穀市橋鉄瓶巷内烏盆橋鄔家橋許藴子巷口廣濟橋雍熈寺西橋側西市門橋小市橋吳縣東橋流化坊内舊吳縣治于此呉縣西橋宣和元年建高家橋西橋下丁家橋西橋東嘉定六年建絲行橋曹使橋鵝闌橋鴨舍橋孩兒橋廣書橋利市橋濟川橋嘉魚坊巷内雍熙寺東橋周武状元坊口雍熙寺西橋小平橋醫學前洞橋靸鞋橋小平橋東蒲老橋六通橋普濟橋文正書院西芝草營橋文正書院東方廣橋馬大録巷口艇船橋方廣橋側盧提刑橋郡人盧革嘗任廣南提刑子秉發運使奉親居吳郡表徳慶坊故又有徳慶橋徳慶橋崇利橋與二橋連俗稱三條橋安民橋石馬匯北過軍橋紅橋福濟觀東宫橋崇真宫前青石扶欄雕刻工巧細如絲髪為吳中橋欄之最者都亭橋承大寺西吳王壽夢嘗於此作都亭以招賢士承天寺前橋承天寺東橋相傳吳王屈駕於此名屈駕橋今名闕家橋西石塘橋石灰橋單家橋桃花橋文家橋隆興橋寶成橋錢橋探橋北童子門城外橋二百七十二虹橋閻門外初木為之元時郡人鄧文貴易以石後復以木俗名釣橋成化六年改名永濟虞集記呉郡内外皆鑿溝澮納太湖之水以行舟逾絶為梁經緯聨屬其髙庳修縮視水大小獨虹橋在郡閶門西跨官河通驛道為咽喉要處水至橋下匯為回淵折而東行勢用剽悍橋舊植以木而加甃歳久腐撓乃今夏大霖雨遂壞水陸並阻民吏憂縣長吏計會役大不即成郡人鄧文貴詣官自言架木非久計請出家財以成之遂以八月乙丑召工畫圖盡撤其舊而新之絶水下石欵宻鍵固纍起拱合理緻無間下通圜空涵水象月引重過之堅逾實地泰定元年十月成凡用中統鈔十五萬貫云夫鄭商犒牛敵謀遄沮卜式輸財漠用不匱以一民而専有司之美不可無書也故為備載不辭黄溍記泰定元年冬十有二月平江閶門外新作虹橋成古者辰角見而除道天根見而成梁有司之事耳春秋常事不書此何以書在有司常事也而此非有司之常事者也按郡志橋之載於圖籍者三百五十九而為虹橋者三其二在城西若干步即此橋也去年夏大雨水暴溢橋居兩水之交莫能與水抗一夕盡圯其地適控通衢徵令賜予布政於方國奉貢輸賦為行者病謀所以復其故而官帑不可輙發又重以其役厲民未知費所出郡内民人鄧文貴請分家貲之半更為石橋以利永久既又以為此有司者之事非細人所得干也乃飭財用庀工徒以聽要束焉遂以八月乙丑始事閱八甲子而告訖功橋之修四百尺而其髙十分修之一五分而殺其二乃與岸等脊之廣得髙之半而趾之廣加其什五上設扶闌為之周法其下為門如半月以釃漕河而隄其兩垂以度輓者所用錢以緡計者十二萬五千有竒役以庸計者二萬四千有竒今總官郭公既率僚屬觴酒橋上以落其成且謂文貴編户民非有名田稍食貨殖竒嬴荅它大姓比川梁達路官實領之而文貴顧能輟其衣食之餘以紓有司之急務不宜無以示勸相乃伐石俾溍執筆書其凡而記焉夫以一夫尸利物之功而長民者能表樹之以寓其風勵之意是皆有司常事之所不及而於法宜書者溍不得辭也渡僧橋釣橋西北跨運河咸淳十年重建魚行橋今名板橋普安橋會通橋正統間參政陸友諒新建故今稱陸公橋通濟橋一名西新橋聞徳橋洞涇橋白蓮橋馬鋪橋鳳皇橋東虹橋西虹橋草菴橋鴈蕩村有中峯草菴故名陳菴橋安人橋草菴東康履橋南濠新開河舊名普濟𢎞治八年知縣鄺璠重修易今名夏駕橋南濠夏駕湖口俗名石灰橋永寧橋普安橋内永禄橋永寧橋南永福橋永祿橋南三橋皆成化十年建山塘橋勝安橋范店橋同在山塘上白塘橋唐刺史白居易築故名彩雲橋半塘寺前政和元年重建洞橋便山橋虎丘山前斟酌橋面山橋新塘橋寶安橋泰定橋普福橋金雀橋錢賣女橋崇善橋篠蕩橋北莊涇橋長勝涇橋通吳橋舊名通波跨烏角溪本木橋至和二年始易以石嘉泰二年郡人陶光大重建楓橋閶門西七里豹隱記談云舊作封橋後因張繼詩相承作楓今天平寺藏經多唐人書背有封橋常住字張繼詩月落烏啼霜滿天江村漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客舡張祐長洲苑外草蕭蕭卻筭遊程歳月遥唯有别時今不忘暮烟疎雨過楓橋湯仲友出城才七里地僻罕曾過孤塔臨官道三門背運河鐘鳴驚鳥宿墻矮入漁歌醉裏看題壁如今張繼多高啓畫橋三百映江城詩裏楓橋獨有名幾度經過憶張繼烏啼月落又鐘聲江村橋楓橋西南射瀆橋通陽山諸涇長塍涇橋西郭橋通判郭所建杜莊涇橋去射瀆一里南佘橋北佘橋楊莊涇橋錦㠶涇橋夏墩涇橋趙王塘橋竹青塘橋蠡湖橋有石刻普思橋在滸墅呉寛記滸墅在蘇州西一北境上其民際水而居農賈雜處為吳中大鎮自景泰間朝廷置𣙜司于此舟楫停集居民益繁貿易往來有限於官河皆稱不便成化初雖嘗作橋以免濟渡而南北遼絶人跡折旋猶以為不便也里父老相傳故有橋在周孝侯廟傍訪求之果得石刻題曰普思橋視其時宋慶元三年也乃圗重造而不敢専以戸部主事藁城劉君煥方奉命分司于此敏而有為始合言以請君曰是民功也吾何敢沮且従而奨勵之他日工部主事貴溪姚君文灝行水至聞其事又從而勸相之民既樂為則又言于知府史侯侯曰宜又言于廵撫都御史朱公公亦曰宜於是更相合言出財以助凡得白金若干兩擇𢎞治九年某月興工是年某月功畢劉君喜其事之果成也曰是橋財費甚鉅勞力甚多然而利益甚大不可使後人無所攷也介鄉貢進士浦君應祥來請文以記夫事之成未有不由於人和者周之作􅏖曰四方民大和會橋梁之役雖非是之比然民不欲為則上之人雖驅而使之不能成也至於民既欲為上之人或咈之而不從則其事亦豈能成哉惟夫民欲為之人能從之故雖財用鉅而費力多不待踰歳而穹然堅厚不易為之役遂以告完雖然人則和矣亦惟得其時耳蓋吳自古為澤國數被水患今歳則大熟粒米狼戾民既有秋成之利視義所在慨然施予亦不之吝此事之所以易成也歟橋之修一十二丈其廣二丈三尺崇如廣而減二尺董其役者曰倪俊凡出財者其姓名則悉書刻于碑隂云性通橋何家橋談道橋支家橋瓜山橋許家橋葉巷橋張巷橋象山橋吳巷橋已上彭華郷上顧涇橋下朱涇橋華表山涇橋花涇橋永勝涇橋南金涇橋北金涇橋張公涇橋太平得勝橋南大瀆橋薛市涇橋䨇牌涇橋市木涇橋安徳橋徳雲橋望僊橋陽山前丁令威昇仙處黄路橋一云黄蘆陸墅橋通安橋陽山北竹青塘永樂橋通安橋西黄橋范蠡橋世傳蠡自此出婁江尚書橋射瀆巷福善橋懐胥橋在胥門外舊名胥塘橋宋改今名俗稱胥門橋居涇橋胥門橋内謝涇橋官墳橋大灣舊名䨇橋三遷橋天平山前圓通橋望僊橋下沙塘口横塘橋上有亭孟東野詩云未隨洞庭酌且醉横塘席綵雲橋近横塘跨綵雲港感福橋五塢山前俗呼東跨塘興福橋俗稱東跨塘宋淳祐六年重建嘉泰橋俗呼徐馬黄橋嘉泰中重建易今名斜橋慶厯橋慶厯三年建嘉泰三年修寧慶橋白塔橋吳灣橋已上在木瀆鎮延福橋乾道四年修張墅橋塘灣橋元至正間建已上光福塘僊塘橋靈巖寺橋善人橋馬巷橋大觀橋官山橋福隆橋永樂間建安福橋福溪橋通安橋虎山橋在光福西接太湖宋嘉泰中重建元泰定甲子改為圓洞三遂以紀年名泰定橋成化乙未重修郡人陳頎記吳寛詩南人相見詫杭州自料西湖讓一籌天為漁家開下崦晩宜畫舫駐中流新詩已判縱横寫佳景從交次第遊孺子歌聲何處起落霞孤鶩水悠悠上龍塘橋通安橋西下龍塘橋貢湖口萬安橋吕浦橋吕山湖口周山橋周山街上西塘橋西華東塘上香山橋香山街上胥口橋胥口李橋胥口慧慶橋慶祥橋駟馬橋齊興橋已上同在横金搦船橋永興橋錢莊橋已上同在錢莊頭陀橋後保橋慈灣橋横塘橋已上在西洞庭廣利橋師家橋聫璧橋渡水橋一名具區風月橋舊以横木元周富七郎始易以石成化九年吳天禬重建以上諸洞庭如京橋即盤門虹橋宋開禧二年重建改今名周虎臣書三大字刻其下朝請郎葉挺記皇帝踐祚二十一年將有事於規恢飭諸郡守臣治橋梁除道路以便王師征行吳郡古都會由全蜀荆襄湖廣江淮而下危橋巨舸徃來相衘盤門運河環城尤號要津有橋如虹惟波淘盪車馬蹙躡歳久隤圯且路多瀕湖坎窗驊騮過者病焉參相張公文昌李公俱以碩徳崇望來殿是邦軍期調度亦既具舉謂橋道弗治曷稱上㫖以吳縣尉羅相刻意事功乃命經理之尉承命弗避弗疑亟募道者徐妙行帥徒鳩工首甃驛衢達於松江幾五十里其旁舊橋有三斷踵營治悉用堅整至是橋也益加其工光閳故基易陶以石夾㟁雲繞巍闌翼飛洞門天成面勢山屹在官無費在民無擾厥功告成聞者驚嘆因相與言曰凡四方貢賦之所輸百工技藝商賈之所輳縉紳豪傑文人雋士之所萃九夷八蠻朝聘會同之所歸莫過於京師厥今駐蹕錢塘異時還都中原兹橋適居孔道實逺近所必經従者盍以如京名之衆曰韙哉合橋與路積工五萬為費三十五萬有竒經始於嘉泰四年正月成於開禧丙寅四月既望民既落之因并識其事吳門橋有石刻三大字其上舊名新橋下有三洞最長又稱三條橋宋章岵為守郡民石氏者請建紹定間修正統間郡守况鍾重建短橋張公橋雲津橋吳門橋北俗呼急水橋洪武中建落星涇橋王家橋藏圓橋隁橋新郭橋普興橋俱在新郭何橋越城橋舊名越來溪橋至正間重建行春橋在横山東茶磨嶼下跨石湖上與越城橋近有石石洞一十八范成大記太湖曰應咸池為東南水入湖其派也吳臺越壘對立兩涘危峯髙浪襟帯平楚吾州勝地莫加焉石梁卧波空水映發所謂行春橋者又據其會胥門以西横山以東徃來憧憧如行圖畫間凡遊吳中而不至石湖不登行春則與未始遊無異歳久橋壊人且病涉曏之萬景亦偃蹇若無所彈壓過者為之嘆息豪有力之家相顧環視莫恤漫以諉之官前令陳益劉棠皆有意而弗果作淳熙丁未冬諸王孫趙侯至縣甫六旬問民所疾苦則曰政孰先於輿梁徒杠者乃下今治橋補覆石之缺易藉木之腐増為扶欄中四周而旁兩翼之歳十二月鳩工訖於明年之四月保伍不知工徒不預邑人來觀歡然落成而已今天下仕者視劇縣如鼎沸屏氣怵惕猶懼不既侯於此時從容興廢蓋亦甚難四鄉之人不能出力傾助者至是始有愧心則相與商畧他日將作亭其上以憇倦游者尚庶幾見之今姑識治橋之歳月亭成將嗣書云侯名彦真字徳全舊名彦能隆興元年進士擢第後改今名橋成之明年日南至資政殿學士通議大夫提舉臨安府洞宵宫范成大記顔橋范成大詩村村籬落總新収處處田疇盡有秋一段農家好風景稻堆髙出屋山頭饒稼橋南周村跨越來溪𢎞治辛酉里人盧綱募建安里橋在葑門大常司丞姜漸記蘇州府城之東南曰葑門其水陸之要衝有橋曰安里自宋厯元歳久滋廢里人周君𤣥初時修眞於城東之丹霞舘憫其人民之艱于行也謀于里父兄撤而新之經始於甲午秋八月畢工於冬之十一月欲求余文以為記而遭世變故不果閱六年庚子復請記之嘗為之言曰文之有記所以志其制作之勤蓋古人經久之意也近世承平日久碑銘墓碣無處無之可謂盛矣自兵革屡興皆靡有孑遺雖古今士大夫之文傳不傳不可知未嘗不竊嘆碑之不幸也向使元初得子文而刻之則其存可復冀乎矧欲以余不足傳之言刻之於既毁之後其不為達人之所慨者希矣辭不獲則書其言俾刻之而𤣥初亦以多故未遑也大明建國之元年師臨於吳凡附城之輿梁悉為内兵所毁獨是橋頼今大丞相信國公駐師其前不敢廢壊及克城之日師由是而進橋有力焉𤣥初竊自慶其功之不冺也復來請曰吾始為是役将以濟夫病涉者而已又豈知造物者俾吾新之留以濟夫王師也不然何故毁而新者獨全乎是宜重之記以夸於無窮也噫余之言其果可傳者歟然自甲午至於今蓋十有六年一求子文而不果一為記之而不暇刻凡再罹于兵橋幸不毁修濟王師以成大功則余之言果有待而傳者矣是不可以不記故不辭而具載之使來者有所考焉斜橋安里橋傍今圮徐公橋跨東西河徐雅建宋慶元四年重建至正十一年承直郎平江路長洲縣尹兼勸農事知渠堰事劉某重修蔣家橋通章墓涇朝天橋舊以木為之名南馬路橋在朝天湖口故名宣徳中郡守况鍾新建楊枝塘橋通瓦碿涇北馬路橋對馬路口跨葑門塘華家橋普利橋俗稱井亭橋葑溪橋自溪塘六里至金涇淹口梅里涇橋一名通濟金涇橋一名盧家橋二橋𢎞治十年里人盧珪建呉寛記章墓涇橋相傳章邭公墓相近匠門塘橋一云干将門因干将墓在焉大通橋永安橋通徳橋已上王墓村餘慶橋章練塘滅渡橋赤門灣南舊以舟患渡舟師専利行旅之大徳間有僧自崑山來為渡所沮發願募剏因名滅渡復成橋滅渡橋下一名小橋通僊橋袁家浜口白蓮鋪橋朱涇橋吳涇橋寳帯橋去郡城十五里跨澹臺湖南北長三十餘丈今呼為小長橋相傳為唐王仲舒建捐帯助費故名宋紹定五年郡守鄒應博重治之正統間巡撫侍郎周忱人為修治學士陳循記蘇州府城之南半舍古運河之西有橋曰寳帶運河自漢武帝時開以通閩越貢賦首尾亘震澤東壖百餘里風濤衝激不利舟楫唐刺史王仲舒始作塘障之河之西岸今東南之要道是已然湖之支流斷堤而入吳淞江以達于海堤不可遏此橋所為建也仲舒鬻所東寶帯以助工費故因以名元宋修葺之功不繼橋遂坍沒自是有司駕木以濟行者至今蓋百有餘歳正統七年巡撫京畿工部左侍郎廬陵周公恂如戒有司漸次節省在官浮費以備工材之用又四年為十一年秋為橋長千二百二十五尺洞其下可度舟楫者凡五十有三而髙其中之三以通鉅艦用材為石二萬二千六百丈木四萬二千五百株灰二十四萬三千六百斤銕萬四百斤米二千六百石冬十一月落成斯橋之建舟楫得徃來之安行旅無徒涉之患商賈免盗賊之虞郡邑省屢葺之苦其於恵也孰大焉官渡橋呼