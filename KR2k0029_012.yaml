front:
  text: 欽定四庫全書姑蘇志卷十三眀王鏊撰
  hash: sha256:7c28ea950b031cadbb6ed00281e6793fc214bc234d7e22e41b469e100a92db55
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0029_WYG_012-1a, image: WYG0493/WYG0493-0219a.png}
body:
  text: 風俗大江以南風俗大抵略洞而亦與時為髙下不能齊也若夫嵗事農漁市井歌舞方言皆其俗之可驗者因具列焉吳之先雜于蠻夷泰伯仲雍居之斷髮文身以同其俗陋可知矣其後申公巫臣教之騎射子胥孫武又能以武强其國黃池之會與晉爭先而干將要離又以鑄劍擊刺擅于國中故有吳王好劍術國人多瘢瘡之語一時所尚可見至楚漢時其子弟尚能隨項氏北破秦兵雖曰土綿力薄其風亦壯矣然春秋時季札聘上國觀周樂逆知列國之强弱存亡于數百年之後言遊北學以文學列于孔門吳民之秀而文蓋已肇于此漢世稱大江之南五湖之間其人輕心由今觀之吳下號為繁盛四郊無曠土其俗多奢少儉有海陸之饒商賈並湊精飲饌鮮衣服麗棟宇婚喪嫁娶下至燕集務以華縟相髙女工織作雕鏤塗漆必殫精巧信鬼神好淫祀此其所謂輕心者乎然自孫氏有江東顧陸名宗多出吳下典午南渡衣冠來歸當時已有君子尚禮黎庶敦龎土風清嘉之稱蓋自朱買臣陸機顧野王之徒顯而人尚文支遁道生慧嚮之儔起而人尚佛至趙宋時俗益丕變有胡安定范文正之遺風焉及宋南渡中原文獻半隨而南國朝又升為京輔郡百餘年間禮義漸摩而前輩名德又多以身率先如吳文恪之亷直楊睎顔之醇厚葉文莊之清嚴吳文定之淵靖又皆以文章前後振動一時今後生晚學文詞動師古昔而不梏于専經之陋矜名節重清議下至布衣韋帶之士皆能摛章染翰而閭閻畎畝之民山歌野唱亦成音節其俗可謂美矣唯夫奢侈之習未能盡革亦惟在位長民者有以化導之耳郡城之俗大校尚文而其西過華其東近質郊郭下縣則依山者多儉或失之固依水者多智或失之訐濵海者多濶疏或失之悍善者君子之教也失者細人之習也孔子謂寬柔以教不報無道南方之强也斯言盡之終古不易今吳民大率柔葸或遇上慢下暴往往容隱弗之校焉吳俗善漁以其生長江湖盡得水族之性矢魚之具尤多陸龜蒙皮日休嘗為魚具詩序其事大凡結繩持網者總謂之網罟之流曰罛曰罾曰罺圓而縱捨曰罩挾而升降曰􅞍緡而竿者揔謂之筌筌之流曰筒曰車橫川曰梁承虛曰笱編而沈之曰箄矛而卓之曰矠矛也棘而中之曰義鏃而綸之曰射扣而騃之曰桹以薄板置瓦器上擊之以驅魚置而守之曰神鯉魚三百六十嵗蛟龍輒率而飛去年置一神守之則不能去矣神龜也列竹于海澨曰滬吳之滬瀆是也錯薪于水中曰􅟐所載之舟曰舴艋所貯之器曰笭箵其他或術以招之或藥而盡之皆出于詩書雜傳及今之聞見可考而驗不誣又擇其任詠者作十五題其所謂十五題者曰網曰罩曰􅞍曰釣筒曰釣車曰魚梁曰義魚曰射魚曰鳴桹曰滬曰􅟐曰種魚曰藥魚曰舴艋曰笭箵太湖漁人以三等網行湖中最下為鐵腳魚之善沈者遇之中為大絲網上為浮網以截魚無遺秋風大發以舟載釣繫餌沈之巨浪中取白魚謂之釣白天寒以火自炙投石穴取魴魚方春魚逰食則藥之令盡浮其在溪浦者為箄港瀆為罾蘆葦之間者為義列于海澨曰滬數舟連絡發其匿而得之者為艋艘艋艘則衆扣竹器以出之薪而招之者為蕪皆窮極巧妙以與魚遇其舟則或方行或反行或前後相尾其相尾者為舴艋已捕而貯之有笱有筒有笭之屬漁人以魚入市必擊鼓賣之其賣者舊以魚斗數魚以二斤半為一斗皮日休詩趂眠無事避風濤一斗霜鱗換濁醪莫怪兒童一得盡行煙不雨漉車鰲今不復擊鼓用斗男女老於舟中足盤辟不伸市中自辨市井多機巧繁華而趨時應求隨人意指縟采銀黃相射于市而亦多輕脆始與交易必先出其最廉者久扣之然後得其真最下者視最上者價相什百而外飾殊不可辨如泥頭貨郎頭之類其行賣于市者或扣金或擊竹裝檐皆分色目見其裝則知其所藏農既専力其用心自精占測氣候詳密多驗由元旦至於嵗暮凡風雲暘雨之變潦暵豐歉之兆趨避弛張之宜咸有口訣韻語彚類極繁謂之吳中田家五行大略亦有可紀元旦侵晨占風雲風自東南來則嵗大稔東風次之東北又次之西則歉西北有紅黃雲則稔白黑則歉以瓶汲水日凖其重輕為水旱自元日至十二日而當一嵗之月重則其月多水輕則旱建一尺五寸之表以候雨暘負暄野録載吳農以正月十五夜月明時建木表于地據表之長而中分之為七寸半者二月影適及為豐不及則旱過則水二月八日祭祠山之神候西南風而知有秋四月十六日望晴雨以候嵗是日晴則水大雨則旱惟隂雲為佳芒種後得壬日為梅始梅日則多雨故亦謂之梅天夏至日起時時分三節共十五日中時有雷則雨仍多謂之倒黃梅凡梅時皆滋田之日也春夏甲申日雨知米貴四月二十日為小分龍五月二十日為大分龍皆忌雨霓立秋日忌雷鳴秋後虹見為天收言收數减也八月二十四日為稻稿此日雨則雖得榖藁亦腐重九晴則藁乾小雪日雪則穀賤又三月三日聽蛙聲午前鳴者髙田熟午後鳴低田熟唐人詩田家無五行水旱卜蛙聲又有蝦荒蟹亂之語餘不勝載勤稼穡故女亦從事蒔刈桔橰不止餉饁而已工纂組故男藉専業家傳户倩不止自給而已虎邱人善于盆中植竒花異卉盤松古梅置之几案間清雅可愛謂之盆景春日賣百花更晨代變五色鮮穠照映市中其和本賣者舉其器折枝者女子于簾下投錢折之三四月賣時新率五日而更一品如王瓜茄諸色豆諸海鮮枇杷楊梅皆迭出後時者價下二三倍五月五日賣花勝三伏賣冰七夕賣巧果皆按節而出喧于城中每漏下十餘刻猶有市杜茍鶴詩夜市賣菱藕大抵吳人好費樂便多無宿儲悉資于市也吳音清柔歌則窈窕洞徹沈沈綿綿切于感慕故樂府有吳趨行吳音子又曰吳歈皆以音擅于天下他郡雖習之不及也陸機吳趨行亦因古曲之餘以道吳地之淑美陸機吳趨行楚妃且勿嘆齊娥且莫謳四坐並清聽聽我歌吳趨吳趨自有始請從閶門起閶門何峩峩飛閣跨通波重欒承遊極回軒啓曲阿藹藹慶雲被泠泠鮮風過山澤多藏育土風清且嘉泰伯導仁風仲雍揚其波穆穆延陵子灼灼光諸華王迹頽陽九帝功興四遐大皇自富春矯手頓世羅邦彥應興運粲若春林葩屬城咸有士吳邑最為多八族未足侈四姓實名家文德熙淳懿武功侔山河禮讓何濟濟流化自滂沱淑美難窮紀商𣙜為此歌吳音至後代漸缺唐初歌者多失其清婉議者求吳人習之還得其本音貞觀中有趙師者稱吳音清逺若長江廣流綿綿徐逰有國士之風亦有白紵舞拂舞白符舞白鳬鳩舞紵本吳中物用以制衣故有巾袍之言俳歌所謂皎皎白紵是也陸龜䝉白紵詞吳宫夜長宫漏短簾幕四垂燈熖暖西施自舞王自管雲紵翻翻鶴翎散促節牽繁舞腰懶舞腰懶王罷飲蓋覆西施鳳花錦身作匡牀臂為枕朝佩樅樅王宴寢醒來閣門報無事子胥死後言為諱近王之臣諭王意共笑越王窮惴惴夜夜抱冰寒不睡又有子夜歌子夜四時歌晉人賦之最衆以女子名子夜故作此詞調與白紵同其拂舞白符舞皆有歌蓋為時政所激多怨詞如鳬鳩亦江鄉水國之物吳人每見之形於詞其餘若江南曲黃竹子歌江南㺯採蓮曲採菱曲皆樂府所定按諸曲之音可以驗風氣之清嘉矣大凡五音惟商最清故子夜江南皆入商調餘可類推有方言有方音大氐語必有義最為近古如相謂曰儂湘山野録記錢王歌云你輩見儂的歡喜在我儂心子裏平江記事云吳有渠儂等稱故嘉定號三儂之地謂隔户問人曰誰儂應曰我儂視之乃識曰却是你儂謂中州人曰傖周玘曰害我者諸傖子也陸玩曰幾作傖鬼顧辟疆曰不足齒之傖宋孝武目王𤣥謨為老傖謂不慧曰呆范成大詩千貫賣汝癡萬貫賣汝呆又賣癡呆詞除久更闌人不睡厭禳滯鈍迎新嵗小兒呼呌走長街街有癡呆召人買二物于人誰獨無就中吳儂仍有餘巷南巷北賣不得相逢大笑相揶揄鑠翁塊坐重簾下獨要買添今問價兒云翁買不須錢奉賖癡呆千百年又白獺髓記石湖戲答同參詩云我是蘇州監本呆問為何如曰寧馨見晉書世說等不備載謂虹曰鱟謂罷必綴一休字史記吳王語孫武曰將軍罷休又如曰事際謂舉事之際南史王晏専權帝雖以事際須晏而心惡之蔑面謂素昧平生者蓋即左傳鬷眀所言蔑心蔑面之遺佽飛謂惡少趫捷者蓋即漢佽飛佽音如厠受記欲責人而姑警諭以伺其悛之詞夷堅志亦記薄相謂嬉劣無益兒童作戲薄音如㪍凡哉凡謂已然將然皆曰哉猶北人之曰了又如吳江之曰蹇每語絶必綴蹇字按楚辭以蹇為發語聲吳楚接壤恐即此常熟之曰且音若嗟即詩中句尾助音曰遐箇猶言何人按詩遐不作人注遐何也此方言也灰韻入支來音如釐之類陸德眀至用以釋經支韻入齊兒若倪古曰耄倪亦然庚韻入陽羮音若岡之類宥韻入置又音若異之類虞韻入麻又入東呼小兒為孥兒孥子孫也常熟以吳塔為紅塔此方音也姑蘇志卷十三
