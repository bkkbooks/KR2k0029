body:
  text: 姑蘇志卷十七明王鏊撰坊巷表厥宅里自周有之所以賢其人也後世乃以表科第近又以表其官此有司崇重激勵之意其亦甚矣吳中古坊甚多其巷名亦多沿於古今並列焉然其義則或有不可考者矣東南隅坊十九孝義坊東憩橋巷通闤坊金母橋西繡錦坊飲馬橋北儒教坊飲馬橋南旌義坊蔡滙頭孝友坊南園巷東玉淵坊南星橋吳㑹坊舊府治東因吳㑹亭名積善坊舊府治西阜通坊夏侯橋西儒學坊烏鵲橋南宋樞密林希與諸弟所居因父概先在國史儒學傳故名衮繡坊烏鵲橋北宋太子少保元絳歸老知州章岵立晉寧坊濠股口紹聖中知州賈青造樂籍堂於此和令坊槐樹巷唐末舊有名紹興初楊存中居此追封和王亦先兆也孔聖坊南倉橋南舊有夫子廟居北景祐中方割南園地立學嘉泰初因建坊以表之繡衣坊南倉橋北狀元坊醋庫巷口淳熙間郡守韓彥質為黃由立已上紹定二年重建又一坊南星橋西咸淳中郡守陳均為阮登炳立留夢炎書覺報坊以覺報寺名表於巷曲章巽亨題咸淳中郡守黃萬石重修林祖恭改書東北隅坊二十干將坊東市門因干將墓對峙而名建義坊干將坊內真慶坊宮巷口遷善坊草橋東布德坊顧家橋東富仁坊魚行橋東聞德坊周太保橋東崇義坊禪興寺橋東閭丘坊張馬步橋北閭丘孝終所居乘鯉坊張馬步橋東碧鳳坊𤣥妙觀前大雲坊𤣥妙觀西林虙所居虙號大雲翁豸冠坊仁王寺前侍御史范師道所居范之前已有豸冠市蓋效古也慶源坊大郎橋東丞相丁謂所居初名晉公坊後易今名天宫坊初春巷口天宫寺西南蓋以寺名迎春坊百口橋西嵗以立春前一日自婁東門迎春至郡故名已上紹定二年重建表忠坊祥符寺西橋北嘉熙中郡守吳潜表里人焚香祝聖人壽者鶴市坊故市巷口東有鶴舞橋淳祐初寓公鄭定大卿立仁美坊南顯子巷右史上官涣酉所居大慈坊大慈寺為名寶祐中郡守趙與􅊸立西南隅坊十七武狀元坊紙郎巷淳熙十一年郡守謝師稷表林㟳所居吳歈坊西憩橋巷平權坊跨街樓南館娃坊西館橋東側和豐坊西館橋西側好禮坊富郎中巷嘉泰初表富嚴所居舊名德壽麗澤坊織里橋北通波坊織里橋南孫君坊船場巷知州孫冕修唐白頭橋建坊因名賓興坊貢院南即今明澤橋北義和坊杉瀆橋東靈芝坊杉瀆橋西侍其巷內皇祐五年為侍郎蔣堂立初名難老兵部員外郎李晉卿守屏之明年因所居産靈芝故名堂有詩謝兵部黃菌誕丘園靈配賁醴泉至和非我召美化自公宣秀色鄰三徑幽光被一㕓時髦秉筆郡為我列詳編使君有意飾門閭雅為靈芝揭表初招隱溪邊往還者從兹認得野人居同仁坊金獅子巷晝錦坊南營西元豐中晏知止守郡為程師孟立適其第落成坊未名朱長文有詩勝地寬閒舊十鄰耆年得意闢髙門吳中晝錦如君少好作坊名賁故園晏得之遂以名坊載耜坊開元寺巷坤維坊瑞光寺南宫坊南園巷年已上紹定二重建西北隅坊十六西市坊鐵瓶巷口即梅福所隱西寺門嘉魚坊魚行橋西周武狀元坊雍熙寺東慶元二年為周虎立其居相傳吳周瑜故宅也文正坊普濟橋東文正書院前成化間郡守邱霽配立義澤坊徐有貞書流化坊吳縣東盍簪坊張馬步橋德慶坊禪興寺橋西宋直龍圖閣盧秉奉其親年八十餘郡為表之立義坊卧佛寺西甘節坊承天寺東至德坊臯橋西泰伯廟前吳趨坊臯橋西南陸機詩所謂吳趨自有始請從閶門起是也仁風坊十九勝巷泰伯導仁風亦陸機詩語清嘉坊朱明寺西陸機詩上風清且嘉太平坊太平橋西亦以橋名樂圃坊清嘉坊南朱長文所居名樂圃知州章岵建坊表之其詳見園第純孝坊湯家濱東里人剖心療母病今亡其名已上紹定二年重建純孝坊嘉熙中郡守吳潜建附紀古坊三十二白賁坊金鳳坊一作金風鳴蜩坊闔閭坊常樂坊白華坊洊雷坊噬嗑坊曵練坊或傳孔子登泰山東望吳閶門歎曰吳門有白馬如練因是立名長干坊處暑坊萇楚坊即次坊南祀坊望舒坊通波坊承浮坊已上十七坊屬吳縣必大坊循陔坊仲呂坊布農坊釋菜坊開氷坊南政坊八貂坊青陽坊一作青春太𤣥坊玉鉉坊夷則坊黃鸝坊樂天詩黃鸝巷口鶯欲語烏鵲橋頭氷未消是也三讓坊陋蜀坊已上十五坊屬長洲縣國朝以來坊八十二濂溪坊在資壽寺巷濂溪祠傍天順五年立三公坊為尚書俞士悅立榮祿坊為太保陳鎰立翰英坊為詹事劉鉉立及第詞林二坊為祭酒陳鑑立世恩坊為永和及子汝霖立世科坊為顧巽顧顧餘慶三世進士立解元坊五為謝瑶劉昌賀恩王鏊唐寅立㑹元坊二為吳寬王鏊立狀元坊三為施槃吳寬朱希周立進士坊三十為張祝韓雍趙禎黃鑑吳璘陳僎張翥孔鏞馮定劉瀚馬愈周觀文林張習董彛徐源劉纓沈元薛英沈林孫霖顧源文森沈杰沈燾曹皓陸完黃暐張約許銘立繡衣坊九為顧儼戈立張俌林符朱文劉纓杜啓王俸史鑑立都憲坊五為陳鎰韓雍劉纓陳璚徐源立學士清峻二坊為吳寬立武選坊伯二坊為徐源立㑹魁坊為孔友諒立擢秀坊為行人吳得立瑞秀坊為李綬立老桂坊為進士奚昌立太史坊二為吳一鵬陳霽立司諫坊為毛珵立獻納坊為楊升立承獻坊為劉海立登第坊五為舉人浦應祥郭忱朱木茹昻劉桐立清卿坊為馬紹榮立儒榮坊為顧璚立進賢坊為謝㑹立紹美坊為尤淳立文明坊為雷翀立恩光坊為侍御陳公賢立東南隅巷五十八花巷東憩橋巷北新街巷南新街巷俱卧龍街雙井巷有古井二張古老巷周司徒巷金母橋北鼓角營巷孝義坊內鹽倉巷夏侯橋西柴巷夏侯橋東閻橋巷濠股巷晉寧坊巷俱草橋西南槐樹巷正覺寺前樂營堂巷草八錢巷十郎巷逍遙巷俱甫橋南儒達巷司馬巷道堂巷俱馬宗橋南胡書記巷有橋故名張泥金濱巷白蜆橋巷盡