body:
  text: 姑蘇志卷五十三明王鏊撰人物十一忠義卞崇婁縣人漢桓帝時太守薛固為法吏所枉下廷尉崇與烏程錢讓詣闕稱寃廷尉囚崇等以兵圍守苦毒持之崇讓恬然自若枉聲彌厲天子聞而竒之乃赦固罪張禕敞之子也少有操行晉恭帝為琅邪王以禕為郎中令及帝踐阼劉裕以禕帝之故吏素所親信封藥酒一罌付禕密令鴆帝禕既受命歎曰鴆君以求生何面目視息世間哉不如死之於道自飲而死張嵊字四山父稷初為剡令至嵊亭生之因名少敦孝行年三十餘猶斑衣受稷杖動至數百收淚歡然方雅有志操能清言感家禍終身蔬食布衣手不執刀刃不聽音樂弟淮言氣不倫嵊垂泣訓誘起家祕書郎纍遷鎮南湘東王長史尋陽太守王暇日為之筮得節卦謂嵊曰卿後當復入為郡恐不得終其天年嵊曰貴得其所耳時伏挺在坐曰君王可畏人也還為太府卿吳興太守侯景圍建鄴遣弟伊率郡兵赴援城陷御史中丞沈浚違難東歸嵊往見之謂曰賊人憑陵人臣效命之日今欲收集兵刃保據貴鄉雖復萬死誠亦無恨浚固勸嵊舉義時邵陵王綸東奔至錢唐聞之遣前舍人陸丘公板授嵊征東將軍嵊曰天子䝉塵今日何情復受榮號留板而已賊行臺劉神茂攻破義興遣使說嵊嵊斬其使仍遣軍破神茂侯景乃遣其中軍侯子鑒助神茂擊嵊嵊親出督戰子鑒更勒徒登岸攻郡東北城即陷焉嵊釋戎服坐於㕔事賊臨以刃終不屈執送景景將舍之嵊曰速死為幸乃殺之子弟遇害者十餘人景欲存其一子嵊曰吾一門已在鬼録不就爾處求恩於是皆死賊手元帝追贈侍中中衛將軍開府儀同三司諡忠貞弟睪亦知名陸超之郡人齊江州刺史晉安王子懋防閣隆昌元年宣城公鸞既專廢立又殺鄱陽王鏘隋郡王子隆等子懋欲起兵謂超之曰事成則宗廟獲安不成猶為義鬼鸞遣軍主裴叔業先襲尋陽遣將隨子懋參軍于琳之入齊害子懋琳之勸超之逃亡超之曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田橫客笑人端坐俟命超之門生謂殺超之當得賞密自後斬之頭墮而身不僵王元邈嘉其節厚加殯斂門生亦助舉棺棺墜壓其首折頸而死周朴郡人有詩名唐末羈泊閩中黃巢陷郡朴不屈遇害既刑體中白膏湧起數尺閩人祠于薛老峯有塑像王玠字介玉長洲人倜儻負氣節酒酣嘗舞劍為樂徙居鄂州黃庭堅謫官來鄂玠以文贄見大䝉稱賞庭堅贈以詩由是有聲紹興初孔彥舟為舒蘄鎮撫使自荆湖徙蘄口鎮厚禮聘玠奏為幕屬凡捍蔽衝要撫循鄉井玠悉啓彥舟行之初權邦彥知東平府彥舟𨽻麾下因事叛去及聞邦彥簽書樞密心不自安又宣州韓世清伏誅及韓世忠自湖外破劉忠俘馬友順流東下彥舟疑其圖已遂有異志問計於玠玠正色答之曰總管被命鎮撫二州任優祿厚豈可負朝廷自陷不義諭以逆順凡數百言彥舟怒囚之粵數日復問之玠曰君不能與韓公爭先立功以報君父顧乃甘心與劉豫為比而慮其見圖茍欲富貴能建大勳于國家則可何獨北敵能富貴人哉君誠欲反幸先殺我孰謂王玠而從反邪彥舟竟沈玠於龍眼磯與妻子俱死時紹興二年也彥舟既殺玠引兵北降劉豫初玠赴彥舟之辟或請止之玠曰吾亦慮之熟矣彼方駐兵于此始為鄉井計倘能息其暴戾固非玠一身之計也玠嘗有讀楚詞詩意以原自況及被害鄉人悲其志為立廟磯上周燔賦哀詞刻石焉滕茂實字秀頴元發從子也初名祼政和八年上舍登第徽宗改賜今名官至奉議郎靖康初金人入侵朝議割三鎮以和茂實由水部員外郎假工部侍郎副路允迪出使河東割地太原陷允迪還至代州金人獨留茂實先是茂實兄祹亦在北故尼瑪哈聞茂實名將屈為用亦遷之代復從京師取其弟華實以慰其意嘗使人諭茂實易衣服又驅巾幘稍髙者數人至前殺之屢加逼脅茂實弗動顧莫能生還乃自為哀詞以暴其志其辭曰虀鹽老書生謬列王都官索米了無補從事敢辭難殊鄰復盟好仗節來間關城守久不下川途望漫漫憸輩果不惜一往何當還牧羊困蘇武假道拘張騫流離念窘束坐閲四序遷同來悉言歸我獨留塞垣形影自相弔國破家亦殘呼天曽不聞痛甚傷肺肝相逢有兄弟悼歎安得歡金人自南歸得志鞍馬間波瀾卷大夏一木乃求安世事寧有此聊發我所存爵祿非所慕金珠敢懷貪縱或違我心寧不汗我顔昔燕破齊王羣臣望風奔王蠋獨守節燕人有甘言縊首自絶脰感慨今昔聞未嘗食齊祿徒以世為氓況我祿數世一死何足論逺或死江海近或死朝昏斂我不須衣裹尸有黃幡題作宋臣墓篆字當深刊我妻尚少艾兒女皆童頑四海無置錐飄流倍悲酸誰當給衣食使不厄饑寒嵗時一釂我聊以慰我魂我魂自悠悠異鄉寄沈寃他時風雨夜草木號空山復篆宋工部侍郎滕茂實墓九字裹以奉使黃幡密授其友朔寧府司理董詵屬以後事欽宗自出都城舊臣無敢候問起居者洎過代州茂實具冠裳迎謁拜伏號慟州民感泣金人謂之曰國破主遷所以留公蓋將大用茂實請從舊臣俱行金人亦不許遂留雁門董詵拔歸茂實與之泣别自述其出處附表以聞茂實竟憂憤成疾卒金人哀其忠為起墓臺山寺嵗時祀之建炎二年詵以茂實哀詞言於張浚浚以詵為陜西轉運判官上其死節宣付史館紹興二年追贈龍圖閣直學士官其家三人後諡忠節紹定中吳淵立祠于學宫云祹歷蘇州糧料院勾當新城右廂公事大宗正丞通判代州官朝議郎金人入侵邊郡望風降避祹率衆城守不下力屈援絶為敵所拘劉豫興解州鹽利以太府卿召執節不辱而死二子彪霦俱陷敵中祹弟䄎以䕃補官歷知資州茂實子修字敏叔以恩補官歷平江府司户監常州比較務衢州司法知蕪湖縣官至宣義郎邊知章字公望髙祖肅楚丘人真宗朝兵部郎中知邢州澶淵之役密詔便宜退保肅匿詔抗敵併納傍郡鎮魏六州老弱全活者數十萬官至工部尚書祖珣父裕自有傳知章崇寧進士國子監書庫官京畿京西路提舉鹽香司管幹公事歷永靜軍通判律學博士通判開德府以年勞賞典遷官纍朝請郎靖康初金人犯闕尋以和議退澶淵當孔道明年春告滿代者避禍愆期敵將復動或勸知章逃去知章抵書平江諸弟以謂去嵗兵至宜敵不敵今嵗既盟宜和不和速禍必矣茍求幸逃豈不愧守邢匿詔事乎藉使非力所能而死當見吾祖地下無靦顔其冬敵至城下軍潰于內遂死之年四十七朝廷贈兩官至朝散大夫官其一子尋復命其幼者子維嶽知袁州維熊通判紹興府孫察者載從子也父臨大理評事察以朝散郎奉使金國守節不屈金人裹以油絮焚之罵聲不絶口而死朱良字良伯祖公綽光祿卿父季端為郎屢典名郡良仕海鹽尉建炎四年金人侵汴車駕南幸分兵入縣境良謂僚友曰今日乃忠臣義士死國之時也被甲執戈集射七百餘奮而前金兵數人死衆為披靡然力不敵竟死同郡時有武舉進士保義郎禇孜為永康尉敵馬犯州與兩浙兵馬鈐轄閻璋婺州諸縣弓手將領馬珍俱被害事聞官良之子思孜等亦各贈三官恩澤兩資思後以朝議大夫知漢陽軍贈良銀青按建炎三年十二月敵騎自臨安循黃灣至海鹽四年二月遂陷秀州良死當在此時郭元邁字英逺附之孫也博通經史入太學魁上舍建炎二年應募奉使時魏行可充河北金人軍前通問使元邁以右武大夫和州團練使為之副行次河朔以尺紙付家云去疆當囏棘時難保全生此身已許國矣至敵廷上書於尼瑪哈乞歸二聖金人留之不遣洪皓北歸言其以身徇國棄之不取緩急何以使人元邁不肯降後二年卒于敵中鄭凝之文肅公戩孫也建炎中為浙西安撫司機宜建康潰卒戚方犯鎮江兩浙宣撫司參謀官胡唐老被害凝之亦以兵死詔官其家楊椿字子壽其先少師棟由蜀來吳遂為吳人椿少聰敏讀書過目成誦及壯試于有司屢黜而志益厲尤好為古文詞丙申嵗元總兵參政托音時守吳辟椿為參謀俾守婁門甫二日張士德寇郡兵至門下衆潰去椿獨擐甲胄持弓矢匹馬突入以禦之身被數鎗度勢不支且大罵兵以㦸裂其口血被體罵不絶而死其妻王氏聞之被髮徒跣冒鋒鏑尋尸三日不得幾被刃者數四既又劈踊抱城門柱大呼動地訴其魁曰人孰無夫婦汝等專務殺人而來邪抑欲為安民之計邪魁韙之禁其兵勿沮其往來乃得尸於張香橋下輿歸葬之益哀毁不食翌日夫之神憑王大言曰我已死汝無他志期五日當取汝與吾子女同歸及期王果死子頴十五嵗女滿奴九嵗皆一日亡其徒陳普字季周郡人也好學而文尚氣節士德之入吳兵踵普門使拜不肯屈且索婦女普罵曰若所為寇耳遂被數創死人物十二孝友顧翺郡人也少失父事母孝母好食雕胡飯常帥子女躬自采擷還家導水鑿川供養每有盈儲家近太湖湖中乃生雕胡無復雜草蟲鳥不敢至遂得以為養郡縣表其閭舍顧悌字子通雍族人以孝悌亷正聞於鄉黨孫權時為將軍言辭切直朝廷憚之悌父向歷四縣令致仕每得父書灑掃設几筵舒書其上拜跪讀之父終飲漿不入口五日以不見父喪常畫壁作棺柩像設神座於下對之哭泣服未闋而卒陳遺郡人宋初為郡吏母好食鐺底飯遺在後恆帶一囊每煮食輒剝一作録其焦以貽母後孫恩亂聚得數斗恆以自隨及敗逃竄多有餓死遺因此得活母晝夜泣涕目為失明耳無所聞遺還及戶再拜號咽母豁然即明張敷字景𦙍邵之子也生而母沒年數嵗問母所在家人告以死生之分敷雖童䝉便有思慕之色年十許嵗求母遺物而散施已盡唯有一畫扇乃緘録之每至感思輒開笥流涕見從母常悲感哽咽性整貴風韻甚髙好讀𤣥書兼屬文論初父使與髙士南陽宗少文談繫象往復數畨少文每欲屈握麈尾歎曰吾道東矣于是名價日重宋武帝召見竒之曰真千里駒也以為世子中軍參軍數見接引永元元年遷祕書郎父為湘州去官侍從太祖版為西中郎參軍元嘉初為員外散騎侍郎祕書丞江夏王義恭鎮江陵以為撫軍功曹轉記室參軍遷正員中書郎敷小名樝父邵小名梨文帝戲之曰樝何如梨敷曰梨是百果之宗樝何敢比善持音儀盡詳緩之致與人别執手曰念相聞餘響久之不絶張氏後進至今慕之其原流起自敷也遷黃門侍郎始興王濬後軍長史司徒左長史未拜父在吳興亡報以疾篤敷往奔省自發都至吳興成服凡十餘日始進水漿葬畢不進鹽菜遂毁瘠成疾世父湛每止譬之輒更感慟絶而復續湛曰我冀譬汝有益但更甚耳自是不復往未朞而卒年四十一琅邪顔延之書弔湛曰賢弟子少履貞規長懷理要清風素氣得之天然言面以來便申忘年之好此雖難隔阻而情問無暌薄莫之人冀其方見慰說豈謂中年奄為長往聞問悼心且兼怛痛足下門教敦至兼實家寶一旦喪失何可為懷其見重如此孝武即位詔曰司徒故左長史張敷貞心簡立幼樹風規居喪毁滅孝道淳至可追贈侍中改其所居稱孝張里顧訓之仕宋太原太守五代同居子孫富盛闔門雍睦家有百口時人重之顧昌衍郡人居喪幾至滅性王儉言之天子謂張永之甥授尚書庫部郎張昭字德明吳人幼至孝父熯病消渴嗜鮮魚昭結網捕魚以供膳弟乾字元明聰敏好學亦有至性父卒兄弟並不衣綿不食鹽酢日食一升麥屑粥每感慟必嘔血父服未終母陸又卒兄弟毁瘠骨立家貧未得大葬布衣疏食十有餘年陳衡陽王伯信臨郡舉乾孝亷固辭兄弟因毁成疾昭一目失明乾亦中冷苦癖年未五十並終于家嗣息俱絶徐孝頴吳人祖驎梁侍中石陽侯父樞陳尚書起部郎孝頴勤學多覽善屬文性至孝丁母憂三年衰絰不離身經冬不御綿纊形體骨立杖而能起每哭臨哀聲徹於郡邑聞者為隕涕嘗在園中晝卧見人盜菜徐轉身向裏恐盜見之其仁行謙退皆此類也仕煬帝為學士校書陸南金字季孫曽祖士季在儒林傳祖謀道周王府文學詳正學士父元感建德歷陽二縣令朝散大夫黃州司馬南金貞觀中為太常奉禮郎歷鄞令築堤為湖千頃開元初少卿盧崇道抵罪徙嶺南逃還僞稱南金弔客突入其舍而道其情南金匿之俄事覺詔御史捕按南金當重法弟趙璧自言匿崇道者我也請死南金固言弟自誣不情御史怪之趙璧曰母未葬妹未歸兄能辦之我生無益不如死御史驚上狀𤣥宗皆宥之南金知書史操履謹飭張說陸象先稱其賢由庫部員外郎以疾改太子洗馬卒初南金治鄞築堤為湖宋知州李夷庚葺為六梁四閘治平中立祠湖上之青山賜號嘉澤廟追封南金為孚佑侯夷庚為惠應侯李鼇者壽昌令璲之子也璲濮州人咸平中自睦州罷官北歸舟過吳江而卒即葬于天平山鼇時尚幼奉母鄭家于蘇天聖中鄭卒與璲合葬鼇倚杖寢苫廬于墓側早夜悲慟甘露再降于松柏朝野名士皆為賦詩鼇又以母嘗誦金剛經刺血為書刻於墓下郎中楊備表之姚淳吳縣人家世業儒淳性孝謹其先墓嘗有甘露芝草麥雙穗之異蘇子瞻范景仁為賦三瑞堂詩時稱為姚孝子云馬友直字伯忠其先本司馬氏有名球者仕吳越國以御史中丞為崑山鎮遏使因家焉後世止稱馬氏以孝義著稱兄弟六人皆力田獨友直以儒業自奮入太學元符二年薦春官與李豸遊豸賢其人以兄子妻之宣和水災兄弟皆狼狽營妻子友直獨迎親僦屋以居躬治菽水母子晏如唐輝王葆咸愛重之建炎二年以纍舉主武康簿監南嶽廟卒龔明之字熙仲父況自有傳明之幼逮事祖母李李自言少嘗大病夢神告曰與汝七十七及期果病且革明之齊心屏處夜禱于天乞減已五齡以益李壽灼香於頂者七聞腦中有爆裂聲不為動詰旦李病良愈又五年乃卒宣和三年明之以諸生貢京師迎父母往已而母與弟繼亡去鄉數千里貧無以歸葬或使以旅殯僧舍否則火之以其燼歸明之不從取其家所有自一錢之直皆折賣之不足又乞貸於人竟護二喪以歸先墓在西山大木數萬族人利其直悉斬而分之明之不能制獨泣且罵每伐一木仆明之輒號慟響震林谷紹興二十年鄉貢年已六十或勸少匿其數為異日計笑曰吾平生未嘗妄語且不敢自欺卒書其實晚以特恩廷試授髙州文學年逾八十法不應出官吳士在朝者列奏其行義敕監潭州南嶽廟淳熙五年乞致仕鄉人奉直大夫林振等舉明之鄉曲儒宗經明行修議論操履衆所師法而窮居在下先是淳熙二年慶壽赦文內孝行節誼著於鄉閭仰長吏保明當議旌録時參政錢良臣謂明之無吏考難之吳仁傑曰公試與丞相敷陳必能動上聽良臣問故仁傑曰龔君頃以至行能動上帝是以知今日必能動人主因具言其事良臣為之竦然果得㫖超授宣教郎致仕仍賜緋衣銀魚時李衡以忠諫去國年幾八十德望絶人獨以兄事明之時人髙之目為二老明之生平不摘人短不作貌言每自謂平日受用唯一誠字嘗附益山谷語以省喫儉用號五休居士撰中吳紀聞三卷子晃昱昱字立道有學行安貧樂義鄉人師之有崑山雜詠陸十七吳江震澤市民父疾刳心作糜進啖遂愈郡守趙汝歷為建旌孝坊又嘉熙中郡守吳潛建純孝坊以旌湯家濱里人刳心療母疾者逸其名周津崑山人治詞賦端平嘉熙中郡府兩舉待補進士性介直好為義舉父天驥有疾津刲股以療或以義諭之津曰父母遺體豈宜毁傷然因所豫者還以奉之詎為過邪津亦以壽終又有曹椿年母病革椿年刲股療之事聞借補椿年承信郎節制司凖使立孝感坊又淳熙八年有榮孝子亦以刲股救母立旌孝坊其後有張孝子皆同縣市人也金道𤣥字仲旻吳縣人少孤父友長橋萬戶府鎮撫陳某養為子至正戊子方國珍起兵海上江浙行省參政多爾濟巴勒督師與戰時陳已進官都鎮撫統軍以道𤣥從初并師期集建寧之補門關國珍以書詐降陳受之意稍解道𤣥曰賊志未可知也不如嚴備之陳不聽國珍以艨衝數百艘帆以赤布蔽日而下勢漸迫官軍猶晏然國珍乘風縱火矢石交注陳戰死不知所在道𤣥求之不得乃從舵樓中躍赴海祝曰吾父有靈幸使我不為賊所得也已而恆若有人抱持之自旦及晡隨波上下忽止身石上登沙瀨數百步得小徑行里許乃知溫之􅓝水山也逮歸張士誠已據吳或薦其名於僞司徒李伯升道𤣥聞之挈妻孥去隱具區賣卜以終其身子問禮部侍郎自有傳瞿嗣興字華卿常熟人母嘗夏月患癰穢不可近嗣興燖湯洗滌跪牀下執扇驅蚊以手磨穢剔腐晝夜無休母又患積氣醫不能治刲股肉作羮以進母不食已五日矣啖之疾愈母思芰食時芰始花求諸市不得嗣興乃解衣入水半日忽得三芰以進人稱孝感所致子莊字敬孚以薦擢官翰林典籍與修洪武正韻纍官福建參政錢迪常熟人父蘇在文學傳洪武蘇坐事當刑迪年十八詣執政求以身代所司上其事詔從之徐植字原芳常熟縣學生父達輸賦後期將伏法植年十八代父死臨刑賦詩有願將一死報劬勞之句顔琇字季栗吳縣人洪武初父濟民戍鳳翔母韓從行留琇守丘隴越六年聞母訃琇即日奔赴函母以歸自陜抵吳踰數千里骨函未嘗著地行則負之寢則懸於屋梁而草宿其下渡則著之心胸父既老免歸奉養愈謹旦必躬滌溺器家人止之曰此臧獲輩事耳何乃自苦琇曰此非爾所知也蓋其心恐親有疾每視溺以驗之其父固不知也後父卒琇哀號日夜絶而復蘇水飲不下咽越五日竟哭死子昌亦有孝行梅應發居閶門市中母嘗有病醫藥弗療刲股為羮以進母啖之疾已他日母復疾危甚應發露立北面稽首以香然頂灼臂叩天乞減已年以益母壽是夕天隂暝俄頃雲開盡見北斗之六星惟一星尚沒頃雲復合及還至母所見母擁衾坐牀上言有白衣者六人以水灌灑遂霍然而蘇詰旦母平復如常年八十餘卒莫轅字㢲仲吳江人少從張適易恆學洪武初父繫詔獄將刑轅年十一願代父死理官試加脅誘語無異詞遂奏釋其父而繫之轅父更為稱寃闕下竟致瘐死轅獲赦季父侍郎禮有寵于上時國法方嚴轅憂之每指同姓一人𨽻洱海衛者曰是吾族也人疑之後黨禍一家無免者獨轅以嘗附尺籍免兄嫂前以家禍病死有遺孤二皆在襁褓轅為保護甚至復變姓名潛入都下竊父祖遺骸歸葬于鄉屢冒法禁幾死後恩宥歸轅念家禍不御酒肉數年家被火火逼母寢轅躍入火中抱持以出鬚眉盡焚卒年七十七私諡貞孝先生都文信字士誠吳縣人其父思賢與徐右之者交善思賢死妻唐有娠晝夜悲泣右之日使人存問且慰之曰若生子吾當妻之已而果生文信右之遂館為壻洪武初右之坐事文信請代行右之曰汝未有子豈可為人死不許既而右之事白得還復以事被逮文信曰今已有子可行矣右之亦不許文信潛冒右之名以往竟死於獄右之感其義即屏妾侍遂以無子都氏至今奉其祀云沈伯剛長洲人本孟姓自少立為母姨之夫沈勝五後後勝五坐事當誅年且老伯剛願代死勝五不許伯剛固欲代之時年方十七臨刑太祖怪其少問故特赦之又有朱昱亦長洲人父某當逺戍老不能行而兄先逃去昱年當十六請代往有司少之欲追逮其父兄昱備極笞檚固請代之部使者憐之改留蘇衛云凡孝友之行列其尤者如右其他表閭給復乃纍朝令典世勸所係爰次其氏名聯書之龔景才字敦禮常熟人五世同居唐麟德初旌表孫侔字少述少孤力學性至孝宋嘉祐中郡守唐詢表其門詔賜粟帛王洵王淳郡人父鑄為大都督府斷事洪武八年坐法當死淳年二十七洵年二十二聚哭連日夜願以身代淳走訴御史臺曰淳聞父子一體父有難子不忍視請伏鈇礩以贖父罪言未巳洵進曰兄冢嗣宗祀所承弟無庸死猶棄鴻毛爾兄弟交讓各執其志益堅官為反覆窮詰見其孝誠聞上鑄得免死戴君用長洲人父福之洪武中因監稅失火法當死君用身代父刑其妻吳氏守節旌表吳淳字伯善長洲人讀書敏行少與兄同居兄以疾廢伏枕幾二十年元季吳中被兵家人悉奔潰淳獨侍兄不去有操刃入室者淳負兄倉皇走避復遇亂兵十餘交刺淳以身蔽兄被三十餘創昏仆於地兄竟兵死淳稍蘇遂入秦餘杭山鬻墨以終朱良吉常熟人母錢病且死良吉沐浴禱天剖胸取心肉一臠煮粥食母母病愈良吉心痛不可起邑人俞浩齊聞而過之觀良吉胸間瘡裂五寸氣騰出不能言俞為納其心以桑白皮線縫合月餘而愈張德元字長卿本大名人元元貞二年仕為平江路知事寓居郡城事母至孝大德元年以姊慧亨守節同旌表湯文英字孟寬其先自華亭徙吳八世同居元至元間表其門復其家金𢎞道字達可祖璹仕宋將仕郎至𢎞道聚族凡六世元至正間旌其門張阿童洪武初孝子不詳其邑里本府公牘至今尚存其名俞敬字用禮太倉人事母至孝嘗刳肝愈母疾永樂中事聞旌其門仍擢為尚寶司丞盧雍吳縣人其先閭右徙南京雍仕為參政以孝旌門朱皓字景南長洲人父殁廬墓有馴烏之異事聞成化十一年旌表孝行之門姑蘇志卷五十三
