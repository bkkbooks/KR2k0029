body:
  text: 姑蘇志卷五十四明王鏊撰人物十三儒林臯𢎞字奉卿吳人也代為宦族𢎞少有英才與桓榮俱習歐陽尚書顯宗朝拜議郎使授太子尚書會歐陽博士缺帝欲用榮榮讓曰臣經籍淺薄不如同門生郎中彭閎揚州從事臯𢎞因拜榮為博士引閎𢎞為議郎𢎞子徽至司徒長史范平郡人其先銍侯馥避王莽亂適吳因家焉平研覽墳索該通百氏詔諡文貞先生三子奭咸泉並以儒學至大官泉子蔚家世好學關內侯蔚子文才亦知名陸璉郡人也天監四年詔開五館建立國學總以五經教授置五經博士各一人以璉及沈峻等補博士各主一館館有數百生給其廩餼其射策通明經者即除為吏於是懷經負笈者雲會矣峻字士嵩武康人博通五經尤長三禮兼國子助教傳峻業者吳郡張及等官皆至五經博士皇侃青州刺史象九世孫也少好學師事會稽賀瑒精力專門盡通其業尤明三禮孝經論語起家兼國子助教善講說聽者常數百人撰禮記講疏五十卷奏上詔付祕閣頃之召入壽光殿說禮記義武帝善之加員外散騎侍郎侃性至孝常日限誦孝經二十遍丁母憂還鄉里西平邵陵王厚禮迎之大同十一年卒所撰論語義十卷與禮記義皆行於世陸詡郡人少習崔靈恩三禮義宗梁時百濟國表求講禮博士詔令詡行還除給事中定陽令陳天嘉初侍始興王伯茂讀遷尚書祠部郎中陸慶吳縣人少好學遍通五經尤明春秋左氏傳節操甚髙釋褐梁武陵王國右常侍歷征西府墨曹行參軍除婁令以善政聞陳天嘉初徴為直散騎侍郎不就太守永陽王聞其名欲與相見慶辭以疾宗人陸榮為郡五官掾慶嘗詣焉王乃微服往榮宅穿壁觀之謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲鄱陽晉安王俱以記室徴不起子士季士季從同郡顧野王學左氏春秋司馬史班氏漢書仕陳桂陽王府左常侍入隋為越王侗記室兼侍讀侗稱制擢著作郎時王世充將篡逆謂士季曰隋有天下三十年朝果無忠臣乎士季對曰見危授命臣宿志也請因啓事為陛下殺之謀泄停侍讀乃不克貞觀初終太學博士兼𢎞文館學士曽孫南金在孝友傳潘徽字伯彥性聰敏少受禮於鄭灼受詩於施公受書於張沖講莊老於張譏並通大義尤精三史善屬文能持論詣江總總甚敬之釋褐陳新蔡王國侍郎選為客館令隋遣魏淡聘陳陳使徽接對之及陳滅為州博士秦孝王俊聞其名召為學士嘗從俊朝京在途俊令徽馬上為賦行一驛而成名曰述恩賦俊覽而善之復令為萬字文又遣撰集字書名為韻纂凡三十卷俊薨煬帝時為晉王引為揚州博士令與諸儒撰江都集禮及帝嗣位詔與陸從典褚亮歐陽詢等助楊素撰魏書會素死而止授京兆博士楊𤣥感兄弟甚重之數相來往及𤣥感敗凡所交聞多罹其害帝不悅有司希㫖出徽為西海郡威定縣主簿唐書作定威行至隴西病卒時同郡錢唐褚亮貶西海司户俱在道中為之斂瘞人皆義之褚暉南史作輝字髙明以三禮學稱于江南煬帝時徴天下儒術之士集內史省相次講論暉博辨無能屈者由是擢為太學博士撰禮疏一百卷張沖字叔𤣥郡人也父僧紹梁零陵太守沖仕陳為左中郎將非其好也乃覃思經典撰春秋義略異於杜氏七十餘事喪服義三卷孝經義論語義十卷前漢音義十二卷官至國子博士入隋為漢王侍讀并州博士子後𦙍後𦙍字嗣宗本傳云崑山人甫冠以學行禪其家唐髙祖鎮太原引為賔客以春秋授秦王義寧初為齊王文學封新野縣公武德中擢員外散騎侍郎賜宅一區太宗即位進燕王咨議帝嘗問隋運將終得天下者何姓答云公家德業天下係心若順天而動自河以北指撝可定然後長驅關右帝業可成至是自陳所言乃賜燕月池帝令羣臣以春秋酬難帝曰朕昔受大誼于君今尚記之遷燕王府司馬出為睦州刺史乞骸骨帝見其彊力問欲何官後𦙍謝不敏帝曰朕從卿授經卿從朕求官何所疑後𦙍頓首願得國子祭酒授之永徽中致仕加金紫光祿大夫朝朔望祿賜防閣如舊卒年八十三贈禮部尚書諡曰康陪葬昭陵孫齊丘歷監察御史朔方節度使東都留守諡貞獻曽孫鎰在忠義傳陸元朗字德明以字行吳縣人善名理言受學於周𢎞正陳太建中後主為太子集名儒入講承光殿德明始冠與下坐國子祭酒徐孝克敷經倚貴縱辨衆多下之獨德明申答屢奪其說舉坐咨賞釋褐始興王國左常侍陳亡歸鄉閈隋煬帝擢祕書學士大業間廣召經明士四方踵至於是德明與魯達孔褒共會門下省相酬難莫能詘遷國子助教越王侗署為司業入殿中授經王世充僭號封子𤣥恕為漢王以德明為師即其廬行束修禮德明恥之服巴豆劑僵偃東壁下𤣥恕入拜牀前德明對之遺利不復開口遂移病去世充平秦王辟為文學館學士以經授中山王承乾補太學博士髙祖已釋奠召博士徐文逺講論語孝經浮屠慧乘道士劉進善各講其書德明隨方立義遍析其要帝大喜曰三人者誠辨然德明一舉輒蔽可謂賢矣賜帛五十匹遷國子博士封吳縣男卒論撰甚多悉傳于世後太宗閲其書嘉其博辨以布帛二百段賜其家子敦信麟德中繇左侍郎檢校右相纍封嘉興縣子致仕終大司成朱子奢吳縣人父才字待問梁王蕭莊在淮南以才兼散騎常侍副侍中袁奭使于齊莊留鄴稍遷國子博士諫議大夫齊亡客遊信都而卒奢從鄉人顧彪授左氏春秋善文詞隋大業中為直祕書學士天下亂辭疾歸鄉里後從杜伏威入朝授國子助教貞觀初髙麗百濟同伐新羅連年兵不解帝假子奢散騎常侍節諭㫖平三國之憾子奢有儀觀夷人尊畏之二國上書謝罪贈遺甚厚初子奢行帝戒曰海夷重學卿為講大誼然勿入其幣還當以中書舍人處卿子奢至其國為發春秋題納其美女帝責違㫖而猶愛其才以散官直國子學纍轉諫議大夫𢎞文館學士唐初太廟止四室子奢始發七廟之議帝嘗欲觀起居紀録子奢曰陛下所舉無過事雖見無嫌然以此開後世史官之禍可懼也史官全身畏死則悠悠千載尚有聞乎子奢為人樂易能劇談以經誼緣飾每侍宴帝令論難羣臣恩禮甚篤貞觀十五年卒于官唐書開成中鄭朗為起居郎文宗欲觀史朗曰故事天子不觀史昔太宗欲觀之朱子奢曰史不隱善不諱惡自中主以下或飾非護失見之則史官無以自免且不敢直筆又史館故事載貞觀九年十月子奢上表曰今月十六日陛下出聖㫖以起居紀録書帝王臧否前代但藏之史官人主不見今欲親自觀覽用知得失愚以為聖德在躬舉無過事史官所述義歸盡善陛下獨覽起居于事無失若以此傳示子孫切有未喻大唐雖七百之運天命無改至於曽𤣥之後或非上知但中主庸君飾非護短見時史直辭極陳善惡必不省躬罪已唯當致怨史官但君上尊嚴臣下卑賤有一於此何地逃刑既不能效朱雲廷折董狐無隱排霜觸電無顧死亡唯應希風順㫖全身逺害悠悠千載何所聞乎所以前代不觀蓋為此也施士丐吳人以詩名其學兼善左氏春秋以二經教授繇四門助教為博士秩滿當去諸生封疏乞留凡十九年卒于官弟子共葬之士丐撰春秋傳未甚傳文宗喜經術宰相因言士丐春秋可讀帝曰朕見之矣穿鑿之學徒為異同但學者如浚井得美水而已何必勞苦旁求然後為得邪王蘋字信伯其先福清人唐水部郎棨時號人瑞有麟角集八世孫伯虎字炳之嘉祐進士為潛江令築隄去水害歷太子中允太常博士尚書户部員外郎與蘇黃倡和有進冊三卷及過庭集松陵集西府録從弟仲舉字聖俞剛介厲學不徇時好徙家吳之震澤卒贈奉議郎生蘋出為世父伯起後伯起字聖時受經王安石游曽宣靖公亮父子間學文於子固題所居曰酉室有詩曰唱道野集卒贈右宣教郎二程在洛伯起遣蘋往從之遂為河南髙弟通春秋視楊時猶為後進時亦謂後來師門成就者惟蘋耳三舍法行遂不就舉紹興初髙宗幸平江知府孫佑言蘋素行髙潔有憂時愛君之心開物成務之學丞相趙鼎以聞召對補右迪功郎賜出身除正字兼史館校勘受詔條具敵退利害蘋奏治本三事曰正心誠意曰辨君子小人曰消朋黨上謂輔臣曰蘋起草茅而議論進止若素官於朝者大抵儒者能通世務乃為有用預修神宗實録優詔奬諭朱震胡安國尹焞皆舉以自代安國論薦尤力謂其學有師承識通時務使司獻納必有補益遷著作佐郎通判常州主管台州崇道觀不悅於秦檜會從子誼亦素疾惡為文以擬檜罪因坐法牽連文致蘋亦奪官久之復畀祠引年致仕官至左朝奉郎卒年七十二章憲銘其葬蘋識慮精微議論平易隤然若與世忘既老作論語集解未成合文集為四卷憲及陳長方楊邦弼皆其門人也嘉熙元年知府王遂祠之學宫寶祐初里人立像震澤鄉校以長方邦弼配食號三賢子大本朝請郎浙西安撫參議大中儒林郎從孫楙楙字勉夫早孤奮學事母母殁以不逮養不肯預鄉薦所著有野客叢書三十卷巢睫稿筆五十卷子德文字周卿克世其學魏了翁真德秀游似杜範王遂皆薦之官止承節郎子敄敄字行父終日清坐不聞謦咳童豎入見亦斂容而起著雲嶠類要紀事極該博子仁美孫賔賔從孫敏皆自有傳孟文龍字震翁鄒國亞聖公之後宋昭慈后五世妷孫也髙祖信安郡王忠厚鎮吳遂占籍為吳人初以世賞補將仕郎後中銓試授迪功郎監華亭船場調嚴州録事參軍再調兩浙西路安撫司准備差遣時賈似道枋國百僚多隳法就風㫖公獨守職屢忤其意不少回章鑑趙順孫交薦不報循調從政郎浙東提舉常平幹辦公事丁內艱不行始自咸淳以來被命主昭慈祀事元兵壓吳文龍奮激有賈勇三軍之氣與守臣議不合遂返哭昭慈之廟後平章史弼等薦起之文龍致書曰文龍未死慚負神明羣公相國以忠孝文龍為羣公起將何以令今之事君者敢以死辭遂止不出户庭者三十年著易解大全三十卷子潼字宗鎮舉茂材由教官歷任有司以承直郎松江府判官致仕篤學厲行敏於從政意度卓犖猶有承平王孫故態嘗即故居建鄒國公祠創性善家孰以教其族黨俞琰字玉吾吳縣人生宋寶祐間以詞賦稱宋亡隱居著書不復仕進以義理之學淑諸人於書無不讀精於易學尤好鼓琴既老自號石澗元貞間卒年七十餘其所述諸家易說百餘卷名曰大易會要自注上下經十翼四十卷名曰周易集說又有隂符經解一卷周易參同契發揮三卷易外别傳一卷幽明辨惑二卷書齊夜話四卷席上腐談二卷弦歌毛詩譜一卷男仲溫克承其志孫貞木自有傳人物十四文學陸士秀字南容郡人博通百姓之言幼時在陳容儀迅舉齊使李騊駼至江南問江南孟婆是何神也士秀曰山海經云帝之二女游于江郭璞注云天帝二女尊之為神由此言之則孟婆也以天帝女尊之為孟婆猶郊祀志以地神為泰媪也騊駼曰僑南之辨無以加焉後在隋為學士或謂曰後魏書稱王肅論於孝文前肅云唯有女子笄男子無笄劉芳曰男子亦有笄引內則為證肅乃歎曰今日方知劉石經芳可謂博物君子乎士秀曰內則兼男子之言子事父何足以明男之有笄男子有笄布在經傳劉芳儒者不能博物羣書容或不悉王肅多聞之士無不知時王肅劉芳獨暗斯事引內則謂之不經斯不然矣此乃魏收學不稽古而虛美劉芳非芳雅論誠損之也顧野王字希馮吳縣人也祖子喬梁東中武陵王府參軍事父烜信威臨賀王記室兼本郡五官掾與子喬俱以儒術知名野王幼好學七嵗讀五經略知大指九嵗能屬文嘗著日賦朱异見而竒之年十二隨父之建安撰建安地記二篇及長遍觀經史精記默識天文地理蓍龜占候蟲篆竒字無所不通為臨賀王府記室宣城王為揚州刺史野王及琅邪王褒並為賔客王甚愛其才野王又善丹青於東府起齊令野王畫古賢命褒書贊時稱二絶及侯景亂野王丁父憂歸本郡乃召募鄉黨隨義軍援都野王體素清羸裁長六尺又居喪過毁殆不勝衣及杖戈被甲陳君臣之義逆順之理抗辭作色見者莫不壯之城陷逃會稽陳天嘉中敕補撰史學士太建中為太子率更令尋領大著作嘗撰國史知梁史事後為黃門侍郎光祿卿知五禮事卒贈祕書監右衛將軍野王少以篤學至性知名在物無過辭失色觀其容貌似不能言其厲精力學皆人所莫及所撰玉篇輿地志各三十卷符瑞圖顧氏譜傳各十卷分野樞要續洞冥記𤣥象表各一卷並行於時又撰通史要略一百卷國史記傳二百卷未就而卒有文集二十卷陳書曰野王博識洽聞侯景之寇郡將袁君正舉兵赴援文檄皆以委之口占便就未嘗立草陸搢字士紳郡人祖映梁侍中父陟咨議將軍世有文集搢不墜家聲隋仁壽中召補春宫學士大業中為燕王記室唐貞觀中授朝散大夫魏王府文學朱佐日郡人兩登制科三為御史武后嘗吟詩曰白日依山盡黃河入海流欲窮千里目更上一層樓問是誰作李嶠對曰御史朱佐日詩也賜采百匹轉侍御史子承慶年十六舉秀才嘗為昭陵挽詞入髙等由是父子齊名張旭字伯髙一字季明吳縣人與集賢院學士延陵包融及賀知章張若虛皆有名當時號吳中四士旭嗜酒每大醉呼呌狂走乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼張顛初為常熟尉有老人陳牒求判宿昔又來旭怒其煩責之老人曰觀公筆竒妙欲以藏家爾旭因問所藏盡出其父書旭視之天下竒筆也自是盡其法旭自言始見公主擔夫爭道又聞鼓吹而得筆意及觀公孫大娘舞劍器得其神後人論書歐虞褚陸皆有異論至旭無非短者傳其法惟崔邈顔真卿旭官至金吾長史文宗時詔以李白歌詩裴旻劍舞并旭書草為三絶云于公異吳人也進士擢第李晟表為招討府掌書記朱泚平露布於德宗曰臣既肅清宫禁祗奉寢園鍾􅒶不移廟貌如故帝覽泣下曰誰為之辭或以異對帝咨歎一再仕不振而卒張籍字文昌吳縣人貞元十五年進士為太常寺太祝以次遷祕書郎韓愈薦為國子博士歷水部員外郎主客郎中當時有名士皆與游而愈賢重之籍性狷直嘗責愈喜博塞及為駮雜之說論議好勝人其排釋老不能著書若孟軻揚雄以垂世愈亦貽書答之仕至國子司業張泊論籍為詩長於古風當時與元微之白樂天孟東野歌詞為天下宗匠號元和體又長於今體律詩貞元已前多拘於常態至籍一變而章句之妙冠於流品李杜之後一人而已子黯按韓愈題張中丞傳云吳郡人其本集有贈陸暢詩云共踏長安街裏塵吳州獨作未歸身胥門舊宅今誰住君過西塘與問人則為蘇人無疑也或云籍和州烏江人故居在通淮門裏大厯中為烏江令所葺據此蓋籍寓居也烏江令本傳不書蓋亦傳聞之誤湯中張震發有詩集跋語辨之甚詳陸暢字達夫郡人早有才名鄉音不改舉進士授官祕書丞觀察判官植性謹和蒞事周敏剖斷公事人人不寃初王仲舒刺洪州暢在幕府終日長吟不親公牘仲舒微言竟拂衣去辭曰不可偶為大夫參笠而妨志業由此美譽益彰及登省署遇雲陽公主出降詔作催妝詩恩例外别賜宫錦五十段楞伽瓶及唾盂各一枚又為劍南西川節度韋臯所厚禮始天寶間李白為蜀道難篇以忤嚴武暢更為蜀道易以美臯其詞云蜀道易易於履平地臯向在蜀數進兵器上刻定秦字既死人以此誣臯暢上疏言臣在蜀日見定秦乃造兵器匠者姓名耳由是得釋子瓌顧況字逋翁郡人能為歌詩性詼諧嘗為韓滉節度判官初李泌流放江南與栁渾及況游吟詠自適會渾輔政以校書郎徴況泌復繼入況自謂知已秉樞要當得達官久之方遷著作郎怏怏不樂求歸於吳泌卒作詩以諷為法司所劾貶饒州司户後結廬茅山昌蒲潭石墨池上自號華陽真逸年九十卒子非熊少俊悟一覽成誦及長滑稽好辨凌轢氣焰子弟為衆所抑困于舉場者三十載長慶中一云會昌五年諫議大夫陳商放榜上怪無非熊名詔有司進所試追榜敕及第天下寒畯由是知勸矣非熊纍佐使府大中間歷盱眙尉一云主簿慕父風棄官隱茅山或傳其得長生術云劉少逸郡人年十一文辭精敏有老成體從其師潘閬謁長洲令王禹稱吳縣令羅處約因以所作為贄二令名重當時疑其假手未之信因試與之聯句略不涉思處約曰無風鐙焰直少逸曰有月竹隂寒禹稱曰一回酒渴思吞海少逸曰幾度詩狂欲上天凡數十聯皆敏妙二公驚異聞于朝賜進士及第官至尚書員外郎舒雅郡人太宗朝為國子監丞太平興國二年詔李昉等及雅纂修太平總類八年書成一千卷詔名太平御覽天禧中以職方員外郎祕閣校理知舒州秩滿主管郡之靈仙觀王欽若言其恬於榮利除直史館南唐韓熙載有門生舒雅疑即其人也林虙字德祖父旦自有傳虙少頴悟絶人能傳父祖業伯父希嘗獲古鏡背有龍翔二字虙從旁曰是非唐大帝時物乎希異之曰是兒眉過於目當復以文名可繼其祖矣遂以德祖字之既長益刻苦自淬厲故其學早成登進士第除潤州教授入為太學録復教授常州常號多士籍於學者千餘人時方以三舍取士乃身為勸率從者風靡大觀三年廷試常士預選者五十三人上賜詔曰進賢受上賞知州教授特轉一官虙由奉議郎改宣德郎知州徐申遂於學之南立進賢坊榮賜亭以侈之虙在職六年學者益信服用從官薦不詣政事堂遷揚州教授擢河北西路提舉學事陛對日上首以久歷師儒顧問甚渥且使遍行所部推廣風㫖虙頓首奉詔因請加賜鄒兖二國公諡復捐公廨菜圃歸于學除開封府左司録以府尹不之禮上章請老夜自書牘旦報可家人無知者即日束裝出國門士大夫奔走出餞皆不及既歸杜門一室不入州縣無一言及時事為人强敏有志操自六經諸子而下錯綜貫穿無不記誦為文章捉筆數百言閎易敷暢皆有抵宿其所欲為自信不疑晚好浮屠外生死說不肉食十四年始疾即不命醫藥逮卒弗亂年六十六所居大雲坊自號大雲翁有易說書義書禮記老子解及大雲集一百卷神宗聖訓十卷又集西漢詔令十二卷程俱為之銓次制序龔頥正字養正本名敦頥其先歷陽人元祐黨人兵部侍郎原之曽孫祖徹通判江寧府父相字聖任知華亭縣甚著聲績遂家吳中相兄楫字濟道頥正用洪丞相門客恩為不理選限登仕郎嘗著符祐本末三十卷又著元祐黨籍三百九人列傳所佚者六人而已淳熙末洪邁領史院奏授下州文學補迪功郎監潭州南嶽廟光宗立用薦主管吏部架閣文字遷太社令宗正簿頥正著續稽古録言托胄定策功擢兼資善堂小學教授遷樞密院編修官嘉泰元年詔頥正學問該博賜進士出身兼實録院檢討官預修光孝二宗實録未幾遷祕書丞卒托胄死有詔毁續稽古録頥正有文名尤為范成大所賞周必大稱其博通史學嫺於辭章所著書甚多有中興忠義録三卷續釋常談二十卷皆行于時周南字南仲世為吳縣人曽祖升祖淵父安道南博學無所不通與孔元忠滕宬皆從葉適遊紹興元年對策言甚切直大要謂陛下聰明為小人䝉蔽一曰道學二曰朋黨三曰皇極自陛下入其說而才學之士以道學棄之矣至其中立不倚者又指以朋黨而不用矣唯其不能可否無所執守而自為賢智然後竊箕子之說為自便之地而建皇極之論起矣夫箕子謂有為有猷有守乃有才有道有操執之人也今所指道學朋黨者正斯人耳奈何反棄之而謂之建皇極哉天下之禍始於道學而終於皇極矣又云陛下近逐一讒諂權賄之小人而卷舌之星為之不明者纍月若積其實德每事如斯何求而不得蓋是時閣門舍人姜特立得幸留正奏出之故南言如此考官得其文驚嘆擬奏第一適鄭湜有奏光宗顧謂大臣曰湜疏才入六日爾南何自知之乃格置乙科之首當時中選者自愧在南右授池州教授時論者益攻道學南婦翁黃度忤權要為御史所劾差南常州推官以父憂不行主管吏部架閣文字幹辦浙東茶鹽司公事開禧三年召試館職尋改文林郎祕書省正字母喪服除再入又以言罷卒所著山房藳前後集合四十卷子深原嘉興丞知太平縣滕宬字季度郡人元祐黨籍友之曽孫知道州珙之子也沈敏好學耽研經史無不洞達夜四鼓猶不寐惟不喜時文習制舉安於退處不急仕進淳熙中以賢良召既試命文飄疾午漏不移晷已就考官疑其輕已大怒故以四通不合近制擯之後雖再召薦者不絶處之漠如也晚居齊門窮僻處官於吳者知其賢多就見之清語終日終不及私葉適奏其學行特授號亷靖居士卒年六十五葬常熟周甫字次山常熟人幼頴悟五嵗誦論語每舉一字輒引類言之淳熙十年秋試主文郭頥取為解魁以失書塗注知府耿秉移嗣榜首遂棄舉子業窮經史百家之書識見超卓文筆凌厲操履益不苟參政宇文紹節館之以邊功纍官不就知縣孫應時甚愛重之同郡周南時亦與訂所疑焉精於漢史所著韓生傳章華臺記石頭城歌等作皆膾炙人口餘多散佚盧氏云嘗見甫有印文曰臨淮周甫恐即狀元虎之族也張攀字從龍常熟人四世祖僑字安道有聲場屋登進士以言事謫衢州終朝散郎尤為同年趙抃所重厚攀由太學生登進士調鄞縣尉楚州教授知溧水縣嚴州通判監登聞鼓院慶元通判知興國軍除將作監丞太府寺丞祕書丞詮次中興館閣書目凡一萬四千九百四十三卷上之兼權右曹郎官除尚右郎官改尚左軍器監同日再命拜殿中侍御史兼侍講除起居郎兼崇政殿說書嘉定十六年卒年七十贈通議大夫集英殿修撰攀寬厚易直遇事開誠無一毫矯飾幼年郡試不肯減年為欺家世清白持之益堅仕州縣以循良稱在朝廷以靖恭著有益齊文集奏議漢唐論張慶之字子善其祖以武職入官從建康徙吳父明字子聰氣岸竒偉慶之少有志操為舉子業逮長棄不習出入經史百氏精思積年擬太𤣥作測靈又撰孔孟衍語絶意仕進好為山水之游著虎丘賦因號海峯野逸倣五栁先生作海峯遺民傳以伯夷蔣詡陶潛司空圖自况且謂沈冥似海峻厲似峯時人尚其狷介初文天祥知平江慶之齒諸生之列洎國亡集杜詩備述天祥平生大節有海峯文編三卷并老子注測靈衍語續胡曽史詠詩湯仲友先名益字端夫淹貫經史氣韻髙逸學詩于周弼早登知府二吳之門浪迹湖海晚復歸吳有壯遊詩集子元哲髙常字履常一字可久性嗜吟咏有覆瓿集五卷尤焴周弼馮去非為之序常清癯灑落無子捐宅為妙智僧舍同時學詩於周弼者有顧逢陳瀧逢字君際舉進士不第弼稱為顧五言自署其居為五字田家有詩十卷傳於日本僧後辟吳縣學宫所著船窗夜話一卷負暄雜録一卷有子學老氏法瀧字伯雨紹興初自汴徙家于吳瀧博涉經史百氏最深於春秋晉書鄉薦漕試皆不第放浪山水倜儻有晉人風致有淡泊集九卷子鐸字子振錡字子敬能世其業瀧與湯仲友髙常顧逢皆端淳名士同郡陳發嘗評癯鶴髙樓梅清澗幽為四詩之趣發子永輯為一編名曰蘇臺四妙浦源長洲人至正間仕至大中大夫廣平路總管輕車都尉封京兆郡侯初未聞其有文學名嘗於景德寺傍見一石刻乃源為同僉阿咱爾室人童氏祠記其文閎博怪特字畫遒徑足為名家記頗多不録子玉田建德路儒學教授孫輿介休知縣宋無字子虛吳人生宋景定間嘗習舉子業科舉廢遂專工為詩比對精切造語新竒有隱居之趣所著有翠寒集啽囈集嘗舉茂異不就年八十餘卒張雯字子昭其先浚儀人宋有官御器械者從國南渡居錢塘再徙吳雯少力學嗜書所居臨市衢構樓藏書自經傳子史稗官百家無所不有其學無所不通而尤精於律吕每衆坐聞樂輒俯首顰蹙歎曰吾其不免乎於時宋亡已久故官老校猶有存者雯從之問宋遺事朝廷宗廟宫室輿服朝會宴享生殺除拜咸得其詳所著書曰繼潛録書畫補遺墨記子田字藝已亦攻文詞田子肯字繼孟一字寄夢少從金華宋濓學所為詩文清麗有法尤長於南詞新聲年八十餘卒所著有夢菴集顧權字用衡其先自蘭溪徙居崑山父達卿與雲峯胡先生同里友善期有子當使為士及得權篤意教之權能力學博通羣典尤究心於易為文章刻意有古作者矩度一字不當不苟出遭時多艱隱居不仕為鄉校師卒無子知州偰傒斯教授蔡基為買地葬於馬鞍山北門人私諡靖夷先生葛乾孫字可久生有竒氣貌偉特膂力絶人好擊刺戰陳之法以至隂陽律吕星數靡不精究長乃折節治經研覃淵邃入試屢下遂棄去不求仕肆力古學為文章陵轢古今沛如也父應雷取醫書授之乾孫稍治輒精而不屑施行或施之輒取異效一書生傷寒不汗發狂循河走乾孫就捽置水中良久出之裹以重繭乃汗而解一女病四支萎痺目瞪不能食乾孫命悉去其房中香奩流蘇之屬發藉地版相土為坎舁女置之扄其扉戒家人伺其手足動而作聲當報我久之女果舉手足而呼乾孫投藥一丸女明日自坎中出蓋女素嗜香脾為香所蝕故也壬辰徽寇轉掠蘇人震恐亷訪僉事李仲善請乾孫圖之乾孫勸城之以守然後請自往討賊李從之卒城之而事戢明年語光福徐顯曰聞中原豪傑方興而吾不得與命也今六氣淫厲吾犯咸池殆將死矣如期必於秋一日見武士開弓取挽之而彀歸而下血亟命其子煎大黃四兩子密減其半飲之不下問知之曰少耳亦無傷也我當以明年死今未也再服二兩而愈明年果卒年四十九所著惟醫學啓䝉經絡十二論傳周南老字正道本道州人濓溪先生之後宋季徙吳祖才父文英自有傳南老元季用薦授永豐縣學教諭改當塗縣代還會天下亂省臣奏為吳縣主簿僧普益殺人久不得尸南老移檄責縣神次日覺羣鳥飛繞有異跡其所止獲尸於湖濵縣稱神明尋辟為浙省掾上書言時政六事曰開荒田節財用通鹽法息奔競辨禮分公銓選除兩浙鹽運司知事進淮南行省照磨改江浙行省進權本省理問國初徴詣太常議郊祀禮禮成發臨安居住放還卒南老端毅好學其學本於義理而詳於制度所著有易傳集說喪祭禮舉要姑蘇雜詠拙逸齊稿子敏字遜學洪武中舉任長洲縣學教諭後與金華胡隆成同召以親老辭歸親終改廣東軍器局副使子汝安溪主簿淵遂昌知縣孫綱字文叙以薦授廣東融縣丞進知縣卒綱治融十有八年有惠政於融成化中都御史韓雍以融人思綱不忘奏綱子奎為融丞未幾進攝知縣兼攝羅城懷逺二縣後丁母憂改茶陵州判官卒謝徽字元懿長洲人至正中以詩經中浙省鄉試洪武初應召修元史史成授翰林國史院編修官兼教功臣弟子擢吏部郎中辭歸洪武六年再起為國子助教卒徽博學工文詞與髙啓齊名所著有蘭庭集弟恭字元功亦能詩所著曰蕙庭集王彛字當宗其先蜀人父某教授崑山彛遂留居於崑又徙嘉定少貧讀書天台山中師事孟長文長文為金履祥弟子故彛之學逺有端委為文精嚴縝密明暢英發不為諛詞以逐時好時楊維禎以文章雄視東南一時多尚之彛獨目為文妖作文詆之洪武初與修元史書成以母老辭歸後與髙啓俱坐魏觀事卒申屠衡字仲權長洲人少從楊維禎學通春秋為古文有法元季不仕自號樹屋傭洪武三年徴至京草諭蜀書稱㫖授翰林修撰以病免尋謫居濠上卒所著有叩角集同時有陶琛字彥珩者亦有文學洪武初以薦儒學官志尚髙潔工古篆書多得籕法子繼字承伯枝江知縣亦有能書名傅著字則明常熟人中元鄉試備榜洪武初與修元史為常熟縣學教諭卒官潞州知州所著有味梅齊稿若干卷王行字正仲吳縣人家素貧賤父某為人讎藥挈行自助行時數嵗閲藥千品悉志其某某主媪喜聽稗官小說即今世俗所云門詞行默記數本暇即為媪歌之主異之試授論語一帙翌日已成誦遂悉所儲書恣其披閲三年辭去授徒城北一時文名大譟尤善談論對客抽譯經史援據今古纚纚不窮然家徒壁立几無留冊叩其所自曰向得之藥主人耳洪武初郡學延為訓導諸生心頗易之以五經雜進問難行隨問辨答無有凝滯衆始驚曰王先生非詞章之學也郡守魏觀王觀先後薦于朝不報晚嵗將遊金陵或以時情叵測勸止之行不顧竟往館於貴臣藍氏藍得罪行亦坐死行有文武才尤喜論兵負其所有以訖於難君子惜之所著有楮園集半軒集學言稿通意宜資墓銘舉例唐律詩選共若干卷錢逵字伯行吳縣人父良佑字翼之博學工詩尤工篆𨽻元文宗時嘗被㫖書農桑輯要大學衍義廷臣交薦宜館閣不報至大間署吳縣儒學教諭既代輒不復出自稱江村民逵刻意力學年四十餘猶無宦情至正間江浙行省分治於蘇始起家授登仕郎分省管勾架閣尋除本省檢校官歷左右司都事升淮南行省員外郎洪武初選詣太常議禮禮成發居鳳陽未幾放歸後以事逮詣京卒逵為人淳厚雅飭稽古考訂雖老不倦其書雖傳家學而論者謂特過之篆𨽻行楷悉追古人妙處一時若參政王叔能平章達兼善咸推重之所著有櫓巢藳從姪復常湖二學訓導復子謐松陽教諭金文徵字德孺嘉定人洪武中為本縣儒學訓導尋登洪武三年進士為延安府鄜州同知州境與川蜀相接素號難治文徴優為之仕終國子學録從兄玫字德進號劬生亦攻文詞元季為長洲縣學訓導洪武初擢國子助教顧阿瑛字仲英别名德輝崑山人少輕財結客豪宕自好年三十始折節讀書益購古書名畫彛鼎祕玩築别業於茜涇西曰玉山集處日夜與客置酒賦詩其中四方文學之士若河東張翥會稽楊維禎天台柯九思永嘉李孝光方外之士若張伯雨于彥成琦元璞與凡一時名士咸主其家其園池亭榭之盛圖史之富與夫餼館聲伎並鼎甲一時而才情妙麗與諸公亦略相當風流文雅著稱東南嘗舉茂材署會稽教諭辟行省屬官皆不就張士誠入吳欲强以官乃去隱於嘉興之合溪既而以子恩封武略將軍水軍千戶飛騎尉錢唐縣男及母喪廬墓閲釋氏書有悟遂祝髮稱金粟道人自題其像曰儒衣僧帽道人鞋天下青山骨可埋若說向時豪俠處五陵鞍馬洛陽街洪武初隨其子元臣遷臨濠卒所著詩曰玉山璞藳萃亭館篇詠刻梓曰草堂名勝集又刻交遊諸公詩自楊維禎而下四十餘家曰草堂雅集同時有沈萬三及福山曹氏亦以財雄於吳而文雅不及郭翼字羲仲崑山人少從衛培學邃於易為文詞必欲追古作者楊亷夫謂其文可方軌西京李孝光謂其詩佳處與人不同調翼素有大志嘗出策干時貴不能用遂歸耕婁上老得訓導官竟與時忤偃蹇以終自號東郭先生又自稱野翁所著有林外野言秦約字文仲其先淮安人宋直龍圖閣觀之後始遷崇明其後再遷崑山父玉字德卿業儒有至行門人私諡孝友先生約至正間官崇德州教授洪武初應召試慎獨針拜禮部侍郎以母老辭歸再以寶鈔束帛徴詣京上疏陳乞復書院書堂義學例當復舊守令之選另立一科四十蒞職百日舉代郡邑三年造冊與志書同進以備國史採擇上悅以約年老難任繁劇計五百里授以儒官得溧陽教諭御史練則成待制吳沈薦約宿學遺老合在館閣不報在溧陽八年請老歸卒約文章務求理勝而詩尤工張潞公貢尚書師泰尤所推重所著詩文曰樵海集别有師友話言樵史補遺孝節録詩話舊聞崇明志馬麟字公振太倉人元季避兵於松江之南園池亭榭幽閴自娛屏絶世慮日誦經史為人不事修飾樂與賢士大夫交楊亷夫深器重之長於詩歌有醉漁草堂二集袁華字子英崑山人少頴悟不羣讀書一二過輒記誦不忘工詩尤長於樂府與顧阿瑛友善其家所藏書畫悉經品題楊維禎尤重其人以才子目之洪武初為郡學訓導後以其子為吏被罪坐纍卒于京師所著有耕學藳又有易恆九成者宋蓮峯先生斗南之後亦能詩勵行與華同為顧氏客洪武中應薦至京以老辭歸有陶情集偶桓字武孟太倉婁江人少嘗接識楊維禎倪瓉瓉謂其詩有超乘挽韁之力日升川至之漸洪武中以薦為崇安從事授廣西桂林河泊大使終荆門州吏目所著有江雨軒集醉吟録鳳臺吟嘯集殷奎字孝章一字孝伯其先自華亭徙崑山少從楊維禎授春秋嘗應鄉試不利遂謝去洪武四年以薦赴京試髙等例授州縣職因母老請近地便養忤意調陜西咸陽教諭盡心教事在任四年念其母不置鬱鬱而死年止四十有六門人私諡文懿先生奎文章精審有法尤深於性理勤於纂述所著有道學統緒圖家祭儀崑山志咸陽志關中名勝集陜西圖經婁曲業稿支離藳渭城寐語奎二弟壁字孝連箕字孝揚俱明經薦干孝友奎卒壁間關數千里迎其柩歸箕舉秀才試廣西僉事終太平府推官張簡字仲簡郡人初為黃冠師元季兵亂以母老歸養遂返巾服簡通儒家書尤工於詩饒介自號華蓋山樵嘗延諸文士賦詩時髙楊輩咸在簡詩第一即席贈黃金一餅有集若干卷金華王偉為之序葉顒字伯卬吳縣人家洞庭東山父國英倜儻好結內名士儒學提舉李祈國子助教宇文公諒並主其家故顒學有端緒尤長於詩元季中江浙行省鄉試署和靖書院山長意頗不樂挾策走燕京會天下亂流落濠亳間比歸而家已蕩然故人耿炳文以討張士誠纍功封長興侯遣人招顒欲薦於朝顒曰時去志違年幾知非無庸是為也乃益放情詩酒佯狂自恣自稱浮丘醉史竟客死長興又有許燁光逺者亦家洞庭洪武初應召至京獻詩又陳省刑薄賦之策以老乞歸賜布袍放還今山中有許山人林亭蕭字元則其先楚人國初徙居吳江再徙郡城其學長於春秋毛氏詩讀書樂道不求祿仕人稱竹園先生所著有湖山樵寓集子二潭字孟南庚辰進士終建始知縣湘字仲南永樂中舉秀才授中書舍人終大理評事俱有文學鄒奕字𢎞道吳江人秀目美髯貌若玉雪論議英發文詞髙古至正中登進士調饒州録事洪武初職風紀出知贑州府坐事謫甘肅二十餘年永樂初以蹇忠定公義薦召還有吳樵藳張適字子宜長洲人父澤元海道萬戶府總管適幼頴悟十嵗能賦詩彈琴時稱竒童嘗以詩經應江浙鄉試元季天下亂遂隱居不仕洪武初以秀才召擢水部郎中病免後復以明經薦授廣西布政司理問所提控案牘調滇池魚課司大使考滿改宣課司大使卒適博學攻詩文與髙啓楊基齊名所著有樂圃江館南湖滇南及甘白諸集孫祝宣德間由進士除大理評事正統初上疏言畿甸旱蝗乞暫停徴稅放免匠役蠲除倒死馬匹以蘇民困後坐事左遷處州知事改刑部檢校升大理左寺正升保定知府致仕卒陶振字子昌吳江人少學於楊維禎兼治詩書春秋三經洪武末舉明經授本縣學訓導嘗坐佃居官房逮至京進紫金山等三賦得釋改安化教諭卒振天才超逸詩語豪雋有名於時所著有釣鼇集周砥字履道吳人號掬溜生博學攻詩豪放自好嘗寓居無錫轉徙宜興之荆溪與馬治孝常者窮山水之勝著荆南倡和集晚歸吳中復與髙楊諸人結社兵興去客會稽竟死於兵砥效東坡書甚工亦工畫山水錢蘇字更生常熟人博學專攻性理洪武十年應詔上書至中書長揖不拜左右以為言蘇曰未拜天子不敢先拜丞相遂於本省聽辦事務數月不得召會有詔募撰祭元幼主文蘇亦擬撰以進有云朕之得復吾地方之固有汝之失棄其朔從所本無朕固無愧於汝汝亦將奚憾於朕哉上得之大喜即日召見欲官之以老疾辭賜歸卒蘇初名沂字伯與洪武初坐事當刑其子迪代之死故易今名曽孫昕字景寅宣德進士歷官湖廣布政以亷慎著稱同時有魚侃者亦常熟人歷官開封知府亦有亷名然昕故富家而侃貧人尤難之鹽山王公在吏部時常稱曰富不愛錢錢昕貧不愛錢魚侃吳文泰字文度吳縣人耽於詩清才逸思雖罹憂困而嘲弄不輟同郡丁遜學者名敏亦喜吟詠更相推敲故業益精洪武間為涿州同知謫戍雲中卒敏固窮而守志不回嘗主某氏師席有故人自逺來訪主家無留客意即束書要客歸主惶恐數謝過竟不就朱應辰字文奎吳縣人少治禮經為舉子元季屢試不中乃棄去從會稽楊維禎學為古文詞洪武初起為郡學訓導後改常之江隂卒應辰學博多伎能詩文衍暢炳蔚尤精篆籕之學所著有潄芳集三卷徐達左字良夫吳縣人少受易於鄱陽邵𢎞道再受書於天台董仁仲值時多故隱居光福山中家故溫裕喜接納四方名士置家孰合族屬子弟教之鄉黨遵化洪武初郡人施仁守建寧薦為其學訓導師道克立居六年卒于學宫所著有四字書十卷詩文集六卷虞堪字克用一字勝伯宋丞相允文諸孫也後家長洲隱居行義不樂仕進家藏書甚富多手自編緝其為詩清順則麗間寫山水亦有思致雅重先世手澤聞有雍公遺文雖千里外必購得之乃巳其從祖伯生遺稿亦堪所編今刻吳中張扆字翰宸嘉定人與弟粹中並有文才而扆尤工於書有晉人風致同時有阮維則者與扆昆季俱擅時名林大同字逢吉其先長樂人曽祖以下皆官常熟因家焉大同幼孤苦力學六經子史手自鈔讀不間寒暑洪武中為開封訓導以病歸永樂初再召卒以疾辭所著易經奧義并文藳若干卷滕用亨初名權字用衡後避諱更今名長洲人尚書德懋從子少從德懋遊學四方頗多見聞問學辨博文詞爾雅尤精六書之學其篆𨽻之妙髙出近世永樂三年被薦時年幾七十矣召見面試篆書用亨作麟鳳龜龍四大字以獻又獻禎符三詩稱㫖授翰林待詔預修永樂大典在官四年卒時篆𨽻書稱用亨及長樂陳登然筆意清古不及用亨也用亨尤善鑒古器物書畫嘗侍上閲畫卷衆目為趙千里用亨頓首言筆意類王晉卿及終卷果有駙馬都尉王侁名趙友同字彥如長洲人系出宋南陽侯父良仁工醫在藝術傳友同沈實溫雅有行誼自少篤學嘗從宋濓游洪武末任華亭縣學訓導永樂初滿考當遷會姚廣孝言其深於醫遂授太醫院御醫又有言其知水事者詔從夏原吉治水浙西其後大臣數薦其文學及修永樂大典遂用為副總裁又與修五經四書性理大全書書成當遷翰林以母喪去卒於家弟友泰子季敷孫同魯俱世其學梁時字用行始家吳江遷長洲博學工文章以氣格為主不事纎麗亦善筆札洪武中用薦授職岷府紀善遷翰林典籍修永樂大典充副總裁有噫餘集樓澄字文淵父紹自鄞徙吳澄生而孤母守節保訓成立母患瘰癧卒澄終身不食栗早從貝翺學深於書晚更嗜易嘗教駙馬都尉胡觀家及歸夏尚書原吉與論水利欲薦之以疾辭有林臯鼓缶等集子日宏世其業日宏子序字仲彛與同時錢腴字時用皆以文學稱錢紳字孟書其先自泰州徙吳父中善琴見藝術傳紳少讀書修行與其表兄陳檢討繼連居一時儕輩數人同業各以所能更互辨難以相資益後領鄉薦授本府儒學訓導升鄞縣學教諭紳平生無世情與人無疃畦家藏書甚富多手自鈔録弟纓靖安州同知劉溥字原博長洲人祖彥敬事太宗於潛邸為良醫父士賔太醫院判見藝術傳溥夙敏悟侍親游學兩京研覃載籍尤精於天文律厯之學有志用世宣德初以文學徴有言其善醫者遂以為惠民局副使己巳之變知者交薦不報滿秩調太醫院吏目非其志也其醫通內外科然恥以自名雖官為醫而日惟以詠詩為事風致甚髙善接納無所擇文武雅俗各得其歡廣坐中談辨風生聽者傾耳其詩初喜西崑所擬輒似晚益竒縱自經時變悲愁歎憤一寓於詩當時有晏鐸王淮湯𦙍績蘇平諸人以詩自豪號十才子每推溥為盟主云溥所著有草窗集若干卷鄒亮字克明長洲人善屬文才思藻麗受知巡撫侍郎周忱正統初郡守况鍾薦其才擢吏部司務轉都察院司務遷監察御史為人謙謹酷嗜書積至千餘卷手自鈔録讎校所著有鳴珂潄芳等集二十餘卷又撰詩宗韻海未成卒弟順字克和宣德乙卯以春秋中順天府鄉試授工部主事改刑部歷員外郎郎中遷辰州知府致仕卒為人坦夷無他腸所著有學言藳鄭文康字時乂崑山人性豪俊有竒志登正統戊辰進士見者咸以公輔期之既而父病得請歸養未抵家而父亡母亦尋卒文康悲悼數年加苦宿疾遂不復仕嘆曰功業由人亦由乎天顧篋中得平日所為詩文數千首手自去取取其紀載時事有益勸懲者為平橋藳十卷沈愚字通理號崆峒生崑山人世業醫至愚讀書工詩與劉溥諸人稱十才子其詩清美圓熟尤長於古風有篔籟集二十卷吳歈集五卷弟魯字誠學號𤣥谷子亦博學工古文竒麗閎肆一時稱為作者所著有經制權略五卷坐道論二卷季弟訥别有傳賀亷字以清吳縣東洞庭人邃於易癸卯中京闈第二授連江儒學訓導校課生徒終日不倦升代府紀善為人簡嚴屢以抗言忤當道故官不達仕終福建按察知事家居以經義教授鄉里多所造就子元忠壬辰進士纍官雲南按察副使致仕張淮字豫源吳縣人少業舉子一試不利輒棄去學詩蜀人徐公子者以詩自豪僴然謂吳中無人嘗自誦其蘇臺覽古之作淮隨誦隨和立成二首皆出其意外徐噤不敢復言明日遁去又嘗於廣座中援筆賦牡丹詩一百首依元僧明本梅華詩韻衆以為神嗜酒落魄一日醉死同邑有陳韶大和者亦縱酒工詩其名稍劣於淮亦為當時所尚劉昌字欽謨吳縣人性頴敏書過目輒成誦弱冠中鄉試第一會試禮部第二以進士授南京工部主事召領纂修祕閣出為河南按察副使董學政嘗著河南志又收集名賢遺文作中州文表卒官廣東左參政昌博學多聞豐於文辭性與人寡合所著復有五臺集及懸笥瑣探子嘉䋭亦工詩文早夭陳頎字永之長洲人景泰中以春秋領鄉薦授開封府武陽縣學訓導未幾致仕歸卒頎博學工古文而清修介特人莫敢犯雖位止校官而譽望特重其文典贍有法好論議而必根於理所著有適楚遊梁諸録洪都紀行味芝集别有紀事之書曰閒中今古杜庠字公序長洲人少從崑山張和學同輩忽之張曰此進士才也不二年遂占應天鄉試登進士第出知攸縣頃之罷歸庠有逸才又不得志遂放意詩酒往來湖浙間嬉笑怒罵咸發於詩所著有楚游集江浙歌風奚昌字元啓吳縣人少遊鄉校有雋聲正統甲子以易經中鄉試十試禮部不中遂易尚書諸經亦皆涉獵酷好作詩每大衆中舉手搖足輒為推敲之狀或見其不利也以是尤之昌曰彼不售者豈盡以詩邪後進生得昌指授多取髙第昌年且五十始中甲科因笑曰吾舉業豈至是始工邪明年卒於京師昌平生賦詩甚多妻惡其苦吟盡取其稿焚之故其集無傳陳震字起東長洲人少頴異數嵗屬對警絶時目為竒童弱冠領鄉薦授濟陽訓導升寧德教諭所至能率其職都御史張瑄薦于朝不報以例改江山縣卒震為人類簡率而清慎不茍作官三十年家猶赤貧先是震嘗受知於郡守朱勝震後考浙江鄉試其子懷金投之震峻拒不與見士論益髙之顧珣字文之吳縣人性亷介舉進士居京師謝絶餽遺以病在告者十餘年未嘗干謁府縣當道者以其貧貺以白金堅辭不內同時進士盛賅吳江人後有顧竑亦吳縣人其清介俱與珣並皆未受官而卒周庚字原已初名京吳縣人家世業醫而庚喜讀書工古文詞隱居養親初無仕意成化中以名醫徴辭不獲勉强赴京簡入御藥房尋授太醫院御醫遷南京太醫院判卒庚為人清慎文雅狀貌瞿然雖官為醫而業文不廢其詩沈鬱腴豐有竒氣尤善行楷然皆不茍作陳琦字粹之吳縣人以醫籍居京師登成化丙戌進士授南京大理寺副歷寺正出為江西按察僉事升貴州按察副使所在執法不撓在江西嘗忤時貴後其人秉銓竟以私意罷琦物論譁然琦歸吳貧不能為生時與學者解經及鬻書自給有所感觸輒發於詩窮嵗不休有冷菴集藏于家張習字企翺吳縣人成化己丑進士授禮部主事歷員外郎出為廣東提學僉事習喜為古文詞尤喜搜輯郡中遺文故實一時號為博雅前輩文集多所梓行嘗纂蘇州志未成而卒桑悅字民懌常熟人少有竒質書過目輒不忘年十七領鄉薦會試禮部中乙榜以例抑受泰和縣學訓導遷長沙府通判調栁州府歸卒悅喜莊騷家言特長於賦然縱誕不羈恃其敏悟下視無人人多尤之趙寬字栗夫吳江人少聰慧有聲場屋辛丑會試名在第一歷官刑部主事員外郎郎中升浙江提學副使人材多所造就升廣東按察使月餘而卒寬為人平易間雜人樂與交為文豐贍葩藻下筆數千言可立就詩亦清俊同邑吳字汝礪丁未進士亦以文學得名詞翰與寬相上下歷官兵部郎中以疾告歸卒于途瞿俊字世用常熟人成化己丑進士除崇仁知縣擢監察御史終廣東按察司副使俊居官不修邊幅而有亷潔之操詩文清雅可取姑蘇志卷五十四
