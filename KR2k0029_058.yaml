body:
  text: 姑蘇志卷五十九明王鏊撰紀異甚矣人之好怪也昔夫子不語怪而後之人唯怪之欲聞稗官雜家紛紛不可勝紀雖然亦不可謂之盡無也掇其稍近理者以廣異聞焉爾吳王闔廬得寶劍三曰魚腸盤郢湛盧湛盧一日水行以如楚昭王得之於牀召風胡子問焉風胡子曰此謂湛盧之劍吳子得越所獻者其劍有五魚腸已用殺吳王僚盤郢以送其死女今湛盧則入楚也昔越王元常使歐冶子造劍五以示薛燭燭曰魚腸劍逆理不順不可服故闔廬以殺王僚盤郢亦毫曹不法之物無益於人故以送死湛盧五金之英太陽之精寄氣託靈出之有神服之有威可以折衝然人君有逆理之謀其劍則出故去無道以就有道也吳越春秋吳王闔廬伐石治宫室石中得紫文金簡之書不能讀使使者詢仲尼曰吳王閒居有赤雀銜書置殿前不知其義故逺咨訪仲尼視之曰此乃靈寶長生之法禹所服之禹將仙化封之名山石函之中今赤雀銜之殆天授耶抱朴子吳王夫差時有雙鷺飛出鼓中而去古今樂録吳王夫差小女名玉悅童子韓重欲嫁之不得乃結氣而死重游學歸知之往弔於墓側哀慟玉形見顧重延頸而歌曰南山有鳥北山張羅鳥既髙飛羅將奈何志願從君讒言孔多悲怨生疾沒命黃壚命之不造寃如之何羽族之長名為鳳凰一日失雄三年感傷雖有衆鳥不為匹雙故見鄙姿逢君輝光身逺心邇何當暫忘歌畢歔欷泣下要重還冢重曰死生異路不敢承命玉曰生死異路吾亦知之然一别永無後期子將畏我為鬼而禍子乎重感其言送之還冢留三日三夜臨出取徑寸明珠遺重曰若至吾家當致敬大王重出遂詣王說其事王怒其造言玷穢亡靈將收重重脫走至玉墓所訴玉玉曰無憂今歸白王乃復形見於父以明重之事夫差異之悲咽流涕因捨重以子壻之禮待之搜神記吳王夫差坐殿上獨見四人向庭相背而倚聞人言則走王怪問羣臣子胥曰如王言將失衆矣王怒其言不祥子胥曰非唯不祥王亦亡矣後五日王坐殿上復見兩人相對北向者殺南向者王復怪問羣臣子胥曰四人走叛也北向殺南向臣殺君也王不應吳越春秋繇余氏墓在虎丘吳越王嘗於報恩寺側發一墓僧止之弗從俄見一人古貌長身語曰我帝堯之臣繇余氏也與陶臣氏烏他氏佐禹治水以功封吳葬於此僧復為掩之見錢希白記後漢時姑蘇忽有男子衣白衣冠白冠形神修勵從者六七人遍擾民居欲掩害之即有風雨郡兵不能擒術士趙晃聞之往白郡守曰此妖也欲見之乎乃淨水焚香長嘯一聲大風疾至聞空中數十人響應晃怒擲手中符如風頃若有人持物來前者晃曰何敢幻惑如此隨復旋風擁去晃謂守曰可視之使者出門人已報云去此百步有大白蛇長三丈斷首路傍其六七從者皆身首異處亦黿鼉之屬三吳記稽神異苑吳孫堅世仕吳母懷妊母夢腸出繞吳閶門寤而懼以告鄰母鄰母曰安知非吉證也已而堅生又云堅母孕時夢腸出繞腰有一童女負之繞吳閶門三匝天授以芳茅一莖童女語云曰此善祥也必生才雄之子今賜母此茅土王於翼軫之地鼎足於天下不出二百年語畢而覺及旦筮之卜人曰童女太白之精也王子年拾遺吳天册元年吳郡言掘地得銀長一尺廣三分刻上有年月字於是大赦改元晉元興十一年京都火災大行吳界尤甚時王𢎞守吳郡晝坐㕔視事忽見天上有一赤物下狀如信幡遙集路南人家屋上火遂大發𢎞知天為之災故不罪始火之家識者知晉室衰微之象也元康中吳郡婁縣懷瑤家忽聞地中有犬聲視聲發處有竅大如蚓穴以杖刺之入數尺覺有物掘視之得犬子雌雄各一目猶未開形大如常犬哺之而食還置竅中覆以磨礱越宿視之失所在矣瑤家亦無他太興中吳郡府舍中亦得此二物其後太守張茂為吳興兵所害尸子曰地中有犬名曰地狼夏鼎志曰掘地得狗名曰賈蓋此類也法苑珠林神異記永嘉元年吳縣萬祥婢生一子鳥頭兩足馬蹄一手無毛尾黃色大如碗晉書五行志歷代神異感應録永嘉中吳郡趙文昭宅在清溪橋與吏部尚書文叔卿宅相近秋夜對月臨溪唱烏栖之詞音㫖凄然忽有一女子從女婢來姿態端麗云妾是文尚書家女也比去解金纓留贈文昭答以琉璃杯後遊清溪廟忽見琉璃杯在神女前又顧其壁畫侍女並是偕來者續博物志永嘉五年吳郡張林家有狗忽作人言云天下人俱餓死於是果有苻石之亂天下饑荒焉東晉太興中吳民華隆養一快犬號的尾常將自隨隆後至江邊伐荻為大蛇盤繞犬奮咋蛇蛇死隆僵仆無知犬倣徨涕泣走還船復反草中徒伴怪隨往見隆悶絶將歸家犬為不食比隆復蘇始食隆愈愛惜同於親戚太興二年吳郡米廩無故自壞是嵗大饑晉書五行志成帝時三吳女子簮白花望之如素㮈傳言天公織女死為之著服俄太后杜氏崩花木録隆安初吳郡中狗常夜吠聚臯橋上人家狗有限而吠聲甚衆或有夜覘視之一狗有兩三頭者皆前向亂吠無幾有孫恩之亂歷代神異感應録景平中郡守顧琛初為朝請謁假還東日晚至方山于時商旅數十船悉泊岸側有一人𤣥衣介幘執鞭屏諸船云顧吳郡部伍尋至於是諸船各東西俄有泊向處人云顧吳郡早晚至船人答無顧吳郡又問何船曰顧朝請耳莫不驚怪琛意知為善徴因誓之曰若得郡當於此立廟至是果為吳郡乃立廟方山號白馬廟云慧聚寺殿柱梁張僧繇畫龍其上後龍數出湖內僧繇又畫鎖鎖之唐㑹昌中寺廢以柱留郡中至大中間寺復興以柱還淳熙中寺火柱遂燬又有二柱於雷火中各有天書如大篆一績溪火三字一蜿蜒蟠結若符篆在柱裏人莫能曉大小近二尺許好事者或模印之慧聚寺紹明律師居半山彌勒閣一夕夢神人曰簷前梧桐下有石天王像與銅鐘師宜叩之訖旦掘地果獲二物制度極古前輩嘗有詩云一旦石像欲發見先垂景夢鳴髙岡吳人費季久客于楚時道路多冦妻常憂之季與同輩旅廬山下各問去家幾時季曰吾去家數年矣憶與妻别時戲取其金叉著户楣上臨發失與道此是夕妻夢季曰吾行遇盜死已二年吾行時嘗取汝叉留户楣上可往取之妻覺揣叉得之遂成服發喪後一年餘季來歸搜神記宋劉元字幼祖少與劉裕善而輕何無忌遂不相得乃去遊吳郡虎丘山心欲留焉夜臨風長嘯對月鼓琴於劍池上忽聞環珮音一女子衣紫羅之衣垂鈿帶謂元曰吳王愛女願來相訪元曰吳王愛女豈非韓重妻紫玉耶與元偕行女謂元曰聞君與劉裕相得裕是王者然與何無忌不美此人恐為君患若北還仕魏朝官亦不減牧伯忽不見乃在一大陵松樹下約去虎丘三里許元乃北去仕魏纍官青州刺史稽神異苑吳子英者舒鄉人善入水捕得赤鯉魚愛其色好持歸不殺養池中飼以米穀一年長丈餘生角有翅子英怖拜謝之魚言我來迎汝上我背與汝俱升天嵗來歸見其妻子魚復過之故吳中門户並作神魚子英祠隋大業十二年五月有大星隕于吳郡為石占曰有亡國有為王有大戰破軍殺將其後大軍破劉元進于吳郡斬之又感應録載劉元進舉兵據吳郡江都郡丞王世充發兵擊之有大星墮于江都未及地而南磨拂竹木皆有光飛至吳郡遂墮地元進惡之令掘地得一石徑丈餘歷代紀異感應録唐儀鳳中有儒生栁毅吳邑人也應舉赴咸京下第歸至涇陽見一婦牧羊曰妾洞庭君小女嫁涇川次子為婢所惑得罪舅姑毁黜至此敢寄尺牘於洞庭之隂有大橘樹君擊樹三當有應者毅如言見千門萬户曰靈虛殿一人取書進之君泣曰老夫之罪使懦弱罹害言未畢有赤龍長萬丈擘天而去俄而祥風慶雲幢節玲瓏紅粧千百中有一人即寄書者乃宴毅於碧雲宫辭去後再娶盧氏貌類龍女曰豫即洞庭君女涇上之辱君能救之茲奉閨房永以為好同歸洞庭莫知其終今洞庭東山有栁毅井吳城住宅有栁毅橋鄉人以水仙神立祠二處大厯初處士李籝秋夕於震澤捨艫野步望中見煙火意為漁家漸近即朱門粉雉嘉木修林畫舟倚白蓮中籝異其境徘徊未敢前俄有青衣出曰君非李處士乎願得少進籝隨步而入瑣窗洞户中有女郎狹體瓌質衣如雲霓揖生曰今夕何夕邂逅相逢命青衣寫酒於珊瑚鍾以勸侍兒數輩執樂作歌歌玉波泠雙蓮之曲曰此傷吳宫二隊長之辭某非人也生於龍宫好楚詞君能受我一篇傳於世人乎乃以水晶簮扣盤而誦芷秀藥華之詞俄聞鐘聲隔水女郎曰此非清虛之士不得遊持素綃送生出門閉扉悄然生徐步清潯朝日已上廣陵有人識其綃曰此龍頷小髯所緝也樹萱録大厯中洛陽劉貫詞行丐於蘇市逢秀才蔡霞者以兄呼貫詞因問曰兄日丐獲幾何而止曰十萬霞曰霞居洛中以他故避地音問久絶意有所託祈兄為逹於是遺錢十萬授書一緘且曰霞家渭橋下瞑目扣橋柱當有應者願與家母相見書中亦令小妹出拜使助贈百緡貫詞遂還至渭橋叩之輒一人引入㕔見太夫人謝曰兒子失意逺遊久絶音耗勞君數千里逹書俄有青衣曰小娘子來年可十五六坐母側具饌甚精方對食母忽眼赤直視貫詞口角涎下女急掩母口曰兄憑來冝且禮待因曰兄書中處分合與百緡因命取鎮國碗授貫詞女曰得錢十萬即貨之貫詞持碗出回顧碧潭危橋手中器乃一黃銅碗忽有過客視之大喜以百緡易之曰此罽賓國鎮國碗也在其國大穰既失此碗國大荒兵戈大起吾聞為龍子所竊幾四年其君方以國中半年之賦召贖罽賓守龍上訴霞所以避地隂冥吏嚴不得陳首藉君為郵送之耳殷勤見妹者非故親也其母老饞或相啖以其妹衛君耳續元怪録大厯十三年虎丘寺有鬼題詩隱于石壁之上詩曰青松多悲風蕭蕭聲且哀南山接北山幽壠空崔嵬白日空昭昭不照長夜臺雖知生者樂魂魄安能回况復念所親痛哭心肝摧慟哭復何言哀哉復哀哉又曰神仙不可學形化空遊魂白日非我朝青松為我門雖復隔幽壠猶知念子孫何以遣悲怨萬物歸其根寄言世上人莫厭臨芳樽莊生問枯骨至樂復虛言蘇州觀察使李道昌異其事遂具奏聞勑令致祭道昌祭文曰嗚呼萬古丘陵化無再出君是何人能間詩筆何代而亡誰人子姪曽作何官是誰仙室寂寞夜臺悲呼白日不向紙上石中隱出桃源三月緑草垂楊黃鶯百囀猿聲斷腸不題姓字寧辨賢良嗚呼痛哉嘆惜先賢空傳經史終無再還青松嶺上嵳峩碧山大唐政集已記詩言痛復痛兮何處賓悲復悲兮萬古墳能作詩兮感天地聲哀怨兮淚沾巾感我皇兮列清酌願當生兮事明君祭後數日石上復隱出詩一絶詩云幽冥雖異路平昔忝攻文欲知潜寐處山北兩孤墳寺之北有兩墳甚髙大荆蓁叢蔚詢諸耆老莫知何人所葬郡人顧况喪一子年十七其子游魂恍惚如夢不離其家顧悲傷不已因作詩哭之詩云老人苦喪子日暮泣成血老人年七十不作多時别其子聽之因自誓曰若有輪回當再為顧家子忽一日如被人執去一處若縣吏者斷令託生顧家顧果復生一子至七嵗不能言其兄戲批之勿心曰我是爾兄何故批我一家驚異隨叙平生事歷歷不誤乃知陽叔子事非怪其子即非熊也貞元中太湖松江之口有漁人為小網數船與其徒十餘人下網取魚無所獲惟得一鏡七八寸許漁者恚不得魚棄鏡於水移船下網又得鏡漁者異之取鏡自照見其筋骨臟腑歷歷可怖其人悶絶而仆衆大驚共取鏡鑒形照者即仆皆嘔吐狼藉最後一人不敢照直取投之水中良久扶持仆者始醒明日復往下網所得魚多於常時數倍其人先有疾者自是皆愈詢故老此鏡在江海數百年一出人亦罕見原化記元和九年有李公佐者訪友東吳從太守元公錫登洞庭包山宿道者周焦君廬入靈洞得古嶽瀆經第八卷文字竒古編次蠧蝕公佐與焦君共詳讀之云禹理水三至桐柏山驚風迅雷石號木鳴五百擁川天老肅兵不能興禹怒召集百靈授命䕫龍桐柏千君長稽首請命禹囚鴻䝉氏章商氏兜盧氏犂婁氏乃獲淮渦水神名無支祈善應對辨江淮淺深源流逺近形若猿猴縮鼻髙額青軀白首金目雪牙頸伸百尺力踰九象搏擊騰踔蹻疾輕利禹授之童律不能制授之烏木田不能制授之庚辰能制之木魅水靈山妖石怪奔號叢繞以千數頸鎖大索鼻穿金鈴徙淮隂龜山之足俾淮水安流注海庚辰之後圖此形者免淮濤風水之難先是永嘉中李湯為楚州刺史有漁人夜釣龜山下其釣為物所掣不復出漁人疾沉可五十丈見大鐵鎖盤繞山足以告于郡湯命善游者數十人取鎖力不勝加以五十牛鎖乃振動稍稍就岸濤驚浪翻觀者大駭鎖窮見一獸如青猿白首長鬛雪牙金爪闖然上岸髙五丈許蹲踞若獼猴但兩目不能開兀若昏醉目鼻水流如泉涎沫腥穢不可近久乃引頸伸頭忽開目光彩若電視人欲發狂怒衆奔走乃徐徐引鎖并牛入水時楚多知名士皆相傳驚愕莫知其為何物今考李公佐得嶽瀆經於洞庭始知李湯相見與經相符入幕間談郡城東禪院古佛像容貌端麗頂珠圍徑數寸乾符甲午嵗忽放紅黃青紫光於時士庶觀瞻施財山積有老人惑其事固請梯升即佛光熖而窺之乃見佛像之首有一穴捫之有二白鼠長可尺餘自穴躍出緣佛首鼠穴正值藻井中遂探穴中得碎幡數片以紅幡映頂即紅光出青黃紫亦然人皆嘆息而去鹿門子曰佛金仙也而白鼠之禍作光於頂得非金氣盛乎是後金革遂興中和中有士人蘇昌逺居蘇州屬邑有莊去官道十里許水鄉多荷芰一日見一女郎素衣紅臉若神仙中人與蘇相狎生以玉環贈之結繫殷勤檻前白蓮花敷開殊異俯而玩之花房中有物細視之乃所贈玉環也折之遂絶北夢瑣言文德中京官張氏子寓蘇臺時往來丈人陸評事院為一美人所悅久而心疑之遂病瘠遇開元觀道士吳守𤣥云有不祥之氣授以一符果一冥器婢子背書紅英字在空舍柱穴中焚之乃絶北溪瑣言宋咸平元年夏四月漁婦李氏張􅊻河上得一白龜如錢其色玉瑩電眸朱尾宫畫燦然取歸授兒為戲恐傷之放於河頃之龜復在網如是者三婦怪之復棄去中夜岸有火熒然往視之龜在焉因取歸近村王道榮留龜置神像前翌旦遂失去私念此或靈物若䖍禱當復見則必獻於官禱之龜忽自鼠竇中出乃獻於縣令李維維上之郡時陳省華守郡異之即具表以聞時張君房客於蘇省華以其事訪之君房曰按瑞應圖千嵗龜巢蓮葉上其出也其將以應千嵗之運乎且白西方色也龜歸也豈西邊敵人之懷歸乎明年朔方叛帥李繼遷來獻馬請命遂有銀夏綏宥四鎮之拜其秋試進士以崑山進白龜詩為題慶厯中李元者管城人泛舟過吳江岸傍見小朱蛇長尺餘為牧童所困元疑其怪物以百錢售得洗去傷血放茂草中明年復經吳江縱步長橋有進士朱浚來謁曰大人願見君子年老不出敢爾坐邀所居去橋數百步耳元拒不獲已乃相從過橋已有彩舫艤岸浚拉元登舟俄至一山乘元以肩輿倐至其處臺殿森嚴王侯之居也一人髙冠道服立殿上曰此吾王也浚引元升殿再拜王答拜曰小子閒遊江岸不幸為頑童所辱幾死其手賴君子救此微命恩莫可忘元始記救蛇事王顧浚令百拜乃置酒髙㑹且曰吾欲少報君有女童年未笄君若納之當得其助又以白金百斤遺元乃别去與女升舟頃至長橋女童自言小字雲姐年十三矣言笑惠敏元甚愛之後二年科詔下明日當試女童曰我為君入禮闈竊所試題不久復還探懷出題元檢視宿構明日入試果符合既捷薦名遂調丹陽簿女童忽辭去不復見朱蛇記皇祐中蘇州民家有人以白堊書其墻壁悉以在字一夕之間數萬家無一遺者至卧內深隱之處亦皆有之莫知其然後亦無他嘉祐中崑山縣海上有一船桅折風飄泊岸船上三十餘人衣冠如唐人繫紅鞓角帶短皂衫見人皆慟哭語言莫辨試令書字亦不可讀行則相綴如鴈行有頃自出一書示人乃唐天祐中告授新羅島皆用漢字蓋東夷之臣屬髙麗者時贊善大夫韓正彥為縣令召其人犒以酒食復使人為治桅為造轉軸教其起倒之法其人皆以手捧首而謝船中有諸榖惟麻子大如蓮的蘇人種之初嵗亦如蓮的次年漸小數年後只如中國麻子熙寧六年六月龍見於郡東方黑龍二北方白龍二雲氣盛作而不雨獨承天寺前雨三寸元豐元年七月四日夜蘇州大風雨水髙二丈餘漂蕩尹山至吳江塘岸洗滌橋梁沙土皆盡惟石僅存崑山張浦沙保有六百户悉漂盡惟餘五空屋人亦不存元豐四年七月蘇州大水西風駕湖水浸沒民居濱湖者皆蕩盡或舉家不知所在松江長橋亦推去其半南至平望皆如掃內外死者萬餘人元豐四年夏駕里民羅滿獲一鯉長可二尺俄化為石觀音像因供于家時慧聚寺僧守齊夜艤舟于此夢白衣女子曰我舟覆父與夫皆溺死師幸容我守齊拒之女曰假一篋宿何傷守齊開篋納之遂驚悟迄旦至羅氏家見石觀音初出水身猶沮洳叩之知其魚化也守齊默念與夢合因乞以歸崇寧間奉議郎許白治第於蘇解木中有天下太平四字筆勢邁逸許嘗以其事聞談選城中張比部員外家冨盛甲第冠於二浙崇寧間大興土木鑿池取土築堂址掘地數尺得一蛇細如箸然蟠結穹隆其長不可勝計比部之子命僕夫斷為數百截而輦去之凡運致十八九擔而後盡時人戲目其堂為太嵗堂然亦無恙夷堅志宣和間楊崈字之損為吳江丞治所枕太湖㕔西有湖山堂堂設石棊局一日薄暮聞下豫聲小吏走觀見青巾二人對奕聞人來即凌波而去視局上已五十許子崈按為圖以示善奕者歎其妙而莫能殫其意父老相傳以為竒事丞郭某所記宣和間盛章守郡譙樓火有得一木於煨燼之餘析而為薪中有大吉二字遂獻諸朝時郡學立石石夜有光教官作瑞石放光頌亦以上聞又一日雷震大成殿柱火光滿庭東北楣上遺一四帶青布巾大可貯五斗粟教官命以香案置庭中夜半失去邊知白字公式祖塋在平江之蒸山宣和中為太學學録得武洞清石本羅漢十六紙遣家僮致之墳庵前一夕行者劉普因夢十餘僧持學録書來求掛塔以白主僧慧通通難之曰庵鮮薄安能容大衆哉來者一人取筆題詩門左曰松蘿深處有神天不憶其他語明旦話此夢未竟而石本羅漢至數內一人即夢中所見題詩者也由是公式足成一章詩云松蘿深處有神天小剎何妨納大干掛塔定知宜久住歌吟何幸得留傳袖中出簡聊應爾門上題詩豈偶然顧我未除煩惱習與師同結未來緣庵曰慶雲至今遺址尚存夷堅乙志崑山臨江鄉有南翔寺初掘地得石徑丈餘常有二鶴飛集其上僧有齊法師者即此地作精舍聚徒居之鶴飛來無定方隨飛來處其方必有人來施財作供無日不驗久之鶴去不返僧為之號泣石上忽有題一詩詩云白鶴南翔去不歸惟留空跡在名基可憐後代空王子不絶薰修享二時因名寺曰南翔寺之西有村曰白鶴石浦真武殿前新甃石池一夕大風雨雷電翌旦滿池皆大金魚莫知所從來紹興元年石工採石於馬鞍山山摧工壓焉越三年六月他工採石聞其聲相呼應答如平生報其家鑿出之見其妻喜曰久閉乍風肌如裂俄頃遂噤不語化為石貌如平生南渡時髙麗國進隂陽柏二株僅二尺許髙宗以賜王綯綯種之永懷寺殿庭之左右今柏髙與殿齊每嵗左花則右實右花則左實寺乃綯之祖審琦香火院也玉峰志淳熙中姑蘇民家有唐姓者一兄一妹皆丈有二尺里人謂之唐大漢不復能嫁娶每行或倚市簷憩坐出則傾市觀之日啖斗餘無所得食因適野為巨室受囷粟蓋立囷外即可舉手以致不必以梯也以是背微傴有璫以賂使客見之大驚遂入奏詔廩之殿前司時郭棣為帥以周伯太府簿召至京間一往必敬諾其聲如雷德夀時欲見之懼其聚民乃卧之浮于河至望仙專舟焉桯史開禧中嘉定市徐公坊有釀酒家屢耗失每疑役夫盜飲一夕坊人露坐俄見月下有人自坊中出跡而逐之至橋不見乃石橋兩傍所刻人像也鑿之乃息嘉定中談承務思通創庵名崇夀鑿井得木佛金粉雖褪模刻宛然因大拓規模名靜信寺像設未備忽一夕夢大龜云願以身嚴佛像翌日見一大龜引六龜乘潮至浮於崛浦之上思通嘆曰吾安忍害物命以營繕乎遂縱于海未幾崇明州登仕施光逺者亦感是夢遂取殺之得玳瑁鬻錢詣談氏以成佛像光逺者思通之姻眷也二人㑹次言之若合符節今寺勒石以記紹定中張廣年權縣事譙樓有巢鶴帶箭造庭哀鳴若訴廣年視箭首得弋人姓名追懲之鶴乃去謝邈之守吳興帳下給使鄒覽乘樵船夜至平望亭風雨船無所庇顧見塘下有燈火往投之茅屋中見一男子年可五十方織簿别牀有小兒年十嵗許覽求寄宿欣然相許小兒啼泣不止覽問何意曰是兒以其母當嫁悲戀故啼耳將曉覽去回視所在唯有兩冢榛莾甚深行逢一女子謂覽曰此間非人所行君何故從中出覽具以夜所見事告女子曰此吾故夫與亡兒所瘞處也吾實欲改適故來辭墓因匍匐至冢號咷遂不復嫁録異記松陵陳益少有俊才領鄉薦嘗夢一人衣道服促左右於巾笥中取緑衣靴笏與衣之益詢左右則曰楊文公也益穿袍覺毛骨寒凜似不能勝道服者嘆曰惜乎有此才而無此緣即命褫去益後不一年卒談選宋韓子師彥古鎮平江夜聞鼓笛喧訇問何處作樂老兵言後園百花大王生日府民年例就廟獻送韓意謂非典祀行將毁之兵馬都監某人於是夕夢重客入謁曰吾百花大王也久獲血食府園今府主將毁吾居願賜一言勸止都監醒寤旦詣府稟曰尚書欲拆百花廟乎韓驚曰夜來有此念初不形言君何由知之都監具以夢告韓歎其靈遂寢所議宋之末年郡中有賣餅家檢所鬻錢得冥幣焉因怪之每鬻餅必識其人與其錢久之乃一婦人也跡其婦至一冢而藏遂白之官啓冢見婦人卧棺中有小兒坐其側好事者收歸養之既長與人無異鄉人呼之曰鬼官人元初猶在閒居録將仕郎陳敏功妻家居吳門比鄰嘗有人夢神人披髮持刃部集數十鬼物每經民居即呼其人出各分飲一杯至劉承議家則曰此家不食牛肉已二十年當免其疫吳門大疫鄰巷病亡者比户不遺獨劉舉家無恙談選吳中父老相傳二䜟一曰穹窿石移狀元來歸一曰潮過夷亭出狀元淳熙初穹窿山中一夕聞風雨聲詰朝視山半有大石自東徙西屹立如植所過草猶偃辛丑科吳縣人黃由遂狀元及第夷亭在崑山縣西三十五里崑山雖濱海自古無潮汐紹興中始有潮至縣郭至是潮忽大至遂過夷平李彥平侍御親見一道人復誦此䜟乃告知縣葉自强作問潮館於水濱甲辰科崑山人衛涇亦為狀元黃衛相繼大魁天下傳為竒事平江市人周翁病瘧不止或言瘧有鬼可於他處避之翁以昏時入城隍廟中潜伏神座下祝史皆莫知也夜半忽見燈燭陳列兵衛拱侍城隍臨軒坐黃衣卒徒從外引七八人至庭下皆衣冠者王問曰吾被上帝敕令於此邦行疫爾輩名為一坊土地神毋致稽緩七八人皆頓首聽命中有一神前曰某所主孝義一坊居民良善難以疫及城隍怒曰天㫖汝何敢違神復曰既不可以小兒充數如何城隍良久曰可遂各聲喏而退周翁還舍具以告人皆哂為狂誕至二月城中疫癘大作唯孝義坊獨免但童稚抱疾始驗周語不誣郡之雍熙寺每夜半常有婦人往來廊廡間歌小詞且哭且嘆聞者就之輒不見其詞云滿目江山憶舊遊汀花汀草㺯春柔長亭艤住木蘭舟好夢易隨流水去芳心空逐曉雲愁行人莫上望東樓好事者録其詞于壁士子慕容巖卿見之驚曰此余亡妻所作外人無知者何從得之寺僧告其故巖卿悲嘆曰亡妻旅襯嘗停於此也虎丘山寺立塔掘基得一舍利空中天樂衆皆聞之井吼三日法苑珠林陳興立長洲農家子也居蠡口家貧事母甚孝母病不食梁肉惟啖城中臨頓橋王家糕每日五鼓時即之臨頓買以奉母風雨寒暑無懈一日持糕歸憩楊涇橋遇一道士問曰何不食糕陳語之故道人曰我母亦欲食糕出錢與陳易陳遂與之不吝復入城買糕亟歸未抵家道士已將持奉其母母食道士糕病頓愈始悟道士為異人就所居建三清觀捐俗出家後羽化立祠疾病禱之無不應驗吳城重𤣥寺閣一角忽墊計數千緡方可正皇慶間燕山有一匠者來自云張撥天謂寺主曰不勞費財請得一木楔可正也主寺者從之匠者挾巨楔數片登髙敲斫閣柱悉正元元貞二年夏旱請觀音大士于公㕔嚴修佛事髣佛大士見身東南空中時官僚吏民皆得瞻仰甘雨隨霈大德丙午七月七日醋坊橋民人王佑家酒瓮忽作牛鳴以物覆之則止去覆復鳴三日乃止大德五年辛丑七月朔淮浙閩海溢百里潮髙數十丈蘇之颶風尤惡郡縣治吹起入半空及僧寺民居亦多罹其患太湖之水幾入葑門市井傳舍為之蕭索皇慶改元有張三郎者善笛八月十五夜在樂橋作伊州曲夜靜有老人來曰爾笛固清未能脫俗為爾釐正之當熟記毋忘乃指教其孔換易數字曲益清峻張更求别曲老人取笛自吹超出塵壒歌曰月既明西軒琴復清寸心斗酒爭芳夜千秋萬嵗同此情歌宛轉宛轉聲已哀願為星與漢光景共徘徊再歌曰悲且傷參差淚成行低紅掩翠方無色金徽玉軫為誰鏘歌宛轉宛轉結復悲願為煙與霧氤氲共容姿張問何人作答曰仙姝劉妙容歌也因以傳我復請授其指調老人笑而起曰子凡心我豈能教爾耶去數步不見張後以指尋其曲終不能得其髙古之趣元儒學提舉朱德潤至元甲午其母吉宜人將就館大母施夫人病亟大父祕書君應得卜竁陽抱山之原欲穿壙以為藏施夫人夜夢衣冠偉丈夫來告云勿奪吾宅吾且為夫人孫明日役者鑿地深五尺許得一石碑刻曰鬱林太守陸君績之墓别有石刻在傍曰此石爛人來換石果斷矣祕書君命亟掩之而更卜兆施夫人復夢偉衣冠者曰感夫人盛德吾真得為夫人孫矣是夜德潤生人以為厚德所致既長用趙文敏公薦仁宗召見玉德殿命為應奉翰林文字同知制誥兼國史院編修官後改前職具見虞文靖并周伯琦墓文延祐初太倉有丐者椎髻跣足披皂衣操大瓢往來於水軍萬户寨及張京馬頭酒家乞飲飲醉輒奔走呼云牛來了衆跟我去凡三月餘又於寨木及人家門壁連書火字人皆惡之詈之或朴之自後不知所在是冬有海賊牛大眼自劉家港至太倉大肆剽掠水軍寨張京鎮人家多被災始悟丐者之言延祐間黃姚鹽場負課甚多一夕海潮暴漲夜有火光熠熠數日煮鹽皆變紫色每鑊視舊數倍商人雜以他場白鹽亦皆變紫逋課盡償已而復為白色至正間虎丘山寺閣板上有一竅當日色晴明時以數寸白紙承其影則一寺之形勝悉於紙上見之但其頂居下此理殆不可曉也輟耕録至正乙酉朝貴置碑石赴都抵直沽忽中斷有聖像儼然劉文明父子復載以歸今在太倉東嶽廟中至正二十二年郡民張明二家豕生白象衆以為異赴官陳告三日而斃至正乙未正月草三日入時郡城中忽聞兵甲聲自東南來居民驚走覘視他無所有但見巽方黑雲一簇中倣佛皆類人馬而前後火光若燈燭者莫知其算迤邐由西北方而沒惟葑門至齊門居民屋瓦悉揭去牀榻屏几俱仆醋坊橋董家雜物鋪失白米十餘石醬一缸不知置之何地輟耕録葉子澄吳人貧而好義與黟縣逹嚕噶齊巴延交至正壬辰冦起浙省調兵守昱嶺時巴延沒于王事其家在嘉興崇德州訃至家人招黃冠師追薦攝召巴延云旦夕杭城且危爾輩宜速依吾弟處逃生母妻以無弟再扣之曰松江葉子澄乃我存日生死交也可往依之即備船東行比至前三日葉夢巴延相見以家屬為托葉即為留居供給不怠後杭城陷巴延子謙齊唐古人也國朝正統十四年正月六日太湖中大貢山小貢山鬬開闔數次又共沉於水起復鬬踰時乃正觀者如堵出杜東原耕餘録宣德七年徐武功伯時為都御史治水張秋同郡王震時為東平州判官屬治下公命濬河壅處掘數尺許見棺有石板大書其上云前卦吉後卦凶五百年後水來衝幸遇王州判移我在河東河東即漏澤園也遂葬之陳僖敏公鎰與太子太保俞公士恱少相得出入恆俱一日黎明同入郡學學傍一居人寢門內聞街上枷鎖聲窺之見獄卒引數囚南行俄而卒及囚皆倉皇曰丞相來急避之遂皆入古廟而沒居人念囚不應行此路且訝丞相之語因坐以伺之二公隨至常熟之穿山有農家生一子名保保肢體柔軟四五嵗猶不能行終日坐木榻上善言人禍福扣之皆應其家固怪之然亦因以致饒裕故不戕之一旦有龍虎山道士過其門語人曰此家必有妖物富人劉以則聞之召道士問曰若能除之乎道士曰不難也劉遂具舟使往道士方行保保忽告母曰有一道士來兒當死矣可與錢十千為兒乞命母方怪之道士已在途潜書朱砂符焚于道傍栁樹根下保保已在家嘔血又行不久再焚一符則有一鱣死於水面長壯可畏其首大如拳問其家子死矣𢎞治間包山華嚴寺僧宗翌年少質美從師昊雲遊淮徐間舟宿桃源瓦礫亂入舟中舟人疑冦至起視之寂如也遂進舟數里瓦礫復入舟中者再舟中人皆惶惑莫知所以及抵徐宿彭城驛翌如厠得錢半百持以視昊尋於佛書中又得數十文於履中又得數十文始怪焉至夜見一美人甚麗侍女數十人迎翌語曰吾與汝宿有緣好當解后于此勿疑也自是晨往暮至與之寢食昊知其為怪也作呪禳之瓦石如雨而至昊强翌歸主僧問翌曰聞汝遇怪果怪矣乎言未竟汚穢滿身寺僧無不駭愕寺中偶失一物試問之即從空中投書曰某人竊去人有禍福夀夭問之者多竒中或有不信逐之雨中衣竟不濕寺僧百方禳之一日作隱語曰蓮花即應沃羅莫解其意閲三月大書于門曰宗翌我去也明日遂去翌今尚存無恙姑蘇志卷五十九
