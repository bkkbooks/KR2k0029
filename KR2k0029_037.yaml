body:
  text: 姑蘇志卷三十八明王鏊撰宦迹二燕王靈夔江王元祥滕王元嬰皆唐髙祖子也貞觀十年三月出諸王為都督靈夔以十一年代襲蘇州刺史十三年罷代襲之制進封魯公髙宗末又以太子太師刺蘇州按韓王元嘉傳時武后臨朝攝政欲順物情雖外示尊崇實無所綜理元祥以貞觀十一年自許王册授使持節蘇州諸軍事蘇州刺史改封江王元嬰以永徽三年自金州刺史遷蘇州又轉洪州都督元祥性庸遴所至營財産無厭與元嬰等皆貪暴時語曰寧向儋崖振白不事江滕蔣虢曹王明太宗子也母楊氏本巢王妃貞觀末封曹王髙宗詔復巢王纍為都督刺史調露中蒞蘇澤王上金髙宗子也武后文眀元年授蘇州刺史眀年改陳州郎餘慶新樂人為吏清而刻於法髙宗朝纍遷御史中丞務謙謹下人久之出為蘇州刺史坐纍下遷交州都督袁誼長安人開耀初蘇州刺史司馬張沛白誼曰州得一長史隴西李亶天下甲門也誼曰夫門户者歷世名節為天下所髙老夫是也山東人尚婚媾求祿利耳至見危授命則無人焉何足尚邪沛大慙此據通鑑修按本傳為郡在神功中後開耀十六年未詳孰是孔禎唐髙宗朝為州長史時刺史曹王明不循法度禎每進諫眀曰寡人天子之弟豈失於王哉禎曰恩義不可恃大王不奉行國命恐今之榮位非大王所保獨不見淮南之事乎眀不悅眀左右有侵暴下人禎捕而杖殺之明後果坐法遷黔中謂人曰吾愧不用孔長史之言以及於此纍遷絳州刺史張廷圭字溫玉濟元人慷慨有志尚開元中由沔州刺史徙蘇五年奏復置海鹽縣卒諡貞穆張均洛陽人丞相説之子也有文名歷兵部侍郎以纍貶饒蘇二州刺史久之遷刑部尚書吳從衆開元中為刺史兼採訪使二十八年割太湖洞庭三鄉與吳興互換武平一沛國人博學工文詞武后時畏禍不敢與事纍詔不應中宗復位召為起居舍人修文館直學士開元中自考功貟外郎貶蘇州參軍既謫而名不衰徙金壇令趙居貞鼓城人國子祭酒冬曦之弟天寶九載二月自揚州長史遷吳郡太守十載正月封會稽山神為永興公命居貞往祭三月十七日行禮册是年居貞又立春申君廟碑題銜作中散大夫守吳郡太守兼江南道採訪處置使舊志作比部郎中又奏割崑山嘉興海鹽地置華亭縣又於海鹽置海寧鎮韋之晉京兆人上元中為蘇州刺史時淮泗不寧中外震動韋元甫自御史中丞出為洪州都督由是鄰國藩屏大臣皆輻湊議欲同盟靖難杜烜至自廣陵杜鴻漸至自會稽韋還自京口徐浩自合肥而之晉自吳偕會焉獨孤及作豫章冠蓋盛集記李刺史名闕襄武人蘇州刺史兼御史中丞獨孤及稱其為郡日值海冦之亂事平徵還道卒贈吏部侍郎及又代房琯撰祭文稱其孝友慈惠公廉貞直姑蘇之役姦鋒搆難公秉義勇誅其渠魁海寇圍逼勾吳震駭公率羸師克翦大敵竒謀生於死地貞節見於孤城韋元甫少修謹敏於學術以吏能知名所蒞皆有聲遷蘇州刺史浙西都團練觀察使大厯初宰相杜鴻漸薦之三年徴為尚書右丞蕭定字梅臣右僕射瑀之曾孫纍遷袁潤信宋湖蘇六州刺史大厯中有司差天下刺史治最定與常州蕭復州張鎰為第一而劭桑租均賦稅勞徠遊口在鎰復之右遷户部侍郎官至太子少師李丹太子太保詳之子也宗室表作岑子為蘇州刺史浙西觀察使著蘇州聖賢冢墓記一卷李栖筠字貞一趙人莊重寡言體貌軒特喜書多所通曉為文章徑迅有體要不妄交遊纍遷工部侍郎魁然有宰相望元載嫉之出為常州刺史蘇州豪士方清因嵗凶誘流莩為盜積數萬依黟歙間阻山自防東南厭苦李光弼分兵討平之會平盧行軍司馬許杲恃功擅留上元有窺江吳意朝廷重起兵即拜栖筠蘇州刺史兼御史中丞浙西都團練觀察使圖之栖筠至張設武備遣辨士厚齎金帛抵杲軍賞勞使士歆愛奪其謀杲懼悉衆渡江掠楚泗而潰以功進兼御史大夫則又增飭學廬表宿儒河南禇沖吳何貟等超拜學官為之師身執經問義逺邇趨慕至徒數百人及表劉太真為常熟令又奏部中豪姓多徙貫京兆河南規脫徭科請量産出賦以杜姦謀元載拜御史益恣橫代宗除引剛鯁大臣自助欲收綱權以黜載拜栖筠御史大夫栖筠劾載黨數人帝屢欲召相憚載輒止然有進用皆密訪焉栖筠多所補助見帝依違不斷亦內憂憤卒諡文獻孫德裕别有傳裴胄字胤叔河南人簡儉恆一纍官監察御史不得意左遷桐廬尉時浙西觀察使李栖筠有重望虛心下士幕府盛選才彥觀察判官許鳴謙有學識栖筠嘗異席事多咨之崔造輩皆所薦引一見胄深重之薦於栖筠奏授大理評事觀察支使柏良器字公亮年十七在太尉李光弼幕中大厯初以左金吾衛將軍加檢校光祿大夫兼蘇州别駕加試殿中監監察御史刺史李栖筠問其年對曰二十有四戰陳幾何曰六十有二因泣涕言遭時喪亂父死家破誓棄性命以除寇讐粗志未立豈敢求眀公之知邪建中初至京師宰相楊炎召與之語因言刺史李道昌無善政遂以韓滉代焉良器位至將相圖形凌煙閣林披字彥則莆田人年二十以經業擢第為汀州别駕大厯中御史大夫李栖筠奏授太子詹事兼蘇州别駕有九子皆為刺史號九牧林家李涵簡素恭慎有名宗室以兵部侍郎為蘇州刺史兼御史中丞充浙西觀察使十一年除知臺事京畿觀察使按獨孤及撰涵父少康碑云七年五月由兵部侍郎為御史大夫又建中三年五月中書門下奏得蘇州刺史兼御史大夫知臺事李涵等狀釐革到諸道觀察使料錢韓滉字太仲長安人有美召所交皆時之俊彥代宗朝自晉州刺史移蘇州領浙江東西都團練觀察使安輯百姓均其租稅未踰年境內稱治按本傳移郡領使不帶兼官尋加銀青光祿大夫二年五月加檢校禮部尚書加御史潤州刺史鎮海軍節度使依前浙江東西道觀察等使而通鑑云大厯十四年十一月由晉州刺史除蘇州并領觀察使蓋大厯所除而建中初任也一云自饒州刺史轉蘇州丁母憂起為江陵少尹李復字初陽宗正卿齊物之子歷饒蘇容三州刺史卒諡昭復更歷方鎮所在稱治韋應物洛陽人周逍遙公敻之後自言天寶中以三衛郎事玄宗豪縱不羈及遊太學以氣凌蔑諸生永泰中為洛陽丞京兆尹功曹始折節讀書歷鄠櫟陽令比部貟外郎出為滁江二州刺史貞元初自左司郎中為蘇州年五十餘在郡與秦系丘丹顧況釋皎然相倡酬罷官後寓永定精舍信州刺史劉太真嘗與書云顧著作來已知足下郡齋燕集想亦示何情致暢茂遒逸如此宋齊間沈謝蕭何始精於理意緣情體物備詩人之指後之傳者甚失其原惟足下制其橫流師摯之始關雎之亂於足下之文見之矣李肇稱其性髙潔鮮食寡欲所居焚香掃地而坐其為書馳驟建安已還各得風韻開元以後位卑而著名者李北海王江寧李館陶鄭廣文元魯山蕭功曹張長史獨孤常州崔比部梁補闕及蘇州爾白居易言應物在蘇與杭州牧房孺復皆豪人也韋嗜詩房嗜酒每與賓友一醉一咏其風流雅韻播於吳中或目韋房為詩酒仙蓋其畫戟清香之辭最為警䇿宜時人推重如此有集十卷子慶復監察御史韓駒蔡寬夫詩話云唐史不為應物立傳行事頗逸按白公吳郡詩石記言貞元初應物為刺史後三十七年樂天亦佩蘇印記中目應物為碩人則在當時已有重名又劉禹錫集有太和六年舉自代一狀然應物溫泉行云北風慘慘投溫泉忽憶先皇巡幸年身騎廄馬引天仗直至華清列御前又有出身天寶今幾年之嘗則嘗逮仕天寶間矣又燕李録事詩云與君十五侍皇闈曉拂爐煙上玉墀考之天寶元年至太和六年計九十一年應物於天寶間已年五十不應能至太和間也説者謂禹錫與樂天同時視應物輩行逈不同禹錫所舉或别一人耳孫晟字思退武水人父逖判刑部侍郎晟少知名通經術代宗朝為信州刺史有惠政郡人請立碑頌德優詔褒美轉蘇州貞元四年移桂州齊抗字遐舉義豐人太子詹事浣之孫也天寶亂抗隱會稽刺史張鎰辟署幕府抗吏事間敏有文雅自處州刺史徙蘇潭二州召為觀察使卒諡曰成李事舉趙郡人按李觀浙西觀察判官廳壁記云太原王公廉察之七年署監察御史李事舉為觀察判官九年冬蘇州刺史以憂去命事舉來撫吳地德美矜人化變憸人如春之和按觀察使王緯嘗奏劾于頔疑頔去而事舉攝郡爾于頔字允元後周太師謹七世孫也以湖州刺史改蘇州吳俗事鬼頔疾其淫祀廢生業凡神宇撤去惟存泰伯子胥濬溝澮端路衢為政有績然暴橫少恩杖前部尉以逞憾觀察使王緯以聞德宗不省俄遷大理卿官終同中書門下平章事頔有専對才其馭衆為政之術令行禁止出於法家文深意苛有犯無赦崔衍安平人天寶末歷蘇虢二州刺史遷宣歙池觀察使衍簡靜儉約畏法室無妾媵祿稍周於親族妻子僅免飢寒及卒不能蕆喪詔贈賻帛米粟元和初復詔褒美諡曰懿韋夏卿字雲客萬年人善文辭大厯中為給事中屬東南嵗歉出為常州刺史以最績轉蘇州始至謀以息民布令曰矜老疾活艱困凡在庶物令趣其本於是鄉計之而白於縣縣上之郡夏卿乃條其年嵗差並與蠲放遂加秩賜金借留纍嵗擢吏部侍郎卒諡曰獻夏卿性通簡好古為政務通理不甚作條教所辟士皆至宰相大官世稱知人李素隴西人刺衢州一月遷蘇州李錡前反權將之戍諸州者刺史至斂手莫與敵素至十二日錡反素將左右與賊戰州門不勝賊呼入素端立責以義皆斂兵立不逼賊將姚志安送素致錡軍中將斬以徇素身具桎梏釘於船舷未及京口而錡敗素脫械還走州賊急卒不暇走死民抱扶迎盡出上使貴人持紫衣金魚以賜居三年州稱治拜河南少尹王叔文山隂人以棋待詔頗讀書班班言治道德宗詔直東宫太子引以侍讀順宗立不能聽政羣臣奏事以宫人宦官從帷中傳命黃伾密語諸黃門陛下素厚叔文即繇蘇州司功參軍拜起居郎翰林學士遷戶部侍郎領度支鹽鐵副使賜金紫順宗崩貶渝州司戶王仲舒字𢎞中祁人少孤家于江南讀書著文有名于時元和中由峽州刺史遷婺州在職五年有治政加金紫轉蘇州變其屋居以絶火延堤松江路以絶阻滯秋夏賦調自為書與人以期吏無及門而集化成為天下守之最上以文誥有古風拜中書舍人復觀察江南西道卒于官按仲舒守蘇日祭權相國文在元和十四年七月又光福寺題名在四年與傳不合未詳范傳正字西老順陽人歷歙湖蘇三州刺史有殊政進拜宣歙觀察使張正甫字踐方南陽人元和中歷鄧蘇二州刺史湖南觀察使正甫仁而端亮蒞官清亷居外任所至稱理元錫字君貺河南人什翼犍十四世孫也歷衢婺蘇三州刺史所至咸有聲績崔倰字德長宰相祐甫從子也性介潔矜已之清視贓負者若讐憲宗朝檢校職方郎中兼淮浙宣建等路兩稅使尋為蘇州刺史破壞豪黠除去冗費嵗中廪藏皆羡溢遷潭州刺史卒諡肅李諒長慶四年自泗州刺史奏最以御史中丞徙蘇州賜紫按栁宗元為王戶部薦諒狀云清明直方柔惠端信強以有禮幹而甚文乞除諫官使備獻納白居易字樂天其先太原人自韓城徙下邽居易敏悟絶人工文章未冠謁顧況況於時才少所推可見其文自失曰吾謂斯文自絶今復得子矣貞元中擢進士拔萃皆中補校書郎元和初以對䇿調盩厔尉為集賢校理翰林學士遷左拾遺屢陳朝廷得失請以學士兼京兆戶曹參軍又以言事貶江州司馬久之徙忠州刺史入為司門貟外郎以主客郎中知制誥俄轉中書舍人遷杭州刺史入為太子左庶子分司東都復刺蘇州病免文宗立以祕書監召遷刑部侍中太和初移病還東都除太子賓客分司踰年拜河南尹開成初拜太子少傳進馮翊縣侯會昌初以刑部尚書致仕六年卒贈尚書右僕射居易被遇憲宗時事無不言為當路所忌遂擯斥所藴不能施乃放意詩酒既復用又皆偃蹇不合居官輒病去遂無立功名意在蘇時多燕遊嘗攜蟬滿容點茶十妓夜遊西武丘山又賦紀遊詩云領郡時將久遊山數幾何一年十二度非少亦非多自作醉吟先生傳又好浮屠稱香山居士其文章精切最工詩頗以規諷得失初與元稹酬咏號元白稹卒又與劉禹錫齊名號劉白白敏中為相請諡有司曰文東都江州人皆為立祠狄兼謨字汝諧太原人梁公仁傑族孫剛正有祖風由蘄鄧鄭三州刺史改蘇州以治最擢給事中遷御史中丞東都留守李紳字公垂世宦南方客潤州為人短小精悍有詩名號短李穆宗朝為學士與李德裕元稹同在禁署時稱三俊大和中歷蘇越二州刺史武宗召拜中書侍郎同平章事卒諡文肅劉禹錫字夢得系出中山世為儒工文章淮南杜佑表管書記入為監察御史名重一時王叔文與之交順宗即位叔文引禹錫及栁宗元與議政禁中擢屯田貟外郎判度支鹽鐵案憲宗立叔文等敗貶連州刺史未至斥朗州司馬久之召還又出為播州刺史御史中丞裴度請稍內遷乃易連州又徙夔州由和州刺史入為主客郎中度又薦為禮部郎中集賢直學士度罷出為蘇州刺史以政最賜金紫服從汝同二州遷太子賓客復分司禹錫恃才而廢偃蹇寡合乃以文章自適素善詩晚節尤精與白居易酬復頗多推為詩豪會昌時加檢校禮部尚書卒盧商字為臣范陽人以大理卿為蘇州刺史吏以鹽法求贏貨民愈困商令計口售鹽無常額人便之嵗資連增宰相上其勞進浙西觀察使召為刑部侍郎韋刺史名闕大中五年在任是年奏復崑山慧聚寺六年建楞伽上方大悲堂按髙僧傳釋常達居常熟破山宣宗重興精舍太守韋曙加力蓋即其人也盧簡求字子臧范陽人檢校户部郎中綸之子也為王仲舒牛僧孺參佐會昌中歷蘇夀二州刺史簡求為政長權變多惠澤以太子少師致仕按僧𢎞憲碑云大中十二年來撫兹郡本傳作會昌中誤皮日休字襲美襄陽人咸通八年進士十年崔璞守蘇日休為軍事判官與進士陸龜蒙友善稱其才不減溫庭筠李商隱雖風雨晦冥蓬蒿翳薈更相唱和未嘗暫輟至忘寢食郡人與之遊者有恩王府參軍徐修矩涇尉任晦前進士崔璐羊昭業進士顔萱鄭璧司馬都秀才穰嵩起處士毗陵魏朴宦遊者則博士南陽張賁侍御隴西李縠皆有詞致一年所賦詩至六百五十餘首日休名曰松陵集自製序歷祕書省校書郎嶺南東道節度巡官著書號鹿門子又有請韓文公配享書桃花賦九諷七愛悼賈諸篇避廣明之難徙會稽依錢氏官太常博士子光業字文通生於蘇十嵗能屬文吳越國相教令儀注多其所定美容儀善談論若神仙中人贈禮部尚書孫璨為元帥府判官三世皆以文雄江東李繪乾符中為刺史二年四月王郢陷郡繪重修內城三年以棄城貶官張搏自湖州刺史移蘇州辟陸龜蒙以自佐種木蘭於木蘭堂重修羅城刪治吳地記并繪郡圖按舊唐書作乾符二年二月自湖移廬州又淝上英雄録云楊行密微時隨本兵都押衙統兵送搏赴蘇州任屯兵吳苑據此則自廬移蘇也未審孰是王摶字昭逸臨沂人方慶八世孫辟佐王鐸滑州節度府纍遷蘇州刺史乾寧初進同中書門下平章事遷司空帝欲翦抑中官搏謂朝廷多難當徐以計去之時崔胤素忌搏眀達有謀光化三年罷為工部侍郎貶崖州司戶賜死藍田驛杜孺休字休之萬年人司徒佑之曾孫纍擢給事中大順初錢鏐遣弟銶破徐約於蘇州以海昌都將沈粲行刺史事而昭宗更命孺休為之以粲為制置指揮使銶不悅密遣粲害焉孺休之見攻也曰勿殺我當與爾金粲曰殺爾金焉往與兄述休同死李友合肥人有膽勇能撫士卒事楊行密以功遷尚書蘇州刺史大順元年孫儒陷蘇被擒謀翻城事覺為儒所害贈太保成及字𢎞濟錢唐人光啓初江浙兵亂及保聚富春自稱靜江都指揮使後從錢鏐討劉漢宏以功奏遷官至檢校司空乾寧初授蘇州刺史三年楊行密圍蘇州常熟鎮將陸郢巡檢郭周等以城應之及被執行密閲及家所蓄惟圖書藥物賢之與歸淮南將署為行軍司馬及拜且泣曰及百口在錢公所蘇城陷不能死敢求富貴邪願以一身易百口之命引佩刀欲自刺行密遽起持之館於府舍其室中亦有兵仗行密每單衣詣之與同飲食無所疑光化元年具禮遣歸鏐迎勞郊外把袂而泣署鎮海軍節度副使以平徐綰功奏授保大彰義等軍節度開府儀同三司曹圭臨平人父信唐末兵亂保聚自守嘉興以來人咸歸之圭少有膽勇乾寧中淮人圍嘉興與族人師魯固守淮人不敢逼錢鏐壯其功由嘉興都將授蘇州制置使開平中淮兵再圍蘇屬正月望夜圭就師魯第盛陳燒燈之燕令俘虜縱觀淮人讋焉以浙西營田副使檢校太傅卒于蘇錢元璙字德輝吳越王鏐第四子儀狀瑰傑風神俊邁乾化二年改刺蘇州纍授中吳建武軍節度使蘇常潤三州團練使佐正匡國功臣大彭郡開國侯加檢校太師同平章事中書令守太傅彭城郡王治蘇三十年儉約鎮靜郡政循理天福二年弟元瓘襲位元璙覲之燕於宫中元瓘舉酒為夀曰先王之位兄宜當之俾小子至是皆兄推載之力元璙俯伏曰王功德髙茂先王擇賢而立敢忘忠順因相顧感泣兄弟訖無間言七年詔封廣陵郡王未受命卒諡宣義子文奉文奉字亷卿元璙第二子善騎射能上馬運槊涉獵經史音律圖緯醫藥鞠擊皆冠一時以蔭為中吳軍衙內都指揮使改節度副使幾三十年及嗣元璙為節度使纍加至檢校太尉兼中書令嘗於郡中創南園東墅及諸别第延接賓旅任其所適文奉飲兼數人嘗乘白騾披鶴氅或泛舟池中逺近聞賓客笑語聲則就飲為樂所聚圖籍盈於齋中古器稱是自號知常子雅有鑒裁禮下賢士一時才藝多依之與賓僚采史籍著資談三十卷初元璙在郡夢登烏鵲橋見禽獸充牣城中旁人云二郎祿料也文奉嘗問命於天台僧德韶韶答書云眀公己巳八十一至開寶二年己巳嵗八月十一日卒始驗其語諡威孫承祐錢塘人吳越王錢俶納其姊為妃因擢要職國事無不領轄時稱為孫總監纍遷浙江東道鹽鐵副使鎮海鎮東兩軍節度副使知靜海軍節度事開寶中詔光祿大夫檢校太保鎮東鎮海等軍行營司馬開寶五年俶又私署中吳軍節度七年俶遣承祐入貢先是諭旨於俶將有事江南及王師度江詔俶以所部攻常潤承祐從俶克常州功居多八年詔改中吳軍為平江軍真授承祐節度九年從俶入朝太平興國三年二月從俶再朝三月次宿州永城承祐齎表詣闕俶遂至京師五月上表盡獻其地詔徙承祐為泰寧軍節度使五年從幸大名留知府事承祐治蘇凡七年雍熙二年改知滑州卒杜叔詹不詳所歷嘗蒞郡重建孔子廟王禹稱有書云今大司農京兆杜公典郡新廟礱石將有述焉事未果而漢南歸于京師故其辭缺焉按錢俶納土雍熙元年進封漢南國王據此當是錢氏命叔詹繼承祐為郡也姑蘇志卷三十八
