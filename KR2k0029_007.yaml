body:
  text: 姑蘇志卷八明王鏊撰山上呉中諸山竒麗瑰絶實鍾東南之秀地理家謂其原自天目而來發扵陽山今紀自陽山分華鹿而南迤邐天平盡扵靈巖别由穹窿而東盡扵楞伽以及湖中諸山若虎丘扵諸山最小而名勝特著且非有所附麗故首列之虎丘山在府城西北七里呉越春秋云闔閭葬此以扁諸魚腸劒各三千為殉越三日金精結為白虎踞其上故名唐避諱改武丘又名海湧峰遥望平田中大耳比入則竒勝萬状其最者為劒池兩崖劃開中涵石泉深不可測相傳秦皇發闔閭墓鑿山求劒無所得其鑿處遂成深澗今名劒池顔眞卿書虎丘劒池四字石刻猶存宋王禹偁劒池銘并序虎丘劒池泉石之竒者也吳地記引秦皇之事以為詭説考諸舊史則無聞焉矧儒家者流不可語怪因為銘以辯之銘曰茂苑之側震澤之巖巖虎丘沉沉劒池峻不可以仰視深不可以下窺我疑乎太極作怪化工好竒水物設險山妖忌危陷其泉也葢取諸坎磔其石也以象乎離艮有止兆䝉無亨期搆此屯難成乎險巇直恐夏后弗能導之豈惟秦皇而能肇兹葢其始也一氣發泄兩儀分别争融鬬結擊搏而裂斷壁雙掲摩雲不徹翠禿青殘挫銳而中絶寒流下咽犇山未決雪壅雷収拗怒而曲折蹙束湍瀨呀槎洞穴鰌翻成窟龍戰有血匪自人力葢從天設誰謂一拳登之維艱誰謂一勺挹之不竭池實自然劒何妄傳我欲涉道如池之淵我欲立節如石之堅位以道取名以節全濡筆池心勒銘山巔破衆惑焉言余志焉宋方惟深詩雲崖竒天開蒼淵下澄澈世傳靈劒飛山石千丈裂神蹤去不返今作蛟龍穴是非漭難詰嵗名多異說惟當清夜来静賞潭上月范成大石罅泓渟劒氣潛誰将樓閣苦荘嚴只知暖熱逰人眼不道蒼藤翠木嫌國朝髙啟干将欲飛出巖石裂蒼礦中間得深泉探測費修綆一穴海通源雙崖樹交影山中多居僧終嵗不飲井殺氣凜猶在棲禽夜頻警月來照潭空雲起嘘壁冷蒼龍已何去遺我清絶境聽轉轆轤聲時来試新茗徐賁闔閭試劒處靈泉湛澄静苔花漬餘血石色帶古礦空山秋氣寒幽林夜光冷月明樹交壁人静霜折綆古懐且當置清景庶足領其前為千人坐葢神僧竺道生講經處大石盤陀徑畝髙下平衍可坐千人唐李陽冰篆書生公講臺四字分刻四石今失其一臺側有㸃頭石上有可中亭取劉禹錫詩語本名可月今誤稱云唐劉禹錫詩生公說法鬼神聽身後空堂夜不扃髙坐寂寥雲漠漠一方明月可中亭方惟深生公天人師講法花雨墮當時聽法衆片石千人坐山祗常䕶持山鳥不敢涴野人心茫然傲蕩多酒過醉来不肯歸石上㸔雲卧范成大聽經人散蘚花深千百誰能更賞音只好岸巾披鶴氅風清月白坐彈琴國朝沈周月夜千人石獨步一山有此座勝處無勝此羣𩔖盡磽出夷曠特如砥其脚挿靈湫敷霞面深紫城中士與女數到不知幾列酒即為席歌舞日喧市今我作夜逰千載當隗始亦莫費秉燭步月良可喜月皎光潑地措足畏踏水所廣無百步旋繞千步起一步照一影千影千人比一我欲該千其意亦妄矣譬佛現千界出自一毫耳及愛林木杪玲瓏殿閣倚僧忩或映火總在蛛綱裏閴閴萬響滅獨度跫然履恐有竊觀人明朝以仙擬又有白蓮池在臺之左相傳說法時池生千葉蓮花故名又有試劍石憨憨泉養鶴澗回僊徑石井泉泉即張又新所品第三泉也吳郡志云劍池傍經蔵後大石井面澗丈餘嵌巖自然上有石轆轤嵗久湮廢寺僧乃以山後土井當之紹熙三年主僧如壁始淘古石井去淤泥五丈許四傍石壁鱗皴天成下連石底泉出石脉中味甘冷勝劍池郡守沈揆作屋覆之别為亭扵井傍以為烹茶晏坐之所宋沈揆詩靈源一閟幾經年石上重流豈偶然漸喜行春有幽事人間初見第三泉上方髙閣倚層巒下有清泉一鑑寒更作小亭供勝覽盡収吟思入毫端范成大勸耕堂上醉髙年和氣春風共靄然大士亦修隨喜供夜來古井發新泉落紙雲烟墮翠巒一泓潭月鬭清寒鳳凰池上揮毫手郤掬山泉淬筆端沈周月夜叩僧房汲泉煮茶坐松下清啜夜叩僧房覔澗腴山童道我吝村沽未傳盧氏煎茶法先執蘇公調水符石鼎沸風憐碧縐甆甌盛月看金鋪細吟滿啜長松下若使無詩味亦枯晉王珣嘗據為别墅山下因有短簿祠珣記云虎丘大勢四面周迴嶺南則是山徑兩面壁立交林上合蹊路下通升降窈窕不卒至吳地記亦云虎丘絶嵒聳壑茂林深篁為江左丘壑之表吳興太守禇淵嘗經逰其地淹留數日歎曰今之所稱多過其實惟覩虎丘逾扵所聞劉宋何求及弟㸃𦙍陳顧越唐史徳義並隱此山舊有東西寺即王氏二墅皆在山下今雲巖寺在山上而二寺俱廢又有望海樓小吳軒致爽閣陳公樓五臺山樓千頃雲閣他勝處尚多不能悉載陳顧野王虎丘山序夫少室作鎮以峻極而標竒太華神掌以削成而稱貴若兹山者髙不概雲深無蔵影卑非培塿淺異疎林秀壁數尋被杜蘭與苔蘚椿枝千仞挂藤葛與縣蘿曲澗潺湲脩篁䕃映路若絶而復通石将頽而更綴抑巨麗之名山信大吳之勝壤若乃九功六義之興依永和聲之製志由興作情以詞宣形言諧扵韶夏氏文暢扵鍾律由来尚矣未有登髙能賦而韜斐麗之章入谷㤀歸而忽鏗鏘之節故總轡齊鑣競雕虫扵山水雲合霧集争歌頌扵林泉于時風清䆳谷景麗修巒蘭珮堪紉故繩可索林花翻灑乍飄颺扵蘭臯山禽轉響時弄聲扵喬木班草班荆坐磻石之上濯纓濯足就滄浪之水傾縹瓷而酌旨酒剪緑葉而賦新詩肅爾若與三逕齊蹤鎗然似共九成偕韻盛矣哉聊述時事寄之翰墨陳張種與沈炯書虎丘山者吳嶽之神秀者也雖復峻極異扵九天隱嶙殊扵太一襟帶城隅獨超衆嶺控繞川澤顧絶羣岑若其峯崖刻削窮造化之瑰詭絶澗杳𡨕若鬼神之髣髴珍木靈草茂瓊林與碧葉飛禽走獸必負義而膺仁是以厯代髙賢輕舉栖託梵臺雲起寳刹星懸自非玉牒開精金祥緼耀豈其神怪若此者乎沈炯答書若乃三江五湖洞庭巨麗寫長洲之茂苑登九曲之層臺山髙水深雲蒸霧吐其中之秀異者實虎丘之靈阜焉冬桂夏柏長蘿脩竹靈源秘洞轉側超絶逺澗深崖交羅户穴唐獨孤及夜晏序方今内有䕫龍臯伊以佐百揆外有方叔召虎以守四海天下之人髙枕無事則琴壺以晏朋友笑歌以展霞月吾黨之職也我是以有今兹虎丘之會巖巖虎丘奠呉西門崒然如香樓金道自下方而踴鏁丹霞白雲扵蓮宫之内會之日和氣滿谷陽春逼人巖煙掃除肅若有待余與夫不亂行扵鷗鳥銜流霞之杯而羣嬉乎其中笑向碧潭與松石道舊兕觥既發賔主醉止狂歌送酒坐者皆和吳趨敷奏雲去日没梵天月白萬里如練松隂依依状若留客于斯時也挽雲山為我輩視竹帛如草芥頹然樂極衆慮皆遣扵是奮髯屢舞而嘆今夕何夕同者八人醉罷皆賦以為此山故事陳張正見從永陽王逰虎丘山詩滄波壮鬱島洛邑鎮崇芒未若兹山麗招曉擅水鄉地靈侔少室塗難像太行重巖標虎踞九曲峻羊腸溜深澗無底風幽谷自涼柙沉餘玉氣劍隱絶星光白雲多異影丹桂有藂香逺看銀臺竦洞塔耀山荘瑞草生金地天花照石梁清逺道士同沈恭子㳺虎丘我本長路周遭罹厯秦漢四瀆與五嶽名山盡幽竄及此客區中始有近峯翫近峯何鬱鬱平湖𣺌瀰漫吟挽川之隂步上山之岸山川共澄徹光彩交凌亂白雲蓊欲歸青松忽消半客去川鳥静人來山鳥散谷深中見日崖幽曉非旦聞子盛㳺遨風流足詞翰嘉兹好松石一言常累嘆勿謂余鬼神忻君共幽贊顔真卿刻清逺道士詩因而繼作不到東西寺于今五十春朅來從舊賞林壑宛相親吳子多蔵日秦皇厭勝辰劒池穿萬仞盤石坐千人金氣騰為虎琴臺化若神登壇仰性一捨宅嘆珣珉中嶺分雙樹迴巒絶四隣窺臨江海接崇飾四時新客有神仙者扵兹雅麗陳名髙清逺峽文聚斗牛津迹異心寧間聲同質豈均悠然千載後知我挹光塵李徳裕追和茂苑有靈峯嗟余未㳺觀蔵山在平陸壊谷為髙岸岡繞數仞牆巖潛千丈榦乃知造化意回斡資竒翫鏐騰昔虎踞劍沒常龍煥潭黛入海底崟岑聳霄半層巒未昇日哀狖寧知旦緑篠夏凝隂碧林秋不換㝠搜既窈窕迴望何蕭散川晴嵐氣収江春雜英亂逸人綴清藻前哲留篇翰共扣哀玉音皆舒文繡叚難追彦回賞徒起興公嘆一夕如再升含毫星斗爛皮日休追和清逺道士詩并序虎丘山有清逺道士詩一首其所稱自殷周而厯秦漢迄于近代抑二千年末以鬼神自謂亦怪之甚者格之以清健飾之以俊麗一句一字若奮若摶彼建安詞人儻在不得居其右矣顔太師魯公愛之刻扵巖際并有繼作李太尉衛公欽清逺之髙致慕魯公之素尚又次而和之顔之叙事也典李之屬思也麗並一時之寡和又幽獨君詩二首亦甚竒愴余嗜古者觀而樂之因總而為和荅不知孰氏之作其辭古而悲亦存于篇末噫清逺道士果鬼神乎抑道家者流乎抑隱君子乎詞則已矣人則吾不知也成道自衰周避世窮炎漢荆杞雖云梗煙霞尚容竄兹岑信靈異吾懐惬流翫古澀石鐵鉎嵐重輕埃漫松膏膩幽逕蘋末著孤岸諸蘿幄幕暗衆鳥陶匏亂巖罅地中心海光天一半𤣥猨行列歸白雲次第散蟾蜍生夕景沆瀣餘清旦風人採幽什墨客學靈翰嗟余慕斯文一詠復三嘆顯晦雖不同兹吟粗堪贊陸龜䝉追和一代先後賢聲容劇河漢况兹邁古士復厯蒼崖竄辰經幾十萬邈與靈夀翫海嶽尚推移都鄙固蕪漫羸僧下髙閣獨鳥沒逺岸嘯初風雨來吟餘鐘唄亂如何鍊精魂萬祀忽欲半不為㫁臂憂肯作秋柏散吾聞鄷宫内日月自昏旦左右脩文郎縱横灑篇翰斯人久溟溟得不長慕歎庶或有神交相從重興贊陸龜䝉補沈恭子詩并序按清逺道士詩題中有沈恭子同㳺既謂神怪之儔得非姓氏謚為恭子乎趙宣子韓獻子之𩔖邪恭子美謚也而詩中有風流詞翰之稱豈獨唱而不和者歟疑闕其文以為恭子之恨乃作一章存扵編中亦補亡之義也靈質貫軒昊遐年越商周自然失逺裔安得怨寡儔我亦小國𦙍易名慚見優雖非放曠懐雅奉逍遥遊攜手桂枝下屬詞山之幽風雨一以過林麓颯然秋落日倚石坐天寒登古丘荒泉已無夕敗葉翳不流亂翠缺月隱衰紅清露愁覽物性未逸反為情所囚異材偶絶境佳藻窮𡨕搜虚傾寂寞音敢作雜珮詶皎然陪陸長源裴樞逰武丘雲水夾雙刹遥疑涌平陂入門見蔵山元化何由窺曵組探詭怪停驄訪幽竒情髙氣為爽徳暖春亦隨瑶草自的皪黄樓争蔽虧金精發壞陵劍彩沈靈池一覽匝天界中峯步未移應来逺公石列坐援松枝權徳輿酬陸四十虎丘對月東風變蘅薄時景日妍和更想千峯夜浩然幽意多蕙香襲閑趾松露泣喬柯潭影漾霞月石床封薜蘿夫君非嵗時已負青㝠姿龍虎一門盛淵深四海推駸駸步騕䮍婉婉翥長離𤣥圃盡瑶樹家林輕桂枝聲榮徒外奨恬淡方自適逸氣凌顥清仁祠訪金碧芊眠瑞草秀㫁續雲竇滴芳訊發幽緘新詩此良覿故人石渠署美價滿中朝落日杉松直芬芬蘭杜飄雄詞鼔溟海曠度豁煙霄營道幸同術論心皆後凋循環伐木詠緬邈招隱情慙兹擁腫才愛彼潺湲清拘牽尚多故夢想何由并終結方外期不待華髮生劉禹錫青林虎丘寺林際翠微路立見山僧来遥從鳥飛處兹峯淪寳玉千載惟丘墓埋劍人空傳鑿山龍已去捫蘿披翳薈路轉夕隂遽虎嘯崖谷寒猿鳴松杉暮徘徊北樓上海江窮一顧日映千里㠶鵶歸萬家樹蹔因惬所適果得捐外慮庭暗棲還雲簷香滴甘露久迷空寂理多為聲華故永欲投此山餘生豈能誤又宿望海樓獨宿望海樓夜深珍木冷僧房已閉户山月方出嶺碧池涵劒彩寶刹摇星影卻憶郡齋中虚眠此時景白居易香刹看非逺祗園入始深龍蟠松矯矯玉立竹森森怪石千僧坐靈池一劒沈海當亭兩面山在寺中心酒熟憑花勸詩成倩鳥吟寄言軒冕客此地好抽簪夜逰西武丘不厭西山寺間来即一過舟船轉雲島樓閣出煙蘿路入青松影門臨白月波魚跳驚秉燭猿覷怪鳴珂摇曵雙紅斾娉婷十翠娥香花助羅綺鍾梵避笙歌領郡時将久逰山數幾何一年十二度非少亦非多武丘寺路自開山寺路水陸往來頻銀勒牽驕馬花船載麗人芰荷生欲遍桃李種仍新好住湖堤上長留一道春李紳秋山古寺東西逺竹院松門悵望同幽鳥静時侵徑月野烟消處滿林風塔分朱鴈餘霞外刹對金螭落照中官備散寮身郤累往来慙謝二蓮宫張籍望月登樓海氣昏劍池無底浸雲根老僧只恐山移去日暮先教鎖寺門宋晁迴逰虎丘詩并序余罷掌賦東陽歸次蘇臺時故人王士龍飲餞于閶門且曰虎丘山寺呉中勝㮣不越數里可能逰乎余沛然惬心諾而偕往由枝𣲖乗水輿嘯清風目逰趣棹工叢力葉舟如飛拂白英以半開縈紅樹以傍出詣幽境夐無纎塵相與披煙蘿凌磴道杳疑天外作為佛宫俯臨劍池呀若斷岸磊砢崷崪不能形容肆凝覽以東周惜頺景之西匿一觴一詠柅興而還遂裁八章以表嘉會時淳化四載自序餞别閶門復少留故人邀我浣離愁旋酟美醖乗漁艇急棹斜陽到虎丘千古劍池呀怪石一方金地枕清流歸時眷戀情無限不得從容秉燭逰王禹偁蘚牆圍著碧孱顔曾是當年海湧山盡把好峯蔵寺裏不教幽境落人間劍池草色經冬在石座苔花自古斑珍重晉朝吾祖宅一迴來此便㤀還樂天曾守郡酷愛虎丘山一年十二度五馬來松闗我今方吏隱心在雲水間野性羣麋鹿忘機狎鷗鷴乗興即一到興盡聊自還不知使君貴何似長官閒徒勞官職在天涯一望家園一淚垂不是虎丘多勝㮣拂衣歸去已多時丁謂久塵黄閣侍威顔忽擁髙牙出帝闗玉佩乍辭文石陛錦衣重到虎丘山倦飈時傍潺湲起珍羽多從杳靄還官大寵深難得暇林泉懐舊是偷閒梅詢鳳池初下陡孱顔虎寺重逰啟舊闗金鉞傳呼投釣渚寳天輝映讀書山卧龍昔日曾三顧遼鶴千年始一還應為蒼生須再起草堂蘿幄詎容閒蘇耆虎踞標靈跡危樓杳靄間劍池沈石壁金地湧秋山塔映松軒㫁雲迷蘚逕斑磬隨靈籟盡鶴伴老僧閒有句慙先哲無辭愈厚顔我來聊寫望頓覺離人寰范仲淹昔見虎眈眈今為佛子巖雲寒不出寺劍浄未離潭幽步蘿垂徑髙禪雪閉庵吳都十萬户烟瓦亘東南蒋堂林端生色美新晴樓閣依山若畫屏石坐最宜人選勝劍池潛想地遺靈僧牕松竹冬尤茂寺路煙霞晝亦㝠自媿踰年假麾守一迴方得扣禪扃張伯玉東客從来過虎丘橘花渡口維扁舟闔閭宫殿不可見但對古塔寒颼飀憶昔吳王全盛日水犀十萬横吳鉤楚山既掘荆人塚越嶺仍将勾踐囚豈謂西施能破國誰知麋鹿上臺逰惟有吳王在時月夜深閒照劍池秋蘇舜欽重事飄然付一舟吳山蕭寺且淹留白雲已有終身約醁酒聊驅萬古愁峽束蒼淵深貯月巖排紅樹巧装秋徘徊欲出向城市引領烟蘿空自羞蘇軾入門無平田石路穿細嶺隂風生澗壑古木翳潭井湛盧誰復見秋水光耿耿鐵花秀巖壁殺氣噤蛙黽幽幽生公堂左右立頑礦當年或未信異𩔖服精猛胡為百嵗後仙鬼互馳騁窈然留清詩讀者為悲哽東軒有佳致雲水麗千頃熙熙覽生物春意破凄冷我来屬無事暖日相與永喜鵲翻初旦愁鳶蹲落景坐見漁樵還新月溪上影悟彼良自咍歸田行可請蒲宗孟長松遶步水灣環寺據吳王冡墓間瘦石千層開碧玉踈圍十里裹青山壁從地上嶃巖起雲出門前自在閒零落生公講臺下無人説法但空還逰虎丘因書錢塘舊逰失卻湖山恨去舟新年無意作春逰東風昨夜思龍井曉雨全家入虎丘望見逺峯疑石衖悮尋歸路認花樓明朝因出閶門去清夢遥知在兩州章子厚和闔閭城外小層巒瘦竹寒松數里間並岸逢僧知寺近入門鑿石漸登山鈍鉤劍化空池在幽獨詩成白日閒逰客幸無官事束何須齋舫到昏還傳聞城角艤行舟自擁笙歌選勝逰偶為寒江阻潮汐再容清賞屬林丘燕回呉苑風和雪夢㫁錢塘月滿樓盡把蘇杭好烟景醉吟将去詫東州方惟深晉人事髙曠所得多竒僻雲巖佛子廬曾為二王宅當時槃樂地俯仰成今昔林泉亦余好徘徊相遺跡那知非昔人復作登臨客孫覿大雪同羣兒逰虎丘冬温陽久亢一雪意頗快乗興泛扁舟出郭信如邁放棹得虎丘恍然銀色界瑶山夾細逕瓊樹偃曲盖引步到層樓極目吳城隘飛鸞翔空中千峯羃天外景虚雲可凌寒重酒易觧羣兒慶老翁扵此氣不憊多病身如寄長貧氣自華只将窮事業便當老生涯泥飲醉生頰挑燈喜見花慇懃香火社閒病到毘耶禪客青鞋軟詩翁白帽斜驚回蝶栩栩喜聽鵲查查推户風敲竹登床雨散花匆匆一笑許隻履上青霞葉夢得同程俱逰虎丘得虎字我從山中來更覔林下侣常憂雲水脚臨老涴塵土髙堂老禪伯眉頰耀蓮宇號風一哮吼萬竅為吞吐乗髙寄逺覽城郭遥可數長陂去渺漭積潦㫁梅雨從容半日會邂逅平生語亂石拱槎牙重淵下深阻誰能望斗牛寳氣濯千古勿作李将軍彎弓徒飲羽程俱得丘字四顧𣺌平野孤撑見林丘常疑湧地出儻復海所浮上有千人臺靈蹤想前修無情肯深義頑石亦㸃頭下有百尺淵神光干斗牛隂崖不見日草木皆先秋兩晉多達士東亭抑其流結廬逺車馬寄此山之幽一朝施白足奔去如毛輶矧伊桑下宿肯作賈胡留尋壑復經丘人看李郭舟藤花多背日桐葉最知秋虎去藜藿盡龍歸蛙黽愁振衣臨石壁未羨習池遊方仲荀海湧起平田禪扉古木間出城先見塔入寺始登山堂静叅徒散巢喧乳鶴還祖龍求寳劍曾此鑿孱頑范成大不過溪橋又兩年偶隨笻竹訪幽禪有縁再踏雲巖路無處重尋石井泉擬輟半山分座住先攜一枕借床眠覺来飽吃紅蓮飯正是塘東稻熟天又致爽閣碧嶂横陳若㫁鼇畫欄相對兩雄豪東軒只有雲千頃不似西山爽氣髙葉適虎丘之名嵗二千虎丘之丘何𦕈然衆山争髙隱日月笑此拳石埋平田雖然㟝嶁疑異物劃開隂崖十丈懸冢中有恨索遺指亭上無語傳枯禪偏是吳人愛山急逐面分方夸凭立屋承隋唐良穩稱墨題熈豐尚新濕松稍莫遣風雨横石盤自添苔蘚澀春來春去吳人逰足蠒層顛踣應泣湯仲友虎是何年踞名存迹已亡塔從林外出山向寺中蔵池暗生寒氣臺荒受夕陽更無人弔古来祇為春忙元周馳茫茫句吳墟異阜崒然起諸天作藩屏樹立空翠裏人言開闢初涌出自海底至今羅宫室意與芝闕比夫差暴齊晉繼霸執牛耳金銀固九泉燼國用奢侈投身甬東地委棄孰憐己因思人間世踊躍徒為爾蒼茫一長望萬古遽如此日暮鐘磬閒且欲談至理張伯雨振屐稍踐危援藤遂支滑尚餘金玉氣山川相應發沼吳不滿眼軒中樹如髪花覆闔閭城石繞生公梋適與幽人攜及兹暮春月坐久得忘言移樽䕃清樾吳簡巨靈夜竊吳剛斧斸雲分得蓬萊股巉巖老石甚雄武女媧不敢支天柱六丁移近吳城傍土利剥蝕千風霜神膏迸蘚流玉漿碧泉澄露飛金莖當時湛盧淬秋月西走荆秦南竄越館娃宫成鋒即缺㫁烟荒草長愁絶我来適興登髙墟浩歌醉倒黄金壺百年榮悴君知無西施未必能亡吳倪瓚余適偶入城本是山中客舟經二王宅弔古覽陳迹松隂始亭午嵐氣忽斂夕欲去仍裵徊題詩滿苔壁髙啟與張憲金起王隅聨句飛梁上當空憲直壁下插水兩樹交古隂啟孤亭倒清泚初至意已愜憲再陟神亦靡氣銷淵龍蔵起骨朽山虎死蒼崖出鬼詩隅金蔵悶僧史霸圖渺何在憲世事果如此佳逰信難遭啟壮志良未已憑闌瞰神州起樹羽訝軍壘未暏煙塵清隅且躭林壑美啟臨風揮一觥憲藉草脫雙履鶯啄朱果殘啟蜂抱黄英委琴咽斜陽蟬憲棊戰欲雨螘溽暑避松箑啟輕凉透藤椅眯目尋黒甜憲潛心玩𤣥旨籟響破虚寂啟香清飄旖旎飯鐘隔煙來憲樵笛吹月起整轡戒僕夫起揖鞭謝釋子龎聲吠喧呵隅騎影歸迤邐遺戀尚眷然啟重来那復爾明發抗塵容憲何由繼芳趾啟又獨逰雲巖寄周䂡城西諸山非不竒我逰獨與兹山宜紅櫻春開山後寺白水夏滿山前陂幽居况與山不逺鐘鼔每到空齋惟雨餘烟中落日下曵杖徃讀頭陀碑兩崖蒼蒼石色古枇杷樹髙隂滿池殿燈欲昏上犀鼠塔鈴已静蹲孤鴟興來即逰興盡返迎送豈要山僧知困窮喪亂豈無感正賴此境忘吾悲嗟君何為乃自若破韉短策塵中馳掛帆能来亦未晩浦口三日南風吹楊基層軒構崇丘緑樹帶吳苑鳩鳴春竹静鶴下烟汀逺初登已神暢稍久竟忘返松髙急雨過草弱微風偃幽潭閟靈跡氣濕龍蜿蜿俯深戒臨危厯險知步蹇歸途極遐矚蒼茫失西巘釋良琦秋日歸虎丘虎丘共作五年留幾度相攜上小舟楊栁春橋半塘寺芙蓉夜月百花洲長林放鶴聞支遁一室編蒲老睦州此日獨歸懐往事空山草色不勝秋徐有貞雲巖雅集志天全翁自永昌歸吳三載扵兹矣閉門却掃非湖山之逰不出出則孤篷短棹飄然往翛然還而未嘗有同逰同樂者甲申秋九月上日自在居士自玉峯来始相約為登髙之集約所登曰山之近而佳者則武丘之雲巖乎約所集曰凡吾詩社中人皆可也然不必期翌旦至者即與及旦而鹿冠道人自東原至愛雲道人自牆東至醒庵未庵兩文學至自緑水園翁乃與之載酒肴出閶門追及居士扵畫舫而長沙幕賔繼至遂即舫中張宴為水嬉望山而進日卓午乃至而吾七人皆古衣冠步入山門笑詠以登巖緇野褐盱眙相視迎而導之自麓及巔凡臺殿亭館之有名者必造焉既乃遵鶴澗過松庵循劍池躋雲閣列席而飲用司馬公眞率會例酒至自斟杯行無算于時黄花方盛開采英浮白薦以紫莄緑橘而山珍海錯間之每酒行三五巡則一瀹以茗故雖酣而不醉醉而不亂間起而延佇巖阿憑軒以眺邇而千章之松萬竿之竹雲作之色風作之聲海濤怒鼔天籟和鳴目眩耳聳應接不暇逺而陽華諸山自乾而離陣列車連衡絶乎莾蒼之野其區之浸自坤而巽滙乎三江極乎雲海之涯块圠混茫與天無際使人神爽飛越将與造化上下同流而無間者因相與尋勾吳之遺跡弔闔閭之𤣥宫慕太伯之至徳企延陵之髙風嗟霸圖之易泯而知有道者之無窮也居士乃倡為四韻之詩鹿冠繼之兩文學繼之愛雲長沙又繼之而翁則旅酬而遍和之惟古以菊節登髙必以詩酒為樂事然能兼之者鮮矣孟叅軍之扵龍山有酒無詩陶徵士之扵栗里有詩無酒老杜之扵藍田小杜之扵齊山有詩有酒而無屬和之什且彼晉唐中季人亂日滋其皆不能無憂而我輩幸當太平之世以時㳺衍而兼有詩酒賡酬之樂然則斯集之雅盖前此所未有也扵是為志居士為玉峯夏仲昭鹿冠為京兆杜用嘉愛雲為吳興施堯卿醒庵未庵皆陳氏仲孟賢季孟英長沙為彭城劉廣洋而翁則東海徐有貞云吳寛逰虎丘江神子千人石上可中亭僧説法鬼来聽此事休談但愛石崚嶒二十餘年身再到頭已白樹猶青劍池一道水偏清撿泉經第三名斜陽休促客回城小閣半間重徙倚蘇子語是詩銘又登千頃雲閣蘇公詩句舊曾聞小閣猶題千頃雲故事流傳如昨日後人登覽感斯文田苗盡繞平湖緑江樹遥從過雨分日晩忩間頻拄笏西山佳氣正氤氲沈周雪中逰虎丘月色風光知幾醉好竒重補雪中縁急排巖樹開髙閣生怕溪山又少年城郭萬家羣玉府塔簷千溜半空泉香茶美酒如酬酢如此登臨亦可傳陽山一名秦餘杭山一名萬安在城西北三十里髙八百五十餘丈逶迤二十餘里以其背隂面陽故曰陽亦云四飛以四面視之勢若飛動也大峯一十五而箭缺為絶頂相傳秦皇射扵此故其下有射瀆戰國策云越王以散卒三千禽夫差扵干隧今萬安山有遂山即其地也箭缺下有文殊寺寺内石井大旱不涸有白龍洞嶺西有龍母塚東北有白鶴山以丁令威宅名山産白墡亦名白墡嶺又名白蓮峯以下有白蓮寺也今名澄照寺其前有龍湫白龍廟在焉髙啟詩我登此山巔不知此山髙但覺羣山總在下坐撫其頂同兒曹又見太湖動我前洶湧三十萬頃烟波濤長風吹人度層障不用仙翁赤城杖峯迴秋礙海鶻飛日出夜聽天雞唱中有一泉長不枯乃是蜿蜒神物之所都老藤隂森洞府黑樹上不敢留棲烏常年禱雨車来此投金符靈旗風轉白日晦馬鬛一滴霑三吳巖巒蒼蒼境多異樵子尋常不曾至探幽厯險未得歸忽聽鐘来澗西寺此時望青冥脫畧塵世情白雲冉冉足下起如欲載我昇天行古來名賢總何有唯有此山長不朽欲呼明月海上來照把長生一瓢酒浮􅉌醉枕肱洪崖笑開口天風吹落浩歌聲地上行人盡回首自此一支東北過金芝嶺曰管山亦曰巏山山北大石湧出如蓮花上有雲泉庵國朝張淵史鑑李應禎呉寛觀大石聨句巖巖者大石應禎竒觀人所誦遐想十載餘寛來逰五人共舍舟始登陸淵杖策不持鞚是時日當夕鑑兹山氣逾滃入門信突兀應禎拾級駭空洞落星何破碎寛靈鷲宜伯仲仰觀神欲飛淵俯瞰心屢恐鱗皴苔蘚剥骨立氷雪凍鑑神驅送道撝呵應禎鬼劈文錯綜尊嚴凜君臨寛張拱儼賓環列盡兒孫淵擁䕶等僕從欲假愚公移鑑諒匪雍龍伯種卧鼓慨桴亡應禎對臼怯杵重猊吻呀未収寛鬛怒難控凝血疑痛鞭淵立肺詎寛訟上漏還啟忩鑑中通自成衖大惟補天功小可砭肌用分矢肅慎來應禎浮磬泗濱貢淵㢘利並攢劍兀臬側倚甕嶧山辱嬴秦寛艮岳遺汴宋截彼民具贍淵壮哉客難奉鑑落照紅抺赭歸雲白流汞僧講㸃頭譍應禎将射沒羽中塵縁契三生寛陣圖懷七縱淵在懸太師撃攻玉詩人諷仙煮充腹飢鑑俗搘免腰痛瑶琨産惟揚見寛琅玕出乃雍髙題少室名應禎怪作東坡供半空玉蝙千仞附青鳳淵棲禪餘百年問僧僅三衆憑虚圍曲闌寛架壑出飛棟竹幽補堂拗鑑樹古嵌厓縫竇黑炊烟熏應禎坎平鍾乳壅盤盤棧道危寛㶁㶁水泉動淵登頓足力疲眺望眼界空鑑松露髮欲濡潭月手可弄寛窮攀任生皸應禎醉吟微帶齆列坐對彎跧淵大呼應鍠䃔嗜癖牛李愚鑑詩戰鄒魯閧寛拜竒得顛名憂墜成噩夢試與叩山靈儻來捐薄俸應禎沈周大石状望望秦餘杭首尾行不了大石突其凥翹然一拳橋山體厚蔵骨吐秀此特表正𩔖抱中嬰頭頂露扵褓形大氣則散趣足喜在小其深雖未即接目逺已好頃來莫能窮繼至敢草草循牆道林麓記曲乃遺杳登登覺向峻漸漸駕木杪猊峯據門左呵禁口欲齩有蹬沿百級有殿嵌山造並殿跨偃石懸身龍嫋矯行人自其下恍惚怖四爪轉髙蹐其背股慄身亦掉鎮腦結佛亭所仗力可擾四壁滿題句貴賤成雜掃同遊懲渉險旋踵促及早次尋巖問寮蜂房互窈窕緣勢盡西向局地窄接橑雲磴中貫穿所厯平地少山静日自長石瘠人亦槁坐僻覬居安傳竒被逰攪陽厓詫唇歉隂竇疑目窅虚含風飂飂濕映雲稍稍衆縐不可熨亂璺拆兆層疊百寳合正紺或厠縹亘此金剛座千古不可剿危椒壓屋脊雷雨常怯倒草木亦作怪牢絡萬蘿蔦蒼松長深縫本矮枝節老斜見山桃花微紅映叢篠草異傳多藥采掇未諳曉欲宿償三過衾裯悔忘抱既夕氣更佳延月象倍皎尚欠一踏雪意先有瑶島情状要細述言語未獲巧不期諸􅐑嵬拄腹早韞藁宛然紫芙蓉被我一手抝東坡昔袖去援例我非狡山僧苦著相便覺生煩惱西為陽抱山西北彭山温山圌山皆近太湖其北竹青塘又北曰雞籠山又北曰甑山山巔有七竅如瓦甑故名東南有象山即福夀山盤廻不絶至南𤓰山過爬石嶺而北曰北𤓰山又徐侯山在陽山西北十里一名卑猶一名徐枕吳越春秋越王乃葬吳王以禮扵秦餘杭山卑猶即此山也越絶書云夫差冢在猶亭西卑猶位索隱曰猶亭亭名卑猶位三字共為地名其下有沈尤村其西南出錦峯南出玉遮東南則鳳現嶺過嶺為鳳凰山晉太康二年掘地得石鳳故名又南為賀九嶺相傳吳王扵此慶賀重九崖壁有賀九嶺三大字過東南則為花山花山舊名華山去陽山東南五里山石峭抜巖壑深秀相傳山頂有池生千葉蓮服之羽化故名續圖經云或登其顛見有状如蓮華老子枕中記云吳西界有華山可以度難疑即此也山半有池在絶巘横浸山腹逾數十丈故又名天池山王璉詩清池穴山㘭止水玻璃浄雲衣汎晴漣天影涵空鏡龍歸海氣寒鳥度烟光暝銀漢此云通仙槎去非迴上有石鼓晉隆安中鳴乃有孫恩之亂王璉詩石鼔從何来宛似岐陽璞具相若天成由来匪人鑿雨蘚上重輪天花䕃頑廓定出時有聲逢逢殷山角石屋二間四壁皆鑿浮屠像王璉詩鑿石甃圜庵結搆因巖谷危梁琢堅珉濕礎裁寒玉梵相終無壊明燈自相續掘㫁青山根白雲長在屋又有龜巢石秀屏虎跑泉蒼玉洞紹興中張漢卿嘗居此號就隱山楊備詩巖屏晩樹噪寒鴉嵐翠樓臺釋子家池面鏡光功徳水金波影裏石蓮花范成大華山道中過午層隂未肯開暖寒村店竹篘灰蕭蕭林響棠梨戰晩恐陽山有雨来髙啟靈峯可度難昔見井中書天池在其顛每出青芙蕖湛如玉女盆雲影含夕虛人静時飲鹿水寒不生魚我来屬始春石壁烟霞舒灔灔月出後冷泠雪消餘再泛知神清一酌欣慮除何當逐流花遂造仙人居又陪姚叅政逰天池山騎馬尋幽度嶺遲老僧不識使君誰門開紅葉林間寺泉浸青山石上池殘果已収猿食少枯松欲折鵲巢危壁閒不用題名字無限蒼苔沒舊碑沈周逰天池山佛國有池峯頂見樓臺倒影入沄沄源通汞海石中發氣接銀河天上分抱子龍君吟夜雨洗頭玉女動春雲詩膓一渥便歸去過嶺微鐘西日曛其南為鹿山漢陽山野演山龍山茅山西有雞窠嶺清流山鹿山東南為龍池山今改隆池自此過涅盤嶺遂接南峯山即支硎山支隴支硎山在龍池山東北以晉支遁嘗居此而山多平石故名按玉篇吳有臨硎吳都賦亦云右號臨硎又按續圖支硎一名報恩山以昔有報恩寺也山有石室寒泉遁詩云石室可蔽身寒衆濯温手相傳遁冬居石室夏隱别峯也泉上刻紫巖居士虞廷臣書寒泉二字徑丈髙啟詩逺落叢峯間平流盤石上月照欲成潭風吹不生浪聲兼寒葉下色映秋苔漲野客照羸顔曾来倚笻杖又有放鶴亭馬跡石皆以遁得名范成大詩石門闗外古亭基樹老藤枯野徑微放鶴道人今不見故應人與鶴俱飛跨馬凌空亦快哉龍腰鶴背謾徘徊逰人欲識仙蹤處但覓蒼崖白塔來山有南峯寺及中峯北峯二院北峯宣徳間移扵雞窠嶺中峯在寒泉上又名楞伽院南峯一名天峯即唐支山院也有碧琳泉待月嶺南池新泉馬坡本名養馬坡諺云馬婆泉者誤也坡南有石門乃三巨石直上干霄西連危峯東臨絶壑中猶棖闑然又有牛頭峯在寺門之下東趾有觀音寺故又云觀音山白居易詩好是清涼地都無繫絆身晩晴宜野寺秋景屬閒人浄石堪敷坐寒泉可濯巾自慚衰髩上猶帶郡庭塵宋葉夢得澤國鍾下流有山獨西南標竒惜明眼夙昔多窮探腹背眩金碧鐘魚半精藍支郎放鶴地妙解無餘談髙木氣未炎緑隂正清酣我懶倦登陟兹行咤猶堪幽尋雖云初佳處黙已諳久欲謝塵滓往同彌勒龕平生術九九晩識前三三才也實可人窮年玩烟嵐胷中有定水萬境潛包含嚴霜掃頳紫老榦餘楩楠噉蔗要自佳食茶亦云甘坐㫁方丈室天花雨毿毿笑我窘世綱何如老眼蠶我今已觧縳真理蚤自躭但恐愛山意多求尚成貪願借待月嶺重開石頭庵偃松久傲兀碧琳故澄涵言尋覺菴路更欲從徧參定山在支硎西相傳支遁創報恩寺扵其麓扵此禪定故云按楞伽院石記云乾徳二年當州奏帖付蘇州府西封定山龍宫里報恩寺敕賜觀音院舊志疑定山即支硎之别號非也又按道林在吳土山墓下集同意者合入闗齋時道士白衣凡二十四人道林作詩三章越絶書土山者春申君治為貴人塚去縣十六里疑即道林齋會之地去支硎為近豈即此也按錢塘亦有定山與此不同其旁又有羊山與長洲縣分界高景山在定山羊山北三里自天平來漫衍數里至此而止越絶書作髙頸山范成大詩卓筆峯前樹作團天平嶺上石成闗緑隂匝地無人過落日秋蟬滿四山又髙景山夜歸伊軋藍輿草露間夜涼月暗走孱顔忽逢陂水明如鏡照見沈沈倒影山其西麓對花山覺林厓谷盤拱處曰金盆塢宋魏文靖公墓在焉其南為斜堰嶺天平山在支硎南五里視諸山最為􅍶崒其林木亦秀潤山多竒石詭異萬狀有卓筆峯髙啟詩雲來初似墨鴈過還成字千載只書空山靈恨何事飛來峯髙啟詩風吹峨眉雲来依此山住我来不敢登只恐還飛去五丈石髙啟詩勢危撐月墮影瘦倚雲平彷彿華峯井蓮花一半生卧龍峯巾子峯毛魚池大小石屋髙啟詩雙崖立幽闗一洞開深宇青嶂近為隣白雲間作主不受杜陵風可避河朔暑華棟幾回新渠渠獨千古張羽山根攢棟宇簷梲勢崚嶒却許誰來住閒雲共老僧其山頂正平曰望湖臺即逺公庵遺跡上巨石圓而面湖者曰照湖鏡楊基詩團團山上石下照太湖影如何一鑑中三萬六千頃山半有白雲泉白居易詩天平山上白雲泉雲本無心水自開何必奔衝下山去更添波浪向人間宋陳純臣與范文正薦白雲泉書粤自剖判融結其中傑然髙嶽巨浸不待標異固已聳動人耳目不幸出扵窮幽之地必有名世君子發揮善價所以會稽平湖非賀知章不顯丹陽舊并非劉伯初不振惟胥臺古郡不三十里有山曰天平山山有泉曰白雲山髙而深泉潔而清儻逍遥中人覽寂寞外景忽焉而来灑然忘懐碾北苑之一旗煑并州之新火可以醉陸羽之心激盧仝之思然後知康谷之靈恵山之英不足多尚天寳中白樂天出守吾鄉愛貴清泚以小詩詠題後之作者以樂天託諷雖逺而有未盡是使品第泉目者寂寂無聞䝉荘有云重言十七今言而十有七為天下之信非閤下而誰歟恭惟閤下性得泉之醇才猶泉之濬仁稟泉之勇智體泉之動靄是四雅鍾于一徳又豈吝陽春之辭以發揮善價純臣先人松檟寘彼一隅嵗時徃還嘗媿文辭窘澁不足為来今之信儻閤下一潄牙齒之末擘牒發詠樂天如在當斂策避道不任拳拳之誠范仲淹詩靈泉在天半狂波不能侵神蛟穴其中渴虎不敢臨隱照涵秋碧泓然一勺深㳺潤騰雲飛散作三日霖天造豈無意神化安可尋挹之如醍醐盡得清涼心聞之異絲竹不合哀樂音月明羣籟息涓涓度前林子晉罷雲笙伯牙収玉琴徘徊不擬去復發滄浪吟乃云堯湯嵗盈盈長若今萬里江海源千秋松檜隂兹焉如有價北斗量黄金錢藻白雲巖静最深隈泉溜泓容石竇開宿霧不生澄曉月殘風輕颺蟄寒雷源從天漢星邉落流自鏊峯海上回莫謂無心自奔注曾隨霖雨下山来范成大龍頭髙琢𠻳飛流玉醴丼渾乳氣浮捫腹煑泉烹鬬胯真成騎鶴上揚州别有一泉如綫注出石罅尤清冽曰一線泉宋僧夀老始發之范成大詩二十三年再入山此山與我有前縁時人不用憐衰病天與丹房一線泉有古松蟉糾如葢者曰華葢松俞焯詩次近勾陳第六星一株相似色𡨕𡨕能眠獅子山前路難比龍門石上形此十八公非草草後三千嵗獨青青来逰未怕遭風雨不用秦封請勒銘又有穿山洞蟾蜍石楊基詩神蟇月中來化作千年石曾吞玉杵霜清露時時滴龍頭石靈龜石及龍門髙啟詩龍門何峥嶸此地表竒蹟山分兩崖青天豁一罅白知非禹功鑿想是鬼手擘長為風雨闗開闔自朝夕深含未吐雲對峙不崩石日光寒易傾苔色隂更積只疑過此内便與人境隔始窺已幽深漸及尤險窄暗中把危藤蜿蜒欲驚魄僧留看古刻敲火照絶壁晩聞松聲號洶若波浪激不知神魚飛到此誰㸃額我嘗謁眞龍天門謬通籍何必更區區求為李膺客南趾有白雲寺范文正公祖墓在焉其西有筆架峯其後羣石林立名萬笏林宋周必大逰山録五月丁亥早范至能顔休文相别扵閶門外唐致逺聨舟遶城望姑蘇館而過八里至横塘又數里至黄山又數里過木瀆遂至靈巖院至能走价送薫香松黄新茶其簡云来日登天平須攀援至逺公亭及諸石屏處白雲泉名在水品其色凝白盖乳泉也張又新以虎丘石井松江在第三第六而下此泉未知如何試一别之向夀老欲作亭泉上及别築逺公亭寺石上山路傍有石龜極形似向亦有名近無知者忠烈廟具有文正以下畫像挂壁謁之丙辰早升小車過天平下嶺甚峻約數里至白雲寺圖經云唐寳厯二年置在縣西南二十五里本逺録公道塲今范文正公功徳院寺有白樂天蘇子美王君玉蒋希魯詩刻欲因致逺登山而脚力頓疲難之然思至能簡中語恐遺恨他年遂奮衣右轉而上酌白雲泉甚白而丼躡石磴至卓筆峯峯髙數丈截然立雙石之上附著甚􅑶危瓦疑其将墜餘如屏如矗或插或倚備極竒怪行十六七里石愈衆而力愈憊迺循左徑訪石屋三面壁立覆以二大石少休其中下至小石屋一石覆之又下至飛来峯髙二丈上銳下侈後附盤石前臨崖谷兹其異也又東下逺公庵一名望湖臺正直寺後又下至五丈石亦閣石上次至頭陀巖有葢斜蔽之次至龜石脊勢隱起名不虚得此山大抵皆石也瑰形詭状可喜可愕今日適疲倦又當暑不能窮其巔然郡人能至予之所至者寡矣况逰客乎歸寺欲拜文正及四子畫像坐待魚鑰移時乃至明日葢文正忌辰云髙啟逰天平山記至正二十二年九月九日積霜既霽顥氣澄肅予與同志之友以登髙之盟不可寒也乃治饌載醪相與指天平山而逰焉山距城西南水行三十里至則捨舟就輿經平林淺塢間傍竹石䝉翳有泉伏不見作泠泠琴筑聲皆欣然停輿聽久之而去至白雲寺謁魏公祠憩逺公庵然後由其麓狙杙以上山多怪石若卧若立若搏若噬蟠拏撑拄不可名状復有泉出亂石間曰白雲泉綫脉縈絡下墜千沼舉瓢酌嘗味極甘冷泉上有亭名與泉同草木秀潤可䕃可息過此則峯回磴盤十步一折委曲而上至扵龍門兩崖並峙若合而通窄險深黒過者側足其上有石屋二大可坐十人小可坐六七人皆石穴空洞廣石覆之如屋焉既入則凜然若将壓者遂相引以去至此盖始及山之半焉乃復離朋散伍競逐幽勝登者坐者哦者嘯者憊而喘者恐而咷者怡然若有樂者悵然俛仰感慨若有悲者雖所遇不同然莫不皆有得也予居前益上覺石益怪逕益狹山之景益竒而余之力益以憊矣顧後者不予繼乃獨褰裳奮武窮山之髙而止焉其上始平曠坦石為地拂石以坐則山之雲浮浮天之風飂飂太湖之水𣺌乎其悠悠予超乎若舉泊乎若休然後知山之不負扵兹逰也既而欲下失其故路樹隱石蔽愈索愈迷遂困扵荒茒叢篠之間時日欲暮大風忽來洞谷唅呀鳥獸鳴吼予心恐俯下疾呼有樵者聞之遂相導以出至白雲亭復與同逰者會衆莫不尤予好竒之過而予亦笑其怪怯頽敗不能得兹山之絶勝也扵是采菊汎酒樂飲将半予啟言扵衆曰今天下漾蕩十年之間諸侯不能保其國大夫士不能保其家奔走離散扵四方者多矣而我與諸君在上者之力得安扵田里撫佳節之來臨登名山以眺覽舉觴一醉豈易得哉然恐盛衰之不常離合之難保也請書之石明年将復来使得有所考焉蘇舜欽詩吳會括衆山戢戢不可數其間號天平峻絶為之主傑然鎮西南羣嶺争拱輔焉知造化意不以屏大府清溪至峯前仰視勢飛舞偉石如長人聚立欲言語捫蘿縁險磴爛熳松竹古山腰有危亭前對翠壁舉石竇落玉泉泠泠四時雨願生白雲間顔色若粉乳旱年成播灑潤可足九土奈何但澄澈未為應龍取予方棄城中巖壑素自許盤桓擇勝處至此快心膂養素聊自清終丼食扵虎范成大登天平山頂翠屏無路强攀援我與枯藤各半僊不敢髙聲天闕近人間漠漠但寒烟又重逰舊逰彷彿記三年轟飲題詩夜滿山山上白雲應觧笑又将塵土涴朱顔髙啟入山旭光迎出山月明送十里松杉風吹醒塵土夢兹山凡幾到題字遍巖洞陽崖樹冬榮隂谷泉夏凍怪石立誰扶靈草生豈種白雲蓊然来諸峯欲浮動髙鶻有危樓幽禽無俗哢凌蘚知履滑披嵐覺裘重嘗登最上巔逺見湖影空漁樵度溪孤鳥鵲歸来衆還尋老僧居隔竹聽清誦慰我躋扳勞為設茶筍供幾年厯憂歡造物若揶弄迷途逺山林遲暮堪自訟難追謝公逰空發阮生慟身今解紐紱明時愧無用閒持九節笻尋討事狂縱石屋秋可眠山猿許分共倪瓚天平爛熳遊三日林下狂吟石上眠浩蕩春風芳草緑梅花雪滿白雲泉楊基細雨茸茸濕棟花南風樹樹熟枇杷徐行不記山深淺一路鶯啼送到家徐有貞雨後逰天平諸峯滿庭芳水長新波山横爽氣朝来宿雨初晴動人清興紫翠眼中明天也教吾快活要逰處便與完成最好是一峯送過又見一峯迎有舟中絃管車前鼓吹隨飲隨行路傍人覷了還笑還驚道是神仙神仙来也不道是個老儒生知誰解浮沈緑野裴度晩年情其東為翁家山為雞籠山連屬金山髙啟雨中過雞籠山春雲晻靄澗奔渾風雨行人過一村得似山家深竹裏乳鳩啼午未開門顧阿瑛寄琦元璞雞籠山下野人家破曉寫詩邀品茶秋風過樹落紅葉夜雨滿溪流白沙金山亦天平之支壠也初名茶塢山晉宋間鑿石得金易今名頂上盤石有坎濶三尺許長二丈餘深不可測水瑩緑大旱不涸人稱為天山腰有石横偃扵兩崖人行其下其趾有育王塔方石池文殊菴在焉東南為牛眠崦逶迤五六里直抵大河國朝社庠詩闔閭城外翠微間揚子江心白浪灣踏破芒鞋蹤跡徧始知人世兩金山秦臺山在天平之右與笏林相隣巔峯大石刻秦臺二大字相傳始皇逰會稽嘗登此故名一名晨臺又名神臺其南則羊膓嶺嶺右為白羊山嶺之南為赤山長可數里土石多赭色洪武初詩人楊基家其下楊基赤山舊事曾向溪南看藝麻竹杠兠子一肩斜秧苗尚短仍含穀荷葉才髙已上花蠶屋柘烟朝焙繭鵲爐沈火晝薫茶而今風雨成抛絶卧聽西園兩部蛙松梢吹粉落衣裳躑躅花開竹筍長可是山中朝洗藥一渠春水茯苓香又懐赤山舊業東林攜策處南垞釋耕時一徑都縁石諸泉盡到池静憐松響續涼愛竹隂移盛世容歸隱毋令觧組遲漸與世紛逺自然塵慮消沼隨碧溪水徑渡綠隂橋岐路迷還識孤村近却遥閒身任來往不為野人招仰天山在赤山之東距天平不五里而近舊名馬鞍山宋范文穆公成大營墓扵此以近天平山且慕范文正為人故改今名傍有覺巖寺為文穆奉祠之所今廢范成大重九日行營夀蔵之地家山隨處可行楸荷鍤攜壺似醉劉總有千年鐵門限終須一個土饅頭三輪世界猶灰刼四大形骸强首邱螻蟻烏鳶何厚薄臨風拊掌菊花秋得夀蔵扵先隴之傍密邇松楸地一隅會心何必問青烏元宗雖愧鎮周子沒世尚從先大夫京兆漢阡賢聞望形山鄭冢儉規模家庭遺訓焄蒿在不學邠鄉畫古圖靈巖山在天平山之南一名石鼓山山椒有石皷鳴則有兵禍又名硯石山山連􅩯村産石可為硯故名又有石馬望如人騎館娃宫在焉西施洞響屧廊香水溪吳王井皆其跡也其詳互見古跡山巔有琴臺刻字猶存又有硯池髙啟詩山骨誰鑿破一泓自然黝醉後欲濡毫蜿蜿見科斗陳子真湛湛冷山骨幽幽抱日光曉吟看雨氣春供給花香翫花池山頂别有石池相傳生葵蒓今不復見靈巖寺在焉近燬惟一塔存耳韋應物始入松路永獨欣山寺幽不知臨絶檻乃見西江流吳岫分烟景楚甸散林􅉌方悟闗塞𣺌重軫故園愁聞鐘戒歸騎憩澗惜良逰地疎泉谷狹春深草木稠兹焉賞未極清景期杪秋白樂天娃宫屧廊尋已傾硯池香逕又欲平二三月時但草緑幾百年来空月明使君雖老頗多思擕觴領妓處處行今愁古恨入絲竹一曲凉州無限情直自當時到今日中間歌吹更無聲蘇舜欽古来興廢一愁人白髮僧歸掩寺門越相烟波空去鴈吳王宫闕半啼猿春風似舊花猶笑往事多遺石不言惟有延陵逃遁去清風髙節老乾坤宋李復圭吳王昔日館娃宫殿閣鱗差軼碧空寂寂香魂招不得惟餘松柏韻天風劉無降曉乗輕舸出江城晩上籃輿卻倦行盡日松風響巖谷小忩聽作亂泉聲胡珵攝身下蓬萊放浪雲水迹非無簡書畏心賞寄泉石亭亭雲間塔勝地聞自昔梯空上青𡨕如鳥著兩翼化城出天半寳甃坦如席環山劃中㫁裂地開震澤峩峩東西峯觀闕倚空碧千尋採香遥劒卧漣漪直當年館娃宫六月避暑夕琴臺延薫風萬女曳阿錫牛耳争齊盟鳥喙己著食百家甬東村託足歸無宅焉知陵谷變大厦響千舄矧兹風塵際樓殿踊山脊安隱大火中顯允像教力興予浩刼嘆萬法本空寂元袁易緒風散林薄洩霧開巖扃兹晨愜清穆曠懐延杳𡨕九折度峻壁微行窮絶逕夫差昔戾止鏘鏘駐和鈴華旗一以建繽紛朝百靈花飄磴道白村入禪聞青吳娃煽方處越甲蔽長坰千秋魂魄歸過沛涕亦零嗚呼重華後格鬬何由寧秦宫委蔓草漢闕流寒螢惟應金仙姿空山屹亭亭摩尼耀八極象教垂千齡周伯温丹梯百尺到松林連抱庭杉嵗月深永巷廊虚曾響屧荒岡臺古不聞琴娥眉傾國悲生樂麈尾談空後視今山下良田川似箭一區那得老雲岑重逰已隔十三春纎緑嬌黄幾度新白髮無情添世態青山有約待詩人菜花間麥畦搊錦薜荔縈藤樹簇鱗香逕斜陽啼杜宇舟迴圓月掛城闉髙啟閒上青臺望下方漁村樵塢盡蒼蒼傾城人逺苔生逕歸寺僧稀葉滿廊雲散池邊流塔影雨来閣外失湖光廢興皆幻何須問獨自吟詩送夕陽楊基單艫集羣英席窄坐每盍烟横半掩寺木落全見塔斜流出渠分曲逕轉豀合村粧妍醜並野話悲笑雜童操吳音聞僧作梵偈荅霜苔滑難躋露棘杇易拉磴紆螘縁樹扉敞蝸啟闔娛賓列五豆禮佛過三帀晴崖暝憂雨秋洞寒疑臘忩攀盜果猿簷入避鸇鴿掬池萍沾袖憩石蘚汚衲琴忘荒臺弄屧響回廊踏值險慮思笻得竒即傾榼感深怒須磔愁極衰鬢颯華年倐川融雅量慚海納嘯歌激欷歔雄辯互交發禪寂虚無量道祖清静葢品囂蝸觸蠻變幻雀化蛤狂逰𩔖飲酎薄宦避嚼蠟終當謝塵鞅掃屋分坐榻徐有貞水龍吟慢佳麗地是吾鄉看東山更比西山好有罨畫樓臺金碧巖扉髣髴十洲三島却也有風流安石清真逸少向西施祠口望湖亭畔對雲影天光上下相涵相照似寳鏡裏翠蛾粧曉且登臨且談笑眼前事幾多堪弔香徑蹤消屧廊聲窅麋鹿還逰未了也莫管吳越興亡為他煩惱是非顛倒嘆宦海風波幾人歸早得在家中老遇酒美花新歌清舞妙儘開懐抱又何須較短量長此生心應自有天知道醉呼童更進餘杯便挨得到三更乗月迴仙棹呉寛三十年来續舊逰莫春時節水西頭前朝古蹟終難滅半日浮生得自由鳥下林間雙白羽山横湖上兩青漚笛聲忽自琴臺起落日都忘滯綵舟玉遮山在陽山之南横列如屏今但呼為遮山舊志為查山呉寛詩見山不識山借問山中人玉遮亦深秀翠色聳嶙峋肩輿繞其趾面面松杉新峯巒稍回伏穹窿復呈身細草被長岸盛夏無埃塵乗閒即行樂願作兹山賔其南有按山化山苦竹山其北有蜀山近光福鎮東南有貞山初名蒸山以其雲氣如炊也東有官山馬山又東為雅宜山本名雅兒唐青州刺史張濟女雅兒葬此吳語兒為倪因譌為宜或云虞集改今名傍有小山曰茹初名箬如近時居民掘地得唐元和十九年金氏墓誌云葬扵茹山陽始知其譌或云即雅宜山倪瓚詩雅宜山舊名娜如山葢虞道園所命名然未若娜如之名近古也因為竹枝歌二首娜如山頭松柏青閣閭城外短長亭來山未久入城去駐馬回看雲錦屏娜如山頭日欲西採香逕裏竹雞啼南朝千古繁華地麋鹿蒿萊望眼迷其東有朝山陂陀曼衍至竒禾嶺一作岐荷衆山連接不可名状又東則五城山至金井塢又東則眞如塢與小白陽山相連小白陽山一名伏龍山在金井塢南横聳衆山之外山址舊有寄心菴今廢其東南為博士塢彌陀嶺竺峯嶺又東南則獅子巖在㠛村之上又南則野芝塢皆連屬靈巖山錦峯山在陽山西南産石紫赤色而秀潤故名宋兵部尚書鄭起潛居此淳祐中理宗書錦峯二字賜之其西南則蜀山西北為新豐山鄧尉山在光福里俗名光福山在錦峯西南與𤣥墓銅坑諸山聨屬按聖恩庵開山記作鄧尉山庵在𤣥墓山之南岡記作袁墓村盖舊志以袁為𤣥蔚為尉而名村以山耳後得宋進士葉和甫墓誌與舊誌相合其東有虎山鳳鳴岡至理山北有龜峯光福寺在焉呉寛昔年曾學登山法縱步不憂山石滑舍輿徑上鳳岡頭趂此涼風當晩發逺山朝士抱牙笏近山美人盤鬒髮我身如在巨海中青浪低昻出復没山下人家逺市㕓家家炊烟起曲突梅林屋宇遥復見一似野鳥巢木末山僧見山如等閒翻怪羣山競排闥偶憑髙閣發長笑笑我胡為躡石鉢夕陽滿目波洋洋西望平湖更空濶山靈為我報水仙預役清泠供酒渴吳人非不好登山一宿山中便愁絶扁舟連夜泊湖口舟子長篙未須刺懶逰己笑斯人駭狂逰不學前輩達若耶雲門在扵越何必青鞋共布襪其相連諸山有上崦有安山聚塢山朝士塢蟠螭山西磧山在游湖南彈山即小雞山在湖濵土阜也笠澤叢書小雞出胥門西行四十里過光福市市西五里土多石寡無大林木竺山一名竹山觀山茶山即繡裘山也吾家山茒岡山石帆山禇山邢山㳺城山在㳺湖北長山皆附鄧尉山楊基詩隨意扶笻入逺林紫藤花落逕苔深山中莫道無音樂一片鶯聲在緑隂銅坑山在鄧尉山西南一名銅井晉宋間鑿坑取沙土煎之皆成銅故名上有巖洞其懸溜滙而為池清冽可飲名曰銅泉張羽詩牽蘿陟雲崦想此盤陀石欲去更題名淋漓蘚花碧定有樵夫來怪是龍蛇跡徐賁山行興未窮復登白雲嶠石上識會逰墨花破孤峭隣僧尚未見知有幽人到吳寛銅坑山下徧楊梅曲徑人從樹杪來共愛石橋凉似水湖梢未放酒船迴𤣥墓山相傳郁泰𤣥葬此故名在鄧尉西南一名萬峯山山之半南面太湖逺見法華山如屏浮扵波面東有米囤山與石牌至理諸山相連直抵吕山其西則孫家蟲頭諸山迤邐入扵湖心其南為周山法華山在𤣥墓山南一名鉢盂一名烏鉢西南北三面皆在湖中宋丞相李觀察墓在焉峯塢幽閴逰者鮮至其東有横山漁洋山迤邐數里與周山連屬自陽山錦峯而來至此而止姑蘇志卷八
