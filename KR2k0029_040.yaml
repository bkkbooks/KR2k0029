body:
  text: 姑蘇志卷四十一明王鏊撰宦蹟五鄭昌故呉令也漢王還定三秦項王聞漢皆已并闗中且東齊趙叛之大怒以昌為韓王距漢陸烈字伯元漢初為呉令豫章都尉既卒呉人思之迎葬於胥屏亭子孫遂為呉人郡中陸姓皆其出也郎宗安丘人善京氏易風角星筭推步吉凶安帝詔公車徴宗對䇿陳災異拜議郎除呉令到官一月時卒暴風宗占以為京師有大火定火發時果如宗言諸公聞之表上博士徴宗恥以占事就徴文書未到夜懸印綬置㕔上遁去終於家真誥宗字仲綏占知火燒大夏門既遁去居華山下服胡麻得道今在鹿跡山洞元賓姓名缺元賓其字也以孝亷入三署除倉龍司馬衛尉察尤異遷呉令憲陽春以加惠有鄭僑見思之歌視事二稔民用寧康辟州從事召拜議郎延熹二年卒吕岱字定公一云山公廣陵人寛簡有雅量好賢愛士為郡縣吏避亂南渡時孫權領㑹稽太守岱詣幕府出守呉丞權親斷諸縣倉庫及囚繫長丞皆見岱處法應問甚稱權意召署録事歴餘姚長交州刺史交趾九真太守始岱嘗親近呉郡徐原賜巾褠與言論後遂薦拔原好直言岱時有得失亦公論之人以告岱岱歎曰是我所以貴徳淵者也殷禮字徳嗣雲陽人弱不好弄清識過人少為郡吏年十九守呉縣丞孫權為呉王召除郎中後與張温俱使蜀諸葛亮甚稱歎之稍遷至零陵太守孟宗後避孫皓字易名仁字恭武江夏人初為驃騎將軍朱據軍吏遷呉令時制不得將家之官宗每得時物未以寄母常不先食先又有詔吏在官聞父母喪當須交代故犯者加大辟宗喪母犯禁奔赴已而自拘於武昌以聴刑陸遜陳其素行以為之請權乃减宗一等後不得以為比宗仕四朝累遷光禄勲謝詢河東人晉元康中為呉令表為呉二君孫堅孫䇿置守冡詳見冡墓條江逌字道載圉人也蘇峻之亂屏居臨海家貧求試太末令州檄為治中轉别駕遷呉令殷浩謀北伐請為諮議㕘軍浩甚重之歴太常本州大中正卒顧修期義熈中為呉令時縣西鄉有柿樹合本殊條江康之考城人中書侍郎淹之父也文雅有才思東晉時為南沙令王逡之字宣約臨沂人諮議參軍環之子也少通禮學博聞仕宋為呉令齊南康相光禄大夫陳珉潁川人為呉令發摘姦伏境内以為神明與北地傅僧祐髙平張祐並以吏才見知宋世言長吏者以三人為首沈叔任武康人充曾孫也少有幹質為宋武帝太尉㕘軍呉山隂令治皆有聲官至益州刺史何子平灊人世居會稽少有志行事母至孝揚州辟從事史元嘉末除海虞令縣禄供母不以及妻子人疑其薄子平曰希禄本在養親不為己也母喪去官哀毁踰禮每哭踊頓絶方蘇大明末東土飢荒繼以師旅八年不得營葬晝夜號哭常如袒括之日冬不衣絮夏不清凉一日以米數合為粥不進鹽菜所居屋敗不蔽風日兄子伯興欲為葺理子平不肯曰我情事未申天地一罪人耳屋何宜覆蔡興宗為會稽太守甚加矜賞為營冡壙除喪既久猶以過毁殆至不立㓜持操檢敦厲名行雖處闇室如接大賓學堅義明處之以黙安貧守善不求榮進時彌貴之祖冲之字文逺范陽道人也宋孝武使直華林學省歴公府㕘軍婁縣令入齊為長水校尉鮑照字明逺上黨人家世貧賤少有文思宋臨川王愛其才以為國侍郎王薨始興王又引為侍郎孝武初除海虞令太學博士兼中書舎人臨海王子瑱為荆州照為前軍掌書記子瑱敗為亂兵所殺孔琇之山隂人有吏能仕齊為呉令有小兒偷刈鄰家稻一束琇之付獄按罪或諫之琇之曰十嵗便能為盗長大何所不為縣中震肅後為臨海呉興太守在任清約政稱清嚴周洽汝南人歴句容曲阿上虞呉令亷約無私齊武帝時卒於都水使者無以殯殮吏人為買棺器江介建武中為呉令為政深苛或牓髑髏於門為介父首介遂棄官去公上延孫永泰中為南沙令㑹王敬則反衆至晉陵邑人范脩化殺延孫以應之敬則平贈延孫為射聲校尉宋書元徽五年敬則結楊玉夫等弑帝延孫其一與南史不合傅􅔘靈州人祖祐山隂令父琰宋武康山隂二縣令並著竒績時云諸傅有理縣譜子孫祖傳不以示人翽為官有能名後為呉令别建康令孫亷亷問翽曰聞丈人發姦擿伏惠化如神何以至此荅曰無他也惟勤而清清則憲綱自行勤則事無不理憲綱行則吏不能欺事理則物無凝滯欲不理得乎天監中為建康令復以能稱後位驃騎諮議唐傭天監中為呉令鑄盤龍火爐翔鳯硯盖有司奏之詔禁銅終身蕭介字茂鏡蘭陵人祖思話父惠蒨齊左户尚書介天監十二年轉主客郎中出為呉令甚著聲績湘東王聞其名思共游處表請之普通三年以為諮議㕘軍官至光禄大夫侍中沈浚字叔原武康人涉學有才幹仕梁歴山隂呉建康三縣並有能名太清二年累遷御史中丞卞華字昭岳宛句人晉驃騎將軍壼六世孫也孤貧好學召補國子生通周易及長徧習五經聚徒教授愽涉有機辨說經析理為當時之冠江左以來鍾律絶學至華乃通焉位尚書儀曹呉令陸䝉事梁為呉令節操甚髙沈炯字初明武康人少有俊才歴尚書左民侍郎出為呉令侯景之難太守袁君正入援京師以炯監郡京城䧟景將宋子僊據呉興召炯委以書記之任炯固辭以疾子僊怒命斬之炯解衣就戮以故獲免王僧辨購得炯羽檄軍書皆出其手景東奔至呉郡獲炯妻虞氏子行簡並殺之梁元帝愍其妻子嬰戮特封原鄉侯徴為給事黄門侍郎領尚書左丞後䧟沒於魏尋還陳預大政卒於呉謚恭子何之元灊人好學有才思為袁昻所重昻為丹陽尹辟為五官掾尋除信義令之元宗人敬容位通貴頻相顧訪之元終不一造或問之對曰徳薄位隆覆敗可待吾懼及禍耳識者稱歎陳太建中歴湘州刺史始興王叔陵諮議㕘軍及叔陵誅之元屏絶人事著梁典三千卷禎明三年京城䧟移居晉陵隋開皇間卒殷不佞字季卿長平人梁尚書兵部郎髙明之子也少立名節居父母喪以至孝稱承聖初為武康令有惠政孝武受禪除婁令至通直散騎常侍沈君髙字季髙呉興人君理第六弟也少知名性剛直有吏能女為後主后早居清顯歴廷尉卿太建初東境大水百姓飢弊以君髙為貞威將軍呉令歴太子中庶子廣州刺史卒諡祁子王凝字叔恬龍門人文中子通之弟貞觀四年起家為監察御史使益州時長史髙士亷以勲威自重從衆僚候之昇仙亭凝不為禮訶却之士亷甚恥五年士亷入為吏部尚書㑹凝赴選遂出為呉令按通子福畤云凝為御史劾奏侯君集有反狀太宗不信出為呉令杜淹奏凝直言非辜長孫無忌與君集善由是與淹有隙王氏兄弟皆抑不用李寀唐太宗弟十子紀王慎𤣥孫也為崑山令岑仲翔鹽官人宰相文本孫也為長洲令時兄羲為金壇令弟仲休為溧水令皆有治績宰相宗楚客語本道巡察御史曰母遺江東三岑仲翔歴太子中允陜州刺史范齊融越州人為崑山令神龍中與于休烈賀知章賀朝包融為文詞之友齊名一時談戭曲阿人長洲尉有詩名與包融等十八人為詩殷璠彚次為丹陽集張旭為常熟尉因老人求判得觀其父所書益盡其法詳載人物條顔顥琅邪人魯公真卿之子也為常熟尉弟頔字仁純為呉縣簿子孫遂家於呉劉太真字仲適金陵人唐書作宣州人弱冠以行義修潔詞藻瑰異為蕭穎士所知廣徳中以薦授左衛兵曹李栖筠在浙西表為常熟令到官未期一邑自化歴官禮部侍郎信州刺史蕭存字伯誠墓志云字成性蘭陵人梁鄱陽王恢之後集賢校理頴士之子也亮直有父風能文詞與韓㑹沈既濟梁肅徐岱等善李栖筠表為常熟主簿顔真卿在湖州與存及陸鴻漸等撰韻書數百篇建中初由殿中侍御史四遷比部郎中蕭審工部尚書旻之子永泰初長洲令在任三年有理跡邑人畏憚之王綱大厯九年以大理司直為崑山令政務化民始作學舎置博士弟子貟民興於學有不被儒服而行者莫不恥焉事見梁肅作修學記盧東美范陽人大厯三年李栖筠為浙西亷使奏為從事十一年為呉令歴太常博士監察御史河南府司録考功貟外郎咸舉其職梁肅稱其外寛内明敬事而信韓愈謂其少未出仕在江淮間與韓㑹張正則崔造為友好談經濟之略嘗以王佐自許天下大夫士謂之四夔亦期以相器云滕遂貞元二十一年舉明經及第又書判登科歴大理評事長洲令攝呉縣時人歌曰朝判長洲暮判呉道不拾遺人不孤人謂有漢叔輔之遺風改侍御史供奉賜緋王嵩幽州人大理評事適之父元和中為崑山丞見韓愈所撰墓志李暵元和中為常熟令劉允文記新開常熟塘碑以誦其績劉綺荘毘陵人為崑山尉研窮今古纂記浩博作𩔖書百卷行於世名崑山編權立同平章事文公徳輿之從兄也敏學行薄於宦情為崑山簿徳輿作序送之劉尉者失名獨孤及言其傲迹峻政能使綱不紊吏不欺卒以不茍合忤物為時所謗由長洲貶南巴周思輯汝南人咸通間為常熟令嵗旱禱於破山龍祠得雨邑人霑感皮日休記其事後為給事中韋至誠唐呉縣尉范志許延祚朱梁時知常熟子孫遂為家蔣文懌以朝奉郎試大理司直行常熟令事兼監察御史太平興國三年錢氏納土後首任七年去任餘杭陸韶之作頂山龍祠記載其政事羅處約字思純華陽人太平興國中擢第為大理評事知呉縣有惠政時王禹偁知長洲日以詩篇倡酬播誦蘇杭間後並召赴闕上自命題試之以處約為著作郎禹偁為右拾遺皆直史館賜緋魚在縣日作呉郡圗經别有東觀集十卷禹偁為序蘇易簡表上之詔付史館王禹偁字元之鉅野人世為農家九嵗能文畢士安見而美之稱為小友太平興國八年擢進士授成武主簿一作威武改大理評事知長洲縣其自叙云禹偁名利之流也一身之計有親族妻子焉雖内無妾外無僕不可去者凡百指晨有炊㸑夕有脂燭伏臘慶弔居其外月得俸金太半長物是以從官三年徒行而已一邑之政有稅傭稅調焉土甚瘠而民不懈吏好欺而賦愈重亷其身而濁者忌之直其氣而曲者惡之懇無知音動有變畏去年多稼不登編户艱食賦歛之數有乖其期而民部督成於郡郡侯歸罪於縣鞭笞之人日不下百數軰菜色在面而血流於膚讀書為儒胡寧忍此因出吏部考課厯納質於巨商得錢一萬七千市白粲而代翰之始可免責春夏以來民有歸其直者蓋三分有其二焉時同年生羅處約宰呉縣相與賦詠人多傳誦太宗召試擢右拾遺直史館賜緋故事給銀帶上特命以文犀帶賜之屢遷翰林學士元之在朝嘗上疏曰臣舊知蘇州長洲縣七千餘家自錢氏納土以來朝廷命官七年無縣尉使主簿兼領之未嘗闕事三年増置尉未嘗立一功以臣詳之天下大率如此誠能省尉三千貟减俸數千萬以供邊備寛民賦亦大利也出知滁揚二州咸平初預修太祖實録與宰相意不恊出知黄州作三黜賦以見志卒章云屈於身而不屈於道雖百謫其何虧四年徙蘄州卒年四十八子嘉言嘉言字仲謨天禧初知舒城縣方服除㑹真宗觀書龍圗閣得禹偁奏章嗟美其切直因訪其後宰相稱薦嘉言即召對擢大理評事知長洲縣既禹偁舊治而嘉言年與官又皆同士大夫賦詩榮之遷大理寺丞邉倣華州鄭人雍熈初錢氏納土倣首為呉崑山兩縣復興學校俱有賢行璽書奬勞仕至殿中丞李璨文正公昉族人也為常熟令淳化四年任滿赴調時昉在相位言其父崧在晉為侍中漢末被誅周太祖時已雪其寃還其田宅璨始四嵗授校書郎及其為令年近知命乞與陞擢詔授著作佐郎王世昌字次仲許州人知鹽官縣改常熟轉運使張式以治狀奏充秀州判官終都官郎中李維字仲方肥鄉人文靖公沆弟也為崑山令至道三年獲白龜獻之郡官終尚書左丞趙稹字表微宣州人為人誠質寛厚以大理寺丞知崑山累官太子少傅謚禧質馬尋字子正鄆州人祥符初進士授呉江簿兄彞戒之曰到任半載可誦律書為治民之本後彞至縣詰之荅曰治在孔道疲於賓餞未暇及也彞不恱尋曰少緩期諷之至冬果精律學繼登朝籍久參法寺有平允之譽累著治聲彞之力也趙球居開封畜書萬卷祥符中秘藏火四庫書皆盡球上其家書授三班借職用薦知呉江縣武弁為邑自球始天聖中修築松江亭終右侍禁錢振天聖三年以登仕郎為常熟主簿范文正公送歸省詩云姑蘇臺下水如藍天賜仙卿奉㫖甘梅淡栁黄春尚淺王孫歸思滿江南盖郡人亦呉越之裔也梁適字仲賢須城人翰林學士顥之子也天聖初為開封功曹知府吕夷簡薦知崑山縣徙知梧州後拜相卒謚莊肅鼂宗恪字世恭以世父逈恩補將作監簿知常熟縣修學校理溝防人頼其利劉立言字禹昌臨江人以殿中丞知長洲縣多過客或求發民以輓船一人不與郡官為移書亦不聴所至興利除惡其去人輙思之夏噩字公酉池州人以試光禄寺丞知長洲性卞急遇事輙發出語無隱情人多憚之提刑陳道古惡其輕傲捃以私貸民錢按罪勒停坐廢十年文彦博為白於朝詔還其官張方平字安道揚州人言行録宋城人景祐中知崑山時呉越歸國未久前此豪民占田積訟有數十年不決者方平召問所輸租㡬何大率百纔一二乃悉收其羡田以賦貧民而訟亦息知州蔣堂得方平所著芻蕘論上之後拜㕘知政事以太子太保致仕卒謚文定張先字子野湖州人康定初進士知呉江有惠政詩格清麗尤長於樂府仕至都官郎中年八十九卒有集樂府行於世王庭堅字世美慶厯三年尉呉江政稱平允與令李問議率民輸錢數百萬欲建廟學㑹有詔不許遂移其材以建長橋横截江湖間長二百餘丈民甚利之晉陵錢公輔作記以精敏沈毅稱之丘與權至和中為崑山主簿時議修崑山塘與權陳五利且言事或不成請以身塞責即列其議以聞塘成至今為利後趙抃薦其嘗為蘇州教授學者如歸困窮守道未始隕穫王珪亦薦之曰藝文優贍議論純正遭時右文宜見收采韓正彦字師徳安陽人魏忠獻王𤦺從子也嘉祐中知崑山縣剏石隄疏斗門作塘七十里以逹於郡得膏腴田數百頃又請以輸州之賦十三萬從便輸於縣鳩作塘餘材為縣倉以儲之民大恱比去遮道以留為立生祠作思韓記鑱石祠下裴煜字如晦嘉祐六年令呉江歐陽修梅堯臣皆作詩送之沈遼字叡逹錢唐人翰林學士遘之弟也為崑山令遼㓜不羣長益好學讀左氏班固書摹仿輒似受知王安石及安石當國遼為審官西院主簿論事不合罷後攝華亭縣他使者有夙憾因民訟連及下獄奪官流永州更赦徙池州杜門隱几間為文章雄竒陗麗與曾鞏蘇軾黄庭堅唱酬竟不再起林肇字公權呉興人寶元中進士熈寧三年以尚書屯田貟外郎自請知呉江始至覽江湖之勝緬懐古人慨然有歸歟之興乃即松陵勝處作鱸郷亭繪三髙像其中既落成遂具舟由亭下拂衣而歸錢勰字穆父其先嗣呉越王倧生易易生彦逺彦逺生勰熈寧三年中秘閣選廷對入等㑹王安石罷其科以䕃歴知尉氏崑山中書舎人給事中知開封府以不避豪貴出知越州哲宗朝翰林缺學士命勰仍兼侍讀為章惇所詆罷知池州元符末追復龍圗閣學士王㡬字彦成江都人知舒城未赴丁父憂王安石知其才選宰長洲縣政剛則跲弱則廢㡬平其政弛張以時卒之懾服豪強貧細得職嵗饑廣賑救之䇿人物按堵權勢者欲侵橈之執度不回治聲聞京師范擴為常熟簿曽鞏舉其博學能文尤通經術敦重恬靜見於人為以母老家貧樂仕鄉土堪充館閣及國子監直講任使陳察字晦叔考亭人擢進士知呉縣蔡京過之為書懸榜察不受京當國召命再至亟引疾致仕後入元祐黨籍年九十五而終常安民字希古卭州人年十四入太學有俊名時取程宗王氏安民獨不為變第進士元豐六年知長洲縣邑中權豪肆横訟牒日數千安民先正紀綱圖籍以立政本省文移追呼以清訟原始至求亂政者得何平丁文通朱鈎花三人杖而屏之終政不敢至訟庭縣故多盗籍嘗犯者書其衣榜其門約能得他盗乃除盗為之息鄉胥掌田里租庸之籍移易輕重為姦弊莫能制募吏法當試因令根摘版籍之欺隠代之獲冒請青苖者荷繋於庭使指識冒名人以贖罪其約而有法皆此𩔖也大率以至信為本信既立人不忍欺催科不事鞭朴不下吏手豫為信限掲實數於縣門使自諭輒先他邑辦負坊塲責者户率十數人督之坐食其家安民悉縱之使歸葺坊事與約分所負為三年自輸之親為受之部使者聞愕曰常平法敢爾緩耶安民曰異時以昔較今儻増溢不敢自以為能庶幾邑人獲一飽已而償數果倍歳旱農盗决運渠以溉田法當徒犯者且衆安民白郡守曰水所溉榖成當得賦入數十萬今未至盪舟而寘人於法坐失數十萬之入以此較彼孰利孰害請釋勿治是歳吳大旱惟長洲中熟及安民去官犯者論如法皆號呼田間曰安得常公活我於將斃轉運使許懋孫昌齡入境邑民頌其政皆稱為古良吏其政事之詳見自著長洲政事録元祐初李常孫覺范百祿蘇軾等薦擢大理鴻臚丞時姦黨分布中外安民貽書吕公著引喻明確及章惇作相其言遂驗安民正直敢言蔡京用事入黨籍後謚敏節鄒浩字志完晉陵人元豐進士調吳縣簿元符中以言事監袁州酒稅責授平江軍司馬南安軍安置卒謚忠洪彦昇調常熟尉奉母之官既至前尉欲申期三月以規薦而中分俸入彦昇處僧舎郤奉不納如期始交印郭三益字慎求義興人元祐進士才髙有器識大臣屢薦之為常熟丞常平使者調蘇湖常秀之人濬青龍江分地程役三益所部前期告辦使者留其人使助他邑三益徑引歸使者怒檄追甚急三益頗為戚其母周曰使者行悔矣然不可無往第無以部人從三益如教使果檄止丞勿來徐勣字元功南陵人舉進士調呉江尉終顯謨閣學士挺挺持正為徽宗所禮重而不至大用時議惜之石公轍字道叟新昌人紹聖二年特奏狀元任南劍州教授轉呉江令初學宫在縣治西南厄於兵公轍以東門外開江營舊基改建又置田給士養即今學也後通判平江府陞大宗正向子韶字和卿開封人元符三年進士知呉江縣郡人私鑄錢流布一路郡將聽自便子韶以為不可騰書極言之下令禁其部無敢犯者已而中司論其事詔置獄繩故縱之吏諸邑皆曰太守命也呉江令嘗力爭書具在子韶聞制使來謂須被逮具裝以候吏及門即行初知州意子韶必以抗論不從為詞子韶至卒無一語獄成守以下皆貶秩子韶賞一官大觀三年除開封府右參軍靖康中知淮寧府與金人巷戰舉家被害贈通議大夫謚忠毅虞賔字舜臣山隂人以宣徳郎知長洲縣縣多富室大姓數負強亂法黠吏横索亡度率倚公以漁獵民二千石無敢成其罪賓張設耳目盡得姦利鉏治之一縣屏息嵗大侵民無蓋藏部使者猶急宿負檄下曰必辦賓閣束文書不問使者怒賓進說云云使者驚謝之㑹邑民遮道願借留虞君即表民言於朝累遷比部貟外闕懋字叔夏贑州人崇寧間主呉江簿歴仕至禮部尚書程俱字致道信安人元符中為呉江簿政平訟理有循良之風優文學作松江二賦三髙祠詩序逺近騰誦之卒官中書舎人後簿髙文虎以曽懋及俱為此官作曽程堂以寓景仰范成大為之記冦國寶呉縣簿葉夢得詩話云余居呉下一日出閶門至小寺中壁間有題詩一絶云黄葉西陂水漫流蘧蒢風急滯扁舟夕陽暝色來千里人語雞聲共一丘意極喜初不書名氏問寺僧云呉縣冦主簿所作今滿去矣歸而問之士大夫云冦名國寶蓋與余同年然皆莫知其能詩已而數為好事者舉此詩始有言國寶徐州人久從陳無已學乃知文字淵源有所自來亦不難辨恨不得多見之也張克戩字徳祥開封人侍中耆曾孫大觀中知呉縣俗好訟大姓怙勢伺持官府縣令踵故俯首務為不生事幸得去而已克戩一切裁以法姦猾屏氣部使者以狀聞召為衛尉寺丞靖康初金人攻城克戩畢力捍禦外援不至諸帥列城逼降克戩臨陴大罵朝服南面焚香拜舞引決一家死者八人事聞贈延康殿學士謚忠錢中庸呉越武肅王𤣥孫用父哲䕃為郊社齋郎調呉縣簿不樂仕宦隱於郡之峨眉山而卒陳瓘字瑩中沙縣人元豐進士徽宗朝自正言遷司諫數言事天下傾注之政和元年再被謫主呉江簿未㡬卒贈諫議大夫謚忠肅梁澤民將樂人政和中為崑山令有惠愛其父伯臣來就養隂相之力為多陸宲字元珍政和中知長洲縣政久棼宲從容如無事而事大治以最遷郎就命通判真州紀交字聖錫丹陽人大觀進士自蕪湖酒稅改知呉縣㑹水利不修部使者獲罪亦坐免繼知鄱陽縣遷通判平江府終兵部尚書陳康伯字長卿弋陽人宣和三年進士調長洲簿改京畿運司屬官後至左丞相封魯公卒謚文恭改文正趙訓之字誨道秦悼王五世孫以進士調東平儀曹知呉縣朱勔怙勢役州縣訓之不為屈勔嘗執數人詣縣請治訓之悉縱不問遂移疾去建炎中知永豐孟太后在贛州統制杜彦叛後軍楊世雄應之將犯永豐訓之與尉陳自仁設伏殱之㑹賊别校繼至官兵未成列訓之拒戰厲聲罵賊與自仁俱被害事聞贈訓之朝散郎直秘閣謚忠果邑人立祠祀之子彦㩋自有傳鄭穆字應和長汀人家於無錫由定逺令改常熟丞攝縣事有潰兵絶江由福山闖闗邑人大恐穆單車撫諭遂皆革心有久訟得直袖白金數斤為謝穆郤之終朝散郎徽州通判余彦嶼知常熟縣建炎三年韓世忠帥兵自海道從縣赴郡㑹張浚勤王四年烏珠犯郡李閻羅屯兵於縣彦嶼並周旋其間尹機紹興中以趙鼎門客恩補官知長洲縣秦檜當國以贓追勒檜死復元官祝拱卿字徳良建安人慷慨有志節出入張浚幕下紹興中知長洲縣卒官王彦融字炎弼江州人樞密副使韶子也紹興中知長洲縣權崇徳徳清皆以善政稱王綸字徳言建康人十嵗能屬文第進士授崑山主簿紹興二十四年以中丞魏師遜薦為御史論事忤秦檜罷去檜死召為起居舎人歴同知樞密院事卒謚章敏程沂字詠之洛人伊川先生頥之從子也紹興閒知崑山縣為政中和有古循吏風曽慎紹興中宰常熟立縣令題名碑王伯廣作宣風樓記稱其知足以知勇足以行御吏若西門之治鄴愛民如子産之治鄭云趙彦真宗室子寓㑹稽舉進士以宣教郎知呉縣時營思陵轉運司調取洞庭青石期㑹迫彦真即日凌湖至其地召工泣諭之民感動趣役先期告畢使者欲上其勞彦真辭之秩滿通判袁州謝深甫字子肅臨海人由嵊縣尉調崑山丞寧宗朝拜相理宗朝以孫女為皇后追封魯王謚惠正栁楹字安叟東海人乾道元年宰呉江作松陵漁具圗待制曾㡬序之刻石今存縣堂西垣徐佀道字淵子天台人早負才名為呉江尉受知范成大及為秘書少監朝聞彈疏以舟載菖蒲數盆書兩篋翩然引去道間爭望之若神仙然王萬樞字贊元金壇人為崑山尉得海盗溢格吏請出郊以應親獲之文萬樞據實却之終奉直大夫知吉州陳璧字君玉為崑山主簿注情教養講勸甚勞邑士造請無虚日成就極多髙文虎字炳如慶元人禮部侍郎閎之從子登紹興進士調呉江簿曽㡬守官在呉文虎從之游聞見益博多識典故寧宗朝為中書舎人兼直學士國子祭酒後附韓侂胄共攻趙汝愚朱熹道學之士皆為詘焉陳資深常州人為長洲簿洪邁為禮部侍郎薦其性資開明問學純粹持身潔亷務在便民不為利誘威脇使膺百里之寄必有卓然可觀者趙善䚻字從之祖守江隂因家焉初調常熟尉劉潁張孝伯俱見器重終朝請郎知臨江軍勇為利民之政兩邑一郡皆有隂徳趙善宣淳熈中知呉縣有通州人髙柟詣京訴事時駕過南内柟在望僊橋河中山呼唐突夀皇止輦問之降㫖送大理取案牘自閱辭言善宣郤金不受詔特轉一官訟亦遂決趙公廣字徳儉淳熈四年任呉江知縣重建廟學及郵亭使館橋梁祠宇皆一新之遷徐州同知葉延年字公是處州人嘉泰中知呉縣有豪民張某族數十人皆以虎自名居光福山澤間負險固聚仇黨四出侵暴既三十餘年延年禽寘於法邑人徳之立祠於瑞光寺葛洪字容父東陽人從吕祖謙學為崑山尉理宗朝參知政事杜範稱其侃侃守正有大臣風卒謚端獻潘彚征字泰初漂陽人記問該洽寧宗朝知崑山以亷平服人績治著聞調繁昌卒孫應時字季和餘姚人從學於陸九淵為黃巖尉有惠愛常平使者朱熹重之丘崇帥蜀辟入制幕改常熟縣既秩滿郡將以私憾捃摭倉粟累政欠三千斛詰之士民相率擔負詣郡願代償不報竟坐貶秩後通判邵武軍在縣嘗撰縣志袁韶字彦淳鄞人嘉泰中為呉江丞蘇師旦挾韓侂胄威福撓役法提舉黄犖檄韶覆田定役師旦密諭意呉江多姻黨幸相容當薦為京朝官韶不聴是嵗更定户籍承徭賦者皆師旦姻黨師旦怒諷言者將論韶犖亟白於朝且薦之未㡬師旦敗改知桐廬縣嘉定末為臨安尹十年道不拾遺紹定初拜參知政事浙西制置使仍治臨安許景迂丞呉江作堂㕔西題曰景袁以致仰止之意張漢之為崑山令其父兩為憲漕五領郡符而家極清貧漢之政務寛厚緩於索租邑人言其家自來無此故不欲與人索也潘友文字文叔東陽人朱熹吕祖謙皆與友善開禧初知崑山縣寛慈愛人人呼為潘佛子吕祖憲東萊人祖謙之弟嘉定五年知呉江重修學宫有記刻石惠疇字叙之江隂人知常熟縣劭農勸學擢良擿姦政以大成曾丞相㮄其闔曰景言以旌之髙衍孫四明人嘉定初置縣未有官宇衍孫首知縣事剙建治廨城隍坊陌壇壝學校靡不周飭煥然新觀唐璘字伯玉古田人嘉定十年進士調呉縣尉有殺人於貨挾其舟亡者有司求賊急屠者自告吾兒實殺之兒亦自誣伏璘問舟何在錢何用其辭差互璘疑為緩之果得賊太湖與舟俱至勢家治圃將鑿渠通舟繆言故渠常平使主之璘視乾道舊籍則民田也力爭遂迕使者意移監縣稅尤以直聞後歴終太常少卿孫沂字彦温丹徒人為常熟丞時長官有挾不屑民事凡縣務承上戢下惟賴有沂民有淹嵗不決之訟皆直請於臺府願以屬沂旁縣亦然臺府既以為常沂亦不復計彼此以疾歸卒孫子秀端平中為呉縣主簿佐王遂僇妖人事詳見遂傳呉堅字彦愷天台人淳祐中為崑山主簿以厚風俗正人倫明義利闢姦邪為先務徳祐末拜相項公澤字澤潤永嘉人淳祐閒由長洲丞辟宰崑山前政自李桄滿秩後更十三任不以善去公澤由童科擢第以文學飭吏事留意學校買田養士為政亷敏百廢具舉嘗脩玉峯志官至中奉大夫徐聞詩字子言嘉興人性潁悟八嵗通九經理宗朝由童科擢第淳祐中知崑山官至知惠州王文雍寶祐中尹常熟重修城闉及譙樓置刻漏創兩務官㕔濬市河福山塘築新隄葺亭甃衢飭整版籍盖使民有義者也黄震字東發慈溪人寶祐末調呉縣尉縣多豪勢家告私責則以屬尉民多飢凍窘苦死尉卒手震至不受責家告復白提刑孫子秀移文一路禁戢之民有少爭有司俾尉羅弓矢以捕怨家移牒必曰躬親吏卒因下漁獵震又請於知府洪燾自是訟牒無躬親之文尉廨舎隤壓震新築之縣界有焚屍亭壊浮屠規復剙震白府謂焚屍釋氏之法凡史傳所書仇怨刑戮之酷罪盈惡極乃有焚滅遺骸亦戰國以來之事古無有也然殺者常刑焚者非法非法之虐且不可施於誅死之罪人况父母骨肉乎今吾所法釋氏邪聖人邪傷敗風俗莫此為甚其亭宜令勿再置判府程元鳯韙之事竟止府檄攝其縣及長洲華亭皆有聲效提舉常平王華甫辟主管帳司文字時知本府朱熠常州錢庚孫嘉興呉君擢皆倚嬖倖厲民華甫病革強起劾罷三人震賛之也震屢歴牧守在在有績終浙東提舉常平嘗曰非聖之書不可觀無益之詩文不作可也居官恒未明視事事至立決自奉儉薄人有急難周之不少吝所著日鈔百卷卒門人私諡文潔先生陳應角字軒伯連江人咸淳三年知丹陽縣清強剛介治聲翕然竄豪民辨誣枉行郷飲旌孝義洎去官邑民生為立祠歴長洲縣改提刑司主管文字龔潗字深文髙郵人居鎮江歴知長洲縣官至司農卿國亡士大夫居班行者隨例北上潗行至莘縣不食卒子璛别有傳孔文貞字從善東平人宣聖之裔至元丁亥尹常熟是嵗大潦漂沒田廬飢莩流離文貞發廪拯溺完活甚衆明年躬督郊民疏港浦洩積水而注之江秋乃大穫邑賦數千石故匿於世家吏不敢問文貞覈實其數勢家感其至誠遂盡輸納其政大歸在安民不邀浮譽至或怵以權勢啖以貨利乃毅然弗顧吏民望風畏愛之博學工詩詞與邑士賡詠文采可觀去任踰年邑人追懐善政立石刻銘王安貞字吉卿安陽人補浙西帥府掾至元二十九年授浙省理問知事累遷崑山知州適州初遷公宇百無一二安貞規畫剙建費鉅而不擾政教懋舉秩滿授饒州路治中王柔字不剛大都人試安西王相府令史至元三十年授呉江尹修繕官宇重建廟學及三髙祠施政條理井然姚鎬字周卿邯鄲人元貞間任常熟主簿督視許浦永豐倉潔已繩下芟櫛蟊蠧庾積清實丁亥夏雨田陸混一富室閉糴粟價翔踴鎬出郊勸分爭相割助督浚運河經度盡瘁按訟平當馭吏嚴而有度不聴讒愬不畏強禦盧克治字仲敬濮陽人大徳間為常熟令沉敏宏逺復多仁恕獄無寃濫好施勸分教育言氏子孫覈實學田築社稷壇恢拓公宇増修邑志民為立生祠今列祀學宫名宦祠哈喇哈遜大徳九年同知呉江州事嘗語人曰牧民之官不忠勤何以盡職分不公正何以聴獄訟不慈仁何以得民心嵗荒且疫為之流涕白州長留粟救之曰寧咈上意以受責母令民失所也皇甫璧字君寶東平人至大三年知呉江州三載終始以廉能著不事智數政無矯飾待物一於誠始勉以文教申之以禁令人莫敢犯王英字世傑燕山人先任大同路推官皇慶初知常熟州事寛而弗弛嚴而弗苛政教修明操縱協宜訊讞詳允至於獄空伊埒哈雅蒙古人任崇明州逹嚕噶齊皇慶間兩淮運司僉民為竈丁運使臨之甚嚴哈雅昌言曰吾州孤立海心民鮮而貧豈堪若是乎寧斷吾臂弗能發一丁也運使束縛以法辭色愈厲乃聴之夏旱齋禱宿於寶慶觀妻方病亟不顧翌日家人來曰夫人死矣哈雅曰吾為民禱雨未獲孚應汝等自歛之吾不可歸也未㡬雨大霈任立字周卿延祐三年知嘉定州主儒術而吏法明練亷正不阿嘗釋寃獄四十九人全活飢民六千餘户髙仁字夀之濟南人知呉江州以大義開曉百姓譁徤束手而怙終賊刑嵗役先鉅室力稱事辦行省賑杭飢民増糶三萬石仁抗言州小數已溢不可増鹽運司課虧省委仁詣浙西取諸民補之仁言民貧不可妄動動且有外虞皆不能奪事並寢延祐二年經理田糧省檄仁往丹陽金壇兩縣兩縣舊公田虚額七千仁曰朝廷豈利無田之租哉閱實悉除之和斯噶爾欽察氏由宿衛入官至治二年知常熟州逹嚕噶齊凡州事悉倚辦於里正民有訴不勝役者數十户乃曰里正雖卑而責任易稱其力而均任之田不過一頃者皆釋不事諸役皆倣此吏不得夤縁規利未㡬朝廷聞浙右田有賦存而無徴者里正嵗代償至破産議勸富民助田以紓之擇和斯噶爾視事乃得民一百五十餘户田一千一百三頃嵗入米六萬四千石慎屬人出内民受廣利又奉省檄勸富民移米平糶亷知田已鬻而抑𣲖者居四之三凡為米四萬九千石有竒茫無可儗乃奮身廷辨以去就爭之卒得蠲釋轉徙就食者日來歸募民墾荒田八十餘頃嵗増賦三千餘石開淞江浚練湖修大成樂令學官課講焉泰定丙寅滿去民請湯彌昌記其遺愛諾海本蒙古鴻吉哩氏泰定初以武徳將軍為崑山州達嚕噶齊時州遷纔一紀公宇器用一切營辦刻石志之張顯祖不知何許人泰定元年為呉江州判官重建長橋撤去木柱鼎建石竇六十二㮬每竇用鐵八條長十三尺重四斤仍布桫枋於水底築址以防傾圮畢功宴犒工人甚厚叚天祐字吉甫河南人泰定甲子進士選為常熟州判官有文學班惟志字彦功松江人至元間知常熟州能文工詩尤善揮翰博囉特穆爾字存中唐古氏至正辛巳監崑山州適初立都水庸田司開疏河渠受委臨督竭思經營兼存矜䘏工就民罔怨恫修舉廟學禮樂力善愛民有仁恕之風李呼圗克岱爾至正中任崇明知州三年六月旱乃自囚服跣行赤日中徧走祠廟以禱果得大雨禾則復蘇海髙昌氏由中書舍人提㸃資乗庫至正五年為呉江州逹嚕噶齊其養民惠興築石塘水利甚博巴咱爾字思齊伯蘇氏至元丙子監崑山州警敏詳審先有憸人睥睨學宫屏斥諸生且立石以滅其跡巴咱爾下車慨然以興復自任葺廟宇建采芹亭綵繪髹漆煥爛一彰風俗丕變史文彬丹陽人至正九年領崑山州事明年春海㓂犯太倉官軍入海勦捕連數百艘文彬悉出官帑餽餉無擾於部前此兵出將卒横悍所過剽掠無異冦盜民聞師至輒驚駭罷市俄有卒稍肆譁暴文彬取撻於市置諸獄衆乃戢新孔子廟増廣生貟勸督農桑均簡徭役士民恱服之張經字徳常金壇人博學通才為一時之望初任呉縣丞至正丙申行省以牧字者罕良遴選而更張之自經等令丞簿尉同日命十一人盛賜遣之經在任三年以政最陞知縣事仁恕公亷教化平易折獄明慎時擾攘之餘繼以凶疫民死者半經焦勞全活百姓感懐省又陳薦擢嘉定州同知偰傒斯髙昌人至正二十三年知崑山州事布政和平境内忠貞孝義之事多所旌白以縣為張昭陸遜故封立廟以祀又葺王葆李衡劉過及朱虎妻茅節婦祠墓置田給贍邑士賦崑山五詠以美之孟集至正二十三年知崇明州州有三沙州治東沙上視兩沙為最貧地不宜五榖惟逐魚鹽仰商賈貿遷為食或遇風濤則懸釡待㸑故米價常倍於他不必凶年而有困乏者集眎政三月攷圗問俗倣古置常平倉於州治之南以時糶糴物價用平人得接食而公無折閱焉集讀書績文惠政甚衆費復初字克明夀張人至正間為崑山知州剛直亷明推赤心以待人時州治初復及學宫久廢咸為拓闢改築公暇與諸生講求義理汲汲不倦實沙蒙古人至正中為崇明州逹嚕噶齊七年八月海冦多發市井艱糴民不聊生實沙歎曰我長此土治此民期與同樂爾令民病我獨不病邪即統捕盜司及水巡官兵坐哨船出海勦捕市人爭從之遇賊於海衆鼔而前自午至酉賊勢潰殺傷莫知其數實沙誓衆曰要必全獲醜𩔖以清水陸敢有不前予即戮汝時日昏不能進實沙命船圍守欲大戰夜半風雨驟作賊黨乗昏遁去姜復昌嘉興人任崑山州判官亷而才時津助法行與省官覈産程役審諦平愜寛免單窶氣容温舒而遇事執直長官獷悍詞色為屈秩滿將去民爭預餞之復昌抵夜濳往咸嗟悵而退張成徳字彦卿東平人至正間知常熟州政目紛複獨以理勝欲以重鎮浮民習用新稼穡征徭刑獄庠序之間皆有善法數致老成詢察疾苦暇日命酒賦詠陶然真澹士庶愛誦之盧鎮淮南人至正間以領兵副元帥兼常熟知州雖起武弁而崇奉儒術延邑士修琴川志時兵民雜居戢而不肆鎮之力也巴哩雅字政卿至正十一年三月任崇明州逹嚕噶齊明年州址為潮吞囓乃相地遷之閠三月海冦犯崑山燔刧糧艘民舎亦犯州境巴哩雅親率丁壯分扼衝要將攻之冦聞遁去十三年冬復以官兵出海擒冦時藉其功偰斯河西人元末知嘉定州以全城歸附洪武二年擢為符寶郎奉使髙麗歴官尚寶丞户部郎中擢尚書轉吏部卒張率字孟循臨川人國朝吴元年知嘉定州是嵗上海民錢鶴皋作亂入城據之率被執脅以兵刃不屈囚繋松江郡獄既而大軍平松江率獲歸舊治先是朝廷命俞平章守太倉聞嘉定失守遣兵來援㑹率自松江還乃諭之曰吾已在此爾勿妄動衆謝曰幸公無恙願聴約束不敢撓州人也民賴以安及罷任去老少皆為之涕泣劉秩字伯序豐城人呉元年崇明知州始赴任渡海指天誓曰茍犯民秋毫者有如此水既至務興利除害是嵗六月大旱禾盡槁秩禱而雨冬復旱麥不出又禱而雨抑豪武撫善良均賦調息兼并修學校正風俗奏減酒稅鹽課與塗田未成而有賦者懇章凡四上省其估三萬石有竒民感其惠建生祠於寶慶觀之東邑人秦徳為記洪武二年天賜鹽場管勾督運官鹽因襍販私醝秩以長吏當提㸃鹽法發其奸由是奸黨弗逞誣搆以事其子名孫孫年甫十二訴于部使者使者與見上上親問之得其實奸黨皆伏誅秩竟棄官歸事載翰林學士危素獄記秩長於詩詞有聴雪篷詩集李彰知常熟縣性寛厚有大畧洪武二年春邑人朱蝦蟆刼官庫作亂居民升屋以瓦擲之賊斃守兵踰城飛報蘇州太倉二衛翌日兵至城下彰出迓之從容謂其將曰民盜民捕之已盡衆來何為吾已聞於朝矣出牛酒勞軍請駐以待報詔遣王御史來視彰與耆民逆於境上具陳其故御史曰民不反盜已滅矣遂令兵還民指謂子女曰爾輩李公活之也今祀於名宦祠孔克中字庸夫宣聖五十五代孫洪武初知呉江州二年改縣克中仍為知縣重建縣治及垂虹亭三髙三忠二祠應祀廟壝罔不修飭惠政聿新曽觀蘄州人洪武初知呉縣以公勤稱縣左右安仁美政東興西城等坊皆觀建也張榮陽穀人洪武二十年為崇明主簿寛和慎勤愛民甚切以憂去任終工部主事鄭珇福清人第進士拜監察御史洪武二十一年改呉縣知縣亷勤能幹吏民畏服之李廣佑建寧人洪武二十七年以進士知長洲縣亷能有惠政卒於官周伯陵武義人洪武三十年以人才辟知長洲縣政尚寛平獄訟清簡後調江西布政司副理問永樂五年復任本縣卒於官江恕漢陽人先任福清知縣洪武三十年調崇明明而善斷民不敢欺永樂元年考滿陞刑部主事士庶赴闕借留擢蘇州府通判仕至台州知府芮翀字子翔初姓魏郾城人洪武二十七年進士擢崑山知縣首擯秪候諸蠧治者舊有催糧勾軍官校久事邑中輒以籍官屋為牢禁里甲輩淹滯時月多死翀悉解遣復奏劾官旗娶婦生子於邑者朝廷命御史李嶽究治械送京師凡二百餘輩永樂元年坐事發遵化炒鐵老人王榮率衆伏闕懇奏詔遣馳傳還任後奏除事故包荒田糧十八萬三千有竒尋以洚潦奏開呉松江淤塞二十餘里尚書夏原吉太常少卿元復臨視之翀陳開新塞舊之䇿多見采納功以就緒五年以母憂去未㡬陜西按察僉事馬祥薦翀才堪理劇吏部奏崑山固劇邑翀素得其民俾再還舊治十三年丁父艱去翀為人雅正寛平務存大體畧近名赦小過書削紛糾治之綽然善績莫可指數栁敬中慈谿人洪武三十一年以登封教諭陞常熟令釐務精敏興植墜廢崇儒敬士開闢田野孔氏子孫有漂落邑中者貧不能娶敬中曰罪其在我乎烏可使聖人之孫無後也為娶妻築室於宣化門外給水陸之産為養又得范文正公之裔復為築室贍以廪食製衣巾具束修遣入邑庠其舉政不迷𩔖如此永樂六年以憂去服闋吏民詣闕請復任陞本府同知今亦祠於學林暄仁和人洪武三十一年由監生試常熟丞三十三年實授守身謙潔綜事勤公保䕶善良禁抑豪猛永樂五年以求賢陞袁州府通判陳耘福山人洪武三十一年主呉江簿蒞政亷平民信之後陞監察御史紹興知府致仕陳瑗烏程人由訓導累陞大理寺丞洪武三十二年左遷常熟簿永樂元年復舊任瑗為人言簡而中理動止有則吳永建臨川人由嚴州監察御史洪武三十二年調知嘉定縣在任四年廉公有猷為益以無倦始終不易永樂元年有詔徴用縣民沈文仲等赴京保留不允復任御史後陞山東副使黄子威進賢人洪武三十三年以儒士授長洲丞蒞事勤敏刑罰清簡民甚安之永樂元年秩滿陞刑部貟外郎歴松江知府樊鎮柘城人由監生任照磨擢知呉縣勤慎著聲韶頀岐山人洪武二十九年自户部主事左遷崑山典史勤恪敏逹事無疑壅譽逮於上後陞仁和知縣髙瑞為常熟知縣嘗著敝袴𨽻人戈孟逺竊見之納絹二匹於衙内瑞諭而鞭之加絹於項扶出之髙居正亷介好善博通經史洪武中知崇明奏移城遷縣功為首稱王瑛建安人亦洪武中知崇明時徙建城郭創縣治定坊巷搆公宇相度經畫其功居多從子銳字允威以進士知山東之新城内艱服除調補崇明審驗人户𩔖分上中下三甲九等仍為縣區圗三册定其徭役貢賦之法庠士素乏科第選敏者置後堂政少閒輒入與講繹經傳竄改程業士以銳治易往往改業自是科第相望天旱蝻生耆老請事符醮以祈銳曰非儒者事可祭八蜡之神乃齋沐自製文率僚屬祭之祭畢其日即雨三日乃已遂為有年葉文莊公盛為傳刻石累官副都御史連俊邠州人為崇明知縣剛毅果斷鋤強扶善田圮於海而民每嵗償祖俊奏蠲之宣徳癸丑蝗上司以軍餉所賴不免秋租俊請以菽麥代賦軍不乏給而民便之甲寅復大侵申借常熟官糧萬石所活不勝紀陳敏仁和人洪武末為呉江縣主簿明果而恕陞刑科給事中蔣奎南昌人聰明而正直舉洪武末主呉縣簿三十年陞知呉江縣政號平允卒於官王敬襄陽人知長洲孝悌亷謹著稱於時永樂二年應求賢舉陞知泗州蘓瓉河間人崇明丞當官勤亷尤致意於農事學政永樂元年以母喪去官終工部侍郎劉幹字孟楨修武人先授岷府紀善永樂初浙西大水幹從夏尚書原吉來治改長洲丞兼理農事秩滿以母喪去官民遮留悃切事聞復任幹宅心仁厚性操亷白每出劭農周行塍壠呼老畯問所病苦慈孺之色溢於眉面所至民驩迎曰父母來矣嵗饉民輸後期上官譴責以身當之曰此丞之怠職也請代其罰人有過當笞惟喻以理終不下鞭箠無不心服縣居不障風雨弊服惡食由之泰然洪熈元年卒於官無以為歛邑民嚴思敬等殯之頓於郭西僧舎及將歸葬士庶陳奠道旁悲悼若喪所生士人郭儀因人心眷慕之深留其衣冠於半塘側聚土葬之名曰劉公墩詳見郡人樓文淵所撰墩記賈忠字能誨冀州人永樂初守城有功生貟授寶鈔司提舉累陞呉江縣知縣忠有兼人之才處已亷明臨政勤而恕秩滿去任民上疏請留後忤當道同僚因誣執之忠不辨而退劉宏字簡諒永新人永樂初知崇明縣勤謹有局幹抑姦繩暴吏民畏愛去而思之兩詣闕請復任焉朱宗顯諸暨人永樂七年知嘉定持身亷白去害興利以疾卒官邢寛直𨽻人永樂十年知呉江撫字有道民銜其澤後陞成都知府馬文烱山隂人興化教授陞扶溝令刑部郎中通政使司經歴永樂十五年改知崑山縣政令明肅剛介有守武斷削跡胥徒畏懾視之如神明無何卒於官郭南上虞人宣徳五年常熟縣主簿保陞知縣幹辦修舉獲上使民南故試吏老於吏事以之而舉其職羅永年字延齡宛平人洪武初序班歴北城兵馬副指揮宣徳中知崑山縣弛張適宜下民賴之馬鞍山舊無樹木永年徧植以栢嵗久鬱然時人名為郎官柏士大夫歌頌之葉錫字𤣥圭永嘉人第進士翰林庶吉士正統元年知呉江縣以亷謹聞未㡬以母喪去改知呉縣政事尤偉十年詔大臣察舉天下藩省郡邑長吏治行卓越者得十人令惟二人其一錫也詔賜燕於廷加以命服楮幣紀功天官以需拔任徐侍講珵論其事曰𤣥圭為治一本經術先律已而後齊人惟理之從法之守他無恤也官長承迎之私不行僚吏比周之情不接豪猾􅐁􅔯之姦不得行故雖深得細民之心而忌者亦衆或軋之於上怵之於下咻之於旁𤣥圭堅不動至是而循良之效白焉時以為知言十三年擢守寧國陳梗字用直臨海人先浦城令調山陽宣徳間左遷崇明主簿正統元年正月大雪彌旬郊外之民有凍餒死者梗愀然為發倉賑貸不俟上報明燭事理襟度灑然善詩篇詩法盛唐不尚巧麗張潮字叔孚東陽人正統初知崇明威而不猛寛而有容補弊起廢勤勞不懈吳昭字伯昭麗水人正統間由監生擢知崑山縣昉建狀元祠於馬鞍山間潮舘於駟馬橋黄貟通字仕達南海人景泰間為崑山主簿能識政體司征稅公而有法邑人稱之劉彪湖廣人以吏授丞呉江景泰六年陞知縣居官不挈家累以亷幹稱鄭達字叔通襄陽人博涉經史正統間授盭厔知縣景泰五年移崑山有捕盜千户不法殃民逹纔至即劾去之注思校學存䘏窮赤歉嵗勸貸民藉生活自奉清約圗書少娯他無所好尤喜與方人端士接至孝義貞節之事悉加旌白之劉仲修泉州人崇明簿寛而有惠不事苛察凡第賦役髙下髙下者皆恱之秩滿去仕至工部主事唐禮字敬身武康人舉賢良方正天順初知常熟縣文雅有為重建子游祠建道愛亭立進士題名碑甘澤字洪濟開州人進士任監察御史左遷滁州衛經歴成化元年巡撫劉孜薦陞常熟縣知縣食正五品俸莊方善建事大著勞績修學宫城隍廟重建東南二倉造倉畔二石橋四年以事罷鄧珙字𢎞中閩縣人成化初以進士知常熟首誅姦惡以剛果稱九年陞南京户部主事龍晉字遵叔吉水人進士授監察御史天順初改知嘉定縣善政甚繁疏呉淞以利田庸績尤著晉浚江得石刻於水其文曰得一龍江水通歴守徽常卒白思明平定人成化初以進士知嘉定縣亷能著稱三載召為文選主事余金字貢之内江人成化初以進士知長洲郡吏作姦金以理教誡不率者稍加懲艾皆為改行民多訐金不設鈎距一以公議裁決無容心焉訐者謂不可欺亦不可犯稍引去其終訟者轉詣上司上司曰汝自有賢令毋庸至我其人亦解散徭役丁夫每患為下人顛倒金置手籍黙視始得其平豪夫富子不少假借謝絶請託安守儉節防戒家人甚嚴不得輒至中門嘗見几有紙畫數幅乃其子購之他地者悉取焚之十年召為監察御史姑蘇志卷四十一
