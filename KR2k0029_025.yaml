body:
  text: 姑蘇志卷二十六明王鏊撰倉場儲偫國家大計今具録倉場而前代名迹存者附之以備稽考本府永豐倉在閶門內即元舊址四面皆水知府刑宥重建厫屋九連共一百十七間各縣糧自起運之餘悉併儲於此凡蘇州衛官軍俸糧及各項公用俱於此支給祭酒陳鑑記永豐之為倉奠于閶闔門內以偫長洲吳吳江崑山常熟五縣歲入之賦而凡文武之士官于兹與夫介胄胥吏之徒之在官者咸仰給焉倉址既隘浸弗能容屋久滋弊其何能偫前郡守林侯一鶚嘗欲闢而新之遽以憲節蒞江右乃止二守王君仲顯盧君廷敬與二三寮友合辭請于上詔下巡撫劉都憲顯孜遂以委之今郡守邢侯克寬侯經營量度布位定方縣水置𣙗條列咸具又有滸溪倉隘其坤維徙而稍西地形乃方於是乎羣工子來五材就緒授之成算無愆指畫弗為過侈以傷難弗為茍成以傷易朴素堅好實惟永圖倉之為屋凡十有一聨三峙其北聨為間凡十有三峙東西者其聨與間之數皆如此二峙其南其為間則視北而嬴其二聨為厫者三厫之為屋或四或五不一其數聨又别為五小樓於屋極疏其櫺以泄米之氣屋下地衡布以巨杉而閣以甓乃藉以厚版以地之溼通為屋以間計者百四十有七以厫計者三十有三以千文字第厫之名天尊而北中據以專其一一竒數也地卑而南分據以擅其兩兩偶數也天地定位於是自北而南復轉而北而東而西既而復東仍轉而西至於陽字而極焉厫貯米以斛計者多或至萬五六千少亦不下萬二三千通可貯四十餘萬歲費若干斛其所積可至七八年雖有凶荒之歲民可無菜色也北之左隙髙揭一樓以司更鼓而守者知警焉繚以周垣首以重門以司出入而主者得以防範焉中為砥道抵倉之半則有廳事三楹司出納者得以蒞事焉此特取其少蔽風日故仍舊貫而已中門之外左為神祠以棲司倉之神右為寮屋以舍庾官之屬倉中之地空曠平衍可曬可晾可委可積收入之頃民尤便焉經始於天順甲申冬十有一月落成於成化丙戌春閠月工既訖功邢侯授簡俾紀其成嗚呼天下之事憚其難則慮事機之失忽其易則非經久之圖惟勿難其難則無棄事勿易其易則無茍成兹永豐之為役亦大矣大必難難斯憚矣憚則弗為而止爾茍或易而忽焉忽則茍茍則易弊易弊則弗若弗為之愈也初邢侯之為是也忽罹歉嵗人曰可以止矣侯曰吾豈無所用情於斯民者哉亦計之審矣先正范文正公救荒之䇿政欲使貧民仰給于公耳且今之為皆公帑之餘不敢傷民之財竭民之力以靡民之骨肉也彼無俚之徒皆得糊口公家不至為溝中之瘠顧不可乎既而民不知勞公無所擾而事隱然以辦覆瓦甃甓堅緻完美不為茍作凡所宬貯無久儲速腐之患而公私逺近罔不隂受其賜者矣論者於是始服其雅量之不可及也侯來吳二年小大之政罔弗咸宜乃今歲則大歉民心皇皇猶弗忍釋而他去者所賴以有恃怙也詢諸父老皆謂自我朝置守以來所未嘗有然即斯倉一事已足以例其餘况大者乎豫故詳著于篇庶幾來者因此以識彼且時其修葺謹其出納相與保之以無墮其成亦可無愧乎侯之用心也若夫侯所過而入民之深者則有甘棠之思在豫奚容喙侯名宥克寬其字東廣之文昌仕族子豫同榜進士為明執法知台州府轉吾蘇吳縣和豐倉在胥門內周圍一百五十畝有三門厫屋三十六連共四百三十二間𢎞治十六年連災焚厫屋三連及廳事今繕完長洲縣青丘席墟荻溪蘇巷濟農五倉皆在婁門內東城下舊有東倉在葑門外王墓村西倉在閶門外九都南倉在葑門外二十五都北倉在婁門外二十四都宣德間侍郎周忱移建於此青丘厫四連四十八間席墟厫四連五十四間荻溪厫四連四十八間蘇巷厫五連六十間濟農厫四連五十四間王直濟農倉記蘇之田賦視天下諸郡為最重而松江常州次焉然豈獨地之腴哉要皆以農力致之其賦既重而又困於有力之豪於是農始弊矣宣德五年太守况侯始至問民疾苦而深以為憂會行在工部侍郎周公奉命巡撫至蘇况侯白其事公惻然思有以濟之而公廪無厚儲志弗克就七年秋蘇及松常皆稔公方謀預備適朝廷命下許以官鈔平糴及勸借儲備以待賑恤乃與况侯及松常二守協謀而力行之蘇得米二十九萬石分貯六縣名其倉曰濟農明年江南夏旱米價翔貴有詔令賑恤而蘇飢民四十餘萬户凡一百三十餘萬口盡發所儲不足贍田里多殍公復思廣為之備先是各府秋糧當輸者里胥皆厚取於民而不即輸之官逋負者纍歲公欲盡革其弊以惠民是年立於水次置場擇人總收而發運焉視舊所納減十之一而三府當運糧一百萬石貯南京倉以為北京軍職月俸計其耗費每用六斗致一石公曰彼能於南京受俸獨不可於此受乎若請於此給之既免勞民且省耗費米六十萬石以入濟農倉民無患矣請於朝從之而蘇州省米四十餘萬石益以各場積貯之贏及前所儲凡六十九萬石有竒公曰是不獨濟農飢凡糧之逺運有所失及欠負者亦於此取借陪納秋成止如數還官若民夫修墟岸濬河道有乏食者皆計口給之如是則免舉債以利兼并之家是冬户部以聞詔下蘇州克廣六縣之倉以貯焉宣德九年江南又大旱發濟農米賑之而民不知飢於是相率詣况侯願刻石以示後人侯屬前史官郡人張洪疏其始末請余記豫喜故為之書若其為屋若干楹儲米若干石典守者之名氏與其條約之詳則列之碑隂與諸縣皆載焉使互有考也滸溪倉在閶門內以本縣各都在西境者又設此倉以便收納厫屋五連七十九間義役倉在縣治西今廢崑山縣玉峯倉在西門外舊有黃涇金潼等倉宣德間移建一處總名玉峯倉厫屋共六百五間𢎞治八年知縣張鼒重建三十間九年本府同知李復貞續建五十間舊倉外設公館二所神祠一所今皆移置於內預備糧儲二倉俱在縣治北厫屋三間收貯官糴糧米洪武間知縣周至道建厫屋五間永樂三年主簿梁杲重建濟農倉在南門內二十九都厫屋一百三十七間宣德間設置收貯耗米義役倉亦在南門總七厫屋三十間收貯役田義役等米用充官俸及支給買辦今廢常熟縣總收倉在縣治西南二里基廣二百三十七畝厫屋六十三連共三百七十八間收十六都起至四十二都糧米又一在縣治西南二里基廣三百十七畝厫屋四十四連共二百六十四間收一都起至五十都并在城四隅糧米俱正統四年侍郎周忱改建學士劉定之常熟縣東南三倉記夫蘇為郡土田膏沃賦入甲海內常熟在蘇諸邑中尤地上賦多觀邑所以名則豐稔蓋可歲必良由近海潮汐消長自溝港達隴畝無旱乾水溢之患然則治其田賦詎可忽乎舊時各鄉設倉散無統紀弊積于中正統間巡撫周文襄公忱縣設兩倉於東與南去郭甚邇且在水濵民便納賦官易典視弊漸減矣然築土為墉積茨以苫其成弗難隳毁亦易巨魁里胥嵗斂于民以補苴之因而侵漁尤妨貧弱自周之後屢易巡撫重臣雖惡是而未暇改為今天子嗣統初令南京刑部尚書劉公孜以都憲踵周昔任甘令尹澤自監察御史廣西臺副來綰縣紱綱維舉張衲鑿契合其乃承劉符檄於是謀諸郡守邢公宥捐俸于己鳩材于義易兩倉朽腐以堅木良甓豁狹址以廣之聳卑宇而高焉倉四方各有門門內各闢為場場各有官吏治賦之署名有貯米厫八十間合兩倉八場計之六百四十間始事于丁亥五月乙丑落成于八月甲午民以賦來者入門而改觀瞻至場而便委積會計明于署轉輸集于厫嚮者葺厲己之憂無所與焉助甘處畫是役者典史周從善也敘其事實走價京師者義士劉效也以效來求文者邑士周中書紹榮也夫今郡縣使民弗獲遂休養庶富多由於稅賦無善政而然然則斯倉之成可無記乎記之非特彰修者美亦以俾後為政者思繼又使鄰封聞善者思效則於民豈小補哉成化四年嵗次戊子八月吉旦賜進士及第通議大夫工部右侍郎兼翰林學士永新劉定之撰濟農倉去縣治北里許洪武間建初名預備倉收貯撥兌餘米及罰贖米宣德七年侍郎周忱知府况鍾又即宋順民倉趾建厫百間以貯平糴及勸借富民米二十餘萬石後漸增益復建厫四十間扁今名學士王直記後廢𢎞治八年都御史朱瑄重建國子祭酒李傑記國子祭酒李傑記曰國以民為本民以食為天故孔子論為政而先於足食孟子論王道而先於養民是誠有民社之責者所當先務而不可緩者也何者歲之豐歉無恆所恃者吾之儲蓄有恆古者三年耕必有一年之養九年耕必有三年之食而縣都之委積則有遺人掌之以待凶荒此所以雖遇水旱而民無菜色也今府州縣濟農倉蓋深得古人之遺意然其興廢則存乎有司之良否焉爾常熟縣濟農倉舊在城之東北隅為楹百有四十乃宣德間巡撫工部侍郎周文襄公所創建者也方是時積餘糧至二十萬石每歲以春夏之交散之先下户次中户秋成之後止如數輸官自是民免假貸於富室以出加倍之息田資之以治賊由之不逋公私利賴後有司漫不加意倉漸傾圯至成化初年而遺址鞠為草莽有力者佃為己業鄰近者侵為私舍餘糧無所儲貯則寄於東南二倉一耗於侵欺再耗於浥腐而儲蓄蕩然矣先是巡撫都御史似公嘗命工繪湖州府濟農倉規制授邑令俾圖修復未幾公遷少司徒還京事未克就𢎞治乙卯巡撫都御史四明朱公旬宣至縣詢及民隱首以是倉為生民休戚所繫命蘇郡節推麻城萬君分治常熟責以設法營建既而有二守之擢君荷朝廷異恩又感巡撫公知已盡力而為之且知庫藏虛竭民力疲困乃籍逺年侵逋糧料收禁於獄者得三百餘名召人保領限者鬻産以償五日一輸銀于官至貯於縣庫出納則君自掌之凡瓦甓木石之價工匠夫役之直皆於是乎取給適郡主洛陽史侯以公務至縣相與謀度區畫務為經久之計君往來督工不憚勤勩且擇義官數人分董之百需無缺衆力競勸不兩月而公廨五間倉舍六十間修已並建懼風雨之霍凌也四壁皆纍之以磚慮潤濕之蒸薄也離地而布之以版君又以嗣是而後餘糧充羡不足以容方鳩工度材復圖增廣至百二十間他若周圍之垣墉左右之橋梁道路靡不修築完固官不知費民不告勞而續用當成人心胥悅於是縣之耆老糧長里胥僉謂巡撫公恤民之深郡侯謀畫之審二守綜理之密創立之敏均不可無紀述以示永逺乃奉重慶太守致仕沈觀瀾之狀屬筆於豫竊惟我朝洪武中縣設預備四倉以俟賑濟皇祖養民之至仁良法萬世所當遵守者也四倉廢而濟農之倉立實前賢所以奉宣上德而惠此下民若之何又廢而不理乎况列聖軫念黎元一遇歉歲輒下賑恤之詔有司以儲蓄之乏也束手無䇿坐視民之流離困苦而莫之救食天祿治天民者固當如是耶是倉之成後之為政者嗣而守之以時而修葺之則常熟之民庶乎永永有賴哉為記之俾刻諸石吳江縣總收倉在北門外三里橋西基地百餘畝正統間侍郎周忱移東方等四倉併置初糧米俱用篾囤收貯成化十六年知縣馮衡始建厫屋四十六連共三百六十八間濟農倉在北門內侍郎周忱建厫屋五連共七十二間後又建官廳八間義役倉亦在北門內永定橋西今廢嘉定縣倉有四俱在縣治北門外一名萬積一名利益一名豐寧一名通津每倉厫屋六連五十四間通二百一十六間各闢門道廳事俱正統間侍郎周忱命知縣祖述改建知縣蔣忠加葺濟農倉在朝京門外又有新倉在朝京門內廣儲倉在縣治西西隱寺前太倉州倉在小西門內長洲橋南舊武寧菴地厫屋六連總六十一間先是為太倉鎮海二衛官軍俸糧有司輸納本衛委官收支正統八年設倉官一員𨽻崑山縣委官按月收放𢎞治九年立州倉亦改𨽻凡州境之糧盡儲於此設官如舊軍儲倉在長春橋西南即舊西倉總儲本府各縣起運糧米先隸嘉定縣委官放支官軍俸糧今屬本州崇明縣廣贏大有倉在東沙舊皆篾囤貯糧成化七年知縣汪貴始於城隍祠側造倉四連每連厫屋五間收貯四區糧米重建廣贏大有倉記略崇明蘇郡之屬邑東南岸海宿重兵禦倭冦糧儲有司急務也徵以時斂以法而藏無其所可乎西沙二區已立倉矣東沙之四區則倍於西沙而倉不立闕典也及成化七年夏知縣事永豐汪公貴率僚屬相址得城隍祠之偏地凡廣若干畝作倉二十楹左右對峙髙亢堅壯繚以垣牆嚴以扄鐍概斛斗升率置如度兵戍之食于是乎取給扁其左曰廣贏右曰大有記之以示來者恆山雷中西沙倉厫屋十間收貯本沙二區糧米永豐倉在縣北咸寧巷內初屬軍衛正統二年改屬本縣收糧支給官軍俸糧濟農倉二一在縣治西南厫屋二十間一在西沙興教寺傍厫屋三間正統間侍郎周忱命知縣張潮建天賜鹽場在崇明縣先為宋韓托胄之莊嘉定壬午移浙西江灣青浦亭户過此煎鹽近竈處有天賜港故名寶慶初撥隸淮東總領所元至元間改屬兩淮運司後因韓莊蘆蕩坍圯益以梭兒等蕩十三處煮納官鹽公廨在後舊縣東南隅地淪于海今遷於鄉村十七圖在縣東南本場隸兩浙運司亭户九十四竈户一百三十額丁三百五十六鹽倉三連共二十二間附前代倉場吳兩倉春申君所造西倉名曰均輸東倉周一里八步後燒更始五年太守李君治東倉為屬縣屋不成見越絶書永昌北倉在子城西北六里五十步西倉在子城西一百八十步疑即府倉也右祥符圖經南倉在子城西新志又云府城內有北倉橋南倉橋政和中朱勔拆北倉而南倉久廢但存倉巷北倉在閶門側皆前後臨流盧氏云按續記每歲輸稅於南和糴於北以元豐三年計之所糴無慮三十萬斛東南之計仰給於此農民亦賴官糴以平發價其利甚溥府倉在飲馬橋西唐龍興寺故基常平倉義倉續會要淳熙十三年提舉羅點言常平歸仁兩倉貯米當一路之半而倉屋傾斜乞於見樁管官錢內撥一萬貫起蓋從之盧氏云景德三年初立常平於兩浙慶厯初王琪請建義倉歸仁倉報功倉淳熙元年韓彥古創專儲歲計已上並在府倉內户部百萬倉在閶門裏西倉開禧三年創以府職曹官兼嘉定二年始命官專掌以都司提領憲司措置東倉嘉熙末創平糴倉在營橋東淳祐五年魏峻以壯城廢營改創趙與訔書額提舉常平鄭霖記寶祐百萬倉在至德廟後寶祐五年趙與􅊸請建厫二百五十間浚河通舟直抵倉岸置官與東西兩倉同本府糴納倉在府治西景定五年趙與訔立有亭在其前元常平倉在顧亭橋西成泰和二倉即宋舊百萬西倉也大德三年省創始分為二大盈寶成二倉即宋寶祐倉大德三年省創分為二大德和豐二倉即宋百萬東倉大德四年分為二香糯倉在西成倉後義倉在東城下盧志云大德永豐廣濟大盈泰和五倉即元舊倉也按今有更襲姑志舊名如此崑山縣宋縣倉在縣東北百步常平倉在縣西南二百八十五步常熟縣宋順民倉在縣治東臨漕渠治平二年向宗旦建紹興四年常平使者徐誼慶元三年承傳良四年孫應時各新之嘉熙元年王爚益地增創郎淑常熟縣新建順民倉記治平二年河內向侯作新倉成常語豫其始終曰吾至之初見太守永川陳侯席未暖陳侯曰常熟大縣也考其民板之數至四萬户歲輸之粟至八萬石有倉汙庳迫窄才容四分之一濱江之民逺者百里水浮陸走稛載而至倉或既盈則纍數夕而不得輸于州又病其逺此一不便職是歲常散蓄于浮屠之居廊廡皆滿蓋藏弗謹塗墍弗完得無有以誨盜哉此二不便蓋遲君之來也久矣君亟圖之君退而自惟倉廩之出入一皆仰給於東南兹又為東南之劇歲入之粟它郡莫加厚焉吾邑雖不腆其敢後其所先務邪矧其弊又如此之甚宜陳侯有以告吾也及吾視事之日見吏民問其所疾苦尤為不便者凡幾然而獻計者又皆不出吾陳侯之議也於是訪縣方北得隙地數十畝以營築焉始召民而諭其所以作之之意民既病此久矣莫不奔走以聽命咸願治材于家請期日合衆材以成之既而至期倉遂以成豫謂二侯皆能以材名于世所至莫不著見風迹至於興利去害便民皆其所素畜沛然而有餘夫以沛然有餘之材相與協謀治其因民所欲之役其成也宜其不勞而功多其榜曰順民蓋得之矣若夫世之從政者利害較然居前畏謗忌讒諰諰然不肯一日出其力則有諉曰愛民斯不逺哉夫愛民莫如古人古之人有為豈天作而地生斯亦出於民而已耳姑視利害之如何豈顧可為而不為乃曰愛民哉此大不然昔者子産嘗以其乘輿濟人於溱洧孟子謂之惠而不知為政凡以此也向侯亦以豫言為然因刻之于石俾來者考焉時熙寧元年三月十一日將仕郎前守沂州臨沂縣縣令郎淑記常平義倉在順民倉北廡元際留倉在縣治東北順民橋即宋舊倉也嘉定縣宋社倉在護國寺東端平二年建官倉在富廩坊端平元年建元際留倉在州治內延祐五年任立建常平倉與捕盜司相直蘇州府太倉在太倉州城南張涇上洪武二十六年創凡九十一厫共屋九百十九間收儲海運遼東北京等處糧至永樂十二年罷海運倉遂廢今改創為太海倉東軍儲倉在周涇橋東洪武十九年創崇明縣元永豐倉在儀門左常平倉在州治前捕盜司東驛遞驛遞之制見於諸司職掌甚詳蘇為江南要路凡使傳公移水陸行者晝夜憧憧不絶此驛遞鋪舍之設皆當列焉姑蘇驛舊名姑蘇館在胥門裏河西城下宋紹興十四年郡守王㬇建又作臺於城上以姑蘇名之臺下有百花洲洲東有射圃本朝洪武元年知府何質移置盤門外初名姑蘇站提領一人掌之二年改站為驛提領為丞舊又有一所在府治西謂之裏館驛永樂間以交趾人為丞專典裏驛正統初革去丞易館為分司成化九年知府邱霽重改建於胥門外基半築於水廣袤數十丈背城面河氣勢宏敞北有延賔館後有樓曰昭賜可以登眺丘自有記驛之右有皇華亭左有月洲亭相去百步為使客憩息之所丘霽記姑蘇驛有二一在府治西一在盤門外丞一人總領之郡當南北要衝授館致餼者無虛日而府西驛已久廢盤門者存亦就弊矣且去府治逺禮賔往來上下告勞霽假守是郡之明年思移置之請于巡撫大臣曰可請于巡按御史曰可遂度地胥門外遞運所之南負城靣河地頗狹弗稱乃植木水中為滉柱作石堤三靣凡四十六丈廣地得從八丈衡如隄而殺丈十六建屋六十楹皇華亭據其前後又重屋名昭賜之樓著所自也燕休登覽盡得山川之勝庶幾乎所謂中吳之偉觀也仍撤舊材更新運所門與驛並費不出民皆自規措役凡十閲月而告成於乎禮賔視館三代之政也晉惟崇館子産與之陳無寄舍單子譏焉矧兹大邦烏可不備霽不敏承天子休命來綏兹土安敢妄自菲薄亦為所得為而已是役也其容已乎雖然成之亦不易也來者尚嗣葺焉遞運所在胥門外元作遞運站洪武五年改今名成化九年丘守因建姑蘇驛始撤而新之與驛並列又設濟民藥館凡往來有疾者於此給藥接官亭在閶門外普安橋西送迎使客之所亦洪武初何守建松陵驛舊在吳江縣治南洪武元年移建儒學之左天順八年重建平望驛在吳江縣南四十五里唐屬吳興郡為水馬驛西至南潯五十餘里與烏程縣分界開元間蘇州耆民請於刺史吳從衆割太湖洞庭三鄉與吳興易焉又官河從平望驛北吳縣界元和間湖州刺史范傳正奉敕釐開又撥入蘇州吳縣洪武元年撥𨽻吳江縣寧海驛先在太倉大西門外吳塘橋東洪武十七年設宣德六年縣丞吳仲郢移置崑山縣半山橋西景泰間知縣吳昭重建𢎞治六年御史吳一貫奏革今為公館府前總鋪在本府西東至婁門利民鋪一十里西至胥門鋪三里南至盤門鋪五里北至齊門無量鋪一十里胥門急遞鋪在閶門外新開河橋內官路上楓橋急遞鋪在府西十里吳縣十一都官塘路射瀆急遞鋪在府西北二十里長洲縣一都滸墅急遞鋪在府西北三十里長洲縣二都張公急遞鋪在府西北四十里長洲縣六都白鶴急遞鋪在府西北五十里長洲縣五都北抵常州府無錫縣界盤門急遞鋪在府南五里吳縣一都白蓮急遞鋪在府南十五里長洲縣三十一都尹山急遞鋪在府南二十五里長洲縣三十一都栁胥急遞鋪在府南三十五里長洲縣三十一都觀瀾急遞鋪在府南四十五里吳江縣南三里徹浦急遞鋪在府南五十五里吳江縣南十三里廟涇急遞鋪在府南六十五里吳江縣南二十三里裊腰急遞鋪在府南七十五里吳江縣三十三里石塘廟涇北長老急遞鋪在府南八十五里吳江縣南四十三里石塘裊腰橋北此分二路一路從裊腰鋪往南嘉興路一路從朱家鋪往湖州路黎涇急遞鋪在府南九十三里吳江縣南五十三里平望黎涇橋北雙里急遞鋪在府南一百三里吳江縣南六十三里平望南雙橋北官塘路自觀瀾至雙里七鋪洪武九年知縣王進建又南係嘉興府界朱家急遞鋪係平望轉西往湖州路去黎涇鋪一十里吳江縣西南六十三里荻塘道成橋西湖州路道成急遞鋪西去朱家鋪一十里吳江縣西南六十三里荻塘道成橋西衆安急遞鋪西去道成鋪一十里吳江縣西南七十三里荻塘衆安橋西思范急遞鋪西去衆安鋪一十里吳江縣西南八十三里荻塘思范橋西曹村急遞鋪西去思范鋪一十里吳江縣西南九十三里荻塘曹村橋東又西係湖州府歸安縣界無量急遞鋪在府北十里長洲縣五都常熟塘周涇急遞鋪在府北二十里長洲縣十五都羅壩急遞鋪在府北三十里長洲縣十四都船場急遞鋪在府北四十里長洲縣十三都吳塔急遞鋪在府北五十五里常熟縣四十八都吳塔村潭塘急遞鋪在府北七十里常熟縣南四十四都華蕩口雲和塘常熟縣前急遞鋪在府北九十里在常熟縣前利民急遞鋪在婁門外去府東北十里長洲縣二十三都至和塘蘆涇急遞鋪在府東北二十里長洲縣二十一都蕭涇急遞鋪在府東北三十里長洲縣二十一都六市急遞鋪在府東北四十里長洲縣十九都真儀急遞鋪在府東北五十里崑山縣朱塘鄉三保東村造彼字墟尤涇急遞鋪在府東北六十里崑山縣積善鄉二保可字墟崑山縣前急遞鋪在崑山縣前宣化坊去府東北七十里馬涇急遞鋪在府東北八十里崑山縣東十里惠安鄉三十保宿字墟太倉路奣子急遞鋪在府東北九十里崑山縣東十里惠安鄉三十保民字墟勝安急遞鋪在府東北一百里太倉州西十里惠安鄉女字墟此分二路一路太倉十里一路往南去嘉定路上張涇鋪一十里太倉州前急遞鋪在府東北一百十里舊在太倉衛前屬崑山縣惠安鄉劒字墟今移在州前自真義鋪太倉州前共七鋪洪武二年崑山縣知縣王瑾建諸涇急遞鋪在府東北一百二十里太倉州東十里惠安鄉來字墟崇明路井亭急遞鋪在府東北一百三十里太倉州東二十里湖川鄉餘字墟崇明路皇華平匯二亭在飲馬橋東北岸望亭驛去郡北五十里先名御亭唐李襲為守以梁庾肩吾詩改稱庾肩吾御亭一回望風塵千里昏青袍異春草白馬即吳門劔戟梗伊洛兵馬亂轘轅輦道同關塞王城似太原休明鼎尚重秉禮國猶存殷牖爻雖頥堯城吏轉尊泣血悲東走橫戈念北奔方馮七廟略誓雪五陵寃人事今如此天道共誰論白樂天望亭驛酬别周判官何事出長洲連宵飲不休醒應難作别歡漸少於愁燈火穿村市笙歌上驛樓何言五十里已不屬蘇州許渾宿