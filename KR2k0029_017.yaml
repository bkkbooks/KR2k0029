body:
  text: 姑蘇志卷十八明王鏊撰鄉都市鎮村附今制聯民有鄉里都圖區保之名雖與古異亦先王鄉田同井使百姓親睦之意也若郊外民居所聚謂之村商賈所集謂之鎮雖不列於官亦以𩔖附書焉吳縣鄉二十四圖二十七都三十七麗娃鄉南宮里管圖九南元一二南利一二南真一五永定鄉安仁里管圖六南亨一南利三北元一二北亨一北真五鳳凰鄉集祥里管圖七北真一至四北元三北利一二大雲鄉慶雲里管圖五北亨二至五北利三履仁鄉義安里今廢已上城内靈巖鄉晏宮里在縣南管都一第一吳門鄉采蓮里在縣西南管都一第二横山鄉青墩里在縣西南管都二第三第四太平鄉全吳里在縣西南管都二第五第六吳苑鄉勝化里在縣西南管都一第七大吳鄉南胥里在縣西管都三第八第九第十至德鄉昌用里在縣西管都二十一十二胥臺鄉石城里在縣西管都二十三十四南宮鄉新安里在縣西長沙山管都四十五至十八長山鄉光福里在縣西北管都一十九穹窿鄉阜安里在縣西管都三二十至二十二長洲鄉集嘉里在縣西管都二二十三二十四西華鄉懐義里在縣西衝漫二山管都一二十五遵禮鄉守義里在東洞庭全山界管都二二十六二十七震澤鄉閭城里在東洞庭管都一二十八蔡仙鄉白門里在東洞庭管都二二十九三十姑蘇鄉梅梁里在西洞庭横山隂山葉余山管都三三十一至三十四洞庭鄉𤣥宫里在東洞庭厥山澤山三山界管都二三十五三十六長壽鄉習義里在西洞庭管都二三十七三十八市一月城閶門内出城自釣橋西渡僧橋南分爲市心舊有闤闇坊兩京各省商賈所集之處又有南北濠上下塘爲市尤繁盛鎮五横塘去縣西南十三里有横塘橋風景特勝宋賀鑄有别墅在焉嘗賦青玉案詞凌波不過横塘路但目送芳塵去錦瑟年華誰與度月樓花院綺窓珠户惟有春知處碧雲冉冉衡臯暮綵筆空題㫁腸句試問閒愁知幾許一川烟草滿城風絮梅子黄時雨范成大詩南浦春來綠一川石橋朱塔兩依然年年送客横塘路細雨垂楊繫畫船吳寛詩夏半横塘風日多畫船載酒壓晴波髙田得雨皆秔稻長蕩翻雲盡芰荷未必他年成故事也須隨處結行窩悠悠十里城西路此是登山第一歌新郭去縣西南十五里横金去縣西南三十里有巡檢司水瀆去縣西南三十里有巡檢司吳寛詩舟行三十里初向瀆川過客路偏逢雨人家盡枕河橋横光福嶺水接洞庭波倐尔嗟春及田間見荷簑光福去縣西五十里范成大詩指㸃炊烟隔莽蒼午飡應可寄前莊雞聲人語小家樂木葉草花深巷香春去已空衣尚絮雨來何晚稻初芒秪今農事村村急第一先陂貯水塘社下去縣西一百十里范成大詩社下鐘聲送客還凌波檛皷轉滄灣横煙裊處雞豚社落日濃邊橘柚山八表茫茫孤鳥去萬生擾擾一舟閒湖心行路平如鏡陸地風波却險艱村二百十四常舍石塔王家張老鴉仙人塘齾塘李墅朱團樊村尹搭胡搭夏搭彭涇謝湖薛家陳家姚家范巷張古石狗寺下陳在一都前莊管瀆趙舍前朱後朱南殿北徐在二都下周石家上沙下沙施家在三四都梅灣顧搭盛搭章家孫莊感慈薦福練墟下陂錢塘周家胥口西趙寮橋香山陳家東陳胥廟浦莊在五六都勝化東化南化太平渠上保下保在七都長源石橋大吳澤塘南胥王家西吳李巷反陂馬舍長墟在八九都鴈蕩花園沙涇江村獅山板橋孫家橋何山萬巷呂巷曹巷徐巷塔子店橋下王包巷下沙下園在十至十二都陳巷東甲西甲胡塔朱塔花園施塔南馬北馬黄山北黄山南唐巷張老鶴中家㠛村吳家方家徐盛金家栁搭下沙下園譚王莊馬莊顧搭前巷後巷張家巷史搭東跨塘西跨塘在十三十四都東陽西陽呂山南宮新安長沙東吳西吳沈巷南張禇巷東廟陳巷劉家周山梅舎郁舍西塘吳璠上蒯下蒯在十五至十八都市墟徐家迂里在十九都東安西安錢家石橋下錢南張通安小灣周巷王家阜安梅舎東陽在二十至二十二都東陳孫舎仕岸顧恩黄墟郁舎馬山東馬西馬吾山在二十三二十四都西華邢舎在二十五都周灣白砂紀革韓山蔣灣嵩下南葉北葉石橋趙灣楊灣北巷南巷長圻在二十六至二十八都白湖澄灣屯灣金灣重亨俞塢金塔施巷葉巷下楊灣西金吳巷諸家灣金家湖在二十九三十都牢村鳳凰園公東墅西墅金塔東寳石在三十一至三十四都新村𤣥宮西寳石永安在三十五三十六都圻村趙家孫巷曽家太平王家在三十七三十八都長洲縣鄉十九圖二十二都二十九樂安上鄉仁壽里管都三文字一地字三元字一上元鄉全吳里管都四文字二仁字二地字二四東吳上鄉顔安里管圖三樂安下鄉仁壽里管圖三元字二亨字三四鳳池鄉澄胥里管圖三亨字一二利字一大雲鄉慶雲里管圖三利字二至四道義鄉守節里管圖三貞字一至三已上城内彭華鄉功成里在縣西北管都五第一至五武丘鄉采雲里在縣西北管都四第六至八第九附郭儒教鄉從化里在縣北管都三第十至十三金鵝鄉金桮里在縣北管都三十四十五十六附郭益地鄉金生里在縣東北管都二十七十八依仁鄉仁義里在縣東管都一十九吳宮鄉寳座里在縣東管都二二十二十一習義鄉孝廉里在縣東管都二二十二二十三陳公鄉金棲里在縣東南管都二二十四二十五蘇臺鄉貞豐里在縣東管都二二十六二十七東吳下鄉顔安里在縣東南管都二二十八二十九附郭尹山鄉堵城里在縣東南管都一三十市五大市在樂橋稱爲市心古有東州市榖市小市今皆名存市廢黃埭去縣北四十里相成去縣東北四十里王墓去縣東二十里尹山去縣東南二十里鎮四甫里去縣東四十里俗名陸直浦高啓長橋短橋楊栁前浦後浦荷花人看旗出酒市鷗送船歸釣家風波欲起不起煙日將斜