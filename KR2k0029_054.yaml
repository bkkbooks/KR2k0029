body:
  text: 姑蘇志卷五十五明王鏊撰人物十五卓行被裘公吳人也延陵季子出遊見路有遺金當夏五月有被裘而薪者季子呼薪者曰取彼地金來薪者投鎌於地瞋目拂手而言曰何子居之髙視之下儀貌之壯語言之野也吾五月被裘而薪豈取金者哉季子謝之請問姓字薪者曰子皮相之士也何足語姓名遂去不顧龍丘萇郡人王莽時隱居太始末徴不應更始時任延署為議曹祭酒互見宦迹條延傳何敞少好道藝隱居重以大旱民物憔悴太守慶𢎞遣户曹掾致謁奉印綬煩守無錫敞不受退歎而言曰郡界有災安能得懷道因跋涉之縣駐明星屋中蝗蝝消死敞即遁去後舉方正博士皆不就卒于家陸著字文伯漢桓靈之間州府交辟不就唯娛栖遁臨卒誡諸子弟云吾少未嘗官於世四十餘年以汝等必矜義勿茍仕濁世子孫奉遵遺訓遂三代不仕皆有盛名陸續字智初吳縣人幼孤仕郡户曹史時嵗荒民飢太守尹興使續於都亭賦民饘粥續悉簡閲其名訊以名氏事畢興問所食幾何續因口説六百餘人皆分别姓字無有差謬興異之刺史行部見續辟為别駕從事以病去還為郡門下掾楚王英謀反隂疏天下善士及楚事覺顯宗得其録有尹興名乃徴興詣廷尉獄續與主簿梁宏功曹史駟勳及掾史五百餘人詣洛陽詔獄就考諸吏不堪痛楚死者大半唯續宏勳掠考肌肉消爛終無異辭續母遠至京師覘候消息獄事時急無緣與續相聞母但作饋食付門卒以進之續雖見考苦毒而詞色慷慨未嘗易容唯對食悲泣不能自勝使者怪而問其故續曰母來不得相見故泣耳使者大怒以為獄門吏卒通傳意氣召將案之續曰因食餉羮識母所自調和故知來耳非人告也使者問何以知母所作乎續曰母截肉未嘗不方斷蔥以寸為度是以知之使者問諸謁舍續母果來隂嘉之上書説行狀乃赦興等事還田里禁錮終身續以老病卒子稠字伯羸為廣陵太守姦吏斂手廣陵諺曰解理結煩我國陸君中子逢樂安太守少子褒有志操力行好學不慕榮名連徴不就桓曄一名嚴或作礹字文林龍亢人明帝時太常榮五世孫仕郡功曹後舉孝亷有道方正茂才三公并辟皆不應初平中天下亂避地會稽遂浮海客交趾越人化其節至閭里不爭訟為凶人所誣死于合浦獄按東觀記桓礹到吳郡揚州刺史劉繇振給穀食衣服所乏者悉不受後適會稽住止山隂故魯相鍾離意舍太守王朗納給糧食布帛牛羊一無所留臨去之際屋中尺寸之物悉疏付主人纎微不漏孫晷字文度吳人也為兒童未嘗被訶怒少田於野時年飢穀貴有盜刈其稻者晷見而避之既去又自刈一擔送與之鄉人感愧及長恭孝清約學識有理義辟命皆不就每獨處幽暗之中容止瞻望未嘗傾邪見人飢寒並周贍之父母起居嘗饌雖諸兄親饋而晷不離左右富春車道少動經江水父難於風波晷常從後親自入水扶持籃車所詣之處藩屏隱息不令主人知之時會稽虞喜隱居海隅有髙世之風晷欽其德聘喜弟預女為妻喜嫁女棄華尚素時人號為梁鴻夫婦張翰字季鷹大鴻臚儼之子也有清才美望博學善屬文詞義新麗造次立成而縱任不拘時人號為江東步兵賀循赴命經吳閶門於船中彈琴翰初不相識乃就循言談便大相歡悅問循知其入洛翰曰吾亦有事北京便同載即去而不告家人齊王冏辟為大司馬東曹掾冏時執權翰謂顧榮曰天下紛紛禍難未巳夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後秋風起乃思吳中菰菜蓴羮鱸魚膾曰人生貴得適志何能羈宦數千里以要名爵乎遂命駕而歸著首丘賦文多不載俄而冏敗人皆謂之見幾然以其輒去除吏名翰任心自適不求當世或謂之曰卿乃可縱適一時獨不為身後名耶答曰使我有身後名不如即時一杯酒時人貴其曠逹性至孝遭母憂哀毁過禮年五十七卒其文筆數十篇行於世顧協字正禮晉司空和六世孫也幼孤隨母養於外氏外從祖張永嘗携內外孫姪遊虎丘山協年數嵗永撫之曰兒欲何戲協曰兒政欲枕石潄流永歎息曰顧氏興於此子及長好學外氏諸張多賢逹有識鑒內弟率尤推重焉初為揚州議曹從事史兼太學博士舉秀才沈約覽其策而歎曰江左以來未有斯作遷安成王國左常侍兼廷尉正太尉臨川王聞其名召掌書記除安都令未至縣遭母憂刺史始興王厚資遣之送喪還於峽江遇風同旅皆漂溺唯協一舫觸石得泊焉咸謂精誠所致服闋出補西陽郡丞還除北中郎行參軍復兼廷尉正久之出為廬陵郡丞未拜會西豐侯正德為吳郡除中軍領郡五官遷輕車湘東王參軍事兼記室與琅邪顔協名職俱同才學相亞府中稱為二協天監十五年敕徐勉入華林撰遍略勉舉協及何思澄劉杳王子雲鍾嶼等五人應選成書七百卷普通六年正德受詔北討引為府録事參軍掌書記軍還會有詔譽士湘東表薦之曰臣府兼記室參軍吳郡顧協行稱鄉閭學兼文武服膺道素雅量邃逺安貧守靜奉公抗直傍闕知已志不自營年方六十室無妻子臣欲言於官人申其屈滯協苦執真退立志難奪可謂東南之遺寶矣即召拜通直散騎侍郎兼中書通事舍人纍遷步兵校尉守鴻臚卿員外散騎常侍卿舍人並如故自為近臣便繁機密每有制述敕前示協時輩榮之大同八年卒年七十三無衾以斂武帝悼惜之手詔曰顧協亷潔自居白首不衰久在省闥內外稱善奄然殞喪惻怛之懷不能己巳傍無近親彌足哀者大殮既畢即送其喪柩還鄉并營冢椁並皆資給悉使周辦可贈散騎常侍令便舉哀諡曰溫子協清介有志操初為廷尉正冬服單薄蔡法度欲解襦與之憚其清嚴不敢發口謂人曰我願解身上襦與顧郎恐顧郎難衣食者竟不敢在省十六載器服飲食不改於常自丁艱憂終身布衣蔬食少時將聘舅息未成婚而協母亡免喪後不復娶至六十餘此女猶未他適協義而迎之晚雖判合卒無子嗣協博極羣書於文字及禽獸草木尤稱精詳撰異姓苑五卷瑣語十卷文集十卷並行於世南史云協為舍人同官者皆潤屋有門生始來事協知其亷潔不敢厚餉止送錢二千協發怒杖二十因此事著絶於饋遺何求字子有灊人宋宜都太守鑠之子也元嘉末為文挽郎厯太子洗馬丹陽郡丞清退無嗜欲後為太子中舍人泰始中妻亡還吳葬舊墓除中書郎不拜仍住吳隱居波若寺足不踰户人莫見其面明帝崩出奔國哀除永嘉太守一夜乘小船逃歸吳隱武丘山齊永明四年拜太中大夫不就卒初鑠素有風疾無故害求母坐法死求兄弟以此無宦情弟點點字子哲年十一居父母憂幾至滅性及長感家禍欲絶昏宦卒不肯娶明目秀眉容貌方雅貞素通美不以門户自矜博通羣書善談論家本素族親姻多貴仕點雖不入城府而敖遊人間不簪不帶以人地並髙無所與屈或乘柴車躡草屩恣心所適致醉而歸故世論以點為孝隱士弟胤為小隱士士大夫多慕從之時又通號曰遊俠處士兄求卒點菜食不飲酒訖十三年太始末徴為太子洗馬齊初纍徴中書侍郎太子中庶子並不就與陳郡謝瀹吳國張融會稽孔德璋為莫逆友點少時嘗患渴利積嵗不愈後在吳中石佛寺建講晝寢夢一道人形貌非常授丸一掬夢中服之自此而差時人以為淳德所感梁武帝與點兄弟有舊天監初以侍中召點不就二年卒胤字子季出繼叔父曠故更字胤叔年八嵗居憂毁若成人晚乃折節好學仕齊建安太守政有恩信後以國子祭酒侍中及鬱林王嗣位胤為后族為中書令拜表解職東之會稽居若邪山雲門寺初胤二兄求點並棲遁求先卒胤又隱世謂點為大山胤為小山亦曰東山號何氏三髙永元中徴為太常太子詹事梁武帝詔為特進光祿大夫並不就敕給白衣尚書祿固辭又遷秦望山起學舍初何氏過江自晉司空充並葬吳西山胤家世年皆不永唯祖尚之至七十二胤年登祖夀乃移還吳作别山詩一首言甚悽愴至吳居武丘山西寺講經論學僧復從之東境守宰經途者莫不畢至胤常禁殺有虞人逐鹿徑來趨胤伏而不動又有異鳥如鶴紅色集講堂馴狎如家鳥大通三年卒年八十六陶峴者晉徴士淵明後也開元中居崑山富有田業擇不欺者悉付以家事峴遍遊江湖往往數年不歸見其子孫成人初不辨其名字峴文學可以經濟自謂迹脫不謀宦逹生知八音撰樂録八章以定其得失自制三舟備極堅巧一以自載一置賔客一貯飲饌客有孟彥深孟雲卿焦遂各置僕妾共載峴有女樂一部奏清商曲逢佳山水必窮其勝名聞朝廷經過郡邑靡不招延峴不肯來自謂麋鹿野人非王公上客亦有不召而自詣者吳越之士號為水仙素慕謝康樂之為人云終當樂死山水浪迹三十餘年及遊襄陽西塞歸老於吳殷懌字易從曲阿人少負志氣博學善屬文弱冠遊太學籍甚公卿間天寶末知天下將亂乃趣裝東歸侍母居吳郡吳中士大夫與之遊者鄉黨以為榮採訪使李希言辟為從事奏保懌崑山尉不就子侑陸龜蒙字魯望元方七世孫父賔虞以文厯侍御史龜蒙少髙放通六經大義尤明春秋舉進士一不中往從湖州刺史張摶遊厯湖蘇二州辟以自佐嘗至饒州三日無所詣刺史蔡京率官屬就見之龜蒙不樂拂衣去居松江甫里多所論撰雖幽憂疾痛資無十日計不少輟也文成竄藁篋中或厯年不省為好事者盜去得書熟誦乃録讐比勤勤朱黃不去手所藏雖少其精皆可傳借人書篇帙壞舛必為輯禠刋正樂聞人學講論不倦有田數十畝屋二十楹田苦下雨潦則與江通故常苦飢身畚臿茠刺無休時或譏其勞答曰堯舜黴瘠禹胼胝彼聖人也吾一褐衣敢不勤乎嗜茶置園顧渚山下嵗取租茶自判品第張又新為水説七種其二惠山泉三虎丘井六松江人助其好者雖百里為致之初病酒再期乃已其後客至置潔壺杯不復飲不喜與流俗交造門不肯見不乘馬并舟設蓬席齎束書茶竈筆牀釣具往來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以髙士召不至李蔚盧携素與善及當國召拜左拾遺詔方下龜蒙卒光化中韋莊表龜蒙及孟郊等十人皆贈右補闕陸氏在姑蘇其門有巨石逺祖績為鬱林太守罷歸無裝舟輕不可越海取石為重人稱其亷號鬱林石世保其居云蔣貽恭吳人流落入蜀性耿直有逸才每一吟詠率多諷刺時蜀主季年臣僚多尚權勢侈敖無節因為詩以諷之蜀主知其不避曰敢言之士也特授雅州名山令又善隸篆賜銀緋松江漁翁者不知何許人恆棹舟遊長橋往來波上意氣自得醉則扣舷而歌紹聖中閩人潘裕自京師調官回道吳江遇而異焉起揖之曰豫視先生氣貌固非漁釣之流願丐緒言以發蒙陋翁曰吾厭喧囂處間曠遁迹於茲三十年矣幼喜誦經史百家之言後觀釋氏書今皆棄去唯飽食以嬉尚何所事裕曰先生澡身浴德如此今聖明在上盍出而仕乎翁笑曰君子之道或出或處吾雖不能棲隱巖穴追園綺之蹤竊慕老氏曲全之義且棄軒冕如糞土耳與子出處異趣子勉之裕曰幸聞志者忘形養心者忘道致道者忘心心形俱忘其視先生之髙義敢問舍所翁曰吾姓名且不欲人知况居室邪飲畢鼓枻而去鍾璇字振遠一字叔齊常熟人六嵗而孤育于繼祖龍圖學士林遹家遹家多書因得縱觀與其孫璟瓌琢同肄業課率先成後璟三兄弟並登第璇遂棄舉子業取所藏盡閲之侍官台州嘗遊巖谷間遇異人衣僧服持列禦冦書揖而與坐磐石指一泓定水曰此水滔滔乃皇極大中之道語久别去自是有悟益不溺於名利放浪漁釣間築室梅里所居多蒔香草閉户二十年家貧殊不戚戚有求者解衣分粟無靳色唐瑑自留守歸寓梅里與為忘年交提舉徐誼知府沈揆皆造其廬以竒人目之范成大等薦于朝不報卒年五十二有藥園藁山中録續孔白帖秦漢以來鍾鼎竒字藏於家鄭思肖字憶翁號所南連江人祖咸卒於枝江主簿父震字叔起淳祐道學君子為安定和靖二書院山長有菊山詩集景定壬戌卒於吳葬長洲縣甑山思肖太學上舍應博學宏詞科侍父來吳寓條坊巷元兵南下扣閽上太皇太后幼主疏辭切直忤當路不報初名某宋亡乃改今名思肖即思趙憶翁與所南皆寓意也素不娶孑然一身念念不忘君形言於詩文中如過徐子方書孰云不知今日月但夢宋山川題鄭子封寓舍云此世但除君父外不曽别受一人恩寒菊云寧可枝頭抱香死不曽吹落北風中贈人云天下皆變吾觀其不變惟其不變乃所以變其變者物也不變者道也又云古人重立身今人重養身立身者蓋超乎千古之上與天地周流於不知不識之天也養身者惜一粟以活微命役於萬物死於萬變者也何足道哉遇嵗時伏臘輒野哭南向拜人莫測識焉聞北語必掩耳亟走人亦知其孤僻不以為異也坐臥不北向扁其室曰本穴世界以本字之十置下文則大宋也精墨蘭自更祚後為蘭不畫土根無所慿藉或問其故則云地為他人奪去汝不知邪不欲與雖迫以勢權不可得也天目本中峯禪林之白眉聞思肖名欲見未果偶會於孝子梅應發家一見各默不語坐久之本忽云所南何不説法思肖曰兩眼對兩眼無法可説及别去本又云博學老子思肖即曰世法和尚趙孟俯才名重當世思肖惡其宗室而受元聘遂與之絶孟俯數往俟之終不得見嘆息而去無何化其所居得錢則周人之急田亦捨諸剎惟餘數畝為衣食資仍謂佃客曰我死則汝主之蓋不以家為矣自是無定迹吳之名山禪室道宫無不遍厯多寓城之萬夀覺報二剎疾亟時囑其友唐東嶼曰思肖死矣煩為書一位牌當云大宋不忠不孝鄭思肖語訖而絶年七十八蓋其意謂不能死國與無後也自贊其像曰不忠可誅不孝可斬可懸此頭於洪洪荒荒之表以為不忠不孝之榜樣宋社既墟適意緇黃自稱三外野人嘗著大無工十空經一卷空字去工而加十宋字也寓為大宋經造語竒澀如庾詞莫可曉自題其後云臣思肖嘔三斗血方能書此後當有巨眼識之又著釋氏施食心法一卷太極祭煉一卷謬餘集一卷文集一卷自敘一百二十圖詩一卷思肖母樓氏宋侍從鑰之族妹為比丘尼名普西受業於飲馬橋南寶林尼寺張介福字子祺覃懷人從姑氏來吳少慕鄉先生許衡遂軒軒以禮自持為學鞭辟近裏不事表襮雖步周旋必蹈規矩以不及奉親未嘗食士祿張士誠入吳兵掠其家端坐不動兵脅之令其導諸富家不從乃以刀斫其面流血仆地復戴冠危坐而顔色自若兵捨之而去家素貧冬不具衣𥜗或遺以夾絮固辭之雖小物亦不受後因親墓在城西恐盜發之遂廬於墓側及臥病至死神爽弗昧語其友曰吾學古人一無所成死有餘憾矣人物十六隱逸顧初者郡人也嘗有牛暴其禾初見牽牛隂涼木下刈芻飼之牛主愧服不敢暴焉顧黯字長孺郡人有隱操齊永明元年徴為散騎侍郎同郡鹽官顧歡為太學博士俱不就徐修矩吳縣人唐恩王府記室參軍奕世才賢居家介潔守書萬卷優遊自適有潮田五萬步草屋十數間不復出仕皮日休嘗就借書讀之其時有任晦亦同縣人日休與陸龜蒙作二遊詩史德義崑山人唐咸寧初隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人髙宗聞其名召赴洛陽尋稱疾歸公卿皆賦詩餞别德義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徴赴都詔曰蘇州隱士史德義志尚虛玄素履真確謙沖彰於里閈孝友表於閨庭固辭徴辟長往嚴陵之瀨多謝簮裾髙蹈愚公之谷風操可知啓沃攸佇特宜優奬委以諫曹授諫議大夫興死放歸丘壑素譽頓衰新唐書云以周興薦擢朝散大夫陸誇自右拾遺除司勳郎中棄官隱吳中詔召之既在道歐陽秬遺書誚其出處之遽誇遂還秬詹從子也名亦髙胡稷言字正思兵部侍郎則之從子少學古文於宋祁後獻時議於范仲淹復授經於胡瑗以特奏補官調晉陵尉厯鄞縣簿山隂丞自以不能究其所施遂乞致仕升朝後仍賜緋衣銀魚既告老即所居臨頓里陸魯望遺址築圃鑿池追陶靖節之風作五柳堂清修寡欲延納後進日晡後不復飲食客至蕭然具湯一杯而已卒年八十餘子嶧嶧字仲連姿稟淳慤恬於榮利父子兄弟相為師友嶧與方惟深林虙為忘年交後以年格建炎登極推恩調迪功郎安遠尉非其好也所居五柳園松忩蓬户植竹疏沼人目為隱君子步趨言動皆有尺度賔嘉喪祭率循古法用杜甫詩名所居曰如村纍舉命官終不仕紹興中卒年七十九詩文簡古有如村冗藁二十卷子曰百能百能字少明紹興進士知衢州江山縣有惠愛乾道初授諸王官大小學教授嚮進用矣以年至力請老廷議嘉之授左奉議郎賜緋衣銀魚致仕而歸築堂曰宜休錙銖軒冕殆其天性久之卒年七十四子耕侍其沔字國紀上世自髙密徙吳沔為學貫穿經傳與人交如淡薄遇其急奮義以往不避艱險五舉禮部退為鄉先生治平三年沒門人弟子相與議其治行諡曰夷晦滕元發志其墓云士生斯世有進取出力得時行道功烈被於民者有行義修潔退而講學為一鄉之善士者斯二者用捨不同要皆天下之強立君子也善士蓋指沔其慕尚之如此顧禧字景繁祖沂字歸聖知龔州父彥成字子英兩浙運使皆有賢名禧雖受世賞不仕居光福山中閉户讀誦博極墳典所著書甚富注蘇文忠公詩尤詳紹興間郡以遺逸薦間居三十年不出章康字季思都官郎中甫生惠惠生漢卿漢卿生頡皆隱居不仕康頡之子也安貧樂道居城西田屋粗給閉户不染世俗出入徒步人尊稱之曰聘君平生足迹未嘗越州境而四方之人無不知有章季思士大夫過吳以不見為慊嘗問學於朱熹默有所契日以詩陶寫遇紙即書人人取去以此終身不厭年七十步履如飛或訝其有方外之遇問之康云吾師聖賢無外學也淳祐五年忽謂其子仲肯曰吾死有期預書墓蓋以明年卒年七十九終時正寢梁壞有聲人皆異之郡人胡淳從康遊嵗時致醪醴薪米所著雪崖文集十卷詩集五十卷淳字以初陳深字子微世為吳人生於宋習舉子業宋亡棄故習篤志古學閉門著書有讀易編讀詩編春秋編弟子甚衆且有髙名深書筆亦精天厯間天章閣建以能書薦之潛匿不出以終别號寧極學者稱寧極先生子植字叔方少負才氣喜與倜儻之士遊既而折節讀書克繼父業有孝行晨夕躬事庖饌親之中裙厠牏手自浣濯更世變以琴書自娛屢辟召皆不起植子紹先自有傳韓奕字公望宋忠獻魏王琦之後其先自安陽再徙居吳之樂橋父凝工醫在藝術傳奕幼端重簡默動作循矩度雖居㕓市而樂事遊覽放浪山水間褐衣芒屨一童自隨往來山僧野客家纍月不去或時藉草而坐微吟長嘯人莫測其意性頴敏博學尤工於詩洪武中與王賔俱隱於醫賔既為郡守姚善所禮乃復因賔致奕奕終不往一日與賔詣之奕走楞伽山善隨至奕泛小舟入太湖善嘆曰韓先生所謂名可得聞身不可得而見也所著有韓山人集王賓初名國賓字仲光長洲人博綜文籍經史諸子厯數兵政百氏小説靡不該貫而制行竒狷不娶不宦貌甚寢又以藥點面及肘股為創髽髮短衣或箕踞道傍􅐡搔雖知者亦不敢薦逹姚善為守特往求見賔執禮抗節風軌甚髙與韓奕事皆互見善傳性至孝奉母甚篤年七十病革抱母不舍死而復蘇呼母連聲始絶既葬神歸于家方午聞其杖履聲呼母曰娘娘兒舍娘娘不得良久乃滅自號光菴所著有光菴文集吳中名賢紀録吳下古迹詩杜瓊字用嘉吳縣人生一月而孤母顧育而教之長從陳繼先生學博綜古今為文和平醇實而必本於理詩尤沉著古雅有風致間寫山水尤潤秀可觀性至孝父蚤亡念不得見從人問知其容儀往往形諸夢寐以父名玉終身諱之嘗刲股已母疾有司將上其孝瓊曰此豈得已邪惟母節未白可念耳有司以聞遂得旌其母每求賢詔下有司輒以瓊應皆辭不就雖介特有守而不為過矯之行所居在城西有隱居之趣其東有原學者稱東原先生年七十有九卒三吳交從會葬者千餘人因私諡曰淵孝先生今列祀鄉賢祠所著有東原齋卷紀善録耕餘雜録龔詡字大章崑山人父察洪武初為給事中謫戍死詡少依母族冒姓王氏既長隱迹田里肆力經書晝夜不輟尚書周忱屢至其家資訪時政兩薦為松江太倉教授皆不就有田三十畝力耕自給晚嵗獨與一老婢居破廬中種豆植麻詠歌自適沒年八十餘門人私諡曰安節先生邢量字用理長洲人隱居葑門以醫卜自給性狷介不娶與人無將迎足迹不出里門不畜奴婢敝屋三間青苔滿壁折鐺敗席蕭然如野僧長日或不舉火客至相與清坐而已其學自經史外凡釋老方伎之説無所不通室中臥榻之外皆藏書並手自校定或叩之信手舉似不事翻檢文章古簡亦不茍作同邑沈誠字希明生稍後隱操亦髙雖居通衢鄰里莫識其面朝士有欲過之者固謝不納誠博學問無不知然短於著述故無所傳云人物十七薦舉莫禮字士敬吳江人洪武中以稅户人材徴授户部員外郎與同官沈玠王公讓張瑾楊德彛徐衍龔逹可潘賢金伯中李鼎十人同日上疏辭祿詔許之秩滿超升本部右侍郎轉左侍郎俄坐黨事卒臨刑賦詩有一心忠義堅如石惟有皇天后土知之句人多傷之顧禮字原禮崑山人洪武五年以材幹擢刑部員外郎八年超遷本部侍郎九年以家屬極刑循例除名放還十一年再徴為户部侍郎遷尚書十三年改刑部尚書卒於官范從文字復之文正公十三世孫六世祖之柔食邑於崑遂為崑山人父原良卒官潮州推官從文方弱冠匍匐至潮求欑不得日夜號泣俄大雨潰封得函骨以歸人稱孝感洪武中以國子生奉使稱旨擢監察御史改户部總部主事奏免株連盜倉罪百餘人俄為冏官所陷得罪且死呼曰幸以先賢赦宥上問祖為誰曰范仲淹上曰得非先憂後樂者邪於是末減謫役莊浪頃復追戍金齒永樂初以薦起為金華訓導厯東安金鄉三學致仕歸年八十餘卒所著有小學章詁宗諜譜遺復齋集若干卷馬逵字伯行吳江人洪武中以人材徴授合水縣丞以憂去改昌邑為政亷平人不敢干以私粗衣惡食其妻不能堪乘間言之逵怒曰爾欲使我為善邪為惡邪後終河間衛經厯劉以禮字德讓其先汴人祖順之仕平江路榷茶提領因家于蘇以禮學識該博儀狀偉然洪武初以明經薦授沛縣儒學教諭時學徒久廢以禮力以興舉為已任乃舉鄉人張倫為訓導協心教之多所成就沛學至今祀之子敏敏字孟功學行純篤少隨父於任凡可以悅親者之惟恐不及親殁久言及輒淚下仲弟敬久嬰疾藥餌必手治弗假僕從士有寒而來歸者周之不厭有司聞其賢薦授德清縣令鋤強植善民甚懷之後以善書徴入翰林擢中書舍人朝士多推重之修撰張洪嘗為文贈之曰南北宦遊來京者所稱許必曰孟功有不知孟功者蓋非賢也其重之如此卒年七十有八盛逮字景華吳江人父似祖號寓翁者有行義始徙郡中洪武初逮以賢良應召賜冠帶參大臣議事與中書參政陳寧不合因以疾辭歸弟章以鹽法被捕甚急父憐其少子不忍遣逮請曰弟未有子願就捕因謫戍寧夏先是逮歸鄉里寧適守蘇將甘心焉亟欲見逮不得乃命逮督辦通區逋賦逮傾資貸民償之友人唐自牧負官租計白金二百兩走告於逮逮如數與之翰林待詔李幹老無所歸逮延之家孰既卒葬於墓側嵗時祭之逮嘗遊關中得異人導引法作原道詩卒年九十三子寅御醫有傳陳則字文度崑山人洪武六年秀才舉任應天府治中遷户部侍郎左遷大同府同知進知府則文詞清麗與髙啓楊載同稱沈芳字庭芳崑山人洪武二十六年舉茂才授觀察使遷北平左布政使沈應字德乾郡人洪武中應求賢詔選入文華堂説書除江西布政司參議母喪服闋改山東卒應善為詩所著有東澗集吳簡字仲亷吳江人元季數舉於鄉不利遂杜門績學尋以薦授郡學訓導升紹興路學録洪武四年應詔至京以疾辭歸優遊林泉號月潭居士年八十二卒所著有論語提要史學提綱并詩集若干卷二子復湖廣僉事頥縣學訓導俱有文名趙文字宗文長洲人洪武中舉人材以母老歸養永樂五年以翰林典籍梁時薦知鄱陽縣不阿權幸坐謫久之歸卒文淳厚強毅老而持度愈嚴鄉稱篤實君子所著有慎獨齋文集理學述言弟宗禮兵部郎中袁政字文理吳縣人嘗學於俞貞木永樂七年以薦授湘隂典史湘隂民素貧而墮於耕遇征調輒破産政為勸課振勵自是民有蓋藏後以夏原吉薦升遂安知縣未視篆宿於驛亭夢被血小兒數輩挽其衣覺而問於父老知邑中生女多不舉即嚴禁之後邑中生女多名袁留沈澄字孟淵長洲人洪武中以人材應薦至京尋引疾歸周文襄公巡撫吳中嘗就澄訪時政多所施行澄雅善詩尤好客海內知名之士無不造之所居曰西莊日與治具燕賔客詩酒為樂人以顧仲瑛擬之翰林金問坐事繫獄十年衣食之需皆澄周之問嘗謂人曰吾微孟淵為瘐鬼矣年八十有八而終子二貞吉恆吉隱迹尚義有父風俱能詩恆吉尤善畫李箎字仲怡常熟人永樂末以經明行修薦授崑山縣學訓導遷山東巢縣教諭箎有文學勤於纂述所著有友梅集崑山常熟崇明三志章圭字孟端常熟人宣德中應求賢詔授廣東按察司知事入為監察御史嘗讞大辟囚多所平反畿輔旱蝗奏免民租六十餘萬斛後因廷論大臣不職為當道所惡因自解歸四子儀表格律先後登科位皆通顯纍贈圭右副都御史格自有傳宣嗣宗嘉定人永樂中以善書薦入翰林授中書舍人升吏部驗封員外郎進郎中卒嗣宗純謹不妄最為宣廟眷禮既卒遣宫祭于其家子謙福寧縣丞伊恆字宗友其先沭陽人宋建炎間始居蘇父肜以閭右徙實京師恆好學善書永樂中簡侍東宫特承眷注洪熙初擢冬官營繕所正與翰林修撰金問同被命待詔思善門進尚寶少卿復與問同命景泰中致仕卒年八十餘恆為人恭勤靜退不與時競時稱長者從子侃工科給事中衛靖字以嘉崑山人洪熙初以能書薦授中書舍人直文淵閣升禮部主事預修宣廟實録進食五品俸靖謹厚能詩所著有公餘清興集陳述字宗理嘉定人好學能詩以賢良方正被舉任湖廣按察司照磨擢監察御史剗弊雪寃多所建明厯升四川布政司左參政巡撫憲臣以述歷練老成識逹事機上章薦之述以老懇乞致仕進階二品姑蘇志卷五十五
