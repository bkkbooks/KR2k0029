body:
  text: 姑蘇志卷三明王鏊撰古今守令表中右自太平興國至德祐知州一百六人內再任五人知府一百四十三人內再任十人三任一人以他官權任一十五人外有不赴任一十八人辛若渝慶厯四年五月自知壽州徙任不赴齊廓慶厯七年三月辛酉自淮南轉運使移任不赴李絢皇祐四年六月知開封府以事出知蘇州未行卒張諷熙寧七年七月自知越州徙任未行改明州張説元豐元年為熙河經略使請郡得知蘇州過闕改知成都府元祐元年五月提舉杭州洞霄宮改知蘇州亦不赴范志壁記作熙寧誤章惇按會要元祐三年四月知越州不赴除蘇州復辭未報遂丁父憂實録云四月以提舉洞霄宮除知蘇州五月丁卯依舊提舉元祠未詳孰是又壁記無之蓋未嘗之任章衡紹聖元年三月丙申自知曹州徙蘇未上楊級紹聖元年閏四月辛未朔自知越州詔移蘇州與章衡兩易不赴呂惠卿紹聖元年閏四月乙酉自提舉崇福宮除知蘇州未上改江寧府李仲權元符二年八月以河北東路提刑知蘇州不赴王博聞崇寧四年五月自知懷州滿除未上六月改河北路轉運使葉棣大觀二年十月自知潁州徙蘇未上仍知潁州王璹政和三年九月以京西路轉運使知平江未上仍依舊任霍端友政和四年以禮部侍郎請郡除知平江府未上改陳州黃潛善建炎二年二月罷相除觀文殿學士知平江府不赴卒朱勝非建炎二年四月罷相除知洪州五月改知平江府不赴趙鼎紹興二年八月自提舉洞霄宮降知府事未到九月遂改江東安撫大使陳克敬紹興三年四月自知泉州改知府事不赴不列通凡守臣二百六十四人姑蘇志卷三
